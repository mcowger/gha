 and controlling flow directly in code. However, a higher level agent framework offers compelling benefits. For\n  example:\n    - Breaking up LLM interactions, making them simpler and more focused. This maximizes reuse and minimizes cost and\n      errors. It often allows us to use cheaper models for point interactions.\n    - Facilitating both unit and integration testing, which remain as important with agentic systems as with any other\n      software systems.\n    - Increasing composability where subflows and individual actions can be reused\n    - Making applications more manageable and robust, enabling a workflow manager to control their execution and retry\n      operations while maintaining previous state\n    - Enhancing safety through the ability to apply guardrails in many places\n- _Why do we need an agent framework for the JVM when solutions exist in Python?_: While agent frameworks initially\n  appeared predominantly Python, it's early and there's plenty of room for novel and\n  superior\n  approaches. The key adjacency is not the LLM--which is a simple HTTP call away--but existing code and\n  infrastructure\n  assets that are more valuable on the JVM than in Python.\n- _Why not use just Spring AI?_ Spring AI is great. We build on it, and embrace the Spring component model. However, we\n  believe that most applications should work with higher\n  level APIs. An analogy: Spring AI exists at the level of the Servlet API, while Embabel is more like Spring MVC.\n  Complex requirements are much easier to express and test in Embabel than with direct use of Spring AI.\n- _Why not attempt to contribute this project to Spring?_ This project requires different governance\n  from Spring, where most projects exist in stable environments and dependability and stability outweighs rapid\n  innovation. Second, the\n  concepts are not JVM-specific. We hope that Embabel will become the leading agent framework across platforms. While\n  the Spring brand is valuable in Java, it is not in TypeScript or Python.\n\n## Show Me The Code\n\nIn Java or Kotlin, agent implementation code is intuitive and easy to test.\n\n<details open>\n<summary>Java</summary>\n\n```java\n\n@Agent(description = \"Find news based on a person's star sign\")\npublic class StarNewsFinder {\n\n    private final HoroscopeService horoscopeService;\n    private final int storyCount;\n\n    // Services are injected by Spring\n    public StarNewsFinder(\n            HoroscopeService horoscopeService,\n            @Value(\"${star-news-finder.story.count:5}\") int storyCount) {\n        this.horoscopeService = horoscopeService;\n        this.storyCount = storyCount;\n    }\n\n    @Action\n    public StarPerson extractStarPerson(UserInput userInput, Ai ai) {\n        return ai\n                .withLlm(OpenAiModels.GPT_41)\n                .createObjectIfPossible(\n                        \"\"\"\n                                Create a person from this user input, extracting their name and star sign:\n                                %s\"\"\".formatted(userInput.getContent()),\n                        StarPerson.class\n                );\n    }\n\n    @Action\n    public Horoscope retrieveHoroscope(StarPerson starPerson) {\n        return new Horoscope(horoscopeService.dailyHoroscope(starPerson.sign()));\n    }\n\n    // toolGroups specifies tools that are required for this action to run\n    @Action(toolGroups = {CoreToolGroups.WEB})\n    public RelevantNewsStories findNewsStories(\n            StarPerson person,\n            Horoscope horoscope,\n            Ai ai) {\n        var prompt = \"\"\"\n                %s is an astrology believer with the sign %s.\n                Their horoscope for today is:\n                    <horoscope>%s</horoscope>\n                Given this, use web tools and generate search queries\n                to find %d relevant news stories summarize them in a few sentences.\n                Include the URL for each story.\n                Do not look for another horoscope reading or return results directly about astrology;\n                find stories relevant to the reading above.\n                \n                For example:\n                - If the horoscope says that they may\n                want to work on relationships, you could find news stories about\n                novel gifts\n                - If the horoscope says that they may want to work on their career,\n                find news stories about training courses.\"\"\".formatted(\n                person.name(), person.sign(), horoscope.summary(), storyCount);\n        return ai\n                .withDefaultLlm()\n                .createObject(prompt, RelevantNewsStories.class);\n    }\n\n    // The @AchievesGoal annotation indicates that completing this action\n    // achieves the given goal, so the agent can be complete\n    @AchievesGoal(\n            description = \"Write an amusing writeup for the target person based on their horoscope and current news stories\",\n            export = @Export(\n                    remote = true,\n                    name = \"starNewsWriteupJava\",\n                    startingInputTypes = {StarPerson.class, UserInput.class})\n    )\n    @Action\n    public Writeup writeup(\n            StarPerson person,\n            RelevantNewsStories relevantNewsStories,\n            Horoscope horoscope,\n            Ai ai) {\n        var llm = LlmOptions\n                .withModel(OpenAiModels.GPT_41_MINI)\n                // High temperature for creativity\n                .withTemperature(0.9);\n\n        var newsItems = relevantNewsStories.getItems().stream()\n                .map(item -> \"- \" + item.getUrl() + \": \" + item.getSummary())\n                .collect(Collectors.joining(\"\\n\"));\n\n        var prompt = \"\"\"\n                Take the following news stories and write up something\n                amusing for the target person.\n                \n                Begin by summarizing their horoscope in a concise, amusing way, then\n                talk about the news. End with a surprising signoff.\n                \n                %s is an astrology believer with the sign %s.\n                Their horoscope for today is:\n                    <horoscope>%s</horoscope>\n                Relevant news stories are:\n                %s\n                \n                Format it as Markdown with links.\"\"\".formatted(\n                person.name(), person.sign(), horoscope.summary(), newsItems);\n        return ai\n                .withLlm(llm)\n                .createObject(prompt, Writeup.class);\n    }\n}\n```\n\n</details>\n\n<details>\n<summary>Kotlin</summary>\n\n```kotlin\n@Agent(description = \"Find news based on a person's star sign\")\nclass StarNewsFinder(\n    // Services such as Horoscope are injected by Spring\n    private val horoscopeService: HoroscopeService,\n    // Potentially externalized by Spring\n    @param:Value(\"\\${star-news-finder.story.count:5}\")\n    private val storyCount: Int = 5,\n) {\n\n    @Action\n    fun extractPerson(\n        userInput: UserInput,\n        ai: Ai\n    ): StarPerson =\n        // All prompts are typesafe\n        ai.withDefaultLlm()\n            .createObject(\"Create a person from this user input, extracting their name and star sign: $userInput\")\n\n    // This action doesn't use an LLM\n    // Embabel makes it easy to mix LLM use with regular code\n    @Action\n    fun retrieveHoroscope(starPerson: StarPerson) =\n        Horoscope(horoscopeService.dailyHoroscope(starPerson.sign))\n\n    // This action uses tools\n    // \"toolGroups\" specifies tools that are required for this action to run\n    @Action(toolGroups = [ToolGroup.WEB])\n    fun findNewsStories(\n        person: StarPerson,\n        horoscope: Horoscope,\n        ai: Ai,\n    ): RelevantNewsStories =\n        ai.withDefaultLlm().createObject(\n            \"\"\"\n            ${person.name} is an astrology believer with the sign ${person.sign}.\n            Their horoscope for today is:\n                <horoscope>${horoscope.summary}</horoscope>\n            Given this, use web tools and generate search queries\n            to find $storyCount relevant news stories summarize them in a few sentences.\n            Include the URL for each story.\n            Do not look for another horoscope reading or return results directly about astrology;\n            find stories relevant to the reading above.\n\n            For example:\n            - If the horoscope says that they may\n            want to work on relationships, you could find news stories about\n            novel gifts\n            - If the horoscope says that they may want to work on their career,\n            find news stories about training courses.\n        \"\"\".trimIndent()\n        )\n\n    // The @AchievesGoal annotation indicates that completing this action\n    // achieves the given goal, so the agent run will be complete\n    @AchievesGoal(\n        description = \"Write an amusing writeup for the target person based on their horoscope and current news stories\",\n    )\n    @Action\n    fun writeup(\n        person: StarPerson,\n        relevantNewsStories: RelevantNewsStories,\n        horoscope: Horoscope,\n        ai: Ai,\n    ): Writeup =\n        ai\n            .withLlm(\n                LlmOptions\n                    .withModel(model)\n                    .withTemperature(0.9)\n            )\n            .createObject(\n                \"\"\"\n            Take the following news stories and write up something\n            amusing for the target person.\n\n            Begin by summarizing their horoscope in a concise, amusing way, then\n            talk about the news. End with a surprising signoff.\n\n            ${person.name} is an astrology believer with the sign ${person.sign}.\n            Their horoscope for today is:\n                <horoscope>${horoscope.summary}</horoscope>\n            Relevant news stories are:\n            ${relevantNewsStories.items.joinToString(\"\\n\") { \"- ${it.url}: ${it.summary}\" }}\n\n            Format it as Markdown with links.\n        \"\"\".trimIndent()\n            )\n\n}\n```\n\n</details>\n\n\nThe following domain classes ensure type safety:\n\n<details open>\n<summary>Java</summary>\n\n```java\n\n@JsonClassDescription(\"Person with astrology details\")\n@JsonDeserialize(as = StarPerson.class)\npublic record StarPerson(\n        String name,\n        @JsonPropertyDescription(\"Star sign\") String sign\n) implements Person {\n\n    @JsonCreator\n    public StarPerson(\n            @JsonProperty(\"name\") String name,\n            @JsonProperty(\"sign\") String sign\n    ) {\n        this.name = name;\n        this.sign = sign;\n    }\n\n    @Override\n    public String getName() {\n        return name;\n    }\n}\n\npublic record Horoscope(String summary) {\n}\n\n@JsonClassDescription(\"Writeup relating to a person's horoscope and relevant news\")\npublic record Writeup(String text) implements HasContent {\n\n    @JsonCreator\n    public Writeup(@JsonProperty(\"text\") String text) {\n        this.text = text;\n    }\n\n    @Override\n    public String getContent() {\n        return text;\n    }\n}\n\n```\n\n</details>\n\n<details>\n<summary>Kotlin</summary>\n\n```kotlin\ndata class RelevantNewsStories(\n    val items: List<NewsStory>\n)\n\ndata class NewsStory(\n    val url: String,\n\n    val summary: String,\n)\n\ndata class Subject(\n    val name: String,\n    val sign: String,\n)\n\ndata class Horoscope(\n    val summary: String,\n)\n\ndata class FunnyWriteup(\n    override val text: String,\n) : HasContent\n```\n\n</details>\n\nIt's easy to unit test your agents to ensure that they correctly execute logic\nand pass the correct prompts and hyperparameters to LLMs. For example:\n\n```java\npublic class StarNewsFinderTest {\n\n    @Test\n    void writeupPromptMustContainKeyData() {\n        HoroscopeService horoscopeService = mock(HoroscopeService.class);\n        StarNewsFinder starNewsFinder = new StarNewsFinder(horoscopeService, 5);\n        var context = new FakeOperationContext();\n        context.expectResponse(new com.embabel.example.horoscope.Writeup(\"Gonna be a good day\"));\n\n        NewsStory cockatoos = new NewsStory(\n                \"https://fake.com.au\",\n                \"Cockatoo behavior\",\n                \"Cockatoos are eating cabbages\"\n        );\n\n        NewsStory emus = new NewsStory(\n                \"https://morefake.com.au\",\n                \"Emu movements\",\n                \"Emus are massing\"\n        );\n\n        StarPerson starPerson = new StarPerson(\"Lynda\", \"Scorpio\");\n        RelevantNewsStories relevantNewsStories = new RelevantNewsStories(Arrays.asList(cockatoos, emus));\n        Horoscope horoscope = new Horoscope(\"This is a good day for you\");\n\n        starNewsFinder.writeup(starPerson, relevantNewsStories, horoscope, context);\n\n        var prompt = context.getLlmInvocations().getFirst().getPrompt();\n        var toolGroups = context.getLlmInvocations().getFirst().getInteraction().getToolGroups();\n\n\n        assertTrue(prompt.contains(starPerson.getName()));\n        assertTrue(prompt.contains(starPerson.sign()));\n        assertTrue(prompt.contains(cockatoos.getSummary()));\n        assertTrue(prompt.contains(emus.getSummary()));\n\n        assertTrue(toolGroups.isEmpty(), \"The LLM should not have been given any tool groups\");\n    }\n}\n```\n\n## Dog Food Policy\n\nWe believe that all aspects of software development and business can and should\nbe greatly accelerated through the use of AI agents. The ultimate decision\nmakers remain human, but they can and should be greatly augmented.\n\n> This project practices extreme dogfooding.\n\n<!-- TODO photo of Duke with kibble -->\n\nOur key principles:\n\n1. **We will use AI agents to help every aspect of the project:** coding, documentation, community management, producing\n   marketing copy etc.\n   Any\n   human performing a task should ask why it cannot be automated, and strive toward maximum automation.\n2. **Developers retain ultimate control.** Developers are responsible for guiding agents toward the solution and\n   iterating\n   as necessary. A developer who commits or merges an agent contribution\n   is responsible for ensuring that it meets the project coding standards, which are\n   independent of the use of agents. For example, code must be human-readable.\n3. **We will favour open source agents built on the Embabel platform,** and contribute improvements. While\n   commercial agents\n   may be more advanced in some areas, we believe that our\n   platform is the best general solution for automation and by dogfooding we will improve it fastest.\n   By open sourcing agents used on our open source projects, we will maximize benefit to the community.\n4. **We will prioritize agents that help accelerate our progress.** Per the flight safety advice to fit your own mask\n   before helping others, we will prioritize\n   agents that help us accelerate our own progress. This will not only produce useful examples, but increase overall\n   project velocity.\n\nDevelopers must carefully read all code they commit and improve generated code if possible.\n\n> Coding agents are a special case. While the `embabel-agent-code` submodule offers support for project modification\n> that is useful for project bootstrapping, coding agents are the most mature of commercial agents, and their vendors\n> are\n> heavily subsidising their users, making it economically irrational to insist on our own platform.\n\n## Getting Started\n\n- Get the bits\n- Set up your environment\n- Run the application\n\n### Getting the bits\n\nChoose one of the following:\n\n- Clone the repository via `git clone https://github.com/embabel/embabel-agent`\n- Create a new Spring Boot project and add the necessary dependencies (see \"Using Embabel Agent Framework in Your\n  Project\" below)\n\n### Environment variables\n\n> Environment variables are consistent with common usage, rather than Spring AI.\n> For example, we prefer `OPENAI_API_KEY` to `SPRING_AI_OPENAI_API_KEY`.\n\nRequired:\n\n- `OPENAI_API_KEY`: For the OpenAI API\n\nOptional:\n\n- `ANTHROPIC_API_KEY`: For the Anthropic API. Necessary for the coding agent.\n- `MINIMAX_API_KEY`: For the [MiniMax](https://www.minimax.io) API. Supports MiniMax-M2.7 and MiniMax-M2.7-highspeed models.\n- OCI Generative AI uses OCI SDK authentication providers. Add `embabel-agent-starter-oci-genai` and set\n  `embabel.agent.platform.models.ocigenai.compartment-id`; OCI config file, instance principal, resource principal,\n  workload identity, session token and simple key authentication are supported.\n\n> We strongly recommend providing both an OpenAI and Anthropic key, as some examples require both. And it's important to\n> try to find the best LLM for a given task, rather than automatically choose a familiar provider.\n\n### Services\n\nYou will need a Docker Desktop version [`>4.43.2`](https://docs.docker.com/desktop/release-notes/).\nBe sure to activate the following MCP tools from the catalog:\n\n- Brave Search\n- Fetch\n- Puppeteer\n- Wikipedia\n\n> You can also set up your own MCP tools using Spring AI conventions. See the `application-docker-desktop.yml` file for\n> an example.\n\nIf you're running Ollama locally, include the `embabel ollama starter` and Embabel will automatically connect to your\nOllama\nendpoint and make all models available.\n\n```xml\n\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter-ollama</artifactId>\n</dependency>\n```\n\n### Running\n\nCreate your own agent project with\n\n```\nuvx --from git+https://github.com/embabel/project-creator.git project-creator\n```\n\n### Example Agents\n\n> **📚 For examples and tutorials**, see\n> the [Embabel Agent Examples Repository](https://github.com/embabel/embabel-agent-examples)\n\n```bash\n# Clone and run examples\ngit clone https://github.com/embabel/embabel-agent-examples\ncd embabel-agent-examples/scripts/kotlin\n./shell.sh\n```\n\n#### Shell Commands\n\nSpring Shell is an easy way to interact with the Embabel agent framework, especially during development.\n\nType `help` to see available commands. Use `execute` or `x` to run an agent:\n\n```\nexecute \"Lynda is a Scorpio, find news for her\" -p -r\n```\n\nThis will look for an agent, choose the star finder agent and\nrun the flow. `-p` will log prompts `-r` will log LLM responses.\nOmit these for less verbose logging.\n\nOptions:\n\n- `-p` logs prompts\n- `-r` logs LLM responses\n\nUse the `chat` command to enter an interactive chat with the agent.\nIt will attempt to run the most appropriate\nagent for each command.\n\n> Spring Shell supports history. Type `!!` to repeat the last command.\n> This will survive restarts, so is handy when iterating on an agent.\n\n#### Further examples\n\nExample commands within the shell:\n\n```\n# Perplexity style deep research\n# Requires both OpenAI and Anthropic keys and Docker Desktop with the MCP extension (or your own web tools)\nexecute \"research the recent australian federal election. what is the position of the greens party?\"\n\n# x is a shortcut for execute\nx \"fact check the following: holden cars are still made in australia; the koel is a bird native only to australia; fidel castro is justin trudeau's father\"\n\n```\n\n### Bringing in additional LLMs\n\n#### Local models with well-known providers\n\nThe Embabel Agent Framework supports local models from:\n\n- Ollama: Simply add `embabel-agent-starter-ollama` starter to your pom.xml and your local Ollama endpoint will be\n  queries. All local models will be\n  available.\n- Docker: Add the `embabel-agent-starter-dockermodels` starter to your pom.xml and your local Docker endpoint will be\n  queried. All local models will be available.\n- LMStudio: This uses the openAI compatible client. Just include LMStudio as a dependency and make sure your LMStudio\n  server is running.\n\n#### OCI Generative AI\n\nAdd `embabel-agent-starter-oci-genai` to use OCI Generative AI chat and embedding models.\n\n```xml\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter-oci-genai</artifactId>\n</dependency>\n```\n\nConfigure `embabel.agent.platform.models.ocigenai.compartment-id` and, if needed, set\n`embabel.agent.platform.models.ocigenai.authentication-type` to `FILE`, `INSTANCE_PRINCIPAL`, `RESOURCE_PRINCIPAL`,\n`WORKLOAD_IDENTITY`, `SESSION_TOKEN` or `SIMPLE`. When the standard OpenAI provider is not on the classpath, the OCI\nstarter supplies OCI defaults for Embabel's default LLM and embedding model:\n\n```properties\nembabel.models.default-llm=cohere.command-a-03-2025\nembabel.models.default-embedding-model=cohere.embed-v4.0\n```\n\nOverride those values in application configuration if you want another OCI model. Use OCI model ids such as\n`cohere.command-a-03-2025` or `meta.llama-3.3-70b-instruct` for Embabel model selection.\nThe Spring bean names registered by the starter are Java-friendly aliases such as `cohere_command_a` and\n`llama_33_70b`.\nIf your application exposes Spring Boot Actuator `env` or `configprops` values, keep those endpoints secured and ensure\nOCI credential fields such as `pass-phrase`, `session-token` and `private-key` are sanitized.\n\n#### Custom LLMs\n\nYou can define an LLM for any provider for which a Spring AI `ChatModel` is available.\n\nSimply define Spring beans of type `Llm`.\nSee the `OpenAiConfiguration` class as an example.\n\nRemember:\n\n- Provide the knowledge cutoff date if you know it\n- Make the configuration class conditional on any required API key.\n\n## Roadmap\n\nThis project is in its early stages, but we have big plans.\nThe milestones and issues in this repository are a good reference.\nOur key goals:\n\n- **Become the natural way to Gen AI-enable Java applications**, and especially those built on Spring.\n- **Prove the power of the approach**. Demonstrate that this approach is the best way to build safe, dependable, Gen AI\n  applications.\n  In particular:\n    - Demonstrate the power of extensibility without modification, by adding goals and actions\n    - Demonstrate the potential to become the PaaS for natural language\n    - Demonstrate the potential of agent federation within the GOAP model\n    - Demonstrate budget-aware agents, such as \"Research the following topic, spending up to 20c if you are still\n      learning\"\n    - Integrate with data stores and demonstrate the power of surfacing existing functionality inside an organization\n- **Take the model to other platforms**: The conceptual framework is not JVM specific. Once established, we intend to\n  create TypeScript\n  and Python projects.\n\nThere is a lot to do, and you are awesome. We look forward to your contribution!\n\n## Application Design\n\n### Domain objects\n\nApplications center around domain objects. These can be instantiated by LLMs or user\ncode, and manipulated by user code.\n\nUse Jackson annotations to help LLMs with descriptions as well as mark fields to ignore.\nFor example:\n\n```kotlin\n@JsonClassDescription(\"Person with astrology details\")\ndata class StarPerson(\n    override val name: String,\n    @get:JsonPropertyDescription(\"Star sign\")\n    val sign: String,\n) : Person\n```\n\nSee [Java Json Schema Generation - Module Jackson](https://github.com/victools/jsonschema-generator/tree/main/jsonschema-module-jackson)\nfor documentation of the library used.\n\nDomain objects can have behaviors that are automatically exposed to LLMs when they are in scope. Simply annotate methods\nwith the Spring AI `@Tool` annotation.\n\n> When exposing `@Tool` methods on domain objects, be sure that the tool is safe to invoke. Even the best LLMs can get\n> trigger-happy. For example, be careful about methods that can mutate or delete data. This is likely better modeled via\n> an explicit call to a non-tool method on the same domain class, in a code action.\n\n## Using Embabel as an MCP server\n\nYou can use the Embabel agent platform as an MCP server from a\nUI like Claude Desktop. The Embabel MCP server is available over SSE.\n\nConfigure Claude Desktop as follows in your `claude_desktop_config.yml`:\n\n```json\n{\n  \"mcpServers\": {\n    \"embabel\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"-y\",\n        \"mcp-remote\",\n        \"http://localhost:8080/sse\"\n      ]\n    }\n  }\n}\n\n```\n\nSee [MCP Quickstart for Claude Desktop Users](https://modelcontextprotocol.io/quickstart/user) for how to configure\nClaude Desktop.\n\nThe [MCP Inspector](https://github.com/modelcontextprotocol/inspector) is a helpful tool for interacting with your\nEmbabel\nSSE server, manually invoking tools and checking the exposed prompts and resources.\n\nStart the MCP Inspector with:\n\n```bash\nnpx @modelcontextprotocol/inspector\n```\n\n## Consuming MCP Servers\n\nThe Embabel Agent Framework provides built-in support for consuming Model Context Protocol (MCP) servers, allowing you\nto extend your applications with powerful AI capabilities through standardized interfaces.\n\n### What is MCP?\n\nModel Context Protocol (MCP) is an open protocol that standardizes how applications provide context and extra\nfunctionality to large language models. Introduced by Anthropic, MCP has emerged as the de facto standard for connecting\nAI agents to tools, functioning as a client-server protocol where:\n\n- **Clients** (like Embabel Agent) send requests to servers\n- **Servers** process those requests to deliver necessary context to the AI model\n\nMCP simplifies integration between AI applications and external tools, transforming an \"M×N problem\" into an \"M+N\nproblem\" through standardization - similar to what USB did for hardware peripherals.\n\n### Configuring MCP in Embabel Agent\n\nTo configure MCP servers in your Embabel Agent application, add the following to your `application.yml`:\n\n```yaml\nspring:\n  ai:\n    mcp:\n      client:\n        enabled: true\n        name: embabel\n        version: 1.0.0\n        request-timeout: 30s\n        type: SYNC\n        stdio:\n          connections:\n            docker-mcp:\n              command: docker\n              args:\n                - run\n                - -i\n                - --rm\n                - alpine/socat\n                - STDIO\n                - TCP:host.docker.internal:8811\n```\n\nThis configuration sets up an MCP client that connects to a Docker-based MCP server. The connection uses STDIO transport\nthrough Docker's socat utility to connect to a TCP endpoint.\n\n### Docker Desktop MCP Integration\n\nDocker has embraced MCP with their Docker MCP Catalog and Toolkit, which provides:\n\n1. **Centralized Discovery** - A trusted hub for discovering MCP tools integrated into Docker Hub\n2. **Containerized Deployment** - Run MCP servers as containers without complex setup\n3. **Secure Credential Management** - Centralized, encrypted credential handling\n4. **Built-in Security** - Sandbox isolation and permissions management\n\nThe Docker MCP ecosystem includes over 100 verified tools from partners like Stripe, Elastic, Neo4j, and more, all\naccessible through Docker's infrastructure.\n\n### Learn More\n\n- [Docker MCP Documentation](https://docs.docker.com/desktop/features/gordon/mcp/)\n- [Docker MCP Servers Repository](https://github.com/docker/mcp-servers)\n- [Introducing Docker MCP Catalog and Toolkit](https://www.docker.com/blog/introducing-docker-mcp-catalog-and-toolkit/)\n- [MCP Introduction and Overview](https://www.philschmid.de/mcp-introduction)\n\n## A2A\n\nEmbabel integrates with the [A2A](https://github.com/google-a2a/A2A) protocol, allowing you to connect to other\nA2A-enabled agents and\nservices.\n\nEnable the `a2a` Spring profile to start the A2A server.\n\nYou'll need the following environment variable:\n\n- `GOOGLE_STUDIO_API_KEY`: Your Google Studio API key, which is used for Gemini.\n\nStart the Google A2A web interface using the `a2a` Docker profile:\n\n```bash\ndocker compose --profile a2a up\n```\n\nGo to the web interface running within the container at `http://localhost:12000/`.\n\nConnect to your agent at `host.docker.internal:8080/a2a`. Note that `localhost:8080/a2a` won't work as the server\ncannot access it when running in a Docker container.\n\n## Running Tests\n\n### Unit tests\n\nRun the unit tests via Maven. This will not require an internet connection or any external services.\n\n```bash\nmvn test\n```\n\n### Integration tests\n\nIntegration tests (`*IT`) hit real provider APIs and are excluded from the default `mvn test` run.\nTo run them, ensure the following environment variables are set:\n\n- `OPENAI_API_KEY`\n- `ANTHROPIC_API_KEY`\n- `DEEPSEEK_API_KEY`\n- `MISTRAL_API_KEY`\n\nThen run:\n\n```bash\nmvn -Dtest='*IT,!LLMOllama*IT' -Dsurefire.failIfNoSpecifiedTests=false test\n```\n\nThis runs all integration tests except Ollama (which requires a local Ollama server).\nTo run a specific module's integration tests, add `-pl`:\n\n```bash\nmvn -Dtest='*IT,!LLMOllama*IT' -Dsurefire.failIfNoSpecifiedTests=false test -pl embabel-agent-openai\n```\n\n## Spring profiles\n\nSpring profiles are used to configure the application for different environments and behaviors.\n\nModel profiles:\n\n- `docker-desktop`: Talking to Docker Desktop with the MCP extension. **This is recommended for the best experience,\n  with Docker-provided web tools.**\n\nLogging profiles:\n\n- `severance`: [Severance](https://www.youtube.com/watch?v=xEQP4VVuyrY&ab_channel=AppleTV) specific logging. Praise\n  Kier!\n- `starwars`: Star Wars specific logging. Feel the force\n- `colossus`: Colossus specific logging. The Forbin Project.\n\n## Testing\n\nA key goal of this framework is ease of testing.\nJust as Spring eased testing of early enterprise Java applications,\nthis framework facilitates testing of AI applications.\n\nTypes of testing:\n\n- Unit tests: All agents are unit testable, like any Spring-managed beans. Construct them with mock objects; call\n  individual action methods. The testing library facilitates testing prompts.\n- Integration tests: tbd\n\n## Logging\n\nAll logging in this project is either debug logging in the relevant\nclass itself, or results from the stream of events of type `AgentEvent`.\n\nEdit `application.yml` if you want to see debug logging from the relevant classes and packages.\n\nAvailable logging experiences:\n\n- `severance`: Severance logging. Praise Kier\n- `starwars`: Star Wars logging. Feel the force. The default as it's understood throughout the galaxy.\n- `colossus`: Colossus logging. The Forbin Project.\n- `montypython`: Monty Python logging. No one expects it.\n- `hh`: Hitchhiker's Guide to the Galaxy logging. The answer is 42.\n\nIf none of these profiles is chosen, Embabel will use vanilla logging.\nThis makes me sad.\n\n## Adding Embabel Agent Framework to Your Project\n\n### Maven Central Availability\n\n**Since version 0.2.0**, Embabel Agent Framework is available directly on Maven Central, simplifying dependency\nmanagement. You no longer need to configure custom repositories for stable releases.\n\n---\n\n### Maven\n\n#### For version 0.2.0 and above (Recommended)\n\nSimply add the Embabel Spring Boot starter dependency to your `pom.xml`:\n\n```xml\n\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter</artifactId>\n    <version>${embabel-agent.version}</version>\n</dependency>\n```\n\nNo additional repository configuration is needed! Maven Central is configured by default.\n\n#### For versions prior to 0.2.0 or for SNAPSHOT versions\n\nYou need to add the Embabel repositories to your `pom.xml`:\n\n```xml\n\n<repositories>\n    <repository>\n        <id>embabel-releases</id>\n        <url>https://repo.embabel.com/artifactory/libs-release</url>\n        <releases>\n            <enabled>true</enabled>\n        </releases>\n        <snapshots>\n            <enabled>false</enabled>\n        </snapshots>\n    </repository>\n    <repository>\n        <id>embabel-snapshots</id>\n        <url>https://repo.embabel.com/artifactory/libs-snapshot</url>\n        <releases>\n            <enabled>false</enabled>\n        </releases>\n        <snapshots>\n            <enabled>true</enabled>\n        </snapshots>\n    </repository>\n</repositories>\n```\n\nThen add the dependency:\n\n```xml\n\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter</artifactId>\n    <version>${embabel-agent.version}</version>\n</dependency>\n```\n\n---\n\n### Gradle (Kotlin DSL)\n\n#### For version 0.2.0 and above (Recommended)\n\nAdd the required repositories to your `build.gradle.kts`:\n\n```kotlin\nrepositories {\n    mavenCentral()\n    maven {\n        name = \"Spring Milestones\"\n        url = uri(\"https://repo.spring.io/milestone\")\n    }\n}\n```\n\nAdd the Embabel Agent starter:\n\n```kotlin\ndependencies {\n    implementation(\"com.embabel.agent:embabel-agent-starter:${embabelAgentVersion}\")\n}\n```\n\n#### For versions prior to 0.2.0 or for SNAPSHOT versions\n\nAdd all required repositories to your `build.gradle.kts`:\n\n```kotlin\nrepositories {\n    mavenCentral()\n    maven {\n        name = \"embabel-releases\"\n        url = uri(\"https://repo.embabel.com/artifactory/libs-release\")\n        mavenContent {\n            releasesOnly()\n        }\n    }\n    maven {\n        name = \"embabel-snapshots\"\n        url = uri(\"https://repo.embabel.com/artifactory/libs-snapshot\")\n        mavenContent {\n            snapshotsOnly()\n        }\n    }\n    maven {\n        name = \"Spring Milestones\"\n        url = uri(\"https://repo.spring.io/milestone\")\n    }\n}\n```\n\nAdd the Embabel Agent starter:\n\n```kotlin\ndependencies {\n    implementation(\"com.embabel.agent:embabel-agent-starter:${embabelAgentVersion}\")\n}\n```\n\n---\n\n### Gradle (Groovy DSL)\n\n#### For version 0.2.0 and above (Recommended)\n\nAdd the required repositories to your `build.gradle`:\n\n```groovy\nrepositories {\n    mavenCentral()\n    maven {\n        name = 'Spring Milestones'\n        url = 'https://repo.spring.io/milestone'\n    }\n}\n```\n\nAdd the Embabel Agent starter:\n\n```groovy\ndependencies {\n    implementation \"com.embabel.agent:embabel-agent-starter:${embabelAgentVersion}\"\n}\n```\n\n#### For versions prior to 0.2.0 or for SNAPSHOT versions\n\nAdd all required repositories to your `build.gradle`:\n\n```groovy\nrepositories {\n    mavenCentral()\n    maven {\n        name = 'embabel-releases'\n        url = 'https://repo.embabel.com/artifactory/libs-release'\n        mavenContent {\n            releasesOnly()\n        }\n    }\n    maven {\n        name = 'embabel-snapshots'\n        url = 'https://repo.embabel.com/artifactory/libs-snapshot'\n        mavenContent {\n            snapshotsOnly()\n        }\n    }\n    maven {\n        name = 'Spring Milestones'\n        url = 'https://repo.spring.io/milestone'\n    }\n}\n```\n\nAdd the Embabel Agent starter:\n\n```groovy\ndependencies {\n    implementation 'com.embabel.agent:embabel-agent-starter:${embabelAgentVersion}'\n}\n```\n\n---\n\n### Important Notes\n\n#### Spring Milestones Repository\n\nThe Spring Milestones repository is required because the Embabel BOM (`embabel-agent-dependencies`) has transitive\ndependencies on experimental Spring components, specifically the `mcp-bom`. This BOM is not available on Maven Central\nand is only published to the Spring milestone repository.\n\n**Note for Gradle users:** Unlike Maven, Gradle does not inherit repository configurations declared in parent POMs or\nBOMs. Therefore, it is necessary to explicitly declare the Spring milestone repository in your repositories block to\nensure proper resolution of all transitive dependencies.\n\n#### Repository Types\n\n- **Maven Central** (since v0.2.0): For stable releases 0.2.0 and above\n- **Embabel Releases Repository**: For stable releases prior to 0.2.0\n- **Embabel Snapshots Repository**: For development/snapshot versions (e.g., `0.3.0-SNAPSHOT`)\n\n---\n\n### Quick Start Examples\n\n#### Maven with latest stable version\n\n```xml\n\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter</artifactId>\n    <version>0.3.0</version>\n</dependency>\n```\n\n#### Gradle Kotlin DSL with latest stable version\n\n```kotlin\nimplementation(\"com.embabel.agent:embabel-agent-starter:0.3.0\")\n```\n\n#### Gradle Groovy DSL with latest stable version\n\n```groovy\nimplementation 'com.embabel.agent:embabel-agent-starter:0.3.0'\n```\n\n## Getting Started with Observability\n\nAdd full tracing and metrics to your Embabel agents with zero code changes.\n\n### 1. Add the dependency\n\n```xml\n<dependency>\n    <groupId>com.embabel.agent</groupId>\n    <artifactId>embabel-agent-starter-observability</artifactId>\n    <version>${embabel-agent.version}</version>\n</dependency>\n```\n\n### 2. Add an exporter\n\nPick **one** (or combine multiple):\n\n**Zipkin** (simplest — no account needed):\n```xml\n<dependency>\n    <groupId>io.opentelemetry</groupId>\n    <artifactId>opentelemetry-exporter-zipkin</artifactId>\n</dependency>\n```\n\n**Langfuse** (LLM-focused observability):\n```xml\n<dependency>\n    <groupId>com.quantpulsar</groupId>\n    <artifactId>opentelemetry-exporter-langfuse</artifactId>\n    <version>0.4.0</version>\n</dependency>\n```\n\n### 3. Configure\n\n```yaml\n# Enable observability\nembabel:\n  observability:\n    enabled: true\n    service-name: my-agent-app\n\n# Enable Spring Boot tracing\nmanagement:\n  tracing:\n    enabled: true\n    sampling:\n      probability: 1.0\n\n  # Zipkin exporter\n  zipkin:\n    tracing:\n      endpoint: http://localhost:9411/api/v2/spans\n```\n\nTo use Langfuse instead of (or alongside) Zipkin:\n```yaml\nmanagement:\n  langfuse:\n    enabled: true\n    endpoint: https://cloud.langfuse.com/api/public/otel  # or your self-hosted URL\n    public-key: pk-lf-...\n    secret-key: sk-lf-...\n```\n\n### 4. Start Zipkin and run\n\n```bash\ndocker run -d -p 9411:9411 openzipkin/zipkin\n./mvnw spring-boot:run\n```\n\nOpen [http://localhost:9411](http://localhost:9411) — run an agent and you will see traces like:\n\n```\nAgent: CustomerServiceAgent\n├── Action: AnalyzeRequest\n│   └── ChatModel: gpt-4 (Spring AI)\n│       └── tool:searchKnowledgeBase\n├── Action: GenerateResponse\n│   └── ChatModel: gpt-4 (Spring AI)\n└── status: completed [duration=2340ms]\n```\n\nWith Langfuse, you get a rich LLM-focused view of your agent traces:\n\n<img src=\"embabel-agent-observability/docs/langfuse.png\" alt=\"Langfuse Tracing\" width=\"800\"/>\n\n### What gets traced automatically\n\n- Agent lifecycle (creation, execution, completion, failures)\n- Every action as a child span\n- LLM calls with token usage (via Spring AI)\n- Tool invocations with input/output\n- Planning and replanning iterations\n- State transitions and lifecycle states\n\n### Track custom operations with `@Tracked`\n\nUse the `@Tracked` annotation to add observability spans to your own methods — inputs, outputs, duration, and errors are captured automatically:\n\n```java\n@Tracked(\"enrichCustomer\")\npublic Customer enrich(Customer input) {\n    // Your logic here\n}\n```\n\nYou can specify a type and description for richer traces:\n\n```java\n@Tracked(value = \"callPaymentApi\", type = TrackType.EXTERNAL_CALL, description = \"Payment gateway call\")\npublic PaymentResult processPayment(Order order) {\n    // ...\n}\n```\n\nWhen called within an agent execution, `@Tracked` spans are automatically nested under the current action:\n\n```\nAgent: CustomerServiceAgent\n├── Action: ProcessOrder\n│   ├── @Tracked: enrichCustomer (PROCESSING)\n│   ├── ChatModel: gpt-4\n│   └── @Tracked: callPaymentApi (EXTERNAL_CALL)\n└── status: completed\n```\n\nFor the full configuration reference, MDC log correlation, and advanced options, see the [Observability Module Documentation](embabel-agent-observability/README.md).\n\n---\n\n## Contributing\n\nWe welcome contributions to the Embabel Agent Framework.\n\nLook at the [coding style guide](embabel-agent-api/.embabel/coding-style.md) for style guidelines.\nThis file also informs coding agent behavior.\n\n## Miscellaneous\n\n- _Why the name Embabel?_\n  The \"babel\" part is ultimately inspired by the story of the Tower of Babel, perhaps via Douglas\n  Adams' [babelfish](https://www.youtube.com/watch?v=iuumnjJWFO4&ab_channel=BBCStudios).\n  Per @lasuac:\n  _While Adams' fish in the ear enabled universal translation between species, Embabel aims at translating human intent\n  to JVM code, AI models, and enterprise systems._\n  \"embabel\" also sounds like \"enable.\"\n- Milestone names are Australian animals. Mythical animals such as \"bunyip\" and \"yowie\" are used for futures that may or\n  not be implemented.\n- README badges come from [here](https://github.com/Ileriayo/markdown-badges)\n  and [here](https://home.aveek.io/GitHub-Profile-Badges/).\n- Don't forget to join [Discord](https://discord.gg/t6bjkyj93q) to collaborate with the Embabel community. It is a good\n  place to receive support, showcase your work, discuss ideas and connect with like-minded people.\n\n## Star history\n\n[![Star History Chart](https://api.star-history.com/svg?repos=embabel/embabel-agent&type=Date)](https://star-history.com/#embabel/embabel-agent&Date)\n\n## Contributors\n\n[![Embabel contributors](https://contrib.rocks/image?repo=embabel/embabel-agent)](https://github.com/embabel/embabel-agent/graphs/contributors)\n\n\n\n--------------------\n(c) Embabel Software Inc 2024-2025.\n","summary":"Embabel Agent is a framework designed for building agentic workflows on the JVM, allowing developers to seamlessly integrate LLM-prompted interactions with existing code and domain models. The project utilizes a goal-oriented architecture based on actions, conditions, and structured path-finding to manage complex autonomous behaviors. Built with Kotlin but optimized for a natural developer experience in Java, this framework is ideal for Spring-based developers looking to incorporate intelligent, AI-driven logic into their enterprise applications.","description":"Agent framework for the JVM. Pronounced Em-BAY-bel /ɛmˈbeɪbəl/","stars":3541,"language":"Kotlin"},{"owner":"langchain-ai","repo":"agents-from-scratch","url":"https://github.com/langchain-ai/agents-from-scratch","readme":"# Agents From Scratch \n\nThe repo is a guide to building agents from scratch. It builds up to an [\"ambient\"](https://blog.langchain.dev/introducing-ambient-agents/) agent that can manage your email with connection to the Gmail API. It's grouped into 4 sections, each with a notebook and accompanying code in the `src/email_assistant` directory. These section build from the basics of agents, to agent evaluation, to human-in-the-loop, and finally to memory. These all come together in an agent that you can deploy, and the principles can be applied to other agents across a wide range of tasks. \n\n![overview](notebooks/img/overview.png)\n\n## Environment Setup \n\n### Python Version\n\n* Ensure you're using Python 3.11 or later. \n* This version is required for optimal compatibility with LangGraph. \n\n```shell\npython3 --version\n```\n\n### API Keys\n\n* If you don't have an OpenAI API key, you can sign up [here](https://openai.com/index/openai-api/).\n* Sign up for LangSmith [here](https://smith.langchain.com/).\n* Generate a LangSmith API key.\n\n### Set Environment Variables\n\n* Create a `.env` file in the root directory:\n```shell\n# Copy the .env.example file to .env\ncp .env.example .env\n```\n\n* Edit the `.env` file with the following:\n```shell\nLANGSMITH_API_KEY=your_langsmith_api_key\nLANGSMITH_TRACING=true\nLANGSMITH_PROJECT=\"interrupt-workshop\"\nOPENAI_API_KEY=your_openai_api_key\n```\n\n* You can also set the environment variables in your terminal:\n```shell\nexport LANGSMITH_API_KEY=your_langsmith_api_key\nexport LANGSMITH_TRACING=true\nexport OPENAI_API_KEY=your_openai_api_key\n```\n\n### Package Installation\n\n**Recommended: Using uv (faster and more reliable)**\n\n```shell\n# Install uv if you haven't already\npip install uv\n\n# Install the package with development dependencies\nuv sync --extra dev\n\n# Activate the virtual environment\nsource .venv/bin/activate\n```\n\n**Alternative: Using pip**\n\n```shell\n$ python3 -m venv .venv\n$ source .venv/bin/activate\n# Ensure you have a recent version of pip (required for editable installs with pyproject.toml)\n$ python3 -m pip install --upgrade pip\n# Install the package in editable mode\n$ pip install -e .\n```\n\n> **⚠️ IMPORTANT**: Do not skip the package installation step! This editable install is **required** for the notebooks to work correctly. The package is installed as `interrupt_workshop` with import name `email_assistant`, allowing you to import from anywhere with `from email_assistant import ...`\n\n## Structure \n\nThe repo is organized into the 4 sections, with a notebook for each and accompanying code in the `src/email_assistant` directory.\n\n### Preface: LangGraph 101\nFor a brief introduction to LangGraph and some of the concepts used in this repo, see the [LangGraph 101 notebook](notebooks/langgraph_101.ipynb). This notebook explains the basics of chat models, tool calling, agents vs workflows, LangGraph nodes / edges / memory, and LangGraph Studio.\n\n### Building an agent \n* Notebook: [notebooks/agent.ipynb](/notebooks/agent.ipynb)\n* Code: [src/email_assistant/email_assistant.py](/src/email_assistant/email_assistant.py)\n\n![overview-agent](notebooks/img/overview_agent.png)\n\nThis notebook shows how to build the email assistant, combining an [email triage step](https://langchain-ai.github.io/langgraph/tutorials/workflows/) with an agent that handles the email response. You can see the linked code for the full implementation in `src/email_assistant/email_assistant.py`.\n\n![Screenshot 2025-04-04 at 4 06 18 PM](notebooks/img/studio.png)\n\n### Evaluation \n* Notebook: [notebooks/evaluation.ipynb](/notebooks/evaluation.ipynb)\n\n![overview-eval](notebooks/img/overview_eval.png)\n\nThis notebook introduces evaluation with an email dataset in [eval/email_dataset.py](/eval/email_dataset.py). It shows how to run evaluations using Pytest and the LangSmith `evaluate` API. It runs evaluation for emails responses using LLM-as-a-judge as well as evaluations for tools calls and triage decisions.\n\n![Screenshot 2025-04-08 at 8 07 48 PM](notebooks/img/eval.png)\n\n### Human-in-the-loop \n* Notebook: [notebooks/hitl.ipynb](/notebooks/hitl.ipynb)\n* Code: [src/email_assistant/email_assistant_hitl.py](/src/email_assistant/email_assistant_hitl.py)\n\n![overview-hitl](notebooks/img/overview_hitl.png)\n\nThis notebooks shows how to add human-in-the-loop (HITL), allowing the user to review specific tool calls (e.g., send email, schedule meeting). For this, we use [Agent Inbox](https://github.com/langchain-ai/agent-inbox) as an interface for human in the loop. You can see the linked code for the full implementation in [src/email_assistant/email_assistant_hitl.py](/src/email_assistant/email_assistant_hitl.py).\n\n![Agent Inbox showing email threads](notebooks/img/agent-inbox.png)\n\n### Memory  \n* Notebook: [notebooks/memory.ipynb](/notebooks/memory.ipynb)\n* Code: [src/email_assistant/email_assistant_hitl_memory.py](/src/email_assistant/email_assistant_hitl_memory.py)\n\n![overview-memory](notebooks/img/overview_memory.png)  \n\nThis notebook shows how to add memory to the email assistant, allowing it to learn from user feedback and adapt to preferences over time. The memory-enabled assistant ([email_assistant_hitl_memory.py](/src/email_assistant/email_assistant_hitl_memory.py)) uses the [LangGraph Store](https://langchain-ai.github.io/langgraph/concepts/memory/#long-term-memory) to persist memories. You can see the linked code for the full implementation in [src/email_assistant/email_assistant_hitl_memory.py](/src/email_assistant/email_assistant_hitl_memory.py).\n\n## Connecting to APIs  \n\nThe above notebooks using mock email and calendar tools. \n\n### Gmail Integration and Deployment\n\nSet up Google API credentials following the instructions in [Gmail Tools README](src/email_assistant/tools/gmail/README.md).\n\nThe README also explains how to deploy the graph to LangGraph Platform.\n\nThe full implementation of the Gmail integration is in [src/email_assistant/email_assistant_hitl_memory_gmail.py](/src/email_assistant/email_assistant_hitl_memory_gmail.py).\n\n## Running Tests\n\nThe repository includes an automated test suite to evaluate the email assistant. \n\nTests verify correct tool usage and response quality using LangSmith for tracking.\n\n### Running Tests with [run_all_tests.py](/tests/run_all_tests.py)\n\n```shell\npython tests/run_all_tests.py\n```\n\n### Test Results\n\nTest results are logged to LangSmith under the project name specified in your `.env` file (`LANGSMITH_PROJECT`). This provides:\n- Visual inspection of agent traces\n- Detailed evaluation metrics\n- Comparison of different agent implementations\n\n### Available Test Implementations\n\nThe available implementations for testing are:\n- `email_assistant` - Basic email assistant\n\n### Testing Notebooks\n\nYou can also run tests to verify all notebooks execute without errors:\n\n```shell\n# Run all notebook tests\npython tests/test_notebooks.py\n\n# Or run via pytest\npytest tests/test_notebooks.py -v\n```\n\n## Future Extensions\n\nAdd [LangMem](https://langchain-ai.github.io/langmem/) to manage memories:\n* Manage a collection of background memories. \n* Add memory tools that can look up facts in the background memories. \n\n\n\n","summary":"Agents From Scratch provides a comprehensive, four-part educational guide on building functional AI agents using LangGraph. The project walks users through the lifecycle of agent development, covering core concepts such as tool calling, human-in-the-loop workflows, system memory, and rigorous evaluation using LangSmith. By culminating in a practical Gmail-connected email assistant, this repository serves as a valuable resource for developers looking to move beyond basic LLM prompts and implement robust, production-ready agentic systems.","description":"Build an email assistant with human-in-the-loop and memory","stars":1793,"language":"Jupyter Notebook"},{"owner":"twentyhq","repo":"twenty","url":"https://github.com/twentyhq/twenty","readme":"<p align=\"center\">\n  <a href=\"https://www.twenty.com\">\n    <img src=\"./packages/twenty-website/public/images/core/logo.svg\" width=\"100px\" alt=\"Twenty logo\" />\n  </a>\n</p>\n\n<h2 align=\"center\" >The #1 Open-Source CRM</h2>\n\n<p align=\"center\"><a href=\"https://twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/globe-icon.svg\" width=\"12\" height=\"12\"/> Website</a> · <a href=\"https://docs.twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"12\" height=\"12\"/> Documentation</a> · <a href=\"https://github.com/orgs/twentyhq/projects/1\"><img src=\"./packages/twenty-website/public/images/readme/map-icon.svg\" width=\"12\" height=\"12\"/> Roadmap </a> · <a href=\"https://discord.gg/cx5n4Jzs57\"><img src=\"./packages/twenty-website/public/images/readme/discord-icon.svg\" width=\"12\" height=\"12\"/> Discord</a> · <a href=\"https://www.figma.com/file/xt8O9mFeLl46C5InWwoMrN/Twenty\"><img src=\"./packages/twenty-website/public/images/readme/figma-icon.webp\"  width=\"12\" height=\"12\"/>  Figma</a></p>\n\n<p align=\"center\">\n  <a href=\"https://www.twenty.com\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/github-cover-dark.webp\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/github-cover-light.webp\" />\n      <img src=\"./packages/twenty-website/public/images/readme/github-cover-light.webp\" alt=\"Twenty banner\" />\n    </picture>\n  </a>\n</p>\n\n<br />\n\n# Why Twenty\n\nTwenty gives technical teams the building blocks for a custom CRM that meets complex business needs and quickly adapts as the business evolves. Twenty is the CRM you build, ship, and version like the rest of your stack.\n\n<a href=\"https://twenty.com/resources/why-twenty\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"14\" height=\"14\"/> Learn more about why we built Twenty</a>\n\n<br />\n\n# Installation\n\n### <img src=\"./packages/twenty-website/public/images/readme/globe-icon.svg\" width=\"14\" height=\"14\"/> Cloud\n\nThe fastest way to get started. Sign up at [twenty.com](https://twenty.com) and spin up a workspace in under a minute, with no infrastructure to manage and always up to date.\n\n### <img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"14\" height=\"14\"/> Build an app\n\nScaffold a new app with the Twenty CLI:\n\n```bash\nnpx create-twenty-app my-app\n```\n\nDefine objects, fields, and views as code:\n\n```ts\nimport { defineObject, FieldType } from 'twenty-sdk/define';\n\nexport default defineObject({\n  nameSingular: 'deal',\n  namePlural: 'deals',\n  labelSingular: 'Deal',\n  labelPlural: 'Deals',\n  fields: [\n    { name: 'name', label: 'Name', type: FieldType.TEXT },\n    { name: 'amount', label: 'Amount', type: FieldType.CURRENCY },\n    { name: 'closeDate', label: 'Close Date', type: FieldType.DATE_TIME },\n  ],\n});\n```\n\nThen ship it to your workspace:\n\n```bash\nnpx twenty app:publish --private\n```\n\nSee the [app development guide](https://docs.twenty.com/developers/extend/apps/getting-started) for objects, views, agents, and logic functions.\n\n### <img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"14\" height=\"14\"/> Self-hosting\n\nRun Twenty on your own infrastructure with [Docker Compose](https://docs.twenty.com/developers/self-host/capabilities/docker-compose), or contribute locally via the [local setup guide](https://docs.twenty.com/developers/contribute/capabilities/local-setup).\n\n<br />\n<br />\n\n# Everything you need\n\nTwenty gives you the building blocks of a modern CRM (objects, views, workflows, and agents) and lets you extend them as code. Here's a tour of what's in the box.\n\nWant to go deeper? Read the <a href=\"https://docs.twenty.com/user-guide/introduction\"><img src=\"./packages/twenty-website/public/images/readme/planner-icon.svg\" width=\"14\" height=\"14\"/> User Guide</a> for product walkthroughs, or the <a href=\"https://docs.twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"14\" height=\"14\"/> Documentation</a> for developer reference.\n\n<table align=\"center\">\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-build-apps-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-build-apps-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-build-apps-light.webp\" alt=\"Create your apps\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/getting-started\"><img src=\"./packages/twenty-website/public/images/readme/code-icon.svg\" width=\"16\" height=\"16\"/> Learn more about apps in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-version-control-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-version-control-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-version-control-light.webp\" alt=\"Stay on top with version control\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/publishing\"><img src=\"./packages/twenty-website/public/images/readme/monitor-icon.svg\" width=\"16\" height=\"16\"/> Learn more about version control in doc</a></p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-all-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-all-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-all-tools-light.webp\" alt=\"All the tools you need to build anything\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/building\"><img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"16\" height=\"16\"/> Learn more about primitives in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-tools-light.webp\" alt=\"Customize your layouts\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/layout/overview\"><img src=\"./packages/twenty-website/public/images/readme/planner-icon.svg\" width=\"16\" height=\"16\"/> Learn more about layouts in doc</a></p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-ai-agents-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-ai-agents-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-ai-agents-light.webp\" alt=\"AI agents and chats\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/ai/overview\"><img src=\"./packages/twenty-website/public/images/readme/message-icon.svg\" width=\"16\" height=\"16\"/> Learn more about AI in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-crm-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-crm-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-crm-tools-light.webp\" alt=\"Plus all the tools of a good CRM\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/introduction\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"16\" height=\"16\"/> Learn more about CRM features in doc</a></p>\n    </td>\n  </tr>\n</table>\n\n<br />\n\n# Stack\n\n- <a href=\"https://www.typescriptlang.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-typescript.svg\" width=\"14\" height=\"14\"/> TypeScript</a>\n- <a href=\"https://nx.dev/\"><img src=\"./packages/twenty-website/public/images/readme/stack-nx.svg\" width=\"14\" height=\"14\"/> Nx</a>\n- <a href=\"https://nestjs.com/\"><img src=\"./packages/twenty-website/public/images/readme/stack-nestjs.svg\" width=\"14\" height=\"14\"/> NestJS</a>, with <a href=\"https://bullmq.io/\">BullMQ</a>, <a href=\"https://www.postgresql.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-postgresql.svg\" width=\"14\" height=\"14\"/> PostgreSQL</a>, <a href=\"https://redis.io/\"><img src=\"./packages/twenty-website/public/images/readme/stack-redis.svg\" width=\"14\" height=\"14\"/> Redis</a>\n- <a href=\"https://reactjs.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-react.svg\" width=\"14\" height=\"14\"/> React</a>, with <a href=\"https://jotai.org/\">Jotai</a>, <a href=\"https://linaria.dev/\">Linaria</a> and <a href=\"https://lingui.dev/\">Lingui</a>\n\n\n\n# Thanks\n\n<p align=\"center\">\n  <a href=\"https://www.chromatic.com/\"><img src=\"./packages/twenty-website/public/images/readme/chromatic.webp\" height=\"28\" alt=\"Chromatic\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://greptile.com\"><img src=\"./packages/twenty-website/public/images/readme/greptile.webp\" height=\"28\" alt=\"Greptile\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://sentry.io/\"><img src=\"./packages/twenty-website/public/images/readme/sentry.webp\" height=\"28\" alt=\"Sentry\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://crowdin.com/\"><img src=\"./packages/twenty-website/public/images/readme/crowdin.webp\" height=\"28\" alt=\"Crowdin\" /></a>\n</p>\n\n  Thanks to these amazing services that we use and recommend for UI testing (Chromatic), code review (Greptile), catching bugs (Sentry) and translating (Crowdin).\n\n\n# Join the Community\n\n<p><a href=\"https://github.com/twentyhq/twenty\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"12\" height=\"12\"/> Star the repo</a> · <a href=\"https://discord.gg/cx5n4Jzs57\"><img src=\"./packages/twenty-website/public/images/readme/discord-icon.svg\" width=\"12\" height=\"12\"/> Discord</a> · <a href=\"https://github.com/twentyhq/twenty/discussions\"><img src=\"./packages/twenty-website/public/images/readme/message-icon.svg\" width=\"12\" height=\"12\"/> Feature requests</a> · <a href=\"https://github.com/orgs/twentyhq/projects/1/views/35\"><img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"12\" height=\"12\"/> Releases</a> · <a href=\"https://twitter.com/twentycrm\"><img src=\"./packages/twenty-website/public/images/readme/x-icon.svg\" width=\"12\" height=\"12\"/> X</a> · <a href=\"https://www.linkedin.com/company/twenty/\"><img src=\"./packages/twenty-website/public/images/readme/linkedin-icon.svg\" width=\"12\" height=\"12\"/> LinkedIn</a> · <a href=\"https://twenty.crowdin.com/twenty\"><img src=\"./packages/twenty-website/public/images/readme/language-icon.svg\" width=\"12\" height=\"12\"/> Crowdin</a> · <a href=\"https://github.com/twentyhq/twenty/contribute\"><img src=\"./packages/twenty-website/public/images/readme/code-icon.svg\" width=\"12\" height=\"12\"/> Contribute</a></p>\n","summary":"Twenty is an open-source CRM designed to provide technical teams with the foundational building blocks for a highly customizable customer relationship management system. It allows developers to define objects, views, workflows, and agents as code, enabling the CRM to be versioned, shipped, and extended like any other component of their software stack. This platform is ideal for organizations that need a flexible, self-hostable CRM solution that can adapt to complex and evolving business requirements.","description":"The open alternative to Salesforce, designed for AI.","stars":49007,"language":"TypeScript"},{"owner":"linshenkx","repo":"prompt-optimizer","url":"https://github.com/linshenkx/prompt-optimizer","readme":"# Prompt Optimizer 🚀\n\n<div align=\"center\">\n\n[English](README.md) | [中文](README.zh-CN.md)\n\n[![GitHub stars](https://img.shields.io/github/stars/linshenkx/prompt-optimizer)](https://github.com/linshenkx/prompt-optimizer/stargazers)\n![Chrome Web Store Users](https://img.shields.io/chrome-web-store/users/cakkkhboolfnadechdlgdcnjammejlna?style=flat&label=Chrome%20Users&link=https%3A%2F%2Fchromewebstore.google.com%2Fdetail%2F%25E6%258F%2590%25E7%25A4%25BA%25E8%25AF%258D%25E4%25BC%2598%25E5%258C%2596%25E5%2599%25A8%2Fcakkkhboolfnadechdlgdcnjammejlna)\n\n<a href=\"https://trendshift.io/repositories/13813\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/13813\" alt=\"linshenkx%2Fprompt-optimizer | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n[![License](https://img.shields.io/badge/license-AGPL--3.0-blue.svg)](LICENSE)\n[![Docker Pulls](https://img.shields.io/docker/pulls/linshen/prompt-optimizer)](https://hub.docker.com/r/linshen/prompt-optimizer)\n![GitHub forks](https://img.shields.io/github/forks/linshenkx/prompt-optimizer?style=flat)\n[![Deploy with Vercel](https://img.shields.io/badge/Vercel-indigo?style=flat&logo=vercel)](https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2Flinshenkx%2Fprompt-optimizer)\n\n[Website](https://always200.com) | [Online Optimizer](https://prompt.always200.com) | [Prompt Garden](https://garden.always200.com) | [Docs](https://docs.always200.com) | [Quick Start](#quick-start) | [Chrome Extension](https://chromewebstore.google.com/detail/prompt-optimizer/cakkkhboolfnadechdlgdcnjammejlna) | [💖 Support](https://ko-fi.com/linshenkx)\n\n[Development Docs](docs/developer/development.md) | [Vercel Deployment Guide](docs/user/deployment/vercel_en.md) | [Cloudflare Deployment Guide](docs/user/deployment/cloudflare-pages_en.md) | [MCP Deployment Guide](docs/user/mcp-server_en.md) | [DeepWiki Docs](https://deepwiki.com/linshenkx/prompt-optimizer) | [ZRead Docs](https://zread.ai/linshenkx/prompt-optimizer)\n\n</div>\n\n## 📖 Project Introduction\n\nPrompt Optimizer is a powerful AI prompt optimization tool that helps you write better AI prompts and improve the quality of AI outputs. It supports four usage methods: web application, desktop application, Chrome extension, and Docker deployment.\n\nPrompts can start from manual writing, templates, local imports, or sources such as [Prompt Garden](https://garden.always200.com). Prompt Optimizer is where those prompts are optimized, tested, evaluated, and saved as reusable prompt assets.\n\n### 🎥 Feature Demonstration\n\n<div align=\"center\">\n  <p><b>1. Hard-Nosed Reviewer: Turn Agreement into Useful Critique</b></p>\n  <p>Starting from a minimal English role prompt, optimization pushes a small model away from generic pushback and toward a clearer, more structured review that surfaces weak assumptions, evidence gaps, and concrete revision advice.</p>\n  <img src=\"images/demo/hard-nosed-reviewer-fullpage-en.png\" alt=\"Hard-nosed reviewer full-page demo\" width=\"85%\">\n  <br>\n  <p><b>2. Marketplace Bargaining Reply: Let Variables Change the Strategy</b></p>\n  <p>With a single reusable prompt template, you can swap in item details, price anchors, buyer offers, tone, and negotiation goals for different marketplace conversations. After optimization, the same small model does a better job turning those variables into a clearer, more transaction-ready reply instead of a generic helper-style response.</p>\n  <img src=\"images/demo/pro-variable-bargaining-reply-en.png\" alt=\"Marketplace bargaining reply variable-mode demo\" width=\"85%\">\n  <br>\n  <p><b>3. Text-to-Image: Optimize a One-Line Idea into a More Directable Key Visual Prompt</b></p>\n  <p>This is not just prompt expansion. Starting from a vague one-line idea, Prompt Optimizer adds clearer subject cues, spatial relationships, and mood anchors. The left side is simply “a floating library in the night sky,” while the optimized version gives the model a more directed fantasy composition that feels closer to a reusable key visual than a lucky generic image.</p>\n  <img src=\"images/demo/text2image-floating-library-creative-en.png\" alt=\"Floating library text-to-image demo\" width=\"85%\">\n</div>\n\n## ✨ Core Features\n\n- 🎯 **Intelligent Optimization**: One-click prompt optimization with multi-round iterative improvements to enhance AI response accuracy\n- 📝 **Dual Mode Optimization**: Support for both system prompt optimization and user prompt optimization to meet different usage scenarios\n- 🔄 **Analysis and Compare Evaluation**: Supports analysis, single-result evaluation, and multi-result compare evaluation to help determine whether a prompt has truly improved\n- 🤖 **Multi-model Integration**: Support for mainstream AI models including OpenAI, Gemini, DeepSeek, Grok, Zhipu AI, SiliconFlow, MiniMax, etc.\n- 🖼️ **Image Generation**: Support for Text-to-Image (T2I), Image-to-Image (I2I), and Multi-Image generation with models like Gemini, Seedream, Grok\n- 🌱 **Prompt Sources**: Start from manual writing, templates, local imports, or Prompt Garden import codes\n- ⭐ **Smart Favorites**: Resource-aware prompt assets with version history, reproducible examples, media support, source binding, and workspace application\n- 📊 **Advanced Testing Mode**: Context variable management, multi-turn conversation testing, Function Calling support\n- 🔒 **Secure Architecture**: Pure client-side processing with direct data interaction with AI service providers, bypassing intermediate servers\n- 📱 **Multi-platform Support**: Available as web application, desktop application, Chrome extension, and Docker deployment\n- 🔐 **Access Control**: Password protection feature for secure deployment\n- 🧩 **MCP Protocol Support**: Supports Model Context Protocol (MCP), enabling integration with MCP-compatible AI applications like Claude Desktop\n\n## 🚀 Advanced Features\n\n### Image Generation Mode\n- 🖼️ **Text-to-Image (T2I)**: Generate images from text prompts\n- 🎨 **Image-to-Image (I2I)**: Transform and optimize images based on local files\n- 🖼️ **Multi-Image Generation**: Use multiple input images to constrain subject relationships, sequential semantics, and final generation goals\n- 🔌 **Multi-model Support**: Integrated with mainstream image generation models like Gemini, Seedream, Grok\n- ⚙️ **Model Parameters**: Support model-specific parameter configuration (size, style, etc.)\n- 📥 **Preview & Download**: Real-time preview of generated results with download support\n- 🔄 **Style Transfer**: Learn style, composition, and color from reference images\n\n### Prompt Sources & Smart Favorites\n- 🌱 **Optional Prompt Sources**: Bring prompts from manual writing, templates, local files, or [Prompt Garden](https://garden.always200.com)\n- 📥 **Import & Collect**: Import prompts with metadata, media, examples, and source binding when available\n- ⭐ **Resource-aware Assets**: Save stable prompts as reusable favorites with version history\n- 🔗 **Source Binding**: Track prompt origins and maintain reproducible examples without requiring a specific source\n- 📦 **Complete Backup**: Export and import favorites with all referenced resources\n\n### Advanced Testing Mode\n- 📊 **Context Variable Management**: Custom variables, batch replacement, variable preview\n- 💬 **Multi-turn Conversation Testing**: Simulate real conversation scenarios to test prompt performance in multi-turn interactions\n- 🛠️ **Function Calling Support**: Function Calling integration with support for OpenAI and Gemini tool calling\n- 🔍 **Analysis and Evaluation Pipeline**: Supports analysis, evaluation, compare evaluation, and evaluation-driven smart rewrite in text modes\n\nFor detailed usage instructions, please refer to the [Image Mode Documentation](docs/image-mode.md)\n\n## Quick Start\n\n### 1. Use Online Version (Recommended)\n\nDirect access: [https://prompt.always200.com](https://prompt.always200.com)\n\nThis is a pure frontend project with all data stored locally in your browser and never uploaded to any server, making the online version both safe and reliable to use.\n\n### 2. Web Deployment\n\n#### Vercel Deployment\nMethod 1: One-click deployment to your own Vercel:\n   [![Deploy with Vercel](https://vercel.com/button)](https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2Flinshenkx%2Fprompt-optimizer)\n\nMethod 2: Fork the project and import to Vercel (Recommended):\n   - First fork the project to your GitHub account\n   - Then import the project to Vercel\n   - This allows tracking of source project updates for easy syncing of new features and fixes\n- Configure environment variables:\n  - `ACCESS_PASSWORD`: Set access password to enable access restriction\n  - `VITE_OPENAI_API_KEY` etc.: Optional private-deployment model settings. Do not preconfigure API keys on public frontend deployments because `VITE_*` values are exposed in browser assets.\n\nFor more detailed deployment steps and important notes, please check:\n- [Vercel Deployment Guide](docs/user/deployment/vercel_en.md)\n- [Cloudflare Deployment Guide](docs/user/deployment/cloudflare-pages_en.md)\n\n#### Cloudflare Deployment\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/linshenkx/prompt-optimizer)\n\nUse the Deploy to Cloudflare button for the quickest public-repository setup. It creates a repository under your GitHub/GitLab account and deploys with Workers Builds. For private repositories or stricter repository-access control, import your own repository manually; keep the default deploy commands and clear the build command if Cloudflare auto-fills `pnpm run build`, because `wrangler.jsonc` builds the Web frontend and publishes `packages/web/dist` as static assets.\n\nFor access control and analytics on Cloudflare, configure Cloudflare Access and Cloudflare Web Analytics in the Cloudflare dashboard. No frontend dependency or application-code change is required.\n\n### 3. Download Desktop Application\nDownload the latest version from [GitHub Releases](https://github.com/linshenkx/prompt-optimizer/releases). We provide both **installer** and **archive** formats for each platform.\n\n- **Installer (Recommended)**: Such as `*.exe`, `*.dmg`, `*.AppImage`, etc. **Strongly recommended as it supports automatic updates**.\n- **Archive**: Such as `*.zip`. Extract and use, but cannot auto-update.\n\n**Core Advantages of Desktop Application**:\n- ✅ **No CORS Limitations**: As a native desktop application, it completely eliminates browser Cross-Origin Resource Sharing (CORS) issues. This means you can directly connect to any AI service provider's API, including locally deployed Ollama or commercial APIs with strict security policies, for the most complete and stable functional experience.\n- ✅ **Automatic Updates**: Versions installed through installers (like `.exe`, `.dmg`) can automatically check and update to the latest version.\n- ✅ **Independent Operation**: No browser dependency, providing faster response and better performance.\n\n### 4. Install Chrome Extension\n1. Install from Chrome Web Store (may not be the latest version due to approval delays): [Chrome Web Store](https://chromewebstore.google.com/detail/prompt-optimizer/cakkkhboolfnadechdlgdcnjammejlna)\n2. Click the icon to open the Prompt Optimizer\n\n### 5. Docker Deployment\n<details>\n<summary>Click to view Docker deployment commands</summary>\n```bash\n# Run container (default configuration)\ndocker run -d -p 8081:80 --restart unless-stopped --name prompt-optimizer linshen/prompt-optimizer\n\n# Run container (with API key configuration and password protection)\ndocker run -d -p 8081:80 \\\n  -e VITE_OPENAI_API_KEY=your_key \\\n  -e ACCESS_USERNAME=your_username \\  # Optional, defaults to \"admin\"\n  -e ACCESS_PASSWORD=your_password \\  # Set access password\n  --restart unless-stopped \\\n  --name prompt-optimizer \\\n  linshen/prompt-optimizer\n```\n</details>\n\n### 6. Docker Compose Deployment\n<details>\n<summary>Click to view Docker Compose deployment steps</summary>\n```bash\n# 1. Clone the repository\ngit clone https://github.com/linshenkx/prompt-optimizer.git\ncd prompt-optimizer\n\n# 2. Create .env file for API keys and authentication\ncat > .env << EOF\n# API Key Configuration\nVITE_OPENAI_API_KEY=your_openai_api_key\nVITE_GEMINI_API_KEY=your_gemini_api_key\nVITE_DEEPSEEK_API_KEY=your_deepseek_api_key\nVITE_GROK_API_KEY=your_xai_api_key\nVITE_ZHIPU_API_KEY=your_zhipu_api_key\nVITE_SILICONFLOW_API_KEY=your_siliconflow_api_key\n\n# Basic Authentication (Password Protection)\nACCESS_USERNAME=your_username  # Optional, defaults to \"admin\"\nACCESS_PASSWORD=your_password  # Set access password\nEOF\n\n# Because the compose file is under docker/, pass the root .env explicitly.\n\n# 3. Start the service\ndocker compose --env-file .env -f docker/docker-compose.yml up -d\n\n# 4. View logs\ndocker compose --env-file .env -f docker/docker-compose.yml logs -f\n\n# 5. Access the service\nWeb Interface: http://localhost:8081\nMCP Server: http://localhost:8081/mcp\n```\n</details>\n\nYou can also directly edit the docker/docker-compose.yml file to customize your configuration:\n<details>\n<summary>Click to view docker/docker-compose.yml example</summary>\n\n```yaml\nservices:\n  prompt-optimizer:\n    # Use Docker Hub image\n    image: linshen/prompt-optimizer:latest\n    container_name: prompt-optimizer\n    restart: unless-stopped\n    ports:\n      - \"8081:80\"  # Web application port (MCP server accessible via /mcp path)\n    environment:\n      - VITE_OPENAI_API_KEY=your_openai_key\n      - VITE_GEMINI_API_KEY=your_gemini_key\n      - VITE_GROK_API_KEY=your_xai_key\n      # Access Control (Optional)\n      - ACCESS_USERNAME=admin\n      - ACCESS_PASSWORD=your_password\n```\n</details>\n\n### 7. MCP Server Usage Instructions\n<details>\n<summary>Click to view MCP Server usage instructions</summary>\n\nPrompt Optimizer now supports the Model Context Protocol (MCP), enabling integration with AI applications that support MCP such as Claude Desktop.\n\nWhen running via Docker, the MCP Server automatically starts and can be accessed via `http://ip:port/mcp`.\n\n#### Environment Variable Configuration\n\nMCP Server requires API key configuration to function properly. Main MCP-specific configurations:\n\n```bash\n# MCP Server Configuration\nMCP_DEFAULT_MODEL_PROVIDER=openai  # Options: openai, gemini, anthropic, deepseek, grok, siliconflow, zhipu, dashscope, openrouter, modelscope, custom\nMCP_LOG_LEVEL=info                 # Log level\n```\n\n#### Using MCP in Docker Environment\n\nIn a Docker environment, the MCP Server runs alongside the web application. You can access the MCP service through the same port as the web application at the `/mcp` path.\n\nFor example, if you map the container's port 80 to port 8081 on the host:\n```bash\ndocker run -d -p 8081:80 \\\n  -e VITE_OPENAI_API_KEY=your-openai-key \\\n  -e MCP_DEFAULT_MODEL_PROVIDER=openai \\\n  --name prompt-optimizer \\\n  linshen/prompt-optimizer\n```\n\nThe MCP Server will then be accessible at `http://localhost:8081/mcp`.\n\n#### Claude Desktop Integration Example\n\nTo use Prompt Optimizer in Claude Desktop, you need to add the service configuration to Claude Desktop's configuration file.\n\n1. Find Claude Desktop's configuration directory:\n   - Windows: `%APPDATA%\\Claude\\services`\n   - macOS: `~/Library/Application Support/Claude/services`\n   - Linux: `~/.config/Claude/services`\n\n2. Edit or create the `services.json` file, adding the following content:\n\n```json\n{\n  \"services\": [\n    {\n      \"name\": \"Prompt Optimizer\",\n      \"url\": \"http://localhost:8081/mcp\"\n    }\n  ]\n}\n```\n\nMake sure to replace `localhost:8081` with the actual address and port where you've deployed Prompt Optimizer.\n\n#### Available Tools\n\n- **optimize-user-prompt**: Optimize user prompts to improve LLM performance\n- **optimize-system-prompt**: Optimize system prompts to improve LLM performance\n- **iterate-prompt**: Iteratively improve mature prompts based on specific requirements\n\nFor more detailed information, please refer to the [MCP Server User Guide](docs/user/mcp-server_en.md).\n</details>\n\n## ⚙️ API Key Configuration\n\n
