<details>\n<summary>Click to view API key configuration methods</summary>\n\n### Method 1: Via Interface (Recommended)\n1. Click the \"⚙️Settings\" button in the upper right corner\n2. Select the \"Model Management\" tab\n3. Click on the model you need to configure (such as OpenAI, Gemini, DeepSeek, Grok, etc.)\n4. Enter the corresponding API key in the configuration box\n5. Click \"Save\"\n\nSupported models: OpenAI, Gemini, DeepSeek, Grok, Zhipu AI, SiliconFlow, Custom API (OpenAI compatible interface)\n\nIn addition to API keys, you can configure advanced LLM parameters for each model individually. These parameters are configured through a field called `llmParams`, which allows you to specify any parameters supported by the LLM SDK in key-value pairs for fine-grained control over model behavior.\n\n**Advanced LLM Parameter Configuration Examples:**\n- **OpenAI/Compatible APIs**: `{\"temperature\": 0.7, \"max_tokens\": 4096, \"timeout\": 60000}`\n- **Gemini**: `{\"temperature\": 0.8, \"maxOutputTokens\": 2048, \"topP\": 0.95}`\n- **DeepSeek**: `{\"temperature\": 0.5, \"top_p\": 0.9, \"frequency_penalty\": 0.1}`\n\nFor more detailed information about `llmParams` configuration, please refer to the [LLM Parameters Configuration Guide](docs/developer/llm-params-guide.md).\n\n### Method 2: Via Environment Variables\nConfigure environment variables through the `-e` parameter when deploying with Docker:\n\n```bash\n-e VITE_OPENAI_API_KEY=your_key\n-e VITE_GEMINI_API_KEY=your_key\n-e VITE_DEEPSEEK_API_KEY=your_key\n-e VITE_GROK_API_KEY=your_key\n-e VITE_ZHIPU_API_KEY=your_key\n-e VITE_SILICONFLOW_API_KEY=your_key\n\n# Multiple Custom Models Configuration (Unlimited Quantity)\n-e VITE_CUSTOM_API_KEY_ollama=dummy_key\n-e VITE_CUSTOM_API_BASE_URL_ollama=http://localhost:11434/v1\n-e VITE_CUSTOM_API_MODEL_ollama=qwen2.5:7b\n```\n\n> 📖 **Detailed Configuration Guide**: See [Multiple Custom Models Documentation](./docs/user/multi-custom-models_en.md) for complete configuration methods and advanced usage\n\n</details>\n\n## Local Development\nFor detailed documentation, see [Development Documentation](docs/developer/development.md)\n\n<details>\n<summary>Click to view local development commands</summary>\n\n```bash\n# 1. Clone the project\ngit clone https://github.com/linshenkx/prompt-optimizer.git\ncd prompt-optimizer\n\n# 2. Install dependencies\npnpm install\n\n# 3. Start development server\npnpm dev               # Main development command: build core/ui and run web app\npnpm dev:web          # Run web app only\npnpm dev:fresh        # Complete reset and restart development environment\n```\n</details>\n\n## 🗺️ Roadmap\n\n- [x] Basic feature development\n- [x] Web application release\n- [x] Chrome extension release\n- [x] Internationalization support\n- [x] Support for system prompt optimization and user prompt optimization\n- [x] Desktop application release\n- [x] MCP service release\n- [x] Advanced mode: Variable management, context testing, function calling\n- [x] Image generation: Text-to-Image (T2I) and Image-to-Image (I2I) support\n- [x] Prompt favorites and template management\n- [ ] Support for workspace/project management\n\nFor detailed project status, see [Project Status Document](docs/project/project-status.md)\n\n## 📖 Related Documentation\n\n- [Documentation Index](docs/README.md) - Index of all documentation\n- [Technical Development Guide](docs/developer/technical-development-guide.md) - Technology stack and development specifications\n- [LLM Parameters Configuration Guide](docs/developer/llm-params-guide.md) - Detailed guide for advanced LLM parameter configuration\n- [Project Structure](docs/developer/project-structure.md) - Detailed project structure description\n- [Project Status](docs/project/project-status.md) - Current progress and plans\n- [Product Requirements](docs/project/prd.md) - Product requirements document\n- [Vercel Deployment Guide](docs/user/deployment/vercel_en.md) - Detailed instructions for Vercel deployment\n- [Cloudflare Deployment Guide](docs/user/deployment/cloudflare-pages_en.md) - Web frontend deployment on Cloudflare Workers / Pages\n\n## Star History\n\n<a href=\"https://star-history.com/#linshenkx/prompt-optimizer&Date\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=linshenkx/prompt-optimizer&type=Date&theme=dark\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=linshenkx/prompt-optimizer&type=Date\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=linshenkx/prompt-optimizer&type=Date\" />\n </picture>\n</a>\n\n## FAQ\n\n<details>\n<summary>Click to view frequently asked questions</summary>\n\n### API Connection Issues\n\n#### Q1: Why can't I connect to the model service after configuring the API key?\n**A**: Most connection failures are caused by **Cross-Origin Resource Sharing (CORS)** issues. As this project is a pure frontend application, browsers block direct access to API services from different origins for security reasons. Model services will reject direct requests from browsers if CORS policies are not correctly configured.\n\n#### Q2: How to solve Ollama connection issues?\n**A**: Ollama fully supports the OpenAI standard interface, just configure the correct CORS policy:\n1. Set environment variable `OLLAMA_ORIGINS=*` to allow requests from any origin\n2. If issues persist, set `OLLAMA_HOST=0.0.0.0:11434` to listen on any IP address\n\n#### Q3: How to solve CORS issues with commercial APIs (such as Nvidia's DS API, ByteDance's Volcano API)?\n**A**: These platforms typically have strict CORS restrictions. Recommended solutions:\n\n1. **Use Desktop Application** (Most Recommended)\n   - Desktop app has no CORS restrictions as a native application\n   - Can directly connect to any API service, including locally deployed models\n   - Provides the most complete and stable feature experience\n   - Download from [GitHub Releases](https://github.com/linshenkx/prompt-optimizer/releases)\n\n2. **Use Self-deployed API Proxy Service** (Professional solution)\n   - Deploy open-source API aggregation/proxy tools like OneAPI, NewAPI\n   - Configure as custom API endpoint in settings\n   - Request flow: Browser → Proxy service → Model service provider\n   - Full control over security policies and access permissions\n\n**Note**: All web versions (including online version, Vercel deployment, Docker deployment) are pure frontend applications and subject to browser CORS restrictions. Only the desktop version or using an API proxy service can solve CORS issues.\n\n#### Q4: I have correctly configured CORS policies for my local model (like Ollama), why can't I still connect using the online version?\n**A**: This is caused by the browser's **Mixed Content security policy**. For security reasons, browsers block secure HTTPS pages (like the online version) from sending requests to insecure HTTP addresses (like your local Ollama service).\n\n**Solutions**:\nTo bypass this limitation, you need to have the application and API under the same protocol (e.g., both HTTP). We recommend the following approaches:\n1. **Use the desktop version**: Desktop applications have no browser restrictions and are the most stable and reliable way to connect to local models\n2. **Use Docker deployment (HTTP)**: Access via `http://localhost:8081`, both the app and local Ollama use HTTP\n3. **Use Chrome extension**: Extensions can bypass some security restrictions in certain situations\n\n### macOS Desktop Application Issues\n\n#### Q5: macOS shows \"damaged\" or \"unverified developer\" when opening the app?\n**A**: This is because the application has not been signed with an Apple Developer certificate. Due to the high cost of Apple Developer accounts, the desktop application is currently unsigned.\n\n**Solution**:\nRun the following command in Terminal to remove the quarantine attribute:\n\n```bash\n# For installed applications\nxattr -rd com.apple.quarantine /Applications/PromptOptimizer.app\n\n# For downloaded .dmg files (run before installation)\nxattr -rd com.apple.quarantine ~/Downloads/PromptOptimizer-*.dmg\n```\n\nAfter running the command, you can open the application normally.\n\n</details>\n\n\n## 🤝 Contributing\n\n<details>\n<summary>Click to view contribution guidelines</summary>\n\n1. Fork the repository\n2. Create a feature branch (`git checkout -b feature/AmazingFeature`)\n3. Commit your changes (`git commit -m 'Add some feature'`)\n4. Push to the branch (`git push origin feature/AmazingFeature`)\n5. Open a Pull Request\n\nTip: When developing with Cursor tool, it is recommended to do the following before committing:\n1. Use the \"CodeReview\" rule for review\n2. Check according to the review report format:\n   - Overall consistency of changes\n   - Code quality and implementation method\n   - Test coverage\n   - Documentation completeness\n3. Optimize based on review results before submitting\n\n</details>\n\n## 👏 Contributors\n\nThanks to all the developers who have contributed to this project!\n\n<a href=\"https://github.com/linshenkx/prompt-optimizer/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=linshenkx/prompt-optimizer\" alt=\"Contributors\" />\n</a>\n\n## 🙏 Acknowledgements\n\nThis project was partly inspired by [LangGPT](https://github.com/langgptai/LangGPT) in prompt engineering and structured prompt design. Thanks to the LangGPT project and community for their open-source sharing and continued exploration.\n\n## 📄 License\n\nThis project is licensed under [AGPL-3.0](LICENSE).\n\n**In simple terms**: You can freely use, modify, and commercialize this project, but if you turn it into a website or service for others, you must share your source code.\n\n<details>\n<summary>👉 Click for detailed explanation</summary>\n\n**What you can do:**\n- ✅ Personal use, learning, and research\n- ✅ Internal company use (not offering public services)\n- ✅ Modify code for commercial projects\n- ✅ Charge for products or services\n\n**What you must do:**\n- 📖 If distributing software or offering network services, disclose source code\n- 📝 Preserve original author's copyright notices\n\n**Core principle**: Commercial use is allowed, but not closed-source.\n\n</details>\n\n---\n\nIf this project is helpful to you, please consider giving it a Star ⭐️\n\n## 👥 Contact Us\n\n- Submit an Issue\n- Create a Pull Request\n- Join the discussion group \n","summary":"Prompt Optimizer is a versatile toolkit designed to enhance the quality of AI prompts by providing structured optimization, testing, and evaluation workflows. It supports a flexible ecosystem including a web app, Chrome extension, and Docker deployment, allowing users to transform simple ideas into precise, high-performing prompts using templates and variable-based strategies. This tool is ideal for AI power users, developers, and content creators who need to refine their interactions with LLMs and maintain a library of reusable, optimized prompt assets.","description":"An AI prompt optimizer for writing better prompts and getting better AI results.","stars":30374,"language":"TypeScript"},{"owner":"ente-io","repo":"ente","url":"https://github.com/ente-io/ente","readme":"<div align=\"center\">\n\n<img src=\".github/assets/ente-rocketship.png\" width=\"400\"/>\n\nFully open source end-to-end encrypted photos, authenticators and more.\n\n</div>\n\n# Ente\n\nEnte is a service that provides a fully open source, end-to-end encrypted platform for you to store your data in the cloud without needing to trust the service provider. On top of this platform, we have built three apps so far: Ente Photos (an alternative to Apple and Google Photos), Ente Locker (a safe space for your most important documents and credentials), and Ente Auth (a 2FA alternative to the deprecated Authy).\n\nThis monorepo contains all our source code - the client apps (iOS / Android / F-Droid / Web / Linux / macOS / Windows) for both the products (and more planned future ones!), and the server that powers them.\n\nOur source code and cryptography have been externally audited by Cure53 (a German cybersecurity firm, arguably the world's best), Symbolic Software (French cryptography experts) and Fallible (an Indian penetration testing firm).\n\nLearn more at [ente.com](https://ente.com).\n\n<br />\n\n## Ente Photos\n\n![Screenshots of Ente Photos](.github/assets/photos.png)\n\nOur flagship product. 3x data replication. Face detection. Semantic search. Private sharing. Collaborative albums. Family plans. Easy import, easier export. Background uploads. The list goes on. And of course, all of this, while being fully end-to-end encrypted across platforms.\n\nEnte Photos is a paid service, but we offer 10GB of free storage. You can also clone this repository and choose to self-host.\n\n<br />\n\n<div align=\"center\">\n\n[<img height=\"40\" src=\".github/assets/app-store-badge.svg\">](https://apps.apple.com/app/id1542026904)\n[<img height=\"40\" src=\".github/assets/play-store-badge.png\">](https://play.google.com/store/apps/details?id=io.ente.photos)\n[<img height=\"40\" src=\".github/assets/f-droid-badge.png\">](https://f-droid.org/packages/io.ente.photos.fdroid/)\n[<img height=\"40\" src=\".github/assets/obtainium-badge.png\">](https://apps.obtainium.imranr.dev/redirect?r=obtainium://app/%7B%22id%22%3A%22io.ente.photos.independent%22%2C%22url%22%3A%22https%3A%2F%2Fgithub.com%2Fente-io%2Fente%22%2C%22author%22%3A%22ente-io%22%2C%22name%22%3A%22Ente%20Photos%22%2C%22preferredApkIndex%22%3A0%2C%22additionalSettings%22%3A%22%7B%5C%22includePrereleases%5C%22%3Afalse%2C%5C%22fallbackToOlderReleases%5C%22%3Atrue%2C%5C%22filterReleaseTitlesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22filterReleaseNotesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22verifyLatestTag%5C%22%3Afalse%2C%5C%22dontSortReleasesList%5C%22%3Atrue%2C%5C%22useLatestAssetDateAsReleaseDate%5C%22%3Afalse%2C%5C%22releaseTitleAsVersion%5C%22%3Afalse%2C%5C%22trackOnly%5C%22%3Afalse%2C%5C%22versionExtractionRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22matchGroupToUse%5C%22%3A%5C%22%5C%22%2C%5C%22versionDetection%5C%22%3Atrue%2C%5C%22releaseDateAsVersion%5C%22%3Afalse%2C%5C%22useVersionCodeAsOSVersion%5C%22%3Afalse%2C%5C%22apkFilterRegEx%5C%22%3A%5C%22ente-photos*%5C%22%2C%5C%22invertAPKFilter%5C%22%3Afalse%2C%5C%22autoApkFilterByArch%5C%22%3Atrue%2C%5C%22appName%5C%22%3A%5C%22%5C%22%2C%5C%22shizukuPretendToBeGooglePlay%5C%22%3Afalse%2C%5C%22allowInsecure%5C%22%3Afalse%2C%5C%22exemptFromBackgroundUpdates%5C%22%3Afalse%2C%5C%22skipUpdateNotifications%5C%22%3Afalse%2C%5C%22about%5C%22%3A%5C%22%5C%22%7D%22%2C%22overrideSource%22%3Anull%7D)\n[<img height=\"40\" src=\".github/assets/desktop-badge.png\">](https://ente.com/download/desktop)\n[<img height=\"40\" src=\".github/assets/web-badge.svg\">](https://photos.ente.com)\n\n</div>\n\n<br />\n\n## Ente Auth\n\n![Screenshots of Ente Photos](.github/assets/auth.png)\n\nOur labour of love. Two years ago, while building Ente Photos, we realized that there was no open source end-to-end encrypted authenticator app. We already had the building blocks, so we built one.\n\nEnte Auth is free, and will remain free forever. If you like the service and want to give back, please check out Ente Photos or spread the word.\n\n<br />\n\n<div align=\"center\">\n\n[<img height=\"40\" src=\".github/assets/app-store-badge.svg\">](https://apps.apple.com/app/id6444121398)\n[<img height=\"40\" src=\".github/assets/play-store-badge.png\">](https://play.google.com/store/apps/details?id=io.ente.auth)\n[<img height=\"40\" src=\".github/assets/f-droid-badge.png\">](https://f-droid.org/packages/io.ente.auth/)\n[<img height=\"40\" src=\".github/assets/obtainium-badge.png\">](https://apps.obtainium.imranr.dev/redirect?r=obtainium://app/%7B%22id%22%3A%22io.ente.auth.independent%22%2C%22url%22%3A%22https%3A%2F%2Fgithub.com%2Fente-io%2Fente%22%2C%22author%22%3A%22ente-io%22%2C%22name%22%3A%22Ente%20Auth%22%2C%22preferredApkIndex%22%3A0%2C%22additionalSettings%22%3A%22%7B%5C%22includePrereleases%5C%22%3Afalse%2C%5C%22fallbackToOlderReleases%5C%22%3Atrue%2C%5C%22filterReleaseTitlesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22filterReleaseNotesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22verifyLatestTag%5C%22%3Afalse%2C%5C%22dontSortReleasesList%5C%22%3Atrue%2C%5C%22useLatestAssetDateAsReleaseDate%5C%22%3Afalse%2C%5C%22releaseTitleAsVersion%5C%22%3Afalse%2C%5C%22trackOnly%5C%22%3Afalse%2C%5C%22versionExtractionRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22matchGroupToUse%5C%22%3A%5C%22%5C%22%2C%5C%22versionDetection%5C%22%3Atrue%2C%5C%22releaseDateAsVersion%5C%22%3Afalse%2C%5C%22useVersionCodeAsOSVersion%5C%22%3Afalse%2C%5C%22apkFilterRegEx%5C%22%3A%5C%22ente-auth*%5C%22%2C%5C%22invertAPKFilter%5C%22%3Afalse%2C%5C%22autoApkFilterByArch%5C%22%3Atrue%2C%5C%22appName%5C%22%3A%5C%22%5C%22%2C%5C%22shizukuPretendToBeGooglePlay%5C%22%3Afalse%2C%5C%22allowInsecure%5C%22%3Afalse%2C%5C%22exemptFromBackgroundUpdates%5C%22%3Afalse%2C%5C%22skipUpdateNotifications%5C%22%3Afalse%2C%5C%22about%5C%22%3A%5C%22%5C%22%7D%22%2C%22overrideSource%22%3Anull%7D)\n[<img height=\"40\" src=\".github/assets/desktop-badge.png\">](https://github.com/ente-io/ente/releases?q=tag%3Aauth-v4)\n[<img height=\"40\" src=\".github/assets/web-badge.svg\">](https://auth.ente.com)\n\n</div>\n\n<br />\n\n## Ente Locker\n\n![Screenshots of Ente Locker](.github/assets/locker.png)\n\nProtect your most important documents, credentials, and notes with end-to-end encryption. Share privately with people you trust, and set up access for emergencies. Available for iOS and Android.\n\nEnte Locker is free for up to 100 items. If you're subscribed to Ente Photos, you can store up to 1000 items. Learn more at [ente.com/locker](https://ente.com/locker).\n\n<div align=\"center\">\n\n[<img height=\"40\" src=\".github/assets/app-store-badge.svg\">](https://apps.apple.com/us/app/ente-locker/id6747611956)\n[<img height=\"40\" src=\".github/assets/play-store-badge.png\">](https://play.google.com/store/apps/details?id=io.ente.locker)\n[<img height=\"40\" src=\".github/assets/obtainium-badge.png\">](https://apps.obtainium.imranr.dev/redirect?r=obtainium://app/%7B%22id%22%3A%22io.ente.locker.independent%22%2C%22url%22%3A%22https%3A%2F%2Fgithub.com%2Fente-io%2Fente%22%2C%22author%22%3A%22ente-io%22%2C%22name%22%3A%22Ente%20Locker%22%2C%22preferredApkIndex%22%3A0%2C%22additionalSettings%22%3A%22%7B%5C%22includePrereleases%5C%22%3Afalse%2C%5C%22fallbackToOlderReleases%5C%22%3Atrue%2C%5C%22filterReleaseTitlesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22filterReleaseNotesByRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22verifyLatestTag%5C%22%3Afalse%2C%5C%22dontSortReleasesList%5C%22%3Atrue%2C%5C%22useLatestAssetDateAsReleaseDate%5C%22%3Afalse%2C%5C%22releaseTitleAsVersion%5C%22%3Afalse%2C%5C%22trackOnly%5C%22%3Afalse%2C%5C%22versionExtractionRegEx%5C%22%3A%5C%22%5C%22%2C%5C%22matchGroupToUse%5C%22%3A%5C%22%5C%22%2C%5C%22versionDetection%5C%22%3Atrue%2C%5C%22releaseDateAsVersion%5C%22%3Afalse%2C%5C%22useVersionCodeAsOSVersion%5C%22%3Afalse%2C%5C%22apkFilterRegEx%5C%22%3A%5C%22ente-locker*%5C%22%2C%5C%22invertAPKFilter%5C%22%3Afalse%2C%5C%22autoApkFilterByArch%5C%22%3Atrue%2C%5C%22appName%5C%22%3A%5C%22%5C%22%2C%5C%22shizukuPretendToBeGooglePlay%5C%22%3Afalse%2C%5C%22allowInsecure%5C%22%3Afalse%2C%5C%22exemptFromBackgroundUpdates%5C%22%3Afalse%2C%5C%22skipUpdateNotifications%5C%22%3Afalse%2C%5C%22about%5C%22%3A%5C%22%5C%22%7D%22%2C%22overrideSource%22%3Anull%7D)\n\n</div>\n\n<br />\n\n## Contributing\n\nWant to get aboard the Ente hype train? Welcome along! Don't hesitate if you're not a developer, there are many other important ways in which [you can contribute](CONTRIBUTING.md).\n\n## Support\n\nWe are never more than an email away. For the various ways to ask for help, please see our [support guide](SUPPORT.md).\n\n## Community\n\n<img src=\".github/assets/ente-ducky.png\" width=200 alt=\"Ente's Mascot, Ducky,\n    inviting people to Ente's source code repository\" />\n\nPlease visit the [community section](https://ente.com/about#community) for all the ways to connect with our community.\n\n[![Discord](https://img.shields.io/discord/948937918347608085?style=for-the-badge&logo=Discord&logoColor=white&label=Discord)](https://discord.gg/z2YVKkycX3)\n[![Ente's Blog RSS](https://img.shields.io/badge/blog-rss-F88900?style=for-the-badge&logo=rss&logoColor=white)](https://ente.com/blog/rss.xml)\n\n[![Twitter](.github/assets/twitter.svg)](https://twitter.com/enteio) &nbsp; [![Mastodon](.github/assets/mastodon.svg)](https://fosstodon.org/@ente)\n\n---\n\n## Security\n\nIf you believe you have found a security vulnerability, please responsibly disclose it by emailing security@ente.com or [using this link](https://github.com/ente-io/ente/security/advisories/new) instead of opening a public issue. We will investigate all legitimate reports. To know more, please see our [security policy](SECURITY.md).\n","summary":"Ente is a fully open-source, end-to-end encrypted cloud platform designed to give users complete privacy by eliminating the need to trust service providers. The ecosystem includes three primary applications: Ente Photos for secure media storage, Ente Locker for sensitive document management, and Ente Auth for 2FA synchronization. With robust, professionally audited cryptography and support for cross-platform synchronization, Ente is an ideal solution for privacy-conscious individuals seeking a secure alternative to mainstream cloud services.","description":"💚 End-to-end encrypted cloud for everything.","stars":26945,"language":"Dart"},{"owner":"pocketbase","repo":"pocketbase","url":"https://github.com/pocketbase/pocketbase","readme":"<p align=\"center\">\n    <a href=\"https://pocketbase.io\" target=\"_blank\" rel=\"noopener\">\n        <img src=\"https://i.imgur.com/aCBbjKx.png\" alt=\"PocketBase - open source backend in 1 file\" />\n    </a>\n</p>\n\n<p align=\"center\">\n    <a href=\"https://github.com/pocketbase/pocketbase/actions/workflows/release.yaml\" target=\"_blank\" rel=\"noopener\"><img src=\"https://github.com/pocketbase/pocketbase/actions/workflows/release.yaml/badge.svg\" alt=\"build\" /></a>\n    <a href=\"https://github.com/pocketbase/pocketbase/releases\" target=\"_blank\" rel=\"noopener\"><img src=\"https://img.shields.io/github/release/pocketbase/pocketbase.svg\" alt=\"Latest releases\" /></a>\n    <a href=\"https://pkg.go.dev/github.com/pocketbase/pocketbase\" target=\"_blank\" rel=\"noopener\"><img src=\"https://godoc.org/github.com/pocketbase/pocketbase?status.svg\" alt=\"Go package documentation\" /></a>\n</p>\n\n[PocketBase](https://pocketbase.io) is an open source Go backend that includes:\n\n- embedded database (_SQLite_) with **realtime subscriptions**\n- built-in **files and users management**\n- convenient **Admin dashboard UI**\n- and simple **REST-ish API**\n\n**For documentation and examples, please visit https://pocketbase.io/docs.**\n\n> [!WARNING]\n> Please keep in mind that PocketBase is still under active development\n> and therefore full backward compatibility is not guaranteed before reaching v1.0.0.\n\n## API SDK clients\n\nThe easiest way to interact with the PocketBase Web APIs is to use one of the official SDK clients:\n\n- **JavaScript - [pocketbase/js-sdk](https://github.com/pocketbase/js-sdk)** (_Browser, Node.js, React Native_)\n- **Dart - [pocketbase/dart-sdk](https://github.com/pocketbase/dart-sdk)** (_Web, Mobile, Desktop, CLI_)\n\nYou could also check the recommendations in https://pocketbase.io/docs/how-to-use/.\n\n\n## Overview\n\n### Use as standalone app\n\nYou could download the prebuilt executable for your platform from the [Releases page](https://github.com/pocketbase/pocketbase/releases).\nOnce downloaded, extract the archive and run `./pocketbase serve` in the extracted directory.\n\nThe prebuilt executables are based on the [`examples/base/main.go` file](https://github.com/pocketbase/pocketbase/blob/master/examples/base/main.go) and comes with the JS VM plugin enabled by default which allows to extend PocketBase with JavaScript (_for more details please refer to [Extend with JavaScript](https://pocketbase.io/docs/js-overview/)_).\n\n### Use as a Go framework/toolkit\n\nPocketBase is distributed as a regular Go library package which allows you to build\nyour own custom app specific business logic and still have a single portable executable at the end.\n\nHere is a minimal example:\n\n0. [Install Go 1.25+](https://go.dev/doc/install) (_if you haven't already_)\n\n1. Create a new project directory with the following `main.go` file inside it:\n    ```go\n    package main\n\n    import (\n        \"log\"\n\n        \"github.com/pocketbase/pocketbase\"\n        \"github.com/pocketbase/pocketbase/core\"\n    )\n\n    func main() {\n        app := pocketbase.New()\n\n        app.OnServe().BindFunc(func(se *core.ServeEvent) error {\n            // registers new \"GET /hello\" route\n            se.Router.GET(\"/hello\", func(re *core.RequestEvent) error {\n                return re.String(200, \"Hello world!\")\n            })\n\n            return se.Next()\n        })\n\n        if err := app.Start(); err != nil {\n            log.Fatal(err)\n        }\n    }\n    ```\n\n2. To init the dependencies, run `go mod init myapp && go mod tidy`.\n\n3. To start the application, run `go run main.go serve`.\n\n4. To build a statically linked executable, you can run `CGO_ENABLED=0 go build` and then start the created executable with `./myapp serve`.\n\n_For more details please refer to [Extend with Go](https://pocketbase.io/docs/go-overview/)._\n\n### Building and running the repo main.go example\n\nTo build the minimal standalone executable, like the prebuilt ones in the releases page, you can simply run `go build` inside the `examples/base` directory:\n\n0. [Install Go 1.25+](https://go.dev/doc/install) (_if you haven't already_)\n1. Clone/download the repo\n2. Navigate to `examples/base`\n3. Run `GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build`\n   (_https://go.dev/doc/install/source#environment_)\n4. Start the created executable by running `./base serve`.\n\nNote that the supported build targets by the pure Go SQLite driver at the moment are:\n\n```\ndarwin  amd64\ndarwin  arm64\nfreebsd amd64\nfreebsd arm64\nlinux   386\nlinux   amd64\nlinux   arm\nlinux   arm64\nlinux   loong64\nlinux   ppc64le\nlinux   riscv64\nlinux   s390x\nwindows 386\nwindows amd64\nwindows arm64\n```\n\n### Testing\n\nPocketBase comes with mixed bag of unit and integration tests.\nTo run them, use the standard `go test` command:\n\n```sh\ngo test ./...\n```\n\nCheck also the [Testing guide](http://pocketbase.io/docs/testing) to learn how to write your own custom application tests.\n\n## Security\n\nIf you discover a security vulnerability within PocketBase, please send an e-mail to **support at pocketbase.io**.\n\nAll reports will be promptly addressed and you'll be credited in the fix release notes.\n\n## Contributing\n\nPocketBase is free and open source project licensed under the [MIT License](LICENSE.md).\nYou are free to do whatever you want with it, even offering it as a paid service.\n\nYou could help continuing its development by:\n\n- [Contribute to the source code](CONTRIBUTING.md)\n- [Suggest new features and report issues](https://github.com/pocketbase/pocketbase/issues)\n\nPlease refrain creating PRs for _new features_ without previously discussing the implementation details.\nPocketBase has a [roadmap](https://github.com/orgs/pocketbase/projects/2) and I try to work on issues in specific order and such PRs often come in out of nowhere and skew all initial planning with tedious back-and-forth communication.\n\nDon't get upset if I close your PR, even if it is well executed and tested. This doesn't mean that it will never be merged.\nLater we can always refer to it and/or take pieces of your implementation when the time comes to work on the issue (don't worry you'll be credited in the release notes).\n\n> [!IMPORTANT]\n> Due to recent LLM spam, PRs are temporary disabled and only existing collaborators can open a PR.\n> If you stumble on a problem that you want to fix, please consider instead opening an issue or discussion with link to your fork _(if not obvious - LLM contributions are not welcome)_.\n> This status may change in the future in case GitHub finally decide to do something about the constant spam, or when I find time to move the project somewhere else.\n","summary":"PocketBase is an open-source, all-in-one backend solution distributed as a single portable Go executable that simplifies application development. It comes equipped with an embedded SQLite database, built-in user and file management, real-time subscriptions, and a convenient admin dashboard. This tool is ideal for developers who want to quickly build and deploy web or mobile applications without managing complex infrastructure, as it can be used as a ready-to-run standalone server or as a flexible Go framework.","description":"Open Source realtime backend in 1 file","stars":58851,"language":"Go"},{"owner":"ByteByteGoHq","repo":"system-design-101","url":"https://github.com/ByteByteGoHq/system-design-101","readme":"<p>\n  <a href=\"https://blog.bytebytego.com/?utm_source=site\"><img src=\".github/banner.jpg\" /> </a>\n</p>\n\n<p align=\"center\">\n  【\n  <a href=\"https://www.youtube.com/channel/UCZgt6AzoyjslHTC9dz0UoTw\">\n    👨🏻‍💻 YouTube\n  </a> | \n  <a href=\"https://blog.bytebytego.com/?utm_source=site\">\n    📮 Newsletter\n  </a> 】\n</p>\n\n<a href=\"https://trendshift.io/repositories/3709\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/3709\" alt=\"ByteByteGoHq%2Fsystem-design-101 | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n# System Design 101\n\nExplain complex systems using visuals and simple terms. \n\nWhether you're preparin <script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
