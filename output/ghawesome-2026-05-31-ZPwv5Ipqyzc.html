 what calls a function/method (--limit, --json)\ncodegraph callees <symbol>        # Find what a function/method calls (--limit, --json)\ncodegraph impact <symbol>         # Analyze what code is affected by changing a symbol (--depth, --json)\ncodegraph affected [files...]     # Find test files affected by changes (see below)\ncodegraph serve --mcp             # Start MCP server\n```\n\n### `codegraph affected`\n\nTraces import dependencies transitively to find which test files are affected by changed source files.\n\n```bash\ncodegraph affected src/utils.ts src/api.ts         # Pass files as arguments\ngit diff --name-only | codegraph affected --stdin   # Pipe from git diff\ncodegraph affected src/auth.ts --filter \"e2e/*\"     # Custom test file pattern\n```\n\n| Option | Description | Default |\n|--------|-------------|---------|\n| `--stdin` | Read file list from stdin | `false` |\n| `-d, --depth <n>` | Max dependency traversal depth | `5` |\n| `-f, --filter <glob>` | Custom glob to identify test files | auto-detect |\n| `-j, --json` | Output as JSON | `false` |\n| `-q, --quiet` | Output file paths only | `false` |\n\n**CI/hook example:**\n\n```bash\n#!/usr/bin/env bash\nAFFECTED=$(git diff --name-only HEAD | codegraph affected --stdin --quiet)\nif [ -n \"$AFFECTED\" ]; then\n  npx vitest run $AFFECTED\nfi\n```\n\n---\n\n## MCP Tools\n\nWhen running as an MCP server, CodeGraph exposes these tools to Claude Code:\n\n| Tool | Purpose |\n|------|---------|\n| `codegraph_search` | Find symbols by name across the codebase |\n| `codegraph_context` | Build relevant code context for a task |\n| `codegraph_trace` | Trace the call path between two symbols (\"how does X reach Y\") in one call — each hop with its body inline, following dynamic-dispatch hops (callbacks, React re-render, interface→impl) that grep can't |\n| `codegraph_callers` | Find what calls a function |\n| `codegraph_callees` | Find what a function calls |\n| `codegraph_impact` | Analyze what code is affected by changing a symbol |\n| `codegraph_node` | Get details about a specific symbol (optionally with source code) |\n| `codegraph_explore` | Return source for several related symbols grouped by file, plus a relationship map, in one call |\n| `codegraph_files` | Get indexed file structure (faster than filesystem scanning) |\n| `codegraph_status` | Check index health and statistics |\n\n---\n\n## Library Usage\n\n```typescript\nimport CodeGraph from '@colbymchenry/codegraph';\n\nconst cg = await CodeGraph.init('/path/to/project');\n// Or: const cg = await CodeGraph.open('/path/to/project');\n\nawait cg.indexAll({\n  onProgress: (p) => console.log(`${p.phase}: ${p.current}/${p.total}`)\n});\n\nconst results = cg.searchNodes('UserService');\nconst callers = cg.getCallers(results[0].node.id);\nconst context = await cg.buildContext('fix login bug', { maxNodes: 20, includeCode: true, format: 'markdown' });\nconst impact = cg.getImpactRadius(results[0].node.id, 2);\n\ncg.watch();   // auto-sync on file changes\ncg.unwatch(); // stop watching\ncg.close();\n```\n\n---\n\n## Configuration\n\nThere isn't any — CodeGraph is zero-config, with **no config file** to write or\nkeep in sync. Language support is automatic from the file extension; there's\nnothing to wire up per language.\n\nWhat it skips out of the box:\n\n- **Dependency, build, and cache directories** — `node_modules`, `vendor`,\n  `dist`, `build`, `target`, `.venv`, `Pods`, `.next`, and the like across every\n  [supported stack](#supported-languages) — so the graph is your code, not\n  third-party noise. This holds even with no `.gitignore`.\n- **Anything in your `.gitignore`** — honored in git repos via git, and in\n  non-git projects by reading `.gitignore` directly (root and nested).\n- **Files larger than 1 MB** — generated bundles, minified JS, vendored blobs.\n\nTo keep something else out, add it to `.gitignore`. To pull a default-excluded\ndirectory back **in** (say you really do want a vendored dependency indexed),\nadd a negation — `!vendor/`. The defaults apply uniformly, so committing a\ndependency or build directory doesn't force it into the graph; the `.gitignore`\nnegation is the explicit opt-in.\n\n## Supported Platforms\n\nEvery release ships a self-contained build (bundled Node runtime — nothing to\ncompile) for all three desktop OSes, on both Intel/AMD (x64) and ARM (arm64):\n\n| Platform | Architectures | Install |\n|----------|---------------|---------|\n| Windows | x64, arm64 | PowerShell installer or npm |\n| macOS | x64, arm64 | shell installer or npm |\n| Linux | x64, arm64 | shell installer or npm |\n\nSee [Get Started](#get-started) for the one-line install commands.\n\n## Supported Agents\n\nThe interactive installer auto-detects and configures each of these — wiring up\nthe MCP server (which delivers its own usage guidance, so no instructions file\nis written):\n\n- **Claude Code**\n- **Cursor**\n- **Codex CLI**\n- **opencode**\n- **Hermes Agent**\n- **Gemini CLI**\n- **Antigravity IDE**\n- **Kiro**\n\n## Supported Languages\n\n| Language | Extension | Status |\n|----------|-----------|--------|\n| TypeScript | `.ts`, `.tsx` | Full support |\n| JavaScript | `.js`, `.jsx`, `.mjs` | Full support |\n| Python | `.py` | Full support |\n| Go | `.go` | Full support |\n| Rust | `.rs` | Full support |\n| Java | `.java` | Full support |\n| C# | `.cs` | Full support |\n| PHP | `.php` | Full support |\n| Ruby | `.rb` | Full support |\n| C | `.c`, `.h` | Full support |\n| C++ | `.cpp`, `.hpp`, `.cc` | Full support |\n| Objective-C | `.m`, `.mm`, `.h` | Partial support (classes, protocols, methods, `@property`, `#import`, message sends; `.mm` ObjC++ may parse incompletely) |\n| Swift | `.swift` | Full support |\n| Kotlin | `.kt`, `.kts` | Full support |\n| Scala | `.scala`, `.sc` | Full support (classes, traits, methods, type aliases, Scala 3 enums) |\n| Dart | `.dart` | Full support |\n| Svelte | `.svelte` | Full support (script extraction, Svelte 5 runes, SvelteKit routes) |\n| Vue | `.vue` | Full support (script + script-setup extraction, Nuxt page/API/middleware routes) |\n| Liquid | `.liquid` | Full support |\n| Pascal / Delphi | `.pas`, `.dpr`, `.dpk`, `.lpr` | Full support (classes, records, interfaces, enums, DFM/FMX form files) |\n| Lua | `.lua` | Full support (functions, methods with receivers, local variables, `require` imports, call edges) |\n| Luau | `.luau` | Full support (everything in Lua, plus `type`/`export type` aliases, typed signatures, and Roblox instance-path `require`) |\n\n## Troubleshooting\n\n**\"CodeGraph not initialized\"** — Run `codegraph init` in your project directory first.\n\n**Indexing is slow** — Check that `node_modules` and other large directories are excluded. Use `--quiet` to reduce output overhead.\n\n**MCP hits `database is locked`** — current builds shouldn't: CodeGraph bundles its own Node runtime and uses Node's built-in `node:sqlite` in WAL mode, where concurrent reads never block on a writer. If you still see it:\n\n- **You're on an old (pre-0.9) install.** Reinstall to get the bundled runtime — `curl -fsSL https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.sh | sh` (macOS/Linux), `irm https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.ps1 | iex` (Windows), or `npm i -g @colbymchenry/codegraph@latest`.\n- **`codegraph status` shows `Journal:` other than `wal`** — WAL couldn't be enabled on this filesystem (common on network shares and WSL2 `/mnt`), so reads can block on writes. Move the project (with its `.codegraph/` folder) onto a local disk.\n\n**MCP server not connecting** — Ensure the project is initialized/indexed, verify the path in your MCP config, and check that `codegraph serve --mcp` works from the command line.\n\n**Missing symbols** — The MCP server auto-syncs on save (wait a couple seconds). Run `codegraph sync` manually if needed. Check that the file's language is supported and isn't inside a `.gitignore`d or default-excluded directory (e.g. `node_modules`, `dist`).\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=colbymchenry%2Fcodegraph&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT\n\n---\n\n<div align=\"center\">\n\n**Made for AI coding agents — Claude Code, Cursor, Codex CLI, opencode, Hermes Agent, Gemini CLI, Antigravity IDE, and Kiro**\n\n[Report Bug](https://github.com/colbymchenry/codegraph/issues) · [Request Feature](https://github.com/colbymchenry/codegraph/issues)\n\n</div>\n","summary":"CodeGraph is a local, zero-install tool that adds “semantic code intelligence” to AI coding agents by building and querying a pre-indexed knowledge graph of your repository. It reduces agent exploration work by providing fast symbol relationships, call graphs, and code structure so agents can answer questions without repeatedly scanning files, while bundling its own runtime and offering an installer that auto-configures supported tools like Claude Code, Cursor, Codex, Gemini, and others. You can initialize and index projects locally with a single command that creates a `.codegraph/` directory, and it includes uninstall support to remove its agent integration without deleting your project index. This is best for developers and teams using coding assistants who want faster, more reliable codebase understanding at lower cost and fewer tool calls.","description":"Pre-indexed code knowledge graph for Claude Code, Codex, Gemini, Cursor, OpenCode, AntiGravity, Kiro, and Hermes Agent — fewer tokens, fewer tool calls, 100% local","stars":34543,"language":"TypeScript"},{"owner":"lillian039","repo":"ELF","url":"https://github.com/lillian039/ELF","readme":"# ELF: Embedded Language Flows\n\n[![arXiv](https://img.shields.io/badge/arXiv-2605.10938-b31b1b.svg)](https://arxiv.org/abs/2605.10938)&nbsp;\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)&nbsp;\n[![Hugging Face](https://img.shields.io/badge/Hugging%20Face-ELF-blue.svg)](https://huggingface.co/embedded-language-flows)&nbsp;\n\nThis is the official JAX implementation for the paper *ELF: Embedded Language Flows*. This code is written and tested on TPUs. A PyTorch version is available on the [`pytorch_elf`](https://github.com/lillian039/ELF/tree/pytorch_elf) branch.\n\nELF is a class of continuous diffusion language models based on continuous-time Flow Matching. Unlike existing DLMs, ELF predominantly stays within the continuous embedding space until the final time step, where it maps to discrete tokens using a shared-weight network. This formulation makes it straightforward to adapt established techniques from image-domain diffusion models, e.g., classifier-free guidance (CFG).\n\n<p align=\"center\">\n  <img src=\"assets/teaser.gif\" alt=\"Conceptual illustration of ELF\" width=\"100%\"/>\n</p>\n<p align=\"left\">\n  <em><strong>Conceptual illustration of ELF.</strong> Orange points denote data represented in continuous embedding space, and purple lines show denoising trajectories from Gaussian noise to clean embeddings. Discretization is applied only at the final time step (t=1) using a shared-weight network.</em>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/generation.gif\" alt=\"Denoising trajectory of ELF-B\" width=\"100%\"/>\n</p>\n<p align=\"left\">\n  <em><strong>Denoising trajectory</strong> of ELF-B. As t increases from 0 to 1, ungrammatical sentences are progressively refined into fluent and grammatical text.</em>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/sys_compare.jpg\" alt=\"System-level comparison\" width=\"100%\"/>\n</p>\n<p align=\"left\">\n  <em><strong>System-level comparison.</strong> ELF-B outperforms both discrete and continuous DLMs trained under similar settings (a) and distilled variants of other baselines that require additional rounds of training (b), and uses substantially fewer training tokens (c).</em>\n</p>\n\n## Initialization\n\nInstall the dependencies (JAX+TPUs) and log in to WandB to track your experiments if needed.\n\n```bash\npip install -r requirements.txt\nwandb login YOUR_WANDB_API_KEY\n```\n\n## Inference\n\nYou can quickly verify your setup with our provided checkpoint.\n\n<table><tbody>\n<td valign=\"bottom\">OpenWebText (unconditional)</td>\n<td valign=\"bottom\" align=\"center\">ELF-B (105M)</td>\n<td valign=\"bottom\" align=\"center\">ELF-M (342M)</td>\n<td valign=\"bottom\" align=\"center\">ELF-L (652M)</td>\n<tr><td align=\"left\">pre-trained checkpoint</td>\n<td align=\"center\"><a href=\"https://huggingface.co/embedded-language-flows/ELF-B-owt\">ELF-B-owt</a></td>\n<td align=\"center\"><a href=\"https://huggingface.co/embedded-language-flows/ELF-M-owt\">ELF-M-owt</a></td>\n<td align=\"center\"><a href=\"https://huggingface.co/embedded-language-flows/ELF-L-owt\">ELF-L-owt</a></td>\n</tr>\n<tr><td align=\"left\">Sampling steps (SDE)</td>\n<td align=\"center\">32</td>\n<td align=\"center\">64</td>\n<td align=\"center\">64</td>\n</tr>\n<tr><td align=\"left\">Gen. PPL ↓ (paper)</td>\n<td align=\"center\">24.1</td>\n<td align=\"center\">21.7</td>\n<td align=\"center\">23.3</td>\n</tr>\n<tr><td align=\"left\">Entropy ↑ (paper)</td>\n<td align=\"center\">5.15</td>\n<td align=\"center\">5.18</td>\n<td align=\"center\">5.28</td>\n</tr>\n</tbody></table>\n\n<table><tbody>\n<td valign=\"bottom\">Conditional generation (ELF-B)</td>\n<td valign=\"bottom\" align=\"center\">WMT14 De-En</td>\n<td valign=\"bottom\" align=\"center\" colspan=\"3\">XSum</td>\n<tr><td align=\"left\">pre-trained checkpoint</td>\n<td align=\"center\"><a href=\"https://huggingface.co/embedded-language-flows/ELF-B-de-en\">ELF-B-de-en</a></td>\n<td align=\"center\" colspan=\"3\"><a href=\"https://huggingface.co/embedded-language-flows/ELF-B-xsum\">ELF-B-xsum</a></td>\n</tr>\n<tr><td align=\"left\">Metric</td>\n<td align=\"center\">BLEU ↑</td>\n<td align=\"center\">ROUGE-1 ↑</td>\n<td align=\"center\">ROUGE-2 ↑</td>\n<td align=\"center\">ROUGE-L ↑</td>\n</tr>\n<tr><td align=\"left\">Score (paper)</td>\n<td align=\"center\">26.4</td>\n<td align=\"center\">36.0</td>\n<td align=\"center\">12.2</td>\n<td align=\"center\">27.8</td>\n</tr>\n</tbody></table>\n\nSlight differences in metrics may arise from different compute setups. Our results were computed on TPU v5p-64.\n\n#### Sanity Check\n\n1. **Get the checkpoint.** All pre-trained checkpoints are on HuggingFace under [`embedded-language-flows`](https://huggingface.co/embedded-language-flows) and are pulled automatically via `--checkpoint_path <hf-repo-id>` — no manual download needed. To use a locally trained checkpoint, pass the path to the specific checkpoint file, e.g. `--checkpoint_path outputs/elf_b-owt/checkpoint_19000`.\n\n2. **(Optional) Tweak the config.** The provided `configs/training_configs/train_owt_ELF-{B,M,L}.yml` already point at the correct HuggingFace data + T5 encoder, so they run as-is. You may want to edit:\n    - `output_dir` — where samples and logs are written\n    - `wandb_entity` — set to your entity, or set `use_wandb: false` to disable\n    - `sampling_configs_path` — defaults to `configs/sampling_configs/uncond_sampling_configs.yml` (32-step SDE + 64-step SDE, both with self-conditioning CFG); swap for your preferred schedule if needed\n\n3. **Launch evaluation.**\n\n**Unconditional generation:**\n```bash\ncd src/\n\n  # ELF-B (105M)\n  python eval.py \\\n      --config configs/training_configs/train_owt_ELF-B.yml \\\n      --checkpoint_path embedded-language-flows/ELF-B-owt\n\n  # ELF-M (342M) — smaller batch to fit the bigger model\n  python eval.py \\\n      --config configs/training_configs/train_owt_ELF-M.yml \\\n      --checkpoint_path embedded-language-flows/ELF-M-owt \\\n      --config_override global_batch_size=64\n\n  # ELF-L (652M)\n  python eval.py \\\n      --config configs/training_configs/train_owt_ELF-L.yml \\\n      --checkpoint_path embedded-language-flows/ELF-L-owt \\\n      --config_override global_batch_size=64\n```\nThe evaluator generates 1,000 samples and reports Gen. PPL (under a pretrained GPT-2 Large) and unigram entropy. Expected: Gen. PPL ≈ 24 and entropy ≈ 5.15 for ELF-B at 32 SDE steps.\n\n**Conditional generation:**\n```bash\ncd src/\n\n# XSum (summarization)\npython eval.py \\\n    --config configs/training_configs/train_xsum_ELF-B.yml \\\n    --checkpoint_path embedded-language-flows/ELF-B-xsum\n\n# WMT14 De-En (translation)\npython eval.py \\\n    --config configs/training_configs/train_de-en_ELF-B.yml \\\n    --checkpoint_path embedded-language-flows/ELF-B-de-en\n```\nThe evaluator runs on each task's **validation** set and reports BLEU for WMT14 De-En and ROUGE-1/2/L for XSum. Expected: BLEU ≈ 26.7 on De-En; ROUGE-1/2/L ≈ 36.3 / 12.5 / 28.1 on XSum. Note that the paper numbers are computed on the **test** sets, so validation scores here may differ slightly.\n\n## Data Preparation\n\nThree task settings: unconditional generation on **OpenWebText**, machine translation on **WMT14 De-En**, and summarization on **XSum**. All use a frozen T5 encoder for text-to-embedding mapping.\n\n#### Pre-tokenized splits\n\nWe provide pre-tokenized splits (T5 tokenizer) and the JAX T5-small encoder on HuggingFace under [`embedded-language-flows`](https://huggingface.co/embedded-language-flows). They are loaded directly via `datasets.load_dataset` — no manual download needed. Defaults wired into the configs:\n\n| Task | `data_path` / `eval_data_path` |\n| --- | --- |\n| OpenWebText | `embedded-language-flows/openwebtext-t5` |\n| WMT14 De-En | `embedded-language-flows/wmt14_de-en_{train,validation}_t5` |\n| XSum | `embedded-language-flows/xsum_{train,validation}_t5` |\n| T5 encoder | `embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl` |\n\nTo use a local copy, point `data_path` at a directory saved with `datasets.save_to_disk` — the loader falls back to `load_from_disk`.\n\n#### Prepare your own data\n\nTo train on a custom dataset, pre-tokenize it with the tokenizer and save it as a HuggingFace `Dataset` (Arrow).\n\n**Unconditional generation** (e.g., OWT): each example needs only `input_ids` — the token ids of the text to be generated.\n\n**Conditional generation** (e.g., translation, summarization): each example needs both `input_ids` (target/output text) and `condition_input_ids` (source/input text, e.g., the German sentence or the article). The collator prepends `condition_input_ids` to `input_ids` and builds the appropriate attention masks automatically.\n\nMinimal recipe:\n\n```python\nfrom datasets import Dataset\nfrom transformers import T5Tokenizer\n\ntok = T5Tokenizer.from_pretrained(\"google-t5/t5-small\")\n\n# Unconditional\ndef encode_uncond(ex):\n    return {\"input_ids\": tok(ex[\"text\"], add_special_tokens=False)[\"input_ids\"]}\n\n# Conditional (translation / summarization)\ndef encode_cond(ex):\n    return {\n        \"condition_input_ids\": tok(ex[\"source\"], add_special_tokens=False)[\"input_ids\"],\n        \"input_ids\": tok(ex[\"target\"], add_special_tokens=False)[\"input_ids\"],\n    }\n\nds = Dataset.from_list(my_examples).map(encode_uncond, remove_columns=...)  # or encode_cond\nds.save_to_disk(\"/path/to/my_dataset\")\n```\n\nThen point your config at it:\n\n```yaml\ndata_path: /path/to/my_dataset\neval_data_path: /path/to/my_eval_dataset   # optional\n```\n\nFor evaluation-only JSONL inputs (raw text, tokenized at load time), see `load_jsonl_dataset` in [data_utils.py:110-130](src/utils/data_utils.py#L110-L130) — set `eval_data_path` to a `.jsonl` file with one `{\"input\": ..., \"output\": ...}` example per line.\n\n## Training\n\nRun the following command to launch training:\n\n```bash\npython train.py --config configs/training_configs/train_owt_ELF-B.yml\n```\n\nAvailable training configs:\n\n- `configs/training_configs/train_owt_ELF-B.yml` — unconditional generation on OpenWebText, ELF-B (default)\n- `configs/training_configs/train_owt_ELF-M.yml` — unconditional generation on OpenWebText, ELF-M\n- `configs/training_configs/train_owt_ELF-L.yml` — unconditional generation on OpenWebText, ELF-L\n- `configs/training_configs/train_de-en_ELF-B.yml` — WMT14 De-En machine translation\n- `configs/training_configs/train_xsum_ELF-B.yml` — XSum abstractive summarization\n\nDefault ELF-B training uses Muon at blr=0.001 (base learning rate; effective lr = blr × batch_size / 256 = 0.002 at the default batch size of 512), global batch size 512, and runs 5 epochs on OWT (~95K steps) on TPU v5p-64 (~1.5 h per epoch).\n\n#### Config System\n\nThe training system uses two config layers:\n\n- **`configs/config.py`** — base `Config` dataclass with all default hyperparameters\n- **`configs/training_configs/*.yml`** — task-specific overrides loaded by `load_config_from_yaml()`\n\nThe system merges these, allowing you to customize only the parameters you need.\n\n#### Customizing Training\n\nTo create a custom experiment:\n\n1. **Create a new config file** (e.g., `configs/training_configs/my_exp.yml`)\n2. **Launch with your config:**\n   ```bash\n   python train.py --config configs/training_configs/my_exp.yml\n   ```\n\n**Example custom config:**\n\n```yaml\nmodel: ELF-M                # Use ELF-M model (342M)\n\nepochs: 4\nglobal_batch_size: 512\nblr: 0.002\noptimizer: muon\n\ndenoiser_p_mean: -1.5       # Logit-normal time schedule\ndenoiser_p_std: 0.8\ndenoiser_noise_scale: 2.0\nself_cond_prob: 0.5\ndecoder_prob: 0.2           # 20% decoding (CE) / 80% denoising (L2)\n```\n\nFor more details on configuration options, refer to `config.py` and the YAML files under `configs/training_configs/`.\n\n#### Sampling Configuration\n\nSampling is decoupled from training and is controlled by a separate YAML in `configs/sampling_configs/`, referenced from each training config via `sampling_configs_path`:\n\n- `uncond_sampling_configs.yml` — unconditional generation: two SDE schedules, 32-step (γ=1.5) and 64-step (γ=1.0), both with SC-CFG=3\n- `cond_sampling_configs.yml` — conditional generation (translation / summarization): one 64-step ODE schedule with CFG=2 and SC-CFG=1\n\nEach list entry specifies a sampler (`ode` / `sde`), `num_sampling_steps`, `cfgs`, `self_cond_cfg_scales`, and `time_schedule`. The evaluator iterates through all entries.\n\n## Checkpointing\n\nCheckpoints are saved at the end of each epoch (or at fractional intervals if `save_freq < 1`) to `output_dir/checkpoint_<step>`, keeping up to 10 recent checkpoints. Only process 0 writes to disk.\n\nIf `hf_repo_id` is set in the config, the entire `output_dir` is uploaded to HuggingFace after each save.\n\n**Auto-resume:** if `--resume` is not specified, training automatically detects and resumes from the latest checkpoint in `output_dir`.\n\n**Loading:** `load_checkpoint` accepts a local path or an HF repo ID (e.g., `embedded-language-flows/ELF-B-owt`). For a directory, it uses the latest checkpoint inside.\n\nThe T5 encoder weights (`encoder_checkpoint`) are stored separately as a `.pkl` file and loaded once at startup. They can also be specified as an HF path (default: `embedded-language-flows/t5_small_encoder_jax/t5_small_encoder_jax.pkl`).\n\n## License\n\nThis repo is under the MIT license. See [LICENSE](LICENSE) for details.\n\n## Citation\n\nIf you find this work useful in your research, please consider citing our paper :)\n\n```bib\n@article{elf2026,\n  title={ELF: Embedded Language Flows},\n  author={Hu, Keya and Qiu, Linlu and Lu, Yiyang and Zhao, Hanhong and Li, Tianhong and Kim, Yoon and Andreas, Jacob and He, Kaiming},\n  journal={arXiv preprint arXiv:2605.10938},\n  year={2026}\n}\n```\n\n## Acknowledgement\n\nWe gratefully acknowledge the Google TPU Research Cloud (TRC) for granting TPU access.\nWe hope this work will serve as a useful resource for the open-source community.\n","summary":"ELF (Embedded Language Flows) is the official JAX implementation of the “ELF: Embedded Language Flows” paper, providing a continuous diffusion language modeling approach built on continuous-time Flow Matching. The key idea is that generation mostly evolves in a continuous embedding space and only discretizes into tokens at the final time step using a shared-weight network, which also makes techniques like classifier-free guidance straightforward to apply. The code is designed to run and is tested on TPUs, with pretrained checkpoints available via Hugging Face, and a PyTorch implementation provided on the `pytorch_elf` branch. This project will benefit researchers and ML practitioners interested in efficient diffusion-style text generation, continuous-time generative modeling, and adapting image-domain diffusion techniques to language.","description":null,"stars":804,"language":"Python"},{"owner":"paraschopra","repo":"make-pages-interactive","url":"https://github.com/paraschopra/make-pages-interactive","readme":"# make-pages-interactive\n\nA Claude Code skill that turns any folder of static HTML pages into a **live commenting surface**. Highlight text, click an element, leave a note — the comment lands in a local inbox that Claude reads and responds to by editing the page. The page auto-reloads with a walkthrough of what changed.\n\nOriginally built for iterating on research artifacts (long HTML reports with plots, tables, explanations) but works for any folder of HTML: docs, design mocks, generated reports, prototype UIs.\n\n![Screenshot of make-pages-interactive in action](screenshot.png)\n\n---\n\n## How it works\n\n```\n                  ┌──────────────────┐\n   user highlights│   feedback.js    │   POST /feedback\n   / clicks  ───▶ │  (in every page) │ ───────────────┐\n                  └──────────────────┘                 ▼\n                                              ┌────────────────┐\n                  ┌──────────────────┐  poll  │   server.py    │\n   page reloads ◀─│   feedback.js    │ ◀───── │  (stdlib HTTP) │\n   with walkthru  └──────────────────┘history │                │\n                                              └───────┬────────┘\n                                                      │ append\n                                          ┌───────────▼────────────┐\n                                          │  feedback/inbox.jsonl  │\n                                          └───────────┬────────────┘\n                                                      │ Monitor\n                                                      ▼\n                                          ┌────────────────────────┐\n                                          │  Claude (the agent)    │\n                                          │  edits HTML, appends   │\n                                          │  feedback/history.json │\n                                          └────────────────────────┘\n```\n\nThe skill is **just three pieces**:\n\n| File | Role |\n|------|------|\n| `lib/feedback.js` | Client library injected into every page. Handles text selection, element selection, comment editor, page-reload walkthrough. |\n| `lib/feedback.css` | Styles for the comment UI. |\n| `lib/server.py` | ~250-line stdlib-only HTTP server. Serves the page directory, accepts comment POSTs, serves the lib/ files from `/lib/*`. Auto-shuts-down on parent death or 10 min of idle so it doesn't leak processes. |\n\nPlus glue:\n\n| File | Role |\n|------|------|\n| `SKILL.md` | What Claude Code reads to know when and how to invoke the skill. |\n| `scripts/inject.py` | Idempotently injects (or removes) the two `<link>`/`<script>` tags in every `*.html` in a directory. |\n| `scripts/update.py` | `git pull --ff-only` inside the skill directory. |\n\n---\n\n## Install\n\n```bash\ngit clone https://github.com/paraschopra/make-pages-interactive \\\n  ~/.claude/skills/make-pages-interactive\n```\n\nThat's it. Claude Code auto-discovers any folder under `~/.claude/skills/` that contains a `SKILL.md`.\n\nUpdates are explicit:\n\n```bash\npython ~/.claude/skills/make-pages-interactive/scripts/update.py\n```\n\nOr just say \"update the make-pages-interactive skill\" in Claude Code.\n\n---\n\n## Usage\n\nInside any Claude Code session, say:\n\n> \"Make these pages interactive.\"\n\n(or any of: \"make this page interactive\", \"let me comment on this page\", \"add feedback to these pages\")\n\nClaude will:\n\n1. Inject the feedback library tags into every `*.html` in the current directory.\n2. Create `feedback/inbox.jsonl` and `feedback/history.json`.\n3. Pick a free port (5050 by default, falls back if taken).\n4. Start the server in the background.\n5. Tell you the URL to open.\n6. Start monitoring the inbox so any comment you leave gets picked up immediately.\n\nOpen the URL. Comment away. Claude edits the page in response.\n\n### Removing the feedback layer\n\nTo get a clean static copy back (no `/lib/` dependencies in the HTML):\n\n```bash\npython ~/.claude/skills/make-pages-interactive/scripts/inject.py ./your-dir --remove\n```\n\nOr say \"remove the feedback layer from these pages.\"\n\n---\n\n## How the server shuts down\n\nThe server is designed to never leak — three ways it goes away:\n\n1. **Parent-process death** *(automatic, ~5–10 s)*. The server records its parent PID at startup and polls every 5 s. When the parent dies (e.g., you close the Claude Code window that launched it), the kernel reparents the server to PID 1 — the watchdog notices and calls `os._exit(0)`. Skipped if the server was started detached at launch (parent was already PID 1, e.g. `nohup`).\n\n2. **Idle timeout** *(automatic, default 10 min)*. The page polls `/feedback/history.json` every ~4 s, so any open browser tab keeps the server alive. When no client requests have arrived for `--idle-timeout` seconds (default `600`), the server exits. Pass `--idle-timeout 0` to disable.\n\n3. **Manual stop**. Either:\n   - Say \"stop the feedback server\" in your Claude Code session — Claude runs `lsof -ti:5050 | xargs kill` (adjust the port if you used a non-default one).\n   - Or hit `Ctrl-C` in the terminal where the server is logging.\n\nYou generally don't need to think about this. The auto-shutdowns mean abandoned servers self-clean — close your Claude window and within ~10 s the port is free again.\n\n---\n\n## Comment types\n\nThe library supports three commenting modes:\n\n- **Text selection** — highlight any text, a popup offers \"comment on selection\".\n- **Element selection** — click the \"select element\" tool, then click an image, table, section. Comment is anchored to a stable selector.\n- **Page-level** — a floating button leaves notes that aren't tied to any specific element.\n\nEach comment carries a stable `cf_id`, a selector describing what was pointed at, the comment body, and a timestamp. The library batches comments client-side and submits as a single POST so Claude responds to a coherent set rather than firing on every keystroke.\n\n---\n\n## When Claude responds\n\nWhen you submit a batch:\n\n1. A \"processing…\" banner appears at the top of the page.\n2. Your tab title changes to `🔔 …` so you can see progress in a backgrounded tab.\n3. Claude edits the relevant HTML, appends an entry to `feedback/history.json` that maps your comment ids → the changes made.\n4. The page polls `history.json` every ~4 seconds, notices the new entry, and auto-reloads — preserving your scroll position.\n5. Post-reload, a walkthrough appears highlighting each changed region with the title Claude gave it. Press `R` to dismiss; the changes stay in the history sidebar.\n\n---\n\n## Repo layout\n\n```\nmake-pages-interactive/\n├── SKILL.md              # Agent-facing skill spec\n├── README.md             # This file\n├── screenshot.png        # README screenshot\n├── LICENSE\n├── lib/\n│   ├── feedback.js\n│   ├── feedback.css\n│   └── server.py\n└── scripts/\n    ├── inject.py\n    └── update.py\n```\n\n---\n\n## Why this exists\n\nI kept building long HTML research reports and wanting to leave inline notes on them — \"expand this section\", \"this plot is misleading\", \"what about edge case X?\" — without breaking out of the page to write a separate to-do list. This skill turns that into a one-liner: every page is now a place I can scribble on, and Claude turns the scribbles into edits.\n\nThe same workflow works for design docs, generated dashboards, code walkthroughs, anything that lives as HTML.\n\n---\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"make-pages-interactive is a Claude Code skill that turns a folder of static HTML pages into an interactive commenting surface. It injects a client UI and a small stdlib-only local server so users can highlight text or click elements, leave notes in a local inbox, and have Claude respond by editing the page and auto-reloading with a walkthrough of changes. Built for iterating on long research artifacts, it also works well for docs, design mocks, generated reports, and prototype UIs. This is best for teams or individuals who want fast, in-context feedback loops on static HTML without needing a full backend or heavy tooling.","description":null,"stars":339,"language":"JavaScript"},{"owner":"POWER-PILL","repo":"ASCII-Aquarium","url":"https://github.com/POWER-PILL/ASCII-Aquarium","readme":"## Meet the ASCII Aquarium ><(((°> \n<table>\n  <tr>\n    <td width=\"45%\" valign=\"top\">\n<p>\n  A tiny animated ASCII fish tank for the ESP32-2432S028R Cheap Yellow Display.\n</p>\n      <p>\n      Flash it from the browser, tap to feed the fish, tune the tank, sync the clock over Wi-Fi, and let the punctuation swim.\n      </p>\n      <p>\n        <a href=\"https://power-pill.github.io/ASCII-Aquarium/\">\n          Flash ASCII Aquarium CYD\n        </a>\n      </p>\n      <p>\n        ASCII Aquarium turns the common 320x240 CYD touchscreen into a living little\ndesktop aquarium with swimming ASCII fish, rising bubbles, swaying seaweed,\ntap-to-feed flakes, occasional octopus and seahorse visitors, touch controls,\nWi-Fi time sync, persistent settings, and SD-card screenshot capture.\n</p>\n<p>\n        It is not a video loop. The aquarium is rendered live on the ESP32, with fish\nthat wander, school, turn around, change brightness, avoid each other, and chase\nfood when you tap the glass.\n      </p>\n    </td>\n    <td width=\"55%\" valign=\"top\">\n      <img\n        src=\"https://github.com/user-attachments/assets/34200303-25c9-45c5-a6eb-1e53a6c267d7\"\n        alt=\"ASCII Aquarium Title Screen\"\n        width=\"100%\">\n    </td>\n  </tr>\n</table>\n\nCheck out the article on Hackaday! https://hackaday.com/2026/05/24/adorable-ascii-aquarium-lives-on-your-desk\n\n## GIFs of the ASCII AQUARIUM in Action }>{{{{• >\n\n<table>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n    <img\n        src=\"https://github.com/user-attachments/assets/b350f4ad-5aa9-4560-84a4-927dffa96d35\"\n        alt=\"Settings\"\n        width=\"100%\">\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <img\n        src=\"https://github.com/user-attachments/assets/12696457-80b7-4ba0-9382-38a2e72ea84d\"\n        alt=\"Feeding the Fish\"\n        width=\"100%\">\n    </td>\n  </tr>\n</table>\n\n## ASCII Aquarium Web Flasher >)))'>\n\nThe easiest way to install ASCII Aquarium\n is with the browser flasher:\n\n[Flash ASCII Aquarium CYD](https://power-pill.github.io/ASCII-Aquarium/)\n\nYou will need:\n\n- A supported [CYD board](https://www.aliexpress.com/item/1005004971720824.html) connected by a USB data cable.\n- Chrome or Edge on a desktop computer.\n- The Arduino IDE Serial Monitor closed, if it was open.\n\nOpen the flasher page, click **Flash ASCII Aquarium**, choose the CYD serial\nport, and let the installer finish.\n\n## Supported Hardware ><(((º>\n\nThis firmware is built for the [ESP32-2432S028R \"Cheap Yellow Display\" board](https://www.aliexpress.com/item/1005004971720824.html):\n\n[https://www.aliexpress.com/item/1005004971720824.html](https://www.aliexpress.com/item/1005004971720824.html)\n\n- ESP32\n- ILI9341 320x240 display\n- XPT2046 resistive touchscreen\n- Optional SD card support for BMP screenshots and frame capture\n\nOther CYD-style boards may look similar but use different display, touch, or SD\nhardware.\n\n## 3D Printed 2.8\" CYD Cases ><((((>`\n- [Basic snapfit case by PowerPill.Prints](https://makerworld.com/en/models/2835243)\n- [CYD Desk Buddy by annaglyph](https://makerworld.com/en/models/2787810) \n\n## Features >(°)>\n\n- Animated ASCII fish with multiple glyph species, varied colors, depth shading,\n  smooth wraparound, schooling, wandering, and separation behavior.\n- Tap-to-feed flakes that nearby fish chase down.\n- Configurable fish population from 6 to 36.\n- Configurable bubble count from 0 to 50.\n- Animated bubbles and seaweed with adjustable sway, length, and randomness.\n- Visiting octopus and seahorse characters with selectable spawn rates.\n- Fish steer around visitors and each other.\n- Background styles: black, blue fade, purple fade, and randomized Spongebob style flower backdrop.\n- Touch settings menu with Tank, Seaweed, Clock, and Background tabs.\n- Optional on-screen clock with manual time or internet time.\n- 12-hour and 24-hour clock formats.\n- Timezone selection, small top or bottom clock, large ASCII clock style, and clock color picker.\n- Wi-Fi panel with network scan, saved credentials, on-screen keyboard, reconnect handling, and NTP time sync.\n- Persistent settings using ESP32 Preferences.\n- SD-card BMP screenshots and frame sequence capture.\n- Hidden HUD controls for setup, capture, Wi-Fi, settings, quick creature tests, respawn, and randomize.\n\n## Basic Controls ><((((*>\n\n<table>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n <p>• Tap the top-left corner to reveal the hidden HUD.</p>\n <p>• Tap the tank to drop food.</p>\n <p>• Use the settings panel to tune fish, bubbles, visitors, seaweed, clock, and\n  backgrounds.</p>\n <p>• Use the Wi-Fi panel to connect to a network and sync internet time.</p>\n <p>• Use the capture panel to save BMP sequences to the SD Card. BEWARE - this is EXTREMELY slow since the fishtank simulation is slowed down to allow every frame to be captured.</p>\n <p>• Press and hold the BOOT button on the back of the CYD to save BMP screenshots to the SD card.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <img\n        src=\"https://github.com/user-attachments/assets/3a448574-69ee-40fb-a141-50961f769b09\"\n        alt=\"ASCII Aquarium Settings\"\n        width=\"100%\">\n    </td>\n  </tr>\n</table>\n\n## Using the Beam Splitter cube Display ><>\n\nThis build can also use a 50 mm beam splitter cube to give the aquarium a little \"floating in glass\" look. \n\nA beam splitter cube is made from two glass prisms joined together with a partially reflective diagonal layer inside. When the CYD screen shines into the cube, some of that light passes through and some of it reflects off the internal 45-degree surface. To your eyes, the aquarium appears to hover inside the cube instead of just sitting flat on the display. It is basically a tiny optical tide pool.\n\nIf using the clock with the beam splitter cube, you will need to enable “flip clock” in the clock style settings window.\n\n<table>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n<p>• Use the 50 mm cube size for this printed stand.</p>\n<p>• Handle the cube by the edges and wipe fingerprints with a clean micro-fiber cloth. Smudges are the enemy of premium fish.</p>\n<p>• Seat the cube squarely in the holder so the clear face points toward the viewer.</p>\n<p>• Keep the display bright and the surrounding room a little dimmer if you want the fish to really pop.</p>\n<p>• A dark base or darker background behind the cube helps the reflection look cleaner.</p>\n<p>• If the image looks faint, doubled, or not quite centred, rotate or flip the cube and try again. Beam splitters can be a bit fin-icky about orientation.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <img\n        src=\"https://github.com/user-attachments/assets/36b6a33d-72d2-48c5-ae38-65e8de0e304c\"\n        alt=\"ASCII Aquarium Holo Cube\"\n        width=\"100%\">\n    </td>\n  </tr>\n</table>\n\nThe cube does not create the animation by itself; the CYD is still doing all the swimming, bubbling, clocking, and snack-chasing. The cube just splits and redirects the light so the tank feels more like a miniature glass aquarium and less like a bare screen. No water required, unless you count the tears of anyone who bought a real aquarium and then learned about water changes.\n\n## Build From Source ><>\n\nThe main Arduino sketch lives here:\n\n```text\nASCII_Aquarium_CYD/ASCII_Aquarium_CYD.ino\n```\n\nThe sketch expects the CYD display and touch configuration used by the included\nTFT_eSPI setup files:\n\n```text\nUser_Setup.h\nUser_Setup_Select_CYD.h\n```\n\nTo build manually:\n\n1. Open `ASCII_Aquarium_CYD.ino` in the Arduino IDE.\n2. Select the same ESP32 board/settings used for your CYD.\n3. Make sure TFT_eSPI is using the included CYD setup.\n4. Compile and upload through the Arduino IDE.\n\nFor browser flashing releases, use Arduino IDE's **Export Compiled Binary** and\npublish the generated merged firmware binary.\n\n\n## Project Notes >°>\n\nASCII Aquarium CYD is part clock, part screensaver, part tiny art object, and\npart excuse to make fish-shaped punctuation swim around like it has somewhere\nimportant to be.\n\nNo water changes. No tank cycling. No surprise snails. Just plug it in and let\nthe current take care of itself.\n","summary":"ASCII Aquarium is a live-rendered animated ASCII “fish tank” firmware for the ESP32-2432S028R Cheap Yellow Display (320x240 with resistive touch), turning the touchscreen into a desktop aquarium. It features swimming and behaving ASCII fish (including schooling/separation and food-chasing), rising bubbles, swaying seaweed, occasional visitors like octopus and seahorses, and touch interactions such as tap-to-feed plus a settings menu. Optional Wi‑Fi time synchronization with configurable on-screen clock and persistent settings round it out, with SD-card support for BMP screenshot capture. This project is best for makers and retro-style embedded developers who want an entertaining, interactive display demo they can flash easily via a browser-based flasher.","description":"ASCII Aquarium turns your Cheap Yellow Display into an tiny animated ASCII fish tank. It renders a live aquarium scene with animated fish, bubbles, swaying seaweed, tap-to-feed food flakes, occasional octopus & seahorse visitors, selectable backgrounds, preferences, optional Wi-Fi clock sync, & More!","stars":250,"language":"C++"},{"owner":"hieunc229","repo":"mailflare","url":"https://github.com/hieunc229/mailflare","readme":"# Mailflare\n\nA self-hosted, AI-powered email inbox with custom domains, powered by Cloudflare\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/hieunc229/mailflare)\n\n![](/screenshot.png)\n\n\n### Roadmap\n\n- [x] Domain onboarding through Cloudflare, including inbound Email Routing DNS and sending DNS setup.\n- [x] Domain removal cleanup for linked Cloudflare routing rules and sending subdomain resources.\n- [x] Mailbox creation with automatic Cloudflare Email Routing rules.\n- [x] Mailbox management with a grid view, mailbox detail page, and editable display name.\n- [x] Inbox, sent, drafts, spam, and trash folders backed by a shared mail list component.\n- [x] Popup composer with autosaved drafts and draft resume from the drafts folder.\n- [x] Outbound send API, API keys, message read status, spam/trash moves, and seeded demo data.\n- [x] Search, filtering, and richer mailbox/folder counts.\n- [ ] Advanced routing rules for catch-all addresses, forwarding, reject/block rules, and priorities.\n- [ ] Webhook management UI and delivery retry visibility.\n- [ ] Attachment support and richer compose formatting.\n\n#### Email agent\n\n- [ ] Message intelligence with summaries, intent classification, urgency scoring, and extracted entities.\n- [ ] Agent task queue for proposed replies, follow-ups, triage actions, and missing-information requests.\n- [ ] Human-approved actions for draft replies, folder moves, forwarding, contact creation, and webhook calls.\n- [ ] Agent rules for learned post-receipt policies such as prioritization, auto-triage, and reply templates.\n- [ ] Agent inbox view organized by action state, including needs reply, waiting on me, waiting on them, FYI, auto-handled, and needs approval.\n- [ ] Thread and contact memory for prior summaries, user preferences, relationship notes, commitments, and open loops.\n- [ ] Tool execution for trusted actions such as sending email, creating drafts, updating message status, calling webhooks, and creating contacts.\n\n## Domain API\n\nDomains are **not** dashboard-only. This app calls Cloudflare when you add/remove a domain:\n\n| Action | Cloudflare API |\n|--------|----------------|\n| List DNS / status | `GET /zones/{zone_id}/email/routing/dns` |\n| Enable inbound routing + MX/SPF/DKIM | `POST /zones/{zone_id}/email/routing/dns` |\n| Disable routing | `DELETE /zones/{zone_id}/email/routing/dns` |\n| Enable subdomain sending + DNS | `POST /zones/{zone_id}/email/sending/subdomains` |\n| Remove subdomain sending | `DELETE /zones/{zone_id}/email/sending/subdomains/{tag}` |\n| Subdomain sending DNS records | `GET .../subdomains/{tag}/dns` |\n\n**Requirements:** Prefer `CF_TOKEN` with Zone Read + Email Routing Edit + Email Sending Edit + Email Routing Rules Write (or broader). If you use a legacy Global API Key instead, set `CF_API_KEY` and `CF_EMAIL`. The hostname must be the account's Cloudflare zone apex or a subdomain under that zone. Root-domain sending uses the Cloudflare Email Service binding, while subdomain sending can also provision the sending-subdomain DNS records. Mailbox creation creates a Cloudflare Email Routing rule that sends that address to `CF_EMAIL_WORKER_NAME` (`mailflare` by default).\n\nApp routes:\n\n- `GET/POST /api/domains` — list / add (calls Cloudflare)\n- `GET/DELETE /api/domains/[id]` — get / remove (disables routing & sending on CF)\n- `GET /api/domains/[id]/dns` — routing + sending DNS snapshot\n\n## Setup\n\n```bash\ncp .dev.vars.example .dev.vars\n# Add CF_TOKEN and optionally CF_ACCOUNT_ID.\n# For a legacy Global API Key, use CF_API_KEY + CF_EMAIL instead.\n\nnpm install\nnpm run db:migrate:local\nnpm run dev\n```\n\nRegister at `/register`, complete `/onboarding`, or seed dev data:\n\n```bash\ncurl -X POST http://localhost:3000/api/seed\n```\n\n## Deploy\n\n### One-click Cloudflare deploy\n\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/hieunc229/mailflare)\n\nPublish this repository to GitHub, then replace `hieunc229/mailflare` in the button at the top of this README with the public repository path.\n\nThe deploy flow reads `wrangler.jsonc`, provisions the Worker bindings, prompts for values from `.dev.vars.example`, runs D1 migrations, builds the OpenNext Worker, and deploys it.\n\nKeep `wrangler.jsonc` committed. Cloudflare's deploy button uses it to detect the Worker entrypoint and required bindings. Do not commit `.dev.vars`; deploy-time secrets should be entered through Cloudflare's setup flow or set locally in `.dev.vars`.\n\nRequired setup values:\n\n- `CF_TOKEN` — runtime scoped Cloudflare API token with Zone Read, Email Routing Edit, Email Sending Edit, and Email Routing Rules Write. This is separate from Cloudflare's deploy/build token; Cloudflare does not automatically expose the deploy token to this app.\n- `CF_ACCOUNT_ID` — optional unless your token can access multiple accounts.\n- `CF_EMAIL_WORKER_NAME` — must match the Worker name in `wrangler.jsonc`; default is `mailflare`.\n\nIf you rename the Worker, also update related literal resource names in `wrangler.jsonc`: `name`, `services[].service` for `WORKER_SELF_REFERENCE`, `CF_EMAIL_WORKER_NAME`, and any D1/R2/Queue names you want renamed. Cloudflare service bindings require the target Worker name to exist exactly; they cannot currently reference `name` dynamically.\n\nAfter deployment, route inbound mail to the Worker in Cloudflare Email Routing.\n\n### Cloudflare token troubleshooting\n\nIf onboarding fails with `Cloudflare API 403 ... code 9109: Invalid access token`, Cloudflare rejected the credential before checking domain permissions.\n\nThe Deploy to Cloudflare flow can authenticate and deploy the Worker, but it does not create a runtime `CF_TOKEN` for Mailflare's onboarding API calls. Create `CF_TOKEN` manually from Cloudflare dashboard user API tokens and enter it as a deploy secret/variable.\n\nVerify the token:\n\n```bash\ncurl \"https://api.cloudflare.com/client/v4/user/tokens/verify\" \\\n  -H \"Authorization: Bearer <CF_TOKEN>\"\n```\n\nThe response should include `\"success\": true` and `\"status\": \"active\"`. In `.dev.vars` or deploy settings, set `CF_TOKEN` to the token secret value only. Do not include the word `Bearer`, do not use the token ID, and do not put a Global API Key in `CF_TOKEN`. For a Global API Key, set both `CF_EMAIL` and `CF_API_KEY` instead.\n\nAlso check whether the token has an expiration, a `not_before` time, or client IP restrictions. If you changed deploy variables in Cloudflare, redeploy so the Worker receives the new values.\n\n### Manual deploy\n\n```bash\nnpm run deploy\n```\n\n`npm run deploy` applies remote D1 migrations before deploying. Cloudflare's deploy button can auto-provision the D1 database, R2 bucket, and queues declared in `wrangler.jsonc`; for manual deployments, create or update those bindings in Cloudflare if they do not already exist.\n","summary":"Mailflare is a self-hosted, AI-assisted email inbox that runs on Cloudflare, letting you manage custom domains and mailboxes without relying on a mainstream hosted provider. It supports end-to-end domain onboarding and cleanup via Cloudflare Email Routing (including DNS setup), mailbox creation tied to automatic routing rules, and core inbox features like sent/drafts/spam/trash, an autosaving composer, search and filtering, and an outbound sending API with message status tracking. The included “email agent” roadmap aims to add deeper AI features such as summarization, intent/urgency extraction, triage workflows, and human-approved actions before sending or moving messages. This project is a good fit for developers and privacy-conscious teams who want to run their own email UI backed by Cloudflare and potentially layer in AI-driven inbox triage and automation.","description":"Email client with custom domain based on Cloudflare","stars":208,"language":"TypeScript"},{"owner":"FlashML-org","repo":"flashlib","url":"https://github.com/FlashML-org/flashlib","readme":"# FlashLib\n\nA GPU library for classical machine-learning operators — `kmeans`, `knn`,\n`pca`, `svd`, `dbscan`, `hdbscan`, `umap`, `t-sne`, regression, GEMM, and\nmore — built on Triton and CuteDSL.\n\nSee [the blog post](https://flashml-org.github.io/) for motivation, design,\nand benchmarks.\n\n## Installation\n\nInstall with `pip`:\n\n```bash\npip install flashlib\n```\n\nFrom source:\n\n```bash\ngit clone https://github.com/FlashML-org/flashlib.git\ncd flashlib\npip install -e .\n```\n\n## Usage\n\n```python\nimport torch\nfrom flashlib import flash_kmeans\n\nx = torch.randn(1_000_000, 128, device=\"cuda\", dtype=torch.float32)\nlabels, centroids, n_iter = flash_kmeans(x, n_clusters=1024, max_iters=20)\n```\n\nEvery primitive is exposed as a top-level `flash_*` function and as a\nsklearn-style class (`KMeans`, `PCA`, `HDBSCAN`, …).\n\n### Informative API\n\nThe `flashlib.info` submodule predicts runtime, FLOPs, and HBM bytes for any\nprimitive in ~5&nbsp;µs on pure CPU — useful for budgeting a pipeline before\nlaunching it, and small enough for an LLM agent to call in a GPU-less\nenvironment. It does not import torch, triton, or cutlass.\n\n```python\nimport flashlib.info as info\n\nest = info.estimate(\"kmeans\",\n                    shape=(100_000, 64),\n                    params={\"K\": 256, \"max_iters\": 20},\n                    device=\"H200\")\nprint(est.summary_line())\n```\n\nSee the blog post for the full API, the tolerance-driven dispatch, and\nper-primitive benchmarks.\n\n## Coverage\n\nThe current release ships **15 high-level primitives** across the following families:\n\n| family         | primitives                                                                       |\n| -------------- | -------------------------------------------------------------------------------- |\n| Clustering     | `flash_kmeans`, `flash_dbscan`, `flash_hdbscan`, `flash_spectral_clustering`     |\n| Nearest nbrs   | `flash_knn`                                                                      |\n| Decomposition  | `flash_pca`, `flash_truncated_svd`                                               |\n| Manifold       | `flash_umap`, `flash_tsne`                                                       |\n| Regression     | `flash_linear_regression`, `flash_ridge`, `flash_logistic_regression`            |\n| Classification | `flash_multinomial_nb`, `flash_random_forest`                                    |\n| Preprocessing  | `flash_standard_scaler`                                                          |\n\nPlus low-level linear-algebra primitives (`cov_gemm`, `gram_gemm`, `ab_gemm`,\n`eigh`, `polar`, `msign`, `cholqr2`, `split_basis`) and a Pareto-frontier set\nof multi-precision GEMM variants (`gemm`, `gemm_tf32`, `gemm_3xtf32`,\n`gemm_bf16`, `gemm_fp16`, `gemm_fp16_x9`, `gemm_fp16_x3_kahan`,\n`gemm_ozaki2_int8`, …).\n\n## Citation\n\n```bibtex\n@misc{yang2026flashlib,\n  title  = {FlashLib: Bringing Flash Magic to Classical Machine Learning Operators},\n  author = {Yang, Shuo and Xi, Haocheng and Zhao, Yilong and Mang, Qiuyang and\n            Wang, Zhe and Sun, Shanlin and Keutzer, Kurt and Gonzalez, Joseph E. and\n            Han, Song and Xu, Chenfeng and Stoica, Ion},\n  year   = {2026},\n  url    = {https://flashml-org.github.io/},\n}\n```\n\n## License\n\n[Apache License 2.0](LICENSE).\n","summary":"FlashLib is a GPU-accelerated library of classical machine-learning operators implemented with Triton and CuteDSL. It provides fast, exposed primitives and sklearn-style APIs for algorithms such as k-means, k-NN, PCA/SVD, UMAP/t-SNE, clustering (DBSCAN/HDBSCAN), and several regression/classification and preprocessing operators, plus supporting linear-algebra building blocks like GEMM and eigendecompositions. The project is also notable for its `flashlib.info` module, which can estimate runtime, FLOPs, and HBM usage without importing CUDA/Triton, helping teams budget pipelines before running them. It’s well-suited for researchers and engineers who want to deploy classical ML workloads efficiently on GPUs or plan performance costs programmatically in tooling and agents.","description":"Fast and memory-efficient classical machine learning operators","stars":408,"language":"Python"},{"owner":"vercel-labs","repo":"mdxg","url":"https://github.com/vercel-labs/mdxg","readme":"# Markdown Experience Guidelines (MDXG)\n\n**A specification for how interfaces should present and interact with markdown documents.**\n\nMarkdown is the most widely supported document format in software. Every AI model speaks it. Every developer reads it. Every platform renders it. But the experience of *using* markdown has barely changed in twenty years.\n\nA 50-line README and a 3,000-line technical spec get the same treatment: a flat scroll of rendered text. No navigation. No structure. No sense of where you are.\n\nMDXG fixes this.\n\n![MDXG Preview](assets/screenshot.png)\n\n*The <a href=\"https://github.com/vercel-labs/mdxg/tree/main/packages/vscode\" target=\"_blank\">MDXG VS Code extension</a>, one implementation of the spec, turning a single markdown file into a navigable, multi-page experience.*\n\n**[Read the spec live at mdxg.org →](https://mdxg.org)**\n\n## What MDXG Is\n\nMDXG is a specification for how interfaces should **present and interact with** markdown documents. It is not a syntax. It does not compete with CommonMark, GFM, or MDX. It sits one layer above, defining the experience, not the format.\n\n| Layer | |\n|-------|---|\n| **MDXG** | presentation + interaction spec |\n| **GFM / MDX** | syntax extensions |\n| **CommonMark** | base syntax spec |\n\nMDXG works on any existing `.md` file with zero modifications. The spec operates at the presentation layer. Your files don't change, the way they are rendered does.\n\nAny interface that displays markdown (editors, documentation platforms, note-taking apps, AI interfaces, CMS systems) can implement MDXG.\n\n### How MDXG is different\n\n**From doc site generators** (VitePress, MkDocs, Docusaurus): MDXG is purely about the reading experience. It works on any `.md` file regardless of how your content is organized.\n\n**From markdown viewer tools** (VS Code extensions, desktop apps): many already provide great features, but each defines its own conventions. MDXG standardizes those conventions so implementations are consistent across platforms.\n\n## The Capabilities\n\nThe full specification is in [SPEC.md](SPEC.md). Here's the summary:\n\n**Virtual pages.** H1 and H2 headings split a document into navigable pages. A single markdown file becomes a multi-page experience. No file splitting, no config, no build step.\n\n**Page navigation.** The user can see all pages, jump to any page, and tell which page they're on. How this is surfaced (sidebar, dropdown, command palette, gesture) is up to the implementation.\n\n**Theme adaptation.** No custom colors. The interface inherits from its host: light, dark, or anything in between.\n\n**Code block rendering.** Fenced code blocks with a language tag get syntax highlighting. Every code block gets a copy button.\n\n**Task lists.** `- [ ]` and `- [x]` render as checkboxes.\n\n**Page outline.** H3–H6 headings within the current page are navigable, with the current heading indicated. Could be a sidebar, a floating panel, a dropdown, or anything else.\n\n**Sequential navigation.** Previous/next page movement with visible page titles. Could be footer links, toolbar buttons, keyboard shortcuts, or swipe gestures.\n\n**Search.** Find text across all pages with match highlighting, match count, and next/previous navigation.\n\n**Preview and source modes.** Toggle between rendered HTML and editable syntax-highlighted markdown, in place. No new tabs or windows.\n\n**Document links.** Clicking a link to another `.md` file opens it in the same MDXG-conforming viewer.\n\n**Math, diagrams, footnotes.** Encouraged extensions for `$...$` math, ` ```mermaid ` diagrams, and `[^1]` footnotes, with graceful fallbacks when unsupported.\n\n## Why Now\n\nMarkdown is the primary interface between humans and AI agents. When an agent generates documentation, explains code, writes a report, or drafts a proposal, it writes markdown. When a human reads, reviews, or edits that output, they're reading markdown.\n\nMarkdown is already ideal for agents: low token cost, simple to generate, trivial to parse. The missing piece is the human side. Without navigation, structure, and a polished reading experience, people reach for heavier formats. MDXG closes that gap so markdown can serve both audiences with one format.\n\nEvery company building an AI product, a developer tool, a documentation platform, or a knowledge base is rendering markdown somewhere. Most use the default rendering. MDXG defines what a complete markdown experience looks like so every team doesn't have to figure it out independently.\n\n## Reference Implementations\n\n| Package | Description | Status |\n|---------|-------------|--------|\n| [@mdxg/parser](packages/parser) | Shared markdown parser | Core library |\n| [@mdxg/vscode](packages/vscode) | VS Code extension | Reference implementation |\n| [@mdxg/web](apps/web) | Documentation site ([mdxg.org](https://mdxg.org)) | Reference implementation |\n\n## For Implementors\n\nMDXG is designed to be implementable in any environment that renders markdown. The spec defines two conformance levels:\n\n**MDXG Viewer**: read-only. Theming, code block rendering, task lists, virtual pages, page navigation, page outline, sequential navigation, and search.\n\n**MDXG Editor**: full. Everything in Viewer, plus mode toggle (preview/source/both) and document links.\n\nStart with the [spec](SPEC.md). Look at the [VS Code reference implementation](packages/vscode) for a working example. The shared parser ([`@mdxg/parser`](packages/parser)) handles document splitting, heading extraction, and slug generation. It is framework-agnostic and can be used as-is or adapted to any platform.\n\n## Contributing\n\nContributions are welcome: spec feedback, bug reports, new implementations, and code changes. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.\n\nSee the [GitHub repository](https://github.com/vercel-labs/mdxg) for issues, discussions, and pull requests.\n","summary":"MDXG (Markdown Experience Guidelines) is a specification for how user interfaces should present and interact with existing Markdown files, defining the reading and navigation experience without changing Markdown syntax. It turns a single `.md` document into a navigable, multi-page view using headings, adds consistent capabilities like page outline navigation, previous/next traversal, search with highlighting, and common affordances for code blocks, task lists, and document-to-document links. Implementations can adapt to the host theme and optionally support richer content such as math, diagrams, and footnotes with sensible fallbacks. This is best for developers and teams building editors, documentation platforms, note-taking apps, CMS systems, or AI interfaces that need a standardized, structured Markdown experience.","description":"Spec for markdown presentation and interaction","stars":347,"language":"TypeScript"},{"owner":"nv-tlabs","repo":"PiD","url":"https://github.com/nv-tlabs/PiD","readme":"# PiD — Pixel Diffusion Decoder\n\n> **TL;DR** — PiD is a plug-and-play diffusion decoder that replaces VAE/RAE decoders, turning latent representations directly into super-resolved pixels in a single pass.\n\n<p align=\"center\">\n  <img src=\"figures/teaser.jpg\" alt=\"PiD teaser\" width=\"100%\">\n</p>\n\nhttps://github.com/user-attachments/assets/a556e2d4-5de5-4bcf-9daa-80f7ea6b2124\n\nPiD reformulates the latent-to-pixel decoder as a conditional pixel-space diffusion\nmodel, unifying decoding and upsampling into a single generative module.\nIt directly denoises in high-resolution pixel\nspace and produces a super-resolved image in one pass.\n\n**[Paper](https://arxiv.org/abs/2605.23902), [Project Page](https://research.nvidia.com/labs/sil/projects/pid/), [Model Weights](https://huggingface.co/nvidia/PiD)**\n\n[Yifan Lu](https://yifanlu0227.github.io/),\n[Qi Wu](https://wilsoncernwq.github.io/),\n[Jay Zhangjie Wu](https://zhangjiewu.github.io/),\n[Zian Wang](https://www.cs.toronto.edu/~zianwang/),\n[Huan Ling](https://www.cs.toronto.edu/~linghuan/),\n[Sanja Fidler](https://www.cs.utoronto.ca/~fidler/),\n[Xuanchi Ren](https://xuanchiren.com/) <br>\n\n## News\n- 🚀 [May 25, 2026] Paper, code, and model weights released, with PiD options for **FLUX**, **FLUX.2**, **Z-Image**, **Z-Image-Turbo**, **SD3**, **DINOv2**, and **SigLIP**.\n- 🚀 [May 27, 2026] PiD is now in [ComfyUI](https://github.com/Comfy-Org/ComfyUI/pull/14103)!\n- 🔜 [Coming Soon] An updated checkpoint for **FLUX.2 (2kto4k)** that has no color drifting issue.\n- 🔜 [Coming Soon] PiD checkpoint for **Qwen-Image** and **SD-XL**.\n- 🔜 [Coming Soon] PiD undistilled checkpoints.\n- ⏳ [Planned] Training scripts.\n\n## Installation\n\n> [!TIP]\n> **Quick Start** — if your environment already has PyTorch (with CUDA), `transformers>=4.57.x`, and `diffusers>=0.37`, you don't need to build a new conda env. Just install the small set of utility deps the inference code pulls eagerly and you're ready to run the diffusers backbones (`flux`/`flux2`/`sd3`/`zimage`/`zimage_turbo`):\n>\n> ```bash\n> pip install hydra-core omegaconf pyyaml \\\n>     attrs einops loguru termcolor fvcore iopath wandb \\\n>     imageio opencv-python-headless pandas \\\n>     safetensors sentencepiece boto3 botocore\n> pip install -e .\n> ```\n> To validate your environment is ready for inference, run `python verify_env.py`.\n\n\nFull conda-managed install (preferred if you're starting from scratch):\n\n```bash\nconda env create -f environment.yml\nconda activate pid\n\n# 2. Install this package in editable mode.\npip install -e .\n```\n\n## Checkpoints and assets\n\nPretrained PiD checkpoints live under `checkpoints/`. Each diffusers backbone ships\ntwo variants — the original `2k` decoder (trained at 2048px) and a `2kto4k` decoder\n(trained with multi-resolution data bucketing 2048→3840 + an SD3-style dynamic\nshift, intended for 1024 LDM → 4K decoding). Pick the variant at the CLI via\n`--pid_ckpt_type {2k,2kto4k}` (default: `2k`).\n\n### Downloading\n\nThe released decoder weights and the encoder/decoder (\"VAE\") weights they\ndepend on are hosted at [`nvidia/PiD`](https://huggingface.co/nvidia/PiD) on\nthe Hugging Face Hub. Pull just the `checkpoints/` tree into this repo:\n\n```bash\nhf download nvidia/PiD --local-dir . --include \"checkpoints/*\"\n```\n\n## Running inference\n\nPiD ships two complementary entry points per backbone:\n\n| Backbone | `from_clean_*` (image → encode → PiD) | `from_ldm_*` (text/class → LDM → PiD) |\n|----------|---------------------------------------|---------------------------------------|\n| flux     | `from_clean_flux.py`    | `from_ldm_flux.py`    |\n| flux2    | `from_clean_flux2.py`   | `from_ldm_flux2.py`   |\n| sd3      | `from_clean_sd3.py`     | `from_ldm_sd3.py`     |\n| zimage   | reuses `flux`           | `from_ldm_zimage.py`  |\n| zimage_turbo | reuses `flux`       | `from_ldm_zimage_turbo.py` |\n| dinov2   | `from_clean_dinov2.py`  | `from_ldm_dinov2.py`  |\n| siglip   | `from_clean_siglip.py`  | `from_ldm_siglip.py`  |\n\nAll scripts live under `pid/_src/inference/` and decode each captured latent\ntwice — once with the backbone's native VAE (baseline) and once with PiD.\n\n> [!IMPORTANT]\n> Picking the checkpoint variant — `--pid_ckpt_type`\n> Every entry point accepts `--pid_ckpt_type {2k,2kto4k}` (default `2k`):\n>\n> - **`2k`** — the original 2048px-trained decoder.\n> - **`2kto4k`** — the up-to-4K-resolution decoder. Available for `flux` / `flux2` / `sd3` / `zimage` / `zimage_turbo` only. Worse than `2k` at 2048px resolution.\n>\n> For the exact checkpoint path for each backbone, see [docs/checkpoints.md](docs/checkpoints.md).\n> A quick sanity check that the right variant loaded: when `2kto4k` is active you\nshould see `PixelDiT dynamic shift: base_shift=4.0 base_image_size=1024` in the\ninit log; for `2k` that line is absent. Both `2k` and `2kto4k` support non-square aspect ratios.\n\n### 📕 `from_ldm_*`: text / class → latent diffusion → PiD decode\n\nRuns the corresponding latent-diffusion backbone on a prompt (or class id for\nthe class-conditional `dinov2` backbone), captures the intermediate `x_t` at\nuser-specified denoising steps (early LDM termination) and the final clean `x_0`, then decodes\neach captured latent with both the native VAE / RAE decoder (baseline) and PiD.\n\nFor `flux` / `flux2` / `sd3` / `zimage` / `zimage_turbo` the LDM is a HuggingFace `diffusers`\npipeline (`FluxPipeline`, `Flux2Pipeline`, `StableDiffusion3Pipeline`,\n`ZImagePipeline`).\n\nFor `dinov2` and `siglip` the LDM is the upstream\n[RAE](https://github.com/bytetriper/RAE) (class-conditional ImageNet-512) or\n[Scale-RAE](https://github.com/ZitengWangNYU/Scale-RAE) (text-conditional\n256px) repo — see the optional-deps section below for installation.\n\n#### Example 1 — Single-GPU, single prompt (Flux, default `2k` decoder)\n\n```bash\nPYTHONPATH=. python -m pid._src.inference.from_ldm_flux \\\n    --prompt \"A photorealistic half-body portrait of a brown tabby cat with bold stripes sitting attentively on a rustic wooden kitchen table, soft morning light streaming sideways through a large window, fine fur detail and stripe patterns sharply visible, intense amber-green eyes in razor-sharp focus, warm farmhouse kitchen softly out of focus, cinematic shallow depth of field, ultra-detailed fur texture, photorealistic\" \\\n    --ldm_inference_steps 28 --save_xt_steps 24 \\\n    --output_dir ./results/official_demo/flux \\\n    --cfg_scale 1 --pid_inference_steps 4 --scale 4\n```\n\n#### Example 2 — Single-GPU, 4K decode (Flux, `2kto4k` decoder)\n\nSame backbone as Example 1 but with `--resolution 1024 --pid_ckpt_type 2kto4k`,\nso the LDM produces a 1024² latent and PiD decodes it to 4K.\n\n```bash\nPYTHONPATH=. python -m pid._src.inference.from_ldm_flux \\\n    --prompt \"A photorealistic half-body portrait of a brown tabby cat with bold stripes sitting attentively on a rustic wooden kitchen table, soft morning light streaming sideways through a large window, fine fur detail and stripe patterns sharply visible, intense amber-green eyes in razor-sharp focus, warm farmhouse kitchen softly out of focus, cinematic shallow depth of field, ultra-detailed fur texture, photorealistic\" \\\n    --resolution 1024 --pid_ckpt_type 2kto4k \\\n    --ldm_inference_steps 28 --save_xt_steps 24 \\\n    --output_dir ./results/official_demo/flux_4k \\\n    --cfg_scale 1 --pid_inference_steps 4 --scale 4\n```\n\n#### Example 3 — Multi-GPU with a prompt file (Z-Image)\n\n`torchrun` shards `--prompt_file` across ranks; each rank writes to\n`--output_dir` independently.\n\n```bash\nPYTHONPATH=. torchrun --nproc_per_node=4 \\\n    -m pid._src.inference.from_ldm_zimage \\\n    --prompt_file pid/_src/inference/prompts/prompt_creative.txt \\\n    --ldm_inference_steps 50 --save_xt_steps 46 \\\n    --output_dir ./results/official_demo/zimage \\\n    --cfg_scale 1 --pid_inference_steps 4 --scale 4\n```\n\n#### Example 4 — Multi-GPU, 1K to 4K decode (Z-Image-Turbo, `2kto4k` decoder)\n\nZ-Image-Turbo defaults to 9 diffusers steps with `guidance_scale=0.0`. The final\nclean latent `x0` is always saved and is the recommended Turbo output to inspect.\n`--save_xt_steps 7` is optional; it saves an additional near-final `x_t` sample\nfor comparison.\n\n```bash\nPYTHONPATH=. torchrun --nproc_per_node=8 \\\n    -m pid._src.inference.from_ldm_zimage_turbo \\\n    --prompt_file pid/_src/inference/prompts/prompt_zimage_turbo.txt \\\n    --resolution 1024 --pid_ckpt_type 2kto4k \\\n    --output_dir ./results/official_demo/zimage_turbo_4k \\\n    --cfg_scale 1 --pid_inference_steps 4 --scale 4\n```\n\n#### `dinov2` / `siglip` backbones\n\nThe upstream RAE / Scale-RAE LDMs don't live in `diffusers` — see\n[`docs/dinov2_siglip.md`](docs/dinov2_siglip.md) for setup and end-to-end\nexamples.\n\n#### Suggested step settings per diffusers backbone\n\n(See each script's docstring for the exact recipe.)\n\n| Backbone | LDM steps flag          | Default steps | Optional `--save_xt_steps` | Recommended latent |\n|----------|-------------------------|---------------|----------------------------|--------------------|\n| flux     | `--ldm_inference_steps` | 28            | `22 24 26`                 | step `24`          |\n| sd3      | `--ldm_inference_steps` | 28            | `22 24 26`                 | step `24`          |\n| flux2    | `--ldm_inference_steps` | 50            | `44 46 48`                 | step `46`          |\n| zimage   | `--ldm_inference_steps` | 50            | `44 46 48`                 | step `46`          |\n| zimage_turbo | `--ldm_inference_steps` | 9         | `7`                        | `x0`               |\n\n---\n### 📗 `from_clean_*`: image → VAE encode → PiD decode\n\nNo latent diffusion model is run. The input image is encode by VAE,\noptionally corrupted with Gaussian noise at each\nsigma in `--degrade_sigmas`, then decoded by PiD at `--scale * input_resolution`.\n\nSingle-GPU example (Flux):\n\n```bash\nPYTHONPATH=. python -m pid._src.inference.from_clean_flux \\\n    --manifest assets/clean_image_manifest.jsonl \\\n    --input_resolution 512 \\\n    --degrade_sigmas 0.0 \\\n    --output_dir ./results/official_demo_from_clean/flux \\\n    --cfg_scale 1 --pid_inference_steps 4 --scale 4\n```\n\nYou can pass a single image with `--input_path` and a prompt with `--prompt`\ninstead of `--manifest`, and a sigma sweep such as `--degrade_sigmas 0.0 0.2 0.4 0.8`\nto decode noise-corrupted latents.\n\nThe `dinov2` / `siglip` `from_clean_*` flows take the same flags but with\ndifferent default resolutions and scales —\nsee [`docs/dinov2_siglip.md`](docs/dinov2_siglip.md).\n\n### Common arguments\n\n| Flag | Meaning |\n|------|---------|\n| `--pid_inference_steps`| Number of denoising steps for PiD (4 for the released distilled checkpoints) |\n| `--scale`              | PiD upscale factor (output = `baseline * scale`); 8 for Scale-RAE and 4 for other backbones |\n| `--cfg_scale`          | Classifier-free guidance scale for PiD |\n| `--output_dir`         | Where to write the side-by-side comparison images |\n| `--seed`               | Base random seed |\n\nMulti-GPU runs use `torchrun --nproc_per_node=N`; each rank processes a shard\nof the prompts / manifest entries and writes to `--output_dir` independently.\n\n## Repository layout\n\n```\npid/_src/inference/\n├── from_ldm_{flux,flux2,sd3,zimage,zimage_turbo,dinov2,siglip}.py  # text/class → LDM → PiD decode\n├── from_clean_{flux,flux2,sd3,dinov2,siglip}.py       # image → encode → PiD decode\n├── _demo_common.py                                    # shared CLI + run loop for from_ldm_*\n├── _demo_from_clean_common.py                         # shared CLI + run loop for from_clean_*\n├── checkpoint_registry.py                             # backbone → PiD checkpoint mapping\n├── pipeline_registry.py                               # diffusers backbone → HF pipeline mapping\n├── rae_generation.py                                  # DINOv2-RAE LDM helpers (from_ldm_dinov2)\n├── scale_rae_generation.py                            # Scale-RAE LDM helpers (from_ldm_siglip)\n└── prompts/                                           # prompt files for from_ldm_*\n```\n\n## License\n\nPiD codebase is licensed under the [Apache License 2.0](LICENSE).\n\n## Contributing\n\nSee [`CONTRIBUTING.md`](CONTRIBUTING.md) for development setup, code style,\nand the DCO sign-off requirement.\n\n## Acknowledgments\n\nThe authors would like to acknowledge [Yongsheng Yu](https://www.yongshengyu.com/) and [Wei Xiong](https://wxiong.me/) for open-sourcing [PixelDiT](https://pixeldit.github.io/)'s model and weights, and thank Product Managers [Aditya Mahajan](https://www.linkedin.com/in/aditya-mahajan1) and [Matt Cragun](https://www.linkedin.com/in/mcragun/) for their valuable support and guidance.\n\n\n## Citation\n\n```bibtex\n@article{lu2026pid,\n    title={PiD: Fast and High-Resolution Latent Decoding with Pixel Diffusion},\n    author={Lu, Yifan and Wu, Qi and Wu, Jay Zhangjie and Wang, Zian and Ling, Huan and Fidler, Sanja and Ren, Xuanchi},\n    journal={arXiv preprint arXiv:2605.23902},\n    year={2026}\n}\n```\n","summary":"PiD (Pixel Diffusion Decoder) is a plug-and-play diffusion decoder that converts latent representations directly into super-resolved pixel images in a single generative pass, replacing traditional VAE/RAE-style decoding. It reformulates latent-to-pixel decoding as a conditional diffusion process in high-resolution pixel space and includes ready-to-use integrations for multiple popular model “backbones,” such as FLUX, FLUX.2, SD3, Z-Image, DINOv2, and SigLIP, with corresponding pretrained weights. The project is designed for practitioners who want higher-quality upsampling/decoding from existing latent diffusion pipelines without redesigning the decoder, and it’s already available through ComfyUI for easy workflow adoption. Developers and researchers experimenting with diffusion-based decoding and super-resolution will benefit from its unified and extensible decoder approach.","description":"PiD: Fast and High-Resolution Latent Decoding with Pixel Diffusion","stars":473,"language":"Python"},{"owner":"Sayhi-bzb","repo":"Agent-HTML","url":"https://github.com/Sayhi-bzb/Agent-HTML","readme":"# Agent-HTML\n\n[中文](./README.zh-CN.md)\n\nAgent-HTML is an AI-native artifact workspace for turning generated HTML into\nstructured, editable, and previewable documents. It combines a block editor,\nruntime preview, theme controls, and agent feedback loops so HTML output can be\nreviewed and revised like a living artifact instead of a static answer.\n\n![Edit HTML like Notion](./public/block-dnd.gif)\n\nEdit HTML like Notion.\n\n## What It Does\n\n- Edit generated HTML through draggable blocks instead of raw source only.\n- Preview structured artifacts such as Kanban boards, timelines, and responsive\n  layout compositions.\n- Tune presentation with built-in themes, custom themes, and aspect-ratio aware\n  preview controls.\n- Keep humans and agents in the same loop for review, feedback, and iteration.\n\n## Preview\n\n### Block Editing\n\nMove generated UI as blocks, with drag handles and drop placement that make\nartifact editing feel closer to a page builder than a static HTML preview.\n\n![Block drag and drop](./public/block-dnd.gif)\n\n### Structured Components\n\nAgent-HTML is designed for artifact-shaped output: dashboards, boards, reports,\nbriefs, and other reviewable surfaces.\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <strong>Kanban</strong><br />\n      <img src=\"./public/components3-kanban.gif\" alt=\"Kanban component artifact\" />\n    </td>\n    <td width=\"50%\">\n      <strong>Charts</strong><br />\n      <img src=\"./public/components2-chart.gif\" alt=\"Chart components rendered from data\" />\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <strong>Image and table</strong><br />\n      <img src=\"./public/components3-img%26table.gif\" alt=\"Image and table component composition\" />\n    </td>\n    <td width=\"50%\">\n    </td>\n  </tr>\n</table>\n\n### Themes\n\nSwitch between built-in themes and keep the same underlying artifact structure.\n\n![Theme switching](./public/theme.gif)\n\n### Agent Collaboration\n\nReview the artifact, point at what needs to change, and keep iteration close to\nthe preview.\n\n![Interact with agent](./public/interact%20with%20agent.gif)\n\n## Documents\n\n- [Agent instructions](./AGENTS.md): content routes for product, engineering,\n  design, and reference documentation.\n\n## Development\n\n```bash\nnpm run dev\n```\n\nUseful checks:\n\n```bash\nnpm run test\nnpm run typecheck\nnpm run lint\n```\n\n## License\n\nLicense terms vary by package. See the root [`LICENSE`](./LICENSE) and\npackage-level license files for details. Short version: check the folder you\nuse.\n\n## Thanks To\n\n- [shadcn/ui](https://shadcn-ui.com/) for the UI components.\n- [linux.do](https://linux.do/) for community feedback and discussion.\n","summary":"Agent-HTML is an AI-native artifact workspace for turning generated HTML into living, structured documents that can be edited, previewed, and iterated on. It provides a Notion-like block editor (with drag-and-drop placement), runtime previews tailored for artifact-style output
