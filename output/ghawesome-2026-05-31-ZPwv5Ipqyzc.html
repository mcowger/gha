(https://glama.ai/mcp/servers/@Patdolitse/piia-engram/badge)](https://glama.ai/mcp/servers/@Patdolitse/piia-engram)\n[![piia-engram on LobeHub](https://lobehub.com/badge/mcp/patdolitse-piia-engram)](https://lobehub.com/mcp/patdolitse-piia-engram)\n\n</div>\n\n---\n\n> **TL;DR:** piia-engram is a local-first personal AI identity layer. It helps multiple coding agents start from the same understanding of you: your preferences, quality bar, lessons learned, decisions, and project context. It is not an agent memory database; it is the user-owned layer above your tools.\n\n**Why not just use native memory?** Claude Code, Codex, Cursor, and Windsurf are adding their own memories and rules. Those are useful, but they are scoped to one tool or workspace. piia-engram gives you one portable identity layer above them: local files you own, AI-proposed knowledge you review, and context that can follow you across tools.\n\n**Trust model in four lines:**\n\n- **No cloud account:** install with `pip`, keep the core store on your machine.\n- **Local files:** identity and knowledge live under `~/.engram/` as JSON/Markdown.\n- **User approval:** AI suggestions land in review before becoming verified memory.\n- **Documented boundaries:** see [Trust model](docs/trust.md), [Privacy](PRIVACY.md), and [Security](SECURITY.md).\n\nWant a safe public walkthrough? See the [cross-tool continuity demo](docs/cross-tool-continuity-demo.md).\n\n---\n\n## Install\n\n```bash\npip install piia-engram && engram setup\n```\n\nThe wizard auto-detects your AI tools — Claude Code, Cursor, Codex, Claude Desktop — configures them, and previews your identity card. Restart your tool; the first conversation already knows you. ([full walkthrough ↓](#quick-start-30-seconds))\n\n---\n\n**Your AI forgets you every time you switch tools or start a new chat.** piia-engram fixes the handoff.\n\nEvery time you open a new chat window, switch from Claude Code to Codex, update your AI tool, or move into a different project, you're back to zero:\n\n- your communication preferences — gone\n- your code standards and quality bar — forgotten\n- which mistakes you've already learned from — lost\n- why you made that architecture decision last month — erased\n\nThis happens because AI memory today is locked inside each platform. It belongs to the tool, not to you. The tool updates, resets, or gets replaced — and your context disappears with it.\n\n**piia-engram gives you a personal identity layer that lives on your machine, independent of any AI tool.** You tell it once who you are, how you work, and what you've learned. MCP-compatible tools can read the same approved context. New chat, new tool, new version — your identity stays portable.\n\n> **piia-engram is not an agent memory database.** Tools like Mem0, Zep, and Letta store task context and session history for AI agents. piia-engram stores *who you are as a person* — your identity, preferences, hard-won lessons, and key decisions. It's a different layer: not what happened in a task, but who is behind every task.\n\n## Why piia-engram?\n\n| Without piia-engram | With piia-engram |\n|---|---|\n| New chat window = start from zero | Every conversation already knows you |\n| AI tool updates and your preferences vanish | Your identity lives on your machine, survives any update |\n| Switching tools loses accumulated context | Claude Code, Codex, and Cursor read the same memory |\n| Past mistakes get repeated | Lessons learned follow you across tools and sessions |\n| Memory is locked inside one product | Data stays local, editable, and portable |\n\n## Who Uses piia-engram\n\npiia-engram is built for developers who use multiple AI coding tools and are tired of re-explaining themselves.\n\n**If you switch between Claude Code, Codex, and Cursor** — your code standards, architecture decisions, and hard-won lessons reset every time. piia-engram makes every tool start from the same understanding of who you are.\n\n**If you open 10+ AI chat windows a week** — each one starts from zero. piia-engram lets each conversation start from the same approved identity and knowledge context.\n\n**If you've lost preferences after a tool update** — your identity lives on your machine, not inside any platform. Updates, resets, and migrations don't touch your memory.\n\n<details>\n<summary><strong>Other use cases</strong></summary>\n\n**Investment analysts**\nDecisions get made but reasoning gets lost. piia-engram stores the full reasoning chain so six months later, \"why did I pass on that?\" has a real answer — and your analytical framework travels with you across every new analysis.\n\n**System architects**\nArchitecture decisions need context: what you chose, what you ruled out, and why. piia-engram keeps living Architecture Decision Records that travel with you across companies and projects, queryable by any AI tool.\n\n**Backend developers**\nAPI quirks, integration gotchas, performance trade-offs — tacit knowledge that normally lives in your head and resets when you change jobs. piia-engram turns it into a searchable library that persists across everything.\n\n**Frontend and design**\nDesign philosophy rarely gets documented in a way AI tools can use. piia-engram stores your real standards, UX lessons from real users, and the reasoning behind component decisions — so every project starts where your last one ended.\n\n**Vibe coders**\nYou build with AI and move fast. The problem: every new session your AI starts from scratch — different style choices, inconsistent patterns, re-explaining the same preferences. piia-engram makes every tool consistent from session one: your stack, your patterns, your voice, already there.\n\n</details>\n\n## What piia-engram Stores\n\nAll data lives under `~/.engram/` as plain JSON and Markdown files you can open, edit, back up, or migrate yourself.\n\n- **Identity**: who you are, how you communicate, what languages you prefer\n- **Quality standards**: your code review bar, test coverage expectations, what you refuse to ship\n- **Preferences**: coding style, AI behavior, how you like explanations\n- **Trust boundaries**: which fields to keep private, what tools can access\n- **Project snapshots**: context for ongoing work, captured and reloadable\n- **Lessons learned**: mistakes, surprises, things that worked and didn't\n- **Key decisions**: what you chose, what you ruled out, and why\n- **Domain knowledge**: reusable insights across projects and tools\n\n## What piia-engram Does (Beyond Storage)\n\nMost memory tools are passive — you put things in, they give them back. piia-engram is also active.\n\n**Knowledge inheritance across projects**  \nDescribe a new project in plain text. `get_knowledge_inheritance` returns a curated starter pack of the most relevant lessons and decisions from everything you have ever worked on. Your tenth project benefits from all nine before it — one tool call away.\n\n**Passive knowledge capture**  \nPaste a session summary into `extract_session_insights` and piia-engram extracts and stores the lessons and decisions. No manual note-taking. Knowledge accumulates through normal AI conversations.\n\n**Works with tools that do not support MCP**  \nChatGPT, Gemini, Kimi — `get_identity_card` exports a ready-to-paste Markdown identity card. Your context travels even to tools that cannot connect directly.\n\n**Automatic playbook extraction**  \nFinish a multi-step workflow — release to PyPI, deploy to Cloudflare, publish to MCP Registry — and piia-engram detects it at session end. It generates a structured draft playbook (steps, pitfalls, trigger keywords) and saves it to a staging area. Next time you do the same task, the AI finds the playbook and follows it, skipping the mistakes you already solved. No manual recording required — Engram starts the draft, you confirm, AI completes. See [Playbook Auto-Extraction](#playbook-auto-extraction) below.\n\n**Local tools registry**  \nAI tools constantly search for local programs, runtimes, and CLIs. `register_tool` records what's installed and where; `find_tool` retrieves it instantly. No more `which python` every session — the environment map persists across tools and conversations.\n\n**Knowledge health and discovery**  \n`get_knowledge_overview` surfaces stale lessons (not reviewed in 30+ days), computes a 0–100 health score across four dimensions (freshness, quality, coverage, cleanliness), and flags gaps worth revisiting. `suggest_merges` scans your entire knowledge base for near-duplicates and returns actionable merge commands. `link_knowledge` connects related lessons and decisions into a navigable knowledge graph.\n\n## Quick Start (30 seconds)\n\n```bash\npip install piia-engram\nengram setup\n```\n\nThe setup wizard will:\n1. Detect your Python environment\n2. Find and configure your AI tools (Claude Code, Cursor, Claude Desktop, Codex)\n3. **Inject AI instructions** into each tool's native config (`CLAUDE.md`, `.cursorrules`, `AGENTS.md`) so AI proactively calls Engram\n4. Walk you through seed knowledge (role, tech stack, language)\n5. Smart-import rules from your existing `CLAUDE.md` / `.cursorrules` files\n6. In advanced mode (`engram setup --advanced`), show your optional privacy preferences (cross-tool sync, anonymous statistics)\n7. **Preview your AI identity card** — immediate proof of value\n\nRestart your AI tool after setup. The first conversation will call `get_user_context` automatically — your AI already knows you.\n\nCheck health anytime:\n```bash\nengram status        # redacted install + memory health summary\nengram status --html # write a local redacted status page\nengram doctor        # diagnose all tools\nengram doctor --fix  # auto-repair issues + inject missing instructions\nengram repair-encoding        # dry-run scan for garbled / mojibake text\nengram repair-encoding --apply  # repair reversible cases with a backup\n```\n\n### Configure for Your AI Tool\n\n<details open>\n<summary><strong>Claude Code</strong></summary>\n\n```bash\n# Automatic (recommended)\nengram setup\n# Or manual:\nclaude mcp add piia-engram -- piia-engram-mcp\n```\n\n</details>\n\n<details>\n<summary><strong>Cursor</strong></summary>\n\nAdd to `~/.cursor/mcp.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"piia-engram-mcp\",\n      \"args\": [\"--transport\", \"stdio\"]\n    }\n  }\n}\n```\n\nCompatible fallback if console scripts are not on `PATH`:\n```json\n{\n  \"command\": \"python\",\n  \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Codex (OpenAI)</strong></summary>\n\nAdd to `~/.codex/mcp.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\n> **Plugin manifest note (Codex CLI 0.130.0+)**: piia-engram ships a `.claude-plugin/plugin.json` whose schema is also recognized by Codex CLI. Native one-command plugin install via Codex's marketplace flow isn't supported yet (Codex expects a multi-plugin marketplace manifest at the repo root, which would conflict with the single-plugin manifest used by other tools). For now, configure Codex via the `~/.codex/mcp.json` snippet above — it's the supported path and works on every Codex version.\n\n</details>\n\n<details>\n<summary><strong>Claude Desktop</strong></summary>\n\nAdd to `claude_desktop_config.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Windsurf / Copilot / Cline / Other MCP clients</strong></summary>\n\nAny tool that supports MCP over stdio works. Use this config:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\nFor tools without MCP support (ChatGPT, Gemini, Kimi): run `get_identity_card` in any MCP tool and paste the exported Markdown card into your chat.\n\n</details>\n\n<details>\n<summary><strong>Domestic AI IDEs — Trae / CodeBuddy / Tongyi Lingma / Comate / Qoder</strong></summary>\n\n`engram setup` auto-configures **Trae** (`~/.trae/mcp.json`) and **Tencent CodeBuddy** (`~/.codebuddy/mcp.json`) — they read a standard `mcpServers` file in your home directory.\n\n**Tongyi Lingma (通义灵码), Baidu Comate (文心快码), and Qoder** manage MCP servers through their in-app MCP panel (or a project-level config), so the wizard can't write them for you. Open the tool's MCP settings and paste:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\nZero-install alternative (no prior `pip install` needed) — set `\"command\": \"uvx\"` and `\"args\": [\"--from\", \"piia-engram\", \"piia-engram-mcp\"]`. They all speak the same standard MCP-over-stdio protocol.\n\n</details>\n\n### See It in Action\n\n```\nYou  → \"Help me refactor this auth module\"\n\n# WITHOUT piia-engram: AI starts from scratch\nAI   → \"What language? What framework? What's your testing preference?\"\n\n# WITH piia-engram: AI already knows you\nAI   → \"Based on your preference for pytest + 90% coverage, and your\n        lesson about always separating auth middleware from business\n        logic (from the March incident), here's my approach...\"\n```\n\nAfter setup, run `engram doctor` to verify everything is connected:\n\n```\n$ engram doctor\n\n  Detected 3 AI tool(s):\n    [ok] Claude Code — Engram configured\n    [ok] Cursor — Engram configured\n    [ok] Codex — Engram configured\n\n  [ok] All configured tools look healthy.\n\n  ── Functional Checks ──\n    [ok] piia_engram.core importable\n    [ok] Engram initialized (~/.engram)\n    [ok] Identity loaded (role: Senior Backend Developer)\n    [ok] quick_context.md ready (4096 bytes)\n    [ok] MCP server: 16 tools registered\n\n  -- Terminal encoding --\n\n    [ok] stdout/stderr: utf-8 / utf-8\n    [ok] PYTHONIOENCODING not set (stdout/stderr already UTF-8)\n    [ok] Runtime encodings: preferred=UTF-8, filesystem=utf-8\n\n  -- Continuity --\n\n    [--] No saved agent sessions yet\n         Run an AI session, then wrap up or stop the tool to create one.\n    [ok] Resume brief builds (1 section(s))\n```\n\n\n## Upgrading\n\n```bash\npip install --upgrade piia-engram\n```\n\nAfter upgrading, piia-engram automatically migrates any stale MCP configs the next time its server starts (stdio mode). If your AI tool still shows an \"MCP disconnected\" error after restarting, run:\n\n```bash\npiia-engram doctor        # show what's wrong\npiia-engram doctor --fix  # auto-repair and fix in one step\n```\n\nThen restart the affected AI tool. The doctor command checks Claude Code, Cursor, and Claude Desktop configs and removes any outdated server entries.\n\n## Remote Deployment\n\nRun piia-engram on your own server and connect from anywhere.\n\n### Server Setup\n\n```bash\n# Install with remote support\npip install piia-engram[remote]\n\n# Generate an auth token\npython -c \"import secrets; print(secrets.token_urlsafe(32))\"\n# Save the output, e.g. \"abc123...\"\n\n# Start in SSE mode\nENGRAM_AUTH_TOKEN=abc123... python -m piia_engram.mcp_server --transport sse --host 0.0.0.0 --port 8767\n```\n\n### Client Config (Claude Code)\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"url\": \"http://your-server:8767/sse\",\n      \"headers\": {\n        \"Authorization\": \"Bearer abc123...\"\n      }\n    }\n  }\n}\n```\n\n### Client Config (Cursor)\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"url\": \"http://your-server:8767/sse\",\n      \"headers\": {\n        \"Authorization\": \"Bearer abc123...\"\n      }\n    }\n  }\n}\n```\n\n**Security notes:**\n- Always use HTTPS in production, behind nginx or caddy with TLS.\n- The auth token protects your identity data. Keep it secret.\n- Default bind is `127.0.0.1` for localhost only. Use `0.0.0.0` only behind a reverse proxy.\n- Set `ENGRAM_CORS_ORIGINS` to restrict cross-origin access (e.g. `https://your-domain.com`).\n- Data stays on your server and never touches third-party clouds.\n\n## MCP Tools\n\npiia-engram ships 72 MCP tools. By default, only the 16 **Tier-1 Core** tools are loaded to keep the AI's context clean. To unlock all 72 tools, add `ENGRAM_TOOLS=all` to your MCP config:\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"],\n      \"env\": { \"ENGRAM_TOOLS\": \"all\" }\n    }\n  }\n}\n```\n\n### Tier-1 Core (16 tools — daily workflow)\n\n| Tool | Purpose |\n|---|---|\n| `get_user_context` | **Startup** — Load identity + knowledge at session start (supports `token_budget` for context size control) |\n| `wrap_up_session` | **Session end** — Save insights + sync at session end |\n| `memory_store` | **Writeback** — Unified write endpoint: routes to add_lesson / add_decision / add_playbook by `kind` |\n| `add_lesson` | Store a reusable lesson learned |\n| `add_decision` | Record a key decision with reasoning |\n| `add_playbook` | Record an operational playbook (multi-step procedure with trigger keywords) |\n| `search_knowledge` | **Retrieval** — Search lessons, decisions, and playbooks (supports `filters_json` for domain/tier/date filtering) |\n| `get_relevant_knowledge` | Find knowledge relevant to current project |\n| `get_identity_card` | Export Markdown identity card for non-MCP tools |\n| `update_identity` | Update profile, preferences, or quality standards |\n| `get_project_context` | Read a saved project snapshot |\n| `save_project_snapshot` | Persist project state for future sessions |\n| `get_recent_context` | Recover lost session context after restart |\n| `get_daily_log` | Read a human-friendly project timeline for a day |\n| `get_resume_brief` | Build a cross-session/cross-tool resume brief |\n| `doctor` | Run memory system self-diagnosis |\n\n### Tier-2 Advanced (56 tools — knowledge management, review, governance, import/export)\n\n<details>\n<summary>Click to expand full tool list</summary>\n\n| Tool | Purpose |\n|---|---|\n| `register_tool` | Register a local tool, runtime, or CLI to the environment map |\n| `find_tool` | Look up a registered tool by name |\n| `list_tools` | List all registered tools (optionally filter by category) |\n| `save_agent_context` | Save AI session checkpoint (also runs automatically) |\n| `list_agent_sessions` | Browse saved session records across tools |\n| `refresh_quick_context` | Refresh local `quick_context.md` snapshot for offline/cross-tool use |\n| `get_profile` | Read user profile (safe=true by default) |\n| `get_work_style` | Read work style preferences |\n| `get_preferences` | Read communication and workflow preferences |\n| `get_trust_boundaries` | Read data access boundaries |\n| `get_quality_standards` | Read quality expectations |\n| `get_playbooks` | List saved operational playbooks |\n| `get_playbook` | Get full content of a single playbook by ID |\n| `get_recent_playbooks` | List playbooks by most recent use |\n| `update_playbook` | Update playbook steps, triggers, or other fields |\n| `archive_playbook` | Archive a playbook that is no longer used |\n| `prepare_playbook_execution` | Generate an executable plan with parameter substitution |\n| `update_execution_step` | Mark a step as completed, skipped, or failed |\n| `get_execution_status` | View current execution progress of a playbook |\n| `get_lessons` | List reusable lessons learned |\n| `get_decisions` | List key decisions and reasons |\n| `get_domains` | Read domain experience stats |\n| `get_knowledge_inheritance` | Build cross-project knowledge starter pack |\n| `list_projects` | List saved project snapshots |\n| `extract_session_insights` | Extract lessons and decisions from session text |\n| `bulk_add_knowledge` | Add multiple lessons or decisions in one call |\n| `ingest_notes` | Parse free-form notes into structured knowledge |\n| `update_knowledge` | Update a lesson or decision by ID |\n| `archive_knowledge` | Archive a lesson or decision by ID |\n| `review_knowledge` | Mark a knowledge item as reviewed |\n| `merge_knowledge` | Merge a duplicate into the primary item |\n| `link_knowledge` | Create a bidirectional link between items |\n| `unlink_knowledge` | Remove a bidirectional knowledge link |\n| `get_knowledge_overview` | Knowledge digest, health report, stale checks |\n| `get_related_knowledge` | Follow links between knowledge items |\n| `find_similar_knowledge` | Find similar items by content |\n| `suggest_merges` | Scan for near-duplicates with actionable merge commands |\n| `get_stale_knowledge` | List items that need review |\n| `export_knowledge_report` | Export a readable Markdown knowledge report |\n| `request_outline_review` | Generate an interactive HTML review page |\n| `apply_review` | Process review results (promote/archive staging items) |\n| `export_engram` | Export a full backup |\n| `import_engram` | Import a backup |\n| `export_engram_to_openclaw` | Export OpenClaw-compatible files |\n| `import_engram_from_openclaw` | Import OpenClaw-compatible files |\n| `read_web_content` | Read webpage via local Reader service |\n| `get_audit_log` | Get recent audit log entries |\n| `start_project` | Start a project with inherited knowledge |\n| `add_relation` | Create a typed, directed relation between knowledge items (decision threads) |\n| `remove_relation` | Remove a typed relation (undo of add_relation) |\n| `get_decision_thread` | Reconstruct how a decision evolved step by step |\n| `get_decision_history` | Query the full revision history of a decision by question text |\n| `get_permission_profile` | View all callers' trust levels and access boundaries |\n| `set_caller_trust` | Set or change a caller's trust level |\n| `revoke_caller` | Revoke a caller's future access (forward-only) |\n| `export_feedback_report` | Generate an anonymous beta feedback report |\n\n</details>\n\n## Playbook Auto-Extraction\n\npiia-engram can detect multi-step workflows you complete during a session and automatically draft structured playbooks — no manual recording required.\n\n### How It Works\n\n1. **Detection** — When you call `wrap_up_session` or `save_agent_context`, piia-engram scans for procedural workflow signals: checkpoint steps, action verbs, and trigger keywords.\n2. **Draft generation** — If a workflow is detected, a playbook draft is created with steps, pitfalls, trigger keywords, and preconditions. Sensitive information (API keys, tokens, absolute paths) is automatically redacted before storage.\n3. **Staging** — The draft is saved to a staging area, never auto-promoted to verified. You review and confirm before it becomes a trusted playbook.\n4. **Reuse** — Next time an AI tool encounters a similar task, `search_knowledge` matches the trigger keywords and returns the playbook. The AI follows the proven steps instead of improvising.\n\n### Design Philosophy: Engram Starts, You Confirm, AI Completes\n\nPlaybook auto-extraction is not fully automatic. piia-engram detects the workflow and generates a rough draft — but the draft stays in staging until you explicitly confirm it. Once confirmed, AI tools can refine and follow the playbook autonomously. This keeps humans in the loop for quality control while eliminating the manual work of writing operational procedures.\n\n### Confidence Levels\n\n| Level | Signal | AI Behavior |\n|---|---|---|\n| **high** | 3+ checkpoint steps from `save_agent_context` | AI notifies you: \"Detected a reusable workflow, draft playbook generated.\" |\n| **medium** | Text-based detection (trigger keywords + action verbs) | AI saves silently to staging, no notification. |\n\n### Sensitive Info Redaction\n\nBefore any draft is stored, piia-engram automatically redacts:\n- API keys and tokens (`Bearer`, `sk-`, `ghp_`, etc.)\n- Absolute file paths (Windows and Unix)\n- Email addresses\n- Environment variable secrets\n\n### Kill Switch\n\nUsers can disable or re-enable playbook auto-extraction at any time:\n\n- **Disable:** Tell your AI \"关闭 playbook\" / \"stop playbook\" / \"disable playbook auto-extraction\"\n- **Enable:** Tell your AI \"开启 playbook\" / \"start playbook\" / \"enable playbook auto-extraction\"\n\nThe AI calls `update_identity(field=\"preferences\", ...)` to toggle `playbook_auto_extract`. Default is **enabled**.\n\n### Manual Playbook Creation\n\nYou can always create playbooks manually with `add_playbook`, regardless of the auto-extraction setting. The kill switch only affects automatic detection during `wrap_up_session`.\n\n## Data Layout\n\n```text\n~/.engram/\n|-- schema_version.json\n|-- identity/\n|   |-- profile.json\n|   |-- preferences.json\n|   |-- quality_standards.json\n|   `-- trust_boundaries.json\n|-- knowledge/\n|   |-- lessons.json\n|   |-- decisions.json\n|   `-- domains.json\n|-- playbooks/\n|   |-- _index.json\n|   `-- {playbook_id}.json\n|-- tools/\n|   `-- registry.json\n|-- projects/\n|   `-- {project_id}.json\n|-- contexts/\n|   `-- {tool_name}/\n|       `-- {session_id}.md\n|-- exports/\n`-- compat/\n    `-- openclaw/\n```\n\n## Supported Tools\n\n| Tool | Integration | Confidence |\n|---|---|---|\n| Claude Code | MCP over stdio | ✅ Verified |\n| Codex | MCP over stdio | ✅ Verified |\n| Cursor | MCP over stdio | ✅ Verified |\n| Claude Desktop | MCP over stdio | ✅ Verified |\n| Windsurf | MCP over stdio | Expected to work |\n| GitHub Copilot | MCP over stdio | Expected to work |\n| Cline | MCP over stdio | Expected to work |\n| Roo Code | MCP over stdio | Expected to work |\n| Amazon Q | MCP over stdio | Expected to work |\n| Augment | MCP over stdio | Expected to work |\n| Zed | MCP over stdio | Expected to work |\n| Trae | MCP over stdio | Expected to work |\n| Tencent CodeBuddy | MCP over stdio | Expected to work |\n| OpenClaw | SOUL.md / MEMORY.md / USER.md import and export | ✅ Verified |\n| ChatGPT / Gemini / Kimi | Markdown identity card fallback | 🔧 Usable |\n\n## Comparison\n\n| Feature | piia-engram | Claude Memory | Manual `CLAUDE.md` | Mem0 | Letta (MemGPT) |\n|---|---|---|---|---|---|\n| Primary purpose | User identity across tools | Per-conversation memory | Per-project notes | Agent vector memory | Agent self-editing memory |\n| Cross-tool by design | ✅ MCP-native (16 core tools) | ❌ Claude only | ❌ tool-specific | ⚠ requires per-tool wiring | ⚠ requires per-tool wiring |\n| Storage | Local JSON in `~/.engram/` | Cloud | Local | Vector DB + Mem0 Cloud | Postgres or Letta Cloud |\n| Local-first by default | ✅ | ❌ | ✅ | ⚠ Cloud is the default | ⚠ Cloud is the default |\n| Encryption at rest | ✅ AES-256-GCM, PBKDF2 600k (opt-in) | depends on Cloud | ❌ plain Markdown | depends on store config | depends on Postgres config |\n| Knowledge tiers (user gate) | ✅ staging → verified | ❌ | ❌ | ❌ | ❌ |\n| Conflict detection | ✅ | ❌ | ❌ | ❌ | ❌ |\n| MCP-native | ✅ | n/a | n/a | ⚠ third-party | ⚠ third-party |\n| Price | Free, Apache 2.0 | Subscription-bundled | Free | Free / Cloud tiers | Free / Cloud tiers |\n\n📊 **For the full side-by-side**, including when to choose a competitor over piia-engram, see [`docs/comparison.md`](docs/comparison.md).\n\n## By the numbers\n\nThese are factual claims about piia-engram itself, refreshed each minor release.\n\n| | v3.41.0 (2026-05-31) |\n|---|---|\n| Supported AI tools | **15** (4 verified + 9 expected-to-work + OpenClaw + ChatGPT fallback) |\n| MCP tools | **16 Core** (loaded by default) + **56 Advanced** (opt-in via `ENGRAM_TOOLS=all`) |\n| Knowledge types | **3** (lessons, decisions, playbooks) |\n| Tests passing | **1788** (unit + integration) |\n| Code coverage | **96%** total; mcp_server 99%, setup_wizard 93%, storage 100%, core 95% |\n| Lines in `core.py` | **2313** (facade + mixins total ~6000; down from 4277 monolith pre-v3.14.1 — see [architecture.md](docs/architecture.md)) |\n| PBKDF2 iterations | **600,000** (OWASP 2023+ floor; legacy 100k still decrypts) |\n| Encryption | AES-256-GCM, per-engram salt + per-value random nonce |\n| Cold-start time | < 100 ms typical (local JSON, no network) |\n| Network calls by default | **0** for identity and knowledge tools — except optional `read_web_content`; remote telemetry and feedback require separate explicit opt-in and send counts only (see [privacy details](PRIVACY.md)) |\n\n## Built With\n\npiia-engram is a human-directed, AI-assisted open-source project.\n\n| Contributor | Role |\n|---|---|\n| [@Patdolitse](https://github.com/Patdolitse) | Creator, product direction, strategy, ownership |\n| Claude Code | Architecture, task planning, code review assistance |\n| Codex | Implementation, testing, documentation assistance |\n\n## FAQ\n\n**What MCP server lets me share memory between Claude Code and Cursor?**\npiia-engram. Install with `pip install piia-engram && engram setup`, and both tools read the same identity, preferences, and lessons from `~/.engram/`. No cloud, no sync service — they both read local JSON files through MCP.\n\n**What is piia-engram?**\npiia-engram is a persistent memory layer for AI tools. It stores your identity, preferences, code standards, lessons learned, and key decisions as local JSON files on your machine. Configured MCP-compatible coding tools (Claude Code, Codex, Cursor, Windsurf, Claude Desktop) can read the same approved context, so new chats and tool switches can start from the same user-owned memory.\n\n**How is piia-engram different from the official MCP memory server?**\nThe official `@modelcontextprotocol/server-memory` stores a generic knowledge graph of entities and relations. piia-engram is specialized for **developer identity**: it has structured fields for your profile, code standards, quality bar, lessons learned, and key decisions — plus 72 tools for knowledge lifecycle management (search, review, merge, inherit across projects). If you need general-purpose entity memory, use the official server. If you want MCP-compatible coding tools to start from the same approved understanding of your preferences and past mistakes, use piia-engram.\n\n**How is piia-engram different from agent memory tools like Mem0, Zep, or Letta?**\nThose tools store task context and session history for AI agents — what happened during a workflow. piia-engram stores who *you* are as a person — your identity, preferences, hard-won lessons, and key decisions. It's a different layer: identity persists across tools, sessions, and projects, while task memory is scoped to a single agent run. Your data is local JSON files you own and can edit directly.\n\n**Why not just use AGENTS.md / CLAUDE.md / .cursorrules?**\nThose config files are great for **repo-specific** rules (build steps, coding conventions). piia-engram is for **you** — your preferences, lessons, and decisions that can follow you across repos and configured MCP-compatible tools. They complement each other: use AGENTS.md for the project, piia-engram for the person. See the full comparison in [docs/comparison.md](docs/comparison.md).\n\n**Can I use piia-engram with multiple AI tools at once?**\nYes. That's the primary use case. piia-engram uses local file storage (`~/.engram/`) with atomic writes and file locking. Claude Code, Cursor, Codex, and any other MCP client can connect simultaneously. A lesson recorded in Claude Code is immediately available in Cursor.\n\n**Which AI tools does piia-engram support?**\nAny MCP-compatible tool: Claude Code, OpenAI Codex, Cursor, Claude Desktop, Windsurf, GitHub Copilot, Cline, Roo Code, Amazon Q, Augment, Zed, and more. For tools without MCP support (ChatGPT, Gemini, Kimi), export a Markdown identity card with `get_identity_card` and paste it in.\n\n**Where is my data stored?**\nAll data lives in `~/.engram/` on your local machine as plain JSON and Markdown files. No cloud, no account, no subscription. You can open, edit, back up, or migrate the files yourself. Optional AES-256-GCM encryption is available via `pip install piia-engram[secure]`.\n\n**How do I install piia-engram?**\n```bash\npip install piia-engram\nengram setup\n```\nThe setup wizard detects your AI tools and configures MCP automatically. Restart your AI tool after setup. The AI will call `get_user_context` at the start of each session.\n\n**After upgrading, my AI tool shows \"MCP server disconnected\". How do I fix it?**\nRun `engram doctor --fix` in a terminal, then restart your AI tool. This command scans all known MCP config files, removes outdated server entries, and repairs broken paths in one step.\n\n**Does piia-engram send data to the cloud?**\nNot by default. Identity and knowledge tools use local files, and telemetry is **off by default**. Optional anonymous usage statistics can be enabled as a local log; remote telemetry and weekly feedback reports require separate explicit opt-in and send counts only, never knowledge content. You can inspect the next payload with `engram telemetry preview`, disable anytime with `engram telemetry off`, and turn remote sending off with `engram telemetry remote off`. See **[PRIVACY.md](PRIVACY.md)** for the full data flow diagram, what is and isn't collected, and your data rights.\n\n**How many MCP tools does piia-engram provide?**\nTwo tiers, designed so most users only see 16 tools:\n\n| Tier | Tools | What they do | Loaded by |\n|------|-------|-------------|-----------|\n| **Core** | 16 | Identity, knowledge read/write, project context, session recovery, diagnostics | Default |\n| **Advanced** | 56 | Knowledge review, merge, decision threads, permission management, tools registry, import/export, audit | `ENGRAM_TOOLS=all` |\n\nMost users never need to enable Advanced tools — Core covers everyday use.\n\n**Is piia-engram free?**\nYes. Free and open source under the Apache 2.0 license. No subscription, no cloud tiers, no vendor lock-in.\n\n## Limitations\n\npiia-engram is functional and actively used, but some things it intentionally does not do yet:\n\n| Area | Current State | Planned |\n|---|---|---|\n| **File safety** | Atomic JSON writes with a shared portalocker file lock | Broader stress testing |\n| **Access control** | `restricted_fields` filters profile output. Optional agent governance (`ENGRAM_GOVERNANCE=1`) adds trust-level read/write gates, owner-only export/import controls, and a hash-chained disclosure ledger. See [docs/governance.md](docs/governance.md). | Stronger caller identity binding requires MCP/client support |\n| **Encryption** | Optional field-level AES-256-GCM encryption via `ENGRAM_SECRET` env var. Install `pip install piia-engram[secure]`. | Full-disk encryption for all files (v4.0) |\n| **Audit logging** | Optional access audit log via `ENGRAM_AUDIT=1` env var. Logs to `~/.engram/audit.log`. | Per-caller audit (blocked by MCP spec) |\n| **Caller identity** | MCP protocol doesn't pass tool identity | Blocked by MCP spec |\n| **Concurrent writes** | Protected by file lock + atomic replace for piia-engram JSON writes | Network-filesystem edge cases not guaranteed |\n\n**What this means in practice:**\n- Don't store passwords, API keys, or client PII in piia-engram\n- Any process with read access to `~/.engram/` can read your data\n- `restricted_fields` reduces what piia-engram emits in cold-start context, but it is not encryption or a true ACL\n\nThis is not a warning to avoid piia-engram — it's an honest description of what it is: a local memory layer for personal AI context. For personal use, it works well today.\n\n## Security Configuration\n\n### Field-level encryption (optional)\n\nEncrypt sensitive profile fields (email, phone, location, etc.) at rest:\n\n```bash\npip install piia-engram[secure]\nexport ENGRAM_SECRET=\"your-strong-passphrase\"\n```\n\nEncrypted fields are stored as `enc:v2:...` in JSON files; legacy `enc:v1:...` values still decrypt. Without `ENGRAM_SECRET`, piia-engram works normally with plaintext (backward compatible).\n\n### Audit logging (optional)\n\nTrack all read/write operations:\n\n```bash\nexport ENGRAM_AUDIT=1\n```\n\nLogs are written to `~/.engram/audit.log` in JSON-lines format. Query with `get_audit_log` tool or `grep`.\n\n### Agent governance (advanced, optional)\n\nEnable per-caller trust levels and disclosure receipts:\n\n```bash\nexport ENGRAM_GOVERNANCE=1\nexport ENGRAM_CLIENT_TYPE=claude_code\n```\n\nGovernance is off by default. When enabled, known local coding agents are\nfiltered to public/work knowledge, unknown callers fail closed to public-only,\nand owner-only exports/imports/grant changes require `private-self`. See\n[docs/governance.md](docs/governance.md) for the exact trust levels, gates,\nhonest boundaries, and ledger commands.\n\n## CLI Commands\n\n```bash\nengram setup            # Interactive install wizard\npiia-engram doctor           # Check config health (all AI tools)\npiia-engram status           # Redacted install + memory health summary\npiia-engram status --html    # Write a local redacted status page\npiia-engram doctor --fix     # Auto-repair any issues found\npiia-engram sessions         # List saved cross-tool agent sessions\npiia-engram sessions show <id>  # Print one saved session\npiia-engram review           # List staging knowledge awaiting review\npiia-engram review show <id> # Inspect one review item\npiia-engram review approve <id> --yes  # Promote a staging item\npiia-engram review archive <id> --yes  # Archive a review item\npiia-engram repair-encoding  # Dry-run scan for garbled / mojibake text\npiia-engram repair-encoding --apply  # Repair reversible cases with a backup\npiia-engram stats            # Show project growth metrics (GitHub + PyPI)\npiia-engram stats --log      # Append stats snapshot to local log\nengram telemetry        # Manage anonymous usage statistics\nengram privacy          # Show what data piia-engram stores and where\n```\n\n## Contributing\n\nContributions, issues, and feedback are welcome.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## License\n\n[Apache 2.0](LICENSE). piia-engram is free software. Your memory belongs to you.\n","summary":"piia-engram provides local-first “cross-tool” personal identity and memory for MCP-compatible coding tools, letting you define your preferences, standards, lessons learned, decisions, and project context once and reuse it everywhere. It focuses on a user-owned trust model where AI-proposed knowledge is reviewed and approved before becoming durable, and the core data lives locally under `~/.engram/` rather than in a vendor-managed cloud. Tools such as Claude Code, Codex, Cursor, Windsurf, and other MCP clients can start from the same approved context, improving continuity across chats and workspaces. This is best for developers who want consistent behavior from multiple AI coding assistants without hidden memory or vendor lock-in.","description":"One memory. Every AI tool. Yours to keep. Local-first, MCP-compatible, Apache 2.0.","stars":157,"language":"Python"},{"owner":"tidwall","repo":"btype","url":"https://github.com/tidwall/btype","readme":"<p align=\"center\">\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"/.github/logo-dark.png\">\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"/.github/logo-light.png\">\n  <img alt=\"Tile38\" src=\"/.github/images/logo-light.png\" width=\"640\">\n</picture>\n<br>\n<a href=\"#map\">Map</a> •\n<a href=\"#set\">Set</a> •\n<a href=\"#array\">Array</a> •\n<a href=\"#table\">Table</a> •\n<a href=\"#stack\">Stack</a> •\n<a href=\"#queue\">Queue</a> • \n<a href=\"#deque\">Deque</a> •\n<a href=\"#prique\">Prique</a>\n<br>\n<br>\n<a href=\"https://godoc.org/github.com/tidwall/btype\"\n><img src=\"https://godoc.org/github.com/tidwall/btree?status.svg\"\n></a>\n</p>\n\nThe btype package provides btree based collection types that allow Go programmers \nto easily implement common data structures like maps, arrays, queues, and stacks. \n\nIt's hand-crafted with performance in mind and is generally faster than the \nstate of the art btrees for Go, Rust, and C++.\n[google/btree](https://github.com/google/btree), \n[tidwall/btree](https://github.com/tidwall/btree), \n[rust/BTreeMap](https://doc.rust-lang.org/std/collections/struct.BTreeMap.html), \n[frozenca/btree](https://github.com/frozenca/BTree).\n<sup>[[benchmarks]](#performance)</sup>\n\n# Features\n\n- Includes collections types: map, set, queue, stack, table. Each backed by a btree structure.\n- Modern Go ergonomics with a friendly API.\n- All data operations are O(log n) complexity.\n- Instant [copy-on-write](#copy-on-write) (shadow clones), providing O(1) snapshots.\n- Uses [btree counting](https://www.chiark.greenend.org.uk/~sgtatham/algorithms/cbtree.html) for O(log n) random access.\n- Exhaustively tested code with 100% coverage.\n- Optimized for [high performance](#performance) and low memory.\n\n# Types\n\nIncludes the following collection types:\n\n- [`Map`](#map): Key value pairs. Sorting ordered by key\n- [`Set`](#set): Like Map, but only for storing keys. No values\n- [`Array`](#array): Dynamic array of unsorted data\n- [`Table`](#table): Data sorted by key fields or a custom compare function\n- [`Stack`](#stack): LIFO (last-in, first-out) data structure\n- [`Queue`](#queue): FIFO (first-in, first-out) data structure\n- [`Deque`](#deque): Double-ended queue\n- [`Prique`](#prique): Priority queue\n\n\n## Map\n\nbtype.Map is a sorted associative collection of key-value pairs with unique keys. \nThe keys adhere to the parameter type [`cmp.Ordered`](https://pkg.go.dev/cmp#Ordered) and are naturally sorted using [`cmp.Compare`](https://pkg.go.dev/cmp#Compare).\n\n### Operations\n\n```py\nInsert(key, val)        # Insert an item. (does not replace if already exists)\nReplace(key, val)       # Replace an existing item. (does not insert if not exists)\nSet(key, val)           # Insert or replace an item.\nGet(key, val)           # Get an existing item.\nContains(key)           # Test if an item exists.\nDelete(key)             # Remove an item.\n\nSeek(key)               # Searches for the first item that is >= to key.\nSeekNext(key)           # Searches for the first item that is > key.\nSeekPrev(key)           # Searches for the first item that is < key.\n\nAll()                   # Iterate items in ascending order.            (iter.Seq2[K,V])\nBackward()              # Iterate items in descending order.           (iter.Seq2[K,V])\nAscend(key)             # Iterate items in ascending order >= to key.  (iter.Seq2[K,V])\nDescend(key)            # Iterate items in descending order <= to key. (iter.Seq2[K,V])\nKeys()                  # Iterate key only in ascending order.         (iter.Seq[K])\nValues()                # Iterate values only in ascending order.      (iter.Seq[K])\nDrain()                 # Iterate and remove in ascending order.       (iter.Seq2[K,V])\nDrainBackward()         # Iterate and remove in descending order.      (iter.Seq2[K,V])\n\nPushFront(key, val)     # Insert item to front of map.\nPushBack(key, val)      # Insert item to back of map.\nPopFront()              # Remove the first item.\nPopBack()               # Remove the last item.\nFront()                 # Get the first item.\nBack()                  # Get the last item.\n\nInsertAt(i, key, val)   # Inserts item at index. (collection size grows by one)\nReplaceAt(i, key, val)  # Replace an item at index.\nGetAt(i)                # Get an item at index.\nIndexOf(key)            # Get the index of an item.\nDeleteAt(i)             # Remove an item at index.\nAscendAt(i)             # Iterate items in ascending order >= to index.  (iter.Seq2[K,V])\nDescendAt(i)            # Iterate items in descending order <= to index. (iter.Seq2[K,V])\n\nDeleteRange(min, max)   # Remove items within the provided sub-range. [min,max)\nDeleteRangeAt(i, count) # Remove items starting at index.\n\nLen()                   # Get the number of items in map.\nCopy()                  # Copy map, fast O(1), uses Copy-on-write shadow cloning.\nClear()                 # Remove all items from map\nRelease()               # Same as Clear() but optimized for copied collections.\n```\n\n### Example\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create a map\n\tvar users btype.Map[string, string]\n\n\t// Add some users\n\tusers.Insert(\"user:4\", \"Andrea\")\n\tusers.Insert(\"user:6\", \"Andy\")\n\tusers.Insert(\"user:2\", \"Andy\")\n\tusers.Insert(\"user:1\", \"Jane\")\n\tusers.Insert(\"user:5\", \"Janet\")\n\tusers.Insert(\"user:3\", \"Steve\")\n\n\t// Iterate over the map and print each user\n\tfor key, value := range users.All() {\n\t\tfmt.Printf(\"%s %s\\n\", key, value)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Delete a couple users\n\tusers.Delete(\"user:5\")\n\tusers.Delete(\"user:1\")\n\n\t// Print the map again\n\tfor key, value := range users.All() {\n\t\tfmt.Printf(\"%s %s\\n\", key, value)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// user:1 Jane\n// user:2 Andy\n// user:3 Steve\n// user:4 Andrea\n// user:5 Janet\n// user:6 Andy\n//\n// user:2 Andy\n// user:3 Steve\n// user:4 Andrea\n// user:6 Andy\n```\n\n## Set\n\nbtype.Set is an associative collection of unique sorted keys. \nThe keys adhere to the parameter type [`cmp.Ordered`](https://pkg.go.dev/cmp#Ordered) and are naturally sorted using [`cmp.Compare`](https://pkg.go.dev/cmp#Compare).\n\n### Operations\n\n```py\nInsert(key)             # Insert key.\nContains(key)           # Check if key exists.\nDelete(key)             # Remove key.\nLen()                   # Get the number of keys in the collection.\n\nAll()                   # Iterate keys in ascending order.            (iter.Seq[K])\nBackward()              # Iterate keys in descending order.           (iter.Seq[K])\nAscend(key)             # Iterate keys in ascending order >= to key.  (iter.Seq[K])\nDescend(key)            # Iterate keys in descending order <= to key. (iter.Seq[K])\nDrain()                 # Iterate and remove in ascending order.      (iter.Seq[K])\nDrainBackward()         # Iterate and remove in descending order.     (iter.Seq[K])\n\nSeek(key)               # Searches for the first key that is >= to key.\nSeekNext(key)           # Searches for the first key that is > key.\nSeekPrev(key)           # Searches for the first key that is < key.\n\nPushFront(key)          # Insert key to front of collection.\nPushBack(key)           # Insert key to back of collection.\nPopFront()              # Remove the first key.\nPopBack()               # Remove the last key.\nFront()                 # Get the first key.\nBack()                  # Get the last key.\n\nInsertAt(i, key)        # Insert key at index. (collection size grows by one)\nReplaceAt(i, key)       # Replace key at index.\nGetAt(i)                # Gets key at index.\nIndexOf(key)            # Get the index of key.\nDeleteAt(i)             # Remove key at index.\nAscendAt(i)             # Iterate keys in ascending order >= to index. (iter.Seq[K])\nDescendAt(i)            # Iterate key in descending order <= to index. (iter.Seq[K])\n\nDeleteRange(min, max)   # Remove keys within the provided sub-range. [min,max)\nDeleteRangeAt(i, count) # Remove keys starting at index.\n\nLen()                   # Get the number of items in collection.\nCopy()                  # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()                 # Remove all items from collection\nRelease()               # Same as Clear() but optimized for copied collections.\n```\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create a set\n\tvar names btype.Set[string]\n\n\t// Add some names\n\tnames.Insert(\"Jane\")\n\tnames.Insert(\"Andrea\")\n\tnames.Insert(\"Steve\")\n\tnames.Insert(\"Andy\")\n\tnames.Insert(\"Janet\")\n\tnames.Insert(\"Andy\")\n\n\t// Iterate over the set and print each name\n\tfor key := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", key)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Delete a couple names\n\tnames.Delete(\"Steve\")\n\tnames.Delete(\"Andy\")\n\n\t// Print the names again\n\tfor key := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", key)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Andrea\n// Andy\n// Jane\n// Janet\n// Steve\n//\n// Andrea\n// Jane\n// Janet\n```\n\n## Array\n\nbtype.Array is a dynamic resizable array of unsorted items.\nIt provides random access with `O(log n)` complexity to all data operations, \nincluding inserting and deleting items in the middle of the array.\n\n\n### Operations\n\n```py\nInsert(i, item)       # Insert item at index. (collection size grows by one)\nReplace(i, item)      # Replace existing item at index.\nGet(i)                # Gets item at index.\nDelete(i)             # Remove item at index.\n\nAll()                 # Iterate items in ascending order.              (iter.Seq[T])\nBackward()            # Iterate items in descending order.             (iter.Seq[T])\nAscend(i)             # Iterate items in ascending order >= to index.  (iter.Seq[T])\nDescend(i)            # Iterate items in descending order <= to index. (iter.Seq[T])\nDrain()               # Iterate and remove in ascending order.         (iter.Seq[T])\nDrainBackward()       # Iterate and remove in descending order.        (iter.Seq[T])\n\nPushFront(item)       # Insert item to front of collection.\nPushBack(item)        # Insert item to back of collection.\nPopFront()            # Remove the first item.\nPopBack()             # Remove the last item.\nFront()               # Get the first item.\nBack()                # Get the last item.\n\nDeleteRange(i, count) # Remove items starting at index.\n\nLen()                 # Get the number of items in collection.\nCopy()                # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()               # Remove all items from collection\nRelease()             # Same as Clear() but optimized for copied collections.\n```\n\n### Example\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create an array of names\n\tvar names btype.Array[string]\n\n\t// Add some names\n\tnames.Insert(0, \"Andrea\")\n\tnames.Insert(1, \"Tom\")\n\tnames.Insert(2, \"Andy\")\n\tnames.Insert(3, \"Jane\")\n\tnames.Insert(4, \"Janet\")\n\tnames.Insert(5, \"Steve\")\n\n\t// Iterate over the array and print each name\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Delete a couple names\n\tnames.Delete(3)\n\tnames.Delete(1)\n\n\t// Print the names again\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Andrea\n// Tom\n// Andy\n// Jane\n// Janet\n// Steve\n//\n// Andrea\n// Andy\n// Janet\n// Steve\n```\n\n<!----------------------------------------------------------------------------->\n\n## Table\n\nbtype.Table is a general purpose btree collection for storing sorted data.\n\nThis collection type is functionally similar to \n[`tidwall/btree.BTreeG`](https://pkg.go.dev/github.com/tidwall/btree#BTreeG) and\n[`google/btree.BTreeG`](https://pkg.go.dev/github.com/google/btree#BTreeG), \nbut includes additional features and performance enhancements.\n\n### Features\n\n- Automatic type ordering detection.\n- Optional [custom comparator](#custom-comparator)\n- [Tagged struct keys](#tagged-struct-keys) (row-like primary and composite keys)\n\n### Automatic type ordering\n\nA btype.Table will automatically detect the ordering of the data type. \n\n### cmp.Ordered data type\n\nWhen the data type is `cmp.Ordered` then `cmp.Compare` is used to sort the data.\n\n```go\nvar names btype.Table[string]\n\nnames.Insert(\"Andrea\")\nnames.Insert(\"Tom\")\nnames.Insert(\"Andy\")\nnames.Insert(\"Jane\")\nnames.Insert(\"Janet\")\nnames.Insert(\"Steve\")\n\nfor name := range names.All() {\n\tfmt.Printf(\"%s\\n\", name)\n}\n\n// Output:\n// Andrea\n// Andy\n// Jane\n// Janet\n// Steve\n// Tom\n```\n\n### Struct field detection\n\nWhen the data type is a struct, or pointer to struct, then the data is sorted \nby the first struct field that adheres to `cmp.Ordered`.\n\n```go\ntype User struct {\n\tid   int\n\tname string\n}\n\nvar users btype.Table[User]\nusers.Insert(User{4, \"Andrea\"})\nusers.Insert(User{6, \"Andy\"})\nusers.Insert(User{2, \"Andy\"})\nusers.Insert(User{1, \"Jane\"})\nusers.Insert(User{5, \"Janet\"})\nusers.Insert(User{3, \"Steve\"})\n\nfor user := range users.All() {\n\tfmt.Printf(\"%d %s\\n\", user.id, user.name)\n}\n\n// Output:\n// 1 Jane\n// 2 Andy\n// 3 Steve\n// 4 Andrea\n// 5 Janet\n// 6 Andy\n```\n\n### Custom comparator\n\nA custom comparator may be used to override automatic detection.\n\n```go\ntype User struct {\n\tage  int\n\tname string\n}\n\n// sort by name, then age\nusers := btype.NewTableOptions(btype.TableOptions[User]{\n\tCompare: func(a, b User) int {\n\t\tc := cmp.Compare(a.name, b.name)\n\t\tif c == 0 {\n\t\t\tc = cmp.Compare(a.age, b.age)\n\t\t}\n\t\treturn c\n\t},\n})\nusers.Insert(User{27, \"Andrea\"})\nusers.Insert(User{54, \"Andy\"})\nusers.Insert(User{31, \"Andy\"})\nusers.Insert(User{43, \"Jane\"})\nusers.Insert(User{29, \"Janet\"})\nusers.Insert(User{62, \"Steve\"})\n\nfor user := range users.All() {\n\tfmt.Printf(\"%d %s\\n\", user.age, user.name)\n}\n\n// Output:\n// 27 Andrea\n// 31 Andy\n// 54 Andy\n// 43 Jane\n// 29 Janet\n// 62 Steve\n```\n\n### Tagged struct keys\n\nStructs may include tagged keys, which is a simple and explicit way to\ndefine key order. The syntax resembling a traditional database table.\n\nThe tag `btype:\"key\"` designates that struct field as the key.\n\n```go\n// Order by id\ntype User struct {\n\tid   int `btype:\"key\"`\n\tname string\n}\n```\n\nA composite key can be made by adding two or more tags.\n\n```go\n// Order by last, then first\ntype User struct {\n\tlast  string `btype:\"key\"`\n\tfirst string `btype:\"key\"`\n}\n```\n\nBy default, order of the keys are automatic.\nBut it's possible to define the order manually by adding a `.{index}` to the tag.\n\n```go\n// Order by last, then first\ntype User struct {\n\tfirst string `btype:\"key.1\"`\n\tlast  string `btype:\"key.0\"`\n}\n```\n\nKeys may be ordered ascending or descending using `asc` and `desc`, respectively.\nAscending is the default.\n\n\n```go\n// Order by last descending, then first ascending\ntype User struct {\n\tlast  string `btype:\"key,desc\"`\n\tfirst string `btype:\"key,asc\"`\n}\n```\n\nText collation may be added to string keys.\n\n```go\n// Use case-insensitive binary collation.\n// Order by last descending, then first ascending.\ntype User struct {\n \tlast  string `btype:\"key,binary_CI,desc\"`\n \tfirst string `btype:\"key,binary_CI\"`\n}\n```\n\nAvailable collations:\n\n- `binary_CS`: Case sensitive binary strings (default)\n- `binary_CI`: Case insensitive binary strings\n- `utf8_CS`: Case sensitive utf8 unicode\n- `utf8_CI`: Case insensitive utf8 unicode\n\nAlso `bin_CS`, `CS`, `bin_CI`, and `CI` are available as shorthand for \n`binary_CS` and `binary_CI`.\n\nMore collations may be added in the future.\n\n### Operations\n\nTable operations include:\n\n```py\nInsert(item)            # Insert an item. (does not replace if already exists)\nReplace(item)           # Replace an existing item. (does not insert if not exists)\nSet(item)               # Insert or replace an item.\nGet(key)                # Get an existing item.\nContains(key)           # Test if an item exists.\nDelete(key)             # Remove an item.\n\nSeek(key)               # Searches for the first item that is >= to key.\nSeekNext(key)           # Searches for the first item that is > key.\nSeekPrev(key)           # Searches for the first item that is < key.\n\nAll()                   # Iterate items in ascending order.            (iter.Seq[T])\nBackward()              # Iterate items in descending order.           (iter.Seq[T])\nAscend(key)             # Iterate items in ascending order >= to key.  (iter.Seq[T])\nDescend(key)            # Iterate items in descending order <= to key. (iter.Seq[T])\nDrain()                 # Iterate and remove in ascending order.       (iter.Seq[T])\nDrainBackward()         # Iterate and remove in descending order.      (iter.Seq[T])\n\nPushFront(item)         # Insert item to front of table.\nPushBack(item)          # Insert item to back of table.\nPopFront()              # Remove the first item.\nPopBack()               # Remove the last item.\nFront()                 # Get the first item.\nBack()                  # Get the last item.\n\nInsertAt(i, item)       # Inserts item at index. (collection size grows by one)\nReplaceAt(i, item)      # Replace an item at index.\nGetAt(i)                # Get an item at index.\nIndexOf(key)            # Get the index of an item.\nDeleteAt(i)             # Remove an item at index.\nAscendAt(i)             # Iterate items in ascending order >= to index.  (iter.Seq[T])\nDescendAt(i)            # Iterate items in descending order <= to index. (iter.Seq[T])\n\nDeleteRange(min, max)   # Remove items within the provided sub-range. [min,max)\nDeleteRangeAt(i, count) # Remove items starting at index.\n\nLen()                   # Get the number of items in collection.\nCopy()                  # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()                 # Remove all items from collection\nRelease()               # Same as Clear() but optimized for copied collections.\n```\n\n<!----------------------------------------------------------------------------->\n\n## Stack\n\nbtype.Stack is a collection with the functionality of a stack - specifically, \na LIFO (last-in, first-out) data structure.\n\n### Operations\n\n```py\nPush(item) # Insert item to top of stack.\nPop()      # Remove item from top stack.\nTop()      # Get the top item in stack\n\nAll()      # Iterate items in ascending order.      (iter.Seq[T])\nDrain()    # Iterate and remove in ascending order. (iter.Seq[T])\n\nLen()      # Get the number of items in collection.\nCopy()     # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()    # Remove all items from collection\nRelease()  # Same as Clear() but optimized for copied collections.\n```\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create an stack of names\n\tvar names btype.Stack[string]\n\n\t// Add some names\n\tnames.Push(\"Andrea\")\n\tnames.Push(\"Tom\")\n\tnames.Push(\"Andy\")\n\tnames.Push(\"Jane\")\n\tnames.Push(\"Janet\")\n\tnames.Push(\"Steve\")\n\n\t// Iterate over the stack and print each name\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Pop a the top two names\n\tvar name string\n\tname, _ = names.Pop()\n\tfmt.Printf(\"%s\\n\", name)\n\tname, _ = names.Pop()\n\tfmt.Printf(\"%s\\n\", name)\n\tfmt.Printf(\"\\n\")\n\n\t// Print the names again\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Steve\n// Janet\n// Jane\n// Andy\n// Tom\n// Andrea\n//\n// Steve\n// Janet\n//\n// Jane\n// Andy\n// Tom\n// Andrea\n```\n\n## Queue\n\nbtype.Queue is a collection with the functionality of a queue - specifically, \na FIFO (first-in, first-out) data structure.\n\n### Operations\n\n```py\nPush(item) # Insert item at the end of queue.\nPop()      # Remove the first item.\nFront()    # Get the first item.\n\nAll()      # Iterate items in ascending order.      (iter.Seq[T])\nDrain()    # Iterate and remove in ascending order. (iter.Seq[T])\n\nLen()      # Get the number of items in collection.\nCopy()     # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()    # Remove all items from collection\nRelease()  # Same as Clear() but optimized for copied collections.\n```\n\n### Example\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create an queue of names\n\tvar names btype.Queue[string]\n\n\t// Add some names\n\tnames.Push(\"Andrea\")\n\tnames.Push(\"Tom\")\n\tnames.Push(\"Andy\")\n\tnames.Push(\"Jane\")\n\tnames.Push(\"Janet\")\n\tnames.Push(\"Steve\")\n\n\t// Iterate over the array and print each name\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Pop the first two names\n\tvar name string\n\tname, _ = names.Pop()\n\tfmt.Printf(\"%s\\n\", name)\n\tname, _ = names.Pop()\n\tfmt.Printf(\"%s\\n\", name)\n\tfmt.Printf(\"\\n\")\n\n\t// Print the names again\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Andrea\n// Tom\n// Andy\n// Jane\n// Janet\n// Steve\n//\n// Andrea\n// Tom\n//\n// Andy\n// Jane\n// Janet\n// Steve\n```\n\n## Deque\n\nbtype.Deque is a double-ended queue.\n\n### Operations\n\n```py\nPush(item)      # Insert item at the end of queue.\nPopFront()      # Remove the first item.\nPopBack()       # Remove the last item.\nFront()         # Get the first item.\nBack( )         # Get the last item.\n\nAll()           # Iterate items in ascending order.       (iter.Seq[T])\nBackward()      # Iterate items in desending order.       (iter.Seq[T])\nDrain()         # Iterate and remove in ascending order.  (iter.Seq[T])\nDrainBackward() # Iterate and remove in descending order. (iter.Seq[T])\n\nLen()           # Get the number of items in collection.\nCopy()          # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()         # Remove all items from collection\nRelease()       # Same as Clear() but optimized for copied collections.\n```\n\n### Example\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\t// Create an queue of names\n\tvar names btype.Deque[string]\n\n\t// Add some names\n\tnames.PushFront(\"Andrea\")\n\tnames.PushBack(\"Tom\")\n\tnames.PushFront(\"Andy\")\n\tnames.PushBack(\"Jane\")\n\tnames.PushFront(\"Janet\")\n\tnames.PushBack(\"Steve\")\n\n\t// Iterate over the array and print each name\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Pop the first two names\n\tvar name string\n\tname, _ = names.PopFront()\n\tfmt.Printf(\"%s\\n\", name)\n\tname, _ = names.PopBack()\n\tfmt.Printf(\"%s\\n\", name)\n\tfmt.Printf(\"\\n\")\n\n\t// Print the names again\n\tfor name := range names.All() {\n\t\tfmt.Printf(\"%s\\n\", name)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Janet\n// Andy\n// Andrea\n// Tom\n// Jane\n// Steve\n//\n// Janet\n// Steve\n//\n// Andy\n// Andrea\n// Tom\n// Jane\n```\n\n## Prique\n\nbtype.Prique is a priority queue collection that sorts items by largest to \nsmallest. Data operations, such as Push() and Pop(), are O(log n).\n\nThis collection has support for duplicate items.\nIt also inherits the [Table](#table) collection, allowing for \n[Tagged struct keys](#tagged-struct-keys).\n\n### Operations\n\n```py\nPush(item) # Insert item into queue.\nPop()      # Remove the largest item.\nFront()    # Get the largest item.\n\nAll()      # Iterate items in order of largest to smallest.      (iter.Seq[T])\nDrain()    # Iterate and remove in order of largest to smallest. (iter.Seq[T])\n\nLen()      # Get the number of items in collection.\nCopy()     # Copy collection, fast O(1), uses Copy-on-write shadow cloning.\nClear()    # Remove all items from collection\nRelease()  # Same as Clear() but optimized for copied collections.\n```\n\n### Example\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\n\t\"github.com/tidwall/btype\"\n)\n\nfunc main() {\n\n\ttype User struct {\n\t\tage  int `btype:\"key\"`\n\t\tname string\n\t}\n\n\t// Create an queue of users\n\tvar users btype.Prique[User]\n\n\t// Add some names\n\tusers.Push(User{27, \"Andrea\"})\n\tusers.Push(User{54, \"Tom\"})\n\tusers.Push(User{31, \"Andy\"})\n\tusers.Push(User{43, \"Jane\"})\n\tusers.Push(User{29, \"Janet\"})\n\tusers.Push(User{62, \"Steve\"})\n\tusers.Push(User{31, \"Morton\"})\n\n\t// Iterate over the array and print each name\n\tfor user := range users.All() {\n\t\tfmt.Printf(\"%v %v\\n\", user.name, user.age)\n\t}\n\tfmt.Printf(\"\\n\")\n\n\t// Pop the first two names\n\tvar user User\n\tuser, _ = users.Pop()\n\tfmt.Printf(\"%v %v\\n\", user.name, user.age)\n\tuser, _ = users.Pop()\n\tfmt.Printf(\"%v %v\\n\", user.name, user.age)\n\tfmt.Printf(\"\\n\")\n\n\t// Print the names again\n\tfor user := range users.All() {\n\t\tfmt.Printf(\"%v %v\\n\", user.name, user.age)\n\t}\n\tfmt.Printf(\"\\n\")\n}\n\n// Output:\n// Steve 62\n// Tom 54\n// Jane 43\n// Morton 31\n// Andy 31\n// Janet 29\n// Andrea 27\n// \n// Steve 62\n// Tom 54\n// \n// Jane 43\n// Morton 31\n// Andy 31\n// Janet 29\n// Andrea 27\n```\n\n## Performance\n\nThe btype package has various optimizations that enhance performance over existing implementations.\n\n- Branch node counting.\n- Auto-detected search method.\n- Seperate keys and values for maps.\n- Prefixing in branch nodes for string keys.\n- Last-first search algo. (fast bounds check, fewer conditions, fast bulk loads)\n- Reference counted COW.\n\n### Benchmarks\n\nhttps://github.com/tidwall/btype-bench\n\n- CPU: Ryzen 9 5950X 16-Core Processor\n- Go: go version go1.26.0 linux/amd64\n- Rust: rustc 1.95.0 (59807616e 2026-04-14)\n- C: gcc (Ubuntu 11.4.0-1ubuntu1~22.04.3) 11.4.0\n- C++: g++ (Ubuntu 11.4.0-1ubuntu1~22.04.3) 11.4.0\n\n### Implementations\n\n- [tidwall/btype](https://github.com/tidwall/btype) Go\n- [google/btree](https://github.com/google/btree) Go\n- [tidwall/btree](https://github.com/tidwall/btree) Go\n- [rust/BTreeMap](https://doc.rust-lang.org/std/collections/struct.BTreeMap.html) Rust\n- [tidwall/bgen](https://github.com/tidwall/bgen) C\n- [frozenca/btree](https://github.com/frozenca/BTree) C++\n\nBenchmarking 1,000,000 items, 50 runs, taking the average result.\n\n### int32 keys\n\n```\ntidwall/btype\ninsert(seq)      1,000,000 ops in   0.017 secs   17.1 ns/op   58,389,383 op/sec\ninsert(rand)     1,000,000 ops in   0.076 secs   76.0 ns/op   13,159,734 op/sec\nget(seq)         1,000,000 ops in   0.030 secs   29.8 ns/op   33,599,978 op/sec\nget(rand)        1,000,000 ops in   0.064 secs   64.4 ns/op   15,535,343 op/sec\n\ntidwall/btree\ninsert(seq)      1,000,000 ops in   0.037 secs   36.9 ns/op   27,104,762 op/sec\ninsert(rand)     1,000,000 ops in   0.134 secs  134.3 ns/op    7,445,864 op/sec\nget(seq)         1,000,000 ops in   0.041 secs   41.4 ns/op   24,141,559 op/sec\nget(rand)        1,000,000 ops in   0.128 secs  127.9 ns/op    7,817,200 op/sec\n\ngoogle/btree\ninsert(seq)      1,000,000 ops in   0.070 secs   69.8 ns/op   14,321,709 op/sec\ninsert(rand)     1,000,000 ops in   0.153 secs  153.4 ns/op    6,518,280 op/sec\nget(seq)         1,000,000 ops in   0.065 secs   64.6 ns/op   15,486,010 op/sec\nget(rand)        1,000,000 ops in   0.155 secs  154.9 ns/op    6,454,916 op/sec\n\nrust/btree\ninsert(seq)      1,000,000 ops in   0.051 secs   51.0 ns/op   19,624,389 op/sec\ninsert(rand)     1,000,000 ops in   0.098 secs   98.2 ns/op   10,187,241 op/sec\nget(seq)         1,000,000 ops in   0.033 secs   32.6 ns/op   30,650,401 op/sec\nget(rand)        1,000,000 ops in   0.097 secs   97.0 ns/op   10,308,321 op/sec\n\ntidwall/bgen\ninsert(seq)      1,000,000 ops in   0.053 secs   52.6 ns/op   19,011,130 op/sec\ninsert(rand)     1,000,000 ops in   0.076 secs   75.8 ns/op   13,186,500 op/sec\nget(seq)         1,000,000 ops in   0.033 secs   33.0 ns/op   30,264,262 op/sec\nget(rand)        1,000,000 ops in   0.069 secs   68.9 ns/op   14,524,288 op/sec\n\nfrozenca/btree\ninsert(seq)      1,000,000 ops in   0.093 secs   92.7 ns/op   10,782,702 op/sec\ninsert(rand)     1,000,000 ops in   0.081 secs   81.5 ns/op   12,275,940 op/sec\nget(seq)         1,000,000 ops in   0.044 secs   44.2 ns/op   22,636,693 op/sec\nget(rand)        1,000,000 ops in   0.079 secs   79.1 ns/op   12,638,367 op/sec\n```\n\n### uint64 keys\n\n```\ntidwall/btype\ninsert(seq)      1,000,000 ops in   0.018 secs   18.3 ns/op   54,498,410 op/sec\ninsert(rand)     1,000,000 ops in   0.080 secs   80.3 ns/op   12,457,898 op/sec\nget(seq)         1,000,000 ops in   0.030 secs   30.1 ns/op   33,200,724 op/sec\nget(rand)        1,000,000 ops in   0.072 secs   72.4 ns/op   13,819,949 op/sec\n\ntidwall/btree\ninsert(seq)      1,000,000 ops in   0.039 secs   38.7 ns/op   25,824,082 op/sec\ninsert(rand)     1,000,000 ops in   0.146 secs  146.0 ns/op    6,849,574 op/sec\nget(seq)         1,000,000 ops in   0.053 secs   52.6 ns/op   19,010,440 op/sec\nget(rand)        1,000,000 ops in   0.141 secs  140.9 ns/op    7,099,716 op/sec\n\ngoogle/btree\ninsert(seq)      1,000,000 ops in   0.077 secs   76.8 ns/op   13,028,686 op/sec\ninsert(rand)     1,000,000 ops in   0.173 secs  172.9 ns/op    5,784,271 op/sec\nget(seq)         1,000,000 ops in   0.062 secs   61.9 ns/op   16,165,628 op/sec\nget(rand)        1,000,000 ops in   0.166 secs  166.4 ns/op    6,008,125 op/sec\n\nrust/btree\ninsert(seq)      1,000,000 ops in   0.044 secs   43.6 ns/op   22,936,305 op/sec\ninsert(rand)     1,000,000 ops in   0.105 secs  105.2 ns/op    9,502,632 op/sec\nget(seq)         1,000,000 ops in   0.034 secs   33.9 ns/op   29,509,841 op/sec\nget(rand)        1,000,000 ops in   0.107 secs  106.8 ns/op    9,362,769 op/sec\n\ntidwall/bgen\ninsert(seq)      1,000,000 ops in   0.054 secs   53.7 ns/op   18,605,963 op/sec\ninsert(rand)     1,000,000 ops in   0.081 secs   80.6 ns/op   12,406,050 op/sec\nget(seq)         1,000,000 ops in   0.033 secs   32.6 ns/op   30,657,821 op/sec\nget(rand)        1,000,000 ops in   0.075 secs   75.4 ns/op   13,269,668 op/sec\n\nfrozenca/btree\ninsert(seq)      1,000,000 ops in   0.094 secs   93.7 ns/op   10,668,965 op/sec\ninsert(rand)
