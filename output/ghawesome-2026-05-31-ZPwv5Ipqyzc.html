ft\">Model configuration</th>\n<th width=\"15%\" align=\"left\">Cost</th>\n<th width=\"15%\" align=\"left\">Multiplier</th>\n</tr>\n<tr>\n<td><b>Smart Routing ON</b></td>\n<td>Opus 4.5 (main) + Sonnet 4.5 (sub)</td>\n<td><b>$2.83</b></td>\n<td><b>1.1×</b></td>\n</tr>\n<tr>\n<td>Smart Routing OFF</td>\n<td>All Opus 4.5 (main + sub)</td>\n<td>$12.58</td>\n<td>5.0×</td>\n</tr>\n<tr>\n<td>Monolithic</td>\n<td>Single Opus 4.5 long-react (estimated)</td>\n<td>$12.20</td>\n<td>4.8×</td>\n</tr>\n<tr>\n<td colspan=\"4\"><img width=\"840\" height=\"1\" alt=\"\"/></td>\n</tr>\n</table>\n\n#### 2. Smart Routing — 1/6 the cost while beating frontier models on hard tasks\n\nThe research team benchmarked 7 complex tasks (multilingual podcast push, multi-source data reports, domain-specific literature review, codebase architecture docs, etc.). The \"strong main + light sub\" routing setup matches or beats the frontier single-model setup at a fraction of the cost:\n\n<table width=\"100%\">\n<tr>\n<th width=\"70%\" align=\"left\">Setting</th>\n<th width=\"15%\" align=\"left\">Score</th>\n<th width=\"15%\" align=\"left\">Cost</th>\n</tr>\n<tr>\n<td>MiniMax-M2.7 single-agent</td>\n<td>37.1</td>\n<td>$1.90</td>\n</tr>\n<tr>\n<td>Claude Sonnet 4.6 single-agent</td>\n<td>69.1</td>\n<td>$18.36</td>\n</tr>\n<tr>\n<td><b>Sonnet 4.6 (main) + MiniMax-M2.7 (sub)</b></td>\n<td><b>70.6</b></td>\n<td><b>$3.15</b></td>\n</tr>\n<tr>\n<td colspan=\"3\"><img width=\"840\" height=\"1\" alt=\"\"/></td>\n</tr>\n</table>\n\n#### 3. White-box Memory — layout & tone never bleed across projects\n\nIn black-box agents, mixing tasks in a shared context pool inevitably pollutes memory. PilotDeck's WorkSpace-scoped white-box memory addresses this end-to-end:\n\n<table width=\"100%\">\n<thead>\n<tr>\n  <th width=\"14%\" align=\"left\">Dimension</th>\n  <th width=\"41%\" align=\"left\">Current AI Agents (black-box)</th>\n  <th width=\"45%\" align=\"left\">PilotDeck (white-box)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n  <td><b>Visibility</b></td>\n  <td>You can't see what the AI remembers, only what it outputs</td>\n  <td>View every memory entry: what was stored, when, and which WorkSpace</td>\n</tr>\n<tr>\n  <td><b>Control</b></td>\n  <td>Once written, memory can't be edited or removed</td>\n  <td>Edit / delete entries, pin critical decisions so they don't drift</td>\n</tr>\n<tr>\n  <td><b>Traceability</b></td>\n  <td>When it goes wrong, you can't find the root cause</td>\n  <td>Generation → extraction → storage → retrieval, all auditable</td>\n</tr>\n<tr>\n  <td><b>Isolation</b></td>\n  <td>One shared pool — projects bleed into each other</td>\n  <td>Scoped per WorkSpace; A's memory never reaches B</td>\n</tr>\n<tr>\n  <td><b>Reversible</b></td>\n  <td>After compression, the original is gone</td>\n  <td>Dream-mode supports <b>one-click rollback</b> to the prior state</td>\n</tr>\n</tbody>\n</table>\n\n---\n\n## 🖥️ UI & Demo\n\nPilotDeck ships an out-of-the-box Web UI with full WorkSpace management, white-box memory editing, and visualization of multi-agent collaboration.\n\n### Use Cases\n\n> All demos below are generated entirely by edge-side models via PilotDeck's Smart Routing — no cloud-side frontier model required.\n\n#### Work Document Generation\n\n> *\"Survey the Chinese LLM application market and turn it into a formal HTML white paper.\"*\n\n<table width=\"100%\">\n<tr>\n<td width=\"50%\" align=\"center\"><b>Process</b></td>\n<td width=\"50%\" align=\"center\"><b>Result</b></td>\n</tr>\n<tr>\n<td><img src=\"assets/en/ppt_en.gif\" width=\"100%\"/></td>\n<td><img src=\"assets/result/ppt_result_en.gif\" width=\"100%\"/></td>\n</tr>\n</table>\n\n#### Mini-Game Development\n\n> *\"Walk me through building an iOS AR mini-game Ball Finder in Vibe Coding mode.\"*\n\n<table width=\"100%\">\n<tr>\n<td width=\"50%\" align=\"center\"><b>Process</b></td>\n<td width=\"50%\" align=\"center\"><b>Result</b></td>\n</tr>\n<tr>\n<td><img src=\"assets/en/iosgame_en.gif\" width=\"100%\"/></td>\n<td align=\"center\"><img src=\"assets/result/ios_game_result.gif\" width=\"60%\"/></td>\n</tr>\n</table>\n\n#### AI Engineering Platform Development\n\n> *\"Build a low-code embedding fine-tuning platform from scratch.\"*\n\n<table width=\"100%\">\n<tr>\n<td width=\"50%\" align=\"center\"><b>Process</b></td>\n<td width=\"50%\" align=\"center\"><b>Result</b></td>\n</tr>\n<tr>\n<td><img src=\"assets/en/modeltraining_en.gif\" width=\"100%\"/></td>\n<td><img src=\"assets/result/modeltrainingresult_en.gif\" width=\"100%\"/></td>\n</tr>\n</table>\n\n#### Audio-Video Editing & Social Media Operations\n\n> *\"Push this English podcast to a global audience in Chinese / Japanese / French / Korean / Spanish / Arabic.\"*\n\n<table width=\"100%\">\n<tr>\n<td width=\"50%\" align=\"center\"><b>Process</b></td>\n<td width=\"50%\" align=\"center\"><b>Result (with audio)</b></td>\n</tr>\n<tr>\n<td><img src=\"assets/en/podcast_en.gif\" width=\"100%\"/></td>\n<td>\n\nhttps://github.com/user-attachments/assets/a7245467-ee3c-4939-a055-c56576ac56d1\n\n</td>\n</tr>\n</table>\n\n---\n\n## 📦 Installation & Quick Start\n\nWe provide a one-line installer for macOS / Linux, plus a source-based workflow for developers.\n\n### Option A: One-line install (recommended, macOS / Linux)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/OpenBMB/PilotDeck/main/install.sh | bash\n```\n\nThe script auto-installs Node.js 22, clones the repo, installs dependencies, and builds the frontend. Once it finishes:\n\n```bash\npilotdeck            # starts the server at http://localhost:3001\npilotdeck status     # check runtime status\n```\n\n### Option B: From source (for developers)\n\n**1. Clone and install dependencies**\n\n> This repo uses [Git LFS](https://git-lfs.com/) for large media assets. Make sure `git lfs` is installed before cloning.\n> If you don't need the demo videos/GIFs, add `GIT_LFS_SKIP_SMUDGE=1` before `git clone` to skip downloading them.\n\n```bash\ngit clone https://github.com/OpenBMB/PilotDeck.git\ncd PilotDeck\n\nnpm install              # root deps (Gateway runtime)\ncd ui && npm install     # UI deps\ncd ..\n```\n\n**2. Configure a model provider**\n\nPilotDeck reads `~/.pilotdeck/pilotdeck.yaml`. You can create it manually, let the bootstrap script generate one, **or just open the Web UI and configure providers visually in the settings panel.**\nSupported protocols include OpenAI, Anthropic, DeepSeek, Qwen, Kimi, MiniMax and other OpenAI-compatible endpoints.\n\n```yaml\nschemaVersion: 1\nagent:\n  model: deepseek/deepseek-v4-pro\nmodel:\n  providers:\n    deepseek:\n      protocol: openai\n      url: https://api.deepseek.com/v1\n      apiKey: sk-your-api-key\n```\n\n**3. Start the services**\n\n```bash\ncd ui && npm run dev     # dev mode (HMR), visit http://localhost:5173\n# or\ncd ui && npm run start   # production mode, visit http://localhost:3001\n```\n\n### Option C: Docker Compose\n\nIf Docker is installed, you can start PilotDeck with:\n\n```bash\ndocker compose up -d\n```\n\n---\n\n## 🛠️ Extension Protocol\n\nPilotDeck has an open plugin architecture with a strict boundary between the open-source core and plugin customization. Extending the system is a `plugin.json` away:\n\n- **MCP Servers** — first-class integration with any Model Context Protocol server.\n- **Tools & Skills** — register custom tools, or pull community skills via [ClawHub](https://www.npmjs.com/package/clawhub).\n- **Lifecycle Hooks** — intercept `PreToolUse`, `UserPromptSubmit`, and other critical lifecycle events.\n- **Custom Memory** — plug in your own memory store provider.\n\n---\n\n## 🤝 Contributing\n\nThanks to everyone who has contributed code, feedback, and ideas. New contributors are warmly welcome — let's build the next-gen agent OS together.\n\nWorkflow: **Fork → feature branch → PR**.\n\n---\n\n## 💬 Community\n\n- For bugs and feature requests, please open a [GitHub Issue](https://github.com/OpenBMB/PilotDeck/issues).\n- Join our community channels:\n\n<table width=\"100%\">\n<tr>\n<td width=\"33%\" align=\"center\"><b>WeChat Community</b></td>\n<td width=\"33%\" align=\"center\"><b>Feishu Community</b></td>\n<td width=\"33%\" align=\"center\"><b>Discord Community</b></td>\n</tr>\n<tr>\n<td align=\"center\"><img src=\"assets/community/qr-wechat.png\" width=\"200\" alt=\"WeChat QR\"/></td>\n<td align=\"center\"><img src=\"assets/community/qr-feishu.png\" width=\"200\" alt=\"Feishu QR\"/></td>\n<td align=\"center\"><img src=\"assets/community/qr-discord.png\" width=\"200\" alt=\"Discord QR\"/></td>\n</tr>\n</table>\n\n---\n\n## 🙏 Acknowledgements\n\nWe thank Agent OS pioneers such as OpenClaw, Claude Code, Codex, Cursor, and Hermes for their explorations that helped shape this field.\n\nPilotDeck builds upon the following outstanding open-source projects:\n\n- [ClawXRouter](https://github.com/OpenBMB/ClawXRouter) — Intelligent model routing\n- [ClawXMemory](https://github.com/OpenBMB/ClawXMemory) — Agent memory system\n- [Claude Code UI](https://github.com/siteboon/claudecodeui) — Web UI reference\n- [Claude Code Router](https://github.com/musistudio/claude-code-router) — Model routing reference\n- [UltraRAG](https://github.com/OpenBMB/UltraRAG) — RAG framework\n- [Anthropic Skills](https://github.com/anthropics/skills) — Agent skill framework and built-in skills (skill-creator)\n- [Vercel Labs Skills](https://github.com/vercel-labs/skills) — find-skills skill\n- [MiniMax-AI Skills](https://github.com/MiniMax-AI/skills) — minimax-pdf skill\n- [frontend-slides](https://github.com/zarazhangrui/frontend-slides) — Create beautiful slides on the web using a coding agent's frontend skills\n- [Karpathy Guidelines](https://x.com/karpathy/status/2015883857489522876) — LLM coding behavioral guidelines\n- [Vite](https://github.com/vitejs/vite) — Frontend build tool\n- [React](https://github.com/facebook/react) — UI framework\n- [Tailwind CSS](https://github.com/tailwindlabs/tailwindcss) — Utility-first CSS framework\n- [shadcn/ui](https://github.com/shadcn-ui/ui) — Accessible component primitives for React\n\n---\n\n## 🏢 Joint Development\n\nPilotDeck is jointly developed by Tsinghua University [THUNLP](https://nlp.csai.tsinghua.edu.cn/), [ModelBest](https://modelbest.cn/), [OpenBMB](https://www.openbmb.cn/) and [AI9Stars](https://github.com/AI9Stars).\n\n---\n\n## ⭐ Support Us\n\nIf PilotDeck has been helpful in your work or research, please consider giving us a Star on GitHub!\n\n---\n\n## 📝 Citation\n\n```bibtex\n@misc{pilotdeck2026,\n  author       = {PilotDeck Team},\n  title        = {PilotDeck: A WorkSpace-Centric Open-Source Agent Operating System},\n  howpublished = {\\url{https://github.com/OpenBMB/PilotDeck}},\n  year         = {2026},\n  note         = {Accessed: 2026-05-29}\n}\n```\n\n## 📄 License\n\nThis project is licensed under the [GNU Affero General Public License v3.0](LICENSE).\n","summary":"PilotDeck is an open-source agent operating system built around a “WorkSpace” concept for long-running, multi-task productivity rather than one-off Q&A. It focuses on making agent memory white-box and traceable so you can pinpoint and edit the specific memory entry behind an outcome, while also tracking token costs per task and routing work to appropriate models to avoid unnecessary spend. With capabilities such as background task continuation, proactive progress reporting, and delivering results to disk, it targets teams and developers who want reliable, auditable AI agent workflows across multiple projects. It’s especially useful for users integrating AI assistants into IDEs and enterprise collaboration tools who need stronger operational control and repeatable agent performance.","description":"Task-oriented AI Agent productivity platform","stars":2319,"language":"TypeScript"},{"owner":"henliveira","repo":"av-curator","url":"https://github.com/henliveira/av-curator","readme":"# AV-Curator\n\n## The Problem\n\nIf you've ever tried to train (or evaluate) an audio-visual model on\n\"web video\", you know the data pipeline is usually 90% of the work.  Raw web\nvideo is full of:\n\n- title cards and black frames at scene boundaries\n- music intros and dead silence at clip ends\n- near-duplicate clips from re-uploads\n- watermarks, hardcoded subtitles, and PIP overlays\n- audio that's actually just the platform's stock background music\n- \"speech\" that's actually a melody or a foreign language you didn't ask for\n\nA `youtube-dl | ffmpeg | shuf | go` pipeline picks up all of this, and your\ndownstream training/eval ends up reflecting the noise rather than the signal.\n\n## The Approach\n\n`av-curator` is a small, opinionated **audio-visual data curation pipeline**\nthat runs a sequence of *cheap, swappable filters* over an input manifest\nand writes a clean output manifest (plus optional re-encoded clips).\n\nThe pipeline is intentionally modular — each filter is a function from\n`(clip metadata, sources) -> (passes?, decision_record)` — so you can:\n\n- start with just **scene-cut + silence-trim** and iterate from there\n- swap a heavy filter (e.g. CLIP-based dedup) for a fast one\n  (perceptual hash) without rewiring anything\n- log every filter decision per clip, for auditability\n\n## Show Me\n\n```bash\n# 1. Build a manifest from a directory of raw clips\nav-curate manifest data/raw/ --out manifest.jsonl\n\n# 2. Run the full default pipeline\nav-curate run manifest.jsonl --config configs/default.yaml \\\n    --out manifest.clean.jsonl --report report.html\n\n# 3. Slice the surviving clips with ffmpeg\nav-curate slice manifest.clean.jsonl --out data/processed/\n```\n\nThe `report.html` writes a small per-stage funnel:\n\n```\ninput:     10000 clips\n├─ codec_filter             ──▶  9871  (dropped 129 unreadable)\n├─ duration_filter (≥2s)    ──▶  9612  (dropped 259 too short)\n├─ silence_filter           ──▶  8954  (trimmed 982 / dropped 658 silent)\n├─ scene_cut (max 1 cut)    ──▶  8112  (split 612 / dropped 842)\n├─ phash_dedup              ──▶  7444  (dropped 668 near-dupes)\n├─ whisper_lang(en)         ──▶  6320  (kept en/zh)\n└─ clip_text_align          ──▶  5907  (dropped 413)\n```\n\n## Getting Started\n\n```bash\ngit clone https://github.com/henliveira/av-curator\ncd av-curator\npip install -e \".[full]\"\n```\n\nSystem dependencies: `ffmpeg`, `ffprobe`.  For CLIP/Whisper filters you'll\nwant a CUDA-capable PyTorch install.\n\n## How it works\n\n### Manifest format\n\nEvery stage reads and writes a JSONL of `Clip` records:\n\n```json\n{\n  \"id\": \"abc123\",\n  \"path\": \"data/raw/abc123.mp4\",\n  \"duration\": 12.4,\n  \"video\": {\"fps\": 25.0, \"width\": 1280, \"height\": 720, \"codec\": \"h264\"},\n  \"audio\": {\"sr\": 44100, \"channels\": 2, \"codec\": \"aac\"},\n  \"trims\": [[0.0, 12.4]],\n  \"tags\": [\"scene_clean\", \"lang=en\"],\n  \"scores\": {\"phash_min_dist\": 18.0, \"clip_text_align\": 0.27},\n  \"decisions\": [\n    {\"stage\": \"silence_filter\", \"verdict\": \"kept\", \"note\": \"trimmed 0.6s tail\"},\n    ...\n  ]\n}\n```\n\n### Filter contract\n\nA filter is a Python callable:\n\n```python\ndef my_filter(clip: Clip, ctx: Context) -> Decision:\n    ...\n    return Decision.keep(note=\"ok\")\n    return Decision.drop(reason=\"too dark\")\n    return Decision.trim([(0.2, clip.duration - 0.1)])\n    return Decision.split([(0.0, 4.1), (4.6, 12.4)])\n```\n\n`Decision` carries the verdict, an optional new trim list, and a free-form\nnote that's logged into the clip's `decisions` field.\n\n### Built-in filters\n\n| Filter            | Module                          | Cost |\n|-------------------|---------------------------------|------|\n| codec_filter      | `avcurator.filters.codec`       | cheap (ffprobe) |\n| duration_filter   | `avcurator.filters.duration`    | cheap |\n| black_frame       | `avcurator.filters.black_frame` | cheap (ffmpeg blackdetect) |\n| silence_filter    | `avcurator.filters.silence`     | cheap (ffmpeg silencedetect) |\n| scene_cut         | `avcurator.filters.scene_cut`   | medium (PySceneDetect) |\n| phash_dedup       | `avcurator.filters.phash`       | medium |\n| clip_phash_dedup  | `avcurator.filters.clip_dedup`  | heavy (CLIP embedding) |\n| whisper_lang      | `avcurator.filters.whisper`     | heavy (Whisper inference) |\n| clip_text_align   | `avcurator.filters.clip_align`  | heavy (CLIP) |\n| watermark_detect  | `avcurator.filters.watermark`   | heavy (template match + CNN) |\n\nEach filter is configured via a YAML stanza; see `configs/default.yaml` for\nthe canonical example.\n\n### Caching\n\nHeavy filters cache their per-clip results to disk (`.cache/<filter>/`) keyed\nby a hash of `(filter version, clip id, args)`.  Re-running the pipeline\nafter tweaking a cheap filter doesn't re-run the heavy ones.\n\n## Examples\n\n### \"I just want speech-heavy clips for ASR pre-training\"\n\n```yaml\nfilters:\n  - codec_filter\n  - duration_filter:\n      min: 2.0\n      max: 30.0\n  - silence_filter:\n      noise_db: -30\n      min_silence: 0.4\n  - whisper_lang:\n      keep: [en, zh]\n      min_speech_ratio: 0.6\n```\n\n### \"I want clean visual clips for video-LM pre-training\"\n\n```yaml\nfilters:\n  - codec_filter\n  - duration_filter: {min: 3.0}\n  - black_frame\n  - scene_cut: {max_cuts_per_clip: 1}\n  - phash_dedup: {hamming: 12}\n  - clip_text_align: {threshold: 0.22}\n```\n\n## Performance notes\n\n- The cheap filters run in a process pool over ffprobe / ffmpeg subprocesses\n  — single-machine throughput of ~5k clips / minute on 32 cores.\n- The heavy filters are batched on GPU; rough numbers for one A100-40G:\n  - CLIP filter — ~1200 clips / min (8-frame sampling)\n  - Whisper-large — ~600 clips / min (chunked)\n- Heavy filters can be sharded across nodes via `--shard idx/total` if you\n  bring your own scheduler.\n\n## What this isn't\n\n- A downloader.  `av-curate` starts from clips on disk; bring your own\n  `yt-dlp` step.\n- A training framework.  This produces clean **data**, nothing else.\n- A perfect filter.  No filter is.  Many filters are tuned conservatively\n  (drop is cheap; re-running training is not).\n\n## License\n\nBSD 3-Clause.\n\n## Acknowledgments\n\nBuilt on `ffmpeg`, [PySceneDetect](https://www.scenedetect.com/),\n[CLIP](https://github.com/openai/CLIP), and OpenAI's Whisper.  Inspired by\nseveral years of staring at messy web-video datasets.\n","summary":"AV-Curator is an opinionated audio-visual data curation pipeline designed to clean up “web video” before training or evaluating AV models. It processes an input JSONL manifest through a sequence of modular, swappable filters—such as codec/duration checks, black-frame and silence handling, scene cutting, perceptual-hash deduplication, and language/speech/text alignment—logging per-clip decisions for auditability. The project also supports slicing or re-encoding the surviving clips into a processed dataset. It’s a strong fit for researchers and engineers building AV datasets who want a reliable way to reduce noise like dead silence, near-duplicates, watermarks/subtitles/PIP artifacts, and mismatched audio content without writing an end-to-end pipeline from scratch.","description":"Audio-visual data curation pipeline — scene cuts, silence trim, dedup, CLIP/Whisper filtering for messy web video.","stars":229,"language":"Python"},{"owner":"ytnrvdf","repo":"wha-spell-simulator","url":"https://github.com/ytnrvdf/wha-spell-simulator","readme":"# Witch Hat Atelier Spell Simulator\n\nA fan-made browser-based spell drawing simulator inspired by *[Witch Hat Atelier](https://en.wikipedia.org/wiki/Witch_Hat_Atelier)*.\n\n<div align=\"center\">\n  <img src=\"./assets/demo.gif\" width=\"720\"/>\n  <p>Try here: <a href=\"https://ytnrvdf.github.io/wha-spell-simulator\">https://ytnrvdf.github.io/wha-spell-simulator</a></p>\n</div>\n\n## Fan Project Notice\n\nThis is an unofficial fan-made project for learning, experimentation, and appreciation. It is not affiliated with, endorsed by, or sponsored by the official creators, publishers, licensors, or production partners of *Witch Hat Atelier*.\n\n*Witch Hat Atelier* and related names, artwork, symbols, and trademarks belong to their respective rights holders. The sigils, signs, spell terminology, and visual effects in this project are partial fan references and interactive interpretations, not official assets or canonical rules.\n\n## What It Does\n\nThe app turns a freehand spell diagram into parser output, compiled spell behavior, and animated canvas effects.\n\n- Lets you draw spell diagrams on a paper-like canvas.\n- Detects one enclosing ring and distinguishes prepared versus active spells.\n- Recognizes dictionary-backed primary sigils for fire, water, wind, earth, and light.\n- Recognizes signs that modify direction, levitation, convergence, force, spread, focus, range, duration, and stability.\n- Produces parser diagnostics, `GlyphAST`, and `SpellIR` output for inspection.\n- Renders animated element effects from the compiled spell behavior.\n- Shows sample spell layouts in the Dictionary panel as drawing references.\n- Includes reference tools for making, viewing, and testing stroke templates, plus a spell effect lab for visual and animation tuning.\n\n## Current Limitations\n\n- The app supports one enclosing spell ring at a time. Multiple rings are detected as unsupported.\n- The current compiler expects one primary sigil. Multiple primary sigils are detected as unsupported.\n- Recognition is based on local stroke templates, so it works best with clean, deliberate drawings.\n- The recognizer is not perfect. Some valid-looking drawings may fail to match, and some rough drawings may need to be redrawn more clearly.\n- The dictionaries only cover a small fan-made subset of sigils, signs, and observed spell ideas.\n- The visual effects are interpretive canvas animations, not a faithful reproduction of manga or anime effects.\n- Raster images can be used as visual references, but the app cannot recover true stroke order from an image.\n- Closed but invalid diagrams may show diagnostics, but they do not fall back to another element.\n- This is a browser prototype, not a production drawing engine or general symbol recognizer.\n\n## Run Locally\n\nInstall dependencies:\n\n```sh\nnpm install\n```\n\nStart the Vite dev server:\n\n```sh\nnpm start\n```\n\nThen open:\n\n```txt\nhttp://127.0.0.1:5173/\n```\n\n## Reference Tools\n\nThese tools are available from the app:\n\n```txt\n/tools/strokeTemplateMaker.html\n/tools/strokeTemplateViewer.html\n/tools/sigilSignDetectorLab.html\n/tools/spellEffectLab.html\n```\n\n## Tests\n\nRun the Node test suite:\n\n```sh\nnpm test\n```\n\n## Documentation\n\n- [Dictionary authoring](docs/dictionary-authoring.md)\n- [Parser and spell semantics rules](docs/play-rules.md)\n- [Parsed glyph output contract](docs/glyph-ast.md)\n- [Compiled spell output contract](docs/spell-ir.md)\n- [Visual effect renderer notes](docs/effect-rendering.md)\n","summary":"ytnrvdf/wha-spell-simulator is a fan-made, browser-based spell drawing simulator inspired by *Witch Hat Atelier*. It lets you draw paper-like spell diagrams and then parses the strokes into diagnostic output plus structured intermediate representations (GlyphAST and SpellIR), recognizing a primary sigil and various modifying signs to drive compiled spell behavior. The app also renders interpretive animated element effects and provides built-in labs/tools for reference layouts, stroke template creation/viewing, and effect tuning. This is a great fit for fans and developers who want to experiment with gesture recognition, template-driven parsers, and visual/animation pipelines in the context of an imaginative spell system.","description":"A fan-made browser-based Witch Hat Atelier spell simulator.","stars":413,"language":"JavaScript"},{"owner":"AmmarkoV","repo":"SAM3DBody-cpp","url":"https://github.com/AmmarkoV/SAM3DBody-cpp","readme":"# SAM3DBody-cpp\n\nStandalone C++ inference engine for **SAM-3D-Body** — zero Python dependency at runtime.\n\nTakes a BGR image and produces per-person MHR body pose parameters, camera translation, and optionally full 3D mesh vertices + 70 body/hand keypoints, all via ONNX Runtime + ggml.\n\nAlso includes Python frontends that call the compiled shared library via ctypes, and a CSV exporter for the 70 MHR keypoints.\n\n### 🎬 Multi-person BVH motion-capture export\n\n`--bvh PATH` writes a **standard BVH motion-capture file per detected person** (`p_0.bvh`, `p_1.bvh`, …).\nIdentities are kept stable across frames by a built-in 2D-bbox IoU tracker, each\nfile's joint OFFSETs are auto-resized to the actor's measured bone lengths, and the\noutput drops straight into Blender / BVHTester / any DCC. A bundled\n[`blender/blender_bvh_plugin.py`](blender/blender_bvh_plugin.py) drives a\nMakeHuman-rigged character from the result. See **[BVH export](#bvh-export---bvh)** for details.\n\n```bash\n./fast_sam_3dbody_run --from clip.mp4 --bvh ./p.bvh --headless\n# → p_0.bvh, p_1.bvh, …\n```\n\n[![SAM3DBody-cpp — watch a video in Youtube](doc/vid.jpg)](https://www.youtube.com/watch?v=f-tCwCQvurQ)\n\n\n<p align=\"center\"><em>If you want to see the repo in action, there is a <a href=\"https://www.youtube.com/watch?v=f-tCwCQvurQ\">Youtube video here</a></em></p>\n\n---\n\n## Models\n\nPre-built ONNX / GGUF / LBS model files are hosted on HuggingFace:\n\n**[https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models](https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models)**\n\n### With a CUDA GPU (recommended)\n\nDownload the all-in-one zip, extract it, and place the resulting `onnx/` directory at the repo root:\n\n```bash\nwget https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/resolve/main/SAM3DBody-cpp-onnx-models.zip\nunzip SAM3DBody-cpp-onnx-models.zip\n# onnx/ is now at the repo root — ready to build\n```\n\n| File | Size | Description |\n|------|------|-------------|\n| `onnx/backbone.onnx` + `.data` | ~4.8 GB | DINOv3-ViT-H/14+ encoder (BF16, CUDA EP only) |\n| `onnx/decoder.onnx` | ~93 MB | 6-layer PromptableDecoder |\n| `onnx/yolo.onnx` | ~81 MB | YOLO11m-pose person detector |\n| `onnx/pipeline.gguf` | ~5 MB | MHR + camera projection heads |\n| `onnx/body_model.lbs` | ~27 MB | Native C LBS data (joints, weights, shape) |\n| `onnx/correctives.bin` | ~33 MB | Pose corrective blend shapes |\n| `onnx/keypoint_mapping.bin` | ~8 KB | MHR-70 keypoint index map |\n\n### Without a CUDA GPU (CPU-only)\n\nThe standard `backbone.onnx` is exported in BFloat16 and **requires a CUDA GPU** — it will not load on the ORT CPU execution provider.\nA float32 CPU-compatible backbone is available as a separate download from the same HuggingFace repo.\n \n\nDownload these two files and place them alongside the rest of the models in `onnx/`:\n\n| File | Size | Description | Links |\n|------|------|-------------| ---- |\n| `backbone_fp32.onnx` | ~1 MB | Graph (references external data) | [Link](https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/blob/main/backbone_fp32.onnx) |\n| `backbone_fp32.onnx.data` | ~3.2 GB | Float32 weights — no BF16, CPU EP compatible | [Link](https://huggingface.co/AmmarkoV/SAM3DBody-cpp-onnx-models/blob/main/backbone_fp32.onnx.data) |\n\nThen run with `--backbone backbone_fp32.onnx --cuda -1`:\n\n```bash\n./build/fast_sam_3dbody_run \\\n    --onnx-dir ./onnx \\\n    --backbone backbone_fp32.onnx \\\n    --cuda     -1 \\\n    --from     your_video.mp4\n```\n\n> **Performance expectations for CPU inference:**\n> DINOv3-ViT-H has ~630 M parameters. On a modern laptop CPU, one backbone\n> forward pass takes **5–15 seconds**, making video processing impractical.\n> Single-image or low-frequency use cases are feasible. For anything\n> approaching real-time, a CUDA-capable GPU is required.\n>\n> WSL2 users: if `nvidia-smi` works inside WSL, install the\n> [CUDA toolkit for WSL2](https://developer.nvidia.com/cuda-downloads)\n> (do **not** install the full Linux driver — only the WSL2 toolkit) and use\n> the standard `backbone.onnx` instead.\n\n> **CMake will warn** at configure time if neither `onnx/` nor the zip is found.\n\n---\n\n## Pipeline\n\nThis is **not** 2D-to-3D lifting. The network directly regresses 3D body model\nparameters from image features — no depth sensor, no floor plane, no stereo.\n\nStarting from a raw image the pipeline does:\n\n1. **YOLO** detects person bounding boxes.\n2. Each crop is fed to a **DINOv2-ViT-H backbone** producing a `[1280, 32, 32]`\n   spatial feature map.\n3. A **transformer decoder** (conditioned on the crop's ray directions and\n   focal length) compresses that feature map into a 1024-dim pose token.\n4. Two small **FFN heads** (run on CPU via ggml) decode the token into:\n   - **519 pose parameters** — global orientation (6D continuous rotation),\n     per-joint Euler angles for 127 joints, SMPL-like shape betas (45),\n     hand pose (108), and face expression (72).\n   - **3 camera parameters** `[scale, tx, ty]` → world-space translation\n     `[tx, ty, tz]`.\n5. Those parameters drive **linear blend skinning (LBS)** over 18 439 vertices\n   to produce the full body mesh and 70 keypoints.\n\nThe focal length is estimated from the image diagonal and baked into the\ndecoder's conditioning input, so the network learns to associate apparent body\nsize in the crop with metric depth — the same monocular depth-from-body-proportions\napproach used by SMPL/HMR-family models. The body is placed in **camera space**\nvia the predicted root translation; floor-plane recovery is a downstream step if\nneeded.\n\n```\nBGR image\n  │\n  ▼  yolo.onnx            ONNX Runtime (CUDA EP)   person bboxes + 17 COCO keypoints\n  │\n  ▼  backbone.onnx        ONNX Runtime (CUDA EP)   feature map  [B, 1280, 32, 32]\n  │   DINOv3-ViT-H/14+\n  │\n  ▼  decoder.onnx         ONNX Runtime (CUDA EP)   pose token   [B, 1024]\n  │   6-layer PromptableDecoder\n  │\n  ▼  pipeline.gguf        CPU matmul (ggml)         MHR params [B, 519] + camera [B, 3]\n  │   MHR head + camera head weights\n  │\n  ▼  body_model.lbs       native C LBS (optional)   vertices [18439, 3] in metres\n      extracted once by tools/extract_lbs_data.py\n```\n\n> **Note:** `body_model.onnx` export is blocked on PyTorch ≥ 2.x (torch.export rejects\n> TorchScript modules). The native C LBS path reads `body_model.lbs` directly and\n> produces identical output to Python `mhr_forward` (body model stores data in cm;\n> `mhr_lbs_compute` applies ×0.01 to match Python's `/100` conversion).\n\n**Per-person output** (`MHRResult` / `FsbResult`):\n\n| Field | Shape | Description |\n|-------|-------|-------------|\n| `bbox` | [4] | x1 y1 x2 y2 in original image pixels |\n| `focal_length` | scalar | Estimated focal length (pixels) |\n| `pred_cam_t` | [3] | Raw camera head output: [s, tx, ty] |\n| `global_rot` | [3] | Global orientation – Euler ZYX (radians) |\n| `body_pose` | [133] | Body joint angles – Euler |\n| `shape` | [45] | SMPL-like identity blend shape betas |\n| `scale` | [28] | Scale PCA components |\n| `hand_pose` | [108] | Hand joints: left [54] + right [54] |\n| `face_params` | [72] | Facial expression parameters |\n| `mhr_model_params` | [204] | Assembled LBS parameter vector (passed to `mhr_lbs_compute`) |\n| `yolo_kps` | [51] | COCO 17 keypoints × [x, y, confidence] |\n| `pred_vertices` | [55317] | 18439 verts × 3, metres (when native C LBS runs) |\n| `kps_3d` | [210] | 70 joints × 3, metres (when native C LBS runs) |\n| `kps_2d` | [140] | 70 joints × 2 projected (when native C LBS runs) |\n\n---\n\n## Directory layout\n\n```\nSAM3DBody-cpp/\n├── CMakeLists.txt\n├── body_mesh.tri                     SMPL-like body mesh for the GL renderer\n├── fast_sam_3dbody_frontend.py       Python lightweight frontend (ctypes, no extra deps)\n├── fast_sam_3dbody_frontend-3D.py    Python 3D frontend (ctypes + Python body model)\n├── fast_sam_3dbody_dump_csv.py       Python CSV exporter – 70 MHR keypoints per frame\n├── two_pass.py                       Second-pass temporal smoother\n├── ros_demo_webcam.py                ROS demo\n├── onnx/                             Runtime model files – download from HuggingFace (see above)\n│   ├── backbone.onnx + .data         ~4.8 GB  DINOv3-ViT-H/14+ encoder\n│   ├── decoder.onnx                  ~93 MB   6-layer PromptableDecoder\n│   ├── pipeline.gguf                 ~5 MB    MHR + camera heads\n│   ├── yolo.onnx                     ~81 MB   YOLO11m-pose\n│   ├── body_model.lbs                ~27 MB   native C LBS data\n│   ├── correctives.bin               ~33 MB   pose corrective blend shapes\n│   └── keypoint_mapping.bin          ~8 KB    MHR-70 keypoint index map\n├── GraphicsEngine/\n│   ├── System/glx3.{h,c}            GLX window management\n│   └── ModelLoader/                  .tri mesh loader + LBS joint transform\n├── AmMatrix/                         Lightweight C matrix / quaternion library\n├── render/\n│   ├── fast_sam_3dbody_render.cpp    OpenGL mesh overlay renderer\n│   └── mhr_pose_driver.h             LBS driver (camera matrices, vertex update)\n├── scripts/\n│   └── build.sh / setup.sh / webcam.sh / video.sh / offline_video.sh\n└── src/\n    ├── fast_sam_3dbody.h             C++ public API\n    ├── fast_sam_3dbody.cpp           Pipeline implementation\n    ├── fast_sam_3dbody_capi.h        Plain C API (for ctypes)\n    ├── fast_sam_3dbody_capi.cpp\n    ├── preprocess.hpp                Crop, normalise, ray_cond, NMS, pose conversion\n    ├── bvh_writer.h / bvh_writer.cpp BVH motion-capture exporter (multi-person, name-mapped to MHR joints)\n    ├── mhr_joint_table.h             Generated by scripts/build_joint_table.py — MHR joint names + parents\n    └── main.cpp                      CLI executable (--bvh, --out CSV, live overlay window)\n```\n\n> **Developer tools** (ONNX/GGUF export, LBS extraction, debug scripts, Python training env) live in the parent project:\n> **[https://github.com/AmmarkoV/Fast-SAM-3D-Body](https://github.com/AmmarkoV/Fast-SAM-3D-Body)**\n\n---\n\n## Setup\n\n### 1. Download models\n\nSee the **[Models](#models)** section above. After extracting the zip, `onnx/` should be at the repo root.\n\n> To build models from source (requires the original Python training environment), see\n> [Fast-SAM-3D-Body](https://github.com/AmmarkoV/Fast-SAM-3D-Body).\n\n### 2. Build\n\nRequirements: CMake ≥ 3.18, C++17 compiler, OpenCV (core/imgproc/videoio/highgui/dnn), optional CUDA Toolkit.\n\n```bash\ncd fast_sam_3dbody_cpp\nmkdir -p build && cd build\n\ncmake .. -DCMAKE_BUILD_TYPE=Release\nmake -j$(nproc)\n```\n\nCMake handles dependencies automatically:\n- **ONNX Runtime 1.20.1** – downloaded from GitHub releases if not found; point to an existing install with `-DONNX_RUNTIME_DIR=/path/to/onnxruntime`\n- **ggml** – fetched via `FetchContent` from GitHub\n- **CUDA** – auto-detected; set `-DCMAKE_CUDA_ARCHITECTURES=86` (or `75`, `89`, etc.) for your GPU; falls back to CPU-only if not found\n\nOutputs in `build/`:\n\n| File | Description |\n|------|-------------|\n| `fast_sam_3dbody_run` | Standalone CLI executable |\n| `libfast_sam_3dbody.so` | Shared library for C++ linking or ctypes |\n\n---\n\n## Running\n\n### CLI executable\n\n```bash\ncd fast_sam_3dbody_cpp/build\n\n# Single image – prints pose params to stdout\n./fast_sam_3dbody_run \\\n    --onnx-dir ../onnx \\\n    --gguf     ../onnx/pipeline.gguf \\\n    --yolo     ../onnx/yolo.onnx \\\n    --from     ../../assets/teaser.png\n\n# Webcam (device 0)\n./fast_sam_3dbody_run \\\n    --onnx-dir ../onnx --gguf ../onnx/pipeline.gguf --yolo ../onnx/yolo.onnx \\\n    --from 0\n\n# Video file\n./fast_sam_3dbody_run \\\n    --onnx-dir ../onnx --gguf ../onnx/pipeline.gguf --yolo ../onnx/yolo.onnx \\\n    --from /path/to/video.mp4\n\n# Fastest mode – skip LBS body model (no vertices, just pose params)\n./fast_sam_3dbody_run ... --skip-body\n\n# CPU-only\n./fast_sam_3dbody_run ... --cuda -1\n```\n\nFull option list:\n\n```\n--onnx-dir PATH    Directory with backbone/decoder/body_model ONNX files\n--gguf     PATH    pipeline.gguf (MHR + camera heads)\n--yolo     PATH    YOLO pose model (.onnx)\n--from     SRC     Webcam index (0,1,..) or path to image/video\n-o / --out PATH    Write 70-joint 3D keypoints to CSV per frame\n--bvh      PATH    Write BVH motion capture file(s) to PATH (see \"BVH export\" below)\n--bvh-template P   BVH skeleton template (default: ./body.bvh)\n--no-bvh-body-shape-change   Keep template body bone lengths (skip per-person rewrite)\n--no-bvh-hand-shape-change   Keep template hand/finger bone lengths (skip per-person rewrite)\n--bvh-raw-fingers            Do NOT rescale finger End-Site OFFSETs (keeps body.bvh's authored fingertips)\n--cuda     DEVICE  CUDA device index (default 0; -1 = CPU)\n--skip-body        Skip body model (no vertices / keypoints)\n--headless         No display window\n--thresh   T       YOLO person confidence threshold (default 0.50)\n--nms      T       YOLO NMS IoU threshold (default 0.45)\n--fx / --fy F      Camera focal length x/y in pixels (0 = image width)\n--cx / --cy F      Principal point (0 = image centre)\n--render-size W H  Override display window size\n--size W H         Webcam capture resolution\n--fps Z            Webcam capture framerate\n--butterworth      Apply Butterworth low-pass filter to MHR output vectors\n--bw-cutoff HZ     Butterworth cutoff frequency in Hz (default 6.0)\n--butterworth-root-rotation  Filter global_rot in quaternion space (1st-order SLERP-EMA, see \"Output filtering\")\n--rot-clamp DEG    Geodesic SLERP-step clamp on global_rot in degrees/frame (default 1; 0 = no clamp)\n--info             Print pipeline info and exit\n--help             Show this message\n```\n\n### Python lightweight frontend\n\nDraws COCO 2D skeletons and a pose-bar panel. Requires only `opencv-python` and `numpy` — no PyTorch.\n\n```bash\n# From the repo root:\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend.py --from assets/teaser.png\n\n# Webcam, cap at 3 persons\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend.py --from 0 --max-skeletons 3\n\n# Save output image / video\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend.py \\\n    --from assets/teaser.png --out out.jpg\n\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend.py \\\n    --from video.mp4 --headless --out out.mp4\n```\n\nKey options (same as CLI, plus):\n\n```\n--max-skeletons N  Cap persons drawn per frame (0 = unlimited)\n--headless         No display window\n--out PATH         Write result to image or video file\n```\n\n### Python 3D frontend\n\nFull 3D mesh rendering identical to `demo_webcam.py`: four-panel output\n`[original | 2D skeleton | front mesh | side mesh]`.\n\nUses the C engine for the fast path (YOLO → backbone → decoder → MHR FFN heads),\nthen calls the Python MHR body model (`mhr_model.pt`) for LBS skinning to produce\nmesh vertices. Requires the full Python environment (PyTorch, sam_3d_body package, pyrender).\n\n```bash\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend-3D.py --from assets/teaser.png\n\n# Webcam\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend-3D.py --from 0 --max-skeletons 3\n\n# Custom checkpoint paths\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend-3D.py \\\n    --from assets/teaser.png \\\n    --checkpoint ./checkpoints/sam-3d-body-dinov3/model.ckpt \\\n    --mhr-model  ./checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt\n\n# Save result\npython fast_sam_3dbody_cpp/fast_sam_3dbody_frontend-3D.py \\\n    --from assets/teaser.png --out result_3d.jpg\n```\n\nKey options (same as lightweight frontend, plus):\n\n```\n--checkpoint PATH  Path to model.ckpt (default: checkpoints/sam-3d-body-dinov3/model.ckpt)\n--mhr-model  PATH  Path to mhr_model.pt\n--device     STR   PyTorch device for body model: cuda or cpu (default: auto)\n```\n \n\n---\n\n## Output filtering\n\nThe CLI can apply a second-order [Butterworth low-pass filter](https://en.wikipedia.org/wiki/Butterworth_filter)\nto the MHR output vectors on every frame, reducing per-frame jitter without introducing ripple in the\npassband.\n\n> 🎬 See it in action: [smooth tracking of a female dancer](https://www.youtube.com/shorts/tQ8WP5uYVzA) (YouTube Short).\n\n```bash\n# Enable with the default 6 Hz cutoff\n./fast_sam_3dbody_run --from video.mp4 --butterworth\n\n# Lower cutoff for smoother (more lag) output\n./fast_sam_3dbody_run --from video.mp4 --butterworth --bw-cutoff 3.0\n\n# Higher cutoff to preserve faster motion\n./fast_sam_3dbody_run --from video.mp4 --butterworth --bw-cutoff 10.0\n```\n\nThe filter is applied in-place to each detected person's result immediately after inference,\nso all downstream consumers (CSV writer, BVH writer, display overlay) receive filtered data.\n\n### Filtered vectors\n\n| Vector | Channels | Method | Description |\n|--------|----------|--------|-------------|\n| `keypoints_3d` | 210 (70 joints × 3) | Butterworth | 3-D joint positions in metres |\n| `body_pose` | 133 | Butterworth | Body joint Euler angles |\n| `hand_pose` | 108 | Butterworth | Hand joint angles (left 54 + right 54) |\n| `global_rot` | 3 | **Quaternion SLERP-EMA** | Global orientation – filtered on SO(3), see below |\n| `pred_cam_t` | 3 | Butterworth | Camera / root translation |\n\n`global_rot` is **not** filtered with the scalar Butterworth path. Doing that\non either the Euler triple or the four quaternion components fails for two\nreasons rooted in the geometry of rotations:\n\n1. **Euler wrap.** A rotation passing 180° jumps from +π to −π on the\n   axis storage, even though the actual orientation moved 0°. A per-axis\n   low-pass interpolates *linearly through that discontinuity*, briefly\n   flipping the whole body for ~τ seconds (the filter time-constant) every\n   time the model crosses a wrap or a gimbal-lock pole.\n2. **SO(3) is not a vector space.** Butterworth's \"maximally-flat magnitude\"\n   guarantee is a theorem about scalar LTI systems; it does not transfer to\n   rotations no matter which parametrisation you filter. Per-channel\n   smoothing of an Euler triple produces a composed rotation that is neither\n   the input nor a geometrically meaningful interpolant.\n\nSo instead, when `--butterworth-root-rotation` is on, `global_rot` is filtered\nin **quaternion space** by a 1st-order SLERP-EMA (`QuatLPF` in\n`src/outputFiltering.h`):\n\n  1. Convert the input Euler triple to a unit quaternion.\n  2. **Hemisphere-correct** — if `dot(q_filt_prev, q_input) < 0`, negate\n     `q_input`. `q` and `−q` represent the same orientation, so this removes\n     the spurious 180° jump.\n  3. Compute the geodesic angle `θ = 2·acos(|dot|)` and pick a SLERP\n     fraction `t = min(α, --rot-clamp / θ)`. The `α` comes from the same\n     `--bw-cutoff` time-constant used elsewhere.\n  4. `q_filt ← SLERP(q_filt_prev, q_input_hemi, t)`, renormalise.\n  5. Convert back to Euler-ZYX for storage.\n\nThis trades Butterworth's maximally-flat magnitude (a guarantee that does\nnot apply to SO(3) anyway) for **geodesic monotonicity**, **no-flip\ncontinuity** across the wrap, and a single rotation-angle distance metric.\nIt's 1st-order (−6 dB/octave) where the linear channels are 2nd-order, but\nthat's the right trade-off for rotation — see the comment block in\n`outputFiltering.h` for the full rationale.\n\n`--rot-clamp` is now a geodesic outlier *clamp on the SLERP step*, not a\nframe-rejection threshold: rapid input motion gets attenuated to at most\n`rot-clamp` deg/frame in the output, never frozen. A single bad FFN frame\nwith a 180° flip is therefore absorbed smoothly across a few frames rather\nthan overwriting the orientation.\n\n### Parameters\n\n| Flag | Default | Notes |\n|------|---------|-------|\n| `--butterworth` | off | Enable the filter |\n| `--bw-cutoff HZ` | `6.0` | Cutoff frequency in Hz. Lower = smoother but more temporal lag. Human motion typically stays below 6 Hz; use 3–4 Hz for very smooth output, 8–10 Hz to preserve fast gestures. |\n| `--butterworth-root-rotation` | off | Run the quaternion SLERP-EMA on `global_rot` (see above). Off by default because the very first input frame seeds the filter, so a bad initial prediction would otherwise lock the sequence to it. |\n| `--rot-clamp DEG` | `1.0` | Geodesic clamp on the SLERP step in **degrees per frame**. The filter's output never moves more than this many degrees of rotation per frame. With the new quaternion filter this *attenuates* fast input rather than rejecting it. Set to `0` to disable the clamp (pure EMA). |\n\nThe sampling rate is taken from `--fps` when specified, otherwise 30 Hz is assumed.\nEach person slot maintains its own independent filter bank; new person slots are\ninitialised with a warm-up pass on their first frame so the filter starts from the\nmeasured value rather than zero.\n\n### Implementation\n\nImplemented in `src/outputFiltering.h` — a header-only, dependency-free,\nC-compatible file containing two primitives:\n\n- `ButterWorth` — scalar 2nd-order IIR low-pass used for `keypoints_3d`,\n  `body_pose`, `hand_pose`, `pred_cam_t`. Initialised with\n  `initButterWorth(sensor, fs, fc)` and stepped with `filter(sensor, value)`.\n- `QuatLPF` — 1st-order SLERP-EMA on unit quaternions, used only for\n  `global_rot`. Initialised with `init_quat_lpf(&qf, fs, fc)` and stepped\n  with `filter_quat(&qf, in_quat, max_step_rad, out_quat)`. The header also\n  provides `euler_zyx_to_quat(rz, ry, rx, out)` and `quat_to_euler_zyx(in,\n  &rz, &ry, &rx)` since `global_rot` is stored in MHR's ZYX-intrinsic Euler\n  order.\n\n---\n\n## BVH export (`--bvh`)\n\nExports the per-frame MHR pose as one or more standard BVH motion-capture files.\nThe hierarchy is taken from a BVH template (default `./body.bvh`, a [MocapNET](https://github.com/FORTH-ModelBasedTracker/MocapNET)/[MakeHuman](https://static.makehumancommunity.org/)\nT-pose skeleton); the motion comes from the MHR pipeline.\n\n```bash\n# Single image / video / webcam → one or more <name>_<id>.bvh files\n./fast_sam_3dbody_run --from boom.mp4 --bvh ./p.bvh --headless\n# produces ./p_0.bvh, ./p_1.bvh, … (one per tracked person)\n```\n\n### What gets written\n\nFor each detected person, every frame:\n\n* **Root joint** — translation from `pred_cam_t` (×100 to convert metres → cm)\n  and orientation from MHR's global rotation, in the BVH root's\n  `Zrotation Yrotation Xrotation` channel order.\n* **Body joints** matched by name to MHR (~50 joints incl. spine, arms, legs,\n  fingers — full table in `src/bvh_writer.cpp` `NAME_MAP`). The local rotation\n  is computed in MHR's frame as `inv(delta[parent]) · delta[self]`, where\n  `delta[j] = R_global_mhr[j] · R_global_mhr_rest[j]⁻¹`, then decomposed to the\n  joint's BVH channel order (`Zrotation Xrotation Yrotation`).\n* **Unmapped BVH joints** (toes, face details, BVH metacarpals, etc.) stay at\n  zero rotation — MHR doesn't predict angles for them.\n* **OFFSETs** are rewritten at close-time to each person's median observed bone\n  length so the template T-pose proportions match the actual subject. Bone\n  *direction* is preserved (changing it disrupts the T-pose look the BVH file\n  was authored with).\n* **Per-category opt-out** with `--no-bvh-body-shape-change` and\n  `--no-bvh-hand-shape-change`. body.bvh's authored hands are shorter than the\n  MHR skeleton's (proximal phalanx 2.3 cm vs 3.8 cm), so rewriting visibly\n  *enlarges* fingers — pass `--no-bvh-hand-shape-change` to keep body.bvh's\n  authored hand proportions while still resizing the rest of the body to match\n  the subject. The body flag is the symmetric escape hatch for the trunk/limbs.\n* **Finger-tip End-Site compensation** (default on). The End-Site OFFSETs at\n  the end of each finger have no channels so the bone-length rewrite never\n  touches them, and body.bvh's are ~0.3 cm longer than the MHR `*_null` tip\n  extensions. By default we rescale all 10 finger End-Site OFFSETs to the\n  MHR length (direction preserved). Pass `--bvh-raw-fingers` to leave them\n  exactly as authored.\n\n### Multi-person export\n\nMultiple skeletons in the same scene are exported as **separate BVH files**, one\nper tracked identity. Identity persistence is handled by a built-in\nbbox-IoU greedy tracker:\n\n* IoU threshold `0.10`; tracks are retired after `90` frames missing (≈ 3 s at\n  30 fps).\n* Detections with degenerate bboxes (anchored at `(0, 0)` or near-zero area)\n  are dropped before they hit the tracker — these are common YOLO failure\n  modes that otherwise would spawn spurious tracks.\n* While a track is alive but missing this frame, its previous pose is\n  duplicated so the BVH timeline stays continuous through brief occlusions.\n\nFilenames are derived from `--bvh PATH`:\n\n| `--bvh` value | Outputs                              |\n|---------------|--------------------------------------|\n| `p.bvh`       | `p_0.bvh`, `p_1.bvh`, …              |\n| `out/run`     | `out/run_0.bvh`, `out/run_1.bvh`, …  |\n| `cap.mocap`   | `cap_0.mocap`, `cap_1.mocap`, …      |\n\nEach file is fully independent — drop into Blender / BVHTester / any DCC.\n\n### Validating the output\n\n```bash\n# Render a 3D-keypoints CSV at the same time, then compare hip-relative\n# joint positions between the BVH and MHR's own 3D keypoints.\n./fast_sam_3dbody_run --from boom.mp4 \\\n    --bvh ./p.bvh --out /tmp/boom_mhr.csv --headless\n\nsource venv/bin/activate\npython3 scripts/verify_bvh_motion.py ./p_0.bvh /tmp/boom_mhr.csv\n```\n\nA clean run prints per-joint median / p90 / max error in cm; numbers around\n2–5 cm on trunk joints and 5–15 cm on extremities are the expected range\n(the larger residual on hands/feet partly reflects MHR's 70-keypoint surface\nlandmarks not coinciding with the LBS rotation-centre joints).\n\n### How the mapping is built\n\nThe MHR body model uses 127 named joints (`body_world`, `root`, `l_uparm`,\n`r_thumb1`, …) — names that don't appear in `body_model.lbs` but are exported\nfrom the JIT model:\n\n```bash\n# (Re)generate src/mhr_joint_table.h from a checkpoint\nsource venv/bin/activate\npython3 scripts/build_joint_table.py\n# pass MHR_MODEL_PT=/path/to/mhr_model.pt to override the default location\n```\n\n`bvh_writer.cpp` then matches each BVH joint name to an MHR name via the\nhand-authored `NAME_MAP` table. To support a new BVH template just add entries\nto that table (and rebuild).\n\n### Implementation notes\n\n* The BVH I/O comes from a vendored, trimmed-down copy of\n  [`MotionCaptureLoader`](https://github.com/AmmarkoV/RGBDAcquisition/tree/master/opengl_acquisition_shared_library/opengl_depth_and_color_renderer/src/Library/MotionCaptureLoader)\n  in `GraphicsEngine/MotionCaptureLoader/` (plus `TrajectoryParser/InputParser_C`).\n  We use `bvh_loadBVH` for parsing the template hierarchy and `dumpBVHToBVH` for\n  serialising the result.\n* The per-person motion buffer lives in `std::vector<float>` and is transplanted\n  into `mc->motionValues` at close-time, then detached before `bvh_free()` so\n  the library doesn't try to free our std::vector storage.\n* If you only have one person in the scene you'll get exactly one file\n  (`<name>_0.bvh`) — there is no single-file mode for backwards compatibility.\n\n### Driving a MakeHuman model in Blender\n\n`blender/blender_bvh_plugin.py` is a Blender add-on (by [AmmarkoV](https://github.com/AmmarkoV)) that\nplays one of these BVHs onto a MakeHuman-rigged character via the\n[**mpfb / MakeHuman plugin for Blender**](http://static.makehumancommunity.org/mpfb.html). It maps\nthe BVH joints onto the MakeHuman armature with copy-rotation bone constraints\n(body / hands / feet / face are independently selectable), and exposes a\n**\"MocapNET BVH Animation Helper\"** panel in the 3D viewport's N-panel.\n\nEnd-to-end workflow:\n\n```bash\n# 1) Generate one BVH per detected person\n./fast_sam_3dbody_run --from clip.mp4 --bvh ./p.bvh --headless\n# → p_0.bvh, p_1.bvh, …\n\n# 2) (One-time) install a known-good Blender + open the plugin\ncd blender && ./downloadAndInstallBlender.sh\n# downloads blender-3.4.1, launches it with the plugin loaded;\n# on first run the plugin will offer to fetch + install the mpfb2 MakeHuman addon\n```\n\nInside Blender:\n\n1. Use the **MakeHuman** (mpfb) tab to create or load a skinned character.\n2. `File → Import → Motion Capture (.bvh)` and pick one of the `p_<id>.bvh` files.\n   The BVH skeleton appears as a separate armature.\n3. Open the **MocapNET BVH Animation Helper** panel, point *Source BVH* at the\n   imported armature, tick the body parts you want driven (body / hands /\n   feet / face) and click **Apply** — the plugin adds copy-rotation constraints\n   on every matching MakeHuman bone.\n4. Scrub or render the timeline as usual; the character now follows the\n   exported motion.\n\nThe plugin auto-handles naming variants between the BVH skeleton (`body.bvh`,\nwhich is what we export against) and the MakeHuman armature, so the\n`p_<id>.bvh` files coming out of `--bvh` work without any further renaming.\n\n---\n\n## Offline multi-pass BVH extraction (`offline_sam_3dbody_render`)\n\n`fast_sam_3dbody_run` and `fast_sam_3dbody_render` are **online / causal**\nbinaries: they process frame N before frame N+1 has been decoded, so every\nfilter and every tracker can only look backwards.  That works fine for live\nwebcam input, but for *video files on disk* it leaves quality on the table.\n\n`offline_sam_3dbody_render` is a separate executable that reads the whole\nclip first and then runs five passes over it.  It produces the same\nmulti-person BVH files as `--bvh` does in the live binaries, but with\nsmoother motion and more stable identities.\n\n```bash\n# Most common invocation\n./scripts/offline_video.sh --from matrix.mp4 --bvh ./mtx.bvh \\\n                           --interpolate-jitter\n\n# → mtx_0.bvh, mtx_1.bvh, …, one per tracked identity\n```\n\n### What each pass does\n\n1. **Inference + scene detection** — decode the full video, run YOLO +\n   backbone + decoder + MHR per frame, throw away `pred_vertices` immediately\n   to keep memory bounded.  In parallel we run a scene-change detector\n   that votes on three signals each frame (any two ⇒ cut):\n\n   - **(A)** Lucas-Kanade optical-flow tracking of background-only corners\n     (41×41 window, 5 pyramid levels — sized for action footage) from the\n     previous frame.  Cut signal fires when the LK success rate drops\n     below `--scene-success-threshold` (default 0.50).  The \"background\"\n     is everything outside the dilated YOLO bboxes — same mask the user\n     asked for, just produced from bbox geometry instead of a GL shader.\n   - **(B)** HSV-histogram correlation of the same background.  Cut signal\n     fires when the correlation drops below 0.50.\n   - **(C)** Person-set discontinuity.  Cut signal fires when either the\n     detection count changes by ≥ 2 (or doubles/halves), or the median\n     nearest-prev-detection 3D distance exceeds 1 m.\n\n   The voting fuses the failure modes of each individual heuristic, and a\n   4-frame debounce throws out tracker-artefact bursts.  Scene cuts then\n   gate Pass 3 and Pass 4.\n\n2. **Global identity tracking** — greedy per-frame matching by\n   `cost = (1 − IoU) + λ · ‖Δpred_cam_t‖_metres`, then a post-hoc merge\n   step that splices track-ending pairs (`A` ends, `B` starts within\n   `--track-merge-frames` and `--track-merge-cm` of the same 3D location)\n   under `A`'s id.  This is what catches \"person hidden behind a pillar\n   for 30 frames\" — the live tracker would have retired and re-acquired\n   them as two separate IDs.  Tracks with fewer than `--min-track-frames`\n   detections are pruned at the end (default 8 — drops YOLO single-frame\n   false positives).\n\n3. **Gap interpolation** *(on by default; opt out with `--no-gap-interpolation`)*\n   — fill in any frame inside a track's lifespan that's missing a\n   detection by linear / SLERP-interpolating from the bracketing real\n   detections.  Without this, `BVHWriter` pads missing frames with\n   \"duplicate last pose\" and Blender sees that as a frozen segment for\n   the whole gap (typical cause: YOLO confidence dipped for a partial\n   occlusion, fast head turn, or low-contrast frame).  Scene cuts are\n   respected — we never bridge a cut.  `--gap-max-frames N` lets you\n   cap how long a gap will be filled; longer gaps revert to padding\n   (useful when the two endpoints are too different and the linear\n   morph looks unphysical).\n\n4. **Jitter interpolation** *(opt-in via `--interpolate-jitter`)* — flag\n   frames whose 3D keypoint velocity exceeds `--jitter-threshold-cm`\n   (default 30 cm/frame), then replace each flagged frame by a linear /\n   SLERP interpolation of its non-flagged neighbours.  Scene cuts are\n   respected — a \"200 cm/frame velocity\" right at a cut is real motion\n   between shots, not noise, and we never bridge across a cut.\n\n5. **Zero-phase smoothing** — same Butterworth (for linear channels) and\n   QuatLPF (for `global_rot`) as the live binaries, but run as\n   `filtfilt`: forward pass, reverse, forward pass, reverse.  The phase\n   shift of the two passes cancels exactly, so the smoothed output has\n   **zero temporal lag**.  Each track is split at scene cuts and each\n   segment is filtered independently — we never blend pose data from\n   shot A into shot B.\n\n6. **BVH export** — feed the smoothed + interpolated detections, with\n   the globally-determined track IDs, into\n   `BVHWriter::write_frame_external`.  The writer is exactly the one\n   used by the live binaries; only the source of the IDs differs.\n\n### Reusing code from the live binaries\n\n`fsb::Pipeline`, `BVHWriter`, `ButterWorth`, `QuatLPF`, `euler_zyx_to_quat`,\n`fsb::apply_hand_pose` — all unchanged, called directly.  The new code in\n`render/offline_sam_3dbody_render.cpp` is **only** the per-pass\norchestration (≈ 700 lines, every function with a top-of-block comment\nexplaining why it does what it does), the scene detector, and one new\npublic method on `BVHWriter` (`write_frame_external`) that takes\ncaller-supplied track IDs instead of running its internal greedy tracker.\n\n### Restrictions\n\nThe binary refuses webcam indices, RTSP URLs, and single still images;\nthose are an online-binary workflow.  `--from` must be a path to a video\nfile with at least a handful of frames.\n\n### Full option list (offline-only flags)\n\n| Flag | Default | Notes |\n|------|---------|-------|\n| `--smoothing zero-phase\\|forward\\|off` | `zero-phase` | Forward+backward `filtfilt` (no lag) vs the live binaries' forward-only filter vs no smoothing |\n| `--no-gap-interpolation` | — | Disable Pass 3; missing frames inside a track will be padded with the last-known pose (the pre-fix \"frozen segment\" behaviour) |\n| `--gap-max-frames N` | `0` | Skip gap-fill for gaps longer than N frames (`0` = no limit).  Useful when long occlusions produce a visibly unphysical morph between two unrelated poses |\n| `--interpolate-jitter` | off | Enable Pass 4 |\n| `--jitter-threshold-cm CM` | `30.0` | Per-frame 3D-keypoint velocity above which a frame is replaced by an interpolation of its neighbours |\n| `--track-merge-frames N` | `30` | Maximum gap (in frames) for the post-hoc merge in Pass 2 |\n| `--track-merge-cm CM` | `50.0` | Maximum 3D root distance (cm) for the post-hoc merge |\n| `--min-track-frames N` | `8` | Drop tracks with fewer than this many detections (YOLO false-positive filter) |\n| `--no-scene-detection` | — | Treat the whole clip as one continuous shot (skips Pass-1 OpenCV work and prevents any false-positive cuts from interrupting the smoothing) |\n| `--static-scene` | — | Intent-named alias of `--no-scene-detection`; use when you know the source has no cuts (one-take dance clip, lab recording, …) |\n| `--scene-success-threshold T` | `0.50` | LK-flow success-rate threshold (signal A) |\n| `--scene-min-corners N` | `30` | Re-seed bg corners when fewer than this many remain |\n\nAll `--bvh-*` flags and `--rot-clamp`, `--bw-cutoff` documented above\nwork identically here.\n\n### Wrapper script\n\n`scripts/offline_video.sh` is the shell entry point.  It mirrors the\n`scripts/video.sh` interface (same model paths, same flag forwarding)\nand additionally accepts the offline-only flags above.  Usage:\n\n```bash\n./scripts/offline_video.sh --from clip.mp4 --bvh out.bvh [...]\n```\n\nPassing `--save [vis.mp4]` *additionally* runs `scripts/video.sh` after\nthe offline pass to produce a visualisation mp4 of the per-frame\ninference.  The two outputs are independent — the BVH reflects the\noffline-only tracking + smoothing + jitter handling, while the rendered\nmp4 is whatever the live renderer would produce on the same clip — so\nthis is a quick way to get a \"what was the input?\" video alongside the\n\"what was the cleaned-up output?\" BVH:\n\n```bash\n./scripts/offline_video.sh --from matrix.mp4 --bvh mtx.bvh --save vis.mp4\n```\n\n---\n\n![SAM3DBody-cpp](doc/screen.jpg)\n\n---\n\n## C++ library API\n\n```cpp\n#include \"fast_sam_3dbody.h\"\n\nfsb::PipelineConfig cfg;\ncfg.onnx_dir        = \"./onnx\";\ncfg.gguf_path       = \"./onnx/pipeline.gguf\";\ncfg.yolo_path       = \"./onnx/yolo.onnx\";\ncfg.cuda_device     = 0;       // -1 = CPU only\ncfg.skip_body_model = true;    // faster: no vertices\ncfg.max_persons     = 4;       // 0 = unlimited\n\nfsb::Pipeline pipeline;\npipeline.load(cfg);\n\n// BGR uint8 pointer, width, height\nstd::vector<fsb::MHRResult> results =\n    pipeline.process_bgr(bgr_ptr, width, height);\n\nfor (const auto& r : results) {\n    // r.bbox          [4]   x1 y1 x2 y2 (original image pixels)\n    // r.global_rot    [3]   Euler ZYX global orientation\n    // r.body_pose     [133] joint angles\n    // r.shape         [45]  identity betas\n    // r.pred_cam_t    [3]   raw camera head: [s, tx, ty]\n    // r.focal_length        estimated focal length (pixels)\n    // r.keypoints_yolo[51]  COCO 17 × [x,y,conf]\n    // r.pred_vertices [18439*3]  (empty when skip_body_model=true)\n}\n\npipeline.free();\n```\n\n## Plain C / ctypes API\n\n```c\n#include \"fast_sam_3dbody_capi.h\"\n\nFsbHandle h = fsb_create();\n\nFsbConfig cfg = {\n    .onnx_dir        = \"./onnx\",\n    .gguf_path       = \"./onnx/pipeline.gguf\",\n    .yolo_path       = \"./onnx/yolo.onnx\",\n    .cuda_device     = 0,\n    .skip_body_model = 1,\n    .person_thresh   = 0.5f,\n    .person_nms_iou  = 0.45f,\n    .max_persons     = 0,\n};\nfsb_load(h, &cfg);\n\nFsbResult results[32];\nint n = fsb_process_bgr(h, bgr, width, height, results, 32);\n\nfor (int i = 0; i < n; i++) {\n    // results[i].bbox, .body_pose, .yolo_kps, ...\n}\n\nfsb_destroy(h);\n```\n\n---\n\n## Performance notes\n\n| Stage | Time (RTX 3090, B=1) |\n|-------|----------------------|\n| YOLO detection | ~5 ms |\n| Backbone (DINOv3-ViT-H) | ~150–200 ms |\n| Decoder (6-layer) | ~20 ms |\n| MHR + camera FFN (CPU) | <1 ms |\n| Native C LBS (optional) | <1 ms |\n\n- Backbone is the bottleneck; it dominates end-to-end latency.\n- Use `--skip-body` unless 3D vertices are required.\n- For higher throughput, batch multiple crops in a single backbone forward pass (already done when multiple persons are detected).\n\n\n\n---\n\nThe official PyTorch SAM 3D Body repository from Meta Superintelligence Labs is :\n\nhttps://github.com/facebookresearch/sam-3d-body\n\n---\n\n## Citation\n\nIf you use this software repository in your research or work, please cite:\n\n```bibtex\n@misc{qammaz2026sam3dbodycpp,\n  author       = {Qammaz, Ammar},\n  title        = {{SAM3DBody-cpp}: Standalone {C++} Inference Engine for {SAM-3D-Body}},\n  year         = {2026},\n  howpublished = {\\url{https://github.com/AmmarkoV/SAM3DBody-cpp}},\n  note         = {Zero-dependency runtime: ONNX Runtime + ggml, with BVH export and Python ctypes frontends}\n}\n```\n\nas well as the Fast SAM 3D Body work which was the inspiration creating the cpp version\n\n\n```bibtex\n@article{yang2026fastsam3dbody,\ntitle={Fast SAM 3D Body: Accelerating SAM 3D Body for Real-Time Full-Body Human Mesh Recovery},\nauthor={Yang, Timing and He, Sicheng and Jing, Hongyi and Yang, Jiawei and Liu, Zhijian and Zou, Chuhang and Wang, Yue},\njournal={arXiv preprint arXiv:2603.15603},\nyear={2026}\n}\n```\n\n\nand of course the Meta AI team behind the awesome paper that proposes the SAM 3D Body method.\n\n```bibtex\n@article{yang2026sam3dbody,\n  title={SAM 3D Body: Robust Full-Body Human Mesh Recovery},\n  author={Yang, Xitong and Kukreja, Devansh and Pinkus, Don and Sagar, Anushka and Fan, Taosha and Park, Jinhyung and Shin, Soyong and Cao, Jinkun and Liu, Jiawei and Ugrinovic, Nicolas and Feiszli, Matt and Malik, Jitendra and Dollar, Piotr and Kitani, Kris},\n  journal={arXiv preprint arXiv:2602.15989},\n  year={2026}\n}\n```\n\n","summary":"SAM3DBody-cpp is a standalone C++ inference engine for SAM-3D-Body that converts a BGR image into per-person 3D body pose and camera translation with zero Python runtime dependency. It runs inference via ONNX Runtime (plus ggml) and can also output full 3D mesh vertices and 70 MHR body/hand keypoints, with options to export per-person BVH motion-capture files while maintaining identities across frames using an IoU tracker. A set of Python frontends and CSV exporting are provided for easier downstream workflows, but the core inference is fully native C++. This project is best suited for developers integrating 3D human motion/pose estimation into performance-sensitive C++ pipelines, as well as researchers and technical artists who need BVH/mesh/keypoint outputs for tools like Blender.","description":"Real-time 3D full-body reconstruction from a single camera, Multiperson BVH output, Pure C++ runtime, ONNX + ggml, 70-joint skeleton with hands.","stars":382,"language":"C"},{"owner":"zengxiao-he","repo":"triton-llm-kernel-lab","url":"https://github.com/zengxiao-he/triton-llm-kernel-lab","readme":"# Triton LLM Inference Kernel Lab\n\nSmall GPU kernel lab for LLM inference primitives in Python, Triton, PyTorch,\nand CUDA. The repo focuses on readable kernels and reproducible validation:\nrow-wise softmax, FP16 GEMM, and a FlashAttention-style fused attention forward\nkernel using tiled online softmax.\n\nThis is a cleaned-up reconstruction of earlier kernel experiments. Benchmark\nnumbers are intentionally generated by the local harness instead of being baked\ninto the README, because GPU model, driver, Triton version, and tensor shapes\nchange the results materially.\n\n## Kernels\n\n- `row_softmax`: one Triton program per row, numerically stable max-subtract\n  softmax, intended for bandwidth-bound reductions where a row fits in SRAM.\n- `fp16_matmul`: tiled FP16 GEMM with FP32 accumulation, block-level `tl.dot`,\n  grouped program ordering for better L2 reuse, and configurable\n  `BLOCK_M/BLOCK_N/BLOCK_K`.\n- `flash_attention_forward`: fused attention forward for prefill and simple\n  decode-style shapes, using tiled QK and PV blocks plus the online softmax\n  recurrence to avoid materializing the full attention matrix.\n\n## Project Layout\n\n```text\nsrc/triton_llm_kernel_lab/\n  bench.py              # CLI benchmark harness\n  configs.py            # kernel configs and LLM-like benchmark shapes\n  reference.py          # PyTorch reference implementations\n  runtime.py            # CUDA/Triton availability checks\n  kernels/\n    attention.py        # FlashAttention-style fused attention forward\n    gemm.py             # FP16 GEMM kernel\n    softmax.py          # row-wise fused softmax kernel\ntests/\n  test_references.py    # CPU-safe reference and config checks\n  test_gpu_kernels.py   # CUDA/Triton correctness checks, skipped otherwise\ndocs/\n  profiling.md          # Nsight Compute workflow and metrics\n  tradeoffs.md          # prefill vs decode kernel selection notes\n```\n\n## Install\n\nUse a Linux environment with an NVIDIA GPU for the Triton kernels.\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate\npip install -U pip\npip install -e \".[gpu,dev]\"\n```\n\nOn a CPU-only machine, install only the test/dev path:\n\n```bash\npip install -e \".[dev]\"\npytest tests/test_references.py\n```\n\n## Correctness\n\nThe GPU tests compare every custom kernel against a PyTorch reference and report\nthe max absolute error. On a CUDA machine:\n\n```bash\npytest tests/test_gpu_kernels.py -q\n```\n\nThe test coverage includes:\n\n- softmax rows with non-power-of-two column counts\n- FP16 GEMM with masked edge tiles\n- causal and non-causal fused attention forward\n\n## Benchmarking\n\nThe harness uses 50 warmup iterations and 200 timed iterations by default. It\nprints latency, estimated TFLOPS, estimated memory bandwidth, and max error.\n\n```bash\npython -m triton_llm_kernel_lab.bench --kernel all\npython -m triton_llm_kernel_lab.bench --kernel attention --warmup 50 --iters 200 --csv results/attention.csv\n```\n\nRepresentative shape groups are defined in `configs.py`:\n\n- prefill: longer query/key lengths where QK and PV dominate arithmetic\n- decode: short query length with long KV cache where memory traffic dominates\n- GEMM: common projection and MLP matrix sizes\n- softmax: row lengths that stress SRAM fit and reduction behavior\n\n## Profiling\n\nUse Nsight Compute for detailed GPU metrics:\n\n```bash\nbash scripts/profile_ncu.sh attention\n```\n\nThe profiling notes in `docs/profiling.md` track the metrics that matter for\nthis lab: achieved occupancy, memory throughput, L2 hit rate, warp stalls,\ntensor core utilization, and DRAM read/write transactions.\n\n## Open-Source References\n\nThe implementation style was informed by the public Triton tutorials and\nFlashAttention papers, but the code in this repository is written as a compact\nteaching/lab version rather than a copy of those tutorials.\n\n- Triton fused softmax tutorial:\n  https://triton-lang.org/main/getting-started/tutorials/02-fused-softmax.html\n- Triton matrix multiplication tutorial:\n  https://github.com/triton-lang/triton/blob/main/python/tutorials/03-matrix-multiplication.py\n- Triton fused attention tutorial:\n  https://triton-lang.org/main/getting-started/tutorials/06-fused-attention.html\n- FlashAttention:\n  https://arxiv.org/abs/2205.14135\n- FlashAttention-2:\n  https://tridao.me/publications/flash2/flash2.pdf\n","summary":"zengxiao-he/triton-llm-kernel-lab is a small GPU kernel lab for experimenting with and validating core LLM inference primitives using Python with Triton, PyTorch, and CUDA. It implements readable, numerically stable kernels for row-wise softmax, an FP16 GEMM with FP32 accumulation, and a FlashAttention-style fused attention forward that uses tiled blocks and an online softmax recurrence to avoid materializing the full attention matrix. The project includes PyTorch reference implementations and GPU correctness tests that compare outputs directly, alongside a benchmark harness and Nsight Compute profiling workflow to measure latency, error, and performance characteristics. It’s best for researchers, engineers, and students who want to learn, prototype, or tune GPU kernels for LLM workloads with reproducible validation across different tensor shapes and environments.","description":null,"stars":137,"language":"Python"},{"owner":"quarqlabs","repo":"agent-oss","url":"https://github.com/quarqlabs/agent-oss","readme":"# Quarq Agent\n\n**Local memory. Hybrid retrieval. Self-correcting reasoning. Benchmark-grade recall.**\n\nQuarq Agent is a memory-first AI agent built by QuarqLabs for long-context personal intelligence, grounded recall, temporal reasoning, quantitative reasoning, and tool use.\n\nIt is designed as an open, inspectable alternative to memory agents such as Hermes or OpenClaw, with a stronger emphasis on durable local memory, strict attribution, self-correcting retrieval, and benchmark-grade long-term recall.\n\nThe current local benchmark run is in progress on LongMemEval-S and is tracking in the 99.6% to 99.7% range. The latest checked report in `reports/longmemeval_results.json` shows `256` yes, `1` no, or `99.61%`, with the full 500-question run still continuing.\n\n## Why Quarq Exists\n\nMost agents can chat. Fewer can remember. Almost none can remember carefully.\n\nQuarq Agent is built around a simple idea: memory is not just vector search. A serious memory agent needs to know what a memory means, when it happened, what numbers belong to, which entity a fact is attached to, when evidence is incomplete, and when it must search again instead of guessing.\n\nQuarq combines:\n\n- local FAISS vector memory\n- semantic, episodic, and procedural memory separation\n- hybrid vector plus keyword retrieval\n- HyDE-style query expansion\n- dynamic recall depth\n- strict temporal grounding\n- numeric attribution and exact aggregation rules\n- self-correcting fallback retrieval\n- background memory consolidation\n- LangGraph orchestration\n- progressive tool routing\n\nThe result is an agent that behaves less like a stateless chatbot and more like a disciplined cognitive system.\n\n## What Makes It Different\n\nQuarq is not a wrapper around a vector database. It is a full memory reasoning loop.\n\nStandard RAG systems usually fail long-memory tasks for one of four reasons:\n\n1. They retrieve the wrong memory.\n2. They retrieve the right memory but attach it to the wrong entity.\n3. They confuse storage time with event time.\n4. They calculate with nearby numbers that do not belong to the question.\n\nQuarq directly attacks those failure modes with retrieval decomposition, evidence attribution, temporal guardrails, numeric scope checks, and a second-pass recovery path when the first context is incomplete.\n\n## Highlights\n\n- Local-first memory: no Supabase pgvector dependency. Memories and rules are saved under `local_memory/<AGENT_ID>/`.\n- Three memory types: semantic facts, episodic events, and procedural behavioral rules.\n- FAISS-backed retrieval: normalized OpenAI embeddings with `IndexFlatIP` cosine-style similarity.\n- Hybrid search: every retrieval pass combines vector search and direct keyword matching.\n- HyDE query optimizer: rewrites the user prompt into multiple retrieval probes before search.\n- Dynamic thresholds: wide-net `deep` mode for aggregation, timelines, broad categories, and recommendations; stricter `standard` mode for point facts.\n- Required-data fallback: the model can request a targeted second retrieval pass when evidence is missing.\n- Temporal truth protocol: separates database storage time from narrative event time.\n- Quantitative fidelity: numbers are stored and used with owner, property, item, and exactness.\n- Background learning: user responses return immediately while memory extraction runs asynchronously.\n- Progressive tool loading: tool docs are only injected when a skill is selected.\n- Benchmark mode: disables tool routing and waits for pending background learning before final evaluation.\n\n## Architecture\n\n```text\nUser / API\n    |\n    v\nLangGraph StateGraph\n    |\n    +-- retrieve_memories\n    |     |\n    |     +-- HyDE query generation\n    |     +-- semantic FAISS search\n    |     +-- episodic FAISS search\n    |     +-- keyword search\n    |     +-- procedural rule routing\n    |\n    +-- route_tools\n    |     |\n    |     +-- skill catalog router\n    |     +-- progressive skill markdown loading\n    |\n    +-- generate_response\n          |\n          +-- grounded answer synthesis\n          +-- optional ReAct tool loop\n          +-- REQUIRED_DATA fallback retrieval\n          +-- background memory learning\n```\n\nThe graph is intentionally compact:\n\n```python\nSTART -> retrieve_memories -> route_tools -> generate_response -> END\n```\n\nLearning is launched in the background from `generate_response`, which keeps the interactive path fast while still preserving durable memory.\n\n## Memory System\n\nQuarq uses three memory layers.\n\n### Semantic Memory\n\nSemantic memory stores durable user facts:\n\n- identity\n- preferences\n- relationships\n- routines\n- long-term projects\n- possessions\n- stable traits\n- active statuses and inventories\n\nExample:\n\n```text\nUser owns a crystal chandelier that originally belonged to their great-grandmother and was given to them by their aunt.\n```\n\n### Episodic Memory\n\nEpisodic memory stores events and interaction history:\n\n- what happened\n- when it happened\n- who was involved\n- what was decided\n- what the user asked for\n- what changed\n\nExample:\n\n```text\nOn March 4, 2023, user received a crystal chandelier from their aunt that originally belonged to their great-grandmother.\n```\n\n### Procedural Memory\n\nProcedural memory stores behavioral rules:\n\n- tone preferences\n- formatting preferences\n- project-specific instructions\n- forbidden wording\n- content generation constraints\n\nProcedural rules are tagged and routed, so the model sees only the relevant rules for the current prompt instead of carrying every rule forever.\n\n## Local Storage Layout\n\nThe current runtime stores memory locally:\n\n```text\nlocal_memory/\n  <AGENT_ID>/\n    semantic_memory/\n      index.faiss\n      memories.json\n    episodic_memory/\n      index.faiss\n      memories.json\n    procedural_memory/\n      rules.json\n```\n\n`AGENT_ID` determines which memory folder is used. Reusing the same `AGENT_ID` reuses the same memory. Changing `AGENT_ID` gives you a clean isolated agent profile.\n\nEach semantic and episodic memory record includes:\n\n- UUID\n- agent ID\n- memory type\n- content\n- embedding\n- created timestamp\n- updated timestamp\n\nThe formatted retrieval output intentionally preserves this shape:\n\n```text\n[STORED_AT: 2026-05-25 14:00:00] [ID: <uuid>] <memory content>\n```\n\nDownstream deduplication, recency sorting, contradiction handling, and memory update logic all depend on that stable format.\n\n## Retrieval Pipeline\n\nQuarq does not simply embed the latest user prompt and hope for the best.\n\nThe retrieval node first asks a lightweight model to produce a structured search plan:\n\n```json\n{\n  \"vector_queries\": [\n    \"User total driving duration and travel history\",\n    \"User vehicle, road trip, transit records\",\n    \"User travel milestones, driving time calculation\",\n    \"hours, road trip, destinations\"\n  ],\n  \"keywords\": \"driving, hours, total\",\n  \"search_mode\": \"deep\"\n}\n```\n\nThen it performs:\n\n1. Semantic vector search\n2. Episodic vector search\n3. Semantic keyword search\n4. Episodic keyword search\n5. ID-based deduplication\n6. recency sorting\n7. procedural rule routing\n\nSearch modes:\n\n- `standard`: strict retrieval for point facts, threshold `0.38`\n- `deep`: wide recall for totals, timelines, histories, recommendations, and broad categories, threshold `0.28`\n\nThis is why Quarq can answer questions that require multiple memories rather than only nearest-neighbor recall.\n\n## Temporal Reasoning\n\nQuarq treats time as evidence, not decoration.\n\nThe agent distinguishes:\n\n- storage timestamp: when the memory was saved\n- narrative date: when the event actually happened\n- benchmark current date: the simulated date for an evaluation question\n- relative dates: phrases like \"yesterday\", \"today\", \"last month\"\n\nThe Temporal Truth Protocol prevents common long-memory errors:\n\n- using database timestamps as event dates\n- borrowing dates from nearby but unrelated memories\n- assuming a discussion date is the same as an event date\n- calculating date gaps from guessed anchors\n\nFor \"how long ago\" questions, Quarq searches for the named event first and only uses the current date as the calculation anchor after retrieval.\n\n## Quantitative Reasoning\n\nLong-memory benchmarks often punish sloppy number handling. Quarq's numeric protocol is built to avoid that.\n\nFor totals, counts, durations, prices, quantities, or money questions, the model must identify:\n\n- actor or entity\n- mea
