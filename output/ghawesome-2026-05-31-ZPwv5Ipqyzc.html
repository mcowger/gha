00 ops in   0.636 secs  636.3 ns/op    1,571,476 op/sec\ninsert(rand)     1,000,000 ops in   0.633 secs  632.7 ns/op    1,580,596 op/sec\nget(seq)         1,000,000 ops in   0.376 secs  376.5 ns/op    2,656,345 op/sec\nget(rand)        1,000,000 ops in   0.618 secs  618.4 ns/op    1,617,120 op/sec\n```\n","summary":"The tidwall/btype project provides high-performance, btree-backed collection types for Go, designed to help developers implement common data structures such as maps, sets, arrays, tables, stacks, queues, deques, and priority queues. It offers an ergonomic, modern API with O(log n) operations for inserts, deletes, and lookups, plus sorted iteration and range queries for ordered structures. A notable capability is instant copy-on-write “shadow clone” snapshots, enabling O(1) cloning semantics for concurrent or versioned workflows. This library is a good fit for Go applications that need fast, memory-efficient ordered collections with deterministic performance and thorough testing.","description":"B-tree based collection types for Go","stars":270,"language":"Go"},{"owner":"DaoyuanLi2816","repo":"can-i-finetune-this","url":"https://github.com/DaoyuanLi2816/can-i-finetune-this","readme":"# can-i-finetune-this\n\n[![CI](https://github.com/DaoyuanLi2816/can-i-finetune-this/actions/workflows/ci.yml/badge.svg)](https://github.com/DaoyuanLi2816/can-i-finetune-this/actions/workflows/ci.yml)\n[![PyPI](https://img.shields.io/pypi/v/canifinetune.svg)](https://pypi.org/project/canifinetune/)\n[![Python](https://img.shields.io/badge/python-3.10%2B-blue)](https://www.python.org)\n[![License](https://img.shields.io/badge/license-MIT-blue)](LICENSE)\n\n**Estimate, benchmark, and generate fine-tuning recipes for LLMs on consumer GPUs.**\n\n![can-i-finetune-this architecture](docs/architecture.png)\n\nYou have one consumer-grade NVIDIA GPU. You want to fine-tune an open-weight LLM\nwith LoRA or QLoRA, but you do not want to download 14 GB of weights just to\ndiscover that your 12 GB / 16 GB / 24 GB card OOMs on step 1.\n\n`canifinetune` answers, before you spend the disk and the time:\n\n1. Can I fine-tune this model?\n2. About how much VRAM will it use?\n3. What batch size / sequence length / LoRA rank / quantization should I use?\n4. If I can't, how should I downsize?\n5. Is there local benchmark evidence for that answer?\n6. Can I get a ready-to-run Hugging Face + PEFT + TRL training script for that config?\n\nIt is a single Python package with a CLI:\n\n```bash\ncanifinetune doctor\ncanifinetune estimate --model Qwen/Qwen2.5-1.5B-Instruct --method qlora --gpu-vram-gb 16 --seq-len 2048 --micro-batch-size 1 --lora-rank 16\ncanifinetune recommend --model Qwen/Qwen2.5-1.5B-Instruct --gpu-vram-gb 16\ncanifinetune bench    --model sshleifer/tiny-gpt2 --method lora --steps 3\ncanifinetune calibrate --benchmarks benchmarks/results\ncanifinetune recipe   --model Qwen/Qwen2.5-1.5B-Instruct --method qlora --output recipes/qwen2.5-1.5b-qlora-4080\ncanifinetune report   --benchmarks benchmarks/results --out report.md\ncanifinetune compare  --benchmarks benchmarks/results --out compare.md\n```\n\nWhat `canifinetune estimate` actually prints:\n\n```text\n+-------- Qwen/Qwen2.5-1.5B-Instruct  (qlora) --------+\n| feasible: YES    ratio = 0.20    confidence = medium |\n+------------------------------------------------------+\n       Memory breakdown (GB)\n+---------------------------------+\n| Component             |   Value |\n|-----------------------+---------|\n| static model          |   0.737 |\n| quantization overhead |   0.018 |\n| trainable params      |  4.4 MB |\n| gradients             |   0.008 |\n| optimizer states      |   0.010 |\n| activations           |   0.328 |\n| CUDA / fragmentation  |   1.280 |\n| safety margin         |   0.800 |\n| total                 |   3.163 |\n+---------------------------------+\n```\n\nStatic estimate says 3.16 GB; on a real RTX 4080 the same config measures\n7.10 GB (heavy bitsandbytes unpacking buffers at seq_len=2048). `canifinetune\nbench` and `canifinetune calibrate` close that gap on your machine —\nthat is the *point* of the project.\n\n---\n\n## Install\n\n`canifinetune` runs in two layers:\n\n| Layer | Install | What you get |\n| --- | --- | --- |\n| Core (estimate / recommend / recipe / report) | `pip install canifinetune` | All CLI commands. No PyTorch required. |\n| Training (bench / real fine-tuning) | `pip install canifinetune[train]` | Adds `torch`, `transformers`, `peft`, `bitsandbytes`, `trl`, `datasets`. |\n| Reporting extras | `pip install canifinetune[report]` | Pandas/tabulate for prettier tables. |\n| Development | `pip install canifinetune[dev]` | pytest, ruff, mypy. |\n\nIf you use `uv`:\n\n```bash\nuv venv\nuv pip install -e \".[dev,report]\"\n# Add training deps when you want to run benchmarks:\nuv pip install -e \".[dev,train,report]\"\n```\n\nPyTorch should generally be installed with the CUDA wheel that matches your driver,\ne.g.\n\n```bash\nuv pip install torch --index-url https://download.pytorch.org/whl/cu121\n```\n\nSee `docs/troubleshooting.md` for Windows / WSL / bitsandbytes specifics.\n\n---\n\n## Quickstart\n\n```bash\n# 1. See what your machine looks like\ncanifinetune doctor\n\n# 2. Ask if a model fits on your card\ncanifinetune estimate \\\n  --model Qwen/Qwen2.5-1.5B-Instruct \\\n  --method qlora \\\n  --gpu-vram-gb 16 \\\n  --seq-len 2048 \\\n  --micro-batch-size 1 \\\n  --lora-rank 16\n\n# 3. Have it search for a feasible config\ncanifinetune recommend --model Qwen/Qwen2.5-1.5B-Instruct --gpu-vram-gb 16\n\n# 4. Run a tiny real benchmark (downloads sshleifer/tiny-gpt2, ~5 MB)\ncanifinetune bench --model sshleifer/tiny-gpt2 --method lora --steps 3\n\n# 5. Generate a ready-to-run training recipe\ncanifinetune recipe \\\n  --model Qwen/Qwen2.5-1.5B-Instruct \\\n  --method qlora \\\n  --seq-len 2048 \\\n  --output recipes/qwen2.5-1.5b-qlora-4080\n```\n\n---\n\n## What's different from `accelerate estimate-memory`?\n\n`accelerate estimate-memory` tells you how much memory **loading** a model takes.\nThat is not enough to know whether you can **train** it.\n\nThis project tries to answer the harder question. It models:\n\n- Model weights, in fp32 / fp16 / bf16 / int8 / NF4 + double-quant\n- LoRA / QLoRA trainable parameter count for typical `target_modules`\n- Gradients only for trainable parameters\n- AdamW vs 8-bit / paged AdamW optimizer states\n- Activations as a function of `seq_len`, `batch_size`, `hidden_size`, `num_layers`,\n  with and without gradient checkpointing\n- A fragmentation / CUDA / buffer safety margin\n- A feasibility decision against your actual GPU\n- Concrete degradation suggestions when not feasible\n\nEstimates are **always** marked with an `assumptions` block and a `confidence`\nlevel, because activation memory in particular is hard to predict statically.\nRun `canifinetune bench` and `canifinetune calibrate` to ground them in real\nmeasurements on your machine.\n\n---\n\n## RTX 4080 baselines\n\n`docs/rtx4080_baselines.md` contains real measurements collected on a single\nRTX 4080 (16 GB). These are not synthetic. If a configuration was not run, the\ntable says \"not run\", not a guessed number.\n\nHighlights (more in the doc):\n\n| model | method | seq_len | measured peak | tok/sec |\n| --- | --- | --- | --- | --- |\n| `Qwen/Qwen2.5-0.5B-Instruct` | qlora | 1024 | 3.30 GB | 1995 |\n| `Qwen/Qwen2.5-1.5B-Instruct` | qlora | 1024 | 4.36 GB | 1352 |\n| `Qwen/Qwen2.5-1.5B-Instruct` | qlora | 2048 | 7.10 GB | 1470 |\n| `Qwen/Qwen2.5-3B-Instruct` | qlora | 1024 | 5.54 GB | 1158 |\n| `sshleifer/tiny-gpt2` (smoke) | lora | 128 | 0.12 GB | 1735 |\n\n---\n\n## Repository layout\n\n```\nsrc/canifinetune/        # package code (estimator, bench, recipes, reports, cli)\nbenchmarks/              # configs/, results/ (JSON), calibration/\ndocs/                    # design, memory model, troubleshooting\nexamples/                # end-to-end recipe folders\ntests/                   # pytest tests (CPU-only, no large downloads)\nscripts/                 # helper scripts for collecting baselines\n.github/workflows/       # CI (ruff + pytest on CPU)\n```\n\n---\n\n## Roadmap\n\nThe current scope is \"single consumer GPU, single node, LoRA / QLoRA, causal LM,\nHugging Face stack\". Possible directions, none committed:\n\n- DeepSpeed ZeRO and FSDP estimation for multi-GPU setups\n- Heuristics for sequence-classification / encoder-decoder training\n- Throughput modeling (tokens / sec), not just feasibility\n- Auto-tuning of `gradient_accumulation_steps` for a target effective batch size\n- A web UI on top of the CLI\n\nContributions welcome.\n\n---\n\n## License\n\nMIT. See `LICENSE`.\n","summary":"canifinetune is a command-line tool designed to estimate, benchmark, and generate fine-tuning configurations for large language models (LLMs) on consumer-grade hardware. It helps users determine if a specific model will fit within their available VRAM before they commit to downloading weights or starting a training job. By providing actionable metrics on batch size, quantization, and memory overhead, the project enables developers to optimize their workflows and generate ready-to-use training scripts. It is an essential utility for researchers and hobbyists working with limited GPU resources who want to avoid out-of-memory errors during the fine-tuning process.","description":"Estimate whether a Hugging Face model fits and fine-tunes on your local GPU.","stars":235,"language":"Python"},{"owner":"aurorascharff","repo":"ClickLight","url":"https://github.com/aurorascharff/ClickLight","readme":"# ClickLight\n\nA small macOS menu bar app that highlights your clicks during live demos, screen sharing, UX reviews, and other moments where people need to follow what you are doing.\n\nScreen recorders like Screen Studio and CleanShot can add click effects after the fact. ClickLight is for the live moment itself, when you need the audience to see exactly when you clicked without interrupting your flow.\n\n## Demo\n\nhttps://github.com/user-attachments/assets/d00d36ea-dd80-4cf4-a0f6-f3bf4b132138\n\n## Use Cases\n\n- Live product demos where viewers need to follow exactly what you clicked\n- UX reviews where the delay between click and response matters (the original motivation for ClickLight)\n- Bug reports where a recording should show both the action and the app behavior\n- Tutorials, workshops, and conference talks where pointer movement alone is easy to miss\n- Pairing with a larger macOS pointer so clicks stay visible in live demos and recordings\n\n## Install\n\nWith Homebrew:\n\n```bash\nbrew tap aurorascharff/clicklight https://github.com/aurorascharff/ClickLight\nbrew install --cask aurorascharff/clicklight/clicklight\n```\n\nHomebrew installs are updated with `brew upgrade --cask clicklight`.\n\nPrefer not to use Homebrew? Download `ClickLight.zip` from [GitHub Releases](https://github.com/aurorascharff/ClickLight/releases).\n\n> **Manual install**\n> If you want to build ClickLight from source or iterate on it locally, use [Manual Install](docs/MANUAL_INSTALL.md).\n\n## Features\n\n- Click highlights across macOS apps\n- Separate visuals for press, release, right-click, and drag\n- Optional laser pointer mode with fading freehand strokes while dragging\n- Optional live keyboard shortcut display pinned to the bottom of the screen by default, with pointer-following placement and sizes through XL available\n- Local daily click activity chart with a resettable seven-day history\n- Optional daily click count in the menu bar\n- Dedicated settings window with presets, sliders, optional menu sections, and a sidebar preview pad with Randomize\n- Custom color picker in Settings\n- Menu-bar quick presets for size, duration, intensity, and color\n- Customizable status-bar menu sections for hiding optional controls you do not use\n- One default ClickLight toggle shortcut, with optional shortcuts for other actions\n- Optional compact menu-bar icon\n- Test pulse for verifying overlay behavior\n- Native Swift/AppKit app\n- No Xcode project required\n\n## Keyboard Shortcuts\n\nClickLight includes one default global shortcut for quick toggles during demos. Other actions can be assigned shortcuts in Settings if you want them.\n\n| Shortcut | Action |\n| --- | --- |\n| `Control + Option + Command + L` | Toggle ClickLight on/off |\n| Not set by default | Toggle Laser Pointer Mode |\n| Not set by default | Toggle Press |\n| Not set by default | Toggle Release |\n| Not set by default | Toggle Right Click |\n| Not set by default | Toggle Middle Click |\n| Not set by default | Toggle Drag |\n| Not set by default | Randomize Colors |\n| Not set by default | Toggle Live Keyboard Shortcuts |\n\nAll shortcuts can be changed or disabled in Settings.\n\n## Permissions\n\nClickLight requires Accessibility permission to detect clicks outside its own menu-bar app. You will be prompted on first launch, or grant it manually in:\n\n**System Settings -> Privacy & Security -> Accessibility**\n\nThe optional Live Keyboard Shortcuts display additionally requires **Input Monitoring**, because macOS protects keyboard input separately from mouse clicks.\n\nAfter enabling permission, quit ClickLight from the menu bar and reopen it.\n\nTip: for recorded demos or presentations, pair ClickLight with a larger macOS pointer in **System Settings -> Accessibility -> Display -> Pointer**.\n\n## Modify It\n\nClickLight is personal software: one small presentation annoyance, fixed directly. The project is intentionally small so you or an agent can change it without much ceremony.\n\nStart with [Local Development](docs/LOCAL_DEVELOPMENT.md).\n\n## Contributing\n\nContributions are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for setup, testing, and pull request guidance. Please report security issues privately as described in [SECURITY.md](SECURITY.md).\n\n## Releasing\n\nReleases are signed, notarized, published to GitHub Releases, and followed by a reviewed metadata pull request for Homebrew and Sparkle updates.\n\nSee [Releasing](docs/RELEASING.md). What's new is tracked in [GitHub Releases](https://github.com/aurorascharff/ClickLight/releases).\n\n## Uninstall\n\n```bash\nbrew uninstall --cask clicklight\n```\n\nTo remove ClickLight preferences too:\n\n```bash\nbrew uninstall --cask --zap clicklight\n```\n\n> **Manual uninstall**\n> If you installed ClickLight manually from source, use [Remove Manual Install](docs/MANUAL_INSTALL.md#remove-manual-install).\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"ClickLight is a small macOS menu bar app that visually highlights mouse clicks in real time, making live demos, screen sharing, and UX reviews easier for audiences to follow. It provides distinct overlays for press, release, right-click, and drag, with optional laser-pointer style freehand trails and live on-screen keyboard shortcut display. You can also customize colors, sizes, durations, and quick presets, plus track a simple daily seven-day click activity history. It’s a great fit for presenters, UX practitioners, workshop hosts, and anyone recording or running interactive sessions who needs click timing and actions to be clearly visible without interrupting their workflow.","description":"A macOS menu bar app that highlights your clicks for demos, recordings, UX reviews, and better click visibility.","stars":247,"language":"Swift"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
