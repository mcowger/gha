s like Kanban boards, timelines, dashboards, and responsive compositions, along with theme controls and aspect-ratio aware previewing. The project also supports agent-human collaboration by keeping feedback and revisions tightly coupled to what’s shown in the preview. It’s well-suited for teams or developers who generate HTML with AI and need an efficient workflow to review, restructure, and refine outputs as editable documents rather than static responses.","description":"You don't need a chat ui but a canvas with ai.","stars":508,"language":"TypeScript"},{"owner":"tantara","repo":"openbrief","url":"https://github.com/tantara/openbrief","readme":"<div align=\"center\">\n\n# OpenBrief\n\n**Turn videos and audio into clear, listenable briefings.**\n\nImport a video or audio file, extract its transcript, generate a grounded summary, and chat with the content — all on your desktop.\n\n[![License: AGPL v3](https://img.shields.io/badge/License-AGPL%20v3-blue.svg)](LICENSE)\n[![Built with Tauri](https://img.shields.io/badge/built%20with-Tauri%20v2-24C8DB.svg?logo=tauri)](https://tauri.app)\n![Platforms](https://img.shields.io/badge/platforms-macOS%20%7C%20Windows%20%7C%20Linux-lightgrey.svg)\n[![Stars](https://img.shields.io/github/stars/tantara/openbrief?style=social)](https://github.com/tantara/openbrief/stargazers)\n\n[Watch the demo](https://youtu.be/OnS3EViayRo) · [Features](#features) · [Model Support](#model-support) · [Setup](#setup) · [Development](#local-development) · [Roadmap](#roadmap)\n\n[![OpenBrief — Open Source YouTube Summarizer](docs/assets/openbrief_thumbnail.png)](https://youtu.be/OnS3EViayRo)\n\n</div>\n\nOpenBrief is a pnpm/Turborepo workspace centered on a Tauri v2 desktop app. It supports importing local media or video URLs, downloading media through bundled tools, transcribing audio, generating grounded summaries, chatting with media context, organizing playlists, and exporting reusable notes.\n\n## Features\n\n- 📥 **Import anything** — paste a video link or import a local audio/video file.\n- ✍️ **Transcribe locally** — extract captions or run on-device speech-to-text.\n- 📝 **Grounded summaries** — generate blog-style markdown briefs with timestamped takeaways.\n- 💬 **Chat with media** — ask questions against the summary or full transcript.\n- 🔊 **Listen back** — turn summaries into audio with text-to-speech.\n- 🔒 **Open source & private** — runs on your machine, free to use.\n\nBuild a searchable library from video links or local files, then extract transcripts and keep everything in one place.\n\n![Library view](docs/assets/screenshot_library.png)\n\nOpen any item to read the transcript, generate a grounded summary, and chat with the media context side by side.\n\n![Brief and chat view](docs/assets/screenshot_note.png)\n\n## Model Support\n\n| Model type | Supported | TODO |\n| --- | --- | --- |\n| Speech to text | Whisper, Parakeet, Qwen3-ASR | None |\n| Text to speech | Supertonic 3, Qwen3-TTS | None |\n| Large language model | OpenAI GPT, Anthropic Claude, Google Gemini, OpenRouter DeepSeek | Local Gemma 4 |\n| Video embedding | None | Frame and clip embeddings for semantic search |\n\n## Repository Layout\n\n```text\nclient/\n  apps/\n    tauri/            Main OpenBrief desktop app\n      src/            React renderer, feature UI, domain logic, services, hooks, i18n\n      src-tauri/      Tauri v2 Rust boundary, commands, helper sidecar, packaging\n      scripts/        Helper-sidecar and media-tool preparation scripts\n    nextjs/           Web app and download/YouTube routes\n    tanstack-start/   TanStack Start app shell\n    expo/             React Native app shell\n    workers/          Worker entry points\n  packages/\n    api/              Shared API routing\n    auth/             Authentication integration\n    db/               Database schema and access\n    ui/               Shared UI components\n    validators/       Shared validation helpers\n  tooling/\n    eslint/           Shared ESLint config\n    github/           GitHub setup helpers\n    prettier/         Shared Prettier config\n    tailwind/         Shared Tailwind config\n    typescript/       Shared TypeScript config\n\nAGENTS.md             Repository development guidance\nDESIGN.md             Product and UI direction\n```\n\n## Requirements\n\n- Node.js `^22.21.0`\n- pnpm `11.0.9`\n- Rust and Cargo\n- Tauri v2 platform prerequisites for your OS\n\nUse the package manager declared in `client/package.json`.\n\n## Setup\n\nInstall dependencies from the workspace root:\n\n```bash\ncd client\npnpm install\n```\n\nIf pnpm reports ignored native build scripts on a fresh machine, run `pnpm approve-builds`, approve the listed native/tooling packages, then rerun `pnpm install`.\n\nCreate local environment values when needed:\n\n```bash\ncp .env.example .env\n```\n\n## Local Development\n\nUse two terminals from `client/` when working on both the web app and desktop app:\n\n```bash\npnpm dev:next\n```\n\nThe Next.js app runs at `http://localhost:3000`.\n\n```bash\npnpm dev:tauri\n```\n\nThe Tauri dev command builds the helper sidecar, starts the desktop renderer through Vite at `http://localhost:1420`, compiles the Rust app, and launches the desktop window.\n\n## Desktop App\n\nRun the Tauri desktop app:\n\n```bash\ncd client\npnpm dev:tauri\n```\n\nRun only the renderer during frontend work:\n\n```bash\ncd client/apps/tauri\npnpm dev\n```\n\nBuild frontend assets:\n\n```bash\ncd client/apps/tauri\npnpm build\n```\n\nBuild or refresh bundled helper/media assets:\n\n```bash\ncd client/apps/tauri\npnpm setup:dev-sidecars\npnpm prepare:media-assets\n```\n\nUseful desktop checks:\n\n```bash\ncd client/apps/tauri\npnpm test:run\npnpm typecheck\ncd src-tauri && cargo check\n```\n\n## Web And Shared Workspace\n\nRun the Next.js app:\n\n```bash\ncd client\npnpm dev:next\n```\n\nRun all workspace dev tasks through Turbo:\n\n```bash\ncd client\npnpm dev\n```\n\nCommon workspace checks:\n\n```bash\ncd client\npnpm typecheck\npnpm lint\npnpm build\n```\n\nDatabase and auth helpers:\n\n```bash\ncd client\npnpm db:push\npnpm db:studio\npnpm auth:generate\n```\n\nUse `pnpm --filter <workspace> <script>` or `pnpm -F <workspace> <script>` for a single app or package.\n\n## Roadmap\n\n- [x] Improve audio file support for transcription, summaries, playback, and exports.\n- [ ] Support more document and web source types, including PDFs, HTML pages, and other document formats.\n- [x] Support Parakeet ASR.\n- [x] Support Qwen3-ASR and Qwen3-ForcedAligner.\n- [x] Support Supertonic 3 TTS.\n- [ ] Support local LLMs, including Gemma 4.\n- [ ] Add video embedding for frame and clip semantic search across the library.\n- [ ] Add voice cloning so summaries can be read aloud in a selected voice.\n- [ ] Share summaries through the web and mobile apps.\n- [ ] Support more artifact formats, including flashcards and other reusable study or publishing outputs.\n\n## Acknowledgements\n\nOpenBrief builds on and takes inspiration from several projects:\n\n- [yt-dlp](https://github.com/yt-dlp/yt-dlp) for video download support.\n- [whisper.cpp](https://github.com/ggml-org/whisper.cpp) and [transcribe-rs](https://github.com/cjpais/transcribe-rs) for local speech-to-text.\n- [FluidAudio](https://github.com/FluidInference/FluidAudio) for local Apple-platform audio AI inspiration.\n- [Qwen3-ASR](https://github.com/QwenLM/Qwen3-ASR) for speech recognition model support.\n- [Qwen3-TTS](https://github.com/QwenLM/Qwen3-TTS) for text-to-speech model support.\n- [Supertonic](https://github.com/supertone-inc/supertonic/) for Supertonic 3 TTS support.\n- [tweakcn](https://tweakcn.com/themes/cmlhfpjhw000004l4f4ax3m7z) for the shadcn theme.\n- [Voicebox](https://github.com/jamiepine/voicebox) and [Anarlog](https://github.com/fastrepl/anarlog) for product and implementation inspiration.\n\n## License\n\nOpenBrief is licensed under the [GNU Affero General Public License v3.0](LICENSE).\n\n## Verification\n\nRun the smallest check that proves the change, then widen as needed:\n\n```bash\ncd client/apps/tauri && pnpm test:run <pattern>\ncd client/apps/tauri && pnpm typecheck\ncd client/apps/tauri/src-tauri && cargo check\ncd client && pnpm --filter @acme/nextjs typecheck\ngit diff --check\n```\n\nFor packaging, run the relevant Tauri build on the target platform before making release claims.\n","summary":"OpenBrief is an open-source Tauri v2 desktop application that turns local or linked video/audio into clear, listenable briefings. It imports media, extracts or runs speech-to-text transcription locally, generates grounded, markdown-style summaries with timestamps, and lets you chat with the transcript and summary for contextual Q&A. The app also supports organizing a searchable library of items, playing back summaries via text-to-speech, and exporting reusable notes. It’s a good fit for anyone who wants to efficiently review long recordings—journalists, students, researchers, and professionals—without relying on cloud workflows.","description":null,"stars":363,"language":"TypeScript"},{"owner":"jaytel0","repo":"taste","url":"https://github.com/jaytel0/taste","readme":"<p align=\"center\">\n  <img src=\"apps/web/public/taste.png\" alt=\"Taste logo\" width=\"96\" height=\"96\">\n</p>\n\n# Taste\n\nTaste turns a set of reference images into a reusable `SKILL.md`.\n\n- Hosted demo: <https://taste.jaytel.com>\n- Try a taste skill: [`pipeline/taste/taste-skill/SKILL.md`](pipeline/taste/taste-skill/SKILL.md)\n\n## Repo Shape\n\n```text\napps/web/          hosted frontend demo and API worker implementation\npackages/ai/       reusable prompt, provider, chunking, and generation package\nscripts/           local pipeline runner for humans and agents\nreference-images/  ignored local drop folder for your own JPG/PNG/WebP inputs\npipeline/taste/    Jaytel's example generated taste skill and pipeline notes\ndocs/              README images and examples\n```\n\nThe web app is a demo of the broader pipeline. The local pipeline is the easiest\nway to use this repo privately: it writes artifacts to `.taste/runs/...` and\ndoes not need Postgres, Vercel Blob, Cron, or hosted auth.\n\n## Quick Start: Local Pipeline\n\nUse this path if you want to create a taste skill from your own images.\n\n```bash\nnpm install\ncp .env.example .env.local\n```\n\nSet the direct provider keys in `.env.local`:\n\n```text\nOPENAI_API_KEY=...\nANTHROPIC_API_KEY=...\n```\n\nPut JPG, PNG, or WebP reference images in `reference-images/`, then run:\n\n```bash\nnpm run taste\n```\n\nThe final skill is written to:\n\n```text\n.taste/runs/<run-id>/SKILL.md\n.taste/runs/<run-id>/04-skill/SKILL.md\n```\n\nConvenience alternatives: instead of the two direct keys, you can set one\ngateway key: `OPENROUTER_API_KEY` or `AI_GATEWAY_API_KEY`. Vercel's AI Gateway\nuses `AI_GATEWAY_API_KEY` and routes plain AI SDK model strings through the\nGateway by default.\n\nRun against a different folder:\n\n```bash\nnpm run taste -- ./path/to/images\n```\n\nUseful options:\n\n```bash\nnpm run taste -- ./images --out ./my-skill-run\nnpm run taste -- ./images --skill-name my-taste\nnpm run taste -- ./images --provider openrouter\nnpm run taste -- ./images --model openai/gpt-5.5\n```\n\n## Comparison\n\nWe ran a small frontend design comparison with three agents: one base model\nwith no skill, one using Anthropic's `frontend-design` skill, and one using the\ngenerated Taste skill from `pipeline/taste/taste-skill/SKILL.md`. Each agent was\ngiven the same prompt within each test and asked to produce a standalone HTML\nfile.\n\n### Test 01: Opus 4.7\n\nPrompt: `Design a dashboard. Build in an HTML file. Ask no questions.`\n\n![Dashboard comparison using Opus 4.7 across base model, Anthropic frontend-design skill, and Taste skill](docs/agent-comparison-test-01-opus-4-7-dashboard.png)\n\n### Test 02: Opus 4.7\n\nPrompt: `Design a chat interface. Build in an HTML file. Ask no questions.`\n\n![Chat interface comparison using Opus 4.7 across base model, Anthropic frontend-design skill, and Taste skill](docs/agent-comparison-test-02-opus-4-7-chat.png)\n\n### Test 03: GPT-5.5\n\nPrompt: `Design a chat interface. Build in an HTML file. Ask no questions.`\n\n![Chat interface comparison using GPT-5.5 across base model, Anthropic frontend-design skill, and Taste skill](docs/agent-comparison-test-03-gpt-5-5-chat.png)\n\n## How It Works\n\n### 1. Curate References\n\nProvide a tight set of reference images. High-resolution images help, and\nclose-up crops are often better than full screens because they make the visual\ndetails easier to read.\n\nThe goal is not random inspiration. The useful signals are repeated examples of\nlayout, spacing, color, type, texture, composition, density, and hierarchy.\n\n### 2. Index the Corpus\n\nThe pipeline indexes every uploaded image, removes exact duplicates, and assigns\nstable image ids. The current production limit is 20 images per run.\n\nArtifacts start here:\n\n```text\nruns/{runId}/01-corpus/images.jsonl\n```\n\n### 3. Analyze Each Image\n\nEach image is read independently by the configured vision models. The default\ntwo-key pipeline uses:\n\n```text\nopenai/gpt-5.5\nanthropic/claude-sonnet-4-6\n```\n\nThe prompts tell the models to ignore what the app does and focus only on\nvisual evidence: layout, spacing, color, type, texture, rhythm, density, and\nhierarchy.\n\nRaw notes are stored like this:\n\n```text\nruns/{runId}/02-image-notes/raw/{imageId}/{model}.md\n```\n\n### 4. Fuse and Chunk\n\nWhen an image's raw analyses finish, the synthesis model fuses them into one\ncanonical note. The inputs are anonymized first, so the model sees source-neutral\nanalyses instead of provider names.\n\nThen the synthesized notes are grouped into chunks. Each chunk becomes a small\nrule synthesis. Larger runs are reduced through merge layers before producing\none final Markdown rule set.\n\n```text\nruns/{runId}/02-image-notes/synthesized/{imageId}.md\nruns/{runId}/03-rule-set/chunks/{chunkId}-rules.md\nruns/{runId}/03-rule-set/merges/{mergeId}-rules.md\nruns/{runId}/03-rule-set/rule-set.md\n```\n\n### 5. Write the Skill\n\nThe skill writer turns the final rule set into concrete instructions. It keeps\nspecific visual constraints and avoids vague aesthetic labels.\n\nInstead of saying \"make it premium and tasteful,\" the skill says things like:\n\n- Use neutral sans-serif typography.\n- Keep accent color localized.\n- Use soft shadows and minimal borders.\n- Avoid beige luxury-commerce defaults.\n\nThe final artifact is:\n\n```text\nruns/{runId}/04-skill/SKILL.md\n```\n\nThe current checked-in example skill is Jaytel's skill:\n`pipeline/taste/taste-skill/SKILL.md`.\n\n## Production Shape\n\nThe hosted app stores workflow state in Postgres and writes run artifacts to\nprivate Vercel Blob storage.\n\n```text\nbrowser uploads -> Next API routes -> Postgres workflow jobs\n                                     -> OpenRouter OAuth session\n                                     -> private Vercel Blob artifacts\n```\n\n`apps/web/src/workflow/runner.ts` owns the durable job flow. `/api/jobs/drain`\nclaims bounded batches with database leases, and Vercel Cron can re-enter the\ndrain so interrupted functions resume.\n\n## Verification\n\n```bash\nnpm run check\nnpm test\nnpm run e2e:prod\n```\n\nThe production E2E script requires `BLOB_READ_WRITE_TOKEN`,\n`INTERNAL_API_SECRET`, and `TASTE_E2E_COOKIE` from a signed-in OpenRouter\nsession. Put local test images in\n`reference-images/` or set `TASTE_REFERENCE_DIR`;\nreference images are intentionally gitignored.\n","summary":"Taste converts a curated set of reference images into a reusable `SKILL.md` that can guide AI outputs consistently. It includes a local, privacy-friendly pipeline that indexes and de-duplicates your images, analyzes them with vision-capable models, and generates skill artifacts in a run folder without requiring hosted infrastructure. The repository also provides a hosted web demo plus a reusable AI package to support prompt/provider/chunking/generation steps. This is best for designers, teams, and developers who want to turn visual style or UI layout references into a portable “skill” for generating frontend artifacts reliably.","description":"Taste skill creation pipeline","stars":203,"language":"TypeScript"},{"owner":"UditAkhourii","repo":"adhd","url":"https://github.com/UditAkhourii/adhd","readme":"<p align=\"center\">\n  <a href=\"https://adhdstack.github.io/\">\n    <img src=\"docs/hero.png\" alt=\"ADHD for Claude Code\" width=\"100%\">\n  </a>\n</p>\n\n# ADHD — a skill for agents\n\n[![CI](https://github.com/UditAkhourii/adhd/actions/workflows/ci.yml/badge.svg)](https://github.com/UditAkhourii/adhd/actions/workflows/ci.yml)\n[![npm](https://img.shields.io/npm/v/adhd-agent.svg)](https://www.npmjs.com/package/adhd-agent)\n[![license](https://img.shields.io/badge/license-MIT-blue.svg)](./LICENSE)\n[![Node](https://img.shields.io/badge/node-%3E%3D18-brightgreen)](./documentation/install.md)\n[![Paper](https://img.shields.io/badge/paper-preprint-blueviolet)](https://adhdstack.github.io/)\n[![Featured: The New Stack](https://img.shields.io/badge/featured-The%20New%20Stack-ff5500)](https://thenewstack.io/claude-code-adhd/)\n\n> **An architectural fix for premature convergence in autoregressive reasoning.**\n\nLinear Chain-of-Thought anchors on whatever it says first. Tree-of-Thought widens the search but still walks a single shared context, so the anchoring persists across branches. **ADHD treats this as an architectural problem, not a prompting one** — it spawns N isolated reasoning processes under deliberately distorted cognitive frames, with zero shared context during divergence, then runs a separate critic pass to score, cluster, prune traps, and deepen the survivors.\n\nReach for it on **design decisions, fuzzy debugging, naming, API surface design, strategy, and any prompt of the shape *\"give me a few ways to…\"***.\n\n📄 **Preprint:** [ADHD: Parallel Divergent Ideation for Coding Agents](https://adhdstack.github.io/) · 👤 **Author:** Udit Akhouri — [@akhouriudit](https://x.com/akhouriudit) · [LinkedIn](https://www.linkedin.com/in/udit-akhouri-10160a168/)\n\n---\n\n## Featured\n\n- 🔌 **Adopted by [repowire](https://github.com/prassanna-ravishankar/repowire)** — the first OSS project to officially ship ADHD. Its maintainer ported the framework onto repowire's mesh-orchestrator primitives in [PR #313](https://github.com/prassanna-ravishankar/repowire/pull/313) (merged): frames become frame-shifted temp peers, the generator/critic split maps onto separate peers vs. the orchestrator's own turn, attribution via `metadata.based-on` (MIT).\n- 📰 **[The New Stack](https://thenewstack.io/claude-code-adhd/)** ran a feature story on ADHD for Claude Code.\n- 💬 **OpenClaw / multi-agent community** is independently testing it across agents. One tester: *\"I read it, installed it on two different agents… I actually love it. This is great. I thought this was gonna be another useless post. But no, it wasn't.\"*\n- 🔬 An independent **[evidence-based research review](https://github.com/testdouble/han/blob/adhd-swarm-research/docs/research/adhd-application-to-han.md)** (11 sources, 8 validation rounds) was published against the method — findings tracked openly as [issues #16–#18](https://github.com/UditAkhourii/adhd/issues).\n\n---\n\n## Community\n\n👉 [**Join the ADHD community →**](https://tally.so/r/WO1Nzj) as a contributor, maintainer, early adopter, or just a member. One short form. We coordinate frame contributions, eval problems, integrations, and adopter onboarding there.\n\n---\n\n## Early adopters\n\nProjects that officially ship or integrate ADHD:\n\n| Project | What they did | Status |\n|---|---|---|\n| [**repowire**](https://github.com/prassanna-ravishankar/repowire) | Ported ADHD onto repowire's mesh-orchestrator primitives — frames become frame-shifted temp peers, generator/critic split maps to separate peers vs. the orchestrator's turn. Ships in the default orchestrator template. ([PR #313](https://github.com/prassanna-ravishankar/repowire/pull/313)) | ✅ Merged · MIT attribution |\n\nShipping ADHD in your project? Open a PR adding it here, or [open an issue](https://github.com/UditAkhourii/adhd/issues/new) and we'll add you.\n\n---\n\n## Install\n\nOne command, auto-detects your agent (Claude Code, Cursor, Antigravity, Codex, Cline, Gemini CLI, Windsurf, and ~50 more):\n\n```bash\nnpx skills add UditAkhourii/adhd\n```\n\nThen invoke explicitly with `/adhd \"your problem\"`, or let it auto-trigger on ideation intents.\n\n### Codex quick path\n\nIf the universal command above fails to register inside Codex (some Codex builds discover skills from a specific path), force the target:\n\n```bash\nnpx skills add UditAkhourii/adhd -a codex -g\n```\n\nOr install manually into Codex's skills directory:\n\n```bash\nmkdir -p ~/.codex/skills/adhd\ncurl -fsSL https://raw.githubusercontent.com/UditAkhourii/adhd/main/skills/adhd/SKILL.md \\\n  -o ~/.codex/skills/adhd/SKILL.md\n```\n\nRestart Codex. `/adhd \"design a rate limiter\"` should now route through the skill. The skill ships with a single-line description (≤600 chars) specifically because some Codex builds truncate or reject multi-line YAML block descriptions.\n\nCLI and library installs, manual curl for other agents, and per-platform paths are in **[documentation/install.md](./documentation/install.md)**.\n\n```bash\nnpm install -g adhd-agent     # CLI\nnpm install adhd-agent        # library\n```\n\n---\n\n## Quickstart\n\n```bash\nadhd \"design a rate limiter that survives a leader election\"\nadhd \"name this function\" --frames 3 --ideas 8 --top 2\n```\n\n```ts\nimport { run, renderText } from \"adhd-agent\";\n\nconst result = await run({ problem: \"How should we shard this queue under bursty load?\", framesPerRun: 5, topK: 3 });\nconsole.log(renderText(result));\n// result.shortlist · result.nonObviousPick · result.traps · result.deepened · result.clusters\n```\n\nFull reference: **[documentation/api.md](./documentation/api.md)**.\n\n---\n\n## How it works\n\nA two-phase loop with a hard wall between the phases.\n\n1. **Diverge.** Pick N cognitive frames. Spawn N parallel, **isolated** Agent calls — each sees the problem plus one frame's vantage prompt, and a system prompt that forbids evaluation. Branches never see each other, so no anchoring.\n2. **Focus.** A separate critic call scores every idea (`novelty / viability / fit`), flags traps with reasons, clusters by underlying angle, and deepens the top-K survivors into sketches with risks and first steps.\n\nThe generator-critic split is **mechanical** — separate LLM calls with opposite system prompts — not promised in one prompt. Deep dive: **[documentation/how-it-works.md](./documentation/how-it-works.md)**. How it differs from CoT and ToT: **[documentation/vs-cot-and-tot.md](./documentation/vs-cot-and-tot.md)**.\n\n---\n\n## Results\n\nMean scores across 6 open-ended engineering problems (0–10), ADHD vs a single-shot baseline at the same model, judged by an independent LLM with a skeptical-staff-engineer prompt, A/B order randomized.\n\n| Dimension          | ADHD     | Baseline | Δ         | Ratio |\n| ------------------ | -------: | -------: | --------: | ----: |\n| breadth            | **9.00** | 4.83     | **+4.17** | 1.9×  |\n| novelty            | **7.83** | 2.67     | **+5.17** | 2.9×  |\n| trap detection     | **9.50** | 1.83     | **+7.67** | 5.2×  |\n| actionability      | **9.50** | 6.50     | **+3.00** | 1.5×  |\n| builder usefulness | **7.67** | 6.83     | **+0.83** | 1.1×  |\n\n**ADHD wins 5 of 6 problems.** Biggest gap is trap detection — baselines rarely name the seductive-but-broken ideas. Methodology, limitations, and how to reproduce: **[documentation/evals.md](./documentation/evals.md)**.\n\n---\n\n## Documentation\n\n| Page | What's in it |\n|---|---|\n| [Install](./documentation/install.md) | Every install path — skill, CLI, library, Agent SDK, per-platform |\n| [How it works](./documentation/how-it-works.md) | The two-phase loop + architecture (context, pruning, orchestration) |\n| [vs CoT & ToT](./documentation/vs-cot-and-tot.md) | Structural comparison, the three load-bearing differences, frames vs personas |\n| [Frames](./documentation/frames.md) | The 15 cognitive frames, how selection works, how to author your own |\n| [When to use](./documentation/when-to-use.md) | Use / don't use, why it shines on creative work, cost & speed |\n| [CLI & API](./documentation/api.md) | CLI flags, library types, using ADHD inside your own agent |\n| [Evals](./documentation/evals.md) | Methodology, headline numbers, limitations, roadmap |\n\nAlso: [SKILL.md](./skills/adhd/SKILL.md) (the runnable skill) · [SOURCE-SPEC.md](./SOURCE-SPEC.md) (original spec) · [CONTRIBUTING.md](./CONTRIBUTING.md) · [the preprint](https://adhdstack.github.io/).\n\n---\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=uditakhourii%2Fadhd&type=date&legend=top-left\">\n  <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=uditakhourii/adhd&type=date&legend=top-left\" style=\"background:#ffffff\" />\n</a>\n\n---\n\n## External reviews\n\n- [**Han plugin compatibility analysis**](https://github.com/testdouble/han/blob/adhd-swarm-research/docs/research/adhd-application-to-han.md) by [@mxriverlynn](https://www.reddit.com/user/mxriverlynn) — evidence-based review using Han's own `/research` skill, 11 sources, 8 validation rounds. Findings tracked as issues [#16](https://github.com/UditAkhourii/adhd/issues/16), [#17](https://github.com/UditAkhourii/adhd/issues/17), [#18](https://github.com/UditAkhourii/adhd/issues/18).\n\n---\n\n## License\n\nMIT License.\n\nADHD operationalizes the *Divergent Ideation* source spec ([SOURCE-SPEC.md](./SOURCE-SPEC.md)). The runnable skill is at [`skills/adhd/SKILL.md`](./skills/adhd/SKILL.md).\n\n---\n\n## Contact\n\n**Udit Akhouri** — author of the preprint and maintainer.\n\n[adhdstack.github.io](https://adhdstack.github.io/) · [@akhouriudit](https://x.com/akhouriudit) · [LinkedIn](https://www.linkedin.com/in/udit-akhouri-10160a168/) · [researchudit@gmail.com](mailto:researchudit@gmail.com) · [@UditAkhourii](https://github.com/UditAkhourii)\n\nOpen to collaboration with research labs and applied-AI teams working on reasoning, planning, and agentic systems.\n","summary":"ADHD is an open-source “architectural fix” for coding and reasoning agents that aims to reduce premature convergence by breaking the tendency to lock onto the first chain-of-thought. Instead of relying on prompting tweaks, it runs N isolated reasoning processes under intentionally distorted cognitive frames with no shared context during divergence, then uses a separate critic pass to score, cluster, prune traps, and deepen the best ideas. It’s especially useful for design decisions, fuzzy debugging, naming, and exploring multiple options (e.g., prompts like “give me a few ways to…”). Developers and teams building or integrating LLM-based coding/agent workflows will benefit from improving ideation breadth and reliability.","description":"ADHD — a skill for coding agents. Tree-of-thought with pruning, built on the Claude & Codex Agent SDK. Fans out parallel divergent thoughts under different cognitive frames, scores, prunes traps, deepens the survivors. The no-brainer skill for creative and interdisciplinary work.","stars":613,"language":"TypeScript"},{"owner":"ikeda042","repo":"PhenoPixel","url":"https://github.com/ikeda042/PhenoPixel","readme":"# PhenoPixel\n\nPhenoPixel is a FastAPI + React application for microscopy single-cell\nextraction, annotation, visualization, and batch phenotype analysis. It is\ndesigned around ND2 microscopy workflows: upload an ND2 file, extract cell\ncontours, clean labels, inspect individual cells, and export population-level\nshape and fluorescence descriptors.\n\nThe montage below shows a label-1 cell population from `microscope_data.db`.\nThe overlay renders `fluo1` as magenta and `fluo2` as green without scale bars,\nwith display intensity balanced per cell while avoiding saturation.\n\n![Manual Label 1 Overlay Fluo montage](docs/images/manual-label1-overlay-fluo-montage.png)\n\n![Manual Label 1 Replot montage](docs/images/manual-label1-replot-montage.png)\n\n![Cell extraction preview](docs/screen-records/cell-extraction.preview.gif)\n\n## Key Features\n\n| Area | What PhenoPixel provides |\n| --- | --- |\n| ND2 management | Upload, list, inspect metadata, download, delete, and parse `.nd2` files. |\n| Cell extraction | Generate cropped cell images, contours, preview frames, and SQLite databases. |\n| Annotation | Review auto-detected cells and relabel single cells or debris in bulk. |\n| Cell viewer | Inspect phase, fluorescence, overlays, replot views, heatmaps, map views, distributions, and raw images per cell. |\n| Bulk analysis | Export and visualize cell length, area, fluorescence intensity summaries, heatmap vectors, contours, Map256 strips, raw intensities, and JSON/CSV data. |\n| Research reporting | Keep database files, exports, screenshots, and method formulas close to the analysis code for reproducible reporting. |\n\n## Requirements\n\n| Component | Notes |\n| --- | --- |\n| Python | Local launch examples use `python3.14`; the Docker backend image uses Python 3.11. |\n| Node.js / npm | Required for the React frontend, Docusaurus docs build, and Storybook screenshots. Dependency versions are locked in `frontend/package-lock.json`. |\n| SQLite | Used for extracted cell databases through SQLAlchemy. |\n| OpenCV system libraries | Local installs use `opencv-python`; Docker also installs `libgl1` and `libglib2.0-0`. |\n\n## Quick Start\n\nRun the backend and frontend from the repository root in separate terminals.\nThe local quick-start path uses `python3.14`; the Docker backend image uses\nPython 3.11.\n\n### Backend\n\n```sh\npython3.14 -m venv venv\nsource ./venv/bin/activate\ncd backend\npip install -r requirements.txt\npython main.py\n```\n\n### Frontend\n\n```sh\ncd frontend\nnpm install\nnpm run dev\n```\n\nIf npm reports peer dependency conflicts around Vite and Storybook, use:\n\n```sh\nnpm install --legacy-peer-deps\n```\n\n### Local URLs\n\n| Service | URL |\n| --- | --- |\n| Backend | http://localhost:3000 |\n| Frontend dev server | http://localhost:3001 |\n| API base | http://localhost:3000/api/v1 |\n| Swagger UI | http://localhost:3000/api/v1/docs |\n| OpenAPI JSON | http://localhost:3000/api/v1/openapi.json |\n| Health check | http://localhost:3000/api/v1/health |\n\n## Input Data\n\n| Item | Notes |\n| --- | --- |\n| Primary input | `.nd2` files. Upload through the UI or place them under `backend/app/nd2files/`. |\n| Filename rules | Only `.nd2` is accepted; path components are stripped and dots in stems are normalized during processing. |\n| Channel/layer modes | `single`, `dual`, `dual(reversed)`, `triple`, and `quad` are supported by the extraction UI/API. |\n| Metadata | ND2 metadata can be viewed from the ND2 Manager. Channel count may be inferred when the metadata exposes it. |\n| Time/Z data | The parser can expose ND2 frame metadata, but cell extraction expects the selected layer mode to match the frame/channel organization. Validate previews before running large jobs. |\n\n## Workflow\n\n### 1. ND2 Manager\n\nManage ND2 files: upload datasets, inspect metadata, delete old files, and open\na selected ND2 file in Cell Extraction.\n\n![ND2 manager](docs/screenshots/nd2manager1.png)\n\n### 2. Cell Extraction\n\nChoose the layer mode, objective scale, Canny threshold (`param1`), crop size,\nand Auto Annotation setting, then start extraction. The backend creates contour\npreviews and one or more SQLite databases for downstream analysis.\n\n![Cell extraction setup](docs/screenshots/cell_extraction1.png)\n\nWhen extraction finishes, review the preview frames. If contours are poor,\nadjust parameters and re-extract.\n\n![Auto annotation processing](docs/screenshots/cell_extraction2.png)\n\n![Extraction results and next actions](docs/screenshots/cell_extraction3.png)\n\n### 3. Database Manager\n\nCell databases generated by extraction can be uploaded, downloaded, renamed,\ndeleted, and opened for cell-level review.\n\n![Database manager](docs/screenshots/database_manager1.png)\n\n![Database access](docs/screenshots/database_manager2.png)\n\nThe cell viewer function panel provides these modes:\n\n| Mode | Description |\n| --- | --- |\n| `Contour` | Show extracted contour coordinates. |\n| `Replot` | Replot a cell in its aligned coordinate system. |\n| `Overlay` | Overlay the contour on the default cell image. |\n| `Overlay Raw` | Overlay fluorescence without contour masking on the raw view. |\n| `Overlay Fluo` | Compose fluorescence channels with selectable colors. |\n| `Heatmap` | Visualize centerline-projected fluorescence intensity. |\n| `Map 256` | Render a 256-level mapped fluorescence view. |\n| `Map Raw` | Render the mapped view at native pixel scale. |\n| `Distribution` | Plot the intensity distribution for the selected cell/channel. |\n\n![Function panel modes](docs/screenshots/database_manager3.png)\n\n`Overlay Raw` places fluorescence-channel signal on top of the PH image, making\nit possible to check fluorescence localization against the original cell\nmorphology.\n\n![PH image with fluorescence overlay](docs/screenshots/database_manager4.png)\n\n`Overlay Fluo` shows the fluorescence channels as an overlay without the PH\nbackground, which is useful for inspecting signal overlap and channel-specific\npatterns.\n\n![Fluorescence channel overlay](docs/screenshots/database_manager5.png)\n\n`Heatmap` projects fluorescence intensity along the selected cell's long axis.\nThe target fluorescence channel can be selected before plotting, so the same\ncell can be compared across channels.\n\n![Single-cell fluorescence heatmap](docs/screenshots/database_manager6.png)\n\n`Map 256` renders fluorescence information as a 256-level intensity map. This\nview preserves the spatial pattern inside each cell and is useful for examining\nsubcellular localization, such as Nucleoid positioning.\n\n![Single-cell Map256 view](docs/screenshots/database_manager7.png)\n\nThe same Map256 representation can also be used at population scale. The\nexample below arranges Map256 views from the `Label 1` population in\n`microscope_data.db`, summarizing Nucleoid localization across the selected cell\ngroup.\n\n![Population Map256 nucleoid localization](docs/screenshots/Map256.png)\n\n`Distribution` shows a histogram of intracellular fluorescence intensities for\nthe selected cell/channel.\n\n![Single-cell fluorescence intensity distribution](docs/screenshots/database_manager8.png)\n\n### 4. Annotation\n\nAuto-detected contours may include debris or merged cells. Use Annotation to\nmove cells between `N/A` and analysis labels such as `Label 1`. Click cells\nindividually or use Shift-drag to select multiple cells before applying a label.\n\n![Annotation cleanup](docs/screenshots/annotation1.png)\n\n![Annotation labeling](docs/screenshots/annotation2.png)\n\n![Annotation labeling multiple](docs/screenshots/annotation3.png)\n\n### 5. Bulk Engine\n\nAfter annotation, use Bulk Engine to run population-level analysis on a selected\nlabel. Return to Annotation if non-single cells remain in the selected group.\n\n![Bulk engine selection](docs/screenshots/bulk1.png)\n\n![Bulk engine analysis](docs/screenshots/bulk2.png)\n\nBulk Engine modes:\n\n| Mode | Description |\n| --- | --- |\n| `Cell length` | Measure cell length in micrometers from contour geometry and stored pixel size. |\n| `Cell area` | Export cell area in pixels squared. |\n| `Normalized median` | Compute cellwise median intensity after max normalization. |\n| `FITC aggregation ratio` | Report the fraction of cells below the configured normalized-median threshold. |\n| `Entropy` | Quantify fluorescence distribution with entropy / sparsity-style metrics. |\n| `Heatmap` | Generate centerline heatmap vectors and absolute/relative heatmap plots. |\n| `Contours` | Visualize aligned contours and export transformed contour coordinates. |\n| `Map256` | Render population-level Map256 strips or contour maps. |\n| `Raw data` | Export raw pixel intensities inside each contour. |\n\nJSON and CSV exports are available for downstream analysis.\n\n![Bulk engine analysis modes](docs/screenshots/bulk3.png)\n\nFor example, `Heatmap` aggregates and visualizes fluorescence localization for\nall cells in the selected label.\n\n![Bulk engine heatmap example](docs/screenshots/bulk4.png)\n\n`Contours` mode focuses on contour geometry only. It exports aligned contour\ncoordinates as JSON or CSV, making it easier to prototype and validate\nalgorithms that use cell outline information without carrying fluorescence\nimages or raw intensity data through the analysis pipeline.\n\n![Bulk engine contour export](docs/screenshots/bulk5.png)\n\n## Output Data\n\n| Output | Location / format |\n| --- | --- |\n| Uploaded ND2 files | `backend/app/nd2files/` |\n| Cell databases | `backend/app/databases/<nd2_stem>.db` |\n| Extracted contour previews | `backend/app/extracted_data/<nd2_stem>/<frame>.png` |\n| Cell table | SQLite table `cells`, including `cell_id`, `manual_label`, `perimeter`, `area`, `img_ph`, `img_fluo1`, `img_fluo2`, `contour`, center coordinates, objective, and pixel size. |\n| Bulk exports | JSON/CSV/PNG responses from Bulk Engine endpoints or browser downloads. |\n| Frontend production build | `frontend/dist/`; the backend serves this folder when it exists. |\n\n## Default Parameters\n\n| Parameter | Default / current behavior |\n| --- | --- |\n| Extraction threshold `param1` | `130` |\n| Cell crop size | `200` px |\n| Default layer mode | `dual` in the UI |\n| Auto Annotation | On by default in the UI |\n| Auto Annotation width screen | second PCA variance `lambda_2 <= 120` |\n| Auto Annotation convexity screen | `hull_perimeter / perimeter > 0.85` |\n| Extraction concurrency | `CELLEXTRACTION_MAX_CONCURRENCY`, default `2` |\n| Objective presets | `100x = 0.065 um/px`, `60x = 0.108 um/px` |\n| Heatmap vector bins | `35` |\n| Centerline polynomial degree | `4` unless a request overrides it |\n| FITC aggregation cutoff | `0.7414` |\n\n## Methods\n\nThe quantitative routines in PhenoPixel follow a common single-cell analysis\npipeline: detect a contour from the phase-contrast image, re-parameterize the\ncell in its intrinsic coordinate system, and compute shape or fluorescence\ndescriptors that are directly comparable across cells. Let\n$C = \\{(x_i, y_i)\\}_{i=1}^n$ be the contour points of one cell and let\n$\\Omega_C$ be the set of pixels inside that contour.\n\n### Auto Annotation Contour Screen\n\nWhen Auto Annotation is `On`, an additional post-processing step runs after\nextraction to automatically separate cells from debris.\n\nThe current implementation is a contour-only heuristic. After a contour\n$C = \\{(x_i, y_i)\\}_{i=1}^N$ is extracted, the backend computes two geometric\nscores and assigns `Label 1` only when both pass their thresholds.\n\nFirst, it measures how thick the contour is in the direction orthogonal to the\nmajor axis. Let\n\n$$\n\\Sigma_C =\n\\frac{1}{N-1}\n\\sum_{i=1}^{N}\n(\\mathbf{p}_i - \\bar{\\mathbf{p}})\n(\\mathbf{p}_i - \\bar{\\mathbf{p}})^{\\mathsf{T}},\n\\qquad\n\\mathbf{p}_i = (x_i, y_i)^{\\mathsf{T}}.\n$$\n\nIf the eigenvalues of $\\Sigma_C$ are $\\lambda_1 \\ge \\lambda_2$, Auto Annotation\nuses the smaller one, $\\lambda_2$, as a width / lateral-spread proxy and accepts\nonly contours satisfying\n\n$$\n\\lambda_2 \\le 120.\n$$\n\nSecond, it measures contour convexity from perimeter ratios. If $P(C)$ is the\ncontour perimeter and $P(\\mathrm{Hull}(C))$ is the perimeter of its convex hull,\nthe code defines\n\n$$\n\\kappa(C) = \\frac{P(\\mathrm{Hull}(C))}{P(C)}.\n$$\n\nBecause irregular debris or merged objects tend to have a perimeter much longer\nthan their convex hull, they produce smaller $\\kappa$. The contour is accepted\nonly when\n\n$$\n\\kappa(C) > 0.85.\n$$\n\nThe final Auto Annotation score can be written as\n\n$$\ns(C) = \\mathbf{1}[\\lambda_2 \\le 120] \\, \\mathbf{1}[\\kappa(C) > 0.85].\n$$\n\nAuto Annotation assigns `Label 1` when $s(C) = 1$ and `N/A` otherwise. In other\nwords, it keeps contours that are both laterally compact and close to convex,\nand it filters out broad, jagged, or debris-like shapes before manual review.\n\n### 1. Contour Extraction, Principal Axis, and Basis Transform\n\nContours are extracted from phase-contrast images with a Canny-based pipeline.\nThe major elongation axis is estimated from the covariance of contour\ncoordinates,\n\n$$\n\\Sigma =\n\\begin{pmatrix}\n\\mathrm{Var}[X_1] & \\mathrm{Cov}[X_1, X_2] \\\\\n\\mathrm{Cov}[X_1, X_2] & \\mathrm{Var}[X_2]\n\\end{pmatrix},\n$$\n\nand the principal direction is the solution of\n\n$$\n\\mathbf{w}^* = \\underset{\\|\\mathbf{w}\\| = 1}{\\mathrm{arg\\,max}} \\mathbf{w}^{\\mathsf{T}} \\Sigma \\mathbf{w},\n\\qquad\n\\Sigma \\mathbf{w} = \\lambda \\mathbf{w}.\n$$\n\nIf $Q = (\\mathbf{v}_1\\ \\mathbf{v}_2)$ is the orthonormal eigenvector basis,\ncoordinates are transformed to the cell-aligned frame by\n\n$$\n\\mathbf{u} = Q^{\\mathsf{T}} \\mathbf{x},\n\\qquad\n\\mathbf{x} = Q \\mathbf{u}.\n$$\n\nThis removes arbitrary image rotation and makes bent or filamentous cells easier\nto model analytically.\n\nBecause $Q$ is orthonormal, this basis conversion also preserves Euclidean\nlength. For any vector $\\mathbf{x}$ and its transformed coordinate\n$\\mathbf{u} = Q^{\\mathsf{T}}\\mathbf{x}$,\n\n$$\n\\|\\mathbf{u}\\|^2\n= \\mathbf{u}^{\\mathsf{T}}\\mathbf{u}\n= (Q^{\\mathsf{T}}\\mathbf{x})^{\\mathsf{T}} (Q^{\\mathsf{T}}\\mathbf{x})\n= \\mathbf{x}^{\\mathsf{T}} Q Q^{\\mathsf{T}} \\mathbf{x}\n= \\mathbf{x}^{\\mathsf{T}} \\mathbf{x}\n= \\|\\mathbf{x}\\|^2,\n$$\n\nsince $Q^{\\mathsf{T}}Q = QQ^{\\mathsf{T}} = I$. Therefore distances measured\nbefore and after the basis transform are identical.\n\n### 2. Centerline Fitting and Cell Length\n\nIn the aligned frame, the cell centerline is approximated by a $k$-th order\npolynomial\n\n$$\n\\hat{f}(u_1) = \\theta^{\\mathsf{T}} \\phi(u_1),\n\\qquad\n\\theta = (W^{\\mathsf{T}} W)^{-1} W^{\\mathsf{T}} f.\n$$\n\nFor a curved cell, the thesis formulation defines cell length as the arc length\nbetween the two contour-centerline intersection points:\n\n$$\nL = \\int_{u_{1,a}}^{u_{1,b}}\n\\sqrt{1 + (\\frac{d\\hat{f}}{du_1})^2}\\,du_1.\n$$\n\n![Centerline fitting](docs/images/method-centerline-fit.png)\n\nIn the current backend implementation, `Cell length` is returned as a robust PCA\nmajor-axis extent of pixels inside the contour and converted with the stored\npixel size. For the 100x preset, this is:\n\n$$\nL_{\\mathrm{API}} \\approx (\\max_i \\pi_i - \\min_i \\pi_i) \\times 0.065.\n$$\n\n### 3. Cell Area and Raw Pixel Export\n\nCell area is the area enclosed by the contour,\n\n$$\nA(C) = \\iint_{\\Omega_C} 1\\,dA,\n$$\n\nwhich is stored during extraction and reported by `Cell area`. `Raw data`\nexports the unaggregated intensity set\n\n$$\n\\{ I(p) \\mid p \\in \\Omega_C \\}\n$$\n\nfor the selected channel.\n\n### 4. Fluorescence Vectorization Along the Centerline\n\nFor each intracellular pixel $(p_i, q_i)$ with intensity $G(p_i, q_i)$, the\nnearest point on the fitted centerline is found by\n\n$$\nu_{1,i}^* = \\underset{u_1 \\in [u_{1,a}, u_{1,b}]}{\\mathrm{arg\\,min}}\n[(u_1 - p_i)^2 + (\\hat{f}(u_1) - q_i)^2].\n$$\n\nThis position is converted to arc length,\n\n$$\n\\ell(u_1) = \\int_{u_{1,a}}^{u_1} \\sqrt{1 + (\\hat{f}'(t))^2}\\,dt,\n\\qquad\n\\ell_i^* = \\ell(u_{1,i}^*).\n$$\n\nTo obtain a fixed-dimensional descriptor, the arc-length interval $[0, L]$ is\ndivided into $n$ bins and max-pooled:\n\n$$\ng_j = \\max \\{ G(p_i, q_i) \\mid \\ell_i^* \\in I_j \\}.\n$$\n\nIf no projected pixel falls into $I_j$, we set $g_j = 0$. The resulting\nfixed-length localization vector is\n\n$$\n\\mathbf{g} = (g_1, \\dots, g_n)^{\\mathsf{T}}.\n$$\n\nThe current implementation uses $n = 35$ and a default polynomial degree of\n$k = 4$. `Heatmap` visualizes these peak vectors either in absolute-length\ncoordinates or in relative-position coordinates.\n\n![Peak-vector heatmap construction](docs/images/method-peak-vectorization.png)\n\n### 5. Map256 Spatial Intensity Mapping\n\n`Map 256` keeps more spatial information than the 35-bin heatmap vector. It uses\nthe same cell-aligned coordinate system and polynomial centerline, but instead\nof reducing each longitudinal bin to a single peak value, it remaps every\nintracellular fluorescence pixel onto a two-dimensional long-axis / lateral-axis\nimage.\n\nBefore mapping, the selected fluorescence image is converted to grayscale and\nbackground-subtracted with a morphological opening:\n\n$$\nI_{\\mathrm{bg}} = I - \\mathrm{open}_{21 \\times 21}(I).\n$$\n\nFor each pixel $\\mathbf{u}_i = (u_{1,i}, u_{2,i})$ inside the contour, the\nnearest point on the fitted centerline $\\hat{f}$ is found as\n\n$$\nt_i^{\\star} =\n\\underset{t \\in [u_{1,a}, u_{1,b}]}{\\mathrm{arg\\,min}}\n\\left[(t - u_{1,i})^2 + (\\hat{f}(t) - u_{2,i})^2\\right].\n$$\n\nThe projected long-axis coordinate is the centerline arc length,\n\n$$\np_i =\n\\int_{u_{1,a}}^{t_i^{\\star}}\n\\sqrt{1 + (\\hat{f}'(t))^2}\\,dt,\n$$\n\nand the signed lateral coordinate is\n\n$$\nd_i =\n\\mathrm{sign}(u_{2,i} - \\hat{f}(t_i^{\\star}))\n\\sqrt{(t_i^{\\star} - u_{1,i})^2 + (\\hat{f}(t_i^{\\star}) - u_{2,i})^2}.\n$$\n\nThese coordinates define a high-resolution map\n$H \\in \\mathbb{R}^{h \\times w}$, where\n\n$$\nw = \\lceil \\max_i p_i - \\min_i p_i \\rceil + 1,\n\\qquad\nh = \\lceil \\max_i d_i - \\min_i d_i \\rceil + 1.\n$$\n\nEach intracellular pixel is assigned to integer map coordinates\n\n$$\nx_i = \\lfloor p_i - \\min_j p_j \\rfloor,\n\\qquad\ny_i = \\lfloor d_i - \\min_j d_j \\rfloor,\n$$\n\nand intensities are max-pooled into the mapped image:\n\n$$\nH(y_i, x_i) =\n\\max\\left(H(y_i, x_i), I_{\\mathrm{bg}}(\\mathbf{u}_i)\\right).\n$$\n\nThe implementation also writes the same value to the four direct neighbors\n$(y_i \\pm 1, x_i)$ and $(y_i, x_i \\pm 1)$ when they are inside the map. This\nsmall local expansion reduces holes caused by integer projection.\n\nFor `Map 256`, the high-resolution map is resized by nearest-neighbor\ninterpolation to a fixed display size:\n\n$$\nM_c \\in \\mathbb{R}^{256 \\times 1024}\n= \\mathrm{resize}_{\\mathrm{nearest}}(H_c).\n$$\n\nThe display image is then converted to 8-bit intensity,\n\n$$\n\\tilde{M}_c =\n255 \\cdot\n\\frac{M_c - \\min(M_c)}\n{\\max(M_c) - \\min(M_c)},\n$$\n\nwith a zero image used when the map has no intensity range. `Map Raw` keeps the\nnative high-resolution map before the fixed-size resize. The Jet view applies a\npseudocolor map to the same normalized intensity image.\n\nFor population-level Map256 contour plots, the backend first builds one map per\ncell. To make the population summary less sensitive to arbitrary left/right or\ntop/bottom orientation, each cell contributes four symmetric variants: the\noriginal map, left-right flip, top-bottom flip, and both flips. The population\nmean map is\n\n$$\n\\bar{M} =\n\\frac{1}{4N}\n\\sum_{c=1}^{N}\n\\left[\nM_c + F_x(M_c) + F_y(M_c) + F_y(F_x(M_c))\n\\right],\n$$\n\nwhere $F_x$ and $F_y$ denote horizontal and vertical flips. In `relative` mode,\neach cell map is normalized before averaging; in `absolute` mode, the\nbackground-subtracted raw intensities are averaged. This makes Map256 useful for\nsummarizing subcellular localization patterns, such as Nucleoid positioning,\nacross a labeled cell population. The square montage below was generated from\nall `Label 1` cells in the current `microscope_data.db`.\n\n![Population Map256 nucleoid localization](docs/screenshots/Map256.png)\n\n### 6. Normalized Median and Aggregation-Style Scores\n\nFor any selected channel, intensities inside a cell are normalized by the\ncellwise maximum,\n\n$$\n\\tilde{I}_i = \\frac{I_i}{\\max_{p \\in \\Omega_C} I(p)},\n\\qquad\nm(C) = \\mathrm{median}(\\tilde{I}_i).\n$$\n\nThis scalar is reported by `Normalized median`. A population-level aggregation\nscore can then be written as\n\n$$\nR(\\tau) = \\frac{1}{N} \\sum_{c=1}^{N} \\mathbf{1}[m(C_c) < \\tau].\n$$\n\nThe current `FITC aggregation ratio` plot uses this form with a default cutoff\n$\\tau = 0.7414$. In the thesis experiments, the same normalized-median idea was\nalso used for IbpA-GFP and TorA-GFP abnormal-localization calls, with an example\nthreshold of $m \\le 0.6$ for those datasets.\n\n### 7. Thesis-Specific Phenotype Calls\n\nFor HU-GFP compaction, a 35-bin peak vector is first computed and summarized as\n\n$$\ns(C) = \\sum_{j=1}^{35} g_j.\n$$\n\nUsing the control population, the abnormality threshold is defined by the 5th\npercentile,\n\n$$\n\\tau_{\\mathrm{HU}} = Q_{0.05}(\\{ s(C_c^{\\mathrm{ctrl}}) \\}),\n$$\n\nand the HU aggregation ratio is the fraction of cells with\n$s(C) < \\tau_{\\mathrm{HU}}$.\n\nFor PI permeability, the mean intracellular PI intensity is\n\n$$\n\\mu(C) = \\frac{1}{|\\Omega_C|} \\sum_{p \\in \\Omega_C} I_{\\mathrm{PI}}(p),\n$$\n\nwith a control-derived positivity threshold\n\n$$\n\\tau_{\\mathrm{PI}} = Q_{0.95}(\\{ \\mu(C_c^{\\mathrm{ctrl}}) \\}).\n$$\n\nThe PI-positive fraction is then the proportion of cells satisfying\n$\\mu(C) > \\tau_{\\mathrm{PI}}$.\n\n## Research Use / Citation\n\nThis repository is maintained to support reproducible reporting in research\npapers. If you cite this software in a manuscript, include:\n\n- **Software name**: PhenoPixel\n- **Author**: Yunosuke Ikeda\n- **Contact**: d263846@hiroshima-u.ac.jp\n- **Repository URL**: this repository URL\n- **Version evidence**: Git commit hash used in the analysis\n- **Access date**: date you accessed the repository\n\nRecommended citation:\n\n```text\nIkeda, Y. PhenoPixel: microscopy single-cell extraction and batch phenotype analysis software.\nGitHub repository. URL: <repository-url> (accessed <YYYY-MM-DD>), commit <commit-hash>.\n```\n\nFor reproducibility, report OS/Python/Node versions, dependency snapshots, ND2\nmetadata or acquisition conditions, extraction parameters, labeling criteria,\nBulk Engine modes, thresholds, export settings, and the exact commit hash.\n\n## Development And Quality Checks\n\nBackend checks:\n\n```sh\nsource ./venv/bin/activate\nPYTHONPATH=backend python -m unittest discover backend/tests\n```\n\nFrontend checks:\n\n```sh\ncd frontend\nnpm run build\nnpm run lint\n```\n\nScreenshot/storybook assets:\n\n```sh\n./docs/make_screenshots.sh\n```\n\n## Production Build\n\nBuild the frontend before serving the app from the backend:\n\n```sh\ncd frontend\nnpm install --legacy-peer-deps\nnpm run build\ncd ../backend\nsource ../venv/bin/activate\npython main.py\n```\n\nWhen `frontend/dist/index.html` exists, `backend/main.py` serves the SPA and\nstatic assets alongside the `/api/v1` API.\n\n## Docker Deploy (Traefik)\n\n`docker/compose.yaml` starts Traefik and the backend container. The current\ncompose file exposes the backend under `/api/v1/` and mounts persistent backend\ndata directories.\n\nCreate `backend/.env` first:\n\n```sh\ncp backend/.env.template backend/.env\n```\n\nEnvironment variables used by local/Docker deployment:\n\n| Variable | Used by | Meaning |\n| --- | --- | --- |\n| `SLACK_WEHBOOK_URL` | Backend | Optional Slack webhook URL for job notifications. The variable name intentionally matches the current code/template spelling. |\n| `BASE_PATH` | Backend | Optional frontend base URL used in Slack notification links. |\n| `CELLEXTRACTION_MAX_CONCURRENCY` | Backend | Optional extraction job concurrency limit; defaults to `2`. |\n| `SERVER_HOST` | Docker compose / Traefik | Hostname routed to the backend; compose defaults to `localhost` when unset. |\n| `TRAEFIK_ACME_EMAIL` | Docker compose / Traefik | Email address for Let's Encrypt certificate registration. |\n\nStart the stack:\n\n```sh\ncd docker\ndocker compose -f compose.yaml up -d --build\n```\n\nTraefik uses ports `80` and `443`. Access the hostname set in `SERVER_HOST`;\nthe API is exposed under `/api/v1`.\n\n## Troubleshooting\n\n| Symptom | What to try |\n| --- | --- |\n| Port already in use | Backend defaults to `3000`, frontend to `3001`, docs dev server to `3002`; stop the existing process or change the port. |\n| `eslint: command not found` | Install frontend dependencies with `npm install` or `npm install --legacy-peer-deps`. |\n| npm peer dependency conflict | Use `npm install --legacy-peer-deps`, matching `docs/make_screenshots.sh`. |\n| ND2 upload is rejected | Confirm the file extension is `.nd2` and the filename does not rely on path components. |\n| No contours or poor contours | Check layer mode, `param1`, crop size, and preview frames before annotating. |\n| OpenCV import/runtime errors | Use the project venv and install `backend/requirements.txt`; Docker also installs `libgl1` and `libglib2.0-0`. |\n| SQLite permission errors | Ensure `backend/app/databases/`, `backend/app/extracted_data/`, `backend/app/nd2files/`, and `backend/app/tempdata/` are writable. |\n\n## Tech Stack\n\nBackend:\n\n<p align=\"left\">\n  <a href=\"https://fastapi.tiangolo.com/\" title=\"FastAPI\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/fastapi/fastapi-original.svg\" height=\"32\" alt=\"FastAPI\" />\n  </a>\n  <a href=\"https://www.sqlalchemy.org/\" title=\"SQLAlchemy\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/sqlalchemy/sqlalchemy-original.svg\" height=\"32\" alt=\"SQLAlchemy\" />\n  </a>\n  <a href=\"https://numpy.org/\" title=\"NumPy\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/numpy/numpy-original.svg\" height=\"32\" alt=\"NumPy\" />\n  </a>\n  <a href=\"https://opencv.org/\" title=\"OpenCV\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/opencv/opencv-original.svg\" height=\"32\" alt=\"OpenCV\" />\n  </a>\n  <a href=\"https://matplotlib.org/\" title=\"Matplotlib\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/matplotlib/matplotlib-original.svg\" height=\"32\" alt=\"Matplotlib\" />\n  </a>\n</p>\n\n- FastAPI, Uvicorn, and Pydantic for the API layer\n- SQLAlchemy and SQLite for database access\n- NumPy, OpenCV, Pillow, and Matplotlib for image processing and plotting\n- FastMCP for repository/context tooling\n\nFrontend:\n\n<p align=\"left\">\n  <a href=\"https://react.dev/\" title=\"React\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg\" height=\"32\" alt=\"React\" />\n  </a>\n  <a href=\"https://vitejs.dev/\" title=\"Vite\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vite/vite-original.svg\" height=\"32\" alt=\"Vite\" />\n  </a>\n  <a href=\"https://www.typescriptlang.org/\" title=\"TypeScript\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg\" height=\"32\" alt=\"TypeScript\" />\n  </a>\n  <a href=\"https://chakra-ui.com/\" title=\"Chakra UI\">\n    <img src=\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/chakraui/chakraui-original.svg\" height=\"32\" alt=\"Chakra UI\" />\n  </a>\n</p>\n\n- React + React Router for the UI\n- Vite for dev/build tooling\n- Chakra UI and Framer Motion for styling and motion\n- Docusaurus docs build under `frontend/docs-site`\n\n## Docs\n\n- [Cell Extraction API](backend/app/cellextraction/README.md)\n- [Database Manager API](backend/app/database_manager/README.md)\n- [Bulk Engine API](backend/app/bulk_engine/README.md)\n- [Frontend](frontend/README.md)\n- [Contributing](CONTRIBUTING.md)\n\n## License\n\nPhenoPixel is released under the MIT License. See [LICENSE](LICENSE) for\ndetails. Third-party dependencies remain under their respective licenses.\n","summary":"PhenoPixel is a FastAPI + React web application built for microscopy single-cell workflows centered on Nikon ND2 files. It helps you upload and manage ND2 datasets, extract cell crops and contours, clean and relabel detections, and visually inspect individual cells with fluorescence overlays and replot views. The app also supports batch phenotype analysis by exporting population-level shape and fluorescence descriptors (e.g., length/area summaries, intensity exports, and contour/heatmap-derived data) alongside analysis artifacts for reproducible reporting. It’s best suited for microscopy researchers or lab teams who need an end-to-end, database-backed tool for annotating and quantifying single-cell phenotypes from ND2 imaging.","description":"An OpenCV based image analysis web application (Deployed at Hiroshima University)","stars":279,"language":"TypeScript"},{"owner":"workos","repo":"auth.md","url":"https://github.com/workos/auth.md","readme":"# auth.md\n\nA reference implementation of **agentic registration** — a protocol for agents to authenticate to services on behalf of users. Three roles: an **agent** acting for a user, an **agent provider** that mints identity assertions ([ID-JAGs](https://datatracker.ietf.org/doc/draft-ietf-oauth-identity-assertion-authz-grant/)), and a **service** that accepts those assertions, when available, and issues credentials. If the agent is not associated with a user identity, or the agent provider does not support ID-JAGs, the service uses an OTP-based claim flow to authenticate the agent instead.\n\nThis repo includes sample implementations for both the agent provider and agent service side of agentic registration, and includes a sample [`AUTH.md`](AUTH.md) file, which the agent service would host, instructing agents how to authenticate with the service.\n\n## Layout\n\n```\n.\n├── AUTH.md            ← skill manifest agents read\n├── agent-services/    ← sample resource server + authorization server\n├── agent-providers/   ← sample agent IdP that mints ID-JAGs\n└── shared/            ← shared workspace package (ports, types)\n```\n\n## Where to go next\n\n- **You're an agent or want an auth.md template** → [AUTH.md](AUTH.md) — procedural recipe (discover → register → claim → use → handle revoke).\n- **You're implementing a service** → [agent-services/README.md](agent-services/README.md) — full implementation guide, sequence diagrams, error tables.\n- **You're implementing an IdP** → [agent-providers/README.md](agent-providers/README.md) — minting ID-JAGs, publishing JWKS, sending revocation events.\n\n## Quickstart\n\n```sh\npnpm install\npnpm dev\n```\n\nService at <http://localhost:8000>, provider at <http://localhost:4000>. The service home page walks the three registration flows interactively. Use `pnpm dev:service` or `pnpm dev:provider` to run one side at a time.\n\n## System Flows\n\nThree registration flows share the `/agent/auth` endpoint. Pick the one that matches what the agent has on hand.\n\n### Discovery\n\nHosted at `/.well-known/oauth-authorization-server`:\n\n```json\n{\n  \"resource\": \"https://api.service.example.com/\",\n  \"authorization_servers\": [\"https://auth.service.example.com/\"],\n  \"scopes_supported\": [\"api.read\", \"api.write\"],\n  \"bearer_methods_supported\": [\"header\"],\n  \"agent_auth\": {\n    \"skill\": \"https://service.example.com/auth.md\",\n    \"register_uri\": \"https://auth.service.example.com/agent/auth\",\n    \"claim_uri\": \"https://auth.service.example.com/agent/auth/claim\",\n    \"revocation_uri\": \"https://auth.service.example.com/agent/auth/revoke\",\n    \"identity_types_supported\": [\"anonymous\", \"identity_assertion\"],\n    \"anonymous\": {\n      \"credential_types_supported\": [\"api_key\"]\n    },\n    \"identity_assertion\": {\n      \"assertion_types_supported\": [\n        \"urn:ietf:params:oauth:token-type:id-jag\",\n        \"verified_email\"\n      ],\n      \"credential_types_supported\": [\"access_token\", \"api_key\"]\n    },\n    \"events_supported\": [\n      \"https://schemas.workos.com/events/agent/auth/identity/assertion/revoked\"\n    ]\n  }\n}\n```\n\n### Identity Assertion (ID-JAG)\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Agent\n    participant Provider as Agent Provider\n    participant Service\n\n    Agent->>Service: GET /api/resource\n    Service-->>Agent: 401 Unauthorized<br/>WWW-Authenticate: Bearer resource_metadata=\"...\"\n\n    Agent->>Service: GET /.well-known/oauth-protected-resource\n    Service-->>Agent: 200 OK (PRM with authorization_servers)\n    Agent->>Service: GET /.well-known/oauth-authorization-server\n    Service-->>Agent: 200 OK (AS metadata with agent_auth block)\n\n    Agent->>User: Consent to assert identity to audience?\n    User-->>Agent: Consent granted\n\n    Agent->>Provider: Request audience-specific ID-JAG\n    Provider-->>Agent: 200 OK (ID-JAG)\n\n    Agent->>Service: POST /agent/auth<br/>{ type: identity_assertion, assertion: ID-JAG }\n    Service->>Provider: GET /.well-known/jwks.json\n    Provider-->>Service: 200 OK (JSON Web Key Set)\n    Service->>Service: Verify signature + claims, match user\n    Service-->>Agent: 200 OK (credentials)\n```\n\n### Verified-Email Identity Assertion\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Agent\n    participant Service\n\n    Agent->>Service: POST /agent/auth<br/>{ type: identity_assertion, assertion_type: verified_email, assertion: email }\n    Service->>User: Send claim-view email (one-time URL)\n    Service-->>Agent: 200 OK (claim_token, no credential)\n    User->>Service: GET /agent/auth/claim/view?token=...\n    Service-->>User: 6-digit OTP page\n    User-->>Agent: Reads OTP back\n    Agent->>Service: POST /agent/auth/claim/complete<br/>{ claim_token, otp }\n    Service-->>Agent: 200 OK (credential)\n```\n\n### Anonymous Registration with OTP Claim\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Agent\n    participant Service\n\n    Agent->>Service: POST /agent/auth<br/>{ type: anonymous, requested_credential_type: api_key }\n    Service->>Service: Create agent principal, scoped API key, claim record\n    Service-->>Agent: 200 OK (api_key, claim_token)\n\n    Note over Agent: Agent operates with pre-claim scopes\n\n    User-->>Agent: Wants to take ownership\n    Agent->>Service: POST /agent/auth/claim<br/>{ claim_token, email }\n    Service->>User: Send claim-view email (one-time URL)\n    User->>Service: GET /agent/auth/claim/view?token=...\n    Service-->>User: 6-digit OTP page\n    User-->>Agent: Reads OTP back\n    Agent->>Service: POST /agent/auth/claim/complete<br/>{ claim_token, otp }\n    Service->>Service: Swap API key perms (pre-claim → post-claim)\n    Service-->>Agent: 200 OK { status: claimed }\n```\n","summary":"This project provides a reference implementation of “agentic registration,” a protocol that lets AI agents authenticate to services on behalf of users. It supports three interacting roles—agents, agent providers that mint identity assertions (ID-JAGs), and services that accept those assertions or fall back to an OTP-based claim flow when needed. The repo includes sample implementations for both the agent provider and agent service sides, plus an example AUTH.md file that services host to instruct agents on how to register and authenticate. It’s best suited for developers building agent-based authentication systems, especially teams implementing OAuth-style flows with identity assertion and revocation handling.","description":"An open protocol that lets agents register for services on behalf of users — discoverable through a Markdown file at your domain.","stars":250,"language":"TypeScript"},{"owner":"unprovable","repo":"ShadowCat","url":"https://github.com/unprovable/ShadowCat","readme":"[![tests](https://github.com/unprovable/ShadowCat/actions/workflows/tests.yml/badge.svg)](https://github.com/unprovable/ShadowCat/actions/workflows/tests.yml) \n\n# ShadowCat\n\nA fully offline, single-file HTML page for moving data between two devices via QR codes — intended for old phones whose radios (BLE, NFC, etc.) are dead but whose cameras and browsers still work.\n\nClick here to use it: https://shadowcat.online/\n\n## Tabs\n\n- **Generate** — encode text into a single QR code.\n- **Scan** — decode a single QR via the camera.\n- **Send file** — pick a file, choose chunk size / FPS / ECC, optionally **Compress (gzip)**, hit Start. Compression auto-falls-back when the gzipped payload isn't smaller (e.g. for PDF/JPG/MP4). Cycles through `[header, chunk1…chunkN]` forever at the chosen FPS. Pause / Resume / Stop.\n- **Start from** — begin the loop at a chosen frame index; it then continues forward and wraps back to the header normally.\n- **Show frame** + **Show** / **−** / **+** — display exactly one frame static, for resending a specific missing chunk. The number matches the chunk index shown in the receiver's missing-chunks grid (0 = header).\n- **Receive file** — start the camera and point at the sender. Header autodetects, progress bar fills in, missing-chunks grid shows which ones haven't arrived yet. When complete, the file's CRC is verified and a Download button appears.\n\n## Protocol\n\n- Header: `QRX1|H|<total>|<flags>|<filename>|<sizeBytes>|<crc32hex>`\n- Data: `QRX1|D|<idx>|<base64chunk>` (1-indexed)\n- `<flags>` is a comma-separated list, empty by default. Defined flags: `gz` = payload is gzipped.\n- `<sizeBytes>` is the on-wire size (gzipped when `gz` is set); `<crc32hex>` is always over the original bytes.\n- Base64 alphabet has no `|`, so parsing is just `split('|')`.\n- Receiver tracks chunks by index, ignores duplicates, dedupes header by CRC. Unknown flags are refused.\n\nSee [SPEC.md](SPEC.md) for the full wire format, frame diagrams, and\ninvariants. A reference encoder and decoder live in [`tools/`](tools/):\n\n```\npip install qrcode[pil] pyzbar pillow opencv-python\npython tools/qrx1_encode.py myfile.bin --out frames/\npython tools/qrx1_encode.py myfile.bin --gzip --out frames/   # gzip the payload\npython tools/qrx1_decode.py frames/ -o out/\n```\n\n## Tests\n\nBoth sides assert against a shared golden fixture (known input bytes → known\nCRC and header). If the JS or Python implementation drifts from the spec,\nits tests break.\n\n```\n# Python — pytest, zero deps; the optional QR-image roundtrip is skipped\n# unless qrcode/pyzbar/PIL are installed.\npython -m pytest tests/test_qrx1.py\n\n# HTML — Node's built-in runner; extracts protocol helpers straight out of\n# shadowcat.html and exercises them in a vm. No npm install needed.\nnode --test tests/test_shadowcat.mjs\n```\n\n## Practical notes for old phones\n\n- Camera needs HTTPS or localhost — `file://` won't grant `getUserMedia` permission. Serve with `python3 -m http.server 8000` and visit `http://<your-laptop-ip>:8000/qrcode.html` over the local network. iOS Safari additionally requires HTTPS for cross-device access — for a LAN setup, `caddy` or a self-signed cert helps.\n- If render fails on a frame (\"code length overflow\"), drop chunk size or drop ECC level.\n- 500 chars × 3 fps ≈ 1.1 KB/s base64 ≈ 0.83 KB/s raw. A 100 KB file is roughly 2 minutes per loop; receiver typically needs 1-2 loops.\n- If old devices struggle to decode: lower FPS, raise ECC to Q, shrink chunk to ~300 chars — produces smaller, less dense QRs.\n\n## Related\n\nDoing data transfer with QR Codes is a well trodden idea. Here are some references of other projects that may be useful for erudition or expansion:\n\n* IP-Over-QR Codes - https://hackaday.com/2016/11/22/ip-over-qr-codes/ \n","summary":"ShadowCat is a fully offline, single-file HTML app that moves small to medium amounts of data between two devices using QR codes, designed for scenarios where radios like BLE or NFC are unavailable but cameras and browsers still work. It supports generating and scanning single QR codes, as well as sending and receiving files by chunking them into repeated QR frames with optional gzip compression, pause/resume/stop controls, and CRC32-based integrity verification. On the receiving side, it auto-detects the header, shows progress and missing chunks, and offers a download when all chunks are verified. This project is especially useful for maintaining data transfer workflows on older phones and offline/air-gapped environments where network connectivity or wireless features are unreliable.","description":"Single file optical file transfer using a browser","stars":322,"language":"HTML"},{"owner":"jake-stewart","repo":"tuie","url":"https://github.com/jake-stewart/tuie","readme":"# tuie\n\nA rich, performant TUI library for Rust.\n\nhttps://github.com/user-attachments/assets/ec1d8d8d-e476-4b78-8404-dd234d5a2ec7\n\n### Features\n\n- **Layout:** Flexbox, grids, splits, and virtualized lists, all with min, max, and preferred-size constraints.\n- **Images:** Kitty with sixel and half-block fallbacks, all working over SSH and tmux passthrough.\n- **Input:** Iterator-based extensible text input with vi, emacs, modern, and custom bindings.\n- **Harmonious:** Generated 256-color palette, consistent with user's base16 theme, zero config.\n- **Chords:** Construct and match on human readable inputs: `chord!(Ctrl + Arrow(Up | Down))`\n- **Async:** Timers and async callbacks with support for any async runtime.\n- **Performance:** Per subtree/widget/cell dirty tracking, batched queries, shared memory graphics, packed structs.\n- **GUI:** Optionally run as a GUI with box-drawing, smooth scrolling.\n\n## Getting started\n\nInstall:\n\n```sh\ncargo add tuie --features=harmonious\n```\n\nWrite your main:\n\n```rust\nuse tuie::prelude::*;\nuse std::process::ExitCode;\n\nfn main() -> std::io::Result<ExitCode> {\n    let root = Pane::new()\n        .border(Border::SINGLE)\n        .child(Text::new().content(\"hello world\"));\n    tuie::start_tui(root)\n}\n```\n\nRun:\n\n```sh\ncargo run\n```\n\n### Constructing widgets\n\nChain builders to create a simple widget tree:\n\n```rust\nfn greeting(name: String) -> Box<Pane> {\n    Pane::new()\n        .border(Border::SINGLE)\n        .child(Text::new().content(format!(\"hello {name}\")))\n}\n```\n\nOr compose widgets together for something more complicated:\n\n```rust\nstruct Greeting {\n    root: Box<Pane>,\n    text_id: WidgetId<Text>,\n}\n\nimpl Greeting {\n    fn new(name: &str) -> Box<Self> {\n        let mut text_id = WidgetId::EMPTY;\n        let root = Pane::new().border(Border::SINGLE).child(\n            Text::new().content(format!(\"hello {name}\")).id(&mut text_id)\n        );\n        Box::new(Self { root, text_id })\n    }\n\n    fn set_name(&mut self, name: &str) {\n        if let Some(text) = self.root.get_widget_mut(self.text_id) {\n            text.set_content(format!(\"hello {name}\"));\n        }\n    }\n}\n\nimpl DelegateWidget for Greeting {\n    tuie::delegate_widget!(root);\n\n    fn override_on_input(&mut self, queue: &mut InputQueue) -> InputResult {\n        // you can override or react to your root widget's events and methods\n        // using after_* and override_*.\n        return self.root.on_input(queue);\n    }\n}\n```\n\nYou can also `impl Widget` yourself, which is how all of the default widgets are implemented.\n\n## Examples\n\n- [`tuie-demo`](https://github.com/jake-stewart/tuie-demo): discoverable, interactive reference covering most widgets and features.\n- [`fz`](https://github.com/jake-stewart/fz): fuzzy finder built on tuie, a real-world example of a non-trivial application.\n\n## Feature flags\n\n- `harmonious` — enables Lab-space palette generation from the terminal's base16 colors.\n- `images` — enables the `Image` widget and `ImageConfig`/`ImageProtocol`/`ImageSource` types; pulls in the `image` crate.\n- `gui` — enables `start_gui` and the `gui` module; pulls in `winit`, `wgpu`, `pollster`, `fontdb`, and `freetype-rs` (plus `objc2` on macOS). Implies `harmonious`.\n\n","summary":"tuie is a rich, high-performance TUI (terminal user interface) library for Rust that helps you build interactive, styled widget-based applications. It provides layout primitives like flexbox, grids, splits, and virtualized lists with size constraints, plus input handling with extensible iterator-based text input and configurable key bindings (including vi/emacs-like modes). It also includes advanced capabilities such as image rendering via Kitty/Kitty-sixel with SSH/tmux-friendly fallbacks, async timers/callbacks, themed color palette generation aligned to base16 themes, and efficient rendering through dirty tracking and batched updates. This project is a good fit for Rust developers who want to create polished terminal apps like dashboards, dashboards with rich media, or full-screen interactive tools, especially when performance and customization matter.","description":"A rich, performant TUI library for Rust.","stars":177,"language":"Rust"},{"owner":"OpenBMB","repo":"PilotDeck","url":"https://github.com/OpenBMB/PilotDeck","readme":"<p align=\"center\">\n  <img src=\"assets/banner.png\" alt=\"PilotDeck\" width=\"680\"/>\n</p>\n\n<p align=\"center\">\n  Task-oriented AI Agent productivity platform — redefining operational boundaries and memory evolution, one WorkSpace at a time.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://pilotdeck.openbmb.cn\"><img src=\"https://img.shields.io/badge/Website-pilotdeck.openbmb.cn-FF6B35?style=flat-square&logo=googlechrome&logoColor=white\" alt=\"Official Website\"/></a>\n  <a href=\"https://pilotdeck.openbmb.cn/pilotdeck.github.io/demo/p/pilotdeck-demo\"><img src=\"https://img.shields.io/badge/Demo-Live-brightgreen?style=flat-square\" alt=\"Live Demo\"/></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-AGPL_3.0-blue.svg?style=flat-square\" alt=\"License\"/></a>\n  <a href=\"https://modelcontextprotocol.io/\"><img src=\"https://img.shields.io/badge/MCP-Native-6366F1?style=flat-square\" alt=\"MCP Native\"/></a>\n  <a href=\"https://github.com/OpenBMB/PilotDeck/stargazers\"><img src=\"https://img.shields.io/github/stars/OpenBMB/PilotDeck?style=flat-square\" alt=\"Stars\"/></a>\n  <br/>\n  <a href=\"#-community\"><img src=\"https://img.shields.io/badge/Discord-Join_Community-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Discord\"/></a>\n  &nbsp;\n  <a href=\"#-community\"><img src=\"https://img.shields.io/badge/Feishu-Community-00D6B9?style=for-the-badge&logo=bytedance&logoColor=white\" alt=\"Feishu\"/></a>\n  &nbsp;\n  <a href=\"#-community\"><img src=\"https://img.shields.io/badge/WeChat-Community-07C160?style=for-the-badge&logo=wechat&logoColor=white\" alt=\"WeChat\"/></a>\n  <br/>\n</p>\n\n<p align=\"center\">\n  <b>English</b> | <a href=\"./README.zh.md\">简体中文</a>\n  <br/>\n  <a href=\"https://pilotdeck.openbmb.cn\">Website</a> · <a href=\"https://pilotdeck.openbmb.cn/pilotdeck.github.io/demo/p/pilotdeck-demo\">Live Demo</a> · <a href=\"https://pilotdeck.openbmb.cn/pilotdeck.github.io/docs/en/introduction\">Tutorial</a> · <a href=\"#-installation--quick-start\">Quick Start</a> · <a href=\"#-key-highlights\">Highlights</a> · <a href=\"#use-cases\">Use Cases</a> · <a href=\"#-community\">Community</a>\n</p>\n\n---\n\n**News** 🔥\n\n- **[2026.05.28]** PilotDeck is now open source! Visit our official website at [pilotdeck.openbmb.cn](https://pilotdeck.openbmb.cn). We welcome contributions, feedback, and stars from the community.\n\n---\n\n## 💡 About PilotDeck\n\n**PilotDeck** is an open-source agent operating system designed around the concept of \"WorkSpace\". It is jointly developed and open-sourced by Tsinghua University [THUNLP](https://nlp.csai.tsinghua.edu.cn/), [ModelBest](https://modelbest.cn/), [OpenBMB](https://www.openbmb.cn/), and [AI9Stars](https://github.com/AI9Stars). Targeting general-purpose, multi-task scenarios, PilotDeck is built to be a true *productivity tool* for the Agent era.\n\nA wave of excellent AI Agent harnesses has emerged in recent years, each with its own focus: **Claude Code / Cursor / Trae Solo** brought model reasoning deep into the programming IDE; **Claude Cowork** introduced the notion of project-level isolation to desktop-side knowledge work; **WorkBuddy** connected agents to IM ecosystems such as WeCom and Feishu so AI is one message away.\n\nWhen we shift the lens from \"one-shot programming\" or \"immediate Q&A\" to **long-running, multi-project productivity work**, however, several questions remain open:\n\n- When many projects run in parallel, can memory be **white-box and traceable**? When the AI gets something wrong, can you pinpoint which memory entry caused it and edit it directly — without starting a new chat from scratch?\n- Can token cost be **tracked per task**, so that running agents in the background actually becomes economically viable?\n- Can tasks of different difficulty **automatically be matched to different models**, instead of burning the flagship model on trivial calls?\n- When you step away from the keyboard, can the work keep moving? Can the agent **proactively discover what's worth doing, report progress, and land results as files on disk**?\n\nPilotDeck is an incremental exploration around exactly these questions. It uses the WorkSpace as the fundamental unit — completely isolating files, memory and skills per project — and pairs it with three pillar capabilities: **White-box Memory**, **Smart Routing** and **Always-on**. The entire system natively supports the [Model Context Protocol (MCP)](https://modelcontextprotocol.io/) and behaves consistently across front-ends (Web / CLI / IM).\n\n### ✨ Key Highlights\n\n<table width=\"100%\">\n<tr>\n<td width=\"50%\" valign=\"top\">\n\n**WorkSpace-Level Isolation & Accretion**\n\nEvery project gets its own file system, memory store and skill set. Parallel work no longer interferes with itself, retrieval has a bounded scope, and skills accrete naturally as each task grows — no more global context pollution.\n\n<p align=\"center\">\n  <img src=\"assets/workspace_en.gif\" width=\"100%\" alt=\"WorkSpace isolation demo\"/>\n</p>\n\n</td>\n<td width=\"50%\" valign=\"top\">\n\n**Traceable White-box Memory**\n\nMemory generation, extraction, storage and retrieval are visible end-to-end. When the AI mis-remembers, you can pinpoint and fix the offending entry. Built-in **Dream Mode** consolidates memory in idle windows, and supports one-click rollback.\n\n<p align=\"center\">\n  <img src=\"assets/memory_en.gif\" width=\"100%\" alt=\"White-box memory demo\"/>\n</p>\n\n</td>\n</tr>\n<tr>\n<td width=\"50%\" valign=\"top\">\n\n**Smart Routing & Cost Optimization**\n\nTask difficulty is auto-detected; complex calls go to flagship models (e.g. Claude 3.5 Sonnet / GPT-4o), simple ones drop to lighter models. Through on-device / cloud co-orchestration and precise matching, token spend shrinks dramatically without sacrificing quality.\n\n<p align=\"center\">\n  <img src=\"assets/router.gif\" width=\"100%\" alt=\"Smart routing demo\"/>\n</p>\n\n</td>\n<td width=\"50%\" valign=\"top\">\n\n**Always-on Background Execution**\n\nPilotDeck breaks the \"you ask, it answers\" loop: after you sign off, the agent keeps discovering candidate tasks, running long-horizon monitors, and finally lands deliverables as local files with a summary report waiting for you.\n\n<p align=\"center\">\n  <img src=\"assets/awo_en.gif\" width=\"100%\" alt=\"Always-on execution demo\"/>\n</p>\n\n</td>\n</tr>\n</table>\n\n### 📊 Real-world Numbers\n\nThe three pillar capabilities have shown clear advantages in production-grade workflows:\n\n#### 1. Smart Routing — ~70% cost savings on social-media workloads\n\nIn Xiaohongshu-style social-media operations, enabling Smart Routing automatically demotes simple polishing / layout tasks to a sub-agent (e.g. Sonnet 4.5) and only invokes Opus 4.5 at planning checkpoints:\n\n<table width=\"100%\">\n<tr>\n<th width=\"22%\" align=\"left\">Setup</th>\n<th width=\"48%\" align=\"le
