sured action or property\n- event or item\n- exactness\n\nIt excludes numbers that are merely nearby or topically related.\n\nExample:\n\n```text\nUser helped organize a concert, which raised over $5,000.\n```\n\nThe amount belongs to the concert, not automatically to the user. It is also a lower-bound value, not an exact addend.\n\nFor exact totals, Quarq sums only exact unqualified values unless the user explicitly asks for a minimum, estimate, or range.\n\n## Self-Correcting Retrieval\n\nIf the first retrieval pass does not contain enough evidence, Quarq can emit:\n\n```json\n{\n  \"agent_response\": \"\",\n  \"flags\": [\"REQUIRED_DATA\"],\n  \"hyde_queries\": [\"aunt meetup\", \"received chandelier\", \"chandelier handoff\"]\n}\n```\n\nThe runtime then performs a targeted fallback search and regenerates the answer with expanded context.\n\nThe fallback pass has a strict final verification rule: if the exact target is still missing, the agent must say the information is not available instead of guessing.\n\nThis makes the agent aggressive about recall but conservative about truth.\n\n## Learning Pipeline\n\nAfter every non-benchmark response, Quarq starts background learning.\n\nThe learning model extracts:\n\n- semantic memories\n- episodic memories\n- procedural rules\n\nIt can issue:\n\n```json\n{\n  \"actions\": [\n    {\"action\": \"ADD\", \"content\": \"New memory\"},\n    {\"action\": \"UPDATE\", \"id\": \"uuid\", \"content\": \"Updated memory\"},\n    {\"action\": \"DELETE\", \"id\": \"uuid\"}\n  ]\n}\n```\n\nImportant learning behaviors:\n\n- preserves specific names and proper nouns\n- resolves relative dates using the current date\n- anchors transfer and acquisition events\n- preserves every number and qualifier\n- avoids duplicate memories across semantic and episodic layers\n- prefers exact values over approximate or bounded restatements\n- updates existing records instead of creating conflicting duplicates\n\nBackground learning is protected by:\n\n- persistent retry loop\n- exponential backoff\n- concurrency limit of 4 learning tasks\n- benchmark synchronization before final questions\n\n## Tool System\n\nQuarq includes a progressive skill router.\n\nInstead of injecting all tool instructions into every prompt, the router sees a compact catalog and selects only the relevant skills. The generation model then receives the full markdown and bound tools for those selected skills.\n\nCurrent included skills:\n\n- email\n- calendar\n- PDF generation\n- agent identity management\n\nTool execution uses a ReAct loop with a maximum of 5 iterations. If the loop reaches the limit, the model is forced to stop calling tools and produce a final text response.\n\n### Adding A New Tool\n\nTool expansion is deliberately simple. To add a new capability, drop a new folder inside `tools/` and follow the existing skill convention.\n\n```text\ntools/\n  your_tool/\n    skill.md\n    __init__.py\n    tools.py\n```\n\n`skill.md` defines the router-facing metadata:\n\n```markdown\n---\nname: your_tool\ndescription: One-line description of what this skill can do.\ntriggers: keyword one, keyword two, natural language trigger\n---\n\n# Your Tool Skill\n\nDescribe when to use it, when not to use it, available tools, and operating rules.\n```\n\n`tools.py` defines LangChain tool callables, and `__init__.py` exports them using the folder-name convention:\n\n```python\nfrom .tools import your_first_tool, your_second_tool\n\nYOUR_TOOL_TOOLS = [your_first_tool, your_second_tool]\n```\n\nThat is it. `tools/__init__.py` automatically scans every subdirectory with a `skill.md`, imports the package, reads the frontmatter, and registers the exported `<FOLDER_NAME>_TOOLS` list. No central registry edit is required.\n\nThis gives Quarq a clean capability expansion path: add a folder, describe the skill, export the tools, restart the process, and the agent can route to the new capability.\n\n## Benchmarks\n\nQuarq includes a LongMemEval runner:\n\n```bash\npython run_dataset_evals.py\n```\n\nThe benchmark pipeline:\n\n1. Loads `eval_datasets/longmemeval_s_cleaned.json`\n2. Splits haystack sessions into chunks\n3. Feeds each chunk through the agent with learning enabled\n4. Waits for background memories before final questions\n5. Asks the benchmark question with learning disabled\n6. Judges with a binary evaluator\n7. Writes results to `reports/longmemeval_results.json`\n\n### Parallel Evaluation\n\nFor faster local benchmark runs, Quarq also includes a process-based parallel evaluator:\n\n```bash\nEVAL_WORKERS=2 python run_dataset_evals_parallel.py\n```\n\nThe parallel runner is designed for long benchmark runs where you do not want to lose completed progress. It first loads all completed question IDs from:\n\n```text\nreports/longmemeval_results.json\nreports/longmemeval_results.worker*.json\n```\n\nThen it calculates the remaining questions, splits only those questions across the requested number of workers, and launches one isolated process per worker.\n\nEach worker receives its own `AGENT_ID`:\n\n```text\n<AGENT_ID>_eval_worker_0\n<AGENT_ID>_eval_worker_1\n<AGENT_ID>_eval_worker_2\n```\n\nThat means each worker gets an isolated FAISS memory folder under `local_memory/`, so multiple questions can be learned and evaluated at the same time without memory collision.\n\nWorker outputs are written independently:\n\n```text\nreports/longmemeval_results.worker0.json\nreports/longmemeval_results.worker1.json\nreports/longmemeval_results.worker2.json\n```\n\nWhen all workers finish, the runner merges worker outputs back into:\n\n```text\nreports/longmemeval_results.json\n```\n\nChoose `EVAL_WORKERS` based on the machine and API limits. A good starting point is the number of performance cores you are comfortable dedicating to the run, then increase until OpenAI rate limits or local CPU pressure become the bottleneck. On an 8-core machine, `2` to `4` workers is usually a practical starting range; on larger machines, scale upward gradually.\n\nTo monitor live results across both the main and worker result files:\n\n```bash\npython monitor_results.py\n```\n\nCurrent checked local report:\n\n```text\nLongMemEval-S checkpoint: 240 yes / 1 no\nAccuracy: 99.59%\nStatus: 500-question run in progress\n```\n\nThese results are local and in progress until independently reproduced from a clean checkout.\n\n## Requirements\n\n- Python 3.11 or higher\n- An [OpenAI API key](https://platform.openai.com/api-keys)\n\n## Quick Start\n\nCreate a virtual environment:\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate   # Windows: .venv\\Scripts\\activate\n```\n\nInstall dependencies:\n\n```bash\npip install -r requirements.txt\n```\n\nCreate `.env`:\n\n```bash\nOPENAI_API_KEY=your_api_key\nUSER_ID=local_user\nAGENT_ID=local_agent\nLOCAL_MEMORY_ROOT=local_memory\n```\n\nRun the terminal agent:\n\n```bash\npython agent.py\n```\n\nRun the API server:\n\n```bash\nuvicorn main:app --reload\n```\n\nCall the API:\n\n```bash\ncurl -X POST http://127.0.0.1:8000/api/chat \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"prompt\": \"What do you remember about me?\", \"channel_type\": \"web\"}'\n```\n\n## Environment Variables\n\n| Variable | Required | Description |\n|---|---:|---|\n| `OPENAI_API_KEY` | yes | Used for generation, retrieval planning, learning, and embeddings. |\n| `AGENT_ID` | no | Selects the local memory namespace. Defaults to `local_agent`. |\n| `USER_ID` | API only | Required by `main.py` for the FastAPI worker. |\n| `LOCAL_MEMORY_ROOT` | no | Root folder for local memory. Defaults to `local_memory`. |\n| `AGENT_NAME` | no | Runtime persona name. |\n| `AGENT_PERSONALITY` | no | Runtime tone/personality. |\n| `AGENT_USE_CASES` | no | Comma-separated use-case description. |\n| `AGENT_CUSTOM_PROMPT` | no | Extra custom behavior instructions. |\n\n## Repository Map\n\n```text\nagent.py                  Core LangGraph agent, memory, retrieval, generation, learning\nagent_connector.py        Public async integration gateway\nmain.py                   FastAPI single-tenant worker\nrun_dataset_evals.py      LongMemEval evaluation runner\nrun_dataset_evals_parallel.py\n                          Parallel LongMemEval evaluation runner\nmonitor_results.py        Benchmark monitoring helper\ntools/                    Skill registry and tool implementations\neval_datasets/            Cleaned LongMemEval dataset\nreports/                  Evaluation outputs and checkpoints\nlocal_memory/             Local FAISS and JSON memory stores\n```\n\n## Design Principles\n\nQuarq is built around a few hard rules:\n\n- Retrieve broadly, reason narrowly.\n- Store memories with ownership, dates, and qualifiers intact.\n- Prefer saying \"missing data\" over inventing an answer.\n- Treat temporal and numeric claims as evidence-bound operations.\n- Keep user-facing latency low by learning in the background.\n- Keep the context window clean with routing and progressive disclosure.\n- Make the memory system portable, local, and easy to inspect.\n\n## Status\n\nQuarq Agent v0.4.0 is an active OSS release candidate.\n\nThe current version is optimized for long-memory evaluation and single-user local memory. The next natural steps are:\n\n- package cleanup\n- dependency trimming\n- unit tests for memory storage and retrieval\n- reproducible benchmark scripts\n- Docker packaging\n- memory compaction and archival policies\n- multi-user serving with isolated local stores\n\n## License\n\nApache License 2.0. See [LICENSE](LICENSE) for details.\n","summary":"Quarq Agent is a memory-first AI agent designed for long-context personal intelligence with a focus on durable local memory, grounded recall, and disciplined reasoning rather than stateless chat. It combines local FAISS-backed semantic/episodic retrieval with hybrid vector-plus-keyword search, HyDE-style query expansion, strict temporal grounding, and quantitative fidelity (numeric attribution and exact aggregation rules) with a self-correcting second-pass retrieval when evidence is incomplete. It also supports background memory consolidation and LangGraph-based orchestration, making it suitable for applications that need inspectable, benchmark-oriented long-term memory. Developers building inspectable “memory agents” and researchers testing long-memory recall quality would benefit most from using it.","description":"A recursive evidence-gated cognitive runtime for memory-native AI agents, combining hybrid retrieval, temporal reasoning, async learning, and plug-and-play tools.","stars":183,"language":"Python"},{"owner":"tensor2023","repo":"OpenPixel-RPG","url":"https://github.com/tensor2023/OpenPixel-RPG","readme":"<p align=\"center\">\n  <h1 align=\"center\">OpenPixel-RPG</h1>\n  <p align=\"center\"><strong>AI-powered pixel-art open-world JRPG — turn any place on Earth into a playable pixel world.</strong></p>\n</p>\n\n<p align=\"center\">\n  <a href=\"./GeoPixel/LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-yellow.svg\" alt=\"License: MIT\"></a>\n  <img src=\"https://img.shields.io/badge/Node.js-18%2B-339933?logo=node.js&logoColor=white\" alt=\"Node.js 18+\">\n  <img src=\"https://img.shields.io/badge/TypeScript-5.x-3178C6?logo=typescript&logoColor=white\" alt=\"TypeScript\">\n  <img src=\"https://img.shields.io/badge/React-19-61DAFB?logo=react&logoColor=white\" alt=\"React 19\">\n  <img src=\"https://img.shields.io/badge/Gemini-2.5%20%7C%203.1-4285F4?logo=google&logoColor=white\" alt=\"Gemini 2.5 / 3.1\">\n  <img src=\"https://img.shields.io/badge/Baidu%20Maps-API-2932E1?logo=baidu&logoColor=white\" alt=\"Baidu Maps API\">\n  <img src=\"https://img.shields.io/badge/Status-Alpha-orange\" alt=\"Alpha\">\n</p>\n\n---\n\n## Overview\n\nTurn any place on Earth into an interactive pixel-art JRPG.\n\n**OpenPixel-RPG** is an AI-powered pixel-art open-world UGC game. Input any location name, or upload your own photo, describe the art style you want, and OpenPixel-RPG generates a complete interactive pixel map with local NPCs. Under the hood, Google Gemini models handle everything: world design (`gemini-2.5-pro`), map & sprite generation (`gemini-3.1-flash-image`), vision quality review (`gemini-3.1-pro`), and runtime character simulation (`gemini-2.5-flash`). Every NPC runs on a custom agent simulation system — no LangGraph or LangChain, just a hand-built perceive-decide-act loop where characters perceive their surroundings, make decisions via LLM, form memories, and produce emergent narratives no one scripted. You can also play \"god\" at any time: inject events, edit character memories or traits, and watch the world shift in response.\n\nBorn from [isometric.nyc](https://isometric.nyc), this project replaces the NYC-specific data pipeline with globally available OSM Overpass + satellite + Google 3D Tiles, uses Baidu Maps for street-level scene reference, and deeply integrates [WorldX](https://github.com/YGYOOO/WorldX)'s AI world engine.\n\n![Game Tutorial](video/教程.png)\n\n> Game tutorial here\n\n---\n\n## Three Modes\n\n### Mode 1 — Upload & Play\n\nUpload your own photo, and OpenPixel-RPG turns it into a pixel-art JRPG world.\n\n![Mode 1 Demo](video/mode1_demo.gif)\n\n> [Watch full video](https://tensor2023.github.io/xueqinggao.github.io/video/mode1_demo.mp4)\n\n**How it works:**\n1. Select a local image from your device.\n2. The 3D View shows your image — set a **Pixel Style** prompt, then click **Generate Pixel Map**.\n3. Once the pixel map loads, click **Generate GeoPixel Game** and wait.\n4. Click **Enter World** (or the browser loads it automatically) to start playing.\n\n### Mode 2 — NYC Landmark Exploration\n\nEnter a Manhattan landmark name, and OpenPixel-RPG fetches pre-generated pixel tiles from [isometric.nyc](https://isometric.nyc) to build an interactive map.\n\n![Mode 2 Demo](video/demo.gif)\n\n> [Watch full video](https://tensor2023.github.io/xueqinggao.github.io/video/Demo2.mp4)\n\n**How it works:**\n1. Click **City Map**, then input a location (e.g. Times Square, Central Park, Empire State Building, Brooklyn Bridge, and many more).\n2. Wait for the tile to load.\n3. Select **Fast Mode** (bottom-right), then click **Generate GeoPixel Game**.\n4. Once loaded, click **Enter World**.\n\n### Mode 3 — Anywhere on Earth\n\nInput any address on Earth, and OpenPixel-RPG generates an interactive pixel map using OSM whitebox + satellite imagery + AI style transfer.\n\n![Mode 3 Demo](video/mode3_demo.gif)\n\n> [Watch full video](https://tensor2023.github.io/xueqinggao.github.io/video/mode3_demo.mp4)\n\n**How it works:**\n1. Input an address and click **Load Map**.\n2. The 3D View loads a satellite image. Drag to fine-tune the area. Set a **Pixel Style** prompt.\n3. Click **Generate Global Map** — the backend runs a three-step pipeline:\n   - **Step 1 — OSM Whitebox**: Queries the OpenStreetMap Overpass API for all building footprints with height/levels data. Renders an isometric PNG showing building roof faces (light grey) and walls (shaded by orientation). Contains only building geometry — no roads, water, or labels. Serves as the geometric blueprint.\n   - **Step 2 — 3D Tiles Render**: Captures a Google 3D Tiles isometric screenshot for real-world color/texture reference.\n   - **Step 3 — AI Pixel Map**: Feeds the whitebox (geometry), 3D Tiles render (color), and style prompt to Gemini (`gemini-3.1-flash-image-preview`), which generates a pixel-art map respecting the building layout of the whitebox and the color palette of the real-world view.\n4. Click **Generate WorldX Game** to build the playable world with NPCs.\n5. Click **Enter World** (or it loads automatically) to start playing.\n\n| Mode | Description | Status |\n|------|-------------|--------|\n| **Mode 1** — Upload & Play | Upload a photo → AI generates pixel map → playable JRPG world. | Done |\n| **Mode 2** — NYC Exploration | Input an NYC landmark → fetch isometric.nyc pixel tile → GeoPixel pipeline. | Done |\n| **Mode 3** — Anywhere on Earth | Input any global address → OSM whitebox + satellite + Google 3D Tiles → AI pixel map → playable world. | Done |\n\n---\n\n## Getting Started (port 5173)\n\n```bash\n# 1. Enter the G_gen_pixel directory\ncd G_gen_pixel\n\n# 2. Install frontend dependencies\nnpm install\n\n# 3. Install Python dependencies\npip install -r requirements.txt\n\n# 4. Configure API keys\ncp .env.example .env\n# Edit .env with your Google Maps, Gemini, and DashScope API keys\n\n# 5. Start all services\n# Terminal 1: Vite frontend (port 5173)\nnpm run dev\n\n# Terminal 2: Main backend (port 5001)\npython server.py\n\n# Terminal 3: Global map backend (port 5002, for Mode 3)\npython global_server.py\n```\n\nOpen `http://localhost:5173` in your browser, choose a mode, and go.\n\n---\n\n## AI Architecture\n\n### LLM Models — Gemini\n\nAll AI workloads run on Google Gemini models via TokenRouter. Each role uses a specialized model:\n\n| Role | Model | Purpose |\n|------|-------|---------|\n| **Orchestrator** | `gemini-2.5-pro-preview` | One-shot world design from a user prompt — creates character profiles, zones, world rules, and action templates. |\n| **Image Generation** | `gemini-3.1-flash-image-preview` | Map pixel-art generation (Mode 1/3) + character sprite sheet generation. |\n| **Vision Review** | `gemini-3.1-pro-preview` | Quality review pass — checks generated map images for artifacts and consistency before they go live. |\n| **Simulation** | `gemini-2.5-flash-preview` | Runtime character behavior — action decisions, multi-turn dialogue, reflection, and memory consolidation. |\n| **Character Sprites** | `gemini-2.5-flash-image` | NPC sprite sheet generation for in-game characters (walk cycles, idle poses). |\n\n### Custom Agent Simulation System\n\nNo external agent frameworks (LangGraph, LangChain) — fully custom perceive-decide-act loop running tick-by-tick for every NPC:\n\n| Component | Responsibility |\n|-----------|---------------|\n| `SimulationEngine` | Drives the tick loop — each tick, every NPC perceives, decides, acts, and remembers. |\n| `buildPerception()` | Builds each NPC's perception context from nearby entities, recent events, current emotion, and world state. |\n| `DecisionMaker` | Calls the Simulation LLM to select an action (move, talk, emote, use item, etc.) based on personality + perception. |\n| `DialogueGenerator` | Produces multi-turn NPC-to-NPC and NPC-to-player conversations with memory-aware context. |\n| `MemoryManager` | Stores individual memories, applies decay over time, and periodically consolidates related memories via LLM reflection. |\n| `emotion-manager` | `updateEmotion()` / `decayEmotion()` / `getEmotionLabel()` — tracks valence and arousal per character, updated by events and dialogue outcomes. |\n\nEach NPC autonomously: **perceives** the environment → **decides** what to do → **executes** the action → **forms memories** → **reflects** on experiences. You can also play \"god\" at any time: inject events, edit memories or traits, and watch the social dynamics shift in response.\n\n**NPC Generation flow:** Click **Spawn NPC** in the game world → input location → the Orchestrator calls Gemini to design a character with local knowledge, personality, and backstory → sprite generated via `gemini-2.5-flash-image` → NPC appears on the map (~30s). Walk up and press **Z** to interact. Click **Spawn NPC** again to edit or delete existing NPCs.\n\n### OSM Whitebox — Global Map Generation Pipeline (Mode 3)\n\nWhen you generate a pixel map for any location on Earth, the first step is building the **OSM whitebox**:\n\n- Queries the **OpenStreetMap Overpass API** for all building footprints in the selected area (coordinates + `height` / `building:levels` tags).\n- Renders an isometric PNG at 1280×960 with the same camera angles as the 3D Tiles viewer:\n  - **Roof faces**: light grey with outlines for shape clarity.\n  - **Wall faces**: shaded by orientation — right-facing walls get medium grey, left-facing walls darker grey.\n  - **Background**: near-black for contrast.\n- **Contains**: building geometry only — footprints, heights, and 3D shapes. No roads, water, vegetation, labels, or terrain.\n- **Why it's needed**: The whitebox acts as a **geometric blueprint** for the AI. When Gemini generates the pixel-art map, it's instructed to place every white shape as a building at exactly the same position. Without this constraint, AI image generation would produce aesthetically pleasing but geographically inaccurate buildings. The whitebox ensures the output preserves real-world building layouts.\n\n### Baidu Maps API\n\nThe Baidu Maps API provides street-level scene context for the reference collage pipeline:\n\n- **Baidu Maps Static Image API** (`staticimage/v2`): Given a coordinate, fetches a street-block scene image (实景图) at zoom level 17.\n- Used in the `Map_gen_RPG` pipeline to build a reference collage — satellite view on the left, Baidu street scene on the right — giving the AI both top-down and ground-level visual references.\n- Optional — the pipeline continues gracefully if the `BAIDU_MAP_AK` key is not configured.\n- Legacy: early versions used Baidu Maps WebGL API to capture 3D building whitebox screenshots (NYC-only, deprecated in favor of OSM Overpass for global coverage).\n\n---\n\n## Acknowledgments\n\nThis project stands on the shoulders of two incredible open-source projects:\n\n- **[isometric-nyc](https://github.com/cannoneyed/isometric-nyc)** ([isometric.nyc](https://isometric.nyc)) — The first open-source project to combine AI generation with isometric pixel city maps at scale. It proved \"vibe-engineering\" could work, and its NYC tile pipeline is the foundation of Mode 2.\n- **[WorldX](https://github.com/YGYOOO/WorldX)** — The AI world engine that powers character generation, dialogue, memory, and emergent narrative. One sentence in, a living world out.\n\nOpenPixel-RPG extends isometric-nyc's NYC pipeline to global coverage and integrates GeoPixel's character simulation for a complete AI JRPG experience.\n\n---\n\n## Project Structure\n\n```\nOpenPixel-RPG/\n├── G_gen_pixel/            # Mode 3 frontend + backends (5173 / 5001 / 5002)\n│   ├── server.py              # Main API: geocode, satellite, pixel generation, WorldX jobs\n│   ├── global_server.py       # Mode 3 API: OSM whitebox + three-image pipeline\n│   ├── whitebox/              # OSM Overpass global whitebox generation\n│   ├── src/                   # Vite frontend (main.js, three-column UI)\n│   ├── index.html             # Three-column layout (View+Pixel / Global / Game)\n│   ├── hyperparams.json       # Unified config (grid cells, canvas size, etc.)\n│   └── cache/                 # Satellite image disk cache\n├── GeoPixel/                # AI world engine (Mode 1/2 NPC + agent simulation)\n│   ├── client/                # React 19 + Phaser game client\n│   ├── server/                # Node.js backend (Express + WebSocket + SQLite)\n│   │   ├── src/simulation/        # Custom agent simulation engine (perceive-decide-act loop)\n│   │   ├── src/core/              # World manager, character manager, memory manager\n│   │   └── src/llm/               # LLM client (Simulation + Dialogue + Reflection)\n│   ├── orchestrator/          # LLM world orchestration (Gemini 2.5 Pro)\n│   └── generators/            # Map & character image generation (Gemini 3.1 Flash)\n├── WorldX-main/             # WorldX game engine (map pipeline, game runtime)\n│   ├── generators/map/        # index-from-image.mjs (Steps 2–6: compress → TMJ output)\n│   └── client/                # WorldX React + Phaser frontend\n├── Map_gen_RPG/             # Satellite → pixel map pipeline (Baidu scene + ref collage)\n│   └── fetch_baidu_scene.py   # Baidu Maps Static Image API for street-level reference\n├── Blog/                    # Documentation & tutorials (Chinese)\n├── Paper/                   # Academic paper draft\n├── ref/                     # Reference projects (isometric-nyc, etc.)\n└── video/                   # Demo videos & GIFs\n```\n\n---\n\n## License\n\nMIT © OpenPixel-RPG contributors\n","summary":"OpenPixel-RPG is an AI-powered pixel-art open-world JRPG that turns real-world locations into playable, interactive pixel worlds. Users can upload a photo to generate a pixel map, explore pre-generated NYC landmarks, or input any address worldwide to create a new map using OpenStreetMap, satellite imagery, and generative AI for sprites and world content. It features emergent NPC behavior driven by a custom perceive–decide–act agent simulation loop, plus a “god mode” to inject events and modify character memories or traits on the fly. This project is well-suited for developers and creators interested in generative worldbuilding, location-based UGC games, and experimenting with LLM-driven simulation and interactive storytelling.","description":"AI-powered UGC pixel-art JRPG: input any address or photo, describe a style, and get a complete interactive world with AI-generated local NPCs.","stars":128,"language":"TypeScript"},{"owner":"eduwass","repo":"tmux-palette","url":"https://github.com/eduwass/tmux-palette","readme":"# tmux-palette\n\nA command palette for tmux. It runs on [Bun](https://bun.sh), has no runtime\ndependencies, and opens quickly enough to use as a regular tmux binding.\n\nType a few letters, pick a command, hit enter: split a pane, jump to a window,\ndetach a session, open a popup tool, or switch to a custom palette. User config\nlives in `~/.config/tmux-palette/*.json`, so local changes survive repo updates.\n\n**Commands** — main palette for panes, windows, sessions, and built-in tmux actions.\n\nhttps://github.com/user-attachments/assets/3a8f3951-619f-46b4-a180-b9a03ccb8593\n\n**Themes + plugins** — theme picker with live preview, plus custom palettes powered by shell commands.\n\nhttps://github.com/user-attachments/assets/5edce838-9199-4123-8262-352bc47e989c\n\n## Status\n\nThe tool is in beta. It's stable enough to use day-to-day, but the surface area\nis still settling — I want the next few weeks to be about running it myself,\ngathering feedback, and shaking out bugs rather than growing the feature set.\n\nIf you'd like to contribute, the most useful work right now is anything that\nimproves the existing base (refactors, perf, polish, docs) or fixes a bug. New\nfeatures will likely get closed — no hard feelings, but please open an issue\nfirst to discuss before writing code.\n\n## Highlights\n\n- **Fast startup** — designed for frequent use from a tmux key binding\n- **Custom palettes** — define your own with [a single JSON file](#custom-palettes), bind to any key\n- **Hide built-ins** — declutter the default palette via [`hidden.json`](#hiddenjson--hide-built-in-items)\n- **Mobile-aware** — [auto-fullscreens](#sizingjson--popup-dimensions-and-borders) on narrow terminals (Moshi / Blink on iOS)\n- **Curated themes** — 12 built-in themes including Shades of Purple, Dracula, Tokyo Night, Catppuccin, Gruvbox, Nord, and Solarized. [Pick one with live preview](#themes), or [drop your own](#custom-themes)\n- **Popup tools** — use `{ \"popup\": \"htop\" }` to open tools like `btop`, `lazygit`, log tails, or `fzf` scripts in a tmux popup\n- **Scriptable sources** — point a palette at a shell command that prints JSON or one item per line. Examples live in [`examples/`](examples)\n- **Small codebase** — roughly 2k LOC, so it is easy to audit, fork, or patch locally\n- **No fork required** — every customization lives in `~/.config/tmux-palette/*.json`\n\n## What you can build\n\n- Open `lazygit`, `htop`, `btop`, or log tails in a centered tmux popup.\n- Create a PR explorer from `gh pr list` that opens PRs in your browser.\n- Create a GitHub Actions picker that jumps straight to a workflow run.\n- Pick a Docker container and tail its logs in a popup.\n- List npm scripts from the current project and run one from tmux.\n- Bind focused palettes to separate keys, like `M-t` for Tools or `M-a` for Appearance.\n- Keep a personal favorites palette without editing the repo.\n\nSee [`examples/`](examples) for drop-in palettes you can copy into\n`~/.config/tmux-palette/palettes/`.\n\n## Install\n\nUse TPM if you already use it; otherwise manual install is the simplest path.\nThe AI-agent option is just a guided setup flow.\n\n### Requirements\n\n- [Bun](https://bun.sh)\n- tmux 3.4+ recommended (`display-popup -E` support)\n- Optional tools for examples only: `gh`, `jq`, `docker`, `npm`, `git`, etc.\n\n<details>\n<summary><b>Manual install</b></summary>\n\n<br/>\n\nRequires Bun: https://bun.sh\n\n```bash\ngit clone https://github.com/eduwass/tmux-palette ~/Sites/tmux-palette\ncd ~/Sites/tmux-palette\nbun install\n```\n\nBind it to a tmux key in your `.tmux.conf` — `Ctrl+Space` gives the most \"Raycast-feel\" since it skips the prefix:\n\n```tmux\nbind -n C-Space run-shell \"~/Sites/tmux-palette/bin/tmux-palette.sh\"\n```\n\nOr if you'd rather go through the tmux prefix:\n\n```tmux\nbind p run-shell \"~/Sites/tmux-palette/bin/tmux-palette.sh\"\n```\n\nReload: `tmux source-file ~/.tmux.conf` and hit your binding.\n\n</details>\n\n<details>\n<summary><b>Install via TPM</b> (Tmux Plugin Manager)</summary>\n\n<br/>\n\nRequires Bun: https://bun.sh\n\nAdd to your `.tmux.conf`:\n\n```tmux\nset -g @plugin 'eduwass/tmux-palette'\nset -g @palette-key 'C-Space'             # optional, default: C-Space (no-prefix)\nset -g @palette-find-pane-key 'M-f'       # optional, no binding by default\nset -g @palette-move-pane-key 'M-m'       # optional, no binding by default\n```\n\nThen `prefix + I` (TPM's install key) to install. TPM clones the repo,\nruns `bun install` on first load, and binds the keys for you. Set\n`@palette-key 'off'` to skip the main binding and bind it yourself.\n\n</details>\n\n<details>\n<summary><b>Guided onboarding with an AI agent</b></summary>\n\n<br/>\n\nThis is optional; it is just a guided setup flow. Choose it if you want an\nagent to drive the onboarding experience: install the repo, set up the tmux\nbinding, test that it opens, and optionally create your first custom commands\nor theme.\n\nPaste the prompt below into [Claude Code](https://claude.com/claude-code), [Codex](https://github.com/openai/codex), [opencode](https://opencode.ai), Cursor, or any AI coding agent.\n\n````\nYou are helping a user onboard tmux-palette, a small command palette for tmux. Repo: https://github.com/eduwass/tmux-palette\n\nGoal: get the palette installed, bound to a key, tested inside tmux, and leave the user with one useful next customization if they want it.\n\nFollow steps in order. Confirm with the user before any change that modifies their files.\n\n1. Prerequisites\n- Run `bun --version`. If Bun is missing, point them to https://bun.sh/docs/installation and stop — do not auto-install.\n- Run `tmux -V`. If lower than 3.4, warn that `display-popup -E` may not work, then proceed.\n\n2. Clone and install\n- Default path: `~/Sites/tmux-palette`. Ask the user if they want a different location.\n- If the path already exists and contains the repo, run `git -C <path> pull` and skip cloning.\n- Otherwise: `git clone https://github.com/eduwass/tmux-palette <path> && cd <path> && bun install`.\n\n3. Bind it to a tmux key (required — the palette doesn't open without one)\n- Default suggestion: `bind -n C-Space run-shell \"<absolute-path>/bin/tmux-palette.sh\"` (no-prefix, opens with Ctrl+Space). Ask the user if they want a different key.\n- Append the bind line to `~/.tmux.conf` (create it if missing).\n- Run `tmux source-file ~/.tmux.conf` to reload (or tell them to do it).\n\n4. Pick a theme (optional)\nAsk: \"Want to choose a built-in theme now, or should I try to match your terminal's theme?\"\n\nIf they want a built-in theme:\n- Tell them they can open the palette and choose **Switch Theme...** for live preview.\n- Mention the curated built-ins: Shades of Purple, Dracula, Tokyo Night, Catppuccin Mocha, Gruvbox Dark, Rosé Pine, Nord, Solarized Dark, Kanagawa Wave, GitHub Dark, One Dark, Ayu Dark.\n\nIf they want to match their terminal, detect it:\n- Check $TERM_PROGRAM and $TERM. Common values: ghostty, iTerm.app, vscode, WezTerm, Apple_Terminal.\n- Read the relevant config:\n  - Ghostty:    ~/.config/ghostty/config\n  - Alacritty:  ~/.config/alacritty/alacritty.toml (or .yml)\n  - Kitty:      ~/.config/kitty/kitty.conf  (follow `include` lines)\n  - WezTerm:    ~/.wezterm.lua or ~/.config/wezterm/wezterm.lua\n  - iTerm2 / others: ask the user for hex codes; their configs are hard to parse.\n- Extract: background → `bg`, foreground → `fg`, cursor color → `accent`, selection bg → `selected`. Derive `panel` (slightly lighter than bg) and `muted` (fg dimmed).\n- Write `~/.config/tmux-palette/theme.json` with `{ bg, panel, selected, fg, muted, accent }`. The palette reads this at runtime; do NOT edit source files.\n- Report the colors you picked.\n\n5. Test\nTell the user to press their binding. Ask what they see.\n\n6. Offer one useful follow-up\nWhen it works, ask:\n- \"Want a quick custom command, like opening lazygit or htop in a popup?\" — write items to `~/.config/tmux-palette/commands.json` (array of Items). Action types: `{ \"tmux\": \"...\" }`, `{ \"shell\": \"...\" }`, `{ \"popup\": \"...\" }`, `{ \"palette\": \"name\" }`. Do NOT edit source files.\n- \"Want a focused palette for PRs, Docker logs, npm scripts, or git branches?\" — copy an example from `examples/` into `~/.config/tmux-palette/palettes/` and bind it.\n- \"Want custom shortcut labels?\" — write `~/.config/tmux-palette/shortcuts.json` mapping item titles to label strings.\n\nOnly do one follow-up unless the user asks for more.\n\nConstraints\n- Prefer `~/.config/tmux-palette/*.json` over source edits. The user's config survives upstream pulls; source edits don't.\n- Do not push to git or modify files outside the user's home directory.\n- Do not auto-install Bun or any other system package.\n- If anything fails, stop and explain what went wrong.\n````\n\n</details>\n\n## Usage\n\n- **Type** to filter. Multi-word search is supported (`split horiz`).\n- **Up/Down arrows** or **Ctrl+P / Ctrl+N** to move selection.\n- **Enter** to run the selected command.\n- **Esc** to cancel.\n- **Mouse** works too — click rows, scroll the wheel.\n\n**Auto-aliases**: initials of multi-word titles match automatically. Type `nw` for \"New\nWindow\", `cs` for \"Choose Session\", `sh` for \"Split Horizontal\", etc.\n\n## Trust And Safety\n\n- CI runs `bun test`, TypeScript, Fallow dead-code, and Fallow duplication checks.\n- The codebase is intentionally small and has no runtime package dependencies.\n- Custom palettes are local JSON files, but they can run shell commands. Only copy\n  palette examples you understand, especially if they come from outside this repo.\n- User config lives under `~/.config/tmux-palette/`; normal customization should not\n  require editing source files.\n\n## Known Limitations\n\n- Requires tmux popup support; tmux 3.4+ is recommended.\n- Plugin commands run each time their palette opens. Add your own cache layer for\n  slow commands.\n- This is currently installed from the repo or via TPM, not a packaged npm release.\n- `{ \"shell\": \"...\" }` and `{ \"popup\": \"...\" }` actions execute through the user's\n  shell by design.\n\n## Customize\n\nDrop-in user config lives in `~/.config/tmux-palette/`. One JSON file per\nconcern — no source edits, no fork, survives upstream pulls.\n\n### Custom palettes\n\nPath: `~/.config/tmux-palette/palettes/<name>.json`\n\nDefine a brand-new palette and bind any key to its name:\n\n```tmux\nbind -n M-q run-shell \"~/Sites/tmux-palette/bin/tmux-palette.sh my-favs\"\n```\n\n```jsonc\n// ~/.config/tmux-palette/palettes/my-favs.json\n{\n  \"title\": \"Favorites\",\n  \"from\": [\"Toggle Diff Viewer\", \"Find Pane\", \"Choose Session\"],\n  \"fromCategory\": \"Tools\",\n  \"items\": [\n    {\n      \"icon\": \"\",\n      \"title\": \"Custom item only in this palette\",\n      \"action\": { \"tmux\": \"run-shell '~/scripts/x.sh'\" }\n    }\n  ]\n}\n```\n\n- `from` — array of item titles to pull from the main commands palette (built-ins + your `commands.json`)\n- `fromCategory` — pull every item from one category\n- `command` — shell command that prints a JSON array of `Item` objects to stdout (see [plugins](#plugins) below)\n- `items` — brand-new items defined inline\n- `title` / `grouped` / `emptyText` — same as built-in palettes\n\nAll keys optional. Resolution order: `from` → `fromCategory` → `command` → `items`.\n\n#### Plugins\n\n> Drop-in ready-to-use palettes live in [`examples/`](examples) — git branches,\n> GitHub PRs (with color-coded status dots), Docker container logs,\n> npm scripts, file picker. Copy one and bind a key.\n\nThe `command` field is the plugin escape hatch — fzf-style. Anything\nthat prints to stdout becomes a palette. Two output modes:\n\n**JSON mode** — full control. Print a JSON array of `Item` objects:\n\n```jsonc\n// ~/.config/tmux-palette/palettes/github-prs.json\n{\n  \"title\": \"GitHub PRs\",\n  \"command\": \"gh pr list --json number,title,url --jq '[.[] | {icon: \\\"\\\", title: ((.number|tostring) + \\\" \\\" + .title), action: {shell: (\\\"gh pr view \\\" + (.number|tostring) + \\\" --web\\\")}}]'\"\n}\n```\n\n**Plain-text mode** — fzf-style. Print one item per line, define a\ndefault `action` template at the palette level with `{}` substituted\nfor the selected line:\n\n```jsonc\n// ~/.config/tmux-palette/palettes/git-branches.json\n{\n  \"title\": \"Git Branches\",\n  \"command\": \"git branch --format='%(refname:short)'\",\n  \"action\": { \"tmux\": \"send-keys 'git checkout {}' Enter\" }\n}\n```\n\nThis means most \"command that prints lines\" tools you'd pipe through\nfzf can become tmux-palette palettes with no scripting — just the JSON\nconfig and an action template.\n\nWrite the command in any language, distribute it however you want\n(gist, repo, copy-paste). The plugin runs every time the palette opens\n(no caching), so for expensive calls add your own cache layer. Errors\nare surfaced as a single item in the palette so failures stay visible\nwithout crashing the popup.\n\n### `hidden.json` — hide built-in items\n\nDrop a JSON array of item titles to skip them in the main commands\npalette:\n\n```json\n[\"Toggle Status Bar\", \"Reload Config\", \"Toggle OpenTUI Top Bar\"]\n```\n\nItems still appear if you reference them by title in a custom palette\n(see above) — `hidden.json` is just about decluttering the default.\n\n### `commands.json` — your own items\n\nAppend items to the `commands` palette without editing source:\n\n```json\n[\n  {\n    \"icon\": \"\",\n    \"title\": \"Toggle Diff Viewer\",\n    \"category\": \"Tools\",\n    \"action\": { \"tmux\": \"run-shell '/path/to/script.sh'\" }\n  },\n  {\n    \"icon\": \"󱂬\",\n    \"title\": \"Open Project in Cursor\",\n    \"category\": \"Tools\",\n    \"action\": { \"shell\": \"cursor /path/to/project\" }\n  },\n  {\n    \"icon\": \"\",\n    \"title\": \"htop\",\n    \"category\": \"Tools\",\n    \"action\": { \"popup\": \"htop\" }\n  }\n]\n```\n\nAction types: `{ \"tmux\": \"...\" }`, `{ \"shell\": \"...\" }`, `{ \"popup\": \"...\" }`, `{ \"palette\": \"find-pane\" }`.\n\n`{ \"popup\": \"htop\" }` opens the given command in a centered tmux popup\n(80% × 80%, closes when the command exits). Handy for log viewers,\nhtop, btop, less, fzf-driven tools, etc.\n\n### `sizing.json` — popup dimensions and borders\n\n```json\n{\n  \"maxHeight\": 28,\n  \"width\": 90,\n  \"padX\": 3,\n  \"mobileWidth\": 80,\n  \"border\": \"none\",\n  \"popupBorder\": \"none\"\n}\n```\n\nAll keys optional. `maxHeight` caps how tall the popup gets when you\nhave lots of commands. `width` is the fixed popup width. `padX` is the\nhorizontal padding inside the popup.\n\n`mobileWidth` is the client-width threshold for auto-fullscreen mode:\nwhen the terminal is narrower than this many columns (iOS terminals\nlike Blink or Moshi typically run 50-60 cols), the popup goes\nedge-to-edge with `padX=1`. Defaults to 80, set to 0 to disable.\n\n`border` is the main palette border, `popupBorder` is the border for\n`{ \"popup\": \"...\" }` action popups. Both default to `none`. Accepted\nvalues: `none`, `single`, `double`, `heavy`, `rounded`, `padded`,\n`simple` — passed straight to `tmux display-popup -b`. `rounded` works\nbut its corner glyphs can leave small visual gaps against the\nsurrounding terminal, so it is not the default.\n\n### Themes\n\nOpen the main palette and pick **Switch Theme...** (under *Appearance*).\nArrow-key through the list — every theme lives-previews instantly so you\nsee the colors apply before you commit. Enter saves it and returns you to\nthe previous palette with the new theme on; Esc cancels.\n\nThe theme picker also includes **Add custom theme...**, which opens this\nREADME's custom-theme instructions in your default browser.\n\nBundled themes are intentionally limited to a small curated set: Shades of\nPurple, Dracula, Tokyo Night, Catppuccin Mocha, Gruvbox Dark, Rosé Pine, Nord,\nSolarized Dark, Kanagawa Wave, GitHub Dark, One Dark, and Ayu Dark. Their\npanel/selected/muted/accent colors are tuned for readable contrast. To tweak a\ntheme without editing the repo, add a custom theme file or override individual\ncolors in `theme.json`.\n\n### `theme.json` — set the active theme\n\nTwo forms. Pick a bundled (or custom) theme by name:\n\n```json\n{ \"name\": \"tokyo-night\" }\n```\n\nOr full color override (applied on top of the resolved theme):\n\n```json\n{\n  \"bg\": \"#1a1b26\",\n  \"panel\": \"#16161e\",\n  \"selected\": \"#283457\",\n  \"fg\": \"#c0caf5\",\n  \"muted\": \"#565f89\",\n  \"accent\": \"#7aa2f7\"\n}\n```\n\nThe theme switcher writes the `{ \"name\": \"...\" }` form for you. You can\nalso mix: pick a name, then add individual keys to nudge specific colors.\n\n### Custom themes\n\nDrop one JSON file per theme into `~/.config/tmux-palette/themes/`:\n\n```jsonc\n// ~/.config/tmux-palette/themes/my-theme.json\n{\n  \"bg\": \"#0d0f12\",\n  \"panel\": \"#171a1f\",\n  \"selected\": \"#2c3038\",\n  \"fg\": \"#e6e8eb\",\n  \"muted\": \"#7d8590\",\n  \"accent\": \"#ff6b6b\"\n}\n```\n\nCustom themes show up in the **Switch Theme...** picker alongside the\nbundled ones (tagged `custom`). The filename becomes the slug — drop\n`my-theme.json` → reference it as `{ \"name\": \"my-theme\" }` in\n`theme.json`, or just pick it from the switcher.\n\n### Category hotkeys\n\nPass `--category=<name>` to open the main palette filtered to one\ncategory, Raycast-favorites style:\n\n```tmux\nbind -n M-t run-shell \"~/Sites/tmux-palette/bin/tmux-palette.sh commands --category=Tools\"\nbind -n M-a run-shell \"~/Sites/tmux-palette/bin/tmux-palette.sh commands --category=Appearance\"\n```\n\nThe popup title auto-updates to the category name and the category\nheader gets hidden (since everything is the same category anyway).\n\n### `shortcuts.json` — custom shortcut labels\n\nWhen your terminal has a key-remap layer (Ghostty / iTerm2 / Karabiner) that\ntranslates something like `Cmd+D` into a tmux binding, tmux only sees the\ntmux side and doesn't know the original key. Use this to show what you\nactually press:\n\n```json\n{\n  \"Split Horizontal\": \"Cmd+D\",\n  \"Find Pane\": \"Cmd+Shift+P\",\n  \"Choose Session\": \"Cmd+S\"\n}\n```\n\nKeys are item titles; values are whatever text you want on the right side.\n\n### `aliases.json` — extra visible alias chips\n\n```json\n{\n  \"Split Horizontal\": [\"sh\"],\n  \"Find Pane\": [\"fp\"]\n}\n```\n\nAuto-aliases (initials like `nw`) still work for free, invisibly.\n\n## Extending (deeper)\n\nFor things JSON can't express — custom row rendering, dynamic item\ngenerators, custom filter logic — edit the TS source. Items in\n`src/palettes/commands.ts` have this shape:\n\n```ts\n{\n  icon: \"󰍉\",              // any nerd-font glyph\n  title: \"Find Pane\",\n  description?: \"...\",    // optional, dimmed text after title\n  shortcut?: \"Cmd+Shift+P\", // optional, right-aligned label\n  category?: \"Panes\",     // optional, groups items under a header\n  aliases?: [\"fp\"],       // optional, visible chip + searchable\n  action: { tmux: \"...\" } // see Actions below\n}\n```\n\n### Actions\n\n```ts\n{ tmux: \"split-window -h\" }     // runs `tmux <cmd>` after the popup closes\n{ shell: \"echo hi\" }            // runs a shell command after the popup closes\n{ popup: \"htop\" }               // opens cmd in a centered 80% tmux popup\n{ palette: \"find-pane\" }        // chains into another palette\n{ run: (ctx) => { ... } }       // custom JS, runs in-process, then exits\n{ apply: (ctx) => { ... } }     // custom JS, runs in-process, then pops\n                                // back to the previous palette (used by\n                                // the theme switcher to \"apply + return\")\n```\n\n`{ tmux }` is special: it dispatches *after* the popup closes, so interactive\ntmux prompts (`confirm-before`, `command-prompt`) actually get keyboard\ninput. Without this, prompts hang because the popup still owns stdin.\n\n## How it works (the trick)\n\nThe bash wrapper opens a `tmux display-popup` running the palette. When you\npick an item, the palette writes the encoded command to a tempfile and exits.\nThe wrapper *then* reads the tempfile and runs the command — *after* the\npopup is gone. This matters because interactive tmux commands like\n`confirm-before` need stdin, which is captured by the popup while it's open.\n\n## License\n\nMIT\n","summary":"tmux-palette is a fast, Bun-based command palette for tmux that lets you type a few letters and quickly trigger common actions like splitting panes, jumping to windows, detaching sessions, or opening popup tools. It supports themes with live preview, custom palettes stored in `~/.config/tmux-palette/*.json`, and scriptable palette sources via shell commands that output JSON or one item per line. Users benefit by getting a “command palette” workflow inside tmux for frequent, discoverable navigation and utilities, especially if you want to keep personal favorites and local customization without modifying the repo. It’s a good fit for power users who rely heavily on tmux and want a customizable, low-latency alternative to manually typing tmux commands.","description":"Raycast-style command palette for tmux — fast, scriptable, easy to extend","stars":332,"language":"TypeScript"},{"owner":"actuallyaridan","repo":"linux-devmgmt","url":"https://github.com/actuallyaridan/linux-devmgmt","readme":"<div align=\"center\">\n\n  # linux-devmgmt\n  <i>The Windows Device Manager, on Linux</i>\n\n  <p>\n    A faithful recreation of the Windows Device Manager built with Qt6 and real hardware backends via sysfs/procfs. Best enjoyed with <a href=\"https://github.com/aeroshell-desktop/aerothemeplasma\">AeroThemePlasma</a>, but looks great on regular KDE as well.\n  </p>\n\n</div>\n<br>\n\n> [!NOTE]\n> **Built for CachyOS / Arch Linux.** Also packaged as a Nix flake for NixOS.<br>Some features (DKMS uninstall, driver date lookup) depend on `dkms` and `pacman`. Other distros may need minor adjustments.\n\n| | | |\n|:-------------------------:|:-------------------------:|:-------------------------:|\n| <img src=\"./screenshots/main.png\" alt=\"A list of device categories with some of them expanded.\"> | <img src=\"./screenshots/properties.png\" alt=\"A device properties window open, showing information about an AMD GPU\"> | <img src=\"./screenshots/driver.png\" alt=\"The Driver tab of the Properties window, shwoing the version and date of said GPU driver\"> |\n| <img src=\"./screenshots/olddriver.png\" alt=\"The same Driver tab of the Properties window, but this time showing an older unmaintained driver's date and version.\"> | <img src=\"./screenshots/details.png\" alt=\"The Details tab, shwoing a dropdown with a large text area.\"> | <img src=\"./screenshots/resources.png\" alt=\"The Resources tab, shwoing a information about a deviecs resources like IRQ and similar.\"> |\n\n\n## Building\n\n### Arch / CachyOS\n\n```bash\nsudo pacman -S qt6-base cmake\ncmake -B build\ncmake --build build -j\n./build/devmgmt\n```\n\n### Nix\n\n```bash\nnix build\n./result/bin/devmgmt\n\n# or run directly\nnix run\n```\n\nA dev shell with Qt Creator and GDB is also available:\n\n```bash\nnix develop\n```\n\n## Runtime dependencies\n\nOn Arch, you need these installed separately. The Nix flake handles all of them automatically.\n\n| Tool | Purpose |\n|------|---------|\n| `pkexec` | Privilege escalation for enable/disable/uninstall |\n| `modinfo` | Driver details |\n| `bluetoothctl` | Bluetooth device disconnect |\n| `dkms` | *(optional)* DKMS driver management |\n| `pacman` | *(optional)* Package date lookup |\n\n## Features\n\n- Full two-level device tree (by type) backed by real sysfs/procfs data\n- Per-device Properties dialog with General, Driver, Details, and Resources tabs\n- Enable / disable devices via kernel module blacklisting\n- Uninstall DKMS drivers\n- Update Driver wizard\n- Driver Details viewer (`modinfo` output)\n- Scan for hardware changes\n","summary":"linux-devmgmt is a Qt6 application that recreates the Windows Device Manager experience on Linux by using real hardware information from sysfs/procfs. It provides a two-level device tree and a per-device Properties dialog with tabs for general info, driver details (via modinfo), and device resources, along with actions like enabling/disabling devices through kernel module blacklisting and scanning for hardware changes. It also includes DKMS-related capabilities such as uninstalling DKMS drivers and updating driver information, plus a driver date/version view when available on Arch-based systems. This project is best for Arch/CachyOS users (and NixOS users via the provided Nix flake) who want a familiar, GUI-based way to manage and inspect their system’s hardware and kernel modules.","description":"A faithful recreation of the Windows Device Manager built with Qt6 and real hardware backends via sysfs/procfs. Best enjoyed with AeroThemePlasma, but looks great on regular KDE as well.","stars":265,"language":"C++"},{"owner":"chiennv2000","repo":"orthrus","url":"https://github.com/chiennv2000/orthrus","readme":"<p align=\"center\">\n  <img src=\"assets/orthrus_logo.svg\" alt=\"Orthrus logo\" width=\"30%\"/>\n</p>\n\n# Orthrus: Memory-Efficient Parallel Token Generation via Dual-View Diffusion\n\nOfficial implementation and model checkpoints for **Orthrus**, a dual-architecture framework that unifies the exact generation fidelity of autoregressive Large Language Models (LLMs) with the high-speed parallel token generation of diffusion models.\n\n<p align=\"center\">\n  <img src=\"assets/orthrus.png\" width=\"80%\" alt=\"Orthrus Architecture\">\n</p>\n\nhttps://github.com/user-attachments/assets/2a0b021c-e232-4ac6-bf5c-c582c422505e\n\n## Model Zoo\n \nAll models use a Qwen3 backbone and guarantee **strictly lossless generation**.\n \n| Model | Base Model | HuggingFace | Avg. Speedup |\n| :--- | :--- | :--- | :--- |\n| Orthrus-Qwen3-1.7B | Qwen3-1.7B | [🤗 HuggingFace](https://huggingface.co/chiennv/Orthrus-Qwen3-1.7B) | 4.25× |\n| Orthrus-Qwen3-4B | Qwen3-4.0B | [🤗 HuggingFace](https://huggingface.co/chiennv/Orthrus-Qwen3-4B) | 5.20× |\n| Orthrus-Qwen3-8B | Qwen3-8.0B | [🤗 HuggingFace](https://huggingface.co/chiennv/Orthrus-Qwen3-8B) | 5.36× |\n \n---\n## Installation\n \n```bash\nuv pip install -e .\nuv pip install ninja packaging\nuv pip install flash-attn --no-build-isolation # or: pip install \"flash-attn-4[cu13]\" if your device supports it\n```\n \n> We recommend [`uv`](https://github.com/astral-sh/uv) for fast dependency resolution.\n\n---\n \n## Quickstart\n\n> **⚡ Try instantly:** Run Orthrus directly in Colab:\n> [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/1wYUJRdURtab_4mn6-e1AdT-kTydrzZIz?usp=sharing)\n \n```python\nimport torch\nfrom transformers import AutoModelForCausalLM, AutoTokenizer, TextStreamer\n \n\nmodel = AutoModelForCausalLM.from_pretrained(\n    \"chiennv/Orthrus-Qwen3-8B\",\n    dtype=torch.bfloat16, device_map=\"cuda\",\n    attn_implementation=\"flash_attention_2\",  # options: sdpa | eager | flash_attention_4\n    trust_remote_code=True,\n).eval()\ntokenizer = AutoTokenizer.from_pretrained(\"chiennv/Orthrus-Qwen3-8B\")\n \nprompt = \"Write a program to count the frequency of each word in a paragraph.\"\nmessages = [{\"role\": \"system\", \"content\": \"\"}, {\"role\": \"user\", \"content\": prompt}]\ninput_ids = tokenizer.apply_chat_template(messages, return_tensors=\"pt\", add_generation_prompt=True, enable_thinking=False).input_ids\n\noutput_ids = model.generate(\n    input_ids=input_ids.to(model.device), \n    max_new_tokens=2048,\n    use_diffusion_mode=True, \n    streamer=TextStreamer(tokenizer, skip_prompt=True) # enable streaming generation\n)\n```\n\n> **Coming soon:** Native integration with [vLLM](https://github.com/vllm-project/vllm) and [SGLang](https://github.com/sgl-project/sglang) is coming soon. Stay tuned!\n \n## Key Advantages\n \n- **Significant Inference Acceleration:** Breaks the sequential bottleneck of standard autoregressive decoding, delivering up to a $7.8\\times$ speedup on generation tasks.\n- **Strictly Lossless Generation:** Employs an exact intra-model consensus mechanism to guarantee that the output matches the original base model's exact predictive distribution.\n- **Zero Redundant Memory Overhead:** Both the autoregressive and diffusion views attend to the exact same high-fidelity Key-Value (KV) cache natively, resulting in only an $O(1)$ memory cache overhead.\n- **Parameter Efficient:** Parallel generation capabilities are injected by fine-tuning only 16% of the total model parameters while keeping the base LLM strictly frozen.\n\n---\n\n## Performance Comparison: Orthrus vs. Speculative Decoding\n\nOrthrus outperforms speculative decoding methods like EAGLE-3, DFlash. By natively sharing the exact same KV cache across dual views, Orthrus avoids the redundant memory overhead of draft models, resulting in significantly higher token acceptance rates and faster inference times, especially as context length scales. Orthrus maintains consistently high end-to-end throughput—even at 40K context lengths compared to DFlash's rapid degradation. \n\n<p align=\"center\">\n  <img src=\"assets/acceptance_length.png\" width=\"48%\" alt=\"Average Acceptance Length Comparison\">\n  <img src=\"assets/long_context_benchmark.png\" width=\"48%\" alt=\"Long Context Throughput Benchmark\">\n</p>\n<p align=\"center\">\n  <em><b>Left:</b> Average verified tokens per forward pass compared to EAGLE-3 and DFlash. <b>Right:</b> End-to-end throughput across scaling context lengths. </em>\n</p>\n\n---\n\n## Comparison with State-of-the-Art Diffusion Models\n\nWhile recent diffusion language models (dLLMs) offer parallel decoding, they often suffer from significant conditional drift and severe accuracy degradation on complex reasoning tasks. Orthrus resolves this by decoupling parallel generation from sequential constraints, establishing a new state-of-the-art for parallel generation fidelity.\n\n<p align=\"center\">\n  <img src=\"assets/math500_speed.png\" width=\"60%\" alt=\"Throughput vs. Accuracy on MATH-500\">\n</p>\n<p align=\"center\">\n  <em><b>Throughput vs. Accuracy on MATH-500.</b> Orthrus delivers a ~6x speedup over the Qwen3-8B baseline with strictly lossless performance, whereas adaptations like Fast-dLLM-v2 suffer significant accuracy drops.</em>\n</p>\n\n---\n\n## Further Support\n \n### MLX (Apple Silicon)\n \nOrthrus supports native inference on Apple Silicon via [MLX](https://github.com/ml-explore/mlx). Tested with `mlx==0.31.2` and `mlx-lm==0.31.3`.\n\n**Usage:**\n \n```python\nfrom src.model_mlx import load_model_and_tokenizer, mlx_generate\n \nrepo_id = \"chiennv/Orthrus-Qwen3-1.7B\"\nmodel, tokenizer = load_model_and_tokenizer(repo_id)\n \nprompt_tokens = tokenizer.encode(\"If a rectangle has length 12 and width 7, what is its area?\")\n \nfor token in mlx_generate(model, prompt_tokens, tokenizer.eos_token_id, max_tokens=128):\n    print(tokenizer.decode([token]), end=\"\", flush=True)\n```\n\n## Citation\n\nIf you find this model or architecture useful in your work, please cite our [paper](https://arxiv.org/abs/2605.12825):\n\n```bibtex\n@misc{vannguyen2026orthrusmemoryefficientparalleltoken,\n      title={Orthrus: Memory-Efficient Parallel Token Generation via Dual-View Diffusion}, \n      author={Chien Van Nguyen and Chaitra Hegde and Van Cuong Pham and Ryan A. Rossi and Franck Dernoncourt and Thien Huu Nguyen},\n      year={2026},\n      eprint={2605.12825},\n      archivePrefix={arXiv},\n      primaryClass={cs.LG},\n      url={https://arxiv.org/abs/2605.12825}, \n}\n```\n","summary":"Orthrus is a dual-view diffusion framework for accelerating LLM text generation while preserving the exact output fidelity of the underlying autoregressive model. It enables high-speed, parallel token generation by pairing a diffusion-style decoding view with an autoregressive view that strictly shares the same high-fidelity KV cache, achieving strictly lossless generation with only constant (O(1)) memory overhead. The project provides official Qwen3-based model checkpoints (e.g., 1.7B to 8B variants) and code to run them, including streaming support and guidance for optimized attention backends. It’s especially useful for practitioners and teams deploying LLMs who need faster inference and better throughput at long context lengths without sacrificing exact generation behavior.","description":"Fast, lossless LLM inference via dual-view diffusion decoding.","stars":396,"language":"Python"},{"owner":"boona13","repo":"mykonos-island-voxels","url":"https://github.com/boona13/mykonos-island-voxels","readme":"# Mykonos Island Voxels\n\nA browser-based isometric island builder with the soft, sun-bleached\nMediterranean look of Mykonos: cobalt-blue domes on whitewashed walls,\nbougainvillea spilling over stone, olive trees, windmills, narrow\ncobble paths, and a sea you can carve with a click.\n\nIt's a small, self-contained creative toy — drop blocks on a 14×14 grid\nand a tiny village builds itself in front of you. There's no goal,\nno resource grind, no scoring; just the puzzle-piece pleasure of\narranging things until they look right.\n\n**🌐 Play it: <https://mykonos-island-voxels.netlify.app>**\n\n![Mykonos Island Voxels — example scene](full%20city.png)\n\n---\n\n## Features\n\n- **Click-to-build isometric grid.** Pick an asset from the right-side\n  palette, click a cell, and it pops in with an elastic placement\n  animation.\n- **One-click \"Fill with grass\"** to carpet the island and start\n  arranging in seconds.\n- **75+ painterly assets** organised into terrain, nature, props, water,\n  and buildings — chapels, windmills, two-story villas, cypress, olive\n  trees, agave, wells, lanterns, fences, bridges, and more.\n- **Touch-first mobile UI.** Tap to place, long-press to erase, drag\n  to brush, two-finger pinch and pan. Layout adapts from desktop down\n  to small phones with safe-area insets for the iPhone notch.\n- **High-fidelity asset pipeline.** Source PNGs are pre-rendered at\n  6× display resolution at load time, baked into high-DPI cached\n  layers, then composited per frame so the canvas stays crisp at\n  every zoom on every screen density.\n- **Auto-save.** Your island is persisted to `localStorage` and\n  re-loaded on the next visit.\n- **Tasteful sound design.** Distinct placement sounds for water,\n  stone, wood, small vegetation, large vegetation, and UI clicks,\n  with debounced overlap so brush-painting doesn't flood the bus.\n- **Pure ES modules.** No bundler, no transpiler, no `node_modules` —\n  open `index.html` and it runs.\n\n## Controls\n\n### Mouse + keyboard\n\n| Input | Action |\n|---|---|\n| Click | Place selected asset |\n| Drag | Brush-place across cells |\n| Right click | Erase tile |\n| Right drag | Brush-erase |\n| Shift + drag | Pan camera |\n| Scroll wheel | Zoom |\n| `H` / `V` | Flip the placement preview |\n| `E` | Toggle erase mode |\n| `G` | Toggle grid overlay |\n| `1`–`5` | Switch palette categories |\n| `S` / `R` | Save / reset |\n\n### Touch\n\n| Gesture | Action |\n|---|---|\n| Tap | Place selected asset |\n| Drag | Brush-place across cells |\n| Long-press (~420 ms) | Erase the tile under your finger |\n| Two-finger pinch | Zoom |\n| Two-finger drag | Pan camera |\n\n## Run it locally\n\nThe project is plain HTML / CSS / ES modules — there's no build step\nrequired to develop on it. Because browsers refuse to load ES modules\nfrom `file://` URLs, you do need to serve it over HTTP. Pick whichever\nof these is easiest:\n\n```bash\n# any one of these from the project root:\npython3 -m http.server 8000\nnpx serve .\nnpx http-server -c-1 .\n```\n\nThen open <http://localhost:8000>.\n\n## Deploy\n\nThe site is deployed to Netlify. The included `netlify.toml` and\n`netlify-build.mjs` produce a clean `dist/` folder containing only the\nruntime files (no design references, no `.DS_Store`, no `.webp`\nduplicates) and ship the right cache headers (immutable for assets,\nmust-revalidate for HTML/CSS/JS).\n\n```bash\nnetlify deploy --prod\n```\n\n## Project layout\n\n```\n.\n├── index.html               # entry point\n├── styles.css               # the entire UI (no framework)\n├── src/\n│   ├── main.js              # boot, asset loading, starter scene\n│   ├── config.js            # grid size, tile dims, palette, debug flags\n│   ├── core/\n│   │   ├── Game.js          # game state + tool dispatch\n│   │   ├── Camera.js        # pan / zoom / change notifications\n│   │   ├── Renderer.js      # layered canvas caching + animations\n│   │   └── InputManager.js  # mouse + touch + keyboard\n│   ├── grid/\n│   │   ├── IsoGrid.js       # screen ↔ cell math\n│   │   └── TileMap.js       # terrain + objects, occupancy index\n│   ├── building/\n│   │   └── PlacementSystem.js\n│   ├── assets/\n│   │   ├── assetManifest.js # the 75+ asset definitions\n│   │   ├── assetLoader.js   # PNG → display canvas + shadow canvas\n│   │   ├── imageToAsset.js  # silhouette extraction, anchor inference\n│   │   └── voxelRenderer.js # procedural fallback when PNGs missing\n│   ├── ui/\n│   │   ├── UIManager.js\n│   │   ├── Toolbar.js\n│   │   ├── AssetPalette.js\n│   │   ├── HUD.js\n│   │   └── Audio.js         # WebAudio clip routing + debouncing\n│   └── persistence/\n│       └── SaveSystem.js\n├── assets/                  # PNG asset pack (pre-generated)\n├── *.ogg                    # placement / UI sound effects\n├── netlify.toml\n└── netlify-build.mjs\n```\n\n## Architecture notes\n\nA few choices worth flagging if you want to hack on the renderer:\n\n- **Layered cache rendering.** `Renderer.js` keeps four cache canvases:\n  a screen-space backdrop + vignette pair (rebuilt on resize), a\n  world-space platform (rebuilt on grid resize), a world-space terrain\n  layer (rebuilt when the terrain version counter changes), and a\n  world-space static-objects layer (rebuilt on add/remove). Each frame\n  the renderer composites these caches and overlays only the currently\n  animating tiles. Idle frames are essentially free.\n- **High-DPI cache canvases.** Cache canvases are sized at\n  `world × CACHE_SCALE` (2× on standard displays, 3× on retina) so\n  that even after the camera scales them up, the pixels are at or\n  near final on-screen resolution. The asset displayCanvases are\n  pre-rendered at up to 6× their reference size, so detail flows\n  through without any \"softening\" intermediate.\n- **Spatial occupancy index in `TileMap`.** Object lookup and free-cell\n  checks are O(1) per cell instead of O(N) over the object list.\n- **Dirty-flag rendering.** `markDirty()` is called from camera /\n  input / tool transitions; the loop early-exits when the scene is\n  static and no animations are pending.\n\n## Contributing\n\nPRs welcome. Please:\n\n- Keep it framework-free — no bundlers, no transpilers, no\n  `node_modules` for the runtime.\n- Keep the asset count modest and the visual style coherent\n  (cobalt-on-cream, soft shadows, gentle elastic motion).\n- Don't add per-frame `ctx.filter`, ImageBitmap shenanigans, or\n  anything that would re-introduce frame drops at heavy scenes.\n  The renderer's caching invariants are load-bearing.\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\nThe PNG asset pack in `assets/` is released under the same license,\ngenerated for this project. Audio clips were authored separately;\nsee file metadata if you need to attribute them.\n","summary":"Mykonos Island Voxels is a browser-based, isometric “creative toy” where you build a small Mediterranean-style island on a 14×14 grid by placing voxel-like, painterly tiles (then letting a tiny village form as you arrange). It offers click-to-place and brush painting, a one-click “fill with grass,” a large curated set of 75+ assets across terrain, nature, props, water, and buildings, and a touch-first UI with tap/drag/long-press erase plus pinch-to-zoom and pan. The project focuses on crisp high-DPI rendering via an efficient asset pipeline, with auto-save to localStorage and subtle placement sound design. It’s best for casual creators, world/scene design fans, and anyone who wants a relaxing, low-friction building experience that runs as plain HTML/CSS/ES modules without a build step.","description":"A browser-based isometric island builder with the soft, sun-bleached look of Mykonos. Vanilla ES modules, no bundler, mobile-friendly.","stars":777,"language":"JavaScript"},{"owner":"himomohi","repo":"AirTranslate","url":"https://github.com/himomohi/AirTranslate","readme":"![AirTranslate hero](docs/assets/airtranslate-readme-hero.png)\n\n# AirTranslate\n\nLive system-audio transcription and translation for macOS.\n\n<p align=\"center\">\n  <a href=\"https://github.com/himomohi/AirTranslate/releases/latest/download/AirTranslate.dmg\"><img alt=\"Download AirTranslate.dmg\" src=\"https://img.shields.io/badge/Download-AirTranslate.dmg-2EA44F?style=for-the-badge&logo=apple&logoColor=white\"></a>\n  <a href=\"https://github.com/himomohi/AirTranslate/releases/latest\"><img alt=\"Latest release\" src=\"https://img.shields.io/github/v/release/himomohi/AirTranslate?style=for-the-badge&label=Latest\"></a>\n  <a href=\"https://himomohi.github.io/AirTranslate/\"><img alt=\"Official guide site\" src=\"https://img.shields.io/badge/Guide-Site-0A84FF?style=for-the-badge\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://himomohi.github.io/AirTranslate/\">Guide Site</a> ·\n  <a href=\"#download\">Download</a> ·\n  <a href=\"#requirements\">Requirements</a> ·\n  <a href=\"#privacy-and-api-keys\">Privacy</a> ·\n  English ·\n  <a href=\"README.ko.md\">한국어</a> ·\n  <a href=\"README.ja.md\">日本語</a> ·\n  <a href=\"README.zh-CN.md\">中文</a>\n</p>\n\n<p align=\"center\">\n  <img alt=\"macOS 26+\" src=\"https://img.shields.io/badge/macOS-26%2B-0A84FF?style=flat-square&logo=apple\">\n  <img alt=\"Swift 6.2+\" src=\"https://img.shields.io/badge/Swift-6.2%2B-F05138?style=flat-square&logo=swift&logoColor=white\">\n  <a href=\"LICENSE\"><img alt=\"License: Apache 2.0\" src=\"https://img.shields.io/badge/License-Apache%202.0-blue?style=flat-square\"></a>\n</p>\n\nAirTranslate captures audio playing on your Mac, turns it into a live transcript, translates it in real time, and can show the result as a floating caption overlay. It is designed for meetings, lectures, videos, interviews, and streams where routing audio through a microphone is awkward or lossy.\n\nFor a user-facing overview, setup guide, and download path, visit the [AirTranslate Guide Site](https://himomohi.github.io/AirTranslate/).\n\nThe default workflow uses Apple frameworks. GPT-powered realtime models are optional and can be enabled from the app when you provide your own OpenAI API key.\n\n## Why AirTranslate\n\n- **System-audio first:** capture Mac playback audio directly with ScreenCaptureKit.\n- **Readable live workspace:** source and translated text stay side by side.\n- **Floating captions:** keep subtitles above other apps while you watch or listen.\n- **Apple by default:** Apple Speech and Apple Translation remain the baseline path.\n- **Optional GPT mode:** OpenAI Realtime transcription and translation can be enabled only when needed.\n- **Keychain storage:** OpenAI API keys are entered by the user and stored in macOS Keychain.\n- **Plain text history:** saved transcripts remain normal `.txt` files in Application Support.\n\n![AirTranslate demo](docs/assets/airtranslate-readme-demo.gif)\n\n> \"Turn any Mac audio into live captions and translation, right where you are watching.\"\n\n## Core Features\n\n- Live Mac system-audio capture\n- Apple Speech transcription\n- Apple Translation output\n- Transcribe Only mode with an original-only live workspace\n- Built-in, Bluetooth, and AirPods mic input support\n- GPT mode with OpenAI Realtime transcription and translation\n- Microphone input stability fixes for duplicate segments and noisy transitions\n- Apple basic-mode source-language auto-detect is temporarily disabled while language-switch handling is improved.\n- Realtime translation-only model path\n- One-click source/target language swap\n- Floating caption window\n- Transcript polish based on macOS spelling suggestions\n- Optional translated speech output\n- Saved transcript library with edit, delete, and folder access\n- English, Korean, Japanese, and Simplified Chinese interface selection based on the Mac language\n\n## Processing Modes\n\nAirTranslate separates the quick choice from the detailed setup.\n\n| Mode | Best For | Details |\n| --- | --- | --- |\n| Apple Mode | Local-first transcription and translation | Uses Apple Speech for transcription and Apple Translation for the selected language pair. Source-language auto-detect is temporarily disabled while language-switch handling is improved. |\n| GPT Mode | OpenAI Realtime transcription or translation | Enables GPT realtime models. If no API key is saved, AirTranslate opens the settings modal and focuses the API key field. |\n| Transcribe Only | Source captions without translation | Records source-language captions without running translation. |\n| Realtime Translation Only | Direct translated stream | Uses the realtime translation model path when you want the model to produce the translated stream directly. |\n\nGPT model details, API key entry, transcript polish, and voice output are managed from the gear-shaped settings modal. The main sidebar only exposes the most important choices.\n\n## Privacy And API Keys\n\nAirTranslate does not ship with a backend account system.\n\n- Apple Mode uses macOS frameworks and locally managed Apple language assets.\n- OpenAI calls happen only when GPT mode or OpenAI translation models are enabled.\n- OpenAI API keys are never hardcoded, committed, or included in release packages.\n- Keys are saved in macOS Keychain with `kSecAttrAccessibleAfterFirstUnlockThisDeviceOnly`.\n- Saved transcripts are plain text files on your Mac.\n\nNeed an API key? Open the [OpenAI API key page](https://platform.openai.com/api-keys), create a key, then paste it into AirTranslate's settings modal.\n\n## Apple Translation Language Packs\n\nApple Mode uses macOS-managed translation languages. Before using Apple Mode with a new language pair, download the needed Apple translation language packs:\n\n1. Open **System Settings**.\n2. Go to **General > Language & Region**.\n3. Click **Translation Languages**.\n4. Click **Download** for each source and target language you want to use.\n5. Optional: turn on **On-Device Mode** if you want macOS to process supported translations on your Mac whenever possible.\n\nIf a selected language pair is unavailable or not downloaded, Apple Mode translation may not start or may show an unavailable state until macOS has the required language assets.\n\n## Permissions\n\nAirTranslate asks for the permissions required by its capture and transcription flow.\n\n- Screen Recording\n- System Audio Recording\n- Speech Recognition\n\nScreen Recording is required because ScreenCaptureKit provides the system-audio capture path. AirTranslate does not save screen frames as recordings.\n\nAfter changing macOS privacy permissions, quit and relaunch the app so the signed app bundle receives the new authorization state.\n\n## Download\n\nDownload the latest open-source build from [GitHub Releases](https://github.com/himomohi/AirTranslate/releases/latest). The DMG is the easiest install path, and the ZIP remains available as the original lightweight option.\n\nAirTranslate remains fully open-source under the Apache-2.0 License. The DMG is provided only as a convenient macOS installer, while all source code, build scripts, release materials, LICENSE, and NOTICE files remain available in this repository.\n\n- [Download AirTranslate.dmg](https://github.com/himomohi/AirTranslate/releases/latest/download/AirTranslate.dmg)\n- [Download AirTranslate-1.3.4.zip](https://github.com/himomohi/AirTranslate/releases/latest/download/AirTranslate-1.3.4.zip)\n- [Download AirTranslate.dmg.sha256](https://github.com/himomohi/AirTranslate/releases/latest/download/AirTranslate.dmg.sha256)\n- [View version history](Release/VERSION-HISTORY.md)\n\n![AirTranslate install guide](docs/assets/airtranslate-install-guide.svg)\n\nThe open-source DMG and ZIP are ad-hoc signed builds for pre-notarization distribution. On the first launch, macOS may show an \"unidentified developer\" warning. To open the app:\n\n1. Open the DMG and drag `AirTranslate.app` to Applications.\n2. In Applications, Control-click or right-click `AirTranslate.app`.\n3. Choose **Open**, then choose **Open** again in the macOS warning dialog.\n\nYou can verify the DMG checksum after downloading:\n\n```bash\nshasum -a 256 AirTranslate.dmg\ncat AirTranslate.dmg.sha256\n```\n\nDeveloper ID signing and notarization are planned for a later distribution step.\n\n## Requirements\n\n- macOS 26.0 or later\n- Swift 6.2 or later\n- A Mac that supports system-audio capture\n- Apple Speech and Apple Translation framework availability\n- Optional: an OpenAI API key for GPT mode\n\n## Build From Source\n\nRun the app bundle:\n\n```bash\n./script/build_and_run.sh\n```\n\nBuild and verify launch:\n\n```bash\n./script/build_and_run.sh --verify\n```\n\nView logs:\n\n```bash\n./script/build_and_run.sh --logs\n```\n\nReset development permissions:\n\n```bash\n./script/build_and_run.sh --reset-permissions\n```\n\nSwiftPM checks:\n\n```bash\nswift build\nswift test\n```\n\n## Basic Usage\n\n1. Choose the source and target languages.\n2. Use the center swap button if you want to reverse the direction.\n3. Choose Apple Mode or GPT Mode.\n4. For GPT Mode, add your OpenAI API key in the settings modal if prompted.\n5. Press Start.\n6. Play meeting, lecture, video, interview, or stream audio on your Mac.\n7. Read the transcript and translation in the main workspace or floating caption window.\n8. Press Stop to save the current transcript.\n\n## Saved Transcripts\n\nSaved transcripts are stored as plain text files:\n\n```text\n~/Library/Application Support/AirTranslate/Transcripts/*.txt\n```\n\nWhen source and translation are saved together, AirTranslate writes separate `_original.txt` and `_translation.txt` files while presenting them as one grouped item in the library UI.\n\n## Project Map\n\n```text\nPackage.swift\nResources/\n  AppIcon.png\n  AppIcon.icns\nSources/AirTranslate/\n  App/\n  Models/\n  Services/\n  Support/\n  Views/\nSources/AirTranslateCore/\nTests/\nscript/\n  build_and_run.sh\ndocs/assets/\n  airtranslate-readme-hero.png\n```\n\n## Key Implementation Areas\n\n- `SystemAudioCapture`: captures Mac system audio through ScreenCaptureKit.\n- `LiveSpeechTranscriber`: streams speech recognition through Apple Speech.\n- `AppleTranslationService`: isolates Apple Translation work.\n- `OpenAIRealtimeTranscriber`: handles optional realtime transcription.\n- `OpenAITranslationService`: handles optional realtime translation requests.\n- `OpenAIAPIKeyStore`: saves the API key in macOS Keychain.\n- `TranslationSessionStore`: coordinates capture, transcript state, translation, saving, and playback.\n- `SidebarView`: language, mode, session, and settings entry points.\n- `CaptionBoardView`: live transcript, translation, controls, and audio meter.\n- `TranscriptLibraryView`: saved transcript management.\n- `FloatingCaptionWindowController`: floating subtitle window lifecycle.\n\n## License\n\nAirTranslate is released under the [Apache License 2.0](LICENSE). Copyright attribution is provided in [NOTICE](NOTICE).\n\nAirTranslate is an independent open-source project and is not affiliated with Apple or OpenAI.\n","summary":"AirTranslate is a macOS app that captures your Mac’s system audio, transcribes it live, and translates it in real time, optionally showing the translated text as floating captions on top of other apps. It primarily uses Apple Speech and Apple Translation for a local-first workflow, and also offers an optional GPT-based mode via OpenAI Realtime transcription/translation when you supply your own API key. With features like side-by-side source/translated text, source/target language swapping, transcript saving as editable plain text, and support for different mic input routes, it’s especially useful for meetings, lectures, videos, interviews, and livestreams where you’d rather not route audio through a microphone. It will benefit anyone who needs readable live subtitles and translation while watching or listening on the same machine.","description":"AirTranslate macOS app","stars":308,"language":"Swift"},{"owner":"Patdolitse","repo":"piia-engram","url":"https://github.com/Patdolitse/piia-engram","readme":"<!-- mcp-name: io.github.Patdolitse/piia-engram -->\n<div align=\"center\">\n\n<img src=\"assets/social_preview.png\" alt=\"piia-engram — persistent AI memory across tools\" width=\"640\">\n\n# piia-engram\n\n### Local identity and memory for MCP-compatible coding tools.\n\n### AI suggests lessons and decisions. You approve what becomes durable.\n\n**Tell AI once how you work. piia-engram stores your identity, standards, lessons, decisions, and project context as local files you own. Claude Code, Codex, Cursor, Windsurf, and MCP-compatible tools can start from the same approved context. No cloud account, no vendor lock-in, no hidden memory you cannot inspect.**\n\n`cross-tool memory` | `local-first` | `Claude Code` | `Codex` | `Cursor` | `Windsurf` | `MCP`\n\n[ENGLISH](README.md) | [中文](README.zh-CN.md)\n\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](LICENSE)\n[![Python 3.10+](https://img.shields.io/badge/Python-3.10%2B-blue.svg)](https://python.org)\n[![MCP Compatible](https://img.shields.io/badge/MCP-Compatible-purple.svg)](https://modelcontextprotocol.io)\n[![PyPI](https://img.shields.io/pypi/v/piia-engram)](https://pypi.org/project/piia-engram/)\n[![Downloads](https://img.shields.io/pypi/dm/piia-engram)](https://pypi.org/project/piia-engram/)\n\n**Listed in:**\n[![Official MCP Registry](https://img.shields.io/badge/listed_in-MCP_Registry-green?logo=modelcontextprotocol)](https://registry.modelcontextprotocol.io)\n[![awesome-mcp-servers](https://img.shields.io/badge/listed_in-awesome--mcp--servers-orange?logo=awesome-lists)](https://github.com/punkpeye/awesome-mcp-servers)\n[![awesome-agents](https://img.shields.io/badge/listed_in-awesome--agents-orange?logo=awesome-lists)](https://github.com/kyrolabs/awesome-agents)\n[![Awesome-MCP-ZH](https://img.shields.io/badge/listed_in-Awesome--MCP--ZH-orange?logo=awesome-lists)](https://github.com/yzfly/Awesome-MCP-ZH)\n\n[![piia-engram MCP server]
