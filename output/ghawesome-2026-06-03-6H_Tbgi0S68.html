\n    support_advice: str = Field(description='Advice returned to the customer')\n    block_card: bool = Field(description=\"Whether to block the customer's card\")\n    risk: int = Field(description='Risk level of query', ge=0, le=10)\n\n\n# This agent will act as first-tier support in a bank.\n# Agents are generic in the type of dependencies they accept and the type of output they return.\n# In this case, the support agent has type `Agent[SupportDependencies, SupportOutput]`.\nsupport_agent = Agent(\n    'openai:gpt-5.2',\n    deps_type=SupportDependencies,\n    # The response from the agent will be guaranteed to be a SupportOutput,\n    # if validation fails the agent is prompted to try again.\n    output_type=SupportOutput,\n    instructions=(\n        'You are a support agent in our bank, give the '\n        'customer support and judge the risk level of their query.'\n    ),\n)\n\n\n# Dynamic instructions can make use of dependency injection.\n# Dependencies are carried via the `RunContext` argument, which is parameterized with the `deps_type` from above.\n# If the type annotation here is wrong, static type checkers will catch it.\n@support_agent.instructions\nasync def add_customer_name(ctx: RunContext[SupportDependencies]) -> str:\n    customer_name = await ctx.deps.db.customer_name(id=ctx.deps.customer_id)\n    return f\"The customer's name is {customer_name!r}\"\n\n\n# The `tool` decorator let you register functions which the LLM may call while responding to a user.\n# Again, dependencies are carried via `RunContext`, any other arguments become the tool schema passed to the LLM.\n# Pydantic is used to validate these arguments, and errors are passed back to the LLM so it can retry.\n@support_agent.tool\nasync def customer_balance(\n        ctx: RunContext[SupportDependencies], include_pending: bool\n) -> float:\n    \"\"\"Returns the customer's current account balance.\"\"\"\n    # The docstring of a tool is also passed to the LLM as the description of the tool.\n    # Parameter descriptions are extracted from the docstring and added to the parameter schema sent to the LLM.\n    balance = await ctx.deps.db.customer_balance(\n        id=ctx.deps.customer_id,\n        include_pending=include_pending,\n    )\n    return balance\n\n\n...  # In a real use case, you'd add more tools and a longer system prompt\n\n\nasync def main():\n    deps = SupportDependencies(customer_id=123, db=DatabaseConn())\n    # Run the agent asynchronously, conducting a conversation with the LLM until a final response is reached.\n    # Even in this fairly simple case, the agent will exchange multiple messages with the LLM as tools are called to retrieve an output.\n    result = await support_agent.run('What is my balance?', deps=deps)\n    # The `result.output` will be validated with Pydantic to guarantee it is a `SupportOutput`. Since the agent is generic,\n    # it'll also be typed as a `SupportOutput` to aid with static type checking.\n    print(result.output)\n    \"\"\"\n    support_advice='Hello John, your current account balance, including pending transactions, is $123.45.' block_card=False risk=1\n    \"\"\"\n\n    result = await support_agent.run('I just lost my card!', deps=deps)\n    print(result.output)\n    \"\"\"\n    support_advice=\"I'm sorry to hear that, John. We are temporarily blocking your card to prevent unauthorized transactions.\" block_card=True risk=8\n    \"\"\"\n```\n\n## Next Steps\n\nTo try Pydantic AI for yourself, [install it](https://ai.pydantic.dev/install) and follow the instructions [in the examples](https://ai.pydantic.dev/examples/setup).\n\nRead the [docs](https://ai.pydantic.dev/agents/) to learn more about building applications with Pydantic AI.\n\nRead the [API Reference](https://ai.pydantic.dev/api/agent/) to understand Pydantic AI's interface.\n\nJoin [Slack](https://logfire.pydantic.dev/docs/join-slack/) or file an issue on [GitHub](https://github.com/pydantic/pydantic-ai/issues) if you have any questions.\n","summary":"Pydantic AI is a Python framework designed to streamline the development of production-grade Generative AI applications and agents by leveraging Pydantic's robust validation and modern type hinting. It offers a model-agnostic architecture that supports a vast array of providers, along with seamless integration with observability tools like Pydantic Logfire for real-time debugging and performance tracking. This framework is ideal for developers who want to build reliable, type-safe AI workflows with an ergonomic experience similar to FastAPI.","description":"AI Agent Framework, the Pydantic way","stars":17489,"language":"Python"},{"owner":"strapi","repo":"strapi","url":"https://github.com/strapi/strapi","readme":"<p align=\"center\">\n  <a href=\"https://strapi.io/#gh-light-mode-only\">\n    <img src=\"https://strapi.io/assets/strapi-logo-dark.svg\" width=\"318px\" alt=\"Strapi logo\" />\n  </a>\n  <a href=\"https://strapi.io/#gh-dark-mode-only\">\n    <img src=\"https://strapi.io/assets/strapi-logo-light.svg\" width=\"318px\" alt=\"Strapi logo\" />\n  </a>\n</p>\n\n<h3 align=\"center\">Open-source headless CMS, self-hosted or Cloud you're in control.</h3>\n<p align=\"center\">The leading open-source headless CMS, 100% JavaScript/TypeScript, flexible and fully customizable.</p>\n<p align=\"center\"><a href=\"https://docs.strapi.io\">Docs</a> · <a href=\"https://strapi.io/cloud\">Strapi Cloud</a> · <a href=\"https://feedback.strapi.io\">Roadmap</a> · <a href=\"https://discord.strapi.io\">Discord</a> · <a href=\"https://github.com/strapi/strapi/discussions\">Discussions</a></p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.org/package/@strapi/strapi\">\n    <img src=\"https://img.shields.io/npm/v/@strapi/strapi/latest.svg\" alt=\"NPM Version\" />\n  </a>\n  <a href=\"https://github.com/strapi/strapi/actions/workflows/tests.yml\">\n    <img src=\"https://github.com/strapi/strapi/actions/workflows/tests.yml/badge.svg?branch=main\" alt=\"Tests\" />\n  </a>\n  <a href=\"https://discord.strapi.io\">\n    <img src=\"https://img.shields.io/discord/811989166782021633?label=Discord\" alt=\"Strapi on Discord\" />\n  </a>\n  <a href=\"https://github.com/strapi/strapi/actions/workflows/nightly.yml\">\n    <img src=\"https://github.com/strapi/strapi/actions/workflows/nightly.yml/badge.svg\" alt=\"Strapi Nightly Release Build Status\" />\n  </a>\n</p>\n\n<br>\n\nStrapi is an open-source, self-hosted headless CMS that lets developers build content APIs fast while giving content creators a friendly editing interface. Define your content models and Strapi generates a full API, ready to consume from any frontend, mobile app, or IoT device.\n\n- Design content structures visually with the [**Content-Type Builder**](https://docs.strapi.io/cms/features/content-type-builder), no code required\n- Auto-generated [**REST**](https://docs.strapi.io/cms/api/rest) & [**GraphQL**](https://docs.strapi.io/cms/plugins/graphql) APIs for every content type\n- Granular [**Roles & Permissions**](https://docs.strapi.io/cms/features/users-permissions) out of the box\n- Built-in [**Media Library**](https://docs.strapi.io/cms/features/media-library), [**Internationalization (i18n)**](https://docs.strapi.io/cms/features/internationalization), and [**Draft & Publish**](https://docs.strapi.io/cms/features/draft-and-publish)\n- First-class **TypeScript** support with flexible database options (SQLite, PostgreSQL, MySQL, MariaDB)\n- Extensible [**plugin system**](https://docs.strapi.io/cms/plugins-development/developing-plugins) and customizable admin dashboard\n\n> Explore all features at **[strapi.io/features](https://strapi.io/features)**\n\n> **Strapi AI** — Automate content modeling, media alt text, and translations with Strapi's built-in AI layer. [Learn more](https://strapi.io/ai)\n\n### How Strapi handles requests\n\nEvery incoming request flows through a layered backend architecture: **Routes → Middlewares → Controllers → Services**.\n\n<p align=\"center\">\n  <img src=\"https://docs.strapi.io/img/assets/backend-customization/diagram-routes.png\" alt=\"Strapi backend request flow: Routes, Middlewares, Controllers, and Services\" />\n</p>\n\n> Learn more about backend customization in the [official docs](https://docs.strapi.io/cms/backend-customization).\n\n## Getting Started\n\n<a href=\"https://docs.strapi.io/developer-docs/latest/getting-started/quick-start.html\" target=\"_blank\">Read the Getting Started tutorial</a> or follow the steps below:\n\n### ⏳ Installation\n\nUse the **Quickstart** command below to create a new Strapi project instantly:\n\n```bash\nnpx create-strapi@latest my-project\n```\n\nThis command generates a brand new project with the default features (authentication, permissions, content management, content type builder & file upload).\n\n> Full installation options (including TypeScript, `--quickstart`, etc.) in the **[CLI installation docs](https://docs.strapi.io/cms/installation/cli#creating-a-strapi-project)**\n\n### Requirements\n\n> Hardware & software requirements (OS, Node.js, databases) at **[Requirements docs](https://docs.strapi.io/cms/deployment#hardware-and-software-requirements)**\n\n## Docker\n\nStrapi doesn't ship official Docker images, so you build your own from your project. The fastest way to get started is with the community CLI tool:\n\n```bash\nnpx @strapi-community/dockerize@latest\n```\n\nThis generates a `Dockerfile` and `docker-compose.yml` tailored to your project. See the [strapi-tool-dockerize](https://github.com/strapi-community/strapi-tool-dockerize) repo for more details.\n\n> Dockerfiles, Docker Compose examples, production builds at **[Docker installation docs](https://docs.strapi.io/cms/installation/docker)**\n\n## Deploy to Strapi Cloud\n\nThe fastest way to go from local to production. Strapi Cloud is the official managed hosting platform with zero DevOps, a built-in database, media library, and CDN.\n\n> [**Deploy now**](https://cloud.strapi.io)\n\n## LaunchPad\n\nThe official demo template combining Strapi with Next.js to get you started quickly.\n\n> [**LaunchPad template**](https://github.com/strapi/LaunchPad)\n\n### Try live demo\n\nSee for yourself what's under the hood by getting access to a [hosted Strapi project](https://strapi.io/demo) with sample data — [try it live](https://strapi.io/demo) or [pull locally](https://github.com/strapi/LaunchPad).\n\n## Repositories\n\n| Repository                                                          | Description                                   |\n| ------------------------------------------------------------------- | --------------------------------------------- |\n| [**strapi/strapi**](https://github.com/strapi/strapi)               | Core monorepo, the CMS itself                 |\n| [**strapi/design-system**](https://github.com/strapi/design-system) | Strapi Design System, React component library |\n| [**strapi/LaunchPad**](https://github.com/strapi/LaunchPad)         | Demo app: Strapi + Next.js                    |\n\n## Contributing & Community\n\nStrapi is community-built and open source. For help, feedback, or to get involved:\n\n- **[Discord](https://discord.strapi.io)**: Live discussion with the community and Strapi team\n- **[GitHub Discussions](https://github.com/strapi/strapi/discussions)**: Ask questions, share projects, get feedback\n- **[GitHub](https://github.com/strapi/strapi)**: Bug reports and contributions\n- **[Contributing Guide](https://contributor.strapi.io/)**: How to contribute code, docs, and translations\n- **[Community Content](https://github.com/strapi/community-content)**: Showcase, tutorials, starters, and templates\n- **[Feedback](https://feedback.strapi.io)**: Roadmap and feature requests\n- **[Twitter](https://twitter.com/strapijs)**: Get the news fast\n- **[YouTube Channel](https://www.youtube.com/strapi)**: Learn from video tutorials\n\nFor general help, refer to the [official Strapi documentation](https://docs.strapi.io). New to open source? Check out [How to Contribute to Open Source](https://opensource.guide/).\n\n## Migration\n\nFollow our [migration guides](https://docs.strapi.io/developer-docs/latest/update-migration-guides/migration-guides.html) on the documentation to keep your projects up-to-date.\n\n## Roadmap\n\nCheck out our [roadmap](https://feedback.strapi.io) to get informed of the latest features released and the upcoming ones. You may also give us insights and vote for a specific feature.\n\n## Documentation\n\nSee our dedicated [repository](https://github.com/strapi/documentation) for the Strapi documentation, or view our documentation live:\n\n- [CMS docs](https://docs.strapi.io/cms/intro)\n- [Cloud docs](https://docs.strapi.io/cloud/intro)\n\n## Security\n\nIf you discover a security issue, please report it responsibly. See our [Security Policy](https://github.com/strapi/strapi/blob/main/SECURITY.md) for our disclosure process and contact info.\n\n## About Strapi\n\n- **[Company Handbook](https://handbook.strapi.io)**: Our values, how we work, and more\n- **[About Us](https://strapi.io/about-us)**: The story of Strapi\n\n[Contact us](https://strapi.io/contact)\n\n## Support Strapi\n\nIf Strapi is useful to you, give us a star. It helps more than you think!\n\n## Thanks to All Contributors\n\nThank you to everyone who has contributed code, reported issues, and helped shape Strapi.\n\n[![Strapi contributors](https://contrib.rocks/image?repo=strapi/strapi&max=400&columns=20)](https://github.com/strapi/strapi/graphs/contributors)\n\n## License\n\nSee the [LICENSE](./LICENSE) file for licensing information.\n\n---\n\n[Website](https://strapi.io) · [Docs](https://docs.strapi.io) · [Blog](https://strapi.io/blog) · [Twitter](https://twitter.com/strapijs) · [LinkedIn](https://www.linkedin.com/company/strapi/)\n","summary":"Strapi is a leading open-source, self-hosted headless CMS built with JavaScript and TypeScript that streamlines the creation of content-driven applications. It automatically generates REST and GraphQL APIs based on custom content models while providing a user-friendly admin panel for non-technical content management. With built-in support for internationalization, media handling, and role-based permissions, the platform is ideal for developers looking for a flexible, highly customizable backend that integrates seamlessly with any frontend framework.","description":"🚀 Strapi is the leading open-source headless CMS. It’s 100% JavaScript/TypeScript, fully customizable, and developer-first.","stars":72300,"language":"TypeScript"},{"owner":"hyprwm","repo":"Hyprland","url":"https://github.com/hyprwm/Hyprland","readme":"<div align = center>\n\n<img src=\"https://raw.githubusercontent.com/hyprwm/Hyprland/main/assets/header.svg\" width=\"750\" height=\"300\" alt=\"banner\">\n\n<br>\n\n[![Badge Workflow]][Workflow]\n[![Badge License]][License] \n![Badge Language] \n[![Badge Pull Requests]][Pull Requests] \n[![Badge Issues]][Issues] \n![Badge Hi Mom]<br>\n\n<br>\n\nHyprland is a 100% independent, dynamic tiling Wayland compositor that doesn't sacrifice on its looks.\n\nIt provides the latest Wayland features, is highly customizable, has all the eyecandy, the most powerful plugins,\neasy IPC, much more QoL stuff than other compositors and more...\n<br>\n<br>\n\n---\n\n**[<kbd> <br> Install <br> </kbd>][Install]** \n**[<kbd> <br> Quick Start <br> </kbd>][Quick Start]** \n**[<kbd> <br> Configure <br> </kbd>][Configure]** \n**[<kbd> <br> Contribute <br> </kbd>][Contribute]**\n\n---\n\n<br>\n\n</div>\n\n# Features\n\n- All of the eyecandy: gradient borders, blur, animations, shadows and much more\n- A lot of customization\n- 100% independent, no wlroots, no libweston, no kwin, no mutter.\n- Custom bezier curves for the best animations\n- Powerful plugin support\n- Built-in plugin manager\n- Tearing support for better gaming performance\n- Easily expandable and readable codebase\n- Fast and active development\n- Not afraid to provide bleeding-edge features\n- Config reloaded instantly upon saving\n- Fully dynamic workspaces\n- Two built-in layouts and more available as plugins\n- Global keybinds passed to your apps of choice\n- Tiling/pseudotiling/floating/fullscreen windows\n- Special workspaces (scratchpads)\n- Window groups (tabbed mode)\n- Powerful window/monitor/layer rules\n- Socket-based IPC\n- Native IME and Input Panels Support\n- and much more...\n\n<br>\n<br>\n\n<div align = center>\n\n# Gallery\n\n<br>\n\n![Preview A]\n\n<br>\n\n![Preview B]\n\n<br>\n\n![Preview C]\n\n<br>\n<br>\n\n</div>\n\n# Special Thanks\n\n<br>\n\n**[wlroots]** - *For powering Hyprland in the past*\n\n**[tinywl]** - *For showing how 2 do stuff*\n\n**[Sway]** - *For showing how 2 do stuff the overkill way*\n\n**[Vivarium]** - *For showing how 2 do stuff the simple way*\n\n**[dwl]** - *For showing how 2 do stuff the hacky way*\n\n**[Wayfire]** - *For showing how 2 do some graphics stuff*\n\n\n<!----------------------------------------------------------------------------->\n\n[Configure]: https://wiki.hypr.land/Configuring/\n[Stars]: https://starchart.cc/hyprwm/Hyprland\n[Hypr]: https://github.com/hyprwm/Hypr\n\n[Pull Requests]: https://github.com/hyprwm/Hyprland/pulls\n[Issues]: https://github.com/hyprwm/Hyprland/issues\n[Todo]: https://github.com/hyprwm/Hyprland/projects?type=beta\n\n[Contribute]: https://wiki.hypr.land/Contributing-and-Debugging/\n[Install]: https://wiki.hypr.land/Getting-Started/Installation/\n[Quick Start]: https://wiki.hypr.land/Getting-Started/Master-Tutorial/\n[Workflow]: https://github.com/hyprwm/Hyprland/actions/workflows/ci.yaml\n[License]: LICENSE\n\n\n<!----------------------------------{ Thanks }--------------------------------->\n\n[Vivarium]: https://github.com/inclement/vivarium\n[WlRoots]: https://gitlab.freedesktop.org/wlroots/wlroots\n[Wayfire]: https://github.com/WayfireWM/wayfire\n[TinyWl]: https://gitlab.freedesktop.org/wlroots/wlroots/-/blob/master/tinywl/tinywl.c\n[Sway]: https://github.com/swaywm/sway\n[DWL]: https://codeberg.org/dwl/dwl\n\n<!----------------------------------{ Images }--------------------------------->\n\n[Preview A]: https://i.ibb.co/XxFY75Mk/greerggergerhtrytghjnyhjn.png\n[Preview B]: https://i.ibb.co/C1yTb0r/falf.png\n[Preview C]: https://i.ibb.co/2Yc4q835/hyprland-preview-b.png\n\n\n<!----------------------------------{ Badges }--------------------------------->\n\n[Badge Workflow]: https://github.com/hyprwm/Hyprland/actions/workflows/ci.yaml/badge.svg\n\n[Badge Issues]: https://img.shields.io/github/issues/hyprwm/Hyprland\n[Badge Pull Requests]: https://img.shields.io/github/issues-pr/hyprwm/Hyprland\n[Badge Language]: https://img.shields.io/github/languages/top/hyprwm/Hyprland\n[Badge License]: https://img.shields.io/github/license/hyprwm/Hyprland\n[Badge Lines]: https://img.shields.io/tokei/lines/github/hyprwm/Hyprland\n[Badge Hi Mom]: https://img.shields.io/badge/Hi-mom!-ff69b4\n","summary":"Hyprland is a high-performance, independent dynamic tiling Wayland compositor that balances advanced functionality with highly aesthetic visual effects. It offers extensive customization through features like custom bezier animations, built-in plugin support, and seamless window management, all while maintaining active, bleeding-edge development. This project is ideal for Linux power users and enthusiasts who prioritize a visually stunning desktop experience, efficient window workflows, and a modern, highly configurable Wayland environment.","description":"Hyprland is an independent, highly customizable, dynamic tiling Wayland compositor that doesn't sacrifice on its looks.","stars":36192,"language":"C++"},{"owner":"microsoft","repo":"markitdown","url":"https://github.com/microsoft/markitdown","readme":"# MarkItDown\n\n[![PyPI](https://img.shields.io/pypi/v/markitdown.svg)](https://pypi.org/project/markitdown/)\n![PyPI - Downloads](https://img.shields.io/pypi/dd/markitdown)\n[![Built by AutoGen Team](https://img.shields.io/badge/Built%20by-AutoGen%20Team-blue)](https://github.com/microsoft/autogen)\n\n> [!IMPORTANT]\n> MarkItDown performs I/O with the privileges of the current process. Like open() or requests.get(), it will access resources that the process itself can access. Sanitize your inputs in untrusted environments, and call the narrowest `convert_*` function needed for your use case (e.g., `convert_stream()`, or `convert_local()`). See the [Security Considerations](#security-considerations) section of the documentation for more information.\n\nMarkItDown is a lightweight Python utility for converting various files to Markdown for use with LLMs and related text analysis pipelines. To this end, it is most comparable to [textract](https://github.com/deanmalmgren/textract), but with a focus on preserving important document structure and content as Markdown (including: headings, lists, tables, links, etc.) While the output is often reasonably presentable and human-friendly, it is meant to be consumed by text analysis tools -- and may not be the best option for high-fidelity document conversions for human consumption.\n\nMarkItDown currently supports the conversion from:\n\n- PDF\n- PowerPoint\n- Word\n- Excel\n- Images (EXIF metadata and OCR)\n- Audio (EXIF metadata and speech transcription)\n- HTML\n- Text-based formats (CSV, JSON, XML)\n- ZIP files (iterates over contents)\n- Youtube URLs\n- EPubs\n- ... and more!\n\n## Why Markdown?\n\nMarkdown is extremely close to plain text, with minimal markup or formatting, but still\nprovides a way to represent important document structure. Mainstream LLMs, such as\nOpenAI's GPT-4o, natively \"_speak_\" Markdown, and often incorporate Markdown into their\nresponses unprompted. This suggests that they have been trained on vast amounts of\nMarkdown-formatted text, and understand it well. As a side benefit, Markdown conventions\nare also highly token-efficient.\n\n## Prerequisites\nMarkItDown requires Python 3.10 or higher. It is recommended to use a virtual environment to avoid dependency conflicts.\n\nWith the standard Python installation, you can create and activate a virtual environment using the following commands:\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate\n```\n\nIf using `uv`, you can create a virtual environment with:\n\n```bash\nuv venv --python=3.12 .venv\nsource .venv/bin/activate\n# NOTE: Be sure to use 'uv pip install' rather than just 'pip install' to install packages in this virtual environment\n```\n\nIf you are using Anaconda, you can create a virtual environment with:\n\n```bash\nconda create -n markitdown python=3.12\nconda activate markitdown\n```\n\n## Installation\n\nTo install MarkItDown, use pip: `pip install 'markitdown[all]'`. Alternatively, you can install it from the source:\n\n```bash\ngit clone git@github.com:microsoft/markitdown.git\ncd markitdown\npip install -e 'packages/markitdown[all]'\n```\n\n## Usage\n\n### Command-Line\n\n```bash\nmarkitdown path-to-file.pdf > document.md\n```\n\nOr use `-o` to specify the output file:\n\n```bash\nmarkitdown path-to-file.pdf -o document.md\n```\n\nYou can also pipe content:\n\n```bash\ncat path-to-file.pdf | markitdown\n```\n\n### Optional Dependencies\nMarkItDown has optional dependencies for activating various file formats. Earlier in this document, we installed all optional dependencies with the `[all]` option. However, you can also install them individually for more control. For example:\n\n```bash\npip install 'markitdown[pdf, docx, pptx]'\n```\n\nwill install only the dependencies for PDF, DOCX, and PPTX files.\n\nAt the moment, the following optional dependencies are available:\n\n* `[all]` Installs all optional dependencies\n* `[pptx]` Installs dependencies for PowerPoint files\n* `[docx]` Installs dependencies for Word files\n* `[xlsx]` Installs dependencies for Excel files\n* `[xls]` Installs dependencies for older Excel files\n* `[pdf]` Installs dependencies for PDF files\n* `[outlook]` Installs dependencies for Outlook messages\n* `[az-doc-intel]` Installs dependencies for Azure Document Intelligence\n* `[az-content-understanding]` Installs dependencies for Azure Content Understanding\n* `[audio-transcription]` Installs dependencies for audio transcription of wav and mp3 files\n* `[youtube-transcription]` Installs dependencies for fetching YouTube video transcription\n\n### Plugins\n\nMarkItDown also supports 3rd-party plugins. Plugins are disabled by default. To list installed plugins:\n\n```bash\nmarkitdown --list-plugins\n```\n\nTo enable plugins use:\n\n```bash\nmarkitdown --use-plugins path-to-file.pdf\n```\n\nTo find available plugins, search GitHub for the hashtag `#markitdown-plugin`. To develop a plugin, see `packages/markitdown-sample-plugin`.\n\n#### markitdown-ocr Plugin\n\nThe `markitdown-ocr` plugin adds OCR support to PDF, DOCX, PPTX, and XLSX converters, extracting text from embedded images using LLM Vision — the same `llm_client` / `llm_model` pattern that MarkItDown already uses for image descriptions. No new ML libraries or binary dependencies required.\n\n**Installation:**\n\n```bash\npip install markitdown-ocr\npip install openai  # or any OpenAI-compatible client\n```\n\n**Usage:**\n\nPass the same `llm_client` and `llm_model` you would use for image descriptions:\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import OpenAI\n\nmd = MarkItDown(\n    enable_plugins=True,\n    llm_client=OpenAI(),\n    llm_model=\"gpt-4o\",\n)\nresult = md.convert(\"document_with_images.pdf\")\nprint(result.text_content)\n```\n\nIf no `llm_client` is provided the plugin still loads, but OCR is silently skipped and the standard built-in converter is used instead.\n\nSee [`packages/markitdown-ocr/README.md`](packages/markitdown-ocr/README.md) for detailed documentation.\n\n### Azure Content Understanding\n\n[Azure Content Understanding](https://learn.microsoft.com/azure/ai-services/content-understanding/) provides higher-quality conversion with structured field extraction (YAML front matter), multi-modal support (documents, images, audio, video), and configurable analyzers.\n\nInstall: `pip install 'markitdown[az-content-understanding]'`\n\n#### When to use Content Understanding\n\nContent Understanding is ideal when you need capabilities beyond what built-in or Document Intelligence converters provide:\n\n- **Audio and video files** — CU is the only option for video, and the higher-quality cloud option for audio. Built-in converters have no video support and only basic audio transcription.\n- **Structured field extraction** — [Prebuilt](https://learn.microsoft.com/azure/ai-services/content-understanding/concepts/prebuilt-analyzers) or [custom-built](https://learn.microsoft.com/azure/ai-services/content-understanding/how-to/customize-analyzer-content-understanding-studio?tabs=portal) analyzers extract domain-specific fields (invoice amounts, receipt dates, contract clauses) serialized as YAML front matter. Neither built-in nor Doc Intel integration exposes fields.\n- **Higher-quality document extraction** — Cloud-based layout analysis and OCR for scanned PDFs, complex tables, and multi-page documents.\n- **Single API for all modalities** — One `cu_endpoint` handles documents, images, audio, and video with automatic analyzer routing.\n\n| Capability | Built-in converters | Azure Document Intelligence | Azure Content Understanding |\n|------------|---------------------|-----------------------------|-----------------------------|\n| Document conversion | Offline, format-specific extraction | Cloud layout extraction | Cloud multimodal extraction |\n| Structured fields | Not available | Not exposed by this integration | YAML front matter from analyzer fields |\n| Custom analyzers | Not available | Not configurable in this integration | Supported with `cu_analyzer_id` |\n| Audio and video | Basic audio, no video | Not supported | Audio and video analyzers |\n| Cost | Local compute only | Billable Azure API calls | Billable Azure API calls |\n\n**CLI:**\n\n```bash\nmarkitdown path-to-file.pdf --use-cu --cu-endpoint \"<content_understanding_endpoint>\"\n```\n\n**Python API:**\n\n```python\nfrom markitdown import MarkItDown\n\n# Zero-config — auto-selects analyzer per file type\nmd = MarkItDown(cu_endpoint=\"<content_understanding_endpoint>\")\nresult = md.convert(\"report.pdf\")   # documents → prebuilt-documentSearch\nresult = md.convert(\"meeting.mp4\")  # video → prebuilt-videoSearch\nresult = md.convert(\"call.wav\")     # audio → prebuilt-audioSearch\nprint(result.markdown)\n```\n\n**With a custom analyzer** (for domain-specific field extraction):\n\n```python\nmd = MarkItDown(\n    cu_endpoint=\"<content_understanding_endpoint>\",\n    cu_analyzer_id=\"my-invoice-analyzer\",\n)\nresult = md.convert(\"invoice.pdf\")\nprint(result.markdown)\n# Output includes YAML front matter with extracted fields:\n# ---\n# contentType: document\n# fields:\n#   VendorName: CONTOSO LTD.\n#   InvoiceDate: '2019-11-15'\n# ---\n# <!-- page 1 -->\n# ...\n```\n\nWhen `cu_analyzer_id` is set, the converter automatically scopes it to compatible file types based on the analyzer's modality. Incompatible types (e.g., audio files with a document analyzer) auto-route to default prebuilt analyzers.\n\n**Cost note:** Each `convert()` call for a CU-routed format is a billable Azure API call. Use `cu_file_types` to restrict which formats route to CU:\n\n```python\nfrom markitdown.converters import ContentUnderstandingFileType\n\nmd = MarkItDown(\n    cu_endpoint=\"<content_understanding_endpoint>\",\n    cu_file_types=[ContentUnderstandingFileType.PDF],  # only PDFs use CU\n)\n```\n\nMore information about Azure Content Understanding can be found [here](https://learn.microsoft.com/azure/ai-services/content-understanding/).\n\n### Azure Document Intelligence\n\nTo use Microsoft Document Intelligence for conversion:\n\n```bash\nmarkitdown path-to-file.pdf -o document.md -d -e \"<document_intelligence_endpoint>\"\n```\n\nMore information about how to set up an Azure Document Intelligence Resource can be found [here](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/how-to-guides/create-document-intelligence-resource?view=doc-intel-4.0.0)\n\n### Python API\n\nBasic usage in Python:\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown(enable_plugins=False) # Set to True to enable plugins\nresult = md.convert(\"test.xlsx\")\nprint(result.text_content)\n```\n\nDocument Intelligence conversion in Python:\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown(docintel_endpoint=\"<document_intelligence_endpoint>\")\nresult = md.convert(\"test.pdf\")\nprint(result.text_content)\n```\n\nTo use Large Language Models for image descriptions (currently only for pptx and image files), provide `llm_client` and `llm_model`:\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import OpenAI\n\nclient = OpenAI()\nmd = MarkItDown(llm_client=client, llm_model=\"gpt-4o\", llm_prompt=\"optional custom prompt\")\nresult = md.convert(\"example.jpg\")\nprint(result.text_content)\n```\n\n### Docker\n\n```sh\ndocker build -t markitdown:latest .\ndocker run --rm -i markitdown:latest < ~/your-file.pdf > output.md\n```\n\n## Contributing\n\nThis project welcomes contributions and suggestions. Most contributions require you to agree to a\nContributor License Agreement (CLA) declaring that you have the right to, and actually do, grant us\nthe rights to use your contribution. For details, visit https://cla.opensource.microsoft.com.\n\nWhen you submit a pull request, a CLA bot will automatically determine whether you need to provide\na CLA and decorate the PR appropriately (e.g., status check, comment). Simply follow the instructions\nprovided by the bot. You will only need to do this once across all repos using our CLA.\n\nThis project has adopted the [Microsoft Open Source Code of Conduct](https://opensource.microsoft.com/codeofconduct/).\nFor more information see the [Code of Conduct FAQ](https://opensource.microsoft.com/codeofconduct/faq/) or\ncontact [opencode@microsoft.com](mailto:opencode@microsoft.com) with any additional questions or comments.\n\n### How to Contribute\n\nYou can help by looking at issues or helping review PRs. Any issue or PR is welcome, but we have also marked some as 'open for contribution' and 'open for reviewing' to help facilitate community contributions. These are of course just suggestions and you are welcome to contribute in any way you like.\n\n<div align=\"center\">\n\n|            | All                                                          | Especially Needs Help from Community                                                                                                      |\n| ---------- | ------------------------------------------------------------ | ----------------------------------------------------------------------------------------------------------------------------------------- |\n| **Issues** | [All Issues](https://github.com/microsoft/markitdown/issues) | [Issues open for contribution](https://github.com/microsoft/markitdown/issues?q=is%3Aissue+is%3Aopen+label%3A%22open+for+contribution%22) |\n| **PRs**    | [All PRs](https://github.com/microsoft/markitdown/pulls)     | [PRs open for reviewing](https://github.com/microsoft/markitdown/pulls?q=is%3Apr+is%3Aopen+label%3A%22open+for+reviewing%22)              |\n\n</div>\n\n### Running Tests and Checks\n\n- Navigate to the MarkItDown package:\n\n  ```sh\n  cd packages/markitdown\n  ```\n\n- Install `hatch` in your environment and run tests:\n\n  ```sh\n  pip install hatch  # Other ways of installing hatch: https://hatch.pypa.io/dev/install/\n  hatch shell\n  hatch test\n  ```\n\n  (Alternative) Use the Devcontainer which has all the dependencies installed:\n\n  ```sh\n  # Reopen the project in Devcontainer and run:\n  hatch test\n  ```\n\n- Run pre-commit checks before submitting a PR: `pre-commit run --all-files`\n\n### Security Considerations\n\nMarkItDown performs I/O with the privileges of the current process. Like `open()` or `requests.get()`, it will access resources that the process itself can access. \n\n**Sanitize your inputs:** Do not pass untrusted input directly to MarkItDown. If any part of the input may be controlled by an untrusted user or system, such as in hosted or server-side applications, it must be validated and restricted before calling MarkItDown. Depending on your environment, this may include restricting file paths, limiting URI schemes and network destinations, and blocking access to private, loopback, link-local, or metadata-service addresses. \n\n**Call only the conversion method you need:** Prefer the narrowest conversion API that fits your use case. MarkItDown's `convert()` method is intentionally permissive and can handle local files, remote URIs, and byte streams. If your application only needs to read local files, call `convert_local()` instead. If you need more control over URI fetching, call `requests.get()` yourself and pass the response object to `convert_response()`. For maximum control, open a stream to the input you want converted and call `convert_stream()`.\n\n### Contributing 3rd-party Plugins\n\nYou can also contribute by creating and sharing 3rd party plugins. See `packages/markitdown-sample-plugin` for more details.\n\n## Trademarks\n\nThis project may contain trademarks or logos for projects, products, or services. Authorized use of Microsoft\ntrademarks or logos is subject to and must follow\n[Microsoft's Trademark & Brand Guidelines](https://www.microsoft.com/en-us/legal/intellectualproperty/trademarks/usage/general).\nUse of Microsoft trademarks or logos in modified versions of this project must not cause confusion or imply Microsoft sponsorship.\nAny use of third-party trademarks or logos are subject to those third-party's policies.\n","summary":"MarkItDown is a lightweight Python utility designed to convert a wide variety of file formats, including PDFs, Office documents, images, and audio files, into structured Markdown. By transforming diverse data into a token-efficient and LLM-friendly format, the tool ensures that essential document structures like headings, tables, and lists are preserved for downstream text analysis. This project is ideal for developers building AI pipelines who need to reliably ingest and process mixed-media source materials for large language models.","description":"Python tool for converting files and office documents to Markdown.","stars":142575,"language":"Python"},{"owner":"remoteintech","repo":"remote-jobs","url":"https://github.com/remoteintech/remote-jobs","readme":"# Remote In Tech\n\n**[remoteintech.company](https://remoteintech.company)** — A community-maintained directory of remote-friendly tech companies.\n\n> This repository is the source code for the site. To browse the directory, visit **[remoteintech.company](https://remoteintech.company)**.\n\n## Contributing a Company\n\nWe welcome contributions! See [`CONTRIBUTING.md`](CONTRIBUTING.md) for the frontmatter template, valid field values, required sections, and what the validation bot checks.\n\nIn short: create `src/companies/{slug}.md`, fill in the frontmatter, run `npm run build`, and open a PR. The bot will comment with any issues to fix.\n\n## Development\n\n```bash\nnpm install         # Install dependencies\nnpm run start       # Dev server with hot reload\nnpm run build       # Production build\n```\n\nRequires Node.js 22+.\n\n## Credits\n\nBuilt with [Eleventy Excellent](https://github.com/madrilene/eleventy-excellent) by [Lene Saile](https://github.com/madrilene).\n\n## License\n\nISC\n","summary":"Remote In Tech is a community-maintained directory that catalogs remote-friendly technology companies to help job seekers find flexible work opportunities. Built using the Eleventy framework, the project acts as an open-source repository where contributors can add and manage company listings through a standardized submission process. This resource is ideal for tech professionals looking to transition into remote roles and for developers interested in contributing to a collaborative, crowd-sourced job database.","description":"Source for remoteintech.company — a community-maintained directory of remote-friendly tech companies","stars":40443,"language":"JavaScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
