 **Party Mode** — Bring multiple agent personas into one session to collaborate and discuss\n- **Complete Lifecycle** — From brainstorming to deployment\n\n[Learn more at **docs.bmad-method.org**](https://docs.bmad-method.org)\n\n---\n\n## 🚀 What's Next for BMad?\n\n**V6 is here and we're just getting started!** The BMad Method is evolving rapidly with optimizations including Cross Platform Agent Team and Sub Agent inclusion, Skills Architecture, BMad Builder v1, Dev Loop Automation, and so much more in the works.\n\n**[📍 Check out the complete Roadmap →](https://docs.bmad-method.org/roadmap/)**\n\n---\n\n## Quick Start\n\n**Prerequisites**: [Node.js](https://nodejs.org) v20.12+ · [Python](https://www.python.org) 3.10+ · [uv](https://docs.astral.sh/uv/)\n\n```bash\nnpx bmad-method install\n```\n\n> Want the newest prerelease build? Use `npx bmad-method@next install`. Expect higher churn than the default install.\n\nFollow the installer prompts, then open your AI IDE (Claude Code, Cursor, etc.) in your project folder.\n\n**Non-Interactive Installation** (for CI/CD):\n\n```bash\nnpx bmad-method install --directory /path/to/project --modules bmm --tools claude-code --yes\n```\n\nOverride any module config option with `--set <module>.<key>=<value>` (repeatable). Run `--list-options [module]` to see locally-known official keys (built-in modules plus any external officials cached on this machine):\n\n```bash\nnpx bmad-method install --yes \\\n  --modules bmm --tools claude-code \\\n  --set bmm.project_knowledge=research \\\n  --set bmm.user_skill_level=expert\n```\n\n[See all installation options](https://docs.bmad-method.org/how-to/non-interactive-installation/)\n\n> **Not sure what to do?** Ask `bmad-help` — it tells you exactly what's next and what's optional. You can also ask questions like `bmad-help I just finished the architecture, what do I do next?`\n\n## Modules\n\nBMad Method extends with official modules for specialized domains. Available during installation or anytime after.\n\n| Module                                                                                                            | Purpose                                           |\n| ----------------------------------------------------------------------------------------------------------------- | ------------------------------------------------- |\n| **[BMad Method (BMM)](https://github.com/bmad-code-org/BMAD-METHOD)**                                             | Core framework with 34+ workflows                 |\n| **[BMad Builder (BMB)](https://github.com/bmad-code-org/bmad-builder)**                                           | Create custom BMad agents and workflows           |\n| **[Test Architect (TEA)](https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise)**             | Risk-based test strategy and automation           |\n| **[Game Dev Studio (BMGD)](https://github.com/bmad-code-org/bmad-module-game-dev-studio)**                        | Game development workflows (Unity, Unreal, Godot) |\n| **[Creative Intelligence Suite (CIS)](https://github.com/bmad-code-org/bmad-module-creative-intelligence-suite)** | Innovation, brainstorming, design thinking        |\n\n## Web Bundles\n\nV4 shipped web bundles. V6 brings them back, new and improved.\n\nWeb bundles package selected BMad skills for installation as **Google Gemini Gems** and **ChatGPT Custom GPTs**. Use them to do the upfront planning work (brainstorming, product briefs, PRDs, PRFAQs, UX specs, market and industry research) in your web LLM subscription, then bring the polished artifacts into your IDE for implementation. Planning runs on a flat-rate subscription instead of metered IDE tokens, which is a meaningful cost saver on longer engagements. Choose the best model available to you in Gemini or ChatGPT.\n\nCurrent shelf: brainstorming, product brief, PRFAQ, PRD, UX, market & industry research.\n\n**Browse and install at [bmadcode.com/web-bundles](https://bmadcode.com/web-bundles/)**. One card per bundle, inline install steps for Gemini and ChatGPT, one-click ZIP download. See [the web bundles guide](https://docs.bmad-method.org/explanation/web-bundles/) for the concept.\n\n## Documentation\n\n[BMad Method Docs Site](https://docs.bmad-method.org) — Tutorials, guides, concepts, and reference\n\n**Quick links:**\n\n- [Getting Started Tutorial](https://docs.bmad-method.org/tutorials/getting-started/)\n- [Upgrading from Previous Versions](https://docs.bmad-method.org/how-to/upgrade-to-v6/)\n- [Test Architect Documentation](https://bmad-code-org.github.io/bmad-method-test-architecture-enterprise/)\n\n## Community\n\n- [Discord](https://discord.gg/gk8jAdXWmj) — Get help, share ideas, collaborate\n- [YouTube](https://youtube.com/@BMadCode) — Tutorials, master class, and more\n- [X / Twitter](https://x.com/BMadCode)\n- [Website](https://bmadcode.com)\n- [GitHub Issues](https://github.com/bmad-code-org/BMAD-METHOD/issues) — Bug reports and feature requests\n- [Discussions](https://github.com/bmad-code-org/BMAD-METHOD/discussions) — Community conversations\n\n## Support BMad\n\nBMad is free for everyone and always will be. Star this repo, [buy me a coffee](https://buymeacoffee.com/bmad), or email <contact@bmadcode.com> for corporate sponsorship.\n\n## Contributing\n\nWe welcome contributions! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n## License\n\nMIT License — see [LICENSE](LICENSE) for details.\n\n---\n\n**BMad** and **BMAD-METHOD** are trademarks of BMad Code, LLC. See [TRADEMARK.md](TRADEMARK.md) for details.\n\n[![Contributors](https://contrib.rocks/image?repo=bmad-code-org/BMAD-METHOD)](https://github.com/bmad-code-org/BMAD-METHOD/graphs/contributors)\n\nSee [CONTRIBUTORS.md](CONTRIBUTORS.md) for contributor information.\n","summary":"The BMad Method is an open-source, AI-driven agile development framework designed to scale from small bug fixes to complex enterprise systems. It provides a suite of specialized agent pers out-oumi-blue.svg)](https://oumi.ai)\n\n### Everything you need to build state-of-the-art foundation models, end-to-end\n\n<p align=\"center\">\n  <a href=\"https://trendshift.io/repositories/12865\">\n    <img alt=\"GitHub trending\" src=\"https://trendshift.io/api/badge/repositories/12865\" />\n  </a>\n</p>\n\n## 🔥 News\n\n- [2026/05] [Oumi v0.8 released](https://github.com/oumi-ai/oumi/releases/tag/v0.8) with `oumi deploy` CLI for dedicated inference endpoints, an `oumi-mcp` MCP server for Claude/Cursor integration, batch API support across Anthropic/Fireworks/Together, and Transformers v5 / TRL / vLLM dependency upgrades\n- [2026/03] Upgraded to Transformers v5, TRL v0.30, vLLM v0.19, and veRL v0.7 compatibility\n- [2026/03] [MCP Integration Phase 1](https://github.com/oumi-ai/oumi/pull/2234): package scaffold and dependencies for MCP server support\n- [2026/03] New: `oumi deploy` command for deploying oumi models dedicated inference endpoints on fireworks.ai and parasail\n- [2026/03] Added support for Qwen3.5 model family\n- [2026/03] Inference engines received multiple improvements: list_models api, improved error reporting\n- [2026/02] [Preview of using the Oumi Platform and Lambda to fine-tune and deploy a 4B model for user intent classification](https://youtu.be/0XpfYRpd_FA)\n- [2026/02] [Lambda and Oumi partner for end-to-end custom model development](https://blog.oumi.ai/p/lambda-and-oumi-partner-for-end-to)\n- [2025/12] [Oumi v0.6.0 released](https://github.com/oumi-ai/oumi/releases/tag/v0.6.0) with Python 3.13 support, `oumi analyze` CLI command, TRL 0.26+ support, and more\n- [2025/12] [WeMakeDevs AI Agents Assemble Hackathon: Oumi webinar on Finetuning for Text-to-SQL](https://www.youtube.com/watch?v=6wPikqRZ7bQ&t=3203s)\n- [2025/12] [Oumi co-sponsors WeMakeDevs AI Agents Assemble Hackathon with over 2000 project submissions](https://www.wemakedevs.org/hackathons/assemblehack25)\n- [2025/11] [Oumi v0.5.0 released](https://github.com/oumi-ai/oumi/releases/tag/v0.5) with advanced data synthesis, hyperparameter tuning automation, support for OpenEnv, and more\n\n<details>\n<summary>Older updates</summary>\n\n- [2025/11] [Example notebook to perform RLVF fine-tuning with OpenEnv](https://github.com/oumi-ai/oumi/blob/main/notebooks/Oumi%20-%20OpenEnv%20GRPO%20with%20trl.ipynb), an open source library from the Meta PyTorch team for creating, deploying, and distributing agentic RL environments\n- [2025/10] [Oumi v0.4.1](https://github.com/oumi-ai/oumi/releases/tag/v0.4.1) and [v0.4.2](https://github.com/oumi-ai/oumi/releases/tag/v0.4.2) released] with support for Qwen3-VL and Transformers v4.56, data synthesis documentation and examples, and many bug fixes\n- [2025/09] [Oumi v0.4.0 released](https://github.com/oumi-ai/oumi/releases/tag/v0.4.0) with DeepSpeed support, a Hugging Face Hub cache management tool, KTO/Vision DPO trainer support\n- [2025/08] Training and inference support for OpenAI's `gpt-oss-20b` and `gpt-oss-120b`: [recipes here](https://github.com/oumi-ai/oumi/tree/main/configs/recipes/gpt_oss)\n- [2025/08] Aug 14 Webinar - [OpenAI's gpt-oss: Separating the Substance from the Hype](https://youtu.be/g1PkAV7fXn0).\n- [2025/08] [Oumi v0.3.0 released](https://github.com/oumi-ai/oumi/releases/tag/v0.3.0) with model quantization (AWQ), an improved LLM-as-a-Judge API, and Adaptive Inference\n- [2025/07] Recipe for [Qwen3 235B](https://github.com/oumi-ai/oumi/blob/main/configs/recipes/qwen3/inference/235b_a22b_together_infer.yaml)\n- [2025/07] July 24 webinar: [\"Training a State-of-the-art Agent LLM with Oumi + Lambda\"](https://youtu.be/f3SU_heBP54)\n- [2025/06] [Oumi v0.2.0 released](https://github.com/oumi-ai/oumi/releases/tag/v0.2.0) with support for GRPO fine-tuning, a plethora of new model support, and much more\n- [2025/06] Announcement of [Data Curation for Vision Language Models (DCVLR) competition](https://oumi.ai/blog/posts/announcing-dcvlr) at NeurIPS2025\n- [2025/06] Recipes for training, inference, Is (OpenAI, Anthropic, Vertex AI, Together, Parasail, ...)\n\nAll with one consistent API, production-grade reliability, and all the flexibility you need for research.\n\nLearn more at [oumi.ai](https://oumi.ai/docs), or jump right in with the [quickstart guide](https://oumi.ai/docs/en/latest/get_started/quickstart.html).\n\n## 🚀 Getting Started\n\n| **Notebook** | **Try in Colab** | **Goal** |\n|----------|--------------|-------------|\n| **🎯 Getting Started: A Tour** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - A Tour.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | Quick tour of core features: training, evaluation, inference, and job management |\n| **🔧 Model Finetuning Guide** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - Finetuning Tutorial.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | End-to-end guide to LoRA tuning with data prep, training, and evaluation |\n| **📚 Model Distillation** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - Distill a Large Model.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | Guide to distilling large models into smaller, efficient ones |\n| **📋 Model Evaluation** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - Evaluation with Oumi.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | Comprehensive model evaluation using Oumi's evaluation framework |\n| **☁️ Remote Training** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - Running Jobs Remotely.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | Launch and monitor training jobs on cloud (AWS, Azure, GCP, Lambda, etc.) platforms |\n| **📈 LLM-as-a-Judge** | <a target=\"_blank\" href=\"https://colab.research.google.com/github/oumi-ai/oumi/blob/main/notebooks/Oumi - Simple Judge.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"/></a> | Filter and curate training data with built-in judges |\n\n## 🔧 Usage\n\n### Installation\n\nChoose the installation method that works best for you:\n\n<details open>\n<summary><b>Using pip (Recommended)</b></summary>\n\n```bash\n# Basic installation\nuv pip install oumi\n\n# With GPU support\nuv pip install 'oumi[gpu]'\n\n# Latest development version\nuv pip install git+https://github.com/oumi-ai/oumi.git\n```\n\nDon't have uv? [Install it](https://docs.astral.sh/uv/getting-started/installation/) or use `pip` instead.\n\n</details>\n\n<details>\n<summary><b>Using Docker</b></summary>\n\n```bash\n# Pull the latest image\ndocker pull ghcr.io/oumi-ai/oumi:latest\n\n# Run oumi commands\ndocker run --gpus all -it ghcr.io/oumi-ai/oumi:latest oumi --help\n\n# Train with a mounted config\ndocker run --gpus all -v $(pwd):/workspace -it ghcr.io/oumi-ai/oumi:latest \\\n    oumi train --config /workspace/my_config.yaml\n```\n\n</details>\n\n<details>\n<summary><b>Quick Install Script (Experimental)</b></summary>\n\nTry Oumi without setting up a Python environment. This installs Oumi in an isolated environment:\n\n```bash\ncurl -LsSf https://oumi.ai/install.sh | bash\n```\n\n</details>\n\nFor more advanced installation options, see the [installation guide](https://oumi.ai/docs/en/latest/get_started/installation.html).\n\n### Oumi CLI\n\nYou can quickly use the `oumi` command to train, evaluate, and infer models using one of the existing [recipes](/configs/recipes):\n\n```shell\n# Training\noumi train -c configs/recipes/smollm/sft/135m/quickstart_train.yaml\n\n# Evaluation\noumi evaluate -c configs/recipes/smollm/evaluation/135m/quickstart_eval.yaml\n\n# Inference\noumi infer -c configs/recipes/smollm/inference/135m_infer.yaml --interactive\n```\n\nFor more advanced options, see the [training](https://oumi.ai/docs/en/latest/user_guides/train/train.html), [evaluation](https://oumi.ai/docs/en/latest/user_guides/evaluate/evaluate.html), [inference](https://oumi.ai/docs/en/latest/user_guides/infer/infer.html), and [llm-as-a-judge](https://oumi.ai/docs/en/latest/user_guides/judge/judge.html) guides.\n\n### Running Jobs Remotely\n\nYou can run jobs remotely on cloud platforms (AWS, Azure, GCP, Lambda, etc.) using the `oumi launch` command:\n\n```shell\n# GCP\noumi launch up -c configs/recipes/smollm/sft/135m/quickstart_gcp_job.yaml\n\n# AWS\noumi launch up -c configs/recipes/smollm/sft/135m/quickstart_gcp_job.yaml --resources.cloud aws\n\n# Azure\noumi launch up -c configs/recipes/smollm/sft/135m/quickstart_gcp_job.yaml --resources.cloud azure\n\n# Lambda\noumi launch up -c configs/recipes/smollm/sft/135m/quickstart_gcp_job.yaml --resources.cloud lambda\n```\n\n**Note:** Oumi is in <ins>beta</ins> and under active development. The core features are stable, but some advanced features might change as the platform improves.\n\n## 💻 Why use Oumi?\n\nIf you need a comprehensive platform for training, evaluating, or deploying models, Oumi is a great choice.\n\nHere are some of the key features that make Oumi stand out:\n\n- 🔧 **Zero Boilerplate**: Get started in minutes with ready-to-use recipes for popular models and workflows. No need to write training loops or data pipelines.\n- 🏢 **Enterprise-Grade**: Built and validated by teams training models at scale\n- 🎯 **Research Ready**: Perfect for ML research with easily reproducible experiments, and flexible interfaces for customizing each component.\n- 🌐 **Broad Model Support**: Works with most popular model architectures - from tiny models to the largest ones, text-only to multimodal.\n- 🚀 **SOTA Performance**: Native support for distributed training techniques (FSDP, DeepSpeed, DDP) and optimized inference engines (vLLM, SGLang).\n- 🤝 **Community First**: 100% open source with an active community. No vendor lock-in, no strings attached.\n\n## 📚 Examples &  Recipes\n\nExplore the growing collection of ready-to-use configurations for state-of-the-art models and training workflows:\n\n**Note:** These configurations are not an exhaustive list of what's supported, simply examples to get you started. You can find a more exhaustive list of supported [models](https://oumi.ai/docs/en/latest/resources/models/supported_models.html), and datasets ([supervised fine-tuning](https://oumi.ai/docs/en/latest/resources/datasets/sft_datasets.html), [pre-training](https://oumi.ai/docs/en/latest/resources/datasets/pretraining_datasets.html), [preference tuning](https://oumi.ai/docs/en/latest/resources/datasets/preference_datasets.html), and [vision-language finetuning](https://oumi.ai/docs/en/latest/resources/datasets/vl_sft_datasets.html)) in the oumi documentation.\n\n### Qwen Family\n\n| Model | Example Configurations |\n|-------|------------------------|\n| Qwen3-Next 80B A3B | [LoRA](/configs/recipes/qwen3_next/sft/80b_a3b_lora/train.yaml) • [Inference](/configs/recipes/qwen3_next/inference/80b_a3b_infer.yaml) • [Inference (Instruct)](/configs/recipes/qwen3_next/inference/80b_a3b_instruct_infer.yaml) • [Evaluation](/configs/recipes/qwen3_next/evaluation/80b_a3b_eval.yaml) |\n| Qwen3 30B A3B | [LoRA](/configs/recipes/qwen3/sft/30b_a3b_lora/train.yaml) • [Inference](/configs/recipes/qwen3/inference/30b_a3b_infer.yaml) • [Evaluation](/configs/recipes/qwen3/evaluation/30b_a3b_eval.yaml) |\n| Qwen3 32B | [LoRA](/configs/recipes/qwen3/sft/32b_lora/train.yaml) • [Inference](/configs/recipes/qwen3/inference/32b_infer.yaml) • [Evaluation](/configs/recipes/qwen3/evaluation/32b_eval.yaml) |\n| Qwen3 14B | [LoRA](/configs/recipes/qwen3/sft/14b_lora/train.yaml) • [Inference](/configs/recipes/qwe Preview) | [License](https://github.com/QwenLM/Qwen/blob/main/LICENSE) | ❌ |\n\n#### Code Models\n\n| Model | Size | Paper | HF Hub | License | Open |\n|-------|------|-------|---------|----------|------|\n| ✅ Qwen2.5 Coder | 0.5B-32B | [Blog](https://qwenlm.github.io/blog/qwen2.5/) | [Hub](https://huggingface.co/Qwen/Qwen2.5-Coder-32B-Instruct) | [License](https://github.com/QwenLM/Qwen/blob/main/LICENSE) | ❌  |\n| DeepSeek Coder | 1.3B-33B | [Paper](https://arxiv.org/abs/2401.02954) | [Hub](https://huggingface.co/deepseek-ai/deepseek-coder-7b-instruct) | [License](https://github.com/deepseek-ai/DeepSeek-LLM/blob/main/LICENSE-MODEL) | ❌  |\n| StarCoder 2 | 3B/7B/15B | [Paper](https://arxiv.org/abs/2402.19173) | [Hub](https://huggingface.co/bigcode/starcoder2-15b) | [License](https://huggingface.co/spaces/bigcode/bigcode-model-license-agreement) | ✅ |\n\n#### Math Models\n\n| Model | Size | Paper | HF Hub | License | Open |\n|-------|------|-------|---------|----------|------|\n| DeepSeek Math | 7B | [Paper](https://arxiv.org/abs/2401.02954) | [Hub](https://huggingface.co/deepseek-ai/deepseek-math-7b-instruct) | [License](https://github.com/deepseek-ai/DeepSeek-LLM/blob/main/LICENSE-MODEL) | ❌  | |\n\n</details>\n\n## 📖 Documentation\n\nTo learn more about all the platform's capabilities, see the [Oumi documentation](https://oumi.ai/docs).\n\n## 🤝 Join the Community\n\nOumi is a community-first effort. Whether you are a developer, a researcher, or a non-technical user, all contributions are very welcome!\n\n- To contribute to the `oumi` repository, please check the [`CONTRIBUTING.md`](https://github.com/oumi-ai/oumi/blob/main/CONTRIBUTING.md) for guidance on how to contribute to send your first Pull Request.\n- Make sure to join our [Discord community](https://discord.gg/oumi) to get help, share your experiences, and contribute to the project!\n- If you are interested in joining one of the community's open-science efforts, check out our [open collaboration](https://oumi.ai/community) page.\n\n## 🙏 Acknowledgements\n\nOumi makes use of [several libraries](https://oumi.ai/docs/en/latest/about/acknowledgements.html) and tools from the open-source community. We would like to acknowledge and deeply thank the contributors of these projects! ✨ 🌟 💫\n\n## 📝 Citation\n\nIf you find Oumi useful in your research, please consider citing it:\n\n```bibtex\n@software{oumi2025,\n  author = {Oumi Community},\n  title = {Oumi: an Open, End-to-end Platform for Building Large Foundation Models},\n  month = {January},\n  year = {2025},\n  url = {https://github.com/oumi-ai/oumi}\n}\n```\n\n## 📜 License\n\nThis project is licensed under the Apache License 2.0. See the [LICENSE](LICENSE) file for details.\n\n[^1]: Open models are defined as models with fully open weights, training code, and data, and a permissive license. See [Open Source Definitions](https://opensource.org/ai) for more information.\n","summary":"Oumi is a comprehensive, end-to-end framework designed to simplify the development, fine-tuning, and deployment of state-of-the-art foundation models. It offers a robust suite of tools, including a CLI for model analysis and deployment, support for advanced data synthesis, and automated hyperparameter tuning. This library is an ideal resource for AI researchers and developers who need a streamlined, modular environment to manage the entire lifecycle of custom generative AI models.","description":"Easily fine-tune, evaluate and deploy Gemma 4, Qwen3.5, Qwen3.6, gpt-oss, DeepSeek-R1, or any open source LLM / VLM!","stars":9277,"language":"Python"},{"owner":"sst","repo":"models.dev","url":"https://github.com/sst/models.dev","readme":"<p align=\"center\">\n  <a href=\"https://models.dev\">\n    <picture>\n      <source srcset=\"./logo-dark.svg\" media=\"(prefers-color-scheme: dark)\">\n      <source srcset=\"./logo-light.svg\" media=\"(prefers-color-scheme: light)\">\n      <img src=\"./logo-light.svg\" alt=\"Models.dev logo\">\n    </picture>\n  </a>\n</p>\n\n---\n\n[Models.dev](https://models.dev) is a comprehensive open-source database of AI model specifications, pricing, and capabilities.\n\nThere's no single database with information about all the available AI models. We started Models.dev as a community-contributed project to address this. We also use it internally in [opencode](https://opencode.ai).\n\n## API\n\nYou can access this data through an API.\n\n```bash\ncurl https://models.dev/api.json\n```\n\nUse the **Model ID** field to do a lookup on any model; it's the identifier used by [AI SDK](https://ai-sdk.dev/).\n\n### Logos\n\nProvider logos are available as SVG files:\n\n```bash\ncurl https://models.dev/logos/{provider}.svg\n```\n\nReplace `{provider}` with the **Provider ID** (e.g., `anthropic`, `openai`, `google`). If we don't have a provider's logo, a default logo is served instead.\n\n## Contributing\n\nThe data is stored in the repo as TOML files; organized by provider and model. The logo is stored as an SVG. This is used to generate this page and power the API.\n\nWe need your help keeping the data up to date.\n\n### Adding a New Model\n\nTo add a new model, start by checking if the provider already exists in the `providers/` directory. If not, then:\n\n#### 1. Create a Provider\n\nIf the provider isn't already in `providers/`:\n\n1. Create a new folder in `providers/` with the provider's ID. For example, `providers/newprovider/`.\n2. Add a `provider.toml` with the provider details:\n\n   ```toml\n   name = \"Provider Name\"\n   npm = \"@ai-sdk/provider\" # AI SDK Package name\n   env = [\"PROVIDER_API_KEY\"] # Environment Variable keys used for auth\n   doc = \"https://example.com/docs/models\" # Link to provider's documentation\n   ```\n\n   If the provider doesn’t publish an npm package but exposes an OpenAI-compatible endpoint, set the npm field accordingly and include the base URL:\n\n   ```toml\n   npm = \"@ai-sdk/openai-compatible\" # Use OpenAI-compatible SDK\n   api = \"https://api.example.com/v1\" # Required with openai-compatible\n   ```\n\n#### 2. Add a Logo (optional)\n\nTo add a logo for the provider:\n\n1. Add a `logo.svg` file to the provider's directory (e.g., `providers/newprovider/logo.svg`)\n2. Use SVG format with no fixed size or colors - use `currentColor` for fills/strokes\n\nExample SVG structure:\n\n```svg\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"currentColor\">\n  <!-- Logo paths here -->\n</svg>\n```\n\n#### 3. Add a Model Definition\n\nCreate a new TOML file in the provider's `models/` directory where the filename is the model ID.\n\nIf the model ID contains `/`, use subfolders. For example, for the model ID `openai/gpt-5`, create a folder `openai/` and place a file named `gpt-5.toml` inside it.\n\n```toml\nname = \"Model Display Name\"\nattachment = true           # or false - supports file attachments\nreasoning = false           # or true - supports reasoning / chain-of-thought\ntool_call = true            # or false - supports tool calling\nstructured_output = true    # or false - supports a dedicated structured output feature\ntemperature = true          # or false - supports temperature control\nknowledge = \"2024-04\"       # Knowledge-cutoff date\nrelease_date = \"2025-02-19\" # First public release date\nlast_updated = \"2025-02-19\" # Most recent update date\nopen_weights = true         # or false  - model’s trained weights are publicly available\n\n[cost]\ninput = 3.00                # Cost per million input tokens (USD)\noutput = 15.00              # Cost per million output tokens (USD)\nreasoning = 15.00           # Cost per million reasoning tokens (USD)\ncache_read = 0.30           # Cost per million cached read tokens (USD)\ncache_write = 3.75          # Cost per million cached write tokens (USD)\ninput_audio = 1.00          # Cost per million audio input tokens (USD)\noutput_audio = 10.00        # Cost per million audio output tokens (USD)\n\n[limit]\ncontext = 400_000           # Maximum context window (tokens)\ninput = 272_000             # Maximum input tokens\noutput = 8_192              # Maximum output tokens\n\n[modalities]\ninput = [\"text\", \"image\"]   # Supported input modalities\noutput = [\"text\"]           # Supported output modalities\n\n[interleaved]\nfield = \"reasoning_content\" # Name of the interleaved field \"reasoning_content\" or \"reasoning_details\"\n```\n\n#### 3a. Reuse an Existing Model with `extends`\n\nFor wrapper providers that mirror a model from another provider, prefer reusing the canonical model definition instead of duplicating the whole file.\n\nUse `extends` only for non-first-party wrappers and mirrors. Do not use it inside the actual lab provider directories that act as the canonical source for a model family, for example `providers/anthropic/`, `providers/openai/`, `providers/google/`, `providers/xai/`, `providers/minimax/`, or `providers/moonshot/`.\n\n```toml\n[extends]\nfrom = \"anthropic/claude-opus-4-6\"\nomit = [\"experimental.modes.fast\"]\n\n[provider]\nnpm = \"@ai-sdk/anthropic\"\n```\n\nRules:\n\n- `from` must point to another model using `<provider>/<model-id>`.\n- `omit` is optional and removes fields after the inherited model and local overrides are merged.\n- You can override any top-level model field locally.\n- If you override a nested table like `[cost]`, `[limit]`, or `[modalities]`, include the full values needed for that table.\n- `id` still comes from the filename; do not add it to the TOML.\n\nUse `extends` when the wrapper model is materially the same as the source model and only differs by a small set of overrides or omitted fields.\n\n#### 4. Submit a Pull Request\n\n1. Fork this repo\n2. Create a new branch with your changes\n3. Add your provider and/or model files\n4. Open a PR with a clear description\n\n### Validation\n\nThere's a GitHub Action that will automatically validate your submission against our schema to ensure:\n\n- All required fields are present\n- Data types are correct\n- Values are within acceptable ranges\n- TOML syntax is valid\n\nWhen converting existing wrapper models to `extends`, compare generated output before and after the change:\n\n```bash\nbun run compare:migrations\n```\n\nThis prints a diff for each changed model TOML so you can confirm the generated JSON only changed where you intended.\n\n### Schema Reference\n\nModels must conform to the following schema, as defined in `packages/core/src/schema.ts`.\n\n**Provider Schema:**\n\n- `name`: String - Display name of the provider\n- `npm`: String - AI SDK Package name\n- `env`: String[] - Environment variable keys used for auth\n- `doc`: String - Link to the provider's documentation\n- `api` _(optional)_: String - OpenAI-compatible API endpoint. Required only when using `@ai-sdk/openai-compatible` as the npm package\n\n**Model Schema:**\n\n- `name`: String — Display name of the model\n- `attachment`: Boolean — Supports file attachments\n- `reasoning`: Boolean — Supports reasoning / chain-of-thought\n- `tool_call`: Boolean - Supports tool calling\n- `structured_output` _(optional)_: Boolean — Supports structured output feature\n- `temperature` _(optional)_: Boolean — Supports temperature control\n- `knowledge` _(optional)_: String — Knowledge-cutoff date in `YYYY-MM` or `YYYY-MM-DD` format\n- `release_date`: String — First public release date in `YYYY-MM` or `YYYY-MM-DD`\n- `last_updated`: String — Most recent update date in `YYYY-MM` or `YYYY-MM-DD`\n- `open_weights`: Boolean - Indicate the model's trained weights are publicly available\n- `interleaved` _(optional)_: Boolean or Object — Supports interleaved reasoning. Use `true` for general support or an object with `field` to specify the format\n- `interleaved.field`: String — Name of the interleaved field (`\"reasoning_content\"` or `\"reasoning_details\"`)\n- `cost.input`: Number — Cost per million input tokens (USD)\n- `cost.output`: Number — Cost per million output tokens (USD)\n- `cost.reasoning` _(optional)_: Number — Cost per million reasoning tokens (USD)\n- `cost.cache_read` _(optional)_: Number — Cost per million cached read tokens (USD)\n- `cost.cache_write` _(optional)_: Number — Cost per million cached write tokens (USD)\n- `cost.input_audio` _(optional)_: Number — Cost per million audio input tokens, if billed separately (USD)\n- `cost.output_audio` _(optional)_: Number — Cost per million audio output tokens, if billed separately (USD)\n- `limit.context`: Number — Maximum context window (tokens)\n- `limit.input`: Number — Maximum input tokens\n- `limit.output`: Number — Maximum output tokens\n- `modalities.input`: Array of strings — Supported input modalities (e.g., [\"text\", \"image\", \"audio\", \"video\", \"pdf\"])\n- `modalities.output`: Array of strings — Supported output modalities (e.g., [\"text\"])\n- `status` _(optional)_: String — Supported status:\n  - `alpha` - Indicate the model is in alpha testing\n  - `beta` - Indicate the model is in beta testing\n  - `deprecated` - Indicate the model is no longer served by the provider's public API\n\n### Examples\n\nSee existing providers in the `providers/` directory for reference:\n\n- `providers/anthropic/` - Anthropic Claude models\n- `providers/openai/` - OpenAI GPT models\n- `providers/google/` - Google Gemini models\n\n### Working on frontend\n\nMake sure you have [Bun](https://bun.sh/) installed.\n\n```bash\n$ bun install\n$ cd packages/web\n$ bun run dev\n```\n\nAnd it'll open the frontend at http://localhost:3000\n\n### Manual testing with opencode\n\nYou can manually check provider changes with opencode by:\n\n```bash\n$ bun install\n$ cd packages/web\n$ bun run build\n$ OPENCODE_MODELS_PATH=\"dist/_api.json\" opencode\n```\n\n### Questions?\n\nOpen an issue if you need help or have questions about contributing.\n\n---\n\nModels.dev is created by the maintainers of [SST](https://sst.dev).\n\n**Join our community** [Discord](https://sst.dev/discord) | [YouTube](https://www.youtube.com/c/sst-dev) | [X.com](https://x.com/SST_dev)\n","summary":"Models.dev is an open-source, community-driven database that provides structured specifications, pricing, and capabilities for a wide array of AI models. It offers a standardized API and a collection of provider logos, ensuring developers have a centralized source of truth for model metadata. This project is highly beneficial for engineers and AI application developers who need to integrate, compare, or programmatically look up details for different AI models within their software workflows.","description":"An open-source database of AI models.","stars":4595,"language":"TypeScript"},{"owner":"facebookresearch","repo":"segment-anything","url":"https://github.com/facebookresearch/segment-anything","readme":"## Latest updates -- SAM 2: Segment Anything in Images and Videos\n\nPlease check out our new release on [**Segment Anything Model 2 (SAM 2)**](https://github.com/facebookresearch/segment-anything-2).\n\n* SAM 2 code: https://github.com/facebookresearch/segment-anything-2\n* SAM 2 demo: https://sam2.metademolab.com/\n* SAM 2 paper: https://arxiv.org/abs/2408.00714\n\n ![SAM 2 architecture](https://github.com/facebookresearch/segment-anything-2/blob/main/assets/model_diagram.png?raw=true)\n\n**Segment Anything Model 2 (SAM 2)** is a foundation model towards solving promptable visual segmentation in images and videos. We extend SAM to video by considering images as a video with a single frame. The model design is a simple transformer architecture with streaming memory for real-time video processing. We build a model-in-the-loop data engine, which improves model and data via user interaction, to collect [**our SA-V dataset**](https://ai.meta.com/datasets/segment-anything-video), the largest video segmentation dataset to date. SAM 2 trained on our data provides strong performance across a wide range of tasks and visual domains.\n\n# Segment Anything\n\n**[Meta AI Research, FAIR](https://ai.facebook.com/research/)**\n\n[Alexander Kirillov](https://alexander-kirillov.github.io/), [Eric Mintun](https://ericmintun.github.io/), [Nikhila Ravi](https://nikhilaravi.com/), [Hanzi Mao](https://hanzimao.me/), Chloe Rolland, Laura Gustafson, [Tete Xiao](https://tetexiao.com), [Spencer Whitehead](https://www.spencerwhitehead.com/), Alex Berg, Wan-Yen Lo, [Piotr Dollar](https://pdollar.github.io/), [Ross Girshick](https://www.rossgirshick.info/)\n\n[[`Paper`](https://ai.facebook.com/research/publications/segment-anything/)] [[`Project`](https://segment-anything.com/)] [[`Demo`](https://segment-anything.com/demo)] [[`Dataset`](https://segment-anything.com/dataset/index.html)] [[`Blog`](https://ai.facebook.com/blog/segment-anything-foundation-model-image-segmentation/)] [[`BibTeX`](#citing-segment-anything)]\n\n![SAM design](assets/model_diagram.png?raw=true)\n\nThe **Segment Anything Model (SAM)** produces high quality object masks from input prompts such as points or boxes, and it can be used to generate masks for all objects in an image. It has been trained on a [dataset](https://segment-anything.com/dataset/index.html) of 11 million images and 1.1 billion masks, and has strong zero-shot performance on a variety of segmentation tasks.\n\n<p float=\"left\">\n  <img src=\"assets/masks1.png?raw=true\" width=\"37.25%\" />\n  <img src=\"assets/masks2.jpg?raw=true\" width=\"61.5%\" /> \n</p>\n\n## Installation\n\nThe code requires `python>=3.8`, as well as `pytorch>=1.7` and `torchvision>=0.8`. Please follow the instructions [here](https://pytorch.org/get-started/locally/) to install both PyTorch and TorchVision dependencies. Installing both PyTorch and TorchVision with CUDA support is strongly recommended.\n\nInstall Segment Anything:\n\n```\npip install git+https://github.com/facebookresearch/segment-anything.git\n```\n\nor clone the repository locally and install with\n\n```\ngit clone git@github.com:facebookresearch/segment-anything.git\ncd segment-anything; pip install -e .\n```\n\nThe following optional dependencies are necessary for mask post-processing, saving masks in COCO format, the example notebooks, and exporting the model in ONNX format. `jupyter` is also required to run the example notebooks.\n\n```\npip install opencv-python pycocotools matplotlib onnxruntime onnx\n```\n\n## <a name=\"GettingStarted\"></a>Getting Started\n\nFirst download a [model checkpoint](#model-checkpoints). Then the model can be used in just a few lines to get masks from a given prompt:\n\n```\nfrom segment_anything import SamPredictor, sam_model_registry\nsam = sam_model_registry[\"<model_type>\"](checkpoint=\"<path/to/checkpoint>\")\npredictor = SamPredictor(sam)\npredictor.set_image(<your_image>)\nmasks, _, _ = predictor.predict(<input_prompts>)\n```\n\nor generate masks for an entire image:\n\n```\nfrom segment_anything import SamAutomaticMaskGenerator, sam_model_registry\nsam = sam_model_registry[\"<model_type>\"](checkpoint=\"<path/to/checkpoint>\")\nmask_generator = SamAutomaticMaskGenerator(sam)\nmasks = mask_generator.generate(<your_image>)\n```\n\nAdditionally, masks can be generated for images from the command line:\n\n```\npython scripts/amg.py --checkpoint <path/to/checkpoint> --model-type <model_type> --input <image_or_folder> --output <path/to/output>\n```\n\nSee the examples notebooks on [using SAM with prompts](/notebooks/predictor_example.ipynb) and [automatically generating masks](/notebooks/automatic_mask_generator_example.ipynb) for more details.\n\n<p float=\"left\">\n  <img src=\"assets/notebook1.png?raw=true\" width=\"49.1%\" />\n  <img src=\"assets/notebook2.png?raw=true\" width=\"48.9%\" />\n</p>\n\n## ONNX Export\n\nSAM's lightweight mask decoder can be exported to ONNX format so that it can be run in any environment that supports ONNX runtime, such as in-browser as showcased in the [demo](https://segment-anything.com/demo). Export the model with\n\n```\npython scripts/export_onnx_model.py --checkpoint <path/to/checkpoint> --model-type <model_type> --output <path/to/output>\n```\n\nSee the [example notebook](https://github.com/facebookresearch/segment-anything/blob/main/notebooks/onnx_model_example.ipynb) for details on how to combine image preprocessing via SAM's backbone with mask prediction using the ONNX model. It is recommended to use the latest stable version of PyTorch for ONNX export.\n\n### Web demo\n\nThe `demo/` folder has a simple one page React app which shows how to run mask prediction with the exported ONNX model in a web browser with multithreading. Please see [`demo/README.md`](https://github.com/facebookresearch/segment-anything/blob/main/demo/README.md) for more details.\n\n## <a name=\"Models\"></a>Model Checkpoints\n\nThree model versions of the model are available with different backbone sizes. These models can be instantiated by running\n\n```\nfrom segment_anything import sam_model_registry\nsam = sam_model_registry[\"<model_type>\"](checkpoint=\"<path/to/checkpoint>\")\n```\n\nClick the links below to download the checkpoint for the corresponding model type.\n\n- **`default` or `vit_h`: [ViT-H SAM model.](https://dl.fbaipublicfiles.com/segment_anything/sam_vit_h_4b8939.pth)**\n- `vit_l`: [ViT-L SAM model.](https://dl.fbaipublicfiles.com/segment_anything/sam_vit_l_0b3195.pth)\n- `vit_b`: [ViT-B SAM model.](https://dl.fbaipublicfiles.com/segment_anything/sam_vit_b_01ec64.pth)\n\n## Dataset\n\nSee [here](https://ai.facebook.com/datasets/segment-anything/) for an overview of the datastet. The dataset can be downloaded [here](https://ai.facebook.com/datasets/segment-anything-downloads/). By downloading the datasets you agree that you have read and accepted the terms of the SA-1B Dataset Research License.\n\nWe save masks per image as a json file. It can be loaded as a dictionary in python in the below format.\n\n```python\n{\n    \"image\"                 : image_info,\n    \"annotations\"           : [annotation],\n}\n\nimage_info {\n    \"image_id\"              : int,              # Image id\n    \"width\"                 : int,              # Image width\n    \"height\"                : int,              # Image height\n    \"file_name\"             : str,              # Image filename\n}\n\nannotation {\n    \"id\"                    : int,              # Annotation id\n    \"segmentation\"          : dict,             # Mask saved in COCO RLE format.\n    \"bbox\"                  : [x, y, w, h],     # The box around the mask, in XYWH format\n    \"area\"                  : int,              # The area in pixels of the mask\n    \"predicted_iou\"         : float,            # The model's own prediction of the mask's quality\n    \"stability_score\"       : float,            # A measure of the mask's quality\n    \"crop_box\"              : [x, y, w, h],     # The crop of the image used to generate the mask, in XYWH format\n    \"point_coords\"          : [[x, y]],         # The point coordinates input to the model to generate the mask\n}\n```\n\nImage ids can be found in sa_images_ids.txt which can be downloaded using the above [link](https://ai.facebook.com/datasets/segment-anything-downloads/) as well.\n\nTo decode a mask in COCO RLE format into binary:\n\n```\nfrom pycocotools import mask as mask_utils\nmask = mask_utils.decode(annotation[\"segmentation\"])\n```\n\nSee [here](https://github.com/cocodataset/cocoapi/blob/master/PythonAPI/pycocotools/mask.py) for more instructions to manipulate masks stored in RLE format.\n\n## License\n\nThe model is licensed under the [Apache 2.0 license](LICENSE).\n\n## Contributing\n\nSee [contributing](CONTRIBUTING.md) and the [code of conduct](CODE_OF_CONDUCT.md).\n\n## Contributors\n\nThe Segment Anything project was made possible with the help of many contributors (alphabetical):\n\nAaron Adcock, Vaibhav Aggarwal, Morteza Behrooz, Cheng-Yang Fu, Ashley Gabriel, Ahuva Goldstand, Allen Goodman, Sumanth Gurram, Jiabo Hu, Somya Jain, Devansh Kukreja, Robert Kuo, Joshua Lane, Yanghao Li, Lilian Luong, Jitendra Malik, Mallika Malhotra, William Ngan, Omkar Parkhi, Nikhil Raina, Dirk Rowe, Neil Sejoor, Vanessa Stark, Bala Varadarajan, Bram Wasti, Zachary Winstrom\n\n## Citing Segment Anything\n\nIf you use SAM or SA-1B in your research, please use the following BibTeX entry.\n\n```\n@article{kirillov2023segany,\n  title={Segment Anything},\n  author={Kirillov, Alexander and Mintun, Eric and Ravi, Nikhila and Mao, Hanzi and Rolland, Chloe and Gustafson, Laura and Xiao, Tete and Whitehead, Spencer and Berg, Alexander C. and Lo, Wan-Yen and Doll{\\'a}r, Piotr and Girshick, Ross},\n  journal={arXiv:2304.02643},\n  year={2023}\n}\n```\n","summary":"Segment Anything (SAM) and its successor, SAM 2, are advanced foundation models designed to perform promptable visual segmentation across both static images and video streams. These models utilize a transformer architecture with streaming memory to generate high-quality object masks based on user inputs like points or boxes, enabling efficient real-time processing. This project is an invaluable resource for computer vision researchers and developers seeking state-of-the-art, zero-shot performance for complex segmentation tasks across diverse visual domains.","description":"The repository provides code for running inference with the SegmentAnything Model (SAM), links for downloading the trained model checkpoints, and example notebooks that show how to use the model.","stars":54291,"language":"Jupyter Notebook"},{"owner":"PromtEngineer","repo":"localGPT","url":"https://github.com/PromtEngineer/localGPT","readme":"# LocalGPT - Private Document Intelligence Platform\n\n<div align=\"center\">\n\n<p align=\"center\">\n<a href=\"https://trendshift.io/repositories/2947\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/2947\" alt=\"PromtEngineer%2FlocalGPT | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n[![GitHub Stars](https://img.shields.io/github/stars/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/stargazers)\n[![GitHub Forks](https://img.shields.io/github/forks/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/network/members)\n[![GitHub Issues](https://img.shields.io/github/issues/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/issues)\n[![GitHub Pull Requests](https://img.shields.io/github/issues-pr/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/pulls)\n[![Python 3.8+](https://img.shields.io/badge/python-3.8+-blue.svg?style=flat-square)](https://www.python.org/downloads/)\n[![License](https://img.shields.io/badge/license-MIT-green.svg?style=flat-square)](LICENSE)\n[![Docker](https://img.shields.io/badge/docker-supported-blue.svg?style=flat-square)](https://www.docker.com/)\n\n<p align=\"center\">\n    <a href=\"https://x.com/engineerrprompt\">\n      <img src=\"https://img.shields.io/badge/Follow%20on%20X-000000?style=for-the-badge&logo=x&logoColor=white\" alt=\"Follow on X\" />\n    </a>\n    <a href=\"https://discord.gg/tUDWAFGc\">\n      <img src=\"https://img.shields.io/badge/Join%20our%20Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Join our Discord\" />\n    </a>\n  </p>\n</div>\n\n## 🚀 What is LocalGPT?\n\nLocalGPT is a **fully private, on-premise Document Intelligence platform**. Ask questions, summarise, and uncover insights from your files with state-of-the-art AI—no data ever leaves your machine.\n\nMore than a traditional RAG (Retrieval-Augmented Generation) tool, LocalGPT features a **hybrid search engine** that blends semantic similarity, keyword matching, and [Late Chunking](https://jina.ai/news/late-chunking-in-long-context-embedding-models/) for long-context precision. A **smart router** automatically selects between RAG and direct LLM answering for every query, while **contextual enrichment** and sentence-level [Context Pruning](https://huggingface.co/naver/provence-reranker-debertav3-v1) surface only the most relevant content. An independent **verification** pass adds an extra layer of accuracy.\n\nThe architecture is **modular and lightweight**—enable only the components you need. With a pure-Python core and minimal dependencies, LocalGPT is simple to deploy, run, and maintain on any infrastructure.The system has minimal dependencies on frameworks and libraries, making it easy to deploy and maintain. The RAG system is pure python and does not require any additional dependencies.\n\n## ▶️ Video\nWatch this [video](https://youtu.be/JTbtGH3secI) to get started with LocalGPT. \n\n| Home | Create Index | Chat |\n|------|--------------|------|\n| ![](Documentation/images/Home.png) | ![](Documentation/images/Index%20Creation.png) | ![](Documentation/images/Retrieval%20Process.png) |\n\n## ✨ Features\n\n- **Utmost Privacy**: Your data remains on your computer, ensuring 100% security.\n- **Versatile Model Support**: Seamlessly integrate a variety of open-source models via Ollama.\n- **Diverse Embeddings**: Choose from a range of open-source embeddings.\n- **Reuse Your LLM**: Once downloaded, reuse your LLM without the need for repeated downloads.\n- **Chat History**: Remembers your previous conversations (in a session).\n- **API**: LocalGPT has an API that you can use for building RAG Applications.\n- **GPU, CPU, HPU & MPS Support**: Supports multiple platforms out of the box, Chat with your data using `CUDA`, `CPU`, `HPU (Intel® Gaudi®)` or `MPS` and more!\n\n### 📖 Document Processing\n- **Multi-format Support**: PDF, DOCX, TXT, Markdown, and more (Currently only PDF is supported)\n- **Contextual Enrichment**: Enhanced document understanding with AI-generated context, inspired by [Contextual Retrieval](https://www.anthropic.com/news/contextual-retrieval)\n- **Batch Processing**: Handle multiple documents simultaneously\n\n### 🤖 AI-Powered Chat\n- **Natural Language Queries**: Ask questions in plain English\n- **Source Attribution**: Every answer includes document references\n- **Smart Routing**: Automatically chooses between RAG and direct LLM responses\n- **Query Decomposition**: Breaks complex queries into sub-questions for better answers\n- **Semantic Caching**: TTL-based caching with similarity matching for faster responses\n- **Session-Aware History**: Maintains conversation context across interactions\n- **Answer Verification**: Independent verification pass for accuracy\n- **Multiple AI Models**: Ollama for inference, HuggingFace for embeddings and reranking\n\n\n### 🛠️ Developer-Friendly\n- **RESTful APIs**: Complete API access for integration\n- **Real-time Progress**: Live updates during document processing\n- **Flexible Configuration**: Customize models, chunk sizes, and search parameters\n- **Extensible Architecture**: Plugin system for custom components\n\n### 🎨 Modern Interface\n- **Intuitive Web UI**: Clean, responsive design\n- **Session Management**: Organize conversations by topic\n- **Index Management**: Easy document collection management\n- **Real-time Chat**: Streaming responses for immediate feedback\n\n---\n\n## 🚀 Quick Start\n\nNote: The installation is currently only tested on macOS. \n\n### Prerequisites\n- Python 3.8 or higher (tested with Python 3.11.5)\n- Node.js 16+ and npm (tested with Node.js 23.10.0, npm 10.9.2)\n- Docker (optional, for containerized deployment)\n- 8GB+ RAM (16GB+ recommended)\n- Ollama (required for both deployment approaches)\n\n### ***NOTE***\nBefore this brach is moved to the main branch, please clone this branch for instalation:\n\n```bash\ngit clone -b localgpt-v2 https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n```\n\n### Option 1: Docker Deployment \n\n```bash\n# Clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Install Ollama locally (required even for Docker)\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b\nollama pull qwen3:8b\n\n# Start Ollama\nollama serve\n\n# Start with Docker (in a new terminal)\n./start-docker.sh\n\n# Access the application\nopen http://localhost:3000\n```\n\n**Docker Management Commands:**\n```bash\n# Check container status\ndocker compose ps\n\n# View logs\ndocker compose logs -f\n\n# Stop containers\n./start-docker.sh stop\n```\n\n### Option 2: Direct Development (Recommended for Development)\n\n```bash\n# Clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Install Python dependencies\npip install -r requirements.txt\n\n# Key dependencies installed:\n# - torch==2.4.1, transformers==4.51.0 (AI models)\n# - lancedb (vector database)\n# - rank_bm25, fuzzywuzzy (search algorithms)\n# - sentence_transformers, rerankers (embedding/reranking)\n# - docling (document processing)\n# - colpali-engine (multimodal processing - support coming soon)\n\n# Install Node.js dependencies\nnpm install\n\n# Install and start Ollama\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b\nollama pull qwen3:8b\nollama serve\n\n# Start the system (in a new terminal)\npython run_system.py\n\n# Access the application\nopen http://localhost:3000\n```\n\n**System Management:**\n```bash\n# Check system health (comprehensive diagnostics)\npython system_health_check.py\n\n# Check service status and health\npython run_system.py --health\n\n# Start in production mode\npython run_system.py --mode prod\n\n# Skip frontend (backend + RAG API only)\npython run_system.py --no-frontend\n\n# View aggregated logs\npython run_system.py --logs-only\n\n# Stop all services\npython run_system.py --stop\n# Or press Ctrl+C in the terminal running python run_system.py\n```\n\n**Service Architecture:**\nThe `run_system.py` launcher manages four key services:\n- **Ollama Server** (port 11434): AI model serving\n- **RAG API Server** (port 8001): Document processing and retrieval\n- **Backend Server** (port 8000): Session management and API endpoints\n- **Frontend Server** (port 3000): React/Next.js web interface\n\n### Option 3: Manual Component Startup\n\n```bash\n# Terminal 1: Start Ollama\nollama serve\n\n# Terminal 2: Start RAG API\npython -m rag_system.api_server\n\n# Terminal 3: Start Backend\ncd backend && python server.py\n\n# Terminal 4: Start Frontend\nnpm run dev\n\n# Access at http://localhost:3000\n```\n\n---\n\n### Detailed Installation\n\n#### 1. Install System Dependencies\n\n**Ubuntu/Debian:**\n```bash\nsudo apt update\nsudo apt install python3.8 python3-pip nodejs npm docker.io docker-compose\n```\n\n**macOS:**\n```bash\nbrew install python@3.8 node npm docker docker-compose\n```\n\n**Windows:**\n```bash\n# Install Python 3.8+, Node.js, and Docker Desktop\n# Then use PowerShell or WSL2\n```\n\n#### 2. Install AI Models\n\n**Install Ollama (Recommended):**\n```bash\n# Install Ollama\ncurl -fsSL https://ollama.ai/install.sh | sh\n\n# Pull recommended models\nollama pull qwen3:0.6b          # Fast generation model\nollama pull qwen3:8b            # High-quality generation model\n```\n\n#### 3. Configure Environment\n\n```bash\n# Copy environment template\ncp .env.example .env\n\n# Edit configuration\nnano .env\n```\n\n**Key Configuration Options:**\n```env\n# AI Models (referenced in rag_system/main.py)\nOLLAMA_HOST=http://localhost:11434\n\n# Database Paths (used by backend and RAG system)\nDATABASE_PATH=./backend/chat_data.db\nVECTOR_DB_PATH=./lancedb\n\n# Server Settings (used by run_system.py)\nBACKEND_PORT=8000\nFRONTEND_PORT=3000\nRAG_API_PORT=8001\n\n# Optional: Override default models\nGENERATION_MODEL=qwen3:8b\nENRICHMENT_MODEL=qwen3:0.6b\nEMBEDDING_MODEL=Qwen/Qwen3-Embedding-0.6B\nRERANKER_MODEL=answerdotai/answerai-colbert-small-v1\n```\n\n#### 4. Initialize the System\n\n```bash\n# Run system health check\npython system_health_check.py\n\n# Initialize databases\npython -c \"from backend.database import ChatDatabase; ChatDatabase().init_database()\"\n\n# Test installation\npython -c \"from rag_system.main import get_agent; print('✅ Installation successful!')\"\n\n# Validate complete setup\npython run_system.py --health\n```\n\n---\n\n## 🎯 Getting Started\n\n### 1. Create Your First Index\n\nAn **index** is a collection of processed documents that you can chat with.\n\n#### Using the Web Interface:\n1. Open http://localhost:3000\n2. Click \"Create New Index\"\n3. Upload your documents (PDF, DOCX, TXT)\n4. Configure processing options\n5. Click \"Build Index\"\n\n#### Using Scripts:\n```bash\n# Simple script approach\n./simple_create_index.sh \"My Documents\" \"path/to/document.pdf\"\n\n# Interactive script\npython create_index_script.py\n```\n\n#### Using API:\n```bash\n# Create index\ncurl -X POST http://localhost:8000/indexes \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\": \"My Index\", \"description\": \"My documents\"}'\n\n# Upload documents\ncurl -X POST http://localhost:8000/indexes/INDEX_ID/upload \\\n  -F \"files=@document.pdf\"\n\n# Build index\ncurl -X POST http://localhost:8000/indexes/INDEX_ID/build\n```\n\n### 2. Start Chatting\n\nOnce your index is built:\n\n1. **Create a Chat Session**: Click \"New Chat\" or use an existing session\n2. **Select Your Index**: Choose which document collection to query\n3. **Ask Questions**: Type natural language questions about your documents\n4. **Get Answers**: Receive AI-generated responses with source citations\n\n### 3. Advanced Features\n\n#### Custom Model Configuration\n```bash\n# Use different models for different tasks\ncurl -X POST http://localhost:8000/sessions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"title\": \"High Quality Session\",\n    \"model\": \"qwen3:8b\",\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-4B\"\n  }'\n```\n\n#### Batch Document Processing\n```bash\n# Process multiple documents at once\npython demo_batch_indexing.py --config batch_indexing_config.json\n```\n\n#### API Integration\n```python\nimport requests\n\n# Chat with your documents via API\nresponse = requests.post('http://localhost:8000/chat', json={\n    'query': 'What are the key findings in the research papers?',\n    'session_id': 'your-session-id',\n    'search_type': 'hybrid',\n    'retrieval_k': 20\n})\n\nprint(response.json()['response'])\n```\n\n---\n\n## 🔧 Configuration\n\n### Model Configuration\n\nLocalGPT supports multiple AI model providers with centralized configuration:\n\n#### Ollama Models (Local Inference)\n```python\nOLLAMA_CONFIG = {\n    \"host\": \"http://localhost:11434\",\n    \"generation_model\": \"qwen3:8b\",        # Main text generation\n    \"enrichment_model\": \"qwen3:0.6b\"       # Lightweight routing/enrichment\n}\n```\n\n#### External Models (HuggingFace Direct)\n```python\nEXTERNAL_MODELS = {\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-0.6B\",           # 1024 dimensions\n    \"reranker_model\": \"answerdotai/answerai-colbert-small-v1\", # ColBERT reranker\n    \"fallback_reranker\": \"BAAI/bge-reranker-base\"             # Backup reranker\n}\n```\n\n### Pipeline Configuration\n\nLocalGPT offers two main pipeline configurations:\n\n#### Default Pipeline (Production-Ready)\n```python\n\"default\": {\n    \"description\": \"Production-ready pipeline with hybrid search, AI reranking, and verification\",\n    \"storage\": {\n        \"lancedb_uri\": \"./lancedb\",\n        \"text_table_name\": \"text_pages_v3\",\n        \"bm25_path\": \"./index_store/bm25\"\n    },\n    \"retrieval\": {\n        \"retriever\": \"multivector\",\n        \"search_type\": \"hybrid\",\n        \"late_chunking\": {\"enabled\": True},\n        \"dense\": {\"enabled\": True, \"weight\": 0.7},\n        \"bm25\": {\"enabled\": True}\n    },\n    \"reranker\": {\n        \"enabled\": True,\n        \"type\": \"ai\",\n        \"strategy\": \"rerankers-lib\",\n        \"model_name\": \"answerdotai/answerai-colbert-small-v1\",\n        \"top_k\": 10\n    },\n    \"query_decomposition\": {\"enabled\": True, \"max_sub_queries\": 3},\n    \"verification\": {\"enabled\": True},\n    \"retrieval_k\": 20,\n    \"contextual_enricher\": {\"enabled\": True, \"window_size\": 1}\n}\n```\n\n#### Fast Pipeline (Speed-Optimized)\n```python\n\"fast\": {\n    \"description\": \"Speed-optimized pipeline with minimal overhead\",\n    \"retrieval\": {\n        \"search_type\": \"vector_only\",\n        \"late_chunking\": {\"enabled\": False}\n    },\n    \"reranker\": {\"enabled\": False},\n    \"query_decomposition\": {\"enabled\": False},\n    \"verification\": {\"enabled\": False},\n    \"retrieval_k\": 10,\n    \"contextual_enricher\": {\"enabled\": False}\n}\n```\n\n### Search Configuration\n\n```python\nSEARCH_CONFIG = {\n    'hybrid': {\n        'dense_weight': 0.7,\n        'sparse_weight': 0.3,\n        'retrieval_k': 20,\n        'reranker_top_k': 10\n    }\n}\n```\n---\n\n## 🛠️ Troubleshooting\n\n### Common Issues\n\n#### Installation Problems\n```bash\n# Check Python version\npython --version  # Should be 3.8+\n\n# Check dependencies\npip list | grep -E \"(torch|transformers|lancedb)\"\n\n# Reinstall dependencies\npip install -r requirements.txt --force-reinstall\n```\n\n#### Model Loading Issues\n```bash\n# Check Ollama status\nollama list\ncurl http://localhost:11434/api/tags\n\n# Pull missing models\nollama pull qwen3:0.6b\n```\n\n#### Database Issues\n```bash\n# Check database connectivity\npython -c \"from backend.database import ChatDatabase; db = ChatDatabase(); print('✅ Database OK')\"\n\n# Reset database (WARNING: This deletes all data)\nrm backend/chat_data.db\npython -c \"from backend.database import ChatDatabase; ChatDatabase().init_database()\"\n```\n\n#### Performance Issues\n```bash\n# Check system resources\npython system_health_check.py\n\n# Monitor memory usage\nhtop  # or Task Manager on Windows\n\n# Optimize for low-memory systems\nexport PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512\n```\n\n### Getting Help\n\n1. **Check Logs**: The system creates structured logs in the `logs/` directory:\n   - `logs/system.log`: Main system events and errors\n   - `logs/ollama.log`: Ollama server logs\n   - `logs/rag-api.log`: RAG API processing logs\n   - `logs/backend.log`: Backend server logs\n   - `logs/frontend.log`: Frontend build and runtime logs\n\n2. **System Health**: Run comprehensive diagnostics:\n   ```bash\n   python system_health_check.py  # Full system diagnostics\n   python run_system.py --health  # Service status check\n   ```\n\n3. **Health Endpoints**: Check individual service health:\n   - Backend: `http://localhost:8000/health`\n   - RAG API: `http://localhost:8001/health`\n   - Ollama: `http://localhost:11434/api/tags`\n\n4. **Documentation**: Check the [Technical Documentation](TECHNICAL_DOCS.md)\n5. **GitHub Issues**: Report bugs and request features\n6. **Community**: Join our Discord/Slack community\n\n---\n\n## 🔗 API Reference\n\n### Core Endpoints\n\n#### Chat API\n```http\n# Session-based chat (recommended)\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the main topics discussed?\",\n  \"search_type\": \"hybrid\",\n  \"retrieval_k\": 20,\n  \"ai_rerank\": true,\n  \"context_window_size\": 5\n}\n\n# Legacy chat endpoint\nPOST /chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the main topics discussed?\",\n  \"session_id\": \"uuid\",\n  \"search_type\": \"hybrid\",\n  \"retrieval_k\": 20\n}\n```\n\n#### Index Management\n```http\n# Create index\nPOST /indexes\nContent-Type: application/json\n{\n  \"name\": \"My Index\",\n  \"description\": \"Description\",\n  \"config\": \"default\"\n}\n\n# Get all indexes\nGET /indexes\n\n# Get specific index\nGET /indexes/{id}\n\n# Upload documents to index\nPOST /indexes/{id}/upload\nContent-Type: multipart/form-data\nfiles: [file1.pdf, file2.pdf, ...]\n\n# Build index (process uploaded documents)\nPOST /indexes/{id}/build\nContent-Type: application/json\n{\n  \"config_mode\": \"default\",\n  \"enable_enrich\": true,\n  \"chunk_size\": 512\n}\n\n# Delete index\nDELETE /indexes/{id}\n```\n\n#### Session Management\n```http\n# Create session\nPOST /sessions\nContent-Type: application/json\n{\n  \"title\": \"My Session\",\n  \"model\": \"qwen3:0.6b\"\n}\n\n# Get all sessions\nGET /sessions\n\n# Get specific session\nGET /sessions/{session_id}\n\n# Get session documents\nGET /sessions/{session_id}/documents\n\n# Get session indexes\nGET /sessions/{session_id}/indexes\n\n# Link index to session\nPOST /sessions/{session_id}/indexes/{index_id}\n\n# Delete session\nDELETE /sessions/{session_id}\n\n# Rename session\nPOST /sessions/{session_id}/rename\nContent-Type: application/json\n{\n  \"new_title\": \"Updated Session Name\"\n}\n```\n\n### Advanced Features\n\n#### Query Decomposition\nThe system can break complex queries into sub-questions for better answers:\n```http\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"Compare the methodologies and analyze their effectiveness\",\n  \"query_decompose\": true,\n  \"compose_sub_answers\": true\n}\n```\n\n#### Answer Verification\nIndependent verification pass for accuracy using a separate verification model:\n```http\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the key findings?\",\n  \"verify\": true\n}\n```\n\n#### Contextual Enrichment\nDocument context enrichment during indexing for better understanding:\n```bash\n# Enable during index building\nPOST /indexes/{id}/build\n{\n  \"enable_enrich\": true,\n  \"window_size\": 2\n}\n```\n\n#### Late Chunking\nBetter context preservation by chunking after embedding:\n```bash\n# Configure in pipeline\n\"late_chunking\": {\"enabled\": true}\n```\n\n#### Streaming Chat\n```http\nPOST /chat/stream\nContent-Type: application/json\n\n{\n  \"query\": \"Explain the methodology\",\n  \"session_id\": \"uuid\",\n  \"stream\": true\n}\n```\n\n#### Batch Processing\n```bash\n# Using the batch indexing script\npython demo_batch_indexing.py --config batch_indexing_config.json\n\n# Example batch configuration (batch_indexing_config.json):\n{\n  \"index_name\": \"Sample Batch Index\",\n  \"index_description\": \"Example batch index configuration\",\n  \"documents\": [\n    \"./rag_system/documents/invoice_1039.pdf\",\n    \"./rag_system/documents/invoice_1041.pdf\"\n  ],\n  \"processing\": {\n    \"chunk_size\": 512,\n    \"chunk_overlap\": 64,\n    \"enable_enrich\": true,\n    \"enable_latechunk\": true,\n    \"enable_docling\": true,\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-0.6B\",\n    \"generation_model\": \"qwen3:0.6b\",\n    \"retrieval_mode\": \"hybrid\",\n    \"window_size\": 2\n  }\n}\n```\n\n```http\n# API endpoint for batch processing\nPOST /batch/index\nContent-Type: application/json\n\n{\n  \"file_paths\": [\"doc1.pdf\", \"doc2.pdf\"],\n  \"config\": {\n    \"chunk_size\": 512,\n    \"enable_enrich\": true,\n    \"enable_latechunk\": true,\n    \"enable_docling\": true\n  }\n}\n```\n\nFor complete API documentation, see [API_REFERENCE.md](API_REFERENCE.md).\n\n---\n\n## 🏗️ Architecture\n\nLocalGPT is built with a modular, scalable architecture:\n\n```mermaid\ngraph TB\n    UI[Web Interface] --> API[Backend API]\n    API --> Agent[RAG Agent]\n    Agent --> Retrieval[Retrieval Pipeline]\n    Agent --> Generation[Generation Pipeline]\n\n    Retrieval --> Vector[Vector Search]\n    Retrieval --> BM25[BM25 Search]\n    Retrieval --> Rerank[Reranking]\n\n    Vector --> LanceDB[(LanceDB)]\n    BM25 --> BM25DB[(BM25 Index)]\n\n    Generation --> Ollama[Ollama Models]\n    Generation --> HF[Hugging Face Models]\n\n    API --> SQLite[(SQLite DB)]\n```\n\nOverview of the Retrieval Agent\n\n```mermaid\ngraph TD\n    classDef llmcall fill:#e6f3ff,stroke:#007bff;\n    classDef pipeline fill:#e6ffe6,stroke:#28a745;\n    classDef cache fill:#fff3e0,stroke:#fd7e14;\n    classDef logic fill:#f8f9fa,stroke:#6c757d;\n    classDef thread stroke-dasharray: 5 5;\n\n    A(Start: Agent.run) --> B_asyncio.run(_run_async);\n    B --> C{_run_async};\n\n    C --> C1[Get Chat History];\n    C1 --> T1[Build Triage Prompt <br/> Query + Doc Overviews ];\n    T1 --> T2[\"(asyncio.to_thread)<br/>LLM Triage: RAG or LLM_DIRECT?\"]; class T2 llmcall,thread;\n    T2 --> T3{Decision?};\n\n    T3 -- RAG --> RAG_Path;\n    T3 -- LLM_DIRECT --> LLM_Path;\n\n    subgraph RAG Path\n        RAG_Path --> R1[Format Query + History];\n        R1 --> R2[\"(asyncio.to_thread)<br/>Generate Query Embedding\"]; class R2 pipeline,thread;\n        R2 --> R3{{Check Semantic Cache}}; class R3 cache;\n        R3 -- Hit --> R_Cache_Hit(Return Cached Result);\n        R_Cache_Hit --> R_Hist_Update;\n        R3 -- Miss --> R4{Decomposition <br/> Enabled?};\n\n        R4 -- Yes --> R5[\"(asyncio.to_thread)<br/>Decompose Raw Query\"]; class R5 llmcall,thread;\n        R5 --> R6{{Run Sub-Queries <br/> Parallel RAG Pipeline}}; class R6 pipeline,thread;\n        R6 --> R7[Collect Results & Docs];\n        R7 --> R8[\"(asyncio.to_thread)<br/>Compose Final Answer\"]; class R8 llmcall,thread;\n        R8 --> V1(RAG Answer);\n\n        R4 -- No --> R9[\"(asyncio.to_thread)<br/>Run Single Query <br/>(RAG Pipeline)\"]; class R9 pipeline,thread;\n        R9 --> V1;\n\n        V1 --> V2{{Verification <br/> await verify_async}}; class V2 llmcall;\n        V2 --> V3(Final RAG Result);\n        V3 --> R_Cache_Store{{Store in Semantic Cache}}; class R_Cache_Store cache;\n        R_Cache_Store --> FinalResult;\n    end\n\n    subgraph Direct LLM Path\n        LLM_Path --> L1[Format Query + History];\n        L1 --> L2[\"(asyncio.to_thread)<br/>Generate Direct LLM Answer <br/> (No RAG)\"]; class L2 llmcall,thread;\n        L2 --> FinalResult(Final Direct Result);\n    end\n\n    FinalResult --> R_Hist_Update(Update Chat History);\n    R_Hist_Update --> ZZZ(End: Return Result);\n```\n\n---\n\n## 🤝 Contributing\n\nWe welcome contributions from developers of all skill levels! LocalGPT is an open-source project that benefits from community involvement.\n\n### 🚀 Quick Start for Contributors\n\n```bash\n# Fork and clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Set up development environment\npip install -r requirements.txt\nnpm install\n\n# Install Ollama and models\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b qwen3:8b\n\n# Verify setup\npython system_health_check.py\npython run_system.py --mode dev\n```\n\n### 📋 How to Contribute\n\n1. **🐛 Report Bugs**: Use our [bug report template](.github/ISSUE_TEMPLATE/bug_report.md)\n2. **💡 Request Features**: Use our [feature request template](.github/ISSUE_TEMPLATE/feature_request.md)\n3. **🔧 Submit Code**: Follow our [development workflow](CONTRIBUTING.md#development-workflow)\n4. **📚 Improve Docs**: Help make our documentation better\n\n### 📖 Detailed Guidelines\n\nFor comprehensive contributing guidelines, including:\n- Development setup and workflow\n- Coding standards and best practices\n- Testing requirements\n- Documentation standards\n- Release process\n\n**👉 See our [CONTRIBUTING.md](CONTRIBUTING.md) guide**\n\n---\n\n## 📄 License\n\nThis project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details. For models, please check their respective licenses.\n\n---\n\n## 📞 Support\n\n- **Documentation**: [Technical Docs](TECHNICAL_DOCS.md)\n- **Issues**: [GitHub Issues](https://github.com/PromtEngineer/localGPT/issues)\n- **Discussions**: [GitHub Discussions](https://github.com/PromtEngineer/localGPT/discussions)\n- **Business Deployment and Customization**: [Contact Us](https://tally.so/r/wv6R2d)\n---\n\n<div align=\"center\">\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=PromtEngineer/localGPT&type=Date)](https://star-history.com/#PromtEngineer/localGPT&Date)\n","summary":"LocalGPT is a fully private, on-premise document intelligence platform that allows users to interact with their files using state-of-the-art AI without data ever leaving their machine. It features a sophisticated hybrid search engine, smart query routing, and contextual enrichment to provide highly accurate, document-based insights. With support for diverse open-source models, multiple hardware platforms, and a modular API, this project is ideal for developers and privacy-conscious organizations looking to deploy custom RAG applications securely.","description":"Chat with your documents on your local device using GPT models. No data leaves your device and 100% private. ","stars":22207,"language":"Python"},{"owner":"pydantic","repo":"pydantic-ai","url":"https://github.com/pydantic/pydantic-ai","readme":"<div align=\"center\">\n  <a href=\"https://ai.pydantic.dev/\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://pydantic.dev/docs/ai/img/pydantic-ai-dark.svg\">\n      <img src=\"https://pydantic.dev/docs/ai/img/pydantic-ai-light.svg\" alt=\"Pydantic AI\">\n    </picture>\n  </a>\n</div>\n<div align=\"center\">\n  <h3>GenAI Agent Framework, the Pydantic way</h3>\n</div>\n<div align=\"center\">\n  <a href=\"https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml?query=branch%3Amain\"><img src=\"https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml/badge.svg?event=push\" alt=\"CI\"></a>\n  <a href=\"https://coverage-badge.samuelcolvin.workers.dev/redirect/pydantic/pydantic-ai\"><img src=\"https://coverage-badge.samuelcolvin.workers.dev/pydantic/pydantic-ai.svg\" alt=\"Coverage\"></a>\n  <a href=\"https://pypi.python.org/pypi/pydantic-ai\"><img src=\"https://img.shields.io/pypi/v/pydantic-ai.svg\" alt=\"PyPI\"></a>\n  <a href=\"https://github.com/pydantic/pydantic-ai\"><img src=\"https://img.shields.io/pypi/pyversions/pydantic-ai.svg\" alt=\"versions\"></a>\n  <a href=\"https://github.com/pydantic/pydantic-ai/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/pydantic/pydantic-ai.svg?v\" alt=\"license\"></a>\n  <a href=\"https://logfire.pydantic.dev/docs/join-slack/\"><img src=\"https://img.shields.io/badge/Slack-Join%20Slack-4A154B?logo=slack\" alt=\"Join Slack\" /></a>\n</div>\n\n---\n\n**Documentation**: [ai.pydantic.dev](https://ai.pydantic.dev/)\n\n---\n\n### <em>Pydantic AI is a Python agent framework designed to help you quickly, confidently, and painlessly build production grade applications and workflows with Generative AI.</em>\n\n\nFastAPI revolutionized web development by offering an innovative and ergonomic design, built on the foundation of [Pydantic Validation](https://docs.pydantic.dev) and modern Python features like type hints.\n\nYet despite virtually every Python agent framework and LLM library using Pydantic Validation, when we began to use LLMs in [Pydantic Logfire](https://pydantic.dev/logfire), we couldn't find anything that gave us the same feeling.\n\nWe built Pydantic AI with one simple aim: to bring that FastAPI feeling to GenAI app and agent development.\n\n## Why use Pydantic AI\n\n1. **Built by the Pydantic Team**:\n[Pydantic Validation](https://docs.pydantic.dev/latest/) is the validation layer of the OpenAI SDK, the Google ADK, the Anthropic SDK, LangChain, LlamaIndex, AutoGPT, Transformers, CrewAI, Instructor and many more. _Why use the derivative when you can go straight to the source?_ :smiley:\n\n2. **Model-agnostic**:\nSupports virtually every [model](https://ai.pydantic.dev/models/overview) and provider: OpenAI, Anthropic, Gemini, DeepSeek, Grok, Cohere, Mistral, and Perplexity; Azure AI Foundry, Amazon Bedrock, Google Cloud, Ollama, LiteLLM, Groq, OpenRouter, Together AI, Fireworks AI, Cerebras, Hugging Face, GitHub, Heroku, Vercel, Nebius, OVHcloud, Alibaba Cloud, and SambaNova. If your favorite model or provider is not listed, you can easily implement a [custom model](https://ai.pydantic.dev/models/overview#custom-models).\n\n3. **Seamless Observability**:\nTightly [integrates](https://ai.pydantic.dev/logfire) with [Pydantic Logfire](https://pydantic.dev/logfire), our general-purpose OpenTelemetry observability platform, for real-time debugging, evals-based performance monitoring, and behavior, tracing, and cost tracking. If you already have an observability platform that supports OTel, you can [use that too](https://ai.pydantic.dev/logfire#alternative-observability-backends).\n\n4. **Fully Type-safe**:\nDesigned to give your IDE or AI coding agent as much context as possible for auto-completion and [type checking](https://ai.pydantic.dev/agents#static-type-checking), moving entire classes of errors from runtime to write-time for a bit of that Rust \"if it compiles, it works\" feel.\n\n5. **Powerful Evals**:\nEnables you to systematically test and [evaluate](https://ai.pydantic.dev/evals) the performance and accuracy of the agentic systems you build, and monitor the performance over time in Pydantic Logfire.\n\n6. **Extensible by Design**:\nBuild agents from composable [capabilities](https://ai.pydantic.dev/capabilities) that bundle tools, hooks, instructions, and model settings into reusable units. Use built-in capabilities for [web search](https://ai.pydantic.dev/capabilities#provider-adaptive-tools), [thinking](https://ai.pydantic.dev/capabilities#thinking), and [MCP](https://ai.pydantic.dev/capabilities#provider-adaptive-tools), pick from the [Pydantic AI Harness](https://ai.pydantic.dev/harness/overview) capability library, build your own, or install [third-party capability packages](https://ai.pydantic.dev/extensibility). Define agents entirely in [YAML/JSON](https://ai.pydantic.dev/agent-spec) — no code required.\n\n7. **MCP, A2A, and UI**:\nIntegrates the [Model Context Protocol](https://ai.pydantic.dev/mcp/overview), [Agent2Agent](https://ai.pydantic.dev/a2a), and various [UI event stream](https://ai.pydantic.dev/ui/overview) standards to give your agent access to external tools and data, let it interoperate with other agents, and build interactive applications with streaming event-based communication.\n\n8. **Human-in-the-Loop Tool Approval**:\nEasily lets you flag that certain tool calls [require approval](https://ai.pydantic.dev/deferred-tools#human-in-the-loop-tool-approval) before they can proceed, possibly depending on tool call arguments, conversation history, or user preferences.\n\n9. **Durable Execution**:\nEnables you to build [durable agents](https://ai.pydantic.dev/durable_execution/overview/) that can preserve their progress across transient API failures and application errors or restarts, and handle long-running, asynchronous, and human-in-the-loop workflows with production-grade reliability.\n\n10. **Streamed Outputs**:\nProvides the ability to [stream](https://ai.pydantic.dev/output#streamed-results) structured output continuously, with immediate validation, ensuring real time access to generated data.\n\n11. **Graph Support**:\nProvides a powerful way to define [graphs](https://ai.pydantic.dev/graph) using type hints, for use in complex applications where standard control flow can degrade to spaghetti code.\n\nRealistically though, no list is going to be as convincing as [giving it a try](#next-steps) and seeing how it makes you feel!\n\n## Hello World Example\n\nHere's a minimal example of Pydantic AI:\n\n```python\nfrom pydantic_ai import Agent\n\n# Define a very simple agent including the model to use, you can also set the model when running the agent.\nagent = Agent(\n    'anthropic:claude-sonnet-4-6',\n    # Register static instructions using a keyword argument to the agent.\n    # For more complex dynamically-generated instructions, see the example below.\n    instructions='Be concise, reply with one sentence.',\n)\n\n# Run the agent synchronously, conducting a conversation with the LLM.\nresult = agent.run_sync('Where does \"hello world\" come from?')\nprint(result.output)\n\"\"\"\nThe first known use of \"hello, world\" was in a 1974 textbook about the C programming language.\n\"\"\"\n```\n\n_(This example is complete, it can be run \"as is\", assuming you've [installed the `pydantic_ai` package](https://ai.pydantic.dev/install))_\n\nThe exchange will be very short: Pydantic AI will send the instructions and the user prompt to the LLM, and the model will return a text response.\n\nNot very interesting yet, but we can easily add [tools](https://ai.pydantic.dev/tools), [dynamic instructions](https://ai.pydantic.dev/agents#instructions), [structured outputs](https://ai.pydantic.dev/output), or composable [capabilities](https://ai.pydantic.dev/capabilities) to build more powerful agents.\n\nHere's the same agent with [thinking](https://ai.pydantic.dev/capabilities#thinking) and [web search](https://ai.pydantic.dev/capabilities#provider-adaptive-tools) capabilities:\n\n```python\nfrom pydantic_ai import Agent\nfrom pydantic_ai.capabilities import Thinking, WebSearch\n\nagent = Agent(\n    'anthropic:claude-sonnet-4-6',\n    instructions='Be concise, reply with one sentence.',\n    capabilities=[Thinking(), WebSearch()],\n)\n\nresult = agent.run_sync('What was the mass of the largest meteorite found this year?')\nprint(result.output)\n```\n\n## Tools & Dependency Injection Example\n\nHere is a concise example using Pydantic AI to build a support agent for a bank:\n\n**(Better documented example [in the docs](https://ai.pydantic.dev/#tools-dependency-injection-example))**\n\n```python\nfrom dataclasses import dataclass\n\nfrom pydantic import BaseModel, Field\nfrom pydantic_ai import Agent, RunContext\n\nfrom bank_database import DatabaseConn\n\n\n# SupportDependencies is used to pass data, connections, and logic into the model that will be needed when running\n# instructions and tool functions. Dependency injection provides a type-safe way to customise the behavior of your agents.\n@dataclass\nclass SupportDependencies:\n    customer_id: int\n    db: DatabaseConn\n\n\n# This Pydantic model defines the structure of the output returned by the agent.\nclass SupportOutput(BaseModel):
