nformation from major self-media platforms including Xiaohongshu, Douyin, Bilibili, and Weibo. By leveraging the Playwright automation framework to maintain active login states, the project bypasses the need for complex JavaScript reverse engineering to retrieve platform data. It offers a comprehensive feature set for researchers and developers, including support for keyword searches, creator profiles, comment analysis, and proxy pool integration. This tool is an ideal resource for those looking to study automated data collection techniques or build analytical applications around social media content.","description":"小红书笔记 | 评论爬虫、抖音视频 | 评论爬虫、快手视频 | 评论爬虫、B 站视频 ｜ 评论爬虫、微博帖子 ｜ 评论爬虫、百度贴吧帖子 ｜ 百度贴吧评论回复爬虫  | 知乎问答文章｜评论爬虫","stars":50628,"language":"Python"},{"owner":"Kilo-Org","repo":"kilocode","url":"https://github.com/Kilo-Org/kilocode","readme":"<p align=\"center\">\n  <a href=\"https://marketplace.visualstudio.com/items?itemName=kilocode.Kilo-Code\"><img src=\"https://raster.shields.io/badge/VS_Code_Marketplace-007ACC?style=flat&logo=visualstudiocode&logoColor=white\" alt=\"VS Code Marketplace\" height=\"20\"></a>\n  <a href=\"https://x.com/kilocode\"><img src=\"https://raster.shields.io/badge/kilocode-000000?style=flat&logo=x&logoColor=white\" alt=\"X (Twitter)\" height=\"20\"></a>\n  <a href=\"https://blog.kilo.ai\"><img src=\"https://raster.shields.io/badge/Blog-555?style=flat&logo=substack&logoColor=white\" alt=\"Substack Blog\" height=\"20\"></a>\n  <a href=\"https://kilo.ai/discord\"><img src=\"https://raster.shields.io/badge/Join%20Discord-5865F2?style=flat&logo=discord&logoColor=white\" alt=\"Discord\" height=\"20\"></a>\n  <a href=\"https://www.reddit.com/r/kilocode/\"><img src=\"https://raster.shields.io/badge/Join%20r%2Fkilocode-D84315?style=flat&logo=reddit&logoColor=white\" alt=\"Reddit\" height=\"20\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://kilo.ai\"><img width=\"250\" alt=\"kilo-code-logo\" src=\"https://github.com/user-attachments/assets/bdb0c174-b9fd-40ad-a47b-f3aab9b54e8d\" /></a>\n</p>\n\n<p align=\"center\">\n  <strong>Kilo is the all-in-one agentic engineering platform.</strong><br>\n  Build, ship, and iterate faster with the most popular open source coding agent.\n</p>\n\n<p align=\"center\">\n  <img width=\"100%\" alt=\"Kilo Code running inside VS Code\" src=\"https://kilo.ai/_next/image?url=%2Fscreenshots%2Fvs-code%2Fvs-code-home-page-screenshot.png&w=3840&q=75\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://kilo.ai\">Website</a> ·\n  <a href=\"https://kilo.ai/install\">Install</a> ·\n  <a href=\"https://kilo.ai/landing/vs-code\">IDE</a> ·\n  <a href=\"https://kilo.ai/cli\">CLI</a> ·\n  <a href=\"https://kilo.ai/docs\">Docs</a> ·\n  <a href=\"https://kilo.ai/leaderboard\">Models</a> ·\n  <a href=\"https://kilo.ai/gateway\">Gateway</a> ·\n  <a href=\"https://kilo.ai/pricing\">Pricing</a> ·\n  <a href=\"https://kilo.ai/pricing/kilo-pass\">Kilo Pass</a>\n</p>\n\n<p align=\"center\">\n  500+ models. One open source agent in <a href=\"https://kilo.ai/install\">VS Code</a>, <a href=\"https://kilo.ai/features/jetbrains-native\">JetBrains</a>, <a href=\"https://kilo.ai/cli\">CLI</a>, <a href=\"https://kilo.ai/slack\">Slack</a>, and <a href=\"https://kilo.ai/cloud\">Cloud</a>.\n</p>\n\n- ✨ Generate code from natural language\n- ✅ Checks its own work\n- 🧪 Run terminal commands\n- 🌐 Automate the browser\n- ⚡ Inline autocomplete suggestions\n- 🤖 Latest AI models\n- 🎁 API keys optional\n\n## Quick Links\n\n- [VS Code Marketplace](https://kilo.ai/vscode-marketplace?utm_source=Readme) (download)\n- Install CLI: `npm install -g @kilocode/cli`\n- [Official Kilo.ai Home page](https://kilo.ai) (learn more)\n\n## Key Features\n\n- **Code Generation:** Kilo can generate code using natural language.\n- **Inline Autocomplete:** Get intelligent code completions as you type, powered by AI.\n- **Task Automation:** Kilo can automate repetitive coding tasks to save time.\n- **Automated Refactoring:** Kilo can refactor and improve existing code efficiently.\n- **MCP Server Marketplace**: Kilo can easily find, and use MCP servers to extend the agent capabilities.\n- **Multi Mode**: Plan with Architect, Code with Coder, and Debug with Debugger, and make your own custom modes.\n\n## Get Started in Visual Studio Code\n\n1. Install the Kilo Code extension from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=kilocode.Kilo-Code).\n2. Create your account to access 500+ cutting-edge AI models including GPT-5.5, Claude Opus 4.7, Claude Sonnet 4.6, and Gemini 3.1 Pro Preview, with transparent pricing that matches provider rates exactly.\n3. Start coding with AI that adapts to your workflow. Watch our quick-start guide to see Kilo in action:\n\n<a href=\"https://youtu.be/pqGfYXgrhig\"><img src=\"https://img.youtube.com/vi/pqGfYXgrhig/maxresdefault.jpg\" alt=\"Watch the video\" width=\"640\" height=\"360\"></a>\n\n## Get Started with the CLI\n\n```bash\n# npm\nnpm install -g @kilocode/cli\n\n# Or run directly with npx\nnpx @kilocode/cli\n```\n\nThen run `kilo` in any project directory to start.\n\n<!-- kilocode_change start -->\n\n### npm Install Note: Hidden `.kilo` File\n\nOn some systems and npm versions, installing `@kilocode/cli` can create a hidden `.kilo` file near the installed `kilo` command (for example in a global npm bin directory). This file is an npm-generated launcher helper, not project data.\n\n- Why it exists: npm may create helper artifacts while wiring CLI executables.\n- Size caveat: size can vary by platform, npm version, and install mode (symlink vs copied launcher), so a strict fixed size is not guaranteed.\n- Safety: it is safe to leave in place. Do not edit it manually. Use your package manager's uninstall (`npm uninstall -g @kilocode/cli`) to remove install artifacts cleanly.\n<!-- kilocode_change end -->\n\n### Install from GitHub Releases (Optional)\n\nDownload the latest binary or source code from the [Releases page](https://github.com/Kilo-Org/kilocode/releases), use this quick guide:\n\n- `kilo-<os>-<arch>.zip` is the CLI binary for your OS and CPU architecture on Windows and macOS. (`kilo-linux-<arch>.tar.gz` for Linux)\n- `darwin` means macOS.\n- `x64` is standard 64-bit Intel/AMD CPUs.\n- `x64-baseline` is a compatibility build for older x64 CPUs(do not support AVX Instruction).\n- `arm64` is ARM-based Linux/MacOS.\n- `musl` is statically linked Linux build for Alpine/minimal Docker without glibc. Alpine/minimal Docker users should prefer the matching \\*-musl asset.\n- `kilo-vscode-*.vsix` is the VS Code extension package and not the CLI binary.\n- `Source code` releases are for building from source, not normal installation.\n\nFor most users:\n\n- **Windows (most PCs):** `kilo-windows-x64.zip`\n- **macOS Apple Silicon:** `kilo-darwin-arm64.zip`\n- **macOS Intel:** `kilo-darwin-x64.zip`\n- **Linux x64:** `kilo-linux-x64.tar.gz`\n- **Linux on ARM:** `kilo-linux-arm64.tar.gz`\n\n### Autonomous Mode (CI/CD)\n\nUse the `--auto` flag with `kilo run` to enable fully autonomous operation without user interaction. This is ideal for CI/CD pipelines and automated workflows:\n\n```bash\nkilo run --auto \"run tests and fix any failures\"\n```\n\n**Important:** The `--auto` flag disables all permission prompts and allows the agent to execute any action without confirmation. Only use this in trusted environments like CI/CD pipelines.\n\n## Contributing\n\nWe welcome contributions from developers, writers, and enthusiasts!\nTo get started, please read our [Contributing Guide](/CONTRIBUTING.md). It includes details on setting up your environment, coding standards, types of contribution and how to submit pull requests.\n\nSee [RELEASING.md](RELEASING.md) for the VS Code extension and CLI release process.\n\nSee [packages/kilo-jetbrains/RELEASING.md](packages/kilo-jetbrains/RELEASING.md) for the JetBrains plugin release process.\n\n## Code of Conduct\n\nOur community is built on respect, inclusivity, and collaboration. Please review our [Code of Conduct](/CODE_OF_CONDUCT.md) to understand the expectations for all contributors and community members.\n\n## License\n\nThis project is licensed under the MIT License.\nYou’re free to use, modify, and distribute this code, including for commercial purposes as long as you include proper attribution and license notices. See [License](/LICENSE).\n\n## FAQ\n\n<details>\n<summary>Where did Kilo CLI come from?</summary>\n\nKilo CLI is a fork of [OpenCode](https://github.com/anomalyco/opencode), enhanced to work within the Kilo agentic engineering platform.\n\n</details>\n","summary":"Kilo is an all-in-one agentic engineering platform designed to streamline software development through natural language code generation, automated testing, and browser automation. It offers a versatile toolset that includes inline autocomplete, automated refactoring, and multi-mode task execution, all accessible via a VS Code extension, JetBrains plugin, and a dedicated CLI. By providing access to over 500 AI models and supporting customizable MCP servers, Kilo empowers developers and engineering teams to build, ship, and iterate on their projects more efficiently.","description":"Kilo is the all-in-one agentic engineering platform. Build, ship, and iterate faster with the most popular open source coding agent.","stars":19798,"language":"TypeScript"},{"owner":"codexu","repo":"note-gen","url":"https://github.com/codexu/note-gen","readme":"# NoteGen\n\n![](https://img.shields.io/badge/free-pricing?logo=free&color=%20%23155EEF&label=pricing&labelColor=%20%23528bff)\n[![GitHub Repo stars](https://img.shields.io/github/stars/codexu/note-gen)](https://github.com/codexu/note-gen)\n[![](https://gitcode.com/codexu/note-gen/star/badge.svg)](https://gitcode.com/codexu/note-gen)\n![](https://github.com/codexu/note-gen/actions/workflows/release.yml/badge.svg?branch=release)\n[![Netlify Status](https://api.netlify.com/api/v1/badges/8f7518c3-b627-4277-bc2f-e477960f5dc4/deploy-status)](https://app.netlify.com/projects/note-gen-docs/deploys)\n![](https://img.shields.io/github/downloads/codexu/note-gen/total)\n![](https://img.shields.io/github/issues-closed/codexu/note-gen)\n\n<div>\n  <a href=\"https://trendshift.io/repositories/12784\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/12784\" alt=\"codexu%2Fnote-gen | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n  <a href=\"https://hellogithub.com/repository/0163cb946dca44cc8905dbe34c2c987b\" target=\"_blank\"><img src=\"https://abroad.hellogithub.com/v1/widgets/recommend.svg?rid=0163cb946dca44cc8905dbe34c2c987b&claim_uid=YJ39kIMBz1TGAvc\" alt=\"Featured｜HelloGitHub\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n  <a href=\"https://www.producthunt.com/products/notegen-2?embed=true&utm_source=badge-featured&utm_medium=badge&utm_source=badge-notegen&#0045;2\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=956348&theme=light&t=1749194675492\" alt=\"NoteGen - A&#0032;cross&#0045;platform&#0032;Markdown&#0032;note&#0045;taking&#0032;application | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n</div>\n\n## Guide\n\n🖥️ Official Document: [English](https://notegen.top/en/) | [简体中文](https://notegen.top/cn/)\n\n💬 Join [WeChat/QQ Group](https://github.com/codexu/note-gen/discussions/110), [Discord](https://discord.gg/SXyVZGpbpk), [Telegram](https://t.me/notegen)\n\nNoteGen is an open-source, cross-platform `Markdown` note app built for messy thinking: capture first, organize later, and let AI turn fragments into readable notes.\n\n![](https://s2.loli.net/2025/12/22/jlpEP2c6ogwHhIA.png)\n\n## Features\n\n- ✍️ Capture first, organize later: turn scattered inputs into structured notes without breaking your flow.\n- 🤖 AI-native writing workflow: chat, rewrite, translate, and polish notes right beside your editor.\n- 🖼️ Image workflow: capture, recognize, describe, host, and reuse images in your notes.\n- 📝 Native Markdown storage: keep your notes portable, local-first, and future-proof.\n- 📦 Built-in knowledge base: RAG, vector indexing, and hybrid retrieval out of the box.\n- 🔌 Extensible AI stack: supports MCP, custom models, prompts, memories, and agent workflows.\n- 🔄 Flexible sync: works with GitHub, Gitee, GitLab, Gitea, S3, and WebDAV.\n- 🌐 Cross-platform: available on Windows, macOS, Linux, Android, and iOS.\n\n## Download\n\n| ![Windows](https://img.shields.io/badge/Windows-0078D4?logo=windows&logoColor=white&style=for-the-badge) | ![macOS](https://img.shields.io/badge/macOS-000000?logo=apple&logoColor=white&style=for-the-badge) | ![Linux](https://img.shields.io/badge/Linux-FCC624?logo=linux&logoColor=black&style=for-the-badge) | ![Android](https://img.shields.io/badge/Android-3DDC84?logo=android&logoColor=white&style=for-the-badge) | ![iOS](https://img.shields.io/badge/iOS-000000?logo=apple&logoColor=white&style=for-the-badge) |\n| --- | --- | --- | --- | --- |\n| ✅ beta | ✅ beta | ✅ beta | 🛠️ alpha | 🛠️ alpha |\n| [Download](https://notegen.top/en/download) | [Download](https://notegen.top/en/download) | [Download](https://notegen.top/en/download) | [Download](https://notegen.top/en/download) | [TestFlight](https://testflight.apple.com/join/8KjFRTCq) |\n\n> [UpgradeLink offers application upgrade and download services](http://upgrade.toolsetlink.com/upgrade/example/tauri-example.html)\n\n## From Recording to Writing\n\nMost note apps are good at storing finished content, but weak at capturing messy thinking. NoteGen is designed for the earlier stage: record fragmented inputs first, then turn them into readable, reusable notes with Markdown and AI.\n\nNoteGen is built around three connected spaces:\n\n- `Recording`: capture scattered thoughts, screenshots, links, clips, and temporary inputs without breaking your flow.\n- `Notes`: refine everything in a Markdown editor with tables, diagrams, math, export tools, and structured writing support.\n- `AI Dialogue`: chat with your notes and knowledge base, reuse memory and context, and let AI help you organize, rewrite, and extend content.\n\n## Contribute\n\n- [Read contribution guide](https://notegen.top/en/docs/contributing)\n- [Update plans](https://github.com/codexu/note-gen/issues/46)\n- [Submit bugs or improvement suggestions](https://github.com/codexu/note-gen/issues)\n- [Discussions](https://github.com/codexu/note-gen/discussions)\n\n## Contributors\n\n<a href=\"https://github.com/codexu/note-gen/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=codexu/note-gen\" />\n</a>\n\n## Thanks\n\nSpecial thanks to our technology partners who make NoteGen better:\n\n**[SiliconFlow](https://cloud.siliconflow.cn/i/O2ciJeZw)** - Providing free AI model services, powering NoteGen's intelligent features with high-quality AI capabilities.\n\n<a href=\"https://cloud.siliconflow.cn/i/O2ciJeZw\" target=\"_blank\">\n  <img width=\"240\" src=\"https://s2.loli.net/2025/09/10/KWPOA5XhIGmYTV9.png\" />\n</a>\n\n**[UpgradeLink](http://upgrade.toolsetlink.com/upgrade/example/tauri-example.html)** - Providing reliable installation and upgrade services, ensuring seamless software updates for users.\n\n<a href=\"http://upgrade.toolsetlink.com/upgrade/example/tauri-example.html\" target=\"_blank\">\n  <img width=\"240\" src=\"https://s2.loli.net/2025/09/10/Ks4EayU9HguXDMF.png\" />\n</a>\n\n---\n\nWe also thank other partners for their service support\n\n<div>\n  <a href=\"https://www.qiniu.com/products/ai-token-api?utm_source=NoteGen\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/06/11/OKJq542lTs7U9xg.png\" />\n  </a>\n  <a href=\"https://share.302.ai/jfFrIP\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/07/01/dPlkU1tejnDyV4S.png\" />\n  </a>\n  <a href=\"https://www.shengsuanyun.com/?from=CH_KAFLGC9O\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/09/15/CcVRbTUBtf7ZvNl.png\" />\n  </a>\n  <a href=\"https://ai.gitee.com/\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/09/15/wmnBWfyACMz9pVc.png\" />\n  </a>\n  <a href=\"https://www.netlify.com\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/09/16/yJ64xIlrhdABt9o.png\" />\n  </a>\n  <a href=\"https://skywork.ai/p/bY47ky\" target=\"_blank\">\n    <img src=\"https://s2.loli.net/2025/09/16/mTzMCQ8tZLfJNk5.png\" />\n  </a>\n</div>\n","summary":"NoteGen is a cross-platform, Markdown-based note-taking application designed to streamline the transition from messy, fragmented thoughts to structured documentation. It features an AI-native workflow that assists with rewriting and polishing text, alongside advanced capabilities like RAG-based knowledge retrieval, intelligent image handling, and extensible agent workflows. This tool is ideal for researchers, writers, and power users who need a flexible, local-first platform to capture information quickly while leveraging AI to maintain long-term organization and clarity.","description":"A cross-platform Markdown AI note-taking software.","stars":12028,"language":"TypeScript"},{"owner":"Infisical","repo":"infisical","url":"https://github.com/Infisical/infisical","readme":"<h1 align=\"center\">\n  <img width=\"300\" src=\"/img/logoname-white.svg#gh-dark-mode-only\" alt=\"infisical\">\n</h1>\n<p align=\"center\">\n  <p align=\"center\"><b>The open-source secret management platform</b>: Sync secrets/configs across your team/infrastructure and prevent secret leaks.</p>\n</p>\n\n<h4 align=\"center\">\n  <a href=\"https://infisical.com/slack\">Slack</a> |\n  <a href=\"https://infisical.com/\">Infisical Cloud</a> |\n  <a href=\"https://infisical.com/docs/self-hosting/overview\">Self-Hosting</a> |\n  <a href=\"https://infisical.com/docs/documentation/getting-started/introduction\">Docs</a> |\n  <a href=\"https://www.infisical.com\">Website</a> |\n  <a href=\"https://infisical.com/careers\">Hiring (Remote/SF)</a>\n</h4>\n\n<h4 align=\"center\">\n  <a href=\"https://github.com/Infisical/infisical/blob/main/LICENSE\">\n    <img src=\"https://img.shields.io/badge/license-MIT-blue.svg\" alt=\"Infisical is released under the MIT license.\" />\n  </a>\n  <a href=\"https://github.com/infisical/infisical/blob/main/CONTRIBUTING.md\">\n    <img src=\"https://img.shields.io/badge/PRs-Welcome-brightgreen\" alt=\"PRs welcome!\" />\n  </a>\n  <a href=\"https://github.com/Infisical/infisical/issues\">\n    <img src=\"https://img.shields.io/github/commit-activity/m/infisical/infisical\" alt=\"git commit activity\" />\n  </a>\n  <a href=\"https://cloudsmith.io/~infisical/repos/\">\n    <img src=\"https://img.shields.io/badge/Downloads-6.95M-orange\" alt=\"Cloudsmith downloads\" />\n  </a>\n  <a href=\"https://infisical.com/slack\">\n    <img src=\"https://img.shields.io/badge/chat-on%20Slack-blueviolet\" alt=\"Slack community channel\" />\n  </a>\n  <a href=\"https://twitter.com/infisical\">\n    <img src=\"https://img.shields.io/twitter/follow/infisical?label=Follow\" alt=\"Infisical Twitter\" />\n  </a>\n</h4>\n\n<img src=\"/img/infisical_github_repo2.png\" width=\"100%\" alt=\"Dashboard\" />\n\n## Introduction\n\n**[Infisical](https://infisical.com)** is the open source secret management platform that teams use to centralize their application configuration and secrets like API keys and database credentials as well as manage their internal PKI.\n\nWe're on a mission to make security tooling more accessible to everyone, not just security teams, and that means redesigning the entire developer experience from ground up.\n\n## Features\n\n### Secrets Management:\n\n- **[Dashboard](https://infisical.com/docs/documentation/platform/project)**: Manage secrets across projects and environments (e.g. development, production, etc.) through a user-friendly interface.\n- **[Secret Syncs](https://infisical.com/docs/integrations/secret-syncs/overview)**: Sync secrets to platforms like [GitHub](https://infisical.com/docs/integrations/cicd/githubactions), [Vercel](https://infisical.com/docs/integrations/cloud/vercel), [AWS](https://infisical.com/docs/integrations/cloud/aws-secret-manager), and use tools like [Terraform](https://infisical.com/docs/integrations/frameworks/terraform), [Ansible](https://infisical.com/docs/integrations/platforms/ansible), and more.\n- **[Secret versioning](https://infisical.com/docs/documentation/platform/secret-versioning)** and **[Point-in-Time Recovery](https://infisical.com/docs/documentation/platform/pit-recovery)**: Keep track of every secret and project state; roll back when needed.\n- **[Secret Rotation](https://infisical.com/docs/documentation/platform/secret-rotation/overview)**: Rotate secrets at regular intervals for services like [PostgreSQL](https://infisical.com/docs/documentation/platform/secret-rotation/postgres-credentials), [MySQL](https://infisical.com/docs/documentation/platform/secret-rotation/mysql), [AWS IAM](https://infisical.com/docs/documentation/platform/secret-rotation/aws-iam), and more.\n- **[Dynamic Secrets](https://infisical.com/docs/documentation/platform/dynamic-secrets/overview)**: Generate ephemeral secrets on-demand for services like [PostgreSQL](https://infisical.com/docs/documentation/platform/dynamic-secrets/postgresql), [MySQL](https://infisical.com/docs/documentation/platform/dynamic-secrets/mysql), [RabbitMQ](https://infisical.com/docs/documentation/platform/dynamic-secrets/rabbit-mq), and more.\n- **[Secret Scanning and Leak Prevention](https://infisical.com/docs/cli/scanning-overview)**: Prevent secrets from leaking to git.\n- **[Infisical Kubernetes Operator](https://infisical.com/docs/documentation/getting-started/kubernetes)**: Deliver secrets to your Kubernetes workloads and automatically reload deployments.\n- **[Infisical Agent](https://infisical.com/docs/infisical-agent/overview)**: Inject secrets into applications without modifying any code logic.\n\n### Certificate Management\n\n- **[Internal CA](https://infisical.com/docs/documentation/platform/pki/private-ca)**: Create and manage a private\n  CA hierarchy directly within Infisical.\n- **[External CA](https://infisical.com/docs/documentation/platform/pki/ca/external-ca)**: Integrate with third-party certificate authorities such as Let’s Encrypt, DigiCert, Microsoft AD CS, and more to leverage existing PKI infrastructure\n  or issue publicly trusted certificates.\n- **[Certificate Lifecycle Management](https://infisical.com/docs/documentation/platform/pki/certificates/overview)**: Create certificate [profiles](https://infisical.com/docs/documentation/platform/pki/certificates/profiles) and [policies](https://infisical.com/docs/documentation/platform/pki/certificates/policies) to control how certificates are issued, including [enrollment methods](https://infisical.com/docs/documentation/platform/pki/enrollment-methods/overview) such as API, ACME, or EST. Manage the full lifecycle from issuance to renewal and [revocation](https://infisical.com/docs/documentation/platform/pki/certificates/certificates#guide-to-revoking-certificates) with CRL and inventory tracking.\n- **[Certificate Syncs](https://infisical.com/docs/documentation/platform/pki/certificate-syncs/overview)**: Sync certificates to external platforms like [AWS Certificate Manager](https://infisical.com/docs/documentation/platform/pki/certificate-syncs/aws-certificate-manager) and [Azure Key Vault](https://infisical.com/docs/documentation/platform/pki/certificate-syncs/azure-key-vault).\n- **[Alerting](https://infisical.com/docs/documentation/platform/pki/alerting)**: Configure alerting for expiring CA and end-entity certificates.\n\n### Infisical Key Management System (KMS):\n\n- **[Cryptographic Keys](https://infisical.com/docs/documentation/platform/kms)**: Centrally manage keys across projects through a user-friendly interface or via the API.\n- **[Encrypt and Decrypt Data](https://infisical.com/docs/documentation/platform/kms#guide-to-encrypting-data)**: Use symmetric keys to encrypt and decrypt data.\n\n### Infisical SSH\n\n- **[Signed SSH Certificates](https://infisical.com/docs/documentation/platform/ssh)**: Issue ephemeral SSH credentials for secure, short-lived, and centralized access to infrastructure.\n\n### General Platform:\n\n- **Authentication Methods**: Authenticate machine identities with Infisical using a cloud-native or platform agnostic authentication method ([Kubernetes Auth](https://infisical.com/docs/documentation/platform/identities/kubernetes-auth), [GCP Auth](https://infisical.com/docs/documentation/platform/identities/gcp-auth), [Azure Auth](https://infisical.com/docs/documentation/platform/identities/azure-auth), [AWS Auth](https://infisical.com/docs/documentation/platform/identities/aws-auth), [OIDC Auth](https://infisical.com/docs/documentation/platform/identities/oidc-auth/general), [Universal Auth](https://infisical.com/docs/documentation/platform/identities/universal-auth)).\n- **[Access Controls](https://infisical.com/docs/documentation/platform/access-controls/overview)**: Define advanced authorization controls for users and machine identities with [RBAC](https://infisical.com/docs/documentation/platform/access-controls/role-based-access-controls), [additional privileges](https://infisical.com/docs/documentation/platform/access-controls/additional-privileges), [temporary access](https://infisical.com/docs/documentation/platform/access-controls/temporary-access), [access requests](https://infisical.com/docs/documentation/platform/access-controls/access-requests), [approval workflows](https://infisical.com/docs/documentation/platform/pr-workflows), and more.\n- **[Audit logs](https://infisical.com/docs/documentation/platform/audit-logs)**: Track every action taken on the platform.\n- **[Self-hosting](https://infisical.com/docs/self-hosting/overview)**: Deploy Infisical on-prem or cloud with ease; keep data on your own infrastructure.\n- **[Infisical SDK](https://infisical.com/docs/sdks/overview)**: Interact with Infisical via client SDKs ([Node](https://infisical.com/docs/sdks/languages/node), [Python](https://github.com/Infisical/python-sdk-official?tab=readme-ov-file#infisical-python-sdk), [Go](https://infisical.com/docs/sdks/languages/go), [Ruby](https://infisical.com/docs/sdks/languages/ruby), [Java](https://infisical.com/docs/sdks/languages/java), [.NET](https://infisical.com/docs/sdks/languages/csharp))\n- **[Infisical CLI](https://infisical.com/docs/cli/overview)**: Interact with Infisical via CLI; useful for injecting secrets into local development and CI/CD pipelines.\n- **[Infisical API](https://infisical.com/docs/api-reference/overview/introduction)**: Interact with Infisical via API.\n\n## Getting started\n\nCheck out the [Quickstart Guides](https://infisical.com/docs/documentation/getting-started/overview)\n\n| Use Infisical Cloud                                                                                                                                     | Deploy Infisical on premise                                                          |\n| ------------------------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------ |\n| The fastest and most reliable way to <br> get started with Infisical is signing up <br> for free to [Infisical Cloud](https://app.infisical.com/login). | <br> View all [deployment options](https://infisical.com/docs/self-hosting/overview) |\n\n### Run Infisical locally\n\nTo set up and run Infisical locally, make sure you have [Git](https://git-scm.com/downloads) and [Docker](https://www.docker.com/get-started/) installed on your system.\n\n**Linux/macOS:**\n```console\ngit clone https://github.com/Infisical/infisical && cd \"$(basename $_ .git)\" && cp .env.example .env && docker compose -f docker-compose.prod.yml up\n```\n\n**Windows (Command Prompt):**\n```console\ngit clone https://github.com/Infisical/infisical && cd infisical && copy .env.example .env && docker compose -f docker-compose.prod.yml up\n```\n\nOnce running, create an account at [http://localhost:80](http://localhost:80).\n\n> **Contributing?** Check out our guide to see how to [get started](https://infisical.com/docs/contributing/getting-started).\n\n### Scan and prevent secret leaks\n\nOn top managing secrets with Infisical, you can also [scan for over 140+ secret types]() in your files, directories and git repositories.\n\nTo scan your full git history, run:\n\n```\ninfisical scan --verbose\n```\n\nInstall pre commit hook to scan each commit before you push to your repository\n\n```\ninfisical scan install --pre-commit-hook\n```\n\nLearn about Infisical's code scanning feature [here](https://infisical.com/docs/cli/scanning-overview)\n\n## Open-source vs. paid\n\nThis repo available under the [MIT expat license](https://github.com/Infisical/infisical/blob/main/LICENSE), with the exception of the `ee` directory which will contain premium enterprise features requiring a Infisical license.\n\nIf you are interested in managed Infisical Cloud of self-hosted Enterprise Offering, take a look at [our website](https://infisical.com/) or [book a meeting with us](https://infisical.cal.com/vlad/infisical-demo).\n\n## Security\n\nPlease do not file GitHub issues or post on our public forum for security vulnerabilities, as they are public!\n\nInfisical takes security issues very seriously. If you have any concerns about Infisical or believe you have uncovered a vulnerability, please get in touch via the e-mail address security@infisical.com. In the message, try to provide a description of the issue and ideally a way of reproducing it. The security team will get back to you as soon as possible.\n\nNote that this security address should be used only for undisclosed vulnerabilities. Please report any security problems to us before disclosing it publicly.\n\n## Contributing\n\nWhether it's big or small, we love contributions. Check out our guide to see how to [get started](https://infisical.com/docs/contributing/getting-started).\n\nNot sure where to get started? You can:\n\n- Join our <a href=\"https://infisical.com/slack\">Slack</a>, and ask us any questions there.\n\n## We are hiring!\n\nIf you're reading this, there is a strong chance you like the products we created.\n\nYou might also make a great addition to our team. We're growing fast and would love for you to [join us](https://infisical.com/careers).\n","summary":"Infisical is an open-source secret management platform designed to centralize and secure sensitive information like API keys and database credentials. It provides robust capabilities including secret synchronization across infrastructure, automatic secret rotation, versioning, and the generation of dynamic, ephemeral secrets. This platform is ideal for development teams and organizations looking to improve security posture and streamline configuration management across various environments and CI/CD pipelines.","description":"Infisical is the open-source platform for secrets, certificates, and privileged access management.","stars":27180,"language":"TypeScript"},{"owner":"superfly","repo":"corrosion","url":"https://github.com/superfly/corrosion","readme":"# Corrosion\nGossip-based service discovery (and more) for large distributed systems.\n\n## Why we built Corrosion\n\nWe built Corrosion specifically for service discovery across a large global network, replacing Consul’s central state database with eventually consistent state distributed across our hosts.\n\nOur new tool needed to deliver the following:\n\n### Fast reads and writes\n\nGetting state (data) from a central remote source can be incredibly expensive (at least 300ms for a round-trip to something on the other side of the world), but usually takes less than 1ms from a local source.\n\n### Fast, eventual, consistency\n\nMany use cases can cope with eventual consistency, especially if a consistent state is attained sooner than later. Raft fell short for some use cases at Fly.io where round-trips to a centralized location are too expensive.\n\n### Flexibility\n\nGlobal state for a distributed system isn't one-size-fits-all. Flexible schemas and queries are essential.\n\n## How Corrosion works\n\nIn a nutshell, Corrosion:\n\n- Maintains a SQLite database on each node\n- Gossips local changes throughout the cluster\n- Uses [CR-SQLite](https://github.com/vlcn-io/cr-sqlite) for conflict resolution with CRDTs\n- Uses [Foca](https://github.com/caio/foca) to manage cluster membership using a SWIM protocol\n- Periodically synchronizes with a subset of other cluster nodes, to ensure consistency\n\n## Features\n\n- A flexible API to read from and write to Corrosion's store using SQL statements\n- File-based schemas with on-the-fly updates\n- HTTP streaming subscriptions based on SQL queries\n- Live population of configuration files from Corrosion state with user-defined [Rhai](https://rhai.rs/) templates\n- Storage and propagation of state from locally registered Consul services, replacing the central database with Corrosion's distributed state\n- Secure peer-to-peer communication with the [QUIC](https://datatracker.ietf.org/doc/html/rfc9000) transport protocol (using [Quinn](https://github.com/quinn-rs/quinn))\n\n## Usage overview\n\nRun the Corrosion agent on every node/host in the cluster. Other programs running on the node use [Corrosion's HTTP API](https://superfly.github.io/corrosion/api/index.html) to query the local Corrosion SQLite database, add and update data, and subscribe to change notifications.\n\nThe [Corrosion CLI](https://superfly.github.io/corrosion/cli/index.html) provides commands for administration and access to database and features.\n\n### Quick start\n\n- [Prepare the Corrosion configuration file](https://superfly.github.io/corrosion/config/)\n- [Specify the initial database schema](https://superfly.github.io/corrosion/schema.html)\n- [Start the Corrosion agent](https://superfly.github.io/corrosion/cli/agent.html)\n\nSee the WIP [Corrosion documentation](https://superfly.github.io/corrosion/) for more details.\n\n## Building Corrosion\n\nClone [https://github.com/superfly/corrosion.git](https://github.com/superfly/corrosion.git).\n\nFrom within the repo directory:\n\n```\ncargo build --release && mv target/release/corrosion ./\n```\n","summary":"Corrosion is a gossip-based service discovery tool designed to provide eventually consistent, distributed state management for large-scale, global systems. By maintaining a local SQLite database on every node and utilizing CRDTs for conflict resolution, it enables sub-millisecond data reads and writes without the performance overhead of a centralized state store. The project is ideal for developers and infrastructure engineers managing distributed networks who require a flexible, high-performance alternative to traditional centralized coordination services.","description":"Gossip-based service discovery (and more) for large distributed systems.","stars":1774,"language":"Rust"},{"owner":"GoogleCloudPlatform","repo":"vertex-ai-creative-studio","url":"https://github.com/GoogleCloudPlatform/vertex-ai-creative-studio","readme":"# GenMedia Creative Studio | Vertex AI\n\n> ###### _This is not an officially supported Google product. This project is not eligible for the [Google Open Source Software Vulnerability Rewards Program](https://bughunters.google.com/open-source-security). This project is intended for demonstration purposes only. It is not intended for use in a production environment._\n\n![GenMedia Creative Studio v.next](https://github.com/user-attachments/assets/da5ad223-aa6e-413c-b36e-5d63e5d5b758)\n\n![GenMedia Creative Studio v.next](https://github.com/user-attachments/assets/61977f3c-dbb6-4002-b8c0-77d57aa03cce)\n\n## Table of Contents\n\n- [GenMedia Creative Studio | Vertex AI](#genmedia-creative-studio--vertex-ai)\n- [Table of Contents](#table-of-contents)\n- [GenMedia Creative Studio](#genmedia-creative-studio)\n- [Documentation Hub](#documentation-hub)\n  - [Quick Start](#quick-start)\n  - [Deploying to Google Cloud](#deploying-to-google-cloud)\n- [Experiments & MCP Tools](#experiments--mcp-tools)\n- [Contributing changes](#contributing-changes)\n- [Licensing](#licensing)\n- [Disclaimer](#disclaimer)\n\n## GenMedia Creative Studio\n\n> **Browser Compatibility:** For the best experience, we recommend using Google Chrome. Some features may not work as expected on other browsers, such as Safari or Firefox.\n\nGenMedia Creative Studio is a web application showcasing Google Cloud's generative media - Veo, Lyria,  Gemini Image Generation (Nano Banana), Chirp 3 HD, and Gemini TTS along with custom workflows and techniques for creative exploration and inspiration. We're looking forward to see what you create!\n\nCurrent featureset:\n\n- **Image:** Gemini Flash Image Generation (Nano Banana 2), Gemini 3 Pro Image (Nano Banana Pro), Virtual Try-On\n- **Video:** Veo 3.1, Veo 3, Veo 2\n- **Music:** Lyria 3 & 2\n- **Speech:** Chirp 3 HD, Gemini Text to Speech\n- **Workflows:** Character Consistency, Shop the Look, Starter Pack Moodboard, Interior Designer\n- **Asset Library**\n\nThis is built using [Mesop](https://mesop-dev.github.io/mesop/), an open source Python framework used at Google for rapid AI app development, and the [scaffold for Studio style apps](https://github.com/ghchinoy/studio-scaffold).\n\n---\n\n## 📖 Documentation Hub\n\n**For comprehensive guides, deployment instructions, architecture details, and developer workflows, please visit our [Documentation Hub](https://googlecloudplatform.github.io/vertex-ai-creative-studio/).**\n\nStay up-to-date with upcoming breaking changes and releases on our **[Changelog & Notices](https://googlecloudplatform.github.io/vertex-ai-creative-studio/core/changelog/)** page.\n\n---\n\n### Quick Start\n\nIf you want to quickly run the UI without having to set up a local development environment, use Cloud Shell and follow the tutorial instructions:\n\n[![Open in Cloud Shell](https://gstatic.com/cloudssh/images/open-btn.svg)](https://shell.cloud.google.com/cloudshell/editor?cloudshell_git_repo=https://github.com/GoogleCloudPlatform/vertex-ai-creative-studio.git&cloudshell_tutorial=tutorial.md)\n\n### Deploying to Google Cloud\n\nThe application is designed to be deployed using Terraform and Cloud Run. You have the flexibility to deploy using a custom domain (with Identity Aware Proxy and a Load Balancer) or using the autogenerated Cloud Run domain. \n\nFor detailed, step-by-step instructions on setting up your environment, configuring custom domains, and managing Identity Aware Proxy (IAP), please see the [Deployment Guide on our Documentation Hub](https://googlecloudplatform.github.io/vertex-ai-creative-studio/core/installation/deploy/).\n\n## Experiments & MCP Tools\n\nThe `experiments/` folder contains a variety of stand-alone applications, new workflows, and Model Context Protocol (MCP) servers that showcase cutting-edge capabilities with generative AI. This includes combined workflows for video generation, advanced prompting techniques, image recontextualization, and audio exploration.\n\nTo explore the available experiments, view architecture diagrams, and find installation instructions for our MCP tools, head over to the [Experiments Section of our Documentation Hub](https://googlecloudplatform.github.io/vertex-ai-creative-studio/experiments/overview/).\n\n## Contributing changes\n\nInterested in contributing? Please open an issue describing the intended change. Additionally, bug fixes are welcome, either as pull requests or as GitHub issues.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for details on how to contribute.\n\n## Licensing\n\nCode in this repository is licensed under the Apache 2.0. See [LICENSE](LICENSE).\n\n## Disclaimer\n\n> [!CAUTION]\n> This is **not** an officially supported Google product.\n> This project is not eligible for the [Google Open Source Software Vulnerability Rewards Program](https://bughunters.google.com/open-source-security).","summary":"GenMedia Creative Studio is a demonstration web application built with the Mesop framework that showcases Google Cloud's generative media models, including Veo for video, Lyria for music, and Gemini for image and speech generation. It provides a comprehensive suite of creative tools and workflows, such as virtual try-on, character consistency, and interior design, to facilitate rapid AI-driven exploration. This project is ideal for developers and creative technologists looking to experiment with cutting-edge generative AI capabilities and learn how to deploy production-ready AI applications on Google Cloud using Terraform and Cloud Run.","description":"GenMedia Creative Studio is a Vertex AI generative media user experience highlighting the use of Gemini, Veo, Gemini Image 🍌, Gemini TTS, Chirp 3, Lyria and other generative media APIs on Google Cloud.","stars":1117,"language":"Jupyter Notebook"},{"owner":"microsoft","repo":"ML-For-Beginners","url":"https://github.com/microsoft/ML-For-Beginners","readme":"[![GitHub license](https://img.shields.io/github/license/microsoft/ML-For-Beginners.svg)](https://github.com/microsoft/ML-For-Beginners/blob/master/LICENSE)\n[![GitHub contributors](https://img.shields.io/github/contributors/microsoft/ML-For-Beginners.svg)](https://GitHub.com/microsoft/ML-For-Beginners/graphs/contributors/)\n[![GitHub issues](https://img.shields.io/github/issues/microsoft/ML-For-Beginners.svg)](https://GitHub.com/microsoft/ML-For-Beginners/issues/)\n[![GitHub pull-requests](https://img.shields.io/github/issues-pr/microsoft/ML-For-Beginners.svg)](https://GitHub.com/microsoft/ML-For-Beginners/pulls/)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg?style=flat-square)](http://makeapullrequest.com)\n\n[![GitHub watchers](https://img.shields.io/github/watchers/microsoft/ML-For-Beginners.svg?style=social&label=Watch)](https://GitHub.com/microsoft/ML-For-Beginners/watchers/)\n[![GitHub forks](https://img.shields.io/github/forks/microsoft/ML-For-Beginners.svg?style=social&label=Fork)](https://GitHub.com/microsoft/ML-For-Beginners/network/)\n[![GitHub stars](https://img.shields.io/github/stars/microsoft/ML-For-Beginners.svg?style=social&label=Star)](https://GitHub.com/microsoft/ML-For-Beginners/stargazers/)\n\n### 🌐 Multi-Language Support\n\n#### Supported via GitHub Action (Automated & Always Up-to-Date)\n\n<!-- CO-OP TRANSLATOR LANGUAGES TABLE START -->\n[Arabic](./translations/ar/README.md) | [Bengali](./translations/bn/README.md) | [Bulgarian](./translations/bg/README.md) | [Burmese (Myanmar)](./translations/my/README.md) | [Chinese (Simplified)](./translations/zh-CN/README.md) | [Chinese (Traditional, Hong Kong)](./translations/zh-HK/README.md) | [Chinese (Traditional, Macau)](./translations/zh-MO/README.md) | [Chinese (Traditional, Taiwan)](./translations/zh-TW/README.md) | [Croatian](./translations/hr/README.md) | [Czech](./translations/cs/README.md) | [Danish](./translations/da/README.md) | [Dutch](./translations/nl/README.md) | [Estonian](./translations/et/README.md) | [Finnish](./translations/fi/README.md) | [French](./translations/fr/README.md) | [German](./translations/de/README.md) | [Greek](./translations/el/README.md) | [Hebrew](./translations/he/README.md) | [Hindi](./translations/hi/README.md) | [Hungarian](./translations/hu/README.md) | [Indonesian](./translations/id/README.md) | [Italian](./translations/it/README.md) | [Japanese](./translations/ja/README.md) | [Kannada](./translations/kn/README.md) | [Khmer](./translations/km/README.md) | [Korean](./translations/ko/README.md) | [Lithuanian](./translations/lt/README.md) | [Malay](./translations/ms/README.md) | [Malayalam](./translations/ml/README.md) | [Marathi](./translations/mr/README.md) | [Nepali](./translations/ne/README.md) | [Nigerian Pidgin](./translations/pcm/README.md) | [Norwegian](./translations/no/README.md) | [Persian (Farsi)](./translations/fa/README.md) | [Polish](./translations/pl/README.md) | [Portuguese (Brazil)](./translations/pt-BR/README.md) | [Portuguese (Portugal)](./translations/pt-PT/README.md) | [Punjabi (Gurmukhi)](./translations/pa/README.md) | [Romanian](./translations/ro/README.md) | [Russian](./translations/ru/README.md) | [Serbian (Cyrillic)](./translations/sr/README.md) | [Slovak](./translations/sk/README.md) | [Slovenian](./translations/sl/README.md) | [Spanish](./translations/es/README.md) | [Swahili](./translations/sw/README.md) | [Swedish](./translations/sv/README.md) | [Tagalog (Filipino)](./translations/tl/README.md) | [Tamil](./translations/ta/README.md) | [Telugu](./translations/te/README.md) | [Thai](./translations/th/README.md) | [Turkish](./translations/tr/README.md) | [Ukrainian](./translations/uk/README.md) | [Urdu](./translations/ur/README.md) | [Vietnamese](./translations/vi/README.md)\n\n> **Prefer to Clone Locally?**\n>\n> This repository includes 50+ language translations which significantly increases the download size. To clone without translations, use sparse checkout:\n>\n> **Bash / macOS / Linux:**\n> ```bash\n> git clone --filter=blob:none --sparse https://github.com/microsoft/ML-For-Beginners.git\n> cd ML-For-Beginners\n> git sparse-checkout set --no-cone '/*' '!translations' '!translated_images'\n> ```\n>\n> **CMD (Windows):**\n> ```cmd\n> git clone --filter=blob:none --sparse https://github.com/microsoft/ML-For-Beginners.git\n> cd ML-For-Beginners\n> git sparse-checkout set --no-cone \"/*\" \"!translations\" \"!translated_images\"\n> ```\n>\n> This gives you everything you need to complete the course with a much faster download.\n<!-- CO-OP TRANSLATOR LANGUAGES TABLE END -->\n\n#### Join Our Community\n\n[![Microsoft Foundry Discord](https://dcbadge.limes.pink/api/server/nTYy5BXMWG)](https://discord.gg/nTYy5BXMWG)\n\nWe have a Discord learn with AI series ongoing, learn more and join us at [Learn with AI Series](https://aka.ms/learnwithai/discord) from 18 - 30 September, 2025. You will get tips and tricks of using GitHub Copilot for Data Science.\n\n![Learn with AI series](/images/3.png)\n\n# Machine Learning for Beginners - A Curriculum\n\n> 🌍 Travel around the world as we explore Machine Learning by means of world cultures 🌍\n\nCloud Advocates at Microsoft are pleased to offer a 12-week, 26-lesson curriculum all about **Machine Learning**. In this curriculum, you will learn about what is sometimes called **classic machine learning**, using primarily Scikit-learn as a library and avoiding deep learning, which is covered in our [AI for Beginners' curriculum](https://aka.ms/ai4beginners). Pair these lessons with our ['Data Science for Beginners' curriculum](https://aka.ms/ds4beginners), as well!\n\nTravel with us around the world as we apply these classic techniques to data from many areas of the world. Each lesson includes pre- and post-lesson quizzes, written instructions to complete the lesson, a solution, an assignment, and more. Our project-based pedagogy allows you to learn while building, a proven way for new skills to 'stick'.\n\n**✍️ Hearty thanks to our authors** Jen Looper, Stephen Howell, Francesca Lazzeri, Tomomi Imura, Cassie Breviu, Dmitry Soshnikov, Chris Noring, Anirban Mukherjee, Ornella Altunyan, Ruth Yakubu and Amy Boyd\n\n**🎨 Thanks as well to our illustrators** Tomomi Imura, Dasani Madipalli, and Jen Looper\n\n**🙏 Special thanks 🙏 to our Microsoft Student Ambassador authors, reviewers, and content contributors**, notably Rishit Dagli, Muhammad Sakib Khan Inan, Rohan Raj, Alexandru Petrescu, Abhishek Jaiswal, Nawrin Tabassum, Ioan Samuila, and Snigdha Agarwal\n\n**🤩 Extra gratitude to Microsoft Student Ambassadors Eric Wanjau, Jasleen Sondhi, and Vidushi Gupta for our R lessons!**\n\n# Getting Started\n\nFollow these steps:\n1. **Fork the Repository**: Click on the \"Fork\" button at the top-right corner of this page.\n2. **Clone the Repository**:   `git clone https://github.com/microsoft/ML-For-Beginners.git`\n\n> [find all additional resources for this course in our Microsoft Learn collection](https://learn.microsoft.com/en-us/collections/qrqzamz1nn2wx3?WT.mc_id=academic-77952-bethanycheum)\n\n> 🔧 **Need help?** Check our [Troubleshooting Guide](TROUBLESHOOTING.md) for solutions to common issues with installation, setup, and running lessons.\n\n\n**[Students](https://aka.ms/student-page)**, to use this curriculum, fork the entire repo to your own GitHub account and complete the exercises on your own or with a group:\n\n- Start with a pre-lecture quiz.\n- Read the lecture and complete the activities, pausing and reflecting at each knowledge check.\n- Try to create the projects by comprehending the lessons rather than running the solution code; however that code is available in the `/solution` folders in each project-oriented lesson.\n- Take the post-lecture quiz.\n- Complete the challenge.\n- Complete the assignment.\n- After completing a lesson group, visit the [Discussion Board](https://github.com/microsoft/ML-For-Beginners/discussions) and \"learn out loud\" by filling out the appropriate PAT rubric. A 'PAT' is a Progress Assessment Tool that is a rubric you fill out to further your learning. You can also react to other PATs so we can learn together.\n\n> For further study, we recommend following these [Microsoft Learn](https://docs.microsoft.com/en-us/users/jenlooper-2911/collections/k7o7tg1gp306q4?WT.mc_id=academic-77952-leestott) modules and learning paths.\n\n**Teachers**, we have [included some suggestions](for-teachers.md) on how to use this curriculum.\n\n---\n\n## Video walkthroughs\n\nSome of the lessons are available as short form video. You can find all these in-line in the lessons, or on the [ML for Beginners playlist on the Microsoft Developer YouTube channel](https://aka.ms/ml-beginners-videos) by clicking the image below.\n\n[![ML for beginners banner](./images/ml-for-beginners-video-banner.png)](https://aka.ms/ml-beginners-videos)\n\n---\n\n## Meet the Team\n\n[![Promo video](./images/ml.gif)](https://youtu.be/Tj1XWrDSYJU)\n\n**Gif by** [Mohit Jaisal](https://linkedin.com/in/mohitjaisal)\n\n> 🎥 Click the image above for a video about the project and the folks who created it!\n\n---\n\n## Pedagogy\n\nWe have chosen two pedagogical tenets while building this curriculum: ensuring that it is hands-on **project-based** and that it includes **frequent quizzes**. In addition, this curriculum has a common **theme** to give it cohesion.\n\nBy ensuring that the content aligns with projects, the process is made more engaging for students and retention of concepts will be augmented. In addition, a low-stakes quiz before a class sets the intention of the student towards learning a topic, while a second quiz after class ensures further retention. This curriculum was designed to be flexible and fun and can be taken in whole or in part. The projects start small and become increasingly complex by the end of the 12-week cycle. This curriculum also includes a postscript on real-world applications of ML, which can be used as extra credit or as a basis for discussion.\n\n> Find our [Code of Conduct](CODE_OF_CONDUCT.md), [Contributing](CONTRIBUTING.md), [Translations](translations), and [Troubleshooting](TROUBLESHOOTING.md) guidelines. We welcome your constructive feedback!\n\n## Each lesson includes\n\n- optional sketchnote\n- optional supplemental video\n- video walkthrough (some lessons only)\n- [pre-lecture warmup quiz](https://ff-quizzes.netlify.app/en/ml/)\n- written lesson\n- for project-based lessons, step-by-step guides on how to build the project\n- knowledge checks\n- a challenge\n- supplemental reading\n- assignment\n- [post-lecture quiz](https://ff-quizzes.netlify.app/en/ml/)\n\n> **A note about languages**: These lessons are primarily written in Python, but many are also available in R. To complete an R lesson, go to the `/solution` folder and look for R lessons. They include an .rmd extension that represents an **R Markdown** file which can be simply defined as an embedding of `code chunks` (of R or other languages) and a `YAML header` (that guides how to format outputs such as PDF) in a `Markdown document`. As such, it serves as an exemplary authoring framework for data science since it allows you to combine your code, its output, and your thoughts by allowing you to write them down in Markdown. Moreover, R Markdown documents can be rendered to output formats such as PDF, HTML, or Word.\n\n> **A note about quizzes**: All quizzes are contained in [Quiz App folder](./quiz-app/), for 52 total quizzes of three questions each. They are linked from within the lessons but the quiz app can be run locally; follow the instruction in the `quiz-app` folder to locally host or deploy to Azure.\n\n| Lesson Number |                             Topic                              |                   Lesson Grouping                   | Learning Objectives                                                                                                             |                                                              Linked Lesson                                                               |                        Author                        |\n| :-----------: | :------------------------------------------------------------: | :-------------------------------------------------: | ------------------------------------------------------------------------------------------------------------------------------- | :--------------------------------------------------------------------------------------------------------------------------------------: | :--------------------------------------------------: |\n|      01       |                Introduction to machine learning                |      [Introduction](1-Introduction/R                               |                       Anirban                        |\n|      24       |             Introduction to reinforcement learning             | [Reinforcement learning](8-Reinforcement/README.md) | Introduction to reinforcement learning with Q-Learning                                                                          |                                             [Python](8-Reinforcement/1-QLearning/README.md)                                              |                        Dmitry                        |\n|      25       |                 Help Peter avoid the wolf! 🐺                  | [Reinforcement learning](8-Reinforcement/README.md) | Reinforcement learning Gym                                                                                                      |                                                [Python](8-Reinforcement/2-Gym/README.md)                                                 |                        Dmitry                        |\n|  Postscript   |            Real-World ML scenarios and applications            |      [ML in the Wild](9-Real-World/README.md)       | Interesting and revealing real-world applications of classical ML                                                               |                                             [Lesson](9-Real-World/1-Applications/README.md)                                              |                         Team                         |\n|  Postscript   |            Model Debugging in ML using RAI dashboard          |      [ML in the Wild](9-Real-World/README.md)       | Model Debugging in Machine Learning using Responsible AI dashboard components                                                              |                                             [Lesson](9-Real-World/2-Debugging-ML-Models/README.md)                                              |                         Ruth Yakubu                       |\n\n> [find all additional resources for this course in our Microsoft Learn collection](https://learn.microsoft.com/en-us/collections/qrqzamz1nn2wx3?WT.mc_id=academic-77952-bethanycheum)\n\n## Offline access\n\nYou can run this documentation offline by using [Docsify](https://docsify.js.org/#/). Fork this repo, [install Docsify](https://docsify.js.org/#/quickstart) on your local machine, and then in the root folder of this repo, type `docsify serve`. The website will be served on port 3000 on your localhost: `localhost:3000`.\n\n## PDFs\n\nFind a pdf of the curriculum with links [here](https://microsoft.github.io/ML-For-Beginners/pdf/readme.pdf).\n\n\n## 🎒 Other Courses \n\nOur team produces other courses! Check out:\n\n<!-- CO-OP TRANSLATOR OTHER COURSES START -->\n### LangChain\n[![LangChain4j for Beginners](https://img.shields.io/badge/LangChain4j%20for%20Beginners-22C55E?style=for-the-badge&&labelColor=E5E7EB&color=0553D6)](https://aka.ms/langchain4j-for-beginners)\n[![LangChain.js for Beginners](https://img.shields.io/badge/LangChain.js%20for%20Beginners-22C55E?style=for-the-badge&labelColor=E5E7EB&color=0553D6)](https://aka.ms/langchainjs-for-beginners?WT.mc_id=m365-94501-dwahlin)\n[![LangChain for Beginners](https://img.shields.io/badge/LangChain%20for%20Beginners-22C55E?style=for-the-badge&labelColor=E5E7EB&color=0553D6)](https://github.com/microsoft/langchain-for-beginners?WT.mc_id=m365-94501-dwahlin)\n---\n\n### Azure / Edge / MCP / Agents\n[![AZD for Beginners](https://img.shields.io/badge/AZD%20for%20Beginners-0078D4?style=for-the-badge&labelColor=E5E7EB&color=0078D4)](https://github.com/microsoft/AZD-for-beginners?WT.mc_id=academic-105485-koreyst)\n[![Edge AI for Beginners](https://img.shields.io/badge/Edge%20AI%20for%20Beginners-00B8E4?style=for-the-badge&labelColor=E5E7EB&color=00B8E4)](https://github.com/microsoft/edgeai-for-beginners?WT.mc_id=academic-105485-koreyst)\n[![MCP for Beginners](https://img.shields.io/badge/MCP%20for%20Beginners-009688?style=for-the-badge&labelColor=E5E7EB&color=009 ts and project ideas\n- Get guidance from experienced developers\n\nA supportive community is a great way to grow your skills and solve problems faster.\n\n[Microsoft Foundry Discord Community](https://discord.gg/nTYy5BXMWG)\n\nIf you encounter bugs, errors, or have suggestions for improvements, you can also open an **Issue** in this repository to report the problem.\n\nFor product feedback or to search existing community posts, visit the Developer Forum:\n\n[![Microsoft Foundry Developer Forum](https://img.shields.io/badge/GitHub-Microsoft_Foundry_Developer_Forum-blue?style=for-the-badge&logo=github&color=000000&logoColor=fff)](https://aka.ms/foundry/forum)\n\n## Additional Learning Tips\n\n- Review notebooks after each lesson for better understanding.\n- Practice implementing algorithms on your own.\n- Explore real-world datasets using learned concepts.\n","summary":"microsoft/ML-For-Beginners is an educational repository designed to help people learn machine learning from the ground up. It provides beginner-friendly guidance and learning materials, with extensive community contributions to keep the content accessible and current. A major highlight is its wide multilingual support, delivering the learning experience in 50+ languages via an automated GitHub Action that maintains translations. This project is especially beneficial for students, self-learners, and educators who want an approachable ML starting point and resources in their preferred language.","description":"12 weeks, 26 lessons, 52 quizzes, classic Machine Learning for all","stars":86284,"language":"Jupyter Notebook"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
