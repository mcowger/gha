s?lang=ru\">Русский</a> | \n  <a href=\"https://www.readme-i18n.com/TauricResearch/TradingAgents?lang=zh\">中文</a>\n</div>\n\n---\n\n# TradingAgents: Multi-Agents LLM Financial Trading Framework\n\n## News\n- [2026-05] **TradingAgents v0.2.5** released with the grounded Sentiment Analyst, GPT-5.5 etc. model coverage, Qwen/GLM/MiniMax dual-region support, `TRADINGAGENTS_*` env-var configurability with API-key auto-detection, remote Ollama support, non-US alpha benchmarks, and ticker path-traversal hardening. See [CHANGELOG.md](CHANGELOG.md) for the full list.\n- [2026-04] **TradingAgents v0.2.4** released with structured-output agents (Research Manager, Trader, Portfolio Manager), LangGraph checkpoint resume, persistent decision log, DeepSeek/Qwen/GLM/Azure provider support, Docker, and a Windows UTF-8 encoding fix.\n- [2026-03] **TradingAgents v0.2.3** released with multi-language support, GPT-5.4 family models, unified model catalog, backtesting date fidelity, and proxy support.\n- [2026-03] **TradingAgents v0.2.2** released with GPT-5.4/Gemini 3.1/Claude 4.6 model coverage, five-tier rating scale, OpenAI Responses API, Anthropic effort control, and cross-platform stability.\n- [2026-02] **TradingAgents v0.2.0** released with multi-provider LLM support (GPT-5.x, Gemini 3.x, Claude 4.x, Grok 4.x) and improved system architecture.\n- [2026-01] **Trading-R1** [Technical Report](https://arxiv.org/abs/2509.11420) released, with [Terminal](https://github.com/TauricResearch/Trading-R1) expected to land soon.\n\n<div align=\"center\">\n<a href=\"https://www.star-history.com/#TauricResearch/TradingAgents&Date\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=TauricResearch/TradingAgents&type=Date&theme=dark\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=TauricResearch/TradingAgents&type=Date\" />\n   <img alt=\"TradingAgents Star History\" src=\"https://api.star-history.com/svg?repos=TauricResearch/TradingAgents&type=Date\" style=\"width: 80%; height: auto;\" />\n </picture>\n</a>\n</div>\n\n> 🎉 **TradingAgents** officially released! We have received numerous inquiries about the work, and we would like to express our thanks for the enthusiasm in our community.\n>\n> So we decided to fully open-source the framework. Looking forward to building impactful projects with you!\n\n<div align=\"center\">\n\n🚀 [TradingAgents](#tradingagents-framework) | ⚡ [Installation & CLI](#installation-and-cli) | 🎬 [Demo](https://www.youtube.com/watch?v=90gr5lwjIho) | 📦 [Package Usage](#tradingagents-package) | 🤝 [Contributing](#contributing) | 📄 [Citation](#citation)\n\n</div>\n\n## TradingAgents Framework\n\nTradingAgents is a multi-agent trading framework that mirrors the dynamics of real-world trading firms. By deploying specialized LLM-powered agents: from fundamental analysts, sentiment experts, and technical analysts, to trader, risk management team, the platform collaboratively evaluates market conditions and informs trading decisions. Moreover, these agents engage in dynamic discussions to pinpoint the optimal strategy.\n\n<p align=\"center\">\n  <img src=\"assets/schema.png\" style=\"width: 100%; height: auto;\">\n</p>\n\n> TradingAgents framework is designed for research purposes. Trading performance may vary based on many factors, including the chosen backbone language models, model temperature, trading periods, the quality of data, and other non-deterministic factors. [It is not intended as financial, investment, or trading advice.](https://tauric.ai/disclaimer/)\n\nOur framework decomposes complex trading tasks into specialized roles.\n\n### Analyst Team\n- Fundamentals Analyst: Evaluates company financials and performance metrics, identifying intrinsic values and potential red flags.\n- Sentiment Analyst: Aggregates news headlines, StockTwits, and Reddit chatter into a single sentiment read to gauge short-term market mood.\n- News Analyst: Monitors global news and macroeconomic indicators, interpreting the impact of events on market conditions.\n- Technical Analyst: Utilizes technical indicators (like MACD and RSI) to detect trading patterns and forecast price movements.\n\n<p align=\"center\">\n  <img src=\"assets/analyst.png\" width=\"100%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n### Researcher Team\n- Comprises both bullish and bearish researchers who critically assess the insights provided by the Analyst Team. Through structured debates, they balance potential gains against inherent risks.\n\n<p align=\"center\">\n  <img src=\"assets/researcher.png\" width=\"70%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n### Trader Agent\n- Composes reports from the analysts and researchers to make informed trading decisions, determining the timing and magnitude of trades.\n\n<p align=\"center\">\n  <img src=\"assets/trader.png\" width=\"70%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n### Risk Management and Portfolio Manager\n- Continuously evaluates portfolio risk by assessing market volatility, liquidity, and other risk factors. The risk management team evaluates and adjusts trading strategies, providing assessment reports to the Portfolio Manager for final decision.\n- The Portfolio Manager approves/rejects the transaction proposal. If approved, the order will be sent to the simulated exchange and executed.\n\n<p align=\"center\">\n  <img src=\"assets/risk.png\" width=\"70%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n## Installation and CLI\n\n### Installation\n\nClone TradingAgents:\n```bash\ngit clone https://github.com/TauricResearch/TradingAgents.git\ncd TradingAgents\n```\n\nCreate a virtual environment in any of your favorite environment managers:\n```bash\nconda create -n tradingagents python=3.13\nconda activate tradingagents\n```\n\nInstall the package and its dependencies:\n```bash\npip install .\n```\n\n### Docker\n\nAlternatively, run with Docker:\n```bash\ncp .env.example .env  # add your API keys\ndocker compose run --rm tradingagents\n```\n\nFor local models with Ollama:\n```bash\ndocker compose --profile ollama run --rm tradingagents-ollama\n```\n\n### Required APIs\n\nTradingAgents supports multiple LLM providers. Set the API key for your chosen provider:\n\n```bash\nexport OPENAI_API_KEY=...          # OpenAI (GPT)\nexport GOOGLE_API_KEY=...          # Google (Gemini)\nexport ANTHROPIC_API_KEY=...       # Anthropic (Claude)\nexport XAI_API_KEY=...             # xAI (Grok)\nexport DEEPSEEK_API_KEY=...        # DeepSeek\nexport DASHSCOPE_API_KEY=...       # Qwen — International (dashscope-intl.aliyuncs.com)\nexport DASHSCOPE_CN_API_KEY=...    # Qwen — China (dashscope.aliyuncs.com)\nexport ZHIPU_API_KEY=...           # GLM via Z.AI (international)\nexport ZHIPU_CN_API_KEY=...        # GLM via BigModel (China, open.bigmodel.cn)\nexport MINIMAX_API_KEY=...         # MiniMax — Global (api.minimax.io, M2.x, 204K ctx)\nexport MINIMAX_CN_API_KEY=...      # MiniMax — China (api.minimaxi.com, M2.x, 204K ctx)\nexport OPENROUTER_API_KEY=...      # OpenRouter\nexport ALPHA_VANTAGE_API_KEY=...   # Alpha Vantage\n```\n\nFor enterprise providers (e.g. Azure OpenAI, AWS Bedrock), copy `.env.enterprise.example` to `.env.enterprise` and fill in your credentials.\n\nFor local models, configure Ollama with `llm_provider: \"ollama\"`. The default endpoint is `http://localhost:11434/v1`; set `OLLAMA_BASE_URL` to point at a remote `ollama-serve`. Pull models with `ollama pull <name>`, and pick \"Custom model ID\" in the CLI for any model not listed by default.\n\nAlternatively, copy `.env.example` to `.env` and fill in your keys:\n```bash\ncp .env.example .env\n```\n\n### CLI Usage\n\nLaunch the interactive CLI:\n```bash\ntradingagents          # installed command\npython -m cli.main     # alternative: run directly from source\n```\nYou will see a screen where you can select your desired tickers, analysis date, LLM provider, research depth, and more.\n\n### Markets and tickers\n\nTradingAgents works with any market Yahoo Finance covers, using the exchange-suffixed ticker. Company identity and the alpha benchmark resolve automatically per market.\n\n- US: `AAPL`, `SPY`\n- Hong Kong: `0700.HK` · Tokyo: `7203.T` · London: `AZN.L`\n- India: `RELIANCE.NS`, `.BO` · Canada: `.TO` · Australia: `.AX`\n- China A-shares: Shanghai `.SS`, Shenzhen `.SZ` (e.g. `600519.SS` for Kweichow Moutai)\n- Crypto: `BTC-USD`, `ETH-USD`\n\n<p align=\"center\">\n  <img src=\"assets/cli/cli_init.png\" width=\"100%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\nAn interface will appear showing results as they load, letting you track the agent's progress as it runs.\n\n<p align=\"center\">\n  <img src=\"assets/cli/cli_news.png\" width=\"100%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/cli/cli_transaction.png\" width=\"100%\" style=\"display: inline-block; margin: 0 2%;\">\n</p>\n\n## TradingAgents Package\n\n### Implementation Details\n\nWe built TradingAgents with LangGraph to ensure flexibility and modularity. The framework supports multiple LLM providers: OpenAI, Google, Anthropic, xAI, DeepSeek, Qwen (Alibaba DashScope, international and China endpoints), GLM (Zhipu), MiniMax (global + China), OpenRouter, Ollama for local models, and Azure OpenAI for enterprise.\n\n### Python Usage\n\nTo use TradingAgents inside your code, you can import the `tradingagents` module and initialize a `TradingAgentsGraph()` object. The `.propagate()` function will return a decision. You can run `main.py`, here's also a quick example:\n\n```python\nfrom tradingagents.graph.trading_graph import TradingAgentsGraph\nfrom tradingagents.default_config import DEFAULT_CONFIG\n\nta = TradingAgentsGraph(debug=True, config=DEFAULT_CONFIG.copy())\n\n# forward propagate\n_, decision = ta.propagate(\"NVDA\", \"2026-01-15\")\nprint(decision)\n```\n\nYou can also adjust the default configuration to set your own choice of LLMs, debate rounds, etc.\n\n```python\nfrom tradingagents.graph.trading_graph import TradingAgentsGraph\nfrom tradingagents.default_config import DEFAULT_CONFIG\n\nconfig = DEFAULT_CONFIG.copy()\nconfig[\"llm_provider\"] = \"openai\"        # openai, google, anthropic, xai, deepseek, qwen, qwen-cn, glm, glm-cn, minimax, minimax-cn, openrouter, ollama, azure\nconfig[\"deep_think_llm\"] = \"gpt-5.5\"     # Model for complex reasoning\nconfig[\"quick_think_llm\"] = \"gpt-5.4-mini\" # Model for quick tasks\nconfig[\"max_debate_rounds\"] = 2\n\nta = TradingAgentsGraph(debug=True, config=config)\n_, decision = ta.propagate(\"NVDA\", \"2026-01-15\")\nprint(decision)\n```\n\nSee `tradingagents/default_config.py` for all configuration options.\n\n## Persistence and Recovery\n\nTradingAgents persists two kinds of state across runs.\n\n### Decision log\n\nThe decision log is always on. Each completed run appends its decision to `~/.tradingagents/memory/trading_memory.md`. On the next run for the same ticker, TradingAgents fetches the realised return (raw and alpha vs SPY), generates a one-paragraph reflection, and injects the most recent same-ticker decisions plus recent cross-ticker lessons into the Portfolio Manager prompt, so each analysis carries forward what worked and what didn't.\n\nOverride the path with `TRADINGAGENTS_MEMORY_LOG_PATH`.\n\n### Checkpoint resume\n\nCheckpoint resume is opt-in via `--checkpoint`. When enabled, LangGraph saves state after each node so a crashed or interrupted run resumes from the last successful step instead of starting over. On a resume run you will see `Resuming from step N for <TICKER> on <date>` in the logs; on a new run you will see `Starting fresh`. Checkpoints are cleared automatically on successful completion.\n\nPer-ticker SQLite databases live at `~/.tradingagents/cache/checkpoints/<TICKER>.db` (override the base with `TRADINGAGENTS_CACHE_DIR`). Use `--clear-checkpoints` to reset all of them before a run.\n\n```bash\ntradingagents analyze --checkpoint           # enable for this run\ntradingagents analyze --clear-checkpoints    # reset before running\n```\n\n```python\nconfig = DEFAULT_CONFIG.copy()\nconfig[\"checkpoint_enabled\"] = True\nta = TradingAgentsGraph(config=config)\n_, decision = ta.propagate(\"NVDA\", \"2026-01-15\")\n```\n\n## Reproducibility\n\nTradingAgents is LLM-driven, so two runs of the same ticker and date can differ. This is expected for a research tool built on language models, not a defect. The variation comes from a few distinct sources, and it helps to separate them.\n\nLanguage model sampling is non-deterministic. Even at a fixed temperature, providers do not guarantee byte-identical output across calls, and reasoning models (the default GPT-5.x family, and any thinking-mode model) vary the most because their internal reasoning is itself sampled.\n\nLive data moves. News, StockTwits, and Reddit return different content as time passes, so a run today sees different inputs than a run last week even for the same historical trade date. Pin the analysis date to hold the price and indicator window fixed, but the social and news sources still reflect \"now\".\n\nTo reduce variation you can lower the sampling temperature. Set `temperature` in your config (or `TRADINGAGENTS_TEMPERATURE` in `.env`); lower values make models that honor it more repeatable. Reasoning models largely ignore temperature, so for tighter reproducibility pair a low temperature with a non-reasoning model such as `gpt-4.1`.\n\n```python\nconfig = DEFAULT_CONFIG.copy()\nconfig[\"llm_provider\"] = \"openai\"\nconfig[\"deep_think_llm\"] = \"gpt-4.1\"      # non-reasoning model honors temperature\nconfig[\"quick_think_llm\"] = \"gpt-4.1\"\nconfig[\"temperature\"] = 0.0\n```\n\nWhat does not vary anymore: the analyzed company identity is resolved deterministically from the ticker before any agent runs, and the market analyst grounds exact price and indicator claims in a verified data snapshot. Earlier reports of \"different companies\" or fabricated price levels across runs are addressed by these two mechanisms.\n\nBacktest results are not guaranteed to match any published figure. Returns depend on the model, the temperature, the date range, data quality, and the sampling above. Treat the framework as a research scaffold for studying multi-agent analysis, not as a strategy with a fixed, replicable return.\n\n## Contributing\n\nContributions are welcome: bug fixes, documentation, and feature ideas; past contributions are credited per release in [`CHANGELOG.md`](CHANGELOG.md).\n\n## Citation\n\nPlease reference our work if you find *TradingAgents* provides you with some help :)\n\n```\n@misc{xiao2025tradingagentsmultiagentsllmfinancial,\n      title={TradingAgents: Multi-Agents LLM Financial Trading Framework}, \n      author={Yijia Xiao and Edward Sun and Di Luo and Wei Wang},\n      year={2025},\n      eprint={2412.20138},\n      archivePrefix={arXiv},\n      primaryClass={q-fin.TR},\n      url={https://arxiv.org/abs/2412.20138}, \n}\n```\n","summary":"TradingAgents is an advanced multi-agent framework designed to automate financial trading workflows using Large Language Models. The platform integrates specialized agents, such as Research Managers and Portfolio Managers, to facilitate complex decision-making, sentiment analysis, and backtesting across a wide variety of global model providers. By offering a unified, modular architecture that supports persistent logging and structured output, it provides a robust environment for developers and quantitative researchers to build and iterate on intelligent trading strategies.","description":"TradingAgents: Multi-Agents LLM Financial Trading Framework","stars":82607,"language":"Python"},{"owner":"pickle-com","repo":"glass","url":"https://github.com/pickle-com/glass","readme":"<p align=\"center\">\n  <a href=\"https://pickle.com/glass\">\n   <img src=\"./public/assets/banner.gif\" alt=\"Logo\">\n  </a>\n\n  <h1 align=\"center\">Glass by Pickle: Digital Mind Extension 🧠</h1>\n\n</p>\n\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/UCZH5B5Hpd\"><img src=\"./public/assets/button_dc.png\" width=\"80\" alt=\"Pickle Discord\"></a>&ensp;<a href=\"https://pickle.com\"><img src=\"./public/assets/button_we.png\" width=\"105\" alt=\"Pickle Website\"></a>&ensp;<a href=\"https://x.com/intent/user?screen_name=leinadpark\"><img src=\"./public/assets/button_xe.png\" width=\"109\" alt=\"Follow Daniel\"></a>\n</p>\n\n> This project is a fork of [CheatingDaddy](https://github.com/sohzm/cheating-daddy) with modifications and enhancements. Thanks to [Soham](https://x.com/soham_btw) and all the open-source contributors who made this possible!\n\n🤖 **Fast, light & open-source**—Glass lives on your desktop, sees what you see, listens in real time, understands your context, and turns every moment into structured knowledge.\n\n💬 **Proactive in meetings**—it surfaces action items, summaries, and answers the instant you need them.\n\n🫥️ **Truly invisible**—never shows up in screen recordings, screenshots, or your dock; no always-on capture or hidden sharing.\n\nTo have fun building with us, join our [Discord](https://discord.gg/UCZH5B5Hpd)!\n\n## Instant Launch\n\n⚡️  Skip the setup—launch instantly with our ready-to-run macOS app.  [[Download Here]](https://www.dropbox.com/scl/fi/znid09apxiwtwvxer6oc9/Glass_latest.dmg?rlkey=gwvvyb3bizkl25frhs4k1zwds&st=37q31b4w&dl=1)\n\n## Quick Start (Local Build)\n\n### Prerequisites\n\nFirst download & install [Python](https://www.python.org/downloads/) and [Node](https://nodejs.org/en/download).\nIf you are using Windows, you need to also install [Build Tools for Visual Studio](https://visualstudio.microsoft.com/downloads/)\n\nEnsure you're using Node.js version 20.x.x to avoid build errors with native dependencies.\n\n```bash\n# Check your Node.js version\nnode --version\n\n# If you need to install Node.js 20.x.x, we recommend using nvm:\n# curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash\n# nvm install 20\n# nvm use 20\n```\n\n### Installation\n\n```bash\nnpm run setup\n```\n\n## Highlights\n\n\n### Ask: get answers based on all your previous screen actions & audio\n\n<img width=\"100%\" alt=\"booking-screen\" src=\"./public/assets/00.gif\">\n\n### Meetings: real-time meeting notes, live summaries, session records\n\n<img width=\"100%\" alt=\"booking-screen\" src=\"./public/assets/01.gif\">\n\n### Use your own API key, or sign up to use ours (free)\n\n<img width=\"100%\" alt=\"booking-screen\" src=\"./public/assets/02.gif\">\n\n**Currently Supporting:**\n- OpenAI API: Get OpenAI API Key [here](https://platform.openai.com/api-keys)\n- Gemini API: Get Gemini API Key [here](https://aistudio.google.com/apikey)\n- Local LLM Ollama & Whisper\n\n### Liquid Glass Design (coming soon)\n\n<img width=\"100%\" alt=\"booking-screen\" src=\"./public/assets/03.gif\">\n\n<p>\n  for a more detailed guide, please refer to this <a href=\"https://www.youtube.com/watch?v=qHg3_4bU1Dw\">video.</a>\n  <i style=\"color:gray; font-weight:300;\">\n    we don't waste money on fancy vids; we just code.\n  </i>\n</p>\n\n\n## Keyboard Shortcuts\n\n`Ctrl/Cmd + \\` : show and hide main window\n\n`Ctrl/Cmd + Enter` : ask AI using all your previous screen and audio\n\n`Ctrl/Cmd + Arrows` : move main window position\n\n## Repo Activity\n\n![Alt](https://repobeats.axiom.co/api/embed/a23e342faafa84fa8797fa57762885d82fac1180.svg \"Repobeats analytics image\")\n\n## Contributing\n\nWe love contributions! Feel free to open issues for bugs or feature requests. For detailed guide, please see our [contributing guide](/CONTRIBUTING.md).\n> Currently, we're working on a full code refactor and modularization. Once that's completed, we'll jump into addressing the major issues.\n\n### Contributors\n\n<a href=\"https://github.com/pickle-com/glass/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=pickle-com/glass\" />\n</a>\n\n### Help Wanted Issues\n\nWe have a list of [help wanted](https://github.com/pickle-com/glass/issues?q=is%3Aissue%20state%3Aopen%20label%3A%22%F0%9F%99%8B%E2%80%8D%E2%99%82%EF%B8%8Fhelp%20wanted%22) that contain small features and bugs which have a relatively limited scope. This is a great place to get started, gain experience, and get familiar with our contribution process.\n\n\n### 🛠 Current Issues & Improvements\n\n| Status | Issue                          | Description                                       |\n|--------|--------------------------------|---------------------------------------------------|\n| 🚧 WIP      | Liquid Glass                    | Liquid Glass UI for MacOS 26 |\n\n### Changelog\n\n- Jul 5: Now support Gemini, Intel Mac supported\n- Jul 6: Full code refactoring has done.\n- Jul 7: Now support Claude, LLM/STT model selection\n- Jul 8: Now support Windows(beta), Improved AEC by Rust(to seperate mic/system audio), shortcut editing(beta)\n- Jul 8: Now support Local LLM & STT, Firebase Data Storage \n\n\n## About Pickle\n\n**Our mission is to build a living digital clone for everyone.** Glass is part of Step 1—a trusted pipeline that transforms your daily data into a scalable clone. Visit [pickle.com](https://pickle.com) to learn more.\n\n## Star History\n[![Star History Chart](https://api.star-history.com/svg?repos=pickle-com/glass&type=Date)](https://www.star-history.com/#pickle-com/glass&Date)\n","summary":"Glass is an open-source, invisible desktop assistant that acts as a digital mind extension by monitoring your screen activity and audio in real time. It offers powerful features like proactive meeting summarization, automated action item tracking, and an integrated interface to query the AI based on your historical context. Designed for privacy and stealth, this tool is ideal for professionals and power users who want an automated assistant that enhances productivity without cluttering their workspace.","description":"Digital Mind Extension","stars":7519,"language":"JavaScript"},{"owner":"zserge","repo":"pennybase","url":"https://github.com/zserge/pennybase","readme":"# Pennybase\n\nPoor man's Backend-as-a-Service (BaaS), similar to Firebase/Supabase/Pocketbase\n\nIt implements core backend features in less than 1000 lines of Go code, using only standard library and no external dependencies:\n\n- **File-based storage** using CSV with versioned records\n- **REST API** with JSON responses\n- **Authentication** with session cookies and Basic Auth\n- **RBAC & ownership-based permissions**\n- **Real-time updates** via SSE\n- **Schema validation** for numbers/text/lists\n- **Template rendering** with Go templates\n\n## How it Works\n\nData stored in human-readable CSVs, one row per record. Data storage is append-only, with each update creating a new version of the record. The latest version is always used for reads. For faster lookups and updates, Pennybase maintains an in-memory index of the latest versions (offsets from the beginning of the CSV file).\n\nWe agree that the first column in CSV is always the record ID, and the second column is the version number. The rest of the columns are data fields.\n\nTo put JSON resources into such CSV format, Pennybase uses a simple schema definition in `_schemas.csv` that maps JSON fields to CSV columns. Typically it looks like this:\n\n```csv\ns1,1,_permissions,_id,text,,,^.+$\ns2,1,_permissions,_v,number,1,,\ns3,1,_permissions,resource,text,,,^.+$\ns4,1,_permissions,action,text,,,^.+$\ns5,1,_permissions,field,text,,,^.*$\ns6,1,_permissions,role,text,,,^.*$\ns7,1,_users,_id,text,,,^.+$\ns8,1,_users,_v,number,1,,\ns9,1,_users,salt,text,,,\ns10,1,_users,password,text,,,^.+$\ns11,1,_users,roles,list,,,\ns12,1,todo,_id,text,,,^.+$\ns13,1,todo,_v,number,1,,\ns14,1,todo,description,text,0,0,\".+\"\ns15,1,todo,completed,number,0,1,\"\"\n```\n\nHere first column is ID, second is version number (schemas are immutable), then comes the resource/collection name, followed by field name, field type, min/max value for numbers, and validation regex for strings.\n\nFor simplicity only text, number and list field type are supported.\n\nAnother important file is `_users.csv` which contains user credentials and roles. It has the same format as other resources, but with a special `_users` collection name. There is no way to add new users via API, they must be created manually by editing this file:\n\n```csv\nadmin,1,salt,5V5R4SO4ZIFMXRZUL2EQMT2CJSREI7EMTK7AH2ND3T7BXIDLMNVQ====,\"admin\"\nalice,1,salt,PXHQWNPTZCBORTO5ASIJYVVAINQLQKJSOAQ4UXIAKTR55BU4HGRQ====,\n```\n\nHere we have user ID which is user name, version number (always 1), salt for password hashing, and the password itself (hashed with SHA-256 and encoded as Base32). The last column is a list of roles assigned to the user.\n\nOne last special file is `_permissions.csv` which defines access control rules for resources. Each row defines a rule that allows access to a resource:\n\n```csv\np1,1,todo,read,,*,\"Anyone authenticated can read todos\"\np2,1,todo,create,,*,\"Anyone authenticated can add new todos\"\np3,1,todo,update,owner,\"admin,editor\",\"Only owners and users with admin or editor role can update todos\"\np4,1,todo,delete,owner,\"admin,editor\",\"Only owners and users with admin or editor role can delete todos\"\n```\n\nIt's very basic role-based access control: when the system needs to perform an action on a resource it checks the matching permission rule (there may be more then one). If the user has one of the roles in the list - permission is granted. Alternatively, if the resource field specified in the rule matches user ID - permission is granted as well (in the example above \"owner\" is the field of \"todo\" resource that contains owner user ID). If no rules match - access is denied.\n\n## REST API\n\nBased on the resources defined in `_schemas.csv`, Pennybase provides a REST API with the following endpoints:\n\n- `GET /api/{resource}?sort_by={field}` - list all records in the resource, optionally sorting them\n- `GET /api/{resource}/{id}` - get a single record by ID\n- `POST /api/{resource}` - create a new record (requires \"create\" permission)\n- `PUT /api/{resource}/{id}` - update an existing record (requires \"update\" permission)\n- `DELETE /api/{resource}/{id}` - delete a record (requires \"delete\" permission)\n- `GET /api/events/{resource}` - stream server-side events for a resource (requires \"read\" permission)\n\nOne may use basic auth to authenticate requests, or use session cookies. Session cookies are created by sending a POST request to `/api/login` with `username` and `password` fields in the body. The response will contain a session cookie that can be used for subsequent requests. Calling `/api/logout` will invalidate the session and remove the cookie.\n\n## Static assets\n\nPennybase can also serve static assets from the `static` directory. You can place your HTML, CSS, JavaScript files there and access them via `/{filename}` URL.\n\nAdditionally, Pennybase supports rendering HTML templates using Go's `html/template` package. You can create a template file in the `templates` directory and access it via `/{filename}` URL as well. The following data is available in the templates:\n\n* `.User` - the currently authenticated user (or `nil` if not authenticated)\n* `.Store` - the Pennybase store instance, for reading or listing resources\n* `.Request` - the current HTTP request\n* `.ID` - the ID of the resource being accessed (if applicable)\n* `.Authorize` - a function to check if the user has permission to perform an action on a resource:\n\n```html\n{{ if .User }}\n{{ if call .Authorize \"my-resource\" \"read\" .ID }}\n<div>{{ .Store.Get \"my-resource\" .ID }}</div>\n{{ else }}\n<div>You do not have permission to read this resource.</div>\n{{ end }}\n{{ else }}\n<div>Please log in to access this resource.</div>\n{{ end }}\n```\n\n## Hooks\n\nExtending Pennybase functionality is possible via hooks. Or, technically, one hook function:\n\n```go\nserver, err := pennybase.NewServer(\"data\", \"templates\", \"static\")\nif err != nil {\n    log.Fatal(err)\n}\nserver.Hook = func(trigger, resource string, user pennybase.Resource, res pennybase.Resource) error {\n    log.Printf(\"Hook triggered: %s on %s by user %v: %v\", trigger, resource, user, res)\n    if trigger == \"create\" && resource == \"messages\" {\n        r[\"author\"] = user[\"_id\"]\n        r[\"created_at\"] = time.Now().UTC().Format(\"2006-01-02T15:04:05Z07:00\")\n    }\n    return nil\n}\nlog.Fatal(http.ListenAndServe(\":8000\", server))\n```\n\nThis hook will be called on every create/update/delete action on any resource. The `trigger` parameter indicates the action type, `resource` is the name of the resource being modified, `user` is the user performing the action, and `res` is the resource data being modified.\n\nYou may perform additional validation or modify the resource data before it is saved. If you return an error from the hook, the action will be aborted and an error response will be sent to the client.\n\n## Contributions\n\nContributions are welcome, but please make sure the code remains small, clear and correct.\nLikely, no new features would be added, except for bug fixes, tests and examples.\n\nThe code is distributed under MIT license, so feel free to play with it, fork it, do anything you want!\n","summary":"Pennybase is a lightweight, dependency-free Backend-as-a-Service (BaaS) implemented in under 1,000 lines of Go, designed to serve as a minimalist alternative to Firebase or Supabase. It features file-based storage using versioned CSV records, providing a REST API, real-time updates via SSE, and role-based access control with schema validation. This project is ideal for developers who need a simple, self-contained backend solution for small-scale applications that prioritizes human-readable data storage over complex database infrastructure.","description":"Poor man's Backend-as-a-Service (BaaS), similar to Firebase/Supabase/Pocketbase","stars":828,"language":"Go"},{"owner":"NanmiCoder","repo":"MediaCrawler","url":"https://github.com/NanmiCoder/MediaCrawler","readme":"# 🔥 MediaCrawler - 自媒体平台爬虫 🕷️\n\n<div align=\"center\">\n\n<a href=\"https://trendshift.io/repositories/8291\" target=\"_blank\">\n  <img src=\"https://trendshift.io/api/badge/repositories/8291\" alt=\"NanmiCoder%2FMediaCrawler | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/>\n</a>\n\n[![GitHub Stars](https://img.shields.io/github/stars/NanmiCoder/MediaCrawler?style=social)](https://github.com/NanmiCoder/MediaCrawler/stargazers)\n[![GitHub Forks](https://img.shields.io/github/forks/NanmiCoder/MediaCrawler?style=social)](https://github.com/NanmiCoder/MediaCrawler/network/members)\n[![GitHub Issues](https://img.shields.io/github/issues/NanmiCoder/MediaCrawler)](https://github.com/NanmiCoder/MediaCrawler/issues)\n[![GitHub Pull Requests](https://img.shields.io/github/issues-pr/NanmiCoder/MediaCrawler)](https://github.com/NanmiCoder/MediaCrawler/pulls)\n[![License](https://img.shields.io/github/license/NanmiCoder/MediaCrawler)](https://github.com/NanmiCoder/MediaCrawler/blob/main/LICENSE)\n[![中文](https://img.shields.io/badge/🇨🇳_中文-当前-blue)](README.md)\n[![English](https://img.shields.io/badge/🇺🇸_English-Available-green)](README_en.md)\n[![Español](https://img.shields.io/badge/🇪🇸_Español-Available-green)](README_es.md)\n</div>\n\n\n\n> **免责声明：**\n> \n> 大家请以学习为目的使用本仓库⚠️⚠️⚠️⚠️，[爬虫违法违规的案件](https://github.com/HiddenStrawberry/Crawler_Illegal_Cases_In_China)  <br>\n>\n>本仓库的所有内容仅供学习和参考之用，禁止用于商业用途。任何人或组织不得将本仓库的内容用于非法用途或侵犯他人合法权益。本仓库所涉及的爬虫技术仅用于学习和研究，不得用于对其他平台进行大规模爬虫或其他非法行为。对于因使用本仓库内容而引起的任何法律责任，本仓库不承担任何责任。使用本仓库的内容即表示您同意本免责声明的所有条款和条件。\n>\n> 点击查看更为详细的免责声明。[点击跳转](#disclaimer)\n\n\n\n\n## 📖 项目简介\n\n一个功能强大的**多平台自媒体数据采集工具**，支持小红书、抖音、快手、B站、微博、贴吧、知乎等主流平台的公开信息抓取。\n\n### 🔧 技术原理\n\n- **核心技术**：基于 [Playwright](https://playwright.dev/) 浏览器自动化框架登录保存登录态\n- **无需JS逆向**：利用保留登录态的浏览器上下文环境，通过 JS 表达式获取签名参数\n- **优势特点**：无需逆向复杂的加密算法，大幅降低技术门槛\n\n\n## ✨ 功能特性\n| 平台   | 关键词搜索 | 指定帖子ID爬取 | 二级评论 | 指定创作者主页 | 登录态缓存 | IP代理池 | 生成评论词云图 |\n| ------ | ---------- | -------------- | -------- | -------------- | ---------- | -------- | -------------- |\n| 小红书 | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| 抖音   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| 快手   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| B 站   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| 微博   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| 贴吧   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n| 知乎   | ✅          | ✅              | ✅        | ✅              | ✅          | ✅        | ✅              |\n\n\n\n<strong>MediaCrawlerPro 重磅发布！开源不易，欢迎订阅支持</strong>\n\n> 专注于学习成熟项目的架构设计，不仅仅是爬虫技术，Pro 版本的代码设计思路同样值得深入学习！\n\n[MediaCrawlerPro](https://github.com/MediaCrawlerPro) 相较于开源版本的核心优势：\n\n#### 🎯 核心功能升级\n- ✅ **自媒体内容拆解Agent**（新增功能）\n- ✅ **断点续爬功能**（重点特性）\n- ✅ **多账号 + IP代理池支持**（重点特性）\n- ✅ **去除 Playwright 依赖**，使用更简单\n- ✅ **完整 Linux 环境支持**\n\n#### 🏗️ 架构设计优化\n- ✅ **代码重构优化**，更易读易维护（解耦 JS 签名逻辑）\n- ✅ **企业级代码质量**，适合构建大型爬虫项目\n- ✅ **完美架构设计**，高扩展性，源码学习价值更大\n\n#### 🎁 额外功能\n- ✅ **自媒体视频下载器桌面端**（适合学习全栈开发）\n- ✅ **多平台首页信息流推荐**（HomeFeed）\n- ✅ **AI Agent Skill 支持**（[OpenClaw](https://openclaw.ai/) 🦞 / Claude Code / Cursor 一键安装，让 Agent 自动爬取数据）\n- [ ] **基于评论分析AI Agent正在开发中 🚀🚀**\n\n点击查看：[MediaCrawlerPro 项目主页](https://github.com/MediaCrawlerPro) 更多介绍\n\n\n\n## 🚀 快速开始\n\n> 💡 **如果这个项目对您有帮助，请给个 ⭐ Star 支持一下！**\n\n## 📋 前置依赖\n\n### 🚀 uv 安装（推荐）\n\n在进行下一步操作之前，请确保电脑上已经安装了 uv：\n\n- **安装地址**：[uv 官方安装指南](https://docs.astral.sh/uv/getting-started/installation)\n- **验证安装**：终端输入命令 `uv --version`，如果正常显示版本号，证明已经安装成功\n- **推荐理由**：uv 是目前最强的 Python 包管理工具，速度快、依赖解析准确\n\n### 🟢 Node.js 安装\n\n项目依赖 Node.js，请前往官网下载安装：\n\n- **下载地址**：https://nodejs.org/en/download/\n- **版本要求**：>= 16.0.0\n\n### 📦 Python 包安装\n\n```shell\n# 进入项目目录\ncd MediaCrawler\n\n# 使用 uv sync 命令来保证 python 版本和相关依赖包的一致性\nuv sync\n```\n\n### 🌐 浏览器驱动安装（可选）\n\n> 如果使用默认的 CDP 模式（连接已有 Chrome 浏览器），**无需安装浏览器驱动**。仅在使用标准 Playwright 模式时需要安装。\n\n```shell\n# 仅在标准 Playwright 模式下需要安装浏览器驱动\nuv run playwright install\n```\n\n### 🌍 Chrome 浏览器配置（推荐）\n\n项目默认使用 CDP 模式连接用户已有的 Chrome 浏览器，可以复用浏览器已有的登录状态、Cookie、扩展等，**大幅降低平台风控检测风险**。\n\n使用前需要：\n\n1. **安装最新版 Chrome 浏览器**（版本 >= 144），[下载地址](https://www.google.com/chrome/)\n2. **开启远程调试功能**：在 Chrome 地址栏输入 `chrome://inspect/#remote-debugging`，勾选 **\"Allow remote debugging for this browser instance\"**\n3. 页面显示 `Server running at: 127.0.0.1:9222` 表示已就绪\n\n> 💡 **提示**：运行爬虫后，Chrome 浏览器会弹出确认对话框，点击\"接受\"即可。程序会等待用户确认，60秒内操作完成即可。\n>\n> 如果不想使用 CDP 模式，可以在 `config/base_config.py` 中设置 `ENABLE_CDP_MODE = False` 切换为标准 Playwright 模式。\n\n## 🚀 运行爬虫程序\n\n```shell\n# 在 config/base_config.py 查看配置项目功能，写的有中文注释\n\n# 从配置文件中读取关键词搜索相关的帖子并爬取帖子信息与评论\nuv run main.py --platform xhs --lt qrcode --type search\n\n# 从配置文件中读取指定的帖子ID列表获取指定帖子的信息与评论信息\nuv run main.py --platform xhs --lt qrcode --type detail\n\n# 打开对应APP扫二维码登录\n\n# 其他平台爬虫使用示例，执行下面的命令查看\nuv run main.py --help\n```\n\n<details>\n<summary>🖥️ <strong>WebUI 可视化操作界面</strong></summary>\n\nMediaCrawler 提供了基于 Web 的可视化操作界面，无需命令行也能轻松使用爬虫功能。\n\n#### 启动 WebUI 服务\n\n```shell\n# 启动 API 服务器（默认端口 8080）\nuv run uvicorn api.main:app --port 8080 --reload\n\n# 或者使用模块方式启动\nuv run python -m api.main\n```\n\n启动成功后，访问 `http://localhost:8080` 即可打开 WebUI 界面。\n\n#### WebUI 功能特性\n\n- 可视化配置爬虫参数（平台、登录方式、爬取类型等）\n- 实时查看爬虫运行状态和日志\n- 数据预览和导出\n\n#### 界面预览\n\n<img src=\"docs/static/images/img_8.png\" alt=\"WebUI 界面预览\">\n\n</details>\n\n<details>\n<summary>🔗 <strong>使用 Python 原生 venv 管理环境（不推荐）</strong></summary>\n\n#### 创建并激活 Python 虚拟环境\n\n> 如果是爬取抖音和知乎，需要提前安装 nodejs 环境，版本大于等于：`16` 即可\n\n```shell\n# 进入项目根目录\ncd MediaCrawler\n\n# 创建虚拟环境\n# 我的 python 版本是：3.11 requirements.txt 中的库是基于这个版本的\n# 如果是其他 python 版本，可能 requirements.txt 中的库不兼容，需自行解决\npython -m venv venv\n\n# macOS & Linux 激活虚拟环境\nsource venv/bin/activate\n\n# Windows 激活虚拟环境\nvenv\\Scripts\\activate\n```\n\n#### 安装依赖库\n\n```shell\npip install -r requirements.txt\n```\n\n#### 安装 playwright 浏览器驱动\n\n```shell\nplaywright install\n```\n\n#### 运行爬虫程序（原生环境）\n\n```shell\n# 项目默认是没有开启评论爬取模式，如需评论请在 config/base_config.py 中的 ENABLE_GET_COMMENTS 变量修改\n# 一些其他支持项，也可以在 config/base_config.py 查看功能，写的有中文注释\n\n# 从配置文件中读取关键词搜索相关的帖子并爬取帖子信息与评论\npython main.py --platform xhs --lt qrcode --type search\n\n# 从配置文件中读取指定的帖子ID列表获取指定帖子的信息与评论信息\npython main.py --platform xhs --lt qrcode --type detail\n\n# 打开对应APP扫二维码登录\n\n# 其他平台爬虫使用示例，执行下面的命令查看\npython main.py --help\n```\n\n</details>\n\n\n## 💾 数据保存\n\nMediaCrawler 支持多种数据存储方式，包括 CSV、JSON、JSONL、Excel、SQLite 和 MySQL 数据库。\n\n📖 **详细使用说明请查看：[数据存储指南](docs/data_storage_guide.md)**\n\n\n[🚀 MediaCrawlerPro 重磅发布 🚀！更多的功能，更好的架构设计！开源不易，欢迎订阅支持！](https://github.com/MediaCrawlerPro)\n\n\n## 💬 交流群组\n- **微信交流群**：[点击加入](https://nanmicoder.github.io/MediaCrawler/%E5%BE%AE%E4%BF%A1%E4%BA%A4%E6%B5%81%E7%BE%A4.html)\n- **B站账号**：[关注我](https://space.bilibili.com/434377496)，分享AI与爬虫技术知识\n\n\n## 💰 赞助商展示\n\n<a href=\"https://tikhub.io/?utm_source=github.com/NanmiCoder/MediaCrawler&utm_medium=marketing_social&utm_campaign=retargeting&utm_content=carousel_ad\">\n<img width=\"500\" src=\"docs/static/images/tikhub_banner_zh.png\">\n<br>\nTikHub.io 提供 900+ 高稳定性数据接口，覆盖 TK、DY、XHS、Y2B、Ins、X 等 14+ 海内外主流平台，支持用户、内容、商品、评论等多维度公开数据 API，并配套 4000 万+ 已清洗结构化数据集，使用邀请码 <code>cfzyejV9</code> 注册并充值，即可额外获得 $2 赠送额度。\n</a>\n\n---\n\n## 🤝 成为赞助者\n\n成为赞助者，可以将您的产品展示在这里，每天获得大量曝光！\n\n**联系方式**：\n- 微信：`relakkes`\n- 邮箱：`relakkes@gmail.com`\n---\n\n## ☕ 请作者喝杯咖啡\n\n如果这个项目对您有帮助，欢迎打赏支持，您的每一份支持都是我持续更新的动力 ❤️\n\n<table>\n<tr>\n<td align=\"center\" width=\"33%\">\n<img src=\"docs/static/images/wechat_pay.jpeg\"
