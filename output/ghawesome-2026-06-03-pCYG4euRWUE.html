n@inproceedings{zheng2024llamafactory,\n  title={LlamaFactory: Unified Efficient Fine-Tuning of 100+ Language Models},\n  author={Yaowei Zheng and Richong Zhang and Junhao Zhang and Yanhan Ye and Zheyan Luo and Zhangchi Feng and Yongqiang Ma},\n  booktitle={Proceedings of the 62nd Annual Meeting of the Association for Computational Linguistics (Volume 3: System Demonstrations)},\n  address={Bangkok, Thailand},\n  publisher={Association for Computational Linguistics},\n  year={2024},\n  url={http://arxiv.org/abs/2403.13372}\n}\n```\n\n## Acknowledgement\n\nThis repo benefits from [PEFT](https://github.com/huggingface/peft), [TRL](https://github.com/huggingface/trl), [QLoRA](https://github.com/artidoro/qlora) and [FastChat](https://github.com/lm-sys/FastChat). Thanks for their wonderful works.\n\n## Star History\n\n![Star History Chart](https://api.star-history.com/svg?repos=hiyouga/LLaMA-Factory&type=Date)\n","summary":"LLaMA Factory is a comprehensive framework designed to simplify the fine-tuning of over 100 large language models through both a user-friendly Web UI and a powerful command-line interface. The project supports various training techniques, including full parameter fine-tuning and efficient methods like LoRA and QLoRA, while maintaining low-code requirements for complex workflows. It is an ideal tool for developers, data scientists, and researchers looking to customize LLMs for specific tasks without needing deep expertise in the underlying training infrastructure.","description":"Unified Efficient Fine-Tuning of 100+ LLMs & VLMs (ACL 2024)","stars":71818,"language":"Python"},{"owner":"unslothai","repo":"unsloth","url":"https://github.com/unslothai/unsloth","readme":"<h1 align=\"center\" style=\"margin:0;\">\n  <a href=\"https://unsloth.ai/docs\"><picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/unsloth%20logo%20white%20text.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/unsloth%20logo%20black%20text.png\">\n    <img alt=\"Unsloth logo\" src=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/unsloth%20logo%20black%20text.png\" height=\"80\" style=\"max-width:100%;\">\n  </picture></a>\n</h1>\n<h3 align=\"center\" style=\"margin: 0; margin-top: 0;\">\nUnsloth Studio lets you run and train models locally.\n</h3>\n\n<p align=\"center\">\n  <a href=\"#-features\">Features</a> •\n  <a href=\"#-install\">Quickstart</a> •\n  <a href=\"#-free-notebooks\">Notebooks</a> •\n  <a href=\"https://unsloth.ai/docs\">Documentation</a>\n</p>\n<br>\n<a href=\"https://unsloth.ai/docs/new/studio\">\n<img alt=\"unsloth studio ui homepage\" src=\"https://github.com/user-attachments/assets/53ae17a9-d975-44ef-9686-efb4ebd0454d\" style=\"max-width: 100%; margin-bottom: 0;\"></a>\n\n## ⚡ Get started\n\n#### macOS, Linux, WSL:\n```bash\ncurl -fsSL https://unsloth.ai/install.sh | sh\n```\n#### Windows:\n```powershell\nirm https://unsloth.ai/install.ps1 | iex\n```\n#### Community:\n\n- [Discord](https://discord.gg/unsloth)\n- [𝕏 (Twitter)](https://x.com/UnslothAI)\n- [Reddit](https://reddit.com/r/unsloth)\n\n## ⭐ Features\nUnsloth Studio (Beta) lets you run and train text, [audio](https://unsloth.ai/docs/basics/text-to-speech-tts-fine-tuning), [embedding](https://unsloth.ai/docs/new/embedding-finetuning), [vision](https://unsloth.ai/docs/basics/vision-fine-tuning) models on Windows, Linux and macOS.\n\n### Inference\n* **Search + download + run models** including GGUF, LoRA adapters, safetensors\n* **Export models**: [Save or export](https://unsloth.ai/docs/new/studio/export) models to GGUF, 16-bit safetensors and other formats.\n* **Tool calling**: Support for [self-healing tool calling](https://unsloth.ai/docs/new/studio/chat#auto-healing-tool-calling) and web search\n* **[Code execution](https://unsloth.ai/docs/new/studio/chat#code-execution)**: lets LLMs test code in Claude artifacts and sandbox environments\n* **[API inference endpoint](https://unsloth.ai/docs/basics/api)**: Deploy and run local LLMs in Claude Code, Codex tools with Unsloth\n* [Auto set inference settings](https://unsloth.ai/docs/new/studio/chat#auto-parameter-tuning) and customize chat templates.\n* We work directly with teams behind [gpt-oss](https://docs.unsloth.ai/new/gpt-oss-how-to-run-and-fine-tune#unsloth-fixes-for-gpt-oss), [Qwen3](https://www.reddit.com/r/LocalLLaMA/comments/1kaodxu/qwen3_unsloth_dynamic_ggufs_128k_context_bug_fixes/), [Llama 4](https://github.com/ggml-org/llama.cpp/pull/12889), [Mistral](https://huggingface.co/mistralai/Mistral-Medium-3.5-128B/discussions/18), [Gemma 1-3](https://news.ycombinator.com/item?id=39671146), and [Phi-4](https://unsloth.ai/blog/phi4), where we’ve fixed bugs that improve model accuracy.\n* Chat with images, audio, PDFs, code, DOCX and more. [Connect API providers](https://unsloth.ai/docs/integrations/connections) (OpenAI, Anthropic) or servers (vLLM, Ollama).\n### Training\n* Train and RL **500+ models** up to **2x faster** with up to **70% less VRAM**, with no accuracy loss.\n* Custom Triton and mathematical **kernels**. See some collabs we did with [PyTorch](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) and [Hugging Face](https://unsloth.ai/docs/new/faster-moe).\n* **Data Recipes**: [Auto-create datasets](https://unsloth.ai/docs/new/studio/data-recipe) from **PDF, CSV, DOCX** etc. Edit data in a visual-node workflow.\n* **[Reinforcement Learning](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide)** (RL): The most efficient [RL](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide) library, using **80% less VRAM** for GRPO, [FP8](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) etc.\n* Supports full fine-tuning, RL, pretraining, 4-bit, 16-bit and, FP8 training.\n* **Observability**: Monitor training live, track loss and GPU usage and customize graphs.\n* [Multi-GPU](https://unsloth.ai/docs/basics/multi-gpu-training-with-unsloth) training is supported, with major improvements coming soon.\n\n## 📥 Install\nUnsloth can be used in two ways: through **[Unsloth Studio](https://unsloth.ai/docs/new/studio/)**, the web UI, or through **Unsloth Core**, the code-based version. Each has different requirements.\n\n### Unsloth Studio (web UI)\nUnsloth Studio (Beta) works on **Windows, Linux, WSL** and **macOS**.\n\n* **CPU:** Supported for Chat and Data Recipes currently\n* **NVIDIA:** Training works on RTX 30/40/50, Blackwell, DGX Spark, Station and more\n* **macOS:** Training, MLX and GGUF inference are ALL supported.\n* **AMD:** Chat + Data works. Train with [Unsloth Core](#unsloth-core-code-based). Studio support is out soon.\n* **Multi-GPU:** Available now, with a major upgrade on the way\n\n#### macOS, Linux, WSL:\n```bash\ncurl -fsSL https://unsloth.ai/install.sh | sh\n```\nUse the same command to update.\n\n#### Windows:\n```powershell\nirm https://unsloth.ai/install.ps1 | iex\n```\nUse the same command to update.\n\n#### Launch\n```bash\nunsloth studio -p 8888\n```\nFor cloud or global access, add `-H 0.0.0.0`. By default, Unsloth is accessible only locally.\n\n#### Docker\nUse our [Docker image](https://hub.docker.com/r/unsloth/unsloth) ```unsloth/unsloth``` container. Run:\n```bash\ndocker run -d -e JUPYTER_PASSWORD=\"mypassword\" \\\n  -p 8888:8888 -p 8000:8000 -p 2222:22 \\\n  -v $(pwd)/work:/workspace/work \\\n  --gpus all \\\n  unsloth/unsloth\n  ```\n\n#### Developer, Nightly, Uninstall\nTo see developer, nightly and uninstallation etc. instructions, see [advanced installation](#-advanced-installation).\n\n### Unsloth Core (code-based)\n#### Linux, WSL:\n```bash\ncurl -LsSf https://astral.sh/uv/install.sh | sh\nuv venv unsloth_env --python 3.13\nsource unsloth_env/bin/activate\nuv pip install unsloth --torch-backend=auto\n```\n#### Windows:\n```powershell\nwinget install -e --id Python.Python.3.13\nwinget install --id=astral-sh.uv  -e\nuv venv unsloth_env --python 3.13\n.\\unsloth_env\\Scripts\\activate\nuv pip install unsloth --torch-backend=auto\n```\nFor Windows, `pip install unsloth` works only if you have PyTorch installed. Read our [Windows Guide](https://unsloth.ai/docs/get-started/install/windows-installation).\nYou can use the same Docker image as Unsloth Studio.\n\n#### AMD, Intel:\nFor RTX 50x, B200, 6000 GPUs: `uv pip install unsloth --torch-backend=auto`. Read our guides for: [Blackwell](https://unsloth.ai/docs/blog/fine-tuning-llms-with-blackwell-rtx-50-series-and-unsloth) and [DGX Spark](https://unsloth.ai/docs/blog/fine-tuning-llms-with-nvidia-dgx-spark-and-unsloth). <br>\nTo install Unsloth on **AMD** and **Intel** GPUs, follow our [AMD Guide](https://unsloth.ai/docs/get-started/install/amd) and [Intel Guide](https://unsloth.ai/docs/get-started/install/intel).\n\n## 📒 Free Notebooks\n\nTrain for free with our notebooks. You can use our new [free Unsloth Studio notebook](https://colab.research.google.com/github/unslothai/unsloth/blob/main/studio/Unsloth_Studio_Colab.ipynb) to run and train models for free in a web UI.\nRead our [guide](https://unsloth.ai/docs/get-started/fine-tuning-llms-guide). Add dataset, run, then deploy your trained model.\n\n| Model | Free Notebooks | Performance | Memory use |\n|-----------|---------|--------|----------|\n| **Gemma 4 (E2B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Gemma4_(E2B)-Vision.ipynb)               | 1.5x faster | 50% less |\n| **Qwen3.5 (4B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_5_(4B)_Vision.ipynb)               | 1.5x faster | 60% less |\n| **gpt-oss (20B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/gpt-oss-(20B)-Fine-tuning.ipynb)               | 2x faster | 70% less |\n| **Qwen3.5 GSPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_5_(4B)_Vision_GRPO.ipynb)               | 2x faster | 70% less |\n| **gpt-oss (20B): GRPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/gpt-oss-(20B)-GRPO.ipynb)               | 2x faster | 80% less |\n| **Qwen3: Advanced GRPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_(4B)-GRPO.ipynb)               | 2x faster | 70% less |\n| **embeddinggemma (300M)**    | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/EmbeddingGemma_(300M).ipynb)               | 2x faster | 20% less |\n| **Mistral Ministral 3 (3B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Ministral_3_VL_(3B)_Vision.ipynb)               | 1.5x faster | 60% less |\n| **Llama 3.1 (8B) Alpaca**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Llama3.1_(8B)-Alpaca.ipynb)               | 2x faster | 70% less |\n| **Llama 3.2 Conversational**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Llama3.2_(1B_and_3B)-Conversational.ipynb)               | 2x faster | 70% less |\n| **Orpheus-TTS (3B)**     | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Orpheus_(3B)-TTS.ipynb)               | 1.5x faster | 50% less |\n\n- See all our notebooks for: [Kaggle](https://github.com/unslothai/notebooks?tab=readme-ov-file#-kaggle-notebooks), [GRPO](https://unsloth.ai/docs/get-started/unsloth-notebooks#grpo-reasoning-rl-notebooks), [TTS](https://unsloth.ai/docs/get-started/unsloth-notebooks#text-to-speech-tts-notebooks), [embedding](https://unsloth.ai/docs/new/embedding-finetuning) & [Vision](https://unsloth.ai/docs/get-started/unsloth-notebooks#vision-multimodal-notebooks)\n- See [all our models](https://unsloth.ai/docs/get-started/unsloth-model-catalog) and [all our notebooks](https://unsloth.ai/docs/get-started/unsloth-notebooks)\n- See detailed documentation for Unsloth [here](https://unsloth.ai/docs)\n\n## 🦥 Unsloth News\n- **Connections**: Connect any API provider (OpenAI, Anthropic) or server (vLLM, Ollama). [Guide](https://unsloth.ai/docs/integrations/connections)\n- **MTP**: Run Qwen3.6 MTP in Unsloth. MTP settings are autoset specific to your hardware. [Guide](https://unsloth.ai/docs/models/qwen3.6#mtp-guide)\n- **API inference endpoint**: Deploy and run local LLMs in Claude Code, Codex tools. [Guide](https://unsloth.ai/docs/basics/api)\n- **Qwen3.6**: Qwen3.6-35B-A3B can now be trained and run in Unsloth Studio. [Blog](https://unsloth.ai/docs/models/qwen3.6)\n- **Gemma 4**: Run and train Google’s new models directly in Unsloth. [Blog](https://unsloth.ai/docs/models/gemma-4)\n- **Introducing Unsloth Studio**: our new web UI for running and training LLMs. [Blog](https://unsloth.ai/docs/new/studio)\n- **Qwen3.5** - 0.8B, 2B, 4B, 9B, 27B, 35-A3B, 112B-A10B are now supported. [Guide + notebooks](https://unsloth.ai/docs/models/qwen3.5/fine-tune)\n- Train **MoE LLMs 12x faster** with 35% less VRAM - DeepSeek, GLM, Qwen and gpt-oss. [Blog](https://unsloth.ai/docs/new/faster-moe)\n- **Embedding models**: Unsloth now supports ~1.8-3.3x faster embedding fine-tuning. [Blog](https://unsloth.ai/docs/new/embedding-finetuning) • [Notebooks](https://unsloth.ai/docs/get-started/unsloth-notebooks#embedding-models)\n- New **7x longer context RL** vs. all other setups, via our new batching algorithms. [Blog](https://unsloth.ai/docs/new/grpo-long-context)\n- New RoPE & MLP **Triton Kernels** & **Padding Free + Packing**: 3x faster training & 30% less VRAM. [Blog](https://unsloth.ai/docs/new/3x-faster-training-packing)\n- **500K Context**: Training a 20B model with >500K context is now possible on an 80GB GPU. [Blog](https://unsloth.ai/docs/blog/500k-context-length-fine-tuning)\n- **FP8 & Vision RL**: You can now do FP8 & VLM GRPO on consumer GPUs. [FP8 Blog](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) • [Vision RL](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/vision-reinforcement-learning-vlm-rl)\n\n## 📥 Advanced Installation\nThe below advanced instructions are for Unsloth Studio. For Unsloth Core advanced installation, [view our docs](https://unsloth.ai/docs/get-started/install/pip-install#advanced-pip-installation).\n#### Developer installs: macOS, Linux, WSL:\n```bash\ngit clone https://github.com/unslothai/unsloth\ncd unsloth\n./install.sh --local\nunsloth studio -p 8888\n```\nThen to update :\n```bash\ncd unsloth && git pull\n./install.sh --local\nunsloth studio -p 8888\n```\n\n#### Developer installs: Windows PowerShell:\n```powershell\ngit clone https://github.com/unslothai/unsloth.git\ncd unsloth\nSet-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass\n.\\install.ps1 --local\nunsloth studio -p 8888\n```\nThen to update :\n```bash\ncd unsloth && git pull\n./install.sh --local\nunsloth studio -p 8888\n```\n\n#### Nightly: MacOS, Linux, WSL:\n```bash\ngit clone https://github.com/unslothai/unsloth\ncd unsloth\ngit checkout nightly\n./install.sh --local\nunsloth studio -p 8888\n```\nThen to launch every time:\n```bash\nunsloth studio -p 8888\n```\n\n#### Nightly: Windows:\nRun in Windows Powershell:\n```powershell\ngit clone https://github.com/unslothai/unsloth.git\ncd unsloth\ngit checkout nightly\nSet-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass\n.\\install.ps1 --local\nunsloth studio -p 8888\n```\nThen to launch every time:\n```bash\nunsloth studio -p 8888\n```\n\n#### Advanced launch options\nCap Studio's native CPU thread pools on high-core hosts: `UNSLOTH_CPU_THREADS=8 unsloth studio -p 8888`. Explicit `OMP_NUM_THREADS` / `MKL_NUM_THREADS` / `OPENBLAS_NUM_THREADS` / `NUMEXPR_NUM_THREADS` still take precedence.\n\n#### Uninstall\nThe recommended way to fully remove Unsloth Studio is the matching uninstall script for your OS. It stops any running servers, removes the install dir, the launcher data dir, the desktop shortcut, and any platform-specific entries (macOS `.app` bundle + Launch Services on Mac; Start Menu, `HKCU\\Software\\Unsloth` registry key and user `PATH` entries on Windows):\n\n* ​ **MacOS, WSL, Linux:** `curl -fsSL https://raw.githubusercontent.com/unslothai/unsloth/main/scripts/uninstall.sh | sh`\n* ​ **Windows (PowerShell):** `irm https://raw.githubusercontent.com/unslothai/unsloth/main/scripts/uninstall.ps1 | iex`\n\nIf you only want to drop the install dir and keep the launcher/shortcut for a later reinstall, you can instead run `rm -rf ~/.unsloth/studio` (Mac/Linux/WSL) or `Remove-Item -Recurse -Force \"$HOME\\.unsloth\\studio\"` (Windows). The model cache at `~/.cache/huggingface` is not touched by any of these.\n\nFor more info, [see our docs](https://unsloth.ai/docs/new/studio/install#uninstall).\n\n#### Deleting model files\n\nYou can delete old model files either from the bin icon in model search or by removing the relevant cached model folder from the default Hugging Face cache directory. By default, HF uses:\n\n* ​ **MacOS, Linux, WSL:** `~/.cache/huggingface/hub/`\n* ​ **Windows:** `%USERPROFILE%\\.cache\\huggingface\\hub\\`\n\n## 💚 Community and Links\n| Type                                                                                                                                      | Links                                                                          |\n| ----------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------ |\n| <img width=\"16\" src=\"https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e3d80db9971f10a9757c99_Symbol.svg\" />  **Discord**                       | [Join Discord server](https://discord.com/invite/unsloth)                          |\n| <img width=\"15\" src=\"https://redditinc.com/hs-fs/hubfs/Reddit%20Inc/Brand/Reddit_Logo.png\" />  **r/unsloth Reddit**                       | [Join Reddit community](https://reddit.com/r/unsloth)                          |\n| 📚 **Documentation & Wiki**                                                                                                               | [Read Our Docs](https://unsloth.ai/docs)                                       |\n| <img width=\"13\" src=\"https://upload.wikimedia.org/wikipedia/commons/0/09/X_(formerly_Twitter)_logo_late_2025.svg\" />  **Twitter (aka X)** | [Follow us on X](https://twitter.com/unslothai)                                |\n| 🔮 **Our Models**                                                                                                                         | [Unsloth Catalog](https://unsloth.ai/docs/get-started/unsloth-model-catalog)   |\n| ✍️ **Blog**                                                                                                                               | [Read our Blogs](https://unsloth.ai/blog)                                      |\n\n### Citation\n\nYou can cite the Unsloth repo as follows:\n```bibtex\n@software{unsloth,\n  author = {Daniel Han, Michael Han and Unsloth team},\n  title = {Unsloth},\n  url = {https://github.com/unslothai/unsloth},\n  year = {2023}\n}\n```\nIf you trained a model with 🦥Unsloth, you can use this cool sticker!   <img src=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/made with unsloth.png\" width=\"200\" align=\"center\" />\n\n### License\nUnsloth uses a dual-licensing model of Apache 2.0 and AGPL-3.0. The core Unsloth package remains licensed under **[Apache 2.0](https://github.com/unslothai/unsloth?tab=Apache-2.0-1-ov-file)**, while certain optional components, such as the Unsloth Studio UI are licensed under the open-source license **[AGPL-3.0](https://github.com/unslothai/unsloth?tab=AGPL-3.0-2-ov-file)**.\n\nThis structure helps support ongoing Unsloth development while keeping the project open source and enabling the broader ecosystem to continue growing.\n\n### Thank You to\n- The [llama.cpp library](https://github.com/ggml-org/llama.cpp) that lets users run and save models with Unsloth\n- The Hugging Face team and their libraries: [transformers](https://github.com/huggingface/transformers) and [TRL](https://github.com/huggingface/trl)\n- The Pytorch and [Torch AO](https://github.com/unslothai/unsloth/pull/3391) team for their contributions\n- NVIDIA for their [NeMo DataDesigner](https://github.com/NVIDIA-NeMo/DataDesigner) library and their contributions\n- And of course for every single person who has contributed or has used Unsloth!\n","summary":"Unsloth is a powerful platform that enables users to run and fine-tune a wide variety of text, audio, vision, and embedding models locally on macOS, Linux, and Windows. By utilizing custom Triton kernels, the project delivers highly efficient training and inference performance, requiring up to 70% less VRAM and achieving speeds up to twice as fast as standard methods without compromising accuracy. It offers a comprehensive suite of features, including visual dataset creation, self-healing tool calling, and advanced reinforcement learning support. This tool is an ideal solution for developers, researchers, and data scientists looking to streamline the lifecycle of local LLMs through a user-friendly, high-performance interface.","description":"Unsloth Studio is a web UI for training and running open models like Gemma 4, Qwen3.6, DeepSeek, gpt-oss locally.","stars":65608,"language":"Python"},{"owner":"upstash","repo":"degree-guru","url":"https://github.com/upstash/degree-guru","readme":"# DegreeGuru\n\n## Build a RAG Chatbot using Vercel AI SDK, Langchain, Upstash Vector and OpenAI\n\n[![Deploy with Vercel](https://vercel.com/button)](https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2Fupstash%2Fdegreeguru&env=UPSTASH_REDIS_REST_URL,UPSTASH_REDIS_REST_TOKEN,UPSTASH_VECTOR_REST_URL,UPSTASH_VECTOR_REST_TOKEN,OPENAI_API_KEY&demo-title=DegreeGuru%20Demo&demo-description=A%20Demo%20Showcasing%20the%20DegreeGuru%20App&demo-url=https%3A%2F%2Fdegreeguru.vercel.app%2F&demo-image=https%3A%2F%2Fupstash.com%2Ficons%2Ffavicon-32x32.png)\n\n![overview](figs/overview.gif)\n\n> [!NOTE]  \n> **This project is a Community Project.**\n>\n> The project is maintained and supported by the community. Upstash may contribute but does not officially support or assume responsibility for it.\n\n**DegreeGuru** is a project designed to teach you making your own AI RAG chatbot on any custom data. Some of our favorite features:\n\n- 🕷️ Built-in crawler that scrapes the website you point it to, automatically making this data available for the AI\n- ⚡ Fast answers using Upstash Vector and real-time data streaming\n- 🛡️ Includes rate limiting to prevent API abuse\n\nThis chatbot is trained on data from Stanford University as an example, but is totally domain agnostic. We've created this project so you can turn it into a chatbot with your very own data by simply modifying the `crawler.yaml` file.  \n\n## Overview\n\n1. [Stack](#stack)\n2. [Quickstart](#quickstart)\n   1. [Crawler](#crawler)\n   2. [ChatBot](#chatbot)\n3. [Conclusion](#conclusion)\n4. [Shortcomings](#shortcomings)\n\n## Stack\n\n- Crawler: [scrapy](https://scrapy.org/)\n- Chatbot App: [Next.js](https://nextjs.org/)\n- Vector DB: [Upstash](https://upstash.com/)\n- LLM Orchestration: [Langchain.js](https://js.langchain.com)\n- Generative Model: [OpenAI](https://openai.com/), [gpt-3.5-turbo-1106](https://platform.openai.com/docs/models)\n- Embedding Model: [OpenAI](https://openai.com/), [text-embedding-ada-002](https://platform.openai.com/docs/guides/embeddings)\n- Text Streaming: [Vercel AI](https://vercel.com/ai)\n- Rate Limiting: [Upstash](https://upstash.com/)\n\n## Quickstart\n\nFor local development, we recommend forking this project and cloning the forked repository to your local machine by running the following command:\n\n```\ngit clone git@github.com:[YOUR_GITHUB_ACCOUNT]/DegreeGuru.git\n```\n\nThis project contains two primary components: the crawler and the chatbot. First, we'll take a look at how the crawler extracts information from any website you point it to. This data is automatically stored in an Upstash Vector database. If you already have a vector database available, the crawling stage can be skipped.\n\n### Step 1: Crawler\n\n![crawler-diagram](figs/how-this-project-works.png)\n\nThe crawler is developed using Python, by [initializing a Scrapy project](https://docs.scrapy.org/en/latest/intro/tutorial.html#creating-a-project) and implementing a [custom spider](https://github.com/upstash/degreeguru/blob/master/degreegurucrawler/degreegurucrawler/spiders/configurable.py). The spider is equipped with [the `parse_page` function](https://github.com/upstash/degreeguru/blob/master/degreegurucrawler/degreegurucrawler/spiders/configurable.py#L42), invoked each time the spider visits a webpage. This callback function splits the text on the webpage into chunks, generates vector embeddings for each chunk, and upserts those vectors into your Upstash Vector Database. Each vector stored in our database includes the original text and website URL as metadata.\n\n</br>\n\nTo run the crawler, follow these steps:\n\n> [!TIP]\n> If you have docker installed, you can skip the \"Configure Environment Variables\" and \"Install Required Python Libraries\" sections. Instead you can simply update the environment variables in [docker-compose.yml](https://github.com/upstash/DegreeGuru/blob/master/degreegurucrawler/docker-compose.yml) and run `docker-compose up`. This will create a container running our crawler. Don't forget to configure the crawler as explained in the following sections!\n\n<details>\n\n<summary>Configure Environment Variables</summary>\nBefore we can run our crawler, we need to configure environment variables. They let us securely store sensitive information, such as the API keys we need to communicate with OpenAI or Upstash Vector.\n\nIf you don't already have an Upstash Vector Database, create one [here](https://console.upstash.com/vector) and set 1536 as the vector dimensions. We set 1536 here because that is the amount needed by the embedding model we will use. \n\n![vector-db-create](figs/vector-db-create.png)\n\nThe following environment variables should be set:\n\n```\n# Upstash Vector credentials retrieved here: https://console.upstash.com/vector\nUPSTASH_VECTOR_REST_URL=****\nUPSTASH_VECTOR_REST_TOKEN=****\n\n# OpenAI key retrieved here: https://platform.openai.com/api-keys\nOPENAI_API_KEY=****\n```\n\n</details>\n\n<details>\n<summary>Install Required Python Libraries</summary>\n\nTo install the libraries, we suggest setting up a virtual Python environment. Before starting the installation, navigate to the `degreegurucrawler` directory.\n\nTo setup a virtual environment, first install `virtualenv` package:\n\n```bash\npip install virtualenv\n```\n\nThen, create a new virtual environment and activate it:\n\n```bash\n# create environment\npython3 -m venv venv\n\n# activate environment\nsource venv/bin/activate\n```\n\nFinally, use [the `requirements.txt`](https://github.com/upstash/degreeguru/blob/master/degreegurucrawler/requirements.txt) to install the required libraries:\n\n```bash\npip install -r requirements.txt\n```\n\n</details>\n\n\n\n</br>\n\nAfter setting these environment variables, we are almost ready to run the crawler. The subsequent step involves configuring the crawler itself, primarily accomplished through the `crawler.yaml` file located in the `degreegurucrawler/utils` directory. Additionally, it is imperative to address a crucial setting within the `settings.py` file.\n\n<details>\n<summary>Configuring the crawler in `crawler.yaml`</summary>\n\nThe crawler.yaml has two main sections: `crawler` and `index`:\n\n```yaml\ncrawler:\n  start_urls:\n    - https://www.some.domain.com\n  link_extractor:\n    allow: '.*some\\.domain.*'\n    deny:\n      - \"#\"\n      - '\\?'\n      - about\nindex:\n  openAI_embedding_model: text-embedding-ada-002\n  text_splitter:\n    chunk_size: 1000\n    chunk_overlap: 100\n```\n\nIn the `crawler` section, there are two subsections:\n\n- `start_urls`: the entrypoints our crawler will start searching from\n- `link_extractor`: a dictionary passed as arguments to [`scrapy.linkextractors.LinkExtractor`](https://docs.scrapy.org/en/latest/topics/link-extractors.html). Some important parameters are:\n  - `allow`: Only extracts links matching the given regex(s)\n  - `allow_domains`: Only extract links matching the given domain(s)\n  - `deny`: Deny links matching the given regex(s)\n\nIn the `index` section, there are two subsections:\n\n- `openAI_embedding_model`: The embedding model to use\n- `test_splitter`: a dictionary passed as arguments to [`langchain.text_splitter.RecursiveCharacterTextSplitter`](https://api.python.langchain.com/en/latest/text_splitter/langchain.text_splitter.RecursiveCharacterTextSplitter.html)\n\n</details>\n\n<details>\n<summary>Configuring crawl depth via `settings.py`</summary>\n\n`settings.py` file has an important setting called `DEPTH_LIMIT` which determines how many consecutive links our spider can crawl. A high value lets our crawler visit the deepest corners of a website, taking longer to finish with possibly diminishing returns. A low value could end the crawl before extracting relevant information.\n\nIf pages are skipped due to the `DEPTH_LIMIT`, Scrapy logs those skipped URLs for us. Because this usually causes a lot of logs, we've disabled this option in our project. If you'd like to keep it enabled, remove  [the `\"scrapy.spidermiddlewares.depth\"` from the `disable_loggers` in `degreegurucrawler/spider/configurable.py` file](https://github.com/upstash/degreeguru/blob/master/degreegurucrawler/degreegurucrawler/spiders/configurable.py#L22).\n\n</details>\n\n</br>\n\nThat's it! 🎉 We've configured our crawler and are ready to run it using the following command:\n\n```\nscrapy crawl configurable --logfile degreegurucrawl.log\n```\n\nNote that running this might take time. You can monitor the progress by looking at the log file `degreegurucrawl.log` or the metrics of your Upstash Vector Database dashboard as shown below.\n\n![vector-db](figs/vector-db.png)\n\n> [!TIP]\n> If you want to do a dry run (without creating embeddings or a vector database), simply comment out [the line where we pass the `callback` parameter to the `Rule` object in `ConfigurableSpider`](https://github.com/upstash/degreeguru/blob/master/degreegurucrawler/degreegurucrawler/spiders/configurable.py#L38)\n\n### Step 2: Chatbot\n\nIn this section, we'll explore how to chat with the data we've just crawled and stored in our vector database. Here's an overview of what this will look like architecturally:\n\n![chatbot-diagram](figs/infrastructure.png)\n\nBefore we can run the chatbot locally, we need to set the environment variables as shown in the [`.env.local.example`](https://github.com/upstash/degreeguru/blob/master/.env.local.example) file. Rename this file and remove the `.example` ending, leaving us with `.env.local`. \n\nYour `.env.local` file should look like this:\n```\n# Redis tokens retrieved here: https://console.upstash.com/\nUPSTASH_REDIS_REST_URL=\nUPSTASH_REDIS_REST_TOKEN=\n\n# Vector database tokens retrieved here: https://console.upstash.com/vector\nUPSTASH_VECTOR_REST_URL=\nUPSTASH_VECTOR_REST_TOKEN=\n\n# OpenAI key retrieved here: https://platform.openai.com/api-keys\nOPENAI_API_KEY=\n```\n\nThe first four variables are provided by Upstash, you can visit the commented links for the place to retrieve these tokens. You can find the vector database tokens here:\n\n![vector-db-read-only](figs/vector-db-read-only.png)\n\nThe `UPSTASH_REDIS_REST_URL` and `UPSTASH_REDIS_REST_TOKEN` are needed for rate-limiting based on IP address. In order to get these secrets, go to Upstash dashboard and create a Redis database.\n\n![redis-create](figs/redis-create.png)\n\nFinally, set the `OPENAI_API_KEY` environment variable you can get [here](https://platform.openai.com/api-keys) which allows us to vectorize user queries and generate responses.\n\nThat's the setup done! 🎉 We've configured our crawler, set up all neccessary environment variables are after running `npm install` to install all local packages needed to run the app, we can start our chatbot using the command:\n\n```bash\nnpm run dev\n```\n\nVisit `http://localhost:3000` to see your chatbot live in action!\n\n### Step 3: Optional tweaking\n\nYou can use this chatbot in two different modes:\n\n- Streaming Mode: model responses are streamed to the web application in real-time as the model generates them. Interaction with the app is more fluid.\n- Non-Streaming Mode: Model responses are shown to the user once entirely generated. In this mode, DegreeGuru can explicitly provide the URLs of the web pages it uses as context.\n\n<details>\n<summary>Changing streaming mode</summary>\n\nTo turn streaming on/off, navigate to `src/app/route/guru` and open the `route.tsx` file. Setting [`returnIntermediateSteps`](https://github.com/upstash/degreeguru/blob/master/src/app/api/guru/route.tsx#L64) to `true` disables streaming, setting it to `false` enables streaming.\n\n</details>\n\nTo customize the chatbot further, you can update the [AGENT_SYSTEM_TEMPLATE in your route.tsx file](https://github.com/upstash/DegreeGuru/blob/master/src/app/api/guru/route.tsx#L101) to better match your specific use case.\n\n</br>\n\n## Conclusion\n\nCongratulations on setting up your own AI chatbot! We hope you learned a lot by following along and seeing how the different parts of this app, namely the crawler, vector database, and LLM, play together. A major focus in developing this project was on its user-friendly design and adaptable settings to make this project perfect for your use case.\n\n## Limitations\n\nThe above implementation works great for a variety of use cases. There are a few limitations I'd like to mention:\n\n- Because the Upstash LangChain integration is a work-in-progress, the [`UpstashVectorStore`](https://github.com/upstash/degreeguru/blob/master/src/app/vectorstore/UpstashVectorStore.js) used with LangChain currently only implements the `similaritySearchVectorWithScore` method needed for our agent. Once we're done developing our native LangChain integration, we'll update this project accordingly.\n- When the non-streaming mode is enabled, the message history can cause an error after the user enters another query.\n- Our sources are available as URLs in the Upstash Vector Database, but we cannot show the sources explicitly when streaming. Instead, we provide the links to the chatbot as context and expect the bot to include the links in the response.\n","summary":"DegreeGuru is an educational template designed to help developers build and deploy an AI-powered Retrieval-Augmented Generation (RAG) chatbot using custom data. The project features a built-in web crawler for automated data ingestion, fast vector search powered by Upstash, and integrated rate limiting to ensure application security. It serves as an ideal resource for developers looking to integrate Next.js, LangChain, and OpenAI to create domain-specific chatbots that provide real-time, context-aware answers.","description":"AI chatbot for expert answers on university degrees","stars":218,"language":"TypeScript"},{"owner":"FuseFairy","repo":"DiscordBot-EdgeGPT","url":"https://github.com/FuseFairy/DiscordBot-EdgeGPT","readme":"# DiscordBot-EdgeGPT\n\n  <a href=\"https://www.python.org/downloads/\">\n    <img alt=\"PyPI - Python Version\" src=\"https://img.shields.io/badge/pyversion-3.10%2B-blue?style=flat&label=python\">\n  </a>\n\n  [![Try with Replit Badge](https://replit.com/badge?caption=Try%20with%20Replit)](https://replit.com/@dd8611706/DiscordBot-EdgeGPT?v=1)\n\n> [!IMPORTANT]\n> Because Microsoft changed the cookie expiration time from one week to only 3 days and made it easier to trigger Captcha challenges, it is no longer convenient to use. Apart from generating images, if you simply want to chat with an AI, I recommend using [Gemini discord bot](https://github.com/FuseFairy/DiscordBot-GeminiAI), which is much more user-friendly.\n\n## Update\n> ### 2024/6/11：DALLE-3(Unofficial) has been fixed.\n> ### 2024/6/3：Known issues with DALLE-3(Unofficial).\n> ### 2024/4/21：Supporting the Suno plugin with Copilot.\n> ### 2024/3/30：Support DALLE-3(Unofficial), get api key from https://dalle.feiyuyu.net/dashboard.\n> ### 2024/3/5：Images can be generated while chatting.\n\n![demo](https://i.imgur.com/mvg18xh.gif)\n\n## Features\n\n<details>\n   <summary>\n   \n   ### Slash command\n\n   </summary>\n   \n> ### will create a separate chat for each user.\n   \n* cookies setting (set for using personal Bing Cookies): `/cookies setting [cookies_file]`\n  * Can upload own cookies (get from https://bing.com/).\n  ![setting](https://i.imgur.com/ZTLKkAJ.png)\n\n* Unofficial DALLE-3 api key setting (set for using personal unofficial DALLE-3 api key, can get from https://dalle.feiyuyu.net/dashboard): `/dalle3 setting`\n\n  ![dalle3_setting](https://i.imgur.com/cSVBFov.png)\n  \n* copilot: `/copilot [version] [style] [type]`\n  * A separate thread will be created, if use default version, can generate images while chatting.\n    * [version]：`default` can chat with Copilot, `jailbreak` chat with Sydney, but `jailbreak` image uploads are not currently supported.\n    * [style]：Have 3 conversation style can choose, `creative`、`balanced` and `precise`.\n    * [type]：Options for thread type, `public` or `private`.\n    * [plugin]：Currently only supports Suno.\n\n  ![chat](https://i.imgur.com/3Fx0iQE.png)\n  ![suno](https://i.imgur.com/G5FugDC.png)\n  \n* image creator: `/create image [service][prompt]`\n  \n  ![bingimage.png](https://i.imgur.com/pSCI1bg.png)\n  ![dalle3image.png](https://i.imgur.com/o13jaln.png)\n\n* reset conversation: `/reset conversation`\n\n  ![reset](https://i.imgur.com/7CyEFao.png)\n</details>\n\n<details>\n   <summary>\n   \n   ### Mention bot\n\n   </summary>\n\n> ### same function as the slash command, but this will reply all user messages.\n\n* If only the bot is mentioned, you will get a drop-down list of settings.\n\n  ![dropdown1](https://i.imgur.com/XDcnTuC.png)\n  ![dropdown2](https://i.imgur.com/azHIUqv.png)\n  ![mention1](https://i.imgur.com/BDy0See.png)\n  ![mention2](https://i.imgur.com/iJg4pSg.png)\n\n</details>\n\n<details>\n   <summary>\n   \n   ### Prefix command (available only to bot owner)\n\n   </summary>\n \n > ### bot owner setting.\n   \n * `!unload [file_name_in_cogs_folder]`: Disable command from the specified file.\n * `!load [file_name_in_cogs_folder]`: Enable the command from the specified file.\n \n   ![load & unload](https://i.imgur.com/spsyAEG.png)\n  \n * `!clean`: Empty discord_bot.log file.\n * `!getLog`: Get discord_bot.log file. Real-time tracking of the bot's operating status.\n   \n   ![getLog](https://i.imgur.com/LHX4yWV.png)\n \n * `!upload [.txt_file]`: Same as `/cookies setting`, but for default cookies.\n \n   ![upload](https://i.imgur.com/Qqz07WA.png)\n</details>\n\n## Install\n```\npip install -r requirements.txt\n```\n\n## Usage\n1. Rename the file`.env.dev`to`.env`, then open it and edit it.\n > [!WARNING]\n > AUTO_COOKIES features are still being tested, so it may not work for everyone, and if you want to use with BING_COOKIES, you need to set BING_COOKIES first to work properly.\n   ```env\n   DISCORD_BOT_TOKEN=\n    \n   # (Optional) If you are run with Replit, it is recommended to configure cookies using this parameter instead of using cookies.json\n   BING_COOKIES=\n    \n   # (Experimental) Automatically obtain Bing cookies and regular updates \n   AUTO_COOKIES=False # False/True\n    \n   # (Optional) proxy\n   PROXY= \n    \n   # Timeout for BingImageCreator\n   IMAGE_TIMEOUT=300\n   IMAGE_MAX_CREATE_SEC=300\n    \n   # Set unofficial DALLE-3 api key, api key can get from https://dalle.feiyuyu.net/dashboard\n   DALLE3_UNOFFICIAL_APIKEY=\n  \n   # (Optional) Allow mention bot only in specific channel.\n   MENTION_CHANNEL_ID=1227670969702754857\n    \n   # (Optional) Allow each commands in some channels.\n   # specific channel(s) for `/cookies setting`\n   COOKIES_SETTING_CHANNEL_ID=1227670969702754857,1227327094070254857\n    \n   # specific channel(s) for `/dalle3 setting`\n   DALLE3_SETTING_CHANNEL_ID=122767096970275483\n    \n   # specific channel(s) for `/copilot`\n   CHAT_CHANNEL_ID=\n    \n   # specific channel(s) for `/create image`\n   CREATE_IMAGE_CHANNEL_ID=\n    \n   # specific channel(s) for `/reset conversation`\n   RESET_CHAT_CHANNEL_ID=\n    \n   # specific channel(s) for `/help`\n   HELP_CMD_CHANNEL_ID=\n   ```\n   \n3. Create the `cookies.json` file. (If you have set BING_COOKIES or set AUTO_COOKIES to True in the `.env` file, skip this step!)\n   * Install the cookie editor extension for Chrome or Firefox.\n   * Go to [bing.com](https://www.bing.com/)\n   * Click \"Export\" on the buttom right.\n   * Paste your cookies into a file `cookies.json`\n\n4. Start run your bot.\n   ```python\n   python bot.py\n\n   ```\n\n## Credits\n* ReEdgeGPT - https://github.com/Integration-Automation/ReEdgeGPT\n\n* Sydney  - https://github.com/juzeon/SydneyQt/tree/v1\n\n* free-dall-e-proxy - https://github.com/Feiyuyu0503/free-dall-e-proxy\n\n## Contributors\n\nThis project exists thanks to all the people who contribute.\n\n[![](https://contrib.rocks/image?repo=FuseFairy/DiscordBot-EdgeGPT)](https://github.com/FuseFairy/DiscordBot-EdgeGPT/graphs/contributors)\n\n\n## Star History\n[![Star History Chart](https://api.star-history.com/svg?repos=FuseFairy/DiscordBot-EdgeGPT&type=Date)](https://star-history.com/#FuseFairy/DiscordBot-EdgeGPT&Date)\n","summary":"DiscordBot-EdgeGPT is a Python-based Discord bot that integrates Microsoft Copilot directly into server channels through slash and mention-based commands. It enables users to engage in AI-powered conversations, utilize different interaction styles, and generate images via DALL-E 3 or Copilot, including experimental support for plugins like Suno. This project is intended for Discord server owners who want to provide advanced AI interaction features to their community, though users should be aware of current maintenance challenges regarding Bing cookie authentication.","description":"Using Copilot, Bing Image Creator and DALLE-3 on Discord bot.","stars":161,"language":"Python"},{"owner":"intelligentnode","repo":"IntelliChat","url":"https://github.com/intelligentnode/IntelliChat","readme":"# IntelliChat\n\n<p>\n<a href=\"https://discord.gg/VYgCh2p3Ww\" alt=\"licenses tag\">\n    <img src=\"https://img.shields.io/badge/Discord-Community-light?style=flat-square\" />\n</a>\n\n</p>\n\n\nIntelliChat is an open-source AI chatbot built with [IntelliNode](https://github.com/intelligentnode/IntelliNode) and Next.js. It is designed to accelerate the integration of multiple language models into chatbot apps.\n\n\n\nhttps://github.com/intelligentnode/IntelliChat/assets/2751950/47d7db12-e299-449f-9351-39185c659d84\n\n\n\n## Features\n\n- Select your preferred AI Provider and model from the UI.\n  - **OpenAI ChatGPT**: o1, o3-mini, gpt-4o.\n  - **Google Gemini**.\n  - **Azure Openai**.\n  - **Cohere Coral**.\n  - **Replicate**: Llama (70b-chat, 13b-chat, 34b-code, 34b-python 13b-code-instruct).\n  - **Mistral AI**: Open-weight models.\n  - **Anthropic**: claude 3.5\n  - **vLLM**: any local model.\n- Manage your API keys via the UI.\n- Access your data using intellinode one key.\n\n\n## Installing and Running the App\n\n1. `cd intellichat`.\n2. Install the dependencies: `pnpm install` or `npm install` or `yarn install`.\n3. Start the Next.js server `pnpm dev` or `npm run dev` or `yarn dev`.\n\nOpen [http://localhost:3000](http://localhost:3000) with your browser to see the result.\n\n---\n\n<br>\n\n**Built with:** [Intellinode](https://github.com/intelligentnode/IntelliNode), [Next.js](https://nextjs.org/), [Shadcn](https://ui.shadcn.com/), and [TailwindCSS](https://tailwindcss.com/).\n","summary":"IntelliChat is an open-source AI chatbot platform built with Next.js and IntelliNode that streamlines the integration of multiple large language models into a single interface. It provides users with the ability to switch between various providers—including OpenAI, Google Gemini, Anthropic, and local models via vLLM—while managing API keys directly through a centralized UI. This tool is ideal for developers and AI enthusiasts who need a flexible, multi-model chat environment to experiment with and deploy diverse language AI solutions efficiently.","description":"Modern AI chatbot supporting multiple LLMs. Switch between Gemini, Mistral, Llama, Claude and ChatGPT.","stars":58,"language":"TypeScript"},{"owner":"scalar","repo":"scalar","url":"https://github.com/scalar/scalar","readme":"[![CI](https://github.com/scalar/scalar/actions/workflows/ci.yml/badge.svg)](https://github.com/scalar/scalar/actions/workflows/ci.yml)\n[![Contributors](https://img.shields.io/github/contributors/scalar/scalar)](https://github.com/scalar/scalar/graphs/contributors)\n[![GitHub License](https://img.shields.io/github/license/scalar/scalar)](https://github.com/scalar/scalar/blob/main/LICENSE)\n[![Twitter](https://img.shields.io/twitter/follow/scalar)](https://x.com/scalar)\n[![Discord](https://img.shields.io/discord/1135330207960678410?style=flat&color=5865F2)](https://discord.gg/scalar)\n\n<h1>\n\t<p>Scalar</p>\n\t<p>\n\t\t<a href=\"https://docs.scalar.com/swagger-editor\" target=\"_blank\">\n\t\t\t<picture>\n\t\t\t\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/user-attachments/assets/9b639f2d-0204-4b15-b918-158072a9afa5\">\n\t\t\t\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/be723d07-ec9c-4edb-b657-05a8bc05c7d6\">\n\t\t\t\t<img width=\"48.494%\" height=\"250\" src=\"https://github.com/user-attachments/assets/9b639f2d-0204-4b15-b918-158072a9afa5#gh-light-mode-only\" alt=\"Scalar API Reference\">\n\t\t\t</picture>\n\t \t</a>\n\t\t<a href=\"https://scalar.com/download\" target=\"_blank\">\n\t\t\t<picture>\n\t\t\t\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/user-attachments/assets/b391b82f-d993-4e97-8a17-1c3c7ccbb19b\">\n\t\t\t\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/579d0853-b2a5-4ea8-b2bd-a98753faeaf3\">\n\t\t\t\t<img width=\"48.494%\" height=\"250\" src=\"https://github.com/user-attachments/assets/b391b82f-d993-4e97-8a17-1c3c7ccbb19b#gh-light-mode-only\" alt=\"Scalar API client\">\n\t\t\t</picture>\n\t\t</a>\n\t</p>\n</h1>\n\n<p>\n\t<img width=\"830\" height=\"auto\" src=\"https://github.com/user-attachments/assets/3a24fc5c-5d3c-4be4-8b9e-399bd49e4fb7#gh-light-mode-only\">\n\t<img width=\"830\" height=\"auto\" src=\"https://github.com/user-attachments/assets/76f123ae-f458-409f-84d3-b9ad14fd3fb2#gh-dark-mode-only\">\n</p>\n\n### Interactive API Reference from OpenAPI/Swagger\n\n└ Renders OpenAPI/Swagger documents<br>\n└ Comes with an API testing tool<br>\n└ Doesn't look like 2011<br>\n└ Generates code examples for many languages & frameworks<br>\n└ Integrates with your favorite framework<br>\n└ <a href=\"https://docs.scalar.com/swagger-editor\">Try Demo</a>\n\n<!-- minimal line break-->\n<p>\n\t<img width=\"1200\" height=\"1\" src=\"https://github.com/user-attachments/assets/7d7e7ba7-2b02-49f3-abcd-b24c566a3c16#gh-light-mode-only\">\n\t<img width=\"1200\" height=\"1\" src=\"https://github.com/user-attachments/assets/341bfb1d-5cb0-4ec6-89eb-4b1dcc07eeb7#gh-dark-mode-only\">\n</p>\n<!-- end minimal line break-->\n\n<p>\n\t<img width=\"830\" height=\"auto\" src=\"https://github.com/user-attachments/assets/d9f90c51-82d4-4948-9365-658ccc7d78c4#gh-light-mode-only\">\n\t<img width=\"830\" height=\"auto\" src=\"https://github.com/user-attachments/assets/e7c2023e-dfbc-428c-bc85-c06d8a6e4b67#gh-dark-mode-only\">\n</p>\n\n### An offline-first API Client built for OpenAPI\n\n└ Free and open-source<br>\n└ First-class OpenAPI/Swagger support<br>\n└ Integrates with dozens of API Frameworks (Elysia, Hono, FastAPI, etc)<br>\n└ Syncs with your favorite server framework (Watch Mode)<br>\n└ Has environment variables, dynamic parameters and everything<br>\n└ <a href=\"https://client.scalar.com/\">Try It in the Browser</a>\n└ <a href=\"https://scalar.com/download\">Download (Windows, MacOS, Linux)</a><br>\n\n<!-- minimal line break-->\n<p>\n\t<img width=\"1200\" height=\"1\" src=\"https://github.com/user-attachments/assets/7d7e7ba7-2b02-49f3-abcd-b24c566a3c16#gh-light-mode-only\">\n\t<img width=\"1200\" height=\"1\" src=\"https://github.com/user-attachments/assets/341bfb1d-5cb0-4ec6-89eb-4b1dcc07eeb7#gh-dark-mode-only\">\n</p>\n<!-- end minimal line break-->\n\n### Trusted by:\n\n<br>\n\n<p>\n\t<picture>\n\t\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/user-attachments/assets/73dcef95-fc4f-4111-bb09-f3ce37453a81#gh-light-mode-only\">\n\t\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/c792c977-8551-432c-9417-3ea05e408151#gh-dark-mode-only\">\n\t\t<img width=\"48.494%\" height=\"330\" src=\"https://github.com/user-attachments/assets/73dcef95-fc4f-4111-bb09-f3ce37453a81#gh-light-mode-only\" alt=\"Scalar API client\">\n\t</picture>\n\t<picture>\n\t\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/user-attachments/assets/1da6b904-34be-4760-b535-0dd2160e6d12#gh-light-mode-only\">\n\t\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/54a9ea69-c50a-4f49-8c3e-ddd6f8fbe1f3#gh-dark-mode-only\">\n\t\t<img width=\"48.494%\" height=\"330\" src=\"https://github.com/user-attachments/assets/1da6b904-34be-4760-b535-0dd2160e6d12#gh-light-mode-only\" alt=\"Scalar API client\">\n\t</picture>\n</p>\n\n### Quickstart\n\nAll you need is a single HTML file to create an amazing API reference:\n\n```html\n<!doctype html>\n<html>\n  <head>\n    <title>Scalar API Reference</title>\n    <meta charset=\"utf-8\" />\n    <meta\n      name=\"viewport\"\n      content=\"width=device-width, initial-scale=1\" />\n  </head>\n\n  <body>\n    <div id=\"app\"></div>\n\n    <!-- Load the Script -->\n    <script src=\"https://cdn.jsdelivr.net/npm/@scalar/api-reference\"><\/script>\n\n    <!-- Initialize the Scalar API Reference -->\n    <script>\n      Scalar.createApiReference('#app', {\n        // The URL of the OpenAPI/Swagger document\n        url: 'https://registry.scalar.com/@scalar/apis/galaxy?format=json',\n        // Avoid CORS issues\n        proxyUrl: 'https://proxy.scalar.com',\n      })\n    <\/script>\n  </body>\n</html>\n```\n\n> Need a Custom Header? Check out this example: https://codepen.io/scalarorg/pen/VwOXqam\n\nAnd there's an ever-growing list of plugins and integrations:\n\n### Integrations\n\n- [HTML/JS API](https://scalar.com/products/api-references/integrations/html-js) (works everywhere)\n- [.NET ASP.NET Core](https://scalar.com/products/api-references/integrations/aspnetcore/integration)\n- [Aspire](https://scalar.com/products/api-references/integrations/aspire)\n- [AdonisJS](https://scalar.com/products/api-references/integrations/adonisjs)\n- [Astro](https://scalar.com/products/api-references/integrations/astro)\n- [Django Ninja](https://scalar.com/products/api-references/integrations/django-ninja)\n- [Django](https://scalar.com/products/api-references/integrations/django)\n- [Docker](https://scalar.com/products/api-references/integrations/docker)\n- [Docusaurus](https://scalar.com/products/api-references/integrations/docusaurus)\n- [Elixir](https://scalar.com/products/api-references/integrations/elixir)\n- [Express](https://scalar.com/products/api-references/integrations/express)\n- [FastAPI](https://scalar.com/products/api-references/integrations/fastapi)\n- [Fastify](https://scalar.com/products/api-references/integrations/fastify)\n- [Flask](https://scalar.com/products/api-references/integrations/flask)\n- [Go](https://scalar.com/products/api-references/integrations/go)\n- [Hapi](https://scalar.com/products/api-references/integrations/hapi)\n- [Hono](https://scalar.com/products/api-references/integrations/hono)\n- [Laravel Scribe](https://scalar.com/products/api-references/integrations/laravel-scribe)\n- [Laravel](https://scalar.com/products/api-references/integrations/laravel)\n- [Micronaut](https://scalar.com/products/api-references/integrations/micronaut)\n- [NestJS](https://scalar.com/products/api-references/integrations/nestjs)\n- [Next.js](https://scalar.com/products/api-references/integrations/nextjs)\n- [Nuxt](https://scalar.com/products/api-references/integrations/nuxt)\n- [Python](https://scalar.com/products/api-references/integrations/python)\n- [React](https://scalar.com/products/api-references/integrations/react)\n- [Ruby on Rails](https://scalar.com/products/api-references/integrations/ruby-on-rails)\n- [Rust](https://scalar.com/products/api-references/integrations/rust)\n- [Spring Boot](https://scalar.com/products/api-references/integrations/spring-boot)\n- [SvelteKit](https://scalar.com/products/api-references/integrations/sveltekit)\n- [Ts.ED](https://scalar.com/products/api-references/integrations/tsed)\n- [Vue.js](https://scalar.com/products/api-references/integrations/vue)\n\n### Built-in Support\n\nThe following frameworks have chosen Scalar API Reference as their default OpenAPI documentation UI, recognizing its developer-friendly features and modern design:\n\n- [Effect](https://scalar.com/products/api-references/integrations/effect)\n- [ElysiaJS](https://scalar.com/products/api-references/integrations/elysiajs)\n- [HappyX](https://github.com/HapticX/happyx)\n- [Litestar](https://docs.litestar.dev/latest/usage/openapi/ui_plugins.html)\n- [Nitro](https://scalar.com/products/api-references/integrations/nitro)\n- [oRPC](https://orpc.unnoq.com/docs/openapi/plugins/openapi-reference)\n- [Platformatic](https://scalar.com/products/api-references/integrations/platformatic)\n- [Spry](https://scalar.com/products/api-references/integrations/spry)\n\n<br>\n\n### Managed Hosting\n\nWe're offering a free and paid managed hosting on the edge, too:\n\n- Write your API documentation and publish API references (free)\n- `YOUR_NAME_HERE.apidocumentation.com` subdomain and SSL (free)\n- [GitHub Sync](https://scalar.com/products/docs/github-sync)\n- Write free-form documentation\n- Collaborate with your team\n- Use any domain\n\nReady? [Create your Scalar Account](https://scalar.com)\n\n<br>\n\n### Documentation\n\n| Topic                                                                     | Description                          |\n| ------------------------------------------------------------------------- | ------------------------------------ |\n| [Configuration](https://scalar.com/products/api-references/configuration) | The universal configuration object   |\n| [Themes](https://scalar.com/products/api-references/themes)               | Predefined themes, layouts & styling |\n| [OpenAPI](https://scalar.com/products/api-references/openapi)             | OpenAPI specification extensions     |\n| [Markdown](https://scalar.com/products/api-references/markdown)           | Supported Markdown syntax            |\n| [Plugins](https://scalar.com/products/api-references/plugins)             | Extend the functionality             |\n\n<br>\n\n### Projects\n\n| Project                                                                            | Description                      |\n| ---------------------------------------------------------------------------------- | -------------------------------- |\n| [Scalar API Reference](https://scalar.com/products/api-references/getting-started) | Self-hosted API Reference        |\n| [Scalar API Client](https://scalar.com/download)                                   | Postman alternative              |\n| [Agent Scalar](https://scalar.com/products/agent/getting-started)                  | Chat with your API               |\n| [Scalar Registry](https://scalar.com/products/registry/getting-started)            | Manage OpenAPI documents         |\n| [Scalar Docs](https://scalar.com/products/docs/getting-started)                    | Hosted documentation             |\n| [Scalar Docs Starter](https://github.com/scalar/starter)                           | Starter template for Scalar Docs |\n| [Scalar SDKs](https://scalar.com/products/sdks/getting-started)                    | SDK generation                   |\n| [Scalar CLI](https://scalar.com/tools/cli/getting-started)                         | Command-line interface           |\n| [Scalar Mock Server](https://scalar.com/tools/mock-server/getting-started)      | Mock APIs from OpenAPI documents |\n| [Scalar Galaxy](packages/galaxy/README.md)                                         | Our OpenAPI Example              |\n| [Scalar Editor](https://editor.scalar.com/)                                        | OpenAPI Online Editor            |\n| [Scalar OpenAPI Parser](packages/openapi-parser/README.md)                         | Parse OpenAPI documents          |\n| [Scalar OpenAPI to Markdown](packages/openapi-to-markdown/README.md)               | OpenAPI > Markdown/HTML          |\n| [Scalar OpenAPI Upgrader](packages/openapi-upgrader/README.md)                     | Upgrade OpenAPI documents        |\n| [Scalar Void Server](packages/void-server/README.md)                               | HTTP Request Mirror              |\n\n<br>\n\n### Community\n\nWe are API nerds. You too? Let's chat on Discord: <https://discord.gg/scalar>\n\n<br>\n\n### Contributions\n\nContributions are welcome! Read the [`CONTRIBUTING`](CONTRIBUTING.md) guide.\n\n**Top 10 Contributors (April 2025)**\n\n<p>\n\t<img width=\"830\" height=\"280\" src=\"https://github.com/user-attachments/assets/8c10d2aa-9eb4-4818-9ca2-625cfed5ca08#gh-light-mode-only\">\n\t<img width=\"830\" height=\"280\" src=\"https://github.com/user-attachments/assets/50b9b042-107e-4167-9c7f-94497f85d2e0#gh-dark-mode-only\">\n</p>\n\n<br>\n<br>\n\n**Top Contributors (All Time)**\n\n<!-- readme: collaborators,contributors -start -->\n<table>\n\t<tbody>\n\t\t<tr>\n            <td align=\"center\">\n                <a href=\"https://github.com/hanspagel\">\n                    <img src=\"https://avatars.githubusercontent.com/u/1577992?v=4\" width=\"100;\" alt=\"hanspagel\"/>\n                    <br />\n                    <sub><b>hanspagel</b></sub>\n                </a>\n            </td>\n            <td align=\"center\">\n                <a href=\"https://github.com/xC0dex\">\n                    <img src=\"https://avatars.githubusercontent.com/u/22918366?v=4\" width=\"100;\" alt=\"xC0dex\"/>\n                    <br />\n                    <sub><b>xC0dex</b></sub>\n                </a>\n            </td>\n            <td align=\"center\">\n                <a href=\"https://github.com/amritk\">\n                    <img src=\"https://avatars.githubusercontent.com/u/2039539?v=4\" width=\"100;\" alt=\"amritk\"/>\n                    <br />\n                    <sub><b>amritk</b></sub>\n                </a>\n            </td>\n            <td align=\"center\">\n                <a href=\"https://github.com/antlio\">\n                    <img src=\"https://avatars.githubusercontent.com/u/14966155?v=4\" width=\"100;\" alt=\"antlio\"/>\n                    <br />\n                    <sub><b>antlio</b></sub>\n                </a>\n            </td>\n            <td
