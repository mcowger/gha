<script id="project-data" type="application/json">[{"owner":"topoteretes","repo":"cognee","url":"https://github.com/topoteretes/cognee","readme":"<div align=\"center\">\n  <a href=\"https://github.com/topoteretes/cognee\">\n    <img src=\"https://raw.githubusercontent.com/topoteretes/cognee/refs/heads/dev/assets/cognee-logo-transparent.png\" alt=\"Cognee Logo\" height=\"60\">\n  </a>\n\n  <br />\n\n  Cognee - The Brain behind your Agents\n\n  <p align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=8hmqS2Y5RVQ&t=13s\">Demo</a>\n  .\n  <a href=\"https://docs.cognee.ai/\">Docs</a>\n  .\n  <a href=\"https://cognee.ai\">Learn More</a>\n  ·\n  <a href=\"https://discord.gg/NQPKmU5CCg\">Join Discord</a>\n  ·\n  <a href=\"https://www.reddit.com/r/AIMemory/\">Join r/AIMemory</a>\n  .\n  <a href=\"https://github.com/topoteretes/cognee-community\">Community Plugins & Add-ons</a>\n  </p>\n\n\n  [![GitHub forks](https://img.shields.io/github/forks/topoteretes/cognee.svg?style=social&label=Fork&maxAge=2592000)](https://GitHub.com/topoteretes/cognee/network/)\n  [![GitHub stars](https://img.shields.io/github/stars/topoteretes/cognee.svg?style=social&label=Star&maxAge=2592000)](https://GitHub.com/topoteretes/cognee/stargazers/)\n  [![GitHub commits](https://badgen.net/github/commits/topoteretes/cognee)](https://GitHub.com/topoteretes/cognee/commit/)\n  [![GitHub tag](https://badgen.net/github/tag/topoteretes/cognee)](https://github.com/topoteretes/cognee/tags/)\n  [![Downloads](https://static.pepy.tech/badge/cognee)](https://pepy.tech/project/cognee)\n  [![License](https://img.shields.io/github/license/topoteretes/cognee?colorA=00C586&colorB=000000)](https://github.com/topoteretes/cognee/blob/main/LICENSE)\n  [![Contributors](https://img.shields.io/github/contributors/topoteretes/cognee?colorA=00C586&colorB=000000)](https://github.com/topoteretes/cognee/graphs/contributors)\n  <a href=\"https://github.com/sponsors/topoteretes\"><img src=\"https://img.shields.io/badge/Sponsor-❤️-ff69b4.svg\" alt=\"Sponsor\"></a>\n\n<p>\n  <a href=\"https://trendshift.io/repositories/13955\" target=\"_blank\" style=\"display:inline-block;\">\n    <img src=\"https://trendshift.io/api/badge/repositories/13955\" alt=\"topoteretes%2Fcognee | Trendshift\" width=\"250\" height=\"55\" />\n  </a>\n</p>\n\nCognee gives AI agents a shared, improving memory of your data, decisions, and workflows so they can recall, connect, and act with context.\n\n  <p align=\"center\">\n  🌐 Available Languages\n  :\n  <!-- Keep these links. Translations will automatically update with the README. -->\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=de\">Deutsch</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=es\">Español</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=fr\">Français</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=ja\">日本語</a> |\n  <a href=\"README_ko.md\">한국어</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=pt\">Português</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=ru\">Русский</a> |\n  <a href=\"https://www.readme-i18n.com/topoteretes/cognee?lang=zh\">中文</a>\n  </p>\n\n\n<div style=\"text-align: center\">\n  <img src=\"https://raw.githubusercontent.com/topoteretes/cognee/refs/heads/main/assets/cognee_benefits.png\" alt=\"Why cognee?\" width=\"80%\" />\n</div>\n</div>\n\n\n\n\n## About Cognee\n\nCognee is an open-source memory control plane for your Agents that lets you ingest data in any format or structure and continuously learns to provide the right context. It combines embeddings, graphs and cognitive science approaches to make your documents both searchable by meaning and connected by relationships as they change and evolve.\n\n\n\n:star: _Help us reach more developers and grow the cognee community. Star this repo!_\n\n:books: _Check our detailed [documentation](https://docs.cognee.ai/getting-started/installation#environment-configuration) for setup and configuration._\n\n:crab: _Available as a plugin for your OpenClaw — [cognee-openclaw](https://www.npmjs.com/package/@cognee/cognee-openclaw)_\n\n✴️ _Available as a plugin for your Claude Code — [claude-code-plugin](https://github.com/topoteretes/cognee-integrations/tree/main/integrations/claude-code)_\n\n\n\n### Why use Cognee:\n\n- Easily Build Company Brain - unify data from various sources in one place and enable Agents with your domain knowledge\n- Knowledge infrastructure — unified ingestion, graph/vector search, runs locally, ontology grounding, multimodal\n- Persistent and Learning Agents - learn from feedback, context management, cross-agent knowledge sharing\n- Reliable and Trustworthy Agents - agentic user/tenant isolation, traceability, OTEL collector, audit traits\n\n### Product Features\n\n<p align=\"center\">\n  <img src=\"assets/cognee_products.png\" alt=\"Cognee Products\" width=\"80%\" />\n</p>\n\n## Basic Usage & Feature Guide\n\nTo learn more, [check out this short, end-to-end Colab walkthrough](https://colab.research.google.com/drive/12Vi9zID-M3fpKpKiaqDBvkk98ElkRPWy?usp=sharing) of Cognee's core features.\n\n[![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/12Vi9zID-M3fpKpKiaqDBvkk98ElkRPWy?usp=sharing)\n\n## Quickstart\n\nLet’s try Cognee in just a few lines of code.\n\n### Prerequisites\n\n- Python 3.10 to 3.14\n\n### Step 1: Install Cognee\n\nYou can install Cognee with **pip**, **poetry**, **uv**, or your preferred Python package manager.\n\n```bash\nuv pip install cognee\n```\n\n### Step 2: Configure the LLM\n```python\nimport os\nos.environ[\"LLM_API_KEY\"] = \"YOUR OPENAI_API_KEY\"\n```\nAlternatively, create a `.env` file using our [template](https://github.com/topoteretes/cognee/blob/main/.env.template).\n\nTo integrate other LLM providers, see our [LLM Provider Documentation](https://docs.cognee.ai/setup-configuration/llm-providers).\n\n### Step 3: Run the Pipeline\n\nCognee's API gives you four operations — `remember`, `recall`, `forget`, and `improve`:\n\n```python\nimport cognee\nimport asyncio\n\n\nasync def main():\n    # Store permanently in the knowledge graph (runs add + cognify + improve)\n    await cognee.remember(\"Cognee turns documents into AI memory.\")\n\n    # Store in session memory (fast cache, syncs to graph in background)\n    await cognee.remember(\"User prefers detailed explanations.\", session_id=\"chat_1\")\n\n    # Query with auto-routing (picks best search strategy automatically)\n    results = await cognee.recall(\"What does Cognee do?\")\n    for result in results:\n        print(result)\n\n    # Query session memory first, fall through to graph if needed\n    results = await cognee.recall(\"What does the user prefer?\", session_id=\"chat_1\")\n    for result in results:\n        print(result)\n\n    # Delete when done\n    await cognee.forget(dataset=\"main_dataset\")\n\n\nif __name__ == '__main__':\n    asyncio.run(main())\n\n```\n\n### Use the Cognee CLI\n\n```bash\ncognee-cli remember \"Cognee turns documents into AI memory.\"\n\ncognee-cli recall \"What does Cognee do?\"\n\ncognee-cli forget --all\n```\n\nTo open the local UI, run:\n```bash\ncognee-cli -ui\n```\n\n## Use with AI Agents\n\n### Claude Code\n\nInstall the [Cognee memory plugin](https://github.com/topoteretes/cognee-integrations/tree/main/integrations/claude-code) to give Claude Code persistent memory across sessions. The plugin automatically captures tool calls into session memory via hooks and syncs to the permanent knowledge graph at session end.\n\n**Setup:**\n\n```bash\n# Install cognee\npip install cognee\n\n# Configure\nexport LLM_API_KEY=\"your-openai-key\"\n\n# Clone the plugin\ngit clone https://github.com/topoteretes/cognee-integrations.git\n\n# Enable it (add to ~/.zshrc for permanent use)\nclaude --plugin-dir ./cognee-integrations/integrations/claude-code\n```\n\nOr connect to Cognee Cloud instead of running locally:\n\n```bash\nexport COGNEE_SERVICE_URL=\"https://your-instance.cognee.ai\"\nexport COGNEE_API_KEY=\"ck_...\"\n```\n\nThe plugin hooks into Claude Code's lifecycle — `SessionStart` initializes memory, `PostToolUse` captures actions, `UserPromptSubmit` injects relevant context, `PreCompact` preserves memory across context resets, and `SessionEnd` bridges session data into the permanent graph.\n\n### Connect to Cognee Cloud\n\nPoint any Python agent at a managed Cognee instance — all SDK calls route to the cloud:\n\n```python\nimport cognee\n\nawait cognee.serve(url=\"https://your-instance.cognee.ai\", api_key=\"ck_...\")\n\nawait cognee.remember(\"important context\")\nresults = await cognee.recall(\"what happened?\")\n\nawait cognee.disconnect()\n```\n\n## Examples\n\nBrowse more examples in the [`examples/`](examples/) folder — demos, guides, custom pipelines, and database configurations.\n\n**Use Case 1 — Customer Support Agent**\n\n```python\nGoal: Resolve customer issues using their personal data across finance, support, and product history.\n\nUser: \"My invoice looks wrong and the issue is still not resolved.\"\n\nCognee tracks: past interactions, failed actions, resolved cases, product history\n\n# Agent response:\nAgent: \"I found 2 similar billing cases resolved last month.\n        The issue was caused by a sync delay between payment\n        and invoice systems — a fix was applied on your account.\"\n\n# What happens under the hood:\n- Unifies data sources from various company channels\n- Reconstructs the interaction timeline and tracks outcomes\n- Retrieves similar resolved cases\n- Maps to the best resolution strategy\n- Updates memory after execution so the agent never repeats the same mistake\n```\n\n**Use Case 2 — Expert Knowledge Distillation (SQL Copilot)**\n\n```python\nGoal: Help junior analysts solve tasks by reusing expert-level queries, patterns, and reasoning.\n\nUser: \"How do I calculate customer retention for this dataset?\"\n\nCognee tracks: expert SQL queries, workflow patterns, schema structures, successful implementations\n\n# Agent response:\nAgent: \"Here's how senior analysts solved a similar retention query.\n        Cognee matched your schema to a known structure and adapted\n        the expert's logic to fit your dataset.\"\n\n# What happens under the hood:\n- Extracts and stores patterns from expert SQL queries and workflows\n- Maps the current schema to previously seen structures\n- Retrieves similar tasks and their successful implementations\n- Adapts expert reasoning to the current context\n- Updates memory with new successful patterns so junior analysts perform at near-expert level\n```\n\n## Deploy Cognee\n\nUse [Cognee Cloud](https://www.cognee.ai) for a fully managed experience, or self-host with one of the 1-click deployment configurations below.\n\n| Platform | Best For | Command |\n|----------|----------|---------|\n| **Cognee Cloud** | Managed service, no infrastructure to maintain | [Sign up](https://www.cognee.ai) or `await cognee.serve()` |\n| **Modal** | Serverless, auto-scaling, GPU workloads | `bash distributed/deploy/modal-deploy.sh` |\n| **Railway** | Simplest PaaS, native Postgres | `railway init && railway up` |\n| **Fly.io** | Edge deployment, persistent volumes | `bash distributed/deploy/fly-deploy.sh` |\n| **Render** | Simple PaaS with managed Postgres | Deploy to Render button |\n| **Daytona** | Cloud sandboxes (SDK or CLI) | See `distributed/deploy/daytona_sandbox.py` |\n\nSee the [`distributed/`](distributed/) folder for deploy scripts, worker configurations, and additional details.\n\n## Latest News\n\n[![Watch Demo](https://img.youtube.com/vi/8hmqS2Y5RVQ/maxresdefault.jpg)](https://www.youtube.com/watch?v=8hmqS2Y5RVQ&t=13s)\n\n\n## Community & Support\n\n### Contributing\nWe welcome contributions from the community! Your input helps make Cognee better for everyone. See [`CONTRIBUTING.md`](CONTRIBUTING.md) to get started.\n\n### Code of Conduct\n\nWe're committed to fostering an inclusive and respectful community. Read our [Code of Conduct](https://github.com/topoteretes/cognee/blob/main/CODE_OF_CONDUCT.md) for guidelines.\n\n## Research & Citation\n\nWe recently published a research paper on optimizing knowledge graphs for LLM reasoning:\n\n```bibtex\n@misc{markovic2025optimizinginterfaceknowledgegraphs,\n      title={Optimizing the Interface Between Knowledge Graphs and LLMs for Complex Reasoning},\n      author={Vasilije Markovic and Lazar Obradovic and Laszlo Hajdu and Jovan Pavlovic},\n      year={2025},\n      eprint={2505.24478},\n      archivePrefix={arXiv},\n      primaryClass={cs.AI},\n      url={https://arxiv.org/abs/2505.24478},\n}\n```\n","summary":"Cognee serves as an open-source memory control plane designed to provide AI agents with a persistent and evolving understanding of your data, decisions, and workflows. By combining embeddings, graph structures, and cognitive science methodologies, the project enables agents to perform context-aware recall and maintain complex relationships between evolving information. It is an ideal solution for developers building sophisticated AI systems who need their agents to effectively ingest, structure, and retrieve knowledge across diverse data formats.","description":"Memory platform for AI Agents in 6 lines of code","stars":17661,"language":"Python"},{"owner":"coleam00","repo":"ottomator-agents","url":"https://github.com/coleam00/ottomator-agents","readme":"# What is the Live Agent Studio?\n\nThe [Live Agent Studio](https://studio.ottomator.ai) is a community-driven platform developed by [oTTomator](https://ottomator.ai) for you to explore cutting-edge AI agents and learn how to implement them for yourself or your business! All agents on this platform are open source and, over time, will cover a very large variety of use cases.\n\nThe goal with the studio is to build an educational platform for you to learn how to do incredible things with AI, while still providing practical value so that you’ll want to use the agents just for the sake of what they can do for you!\n\nThis platform is still in beta – expect longer response times under load, a rapidly growing agent library over the coming months, and a lot more content on this platform soon on Cole Medin’s YouTube channel!\n\n# What is this Repository for?\n\nThis repository contains the source code/workflow JSON for all the agents on the Live Agent Studio! Every agent being added to the platform is currently be open sourced here so we can not only create a curated collection of cutting-edge agents together as a community, but also learn from one another!\n\n## Tokens\n\nMost agents on the Live Agent Studio cost tokens to use, which are purchasable on the platform. However, when you first sign in you are given some tokens to start so you can use the agents free of charge! The biggest reason agents cost tokens is that we pay for the LLM usage since we host all the agents developed by you and the rest of the community!\n\n[Purchase Tokens](https://studio.ottomator.ai/pricing)\n\n## Future Plans\n\nAs the Live Agent Studio develops, it will become the go-to place to stay on top of what is possible with AI agents! Anytime there is a new AI technology, groundbreaking agent research, or a new tool/library to build agents with, it’ll be featured through agents on the platform. It’s a tall order, but we have big plans for the oTTomator community, and we’re confident we can grow to accomplish this!\n\n## FAQ\n\n### I want to build an agent to showcase in the Live Agent Studio! How do I do that?\n\nHead on over here to learn how to build an agent for the platform:\n\n[Developer Guide](https://studio.ottomator.ai/guide)\n\nAlso check out [the sample n8n agent](~sample-n8n-agent~) for a starting point of building an n8n agent for the Live Agent Studio, and [the sample Python agent](~sample-python-agent~) for Python.\n\n### How many tokens does it cost to use an agent?\n\nEach agent will charge tokens per prompt. The number of tokens depends on the agent, as some agents use larger LLMs, some call LLMs multiple times, and some use paid APIs.\n\n### Where can I go to talk about all these agents and get help implementing them myself?\n\nHead on over to our Think Tank community and feel free to make a post!\n\n[Think Tank Community](https://thinktank.ottomator.ai)\n\n---\n\n&copy; 2024 Live Agent Studio. All rights reserved.  \nCreated by oTTomator\n","summary":"The oTTomator Live Agent Studio is an open-source platform that provides a curated collection of cutting-edge AI agents designed for both practical application and educational exploration. This repository serves as the central hub for the platform’s workflow JSON and source code, allowing users to study, implement, and contribute to a variety of agentic use cases. Developers and business users looking to stay at the forefront of AI technology will benefit from this library, which acts as a collaborative resource for building and deploying intelligent workflows.","description":"All the open source AI Agents hosted on the oTTomator Live Agent Studio platform!","stars":5624,"language":"Python"},{"owner":"zaidmukaddam","repo":"scira","url":"https://github.com/zaidmukaddam/scira","readme":"# Scira\n\nResearch at the speed of thought. The agentic research platform that plans, retrieves, and cites — so you can think faster.\n\n<a href=\"https://vercel.com/oss\">\n  <img alt=\"Vercel OSS Program\" src=\"https://vercel.com/oss/program-badge.svg\" />\n</a>\n\n<br />\n\n![Scira](/app/opengraph-image.png)\n\n<br />\n\n🔗 **[Try Scira at scira.ai](https://scira.ai)**\n\n[![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/zaidmukaddam/scira)\n\n## Powered By\n\n<div align=\"center\">\n\n|          [Vercel AI SDK](https://sdk.vercel.ai/docs)          |                [Exa AI](https://exa.ai)                |             [Upstash](https://upstash.com)              |\n| :-----------------------------------------------------------: | :----------------------------------------------------: | :-----------------------------------------------------: |\n| <img src=\"/public/one.svg\" alt=\"Vercel AI SDK\" height=\"40\" /> | <img src=\"/public/exa.png\" alt=\"Exa AI\" height=\"40\" /> | <img src=\"/public/upstash.svg\" alt=\"Upstash\" height=\"40\" /> |\n|            For AI model integration and streaming             |          For web search and content retrieval          |        For serverless Redis and rate limiting           |\n\n</div>\n\n## Special Thanks\n\n<div align=\"center\" markdown=\"1\">\n\n[![Warp](https://github.com/user-attachments/assets/2bda420d-4211-4900-a37e-e3c7056d799c)](https://www.warp.dev/?utm_source=github&utm_medium=referral&utm_campaign=scira)<br>\n\n### **[Warp, the intelligent terminal](https://www.warp.dev/?utm_source=github&utm_medium=referral&utm_campaign=scira)**<br>\n\n[Available for MacOS, Linux, & Windows](https://www.warp.dev/?utm_source=github&utm_medium=referral&utm_campaign=scira)<br>\n[Visit warp.dev to learn more](https://www.warp.dev/?utm_source=github&utm_medium=referral&utm_campaign=scira)\n\n</div>\n\n## How It Works\n\n1. **Ask anything** — Type a question, upload a PDF, or paste a URL. Pick a mode or let Scira decide for you.\n2. **Scira plans & retrieves** — The agent breaks your question into sub-tasks, searches live sources, and cross-checks the evidence.\n3. **Get cited answers** — Receive a grounded answer with inline citations. Click any source to verify it yourself.\n\n## Features\n\n### Core Capabilities\n\n- **Agentic Planning** — Breaks complex questions into steps, selects the right models and tools, then executes multi-step workflows end to end\n- **Grounded Retrieval** — Every answer comes with inline citations you can click to audit the evidence yourself\n- **Extensible & Open** — AGPL-3.0 licensed. Self-host, bring your own models, connect custom tools, and tailor everything to your workflow\n- **Lookouts** — Schedule recurring research agents that monitor topics, track changes, and email you updates\n\n### Search Modes (17 modes)\n\n| Mode | Description |\n|---|---|\n| **Web** | Search the entire web with AI-powered analysis |\n| **Chat** | Talk to the model directly, no search |\n| **X** | Real-time posts, trends, and conversations |\n| **Stocks** | Market data, charts, and financial analysis |\n| **Code** | Get context about languages and frameworks |\n| **Academic** | Research papers, citations, and scholarly sources |\n| **Extreme** | Deep research with multiple sources and analysis |\n| **Reddit** | Discussions, opinions, and community insights |\n| **GitHub** | Repositories, code, and developer discussions |\n| **Crypto** | Cryptocurrency research powered by CoinGecko |\n| **Prediction** | Prediction markets from Polymarket and Kalshi |\n| **YouTube** | Video summaries, transcripts, and analysis |\n| **Spotify** | Search songs, artists, and albums |\n| **Connectors** | Search Google Drive, Notion & OneDrive *(Pro)* |\n| **Memory** | Your personal memory companion *(Pro)* |\n| **Voice** | Conversational AI with real-time voice *(Pro)* |\n| **XQL** | Advanced X query language for tweet analysis *(Pro)* |\n\n### Tools (28 tools)\n\n#### Search & Retrieval\n- **Web search** — Multi-query parallel web search with deduplication using Exa, Firecrawl, Parallel, and Tavily\n- **Extreme search** — LLM-driven deep research agent with multi-step planning, code execution, and R2 artifact storage\n- **Academic search** — Search academic papers and research using Exa and Firecrawl\n- **Reddit search** — Search Reddit with configurable time ranges using Parallel\n- **X search** — Search X posts with date range filtering and handle inclusion/exclusion using xAI Grok\n- **YouTube search** — Search videos, channels, playlists with transcript extraction using Supadata\n- **GitHub search** — Search repositories with structured metadata extraction using Firecrawl\n- **Spotify search** — Search tracks, artists, albums, and playlists via Spotify Web API\n- **URL content retrieval** — Extract content from any URL including tweets, YouTube, TikTok, and Instagram\n\n#### Financial & Market Data\n- **Stock charts** — Interactive stock charts with OHLC data, earnings, and news using Valyu, Tavily, and Exa\n- **Currency converter** — Forex and crypto conversion with real-time rates using Valyu\n- **Crypto tools** — Cryptocurrency data, contract lookups, and OHLC charts using CoinGecko\n- **Prediction markets** — Query Polymarket and Kalshi data with Cohere reranking using Valyu\n\n#### Location & Travel\n- **Weather** — Current weather, 5-day forecast, air quality, and 16-day extended forecast using OpenWeatherMap and Open-Meteo\n- **Maps & geocoding** — Forward/reverse geocoding and nearby place discovery using Google Maps API\n- **Flight tracking** — Real-time flight status with departure/arrival details\n\n#### Media & Entertainment\n- **Movie/TV search** — Search movies and TV shows with detailed cast, ratings, and metadata using TMDB\n- **Trending movies** — Today's trending movies from TMDB\n- **Trending TV shows** — Today's trending TV shows from TMDB\n\n#### Productivity & Utilities\n- **Code interpreter** — Write and execute Python code in a sandboxed Daytona environment with chart generation\n- **Code context** — Get contextual information about programming topics using Exa Context API\n- **Text translation** — Translate text (and text within images) between languages using AI models\n- **File query search** — Semantic search over uploaded files (PDF, CSV, DOCX, Excel) with Cohere embeddings and reranking\n- **Connectors search** — Search connected Google Drive, Notion, and OneDrive using Supermemory\n- **Memory tools** — Save and search personal memories using Supermemory\n- **Date & time** — Current date/time in multiple formats with timezone support\n- **Greeting** — Personalized time-of-day-aware greetings\n\n## LLM Models Supported\n\n- **xAI**: Grok 3, Grok 3 Mini, Grok 4, Grok 4 Fast, Grok 4.1 Fast, Grok Code\n- **OpenAI**: GPT 4.1 (Nano/Mini/Standard), GPT 5 (Nano/Mini/Medium/Standard), GPT 5.1 (Instant/Thinking/Codex), GPT 5.2 (Instant/Thinking/Codex), o3, o4 mini, GPT OSS 20B/120B\n- **Anthropic**: Claude Haiku 4.5, Claude Sonnet 4.5, Claude 4.5 Opus, Claude 4.6 Opus\n- **Google**: Gemini 2.5 Flash (Lite/Standard), Gemini 2.5 Pro, Gemini 3 Flash, Gemini 3 Pro\n- **Alibaba (Qwen)**: Qwen 3 (4B/32B/235B), Qwen 3 VL, Qwen 3 Max, Qwen 3 Coder (Small/Standard/Plus/Next), Qwen 3 Next 80B\n- **Mistral**: Ministral 3 (3B/8B/14B), Mistral Large 3, Mistral Medium, Magistral (Small/Medium), Devstral 2 (Small/Standard)\n- **DeepSeek**: DeepSeek v3, v3.1 Terminus, v3.2, R1, R1 0528\n- **Zhipu (GLM)**: GLM 4.5, GLM 4.5 Air, GLM 4.6, GLM 4.6V, GLM 4.7, GLM 4.7 Flash\n- **Cohere**: Command A, Command A Thinking\n- **MoonShot**: Kimi K2, Kimi K2.5\n- **Minimax**: M1 80K, M2, M2.1, M2.1 Lightning\n- **ByteDance**: Seed 1.6, Seed 1.6 Flash, Seed 1.8\n- **Arcee**: Trinity Mini, Trinity Large\n- **Others**: Vercel v0 (1.0/1.5), Amazon Nova 2 Lite, Xiaomi Mimo V2 Flash, StepFun Step 3.5 Flash, Kwaipilot KAT-Coder-Pro V1\n\n## Built with\n\n- [Next.js](https://nextjs.org/) - React framework\n- [Tailwind CSS](https://tailwindcss.com/) - Styling\n- [Vercel AI SDK](https://sdk.vercel.ai/docs) - AI model integration and streaming\n- [Shadcn/UI](https://ui.shadcn.com/) - UI components\n- [Exa.AI](https://exa.ai/) - Web search, academic search, and content retrieval\n- [Firecrawl](https://firecrawl.dev/) - Web scraping with structured extraction\n- [Parallel](https://parallel.ai/) - Web and Reddit search\n- [Tavily](https://tavily.com/) - Web search and financial news\n- [Valyu](https://valyu.network/) - Financial data, forex, and prediction markets\n- [Supadata](https://supadata.ai/) - YouTube search, transcripts, and social media\n- [CoinGecko](https://www.coingecko.com/) - Cryptocurrency market data\n- [Spotify](https://developer.spotify.com/) - Music search\n- [OpenWeatherMap](https://openweathermap.org/) - Weather data\n- [Open-Meteo](https://open-meteo.com/) - Extended forecasts and geocoding\n- [Daytona](https://daytona.io/) - Code execution sandbox\n- [Google Maps](https://developers.google.com/maps) - Geocoding and places\n- [TMDB](https://www.themoviedb.org/) - Movie and TV data\n- [Cohere](https://cohere.com/) - Embeddings and reranking\n- [Supermemory](https://supermemory.ai/) - Memory management and connector search\n- [Upstash](https://upstash.com/) - Serverless Redis and rate limiting\n- [Cloudflare R2](https://www.cloudflare.com/r2/) - Object storage for artifacts\n- [ElevenLabs](https://elevenlabs.io/) - Voice synthesis\n- [Better Auth](https://github.com/better-auth/better-auth) - Authentication\n- [Drizzle ORM](https://orm.drizzle.team/) - Database management\n- [Novita AI](https://novita.ai) - AI Inference\n\n### Deploy your own\n\n[![Deploy with Vercel](https://vercel.com/button)](https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2Fzaidmukaddam%2Fscira&env=XAI_API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,GROQ_API_KEY,GOOGLE_GENERATIVE_AI_API_KEY,DAYTONA_API_KEY,DATABASE_URL,BETTER_AUTH_SECRET,GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,TWITTER_CLIENT_ID,TWITTER_CLIENT_SECRET,REDIS_URL,ELEVENLABS_API_KEY,TAVILY_API_KEY,EXA_API_KEY,SUPADATA_API_KEY,TMDB_API_KEY,YT_ENDPOINT,FIRECRAWL_API_KEY,OPENWEATHER_API_KEY,GOOGLE_MAPS_API_KEY,MAPBOX_ACCESS_TOKEN,AVIATION_STACK_API_KEY,CRON_SECRET,BLOB_READ_WRITE_TOKEN,MEM0_API_KEY,MEM0_ORG_ID,MEM0_PROJECT_ID,SMITHERY_API_KEY,NEXT_PUBLIC_MAPBOX_TOKEN,NEXT_PUBLIC_POSTHOG_KEY,NEXT_PUBLIC_POSTHOG_HOST,NEXT_PUBLIC_SCIRA_PUBLIC_API_KEY,SCIRA_API_KEY&envDescription=API%20keys%20and%20configuration%20required%20for%20Scira%20to%20function)\n\n## Set Scira as your default search engine\n\n1. **Open the Chrome browser settings**:\n   - Click on the three vertical dots in the upper right corner of the browser.\n   - Select \"Settings\" from the dropdown menu.\n\n2. **Go to the search engine settings**:\n   - In the left sidebar, click on \"Search engine.\"\n   - Then select \"Manage search engines and site search.\"\n\n3. **Add a new search engine**:\n   - Click on \"Add\" next to \"Site search.\"\n\n4. **Set the search engine name**:\n   - Enter `Scira` in the \"Search engine\" field.\n\n5. **Set the search engine URL**:\n   - Enter `https://scira.ai?q=%s` in the \"URL with %s in place of query\" field.\n\n6. **Set the search engine shortcut**:\n   - Enter `sh` in the \"Shortcut\" field.\n\n7. **Set Default**:\n   - Click on the three dots next to the search engine you just added.\n   - Select \"Make default\" from the dropdown menu.\n\nAfter completing these steps, you should be able to use Scira as your default search engine in Chrome.\n\n### Local development\n\n#### Run via Docker\n\nThe application can be run using Docker in two ways:\n\n##### Using Docker Compose (Recommended)\n\n1. Make sure you have Docker and Docker Compose installed on your system\n2. Create a `.env` file based on `.env.example` with your API keys\n3. Run the following command in the project root:\n   ```bash\n   docker compose up\n   ```\n4. The application will be available at `http://localhost:3000`\n\n##### Using Docker Directly\n\n1. Create a `.env` file based on `.env.example` with your API keys\n2. Build the Docker image:\n   ```bash\n   docker build -t scira.app .\n   ```\n3. Run the container:\n   ```bash\n   docker run --env-file .env -p 3000:3000 scira.app\n   ```\n\nThe application uses a multi-stage build process to minimize the final image size and implements security best practices. The production image runs on Node.js LTS with Alpine Linux for a minimal footprint.\n\n#### Run with Node.js\n\nTo run the application locally without Docker:\n\n1. Sign up for accounts with the required AI providers:\n   - OpenAI (required)\n   - Anthropic (required)\n   - Exa (required for web search feature)\n2. Copy `.env.example` to `.env.local` and fill in your API keys\n3. Install dependencies:\n   ```bash\n   pnpm install\n   ```\n4. Start the development server:\n   ```bash\n   pnpm dev\n   ```\n5. Open `http://localhost:3000` in your browser\n\n# License\n\nThis project is licensed under the AGPLv3 License - see the [LICENSE](LICENSE) file for details.\n","summary":"Scira is an agentic research platform designed to streamline information gathering by autonomously planning, retrieving, and synthesizing data from a wide variety of sources. The platform features 17 specialized search modes and advanced capabilities like agentic task decomposition, grounded inline citations, and automated monitoring via \"Lookouts.\" It is an ideal tool for researchers, developers, and analysts who need to verify information quickly and conduct complex, multi-step inquiries across academic, technical, and real-time data landscapes.","description":"Scira (Formerly MiniPerplx) is a minimalistic AI-powered search engine that helps you find information on the internet and cites it too. Powered by Vercel AI SDK!","stars":11711,"language":"TypeScript"},{"owner":"stanford-oval","repo":"storm","url":"https://github.com/stanford-oval/storm","readme":"<p align=\"center\">\n  <img src=\"assets/logo.svg\" style=\"width: 25%; height: auto;\">\n</p>\n\n# STORM: Synthesis of Topic Outlines through Retrieval and Multi-perspective Question Asking\n\n<p align=\"center\">\n| <a href=\"http://storm.genie.stanford.edu\"><b>Research preview</b></a> | <a href=\"https://arxiv.org/abs/2402.14207\"><b>STORM Paper</b></a>| <a href=\"https://www.arxiv.org/abs/2408.15232\"><b>Co-STORM Paper</b></a>  | <a href=\"https://storm-project.stanford.edu/\"><b>Website</b></a> |\n</p>\n**Latest News** 🔥\n\n- [2025/01] We add [litellm](https://github.com/BerriAI/litellm) integration for language models and embedding models in `knowledge-storm` v1.1.0.\n\n- [2024/09] Co-STORM codebase is now released and integrated into `knowledge-storm` python package v1.0.0. Run `pip install knowledge-storm --upgrade` to check it out.\n\n- [2024/09] We introduce collaborative STORM (Co-STORM) to support human-AI collaborative knowledge curation! [Co-STORM Paper](https://www.arxiv.org/abs/2408.15232) has been accepted to EMNLP 2024 main conference.\n\n- [2024/07] You can now install our package with `pip install knowledge-storm`!\n- [2024/07] We add `VectorRM` to support grounding on user-provided documents, complementing existing support of search engines (`YouRM`, `BingSearch`). (check out [#58](https://github.com/stanford-oval/storm/pull/58))\n- [2024/07] We release demo light for developers a minimal user interface built with streamlit framework in Python, handy for local development and demo hosting (checkout [#54](https://github.com/stanford-oval/storm/pull/54))\n- [2024/06] We will present STORM at NAACL 2024! Find us at Poster Session 2 on June 17 or check our [presentation material](assets/storm_naacl2024_slides.pdf). \n- [2024/05] We add Bing Search support in [rm.py](knowledge_storm/rm.py). Test STORM with `GPT-4o` - we now configure the article generation part in our demo using `GPT-4o` model.\n- [2024/04] We release refactored version of STORM codebase! We define [interface](knowledge_storm/interface.py) for STORM pipeline and reimplement STORM-wiki (check out [`src/storm_wiki`](knowledge_storm/storm_wiki)) to demonstrate how to instantiate the pipeline. We provide API to support customization of different language models and retrieval/search integration.\n\n[![Code style: black](https://img.shields.io/badge/code%20style-black-000000.svg)](https://github.com/psf/black)\n\n## Overview [(Try STORM now!)](https://storm.genie.stanford.edu/)\n\n<p align=\"center\">\n  <img src=\"assets/overview.svg\" style=\"width: 90%; height: auto;\">\n</p>\nSTORM is a LLM system that writes Wikipedia-like articles from scratch based on Internet search. Co-STORM further enhanced its feature by enabling human to collaborative LLM system to support more aligned and preferred information seeking and knowledge curation.\n\nWhile the system cannot produce publication-ready articles that often require a significant number of edits, experienced Wikipedia editors have found it helpful in their pre-writing stage.\n\n**More than 70,000 people have tried our [live research preview](https://storm.genie.stanford.edu/). Try it out to see how STORM can help your knowledge exploration journey and please provide feedback to help us improve the system 🙏!**\n\n\n\n## How STORM & Co-STORM works\n\n### STORM\n\nSTORM breaks down generating long articles with citations into two steps:\n\n1. **Pre-writing stage**: The system conducts Internet-based research to collect references and generates an outline.\n2. **Writing stage**: The system uses the outline and references to generate the full-length article with citations.\n<p align=\"center\">\n  <img src=\"assets/two_stages.jpg\" style=\"width: 60%; height: auto;\">\n</p>\n\nSTORM identifies the core of automating the research process as automatically coming up with good questions to ask. Directly prompting the language model to ask questions does not work well. To improve the depth and breadth of the questions, STORM adopts two strategies:\n1. **Perspective-Guided Question Asking**: Given the input topic, STORM discovers different perspectives by surveying existing articles from similar topics and uses them to control the question-asking process.\n2. **Simulated Conversation**: STORM simulates a conversation between a Wikipedia writer and a topic expert grounded in Internet sources to enable the language model to update its understanding of the topic and ask follow-up questions.\n\n### CO-STORM\n\nCo-STORM proposes **a collaborative discourse protocol** which implements a turn management policy to support smooth collaboration among \n\n- **Co-STORM LLM experts**: This type of agent generates answers grounded on external knowledge sources and/or raises follow-up questions based on the discourse history.\n- **Moderator**: This agent generates thought-provoking questions inspired by information discovered by the retriever but not directly used in previous turns. Question generation can also be grounded!\n- **Human user**: The human user will take the initiative to either (1) observe the discourse to gain deeper understanding of the topic, or (2) actively engage in the conversation by injecting utterances to steer the discussion focus.\n\n<p align=\"center\">\n  <img src=\"assets/co-storm-workflow.jpg\" style=\"width: 60%; height: auto;\">\n</p>\n\nCo-STORM also maintains a dynamic updated **mind map**, which organize collected information into a hierarchical concept structure, aiming to **build a shared conceptual space between the human user and the system**. The mind map has been proven to help reduce the mental load when the discourse goes long and in-depth. \n\nBoth STORM and Co-STORM are implemented in a highly modular way using [dspy](https://github.com/stanfordnlp/dspy).\n\n## Installation\n\n\nTo install the knowledge storm library, use `pip install knowledge-storm`. \n\nYou could also install the source code which allows you to modify the behavior of STORM engine directly.\n1. Clone the git repository.\n    ```shell\n    git clone https://github.com/stanford-oval/storm.git\n    cd storm\n    ```\n   \n2. Install the required packages.\n   ```shell\n   conda create -n storm python=3.11\n   conda activate storm\n   pip install -r requirements.txt\n   ```\n   \n\n## API\n\nCurrently, our package support:\n\n- Language model components: All language models supported by litellm as listed [here](https://docs.litellm.ai/docs/providers)\n- Embedding model components: All embedding models supported by litellm as listed [here](https://docs.litellm.ai/docs/embedding/supported_embedding)\n- retrieval module components: `YouRM`, `BingSearch`, `VectorRM`, `SerperRM`, `BraveRM`, `SearXNG`, `DuckDuckGoSearchRM`, `TavilySearchRM`, `GoogleSearch`, and `AzureAISearch` as \n\n:star2: **PRs for integrating more search engines/retrievers into [knowledge_storm/rm.py](knowledge_storm/rm.py) are highly appreciated!**\n\nBoth STORM and Co-STORM are working in the information curation layer, you need to set up the information retrieval module and language model module to create their `Runner` classes respectively.\n\n### STORM\n\nThe STORM knowledge curation engine is defined as a simple Python `STORMWikiRunner` class. Here is an example of using You.com search engine and OpenAI models.\n\n```python\nimport os\nfrom knowledge_storm import STORMWikiRunnerArguments, STORMWikiRunner, STORMWikiLMConfigs\nfrom knowledge_storm.lm import LitellmModel\nfrom knowledge_storm.rm import YouRM\n\nlm_configs = STORMWikiLMConfigs()\nopenai_kwargs = {\n    'api_key': os.getenv(\"OPENAI_API_KEY\"),\n    'temperature': 1.0,\n    'top_p': 0.9,\n}\n# STORM is a LM system so different components can be powered by different models to reach a good balance between cost and quality.\n# For a good practice, choose a cheaper/faster model for `conv_simulator_lm` which is used to split queries, synthesize answers in the conversation.\n# Choose a more powerful model for `article_gen_lm` to generate verifiable text with citations.\ngpt_35 = LitellmModel(model='gpt-3.5-turbo', max_tokens=500, **openai_kwargs)\ngpt_4 = LitellmModel(model='gpt-4o', max_tokens=3000, **openai_kwargs)\nlm_configs.set_conv_simulator_lm(gpt_35)\nlm_configs.set_question_asker_lm(gpt_35)\nlm_configs.set_outline_gen_lm(gpt_4)\nlm_configs.set_article_gen_lm(gpt_4)\nlm_configs.set_article_polish_lm(gpt_4)\n# Check out the STORMWikiRunnerArguments class for more configurations.\nengine_args = STORMWikiRunnerArguments(...)\nrm = YouRM(ydc_api_key=os.getenv('YDC_API_KEY'), k=engine_args.search_top_k)\nrunner = STORMWikiRunner(engine_args, lm_configs, rm)\n```\n\nThe `STORMWikiRunner` instance can be evoked with the simple `run` method:\n```python\ntopic = input('Topic: ')\nrunner.run(\n    topic=topic,\n    do_research=True,\n    do_generate_outline=True,\n    do_generate_article=True,\n    do_polish_article=True,\n)\nrunner.post_run()\nrunner.summary()\n```\n- `do_research`: if True, simulate conversations with difference perspectives to collect information about the topic; otherwise, load the results.\n- `do_generate_outline`: if True, generate an outline for the topic; otherwise, load the results.\n- `do_generate_article`: if True, generate an article for the topic based on the outline and the collected information; otherwise, load the results.\n- `do_polish_article`: if True, polish the article by adding a summarization section and (optionally) removing duplicate content; otherwise, load the results.\n\n### Co-STORM\n\nThe Co-STORM knowledge curation engine is defined as a simple Python `CoStormRunner` class. Here is an example of using Bing search engine and OpenAI models.\n\n```python\nfrom knowledge_storm.collaborative_storm.engine import CollaborativeStormLMConfigs, RunnerArgument, CoStormRunner\nfrom knowledge_storm.lm import LitellmModel\nfrom knowledge_storm.logging_wrapper import LoggingWrapper\nfrom knowledge_storm.rm import BingSearch\n\n# Co-STORM adopts the same multi LM system paradigm as STORM \nlm_config: CollaborativeStormLMConfigs = CollaborativeStormLMConfigs()\nopenai_kwargs = {\n    \"api_key\": os.getenv(\"OPENAI_API_KEY\"),\n    \"api_provider\": \"openai\",\n    \"temperature\": 1.0,\n    \"top_p\": 0.9,\n    \"api_base\": None,\n} \nquestion_answering_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=1000, **openai_kwargs)\ndiscourse_manage_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=500, **openai_kwargs)\nutterance_polishing_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=2000, **openai_kwargs)\nwarmstart_outline_gen_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=500, **openai_kwargs)\nquestion_asking_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=300, **openai_kwargs)\nknowledge_base_lm = LitellmModel(model=gpt_4o_model_name, max_tokens=1000, **openai_kwargs)\n\nlm_config.set_question_answering_lm(question_answering_lm)\nlm_config.set_discourse_manage_lm(discourse_manage_lm)\nlm_config.set_utterance_polishing_lm(utterance_polishing_lm)\nlm_config.set_warmstart_outline_gen_lm(warmstart_outline_gen_lm)\nlm_config.set_question_asking_lm(question_asking_lm)\nlm_config.set_knowledge_base_lm(knowledge_base_lm)\n\n# Check out the Co-STORM's RunnerArguments class for more configurations.\ntopic = input('Topic: ')\nrunner_argument = RunnerArgument(topic=topic, ...)\nlogging_wrapper = LoggingWrapper(lm_config)\nbing_rm = BingSearch(bing_search_api_key=os.environ.get(\"BING_SEARCH_API_KEY\"),\n                     k=runner_argument.retrieve_top_k)\ncostorm_runner = CoStormRunner(lm_config=lm_config,\n                               runner_argument=runner_argument,\n                               logging_wrapper=logging_wrapper,\n                               rm=bing_rm)\n```\n\nThe `CoStormRunner` instance can be evoked with the `warmstart()` and `step(...)` methods.\n\n```python\n# Warm start the system to build shared conceptual space between Co-STORM and users\ncostorm_runner.warm_start()\n\n# Step through the collaborative discourse \n# Run either of the code snippets below in any order, as many times as you'd like\n# To observe the conversation:\nconv_turn = costorm_runner.step()\n# To inject your utterance to actively steer the conversation:\ncostorm_runner.step(user_utterance=\"YOUR UTTERANCE HERE\")\n\n# Generate report based on the collaborative discourse\ncostorm_runner.knowledge_base.reorganize()\narticle = costorm_runner.generate_report()\nprint(article)\n```\n\n\n\n## Quick Start with Example Scripts\n\nWe provide scripts in our [examples folder](examples) as a quick start to run STORM and Co-STORM with different configurations.\n\nWe suggest using `secrets.toml` to set up the API keys. Create a file `secrets.toml` under the root directory and add the following content:\n\n```shell\n# ============ language model configurations ============ \n# Set up OpenAI API key.\nOPENAI_API_KEY=\"your_openai_api_key\"\n# If you are using the API service provided by OpenAI, include the following line:\nOPENAI_API_TYPE=\"openai\"\n# If you are using the API service provided by Microsoft Azure, include the following lines:\nOPENAI_API_TYPE=\"azure\"\nAZURE_API_BASE=\"your_azure_api_base_url\"\nAZURE_API_VERSION=\"your_azure_api_version\"\n# ============ retriever configurations ============ \nBING_SEARCH_API_KEY=\"your_bing_search_api_key\" # if using bing search\n# ============ encoder configurations ============ \nENCODER_API_TYPE=\"openai\" # if using openai encoder\n```\n\n### STORM examples\n\n**To run STORM with `gpt` family models with default configurations:**\n\nRun the following command.\n```bash\npython examples/storm_examples/run_storm_wiki_gpt.py \\\n    --output-dir $OUTPUT_DIR \\\n    --retriever bing \\\n    --do-research \\\n    --do-generate-outline \\\n    --do-generate-article \\\n    --do-polish-article\n```\n\n**To run STORM using your favorite language models or grounding on your own corpus:** Check out [examples/storm_examples/README.md](examples/storm_examples/README.md).\n\n### Co-STORM examples\n\nTo run Co-STORM with `gpt` family models with default configurations,\n\n1. Add `BING_SEARCH_API_KEY=\"xxx\"` and `ENCODER_API_TYPE=\"xxx\"` to `secrets.toml`\n2. Run the following command\n\n```bash\npython examples/costorm_examples/run_costorm_gpt.py \\\n    --output-dir $OUTPUT_DIR \\\n    --retriever bing\n```\n\n\n## Customization of the Pipeline\n\n### STORM\n\nIf you have installed the source code, you can customize STORM based on your own use case. STORM engine consists of 4 modules:\n\n1. Knowledge Curation Module: Collects a broad coverage of information about the given topic.\n2. Outline Generation Module: Organizes the collected information by generating a hierarchical outline for the curated knowledge.\n3. Article Generation Module: Populates the generated outline with the collected information.\n4. Article Polishing Module: Refines and enhances the written article for better presentation.\n\nThe interface for each module is defined in `knowledge_storm/interface.py`, while their implementations are instantiated in `knowledge_storm/storm_wiki/modules/*`. These modules can be customized according to your specific requirements (e.g., generating sections in bullet point format instead of full paragraphs).\n\n### Co-STORM\n\nIf you have installed the source code, you can customize Co-STORM based on your own use case\n\n1. Co-STORM introduces multiple LLM agent types (i.e. Co-STORM experts and Moderator). LLM agent interface is defined in `knowledge_storm/interface.py` , while its implementation is instantiated in `knowledge_storm/collaborative_storm/modules/co_storm_agents.py`. Different LLM agent policies can be customized.\n2. Co-STORM introduces a collaborative discourse protocol, with its core function centered on turn policy management. We provide an example implementation of turn policy management through `DiscourseManager` in `knowledge_storm/collaborative_storm/engine.py`. It can be customized and further improved.\n\n## Datasets\nTo facilitate the study of automatic knowledge curation and complex information seeking, our project releases the following datasets:\n\n### FreshWiki\nThe FreshWiki Dataset is a collection of 100 high-quality Wikipedia articles focusing on the most-edited pages from February 2022 to September 2023. See Section 2.1 in [STORM paper](https://arxiv.org/abs/2402.14207) for more details.\n\nYou can download the dataset from [huggingface](https://huggingface.co/datasets/EchoShao8899/FreshWiki) directly. To ease the data contamination issue, we archive the [source code](https://github.com/stanford-oval/storm/tree/NAACL-2024-code-backup/FreshWiki) for the data construction pipeline that can be repeated at future dates.\n\n### WildSeek\nTo study users’ interests in complex information seeking tasks in the wild, we utilized data collected from the web research preview to create the WildSeek dataset. We downsampled the data to ensure the diversity of the topics and the quality of the data. Each data point is a pair comprising a topic and the user’s goal for conducting deep search on the topic.  For more details, please refer to Section 2.2 and Appendix A of [Co-STORM paper](https://www.arxiv.org/abs/2408.15232).\n\nThe WildSeek dataset is available [here](https://huggingface.co/datasets/YuchengJiang/WildSeek).\n\n## Replicate STORM & Co-STORM paper result\n\nFor STORM paper experiments, please switch to the branch `NAACL-2024-code-backup` [here](https://github.com/stanford-oval/storm/tree/NAACL-2024-code-backup).\n\nFor Co-STORM paper experiments, please switch to the branch `EMNLP-2024-code-backup` (placeholder for now, will be updated soon).\n\n## Roadmap & Contributions\nOur team is actively working on:\n1. Human-in-the-Loop Functionalities: Supporting user participation in the knowledge curation process.\n2. Information Abstraction: Developing abstractions for curated information to support presentation formats beyond the Wikipedia-style report.\n\nIf you have any questions or suggestions, please feel free to open an issue or pull request. We welcome contributions to improve the system and the codebase!\n\nContact person: [Yijia Shao](mailto:shaoyj@stanford.edu) and [Yucheng Jiang](mailto:yuchengj@stanford.edu)\n\n## Acknowledgement\nWe would like to thank Wikipedia for its excellent open-source content. The FreshWiki dataset is sourced from Wikipedia, licensed under the Creative Commons Attribution-ShareAlike (CC BY-SA) license.\n\nWe are very grateful to [Michelle Lam](https://michelle123lam.github.io/) for designing the logo for this project and [Dekun Ma](https://dekun.me) for leading the UI development.\n\nThanks to Vercel for their support of [open-source software](https://storm.genie.stanford.edu)\n\n## Citation\nPlease cite our paper if you use this code or part of it in your work:\n```bibtex\n@inproceedings{jiang-etal-2024-unknown,\n    title = \"Into the Unknown Unknowns: Engaged Human Learning through Participation in Language Model Agent Conversations\",\n    author = \"Jiang, Yucheng  and\n      Shao, Yijia  and\n      Ma, Dekun  and\n      Semnani, Sina  and\n      Lam, Monica\",\n    editor = \"Al-Onaizan, Yaser  and\n      Bansal, Mohit  and\n      Chen, Yun-Nung\",\n    booktitle = \"Proceedings of the 2024 Conference on Empirical Methods in Natural Language Processing\",\n    month = nov,\n    year = \"2024\",\n    address = \"Miami, Florida, USA\",\n    publisher = \"Association for Computational Linguistics\",\n    url = \"https://aclanthology.org/2024.emnlp-main.554/\",\n    doi = \"10.18653/v1/2024.emnlp-main.554\",\n    pages = \"9917--9955\",\n}\n\n@inproceedings{shao-etal-2024-assisting,\n    title = \"Assisting in Writing {W}ikipedia-like Articles From Scratch with Large Language Models\",\n    author = \"Shao, Yijia  and\n      Jiang, Yucheng  and\n      Kanell, Theodore  and\n      Xu, Peter  and\n      Khattab, Omar  and\n      Lam, Monica\",\n    editor = \"Duh, Kevin  and\n      Gomez, Helena  and\n      Bethard, Steven\",\n    booktitle = \"Proceedings of the 2024 Conference of the North American Chapter of the Association for Computational Linguistics: Human Language Technologies (Volume 1: Long Papers)\",\n    month = jun,\n    year = \"2024\",\n    address = \"Mexico City, Mexico\",\n    publisher = \"Association for Computational Linguistics\",\n    url = \"https://aclanthology.org/2024.naacl-long.347/\",\n    doi = \"10.18653/v1/2024.naacl-long.347\",\n    pages = \"6252--6278\",\n}\n```\n","summary":"STORM is an LLM-powered system designed to automate the generation of comprehensive, Wikipedia-style articles by conducting internet-based research. The project utilizes a two-stage pipeline that involves perspective-guided question generation to create detailed outlines followed by full-text drafting with citations. It also features Co-STORM, an extension that enables human-AI collaboration for more aligned and controlled knowledge curation. This tool is particularly beneficial for researchers, writers, and knowledge curators looking to streamline the pre-writing phase of information synthesis.","description":"An LLM-powered knowledge curation system that researches a topic and generates a full-length report with citations.","stars":28305,"language":"Python"},{"owner":"onlook-dev","repo":"onlook","url":"https://github.com/onlook-dev/onlook","readme":"<!-- Improved compatibility of back to top link: See: https://github.com/othneildrew/Best-README-Template/pull/73 -->\n\n<div align=\"center\">\n<img width=\"800\" alt=\"header image\" src=\"assets/web-preview.png\">\n<h3 align=\"center\">Onlook</h3>\n  <p align=\"center\">\n    Cursor for Designers\n    <br />\n    <a href=\"https://docs.onlook.com\"><strong>Explore the docs »</strong></a>\n    <br />\n  </p>\n  <p align=\"center\">\n    👨‍💻👩‍💻👨‍💻\n    <a href=\"https://www.ycombinator.com/companies/onlook/jobs/e4gHv1n-founding-engineer-fullstack\">We're hiring engineers in SF!</a>\n    👩‍💻👨‍💻👩‍💻\n  </p>\n    <br />\n    <a href=\"https://youtu.be/RSX_3EaO5eU?feature=shared\">View Demo</a>\n    ·\n    <a href=\"https://github.com/onlook-dev/onlook/issues/new?labels=bug&template=bug-report---.md\">Report Bug</a>\n    ·\n    <a href=\"https://github.com/onlook-dev/onlook/issues/new?labels=enhancement&template=feature-request---.md\">Request Feature</a>\n  </p>\n  <!-- PROJECT SHIELDS -->\n<!--\n*** I'm using markdown \"reference style\" links for readability.\n*** Reference links are enclosed in brackets [ ] instead of parentheses ( ).\n*** See the bottom of this document for the declaration of the reference variables\n*** for contributors-url, forks-url, etc. This is an optional, concise syntax you may use.\n*** https://www.markdownguide.org/basic-syntax/#reference-style-links\n-->\n<!-- [![Contributors][contributors-shield]][contributors-url]\n[![Forks][forks-shield]][forks-url]\n[![Stargazers][stars-shield]][stars-url]\n[![Issues][issues-shield]][issues-url]\n[![Apache License][license-shield]][license-url] -->\n\n[![Discord][discord-shield]][discord-url]\n[![LinkedIn][linkedin-shield]][linkedin-url]\n[![Twitter][twitter-shield]][twitter-url]\n\n[中文](https://www.readme-i18n.com/onlook-dev/onlook?lang=zh) |\n[Español](https://www.readme-i18n.com/onlook-dev/onlook?lang=es) |\n[Deutsch](https://www.readme-i18n.com/onlook-dev/onlook?lang=de) |\n[français](https://www.readme-i18n.com/onlook-dev/onlook?lang=fr) |\n[Português](https://www.readme-i18n.com/onlook-dev/onlook?lang=pt) |\n[Русский](https://www.readme-i18n.com/onlook-dev/onlook?lang=ru) |\n[日本語](https://www.readme-i18n.com/onlook-dev/onlook?lang=ja) |\n[한국어](https://www.readme-i18n.com/onlook-dev/onlook?lang=ko)\n\n</div>\n\n# An Open-Source, Visual-First Code Editor\n\nCraft websites, prototypes, and designs with AI in Next.js + TailwindCSS. Make\nedits directly in the browser DOM with a visual editor. Design in realtime with\ncode. An open-source alternative to Bolt.new, Lovable, V0, Replit Agent, Figma\nMake, Webflow, etc.\n\n### 🚧 🚧 🚧 Onlook is still under development 🚧 🚧 🚧\n\nWe're actively looking for contributors to help make Onlook for Web an\nincredible prompt-to-build experience. Check the\n[open issues](https://github.com/onlook-dev/onlook/issues) for a full list of\nproposed features (and known issues), and join our\n[Discord](https://discord.gg/hERDfFZCsH) to collaborate with hundreds of other\nbuilders.\n\n## What you can do with Onlook:\n\n- [x] Create Next.js app in seconds\n  - [x] Start from text or image\n  - [x] Use prebuilt templates\n  - [ ] Import from Figma\n  - [ ] Import from GitHub repo\n  - [ ] Make a PR to a GitHub repo\n- [x] Visually edit your app\n  - [x] Use Figma-like UI\n  - [x] Preview your app in real-time\n  - [x] Manage brand assets and tokens\n  - [x] Create and navigate to Pages\n  - [x] Browse layers\n  - [x] Manage project Images\n  - [x] Detect and use Components – _Previously in\n        [Onlook Desktop](https://github.com/onlook-dev/desktop)_\n  - [ ] Drag-and-drop Components Panel\n  - [x] Use Branching to experiment with designs\n- [x] Development Tools\n  - [x] Real-time code editor\n  - [x] Save and restore from checkpoints\n  - [x] Run commands via CLI\n  - [x] Connect with app marketplace\n- [x] Deploy your app in seconds\n  - [x] Generate sharable links\n  - [x] Link your custom domain    \n- [ ] Collaborate with your team\n  - [x] Real-time editing\n  - [ ] Leave comments\n- [ ] Advanced AI capabilities\n  - [x] Queue multiple messages at once\n  - [ ] Use Images as references and as assets in a project\n  - [ ] Setup and use MCPs in projects\n  - [ ] Allow Onlook to use itself as a toolcall for branch creation and iteration\n- [ ] Advanced project support\n  - [ ] Support non-NextJS projects\n  - [ ] Support non-Tailwind projects\n\n![Onlook-GitHub-Example](https://github.com/user-attachments/assets/642de37a-72cc-4056-8eb7-8eb42714cdc4)\n\n## Getting Started\n\nUse our [hosted app](https://onlook.com) or\n[run locally](https://docs.onlook.com/developers/running-locally).\n\n### Usage\n\nOnlook will run on any Next.js + TailwindCSS project, import your project into\nOnlook or start from scratch within the editor.\n\nUse the AI chat to create or edit a project you're working on. At any time, you\ncan always right-click an element to open up the exact location of the element\nin code.\n\n<img width=\"600\" alt=\"image\" src=\"https://github.com/user-attachments/assets/4ad9f411-b172-4430-81ef-650f4f314666\" />\n\n<br>\n\nDraw-in new divs and re-arrange them within their parent containers by\ndragging-and-dropping.\n\n<img width=\"600\" alt=\"image\" src=\"assets/insert-div.png\">\n\n<br>\n\nPreview the code side-by-side with your site design.\n\n<img width=\"600\" alt=\"image\" src=\"assets/code-connect.png\">\n\n<br>\n\nUse Onlook's editor toolbar to adjust Tailwind styles, directly manipulate\nobjects, and experiment with layouts.\n\n<img width=\"600\" alt=\"image\" src=\"assets/text-styling.png\" />\n\n## Documentation\n\nFor full documentation, visit [docs.onlook.com](https://docs.onlook.com)\n\nTo see how to Contribute, visit\n[Contributing to Onlook](https://docs.onlook.com/developers) in our docs.\n\n## How it works\n\n<img width=\"676\" alt=\"architecture\" src=\"assets/architecture.png\">\n\n1. When you create an app, we load the code into a web container\n2. The container runs and serves the code\n3. Our editor receives the preview link and displays it in an iFrame\n4. Our editor reads and indexes the code from the container\n5. We instrument the code in order to map elements to their place in code\n6. When the element is edited, we edit the element in our iFrame, then in code\n7. Our AI chat also has code access and tools to understand and edit the code\n\nThis architecture can theoretically scale to any language or framework that\ndisplays DOM elements declaratively (e.g. jsx/tsx/html). We are focused on\nmaking it work well with Next.js and TailwindCSS for now.\n\nFor a full walkthrough, check out our\n[Architecture Docs](https://docs.onlook.com/developers/architecture).\n\n### Our Tech Stack\n\n#### Front-end\n\n- [Next.js](https://nextjs.org/) - Full stack\n- [TailwindCSS](https://tailwindcss.com/) - Styling\n- [tRPC](https://trpc.io/) - Server interface\n\n#### Database\n\n- [Supabase](https://supabase.com/) - Auth, Database, Storage\n- [Drizzle](https://orm.drizzle.team/) - ORM\n\n#### AI\n\n- [AI SDK](https://ai-sdk.dev/) - LLM client\n- [OpenRouter](https://openrouter.ai/) - LLM model provider\n- [Morph Fast Apply](https://morphllm.com) - Fast apply model provider\n- [Relace](https://relace.ai) - Fast apply model provider\n\n#### Sandbox and hosting\n\n- [CodeSandboxSDK](https://codesandbox.io/docs/sdk) - Dev sandbox\n- [Freestyle](https://www.freestyle.sh/) - Hosting\n\n#### Runtime\n\n- [Bun](https://bun.sh/) - Monorepo, runtime, bundler\n- [Docker](https://www.docker.com/) - Container management\n\n## Contributing\n\n![image](https://github.com/user-attachments/assets/ecc94303-df23-46ae-87dc-66b040396e0b)\n\nIf you have a suggestion that would make this better, please fork the repo and\ncreate a pull request. You can also\n[open issues](https://github.com/onlook-dev/onlook/issues).\n\nSee the [CONTRIBUTING.md](CONTRIBUTING.md) for instructions and code of conduct.\n\n#### Contributors\n\n<a href=\"https://github.com/onlook-dev/onlook/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=onlook-dev/onlook\" />\n</a>\n\n## Contact\n\n![image](https://github.com/user-attachments/assets/60684b68-1925-4550-8efd-51a1509fc953)\n\n- Team: [Discord](https://discord.gg/hERDfFZCsH) -\n  [Twitter](https://twitter.com/onlookdev) -\n  [LinkedIn](https://www.linkedin.com/company/onlook-dev/) -\n  [Email](mailto:contact@onlook.com)\n- Project:\n  [https://github.com/onlook-dev/onlook](https://github.com/onlook-dev/onlook)\n- Website: [https://onlook.com](https://onlook.com)\n\n## License\n\nDistributed under the Apache 2.0 License. See [LICENSE.md](LICENSE.md) for more\ninformation.\n\n<!-- https://www.markdownguide.org/basic-syntax/#reference-style-links -->\n\n[contributors-shield]: https://img.shields.io/github/contributors/onlook-dev/studio.svg?style=for-the-badge\n[contributors-url]: https://github.com/onlook-dev/onlook/graphs/contributors\n[forks-shield]: https://img.shields.io/github/forks/onlook-dev/studio.svg?style=for-the-badge\n[forks-url]: https://github.com/onlook-dev/onlook/network/members\n[stars-shield]: https://img.shields.io/github/stars/onlook-dev/studio.svg?style=for-the-badge\n[stars-url]: https://github.com/onlook-dev/onlook/stargazers\n[issues-shield]: https://img.shields.io/github/issues/onlook-dev/studio.svg?style=for-the-badge\n[issues-url]: https://github.com/onlook-dev/onlook/issues\n[license-shield]: https://img.shields.io/github/license/onlook-dev/studio.svg?style=for-the-badge\n[license-url]: https://github.com/onlook-dev/onlook/blob/master/LICENSE.txt\n[linkedin-shield]: https://img.shields.io/badge/-LinkedIn-black.svg?logo=linkedin&colorB=555\n[linkedin-url]: https://www.linkedin.com/company/onlook-dev\n[twitter-shield]: https://img.shields.io/badge/-Twitter-black?logo=x&colorB=555\n[twitter-url]: https://x.com/onlookdev\n[discord-shield]: https://img.shields.io/badge/-Discord-black?logo=discord&colorB=555\n[discord-url]: https://discord.gg/hERDfFZCsH\n[React.js]: https://img.shields.io/badge/react-%2320232a.svg?logo=react&logoColor=%2361DAFB\n[React-url]: https://reactjs.org/\n[TailwindCSS]: https://img.shields.io/badge/tailwindcss-%2338B2AC.svg?logo=tailwind-css&logoColor=white\n[Tailwind-url]: https://tailwindcss.com/\n[Electron.js]: https://img.shields.io/badge/Electron-191970?logo=Electron&logoColor=white\n[Electron-url]: https://www.electronjs.org/\n[Vite.js]: https://img.shields.io/badge/vite-%23646CFF.svg?logo=vite&logoColor=white\n[Vite-url]: https://vitejs.dev/\n[product-screenshot]: assets/brand.png\n[weave-shield]: https://img.shields.io/endpoint?url=https%3A%2F%2Fapp.workweave.ai%2Fapi%2Frepository%2Fbadge%2Forg_pWcXBHJo3Li2Te2Y4WkCPA33%2F820087727&cacheSeconds=3600&labelColor=#131313\n[weave-url]: https://app.workweave.ai/reports/repository/org_pWcXBHJo3Li2Te2Y4WkCPA33/820087727\n","summary":"Onlook is an open-source, visual-first code editor designed to bridge the gap between design and development for Next.js and TailwindCSS projects. It provides a Figma-like interface that allows users to edit the DOM in real-time, generate applications from text or images, and manage components visually while maintaining a live connection to the underlying codebase. This tool is ideal for designers and developers who want to streamline their workflow by building, prototyping, and deploying web applications through a collaborative, visual-first experience.","description":"The Cursor for Designers • An Open-Source AI-First Design tool • Visually build, style, and edit your React App with AI","stars":25870,"language":"TypeScript"},{"owner":"datawhalechina","repo":"happy-llm","url":"https://github.com/datawhalechina/happy-llm","readme":"<div align='center'>\n    <img src=\"./images/head.jpg\" alt=\"alt text\" width=\"100%\">\n    <h1>Happy-LLM</h1>\n</div>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/github/stars/datawhalechina/happy-llm?style=flat&logo=github\" alt=\"GitHub stars\"/>\n  <img src=\"https://img.shields.io/github/forks/datawhalechina/happy-llm?style=flat&logo=github\" alt=\"GitHub forks\"/>\n  <img src=\"https://img.shields.io/badge/language-Chinese-brightgreen?style=flat\" alt=\"Language\"/>\n  <a href=\"https://github.com/datawhalechina/happy-llm\"><img src=\"https://img.shields.io/badge/GitHub-Project-blue?style=flat&logo=github\" alt=\"GitHub Project\"></a>\n  <a href=\"https://swanlab.cn/@kmno4/Happy-LLM/overview\"><img src=\"https://raw.githubusercontent.com/SwanHubX/assets/main/badge1.svg\" alt=\"SwanLab\"></a>\n</div>\n\n<div align=\"center\">\n  <a href=\"https://trendshift.io/repositories/14175\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/14175\" alt=\"datawhalechina%2Fhappy-llm | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</div>\n\n<div align=\"center\">\n\n[中文](./README.md) | [English](./README_en.md)\n\n</div>\n\n<div align=\"center\">\n  <p><a href=\"https://datawhalechina.github.io/happy-llm/\">📚 在线阅读地址</a></p>\n  <h3>📚 从零开始构建大模型</h3>\n  <p><em>深入理解 LLM 核心原理，动手实现你的第一个大模型</em></p>\n</div>\n\n---\n\n## 🎯 项目介绍\n\n> &emsp;&emsp;*很多小伙伴在看完 Datawhale开源项目： [self-llm 开源大模型食用指南](https://github.com/datawhalechina/self-llm) 后，感觉意犹未尽，想要深入了解大语言模型的原理和训练过程。于是我们（Datawhale）决定推出《Happy-LLM》项目，旨在帮助大家深入理解大语言模型的原理和训练过程。*\n\n&emsp;&emsp;本项目是一个**系统性的 LLM 学习教程**，将从 NLP 的基本研究方法出发，根据 LLM 的思路及原理逐层深入，依次为读者剖析 LLM 的架构基础和训练过程。同时，我们会结合目前 LLM 领域最主流的代码框架，演练如何亲手搭建、训练一个 LLM，期以实现授之以鱼，更授之以渔。希望大家能从这本书开始走入 LLM 的浩瀚世界，探索 LLM 的无尽可能。\n\n### ✨ 你将收获什么？\n\n- 📚 **Datawhale 开源免费** 完全免费的学习本项目所有内容\n- 🔍 **深入理解** Transformer 架构和注意力机制\n- 📚 **掌握** 预训练语言模型的基本原理\n- 🧠 **了解** 现有大模型的基本结构\n- 🏗️ **动手实现** 一个完整的 LLaMA2 模型\n- ⚙️ **掌握训练** 从预训练到微调的全流程\n- 🚀 **实战应用** RAG、Agent 等前沿技术\n\n## 📖 内容导航\n\n| 章节 | 关键内容 | 状态 |\n| --- | --- | --- |\n| [学习与环境准备](./docs/学习与环境准备.md) | 分章依赖、硬件建议与实践入口 | ✅ |\n| [前言](./docs/前言.md) | 本项目的缘起、背景及读者建议 | ✅ |\n| [第一章 NLP 基础概念](./docs/chapter1/第一章%20NLP基础概念.md) | 什么是 NLP、发展历程、任务分类、文本表示演进 | ✅ |\n| [第二章 Transformer 架构](./docs/chapter2/第二章%20Transformer架构.md) | 注意力机制、Encoder-Decoder、手把手搭建 Transformer | ✅ |\n| [第三章 预训练语言模型](./docs/chapter3/第三章%20预训练语言模型.md) | Encoder-only、Encoder-Decoder、Decoder-Only 模型对比 | ✅ |\n| [第四章 大语言模型](./docs/chapter4/第四章%20大语言模型.md) | LLM 定义、训练策略、涌现能力分析 | ✅ |\n| [第五章 动手搭建大模型](./docs/chapter5/第五章%20动手搭建大模型.md) | 实现 LLaMA2、训练 Tokenizer、预训练小型 LLM | ✅ |\n| [第六章 大模型训练实践](./docs/chapter6/第六章%20大模型训练流程实践.md) | 预训练、有监督微调、LoRA/QLoRA 高效微调 | ✅ |\n| [第七章 大模型应用](./docs/chapter7/第七章%20大模型应用.md) | 模型评测、RAG 检索增强、Agent 智能体 | ✅ |\n| [Extra Chapter LLM Blog](./Extra-Chapter/) | 优秀的大模型 学习笔记/Blog ，欢迎大家来 PR ！| 🚧 |\n\n> 第六章正文已覆盖 Pretrain、SFT 与 PEFT 等核心训练流程，建议结合 [第六章实践说明](./docs/chapter6/readme.md) 和 [学习与环境准备](./docs/学习与环境准备.md) 一起阅读；偏好对齐可继续参考 [第六章补充专题](./docs/chapter6/6.4%5BWIP%5D%20偏好对齐.md)。\n\n### Extra Chapter LLM Blog\n\n- [大模型都这么厉害了，微调0.6B的小模型有什么意义？](./Extra-Chapter/why-fine-tune-small-large-language-models/readme.md) @[不要葱姜蒜](https://github.com/KMnO4-zx) 2025-7-11\n\n- [Transformer 整体模块设计解读](./Extra-Chapter/transformer-architecture/) @[ditingdapeng](https://github.com/ditingdapeng) 2025-7-14\n\n- [文本数据处理详解](./Extra-Chapter/text-data-processing/readme.md) @[蔡鋆捷](https://github.com/xinala-781) 2025-7-14\n\n- [Qwen3-\"VL\"——超小中文多模态模型的“拼接微调”之路](./Extra-Chapter/vlm-concatenation-finetune/README.md) @[ShaohonChen](https://github.com/ShaohonChen) 2025-7-30\n\n- [S1: Thinking Budget with vLLM](./Extra-Chapter/s1-vllm-thinking-budget/readme.md) @[不要葱姜蒜](https://github.com/kmno4-zx) 2025-8-03\n\n\n- [CDDRS: 使用细粒度语义信息指导增强的RAG检索方法](./Extra-Chapter/CDDRS/readme.md) @[Hongru0306](https://github.com/Hongru0306) 2025-8-21\n\n- [大模型生成 Token 的方式有哪些？](./Extra-Chapter/generation-method/readme.md) @[不要葱姜蒜](https://github.com/kmno4-zx) 2025-10-17\n\n\n> &emsp;&emsp;*如果大家在学习 Happy-LLM 项目或 LLM 相关知识中有自己独到的见解、认知、实践，欢迎大家 PR 在 [Extra Chapter LLM Blog](./Extra-Chapter/) 中。请遵守 Extra Chapter LLM Blog 的 [PR 规范](./Extra-Chapter/Readme.md)，我们会视 PR 内容的质量和价值来决定是否合并或补充到 Happy-LLM 正文中来。*\n\n### 模型下载\n\n| 模型名称 | 下载地址 |\n| --- | --- |\n| Happy-LLM-Chapter5-Base-215M | [🤖 ModelScope](https://www.modelscope.cn/models/kmno4zx/happy-llm-215M-base) |\n| Happy-LLM-Chapter5-SFT-215M | [🤖 ModelScope](https://www.modelscope.cn/models/kmno4zx/happy-llm-215M-sft) |\n\n> *ModelScope 创空间体验地址：[🤖 创空间](https://www.modelscope.cn/studios/kmno4zx/happy_llm_215M_sft)*\n\n\n### PDF 版本下载\n\n&emsp;&emsp;***本 Happy-LLM PDF 教程完全开源免费。为防止各类营销号加水印后贩卖给大模型初学者，我们特地在 PDF 文件中预先添加了不影响阅读的 Datawhale 开源标志水印，敬请谅解～***\n\n> *Happy-LLM PDF : https://github.com/datawhalechina/happy-llm/releases/tag/v1.0.2*  \n\n### PPT 资源下载\n\n&emsp;&emsp;***本项目配套教学讲义PPT课件资源获取链接：https://github.com/HZAI-ZJNU/happy-llm-ppt 或可在本项目的 [Releases](https://github.com/datawhalechina/happy-llm/releases) 页面下载。***\n\n## 💡 如何学习\n\n&emsp;&emsp;本项目适合大学生、研究人员、LLM 爱好者。在学习本项目之前，建议具备一定的编程经验，尤其是要对 Python 编程语言有一定的了解。最好具备深度学习的相关知识，并了解 NLP 领域的相关概念和术语，以便更轻松地学习本项目。\n\n&emsp;&emsp;如果你计划复现章节代码，建议先阅读 [学习与环境准备](./docs/学习与环境准备.md)。仓库当前按章节拆分依赖，不同章节建议使用独立的 Python 环境，以减少版本冲突。\n\n&emsp;&emsp;本项目分为两部分——基础知识与实战应用。第1章～第4章是基础知识部分，从浅入深介绍 LLM 的基本原理。其中，第1章简单介绍 NLP 的基本任务和发展，为非 NLP 领域研究者提供参考；第2章介绍 LLM 的基本架构——Transformer，包括原理介绍及代码实现，作为 LLM 最重要的理论基础；第3章整体介绍经典的 PLM，包括 Encoder-Only、Encoder-Decoder 和 Decoder-Only 三种架构，也同时介绍了当前一些主流 LLM 的架构和思想；第4章则正式进入 LLM 部分，详细介绍 LLM 的特点、能力和整体训练过程。第5章～第7章是实战应用部分，将逐步带领大家深入 LLM 的底层细节。其中，第5章将带领大家者基于 PyTorch 层亲手搭建一个 LLM，并实现预训练、有监督微调的全流程；第6章将引入目前业界主流的 LLM 训练框架 Transformers，带领学习者基于该框架快速、高效地实现 LLM 训练过程；第7章则将介绍 基于 LLM 的各种应用，补全学习者对 LLM 体系的认知，包括 LLM 的评测、检索增强生成（Retrieval-Augmented Generation，RAG）、智能体（Agent）的思想和简单实现。你可以根据个人兴趣和需求，选择性地阅读相关章节。\n\n&emsp;&emsp;在阅读本书的过程中，建议你将理论和实际相结合。LLM 是一个快速发展、注重实践的领域，我们建议你多投入实战，复现本书提供的各种代码，同时积极参加 LLM 相关的项目与比赛，真正投入到 LLM 开发的浪潮中。我们鼓励你关注 Datawhale 及其他 LLM 相关开源社区，当遇到问题时，你可以随时在本项目的 issue 区提问。\n\n&emsp;&emsp;最后，欢迎每一位读者在学习完本项目后加入到 LLM 开发者的行列。作为国内 AI 开源社区，我们希望充分聚集共创者，一起丰富这个开源 LLM 的世界，打造更多、更全面特色 LLM 的教程。星火点点，汇聚成海。我们希望成为 LLM 与普罗大众的阶梯，以自由、平等的开源精神，拥抱更恢弘而辽阔的 LLM 世界。\n\n> - 中国计算机学会(CCF) × Datawhale × GitLink开源平台联合推出AI普惠课程，免费算力报名参加 [【报名地址】](https://mp.weixin.qq.com/s/P03f3e2vUUh7OxDP40Ra6w)[【GitLink 地址】](https://gitlink.org.cn/datawhalechina/happy-llm)\n\n## 🤝 如何贡献\n\n我们欢迎任何形式的贡献！\n\n- 🐛 **报告 Bug** - 发现问题请提交 Issue\n- 💡 **功能建议** - 有好想法就告诉我们\n- 📝 **内容完善** - 帮助改进教程内容\n- 🔧 **代码优化** - 提交 Pull Request\n\n## 🙏 致谢\n\n### 核心贡献者\n- [宋志学-项目负责人](https://github.com/KMnO4-zx) (Datawhale成员)\n- [邹雨衡-项目负责人](https://github.com/logan-zou) (Datawhale成员-对外经济贸易大学)\n- [朱信忠-指导专家](https://xinzhongzhu.github.io/)（Datawhale首席科学家-浙江师范大学杭州人工智能研究院教授）\n\n### Extra-Chapter 贡献者\n\n- [ditingdapeng](https://github.com/ditingdapeng)（内容贡献者-云原生基础架构工程师）\n- [蔡鋆捷](https://github.com/xinala-781)（内容贡献者-福州大学）\n- [ShaohonChen](https://github.com/ShaohonChen) （情感机器实验室研究员-西安电子科技大学在读硕士）\n- [肖鸿儒, 庄健琨](https://github.com/Hongru0306) (内容贡献者-同济大学)\n\n### 特别感谢\n- 感谢 [@Sm1les](https://github.com/Sm1les) 对本项目的帮助与支持\n- 感谢所有为本项目做出贡献的开发者们 ❤️\n\n<div align=center style=\"margin-top: 30px;\">\n  <a href=\"https://github.com/datawhalechina/happy-llm/graphs/contributors\">\n    <img src=\"https://contrib.rocks/image?repo=datawhalechina/happy-llm\" />\n  </a>\n</div>\n\n## Star History\n\n<div align='center'>\n    <img src=\"./images/star-history-20251017.png\" alt=\"Datawhale\" width=\"90%\">\n</div>\n\n<div align=\"center\">\n  <p>⭐ 如果这个项目对你有帮助，请给我们一个 Star！</p>\n</div>\n\n## 关于 Datawhale\n\n<div align='center'>\n    <img src=\"./images/datawhale.png\" alt=\"Datawhale\" width=\"30%\">\n    <p>扫描二维码关注 Datawhale 公众号，获取更多优质开源内容</p>\n</div>\n\n---\n\n## 📜 开源协议\n\n本作品采用[知识共享署名-非商业性使用-相同方式共享 4.0 国际许可协议](http://creativecommons.org/licenses/by-nc-sa/4.0/)进行许可。\n","summary":"Happy-LLM is a comprehensive, open-source educational project designed to guide users through the fundamental principles and practical implementation of Large Language Models (LLMs). The curriculum covers essential topics ranging from NLP basics and Transformer architectures to advanced training techniques like pre-training, supervised fine-tuning, and LoRA/QLoRA efficiency. Through hands-on exercises, such as building a LLaMA2 model from scratch, learners gain the technical skills necessary to navigate modern LLM development, RAG, and agent-based applications. This project is an ideal resource for students, researchers, and developers looking to transition from theoretical understanding to building their own high-performance AI models.","description":"📚 从零开始构建大模型","stars":30847,"language":"Jupyter Notebook"},{"owner":"MotiaDev","repo":"motia","url":"https://github.com/MotiaDev/motia","readme":"# iii\n\n![iii: point-to-point integrations vs zero-integration via shared runtime](.github/assets/zero-integration.png)\n\n[![Engine License](https://img.shields.io/badge/engine-ELv2-blue.svg)](engine/LICENSE)\n[![SDK License](https://img.shields.io/badge/sdk-Apache--2.0-green.svg)](sdk/LICENSE)\n[![Docker](https://img.shields.io/docker/v/iiidev/iii?label=docker)](https://hub.docker.com/r/iiidev/iii)\n[![npm](https://img.shields.io/npm/v/iii-sdk?label=npm)](https://www.npmjs.com/package/iii-sdk)\n[![PyPI](https://img.shields.io/pypi/v/iii-sdk?label=pypi)](https://pypi.org/project/iii-sdk/)\n[![Crates.io](https://img.shields.io/badge/dynamic/json?url=https%3A%2F%2Fcrates.io%2Fapi%2Fv1%2Fcrates%2Fiii-sdk&query=%24.crate.max_stable_version&label=crates.io&prefix=v&color=orange)](https://crates.io/crates/iii-sdk)\n\n## What is iii?\n\niii is the easiest way to compose, extend, and observe every service in your stack in real time.\n\nEvery backend starts as a project before the first line of business logic. Queues, cron, HTTP,\nstate, observability, agents, and sandboxes each usually bring their own integration story. iii\ncollapses that into one live system surface.\n\n```bash\niii worker add queue\niii worker add agent\niii worker add sandbox\niii worker add <anything>\n```\n\nEach worker joins the live catalog. Every other worker is notified and can call it immediately.\nBrowse available workers at [workers.iii.dev](https://workers.iii.dev/).\n\nThat is the agent story too: when a task needs a capability the system does not have, an agent can\nadd a worker, discover its functions, call them, and trace what happened. Same interface a developer\nuses.\n\n### Three Primitives\n\nWorker _ Function _ Trigger is the entire mental model.\n\n**Workers** are processes that register with the iii engine and then register triggers and\nfunctions. A TypeScript API service is a worker. A Python data pipeline is a worker. A Rust\nmicroservice is a worker. Any functionality can be transformed into a worker with a few lines of\ncode. Workers can also create other workers at runtime, so agents and applications can extend the\nsystem while it is running.\n\n**Triggers** are anything that causes a function to run. A trigger can be a direct call to a\nfunction, an HTTP endpoint, a cron schedule, a queue subscription, a state change, a stream event,\nor anything else. Triggers are declarative: the Worker defines \"this function runs when this thing\nhappens,\" and iii handles routing, serialization, and delivery.\n\n**Functions** are units of work with a stable identifier (e.g., `content::classify`,\n`orders::validate`). It receives input, does work, and optionally returns output. Functions exist in\nworkers.\n\nBy mapping everything a service can do to these three primitives iii creates a development process\nthat is both effortlessly composable, and completely observable.\n\n## What Changes\n\nBefore iii:\n\n- New observability tool: uncountable integrations\n- New agent harness: separate retry config, separate traces, separate timeouts\n- New queue: vendor evaluation, procurement, and weeks of integration\n\nAfter iii:\n\n- `iii worker add observability`\n- `iii worker add queue`\n- Done. It is in the system, traceable, and callable.\n\nPlatform teams publish workers. Application teams register functions and declare triggers. Agents\nuse the same catalog and the same function calls.\n\nExtending iii is `iii worker add`. Composing iii is calling functions. Observing iii is opening the\ntrace.\n\n## Quick Start\n\n<a href=\"https://assets.motia.dev/videos/mp4/site/v1/iii-intro.mp4\">\n  <img src=\".github/assets/iii-intro-preview.gif\" alt=\"Watch the iii intro (click to play)\" width=\"720\"/>\n</a>\n\n```bash\niii project init myapp    # scaffold a project\ncd myapp\niii                       # start the engine\n```\n\nNeed to install `iii` first? Full walkthrough at the\n[Quickstart guide](https://iii.dev/docs/quickstart).\n\n## Add Workers\n\nInstall new capabilities into a project with `iii worker add`:\n\n[![Adding a worker with iii worker add](.github/assets/workers-add.gif)](https://workers.iii.dev/)\n\n## SDKs\n\n| Language | Package                                            | Install                                     |\n| -------- | -------------------------------------------------- | ------------------------------------------- |\n| Node.js  | [`iii-sdk`](https://www.npmjs.com/package/iii-sdk) | `pnpm add iii-sdk` or `npm install iii-sdk` |\n| Python   | [`iii-sdk`](https://pypi.org/project/iii-sdk/)     | `pip install iii-sdk`                       |\n| Rust     | [`iii-sdk`](https://crates.io/crates/iii-sdk)      | Add to `Cargo.toml`                         |\n\n## Agent Skills\n\nInstall iii's agent-readable reference material:\n\n```bash\nnpx skills add iii-hq/iii/skills\n```\n\nSkills cover every iii primitive: HTTP endpoints, queues, cron, state, streams, custom triggers, and\nmore. See [skills/](skills/) for the full list.\n\n## Console\n\nThe [iii-console](console/) is a developer and operations console for inspecting workers, functions,\ntriggers, queues, traces, logs, and real-time state. See the\n[Console docs](https://iii.dev/docs/using-iii/console) for setup and usage.\n\n## Repository Structure\n\n| Directory  | What it is                                              | README                                 |\n| ---------- | ------------------------------------------------------- | -------------------------------------- |\n| `engine/`  | iii Engine (Rust) - core runtime, modules, and protocol | [engine/README.md](engine/README.md)   |\n| `sdk/`     | SDKs for Node.js, Python, and Rust                      | [sdk/README.md](sdk/README.md)         |\n| `console/` | Developer console (React + Rust)                        | [console/README.md](console/README.md) |\n| `skills/`  | Agent-readable reference material                       | [skills/README.md](skills/README.md)   |\n| `website/` | iii website                                             | [website/](website/)                   |\n| `docs/`    | Documentation site (Mintlify/MDX)                       | [docs/README.md](docs/README.md)       |\n\nSee [STRUCTURE.md](STRUCTURE.md) for the full monorepo layout, dependency chain, and CI/CD details.\n\n## Examples\n\nSee the [Quickstart guide](https://iii.dev/docs/quickstart) for step-by-step tutorials.\n\n## Resources\n\n- [Documentation](https://iii.dev/docs)\n- [CLI & Engine](https://github.com/iii-hq/iii)\n- [Console](console/)\n- [Examples](https://github.com/iii-hq/iii-examples)\n- [Contributing](CONTRIBUTING.md)\n\n## License\n\nThe iii is licensed as such:\n\n| Directory  | License
