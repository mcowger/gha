elow)**\n\nThank you :) it genuinely helps keep the project maintained.\n\n</details>\n","summary":" Layerleak is an OCI-compliant container image secret scanner that analyzes public images from any registry—such as Docker Hub, GHCR, Quay, and Amazon ECR—without requiring a local Docker daemon. Unlike traditional tools that treat images as flat blobs, it performs deep, read-only inspection of image layers, config metadata, environment variables, and build history, including artifacts from deleted layers that often conceal leaked credentials. The scanner deduplicates findings by manifest digest and secret fingerprint, and supports both CLI usage and API deployment with PostgreSQL persistence, making it ideal for security teams and DevOps engineers who need to audit container images for hardcoded secrets across distributed registry environments.","description":"layerleak the Docker Hub Secret Scanner","stars":35,"language":"Go"},{"owner":"zdenham","repo":"anvil","url":"https://github.com/zdenham/anvil","readme":"<p align=\"center\">\n  <img src=\"assets/branding/logo-rounded.png\" alt=\"Anvil\" width=\"128\" height=\"128\" />\n</p>\n\n<h1 align=\"center\">Anvil</h1>\n\n<p align=\"center\">\n  <em>More agents, less pain.</em>\n</p>\n\n<p align=\"center\">\n  A desktop IDE for parallel agent work.<br/>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/tbkAetedSd\">Discord</a> ·\n  <a href=\"https://www.anvil.fm\">Download</a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"assets/branding/screenshot.png\" alt=\"Anvil screenshot\" width=\"800\" />\n</p>\n\n## Motivation\n\nI built Anvil after getting tired of managing multiple Claude Code sessions in my terminal. I felt the pain of constantly context switching between terminal tabs and git branches, forgetting which agent did what, agents bumping into each other on the same branch, not knowing when an agent was done or needing input...\n\nAnvil solves the annoyances of parallel agent work, so you can cook on new things while your agents run. Agent lifecycle, isolation, planning and coordination, context hygiene — all handled by the IDE. But more than this, the goal of Anvil is to push the frontier of what is possible with agent programming.\n\nI hope you get a chance to try out Anvil. Let me know if you have any feedback, and please join the [Discord](https://discord.gg/tbkAetedSd).\n\nLet's cook some GPUs together 🔥\n\n## Features\n\n| Feature | Description |\n| --- | --- |\n| **Workspace management** | Isolated worktrees let you parallelize without merge conflicts. |\n| **First-class spec support** | Phase tracking, context hygiene, and plan execution — built into the workflow, not bolted on. |\n| **Full IDE** | Terminal, file editor, diff viewer — everything you need in one window. |\n| **REPL & orchestration** | Let Claude call other Claudes programmatically. Flexible building blocks, not rigid workflows. |\n| **Visual flexibility** | Arrange your agents in up to a 4×3 grid of panels. Your workspace, your layout. |\n| **Sub-agent visibility** | No more black boxes. See what child and grandchild agents are actually doing. |\n\n## License\n\n[MIT](LICENSE)\n","summary":" Anvil is a desktop IDE designed to streamline parallel AI agent workflows, eliminating the friction of managing multiple coding agents across scattered terminal tabs. It provides isolated worktrees to prevent merge conflicts, built-in orchestration allowing agents to spawn and monitor sub-agents programmatically, and a customizable visual layout supporting up to a 4×3 grid of panels. The tool handles agent lifecycle management, context hygiene, and coordination while integrating essential IDE features including terminals, file editors, and diff viewers. Developers who rely on AI coding assistants like Claude Code and need to run multiple concurrent agents without constant context switching or branch collisions will find it particularly valuable.","description":"IDE for parallel agent work. Create worktrees in one click. Share plans between agents. Execute with parallelism + isolation.","stars":83,"language":"TypeScript"},{"owner":"amaar-mc","repo":"wit","url":"https://github.com/amaar-mc/wit","readme":"<p align=\"center\">\n  <img src=\"logo.png\" alt=\"wit\" width=\"400\" />\n</p>\n<p align=\"center\">\n  <strong>Agent coordination protocol for shared codebases</strong>\n</p>\n<p align=\"center\">\n  Declare intents. Lock symbols. Detect conflicts. Before code is written.\n</p>\n<p align=\"center\">\n  <a href=\"https://github.com/amaar-mc/wit/actions/workflows/ci.yml\"><img src=\"https://github.com/amaar-mc/wit/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://www.npmjs.com/package/wit-protocol\"><img src=\"https://img.shields.io/npm/v/wit-protocol\" alt=\"npm\"></a>\n  <a href=\"https://github.com/amaar-mc/wit/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/amaar-mc/wit\" alt=\"License\"></a>\n  <a href=\"https://github.com/amaar-mc/wit/stargazers\"><img src=\"https://img.shields.io/github/stars/amaar-mc/wit?style=social\" alt=\"Stars\"></a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"demo.gif\" alt=\"Wit demo — two agents, same file, LOCK_CONFLICT\" width=\"600\" />\n</p>\n\n**Wit** coordinates multiple AI coding agents working on the same repository simultaneously. It sits between your agents and git — git handles version control, Wit prevents the conflicts.\n\nThe name comes from the word itself: the intelligence to coordinate before colliding. It also stands for **W**orkspace **I**ntent **T**racker.\n\n## The Problem\n\nYou have three Claude Code instances (or Cursor, Copilot, Devin — any combination) working on the same repo. Without coordination, they each write code independently and produce merge conflicts that waste time and break work.\n\nGit detects conflicts **after** they happen. Wit prevents them **before** code is written.\n\n## How It Works\n\nWit runs a lightweight daemon in the background. Agents communicate with it over a Unix socket using JSON-RPC. The daemon tracks four things:\n\n| Primitive | What it does | Example |\n|-----------|-------------|---------|\n| **Intents** | Agent announces planned work scope | \"I'm refactoring the auth module\" |\n| **Locks** | Agent reserves a specific function/type/class | Lock `src/auth.ts:validateToken` |\n| **Conflicts** | Daemon warns when intents or locks overlap | \"Agent B also declared intent on auth.ts\" |\n| **Contracts** | Agents agree on function signatures | \"validateToken accepts string, returns boolean\" |\n\nIntents and locks are **warnings, not blocks**. Agents always get to decide what to do. The only hard enforcement is contracts — a git pre-commit hook blocks commits that violate an accepted contract signature.\n\n## Quick Start\n\n### Prerequisites\n\nWit requires [Bun](https://bun.sh) (v1.0+). It uses Bun-native APIs for the daemon, SQLite, and process management. Install Bun if you don't have it:\n\n```bash\ncurl -fsSL https://bun.sh/install | bash\n```\n\n### Install the CLI\n\n**From npm:**\n```bash\nbun install -g wit-protocol\n```\n\n**From source:**\n```bash\ngit clone https://github.com/amaar-mc/wit.git\ncd wit\nbun install\nbun link\n```\n\nAfter either method, the `wit` command is available globally.\n\n### Initialize in your repo\n\n```bash\ncd your-project\nwit init\n```\n\nThis creates a `.wit/` directory, starts the daemon, and generates a `CLAUDE.md` with coordination instructions. You only run this once per project — the daemon auto-starts on subsequent commands.\n\nEvery Claude Code session in this project will now automatically read the `CLAUDE.md` and follow the coordination protocol. Agents declare intents, lock symbols, and respect conflicts without any manual setup.\n\n### Basic workflow\n\n```bash\n# See what's happening\nwit status\n\n# Declare intent before working\nwit declare --description \"Adding rate limiting to API\" --files src/api.ts --files src/middleware.ts\n\n# Lock a specific function you're about to modify\nwit lock --symbol \"src/api.ts:handleRequest\"\n\n# Check status — your intent and lock are visible to all agents\nwit status\n\n# Release when done\nwit release --symbol \"src/api.ts:handleRequest\"\n\n# Watch live updates (like htop for coordination)\nwit watch\n```\n\n### What agents see\n\nWhen Agent B tries to work in an area Agent A has claimed:\n\n```bash\n# Agent B declares intent on the same file\n$ wit declare --description \"Fixing auth bug\" --files src/api.ts\n\n# Response includes conflict warning:\n# {\n#   \"intentId\": \"abc-123\",\n#   \"conflicts\": {\n#     \"hasConflicts\": true,\n#     \"items\": [{\n#       \"type\": \"INTENT_OVERLAP\",\n#       \"message\": \"Agent A has active intent on src/api.ts\"\n#     }]\n#   }\n# }\n```\n\nAgent B sees the warning, checks what Agent A is doing, and chooses to work on a different part of the codebase.\n\n## Claude Code Plugin\n\nWit ships as a Claude Code plugin. Once installed, agents automatically declare intents and lock symbols before editing — no manual configuration.\n\n**Step 1:** Add the Wit marketplace (one-time)\n```\n/plugin marketplace add amaar-mc/wit\n```\n\n**Step 2:** Install the plugin\n```\n/plugin install wit@amaar-mc-wit\n```\n\n**Step 3:** Make sure the CLI is installed (see [Install the CLI](#install-the-cli) above)\n\n**Step 4:** Initialize Wit in your project\n```bash\nwit init\n```\n\nThat's it. Every Claude Code instance in the project now coordinates automatically.\n\n**What the plugin provides:**\n\n- **`wit:coordinate` skill** — Instructs agents to declare intents and acquire locks before editing code. Activates automatically when `.wit/` exists.\n- **Session hook** — On session start, loads current coordination state so agents immediately see what other agents are working on.\n\n**Without Claude Code:** Wit works with any AI agent that can run shell commands. Add instructions to your agent's system prompt to call `wit declare`, `wit lock`, `wit status`, and `wit release`. See the [Protocol Specification](#protocol-specification) for the raw JSON-RPC API.\n\n## Commands\n\n| Command | What it does |\n|---------|-------------|\n| `wit init` | Create `.wit/`, start daemon, generate session ID |\n| `wit status` | Show all active intents, locks, contracts, and conflicts |\n| `wit declare` | Announce intent to work on files/symbols |\n| `wit lock` | Acquire a semantic lock on a specific symbol |\n| `wit release` | Release a held lock |\n| `wit watch` | Live dashboard of coordination state |\n| `wit hook install` | Install git hooks for contract enforcement and intent tracking |\n\nAll commands support `--json` for machine-readable output.\n\n## Semantic Locking\n\nWit doesn't lock files — it locks **symbols**. A symbol is a function, class, type, or export identified by its path:\n\n```\nsrc/auth.ts:validateToken      # a function\nsrc/models.ts:User             # a type/class\nsrc/utils.py:calculate_score   # a Python function\nsrc/utils.py:RateLimiter       # a Python class\n```\n\nWit uses [Tree-sitter](https://tree-sitter.github.io/tree-sitter/) WASM grammars to parse your code and identify symbol boundaries — the exact byte range of each function, class, and type. Two agents can safely work on different functions in the same file.\n\n**Supported languages:** TypeScript, JavaScript, Python.\n\n## Conflict Detection\n\nWhen an agent declares an intent, Wit runs three checks:\n\n| Check | What it catches |\n|-------|----------------|\n| **Intent Overlap** | Two agents targeting the same code region |\n| **Lock Intersection** | Intent targets a symbol locked by another agent |\n| **Dependency Chain** | Intent targets a caller of a locked symbol |\n\nAll conflicts are **warnings**. The intent still succeeds. The agent decides what to do.\n\n## Contracts\n\nAgents can agree on function signatures. Once accepted, a git pre-commit hook enforces the contract — commits that change the agreed signature are blocked.\n\n```bash\n# Install enforcement hooks\nwit hook install\n\n# Now if an accepted contract's signature changes, the commit is rejected\ngit commit -m \"changed params\"\n# ERROR: Contract violation — src/auth.ts:validateToken signature changed\n```\n\nContracts are propose/accept/reject. No counter-proposals in v1.\n\n## Intent-to-Commit Tracking\n\n`wit hook install` also installs a `prepare-commit-msg` hook. Active intents are linked to commits via git trailers:\n\n```\nfeat: add rate limiting\n\nWit-Intent: abc-123-def-456\n```\n\n## Architecture\n\n```\n+-----------+    +-----------+    +-----------+\n| Claude A  |    | Cursor B  |    | Copilot C |\n+-----+-----+    +-----+-----+    +-----+-----+\n      |                |                |\n      |   JSON-RPC over Unix socket    |\n      |                |                |\n      +--------+-------+----------------+\n               |\n         +-----+------+\n         | Wit Daemon  |\n         |             |\n         |  Hono HTTP  |\n         |  SQLite WAL |\n         |  Tree-sitter|\n         +-----+------+\n               |\n         .wit/daemon.sock\n         .wit/state.db\n```\n\n- **Daemon**: Bun process, Hono HTTP server, Unix domain socket\n- **Storage**: SQLite with WAL mode for concurrent agent access\n- **Parsing**: Tree-sitter WASM grammars (zero native dependencies, no build step)\n- **CLI**: Clipanion, auto-starts daemon on first use\n- **Protocol**: JSON-RPC 2.0 with `witVersion` field for version negotiation\n\n## Protocol Specification\n\nWit exposes 12 JSON-RPC methods for agent coordination. Full spec in two formats:\n\n- **[`docs/PROTOCOL.md`](docs/PROTOCOL.md)** — Human-readable with request/response examples for every method\n- **[`docs/openrpc.json`](docs/openrpc.json)** — Machine-readable [OpenRPC 1.4.0](https://spec.open-rpc.org/) schema\n\nAny AI coding tool that can POST JSON to a Unix socket or run a shell command can participate in the coordination protocol. Build your own integration using the spec.\n\n## `.wit/` Directory\n\n| File | Purpose |\n|------|---------|\n| `daemon.sock` | Unix domain socket for JSON-RPC communication |\n| `daemon.pid` | Daemon PID for lifecycle management and crash recovery |\n| `state.db` | SQLite database with WAL mode for concurrent access |\n| `session.id` | Stable session identifier for agent tracking |\n\nAdd `.wit/` to your `.gitignore`.\n\n## Supported Languages\n\nWit uses Tree-sitter WASM grammars to parse source code at the AST level. Currently supported:\n\n- **TypeScript / JavaScript** (functions, arrow functions, methods, types, interfaces, classes)\n- **Python** (functions, classes)\n\nAdding a new language is straightforward. See [issue #1](https://github.com/amaar-mc/wit/issues/1) (Go), [#2](https://github.com/amaar-mc/wit/issues/2) (Rust), or [#4](https://github.com/amaar-mc/wit/issues/4) (Java/Kotlin) for examples of what's involved.\n\n## Limitations (v1)\n\n- Single machine only (no network coordination between remote agents)\n- TypeScript/JavaScript and Python (more languages planned, architecture is extensible)\n- CLI and API only (no GUI or dashboard beyond `wit watch`)\n- Warnings only (locks and conflicts never block, except contract enforcement)\n- Bun runtime required (standalone binary planned, see [#10](https://github.com/amaar-mc/wit/issues/10))\n\n## Contributing\n\nWit is open source and contributions are welcome. Good places to start:\n\n- [Good first issues](https://github.com/amaar-mc/wit/issues?q=is%3Aissue+is%3Aopen+label%3A%22good+first+issue%22) — language support, CLI improvements, documentation\n- [Help wanted](https://github.com/amaar-mc/wit/issues?q=is%3Aissue+is%3Aopen+label%3A%22help+wanted%22) — MCP server, Windows support, standalone binary\n\n```bash\ngit clone https://github.com/amaar-mc/wit.git\ncd wit\nbun install\nbun test\n```\n\n## License\n\nMIT\n\n---\n\n<p align=\"center\">\n  <a href=\"https://github.com/amaar-mc/wit/stargazers\">Star this repo</a> if you find it useful.\n</p>\n","summary":" Wit is an agent coordination protocol that prevents conflicts when multiple AI coding agents work simultaneously on the same codebase. It runs a lightweight background daemon that tracks agents' declared intents, symbol locks, and established contracts via JSON-RPC, warning participants of overlapping work before code is written rather than detecting conflicts after the fact like version control systems. The protocol integrates with existing git workflows through pre-commit hooks to enforce contracted function signatures while leaving conflict resolution decisions to the agents themselves. It is designed for development teams leveraging multiple AI assistants—such as Claude Code, Cursor, or Copilot—who need to parallelize work across shared repositories without wasting time on merge conflicts and broken builds.","description":"Agent coordination protocol — declare intents, lock symbols, detect conflicts before code is written","stars":37,"language":"TypeScript"},{"owner":"gh123man","repo":"opensnek","url":"https://github.com/gh123man/opensnek","readme":"<p align=\"center\">\n  <img src=\"OpenSnek/App/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png\" alt=\"open-snek app icon\" width=\"200\">\n</p>\n\n<h1 align=\"center\">OpenSnek</h1>\n\n<p align=\"center\">\n  Configure supported Razer mice on macOS without Synapse, Windows, or vendor lock-in.\n</p>\n\n<h2 align=\"center\"><a href=\"https://github.com/gh123man/OpenSnek/releases\">Download</a></h2>\n\n![Screenshot](/docs/media/screenshot.png)\n\nOpenSnek is an open source native macOS app for configuring supported Razer mice over USB or Bluetooth.\n\n## Highlights\n\n- Lightweight native macOS app bundle with no unnecessary runtime bloat\n- Very low idle and background overhead, so it stays out of the way when you are not using it\n- Optional menu bar control for quick, on-the-fly DPI adjustments  \n  <img src=\"docs/media/menu-icon.png\" alt=\"open-snek app icon\" width=\"250\">\n- Rebind all supported mouse buttons and write to onboard stoarge  \n  <img src=\"docs/media/bindings.png\" alt=\"open-snek app icon\" width=\"300\">\n\n## Motivation\n\nRazer does not support the Basilisk V3 X HyperSpeed on macOS at all, so this project started by reverse engineering the BLE protocol from Windows traffic between the mouse and Synapse.\n\nThe goal is simple: make supported Razer mice configurable on macOS without needing Synapse, Windows, or a second machine just to change settings.\n\nMore device support is welcome, whether that comes from new hardware captures or pull requests. For USB protocol reference work, this project also builds on the excellent documentation and reverse-engineering effort from [OpenRazer](https://github.com/openrazer/openrazer).\n\n## Features\n\n- Change DPI, stage count, and active stage\n- Adjusts supported lighting settings\n- Remaps supported buttons\n- Works over USB and Bluetooth where the device protocol allows it\n- Avoids the need for Synapse or a separate Windows machine\n\n## Download and Install\n\n1. Download the latest DMG from [GitHub Releases](https://github.com/gh123man/OpenSnek/releases).\n2. Open the DMG.\n3. Drag `OpenSnek.app` into `Applications`.\n4. Launch `OpenSnek`.\n\nOfficial builds use the latest Xcode/macOS SDK. Minimum supported macOS version: macOS 14.\n\nIf macOS asks for permissions:\n\n- For USB control, grant `Input Monitoring` to `OpenSnek` in `System Settings > Privacy & Security`.\n- For Bluetooth control, allow Bluetooth access when prompted.\n\n## Supported Devices\n\nSupport is transport-specific. A mouse may be supported over USB, Bluetooth, or both, depending on what has been captured, tested, and validated in the app.\n\nStatus key:\n- `Validated` = supported and locally capture/test validated in OpenSnek\n- `Mapped` = supported through a shipped profile, but not yet locally validated on OpenSnek hardware\n- `Not yet` = the transport exists on the hardware but OpenSnek does not support it yet\n- `No` = that transport is not available on the device\n\n| Device | USB | Bluetooth | Notes |\n|---|---|---|---|\n| Basilisk V3 X HyperSpeed | Validated | Validated | |\n| Basilisk V3 | Mapped | No | OpenRazer-backed USB profile, modeled after the Basilisk V3 35K with a `26,000` DPI ceiling |\n| Basilisk V3 Pro | Validated | Validated | |\n| Basilisk V3 35K | Validated | No | |\n\nNot every feature is fully supported on every listed transport yet. Some controls and readback paths are still partial while capture, testing, and validation continue.\n\nSupport docs:\n- Per-device USB/BT feature matrix: [docs/DEVICE_SUPPORT.md](docs/DEVICE_SUPPORT.md)\n- Protocol and transport docs: [docs/protocol/PROTOCOL.md](docs/protocol/PROTOCOL.md)\n- Contribution and new-device workflow: [CONTRIBUTING.md](CONTRIBUTING.md)\n\nUnsupported Razer mice still get a best-effort experience when possible. OpenSnek will probe for controls that already match known behavior, show a light warning that the device is not fully supported, and avoid exposing UI for features that have not been mapped safely yet.\n\nSupport for more devices is welcome. New device support can land either through outside contributors or as more hardware becomes available for capture, testing, and validation.\n\n## Build From Source\n\nFrom the repo root:\n\n```bash\n./run.sh\n```\n\nThat rebuilds the canonical Xcode `OpenSnek.app` target, copies it into the stable local `.dist` bundle path, and launches it through `OpenSnek/scripts/run_macos_app.sh`.\n\nIf you want to reuse the current app bundle without rebuilding:\n\n```bash\n./run.sh --no-build\n```\n\n## Build\n\n```bash\nswift build --package-path OpenSnek\n```\n\n## Test\n\n```bash\nswift test --package-path OpenSnek\n```\n\n## Xcode\n\n```bash\n./OpenSnek/scripts/generate_xcodeproj.sh --open\n```\n\n`OpenSnek/OpenSnek.xcodeproj` is generated from `OpenSnek/project.yml` on demand and is not checked into git.\n\n## Project Docs\n\n- App build, run, probe, and validation details: [OpenSnek/README.md](OpenSnek/README.md)\n- Device support and reverse-engineering workflow: [CONTRIBUTING.md](CONTRIBUTING.md)\n- Device support matrix by feature and transport: [docs/DEVICE_SUPPORT.md](docs/DEVICE_SUPPORT.md)\n- DMG release and notarization setup: [docs/release/DMG_RELEASE.md](docs/release/DMG_RELEASE.md)\n- Protocol documentation: [docs/protocol/PROTOCOL.md](docs/protocol/PROTOCOL.md)\n- Supported Python tooling: [tools/python/README.md](tools/python/README.md)\n- BLE capture corpus: [captures/README.md](captures/README.md)\n\n## License\n\nThis repository is licensed under the Apache License 2.0. See [LICENSE](LICENSE).\n","summary":" OpenSnek is an open-source native macOS application that enables configuration of supported Razer mice without requiring Razer Synapse, Windows, or vendor lock-in. The app allows users to adjust DPI settings, customize lighting, remap buttons, and write configurations directly to the mouse's onboard storage over USB or Bluetooth connections. Designed as a lightweight alternative to bloated proprietary software, it offers optional menu bar controls for quick adjustments and minimal background resource usage. It primarily benefits macOS users who own compatible Razer peripherals—particularly models like the Basilisk V3 series—and wish to customize their devices without maintaining a Windows machine or relying on unsupported official software.","description":"Lightweight configuration software for USB and bluetooth Razer devices on macOS","stars":19,"language":"Swift"},{"owner":"Sentinel-Gate","repo":"Sentinelgate","url":"https://github.com/Sentinel-Gate/Sentinelgate","readme":"<h1 align=\"center\">SentinelGate</h1>\n\n<p align=\"center\">\n  <strong>Your AI agent has unrestricted access to your machine.</strong><br>\n  Every tool call, shell command, and file read — unchecked.<br><br>\n  SentinelGate intercepts every action before it executes.<br>\n  Deterministic rules. From bare metal to any container or sandbox.<br><br>\n  <sub>For developers who give AI agents MCP tool access — and need to control it.</sub>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/Sentinel-Gate/Sentinelgate/actions/workflows/ci.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/Sentinel-Gate/Sentinelgate/ci.yml?style=flat-square&label=CI\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-AGPL--3.0-blue?style=flat-square\" alt=\"License: AGPL-3.0\"></a>\n  <a href=\"https://go.dev\"><img src=\"https://img.shields.io/badge/Go-1.26+-00ADD8?style=flat-square&logo=go&logoColor=white\" alt=\"Go 1.26+\"></a>\n  <a href=\"https://github.com/Sentinel-Gate/Sentinelgate/releases\"><img src=\"https://img.shields.io/badge/Release-v2.1.4-brightgreen?style=flat-square\" alt=\"Release v2.1.4\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://e2b.dev\"><img src=\"https://img.shields.io/badge/Works%20with-E2B-ff8800?style=flat-square\" alt=\"Works with E2B\"></a>\n  <a href=\"https://www.docker.com\"><img src=\"https://img.shields.io/badge/Works%20with-Docker-2496ED?style=flat-square&logo=docker&logoColor=white\" alt=\"Works with Docker\"></a>\n  <a href=\"https://kubernetes.io\"><img src=\"https://img.shields.io/badge/Works%20with-Kubernetes-326CE5?style=flat-square&logo=kubernetes&logoColor=white\" alt=\"Works with Kubernetes\"></a>\n  <a href=\"https://modal.com\"><img src=\"https://img.shields.io/badge/Works%20with-Modal-000000?style=flat-square\" alt=\"Works with Modal\"></a>\n  <a href=\"https://fly.io\"><img src=\"https://img.shields.io/badge/Works%20with-Fly.io-8B5CF6?style=flat-square\" alt=\"Works with Fly.io\"></a>\n</p>\n\n<details align=\"center\">\n<summary><img src=\"https://img.shields.io/badge/+6%20more-platforms-555555?style=flat-square\" alt=\"+6 more platforms\"></summary>\n<p>\n  <a href=\"https://firecracker-microvm.github.io\"><img src=\"https://img.shields.io/badge/Works%20with-Firecracker-FF9900?style=flat-square\" alt=\"Works with Firecracker\"></a>\n  <a href=\"https://podman.io\"><img src=\"https://img.shields.io/badge/Works%20with-Podman-892CA0?style=flat-square&logo=podman&logoColor=white\" alt=\"Works with Podman\"></a>\n  <a href=\"https://daytona.io\"><img src=\"https://img.shields.io/badge/Works%20with-Daytona-000000?style=flat-square\" alt=\"Works with Daytona\"></a>\n  <a href=\"https://aws.amazon.com/ecs\"><img src=\"https://img.shields.io/badge/Works%20with-ECS%20%2F%20Fargate-FF9900?style=flat-square&logo=amazonaws&logoColor=white\" alt=\"Works with ECS / Fargate\"></a>\n  <a href=\"https://systemd.io\"><img src=\"https://img.shields.io/badge/Works%20with-systemd-333333?style=flat-square\" alt=\"Works with systemd\"></a>\n  <a href=\"https://linuxcontainers.org\"><img src=\"https://img.shields.io/badge/Works%20with-LXC%20%2F%20LXD-333333?style=flat-square\" alt=\"Works with LXC / LXD\"></a>\n</p>\n</details>\n\n<p align=\"center\">\n  <a href=\"#quick-start\">Get Started</a> · <a href=\"https://www.sentinelgate.co.uk\">Website</a> · <a href=\"docs/Guide.md\">Docs</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/sentinelgate-demo.gif\" width=\"720\" alt=\"SentinelGate demo\">\n</p>\n\n---\n\n## 🛡️ Why\n\nAI agents don't just chat — they read files, run commands, call APIs, and send data externally. One prompt injection or one hallucinated action is enough to leak credentials, delete data, or exfiltrate sensitive information. And **there's no undo**.\n\n### Why SentinelGate\n\n🏠 **Self-hosted** — your data never leaves your infrastructure.\n\n📦 **Container-native** — one command to bootstrap, ready for orchestrators.\n\n🔓 **Zero lock-in** — one binary, runs anywhere, remove it anytime.\n\n---\n\n## ⚙️ How SentinelGate works\n\nSentinelGate sits between the AI agent and your system. Every action is intercepted, evaluated against your policies, and logged — before it reaches anything. Denied actions are blocked at the proxy.\n\n<p align=\"center\">\n  <img src=\"assets/diagram-how-it-works-2.svg\" width=\"720\" alt=\"How SentinelGate works\">\n</p>\n\n\nNo code changes. No agent modifications. Single binary, zero dependencies, sub-millisecond overhead.\n\n<p align=\"center\">\n  <img src=\"assets/screenshot-hero.png\" width=\"820\" alt=\"Tools & Rules with per-tool Allow/Deny enforcement\">\n</p>\n\n### Works inside any sandbox or container\n\nYour sandbox provides the walls. SentinelGate provides the guard at the gate.\n\nSandboxes and containers isolate your agent, but they can't control what it does inside. SentinelGate adds deterministic governance — per-tool policies, content scanning, and full audit trail — wherever your agents run.\n\n[Full integration guide →](docs/Guide.md#container--cloud-deployment)\n\n---\n\n## 🚀 Quick start\n\n**Install** (macOS / Linux):\n\n```bash\ncurl -sSfL https://raw.githubusercontent.com/Sentinel-Gate/Sentinelgate/main/install.sh | sh\n```\n\n**Install** (Windows PowerShell):\n\n```powershell\nirm https://raw.githubusercontent.com/Sentinel-Gate/Sentinelgate/main/install.ps1 | iex\n```\n\n<details>\n<summary>Manual download or build from source</summary>\n\n**Download** from [GitHub Releases](https://github.com/Sentinel-Gate/Sentinelgate/releases):\n\n| Platform | Archive |\n|----------|---------|\n| macOS (Apple Silicon) | `sentinel-gate_darwin_arm64.tar.gz` |\n| macOS (Intel) | `sentinel-gate_darwin_amd64.tar.gz` |\n| Linux (x86_64) | `sentinel-gate_linux_amd64.tar.gz` |\n| Linux (ARM64) | `sentinel-gate_linux_arm64.tar.gz` |\n| Windows (x86_64) | `sentinel-gate_windows_amd64.zip` |\n| Windows (ARM64) | `sentinel-gate_windows_arm64.zip` |\n\n**macOS / Linux:**\n```bash\ntar xzf sentinel-gate_*.tar.gz\nchmod +x sentinel-gate\nsudo mv sentinel-gate /usr/local/bin/\n```\n\n**Windows:** extract the `.zip` and add `sentinel-gate.exe` to your `PATH`.\n\n**Build from source** (Go 1.26+):\n\nmacOS / Linux:\n```bash\ngit clone https://github.com/Sentinel-Gate/Sentinelgate.git\ncd Sentinelgate && go build -o sentinel-gate ./cmd/sentinel-gate\n```\n\nWindows:\n```powershell\ngit clone https://github.com/Sentinel-Gate/Sentinelgate.git\ncd Sentinelgate; go build -o sentinel-gate.exe ./cmd/sentinel-gate\n```\n\n</details>\n\n**Start:**\n\n```bash\n$ sentinel-gate start\n\n  SentinelGate 2.1.0\n  ─────────────────────────────────────\n  Admin UI:      http://localhost:8080/admin\n  Proxy:         http://localhost:8080/mcp\n  Upstreams:     1 connected / 1 configured\n  Tools:         12 discovered\n  Rules:         0 active\n  ─────────────────────────────────────\n```\n\n> Output may vary depending on your configuration.\n\nOpen **http://localhost:8080/admin** to manage policies, upstreams, and identities. The MCP endpoint is **http://localhost:8080/mcp** — configure your agent to connect there with an API key.\n\n> [!CAUTION]\n> The Admin UI has no built-in authentication — security is delegated to your network. On a public server, always place a firewall or reverse proxy with auth in front of port 8080. See [Production Deployment](docs/Guide.md#production-deployment-tls) and [Admin Security Model](Admin-security-model.md).\n\n<p align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/2cb6864e-f00e-4b9e-9c39-b3523c77d50b\" width=\"720\" controls autoplay loop muted></video>\n</p>\n\n---\n\n## Container & sandbox quickstart\n\nBootstrap SentinelGate with a single command — identities, policies, upstreams, everything. Your orchestrator knows when it's ready (`/readyz`), three security profiles cover most use cases out of the box, and a kill switch stops all agents instantly.\n\n[Setup guide →](docs/Guide.md#2-quick-start)\n\n---\n\n## 🎮 Playground\n\nSee SentinelGate block a prompt injection attack — 30 seconds, no setup:\n\n**macOS / Linux:**\n```bash\ncd examples/playground\n./playground.sh\n```\n\n**Windows PowerShell:**\n```powershell\ncd examples\\playground\n.\\playground.ps1\n```\n\nThe script creates 3 policies, simulates 4 agent tool calls (1 allowed, 3 blocked), and cleans up after. Only needs bash + curl or PowerShell. Full walkthrough: [examples/playground/README.md](examples/playground/README.md).\n\nTo reset everything and start fresh, run `sentinel-gate reset` or use the Command Palette (`Cmd+K` → \"reset\") in the Admin UI.\n\n&nbsp;\n\n**Want to try inside Docker, E2B, or another sandbox?** See [examples/](examples/) for ready-to-run setups.\n\n---\n\n## 🔌 Connect your agent\n\nSentinelGate works with any MCP-compatible client. Point your agent to `http://localhost:8080/mcp` with an API key:\n\n| Client | Setup |\n|--------|-------|\n| Claude Code | `claude mcp add --transport http sentinelgate http://localhost:8080/mcp --header \"Authorization: Bearer <key>\"` |\n| Cursor / IDE | Add MCP server in settings with URL `http://localhost:8080/mcp` |\n| Gemini CLI | MCP config with `http` transport |\n| Codex CLI | MCP config with `http` transport |\n| Python / Node.js / cURL | Standard HTTP with `Authorization: Bearer <key>` header |\n\nFull setup snippets for each client: [Connect Your Agent](docs/Guide.md#4-agent-configuration)\n\n&nbsp;\n\n> [!TIP]\n> **Not using MCP?** SentinelGate also exposes a [Policy Decision Point](docs/Guide.md#14-policy-decision-api-pdp) — same CEL policies, callable from Go/Python/Node SDKs to govern any protocol (REST, SQL, shell, custom agents).\n\n---\n\n## ✨ Features\n\n**Deterministic enforcement** — Explicit rules, not AI judgment. `deny delete_*` means denied. Always.\n\n**Content scanning** — Bidirectional PII, secrets, and IPI detection on tool arguments and responses. Configurable whitelist with contextual exemptions.\n```\nwrite_file({ content: \"AKIA...\" }) → BLOCKED (AWS key detected)\n```\n\n**Session-aware policies** — CEL functions that use session history for context-dependent rules. Detect patterns like read-then-exfiltrate across multiple tool calls: `session_call_count`, `session_write_count`, `session_sequence`, and more.\n```cel\nsession_sequence(session_action_history, \"read_file\", \"send_email\")  // block read-then-exfiltrate\n```\n\n&nbsp;\n\n**Full audit trail** — Every action logged with identity, decision, timestamp, and arguments. Stream live via SSE, filter, or export.\n\n**Red team testing** — 30 built-in attack patterns across 6 categories (tool misuse, argument manipulation, prompt injection, permission escalation, multi-step attacks). Interactive report with one-click remediation.\n\n**Identity and access control** — API keys, roles, per-identity policies. Each agent gets isolated credentials.\n\n&nbsp;\n\n**MCP-native** — Built as an [MCP](https://modelcontextprotocol.io) proxy. Aggregates multiple upstream servers, applies per-tool policies, exposes a single endpoint.\n\n**CEL-powered rules** — [Common Expression Language](https://github.com/google/cel-go), the same engine behind Kubernetes, Firebase, and Envoy:\n\n```cel\naction_arg_contains(arguments, \"secret\")                      // block by content\naction_name == \"bash\" && !(\"admin\" in identity_roles)             // role-based shell control\ndest_domain_matches(dest_domain, \"*.pastebin.com\")             // outbound blocking\n```\n\nSimple tool patterns (`read_*`, `delete_*`) cover most cases. CEL handles the rest. [More policy examples →](docs/Guide.md#example-policies)\n\n**Admin UI** — Browser-based policy editor, test playground, security settings, audit viewer. No config files, no restarts.\n\n&nbsp;\n\n**Kill switch** — One command stops all agents instantly. One command resumes. For incidents, maintenance, or when something looks wrong.\n\n**Bootstrap** — Full configuration — identities, policies, upstreams — in a single command. Designed for containers and sandboxes where environments are created and destroyed continuously.\n\n**Security profiles** — Three pre-built bootstrap profiles: Strict (deny by default, content scanning, human approval for critical ops), Standard (block destructive ops, allow reads, monitor content), Permissive (allow all, log everything). Start strict, relax as you gain confidence.\n\n&nbsp;\n\n<details markdown=\"1\">\n<summary><strong>More features (16)</strong></summary>\n\n**Policy templates** — Seven pre-built security profiles (Safe Coding, Read Only, Research Mode, Full Lockdown, Audit Only, Data Protection, Anti-Exfiltration). One click to apply, fully customizable after.\n\n**Budget and quota** — Per-identity usage limits: max calls, writes, deletes per session, rate limiting per minute. Deny or warn when limits are reached. Live progress tracking on the dashboard.\n\n**Response transformation** — Five transform types applied to tool responses before they reach the agent: redact (regex-based), truncate (size limits), inject (prepend/append warnings), dry-run (mock responses), mask (partial reveal). Test in the built-in sandbox.\n\n**Session recording** — Record every tool call with full request/response payloads. Timeline replay in the UI, export to JSON or CSV, configurable retention, privacy mode (record metadata only).\n\n**Cryptographic evidence** — Every decision signed with ECDSA P-256 and hash-chained. Tamper-proof audit receipts for compliance. EU AI Act-ready compliance bundles with coverage mapping.\n\n**Tool integrity** — Hash-based baseline for tool definitions, drift detection on schema changes, quarantine for mutated tools, diff viewer.\n\n**Behavioral drift detection** — 14-day baseline vs current behavior comparison. Detects tool distribution shifts, deny rate changes, temporal anomalies, and argument pattern drift.\n\n**Agent health dashboard** — Per-agent health metrics (deny rate, drift score, violations) with 30-day sparklines, baseline comparison, and cross-agent overview. CEL variables for health-based policies.\n\n**Permission health & shadow mode** — Identifies over-privileged agents by comparing granted vs actual tool usage. Auto-tighten suggestions with one-click apply.\n\n**FinOps cost explorer** — Per-tool cost estimation, per-identity budgets with threshold alerts, cost drill-down, budget guardrail creation via Policy Builder.\n\n**Namespace isolation** — Role-based tool visibility with whitelist/blacklist glob patterns.\n\n**OpenTelemetry export** — Stdout span export for every tool call with identity, decision, and latency.\n\n**Human-in-the-loop** — Escrow workflow for sensitive operations. Approve/deny with decision context, session trail, and signed audit note.\n\n**Readyz endpoint** — `/readyz` signals your orchestrator that SentinelGate is configured and ready to protect agents. No gap between container start and protection.\n\n**Custom content patterns** — Add your own detection patterns for company-specific sensitive data: internal codes, proprietary API key formats, customer identifiers. On top of the 22 built-in patterns.\n\n**Policy Decision Point** — For agents that don't speak MCP (REST, SQL, shell, custom). Call `evaluate()` from Go, Python, or Node SDKs to enforce the same CEL policies on any protocol. Same audit trail, cooperative enforcement.\n\n</details>\n\n---\n\n## 🖥️ Admin UI\n\n| Tools & Rules | Audit Log |\n|:-:|:-:|\n| <img src=\"assets/screenshot-rules.png\" width=\"410\" alt=\"Tools & Rules with per-tool Allow/Deny enforcement\"> | <img src=\"assets/screenshot-audit.png\" width=\"410\" alt=\"Audit log viewer\"> |\n\n| Content Scanning | Policy Test |\n|:-:|:-:|\n| <img src=\"assets/screenshot-security.png\" width=\"410\" alt=\"Content scanning with Monitor and Enforce modes\"> | <img src=\"assets/screenshot-policy-test.png\" width=\"410\" alt=\"Policy test playground\"> |\n\n14 pages: Dashboard, Onboarding, Getting Started, Tools & Rules (with Transforms, Policy Test, and Simulation tabs), Access (with Quota management), Audit Log, Sessions, Notifications, Compliance, Permissions, Security, Red Team, FinOps, and Clients (with Agent Health).\n\n---\n\n## 📋 Configuration\n\n> [!NOTE]\n> Works with **zero configuration**. Everything is managed from the Admin UI and persisted automatically.\n\nFor infrastructure tuning, an optional YAML config is available:\n\n```yaml\nserver:\n  http_addr: \":8080\"\nrate_limit:\n  enabled: true\n  ip_rate: 100\n```\n\nFull reference: [Configuration](docs/Guide.md#7-configuration-reference) · [CLI](docs/Guide.md#8-cli-reference) · [API](docs/Guide.md#9-admin-api-reference)\n\n---\n\n## ⚠️ Limitations\n\n> [!CAUTION]\n> SentinelGate is an MCP proxy — it controls what tools and data your agents can access through the MCP protocol. It is effective against mistakes, prompt injection, and overreach. For full OS-level isolation, combine with container or VM sandboxes. For agents that don't use MCP (REST, SQL, shell, custom protocols), see the [Policy Decision Point](docs/Guide.md#14-policy-decision-api-pdp).\n\nFull [threat model](docs/Guide.md#13-threat-model-and-limitations).\n\n---\n\n## 💼 SentinelGate Pro\n\nExtended retention · SIEM integration · SSO · Multi-tenancy · Advanced FinOps with billing API integration · Cross-agent health export — [sentinelgate.co.uk](https://www.sentinelgate.co.uk)\n\n## Security\n\nFound a vulnerability? See [Security.md](Security.md) for responsible disclosure and patch SLA.\n\n## Contributing\n\nBug fixes, features, docs, and feedback welcome. See [CONTRIBUTING.md](CONTRIBUTING.md). A CLA is required for code contributions — see [CLA.md](CLA.md).\n\n## License\n\n[AGPL-3.0](LICENSE) — free to use, modify, and self-host. For commercial licensing, [contact us](mailto:hello@sentinelgate.co.uk).\n\n---\n<p align=\"center\">\n  <a href=\"https://www.sentinelgate.co.uk\">Website</a> &middot; <a href=\"docs/Guide.md\">Docs</a> &middot; <a href=\"https://github.com/Sentinel-Gate/Sentinelgate/releases\">Releases</a>\n</p>\n","summary":" SentinelGate is a security intermediary that intercepts and controls AI agent actions—such as tool calls, shell commands, and file operations—before they execute on your system. It enforces deterministic security rules across diverse environments from bare metal to containers, supporting platforms like Docker, Kubernetes, E2B, and Firecracker while remaining self-hosted and deployable as a single binary. The tool is designed for developers who grant AI agents MCP tool access but require strict governance to prevent prompt injection attacks, data exfiltration, or destructive hallucinations.","description":"Access control for AI agents. MCP proxy + Policy Decision Point. CEL policies, RBAC, full audit trail. Any container, any sandbox.","stars":23,"language":"Go"},{"owner":"JRMeyer","repo":"MoonshineFlow","url":"https://github.com/JRMeyer/MoonshineFlow","readme":"# MoonshineFlow\n\n<p align=\"center\">\n  <img src=\"./demo/readme-icon.png\" alt=\"MoonshineFlow icon\" width=\"144\">\n</p>\n\nMoonshineFlow is a macOS menu-bar dictation app powered by [Moonshine](https://github.com/moonshine-ai/moonshine) for local, on-device speech recognition. Double-tap a key, speak, and optionally capture any system audio playing on your Mac too -- then tap again to stop and your words stream into whatever app has focus.\n\nAll transcription runs locally. No audio leaves your machine.\n\n## Demo\n\n<p align=\"center\">\n  <img src=\"./demo/moonshine-flow.gif\" alt=\"MoonshineFlow demo\" width=\"50%\">\n</p>\n\n## How it works\n\n1. Launch the app -- the MoonshineFlow icon appears in the menu bar\n2. Focus any text field (TextEdit, terminal, browser, Slack, etc.)\n3. **Double-tap right Option** to start dictation\n4. Speak -- text streams into the focused app in real time\n5. **Tap right Option** once to stop\n\nFor standard text fields (Slack, Chrome, WhatsApp, TextEdit, Notes, etc.), text is inserted and updated live via the Accessibility API -- including partial text that refines as you speak.\n\nFor terminals (Ghostty, Terminal.app, iTerm2, kitty, etc.), completed sentences stream in via clipboard paste since terminals don't support AX text insertion.\n\n## Requirements\n\n- macOS 15 or newer on Apple Silicon\n- Xcode (not just Command Line Tools)\n\n## Quick start\n\n```bash\ngit clone git@github.com:JRMeyer/MoonshineFlow.git\ncd MoonshineFlow\n\n# Download model files (~290MB)\nMODEL_DIR=MoonshineFlow/models/medium-streaming-en\nfor f in adapter.ort cross_kv.ort decoder_kv.ort encoder.ort \\\n         frontend.ort streaming_config.json tokenizer.bin; do\n  curl -L \"https://download.moonshine.ai/model/medium-streaming-en/quantized/$f\" \\\n    -o \"$MODEL_DIR/$f\"\ndone\n\n# Build (Xcode fetches the Moonshine package automatically)\nxcodebuild -scheme MoonshineFlow -configuration Release -derivedDataPath build build\n\n# Run\nopen build/Build/Products/Release/MoonshineFlow.app\n```\n\nSee [SETUP.md](SETUP.md) for the full setup guide.\n\n## Permissions\n\nGrant all four in **System Settings > Privacy & Security**:\n\n| Permission | Why |\n|---|---|\n| Microphone | Audio capture for your voice |\n| Screen & System Audio Recording | Audio capture for speaker and app output |\n| Accessibility | Inserting text into focused apps |\n| Input Monitoring | Global hotkey detection (right Option key) |\n\n## Project layout\n\n```\nMoonshineFlow/\n  MoonshineFlowApp.swift          App entry point (menu bar)\n  Views/\n    ContentView.swift              Menu bar popover UI\n    SettingsView.swift             Settings window\n  Dictation/\n    DictationController.swift      Orchestrates the dictation session\n    HotkeyManager.swift            Global hotkey via CGEvent tap\n    AudioEngine.swift              Mic capture, resampled to 16kHz mono\n    SystemAudioCapture.swift       System output capture via Core Audio taps\n    ChunkBuffer.swift              Chunks each audio source into 0.6s windows\n    Transcriber.swift              Moonshine streaming transcription wrapper\n    TextStateManager.swift         Tracks streaming text deltas\n    TextInjector.swift             Inserts text via AX or clipboard paste\n```\n\n## Current behavior\n\n- Double-tap right Option to start dictation; single tap to stop\n- Dictation can capture microphone only, system audio only, or both\n- Text streams into the focused app as you speak\n- AX-capable apps get live partial text that refines in place\n- Terminals get committed sentences streamed via clipboard paste\n- Microphone and system audio are transcribed in separate streams and merged after transcription\n- Clipboard is saved before dictation and restored after\n\n## License\n\nSee [LICENSE.txt](LICENSE.txt).\n","summary":" MoonshineFlow is a macOS menu-bar application that enables local, on-device speech recognition using the Moonshine model, allowing users to dictate text via double-tapping the right Option key without sending audio to external servers. It captures audio from both the microphone and system output, streaming transcribed text in real time into any focused application—using the Accessibility API for standard text fields and clipboard paste for terminal emulators. The app processes all transcription locally on Apple Silicon Macs running macOS 15 or newer, ensuring complete privacy while supporting seamless voice input across diverse apps from Slack to Ghostty. It is ideal for users seeking a secure, lightweight dictation tool that integrates directly into their workflow without cloud dependencies.","description":"Drop-in replacement for Apple Dictation","stars":18,"language":"Swift"},{"owner":"OrlojHQ","repo":"orloj","url":"https://github.com/OrlojHQ/orloj","readme":"<p align=\"center\">\n  <img src=\"docs/public/logo.png\" alt=\"Orloj\" width=\"200\" />\n</p>\n\n# Orloj\n\n_Named after the [Prague Orloj](https://en.wikipedia.org/wiki/Prague_astronomical_clock), an astronomical clock that has coordinated complex mechanisms for over 600 years._\n\n[![Release](https://img.shields.io/github/v/release/OrlojHQ/orloj?display_name=tag&sort=semver)](https://github.com/OrlojHQ/orloj/releases)\n[![CI](https://img.shields.io/github/actions/workflow/status/OrlojHQ/orloj/ci.yml?branch=main&label=ci)](https://github.com/OrlojHQ/orloj/actions/workflows/ci.yml)\n[![Docs](https://img.shields.io/github/actions/workflow/status/OrlojHQ/orloj/docs.yml?branch=main&label=docs)](https://docs.orloj.dev)\n[![Go Report Card](https://goreportcard.com/badge/github.com/OrlojHQ/orloj)](https://goreportcard.com/report/github.com/OrlojHQ/orloj)\n[![Go Reference](https://pkg.go.dev/badge/github.com/OrlojHQ/orloj.svg)](https://pkg.go.dev/github.com/OrlojHQ/orloj)\n[![PyPI - orloj-sdk](https://img.shields.io/pypi/v/orloj-sdk)](https://pypi.org/project/orloj-sdk/)\n[![npm - orloj](https://img.shields.io/npm/v/orloj)](https://www.npmjs.com/package/orloj)\n[![License](https://img.shields.io/github/license/OrlojHQ/orloj)](LICENSE)\n\n**An orchestration runtime for multi-agent AI systems.**\n\nDeclare your agents, tools, and policies as YAML. Orloj schedules, executes, routes, and governs them so you can run multi-agent systems in production with the same operational rigor you expect from infrastructure.\n\n> **Status:** Orloj is under active development. APIs and resource schemas may change between minor versions before 1.0.\n\n### Official SDKs\n\nCall the Orloj HTTP API from application code using the official clients (complementing **`orlojctl`** for operators). For REST shapes and generated types, see [HTTP API (OpenAPI)](#http-api-openapi).\n\n| Language     | Install                  | Links                                                                                    |\n| ------------ | ------------------------ | ---------------------------------------------------------------------------------------- |\n| Python       | `pip install orloj-sdk`  | [PyPI](https://pypi.org/project/orloj-sdk/) · [Repository](https://github.com/OrlojHQ/orloj-python-sdk) |\n| TypeScript   | `npm install orloj`      | [npm](https://www.npmjs.com/package/orloj) · [Repository](https://github.com/OrlojHQ/orloj-js-sdk)      |\n\n**Start here:** [See Orloj in Action](#orloj-in-action) · [5-minute tutorial](https://docs.orloj.dev/guides/five-minute-tutorial)\n\n## Orloj in Action\n\nOrloj is API/CLI-first; the web console is an optional operator UI.\n\n### Web Console Walkthrough\n\nThese captures are from the web console running the `testing/scenarios-real/01-pipeline` scenario locally.\n\n### Run Lifecycle (GIF)\n\n![Orloj task lifecycle animation](docs/public/readme/task-run-lifecycle.gif)\n\nWatch a full run flow from task creation through running to success in the live frontend.\n\n### Dashboard Overview\n\n![Orloj dashboard overview](docs/public/readme/dashboard-overview.png)\n\nView the operator dashboard with system status and active workload at a glance.\n\n### System Topology\n\n![Orloj system topology view](docs/public/readme/system-topology.png)\n\nInspect the agent-system graph topology and understand how nodes connect.\n\n## Why Orloj\n\nRunning AI agents in production today looks a lot like running containers before container orchestration: ad-hoc scripts, no governance, no observability, and no standard way to manage an agent fleet. Orloj provides:\n\n- **Agents-as-Code** -- declare agents, their models, tools, and constraints in version-controlled YAML manifests.\n- **DAG-based orchestration** -- pipeline, hierarchical, and swarm-loop topologies with fan-out/fan-in support.\n- **Model routing** -- bind agents to OpenAI, Anthropic, Azure OpenAI, Ollama, and other endpoints. Switch providers without changing agent definitions.\n- **Tool isolation** -- execute tools in containers, WASM sandboxes, or process isolation with configurable timeout and retry.\n- **Governance built in** -- policies, roles, and tool permissions enforced at the execution layer. Unauthorized tool calls fail closed.\n- **Production reliability** -- lease-based task ownership, idempotent replay, capped exponential retry with jitter, and dead-letter handling.\n- **Web console** -- built-in UI with topology views, task inspection, and live event streaming.\n\n## Quickstart\n\n**[Get started in 5 minutes](https://docs.orloj.dev/guides/five-minute-tutorial)** — scaffold with `orlojctl init`, add your API key, apply manifests, and run a pipeline with `orlojctl run`.\n\nInstall **orlojctl** (CLI) via Homebrew:\n\n```bash\nbrew tap OrlojHQ/orloj\nbrew install orlojctl\n```\n\nFormula versions follow [Orloj releases](https://github.com/OrlojHQ/orloj/releases).\n\nOr install all binaries (**orlojd**, **orlojworker**, **orlojctl**) with the install script:\n\n```bash\ncurl -sSfL https://raw.githubusercontent.com/OrlojHQ/orloj/main/scripts/install.sh | sh\n```\n\nYou can also download binaries manually from [GitHub Releases](https://github.com/OrlojHQ/orloj/releases). Then run:\n\n```bash\n# Start the server with an embedded worker\n./orlojd --storage-backend=memory --task-execution-mode=sequential --embedded-worker\n```\n\nOpen **[http://127.0.0.1:8080/](http://127.0.0.1:8080/)** to explore the web console, then apply a starter blueprint. The example manifests live in this repo -- clone it or [browse them on GitHub](https://github.com/OrlojHQ/orloj/tree/main/examples):\n\n```bash\n# Apply a starter blueprint (pipeline: planner -> research -> writer)\n./orlojctl apply -f examples/blueprints/pipeline/ --run\n\n# Check the result\n./orlojctl get task bp-pipeline-task\n```\n\nOr build from source (requires Go 1.25+):\n\n```bash\ngo build -o orlojd ./cmd/orlojd\ngo build -o orlojctl ./cmd/orlojctl\n```\n\nWhen you are ready to scale, switch to message-driven mode with distributed workers and Postgres persistence. See the [Quickstart guide](https://docs.orloj.dev/getting-started/quickstart#scaling-to-production) for details. Full walkthrough: [5-minute tutorial](https://docs.orloj.dev/guides/five-minute-tutorial).\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────┐\n│                  Server (orlojd)                     │\n│                                                     │\n│  ┌──────────────┐   ┌────────────────┐              │\n│  │  API Server   │──►│ Resource Store  │             │\n│  │   (REST)      │   │ mem / postgres  │             │\n│  └──────┬───────┘   └────────────────┘              │\n│         │                                           │\n│         ▼                                           │\n│  ┌──────────────┐   ┌────────────────┐              │\n│  │   Services    │──►│ Task Scheduler │              │\n│  └──────────────┘   └───────┬────────┘              │\n└─────────────────────────────┼───────────────────────┘\n                              │\n                              ▼\n┌─────────────────────────────────────────────────────┐\n│                 Workers (orlojworker)                │\n│                                                     │\n│  ┌──────────────┐   ┌───────────────┐               │\n│  │  Task Worker  │──►│ Model Gateway │               │\n│  │              │   └───────────────┘               │\n│  │              │──►┌───────────────┐               │\n│  │              │   │  Tool Runtime  │               │\n│  │              │   └───────────────┘               │\n│  │       ◄──────┼───┌───────────────┐               │\n│  │              │──►│  Message Bus   │               │\n│  └──────────────┘   └───────────────┘               │\n└─────────────────────────────────────────────────────┘\n```\n\n**Server** (`orlojd`) -- API server, resource store (in-memory or Postgres), background services, and task scheduler.\n\n**Workers** (`orlojworker`) -- claim tasks, execute agent graphs, route model requests, run tools, and handle inter-agent messaging.\n\n**Governance** -- AgentPolicy, AgentRole, and ToolPermission resources enforced inline during every tool call and model interaction.\n\nPersistence is backed by Postgres (or in-memory for local dev). Message-driven mode uses NATS JetStream for durable agent-to-agent messaging.\n\n## HTTP API (OpenAPI)\n\nThe v1 REST API is described in [openapi/openapi.yaml](openapi/openapi.yaml) (OpenAPI 3.1). Shared request/response models live under [openapi/schemas/](openapi/schemas/); the root file is **generated** by [openapi/build_openapi.py](openapi/build_openapi.py) (`python3 openapi/build_openapi.py`). CI runs `npx @redocly/cli lint openapi/openapi.yaml`. Contributors: see [Contributing — OpenAPI](CONTRIBUTING.md#openapi) for what to edit and what not to hand-edit.\n\n## Resources\n\nOrloj manages 15 resource types, all defined as declarative YAML with `apiVersion`, `kind`, `metadata`, `spec`, and `status` fields:\n\n**Core**\n\n\n| Resource      | Purpose                                              |\n| ------------- | ---------------------------------------------------- |\n| Agent         | Unit of work backed by a language model              |\n| AgentSystem   | Directed graph composing multiple agents             |\n| ModelEndpoint | Connection to a model provider                       |\n| Tool          | External capability with isolation and retry         |\n| Secret        | Credential storage                                   |\n| Memory        | Vector-backed retrieval for agents                   |\n| McpServer     | MCP server connection that discovers/syncs MCP tools |\n\n\n**Governance**\n\n\n| Resource       | Purpose                                    |\n| -------------- | ------------------------------------------ |\n| AgentPolicy    | Token, model, and tool constraints         |\n| AgentRole      | Named permission set bound to agents       |\n| ToolPermission | Required permissions for tool invocation   |\n| ToolApproval   | Approval record for gated tool invocations |\n\n\n**Scheduling & Triggers**\n\n\n| Resource     | Purpose                                    |\n| ------------ | ------------------------------------------ |\n| Task         | Request to execute an AgentSystem          |\n| TaskSchedule | Cron-based task creation                   |\n| TaskWebhook  | Event-triggered task creation              |\n| Worker       | Execution unit with capability declaration |\n\n\n## More Screenshots\n\n### Task Detail and Graph\n\n![Orloj task detail graph view](docs/public/readme/task-detail-graph.png)\n\nDrill into a task to see node-level execution state and graph progress.\n\n### Trace and Logs\n\n![Orloj task trace and logs view](docs/public/readme/task-trace-logs.png)\n\nOpen trace and log detail to debug runtime behavior without leaving the task view.\n\n## Documentation\n\nBrowse **[docs.orloj.dev](https://docs.orloj.dev)**.\n\n- [Changelog](CHANGELOG.md) -- notable changes by release\n- [5-minute tutorial](https://docs.orloj.dev/guides/five-minute-tutorial) -- scaffold, model key, first run\n- [Getting Started](https://docs.orloj.dev/getting-started/install) -- install, quickstart\n- [Concepts](https://docs.orloj.dev/concepts/architecture) -- architecture, agents, tasks, tools, model routing, governance\n- [Guides](https://docs.orloj.dev/guides/) -- deploy a pipeline, configure routing, build tools, set up governance\n- [Deploy & Operate](https://docs.orloj.dev/deploy/) -- local, VPS, Kubernetes, [remote CLI access](https://docs.orloj.dev/deploy/remote-cli-access)\n- [Reference](https://docs.orloj.dev/reference/cli) -- CLI, API, resource schemas\n- [Security](https://docs.orloj.dev/operations/security) -- control plane API tokens, secrets, tool isolation\n- [Examples](examples/README.md) -- per-kind YAML under `examples/resources/`, starter `blueprints/`, and `use-cases/` (in this repo)\n\n## Docker Compose\n\nRun the full stack (Postgres + server + 2 workers) with Docker Compose:\n\n```bash\ndocker compose up --build -d\ndocker compose ps\n```\n\nThe Compose images include the server and workers only. To drive the API from your machine, install **`orlojctl`**:\n\n```bash\nbrew tap OrlojHQ/orloj\nbrew install orlojctl\n```\n\nOr via the install script:\n\n```bash\ncurl -sSfL https://raw.githubusercontent.com/OrlojHQ/orloj/main/scripts/install.sh | ORLOJ_BINARIES=\"orlojctl\" sh\n```\n\nYou can also download it from [GitHub Releases](https://github.com/OrlojHQ/orloj/releases). See [Deploy & Operate](https://docs.orloj.dev/deploy/) for more details.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for environment setup, test matrix, and PR lifecycle details.\n\n- [Good first issue](https://github.com/OrlojHQ/orloj/issues?q=is%3Aissue%20is%3Aopen%20label%3A%22good%20first%20issue%22)\n- [Help wanted](https://github.com/OrlojHQ/orloj/issues?q=is%3Aissue%20is%3Aopen%20label%3A%22help%20wanted%22)\n- [Use-case contribution guide](examples/use-cases/CONTRIBUTING.md)\n\n## License\n\nApache License 2.0. See [LICENSE](LICENSE) and [NOTICE](NOTICE).\n","summary":" Orloj is an orchestration runtime that lets teams declare and manage multi-agent AI systems using version-controlled YAML manifests, providing infrastructure-grade operational rigor for production deployments. It supports DAG-based orchestration across flexible topologies, routes requests to multiple LLM providers, and isolates tools within secure execution environments like containers or WASM sandboxes. With official Python and TypeScript SDKs alongside a CLI and web console, Orloj enables developers and operators to schedule, execute, and govern agent fleets with the same reliability expected from modern container orchestration platforms.","description":"An orchestration runtime for multi-agent AI systems. Declare agents, tools, and policies as YAML; Orloj schedules, executes, routes, and governs them for production-grade operation.","stars":78,"language":"Go"},{"owner":"YuminosukeSato","repo":"bsts-causalimpact","url":"https://github.com/YuminosukeSato/bsts-causalimpact","readme":"# bsts-causalimpact\n\n[![PyPI version](https://img.shields.io/pypi/v/bsts-causalimpact)](https://pypi.org/project/bsts-causalimpact/)\n[![Python](https://img.shields.io/pypi/pyversions/bsts-causalimpact)](https://pypi.org/project/bsts-causalimpact/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![R Numerical Equivalence](https://github.com/YuminosukeSato/bsts-causalimpact/actions/workflows/numerical-equivalence.yml/badge.svg?branch=main&event=push)](https://github.com/YuminosukeSato/bsts-causalimpact/actions/workflows/numerical-equivalence.yml)\n\nBayesian structural time series for causal inference in Python.\nA faithful port of Google's [CausalImpact](https://google.github.io/CausalImpact/) R package. No TensorFlow required.\n\nThe Gibbs sampler is implemented in Rust (via PyO3), reproducing the same algorithm as R's `bsts` package while achieving 10-30x speedup.\n\n## When to Use (and When Not to)\n\nThis method is valid only when all of the following hold:\n\n- Control series are not contaminated by the intervention\n- The relationship between treated and control series is stable across the pre- and post-intervention periods\n- The pre-intervention period is sufficiently long (rule of thumb: at least 3x the post-intervention period)\n\nIf any of these assumptions are violated, the causal estimate will be unreliable. Consider a difference-in-differences or synthetic control approach instead.\n\n## Installation\n\nRequires Python 3.10+.\nBinary wheels are intended for supported platforms, so Rust is only required\nwhen building from source.\n\n```bash\npip install bsts-causalimpact\n```\n\nFor development (builds Rust extension locally):\n\n```bash\ngit clone https://github.com/YuminosukeSato/bsts-causalimpact.git\ncd bsts-causalimpact\n\n# Install with uv (recommended)\nuv sync --all-extras\n\n# Or install with pip (builds Rust extension via maturin)\npip install -e \".[dev]\"\n```\n\n## Quick Start\n\n```python\nimport pandas as pd\nfrom causal_impact import CausalImpact\n\n# Prepare your data: first column = response, remaining columns = covariates\ndata = pd.read_csv(\"your_data.csv\", index_col=\"date\", parse_dates=True)\n\n# Define pre- and post-intervention periods\npre_period = [\"2020-01-01\", \"2020-03-14\"]\npost_period = [\"2020-03-15\", \"2020-04-14\"]\n\n# Run the analysis\nci = CausalImpact(data, pre_period, post_period)\n\n# Print a summary table\nprint(ci.summary())\n\n# Print a narrative report\nprint(ci.report())\n\n# Plot the results\nfig = ci.plot()\nfig.savefig(\"causal_impact.png\")\n```\n\n### Example Output\n\n![CausalImpact plot example](docs/images/causal_impact_example.png)\n\n```\nPosterior inference {CausalImpact}\n\n                         Average        Cumulative\nActual                   136.32          3953.19\nPrediction (s.d.)        125.42 (0.66)   3637.07 (19.08)\n95% CI                   [124.18, 126.71]  [3601.33, 3674.59]\n\nAbsolute effect (s.d.)   10.90 (0.66)    316.13 (19.08)\n95% CI                   [9.61, 12.13]   [278.60, 351.86]\n\nRelative effect (s.d.)   8.69% (0.57%) 8.69% (0.57%)\n95% CI                   [7.58%, 9.77%] [7.58%, 9.77%]\n\nPosterior tail-area probability p: 0.001\nPosterior prob. of a causal effect: 99.90%\n```\n\n## Comparison with Alternatives\n\n| | R CausalImpact | bsts-causalimpact (this) | tfp-causalimpact | tfcausalimpact | pycausalimpact |\n|---|---|---|---|---|---|\n| Maintainer | Google | OSS | Google | WillianFuks | dafiti (stale) |\n| Algorithm | Gibbs (bsts/C++) | Gibbs (Rust) | TFP-based | VI default / HMC | MLE (statsmodels) |\n| Dependencies | R, bsts | numpy, pandas, matplotlib | TF, TFP (3 GB+) | TF, TFP (3 GB+) | statsmodels |\n| Spike-and-slab | Yes | Yes | Unknown | No | No |\n| Horseshoe prior | No | Yes (`prior_type='horseshoe'`) | No | No | No |\n| Seasonal component | Yes | Yes (`nseasons`, `season_duration`) | Unknown | Yes (TFP STS) | No |\n| Dynamic regression | Yes | Yes (`dynamic_regression=True`) | Unknown | No | No |\n| R numerical test | Reference | ±1% CI-enforced + TOST/ROPE | Not published | Visual comparison (~8% diff) | Not tested |\n| Speed (T=1000) | 2.1 s | 0.07 s (30x) | Seconds | Minutes (HMC: hours) | Sub-second |\n| Python version | N/A (R) | 3.10+ | 3.8+ | 3.7-3.11 | 3.6-3.8 (stale) |\n| Last release | Active | Active | 2023 | 2025-01 | 2020-05 |\n\n### Why this library exists\n\nExisting Python ports have fundamental limitations:\n\n- pycausalimpact uses MLE (not MCMC), producing results that diverge substantially from R\n- tfcausalimpact uses variational inference by default (not Gibbs sampling), and requires TensorFlow (3 GB+)\n- tfp-causalimpact (Google's own Python port) does not publish numerical equivalence tests with R\n- None of the above implement spike-and-slab variable selection matching R's bsts\n\nThis library reproduces the core Gibbs-sampler workflow from R's bsts package in Rust, with CI-enforced numerical equivalence tests on every commit.\n\n## Numerical Equivalence with R\n\n[![R Numerical Equivalence](https://github.com/YuminosukeSato/bsts-causalimpact/actions/workflows/numerical-equivalence.yml/badge.svg?branch=main&event=push)](https://github.com/YuminosukeSato/bsts-causalimpact/actions/workflows/numerical-equivalence.yml)\n\nVerified against R CausalImpact 1.4.1 (bsts 0.9.10, R 4.5) across 5 scenarios.\nEnforced on every commit via CI.\n\n### Test Matrix\n\n| Scenario | point_effect | cum_effect | ci_lower | ci_upper | rel_effect | p_value |\n|---|---|---|---|---|---|---|\n| basic | ±1% | ±1% | ±1% | ±1% | ±1% | alpha=0.05 |\n| covariates | ±1% | ±1% | ±1% | ±1% | ±1% | alpha=0.05 |\n| strong_effect | ±1% | ±1% | ±1% | ±1% | ±1% | alpha=0.05 |\n| no_effect | abs<0.5 | abs<0.5 | abs<0.5 | abs<0.5 | abs<0.5 | alpha=0.05 |\n| seasonal | ±1% | ±1% | ±1% | ±1% | ±1% | alpha=0.05 |\n\n### Three-Layer Equivalence Verification\n\nNo other Python CausalImpact implementation has statistical equivalence tests.\nThis library provides three layers of verification, exceeding even Google's own Python port.\n\n| Layer | Method | What it proves | Reference |\n|---|---|---|---|\n| 1. Deterministic | Seed-fixed ±1% threshold | Same seed, same result, every commit | Regression testing |\n| 2. FDA TOST | 90% CI upper < delta (N=30 seeds) | Mean error is statistically below delta | Schuirmann (1987), FDA Guidance (2001) |\n| 3. Bayesian ROPE | 95% HDI within [0, delta] (N=30 seeds) | Posterior of error is practically equivalent | Kruschke (2018) AMPPS |\n\nLayer 1 runs on every commit (CI-blocking). Layers 2-3 run with `--runslow` flag.\n\n```bash\n# Layer 1: deterministic (runs in CI)\nuv run pytest tests/test_numerical_equivalence.py -v\n\n# Layers 2+3: TOST + ROPE (30 seeds x 4 scenarios, ~80s)\nuv run pytest tests/test_equivalence_tost_rope.py -v --runslow\n```\n\n### CI Enforcement\n\nTwo-layer CI enforcement:\n\n1. Fixture-based (`ci.yml`): Compares Python output against committed R reference data. Blocking on every PR/push.\n2. Live R comparison (`numerical-equivalence.yml`): Installs R, regenerates fixtures from scratch, and compares. Blocking when R is available. Weekly auto-regeneration.\n\n### How to Reproduce\n\n1. Install R 4.5+ and packages: `install.packages(c(\"CausalImpact\", \"jsonlite\"))`\n2. Generate R reference: `Rscript scripts/generate_r_reference.R`\n3. Run equivalence tests: `.venv/bin/pytest tests/test_numerical_equivalence.py -v`\n\n### Equivalence Verification: Comparison with Other Implementations\n\n| | R CausalImpact | bsts-causalimpact (this) | tfp-causalimpact (Google) | tfcausalimpact | pycausalimpact (dafiti) |\n|---|---|---|---|---|---|\n| R reference fixtures | N/A (is reference) | 5 scenarios, CI-enforced | None | None | None |\n| Deterministic R test | N/A | ±1% all metrics (seed=42) | None | README demo only (~8% diff) | None |\n| FDA TOST (Schuirmann 1987) | N/A | 30-seed, delta=1-2% | None | None | None |\n| Bayesian ROPE (Kruschke 2018) | N/A | 30-seed, 95% HDI in ROPE | None | None | None |\n| Self-consistency tolerance | `tolerance=0.01` | N/A | `rtol=0.2` (20%) | `assert_almost_equal` | `assert_array_equal` |\n| CI-blocking R check | N/A | Every commit + weekly live R | None | None | None |\n\nEvidence per implementation (all verified from source code, not documentation claims):\n\n- tfp-causalimpact (Google official Python port): 47 tests across 7 files. No R reference fixtures. Self-consistency checks use `rtol=0.2` (±20%) and `atol=0.01`. No R output comparison exists in the test suite. README states \"designed to produce results close to the R package\" but this is not verified by any automated test. ([source](https://github.com/google/tfp-causalimpact))\n- tfcausalimpact (WillianFuks): 64 tests across 7 files. `tests/fixtures/comparison_data.csv` exists but is only used in README demo, not in automated tests. The README demo itself shows ~8% difference in AbsEffect (R: -657 vs Python: -708.51). ([source](https://github.com/WillianFuks/tfcausalimpact))\n- pycausalimpact (dafiti): 62 tests across 5 files. Uses MLE (not MCMC), fundamentally different algorithm. No R comparison of any kind. Repository archived. ([source](https://github.com/dafiti/causalimpact))\n- causalimpact (jamalsenouci): 54 tests across 4 files. No R comparison. Open issue #7 reports \"significantly different results from R\". ([source](https://github.com/jamalsenouci/causalimpact))\n\n### What is matching R and what is not\n\n| R feature | Status | Detail |\n|---|---|---|\n| Local level model (Gibbs sampler) | Matching | Same algorithm as bsts: Kalman filter + simulation smoother |\n| SdPrior(sample.size=32) for sigma2_level | Matching | InvGamma(16, 16 * sigma_guess^2) |\n| Post-period Random Walk propagation | Matching | Forward simulation from last pre-period state |\n| Data standardization (standardize.data=TRUE) | Matching | (y - mean) / sd using pre-period moments |\n| prior.level.sd = 0.01 | Matching | Same default, same semantics |\n| Spike-and-slab variable selection | Matching | Coordinate-wise sampling with StudentSpikeSlabPrior defaults (`expected.r2=0.8`, `prior.df=50`, `prior.information.weight=0.01`, `diagonal.shrinkage=0.5`) |\n| expected.model.size | Matching | Unified default `2` in `CausalImpact` and `ModelOptions` |\n| expected.r2 = 0.8, prior.df = 50 | Matching | Same documented residual variance prior defaults as BoomSpikeSlab / bsts |\n| Seasonal component (`nseasons`, `season_duration`) | Matching | State-space model matching R bsts `AddSeasonal()` (±1% CI parity) |\n| Dynamic regression | Supported | Time-varying coefficients via random-walk FFBS; `dynamic_regression=True` |\n| Local linear trend | Supported | Opt in with `state_model=\"local_linear_trend\"` |\n| Placebo test | Extended | Null distribution from pre-period splits |\n| Horseshoe prior | Extended | Continuous shrinkage alternative to spike-and-slab (Kohns & Bhattacharjee 2022) |\n| Conformal inference | Extended | Distribution-free prediction intervals |\n| DTW control selection | Extended | Automatic covariate selection via Dynamic Time Warping |\n\nMatching = CI-enforced numerical equivalence with R bsts (±1% or tighter).\nSupported = Feature implemented, no R parity fixture yet.\nExtended = Python-only feature with no R equivalent.\n\n### Beyond R: Python-Only Extensions\n\nFeatures that go beyond R's CausalImpact. These have no R equivalent.\n\n| Feature | Method | What it does | Reference |\n|---|---|---|---|\n| Placebo test | `ci.run_placebo_test()` | Validates effect against null distribution from pre-period splits | |\n| Conformal inference | `ci.run_conformal_analysis()` | Distribution-free prediction intervals | Vovk et al. (2005) |\n| DTW control selection | `select_controls()` | Automatic covariate selection via Dynamic Time Warping | Sakoe & Chiba (1978) |\n| Horseshoe prior | `ModelOptions(prior_type='horseshoe')` | Continuous shrinkage alternative to spike-and-slab for dense DGP | Kohns & Bhattacharjee (2022), arXiv:2011.00938 |\n\n## API\n\n### `CausalImpact(data, pre_period, post_period, model_args=None, alpha=0.05)`\n\n| Parameter | Type | Description |\n|---|---|---|\n| `data` | `DataFrame` or `ndarray` | First column is the response variable, remaining columns are covariates |\n| `pre_period` | `list[str \\| int]` | `[start, end]` of the pre-intervention period |\n| `post_period` | `list[str \\| int]` | `[start, end]` of the post-intervention period |\n| `model_args` | `dict` or `ModelOptions` | MCMC parameters (see below) |\n| `alpha` | `float` | Significance level for credible intervals (default: 0.05) |\n\n#### Model Arguments\n\n| Key | Default | Description |\n|---|---|---|\n| `niter` | 1000 | Total MCMC iterations |\n| `nwarmup` | 500 | Burn-in iterations to discard |\n| `nchains` | 1 | Number of MCMC chains |\n| `seed` | 0 | Random seed for reproducibility |\n| `prior_level_sd` | 0.01 | Prior standard deviation for the local level |\n| `standardize_data` | `True` | Standardize data before fitting |\n| `expected_model_size` | 2 | Expected number of active covariates (spike-and-slab prior) |\n| `nseasons` | `None` | Optional seasonal cycle count (R-compatible API) |\n| `season_duration` | `None` | Optional duration of each seasonal block; defaults to `1` when `nseasons` is set |\n| `dynamic_regression` | `False` | Enable time-varying regression coefficients (random-walk beta) |\n| `state_model` | `\"local_level\"` | `\"local_level\"` or `\"local_linear_trend\"` |\n| `prior_type` | `\"spike_slab\"` | `\"spike_slab\"` or `\"horseshoe\"` (continuous shrinkage for dense DGP) |\n#### Methods and Properties\n\n| Name | Returns | Description |\n|---|---|---|\n| `summary(output=\"summary\")` | `str` | Tabular summary of causal effects |\n| `report()` | `str` | Narrative interpretation of results |\n| `plot(metrics=None)` | `Figure` | Matplotlib figure with original/pointwise/cumulative panels |\n| `inferences` | `DataFrame` | Per-timestep actuals, predictions, prediction s.d., and effect intervals |\n| `summary_stats` | `dict` | Aggregate statistics (effect mean, CI, p-value, etc.) |\n| `posterior_inclusion_probs` | `ndarray \\| None` | Posterior inclusion probability per covariate (spike-and-slab only) |\n| `posterior_shrinkage` | `ndarray \\| None` | Mean shrinkage factor per covariate (horseshoe only) |\n| `run_placebo_test(...)` | `PlaceboTestResults` | Placebo test for effect validation |\n| `run_conformal_analysis(...)` | `ConformalResults` | Distribution-free conformal prediction intervals |\n\n## Benchmark Results\n\n| T | k | niter | This (Rust) | R (bsts) | vs R |\n|--:|--:|------:|-----------:|---------:|----:|\n| 100 | 0 | 1000 | 0.008s | 0.213s | 26x |\n| 500 | 0 | 1000 | 0.033s | 0.997s | 30x |\n| 1000 | 0 | 1000 | 0.069s | 2.108s | 31x |\n| 1000 | 5 | 1000 | 0.197s | 2.171s | 11x |\n| 5000 | 0 | 1000 | 0.330s | 10.264s | 31x |\n\nMedian of 3 runs. Reproduce: `python benchmarks/benchmark.py`\n\n## Architecture\n\n```\npython/causal_impact/\n    __init__.py          # Public API: CausalImpact, ModelOptions, __version__\n    data.py              # DataProcessor: validation, standardization, period parsing\n    main.py              # CausalImpact facade class\n    options.py           # ModelOptions: typed MCMC configuration\n    analysis.py          # CausalAnalysis: effect computation, CI, p-values\n    summary.py           # SummaryFormatter: tabular and narrative reports\n    plot.py              # Plotter: matplotlib visualization\n\nsrc/ (Rust)\n    lib.rs               # PyO3 entry point: run_gibbs_sampler()\n    sampler.rs           # Gibbs sampler (R bsts-compatible algorithm)\n    kalman.rs            # Kalman filter and simulation smoother\n    state_space.rs       # State space model representation\n    distributions.rs     # Posterior sampling distributions\n```\n\n## Development\n\n```bash\ngit config core.hooksPath .githooks\n```\n\n### Running Tests\n\n```bash\n# All tests\nuv run pytest tests/ -v\n\n# Numerical equivalence only\nuv run pytest tests/test_numerical_equivalence.py -v\n\n# Rust tests\ncargo test\n```\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup, PR workflow, and test requirements.\n\n## License\n\nMIT\n","summary":" bsts-causalimpact is a Python port of Google's CausalImpact R package that enables Bayesian structural time series analysis for estimating causal effects of interventions on time series data, delivering high performance without TensorFlow dependencies. By implementing the Gibbs sampler in Rust via PyO3, it achieves 10-30x speedups over traditional approaches while maintaining strict numerical equivalence with the original R algorithm. The library supports advanced features including horseshoe priors, seasonal modeling, and dynamic regression for sophisticated counterfactual analysis. It is designed for analysts and researchers who require robust, production-ready causal inference tools that are both faster and more lightweight than TensorFlow-based alternatives.","description":"Bayesian CausalImpact for Python — R-compatible Gibbs sampler in Rust (PyO3), 30x faster, no TensorFlow","stars":18,"language":"Python"},{"owner":"tkenaz","repo":"breathe-memory","url":"https://github.com/tkenaz/breathe-memory","readme":"# breathe-memory\n\n**Context optimization and associative memory for LLM applications.**\n\nTwo-phase system built around how memory actually works — not as lookup, but as association.\n\n```\npip install breathe-memory\n```\n\n---\n\n## What it does\n\nLLMs forget. Context windows are finite and expensive. Most solutions either stuff everything in (burns tokens) or summarize (loses structure).\n\n**BREATHE** does neither:\n\n- **SYNAPSE (inhale)** — before each generation, extracts associative anchors from the user message and injects semantically relevant memories directly into the prompt. The LLM starts thinking with context already loaded. Overhead: 2–20ms.\n\n- **GraphCompactor (exhale)** — when context fills up, extracts a structured graph (topics, decisions, open questions, artifacts) instead of a lossy narrative summary. Typically saves 60–80% of tokens while preserving semantic structure.\n
