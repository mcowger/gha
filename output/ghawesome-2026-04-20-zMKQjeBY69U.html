r time through runtime context\n  data instead\n\nExample `theme.yaml`:\n\n```yaml\nfield_contracts:\n  - key: marketing-page\n    title: Marketing Page\n    description: Fields for standard marketing pages.\n    target:\n      scope: document\n      types: [page]\n      layouts: [page]\n      slugs: [pricing, about, contact]\n    fields:\n      - name: hero_title\n        type: text\n        label: Hero Title\n        required: true\n      - name: hero_body\n        type: textarea\n        label: Hero Body\n  - key: site_marketing\n    title: Site Marketing\n    target:\n      scope: shared\n      key: site_marketing\n    fields:\n      - name: primary_cta_label\n        type: text\n        label: Primary CTA Label\n```\n\nExample page frontmatter:\n\n```yaml\n---\ntitle: Pricing\nslug: pricing\nlayout: page\nfields:\n  hero_title: Clear pricing for modern teams\n  hero_body: Foundry keeps publishing infrastructure calm and predictable.\n---\n```\n\nExample shared values:\n\n```yaml\nvalues:\n  site_marketing:\n    primary_cta_label: Start with Foundry\n```\n\nIf you still have legacy config-owned field schemas, migrate them with:\n\n```bash\nfoundry theme migrate field-contracts\n```\n\nPlugin-author note:\n\n- Do not use `doc.Fields` for derived values like `toc`, `has_toc`, `reading_time`, or similar\n  render-time metadata\n- `doc.Fields` now belongs to the active theme contract and is validated as persisted content\n- Runtime-only plugin data should be recomputed or attached through render-time context data\n  (`ctx.Data`)\n\n### Admin\n\n`admin.path` controls where the themeable admin shell is mounted. By default it is `/__admin`. The shell itself is public so the browser can load HTML, CSS, and JavaScript. Authenticated API access is session-based by default.\n\nAdmin users live in a filesystem-backed YAM file, which defaults to:\n\n```text\ncontent/config/admin-users.yaml\n```\n\nExample:\n\n```yaml\nusers:\n  - username: admin\n    name: Admin User\n    email: admin@example.com\n    role: admin\n    password_hash: argon2id$...\n```\n\nGenerate a password hash with:\n\n```bash\nfoundry admin hash-password \"your-password\"\n```\n\nOr generate a starter YAML snippet with:\n\n```bash\nfoundry admin sample-user admin \"Admin User\" admin@example.com \"your-password\"\n```\n\nBrowser sessions are stored in a secure cookie scoped to `admin.path`, expire\nafter 30 minutes of inactivity by default, and are renewed while the user\nremains active. Foundry persists only a token hash in\n`data/admin/sessions.yaml`, not the raw reusable bearer token.\n\n#### Admin security\n\n- set `admin.session_secret` or `FOUNDRY_ADMIN_SESSION_SECRET` in production\n- without it, session tokens are still hashed at rest, but with plain SHA-256 instead of keyed HMAC-SHA-256\n- set `admin.totp_secret_key` or `FOUNDRY_ADMIN_TOTP_SECRET_KEY` in production to encrypt stored TOTP secrets at rest\n- TOTP setup now requires that key; legacy plaintext TOTP secrets still verify and are migrated to encrypted form when used\n- admin password hashes now default to `argon2id$...`\n- legacy PBKDF2 password hashes still verify and are upgraded automatically on successful login\n- `admin.session_idle_timeout_minutes` controls inactivity expiry\n- `admin.session_max_age_minutes` caps total session lifetime even if the session remains active\n- `admin.single_session_per_user` optionally revokes older sessions when the same user signs in again\n- for non-local admin access, set `base_url` to an `https://...` origin and make sure your reverse proxy forwards HTTPS correctly so secure cookies behave as expected\n- rotating `admin.session_secret` invalidates all persisted browser sessions\n- rotating `admin.totp_secret_key` requires users with stored TOTP secrets to re-enroll if their secret has not already been migrated with the new key\n- if either secret is suspected compromised, rotate it, revoke sessions, and review the audit log before restoring access\n- compatibility note: legacy plaintext sessions, legacy plaintext TOTP secrets, and legacy PBKDF2 password hashes remain supported only as a migration bridge and are intended to be removed after the `1.4.x` line\n\n`admin.access_token` is now optional. If set, it still works for API automation with:\n\n- `Authorization: Bearer <token>`\n- `X-Foundry-Admin-Token: <token>`\n\nAdmin themes live under:\n\n```text\nthemes/admin-themes/<name>/\n  admin-theme.yaml\n  index.html\n  assets/\n    admin.css\n    admin.js\n```\n\n`admin-theme.yaml` is the admin-theme manifest. It now supports:\n\n- `admin_api`\n- `sdk_version`\n- `compatibility_version`\n- `components`\n- `widget_slots`\n- `screenshots`\n\nBoth shipped themes now declare and validate against the current SDK contract:\n\n- frontend theme `sdk_version: v1`\n- admin theme `sdk_version: v1`\n\nThe current stable admin-theme component contract is:\n\n- `shell`\n- `login`\n- `navigation`\n- `documents`\n- `media`\n- `users`\n- `config`\n- `plugins`\n- `themes`\n- `audit`\n\nThe current stable admin-theme widget-slot contract is:\n\n- `overview.after`\n- `documents.sidebar`\n- `media.sidebar`\n- `plugins.sidebar`\n\nSet the active admin theme with:\n\n```yaml\nadmin:\n  enabled: true\n  path: /__admin\n  session_secret: replace-this-in-production\n  totp_secret_key: replace-this-with-base64-32-byte-key\n  theme: default\n  users_file: content/config/admin-users.yaml\n  session_ttl_minutes: 30\n  session_idle_timeout_minutes: 30\n  session_max_age_minutes: 480\n  single_session_per_user: false\n```\n\n`admin.local_only` is an optional convenience restriction for local development. It is not the default posture and should not be treated as the only security boundary in front of a reverse proxy.\n\nThe dfault admin theme now includes:\n\n- a structured frontmatter editor that stays in sync with raw Markdown\n- media-picker insertion for stable `media:` references\n- document and media history/trash views with restore and purge actions\n- restore-preview flows that load a diff before a document restore is committed\n- media replacement while preserving the canonical reference path\n- an audit log view\n- dedicated user-security flows for password reset tokens, TOTP setup/disable, and session revocation\n- a Debug page with runtime, content, storage, integrity, activity, and persisted build-report visibility when `admin.debug.pprof` is enabled\n- keyboard shortcuts:\n  - `Cmd/Ctrl+S` save the current form\n  - `Cmd/Ctrl+Enter` preview the current document\n  - `Cmd/Ctrl+K` open the command palette\n  - `Shift+/` toggle shortcut help\n  - `g d`, `g m`, `g u`, `g a` jump to Documents, Media, Users, and Audit\n\nThe admin UI also includes breadcrumbs, toast notifications, unsaved-change warnings, clearer error panels, a command palette for fast navigation and creation shortcuts, review/scheduled overview queues, and client-side pagination/sorting for the major management tables.\n\n### Security\n\n`security.allow_unsafe_html` controls whether raw HTML in Markdown is preserved in rendered output.\n\n### Server\n\n`server.live_reload` turns live reload on during local preview.\n\n`server.live_reload_mode` controls the transport:\n\n- `stream`: uses a long-lived SSE connection to `/__reload`\n- `poll`: polls `/__reload/poll` every 1.5 seconds and reloads when the rebuild version changes\n\nUse `poll` if your browser or proxy environment is sensitive to long-lived local connections.\n\nThe preview/admin server uses explicit read, write, and idle timeouts by default.\n\nStatic builds now also emit a frontend search index at:\n\n```text\npublic/search.json\n```\n\nThe generated and live search surfaces now include snippets, and the search APIs apply simple weighted ranking so title and summary matches are promoted ahead of body-only matches.\n\n`foundry validate` now checks for:\n\n- broken `media:` references\n- broken internal links to routes and static files\n\n## Themes\n\nThemes live under `themes/<name>/`.\n\nA theme typically contains:\n\n```text\nthemes/default/\n  assets/\n    css/\n  layouts/\n    base.html\n    index.html\n    page.html\n    post.html\n    list.html\n    partials/\n      head.html\n      header.html\n      footer.html\n  theme.yaml\n```\n\nThemes are responsible for:\n\n- page and post presentation\n- shared base layout\n- taxonomy archive templates\n- theme-specific assets\n\nTheme manifests now support richer metadata:\n\n- `supported_layouts`\n- `config_schema`\n- `field_contracts`\n- `screenshots`\n- `compatibility_version`\n\nLaunch themes are also expected to support the current minimum slot contract:\n\n- `head.end`\n- `body.start`\n- `body.end`\n- `page.before_main`\n- `page.after_main`\n- `page.before_content`\n- `page.after_content`\n- `post.before_header`\n- `post.after_header`\n- `post.before_content`\n- `post.after_content`\n- `post.sidebar.top`\n- `post.sidebar.overview`\n- `post.sidebar.bottom`\n\nTheme validation now checks both of these conditions:\n\n- the theme manifest declares the required slots\n- the corresponding layouts actually render those slots\n\nIt also checks:\n\n- required layouts and partials\n- template references to missing partials/layouts\n- template parse failures with diagnostics suitable for admin reporting\n\n## Plugins\n\nPlugins live under `plugins/<name>/`. Foundry supports two plugin runtime shapes:\n\n- **In-process Go plugins** are compiled into the Foundry binary. They register through Go `init()` functions, so enabling one from the Admin UI only changes config; it cannot import new Go code into an already-built binary. After enabling a newly installed in-process plugin, run `foundry plugin sync` or `go run ./cmd/plugin-sync`, rebuild, and restart.\n- **Out-of-process RPC plugins** declare `runtime.mode: rpc` in `plugin.yaml`. They do not need generated Go imports because Foundry launches the configured command and talks to it through the RPC protocol. The current RPC host supports the context hook family.\n\nBuilt-in in-process plugins that ship with Foundry may already be compiled into the binary. Locally installed third-party in-process plugins still require generated imports and a rebuild.\n\nCurrent plugin capabilities include:\n\n- lifecycle hooks during load/build/serve\n- route and rendering hooks\n- HTML slot injection\n- asset injection\n- plugin validation and dependency checks\n\nPlugin manifests now also support:\n\n- `dependencies`\n- `compatibility_version`\n- `config_schema`\n- `screenshots`\n\nPlugin installation is intentionally conservative now: install sources are restricted to GitHub over `https` or `git@github.com`. Installing a plugin still means trusting third-party code, so treat it as a supply-chain boundary.\n\nPlugin management is safer now:\n\n- updates keep rollback snapshots under `plugins/.rollback/<name>/...`\n- plugins can be rolled back to the latest preserved snapshot\n- admin plugin records now include health/diagnostic reporting, dependency/config metadata, and rollback availability\n\n## Incremental rebuilds\n\nFoundry maintains a dependency graph that relates:\n\n- source files to documents\n- templates to outputs\n- data keys to outputs\n- documents to taxonomy archives\n- taxonomy archives to rendered URLs\n\nWhen possible, the preview server rebuilds only the affected outputs instead of running a full site rebuild.\n\n## Asset pipeline\n\nThe asset pipeline can:\n\n- copy content assets\n- copy images\n- copy uploads\n- copy theme assets\n- copy enabled plugin assets\n- build a bundled CSS file in `public/assets/css/foundry.bundle.css`\n\nAsset roots and plugin/theme names are validated as safe paths, and symlinked asset files are rejected.\n\n## GitHub Pages\n\nThe repository publishes a small docs site from `docs/` that includes:\n\n- a project overview\n- the CLI contract\n- the latest HTML coverage report generated in CI\n\n## Development\n\nUseful commands while working on the repo:\n\n```bash\ngo test ./...\ngo vet ./...\ngo run ./cmd/plugin-sync\n```\n\nThe main CI workflow also verifies formatting, syncs generated plugin imports, builds the project, runs tests, and publishes the coverage report to GitHub Pages on `main`.\n\n\n# License\n\nPlease see `LICENSE`, `LICENSE.PLUGIN.EXCEPTION`, and `LICENSE.THEMES.EXCEPTION` for full license information.\n\n```text\nFoundry includes additional permissions under AGPLv3 section 7 for\nthird-party plugins and themes. Plugins, extensions, modules, themes,\ntemplates, skins, style packages, and similar customizations that work\nwith Foundry solely through its documented public extension and theming\ninterfaces are treated as separate and independent works. They are not\nsubject to the AGPL solely because they interoperate with Foundry\nthrough those public interfaces, and their authors may license them\nunder terms of their choice, including proprietary terms.\n\nThese permissions do not apply to Foundry itself, to modifications of\nFoundry, to works based on non-public or internal interfaces, or to\nworks that copy code from Foundry except as otherwise permitted.\n```\n","summary":" Foundry is a Markdown-first content management system written in Go that stores pages and posts as files with frontmatter while delivering traditional CMS capabilities like taxonomies, custom fields, and an admin interface. It supports a dual plugin architecture allowing both first-class compiled Go extensions and isolated out-of-process RPC plugins for customizing layouts, asset injection, and runtime behavior. The system generates static sites with incremental rebuilds, dependency tracking, and live reload during development, publishing to a `public/` directory alongside RSS feeds and sitemaps. It targets development teams seeking a version-controllable, file-based workflow without sacrificing the flexibility of theme customization, plugin hooks, and CMS-style content management.","description":"A Markdown-first CMS written in Go with themes, plugins, and an integrated admin UI","stars":175,"language":"Go"},{"owner":"outworked","repo":"outworked","url":"https://github.com/outworked/outworked","readme":"<p align=\"center\">\n  <img src=\"build/demo.gif\" alt=\"Outworked Demo\" width=\"720\" />\n</p>\n\n<h1 align=\"center\">Outworked</h1>\n\n<p align=\"center\">\n  <a href=\"https://github.com/outworked/outworked/releases/download/v0.4.3/Outworked-0.4.3-arm64.dmg\">\n    <img src=\"https://img.shields.io/badge/Download_for_macOS-v0.4.3-brightgreen?style=for-the-badge&logo=apple\" alt=\"Download for macOS\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <strong>Outworked is a desktop app that turns Claude into a team of AI employees.<br/>\n  Hire agents. Give them roles. Watch them write code, interact with the web, send messages,<br/>\n  and run scheduled tasks — all from an office on your Mac.</strong>\n</p>\n<p align=\"center\">\n  <em>Fully customizable — import your own sprites, furniture, backgrounds, and fonts via asset packs.<br/>\n  Claude Code with a can-do attitude!</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/outworked/outworked/stargazers\"><img src=\"https://img.shields.io/github/stars/outworked/outworked?style=social\" alt=\"GitHub Stars\" /></a>\n  <a href=\"https://github.com/outworked/outworked/releases\"><img src=\"https://img.shields.io/badge/version-0.4.3-green.svg\" alt=\"Version\" /></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-GPL%203.0-blue.svg\" alt=\"License: GPL-3.0\" /></a>\n  <img src=\"https://img.shields.io/badge/platform-macOS-lightgrey.svg\" alt=\"Platform\" />\n</p>\n\n---\n\n---\n\n<p align=\"center\">\n  <a href=\"https://github.com/outworked/outworked/releases/\"><strong>Download</strong></a> ·\n  <a href=\"#whats-new\"><strong>What's New</strong></a> ·\n  <a href=\"#how-it-works\"><strong>How It Works</strong></a> ·\n  <a href=\"#example-workflows\"><strong>Examples</strong></a> ·\n  <a href=\"#capabilities\"><strong>Capabilities</strong></a> ·\n  <a href=\"#features\"><strong>Features</strong></a> ·\n  <a href=\"#skills\"><strong>Skills</strong></a> ·\n  <a href=\"#mcp-servers\"><strong>MCP Servers</strong></a> ·\n  <a href=\"#channels--triggers\"><strong>Channels & Triggers</strong></a> ·\n  <a href=\"#asset-packs--customize-your-office\"><strong>Asset Packs</strong></a>\n</p>\n\n---\n\n## What's New\n\n**v0.4.3** — Better bg handling for scheduled tasks.\n\n**v0.4.2** — Added browse:type for better browser handling.\n\n**v0.4.1** — Pop-out chat windows, fixed asset pack zip import and spaces in directory paths, fixed custom sprite loading.\n\n**v0.4.0** — Asset packs system: custom sprites, furniture, backgrounds, and fonts. Multi-pack support with fallthrough. Music player now plays user-added tracks.\n\n**v0.3.1** — Slack channel support, triggers UI, improved MCP server wiring, better channel reliability.\n\n**v0.3.0** — SQLite storage, iMessage channels, scheduled triggers, skills system, MCP server integration.\n\nSee the full [Version History](#version-history) below.\n\n---\n\n## How It Works\n\n1. **Hire agents** — Give each one a name, role, personality, model, and sprite\n2. **Describe a goal** — Write what you want in plain English; the orchestrator breaks it into subtasks and routes them to the right agents automatically\n3. **Watch them work** — Agents walk to their desks, write code, interact with the web, send messages, run scheduled jobs — all visible in the office\n4. **Ship it** — Just let your agents handle the whole workflow end to end\n\n---\n\n## Example Workflows\n\nThese are real things you can do today:\n\n### \"Build me a landing page and send it to my cofounder\"\n\n> You type one sentence. Here's what happens:\n\n1. The orchestrator breaks it into subtasks and assigns them across your team\n2. **Frontend Dev** scaffolds the site, writes the HTML/CSS/JS, and starts a local server\n3. **Designer** reviews the page in the built-in browser, takes a screenshot, and asks Frontend Dev to tweak the spacing\n4. Frontend Dev makes the fix, then runs `tunnel_start` to get a public URL\n5. Frontend Dev calls `send_message` to text the link to your cofounder on iMessage\n\nYou watched the whole thing happen at the office. You are wowed. Your cofounder gives you more equity. Total prompts from you: **1**.\n\n### \"Every morning at 9am, check our open PRs and text me a summary\"\n\n1. You tell your **Ops Agent** to set up a daily task\n2. The agent creates a scheduled trigger with a cron expression (`0 9 * * *`)\n3. Every morning, the agent wakes up, queries the GitHub MCP server for open PRs, writes a summary, and sends it to you via iMessage\n4. You read it on your phone over coffee\n\nNo scripts to maintain. No GitHub Actions to debug. Just an agent with a schedule.\n\n### \"Research these three competitor products and write up a comparison\"\n\n1. The orchestrator assigns a **Researcher** agent to each competitor — all three run in parallel\n2. Each agent uses the built-in browser to navigate the competitor's site, read docs, take screenshots, and extract pricing\n3. A **Writer** agent collects all three findings, writes a structured comparison doc, and commits it to your repo\n4. The Writer asks if you want it sent to Slack — you approve, and it posts to #product\n\nThree agents working simultaneously, finishing in minutes what would take you hours.\n\n### \"Triage the 12 new GitHub issues from last night\"\n\n1. **Project Manager** agent pulls all new issues via the GitHub MCP server\n2. It reads each one, labels by priority and type, assigns to the right team member, and adds a first response comment\n3. For any bug it can reproduce, it assigns a **Backend Engineer** agent to investigate and open a draft PR with a fix\n4. You get a Slack summary of what was triaged, what's in progress, and what needs your attention\n\n---\n\n## Capabilities\n\n**Write and ship code** — Build features, fix bugs, open PRs, review each other's work, run tests, and deploy — across multiple repos at once.\n\n**Browse the web** — Research docs, scrape pages, fill out forms, take screenshots, and bring findings back to the team via the built-in browser.\n\n**Send and receive messages** — Reply to customers on Slack, text you a summary on iMessage, or monitor a channel and trigger tasks when someone says the magic word.\n\n**Run on a schedule** — Daily standups, weekly reports, hourly health checks, one-off reminders. Set a cron and let an agent handle it while you sleep.\n\n**Query databases** — Connect a PostgreSQL MCP server and let agents run queries, generate reports, or investigate production issues without you writing SQL.\n\n**Manage projects** — Create and triage GitHub issues, update Linear tickets, post status updates to Slack — agents can own the workflow, not just the code.\n\n**Anything you can plug in** — Every MCP server you add gives agents new capabilities. Connect your internal APIs, monitoring dashboards, CMS, or anything with a tool interface. If it exists as an MCP server, your agents can use it.\n\n---\n\n## Features\n\n- **Pixel Office** — A Phaser-powered world where your agents walk, sit at desks, and collaborate in real time\n- **Build a Team** — Give each agent a name, role, personality, model, and sprite. Mix Claude Opus for hard problems with Sonnet for fast ones\n- **Auto-Orchestration** — Describe a goal; the router breaks it into tasks and assigns them to the right agents\n- **Multi-Agent Collaboration** — Agents talk to each other via `[ASK:AgentName]` and a shared message bus\n- **Full Claude Code Power** — Every agent gets full tool access (Bash, Edit, Read, etc.) with persistent sessions\n- **MCP Server Support** — Connect agents to external tools and services via the Model Context Protocol\n- **Messaging Channels** — Connect iMessage and Slack so agents can send and receive messages in real conversations\n- **Built-in Browser** — Full Chromium browser for agents to navigate, click, fill forms, and take screenshots\n- **Built-in Tunneling** — Expose local servers to the internet via Cloudflare tunnels with a single tool call\n- **Triggers & Scheduling** — Fire off agent tasks on a schedule (cron, interval, one-time) or in response to incoming messages\n- **Skills System** — Extend agents with plug-in `SKILL.md` files that define tools, auth, and instructions\n- **SQLite Storage** — Persistent local database for skills, settings, channels, and message history\n- **Permission Gates** — Real-time approval modal for sensitive tool calls\n- **Live Chat** — Markdown-rendered conversations with syntax-highlighted code blocks and diffs. Pop out any chat into its own window for side-by-side work\n- **Built-in Git** — View status, staged changes, branches, and create PRs without leaving the app\n- **File Browser** — Live-updating workspace tree that syncs as agents edit files\n- **Cost Dashboard** — Track tokens and spend per agent, session, and day\n- **Background Mode** — Minimize and let agents keep working. Tray icon keeps you updated\n- **Parallel Processing** — Multiple agents tackle subtasks simultaneously\n- **Desktop Notifications** — Get pinged when tasks finish or agents need approval\n- **Asset Packs** — Customize your office with custom sprites, furniture, backgrounds, and fonts — drop a folder and go\n- **Original Soundtrack** — Because every office needs a vibe\n\n---\n\n## Supported Models\n\n| Provider  | Models                     |\n| --------- | -------------------------- |\n| Anthropic | Any model via Claude Code. |\n\nEach agent can run a different model — pair a fast model for simple tasks with a powerful one for complex work.\n\n---\n\n## Get Started in 2 Minutes\n\n### 1. Install\n\n**Homebrew (recommended)**\n\n```bash\nbrew tap outworked/tap\nbrew install --cask outworked\n```\n\n**Manual download**\n\nGrab the latest `.dmg` from the [releases page](https://github.com/outworked/outworked/releases) and drag to Applications.\n\n### 2. Prerequisites\n\n- [Claude Code](https://docs.anthropic.com/en/docs/claude-code) installed and authenticated\n\n### 3. Launch and Hire Your First Agent\n\nOn first launch, the onboarding modal walks you through picking a workspace and creating your first agent. You'll be watching pixel employees do stuff in under two minutes.\n\n### Build from Source\n\nThis will start up a development instance of Outworked. To build a distributable, use `npm run electron:build` instead of `npm run electron:dev`\n\n```bash\ngit clone https://github.com/outworked/outworked.git\ncd outworked\nnpm install\nnpm run electron:dev\n```\n\n---\n\n## Scripts\n\n| Command                  | Description                                                                               |\n| ------------------------ | ----------------------------------------------------------------------------------------- |\n| `npm run dev`            | Start Vite dev server (browser only, no Electron) for testing only. Won't work correctly. |\n| `npm run electron:dev`   | Build and launch the full Electron app in dev mode                                        |\n| `npm run electron:build` | Package distributable (dmg/zip on macOS, exe on Windows, AppImage on Linux)               |\n\n---\n\n## Tech Stack\n\n| Layer    | Technology                           |\n| -------- | ------------------------------------ |\n| Desktop  | Electron                             |\n| Frontend | React 19 + TypeScript + Tailwind CSS |\n| Build    | Vite                                 |\n| Graphics | Phaser 3                             |\n| Storage  | SQLite (better-sqlite3)              |\n| AI       | Claude Code SDK                      |\n\n---\n\n## Project Structure\n\n```\nsrc/\n├── components/       # React UI (ChatWindow, OfficeCanvas, GitPanel, etc.)\n├── lib/              # Core logic (AI, orchestration, tools, storage, costs)\n└── phaser/           # Phaser game scene and sprite logic\n\nelectron/\n├── main.js           # Electron main process (IPC, shell, permissions)\n├── preload.js        # Context bridge to renderer\n├── sdk-bridge.js     # Claude Code SDK bridge\n├── db/               # SQLite database and migrations\n├── channels/         # Messaging channels (iMessage, Slack)\n├── mcp/              # MCP server management\n├── skills/           # Skill runtimes (browser, Gmail, Slack, Notion, etc.)\n└── triggers/         # Trigger engine, webhooks, and scheduling\n\npublic/\n├── music/            # Background music tracks\n└── assets/           # Bundled asset packs (installed on first launch)\n```\n\n---\n\n## Skills\n\nOutworked uses a `SKILL.md` format — markdown files with YAML frontmatter that define what an agent can do.\n\n```yaml\n---\nname: my-skill\ndescription: What this skill does\nemoji: 🔧\nruntime: backend-name # optional — for active skills with a backend\nauth:\n  type: oauth2 | api-key\n  provider: service-name\ntools: [tool-1, tool-2]\ntriggers: [event-type]\n---\nInstructions and usage docs in markdown...\n```\n\nSkills can be **bundled** (ship with the app), **custom** (created in the UI and stored in SQLite), or **dynamic** (loaded at runtime from MCP servers). Mark a skill as global to make it available to every agent, or assign it to specific agents.\n\n**Bundled skills:**\n\n| Skill       | Description                                                     |\n| ----------- | --------------------------------------------------------------- |\n| Web Browser | Navigate, click, fill forms, screenshot — full Chromium browser |\n| Scheduler   | Create and manage scheduled tasks (cron, interval, one-time)    |\n\nMore coming soon.\n\n---\n\n## MCP Servers\n\nConnect agents to external tools and data sources via the [Model Context Protocol](https://modelcontextprotocol.io).\n\n**Preset servers** (one-click setup):\n\n| Server     | What it provides                           |\n| ---------- | ------------------------------------------ |\n| GitHub     | Repos, issues, PRs, code search            |\n| Filesystem | Read/write access to specified directories |\n| PostgreSQL | Query and manage databases                 |\n| Slack      | Send and read messages in channels         |\n| Linear     | Issues, projects, and workflows            |\n| Playwright | Browser automation and testing             |\n| Memory     | Persistent key-value storage               |\n| Fetch      | HTTP requests to external APIs             |\n\nYou can also add **custom MCP servers** (stdio or HTTP) and configure environment variables (API keys, tokens) per server.\n\n---\n\n## Channels & Triggers\n\n### Channels\n\nChannels connect agents to messaging platforms. Supported channel types:\n\n- **iMessage** — Send and receive messages via phone number or email\n- **Slack** — Send and receive messages in Slack channels and threads\n\nAgents interact with channels through built-in tools: `send_message`, `list_channels`, and `read_channel_messages`. Configure allowed senders to control who can reach your agents.\n\nYou can also inject special system prompts for each channel, so that certain inbound messages get a different response than others.\n\n### Triggers\n\nTriggers wire up events to agents — when something happens, a prompt is automatically sent to an agent. Think of them as \"if this, then prompt that.\"\n\n**Trigger types:**\n\n| Type                | Fires when…                                                         |\n| ------------------- | ------------------------------------------------------------------- |\n| **Message Pattern** | An inbound channel message (Slack, iMessage) matches a pattern      |\n| **Webhook**         | An external system sends an HTTP POST to a trigger URL              |\n| **Skill Event**     | An internal skill emits a named event (e.g. `scheduler:task_fired`) |\n\n**Message pattern matching** supports four modes:\n\n- `contains` — fires if the message contains the text anywhere (default)\n- `starts-with` — fires if the message starts with the text\n- `exact` — fires only on an exact match\n- `regex` — full regex with capture groups (`$1`, `$2`, …) substituted into the prompt\n\nFor non-regex modes, the original message is automatically appended to the prompt so the agent has full context.\n\n**Setting up a trigger:**\n\n1. Click **Triggers** in the left sidebar\n2. Click **+ New Trigger** and pick a type\n3. Choose a match mode and fill in the pattern\n4. Optionally scope to a specific channel or restrict senders\n5. Pick which agent receives the prompt (defaults to the boss agent)\n6. Write the prompt template — use `$1`, `$2` for regex captures or `{{key}}` for webhook/event data\n\nAgents can also create and manage triggers programmatically using the `create_trigger`, `list_triggers`, `update_trigger`, and `delete_trigger` tools.\n\n**Example — Slack deploy command:**\n\n> Pattern: `deploy` (contains mode)\n> Prompt: `Handle this deploy request.`\n>\n> When someone types \"please deploy the api\" in Slack, the agent receives the prompt with the original message appended and reply instructions so it knows where to respond.\n\n**Example — regex with capture groups:**\n\n> Pattern: `deploy (.+) to (staging|prod)`\n> Prompt: `Deploy the $1 service to $2. Run the deploy script and report back.`\n>\n> \"deploy api to staging\" → agent receives: _\"Deploy the api service to staging. Run the deploy script and report back.\"_\n\n**Channel reply instructions** are automatically prepended when a trigger fires from a channel message, including sender name, channel ID, and conversation ID so the agent knows exactly where to reply.\n\n### Scheduling\n\nThe **Scheduler skill** handles time-based automation — cron expressions, intervals, and one-time tasks. Ask an agent to schedule a task. Under the hood, scheduled tasks fire as skill events that the trigger engine picks up and routes to agents.\n\n---\n\n## Built-in Browser\n\nEvery agent has access to a full browser — not a headless scraper, a real Chromium window managed by the app. It can even open instagram and slack off - just like us.\n\nAgents can **navigate pages, click elements, fill forms, run JavaScript, and take screenshots** using a set of `browse:*` tools. The browser returns an interactive snapshot of every element on the page with its CSS selector, so agents don't need to probe the DOM — they just read the snapshot and act.\n\nWhen a site requires login, the agent calls `browse:login` and a browser window pops up on your screen so you can sign in manually. Once you're done, the agent picks up right where it left off with a fully authenticated session.\n\n**Tools:** `browse:navigate`, `browse:click`, `browse:fill`, `browse:screenshot`, `browse:snapshot`, `browse:evaluate`, `browse:show`, `browse:login`\n\n---\n\n## Built-in Tunneling\n\nAre you proud of what an agent built? Outworked has built-in Cloudflare tunneling — agents can expose any local server to the internet with a single tool call.\n\nAn agent starts a dev server, runs `tunnel_start`, and gets back a public URL. It can then send that link to someone via iMessage or Slack. No ngrok setup, no config — cloudflared is downloaded automatically on first use.\n\n**Tools:** `tunnel_start`, `tunnel_stop`, `tunnel_list`\n\n**Example workflow:**\n\n1. Agent builds a landing page and starts `npx serve dist` on port 3000\n2. Agent calls `tunnel_start` with port 3000 — gets a public `*.trycloudflare.com` URL\n3. Agent sends the link via iMessage to your teammate for review\n4. Teammate is wowed by the landing page\n\n---\n\n## Safety Model\n\nOutworked takes a defense-in-depth approach:\n\n1. **Approval gates** — Explicit approval required before dangerous commands (deletes, installs, network changes)\n2. **Command allowlists** — Permit or block specific shell commands per agent\n3. **Plan-first execution** — Agents can produce a plan before making changes\n4. **Permissions dashboard** — Review and manage all access grants in one place\n\nYou can turn all of it off with one button though.\n\n---\n\n## The Soundtrack\n\nEvery office needs a vibe. Outworked ships with an original soundtrack featuring tracks like:\n\n> _\"Don't Ever Turn Me Off\"_ · _\"She's Just a Coder Agent\"_ · _\"LLM Love Lying Machine\"_ · _\"Can Love Be Binary\"_ · _\"Goodbye Humans\"_ · _\"How Does Grass Feel\"_ · _\"Are You Even Reading This\"_\n\nToggle music from the player in the bottom-left corner.\n\nYou can add your own music by dropping it in the ~/.outworked/music folder\n\n---\n\n## Asset Packs — Customize Your Office\n\nOutworked supports **asset packs** that let you completely reskin the office. Drop a folder into `~/.outworked/assets/` or use the **Import Pack** button in the app, and your office gets a new look.\n\nA single pack can include any combination of:\n\n| Category       | What it does                                                         |\n| -------------- | -------------------------------------------------------------------- |\n| **Employees**  | Replace the procedural pixel characters with custom sprite sheets    |\n| **Furniture**  | Add custom furniture PNGs alongside or instead of the built-in items |\n| **Background** | Replace the office floor, walls, and windows with a custom image     |\n| **Font**       | Replace the pixel UI font with your own `.ttf` or `.woff2`           |\n\n### Quick Start\n\nThe simplest pack is just a folder with a PNG:\n\n```\n~/.outworked/assets/my-pack/\n  default.png           # employee sprite sheet — that's all you need\n```\n\nOr go all out:\n\n```\n~/.outworked/assets/my-pack/\n  manifest.json          # optional — everything auto-detects without it\n  background.png         # replaces the office background\n  myfont.ttf             # replaces the UI font\n  employees/\n    default.png          # sprite sheet used for all agents\n    engineer.png         # role-specific sheet\n    designer.png\n  furniture/\n    desk_wooden.png      # auto-detected as a desk (filename starts with \"desk\")\n    bookshelf.png\n    plant_big.png\n```\n\n### Employee Sprite Sheets\n\nEach sheet is a horizontal strip of animation frames in a fixed order — **idle, walk, type, think** — with 2 frames per state by default (384x48 total for 48px frames). Multi-row grids are also supported, where each row is a state.\n\nThe manifest lets you remap states, customize frame rates, and set per-role sheets. Sheets are auto-assigned to agents by role name, or distributed randomly.\n\n### Furniture\n\nDrop PNG images into a `furniture/` subfolder. Files named `desk*` are auto-detected as desks (agents sit at them when working). All furniture can be added, removed, moved, and rotated from the office via long-press.\n\n### Background\n\nDrop a `background.png` (or `bg.png`) into your pack folder. It replaces the entire office floor, walls, rug, and windows. Supports `cover`, `stretch`, and `tile` display modes.\n\n### Font\n\nDrop a `.ttf`, `.woff`, or `.woff2` file into your pack folder. It replaces the pixel font used throughout the UI. The change takes effect immediately when switching packs.\n\n### Managing Packs\n\nClick the grid icon in the sidebar header to open the **Assets** modal:\n\n- **Packs tab** — Select the active pack, or click **Import...** to import a folder or `.zip` file from anywhere on your machine\n- **Furniture tab** — Add or remove built-in and custom furniture items from the office\n\nA bundled example pack (`outworked-default`) is installed on first launch as a starting point. See `~/.outworked/assets/outworked-default/manifest.json` for a fully documented example manifest.\n\nFull documentation: [`electron/assets/assets.md`](electron/assets/assets.md)\n\n---\n\n## Version History\n\n| Version   | Date       | Highlights                                                                                                          |\n| --------- | ---------- | ------------------------------------------------------------------------------------------------------------------- |\n| **0.4.1** | 2026-03-30 | Pop-out chat windows, fixed zip import and spaces-in-path bug, fixed custom sprite loading                          |\n| **0.4.0** | 2026-03-29 | Asset packs (custom sprites, furniture, backgrounds, fonts), multi-pack support with fallthrough, user music tracks |\n| **0.3.1** | 2026-03-27 | Slack channels, triggers UI, improved MCP wiring, better channel support and caffeination handling                  |\n| **0.3.0** | 2026-03-26 | SQLite storage, iMessage channels, scheduled triggers, skills system, MCP servers, agent-to-agent collaboration     |\n| **0.2.1** | 2026-03-24 | Improved agent thinking displays, Homebrew tap                                                                      |\n| **0.2.0** | 2026-03-24 | Auto-updater                                                                                                        |\n| **0.1.8** | 2026-03-23 | Movable sprites and furniture, updated permissions flow                                                             |\n| **0.1.7** | 2026-03-22 | Initial Public Release                                                                                              |\n| **0.1.6** | 2026-03-20 | Migrated to Claude Code SDK, fixed agent config bug                                                                 |\n| **0.1.5** | 2026-03-19 | Parallel processing, background mode, timeout and cost fixes                                                        |\n| **0.1.4** | 2026-03-18 | Skills system, onboarding flow, permissions, caffeination                                                           |\n| **0.1.3** | 2026-03-18 | Git integration, MCP servers, agent collaboration bus, cost dashboard, notifications                                |\n\n---\n\n## Contributing\n\n1. Fork the repo\n2. Create a feature branch (`git checkout -b feature/my-feature`)\n3. Commit your changes (`git commit -m 'Add my feature'`)\n4. Push to the branch (`git push origin feature/my-feature`)\n5. Open a Pull Request\n\nPlease open a discussion first for large changes so we can discuss the approach.\n\n---\n\n## FAQ\n\n<details>\n<summary><strong>Is my code sent to the cloud?</strong></summary>\n\nOutworked runs locally on your machine. The models are run by Anthropic, with the same privacy guarantees as using those APIs directly.\n\n</details>\n\n<details>\n<summary><strong>Can agents mess up my codebase?</strong></summary>\n\nAgents require explicit approval for destructive operations (unless auto-approve is on then RIP). You can also configure command allowlists per agent.\n\n</details>\n\n<details>\n<summary><strong>How do I create a custom skill?</strong></summary>\n\nWrite a markdown file with YAML frontmatter (name, description, tools) and save it as `SKILL.md`. Then assign it to any agent from the Skills panel. See the bundled skills in `electron/skills` for examples.\n\n</details>\n\n<details>\n<summary><strong>How much does it cost?</strong></summary>\n\nOutworked is free and open source. You just need access to Claude Code.\n\n</details>\n\n<details>\n<summary><strong>Does it work with models other than Claude?</strong></summary>\n\nOutworked is built on the Claude Code SDK, so it uses whichever models Claude Code supports. Each agent can be configured to use a different model — pair Opus for complex reasoning with Sonnet for fast tasks.\n\n</details>\n\n<details>\n<summary><strong>Can agents access the internet?</strong></summary>\n\nYes. Agents have a built-in browser that can navigate pages, fill forms, take screenshots, and interact with any website. They can also expose local servers to the internet via built-in Cloudflare tunneling, and send links or results through iMessage and Slack.\n\n</details>\n\n<details>\n<summary><strong>Can I use it for non-coding tasks?</strong></summary>\n\nAbsolutely. Agents can browse the web for research, send and receive messages, manage GitHub issues and Linear tickets, run scheduled reports, query databases, and automate workflows. Code is just one of many things they can do. They do sometimes refuse to do some stuff though.\n\n</details>\n\n<details>\n<summary><strong>Does it work on Windows and Linux?</strong></summary>\n\nmacOS is the primary platform today. Windows and Linux builds are possible via Electron but haven't been fully tested yet. iMessage channels are macOS-only. We will be testing Windows and Linux soon.\n\n</details>\n\n---\n\n## License\n\n[GPL-3.0](LICENSE)\n","summary":" Outworked is a macOS desktop application that transforms Claude into a collaborative team of AI employees working within a customizable virtual office environment. Users assign specific roles and personalities to agents that autonomously execute complex workflows—including writing code, browsing the web, sending messages, and running scheduled tasks—while an intelligent orchestrator breaks down goals and delegates subtasks across the team. The app features a gamified visual interface where agents move through the workspace, supports custom asset packs for sprites and furniture, and integrates with MCP servers to extend functionality. It is designed for Mac users and developers seeking an engaging, visual way to automate multi-step tasks and delegate work to autonomous AI agents.","description":"Outworked - Cozy Office for Claude Code","stars":269,"language":"TypeScript"},{"owner":"varmabudharaju","repo":"pgsemantic","url":"https://github.com/varmabudharaju/pgsemantic","readme":"# pgsemantic\n\n**Turn any PostgreSQL database into a semantic search engine. Set up in 60 seconds. No migrations, no new infrastructure.**\n\n[![PyPI](https://img.shields.io/pypi/v/pgsemantic)](https://pypi.org/project/pgsemantic/)\n[![Python 3.10+](https://img.shields.io/badge/python-3.10%2B-blue)](https://www.python.org/downloads/)\n[![License: MIT](https://img.shields.io/badge/license-MIT-green)](LICENSE)\n[![Tests](https://img.shields.io/badge/tests-144%20passing-brightgreen)]()\n\npgsemantic connects to your existing PostgreSQL database, picks up your text columns, and makes them searchable by meaning. No data migration, no vector database, no pgvector expertise. It works on your live tables and keeps everything in sync automatically.\n\n<img src=\"docs/screenshots/v4/06-visualize.png\" width=\"100%\" alt=\"Embedding visualization showing 3000 news articles clustered by topic — politics, covid, entertainment, sports\"/>\n\n*3,000 news articles visualized by semantic similarity. Each dot is a row in the database. Colors are auto-detected topic clusters. This is what your data looks like when you can search it by meaning.*\n\n---\n\n## What makes this different\n\nMost vector search tools ask you to set up a separate vector database, write ETL pipelines, and maintain sync logic. pgsemantic works directly on your existing PostgreSQL tables:\n\n- **No new database** — embeddings live alongside your data (inline column or shadow table)\n- **No ETL** — a database trigger keeps embeddings in sync as rows change\n- **No expertise needed** — point it at a table, pick a column, done\n- **Free by default** — runs a local embedding model on your machine (no API keys)\n\n---\n\n## See it in action\n\n### Connect to any PostgreSQL database\n\n<img src=\"docs/screenshots/v4/01-connection.png\" width=\"100%\" alt=\"Connection page showing connected state with pgvector 0.8.2\"/>\n\n*Paste your connection string, test it, done. Works with localhost, Supabase, Neon, RDS — anything with pgvector.*\n\n### Browse and explore your tables\n\n<img src=\"docs/screenshots/v4/02-tables.png\" width=\"100%\" alt=\"Table browser showing clinical_trials, news_articles, and products with column info and row counts\"/>\n\n*See every table, column types, and row counts. Click Inspect to score columns for semantic search suitability.*\n\n### Set up with chunking for long documents\n\n<img src=\"docs/screenshots/v4/03-apply-chunked.png\" width=\"100%\" alt=\"Apply page with column picker, model selection, and chunking enabled\"/>\n\n*Pick columns, choose a model, enable chunking for long text. Chunking splits documents into overlapping paragraphs so search finds the best paragraph, not just the best document.*\n\n### Search by meaning, not keywords\n\n<img src=\"docs/screenshots/v4/05-search.png\" width=\"100%\" alt=\"Search results for 'economic recession' showing articles about inflation, unemployment, and consumer prices\"/>\n\n*Query: \"economic recession\" — returns articles about inflation, unemployment, consumer prices. These results share the concept, not the exact words.*\n\n### Search across all your tables at once\n\n<img src=\"docs/screenshots/v4/10-cross-table-search.png\" width=\"100%\" alt=\"Cross-table search results showing clinical trials and news articles mixed together with table badges\"/>\n\n*\"health treatment side effects\" across clinical_trials and news_articles. Results ranked by similarity regardless of source table. Purple badges show where each result came from.*\n\n### See how your data clusters\n\n<img src=\"docs/screenshots/v4/06-visualize.png\" width=\"100%\" alt=\"2D scatter plot of 3000 embeddings with colored clusters labeled by topic\"/>\n\n*3,000 embeddings reduced to 2D with PCA. K-means clustering auto-labels each group with its top keywords. Click any point to see the full row.*\n\n<img src=\"docs/screenshots/v4/07-visualize-detail.png\" width=\"100%\" alt=\"Row detail drawer showing full article data from a clicked point in the scatter plot\"/>\n\n### Run SQL queries directly\n\n<img src=\"docs/screenshots/v4/08-sql-query.png\" width=\"100%\" alt=\"SQL Query page showing category counts from news_articles table\"/>\n\n*Built-in SQL query tool. Read-only, 10-second timeout, 100-row limit. Safe to explore.*\n\n### Monitor everything from one dashboard\n\n<img src=\"docs/screenshots/v4/04-dashboard.png\" width=\"100%\" alt=\"Dashboard showing 2 tables, 8003 embeddings, 100% coverage, 0 pending\"/>\n\n*Coverage, pending queue, worker health — all in one view.*\n\n### 10 MCP tools for AI agents\n\n<img src=\"docs/screenshots/v4/09-mcp-tools.png\" width=\"100%\" alt=\"MCP integration page showing 10 available tools including semantic search, SQL execution, and schema context\"/>\n\n*Connect Claude Desktop, Cursor, or any MCP-compatible AI agent. They can search semantically, run SQL queries, and explore your schema.*\n\n---\n\n## Quick start\n\n```bash\npip install pgsemantic\n\n# Launch the web UI\npgsemantic ui\n\n# Or use the CLI\npgsemantic inspect   # Scan your DB, score columns\npgsemantic apply --table articles --column body   # Set up semantic search\npgsemantic index --table articles                  # Embed existing rows\npgsemantic search \"climate policy effects\"         # Search by meaning\n```\n\nOpen [http://localhost:8080](http://localhost:8080) and walk through setup visually:\n\n1. **Connection** — paste your PostgreSQL URL\n2. **Tables** — browse your database\n3. **Apply** — pick columns, choose a model, one click\n4. **Index** — embed all rows (progress bar, resumable)\n5. **Search** — natural language queries, instantly\n\n---\n\n## Features\n\n### Core\n\n| Feature | Description |\n|---------|-------------|\n| **Semantic search** | Search by meaning, not keywords. \"budget travel\" finds \"affordable hostels\" |\n| **Cross-table search** | Search all configured tables at once — results merged by similarity |\n| **Auto-chunking** | Split long documents into overlapping chunks for precise paragraph-level search |\n| **Hybrid search** | Combine semantic similarity with SQL WHERE filters in one query |\n| **Multi-column embedding** | Embed title + description + tags as one combined vector |\n| **Automatic sync** | Database triggers keep embeddings fresh on every INSERT/UPDATE/DELETE |\n\n### Operations\n\n| Feature | Description |\n|---------|-------------|\n| **Zero-downtime model migration** | Switch embedding models without breaking search — atomic swap |\n| **Pipelined indexing** | Embeds batch N+1 while writing batch N — ~2x throughput |\n| **Background worker** | Daemon process for continuous embedding sync with retry logic |\n| **Shadow table storage** | Store embeddings separately without modifying your source table |\n\n### Visualization & Analytics\n\n| Feature | Description |\n|---------|-------------|\n| **Embedding scatter plot** | 2D PCA visualization with auto-detected clusters and keyword labels |\n| **SQL query tool** | Run read-only queries from the UI (10s timeout, 100-row limit) |\n| **Status dashboard** | Coverage %, pending queue, failed jobs, worker health — all in one view |\n\n### AI Agent Integration (MCP)\n\n10 tools for Claude Desktop, Cursor, and any MCP-compatible agent:\n\n| Tool | What it does |\n|------|-------------|\n| `semantic_search` | Find rows by meaning |\n| `hybrid_search` | Semantic + SQL filters |\n| `search_all_tables` | Cross-table search |\n| `get_schema_context` | Table schemas for SQL generation |\n| `execute_safe_sql` | Run read-only SQL queries safely |\n| `get_embedding_status` | Check embedding coverage |\n| `list_tables` | Browse all tables |\n| `get_sample_rows` | Preview table data |\n| `inspect_columns` | Score columns for search suitability |\n| `list_configured_tables` | List configured tables |\n\n---\n\n## Embedding models\n\n| Model | Dimensions | Cost | Best for |\n|-------|-----------|------|---------|\n| **Local Fast** (all-MiniLM-L6-v2) | 384 | Free | Getting started, most use cases |\n| **Local Better** (all-mpnet-base-v2) | 768 | Free | Higher accuracy |\n| **OpenAI Small** (text-embedding-3-small) | 1536 | ~$0.02/1M tokens | Production, multilingual |\n| **OpenAI Large** (text-embedding-3-large) | 3072 | ~$0.13/1M tokens | Maximum accuracy |\n| **Ollama** (nomic-embed-text) | 768 | Free | Self-hosted, privacy-sensitive |\n\nSwitch models anytime with zero-downtime migration:\n\n```bash\npgsemantic migrate --table articles --model openai\n```\n\n---\n\n## Works with any PostgreSQL\n\n- Local PostgreSQL + pgvector\n- **Supabase** (enable pgvector in Dashboard > Database > Extensions)\n- **Neon**\n- **Amazon RDS** / Aurora PostgreSQL\n- **Google Cloud SQL** for PostgreSQL\n- Any self-hosted PostgreSQL with pgvector\n\n---\n\n## Architecture\n\n```\nYour App ──────────────────────────────────────────────────┐\n                                                           │\nCLI (Typer) ─┐                                             │\nWeb UI (FastAPI) ─┤──> Embedding Providers ──> PostgreSQL + pgvector\nMCP Server (FastMCP) ─┘   (local/openai/ollama)    │\n                                                    ├── Source tables (your data)\nBackground Worker ──> Job Queue ────────────────────├── Shadow tables (embeddings)\n                                                    └── HNSW indexes (fast search)\n```\n\n- **No external services** — everything runs locally (unless you choose OpenAI)\n- **No build step** — the web UI is vanilla HTML/JS/CSS in a single file\n- **No external dependencies in the frontend** — no React, no Tailwind, no CDN\n\n---\n\n## Security\n\n- Database URL **never sent to the browser** — stays server-side only\n- **CSRF protection** on all POST endpoints\n- **SQL injection prevention** via Pydantic validation + regex on identifiers\n- **Rate limiting** — 120 requests/minute per IP\n- **Content Security Policy**, X-Frame-Options, and security headers on all responses\n- SQL Query tool enforces **read-only transactions** with **10-second timeout**\n- `.env` written with **chmod 600** — owner-read-only\n\n---\n\n## CLI reference\n\n```bash\npgsemantic inspect          # Scan DB, score columns\npgsemantic apply            # Set up semantic search on a table\npgsemantic index            # Bulk embed existing rows\npgsemantic search \"query\"   # Search (omit --table to search all)\npgsemantic migrate          # Switch embedding models (zero downtime)\npgsemantic worker           # Background embedding sync daemon\npgsemantic serve            # MCP server for AI agents\npgsemantic status           # Health dashboard\npgsemantic ui               # Web dashboard\npgsemantic retry            # Reset failed embedding jobs\n```\n\n---\n\n## Development\n\n```bash\ngit clone https://github.com/varmabudharaju/pgvector-setup.git\ncd pgvector-setup\npip install -e \".[dev]\"\ndocker-compose up -d        # Postgres + pgvector\npytest tests/unit/ -v       # 144 tests, all passing\nruff check .                # Lint\n```\n\n---\n\n## FAQ\n\n**Does it work with tables that already have data?**\nYes. Run `index` to embed existing rows. New rows are handled automatically by the trigger.\n\n**Which embedding model should I pick?**\nStart with Local Fast — it's free and works offline. Switch to OpenAI for multilingual or higher accuracy.\n\n**Can I search across multiple tables?**\nYes. `pgsemantic search \"query\"` (without `--table`) searches all configured tables at once.\n\n**Can I change the model after indexing?**\nYes. `pgsemantic migrate --table T --model openai` re-embeds in the background with zero downtime.\n\n**What about long documents?**\nUse `--chunked` when applying. This splits text into overlapping chunks so search finds the best paragraph, not just the best document.\n\n**Does it slow down my database?**\nThe trigger writes a small job record to a queue table. The actual embedding happens asynchronously in the background worker, not in your transaction.\n\n**How do I connect AI agents?**\nAdd the MCP config snippet (shown on the MCP page in the UI) to your Claude Desktop or Cursor config. Agents get 10 tools including semantic search, SQL queries, and schema exploration.\n\n---\n\n## License\n\nMIT\n","summary":" pgsemantic transforms existing PostgreSQL databases into semantic search engines without requiring data migrations, separate vector databases, or ETL pipelines. It connects directly to live tables—supporting any provider from localhost to cloud services—and automatically generates and synchronizes embeddings using local models, enabling meaning-based search across single or multiple tables with features like document chunking, cross-table querying, and interactive clustering visualization. By storing embeddings alongside existing data and maintaining them via database triggers, it eliminates infrastructure overhead while keeping everything in sync automatically. This tool is ideal for developers and data teams who want to add AI-powered semantic search to their PostgreSQL data without architectural changes, external API dependencies, or vector database expertise.","description":"Zero-config semantic search for any PostgreSQL database. pip install pgsemantic, three commands, done","stars":47,"language":"Python"},{"owner":"akdeb","repo":"Elato-Local","url":"https://github.com/akdeb/Elato-Local","readme":"<div align=\"center\">\n\n# 👾 OpenToys\n\n### Open-Source Local Voice AI for Toys, Companions, and Robots\n\n**Apple Silicon · Rust + React · ESP32-S3 · Whisper ASR · Qwen3-TTS · MLX LLMs**\n\n\n[![App](https://img.shields.io/badge/App-Tauri%20%2B%20React-black)](#stack)\n[![ESP32](https://img.shields.io/badge/Hardware-ESP32--S3-red?logo=espressif&logoColor=white)](#esp32-diy-hardware)\n[![License](https://img.shields.io/badge/License-MIT-brightgreen)](LICENSE)\n[![Releases](https://img.shields.io/badge/Download-Latest%20DMG-blue)](https://github.com/akdeb/open-toys/releases/latest/download/OpenToys_0.1.0_aarch64.dmg)\n\n\n> *Build conversational voice AI apps for toys, companions, and robots that run fully local on your Mac.*\n> *No cloud required for runtime, no subscription lock-in, and your data stays on-device.*\n\n</div>\n\n## Featured in\n<div align=\"center\">\n <a href=\"https://www.hackster.io/news/the-easy-way-to-build-interactive-ai-toys-for-your-kids-0ba401a9328f\" target=\"_blank\">\n    <img src=\"https://github.com/user-attachments/assets/c42ea65b-cf04-488f-bb7d-bdef5158bf24\" width=\"200\"/>\n  </a>\n\n**The Easy Way to Build Interactive AI Toys for Your Kids**\n\n<a href=\"https://www.hackster.io/news/the-easy-way-to-build-interactive-ai-toys-for-your-kids-0ba401a9328f\">\nRead the full article →\n</a>\n</div>\n\n## 🎥 Demo Video\n\n[![OpenToys Demo](assets/demo.png)](https://youtu.be/V5uNgMRsBHE)\n\n## News\n- **2026-03-14:** OpenToys launched🎉 And it's Pi Day! If you're looking to run realtime AI models like OpenAI Realtime, Gemini, Eleven Labs and more on your ESP32 device, check it out [here](https://www.github.com/akdeb/ElatoAI). \n\n## App Design\n<!-- ![OpenToys Cover](assets/cover.png) -->\n![OpenToys Demo](assets/open-toys.gif)\n\n## Why OpenToys?\n\n- **Fully Local**: NO cloud, NO subscriptions, NO data leaving your home, FREE AI forever.\n- **Multilingual**: OpenToys supports multiple languages and accents: English 🇺🇸/🇬🇧, Chinese 🇨🇳, Spanish 🇪🇸, French 🇫🇷, Japanese 🇯🇵, Korean 🇰🇷, Portuguese 🇵🇹, German 🇩🇪, Italian 🇮🇹 and more!\n- **Voice Cloning**: Clone your own voice or your favorite characters with <10s of audio.\n- **Customizable**: Build your own toys, companions, robots and more with an ESP32.\n- **Open-source**: The community is open-source and free to use and contribute to.\n\n## Download & Install\n\n- Direct DMG: [OpenToys_0.1.0_aarch64.dmg](https://github.com/akdeb/open-toys/releases/latest/download/OpenToys_0.1.0_aarch64.dmg)\n- All releases: [GitHub Releases](https://github.com/akdeb/open-toys/releases)\n\n## 🚀 Quick Start (for development)\n\n1. Clone the repository with `git clone https://github.com/akdeb/open-toys.git`\n2. Install Rust and Tauri with `curl https://sh.rustup.rs -sSf | sh`\n3. Install Node from [here](https://nodejs.org/en/download)\n4. Run `cd app`\n5. Run `npm install`\n6. Run `npm run tauri dev`\n\n## ESP32 DIY Hardware\n\n![ESP32 DIY Hardware](assets/pcb-design.png)\n[Firmware Docs ⏭️](https://www.elatoai.com/docs/blog/firmware)\n\n## Cards & Stories\nCreate experiences with personalities that can play games, tell stories, engage in educational conversations. Here are some of the default characters with more prompt details in [personalities.json](./app/src/assets/personalities.json).\n\n<p align=\"center\">\n  <img src=\"assets/card1.png\" width=\"24%\">\n  <img src=\"assets/card2.png\" width=\"24%\">\n  <img src=\"assets/card3.png\" width=\"24%\">\n  <img src=\"assets/card4.png\" width=\"24%\">\n</p>\n\n## Stack\n\n- STT: Whisper Turbo ASR\n- TTS: Qwen3-TTS and Chatterbox-turbo\n- LLMs: any LLM from [`mlx-community`](http://huggingface.co/mlx-community) (Qwen3, Llama, Mistral3, etc.)\n- App: Tauri, React, Tailwind CSS, TypeScript, Rust\n- Platform focus: Apple Silicon (M1/2/3/4/5)\n- Hardware device: ESP32-S3\n\n## ⚡️ Flash to ESP32\n\n1. Connect your ESP32-S3 to your Apple Silicon Mac.\n2. In OpenToys, go to `Settings` and click `Flash Firmware`.\n3. OpenToys flashes bundled firmware images (`bootloader`, `partitions`, `firmware`) directly.\n4. After flashing, the toy opens a WiFi captive portal (`ELATO`) for network setup.\n5. Put your Mac and toy on the same WiFi network; the toy reconnects when powered on while OpenToys is running.\n\n## 🛡️ Safety Considerations\n\nAI systems (local or cloud) are not perfect. This project is built with data privacy and safety in mind, but there are still important limitations:\n\n- **Hallucinations**: LLM and TTS models can give incorrect or misleading answers. This should not be treated as a source of truth.\n- **Inappropriate outputs**: Adversarial or ambiguous prompts can sometimes produce unsafe responses.\n- **Emotional impact**: AI should not replace real human interaction, especially for children.\n\n*When using with children, use with parental awareness and treat this as a tool for exploration, not authority.*\n\n## Tested on ✅\n\n1. M1 Pro 2021 Macbook Pro\n2. M3 2024 Macbook Air\n2. M4 Pro 2024 Macbook Pro\n\n## Project Structure\n\n```\nopen-toys/\n├── app/\n├── arduino/\n├── resources/\n├────────── python-backend/\n├────────── firmware/\n└── README.md\n```\n\nPython 3.11 runtime binary, packages and HF models are downloaded on first app setup into the app data directory.\n\n## License\nMIT\n\n---\n\nIf you like this project, consider supporting us with a star ⭐️ on GitHub!\n","summary":" OpenToys is an open-source platform for building fully local, conversational voice AI applications for toys, companions, and robots that runs entirely on Apple Silicon Macs without cloud dependencies. It integrates Whisper ASR for speech recognition, MLX-compatible LLMs such as Qwen3 and Llama for reasoning, and Qwen3-TTS for synthesis, while supporting ESP32-S3 microcontrollers for DIY hardware deployment. The system offers multilingual support, voice cloning from brief audio samples, and customizable character personalities, ensuring complete privacy with no subscriptions or data leaving the device. Designed for developers, makers, and privacy-conscious users, it provides a cost-free, offline toolkit for creating secure, interactive voice-enabled devices.","description":"Local, Free CharacterAI with inference on Apple Silicon and ESP32 WebSocket transport","stars":74,"language":"TypeScript"},{"owner":"SeventeenLabs","repo":"relay","url":"https://github.com/SeventeenLabs/relay","readme":"﻿<p align=\"center\">\n  <img src=\"assets/screenshots/cowork.png\" alt=\"Relay cowork view\" width=\"1100\" style=\"border-radius: 5px;\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"#what-is-relay\"><strong>What Is Relay</strong></a> &middot;\n  <a href=\"#why-relay\"><strong>Why Relay</strong></a> &middot;\n  <a href=\"#features\"><strong>Features</strong></a> &middot;\n  <a href=\"#use-cases\"><strong>Use Cases</strong></a> &middot;\n  <a href=\"#quickstart\"><strong>Quickstart</strong></a> &middot;\n  <a href=\"#development\"><strong>Development</strong></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/license-MIT-blue\" alt=\"MIT License\" />\n  <img src=\"https://img.shields.io/badge/desktop-Electron-47848f\" alt=\"Electron\" />\n  <img src=\"https://img.shields.io/badge/frontend-React%20%2B%20Vite-646cff\" alt=\"React + Vite\" />\n  <img src=\"https://img.shields.io/badge/language-TypeScript-3178c6\" alt=\"TypeScript\" />\n</p>\n\n<br/>\n\n## What Is Relay?\n\n# The open-source Claude Cowork for OpenClaw.\n\n**If OpenClaw is the runtime, Relay is your local command center.**\n\nRelay is an Electron desktop app that gives you the same workflow as Claude Cowork (autonomous task execution, scheduling, sub-agents, connectors) but running on **your infrastructure**, with **your choice of model**, and with **real governance built in**.\n\nCowork is a great product. But there are three structural limits that push companies toward alternatives:\n\n1. **Data sovereignty.** Cowork processes your files on Anthropic's infrastructure. If you're in a regulated industry or have strict data policies, that's a dealbreaker.\n2. **Model lock-in.** Cowork only works with Claude. If you want to route tasks to GPT-4, Llama, Gemini, or a custom endpoint, you're out of luck.\n3. **Compliance gaps.** Anthropic themselves recommend against using Cowork for regulated workflows because activities aren't yet captured in standard audit logs or compliance APIs.\n\nRelay solves all three. Same workflow pattern, different trust model.\n\n<br/>\n\n## Architecture\n\n```\n┌──────────────────────────────────────────────────────────────────────────┐\n│                          You (Operator)                                  │\n│         give goals · review deliverables · approve risky actions         │\n└─────────────────────────────┬────────────────────────────────────────────┘\n                              │\n              ┌───────────────▼────────────────┐\n              │     Relay (Desktop App)        │\n              │     ── Control Plane ──        │\n              │                                │\n              │  Dispatch & Chat               │  You see everything.\n              │  • Give a task in natural lang │  You approve what matters.\n              │  • Agent plans steps for you   │  You stay in control.\n              │  • Review polished deliverable │\n              │                                │\n              │  Governance                    │\n              │  • Approval gates (file ops,   │\n              │    shell commands, data sends) │\n              │  • Exportable audit trail      │\n              │  • Cost tracking per task      │\n              │                                │\n              │  Configure                     │\n              │  • Schedule recurring tasks    │─ ─ ┐ Relay defines.\n              │  • Browse & edit agent memory  │    │ OpenClaw executes.\n              │  • Manage connectors (Slack,   │    │\n              │    Notion, GitHub, Jira, etc.) │    │\n              │  • Set project working folder  │    │\n              └───────────────┬────────────────┘    │\n                              │                     │\n                       WebSocket / API              │\n                              │                     │\n              ┌───────────────▼────────────────┐    │\n              │  OpenClaw Gateway (Runtime)    │◄ ─ ┘\n              │  local · VPS · custom URL      │\n              │  ── Execution Plane ──         │\n              │                                │\n              │  Agent Runtime                 │  Runs on YOUR infra.\n              │  • Autonomous task execution   │  Your keys. Your data.\n              │  • Multi-step planning & tools │\n              │  • Sub-agent orchestration     │\n              │                                │\n              │  Persistence                   │\n              │  • Memory storage & retrieval  │\n              │  • Schedule runner (cron)      │\n              │  • File read / write / search  │\n              │                                │\n              │  Integrations                  │\n              │  • Connectors (Slack, Notion,  │\n              │    GitHub, Jira, email, etc.)  │\n              │  • Computer use (browser, UI)  │\n              │  • Shell / script execution    │\n              │                                │\n              │  Model Router                  │\n              │  • Routes to any LLM backend   │\n              └──┬──────────┬──────────┬───────┘\n                 │          │          │\n           ┌─────▼───┐ ┌────▼───┐ ┌────▼─────┐\n           │ Claude  │ │ GPT-4  │ │  Llama   │\n           │ Gemini  │ │ Mixtral│ │  Custom  │\n           └─────────┘ └────────┘ └──────────┘\n```\n\n**Relay is the control plane — you see, configure, and approve.\nOpenClaw is the execution plane — agents run, remember, and act on your infrastructure.**\n\n```\nExample: Scheduled daily briefing\n\n  Relay (you define)                                    OpenClaw (it executes)\n  ──────────────────                                    ──────────────────────\n  Create schedule: \"Daily 8am\"          ──────►         Stores schedule\n  Set connectors: Slack + Notion                        Cron fires at 8am\n                                                        Agent reads project files\n                                                        Pulls Slack threads & Notion pages\n                                                        Calls LLM (your model choice)\n                                                        Writes briefing to memory\n  Briefing appears in Relay             ◄──────         Returns deliverable\n  You review, approve, or redirect\n  Full audit trail exported\n```\n\n## OpenClaw Runtime Model (Agents, Skills, Nodes)\n\nOpenClaw is multi-agent by design. Relay treats this as an operator-visible runtime model:\n\n- **Agent** = the runtime identity that owns a task (role, memory scope, policy profile, model routing).\n- **Skill** = the capability bundle an agent can use (tools, instructions, schema expectations, policy requirements).\n- **Node** = the execution environment where work runs (local Docker, SSH host, managed runtime) with concrete limits and health.\n\nRun contract:\n\n1. Each run is assigned to one primary agent.\n2. The agent executes using one or more skills.\n3. The run executes on a selected node.\n4. Any consequential action should remain attributable to agent + skill + node in the audit trail.\n\nRelay role in this model:\n\n- Select and display which agent is active.\n- Show which skills are available and why an action is or is not possible.\n- Surface node selection, node health, and node-level limits.\n- Keep approvals and activity logs tied to runtime identity, not only chat text.\n\nCanonical definition: [docs/RELAY-OPENCLAW-AGENT-SKILL-NODE-MODEL.md](docs/RELAY-OPENCLAW-AGENT-SKILL-NODE-MODEL.md)\n\n<br/>\n\n## Why Relay?\n\n| Problem | How Relay handles it |\n|---------|---|\n| **Data sovereignty** | Your files stay on your machine. Agents run on your server. Your keys. |\n| **Model lock-in** | Use any LLM through OpenClaw: Claude, GPT-4, Llama, custom endpoints. |\n| **No compliance-ready audit** | Full audit trail with exportable execution history, approval records, and action rationale. |\n| **Always-on execution** | Agents run 24/7 on a VPS while you control them from the desktop. |\n| **Token cost at scale** | Cowork burns through plan limits fast. With Relay + OpenClaw you manage costs on your own infrastructure. |\n| **Syncing friction** | Your workspace files are in agent context in real-time. No FTP, no SSH, no copy-paste. |\n\n<br/>\n\n## How It Works\n\n```\nYou give the goal → Agent plans the steps → You approve what matters → Agent executes → Everything is logged\n```\n\n|        | Step               | What Happens                                              |\n| ------ | ------------------ | -------------------------------------------------------- |\n| **01** | Connect            | Point Relay to your OpenClaw gateway (local, VPS, or custom). Verify health. |\n| **02** | Dispatch           | Give the agent a task in a project context. Agent plans and starts working. |\n| **03** | Approve            | High-risk actions pause for your review. You approve, reject, or redirect. |\n| **04** | Track              | Full timeline of every action, approval, cost, and result. Exportable. |\n\n<br/>\n\n## Who Should Use Relay\n\nRelay makes sense if:\n\n- You run OpenClaw on a VPS and want a proper desktop control plane for it\n- You need data sovereignty (GDPR, HIPAA, or internal policy)\n- You work in regulated industries like finance, legal, healthcare, or government\n- You want to pick your own model instead of being locked into Claude\n- You need exportable audit trails for compliance\n- You want to control token costs on your own infrastructure\n\nRelay is probably **not** for you if:\n\n- You're happy using Claude on Anthropic's cloud. Just use Cowork, it's good.\n- You want fully autonomous agents with zero human oversight. That's not what this is.\n\n<br/>\n\n## Why Not Just Use a Chat App?\n\nYou could wire OpenClaw to Telegram, Discord, or Slack and talk to your agent there. Plenty of people do. But it breaks down quickly once you need more than a text box:\n\n| Capability | Chat app (Telegram, etc.) | Relay |\n|---|---|---|\n| **Send a message to an agent** | Works fine | Works fine |\n| **Approve risky actions before they run** | No approval gates, agent just does it | File deletes, shell commands, data sends pause for review |\n| **See what the agent actually did** | You get a text reply, not an execution log | Full timeline: every action, tool call, file change, cost |\n| **Schedule recurring tasks** | You'd need a separate cron + glue code | Define schedules in the UI, OpenClaw runs them |\n| **Project context** | Every message starts from zero | Tasks scoped to a working folder with persistent context |\n| **Agent memory** | Chat history is all you get | Structured memory that persists across sessions |\n| **Manage connectors** | You wire each integration yourself | Configure Slack, Notion, GitHub, Jira from the UI |\n| **Audit trail** | Scroll through chat logs | Exportable execution history with approval records |\n| **Cost visibility** | No idea what a task cost | Token usage and cost tracked per task |\n| **Multi-step execution** | Agent replies in one shot | Agent plans steps, uses tools, reports back with deliverables |\n\nA chat app gives you a text box. Relay gives you an operator desk where you can dispatch, govern, track, and audit everything your agent does.\n\n<br/>\n\n## Features\n\n<table>\n<tr>\n<td align=\"center\" width=\"33%\">\n<h3>Desktop First</h3>\nNative Electron app with persistent local state. This is a proper desktop tool, not a browser tab.\n</td>\n<td align=\"center\" width=\"33%\">\n<h3>Chat + Execution</h3>\nDispatch tasks, guide decisions, and review results in one interface.\n</td>\n<td align=\"center\" width=\"33%\">\n<h3>Project Context</h3>\nEvery task is scoped to a working folder. No context drift between runs.\n</td>\n</tr>\n<tr>\n<td align=\"center\">\n<h3>Approval Gates</h3>\nFile deletes, shell commands, data exports: risky actions pause for your review before they run.\n</td>\n<td align=\"center\">\n<h3>Audit Trail</h3>\nEvery action logged with execution timeline, rationale, and approval records. All exportable.\n</td>\n<td align=\"center\">\n<h3>Flexible Routing</h3>\nConnect to local, VPS, or custom OpenClaw-compatible endpoints. Use any model.\n</td>\n</tr>\n<tr>\n<td align=\"center\">\n<h3>Memory System</h3>\nPersistent operator context injected into every interaction. Agents remember what matters.\n</td>\n<td align=\"center\">\n<h3>Scheduling</h3>\nCreate recurring tasks from the UI. Daily reports, weekly cleanups, continuous monitoring.\n</td>\n<td align=\"center\">\n<h3>Full Visibility</h3>\nFiles, activity, memory, schedule, safety, and approvals all visible in one place.\n</td>\n</tr>\n</table>\n\n<br/>\n\n## Interface Tour\n\n### Chat\n\n<p align=\"center\">\n  <img src=\"assets/screenshots/chat.png\" alt=\"Relay chat home\" width=\"1100\" style=\"border-radius: 10px;\" />\n</p>\n\n### Project Workspace (Remote Files)\n\n<p align=\"center\">\n  <img src=\"assets/screenshots/filea.png\" alt=\"Relay remote workspace file explorer\" width=\"1100\" style=\"border-radius: 10px;\" />\n</p>\n\n### Safety And Approvals\n\n<p align=\"center\">\n  <img src=\"assets/screenshots/safety.png\" alt=\"Relay safety and approval gates\" width=\"1100\" style=\"border-radius: 10px;\" />\n</p>\n\n### Settings\n\n<p align=\"center\">\n  <img src=\"assets/screenshots/appearance.png\" alt=\"Relay appearance settings\" width=\"1100\" style=\"border-radius: 10px;\" />\n</p>\n\n<br/>\n\n## Relay vs Claude Cowork\n\n| Capability | Relay | Claude Cowork |\n|---------|-------|---------------|\n| **Autonomous task execution** | Yes | Yes |\n| **Scheduling** | Yes | Yes |\n| **Sub-agents / multi-agent** | Yes | Yes |\n| **Connectors / integrations** | Yes | Yes (Anthropic cloud) |\n| **Desktop app** | Yes | Yes |\n| **Local file access** | Truly local, on your machine | Processed on Anthropic's infrastructure |\n| **Self-hosted runtime** | Yes | No |\n| **Model choice** | Any model via OpenClaw | Claude only |\n| **Compliance-ready audit trail** | Exportable | Not in audit logs or compliance APIs yet |\n| **Approval gates** | Per-action risk scopes | Limited |\n| **Data on your infrastructure** | Yes | No |\n| **Token cost control** | Your infra, your budget | Plan limits apply |\n\nCowork is a great product for personal productivity on Anthropic's cloud. Relay exists for teams and companies that need data sovereignty, compliance-ready audit trails, and model freedom on their own infrastructure.\n\nAnthropic themselves recommend against using Cowork for regulated workflows because activities are not yet captured in standard audit logs or compliance APIs. That's the gap Relay is built for.\n\n<br/>\n\n## Use Cases\n\n### Operations: Daily Briefing\nYou schedule a daily task. The agent synthesizes metrics, customer feedback, and team updates overnight. Results show up in Relay each morning. You review them and decide what to act on.\n\n### Finance: Expense Approval\nThe agent flags an exception in an expense report. Relay pauses for approval. The finance lead reviews the context and risk level, approves or asks for clarification, and the action executes with a full audit receipt.\n\n### Compliance: Recurring Audit Prep\nYou set up a recurring task: \"Every Friday, scan all project changes and produce a compliance summary.\" The agent runs on schedule, results appear in Relay, and the audit trail is ready to export.\n\n### Technical: Code Review Automation\nThe agent runs `npm test`, scans for TODO comments, and produces a summary. Shell commands require your approval. You review results and trigger follow-up actions from one thread.\n\n### Product: Feedback Synthesis\nCustomer feedback is scattered across email, Slack, and support tickets. The agent collects it, clusters themes by priority, and produces roadmap recommendations you can actually act on.\n\n### Content: Weekly Planning\nYou tell the agent: \"Every Friday, summarize trending topics in our space and draft 3 content ideas.\" Results are ready Monday morning. The team reviews, approves, and drops them into the editorial calendar.\n\n<br/>\n\n## Why Not Just Use Cowork?\n\n| If you need... | Use Cowork | Use Relay |\n| --- | --- | --- |\n| Personal AI productivity | Great fit | Overkill |\n| Data sovereignty (GDPR, HIPAA) | Data goes to Anthropic | Your infrastructure |\n| Compliance-ready audit logs | Not available yet | Built in, exportable |\n| Model flexibility | Claude only | Any model via OpenClaw |\n| Token cost control | Plan limits | Your infra, your budget |\n| Team approval workflows | Limited | Per-action risk scopes |\n| Always-on agents on your VPS | Ant
