hropic's cloud | Your server, 24/7 |\n\n<br/>\n\n## Quickstart\n\n**Requirements:**\n- Node.js 20+\n- npm 10+\n\n**Install & run:**\n\n```bash\ngit clone https://github.com/SeventeenLabs/relay.git\ncd relay\nnpm install\nnpm run dev\n```\n\nThis starts Vite, compiles Electron in watch mode, and launches Relay.\n\n**Optional cloud auth setup:**\n\n```bash\ncp .env.example .env\n```\n\nSet these when needed:\n- `VITE_SUPABASE_URL`\n- `VITE_SUPABASE_ANON_KEY`\n\n<br/>\n\n## Gateway Setup\n\nIn **Settings > Gateway**:\n\n1. Enter your OpenClaw gateway URL and token\n2. Save\n3. Run the health check\n\n**Typical endpoint patterns:**\n\n- **Local:** `ws://127.0.0.1:18789`\n- **VPS:** `wss://your-domain.com`\n- **Custom:** Any OpenClaw-compatible endpoint\n\n<p align=\"center\">\n  <img src=\"assets/screenshots/gateway.png\" alt=\"Relay gateway settings\" width=\"1100\" style=\"border-radius: 10px;\" />\n</p>\n\n<br/>\n\n## Development\n\n```bash\nnpm run dev                 # Full desktop dev loop\nnpm run build               # Build renderer + electron\nnpm run preview             # Preview renderer build\nnpm run package             # Build and package app to release/\nnpm run lint                # ESLint\nnpm run typecheck           # TS type checks (renderer + electron)\nnpm run verify              # lint + typecheck + smoke tests\nnpm run test:local-actions  # Local actions smoke tests\nnpm run test:e2e            # Electron E2E tests (mock gateway)\n```\n\n<br/>\n\n## Community\n\n- **Security issues:** hello@seventeenlabs.io\n- **Bug reports & feature requests:** [GitHub Issues](https://github.com/SeventeenLabs/relay/issues)\n- **Contributions:** [CONTRIBUTING.md](CONTRIBUTING.md)\n- **Code of conduct:** [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)\n- **Security policy:** [SECURITY.md](SECURITY.md)\n- **Support:** [SUPPORT.md](SUPPORT.md)\n\n<br/>\n\n## Open Source\n\n- License: [MIT](LICENSE)\n- Copyright © 2026 SeventeenLabs\n\n---\n\n**Get started:** [Download](https://github.com/SeventeenLabs/relay/releases) the latest build or clone and run locally.\n\n**Questions?** Open an issue or email hello@seventeenlabs.io.\n","summary":" Relay is an open-source Electron desktop application that serves as a self-hosted command center for OpenClaw, offering functionality comparable to Claude Cowork—including autonomous task execution, scheduling, and sub-agent management—while running entirely on your own infrastructure. It distinguishes itself by supporting multiple language models beyond Claude, enforcing strict data sovereignty, and providing built-in governance tools such as approval gates for sensitive operations, exportable audit trails, and per-task cost tracking. Designed for organizations in regulated industries or with strict compliance requirements, Relay enables teams to leverage AI automation without sacrificing control, transparency, or the ability to use their preferred models.","description":"The open-source Claude Cowork for OpenClaw","stars":87,"language":"TypeScript"},{"owner":"simeji","repo":"jid","url":"https://github.com/simeji/jid","readme":"# jid\n\n[![Test](https://github.com/simeji/jid/actions/workflows/test.yml/badge.svg)](https://github.com/simeji/jid/actions/workflows/test.yml)\n\n<img src=\"https://github.com/user-attachments/assets/78b0ee4c-2171-4557-b690-50d503f91190\" alt=\"jid logo\" width=\"200\" />\n\nJson Incremental Digger\n\nIt's a very simple tool.\nYou can drill down JSON interactively by using filtering queries like [jq](https://stedolan.github.io/jq/).\n\n**Suggestion**, **Auto completion**, and **JMESPath** support provide a comfortable JSON exploration experience.\n\n## Demo\n\n### Drill-down navigation\n\nInteractively navigate JSON using dot-path queries. Tab-complete fields, cycle through candidates, and see the matching key highlighted in the JSON view in real time.\n\n![demo-jid-drilldown](https://github.com/user-attachments/assets/b37e5a62-e9e4-4ec5-9cc8-e4ca9180a744)\n\n### JMESPath expressions\n\nUse pipes, wildcards, and built-in functions directly in the filter. Function candidates are shown with usage hints and argument templates are filled in automatically.\n\n![demo-jid-jmespath](https://github.com/user-attachments/assets/d6cb5cc7-4e66-4b66-b7bb-c4cc50e8b050)\n\n## Installation\n\n* [With HomeBrew (for macOS)](#with-homebrew-for-macos)\n* [With MacPorts (for macOS)](#with-macports-for-macos)\n* [With pkg (for FreeBSD)](#with-pkg-for-freebsd)\n* [With scoop (for Windows)](#with-scoop-for-windows)\n* [Other package management system](#other-package-management-systems)\n* [Simply use \"jid\" command](#simply-use-jid-command)\n* [Build](#build)\n\n### With HomeBrew (for macOS)\n\n```\nbrew install jid\n```\n\n### With MacPorts (for macOS)\n\n```\nsudo port install jid\n```\n\n### With pkg (for FreeBSD)\n\n```\npkg install jid\n```\n\n### With scoop (for Windows)\n\n```\nscoop install jid\n```\n\n### Other package management systems\n\nJid can install by package management systems of below OS.\n\n[![Packaging status](https://repology.org/badge/vertical-allrepos/jid.svg)](https://repology.org/metapackage/jid/versions)\n\n\n### Simply use \"jid\" command\n\nIf you simply want to use `jid` command, please download binary from below.\n\nhttps://github.com/simeji/jid/releases\n\n## Build\n\n```\ngo install github.com/simeji/jid/cmd/jid@latest\n```\n\n## Usage\n\n### Quick start\n\n* [simple json example](#simple-json-example)\n* [simple json example2](#simple-json-example2)\n* [with initial query](#with-initial-query)\n* [with curl](#with-curl)\n\n#### simple json example\n\nPlease execute the below command.\n\n```\necho '{\"aa\":\"2AA2\",\"bb\":{\"aaa\":[123,\"cccc\",[1,2]],\"c\":321}}'| jid\n```\n\nthen, jid will be running.\n\nYou can dig JSON data incrementally.\n\nWhen you enter `.bb.aaa[2]`, you will see the following.\n\n```\n[Filter]> .bb.aaa[2]\n[\n  1,\n  2\n]\n```\n\nThen, you press Enter key and output `[1,2]` and exit.\n\n#### simple json example2\n\n```\necho '{\"info\":{\"date\":\"2016-10-23\",\"version\":1.0},\"users\":[{\"name\":\"simeji\",\"uri\":\"https://github.com/simeji\",\"id\":1},{\"name\":\"simeji2\",\"uri\":\"https://example.com/simeji\",\"id\":2},{\"name\":\"simeji3\",\"uri\":\"https://example.com/simeji3\",\"id\":3}],\"userCount\":3}}'|jid\n```\n\n#### With a initial query\n\nFirst argument of `jid` is initial query.\n(Use JSON same as [Demo](#demo))\n\n![demo-jid-with-query](https://github.com/user-attachments/assets/d4ef1067-ccd1-401d-8cc3-eef4eef96109)\n\n#### with curl\n\nSample for using [RDAP](https://datatracker.ietf.org/wg/weirds/documents/) data.\n\n```\ncurl -s http://rdg.afilias.info/rdap/domain/example.info | jid\n```\n\n#### Load JSON from a file\n\n```\njid < file.json\n```\n\n## Keymaps\n\n|key|description|\n|:-----------|:----------|\n|`TAB` / `CTRL` + `I` |Show available items and choose them (cycles forward); highlights the matching key in the JSON view|\n|`Shift` + `TAB` |Cycle candidates backward / decrement array index|\n|`CTRL` + `W` |Delete one JMESPath segment backward (e.g. `.id` → `[0]` → `func(@)` → pipe)|\n|`CTRL` + `U` |Delete whole query|\n|`CTRL` + `X` |Toggle function description display (visible when function candidates are shown)|\n|`CTRL` + `F` / Right Arrow (:arrow_right:)|Move cursor a character to the right|\n|`CTRL` + `B` / Left Arrow (:arrow_left:)|Move cursor a character to the left|\n|`CTRL` + `A`|To the first character of the 'Filter'|\n|`CTRL` + `E`|To the end of the 'Filter'|\n|`CTRL` + `J`|Scroll json buffer 1 line downwards|\n|`CTRL` + `K`|Scroll json buffer 1 line upwards|\n|`CTRL` + `G`|Scroll json buffer to bottom|\n|`CTRL` + `T`|Scroll json buffer to top|\n|`CTRL` + `N`|Scroll json buffer 'Page Down'|\n|`CTRL` + `P`|Scroll json buffer 'Page Up'|\n|`CTRL` + `L`|Change view mode whole json or keys (only object)|\n|`ESC`|Hide a candidate box|\n|Up Arrow|Navigate to previous query in history|\n|Down Arrow|Navigate to next query in history|\n\n### Option\n\n|option|description|\n|:-----------|:----------|\n|First argument ($1) | Initial query|\n|-h | print a help|\n|-help | print a help|\n|-version | print the version and exit|\n|-q | Output query mode (for jq)|\n|-M | monochrome output mode|\n\n## Configuration\n\njid can be configured via a TOML file located at:\n\n| OS | Path |\n|:---|:-----|\n| macOS | `~/Library/Application Support/jid/config.toml` |\n| Linux | `~/.config/jid/config.toml` |\n| Windows | `%AppData%\\jid\\config.toml` |\n\n### Example config.toml\n\n```toml\n[history]\npath = \"~/.jid_history\"  # custom history file path\nmax_size = 1000           # number of entries to keep\n\n[keybindings]\nhistory_prev    = \"up\"      # navigate to older query\nhistory_next    = \"down\"    # navigate to newer query\nscroll_down     = \"ctrl+j\"\nscroll_up       = \"ctrl+k\"\nscroll_to_bottom = \"ctrl+g\"\nscroll_to_top   = \"ctrl+t\"\nscroll_page_down = \"ctrl+n\"\nscroll_page_up  = \"ctrl+p\"\ntoggle_keymode  = \"ctrl+l\"\ndelete_line     = \"ctrl+u\"\ndelete_word     = \"ctrl+w\"\ncursor_left     = \"ctrl+b\"\ncursor_right    = \"ctrl+f\"\ncursor_to_start = \"ctrl+a\"\ncursor_to_end   = \"ctrl+e\"\ntoggle_func_help = \"ctrl+x\"\ncandidate_next  = \"tab\"       # cycle candidates forward\ncandidate_prev  = \"ctrl+p\"    # cycle candidates backward (additional key; Shift+Tab always works)\nquit            = \"ctrl+q\"    # exit jid (used when exit_on_enter = false)\n\n[behavior]\nexit_on_enter = true   # set to false to prevent accidental exit on Enter\n```\n\n> **Note:** Shift+Tab (`\\x1b[Z`) is a fixed terminal escape sequence and always triggers backward cycling regardless of `candidate_prev`.\n\n### Preventing accidental exit on Enter\n\nBy default, pressing Enter exits jid and prints the current result. If you find yourself accidentally exiting, set `exit_on_enter = false` in `config.toml`:\n\n```toml\n[behavior]\nexit_on_enter = false\n```\n\nWhen disabled, Enter only confirms a candidate selection. Use `Ctrl+Q` (or your configured `quit` key) to exit.\n\n### Supported key strings\n\n`ctrl+a` … `ctrl+z`, `up`, `down`, `left`, `right`, `tab`, `enter`, `esc`, `backspace`, `home`, `end`, `pgup`, `pgdn`, `delete`, `f1` … `f12`\n\n### Query History\n\nQueries are saved automatically on Enter. The history file path follows the same OS convention as the config file (e.g. `~/Library/Application Support/jid/history` on macOS) unless overridden in `config.toml`.\n\n## JMESPath Support\n\njid supports [JMESPath](https://jmespath.org/) expressions in addition to the traditional dot-path notation.\nJMESPath mode is automatically activated when the query contains pipe (`|`), wildcards (`[*]`), filter expressions (`[?`), or function calls.\n\n### JMESPath Query Examples\n\n```\n.                          traditional: show root JSON\n.users                     traditional: navigate to users field\n.users[0].name             traditional: array index + field access\n\n.users[*].name             wildcard projection: extract name from every user\n.users[*].address.city     nested wildcard projection\n.users[*].<Tab>            show field candidates from array elements\n\n. | keys(@)                pipe: list root object keys\n.users | length(@)         pipe: count users array\n.users | sort_by(@, &name) pipe: sort users by name field\n.users | reverse(@)        pipe: reverse the array\n\n.[1] | to_array(@)[0].id   chained pipe with indexing\n. | to_array(@)[0]         wrap root in array and index\n\n.users[*].name | [0]       project names then index\n```\n\n### Wildcard Projection + Array Index\n\nAfter a wildcard projection like `.game_indices[*].version`, the result is an array.\nUse `[N]` to navigate into it — jid automatically rewrites to pipe form internally:\n\n```\n.game_indices[*]           → field candidates: game_index, version\n.game_indices[*].version   → shows array of version objects; suggests [\n.game_indices[*].version[0]           → first version object {name, url}\n.game_indices[*].version[0].name      → first version's name\n.game_indices[*].version[0] | keys(@) → keys of first version object\n.game_indices[*].version[0] | keys(@) | sort(@)  → sorted keys\n```\n\n> **Note**: In standard JMESPath, `[*].field[0]` applies `[0]` to each projected\n> element rather than the projected array, producing `[]`. jid detects this pattern\n> and transparently rewrites it to `[*].field | [0]` so `[0]` indexes the array.\n\n### Function Candidates\n\nWhen you type `|` after a field, jid shows available JMESPath functions filtered by the type of the preceding expression:\n\n| Input type | Suggested functions |\n|:-----------|:-------------------|\n| Array | `avg`, `contains`, `join`, `length`, `map`, `max`, `max_by`, `min`, `min_by`, `not_null`, `reverse`, `sort`, `sort_by`, `sum`, `to_array`, `to_string`, `type` |\n| Object | `keys`, `length`, `merge`, `not_null`, `to_array`, `to_string`, `type`, `values` |\n| String | `contains`, `ends_with`, `length`, `not_null`, `reverse`, `starts_with`, `to_array`, `to_number`, `to_string`, `type` |\n| Number | `abs`, `ceil`, `floor`, `not_null`, `to_array`, `to_string`, `type` |\n\nA usage description is shown below the candidate list (toggle with `Ctrl+X`).\n\n### Candidate Key Highlighting\n\nThe matching JSON key is highlighted in yellow and the view auto-scrolls to it in two situations:\n\n- **While typing** — as soon as the query narrows down to a single candidate (e.g. typing `.na` when only `name` matches), the corresponding key is highlighted immediately, before pressing `Tab`.\n- **While cycling with `Tab` / `Shift+Tab`** — the key for each selected candidate is highlighted as you cycle through the list.\n\nIn both cases, if the key is outside the visible area the JSON view scrolls to bring it into view. Only the key at the correct nesting level is highlighted — nested keys with the same name are ignored.\n\n### Function Argument Templates\n\nWhen a function candidate is confirmed, the arguments are automatically filled in and the cursor is placed at the right position:\n\n| Function | Inserted as | Cursor position |\n|:---------|:-----------|:----------------|\n| `contains` | `contains(@, '')` | inside `''` |\n| `ends_with` | `ends_with(@, '')` | inside `''` |\n| `starts_with` | `starts_with(@, '')` | inside `''` |\n| `join` | `join('', @)` | inside `''` (separator) |\n| `sort_by` | `sort_by(@, &field)` | on `field` placeholder |\n| `max_by` | `max_by(@, &field)` | on `field` placeholder |\n| `min_by` | `min_by(@, &field)` | on `field` placeholder |\n| `map` | `map(&expr, @)` | on `expr` placeholder |\n\nPlaceholder text is shown in cyan. Typing any character replaces the entire placeholder.\n\n#### `&field` Candidate Completion\n\nFor functions that take a `&field` argument (`sort_by`, `max_by`, `min_by`, `map`),\njid automatically shows the available field names from the base array as soon as the\n`&field` template is inserted:\n\n```\n.stats | sort_by(@, &field)   →  field names shown: base_stat  effort  stat\n.stats | sort_by(@, &b        →  filtered: base_stat\n.stats | sort_by(@, &base_stat)  →  confirmed; expression evaluates normally\n```\n\n- **Tab / Shift+Tab** cycles through field candidates; cursor stays between `&` and `)`\n- **Typing** filters candidates by the partial name after `&`\n- **Enter** or **Tab** (when only one candidate) confirms the selection\n- **Ctrl+W** deletes the field name but keeps `&` (e.g. `&base_stat)` → `&`)\n\n### Wildcard Projection Navigation\n\nAfter a wildcard expression like `.game_indices[*]`, jid shows the field names of the array elements as candidates:\n\n```\n.game_indices[*]           → candidates: game_index, version\n.game_indices[*].<Tab>     → same candidates (trailing dot still shows fields)\n.game_indices[*].v<Tab>    → filtered: version\n.game_indices[*].version   → shows array result; suggests [ for index navigation\n.game_indices[*].version[0] → first version object; candidates: name, url\n```\n\n### Ctrl+W in JMESPath Mode\n\n`Ctrl+W` removes one segment at a time from the end of a JMESPath expression:\n\n```\n.[3] | to_array(@)[0].id  →(Ctrl+W)→  .[3] | to_array(@)[0]\n.[3] | to_array(@)[0]     →(Ctrl+W)→  .[3] | to_array(@)\n.[3] | to_array(@)        →(Ctrl+W)→  .[3] |\n.[3] |                    →(Ctrl+W)→  .[3]\n```\n\nInside a function call, the `&field` argument is treated as one unit and `&` is preserved:\n\n```\n.stats | max_by(@, &base_stat)  →(Ctrl+W)→  .stats | max_by(@, &\n.stats | max_by(@, &            →(Ctrl+W)→  .stats |\n```\n","summary":" Jid (JSON Incremental Digger) is an interactive command-line tool that enables real-time exploration and filtering of JSON data using jq-like queries and JMESPath expressions. It features tab-completion for object keys, auto-suggestion of functions with argument templates, and dynamic highlighting that shows matching keys as users drill down into nested structures. The tool accepts JSON via stdin, files, or piped commands like curl, making it particularly useful for developers and system administrators inspecting complex API responses or log files without writing scripts. By supporting wildcards, pipes, and built-in JMESPath functions in an intuitive terminal interface, jid streamlines the extraction of specific data from large JSON documents.","description":"json incremental digger","stars":7118,"language":"Go"},{"owner":"lightfeed","repo":"extractor","url":"https://github.com/lightfeed/extractor","readme":"<h1 align=\"center\">\n  <img src=\"https://www.lightfeed.ai/static/site/logo.svg\" width=\"32\" height=\"32\" alt=\"Lightfeed Logo\"/>\n  Lightfeed Extractor\n</h1>\n\n<p align=\"center\">\n  <strong>Robust Web Data Extractor Using LLMs</strong>\n</p>\n\n<div align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@lightfeed/extractor\">\n    <img src=\"https://img.shields.io/npm/v/@lightfeed/extractor?logo=npm\" alt=\"npm\" /></a>\n  <a href=\"https://github.com/lightfeed/extractor/actions/workflows/test.yml\">\n      <img src=\"https://img.shields.io/github/actions/workflow/status/lightfeed/extractor/test.yml?branch=main\"\n          alt=\"Test status (main branch)\"></a>\n  <a href=\"https://github.com/lightfeed/extractor/blob/main/LICENSE\">\n    <img src=\"https://img.shields.io/github/license/lightfeed/extractor\" alt=\"License\" /></a>\n        <a href=\"https://www.linkedin.com/company/lightfeed-ai\">\n    <img src=\"https://img.shields.io/badge/Follow%20on%20LinkedIn-0A66C2?logo=linkedin&logoColor=white\" alt=\"Follow on LinkedIn\" /></a>\n</div>\n\n## Overview\nLightfeed Extractor is a Typescript library built for robust web data extraction using LLMs. Use natural language prompts to extract structured data from HTML, markdown, or plain text. Get complete, accurate results with great token efficiency — critical for production data pipelines.\n\n### Features\n\n- 🧹 [**LLM-ready Markdown**](#html-to-markdown-conversion) - Convert HTML to LLM-ready markdown, with options to extract only main content and clean URLs by removing tracking parameters.\n\n- ⚡️ [**LLM Extraction**](#llm-extraction-function) - Use LLMs in JSON mode to extract structured data according to input Zod schema. Token usage limit and tracking included.\n\n- 🛠️ [**JSON Recovery**](#json-recovery) - Sanitize and recover failed JSON output. This makes complex schema extraction much more robust, especially with deeply nested objects and arrays.\n\n- 🔗 [**URL Validation**](#url-validation) - Handle relative URLs, remove invalid ones, and repair markdown-escaped links.\n\n- 🤖 [**Works with Playwright**](#using-with-playwright) - Use Playwright to load pages, then extract structured data from the HTML content.\n\n- 🧭 [**AI Browser Navigation**](#using-with-browser-agent) - Pair with [@lightfeed/browser-agent](https://github.com/lightfeed/browser-agent) to navigate pages using natural language commands before extracting structured data.\n\n> [!TIP]  \n> Building retail competitor intelligence at scale? Go to [lightfeed.ai](https://lightfeed.ai) - our full platform for tracking competitor pricing, sales, promotions, and SEO.\n\n## Installation\n\nInstall the extractor along with `@langchain/core` and your chosen LLM provider:\n\n```bash\nnpm install @lightfeed/extractor @langchain/core\n```\n\nThen add your LLM provider (we use LangChain for interoperability):\n\n```bash\nnpm install @langchain/openai         # OpenAI\nnpm install @langchain/google-genai   # Google Gemini\nnpm install @langchain/anthropic      # Anthropic\nnpm install @langchain/ollama         # Ollama (local models)\n```\n\n> [!IMPORTANT]\n> `@langchain/core` is a required peer dependency shared by this library and all `@langchain/*` providers. Always install it explicitly to avoid version conflicts.\n\n## Usage\n\n### E-commerce Product Extraction\n\nThis example demonstrates extracting structured product data from an e-commerce website using Playwright to load the page and the extractor to pull structured data.\n\n```typescript\nimport { ChatGoogleGenerativeAI } from \"@langchain/google-genai\";\nimport { chromium } from \"playwright\";\nimport { extract, ContentFormat } from \"@lightfeed/extractor\";\nimport { z } from \"zod\";\n\n// Define schema for product catalog extraction\nconst productCatalogSchema = z.object({\n  products: z\n    .array(\n      z.object({\n        name: z.string().describe(\"Product name or title\"),\n        brand: z.string().optional().describe(\"Brand name\"),\n        price: z.number().describe(\"Current price\"),\n        originalPrice: z\n          .number()\n          .optional()\n          .describe(\"Original price if on sale\"),\n        rating: z.number().optional().describe(\"Product rating out of 5\"),\n        reviewCount: z.number().optional().describe(\"Number of reviews\"),\n        productUrl: z.string().url().describe(\"Link to product detail page\"),\n        imageUrl: z.string().url().optional().describe(\"Product image URL\"),\n      })\n    )\n    .describe(\"List of bread and bakery products\"),\n});\n\nconst browser = await chromium.launch();\nconst page = await browser.newPage();\n\nconst pageUrl = \"https://www.walmart.ca/en/browse/grocery/bread-bakery/10019_6000194327359\";\nawait page.goto(pageUrl);\n\ntry {\n  await page.waitForLoadState(\"networkidle\", { timeout: 10000 });\n} catch {\n  console.log(\"Network idle timeout, continuing...\");\n}\n\nconst html = await page.content();\nawait browser.close();\n\n// Extract structured product data\nconst result = await extract({\n  llm: new ChatGoogleGenerativeAI({\n    apiKey: process.env.GOOGLE_API_KEY,\n    model: \"gemini-2.5-flash\",\n    temperature: 0,\n  }),\n  content: html,\n  format: ContentFormat.HTML,\n  sourceUrl: pageUrl,\n  schema: productCatalogSchema,\n  htmlExtractionOptions: {\n    extractMainHtml: true,\n    includeImages: true,\n    cleanUrls: true\n  }\n});\n\nconsole.log(\"Found products:\", result.data.products.length);\nconsole.log(JSON.stringify(result.data, null, 2));\n\n/* Expected output:\n{\n  \"products\": [\n    {\n      \"name\": \"Dempster's® Signature The Classic Burger Buns, Pack of 8; 568 g\",\n      \"brand\": \"Dempster's\",\n      \"price\": 3.98,\n      \"originalPrice\": 4.57,\n      \"rating\": 4.7376,\n      \"reviewCount\": 141,\n      \"productUrl\": \"https://www.walmart.ca/en/ip/dempsters-signature-the-classic-burger-buns/6000188080451?classType=REGULAR&athbdg=L1300\",\n      \"imageUrl\": \"https://i5.walmartimages.ca/images/Enlarge/725/979/6000196725979.jpg?odnHeight=580&odnWidth=580&odnBg=FFFFFF\"\n    },\n    ... (more products)\n  ]\n}\n*/\n```\n\n> [!TIP]\n> Run `npm run test:browser` to execute this example, or view the complete code in [testBrowserExtraction.ts](src/dev/testBrowserExtraction.ts).\n\n### Using with Browser Agent\n\nFor pages that require interaction before extraction — searching, clicking through pagination, dismissing popups, etc. — you can pair this library with [@lightfeed/browser-agent](https://github.com/lightfeed/browser-agent). The browser agent uses AI to navigate pages via natural language commands, and this library extracts structured data from the result.\n\nInstall both packages:\n\n```bash\nnpm install @lightfeed/extractor @lightfeed/browser-agent\n```\n\nThen use the browser agent to navigate and the extractor to pull structured data:\n\n```typescript\nimport { BrowserAgent } from \"@lightfeed/browser-agent\";\nimport { ChatGoogleGenerativeAI } from \"@langchain/google-genai\";\nimport { extract, ContentFormat } from \"@lightfeed/extractor\";\nimport { z } from \"zod\";\n\nconst schema = z.object({\n  products: z.array(\n    z.object({\n      name: z.string(),\n      price: z.number(),\n      rating: z.number().optional(),\n      productUrl: z.string().url(),\n    })\n  ),\n});\n\n// 1. Use browser agent to navigate with AI\nconst agent = new BrowserAgent({ browserProvider: \"Local\" });\nconst page = await agent.newPage();\nawait page.goto(\"https://amazon.com\");\nawait page.ai(\"Search for 'organic coffee' and go to the second page of results\");\n\n// 2. Extract structured data from the resulting page\nconst html = await page.content();\nconst result = await extract({\n  llm: new ChatGoogleGenerativeAI({\n    model: \"gemini-2.5-flash\",\n    apiKey: process.env.GOOGLE_API_KEY,\n    temperature: 0,\n  }),\n  content: html,\n  format: ContentFormat.HTML,\n  sourceUrl: page.url(),\n  schema,\n  prompt: \"Extract all product listings from the search results\",\n  htmlExtractionOptions: {\n    extractMainHtml: true,\n    includeImages: true,\n    cleanUrls: true,\n  },\n});\n\nconsole.log(result.data.products);\nawait agent.close();\n```\n\nSee the [browser-agent docs](https://github.com/lightfeed/browser-agent) for more configuration options.\n\n\n### Extracting from Markdown or Plain Text\n\nYou can also extract structured data directly from HTML, Markdown or text string. Pass any [LangChain chat model](https://js.langchain.com/docs/integrations/chat/):\n\n```typescript\nimport { ChatGoogleGenerativeAI } from \"@langchain/google-genai\";\nimport { extract, ContentFormat } from \"@lightfeed/extractor\";\n\nconst result = await extract({\n  llm: new ChatGoogleGenerativeAI({\n    apiKey: process.env.GOOGLE_API_KEY,\n    model: \"gemini-2.5-flash\",\n    temperature: 0,\n  }),\n  content: markdownContent,\n  format: ContentFormat.MARKDOWN,\n  schema: mySchema,\n});\n```\n\n### Custom Extraction Prompts\n\nYou can provide a custom prompt to guide the extraction process:\n\n```typescript\nconst result = await extract({\n  llm: myLLM,\n  content: htmlContent,\n  format: ContentFormat.HTML,\n  schema: mySchema,\n  sourceUrl: \"https://example.com/products\",\n  prompt: \"Extract ONLY products that are on sale or have special discounts. Include their original prices, discounted prices, and product URL.\",\n});\n```\n\nIf no prompt is provided, a default extraction prompt will be used.\n\n### Extraction Context\n\nYou can use the `extractionContext` option to provide contextual information that enhances the extraction process. This context works alongside the content to enable more accurate and comprehensive data extraction. Common use cases include:\n\n- Enriching partial data objects with missing information from the content\n- Providing metadata like website URLs, user locations, timestamps for context-aware extraction\n- Including domain-specific knowledge or constraints\n- Merging data from multiple sources\n\nThe LLM will consider both the content and the extraction context when performing extraction:\n\n```typescript\n// Example: Using extraction context with website metadata and geolocation\nconst extractionContext = {\n  websiteUrl: \"https://acme.com/products/smart-security-camera\",\n  country: \"Canada\",\n  city: \"Vancouver\"\n};\n\nconst schema = z.object({\n  title: z.string(),\n  price: z.number(),\n  storeName: z.string().describe(\"Store name in title case from website URL or context\"),\n  inStock: z.boolean().optional(),\n  location: z.string().optional().describe(\"Location in the format of City, Country\")\n});\n\nconst result = await extract({\n  llm: myLLM,\n  content: htmlContent,\n  format: ContentFormat.HTML,\n  schema: schema,\n  sourceUrl: \"https://acme.com/products/smart-security-camera\",\n  extractionContext: extractionContext,\n});\n\n// The LLM will use the context to extract store name (acme) and consider the location\nconsole.log(result.data);\n// {\n//   title: \"Smart Security Camera\",\n//   price: 74.50,\n//   storeName: \"Acme\",\n//   inStock: true,\n//   location: \"Vancouver, Canada\"\n// }\n```\n\n### Using Any LLM via LangChain\n\nPass **any LangChain chat model** via the `llm` option. Use OpenAI, Google Gemini, Anthropic, Mistral, Ollama, Azure OpenAI, AWS Bedrock, or any [LangChain-supported provider](https://js.langchain.com/docs/integrations/chat/):\n\n```typescript\n// OpenAI\nimport { ChatOpenAI } from \"@langchain/openai\";\nconst llm = new ChatOpenAI({ modelName: \"gpt-4.1-mini\", apiKey: process.env.OPENAI_API_KEY });\n\n// Google Gemini\nimport { ChatGoogleGenerativeAI } from \"@langchain/google-genai\";\nconst llm = new ChatGoogleGenerativeAI({ model: \"gemini-2.5-flash\", apiKey: process.env.GOOGLE_API_KEY });\n\n// Anthropic\nimport { ChatAnthropic } from \"@langchain/anthropic\";\nconst llm = new ChatAnthropic({ model: \"claude-sonnet-4-20250514\", apiKey: process.env.ANTHROPIC_API_KEY });\n\n// Ollama (local)\nimport { ChatOllama } from \"@langchain/ollama\";\nconst llm = new ChatOllama({ model: \"llama3\" });\n```\n\n### Managing Token Limits\n\nUse `maxInputTokens` to truncate content when it exceeds the model's context window:\n\n```typescript\nconst result = await extract({\n  llm: new ChatOpenAI({ modelName: \"gpt-4.1-mini\", apiKey: \"...\" }),\n  content: markdownContent,\n  format: ContentFormat.MARKDOWN,\n  schema,\n  maxInputTokens: 128000, // Roughly 128K tokens (4 chars/token)\n});\n```\n\n> [!WARNING]\n> For OpenAI models, optional schema is not supported. Use `.nullable()` instead of `.optional()`.\n\n### Extracting from Main HTML\n\nFor blog posts or articles with lots of navigation elements, headers, and footers, you can use the `extractMainHtml` option to focus on just the main content:\n\n```typescript\nconst result = await extract({\n  llm: myLLM,\n  content: htmlContent,\n  format: ContentFormat.HTML,\n  schema: mySchema,\n  htmlExtractionOptions: {\n    extractMainHtml: true // Uses heuristics to remove navigation, headers, footers, etc.\n  },\n  sourceUrl,\n});\n```\n\n> [!NOTE]\n> The `extractMainHtml` option only applies to HTML format. It uses heuristics to identify and extract what appears to be the main content area (like article or main tags). It's recommended to keep this option off (false) when extracting details about a single item (like detail page for a product) as it might remove important contextual elements.\n\n### Extracting Images from HTML\n\nBy default, images are excluded from the HTML extraction process to simplify the output. If you need to extract image URLs or references, you can enable the `includeImages` option:\n\n```typescript\n// Define a schema that includes product images\nconst productListSchema = z.object({\n  products: z.array(\n    z.object({\n      name: z.string(),\n      price: z.number(),\n      description: z.string().optional(),\n      // Include an array of images for each product\n      image: z.object({\n        url: z.string().url(),\n        alt: z.string().optional(),\n      }).optional(),\n    })\n  ),\n});\n\nconst result = await extract({\n  llm: myLLM,\n  content: htmlContent,\n  format: ContentFormat.HTML,\n  schema: mySchema,\n  htmlExtractionOptions: {\n    includeImages: true // Includes images in the generated markdown\n  },\n  sourceUrl: sourceUrl,\n});\n```\n\n### URL Cleaning\n\nThe library can clean URLs to remove tracking parameters and unnecessary components, producing cleaner and more readable links. This is particularly useful for e-commerce sites that add extensive tracking parameters:\n\n```typescript\nconst result = await extract({\n  llm: myLLM,\n  content: htmlContent,\n  format: ContentFormat.HTML,\n  schema: mySchema,\n  htmlExtractionOptions: {\n    cleanUrls: true // Enable URL cleaning to remove tracking parameters\n  },\n  sourceUrl: \"https://amazon.ca/s?k=vitamins\",\n});\n// Amazon URLs like \"https://www.amazon.com/Product/dp/B123/ref=sr_1_47?dib=abc\"\n// become \"https://www.amazon.com/Product/dp/B123\"\n```\n\n> [!NOTE]\n> Currently, URL cleaning supports Amazon product URLs (amazon.com, amazon.ca) by removing `/ref=` parameters and everything after. The feature is designed to be extensible for other e-commerce platforms in the future.\n\n## LLM Extraction Function\n\n### LLM Configuration\n\nPass a [LangChain chat model](https://js.langchain.com/docs/integrations/chat/) instance via the `llm` option. Install the LangChain integration for your provider (e.g. `@langchain/openai`, `@langchain/google-genai`, `@langchain/anthropic`) and configure API keys on the model instance.\n\n### `extract<T>(options: ExtractorOptions<T>): Promise<ExtractorResult<T>>`\n\nMain function to extract structured data from content.\n\n#### Options\n\n| Option | Type | Description | Default |\n|--------|------|-------------|---------|\n| `llm` | `BaseChatModel` | A [LangChain chat model](https://js.langchain.com/docs/integrations/chat/) instance (ChatOpenAI, ChatGoogleGenerativeAI, ChatAnthropic, etc.) | Required |\n| `content` | `string` | HTML, markdown, or plain text content to extract from | Required |\n| `format` | `ContentFormat` | Content format (HTML, MARKDOWN, or TXT) | Required |\n| `schema` | `z.ZodTypeAny` | Zod schema defining the structure to extract | Required |\n| `prompt` | `string` | Custom prompt to guide the extraction process | Internal default prompt |\n| `htmlExtractionOptions` | `HTMLExtractionOptions` | HTML-specific options for content extraction [see below](#htmlextractionoptions) | `{}` |\n| `sourceUrl` | `string` | URL of the HTML content, required when format is HTML to properly handle relative URLs | Required for HTML format |\n| `maxInputTokens` | `number` | Maximum number of input tokens to send to the LLM. Uses a rough conversion of 4 characters per token. When specified, content will be truncated if the total prompt size exceeds this limit. | `undefined` |\n| `extractionContext` | `Record<string, any>` | Extraction context that provides additional information for the extraction process. Can include partial data objects to enrich, metadata like URLs/locations, or any contextual information relevant to the extraction task. | `undefined` |\n\n#### htmlExtractionOptions\n\n| Option | Type | Description | Default |\n|--------|------|-------------|---------|\n| `extractMainHtml` | `boolean` | When enabled for HTML content, attempts to extract the main content area, removing navigation bars, headers, footers, sidebars etc. using heuristics. Should be kept off when extracting details about a single item. | `false` |\n| `includeImages` | `boolean` | When enabled, images in the HTML will be included in the markdown output. Enable this when you need to extract image URLs or related content. | `false` |\n| `cleanUrls` | `boolean` | When enabled, removes tracking parameters and unnecessary URL components to produce cleaner links. Currently supports cleaning Amazon product URLs by removing `/ref=` parameters and everything after. This helps produce more readable URLs in the markdown output. | `false` |\n\n#### Return Value\n\nThe function returns a Promise that resolves to an `ExtractorResult<T>` object:\n\n```typescript\ninterface ExtractorResult<T> {\n  data: T;             // Extracted structured data\n  processedContent: string;    // Processed content that was sent to the LLM. Markdown if the input was HTM (after conversion)\n  usage: {             // Token usage statistics\n    inputTokens?: number;\n    outputTokens?: number;\n  };\n}\n```\n\n## Using with Playwright\n\nUse [Playwright](https://playwright.dev/) to load web pages, then pass the HTML content to the extractor. Install Playwright separately:\n\n```bash\nnpm install playwright\n```\n\n```typescript\nimport { chromium } from \"playwright\";\nimport { extract, ContentFormat } from \"@lightfeed/extractor\";\n\nconst browser = await chromium.launch();\nconst page = await browser.newPage();\nawait page.goto(\"https://example.com/products\");\n\nconst html = await page.content();\nawait browser.close();\n\nconst result = await extract({\n  llm: myLLM,\n  content: html,\n  format: ContentFormat.HTML,\n  sourceUrl: \"https://example.com/products\",\n  schema: mySchema,\n});\n```\n\n## HTML to Markdown Conversion\n\nThe `convertHtmlToMarkdown` utility function allows you to convert HTML content to markdown without performing extraction.\n\n**Function signature:**\n```typescript\nconvertHtmlToMarkdown(html: string, options?: HTMLExtractionOptions, sourceUrl?: string): string\n```\n\n### Parameters\n\n| Parameter | Type | Description | Default |\n|-----------|------|-------------|---------|\n| `html` | `string` | HTML content to convert to markdown | Required |\n| `options` | `HTMLExtractionOptions` | See [HTML Extraction Options](#html-extraction-options) | `undefined` |\n| `sourceUrl` | `string` | URL of the HTML content, used to properly convert relative URLs to absolute URLs | `undefined` |\n\n### Return Value\n\nThe function returns a string containing the markdown conversion of the HTML content.\n\n### Example\n\n```typescript\nimport { convertHtmlToMarkdown, HTMLExtractionOptions } from \"@lightfeed/extractor\";\n\n// Basic conversion\nconst markdown = convertHtmlToMarkdown(\"<h1>Hello World</h1><p>This is a test</p>\");\nconsole.log(markdown);\n// Output: \"Hello World\\n===========\\n\\nThis is a test\"\n\n// With options to extract main content, include images, and clean URLs\nconst options: HTMLExtractionOptions = {\n  extractMainHtml: true,\n  includeImages: true,\n  cleanUrls: true // Clean URLs by removing tracking parameters\n};\n\n// With source URL to handle relative links\nconst markdownWithOptions = convertHtmlToMarkdown(\n  `<html>\n    <body>\n      <header>Header</header>\n      <div>\n        <img src=\"/images/logo.png\" alt=\"Logo\">\n        <a href=\"/about\">About</a>\n        <a href=\"https://www.amazon.com/product/dp/B123/ref=sr_1_1\">Amazon Product</a>\n      </div>\n    </body>\n    <footer>Footer content</footer>\n  </html>`,\n  options,\n  \"https://example.com\"\n);\nconsole.log(markdownWithOptions);\n// Output: \"![Logo](https://example.com/images/logo.png)[About](https://example.com/about)[Amazon Product](https://www.amazon.com/product/dp/B123)\"\n```\n\n## JSON Recovery\n\nThe `safeSanitizedParser` utility function helps sanitize and recover partial data from LLM outputs that may not perfectly conform to your schema.\n\n**Function signature:**\n```typescript\nsafeSanitizedParser<T>(schema: ZodTypeAny, rawObject: unknown): z.infer<T> | null\n```\n\n```typescript\nimport { safeSanitizedParser } from \"@lightfeed/extractor\";\nimport { z } from \"zod\";\n\n// Define a product catalog schema\nconst productSchema = z.object({\n  products: z.array(\n    z.object({\n      id: z.number(),\n      name: z.string(), // Required field\n      price: z.number().optional(), // Optional number\n      inStock: z.boolean().optional(),\n      category: z.string().optional(),\n    })\n  ),\n  storeInfo: z.object({\n    name: z.string(),\n    location: z.string().optional(),\n    rating: z.number().optional(),\n  })\n});\n\n// Example LLM output with realistic validation issues\nconst rawLLMOutput = {\n  products: [\n    {\n      id: 1,\n      name: \"Laptop\",\n      price: 999,\n      inStock: true,\n    }, // Valid product\n    {\n      id: 2,\n      name: \"Headphones\",\n      price: \"N/A\", // Non-convertible string for optional number\n      inStock: true,\n      category: \"Audio\",\n    },\n    {\n      id: 3,\n      // Missing required \"name\" field\n      price: 45.99,\n      inStock: false\n    },\n    {\n      id: 4,\n      name: \"Keyboard\",\n      price: 59.99,\n      inStock: true\n    } // Valid product\n  ],\n  storeInfo: {\n    name: \"TechStore\",\n    location: \"123 Main St\",\n    rating: \"N/A\" // Invalid: rating is not a number\n  }\n};\n\n// Sanitize the data to recover what's valid\nconst sanitizedData = safeSanitizedParser(productSchema, rawLLMOutput);\n\n// Result:\n// {\n//   products: [\n//     {\n//       id: 1,\n//       name: \"Laptop\",\n//       price: 999,\n//       inStock: true,\n//     },\n//     {\n//       id: 2,\n//       name: \"Headphones\",\n//       inStock: true,\n//       category: \"Audio\",\n//     },\n//     {\n//       id: 4,\n//       name: \"Keyboard\",\n//       price: 59.99,\n//       inStock: true,\n//     }\n//   ],\n//   storeInfo: {\n//     name: \"TechStore\",\n//     location: \"123 Main St\",\n//   }\n// }\n```\n\nThis utility is especially useful when:\n- LLMs return non-convertible data for optional fields (like \"N/A\" for numbers)\n- Some objects in arrays are missing required fields\n- Objects contain invalid values that don't match constraints\n- You want to recover as much valid data as possible while safely removing problematic parts\n\n## URL Validation\n\nThe library provides robust URL validation and handling through Zod's `z.string().url()` validator:\n\n```typescript\nconst schema = z.object({\n  title: z.string(),\n  link: z.string().url(),      // Full URL validation works!\n  sources: z.array(z.string().url())  // Also works with arrays of URLs\n});\n\nconst result = await extract({\n  llm: myLLM,\n  content: markdownContent,\n  format: ContentFormat.MARKDOWN,\n  schema,\n  // ... other options\n});\n```\n\n### How URL Validation Works\n\nOur URL validation system provides several key benefits:\n\n1. **Validation**: Uses Zod's built-in `url()` validator to ensure URLs are properly formatted\n2. **Special Character Handling**: Automatically fixes URLs with escaped special characters in markdown (e.g., `https://example.com/meeting-\\(2023\\)` becomes `https://example.com/meeting-(2023)`)\n3. **Relative URL Resolution**: Converts relative URLs to absolute URLs when `sourceUrl` is provided\n4. **Invalid URL Handling**: Skips invalid URLs rather than failing the entire extraction using our `safeSanitizedParser`\n\nThis approach ensures reliable URL extraction while maintaining the full power of Zod's schema validation.\n\n## Development\n\n### Setup\n\n1. Clone the repository\n2. Install dependencies with `npm install`\n3. Create a `.env` file in the root directory with your API keys (see `.env.example`)\n\n### Scripts\n\n- `npm run build` - Build the library\n- `npm run clean` - Remove build artifacts\n- `npm run test` - Run all tests (requires API keys for integration tests)\n- `npm run dev` - Run the example file\n\n### Running Local Tests\n\nYou can test the library with real API calls and sample HTML files:\n\n```bash\n# Run all local tests with both providers\nnpm run test:local\n\n# Run specific test type with both providers\nnpm run test:local -- blog\nnpm run test:local -- product\n\n# Run tests with a specific provider\nnpm run test:local -- blog openai   # Test blog extraction with OpenAI\nnpm run test:local -- product gemini  # Test product extraction with Google Gemini\n```\n\n### Testing\n\nThe library includes both unit tests and integration tests:\n\n- **Unit tests**: Test individual components without making API calls\n- **Integration tests**: Test full extraction pipeline with real API calls\n\nIntegration tests require valid API keys to be provided in your `.env` file or environment variables. Tests will fail if required API keys are not available.\n\nEach integration test runs with both Google Gemini and OpenAI to ensure compatibility across providers.\n\n#### HTML to Markdown Integration Tests\n\nThis project includes comprehensive integration tests for the HTML to Markdown converter using real-world HTML samples. The tests validate three conversion types:\n\n1. Basic conversion (no images)\n2. Main content extraction (no images)\n3. Conversion with images included\n\nThese tests use a Git submodule with HTML files and groundtruth markdown files. The submodule is not downloaded by default to keep the repository lightweight. To run these tests:\n\n```bash\n# First time: Initialize and download the test data submodule\nnpm run test:html2md:update\n\n# Run the HTML to Markdown integration tests\nnpm run test:html2md\n\n# Update test data if new test files are available\nnpm run test:html2md:sync\n```\n\nThe test suite automatically discovers all available test files and creates test cases for each conversion type that has a corresponding groundtruth file.\n\n#### Running Specific Tests\n\nYou can run individual tests by using the `-t` flag with a pattern that matches the test description:\n\n```bash\n# Run a specific test by exact description\nnpm run test -- -t \"should extract blog post data using Google Gemini default model\"\n\n# Run all tests that include a specific keyword\nnpm run test -- -t \"blog post\"\n\n# Run all tests for a specific provider\nnpm run test -- -t \"OpenAI\"\n\n# Run all unit tests for a specific utility\nnpm run test -- -t \"safeSanitizedParser\"\n\n# Run specific HTML to Markdown tests\nnpm run test -- -t \"should convert forum/tech-0 to markdown\"\n```\n\nThe `-t` flag uses pattern matching, so you can be as specific or general as needed to select the tests you want to run.\n\n## Support\n\nIf you need direct assistance with your implementation:\n- Email us at support@lightfeed.ai\n- Open an issue in this repository\n\n## License\n\nApache 2.0\n","summary":" Lightfeed Extractor is a TypeScript library that leverages Large Language Models to extract structured data from HTML, markdown, or plain text using natural language prompts and Zod schemas. It features LLM-ready content conversion, robust JSON recovery for failed outputs, URL validation, and seamless integration with Playwright and AI browser agents for automated navigation. Designed for production data pipelines with token efficiency in mind, it serves developers building reliable web scraping and monitoring tools, particularly for competitive intelligence and e-commerce applications.","description":"Use LLMs to robustly extract web data","stars":312,"language":"TypeScript"},{"owner":"PrimeIntellect-ai","repo":"verifiers","url":"https://github.com/PrimeIntellect-ai/verifiers","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/user-attachments/assets/40c36e38-c5bd-4c5a-9cb3-f7b902cd155d\">\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/6414bc9b-126b-41ca-9307-9e982430cde8\">\n    <img alt=\"Prime Intellect\" src=\"https://github.com/user-attachments/assets/6414bc9b-126b-41ca-9307-9e982430cde8\" width=\"312\" style=\"max-width: 100%;\">\n  </picture>\n</p>\n\n---\n\n<h3 align=\"center\">\nVerifiers: Environments for LLM Reinforcement Learning\n</h3>\n\n<p align=\"center\">\n  <a href=\"https://docs.primeintellect.ai/verifiers\">Documentation</a> •\n  <a href=\"https://app.primeintellect.ai/dashboard/environments?ex_sort=most_stars\">Environments Hub</a> •\n  <a href=\"https://github.com/PrimeIntellect-ai/prime-rl\">PRIME-RL</a>\n</p>\n\n---\n\n<p align=\"center\">\n  <a href=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/style.yml\">\n    <img src=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/style.yml/badge.svg\" alt=\"Style\" />\n  </a>\n  <a href=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/test.yml\">\n    <img src=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/test.yml/badge.svg\" alt=\"Test\" />\n  </a>\n  <a href=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/publish-envs.yml\">\n    <img src=\"https://github.com/PrimeIntellect-ai/verifiers/actions/workflows/publish-envs.yml/badge.svg\" alt=\"Envs\" />\n  </a>\n</p>\n\n## News & Updates\n\n- [04/17/26] v0.1.12 is released, featuring a new composable Task/Agent/Environment architecture, upstreamed opencode and RLM harnesses/tasksets, major `RLMEnv` improvements (context dropping, prompt builder, hardened transport), multi-worker env server support, expanded `vf-tui` capabilities, and richer eval configuration.\n- [03/12/26] v0.1.11 is released, featuring a unified client stack, major `RLMEnv` and env server reliability improvements, a substantially refined eval TUI, new pass@k and ablation sweep support, and bundled opencode environments.\n- [02/10/26] v0.1.10 is released, featuring OpenEnv and BrowserEnv integrations, resumed evals, improved rollout and token tracking, safer sandbox lifecycle behavior, refreshed workspace setup, and opencode harbor improvements.\n- [01/08/26] v0.1.9 is released, featuring a number of new experimental environment class types, monitor rubrics for automatic metric collection, improved workspace setup flow, improved error handling, bug fixes, and a documentation overhaul.\n- [11/19/25] v0.1.8 is released, featuring a major refactor of the rollout system to use trajectory-based tracking for token-in token-out training across turns, as well as support for truncated or branching rollouts.\n- [11/07/25] Verifiers v0.1.7 is released! This includes an improved quickstart configuration for training with [prime-rl](https://github.com/PrimeIntellect-ai/prime-rl), a new included \"nano\" trainer (`vf.RLTrainer`, replacing `vf.GRPOTrainer`), and a number of bug fixes and improvements to the documentation.\n- [10/27/25] A new iteration of the Prime Intellect [Environments Program](https://docs.google.com/spreadsheets/d/13UDfRDjgIZXsMI2s9-Lmn8KSMMsgk2_zsfju6cx_pNU/edit?gid=0#gid=0) is live!  \n\n\n# Overview\n\nVerifiers is our library for creating environments to train and evaluate LLMs.\n\nEnvironments contain everything required to run and evaluate a model on a particular task:\n- A *dataset* of task inputs\n- A *harness* for the model (tools, sandboxes, context management, etc.)\n- A reward function or *rubric* to score the model's performance\n\nEnvironments can be used for training models with reinforcement learning (RL), evaluating capabilities, generating synthetic data, experimenting with agent harnesses, and more. \n\nVerifiers is tightly integrated with the [Environments Hub](https://app.primeintellect.ai/dashboard/environments?ex_sort=most_stars), as well as our training framework [prime-rl](https://github.com/PrimeIntellect-ai/prime-rl) and our [Hosted Training](https://app.primeintellect.ai/dashboard/training) platform.\n\n## Getting Started\n\nEnsure you have `uv` installed, as well as the `prime` [CLI](https://docs.primeintellect.ai/cli-reference/introduction) tool:\n```bash\n# install uv\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n# install the prime CLI\nuv tool install prime\n# log in to the Prime Intellect platform\nprime login\n```\nTo set up a new workspace for developing environments, do:\n```bash\n# ~/dev/my-lab\nprime lab setup \n```\n\nThis sets up a Python project if needed (with `uv init`), installs `verifiers` (with `uv add verifiers`), creates the recommended workspace structure, and downloads useful starter files:\n```\nconfigs/\n├── endpoints.toml      # OpenAI-compatible API endpoint configuration\n├── rl/                 # Example configs for Hosted Training\n├── eval/               # Example multi-environment eval configs\n└── gepa/               # Example configs for prompt optimization\n.prime/\n└── skills/             # Bundled workflow skills for create/browse/review/eval/GEPA/train/brainstorm\nenvironments/\n└── AGENTS.md           # Documentation for AI coding agents\nAGENTS.md               # Top-level documentation for AI coding agents\nCLAUDE.md               # Claude-specific pointer to AGENTS.md\n```\n\nAlternatively, add `verifiers` to an existing project:\n```bash\nuv add verifiers && prime lab setup --skip-install\n```\n\nEnvironments built with Verifiers are self-contained Python modules. To initialize a fresh environment template, do:\n```bash\nprime env init my-env # creates a new template in ./environments/my_env\n```\nFor OpenEnv integration, use:\n```bash\nprime env init my-openenv --openenv\n```\nThen copy your OpenEnv project into `environments/my_openenv/proj/` and build the image with:\n```bash\nuv run vf-build my-openenv\n```\n\nThis will create a new module called `my_env` with a basic environment template.\n```\nenvironments/my_env/\n├── my_env.py           # Main implementation\n├── pyproject.toml      # Dependencies and metadata\n└── README.md           # Documentation\n```\n\nEnvironment modules should expose a `load_environment` function which returns an instance of the Environment object, and which can accept custom arguments. For example: \n```python\n# my_env.py\nimport verifiers as vf\n\ndef load_environment(dataset_name: str = 'gsm8k') -> vf.Environment:\n    dataset = vf.load_example_dataset(dataset_name) # 'question'\n    async def correct_answer(completion, answer) -> float:\n        completion_ans = completion[-1]['content']\n        return 1.0 if completion_ans == answer else 0.0\n    rubric = Rubric(funcs=[correct_answer])\n    env = vf.SingleTurnEnv(dataset=dataset, rubric=rubric)\n    return env\n```\n\nTo install the environment module into your project, do:\n```bash\nprime env install my-env # installs from ./environments/my_env\n```\n\nTo install an environment from the Environments Hub into your project, do:\n```bash\nprime env install primeintellect/math-python\n```\n\nTo run a local evaluation with any OpenAI-compatible model, do:\n```bash\nprime eval run my-env -m openai/gpt-5-nano # run and save eval results locally\n```\nEvaluations use [Prime Inference](https://docs.primeintellect.ai/inference/overview) by default; configure your own API endpoints in `./configs/endpoints.toml`.\n\nView local evaluation results in the terminal UI:\n```bash\nprime eval tui\n```\n\nTo publish the environment to the [Environments Hub](https://app.primeintellect.ai/dashboard/environments?ex_sort=most_stars), do:\n```bash\nprime env push --path ./environments/my_env\n```\n\nTo run an evaluation directly from the Environments Hub, do:\n```bash\nprime eval run primeintellect/math-python\n```\n\n## Documentation\n\n**[Environments](docs/environments.md)** — Create datasets, rubrics, and custom multi-turn interaction protocols.\n\n**[Evaluation](docs/evaluation.md)** - Evaluate models using your environments.\n\n**[Training](docs/training.md)** — Train models in your environments with reinforcement learning.\n\n**[Development](docs/development.md)** — Contributing to verifiers\n\n**[API Reference](docs/reference.md)** — Understanding the API and data structures\n\n**[FAQs](docs/faqs.md)** - Other frequently asked questions.\n\n\n## Citation\n\nOriginally created by Will Brown ([@willccbb](https://github.com/willccbb)).\n\nIf you use this code in your research, please cite:\n\n```bibtex\n@misc{brown_verifiers_2025,\n  author       = {William Brown},\n  title        = {{Verifiers}: Environments for LLM Reinforcement Learning},\n  howpublished = {\\url{https://github.com/PrimeIntellect-ai/verifiers}},\n  note         = {Commit abcdefg • accessed DD Mon YYYY},\n  year         = {2025}\n}\n```\n","summary":" Verifiers is a library for creating structured environments that enable reinforcement learning training and evaluation of large language models. Each environment bundles task datasets, agent harnesses with sandboxed tool integration, and customizable reward rubrics to score model outputs, supporting applications from RL fine-tuning to synthetic data generation and capability benchmarking. The framework features trajectory-based rollout tracking, hardened sandbox lifecycle management, and seamless integration with the Prime Intellect Environments Hub and distributed training infrastructure. It primarily serves AI researchers and developers building sophisticated agent systems that require safe, reproducible evaluation environments for multi-turn interactions and tool-using LLMs.","description":"Our library for RL environments + evals","stars":4027,"language":"Python"},{"owner":"jkool702","repo":"forkrun","url":"https://github.com/jkool702/forkrun","readme":"# forkrun — NUMA-Aware Contention-Free Streaming Parallelization\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](https://opensource.org/licenses/MIT)\n\n**forkrun is a self-tuning, drop-in replacement for GNU Parallel and `xargs -P` that accelerates shell-based data preparation by 50×–400× on modern CPUs and scales linearly on NUMA architectures.**\n\n**forkrun achieves:**\n- **200,000+ batch dispatches/sec** (vs ~500 for GNU Parallel)\n- **~95–99% CPU utilization** across all cores (vs ~6% for GNU Parallel)\n- **Near-zero cross-socket memory traffic** (NUMA-aware “born-local” design)\n\nforkrun is built for high-frequency, low-latency workloads on deep NUMA hardware — a regime where existing tools leave most cores idle due to IPC overhead and cross-socket data migration.\n\n---\n\n## 🚀 Quick Start (Installation & Usage)\n\nforkrun is distributed as a single `bash` file with an embedded, self-extracting compiled C extension. There are no external dependencies (no Perl, no Python). \n\nDownload and source it directly:\n```bash\nsource <(curl -sL https://raw.githubusercontent.com/jkool702/forkrun/main/frun.bash)\n```\n*(Note: Sourcing the script sets up the required C loadable builtins in your shell environment).*\n\nOnce sourced, `frun` acts as a drop-in parallelizer:\n```bash\nfrun my_bash_func < inputs.txt             # parallelize custom bash functions natively!\ncat file_list | frun -k sed 's/old/new/'   # pipe-based input, ordered output\nfrun -k -s sort < records.tsv              # stdin-passthrough, ordered output\nfrun -s -I 'gzip -c >{ID}.gz' < raw_logs   # stdin-passthrough, unique output names\n```\n\n**Verifiable Builds**: The embedded C-extension is compiled and injected transparently via GitHub Actions. You can trace the git blame of the Base64 blob directly to the public CI workflow run that compiled forkrun_ring.c, guaranteeing the binary contains no hidden malicious code.\n\n---\n\n## ⚡ Benchmarks (14-core/28-thread i9-7940x, 100M lines)\n\n| Workload                                      | forkrun                 | GNU Parallel                 | Speedup    | Notes |\n|-----------------------------------------------|-------------------------|------------------------------|------------|-------|\n| Default (array + fully-quoted args, no-op)    | **24 M lines/s**        | 58 k lines/s                 | **~415×**  | forkrun default mode |\n| Ordered output (`-k`, no-op)                  | **24.5 M lines/s**      | 57 k lines/s                 | **~430×**  | ordering is free in forkrun |\n| `echo` (line args)                            | **22.6 M lines/s**      | ~55 k lines/s                | **~410×**  | typical shell command |\n| `printf '%s\\n'` (I/O heavy)                   | **12.8 M lines/s**      | ~58 k lines/s                | **~220×**  | formatting + output |\n| `-s` stdin passthrough (no-op)                | **893 M lines/s**       | 6.05 M lines/s (`--pipe`)    | **~148×**  | streaming / splice |\n| `-b 524288` byte batches (no-op)              | **1.54 B lines/s**      | 6.02 M lines/s (`--pipe`)    | **~256×**  | kernel-limited |\n\n**Average CPU utilization across ~400 benchmarks**  \n- **forkrun:** 95% (27.1 / 28 cores) — *No centralized dispatcher; all 27.1 cores do actual work.*\n- **GNU Parallel:** 6% (2.68 / 28 cores) — *1 full core used strictly for dispatching work; 1.68 cores doing actual work.*\n\n---\n\n## 🧠 How It Works: The Physics of forkrun\n\nTraditional tools like GNU Parallel use heavy regex parsing and IPC dispatch loops that bottleneck multi-socket servers. **forkrun** operates completely differently. The pipeline has four stages, each designed to preserve physical locality:\n\n1. **Ingest (Born-Local NUMA):** Data is `splice()`'d from stdin into a shared memfd. This is **PFS-friendly** (avoids Lustre/NFS metadata storms). On multi-socket systems, `set_mempolicy(MPOL_BIND)` places each chunk's pages on a target NUMA node *before any worker touches them*. This placement is driven by real-time backpressure from the per-node indexers, making NUMA distribution completely self-load-balancing.\n2. **Index:** Per-node indexers (pinned to their socket) find record boundaries using AVX2/NEON SIMD scanning at memory bandwidth. They dynamically batch based on runtime conditions, then publish offset markers into a per-node lock-free ring buffer.\n3. **Claim (Contention-Free):** Workers claim batches via a single `atomic_fetch_add` — no CAS retry loops, no locks, no contention. Overshoots are handled by depositing remainders into an escrow pipe for idle workers to steal.\n4. **Reclaim:** A background fallow thread punches holes behind completed work via `fallocate(PUNCH_HOLE)`, bounding memory usage without breaking the offset coordinate system.\n\n**Adaptive tuning** is fully automatic. A PID-based controller discovers the optimal batch size in O(log L) steps and continuously adjusts based on input rate, consumption rate, and worker starvation — with no user `-n` or `-j` configuration required.\n\n---\n\n## 🛠 Requirements & Dependencies\n\nforkrun is designed to run anywhere with zero friction:\n*   **Required:** Bash ≥ 4.0 (Bash 5.1+ highly recommended for array performance), Linux Kernel ≥ 3.17 (for `memfd`).\n\n---\n\n## 🏛️ Legacy Version (v2)\n\nWith the release of v3.0.0, `forkrun` has transitioned to a high-performance C-ring architecture (`frun.bash`). The older v2, pure-Bash coproc-based version (`forkrun.bash`) remains available in the `legacy/` directory. While v3 (`frun.bash`) is highly recommended for all modern workloads, v2 (`forkrun.bash`) remains as an alternate fully-functional high-performance bash stream parallelizer. forkrun v1 is not recommended for use.\n\n---\n\n## 🛣 Roadmap\n\nforkrun currently guarantees correctness under the assumption that at least one worker per NUMA node remains alive until its assigned work completes — a safe assumption for local shell operations on healthy compute nodes. \n\nPriorities for the development roadmap include:\n- **Failure isolation and per-batch retries** to handle transient worker crashes.\n- **Resume-after-interruption** state saving to gracefully handle preempted cluster/Slurm jobs.\n- **Deeper integration** with facility workload managers.\n\n*(If forkrun is saving your institution compute-hours, please consider sponsoring its development to accelerate these features!)*\n\n","summary":" forkrun is a high-performance, self-tuning parallelization tool designed as a drop-in replacement for GNU Parallel and xargs that achieves massive speedups (50×–400×) on modern multi-core and NUMA architectures. By employing a \"born-local\" NUMA-aware design using kernel splice operations and memory binding, it eliminates cross-socket traffic and IPC overhead to achieve over 200,000 batch dispatches per second with near-linear scaling and 95–99% CPU utilization. Distributed as a single bash script with an embedded, verifiable C extension and no external dependencies, it seamlessly parallelizes shell functions and commands while maintaining ordered output and extreme throughput. It is ideal for users running intensive, high-frequency data preparation pipelines on deep NUMA servers where traditional tools leave cores idle due to dispatch bottlenecks.","description":"NUMA-Aware Contention-Free Dynamically-Auto-Tuning Bash-Native Streaming Parallelization Engine","stars":352,"language":"Shell"},{"owner":"ViciousSquid","repo":"Fio","url":"https://github.com/ViciousSquid/Fio","readme":"<img src=\"https://github.com/user-attachments/assets/946ba690-52e7-4f7c-bbd2-f92a7442bca8\" width=\"375\">\n\n\n\n\n<img src=\"https://img.shields.io/badge/license-MIT-green?style=for-the-badge\" alt=\"MIT License\">  <img src=\"https://img.shields.io/badge/status-Active%20Development-orange?style=for-the-badge\" alt=\"Status\">\n\n### _A real-time liminal Quake/Hammer-style CSG level editor and game engine_\n\n* For rapid block-out, logic wiring, and gameplay testing.\n* Designed to bring back the immediacy of classic Radiant/Worldcraft workflows.\n\n### [Download binaries for macOS and Windows](https://github.com/ViciousSquid/Fio/releases) | [Wiki Quickguide](https://github.com/ViciousSquid/Fio/wiki/Getting-started--&-Basic-Navigation) \n#### Linux: use the included Dockerfile or [compile and run from source](https://github.com/ViciousSquid/Fio#-quickstart)\n<img width=\"2039\" height=\"1119\" alt=\"image\" src=\"https://github.com/user-attachments/assets/a68a33ac-1da7-4626-8796-46a6435cf95c\" />\n\n\n\n\n ------------------------\n\n### Core Workflow\n- Build a level, hit play, and walk around instantly\n- No compile or lightmap baking\n- Classic brush-based editing\n\n### Logic & Gameplay\n- Entity I/O system (Half-Life 2–style)\n- Visual scripting (25 examples)\n- NPCs/monsters (WIP)\n\n### Rendering\n- Real-time lighting with stencil shadows\n- Unified forward renderer\n- Fog, glass, and water shaders\n\n### Technical\n- JSON level format\n- OBJ model support\n- OpenGL 3.3 target\n- Optimized for Snapdragon 8CX / Windows-on-ARM\n\n🗎 Fully modular and open source (MIT License)\n\n\n  ------------------------\n\n<img width=\"1609\" height=\"1119\" alt=\"image\" src=\"https://github.com/user-attachments/assets/22283623-21a2-4776-a2ae-71649f5276f0\" />\n\n\n\n  ------------------------------\n\n #### 🚀 Quickstart:\n\n Python 3.10+ is required\n \n 1. Clone and Enter the Directory:\n```bash\ngit clone https://github.com/ViciousSquid/Fio.git\ncd Fio\n```\n2. Setup Virtual Environment (Recommended)\n```bash\npython -m venv venv\n# Windows:\nvenv\\Scripts\\activate\n# macOS/Linux:\nsource venv/bin/activate\n```\n3. Install Dependencies:\n```bash\npip install -r requirements.txt\n```\n4. Launch the Editor:\n```bash\npython main.py\n```\n   \n\n  -----------------------------\n\n  ### 🤝 Contributing\nContributions, feedback, and experiments are welcome. Check issues or open a discussion.\n\n\n<img width=\"1875\" height=\"1697\" alt=\"image\" src=\"https://github.com/user-attachments/assets/ce564bef-3e9d-4bc5-a93a-e9628638cadb\" />\n\n\n\n","summary":" Fio is a real-time, open-source level editor and game engine that revives the classic Quake/Hammer brush-based CSG workflow for rapid game prototyping and block-out. It eliminates traditional compile times and lightmap baking, allowing developers to build geometry and instantly playtest within the same environment using real-time stencil shadow lighting, an Entity I/O logic system, and visual scripting. Built with OpenGL 3.3 and optimized for cross-platform deployment including Windows-on-ARM devices, it features a unified forward renderer with modern shaders while maintaining compatibility through JSON level formats and OBJ model support. This tool benefits game developers and level designers who prioritize immediate iteration and seek the nostalgic, tactile mapping experience of classic editors like Radiant and Worldcraft.","description":"A real-time liminal Quake/Hammer-style CSG level editor and game engine. Optimised for mobile CPUs","stars":115,"language":"Python"},{"owner":"Brumbelow","repo":"layerleak","url":"https://github.com/Brumbelow/layerleak","readme":"# layerleak the OCI Image Secret Scanner\n\nCheck [CONTRIBUTING.md](./CONTRIBUTING.md) for contribution guidelines.\n\n- OCI image secret scanner that works against any public OCI-compliant registry (Docker Hub, GHCR, Quay, GCR, MCR, Amazon ECR Public, self-hosted). It analyzes image layers, config metadata, and image history, then stores deduplicated findings by manifest digest.\n- Traditional secret scanners often treat a container image as a flat blob or depend on a local Docker daemon. This project is designed around OCI image internals\n\n## Docs Page\n- https://brumbelow.github.io/layerleak/docs\n\n## Current Capabilities:\n\n- Public images from any OCI-compliant registry (Docker Hub, GHCR, Quay, GCR, MCR, Amazon ECR Public, self-hosted)\n- Read-only scanning\n- No secret verification\n- No Docker daemon dependency required\n- Manifest-aware and layer-aware scanning\n- Scans final filesystem and deleted-layer artifacts\n- Scans image config metadata, env vars, labels, and history\n- Deduplicates findings by secret fingerprint and collapses repeated identical context snippets per manifest\n\n## Install\n\nPrerequisites:\n\n- Go 1.24+\n\nInstall with Go:\n\n```bash\ngo install github.com/brumbelow/layerleak@latest\nlayerleak --help\n```\n\nThe canonical install target is the module root.\nTo pin a release explicitly:\n\n```bash\ngo install github.com/brumbelow/layerleak@v1.0.0\n```\n\nReplace `v1.0.0` with the published `v1.x.y` tag you want.\nMake sure your `GOBIN` or `GOPATH/bin` directory is on `PATH`.\n\nBuild from source:\n\n```bash\ngit clone https://github.com/brumbelow/layerleak.git\ncd layerleak\ngo build -o layerleak .\n./layerleak --help\n```\n\nRun the API with a container image:\n\n```bash\ndocker pull ghcr.io/brumbelow/layerleak:latest\ndocker run --rm \\\n  -p 8080:8080 \\\n  -e LAYERLEAK_DATABASE_URL='postgres://<user>:<password>@<host>:5432/layerleak?sslmode=disable' \\\n  ghcr.io/brumbelow/layerleak:latest\n```\n\nThe container image runs the API by default and sets `LAYERLEAK_API_ADDR=0.0.0.0:8080`.\n\nOptional environment configuration:\n\n```bash\ncp .env.example .env\n```\n\nResult and database configuration:\n\n```bash\nexport LAYERLEAK_FINDINGS_DIR=findings\nexport LAYERLEAK_API_ADDR=127.0.0.1:8080\nexport LAYERLEAK_PERSIST_RAW_SECRETS=0\nexport LAYERLEAK_TAG_PAGE_SIZE=100\nexport LAYERLEAK_MAX_LAYER_BYTES=536870912\nexport LAYERLEAK_MAX_LAYER_ENTRIES=50000\nexport LAYERLEAK_MAX_MANIFEST_BYTES=0\nexport LAYERLEAK_MAX_CONFIG_BYTES=0\nexport LAYERLEAK_MAX_TAG_RESPONSE_BYTES=8388608\nexport LAYERLEAK_MAX_REPOSITORY_TAGS=0\nexport LAYERLEAK_MAX_REPOSITORY_TARGETS=0\nexport LAYERLEAK_REGISTRY_REQUEST_ATTEMPTS=2\nexport LAYERLEAK_DATABASE_URL=postgres://postgres:postgres@localhost:5432/layerleak?sslmode=disable\n```\n\nIf `LAYERLEAK_FINDINGS_DIR` is not set, layerleak writes JSON findings files to `findings/` under the repo root.\nSaved findings files contain only detections and are redacted by default.\nSet `LAYERLEAK_PERSIST_RAW_SECRETS=1` only if you explicitly want raw finding values and raw context snippets written to disk and Postgres.\n`LAYERLEAK_TAG_PAGE_SIZE` controls registry tag-list pagination for repository-wide scans.\n`LAYERLEAK_MAX_LAYER_BYTES` defaults to `536870912` (512 MiB) of decompressed layer stream data per layer, and `LAYERLEAK_MAX_LAYER_ENTRIES` defaults to `50000` tar entries per layer.\n`LAYERLEAK_MAX_TAG_RESPONSE_BYTES` defaults to `8388608` (8 MiB) per registry tag-list response page.\n`LAYERLEAK_REGISTRY_BASE_URL` and `LAYERLEAK_REGISTRY_AUTH_URL` are optional overrides. Leave them unset for normal use — layerleak derives the registry base URL from each image reference and discovers the auth realm from the registry's `Www-Authenticate` challenge. Set them only to force scans through a proxy or alternate endpoint.\n`LAYERLEAK_MAX_LAYER_BYTES`, `LAYERLEAK_MAX_LAYER_ENTRIES`, `LAYERLEAK_MAX_MANIFEST_BYTES`, `LAYERLEAK_MAX_CONFIG_BYTES`, `LAYERLEAK_MAX_TAG_RESPONSE_BYTES`, `LAYERLEAK_MAX_REPOSITORY_TAGS`, and `LAYERLEAK_MAX_REPOSITORY_TARGETS` are disabled when set to `0`.\nIf enabled, those limits fail the scan with a clear error instead of silently truncating work.\n`LAYERLEAK_REGISTRY_REQUEST_ATTEMPTS` controls registry request retries and defaults to `2`.\n`LAYERLEAK_API_ADDR` controls the bind address for the API server and defaults to `127.0.0.1:8080` in local binaries.\nThe container image overrides this to `0.0.0.0:8080`.\nIf `LAYERLEAK_DATABASE_URL` is set, the scanner also writes the scan to Postgres and fails the command if Postgres is unavailable or the save does not succeed.\n\nResult behavior:\n\n- Actionable findings remain in `findings` and drive the non-zero scan exit status.\n- Likely test/example/demo placeholders are emitted separately as suppressed example findings and do not count toward `total_findings`.\n- Finding records include `disposition`, `disposition_reason`, and `line_number` to make triage and false-positive review easier.\n- If a configured operational limit is exceeded, layerleak still writes and renders the partial results produced before the failure, then exits with status `1` because the scan is incomplete.\n\n## Postgres persistence\n\nLayerleak ships versioned SQL migrations under `migrations/`.\nMigrations are manual on purpose. The scanner does not auto-create or auto-upgrade the schema.\nLayerleak requires PostgreSQL server `>= 16.13` for DB-backed API and scanner persistence.\n\nApply the migrations with `psql` in order:\n\n```bash\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0001_initial.up.sql\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0002_finding_occurrence_metadata.up.sql\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0003_scan_runs.up.sql\n```\n\nOr apply migrations using the container helper command:\n\n```bash\ndocker run --rm \\\n  -e LAYERLEAK_DATABASE_URL=\"$LAYERLEAK_DATABASE_URL\" \\\n  ghcr.io/brumbelow/layerleak:latest \\\n  layerleak-migrate-up\n```\n\n`layerleak-migrate-up` is safe to rerun when migrations are already applied.\nIf it detects a partial migration state, it exits non-zero and asks for manual intervention.\nThe helper also enforces server version `>= 16.13` and validates that the bundled `postgresql-client-16`\nuses Ubuntu PGDG `24.04` packaging (`.pgdg24.04+`) at version `>= 16.13-1.pgdg24.04+1`.\n\nRollback the migrations in reverse order:\n\n```bash\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0003_scan_runs.down.sql\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0002_finding_occurrence_metadata.down.sql\npsql \"$LAYERLEAK_DATABASE_URL\" -f migrations/0001_initial.down.sql\n```\n\nOperational defaults:\n\n- Migrations are expected to remain additive.\n- The schema keeps current deduplicated state with `first_seen_at` and `last_seen_at`, and also stores append-only scan history in `scan_runs`.\n- Tag mappings are refreshed for tags touched by the current scan.\n- Findings are deduplicated canonically by `(manifest_digest, fingerprint)`, and repeated identical context snippets are collapsed before persistence.\n- Scan history stores a redacted snapshot of the public result JSON, not raw values or raw snippets.\n\nSecret-safety note:\n\n- Postgres persistence stores redacted previews by default.\n- If `LAYERLEAK_PERSIST_RAW_SECRETS=1`, Postgres also stores raw finding values and raw snippets.\n- The `scan_runs.result_json` snapshot stays redacted.\n- Use a dedicated database or schema for layerleak.\n- For the safest purge path, drop the dedicated database or schema instead of trying to surgically delete individual rows.\n\n## How to start\n\nShow the CLI help:\n\n```bash\nlayerleak --help\nlayerleak scan --help\n```\n![help_output](https://github.com/user-attachments/assets/dbd87faa-d3bb-4bfa-941a-643e6bbd48f6)\n\n\nRun a scan against a public OCI image on any supported registry:\n\n```bash\n./layerleak scan ubuntu\n./layerleak scan library/nginx:latest --format json\n./layerleak scan alpine:latest --platform linux/amd64\n./layerleak scan mongo\n./layerleak scan ghcr.io/homebrew/core/hello:latest\n./layerleak scan quay.io/prometheus/busybox:latest\n./layerleak scan gcr.io/distroless/static:nonroot\n./layerleak scan public.ecr.aws/docker/library/alpine:3.20\n./layerleak scan mcr.microsoft.com/hello-world:latest\n```\n![cli pic](https://github.com/user-attachments/assets/9c24960e-4085-451d-a206-b92331d604ef)\n\n\nEvery scan writes a JSON findings file to the findings output directory.\nIf `LAYERLEAK_FINDINGS_DIR` is not set, the default output directory is `findings/` under the repo root.\n\nThose saved findings files contain finding records with `redacted_value`, redacted `context_snippet`, exact source location, disposition metadata, and line number for each finding.\nIf `LAYERLEAK_PERSIST_RAW_SECRETS=1`, the saved findings files also include raw `value` and `raw_context_snippet`.\nIf Postgres persistence is enabled, raw `findings.value` and `finding_occurrences.raw_snippet` stay empty unless `LAYERLEAK_PERSIST_RAW_SECRETS=1`.\nFor multi-arch images, layerleak skips attestation and provenance manifests such as `application/vnd.in-toto+json` instead of counting them as failed platform scans.\nIf you pass a bare repository name such as `mongo`, layerleak enumerates all public tags in that repository, resolves each tag to a digest, groups duplicate digests, and scans the distinct targets. If you want a single image only, pass an explicit tag or digest such as `mongo:latest` or `mongo@sha256:...`.\n\nCommand syntax:\n\n```text\nlayerleak [command]\nlayerleak scan <image-ref> [flags]\n```\n\n## HTTP API\n\nLayerleak also ships a minimal JSON API under `cmd/api`.\nThe API is Postgres-backed and requires `LAYERLEAK_DATABASE_URL`; it does not serve from the findings files on disk.\n\nStart it with:\n\n```bash\ngo run ./cmd/api\n```\n\nOr run the API container:\n\n```bash\ndocker run --rm \\\n  -p 8080:8080 \\\n  -e LAYERLEAK_DATABASE_URL='postgres://<user>:<password>@<host>:5432/layerleak?sslmode=disable' \\\n  ghcr.io/brumbelow/layerleak:latest\n```\n\nCurrent endpoints:\n\n- `POST /api/v1/scans`\n- `GET /api/v1/scans/{id}`\n- `GET /api/v1/repositories`\n- `GET /api/v1/repositories/{repository}/scans`\n- `GET /api/v1/repositories/{repository}/findings`\n- `GET /api/v1/findings/{id}`\n\n`POST /api/v1/scans` stays synchronous and now returns `scan_run_id` whenever Postgres persistence is enabled.\nAPI scan responses reuse the same redacted result schema as the CLI JSON output.\n`GET /api/v1/scans/{id}` returns the persisted run metadata plus the stored redacted result snapshot.\nRepository and finding endpoints also stay redacted: they return `redacted_value` and redacted `context_snippet`, never raw secret values or raw snippets from Postgres.\n\nThe API does not include authentication.\nFor org deployments, keep it on a private network and front it with your own authn/authz gateway or reverse proxy policy.\n\n## Docker Compose deployment (Dockge / Komodo)\n\nThis repo ships a Compose stack in `docker-compose.yml` with `db`, `migrate`, and `api` services.\nThe `db` service baseline is pinned to `postgres:16.13-alpine`.\nIf you use a different Postgres image, keep the server version at `16.13` or newer.\n\nSet deployment variables (export in shell or place in a `.env` file next to `docker-compose.yml`):\n\n```bash\nexport LAYERLEAK_IMAGE=ghcr.io/brumbelow/layerleak:latest\nexport LAYERLEAK_DB_NAME=layerleak\nexport LAYERLEAK_DB_USER=layerleak\nexport LAYERLEAK_DB_PASSWORD=replace-me\nexport LAYERLEAK_API_PORT=8080\n```\n\nRun migrations once before starting the API:\n\n```bash\ndocker compose --profile manual run --rm migrate\n```\n\nStart the API service:\n\n```bash\ndocker compose up -d api\n```\n\nIn Dockge or Komodo, import the same Compose file and run the `migrate` service once before enabling the long-running `api` service.\n\n## Support this project\n\n<details open>\n<summary><strong>☕ Enjoying this project? Click here to support it</strong></summary>\n\n<br>\n\nIf this repo saved you time or helped you out, you can support future updates here:\n\n **[Buy me a coffee](https://ko-fi.com/brumb
