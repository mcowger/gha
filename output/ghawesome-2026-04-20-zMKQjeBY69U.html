\n```\n                    ┌─────────────────────────────────────┐\n    User message ──▶│           SYNAPSE (inhale)          │\n                    │                                     │\n                    │  1. Extract anchors (regex, 2ms)    │\n                    │  2. Traverse memory graph (BFS)     │\n                    │  3. Vector search (optional)        │\n                    │  4. Inject <associative_memory>     │\n                    └──────────────────┬──────────────────┘\n                                       │\n                                       ▼\n                              LLM with memory context\n                                       │\n                    ┌──────────────────▼──────────────────┐\n                    │        GraphCompactor (exhale)       │\n                    │     (fires when context ~80% full)   │\n                    │                                     │\n                    │  Compressible messages ──▶ LLM call │\n                    │     → Topics, Decisions, Open,      │\n                    │       Artifacts, Context, Dropped   │\n                    │                                     │\n                    │  Protected messages ──▶ kept intact │\n                    └─────────────────────────────────────┘\n```\n\n---\n\n## Quick start\n\n```python\nimport asyncio\nfrom breathe import Synapse, GraphCompactor, BreatheConfig\nfrom breathe.interfaces import MemoryRepository, LLMClient, RetrievedNode\n\n# Implement these two interfaces for your backend\nclass MyMemoryRepo(MemoryRepository):\n    async def get_concepts(self):\n        return {\"FastAPI\": \"uuid-001\", \"Redis\": \"uuid-002\"}\n\n    async def graph_bfs(self, start_ids, **kwargs):\n        return []  # implement BFS against your DB\n\n    async def keyword_search(self, keywords, limit=5):\n        return []  # implement ILIKE against your memories table\n\nclass MyLLMClient(LLMClient):\n    async def complete(self, prompt, max_tokens=4000, temperature=0.2):\n        # call your LLM API here\n        ...\n\nasync def main():\n    config = BreatheConfig()\n    synapse = Synapse(repository=MyMemoryRepo(), config=config)\n    await synapse.initialize()\n\n    messages = [\n        {\"role\": \"system\", \"content\": \"You are a helpful assistant.\"},\n        {\"role\": \"user\", \"content\": \"How should I structure my FastAPI endpoints?\"},\n    ]\n\n    # Inject associative memory before each LLM call\n    messages = await synapse.inject(messages)\n\n    # When context gets full, compress with GraphCompactor\n    compactor = GraphCompactor(llm_client=MyLLMClient())\n    result = await compactor.compress(messages)\n    messages = result[\"compressed_messages\"]\n\nasyncio.run(main())\n```\n\n---\n\n## With Memory Nexus (PostgreSQL + pgvector)\n\n```python\nfrom breathe import Synapse, BreatheConfig\nfrom memory_nexus import PostgresMemoryStore\n\nstore = PostgresMemoryStore(dsn=\"postgresql://localhost/mydb\")\nawait store.initialize()\n\n# Store memories\nawait store.store(\"FastAPI handles async requests efficiently\")\nawait store.store(\"Redis is ideal for session storage and caching\")\n\n# Wire into SYNAPSE — store implements VectorSearchClient\nsynapse = Synapse(vector_client=store, config=BreatheConfig())\nawait synapse.initialize()\n\nmessages = await synapse.inject(messages)\n```\n\n**PostgreSQL schema (default — 384-dim):**\n```sql\nCREATE EXTENSION IF NOT EXISTS vector;\nCREATE TABLE memories (\n    id TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text,\n    content TEXT NOT NULL,\n    embedding vector(384),\n    metadata JSONB DEFAULT '{}',\n    created_at TIMESTAMPTZ DEFAULT NOW()\n);\nCREATE INDEX ON memories USING ivfflat (embedding vector_cosine_ops);\n```\n\n**Embedding models:**\n\nThe default model (`all-MiniLM-L6-v2`, 384-dim, ~90 MB) is good for prototyping.\nFor production, we recommend `intfloat/multilingual-e5-large` (1024-dim, ~1.2 GB) — significantly better retrieval quality, especially for multilingual content.\n\nTo switch, pass `model_name` and adjust your table's vector dimension:\n\n```python\nstore = PostgresMemoryStore(\n    dsn=\"postgresql://localhost/mydb\",\n    model_name=\"intfloat/multilingual-e5-large\",  # 1024-dim, multilingual\n)\n```\n```sql\n-- For e5-large, use vector(1024) instead of vector(384)\nCREATE TABLE memories (\n    ...\n    embedding vector(1024),\n    ...\n);\n```\n\n---\n\n## Language support\n\nBuilt-in: **English**. Custom languages in ~10 lines:\n\n```python\nimport re\nfrom breathe import Synapse, BreatheConfig, LanguagePack\n\nGERMAN = LanguagePack(\n    code=\"de\",\n    stopwords=frozenset({\"der\", \"die\", \"das\", \"und\", \"ist\", ...}),\n    hub_exclusions=frozenset({\"system\", \"speicher\"}),\n    temporal_pattern=re.compile(r\"\\b(gestern|heute|morgen|neulich)\\b\", re.I),\n    emotional_pattern=re.compile(r\"\\b(müde|glücklich|traurig|wütend)\\b\", re.I),\n    labels={\"themes\": \"Themen\", \"insights\": \"Erkenntnisse\"},\n)\n\nconfig = BreatheConfig(language_packs=[GERMAN], default_language=\"de\")\nsynapse = Synapse(config=config, ...)\n```\n\nLanguage packs control:\n- **Stopwords** — excluded from relevance scoring\n- **Hub exclusions** — nodes too generic to be useful for injection (e.g. \"system\", \"memory\"). Add your most frequent root concepts here — words that connect to everything are noise in retrieval. The more specific your exclusions, the sharper your injections.\n- **Temporal and emotional regex patterns** — anchor extraction for time references and emotional signals\n- **UI section labels** — headers used in the injected `<associative_memory>` block\n\n---\n\n## Architecture\n\n### SYNAPSE pipeline (per-request, <200ms)\n\n```\nUser message\n     │\n     ▼\nAnchorExtractor\n  ├─ Match known concepts (regex, 0.9 confidence)\n  ├─ Temporal patterns   (0.7)\n  ├─ Technical patterns  (0.5)\n  └─ Emotional signals   (0.6)\n     │\n     ▼ [optional Phase 3 — Apple Silicon only]\nModelAnchorExtractor (local LLM via MLX, ~250ms)\n  └─ Fires only when regex finds <5 matched nodes\n     │\n     ▼\nThree traversal strategies (in parallel):\n  1. Graph BFS    ── memory_nodes + memory_edges (recursive CTE)\n  2. Vector search── any VectorSearchClient (pgvector, Pinecone, etc.)\n  3. Keyword search── ILIKE on unmatched anchors\n     │\n     ▼\nRelevance filter\n  ├─ Hub exclusion (drop super-generic nodes)\n  ├─ Session dedup (skip already-injected nodes)\n  └─ Keyword overlap scoring (anchor words vs node content)\n     │\n     ▼\nContextInjector\n  └─ <associative_memory> block → prepended to last user message\n```\n\n### GraphCompactor (when context fills up)\n\n```\nOld messages (compressible zone)\n     │\n     ▼ preprocess: compress tool call JSON\n     ▼\nLLM extraction call (your LLMClient)\n     │\n     ▼\nSessionGraph: Topics / Decisions / Open / Artifacts / Context / Dropped\n     │\n     ▼\n[SESSION GRAPH] message + protected recent messages\n```\n\n---\n\n## Configuration\n\n```python\nfrom breathe import BreatheConfig\nfrom breathe.config import ENGLISH\n\nconfig = BreatheConfig(\n    # Language packs (all active simultaneously)\n    language_packs=[ENGLISH],\n    default_language=\"en\",\n\n    # SYNAPSE tuning\n    min_similarity=0.55,       # min vector similarity to accept\n    max_injected_nodes=15,     # max nodes per injection\n    enable_model_extractor=True,\n    model_trigger_threshold=5, # model fires when regex finds <5 nodes\n\n    # Token budgets by conversation mode\n    mode_budgets={\n        \"casual\":   1500,\n        \"work\":     2500,\n        \"deep\":     4000,\n        \"balanced\": 2000,\n    },\n\n    # GraphCompactor\n    compactor_model=\"claude-sonnet-4-20250514\",\n    compactor_fallback_model=\"claude-haiku-4-5-20251001\",\n    min_tokens_to_compress=300,\n    protected_messages_normal=10,\n)\n```\n\n---\n\n## Implementing backends\n\n### MemoryRepository (for graph BFS + keyword search)\n\n```python\nfrom breathe.interfaces import MemoryRepository, RetrievedNode\n\nclass MyRepo(MemoryRepository):\n    async def get_concepts(self) -> dict[str, str]:\n        # Return {concept_text: uuid} from your knowledge graph\n        return {\"Redis\": \"abc-123\", \"FastAPI\": \"def-456\"}\n\n    async def graph_bfs(self, start_ids, max_depth=2, **kwargs) -> list[RetrievedNode]:\n        # BFS from start_ids through your concept graph\n        # Recursive CTE on (memory_nodes, memory_edges) works well\n        ...\n\n    async def keyword_search(self, keywords, limit=5) -> list[RetrievedNode]:\n        # ILIKE search over your memories/documents table\n        ...\n\n    async def flush_edges(self, edges) -> int:\n        # Optional: persist new session graph edges to long-term storage\n        return 0\n```\n\n### VectorSearchClient (for semantic search)\n\n```python\nfrom breathe.interfaces import VectorSearchClient, RetrievedNode\n\nclass PineconeClient(VectorSearchClient):\n    async def search(self, query: str, limit: int = 5) -> list[RetrievedNode]:\n        # embed query, search your vector index, return RetrievedNode list\n        ...\n```\n\n### LLMClient (for GraphCompactor)\n\n```python\nfrom breathe.interfaces import LLMClient\n\nclass AnthropicClient(LLMClient):\n    def __init__(self, api_key: str):\n        import anthropic\n        self._client = anthropic.AsyncAnthropic(api_key=api_key)\n\n    async def complete(self, prompt, max_tokens=4000, temperature=0.2):\n        msg = await self._client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=max_tokens,\n            temperature=temperature,\n            messages=[{\"role\": \"user\", \"content\": prompt}],\n        )\n        return msg.content[0].text\n\nclass OpenAIClient(LLMClient):\n    async def complete(self, prompt, max_tokens=4000, temperature=0.2):\n        from openai import AsyncOpenAI\n        client = AsyncOpenAI()\n        resp = await client.chat.completions.create(\n            model=\"gpt-4o\",\n            max_tokens=max_tokens,\n            temperature=temperature,\n            messages=[{\"role\": \"user\", \"content\": prompt}],\n        )\n        return resp.choices[0].message.content\n```\n\n---\n\n## Performance\n\nMeasured in production on Apple M2 Max:\n\n| Component              | Latency     | Notes |\n|------------------------|-------------|-------|\n| Regex extraction       | 2ms         | always runs |\n| MLX model extraction   | ~250ms      | conditional (when regex < 5 matches) |\n| Graph BFS (PG)         | 5–15ms      | recursive CTE, depth=2 |\n| Vector search (pgvector)| 10–30ms    | depends on index size |\n| Keyword search (ILIKE) | 3–10ms      | depends on table size |\n| **Total SYNAPSE**      | **2–60ms**  | without model |\n| **Total SYNAPSE**      | **~300ms**  | with model |\n| GraphCompactor         | 3–8s        | one LLM call, happens rarely |\n\nGraphCompactor fires infrequently (only at ~80% context fill), so its latency\ndoesn't affect per-request response time.\n\n---\n\n## Memory management\n\nBREATHE handles **retrieval and injection** automatically. **Storing memories is your application's responsibility** — you decide what to remember and when.\n\n```python\n# Your application stores memories explicitly\nawait store.store(\"User prefers dark mode and concise answers\")\nawait store.store(\"Project uses FastAPI + PostgreSQL + Redis stack\")\n\n# SYNAPSE retrieves relevant ones automatically before each LLM call\nmessages = await synapse.inject(messages)\n```\n\nThis is intentional: memory storage policies (what to keep, when to forget, privacy rules) vary wildly between applications. BREATHE gives you the retrieval engine — you control the data.\n\n> **Coming soon:** A standalone MCP server wrapping Memory Nexus, so LLMs can store and search memories directly as tool calls.\n\n---\n\n## Optional dependencies\n\n```bash\n# PostgreSQL + pgvector backend\npip install breathe-memory[pg]\n\n# Apple Silicon local model extractor (MLX)\npip install breathe-memory[mlx]\n\n# Anthropic client for GraphCompactor\npip install breathe-memory[anthropic]\n\n# OpenAI client for GraphCompactor\npip install breathe-memory[openai]\n\n# Everything\npip install breathe-memory[all]\n```\n\nCore package has zero dependencies beyond Python stdlib + `typing-extensions`.\n\n### Model extractor (Phase 3)\n\nThe optional `ModelAnchorExtractor` uses [MLX](https://github.com/ml-explore/mlx) to run a small local LLM for contextual anchor extraction when regex alone isn't enough.\n\n**This requires Apple Silicon (M1/M2/M3/M4).** MLX is an Apple-only framework and will not work on Linux or Windows. If MLX is not installed, the model extractor is silently skipped — everything else works normally.\n\nThe default model is `Qwen3-1.7B` (4-bit, ~1.2 GB RAM). You can swap it for any MLX-compatible model by passing `model_id` to `ModelAnchorExtractor`. If you need cross-platform model extraction, implement your own extractor using any inference backend (ollama, vLLM, API calls) — the interface is a single `extract(message) -> list[Anchor]` method.\n\n---\n\n## Monitoring\n\n```python\nfrom breathe import BreatheMetrics\n\nstats = BreatheMetrics.get().to_dict()\n# {\n#   \"synapse\": {\n#     \"total_injections\": 142,\n#     \"hit_rate\": 0.87,\n#     \"latency\": {\"avg_ms\": 18.3, \"p95_ms\": 45.1},\n#     \"top_anchors\": [{\"text\": \"FastAPI\", \"count\": 23}, ...]\n#   },\n#   \"compaction\": {\n#     \"total\": 3,\n#     \"avg_ratio\": 0.71,\n#     \"total_saved_tokens\": 12400\n#   }\n# }\n```\n\nExpose via your API: `GET /api/breathe-stats` → `BreatheMetrics.get().to_dict()`\n\n---\n\n## License\n\nApache 2.0 — see [LICENSE](LICENSE).\n\nBuilt by [Kenaz GmbH](https://kenaz.ai) — Custom AI Agents, MCP Servers, Semantic Engineering.\n","summary":" Breathe-memory is a context optimization library for LLM applications that implements associative memory through a two-phase architecture modeled on human cognition rather than simple retrieval. Before each generation, the SYNAPSE phase extracts semantic anchors from user messages to inject relevant historical context directly into prompts with only 2–20ms of overhead. When context windows fill, the GraphCompactor compresses conversations into structured knowledge graphs—preserving topics, decisions, and relationships rather than creating lossy summaries—typically saving 60–80% of tokens while maintaining semantic structure. It targets developers building conversational AI or long-context applications, offering pluggable interfaces for integration with existing databases like PostgreSQL and custom LLM clients.","description":null,"stars":19,"language":"Python"},{"owner":"jonwiggins","repo":"xmloxide","url":"https://github.com/jonwiggins/xmloxide","readme":"# xmloxide\n\n[![CI](https://github.com/jonwiggins/xmloxide/actions/workflows/ci.yml/badge.svg)](https://github.com/jonwiggins/xmloxide/actions/workflows/ci.yml)\n[![crates.io](https://img.shields.io/crates/v/xmloxide.svg)](https://crates.io/crates/xmloxide)\n[![docs.rs](https://docs.rs/xmloxide/badge.svg)](https://docs.rs/xmloxide)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![MSRV](https://img.shields.io/badge/MSRV-1.81-blue.svg)](https://www.rust-lang.org)\n\nA pure Rust reimplementation of [libxml2](https://gitlab.gnome.org/GNOME/libxml2) — the de facto standard XML/HTML parsing library in the open-source world.\n\nlibxml2 became officially unmaintained in December 2025 with known security issues. xmloxide aims to be a memory-safe, high-performance replacement that passes the same conformance test suites.\n\n## Features\n\n- **Memory-safe** — arena-based tree with zero `unsafe` in the public API\n- **Conformant** — 100% pass rate on the W3C XML Conformance Test Suite (1727/1727 applicable tests)\n- **Error recovery** — parse malformed XML and still produce a usable tree, just like libxml2\n- **Multiple parsing APIs** — DOM tree, SAX2 streaming, XmlReader pull, push/incremental\n- **HTML parser** — error-tolerant HTML 4.01 parsing with auto-closing and void elements\n- **WHATWG HTML5 parser** — full [HTML Living Standard](https://html.spec.whatwg.org/) tokenizer and tree builder (8810/8810 html5lib-tests passing)\n- **HTML5 streaming** — SAX-like callback API for HTML5 (`html5::sax`) that wraps the tokenizer without building a DOM tree\n- **CSS selectors** — query elements with familiar CSS syntax (`css::select`) including combinators, pseudo-classes, and fast `#id` lookup\n- **XPath 1.0+** — full expression parser and evaluator with all XPath 1.0 core functions plus key XPath 2.0 functions (`matches()`, `replace()`, `tokenize()`, `upper-case()`, `lower-case()`, `abs()`, `min()`, `max()`, and more)\n- **Validation** — DTD, RelaxNG, XML Schema (XSD), and ISO Schematron (ISO/IEC 19757-3) validation\n- **Serde integration** — optional `serde` feature for XML (de)serialization to/from Rust types\n- **Async parsing** — optional `async` feature for parsing from `tokio::io::AsyncRead` sources\n- **Canonical XML** — C14N 1.0 and Exclusive C14N serialization\n- **XInclude** — document inclusion processing\n- **XML Catalogs** — OASIS XML Catalogs for URI resolution\n- **`xmllint` CLI** — command-line tool for parsing, validating, and querying XML\n- **Zero-copy where possible** — string interning for fast comparisons\n- **No global state** — each `Document` is self-contained and `Send + Sync`\n- **C/C++ FFI** — full C API with header file (`include/xmloxide.h`) for embedding in C/C++ projects\n- **Minimal dependencies** — only `encoding_rs` (library has zero other deps; `clap` is CLI-only)\n\n## Quick Start\n\n```rust\nuse xmloxide::Document;\n\nlet doc = Document::parse_str(\"<root><child>Hello</child></root>\").unwrap();\nlet root = doc.root_element().unwrap();\nassert_eq!(doc.node_name(root), Some(\"root\"));\nassert_eq!(doc.text_content(root), \"Hello\");\n```\n\n### Serialization\n\n```rust\nuse xmloxide::Document;\nuse xmloxide::serial::serialize;\n\nlet doc = Document::parse_str(\"<root><child>Hello</child></root>\").unwrap();\nlet xml = serialize(&doc);\nassert_eq!(xml, \"<root><child>Hello</child></root>\");\n```\n\n### XPath Queries\n\n```rust\nuse xmloxide::Document;\nuse xmloxide::xpath::{evaluate, XPathValue};\n\nlet doc = Document::parse_str(\"<library><book><title>Rust</title></book></library>\").unwrap();\nlet root = doc.root_element().unwrap();\nlet result = evaluate(&doc, root, \"count(book)\").unwrap();\nassert_eq!(result.to_number(), 1.0);\n```\n\n### SAX2 Streaming\n\n```rust\nuse xmloxide::sax::{parse_sax, SaxHandler, DefaultHandler};\nuse xmloxide::parser::ParseOptions;\n\nstruct MyHandler;\nimpl SaxHandler for MyHandler {\n    fn start_element(&mut self, name: &str, _: Option<&str>, _: Option<&str>,\n                     _: &[(String, String, Option<String>, Option<String>)]) {\n        println!(\"Element: {name}\");\n    }\n}\n\nparse_sax(\"<root><child/></root>\", &ParseOptions::default(), &mut MyHandler).unwrap();\n```\n\n### HTML Parsing\n\n```rust\nuse xmloxide::html::parse_html;\n\nlet doc = parse_html(\"<p>Hello <br> World\").unwrap();\nlet root = doc.root_element().unwrap();\nassert_eq!(doc.node_name(root), Some(\"html\"));\n```\n\n### CSS Selectors\n\n```rust\nuse xmloxide::css::select;\nuse xmloxide::Document;\n\nlet doc = Document::parse_str(r#\"<div><p class=\"intro\">Hello</p><p>World</p></div>\"#).unwrap();\nlet root = doc.root_element().unwrap();\nlet intros = select(&doc, root, \"p.intro\").unwrap();\nassert_eq!(intros.len(), 1);\nassert_eq!(doc.text_content(intros[0]), \"Hello\");\n```\n\n### HTML5 Parsing (WHATWG)\n\n```rust\nuse xmloxide::html5::parse_html5;\n\nlet doc = parse_html5(\"<p>Hello <b>world</b>\").unwrap();\nlet root = doc.root_element().unwrap();\nassert_eq!(doc.node_name(root), Some(\"html\"));\n```\n\nFragment parsing (the algorithm behind `innerHTML`) is also supported:\n\n```rust\nuse xmloxide::html5::{parse_html5_with_options, Html5ParseOptions};\n\nlet opts = Html5ParseOptions {\n    scripting: false,\n    fragment_context: Some(\"body\".to_string()),\n};\nlet doc = parse_html5_with_options(\"<p>fragment</p>\", &opts).unwrap();\n```\n\n### HTML5 Streaming (SAX-like)\n\n```rust\nuse xmloxide::html5::sax::{Html5SaxHandler, parse_html5_sax};\n\nstruct LinkExtractor { hrefs: Vec<String> }\nimpl Html5SaxHandler for LinkExtractor {\n    fn start_element(&mut self, name: &str, attrs: &[(String, String)], _sc: bool) {\n        if name == \"a\" {\n            if let Some((_, href)) = attrs.iter().find(|(n, _)| n == \"href\") {\n                self.hrefs.push(href.clone());\n            }\n        }\n    }\n}\n\nlet mut handler = LinkExtractor { hrefs: Vec::new() };\nparse_html5_sax(r#\"<a href=\"/page\">Link</a>\"#, &mut handler);\nassert_eq!(handler.hrefs, vec![\"/page\"]);\n```\n\n### Error Recovery\n\n```rust\nuse xmloxide::parser::{parse_str_with_options, ParseOptions};\n\nlet opts = ParseOptions::default().recover(true);\nlet doc = parse_str_with_options(\"<root><unclosed>\", &opts).unwrap();\nfor diag in &doc.diagnostics {\n    eprintln!(\"{}\", diag);\n}\n```\n\n## CLI Tool\n\n```sh\n# Parse and pretty-print\nxmllint --format document.xml\n\n# Validate against a schema\nxmllint --schema schema.xsd document.xml\nxmllint --relaxng schema.rng document.xml\nxmllint --schematron schema.sch document.xml\nxmllint --dtdvalid schema.dtd document.xml\n\n# XPath query\nxmllint --xpath \"//title\" document.xml\n\n# Canonical XML\nxmllint --c14n document.xml\n\n# Parse HTML\nxmllint --html page.html\n```\n\n## Module Overview\n\n| Module | Description |\n|--------|-------------|\n| `tree` | Arena-based DOM tree (`Document`, `NodeId`, `NodeKind`) |\n| `parser` | XML 1.0 recursive descent parser with error recovery |\n| `parser::push` | Push/incremental parser for chunked input |\n| `html` | Error-tolerant HTML 4.01 parser |\n| `html5` | WHATWG HTML Living Standard parser (tokenizer + tree builder) |\n| `html5::sax` | Streaming SAX-like API for HTML5 (no DOM tree built) |\n| `css` | CSS selector engine for querying document trees |\n| `sax` | SAX2 streaming event-driven parser |\n| `reader` | XmlReader pull-based parsing API |\n| `serial` | XML, HTML, and HTML5 serializers, plus Canonical XML (C14N) |\n| `xpath` | XPath 1.0+ expression parser and evaluator |\n| `validation::dtd` | DTD parsing and validation |\n| `validation::relaxng` | RelaxNG schema validation |\n| `validation::xsd` | XML Schema (XSD) validation |\n| `validation::schematron` | ISO Schematron rule-based validation |\n| `serde_xml` | Serde XML (de)serialization (optional `serde` feature) |\n| `async_xml` | Async parsing via `tokio::io::AsyncRead` (optional `async` feature) |\n| `xinclude` | XInclude 1.0 document inclusion |\n| `catalog` | OASIS XML Catalogs for URI resolution |\n| `encoding` | Character encoding detection and transcoding |\n| `ffi` | C/C++ FFI bindings (`include/xmloxide.h`) |\n\n## Performance\n\nParsing throughput is competitive with libxml2 — within 3-4% on most documents, and **12% faster** on SVG. Serialization is **1.5-2.4x faster** thanks to the arena-based tree design. XPath is **1.1-2.7x faster** across all benchmarks.\n\n**Parsing:**\n\n| Document | Size | xmloxide | libxml2 | Result |\n|----------|------|----------|---------|--------|\n| Atom feed | 4.9 KB | 26.7 µs (176 MiB/s) | 25.5 µs (184 MiB/s) | ~4% slower |\n| SVG drawing | 6.3 KB | 58.5 µs (103 MiB/s) | 65.6 µs (92 MiB/s) | **12% faster** |\n| Maven POM | 11.5 KB | 76.9 µs (142 MiB/s) | 74.2 µs (148 MiB/s) | ~4% slower |\n| XHTML page | 10.2 KB | 69.5 µs (139 MiB/s) | 61.5 µs (157 MiB/s) | ~13% slower |\n| Large (374 KB) | 374 KB | 2.15 ms (169 MiB/s) | 2.08 ms (175 MiB/s) | ~3% slower |\n\n**Serialization:**\n\n| Document | Size | xmloxide | libxml2 | Result |\n|----------|------|----------|---------|--------|\n| Atom feed | 4.9 KB | 11.3 µs | 17.5 µs | **1.5x faster** |\n| Maven POM | 11.5 KB | 20.1 µs | 47.5 µs | **2.4x faster** |\n| Large (374 KB) | 374 KB | 614 µs | 1397 µs | **2.3x faster** |\n\n**XPath:**\n\n| Expression | xmloxide | libxml2 | Result |\n|------------|----------|---------|--------|\n| Simple path (`//entry/title`) | 1.51 µs | 1.63 µs | **8% faster** |\n| Attribute predicate (`//book[@id]`) | 5.91 µs | 15.99 µs | **2.7x faster** |\n| `count()` function | 1.09 µs | 1.67 µs | **1.5x faster** |\n| `string()` function | 1.32 µs | 1.77 µs | **1.3x faster** |\n\nKey optimizations: arena-based tree for fast serialization, byte-level pre-checks for character validation, bulk text scanning, ASCII fast paths for name parsing, zero-copy element name splitting, inline entity resolution, XPath `//` step fusion with fused axis expansion, inlined tree accessors, and name-test fast paths for child/descendant axes.\n\n```sh\n# Run benchmarks (requires libxml2 system library)\ncargo bench --features bench-libxml2 --bench comparison_bench\n```\n\n## Testing\n\n- **1078 unit tests** across all modules\n- **138 FFI tests** covering the full C API surface (including SAX, Schematron, and CSS)\n- **libxml2 compatibility suite** — 119/119 tests passing (100%) covering XML parsing, namespaces, error detection, and HTML parsing\n- **W3C XML Conformance Test Suite** — 1727/1727 applicable tests passing (100%)\n- **html5lib-tests** — 7032/7032 tokenizer tests + 1778/1778 tree construction tests (100%)\n- **Integration tests** covering real-world XML/HTML documents, edge cases, and error recovery\n\n```sh\ncargo test --all-features\n```\n\n## C/C++ FFI\n\nxmloxide provides a C-compatible API for embedding in C/C++ projects (like Chromium, game engines, or any codebase that currently uses libxml2).\n\n```sh\n# Build shared + static libraries (uses the included Makefile)\nmake\n\n# Or build individually:\nmake shared   # .so / .dylib / .dll\nmake static   # .a / .lib\n\n# Build and run the C example\nmake example\n```\n\n```c\n#include \"xmloxide.h\"\n\nxmloxide_document *doc = xmloxide_parse_str(\"<root>Hello</root>\");\nuint32_t root = xmloxide_doc_root_element(doc);\nchar *name = xmloxide_node_name(doc, root);   // \"root\"\nchar *text = xmloxide_node_text_content(doc, root); // \"Hello\"\n\nxmloxide_free_string(name);\nxmloxide_free_string(text);\nxmloxide_free_doc(doc);\n```\n\nThe full API — including tree navigation and mutation, XPath evaluation, serialization (plain and pretty-printed), HTML/HTML5 parsing, DTD/RelaxNG/XSD/Schematron validation, C14N, SAX streaming, XmlReader, push parser, and XML Catalogs — is declared in [`include/xmloxide.h`](include/xmloxide.h).\n\n## Migrating from libxml2\n\n| libxml2 | xmloxide (Rust) | xmloxide (C FFI) |\n|---------|----------------|------------------|\n| `xmlReadMemory` | `Document::parse_str` | `xmloxide_parse_str` |\n| `xmlReadFile` | `Document::parse_file` | `xmloxide_parse_file` |\n| `xmlParseDoc` | `Document::parse_bytes` | `xmloxide_parse_bytes` |\n| `htmlReadMemory` | `html::parse_html` | `xmloxide_parse_html` |\n| (HTML5 parsing) | `html5::parse_html5` | — |\n| (HTML5 fragment / innerHTML) | `html5::parse_html5_with_options` | — |\n| (HTML5 streaming) | `html5::sax::parse_html5_sax` | — |\n| (CSS selectors / `querySelector`) | `css::select` | — |\n| `xmlFreeDoc` | (drop `Document`) | `xmloxide_free_doc` |\n| `xmlDocGetRootElement` | `doc.root_element()` | `xmloxide_doc_root_element` |\n| `xmlNodeGetContent` | `doc.text_content(id)` | `xmloxide_node_text_content` |\n| `xmlNodeSetContent` | `doc.set_text_content(id, s)` | `xmloxide_set_text_content` |\n| `xmlGetProp` | `doc.attribute(id, name)` | `xmloxide_node_attribute` |\n| `xmlSetProp` | `doc.set_attribute(...)` | `xmloxide_set_attribute` |\n| `xmlNewNode` | `doc.create_node(...)` | `xmloxide_create_element` |\n| `xmlNewText` | `doc.create_node(Text{..})` | `xmloxide_create_text` |\n| `xmlAddChild` | `doc.append_child(p, c)` | `xmloxide_append_child` |\n| `xmlAddPrevSibling` | `doc.insert_before(ref, c)` | `xmloxide_insert_before` |\n| `xmlUnlinkNode` | `doc.remove_node(id)` | `xmloxide_remove_node` |\n| `xmlCopyNode` | `doc.clone_node(id, deep)` | `xmloxide_clone_node` |\n| `xmlGetID` | `doc.element_by_id(s)` | `xmloxide_element_by_id` |\n| `xmlDocDumpMemory` | `serial::serialize(&doc)` | `xmloxide_serialize` |\n| `xmlDocDumpFormatMemory` | `serial::serialize_with_options` | `xmloxide_serialize_pretty` |\n| `htmlDocDumpMemory` | `serial::html::serialize_html` | `xmloxide_serialize_html` |\n| `xmlC14NDocDumpMemory` | `serial::c14n::canonicalize` | `xmloxide_canonicalize` |\n| `xmlXPathEvalExpression` | `xpath::evaluate` | `xmloxide_xpath_eval` |\n| `xmlValidateDtd` | `validation::dtd::validate` | `xmloxide_validate_dtd` |\n| `xmlRelaxNGValidateDoc` | `validation::relaxng::validate` | `xmloxide_validate_relaxng` |\n| `xmlSchemaValidateDoc` | `validation::xsd::validate_xsd` | `xmloxide_validate_xsd` |\n| (Schematron validation) | `validation::schematron::validate_schematron` | `xmloxide_validate_schematron` |\n| `xmlXIncludeProcess` | `xinclude::process_xincludes` | `xmloxide_process_xincludes` |\n| `xmlLoadCatalog` | `Catalog::parse` | `xmloxide_parse_catalog` |\n| `xmlSAX2...` callbacks | `sax::SaxHandler` trait | `xmloxide_sax_parse` |\n| `xmlTextReaderRead` | `reader::XmlReader` | `xmloxide_reader_read` |\n| `xmlCreatePushParserCtxt` | `parser::PushParser` | `xmloxide_push_parser_new` |\n| `xmlParseChunk` | `PushParser::push` | `xmloxide_push_parser_push` |\n\n**Thread safety:** Unlike libxml2, xmloxide has no global state. Each `Document` is self-contained and `Send + Sync`. The FFI layer uses thread-local storage for the last error message — each thread has its own error state. No initialization or cleanup functions are needed.\n\n## Fuzzing\n\nxmloxide includes fuzz targets for security testing:\n\n```sh\n# Install cargo-fuzz (requires nightly)\ncargo install cargo-fuzz\n\n# Run a fuzz target\ncargo +nightly fuzz run fuzz_xml_parse\ncargo +nightly fuzz run fuzz_html_parse\ncargo +nightly fuzz run fuzz_html5_parse\ncargo +nightly fuzz run fuzz_html5_fragment\ncargo +nightly fuzz run fuzz_xpath\ncargo +nightly fuzz run fuzz_roundtrip\ncargo +nightly fuzz run fuzz_sax\ncargo +nightly fuzz run fuzz_reader\ncargo +nightly fuzz run fuzz_push\ncargo +nightly fuzz run fuzz_validation\ncargo +nightly fuzz run fuzz_schematron\n```\n\n## Building\n\n```sh\ncargo build\ncargo test\ncargo clippy --all-targets --all-features -- -D warnings\ncargo bench\n```\n\nMinimum supported Rust version: **1.81**\n\n## Limitations\n\n- **No XML 1.1** — xmloxide implements XML 1.0 (Fifth Edition) only. XML 1.1 is rarely used and not planned.\n- **No XSLT** — XSLT is a separate specification (libxslt) and is out of scope.\n- **HTML parsers** — both an HTML 4.01 parser (matching libxml2's behavior) and a full WHATWG HTML5 parser are provided. The HTML5 parser passes 100% of html5lib-tests.\n- **Push parser buffers internally** — the push/incremental parser API (`PushParser`) currently buffers all pushed data and performs the full parse on `finish()`, rather than truly streaming like libxml2's `xmlParseChunk`. SAX streaming (`parse_sax` for XML, `html5::sax::parse_html5_sax` for HTML5) is available as an alternative for memory-constrained large-document processing.\n- **XPath `namespace::` axis** — the `namespace::` axis returns the element node when in-scope namespaces match (rather than materializing separate namespace nodes), following the same pattern as the attribute axis.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup and guidelines.\n\n## Changelog\n\nSee [CHANGELOG.md](CHANGELOG.md) for version history.\n\n## License\n\nMIT\n","summary":" xmloxide is a pure Rust reimplementation of libxml2 designed as a memory-safe, high-performance successor to the unmaintained C library. It offers comprehensive XML and HTML parsing capabilities—including DOM, SAX2, and streaming APIs—alongside advanced features like full HTML5 support, XPath 1.0+ querying, CSS selectors, and validation against DTD, RelaxNG, XML Schema, and Schematron standards. Developers working in Rust or C/C++ (via FFI) who require robust, secure XML processing with 100% conformance to W3C standards will find this library essential for replacing legacy libxml2 dependencies.","description":"A pure Rust reimplementation of libxml2","stars":68,"language":"Rust"},{"owner":"stablyai","repo":"orca","url":"https://github.com/stablyai/orca","readme":"<p align=\"center\">\n  <a href=\"https://onOrca.dev\"><img src=\"resources/build/icon.png\" alt=\"Orca\" width=\"128\" /></a>\n</p>\n\n<h1 align=\"center\">Orca</h1>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Platform-macOS%20%7C%20Windows%20%7C%20Linux-blue?style=for-the-badge\" alt=\"Supported Platforms\" />\n  <a href=\"https://discord.gg/fzjDKHxv8Q\"><img src=\"https://img.shields.io/badge/Discord-Join-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Discord\" /></a>\n  <a href=\"https://x.com/orca_build\"><img src=\"https://img.shields.io/badge/%E2%80%8E-Follow_@orca__build-000000?style=for-the-badge&logo=x&logoColor=white\" alt=\"Follow on X\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"README.md\">English</a> · <a href=\"docs/README.zh-CN.md\">中文</a> · <a href=\"docs/README.ja.md\">日本語</a>\n</p>\n\n<p align=\"center\">\n  <strong>The AI Orchestrator for 100x builders.</strong><br/>\n  Run Claude Code, Codex, or OpenCode side-by-side across repos — each in its own worktree, tracked in one place.<br/>\n  Available for <strong>macOS, Windows, and Linux</strong>.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://onOrca.dev\"><strong>Download at onOrca.dev</strong></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/assets/file-drag.gif\" alt=\"Orca Screenshot\" width=\"800\" />\n</p>\n\n## Supported Agents\n\nOrca supports any CLI agent (_not just this list_).\n\n<p>\n  <a href=\"https://docs.anthropic.com/claude/docs/claude-code\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=anthropic.com&sz=64\" width=\"16\" valign=\"middle\" /> Claude Code</kbd></a> &nbsp;\n  <a href=\"https://github.com/openai/codex\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=openai.com&sz=64\" width=\"16\" valign=\"middle\" /> Codex</kbd></a> &nbsp;\n  <a href=\"https://github.com/google-gemini/gemini-cli\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=gemini.google.com&sz=64\" width=\"16\" valign=\"middle\" /> Gemini</kbd></a> &nbsp;\n  <a href=\"https://pi.dev\"><kbd><img src=\"https://pi.dev/favicon.svg\" width=\"16\" valign=\"middle\" /> Pi</kbd></a> &nbsp;\n  <a href=\"https://hermes-agent.nousresearch.com/docs/\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=nousresearch.com&sz=64\" width=\"16\" valign=\"middle\" /> Hermes Agent</kbd></a> &nbsp;\n  <a href=\"https://opencode.ai/docs/cli/\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=opencode.ai&sz=64\" width=\"16\" valign=\"middle\" /> OpenCode</kbd></a> &nbsp;\n  <a href=\"https://block.github.io/goose/docs/quickstart/\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=goose-docs.ai&sz=64\" width=\"16\" valign=\"middle\" /> Goose</kbd></a> &nbsp;\n  <a href=\"https://ampcode.com/manual#install\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=ampcode.com&sz=64\" width=\"16\" valign=\"middle\" /> Amp</kbd></a> &nbsp;\n  <a href=\"https://docs.augmentcode.com/cli/overview\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=augmentcode.com&sz=64\" width=\"16\" valign=\"middle\" /> Auggie</kbd></a> &nbsp;\n  <a href=\"https://github.com/charmbracelet/crush\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=charm.sh&sz=64\" width=\"16\" valign=\"middle\" /> Charm</kbd></a> &nbsp;\n  <a href=\"https://docs.cline.bot/cline-cli/overview\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=cline.bot&sz=64\" width=\"16\" valign=\"middle\" /> Cline</kbd></a> &nbsp;\n  <a href=\"https://www.codebuff.com/docs/help/quick-start\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=codebuff.com&sz=64\" width=\"16\" valign=\"middle\" /> Codebuff</kbd></a> &nbsp;\n  <a href=\"https://docs.continue.dev/guides/cli\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=continue.dev&sz=64\" width=\"16\" valign=\"middle\" /> Continue</kbd></a> &nbsp;\n  <a href=\"https://cursor.com/cli\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=cursor.com&sz=64\" width=\"16\" valign=\"middle\" /> Cursor</kbd></a> &nbsp;\n  <a href=\"https://docs.factory.ai/cli/getting-started/quickstart\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=factory.ai&sz=64\" width=\"16\" valign=\"middle\" /> Droid</kbd></a> &nbsp;\n  <a href=\"https://docs.github.com/en/copilot/how-tos/set-up/install-copilot-cli\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=github.com&sz=64\" width=\"16\" valign=\"middle\" /> GitHub Copilot</kbd></a> &nbsp;\n  <a href=\"https://kilo.ai/docs/cli\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=kilo.ai&sz=64\" width=\"16\" valign=\"middle\" /> Kilocode</kbd></a> &nbsp;\n  <a href=\"https://www.kimi.com/code/docs/en/kimi-cli/guides/getting-started.html\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=moonshot.cn&sz=64\" width=\"16\" valign=\"middle\" /> Kimi</kbd></a> &nbsp;\n  <a href=\"https://kiro.dev/docs/cli/\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=kiro.dev&sz=64\" width=\"16\" valign=\"middle\" /> Kiro</kbd></a> &nbsp;\n  <a href=\"https://github.com/mistralai/mistral-vibe\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=mistral.ai&sz=64\" width=\"16\" valign=\"middle\" /> Mistral Vibe</kbd></a> &nbsp;\n  <a href=\"https://github.com/QwenLM/qwen-code\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=qwenlm.github.io&sz=64\" width=\"16\" valign=\"middle\" /> Qwen Code</kbd></a> &nbsp;\n  <a href=\"https://support.atlassian.com/rovo/docs/install-and-run-rovo-dev-cli-on-your-device/\"><kbd><img src=\"https://www.google.com/s2/favicons?domain=atlassian.com&sz=64\" width=\"16\" valign=\"middle\" /> Rovo Dev</kbd></a>\n</p>\n\n---\n\n## Features\n\n- **No login required** — Bring your own Claude Code or Codex subscription.\n- **Worktree-native** — Every feature gets its own worktree. No stashing, no branch juggling. Spin up and switch instantly.\n- **Multi-agent terminals** — Run multiple AI agents side-by-side in tabs and panes. See which ones are active at a glance.\n- **Built-in source control** — Review AI-generated diffs, make quick edits, and commit without leaving Orca.\n- **GitHub integration** — PRs, issues, and Actions checks linked to each worktree automatically.\n- **Notifications** — Know when an agent finishes or needs attention. Mark threads unread to come back later.\n\n---\n\n## Install\n\n- **[Download from onOrca.dev](https://onOrca.dev)**\n- Or download the latest binaries via the **[GitHub Releases page](https://github.com/stablyai/orca/releases)**.\n\n---\n\n## [New] Hot Swap Codex Accounts\n\n**Multiple Codex accounts? Switch in one click.**\n\nIf you run multiple Codex accounts to get the best token deal, Orca lets you hot-swap between them instantly — no re-login, no config files. Just pick an account and keep building.\n\n<p align=\"center\">\n  <img src=\"docs/assets/codex-account-switcher.gif\" alt=\"Orca Codex Account Switcher — hot swap between multiple Codex accounts\" width=\"800\" />\n</p>\n\n---\n\n## [New] Per Worktree Browser &amp; Design Mode\n\n**See your app. Click any element. Drop it into the chat.**\n\nOrca ships with a built-in browser right inside your worktree. Preview your app as you build, then switch to Design Mode — click any UI element and it lands directly in your AI chat as context. No screenshots, no copy-pasting selectors. Just point at what you want to change and tell the agent what to do.\n\n<p align=\"center\">\n  <img src=\"docs/assets/orca-design-mode.gif\" alt=\"Orca Design Mode — click any UI element and drop it into the chat\" width=\"800\" />\n</p>\n\n---\n\n## [New] Introducing the Orca CLI\n\n**Agent orchestration from your terminal.**\n\nLet your AI agent control your IDE. Use AI to add repos to your IDE, spin up worktrees, and update the current worktree's comment with meaningful progress checkpoints directly from the terminal. Ships with the Orca IDE (install under Settings).\n\n```bash\nnpx skills add https://github.com/stablyai/orca --skill orca-cli\n```\n\n---\n\n## Community &amp; Support\n\n- **Discord:** Join the community on **[Discord](https://discord.gg/fzjDKHxv8Q)**.\n- **Twitter / X:** Follow **[@orca_build](https://x.com/orca_build)** for updates and announcements.\n- **Feedback &amp; Ideas:** We ship fast. Missing something? [Request a new feature](https://github.com/stablyai/orca/issues).\n- **Show Support:** Star this repo to follow along with our daily ships.\n\n---\n\n## Developing\n\nWant to contribute or run locally? See our [CONTRIBUTING.md](CONTRIBUTING.md) guide.","summary":" Orca is a cross-platform desktop application that serves as an AI orchestrator, enabling developers to run multiple CLI coding agents—such as Claude Code, Codex, and OpenCode—simultaneously across different repositories. Each agent operates within its own isolated worktree while being tracked and managed from a single unified interface. This tool is designed for developers seeking to leverage multiple AI assistants to maximize productivity without the complexity of managing separate environments. It supports macOS, Windows, and Linux, and is compatible with any CLI-based AI agent.","description":"Orca is the next-gen IDE for building with coding agents","stars":1394,"language":"TypeScript"},{"owner":"lovromazgon","repo":"grafana-tui","url":"https://github.com/lovromazgon/grafana-tui","readme":"# grafana-tui\n\n[![License](https://img.shields.io/github/license/lovromazgon/grafana-tui)](https://github.com/lovromazgon/grafana-tui/blob/main/LICENSE)\n[![Test](https://github.com/lovromazgon/grafana-tui/actions/workflows/test.yml/badge.svg)](https://github.com/lovromazgon/grafana-tui/actions/workflows/test.yml)\n[![Go Report Card](https://goreportcard.com/badge/github.com/lovromazgon/grafana-tui)](https://goreportcard.com/report/github.com/lovromazgon/grafana-tui)\n\nBrowse Grafana dashboards in the terminal.\nConnect to a remote Grafana instance and explore dashboards, panels, and\ntime series data without leaving the command line.\n\n![demo](https://github.com/user-attachments/assets/8128fb4d-283f-49c5-bf39-1276eaeccf37)\n\n## Installation\n\nInstall using homebrew:\n\n```sh\nbrew install lovromazgon/tap/grafana-tui\n```\n\nOr download the binary manually from the [latest release](https://github.com/lovromazgon/grafana-tui/releases/latest).\n\n> [!NOTE]\n> When downloading grafana-tui manually on MacOS you will get a warning about a safety issue.\n> That's because grafana-tui is currently not a signed binary, you have to do some\n> [extra steps](https://support.apple.com/en-us/102445#openanyway) to make it run.\n\nOnce you have downloaded `grafana-tui`, you can try it out using this runnable example:\n\n```sh\ngrafana-tui --url https://play.grafana.org\n```\n\n## Usage\n\n```sh\ngrafana-tui --url URL [flags]\n```\n\n### Deep linking\n\nThe `--url` flag accepts a full Grafana dashboard or panel URL.\nThis opens the dashboard (and optionally a specific panel) directly,\nskipping the dashboard list.\n\n```sh\n# Open a specific dashboard\ngrafana-tui --url https://grafana.example.com/d/abc123\n\n# Open a specific panel within a dashboard\ngrafana-tui --url https://grafana.example.com/d/abc123?viewPanel=22\n```\n\nPress `esc` to navigate back to the dashboard list.\n\n### Authentication\n\nAuthenticate with a service account token (recommended) or basic auth\ncredentials.\nCommand-line flags override environment variables.\n\n```sh\n# Token auth (recommended)\ngrafana-tui --url https://grafana.example.com --token YOUR_TOKEN\n\n# Or via environment variables\nexport GRAFANA_URL=https://grafana.example.com\nexport GRAFANA_SERVICE_ACCOUNT_TOKEN=YOUR_TOKEN\ngrafana-tui\n\n# Basic auth\ngrafana-tui --url https://grafana.example.com --username admin --password secret\n```\n\n### Flags\n\n```\n--url         Grafana instance URL (env: GRAFANA_URL)\n--token       Grafana service account token (env: GRAFANA_SERVICE_ACCOUNT_TOKEN)\n--username    Grafana basic auth username (env: GRAFANA_USERNAME)\n--password    Grafana basic auth password (env: GRAFANA_PASSWORD)\n--refresh     Auto-refresh interval (default: 30s)\n```\n\n### Keybindings\n\n| Key   | Action                  |\n|-------|-------------------------|\n| `r`   | Fetch latest data       |\n| `t`   | Change time range       |\n| `v`   | Change template variables |\n| `f`   | Filter series           |\n| `j/k` | Scroll down/up          |\n| `q`   | Quit                    |\n| `Esc` | Back                    |\n","summary":" grafana-tui is a terminal user interface that enables users to browse Grafana dashboards, panels, and time series data directly from the command line without requiring a web browser. It connects to remote Grafana instances and supports service account token or basic authentication, deep linking to specific dashboards or panels, and keyboard-driven controls for navigation, filtering, time ranges, and auto-refresh. This tool is ideal for developers, site reliability engineers, and DevOps professionals who spend significant time in terminal environments and need quick, lightweight access to monitoring data.","description":"Grafana dashboards in your terminal","stars":72,"language":"Go"},{"owner":"openziti","repo":"llm-gateway","url":"https://github.com/openziti/llm-gateway","readme":"# llm-gateway\n\nAn OpenAI-compatible API proxy that routes requests to OpenAI, Anthropic, and any OpenAI-compatible backend (Ollama, vLLM, llama-server, SGLang, etc.). Optionally expose the gateway via [zrok](https://zrok.io) for zero-trust access.\n\n## Why another LLM gateway?\n\nMost LLM proxies solve API translation. This one also solves the network problem: how do you connect a gateway to GPU boxes behind NAT, expose it to clients without opening ports, and route requests to the right model — all without bolting on a VPN, a service mesh, or a routing database?\n\n- **Zero-trust networking with zrok (over OpenZiti)** — the gateway and its backends communicate using [zrok](https://github.com/openziti/zrok) over [OpenZiti](https://openziti.io) overlay networks. Expose the gateway or reach a backend across NAT, air-gapped networks, or cloud boundaries without firewall rules or port forwarding. Both directions work the same way.\n- **Semantic routing** — a three-layer cascade (keyword heuristics, embedding similarity, LLM classifier) selects the best model automatically when clients omit the `model` field. No hand-maintained routing tables.\n- **Multi-endpoint load balancing** — weighted round-robin, health checks with passive failover, and VM sleep detection across a pool of inference servers. Works with Ollama, llama-server, vLLM, SGLang, or anything that exposes `/v1/chat/completions`. Built for distributing inference across real hardware.\n- **Single binary, zero infrastructure** — one Go binary, one YAML file. No database, no message queue, no sidecar.\n\n## Features\n\n- **OpenAI-compatible API**: Drop-in replacement for OpenAI client libraries\n- **Multi-provider routing**: Automatically routes requests based on model name\n- **Semantic routing**: Optional three-layer cascade (heuristics, embeddings, LLM classifier) to automatically select the best model when `model` is omitted\n- **Anthropic translation**: Transparently converts OpenAI format to/from Anthropic's Messages API\n- **Streaming support**: Server-Sent Events (SSE) streaming for all providers\n- **Multi-endpoint load balancing**: Round-robin load distribution and automatic failover across multiple inference backends\n- **OpenTelemetry metrics**: Prometheus-exported metrics for requests, latency, tokens, and endpoint health\n- **zrok integration**: Expose the gateway via zrok private or public shares\n- **Zero-trust backends**: Connect to any provider via zrok shares (no exposed ports)\n\n> **New here?** See the [Getting Started guide](docs/getting-started.md) for a step-by-step walkthrough from zero to a working gateway.\n\n## Installation\n\nPre-built binaries for Linux, macOS, and Windows are available on the [Releases](https://github.com/openziti/llm-gateway/releases) page.\n\nOr install with Go:\n\n```bash\ngo install github.com/openziti/llm-gateway/cmd/llm-gateway@latest\n```\n\nOr build from source:\n\n```bash\ngit clone https://github.com/openziti/llm-gateway.git\ncd llm-gateway\ngo install ./...\n```\n\n## Quick Start\n\n1. Create a config file:\n\n```yaml\n# config.yaml\nlisten: \":8080\"\n\nproviders:\n  open_ai:\n    api_key: \"${OPENAI_API_KEY}\"\n  anthropic:\n    api_key: \"${ANTHROPIC_API_KEY}\"\n  local:                               # works with any OpenAI-compatible backend\n    base_url: \"http://localhost:11434\"\n```\n\n2. Run the gateway:\n\n```bash\nexport OPENAI_API_KEY=\"sk-...\"\nexport ANTHROPIC_API_KEY=\"sk-ant-...\"\nllm-gateway run config.yaml\n```\n\n3. Make requests using any OpenAI-compatible client:\n\n```bash\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"gpt-4o\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"Hello!\"}]\n  }'\n```\n\n## Provider Routing\n\nRequests are routed based on model name prefix:\n\n| Model Prefix | Provider |\n|--------------|----------|\n| `gpt-*` | OpenAI |\n| `o1-*` | OpenAI |\n| `o3-*` | OpenAI |\n| `claude-*` | Anthropic |\n| Everything else | Local / self-hosted |\n\nAny model that doesn't match the OpenAI or Anthropic prefixes is routed to the local provider. It works with any OpenAI-compatible backend — Ollama, vLLM, llama-server, SGLang, or similar.\n\n### Multi-Endpoint Load Balancing\n\nDistribute requests across multiple inference backends for load balancing and resilience. When `endpoints` is present, the gateway uses round-robin selection with automatic failover:\n\n```yaml\nproviders:\n  local:\n    endpoints:\n      - name: gpu-box-1\n        base_url: \"http://10.0.0.1:11434\"\n        weight: 3\n      - name: gpu-box-2\n        base_url: \"http://10.0.0.2:11434\"\n      - name: remote\n        zrok_share_token: \"abc123\"\n    health_check:\n      interval_seconds: 30   # default: 30\n      timeout_seconds: 5     # default: 5\n```\n\nEach endpoint can use direct HTTP or a zrok share. The optional `weight` (default: 1) controls the proportion of traffic an endpoint receives — an endpoint with weight 3 gets ~3x the requests of weight 1. A background goroutine pings each endpoint at the configured interval and marks unhealthy endpoints for automatic skip. Network errors during requests also trigger immediate passive failover. All gateway features that use the local provider (chat completions, embeddings, classifier) distribute requests across the endpoint group.\n\nThe endpoints don't all have to run the same software. You can mix Ollama, vLLM, llama-server, or any other OpenAI-compatible server in the same pool — the load balancing layer doesn't care what's behind the URL.\n\n## API Endpoints\n\n### POST /v1/chat/completions\n\nOpenAI-compatible chat completions endpoint. Supports both streaming (`stream: true`) and non-streaming requests. When semantic routing is enabled, the `model` field is optional.\n\n### GET /v1/models\n\nReturns available models from all configured providers. When semantic routing is enabled, includes an `auto` virtual model that triggers automatic model selection. With multi-endpoint mode, returns the deduplicated union of models from all healthy endpoints.\n\n### GET /health\n\nReturns `{\"status\":\"ok\"}` with HTTP 200. Use for liveness checks.\n\n### GET /metrics\n\nPrometheus metrics endpoint (when `metrics.enabled: true`). Exposes request counts, duration histograms, token counters, routing decisions, provider errors, in-flight gauges, and endpoint health.\n\n## Configuration\n\n### Full Configuration Example\n\n```yaml\nlisten: \":8080\"\n\nzrok:\n  share:\n    enabled: false\n    mode: private      # public or private\n    token: \"\"          # use existing persistent share (private only)\n\nproviders:\n  open_ai:\n    api_key: \"${OPENAI_API_KEY}\"\n    base_url: \"\"             # optional: override for Azure or compatible APIs\n    zrok_share_token: \"\"     # optional: connect via zrok share\n\n  anthropic:\n    api_key: \"${ANTHROPIC_API_KEY}\"\n    base_url: \"\"             # optional: override base URL\n    zrok_share_token: \"\"     # optional: connect via zrok share\n\n  local:\n    base_url: \"http://localhost:11434\"\n    zrok_share_token: \"\"     # optional: connect via zrok share\n\n    # or use multi-endpoint mode for round-robin + failover:\n    # endpoints:\n    #   - name: gpu-box-1\n    #     base_url: \"http://10.0.0.1:11434\"\n    #   - name: gpu-box-2\n    #     base_url: \"http://10.0.0.2:11434\"\n    #   - name: remote\n    #     zrok_share_token: \"abc123\"\n    # health_check:\n    #   interval_seconds: 30\n    #   timeout_seconds: 5\n\nmetrics:\n  enabled: false\n```\n\n### Environment Variables\n\nAPI keys support environment variable expansion using `${VAR}` syntax.\n\n## API Keys\n\nThe gateway supports virtual API keys for client authentication. Generate a key and add it to the config:\n\n```bash\nllm-gateway genkey\n# sk-gw-a1b2c3d4e5f6...\n```\n\n```yaml\napi_keys:\n  enabled: true\n  keys:\n    - name: alice\n      key: \"sk-gw-a1b2c3d4e5f6...\"\n      allowed_models: [\"*\"]\n```\n\nClients send the key via the `Authorization: Bearer <key>` header. The `/health` and `/metrics` endpoints remain unauthenticated. Keys can be restricted to specific models using glob patterns. See [docs/api-keys.md](docs/api-keys.md) for details.\n\n## Semantic Routing\n\nWhen configured, the gateway can automatically select the best model for a request based on its content. The `model` field becomes optional — if omitted, the request passes through a three-layer cascade:\n\n1. **Heuristics** — fast keyword/pattern matching (e.g. \"translate\" -> fast model, tool use -> tool-capable model)\n2. **Embeddings** — cosine similarity between the user prompt and route exemplars using Ollama or OpenAI embeddings\n3. **LLM Classifier** — asks an LLM to classify the request when embeddings are ambiguous\n\nEach layer can be independently enabled or disabled — for example, the classifier can be used without embeddings. If all layers are skipped or inconclusive, the configured default route is used. When semantic routing is disabled or unconfigured, behavior is unchanged.\n\n### Semantic Routing Configuration\n\n```yaml\nrouting:\n  allow_explicit_model: true    # clients can still specify a model directly\n  default_route: general        # fallback when no layer matches\n\n  heuristics:\n    enabled: true\n    rules:\n      - match:\n          keywords: [\"translate\", \"translation\"]\n        route: fast\n      - match:\n          has_tools: true\n        route: tools\n      - match:\n          system_prompt_contains: \"you are a code assistant\"\n        route: coding\n      - match:\n          max_tokens_lt: 100\n          message_length_lt: 200\n        route: fast\n\n  semantic:\n    enabled: true\n    provider: local             # local or openai\n    model: nomic-embed-text\n    threshold: 0.82             # confident match\n    ambiguous_threshold: 0.65   # escalate to classifier\n    comparison: centroid         # centroid, max, or average\n\n  classifier:\n    enabled: true\n    provider: local\n    model: llama3\n    timeout_ms: 5000\n    confidence_threshold: 0.7\n\n  routes:\n    - name: coding\n      model: claude-sonnet-4-20250514\n      description: \"code generation, debugging, and technical tasks\"\n      examples:\n        - \"write a python function to sort a list\"\n        - \"debug this segfault in my C code\"\n\n    - name: creative\n      model: claude-sonnet-4-20250514\n      description: \"creative writing, storytelling, and artistic content\"\n      examples:\n        - \"write a poem about the ocean\"\n        - \"tell me a story about a dragon\"\n\n    - name: fast\n      model: llama3\n      description: \"simple tasks, translations, and short responses\"\n      examples:\n        - \"translate hello to French\"\n        - \"what is 2+2\"\n\n    - name: tools\n      model: gpt-4\n      description: \"tasks requiring tool use and function calling\"\n      examples:\n        - \"search the web for recent news\"\n        - \"call the weather API for New York\"\n\n    - name: general\n      model: llama3\n      description: \"general conversation and miscellaneous tasks\"\n      examples:\n        - \"what is the capital of France\"\n        - \"explain quantum computing\"\n```\n\n### Heuristic Match Conditions\n\nEach heuristic rule has a `match` block with one or more conditions. When multiple conditions are specified in a single rule, all must match (AND logic). Within `keywords`, any keyword matching triggers the rule (OR logic). Available conditions:\n\n| Condition | Description |\n|-----------|-------------|\n| `keywords` | Case-insensitive word-boundary match against user message content |\n| `has_tools` | Matches if request includes/lacks tool definitions |\n| `system_prompt_contains` | Substring match on the system message |\n| `max_tokens_lt` | Matches if `max_tokens` is below a threshold |\n| `message_length_lt` | Matches if total message character length is below a threshold |\n| `exclude` | List of phrases that suppress keyword matches if found in user messages |\n\n### Sending Requests Without a Model\n\nWith semantic routing enabled, the `model` field can be omitted:\n\n```bash\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"messages\": [{\"role\": \"user\", \"content\": \"Write a Python function to sort a list\"}]\n  }'\n```\n\n### Using with Chat Clients (Open WebUI, etc.)\n\nChat clients like Open WebUI require selecting a model from the model list — they always send a `model` field. When semantic routing is enabled, the gateway exposes a virtual `auto` model that triggers automatic routing:\n\n```bash\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"auto\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"Write a Python function to sort a list\"}]\n  }'\n```\n\nPoint your client at `http://localhost:8080/v1` and select `auto` from the model list. The gateway will route each request through the semantic routing cascade.\n\nThe gateway logs each routing decision with the method used, confidence score, latency, and cascade trace.\n\n## Metrics\n\nEnable OpenTelemetry metrics with a Prometheus exporter:\n\n```yaml\nmetrics:\n  enabled: true\n```\n\nWhen enabled, the gateway serves Prometheus metrics at `GET /metrics` on the same listen address. Available metrics:\n\n| Metric | Type | Description |\n|--------|------|-------------|\n| `llm_gateway.requests` | Counter | Total requests (by provider, model, streaming) |\n| `llm_gateway.request.duration` | Histogram | Request duration in seconds (by provider, model) |\n| `llm_gateway.tokens.prompt` | Counter | Total prompt tokens (by provider, model) |\n| `llm_gateway.tokens.completion` | Counter | Total completion tokens (by provider, model) |\n| `llm_gateway.routing.decisions` | Counter | Semantic routing decisions (by method) |\n| `llm_gateway.provider.errors` | Counter | Provider errors (by error_type) |\n| `llm_gateway.requests.inflight` | Gauge | Currently in-flight requests |\n| `llm_gateway.endpoint.healthy` | Gauge | Endpoint health status |\n\n## Tracing\n\nEnable request body logging for debugging routing decisions:\n\n```yaml\ntracing:\n  enabled: true\n  max_content_length: 200   # max characters per message in log output\n```\n\nEach chat completion request is logged with the model, message count, streaming flag, tool count, and each message's role and truncated content. See [docs/configuration.md](docs/configuration.md) for details.\n\n## CLI Reference\n\n```\nllm-gateway run <configPath>\n\nFlags:\n      --address string     listen address (overrides config)\n      --zrok               enable zrok sharing (overrides config)\n      --zrok-mode string   zrok share mode: public, private (overrides config)\n```\n\n## zrok Integration\n\n### Exposing the Gateway\n\nEnable zrok sharing to expose the gateway without opening firewall ports:\n\n```yaml\nzrok:\n  share:\n    enabled: true\n    mode: private\n```\n\nOr via CLI:\n\n```bash\nllm-gateway run config.yaml --zrok --zrok-mode private\n```\n\nThe gateway will log the share token on startup. Clients connect using zrok access.\n\n### Using Persistent Shares\n\nFor stable share tokens across restarts, create a persistent share with the zrok CLI and reference it:\n\n```yaml\nzrok:\n  share:\n    enabled: true\n    token: \"abc123xyz\"  # your persistent share token\n```\n\n### Connecting to Backends via zrok\n\nAny provider can be reached through a zrok share instead of a direct URL:\n\n```yaml\nproviders:\n  open_ai:\n    api_key: \"${OPENAI_API_KEY}\"\n    zrok_share_token: \"openai-proxy-share-token\"\n\n  anthropic:\n    api_key: \"${ANTHROPIC_API_KEY}\"\n    zrok_share_token: \"anthropic-proxy-share-token\"\n\n  local:\n    zrok_share_token: \"ollama-share-token\"\n```\n\n## Examples\n\n### Using with Python OpenAI Client\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:8080/v1\",\n    api_key=\"not-needed\"  # gateway handles auth\n)\n\n# Routes to OpenAI\nresponse = client.chat.completions.create(\n    model=\"gpt-4o\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}]\n)\n\n# Routes to Anthropic (translated automatically)\nresponse = client.chat.completions.create(\n    model=\"claude-sonnet-4-20250514\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}]\n)\n\n# Routes to local backend (Ollama, vLLM, etc.)\nresponse = client.chat.completions.create(\n    model=\"llama3.2\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}]\n)\n```\n\n### Streaming\n\n```python\nstream = client.chat.completions.create(\n    model=\"claude-sonnet-4-20250514\",\n    messages=[{\"role\": \"user\", \"content\": \"Write a haiku\"}],\n    stream=True\n)\n\nfor chunk in stream:\n    if chunk.choices[0].delta.content:\n        print(chunk.choices[0].delta.content, end=\"\")\n```\n\n## Documentation\n\n- [Getting Started](docs/getting-started.md) -- step-by-step setup guide\n- [Configuration](docs/configuration.md) -- full config reference and CLI flags\n- [Providers](docs/providers.md) -- provider details, streaming, and error handling\n- [Semantic Routing](docs/semantic-routing.md) -- threshold tuning, comparison modes, and caching\n- [API Keys](docs/api-keys.md) -- per-key model and route restrictions\n- [Multi-Endpoint Load Balancing](docs/multi-endpoint.md) -- weighted load balancing and failover\n- [Metrics](docs/metrics.md) -- Prometheus instruments and example queries\n- [Streaming](docs/streaming.md) -- SSE streaming details\n- [zrok](docs/zrok.md) -- overlay networking for sharing and access\n\n## License\n\nApache 2.0\n","summary":" openziti/llm-gateway is an OpenAI-compatible API proxy that unifies access to OpenAI, Anthropic, and local inference servers like Ollama or vLLM behind a single endpoint. It distinguishes itself through integrated zero-trust networking via zrok and OpenZiti, enabling secure connections to GPU backends behind NAT or air-gapped networks without VPNs, firewall rules, or port forwarding. The gateway offers intelligent semantic routing that automatically selects optimal models when unspecified, alongside weighted load balancing and health checks across distributed inference endpoints. Delivered as a single Go binary requiring no external infrastructure, it serves developers and organizations needing to securely route LLM requests across heterogeneous providers and network boundaries.","description":"Zero trust LLM gateway. OpenAI-compatible proxy with semantic routing and load balancing across OpenAI, Anthropic, Ollama, vLLM, and any            compatible backend. Identity-based access, virtual API keys, and end-to-end encryption via OpenZiti","stars":54,"language":"Go"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
