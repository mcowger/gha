amework checks for updates automatically. Appcast hosted at getlockpaw.com.\n\n<br>\n\n## Security model\n\nLockpaw is a **visual privacy tool**, not a security boundary.\n\nIt guards against the accidental — a colleague, a cat, your own muscle memory while agents run. Not the intentional.\n\n<details>\n<summary><strong>What it does</strong></summary>\n<br>\n\n- Overlay at highest system window level\n- Event tap blocks all keyboard/scroll input\n- Fast User Switching cancels auth, keeps lock active\n- Accessibility revocation detected and handled (force unlock with warning)\n- URL scheme rate-limited (100ms debounce)\n- Debug escape hatch compile-gated (`#if DEBUG`)\n- State machine validates every transition\n- Hotkey conflict detection against system shortcuts\n\n</details>\n\n<details>\n<summary><strong>What it doesn't do</strong></summary>\n<br>\n\n- Prevent `pkill Lockpaw`\n- Block synthetic events (AppleScript, Accessibility API)\n- Survive kernel-level access\n- Protect against screen recording during overlay fade-in\n\nFor real security: `Ctrl+Cmd+Q`.\n\n</details>\n\n<br>\n\n## URL scheme\n\n```\nlockpaw://lock              Lock the screen\nlockpaw://unlock            Unlock with Touch ID\nlockpaw://unlock-password   Unlock with password\nlockpaw://toggle            Toggle lock state\n```\n\n<br>\n\n## Architecture\n\n```\nLockpaw/\n├─ LockpawApp                     Entry, MenuBarExtra, AppDelegate, onboarding\n├─ Controllers/\n│  ├─ LockController              State machine, lock/unlock orchestration\n│  ├─ Authenticator               LAContext · Touch ID · password fallback\n│  ├─ InputBlocker                CGEventTap · keyboard/scroll blocking\n│  ├─ HotkeyManager              CGEventTap · global hotkey detection\n│  ├─ OverlayWindowManager       NSWindow · multi-display · shielding level\n│  └─ SleepPreventer             IOKit · idle sleep assertion\n├─ Models/\n│  ├─ LockState                  .unlocked → .locking → .locked → .unlocking\n│  └─ HotkeyConfig               Centralized hotkey UserDefaults access\n├─ Views/\n│  ├─ LockScreenView             Dog · glow · progressive disclosure\n│  ├─ MenuBarView                Dropdown · lock/unlock/quit\n│  ├─ SettingsView               Native Form · hotkey recorder · appearance\n│  └─ OnboardingView             4-step wizard · hotkey · accessibility\n├─ Utilities/\n│  ├─ Constants                  Timing, animations, formatting\n│  ├─ Notifications              All Notification.Name in one place\n│  └─ AccessibilityChecker       AXIsProcessTrusted + System Settings\n└─ Resources/\n   └─ Assets                     App icon, mascot, menu bar icon, colors\n```\n\n<br>\n\n## CI\n\nPushes to `main` and PRs run build + 34 unit tests via GitHub Actions. Tagged releases (`v*`) build, sign, notarize, and create GitHub Releases with the DMG attached.\n\n<br>\n\n---\n\n<p align=\"center\">\n  <sub>\n    <a href=\"https://getlockpaw.com\">getlockpaw.com</a>\n  </sub>\n</p>\n\n<br>\n","summary":" Lockpaw is a lightweight macOS screen locker designed to instantly cover all displays with a customizable hotkey while keeping the computer awake and background processes running. Unlike traditional screen locks, it prevents sleep and display disconnections to ensure uninterrupted AI coding sessions, builds, downloads, and SSH connections, offering seamless unlocking via Touch ID or password through a minimal, aesthetically focused interface. The application is built natively in Swift, weighs only 3.4 MB, requires no external frameworks or internet connection, and operates without analytics or user accounts. It is particularly valuable for developers and power users who need to secure their workstations during breaks without interrupting long-running tasks, or anyone seeking a privacy-focused, efficient alternative to complex energy settings and screensaver configurations.","description":"Cover your Mac screen with a hotkey while AI agents keep running. Free, open source, 3.4 MB, Touch ID unlock.","stars":97,"language":"Swift"},{"owner":"liquidos-ai","repo":"Odyssey","url":"https://github.com/liquidos-ai/Odyssey","readme":"<div align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"LiquidOS Logo\" width=\"200\" height=\"200\">\n\n# Odyssey \n\n**Programmatic Agent Orchestrator in Rust with Batteries Included**\n\n[![Documentation](https://docs.rs/odyssey/badge.svg)](https://liquidos-ai.github.io/Odyssey)\n[![Build Status](https://github.com/liquidos-ai/Odyssey/workflows/Coverage/badge.svg)](https://github.com/liquidos-ai/Odyssey/actions)\n[![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/liquidos-ai/Odyssey)\n\n[Documentation](https://liquidos-ai.github.io/Odyssey/) | [Examples](examples/) | [Contributing](CONTRIBUTING.md)\n\n</div>\n\n---\n\n> **Active Development:** This project is still in development and is not ready for production use yet. Use it with caution.\n\nOdyssey is a batteries-included, programmatic agent orchestrator written in Rust. It provides a core runtime, built-in tools, memory, permissions, and sandboxing out of the box. With Odyssey, you can build desktop applications, robotics, and embedded systems with powerful agentic capabilities. It is built on top of our open-source agent framework [AutoAgents](https://github.com/liquidos-ai/AutoAgents).\n\n[![Odyssey Terminal UI](./assets/screenshot.png)](https://liquidos.ai)\n\n### What's in this repo\n- `crates/odyssey-rs-core`: Orchestrator runtime, permissions, sessions, prompt assembly.\n- `crates/odyssey-rs-tools`: Tool registry and built-in tools.\n- `crates/odyssey-rs-memory`: File-backed memory provider and policies.\n- `crates/odyssey-rs-sandbox`: Sandbox policies and providers.\n- `crates/odyssey-rs-protocol`: Event, request, and schema types.\n- `crates/odyssey-rs`: High-level crate for embedding Odyssey programmatically.\n- `crates/odyssey-rs-tui`: Terminal UI client.\n- `docs/`: mdBook documentation root (sources live in `docs/src`).\n\n---\n\n## Key Features\n\n- **Native:** High-performance, embeddable orchestrator written in Rust.\n- **Batteries Included:** Runtime, tools, memory, permissions, and sandboxing are built in.\n- **Secure:** Pure Rust implementation with permission gates and sandboxed tool execution.\n- **Tool Permissions:** Built-in permission system and safety checks for tool usage.\n- **Memory:** Pluggable and swappable memory layers.\n- **Flexible:** Extend the orchestrator with custom agents, tools, memory providers, and executors.\n- **Local Models:** Run embedded local models without an external server using [AutoAgents](https://github.com/liquidos-ai/AutoAgents).\n\n---\n\n### Quickstart\nSet your OpenAI API key, then run the hello-world example or integrate Odyssey into your own Rust application:\n\n```bash\nexport OPENAI_API_KEY=\"your-key\"\ncargo run -p odyssey-rs-hello-world\n```\n\nFor a custom integration, see `docs/src/quickstart.md`.\n\n### Run the TUI\n```bash\nexport OPENAI_API_KEY=\"your-key\"\ncargo run -p odyssey-rs-tui\n```\n\nOptional flags:\n```bash\ncargo run -p odyssey-rs-tui -- --config ./docs/src/odyssey.json5 --model gpt-5.2\n```\n\n### Development Setup\n\n#### Prerequisites\n\n- **Rust** (latest stable recommended)\n- **Cargo** package manager\n- **Lefthook** for Git hooks management\n- **tokei** for lines-of-code reporting\n\n#### Install LeftHook\n\n**macOS (using Homebrew):**\n\n```bash\nbrew install lefthook\n```\n\n**Linux/Windows:**\n\n```bash\n# Using npm\nnpm install -g lefthook\n```\n\n#### Running Tests\n\n```bash\n# Run all tests --\ncargo test --all-features\n\n# Run tests with coverage (requires cargo-tarpaulin)\ncargo install cargo-tarpaulin\ncargo tarpaulin --engine llvm --skip-clean \\\n  --workspace \\\n  --exclude odyssey-rs-server \\\n  --exclude odyssey-rs-tui \\\n  --all-features \\\n  --out html\n```\n\n### Docs (mdBook)\n```bash\nmdbook serve docs\n```\n\n## License\n\nOdyssey is licensed under:\n\n- **Apache License 2.0** ([APACHE_LICENSE](APACHE_LICENSE))\n\n---\n","summary":" Odyssey is a batteries-included agent orchestrator written in Rust, providing a secure, embeddable runtime with built-in tools, memory management, permissions, and sandboxing for building agentic applications. It features pluggable memory layers, permission-gated tool execution, and support for local models via the AutoAgents framework, eliminating the need for external servers. Targeted at developers building desktop applications, robotics, and embedded systems, it offers both a programmatic API for deep integration and an interactive terminal UI for immediate use. The modular architecture allows extensive customization through custom agents, memory providers, and executors while maintaining high performance and security through its pure-Rust implementation.","description":null,"stars":3,"language":"Rust"},{"owner":"WecoAI","repo":"awesome-autoresearch","url":"https://github.com/WecoAI/awesome-autoresearch","readme":"# Awesome AutoResearch [![Awesome](https://awesome.re/badge.svg)](https://awesome.re)\n\nA curated list of AutoResearch use cases **with optimization traces** and open source implementations. Every entry includes a link to the actual optimization trajectory so you can see what the agent tried, not just the final result.\n\n## What is AutoResearch?\n\nAutoResearch is, at its core, a prompt. Karpathy released it as a single markdown file - `program.md`, that instructs a coding agent (Claude Code, Codex, or similar) to follow an optimization workflow. The agent edits one file (`train.py`, that trains a language model), runs for a fixed 5 minutes on a GPU, checks whether the metric improved, and either commits the change or reverts it. Then it loops forever.\n\n<p align=\"center\">\n<img src=\"autoresearch-loop.png\" width=\"400\">\n</p>\n\nThe specific `program.md` that ships with AutoResearch is written for one task: training a GPT model. But the structure - iteratively optimizing a file against an evaluation metric, with a discard/keep loop - turns out to be portable. In the weeks since release, the community has adapted it to GPU kernel optimization, template engine optimization, tabular ML engineering, and more. The `program.md` for each of these looks different, but the loop is the same.\n\n## Use Cases\n\n| Use Case | Description | Author | Links | Traces |\n|----------|-------------|--------|-------|--------|\n| LLM training optimization | The original - optimize nanoGPT training code. 20 improvements found overnight on hand-tuned code | Andrej Karpathy | [GitHub](https://github.com/karpathy/autoresearch) · [Tweet](https://x.com/karpathy/status/2031088031709675676) | [progress chart](https://github.com/karpathy/autoresearch/blob/master/progress.png) |\n| Speed up Shopify's template engine | 53% faster parse+render, 61% fewer allocations from 93 automated commits on Shopify's Liquid engine | Tobi Lutke (Shopify CEO) | [GitHub](https://github.com/davebcn87/pi-autoresearch) · [Tweet](https://x.com/tobi/status/2032212531846971413) | [PR](https://github.com/Shopify/liquid/pull/2056) |\n| GPU kernel optimization | Autoresearch applied to CUDA kernel optimization (18 → 187 TFLOPS) | RightNow AI | [GitHub](https://github.com/RightNow-AI/autokernel) · [Tweet](https://x.com/Akashi203/status/2031533857082646769) | [progress chart](https://github.com/RightNow-AI/autokernel/blob/main/progress.png) |\n| Voice agent prompt engineering | Optimize voice agent prompts with automated evaluation (score 0.728 → 0.969) | Archie Sengupta | [GitHub](https://github.com/ArchishmanSengupta/autovoiceevals) · [Tweet](https://x.com/archiexzzz/status/2033258540312510702) | [progress chart](https://pbs.twimg.com/media/HDeR_UJbkAAj1P_?format=jpg&name=4096x4096) |\n| Predict baseball pitch speed | Build predictive model for pitch velocity from biomechanics data (R² 0.44 → 0.78) | Kyle Boddy (Driveline Baseball) | [Tweet](https://x.com/drivelinekyle/status/2032242254035992610) | [progress chart](https://pbs.twimg.com/media/HDP5FzEbEAAIIB0?format=jpg&name=4096x4096) |\n| XGBoost for tennis match prediction | Predict ATP/WTA match outcomes - encountered and documented reward hacking | Nick Oak | [Blog](https://nickoak.com/posts/tennis-xgboost-autoresearch/) · [GitHub](https://github.com/buildoak/tennis-xgboost-autoresearch) | [blog](https://nickoak.com/posts/tennis-xgboost-autoresearch/) |\n| RL post-training optimization | Autoresearch for RL hyperparameters on Qwen 0.5B + GSM8K (eval 0.475 → 0.550 in fewer steps) | Vivek Kashyap | [GitHub](https://github.com/vivekvkashyap/autoresearch-rl) · [Tweet](https://x.com/vivek_2332/status/2034137143870402935) | [progress chart](https://pbs.twimg.com/media/HDY-RmoaAAAySpk?format=jpg&name=medium) |\n| Ancient scroll ink detection | Vesuvius Challenge autoresearch agent swarm for ink detection models. 4 agents 24/7, cross-scroll generalization nearly doubled | Vesuvius Challenge | [Blog](https://scrollprize.substack.com/p/we-are-cooking) | [blog](https://scrollprize.substack.com/p/we-are-cooking) |\n| Earth system model optimization | Hybrid: LLM proposes formula structures, TPE optimizes parameters. Fire correlation 0.09→0.65 | Dev Paragiri (UMD CS) | [Tweet](https://x.com/devparagiri/status/2035075626273739068) · [Blog](https://paragiri.com/blog/2026/autoresearch-earth-system-models/) | [blog](https://paragiri.com/blog/2026/autoresearch-earth-system-models/) |\n| Bitcoin price formula discovery | Autonomous search for best time-based formula predicting Bitcoin price. 328 experiments, 50.5% RMSE improvement over power law. Walk-forward OOS evaluation with bootstrap significance testing | Carlos Baquero | [GitHub](https://github.com/CBaquero/BTCautoresearch) | [progress chart](https://github.com/CBaquero/BTCautoresearch/blob/main/fig_experiments.png) |\n\n## Implementations & Forks\n\n| Project | Description | Links |\n|---------|-------------|-------|\n| **autoresearch** | The original - single GPU, 630 lines of Python | [GitHub](https://github.com/karpathy/autoresearch) |\n| **pi-autoresearch** | Generalized as a Pi extension. Works for any optimization target - test speed, bundle size, build times, Lighthouse scores | [GitHub](https://github.com/davebcn87/pi-autoresearch) |\n| **autoresearch-mlx** | Apple Silicon (MLX) port. No PyTorch required, uses unified memory | [GitHub](https://github.com/trevin-creator/autoresearch-mlx) |\n| **autoresearch-win-rtx** | Windows + consumer RTX GPU port (RTX 2060 through 4090) | [GitHub](https://github.com/jsegov/autoresearch-win-rtx) |\n| **autoresearch-at-home** | Distributed autoresearch - SETI@home style. Multi-agent swarm coordination | [GitHub](https://github.com/mutable-state-inc/autoresearch-at-home) |\n| **autoresearch (Claude Skill)** | Generalized as a Claude Code skill for any domain | [GitHub](https://github.com/uditgoenka/autoresearch) |\n| **agent-digivolve-harness** | A control layer for long-running CLI agent work. Generalizes the autoresearch keep/revert loop with persistent run state, explicit eval packages, baseline and holdout cases, and one bounded mutation per iteration | [GitHub](https://github.com/MatthewZMD/agent-digivolve-harness) |\n| **auto-agent** | Autoresearch, but for AI agents. Given a golden dataset, it autonomously improves a target agent through an iterative hypothesis-driven loop: analyze failures, spawn a coding agent to implement fixes, evaluate, and accept or rollback | [GitHub](https://github.com/alfonsograziano/auto-agent) |\n\n## Contributing\n\nWant to add a use case? Open a PR or [file an issue](https://github.com/WecoAI/awesome-autoresearch/issues).\n\nTo make our work easier, please make submissions as verifiable as possible:\n\n- **Minimum**: a progress chart showing each experiment's score and breakthrough annotations (e.g. [Karpathy's progress chart](https://github.com/karpathy/autoresearch/blob/master/progress.png))\n- **Ideal**: a public repo with per-solution code and scores (the full exploration trace), or a [Weco Observe](https://docs.weco.ai/observe) dashboard link\n\n## License\n\n[CC0 1.0](LICENSE)\n","summary":" This repository maintains a curated list of AutoResearch implementations across diverse domains, documenting how AI coding agents iteratively optimize code through an automated edit-evaluate-commit loop. Each entry uniquely includes optimization traces that reveal the agent's complete decision trajectory—not just final outcomes—spanning applications from GPU kernel acceleration and LLM training to voice prompt engineering and sports analytics. It serves as a practical reference for developers and ML engineers seeking to apply automated optimization workflows to their own performance-critical projects.","description":"Curated list of AutoResearch use cases with optimization traces and open source implementations","stars":879,"language":null},{"owner":"sinisterMage","repo":"JulIde","url":"https://github.com/sinisterMage/JulIde","readme":"# julIDE\n\nA modern, fully-featured IDE for the [Julia](https://julialang.org/) programming language, built with [Tauri 2](https://tauri.app/), React, TypeScript, and Rust.\n\n![License](https://img.shields.io/badge/license-MIT-blue)\n![Platform](https://img.shields.io/badge/platform-Windows%20%7C%20macOS%20%7C%20Linux-lightgrey)\n![Julia](https://img.shields.io/badge/Julia-1.6%2B-9558B2)\n<img width=\"2553\" height=\"1353\" alt=\"image\" src=\"https://github.com/user-attachments/assets/29f6e9da-70d3-4e0c-a550-d85903ee63ed\" />\n\n---\n## Credits\n\n[@ Rakesh ](https://github.com/rakeshksr) - conributed multiple bug fixs and featue suggestions 🎉\n\n[@ RockyBeast](https://github.com/rokybeast) - contributed the new julIDE icons 🎉\n\n---\n\n## Features\n\n### Code Editing\n- **Monaco Editor** with full Julia syntax highlighting via a custom Monarch tokenizer\n- **25+ Julia snippets** — function, struct, try/catch, @testset, comprehensions, macros, and more\n- **Tabbed multi-file editing** with dirty indicators and auto-save\n- **Split editor** — side-by-side editing with a resizable divider\n- **Breadcrumb navigation** showing the file path below the tab bar\n- **Find & Replace** (Cmd/Ctrl+F, Cmd/Ctrl+H) via Monaco's built-in widget\n- Configurable font size, font family, tab size, word wrap, and minimap\n- **LaTeX to Unicode** — type `\\alpha` + Tab to insert `α` (based on Julia's LaTeX symbols table)\n\n### Language Intelligence (LSP)\n- Powered by [LanguageServer.jl](https://github.com/julia-vscode/LanguageServer.jl)\n- **Autocompletion**, **hover documentation**, **go-to-definition**, **find references**\n- **Signature help** with parameter info\n- **Real-time diagnostics** (errors and warnings) shown inline and in the Problems panel\n- **Error lens** — inline diagnostic messages displayed at the end of each line\n- **InlayHints** — type and parameter hints displayed inline in the editor\n- **Semantic tokens** — rich semantic highlighting beyond syntax-level tokenization\n- **Workspace and document symbol search**\n\n### Julia Runtime\n- **Run scripts** with rich output — inline images (PNG, JPEG, SVG), HTML, and plain text\n- **Interactive REPL** via xterm.js with full PTY emulation\n- **Multi-terminal support** — create, switch, and close multiple Julia REPL sessions\n- **Debugger** integration via [Debugger.jl](https://github.com/JuliaDebug/Debugger.jl) — breakpoints, step-through, variable inspection, call stack\n- **Code cell execution** — `##` markers create code cells; `Ctrl/Cmd+Enter` runs the current cell with inline results\n- **Variable Explorer** — workspace variable introspection via the REPL with DataFrame viewer support\n- **Revise.jl** toggle for hot-reload development\n- **Pluto.jl** reactive notebook support — open `.jl` files as Pluto notebooks in a native window\n- **Package Manager** — add and remove packages via `Pkg.jl` directly from the UI\n- **Environment selector** — switch between Julia project environments\n\n### File Management\n- **File explorer** with tree view, create/rename/delete files and folders\n- **Drag-and-drop** to move files between directories\n- **File watching** — automatically detects external changes (git, other editors) and refreshes the tree\n- **Quick Open** (Cmd/Ctrl+P) — fuzzy file finder across the entire workspace\n- **Global Search** (Cmd/Ctrl+Shift+F) — search across all files with regex, case-sensitivity, and glob filters\n\n### Git Integration\n- **Source control panel** — view staged, unstaged, and untracked files\n- **Stage / unstage** individual files or stage all at once\n- **Commit** with a message directly from the UI\n- **Branch management** — create, delete, and switch branches from the UI\n- **Push / Pull / Fetch** — sync with remote repositories\n- **Merge** — fast-forward and normal merges with conflict detection\n- **Stash** — save, list, and pop stashed changes\n- **Ahead/Behind tracking** — see how far your branch is from the upstream\n- **GitHub / GitLab / Gitea** provider integration — browse PRs, issues, and CI status directly in the IDE\n- **Auth settings** — store personal access tokens securely via the OS keychain\n- **Git blame** — toggle inline blame annotations showing author, date, and commit summary per line\n- **Diff viewer** — side-by-side diff view using Monaco DiffEditor\n- **Merge conflict resolution** — detects conflict markers and provides \"Accept Current\", \"Accept Incoming\", and \"Accept Both\" action buttons inline\n- Powered by `libgit2` (via the `git2` Rust crate) — no shell dependency for core operations\n\n### Workspace & UI\n- **Activity bar** — switch between Explorer, Outline, Search, Variables, Source Control, and Dev Containers views\n- **Command palette** (Cmd/Ctrl+Shift+P) with 35+ commands\n- **Settings panel** (Cmd/Ctrl+,) — configure editor, terminal, and appearance\n- **Theme support** — Dark and Light themes with full CSS variable system\n- **Welcome screen** with recent projects on startup\n- **Resizable panels** — sidebar and bottom panel with drag handles\n- **Outline panel** — LSP-powered document symbol tree in the sidebar (functions, structs, modules, etc.)\n- **Variable Explorer** — workspace variable introspection in the sidebar with DataFrame viewer\n- **Plot Pane** — image gallery in the bottom panel for plot output (PNG, JPEG, SVG, HTML)\n- **Test Runner** — runs `Pkg.test()` and parses `@testset` results in the bottom panel\n- **Status bar** — Julia version, environment, git branch, LSP status, Revise/Pluto indicators\n\n### Dev Container Support\n- **Auto-detect** `devcontainer.json` in the workspace and offer to build/start\n- **Docker and Podman** runtime auto-detection (with manual override in settings)\n- **Build, start, stop, rebuild, and tear down** dev containers from the UI or command palette\n- **Container panel** in the sidebar — list running containers and images, start/stop/restart/remove\n- **Container logs panel** — stream and view container output in real time\n- **Container terminal** — open a PTY session inside the running container\n- **Run Julia inside the container** — execute scripts in the dev container environment\n\n### Plugin System\n- **Plugin discovery** — automatically scans `~/.julide/plugins/` for installed plugins\n- **Plugin manifest** (`plugin.json`) — declare name, version, entry point, and contributions\n- **Plugin API** — register commands, sidebar panels, bottom panels, status bar items, and toolbar buttons\n- **Plugin panel** in the activity bar sidebar — view installed plugins and their status\n\n---\n\n## Prerequisites\n\n- **Julia** 1.6 or later ([download](https://julialang.org/downloads/))\n- **Rust** (latest stable) — [install via rustup](https://rustup.rs/)\n- **Bun** — [install](https://bun.sh/) (used as the package manager and script runner)\n- **System dependencies** for Tauri — see [Tauri prerequisites](https://v2.tauri.app/start/prerequisites/)\n\n### Recommended Julia packages\n\nInstall these globally for the best experience:\n\n```julia\nusing Pkg\nPkg.add(\"LanguageServer\")  # LSP support\nPkg.add(\"Revise\")          # Hot-reload\nPkg.add(\"Debugger\")        # Debugger integration\nPkg.add(\"Pluto\")           # Reactive notebooks\n```\n\n---\n\n## Getting Started\n\n### Clone and install\n\n```bash\ngit clone https://github.com/sinisterMage/JulIde.git\ncd JulIde\nbun install\n```\n\n### Development\n\n```bash\n# Start the Tauri dev server (frontend + native window with hot reload)\nbun run tauri dev\n```\n\nThis starts Vite on `localhost:1420` and opens the native Tauri window. Changes to both the React frontend and Rust backend are hot-reloaded.\n\n### Production Build\n\n```bash\n# Build the distributable application\nbun run tauri build\n```\n\nThe output is placed in `src-tauri/target/release/bundle/` and includes platform-specific installers (`.dmg` on macOS, `.msi`/`.exe` on Windows, `.deb`/`.AppImage` on Linux).\n\n---\n\n## Architecture\n\n```\njulIDE\n├── src/                        # React + TypeScript frontend\n│   ├── components/             # UI components\n│   │   ├── ActivityBar/        # Sidebar view switcher\n│   │   ├── CommandPalette/     # Cmd+Shift+P command search\n│   │   ├── Debugger/           # Debug panel (variables, call stack)\n│   │   ├── Editor/             # Monaco editor, tabs, breadcrumb, split view\n│   │   ├── FileExplorer/       # File tree with drag-and-drop\n│   │   ├── Container/           # Dev container management panel and logs\n│   │   ├── Git/                # Source control panel, diff viewer\n│   │   ├── Outline/            # LSP document symbol outline\n│   │   ├── OutputPanel/        # Script output with MIME rendering\n│   │   ├── PackageManager/     # Julia package management UI\n│   │   ├── PlotPane/           # Plot output gallery\n│   │   ├── Plugin/             # Plugin management panel\n│   │   ├── QuickOpen/          # Fuzzy file finder (Cmd+P)\n│   │   ├── SearchPanel/        # Global file search (Cmd+Shift+F)\n│   │   ├── Settings/           # Preferences panel\n│   │   ├── StatusBar/          # Bottom status indicators\n│   │   ├── Terminal/           # Multi-terminal with xterm.js\n│   │   ├── TestRunner/         # Test execution with result parsing\n│   │   ├── Toolbar/            # Run, debug, Revise, Pluto buttons\n│   │   ├── Variables/          # Variable explorer with DataFrame viewer\n│   │   └── Welcome/            # Welcome screen with recent projects\n│   ├── lsp/                    # LSP client and Monaco providers\n│   ├── services/               # Keybinding service, plugin host, builtin contributions\n│   ├── stores/                 # Zustand state management\n│   ├── themes/                 # Theme definitions (dark + light)\n│   ├── types/                  # TypeScript interfaces\n│   └── App.tsx                 # Root layout component\n│\n├── src-tauri/                  # Rust backend (Tauri 2)\n│   └── src/\n│       ├── main.rs             # Entry point\n│       ├── lib.rs              # Command registry and plugin setup\n│       ├── julia.rs            # Julia discovery, execution, Pkg commands\n│       ├── lsp.rs              # LanguageServer.jl JSON-RPC bridge\n│       ├── pty.rs              # PTY terminal management\n│       ├── debugger.rs         # Debugger.jl integration\n│       ├── fs.rs               # File system operations and dialogs\n│       ├── git.rs              # Git operations via libgit2\n│       ├── git_auth.rs         # PAT token storage via OS keychain (keyring)\n│       ├── git_provider.rs     # Git provider trait and commands for PRs/issues/CI\n│       ├── git_github.rs       # GitHub REST API provider implementation\n│       ├── git_gitlab.rs       # GitLab REST API provider implementation\n│       ├── git_gitea.rs        # Gitea REST API provider implementation\n│       ├── container.rs        # Docker/Podman container and devcontainer management\n│       ├── plugins.rs          # Plugin discovery and manifest loading\n│       ├── search.rs           # Workspace-wide file search\n│       ├── watcher.rs          # File change detection (notify crate)\n│       ├── settings.rs         # User settings persistence\n│       └── pluto.rs            # Pluto.jl notebook server\n│\n├── package.json                # Frontend dependencies (React, Monaco, xterm)\n├── vite.config.ts              # Vite build configuration\n├── tsconfig.json               # TypeScript configuration\n└── src-tauri/Cargo.toml        # Rust dependencies (tauri, git2, tokio, etc.)\n```\n\n### Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Desktop framework | Tauri 2 (Rust) |\n| Frontend | React 19, TypeScript, Vite |\n| Code editor | Monaco Editor |\n| Terminal | xterm.js with PTY |\n| State management | Zustand with Immer middleware |\n| Icons | Lucide React |\n| Git operations | git2 (libgit2 bindings) |\n| File watching | notify crate |\n| File search | walkdir + regex crates |\n| LSP | LanguageServer.jl via JSON-RPC over stdio |\n| Git provider API | reqwest (HTTP client for GitHub/GitLab/Gitea) |\n| Token storage | keyring crate (OS keychain) |\n| Container runtime | Docker / Podman CLI (auto-detected) |\n\n---\n\n## Keyboard Shortcuts\n\n| Shortcut | Action |\n|----------|--------|\n| `Cmd/Ctrl+Shift+P` | Command Palette |\n| `Cmd/Ctrl+P` | Quick Open (file finder) |\n| `Cmd/Ctrl+F` | Find in file |\n| `Cmd/Ctrl+H` | Find and replace |\n| `Cmd/Ctrl+Shift+F` | Search across files |\n| `Cmd/Ctrl+S` | Save file |\n| `` Ctrl+` `` | Toggle terminal |\n| `Cmd/Ctrl+G` | Go to Line |\n| `Ctrl/Cmd+Enter` | Run code cell |\n| `Cmd/Ctrl+,` | Open settings |\n\n---\n\n## Configuration\n\nSettings are stored in `~/.config/julide/settings.json` (Linux), `~/Library/Application Support/julide/settings.json` (macOS), or `%APPDATA%/julide/settings.json` (Windows).\n\nAvailable settings:\n\n| Setting | Default | Description |\n|---------|---------|-------------|\n| `fontSize` | `14` | Editor font size |\n| `fontFamily` | `JetBrains Mono, ...` | Editor font family |\n| `tabSize` | `4` | Indentation width |\n| `minimapEnabled` | `true` | Show minimap |\n| `wordWrap` | `off` | Word wrap mode |\n| `autoSave` | `true` | Auto-save on change |\n| `theme` | `julide-dark` | Color theme (`julide-dark` or `julide-light`) |\n| `terminalFontSize` | `13` | Terminal font size |\n| `containerRuntime` | `auto` | Container runtime (`auto`, `docker`, or `podman`) |\n| `containerRemoteHost` | `\"\"` | Remote Docker/Podman host URL |\n| `containerAutoDetect` | `true` | Auto-detect devcontainer.json on workspace open |\n| `displayForwarding` | `true` | Forward X11/Wayland display into containers |\n| `gpuPassthrough` | `false` | Pass GPU devices into containers |\n| `selinuxLabel` | `true` | Apply SELinux labels to bind mounts |\n| `persistJuliaPackages` | `true` | Persist Julia packages across container rebuilds |\n| `plutoPort` | `3000` | Port for the Pluto.jl notebook server |\n| `juliaPath` | `\"\"` | Custom Julia binary path (overrides auto-detection) |\n| `startMaximized` | `true` | Start the window maximized |\n\n---\n\n## Julia Path Detection\n\njulIDE automatically finds Julia using these strategies (in order):\n\n1. `juliaPath` setting (if set via Settings or the command palette \"Set Julia Executable Path\")\n2. `$JULIA_PATH` environment variable\n3. Login shell `which julia` lookup\n4. `~/.juliaup/bin/julia` (juliaup default)\n5. Common paths: `/opt/homebrew/bin/julia`, `/usr/local/bin/julia`, `/usr/bin/julia`\n6. macOS `/Applications/Julia*.app` bundles\n\nIf Julia is not found, use the command palette (`Cmd/Ctrl+Shift+P` → \"Set Julia Executable Path\") to pick a custom binary, or set the `JULIA_PATH` environment variable.\n\n---\n\n## License\n\n[MIT](LICENSE) -- Copyright 2026 Ofek Bickel\n","summary":" julIDE is a modern, cross-platform integrated development environment specifically built for the Julia programming language using Tauri 2, React, TypeScript, and Rust to deliver native desktop performance. It combines the Monaco Editor with custom Julia syntax highlighting and full Language Server Protocol support—including autocompletion, inline diagnostics, and go-to-definition—with deep runtime integration such as an interactive REPL, debugger, variable explorer, and Pluto.jl notebook support. The application also provides comprehensive project management through a file explorer with quick search capabilities and extensive Git integration for version control workflows. Julia developers seeking a dedicated, feature-rich coding environment tailored specifically to the language's ecosystem will find julIDE offers a compelling alternative to general-purpose editors.","description":"an IDE for the Julia programming language","stars":96,"language":"TypeScript"},{"owner":"SrPakura","repo":"AERKO_PWA","url":"https://github.com/SrPakura/AERKO_PWA","readme":"<div align=\"center\">\n  <h1>Aerko_</h1>\n</div>\n\n<div align=\"center\">\n  <img src=\"icon-512.png\" alt=\"Aerko_ Logo\" width=\"256\">\n\n The most advanced fitness web app in history.\n</div>\n\n---\n\n<div align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/7256c1dc-ba3e-4dc9-975b-4aa8f576630c\" width=\"100%\" alt=\"Aerko Roadmap\">\n</div>\n\n---\n\n<div align=\"center\">\n  <h3>Links</h3>\n  <p>\n    <b>App:</b> <a href=\"https://aerko.app/\">https://aerko.app/</a> <br>\n    <b>Landing page:</b> <a href=\"https://landing.aerko.app/\">https://landing.aerko.app/</a> <br>\n    <b>Figma design:</b> <a href=\"https://www.figma.com/design/UpqnrIqYNyEnqPb2LUiMnK/Aerko_?node-id=728-4774&t=ZC9zdy5ZHMeILwim-1\">View on Figma</a>\n  </p>\n</div>\n\n\n---\n\n<div align=\"center\">\n  <h3>Latest Updates</h3>\n  <p>\n    <b>First bug fixed:</b> Added input validation and limits (no more 6,000kg users, sorry Hulk). <br>\n    <b>Second bug fixed:</b> Fixed i18n logic to prioritize browser language detection (now implemented in this repository too). <br><br>\n    All live updates and hosting changes will be reflected in <b>this repository</b>: <br>\n    <a href=\"https://github.com/PakuraDev/Hosting_Aerko_PWA\">github.com/PakuraDev/Hosting_Aerko_PWA</a>\n  </p>\n</div>\n\n---\n\nAerko_ is a web application designed to be installed natively as a PWA. It combines advanced nutrition tracking, progressive overload training, and biomechanical analysis via computer vision. It was built with an obsessive focus on local-first privacy, extreme performance, and a brutalist usability standard. \n\nThe goal was simple: replace three different types of monthly-subscription CRUD apps with a single, standalone, zero-cloud environment. \n\n### Index\n* [1. Design Philosophy & UX](#1-design-philosophy--ux)\n* [2. Core Engine & Modules](#2-core-engine--modules)\n* [3. Languages & Personalities](#3-languages--personalities)\n* [4. Privacy & Security](#4-privacy--security)\n* [5. Architecture & Tech Stack](#5-architecture--tech-stack)\n* [6. The Role of AI in Development](#6-the-role-of-ai-in-development)\n* [7. Roadmap](#7-roadmap)\n\n---\n\n## 1. Design Philosophy & UX\n\n> **System Warning:** I am primarily a Product Designer. This project started as my Master's Thesis (TFM) and was forged through Design Thinking and usability testing with Reddit communities.\n\n### UI: Brutalism & Hierarchy\nThe interface relies on neo-brutalism and a cyberpunk/IDE aesthetic. I am fully aware it won't be to everyone's taste, but it is built strictly for high-contrast visibility and speed.\n\n* **Color Palette (60-30-10):** Soft Black (`#1A1A1A`) background, White (`#FFFFFF`) for text, and Acid Green (`#CCFF00`) as the accent.\n* **Typography:** **JetBrains Mono** combined with **Clash Display** (with Space Grotesk as a fallback). These fonts formalize the visual hierarchy using the perfect fourth as a scale and prevent number-reading fatigue.\n\n### UX: Efficiency & Fitts's Law\nThe app is visually intimidating but technically idiot-proof. It prioritizes Jakob Nielsen's efficiency component.\n\n* **Custom Anti-Shake Keyboard:** Designed for the harsh reality of lifting. When your CNS is fried after a heavy set of squats, you don't have the fine motor skills for tiny, native numeric inputs. The touch targets are massive by design and feature custom anti-shake logic to prevent double-logging inputs in a matter of milliseconds. \n* **Transversal Data:** Everything is interconnected. Log a new weight? The diet recalculates. Log a set? The app suggests the optimal weight for the next session based on your mesocycle's goal, fatigue patterns, and historical failures. Put in the effort once, and let the engine do the rest.\n\n---\n\n## 2. Core Engine & Modules\n\n### Nutrition\n* **Base Calculators:** Uses the classic 1984 Harris-Benedict formula (I like retro) with macro ratios based on ISSN scientific standards. Or, you can use God Mode and input everything manually.\n* **Local Pantry & Barcode Scanner:** A local database of +340 foods built from BEDCA and USDA data, combined with a native integration of the Open Food Facts API (via HTML5-QRCode) for zero-friction barcode scanning.\n* **Modular Smart Checks:** Based on Pareto's law. You configure your base diet (fixed weights like 600g of chicken, or variable weights daily). Then, daily tracking is reduced to checking off accordions in record speed. Meals also hook into the *Notification Triggers API*.\n\n### Training\n* **Volume Analysis:** Cross-references your effective sets (filtering out warm-ups) with an anatomical database to map your exact volume thresholds (MV, MEV, MAV, or MRV). It features an Imbalance Detector that analyzes muscle head volume to warn you if you have structural blind spots.\n* **Adaptive 1RM Calculator:** A dynamic engine that switches formulas based on reps: Brzycki (under 5 reps), Epley (6-10 reps), and Lombardi (11+ reps).\n\n#### MediaPipe & The Phantom DOM (The Crown Jewel)\nAnalyzing biomechanics (Squat, Bench Press, Deadlift) locally on a mobile browser is usually a performance nightmare. Processing 1080p 60fps video via MediaPipe melts batteries and freezes the main thread. So, I built a workaround:\n\n1. **The Phantom DOM:** MediaPipe *demands* DOM access to function, which makes Web Worker implementation hell. To trick the model, I built a \"Phantom DOM\" inside the worker environment. It tames the library without main-thread blocking.\n2. **Frame Traffic Controller:** Processing 1080p60 is unnecessary. The video is downscaled (720p/480p) and dropped to 15-30fps via a Ping-Pong traffic controller logic (sends a frame, waits for the `\"FRAME_DONE\"` signal).\n3. **Math Interpolation & EMA:** To prevent a choppy 15fps output on the UI, coordinates are mathematically interpolated on the main thread, and an Exponential Moving Average (EMA) filter is applied to smooth the tracking.\n\n\n**Benchmarks (5 identical video passes):** Tested across 5 different videos: Bench Press, Squat (90° & 45°), and Deadlift (90° & 45°). *Note: A pure 90-degree camera angle is vastly superior for 2D pose estimation.* Assuming the `Heavy` model as the baseline ground truth (100% reference):\n* **Full Model (~87-94% match):** Noticeably faster. It yields excellent results as long as the video lighting and recording angle are optimal.\n* **Lite Model (~59-71% match):** Extremely fast, but mathematically unreliable for serious biomechanics. It was so erratic and indecisive that it literally crashed my Python benchmarking script due to missing coordinate tensors.\n\n### 📈 Progress\n* **Scientific Fat Calculator:** Input skinfold caliper data, and the app calculates body density using the Jackson-Pollock 3/7 formula alongside Siri's equation.\n* **Anti-Obsession Cooldown:** A dynamic cooldown (20 hours for normal modes, 1 week for Zen mode) on biometric logging to prevent eating disorder behaviors and obsessive checking.\n\n---\n\n## 3. Languages and Personalities\n\nThe `i18n.service.js` engine dynamically loads translation fragments based on the exact screen you are on. The app features 3 modes:\n\n* **Default:** Classic tracking (Spanish, English, Portuguese, German, French).\n* **Zen:** Focuses on mental health, removes visual penalties, and extends cooldowns to avoid EDs.\n* **Tsundere:** Maximum hostility, dark humor, and constant humiliation if you miss your goals.\n\n*Note on Fallback Logic: Zen and Tsundere are only translated in Spanish. I refused to run dark humor through an AI translator, as contextless jokes ruin the UX. However, the fallback system is smart: if you set the app to English and enable Zen mode, it won't break; it simply loads the Default English strings over the Zen UX.*\n\n---\n\n## 4. Privacy & Security\n\nThis app has zero cloud integration. Everything lives in your browser via `IndexedDB`. To make this safe, I implemented military-grade cryptography using standard browser APIs:\n\n* **Native Cryptography:** AES-GCM 256-bit via the native `window.crypto.subtle` API.\n* **Key Derivation (PBKDF2):** A 4-digit PIN is weak. Aerko_ pushes it through PBKDF2 with 100,000 iterations combined with a locally generated salt to forge the master key.\n* **Volatile RAM Isolation:** The master key never touches the disk. It exists only in volatile memory while the session is active. Close the tab, and it acts like an `rm -- \"$0\"`.\n* **The Auth Canary:** To verify the PIN without exposing real user data to a failed decryption attempt, the app decrypts a small package containing the string `'AERKO_SECURE'`.\n* **Segmented Vaults:** Data is divided into encrypted DB stores (`user_vault`, `nutrition_vault`, `training_vault`, `progress_vault`), with a public store for basic non-sensitive config.\n* **Data Portability:** Parsers allow data imports from Hevy, Strong, Lifta, Apple Health, Google Fit, etc. Exports generate a `.json` decrypted directly in RAM. Zero vendor lock-in.\n\n---\n\n## 5. Architecture & Tech Stack\n\nI hate heavy frameworks. You won't find a `node_modules` black hole or a React setup here. This is built for absolute performance.\n\n* **Vanilla JS:** Zero framework overhead.\n* **Native Web Components:** Entire UI built extending `HTMLElement` via `customElements.define`, using a mix of Shadow and Light DOM.\n* **Pure CSS:** No Tailwind or Bootstrap. Custom CSS with native variables.\n* **Native DB:** IndexedDB with a custom async wrapper to avoid promise hell.\n\n**Key Libraries (Only the essentials):**\n* **MediaPipe Vision (`vision_bundle.js`)**\n* **Chart.js** (for biomechanical radars and dual-axis charts)\n* **HTML5-QRCode** (Because native barcode Web APIs are years away from stable iOS support)\n* **JSZip** (For local backup compression)\n* **SortableJS** (Drag & drop physics)\n\n*(P.S. If you read the source code, you'll find internal comments and Easter Eggs about my life. Consider it open-source lore).*\n\n---\n\n## 6. The Role of AI in Development\n\nI am going to be completely transparent. As a Product Designer, I handled the UX/UI, the architecture, the CSS, the Web Crypto implementation, and the MediaPipe Phantom DOM logic.\n\nHowever, **85-90% of the standard JS logic was written by AI** (Gemini 3.0 Pro, and later 3.1 Pro). \n\nI didn't use lazy prompts like \"make me a fitness app.\" I acted as the software architect, providing the model with strict, modular technical constraints for every component. AI is the only reason I didn't need to spend thousands of euros on a dev team or spend 2 years hand-coding standard CRUD operations. The CSS required manual intervention to match Figma, but the logic holds up.\n\n---\n\n## 7. Roadmap\n\nWhen I have the time, I'd like to release a v2—more modular and this time, a bit more \"human\". Here is what I have in mind, though there are many more ideas in the backlog:\n\n* **Cardio & Endurance Support:** Currently, the app is heavily focused on hypertrophy. I want to expand it to make it a more universal fitness tool.\n* **Nutrition Recipes / Groups Overhaul:** I want to add a \"Recipes\" feature. It's essentially a food group, but if all ingredients have fixed weights, the app will generate a custom food item with average macros per 100g. This way, you just log how many grams of the final meal you ate instead of adjusting individual ingredients every time.\n* **Desktop Web Version:** I'd like to decouple the UI so Training, Nutrition, and Progress tracking stay on mobile, while heavy Analysis moves to desktop. This allows for better, detailed statistics and leverages desktop GPU power to move away from MediaPipe to heavier models like RTMPose or DWPose (though it's too early to lock in a model; a better one might drop tomorrow).\n* **Extreme Modularity:** I want a system where the user decides exactly which modules to install (e.g., only Nutrition, or only Training) to save space. I honestly have no idea how I'm going to architect this yet (if anyone has suggestions, please let me know!).\n* **WebRTC & Optional Cloudflare R2 Sync:** For mobile-to-desktop sync, I'll likely use WebRTC for pure P2P local transfers. But for the lazy ones, I'll add an option to plug in your own Cloudflare R2 API keys for automatic, private cloud syncing.\n* **General UX Improvements:** Plus dozens of other smaller quality-of-life ideas I have in the pipeline.\n\n### Acknowledgments\nMassive thanks to **OpenFoodFacts**, **USDA**, and **BEDCA** for the DBs, **Google MediaPipe** for the vision models, and the maintainers of Chart.js, HTML5-QRCode, JSZip, and SortableJS.\n","summary":" Aerko_ is a privacy-centric fitness Progressive Web App that consolidates nutrition tracking, progressive overload training, and computer vision biomechanics into a single installable tool operating entirely on-device without cloud dependencies. Built with a brutalist, high-contrast interface optimized for post-workout usability—including a custom anti-shake keyboard and interconnected data systems that automatically recalibrate diet and training recommendations—it eliminates the need for multiple subscription-based services. The app targets serious athletes and privacy-focused users seeking a standalone, scientifically-grounded fitness solution that prioritizes local-first architecture, extreme performance, and zero-cloud security.","description":"The most advanced fitness web app in history and a lot of drama inside the code.","stars":47,"language":"JavaScript"},{"owner":"fulcrumresearch","repo":"druids","url":"https://github.com/fulcrumresearch/druids","readme":"# Druids\n\nDruids is a batteries-included library to coordinate and deploy coding agents across machines. Druids makes it easy to do this by abstracting away all the VM infrastructure, agent provisioning, and communication.\n\nFor example, here's a Druids program to deploy N task agents on N copies of a software environment and have a judge pick the best output:\n\n```python\nasync def program(ctx, spec=\"\", n=3):\n    submissions = {}\n\n    # each agent gets its own sandboxed VM with your repo\n    judge = await ctx.agent(\"judge\")\n\n    # events define how agents report back to the program\n    @judge.on(\"pick\")\n    async def on_pick(winner=\"\"):\n        await ctx.done({\"winner\": winner, \"submissions\": submissions})\n\n    # spawn n workers in parallel — each implements the spec independently\n    for i in range(n):\n        worker = await ctx.agent(f\"worker-{i}\", prompt=spec, git=\"write\")\n        worker_name = worker.name\n\n        @worker.on(\"submit\")\n        async def on_submit(pr_url=\"\"):\n            submissions[worker_name] = pr_url\n            if len(submissions) == n:\n                # all done — send the PRs to the judge\n                await judge.send(f\"Review these PRs and pick the best:\\n\\n{submissions}\")\n```\n\n```bash\ndruids exec best_of_n.py spec=\"Refactor the auth module\" n=5\n```\n\nDruids is useful for things like:\n\n- running many agents to do performance optimization\n- building custom automated software pipelines for eg code review, pentesting, large-scale migrations, long-running autonomous features\n- building data pipelines with agents\n\nYou can use it locally or deployed on [druids.dev](https://druids.dev).\n\n[Website](https://druids.dev) · [Docs](https://druids.dev/docs) · [Discord](https://discord.gg/QmMybVuwWp)\n\n**[Demo video](https://www.youtube.com/watch?v=EVJqW-tvSy4)**\n\n[![Watch the demo](https://img.youtube.com/vi/EVJqW-tvSy4/maxresdefault.jpg)](https://www.youtube.com/watch?v=EVJqW-tvSy4)\n\n## Agent programs\n\nA druids program is an async function that defines how your agents should run on your task. You create agents, define events they can trigger, and control what happens when they do. The agent decides *when* to trigger an event — the program decides *what happens*.\n\nEvents allow you to inject deterministic structure and control flow to structure how your agents work towards the task of the program. They are useful for defining controlled steps and flows, like:\n\n- forcing a model to iterate against hard tests and harness signals\n- building a verification hierarchy, where agents spawn outputs that are verified and redteamed by other agents until they match a set of properties\n- controlling distributed task state, like having a lock around the ways agents write to shared resources or user-facing systems\n\nEach agent gets a sandboxed VM with your repo and dependencies. Agents can share machines (`share_machine_with`), transfer files (`ctx.connect`), and work on git branches. On the hosted version, `agent.fork()` creates instant copy-on-write clones. You can message any agent while it runs, inspect program state, and redirect work without stopping the execution.\n\n## Quickstart\n\nYou need Docker, [uv](https://docs.astral.sh/uv/), and an Anthropic API key.\n\n```bash\nbash scripts/setup.sh\n```\n\nThis builds the Docker image, starts the server, and configures the CLI. Then run a program:\n\n```bash\ndruids exec .druids/build.py spec=\"Add a /health endpoint that returns 200 OK\"\n```\n\nSee the [getting started guide](https://druids.dev/docs/get-started) for a full walkthrough, or [QUICKSTART.md](QUICKSTART.md) for manual setup and troubleshooting.\n\n## Example programs\n\n- [`build.py`](.druids/build.py) — builder + critic + auditor. Three agents iterating until all are satisfied.\n- [`basher.py`](.druids/basher.py) — finder scans for tasks, spawns implementor+reviewer pairs.\n- [`review.py`](.druids/review.py) — demo agent tests a PR on a real system, monitor watches for shortcuts.\n- [`main.py`](.druids/main.py) — Claude and Codex racing on the same spec in parallel.\n\n## Architecture\n\n- [`server/`](server/) — FastAPI server, execution engine, sandbox management\n- [`client/`](client/) — CLI and Python client library\n- [`runtime/`](runtime/) — program runtime SDK\n- [`frontend/`](frontend/) — Vue 3 dashboard\n- [`docs/`](docs/) — documentation (also served at druids.dev/docs)\n","summary":" Druids is a batteries-included Python library designed to orchestrate and deploy coding agents across distributed machines, abstracting away the complexities of VM infrastructure, agent provisioning, and inter-agent communication. It enables developers to write async programs that coordinate multiple AI agents—each running in sandboxed environments with full repository access—through event-driven workflows that support patterns like parallel execution, verification hierarchies, and judge-worker consensus mechanisms. The library is particularly suited for building autonomous software engineering pipelines, automated code review systems, security testing, and large-scale refactoring tasks where structured agent collaboration is required. Users can run Druids locally using Docker or deploy to the managed druids.dev cloud service to leverage additional features like instant VM forking and persistent distributed execution.","description":null,"stars":202,"language":"Python"},{"owner":"sphireinc","repo":"Foundry","url":"https://github.com/sphireinc/Foundry","readme":"# Foundry\n\n[![Build Status](https://img.shields.io/github/actions/workflow/status/sphireinc/foundry/build.yml?branch=main)](https://github.com/sphireinc/foundry/actions)\n[![CodeQL](https://github.com/sphireinc/Foundry/actions/workflows/github-code-scanning/codeql/badge.svg?branch=main)](https://github.com/sphireinc/Foundry/actions/workflows/github-code-scanning/codeql)\n[![Pages](https://github.com/sphireinc/Foundry/actions/workflows/pages/pages-build-deployment/badge.svg)](https://github.com/sphireinc/Foundry/actions/workflows/pages/pages-build-deployment)\n[![Go Report Card](https://goreportcard.com/badge/github.com/sphireinc/foundry)](https://goreportcard.com/report/github.com/sphireinc/foundry)\n![Last Commit](https://img.shields.io/github/last-commit/sphireinc/foundry)\n\n<p align=\"center\">\n  <img height=\"300\" src=\"readme-assets/logo.png\" alt=\"logo\">\n</p>\n\nFoundry is a Markdown-first CMS written in Go. It keeps content in files, renders through themes, and extends through both first-class compiled Go plugins and out-of-process RPC plugins.\n\nThe project is aimed at teams that want a file-based workflow without giving up CMS-style features such as taxonomies, theme-owned custom fields, feeds, plugin hooks, and an admin surface.\n\nSee more of Foundry here: [Foundry Screenshots](README_SCREENSHOTS.md)\n\n## What Foundry does\n\n- Stores pages and posts as Markdown with frontmatter\n- Supports language-aware routing and content grouping\n- Builds a normalized site graph in memory\n- Uses themes for layouts, partials, and theme assets\n- Supports first-class compiled Go plugins for deep CMS integration\n- Supports out-of-process RPC plugins for process-isolated extension points\n- Uses plugins for hooks, asset injection, admin pages, and runtime extensions\n- Generates RSS and sitemap output\n- Publishes static output to `public/`\n- Serves the site locally with live reload during development\n- Tracks document, template, data, and taxonomy dependencies for incremental rebuilds\n\n## Quick Start\n\nThe fastest way to get the project running locally is via Docker:\n\n```bash\nsh scripts/docker-init.sh\ndocker compose up -d --build\n```\n\nThe default [docker-compose.yml](/Users/JuanSanchez/WebstormProjects/cms/docker-compose.yml) is local-development oriented:\n\n- it bind-mounts the project source into the container\n- it keeps `data/` and `public/` on named Docker volumes\n- it reads `.env` when present\n- `scripts/docker-init.sh` creates a `.env` file with random local secrets for local use\n\nFor a harder production shape, use [docker-compose.prod.yml](/Users/JuanSanchez/WebstormProjects/cms/docker-compose.prod.yml):\n\n```bash\nexport FOUNDRY_ADMIN_SESSION_SECRET=\"$(openssl rand -hex 32)\"\nexport FOUNDRY_ADMIN_TOTP_SECRET_KEY=\"$(openssl rand -base64 32)\"\ndocker compose -f docker-compose.prod.yml up -d --build\n```\n\nThe production compose setup:\n\n- uses explicit required secrets\n- runs with a read-only root filesystem\n- drops Linux capabilities\n- enables `no-new-privileges`\n- uses a tmpfs for `/tmp`\n- uses named volumes for `content/`, `themes/`, `plugins/`, `data/`, and `public/`\n\nBefore using the production overlay in anything real, update\n`content/config/site.docker.prod.yaml` so `base_url` matches your deployed\nHTTPS origin.\n\nOtherwise, see the [Getting Started](#getting-started) section for how to install the `foundry` command, run Foundry locally, or run it in portable standalone mode without Docker.\n\nFoundry will run on `http://localhost:8080/` by default, and the admin panel\nis reachable at `http://localhost:8080/__admin`. The default login on a \nnew install is `admin:admin`.\n\nProduction note: set `admin.session_secret` in `content/config/site.yaml` or\n`FOUNDRY_ADMIN_SESSION_SECRET` in the environment. Foundry stores only hashed\nsession tokens at rest, and an explicit session secret strengthens that hashing.\n\n## Project layout\n\n```text\ncmd/\n  foundry/         main CLI entrypoint\n  plugin-sync/     generated plugin import synchronizer\n\ninternal/\n  admin/           admin auth, HTTP handlers, service layer, UI templates\n  assets/          asset sync and CSS bundling\n  commands/        CLI command implementations\n  config/          config loading, editing, validation\n  content/         document parsing, loading, site graph assembly\n  data/            data file loading\n  deps/            dependency graph and incremental rebuild planning\n  feed/            RSS and sitemap generation\n  markup/          Markdown rendering\n  plugins/         plugin metadata, loading, lifecycle, sync\n  renderer/        template rendering and output writing\n  router/          URL assignment\n  server/          preview server, watcher, incremental rebuild orchestration\n  site/            higher-level graph loading helpers\n  taxonomy/        taxonomy indexing and archive helpers\n  theme/           theme management and validation\n\nplugins/           built-in plugins\nthemes/            installed themes\ncontent/           project content\ndata/              project data files\ndocs/              GitHub Pages site and published coverage\nscripts/           release and maintenance utilities\n```\n\n## Architecture\n\nFoundry keeps a clean separation between content loading, route assignment, rendering, and runtime orchestration.\n\nThe main pipeline is:\n\n```text\nconfig -> content/data load -> site graph -> route assignment\n      -> dependency graph -> renderer -> build output or preview server\n```\n\nTwo graph types matter:\n\n- `SiteGraph`: the in-memory representation of documents, routes, taxonomies, config, and loaded data\n- `DependencyGraph`: the rebuild graph used to decide which outputs must be regenerated after a change\n\nThe dependency graph includes taxonomy archive outputs, so incremental rebuilds can target both document pages and taxonomy pages.\n\n## Formatting\n\nFoundry uses:\n\n- `go fmt` for Go code\n- `prettier` for JS, CSS, HTML, and Markdown assets/docs\n\nInstall the formatter tooling once:\n\n```bash\nnpm install\n```\n\nThen run:\n\n```bash\nmake fmt\nmake fmt-web\nmake fmt-all\n```\n\n## Local UI testing\n\nFoundry now includes local-only browser coverage using Playwright for:\n\n- the shipped default frontend theme\n- the shipped default admin theme\n\nInstall the tooling once:\n\n```bash\nnpm install\nnpx playwright install\n```\n\nThen run:\n\n```bash\nmake test-e2e\n```\n\nUseful variants:\n\n```bash\nnpm run test:e2e\nnpm run test:e2e:full\nnpm run test:e2e:headed\nnpm run test:e2e:ui\n```\n\nNotes:\n\n- these tests start a real local Foundry server against a disposable temp workspace, so `content/`, `data/`, `public/`, and backup output are isolated from the repo during the run\n- they are intended for local development only right now; there is no GitHub Action for them yet\n- `make test-e2e` and `npm run test:e2e:full` run pre/post cleanup so `e2e-*` documents, media, users, backups, and lifecycle artifacts do not accumulate\n- admin tests default to `admin/admin`, but you can override credentials with:\n  - `FOUNDRY_E2E_ADMIN_USER`\n  - `FOUNDRY_E2E_ADMIN_PASS`\n\n## Official JavaScript SDKs\n\nFoundry now ships two official framework-agnostic JavaScript SDKs under `sdk/`:\n\n- `sdk/admin`\n- `sdk/frontend`\n\nThey exist to give admin frontends, plugin UIs, and JS-powered themes a supported client contract instead of forcing each consumer to hand-roll fetch logic against unstable internal endpoints.\n\nThe Admin SDK targets the authenticated admin API under `admin.path + /api`.\n\nThe Frontend SDK targets the public Foundry platform surface under `/__foundry`, with a live JSON API in preview/server mode and generated static artifacts under `public/__foundry/` for built sites.\n\nThe shared SDK core handles:\n\n- request construction\n- normalized JSON/error handling\n- capability discovery helpers\n- common client configuration\n\nThe current official browser entrypoints are:\n\n```text\n/__foundry/sdk/admin/index.js\n/__foundry/sdk/frontend/index.js\n```\n\nExample:\n\n```js\nimport { createAdminClient } from '/__foundry/sdk/admin/index.js';\nimport { createFrontendClient } from '/__foundry/sdk/frontend/index.js';\n\nconst admin = createAdminClient({ baseURL: '/__admin' });\nconst frontend = createFrontendClient({ mode: 'auto' });\n```\n\nCurrent capability discovery endpoints:\n\n- admin: `<admin.path>/api/capabilities`\n- frontend: `/__foundry/api/capabilities`\n\nBuilt sites also emit frontend SDK data artifacts under:\n\n```text\npublic/__foundry/\n  capabilities.json\n  site.json\n  navigation.json\n  routes.json\n  collections.json\n  search.json\n  preview.json\n  content/<id>.json\n  sdk/...\n```\n\nThe shipped themes use these SDKs too:\n\n- the default admin theme imports the Admin SDK from `/__foundry/sdk/admin/index.js`\n- the default frontend theme boots a small SDK-based runtime from `/theme/js/foundry-theme.js`\n\nPlugin-defned admin pages and widgets can also target a stable shell contract now. A plugin can declare admin page and widget bundles in `plugin.yaml`, Foundry exposes those bundles under `<admin.path>/extensions/<plugin>/...`, and the default admin shell will automatically import them when their page or widget slot is active. Admin pages can also declare `nav_group` (`dashboard`, `content`, `manage`, or `admin`) so they land in the right sidebar group. The shell dispatches `foundry:admin-extension-page` and `foundry:admin-extension-widget` and exposes `window.FoundryAdmin` so plugin code can mount against a supported runtime surface instead of private admin internals. The built-in Extensions admin page itself uses a separate route, `<admin.path>/a-extensions`, so it does not collide with the plugin asset namespace.\n\n## Theme and plugin security\n\nFoundry now treats themes and plugins as different security surfaces.\n\n- Themes are restricted through `theme.yaml -> security`\n- Plugins declare intended power through `plugin.yaml -> permissions`\n\nTheme security currently covers:\n\n- a curated public-safe template context instead of raw config\n- CSP generation for public pages\n- validation of undeclared remote assets in theme HTML, CSS, and JS\n- explicit declaration of outbound frontend request origins\n\nPlugin permissions currently cover declaration and visibility, not true sandboxing.\nIn-process plugins are still trusted Go code today, but Foundry now also has a\nworking out-of-process RPC host for the first migrated hook family\n(`OnContext`). Foundry can now:\n\n- load and validate structured permission declarations\n- surface plugin risk and approval requirements in the admin UI\n- report declared permissions with `foundry plugin security <name>`\n- run `foundry plugin validate --security` for explicit security validation\n- statically analyze plugin source for risky imports, hooks, and calls\n- compare detected capabilities against declared permissions\n- require explicit approval for risky or mismatched plugins during CLI and admin install, enable, and update flows\n- record security-oriented plugin approval actions in the audit log\n- execute `runtime.mode: rpc` plugins out of process when they use the supported RPC protocol and hook family\n\nSee the full authoring guides for details:\n\n- `docs/themes/` for `theme.yaml -> security`\n- `docs/plugins/` for `plugin.yaml -> permissions`\n- `docs/plugins/` also includes the full structured permission reference for plugin authors\n\nPlugin runtime metadata now supports a real `runtime` block. The current RPC\nhost supports the `context` hook family over a JSON RPC transport, with a\nsanitized environment and no host-granted filesystem, network, or process\ncapability channels. Broader hook migration and stronger OS-level sandboxing\nstill build on that foundation.\n\n## Getting Started\n\n### Prerequisites\n\n- Go `1.22` or newer\n- A working `PATH` that includes `$(go env GOPATH)/bin` if you install with `go install`\n\n### Install\n\nInstall the CLI:\n\n```bash\ngo install github.com/sphireinc/foundry/cmd/foundry@latest\n```\n\nVerify the install:\n\n```bash\nfoundry version\n```\n\nThat prints runtime-aware version metadata, including the current version, commit, build date,\ninstall mode, target platform, and executable path.\n\nIf you are working from a local checkout instead of a global install, you can run:\n\n```bash\ngo run ./cmd/foundry version\n```\n\n### Start a site from the repo layout\n\nFoundry expects a file-based project layout. The quickest way to get running is to start with this shape:\n\n```text\ncontent/\n  config/\n    site.yaml\n  pages/\n    index.md\n  posts/\n  images/\n  uploads/\ndata/\nthemes/\nplugins/\n```\n\nMinimal `content/config/site.yaml` (though you can just cope the `example.site.yaml`):\n\n```yaml\ntitle: My Site\nbase_url: http://localhost:8080\ntheme: default\n\ncontent_dir: content\npublic_dir: public\nthemes_dir: themes\ndata_dir: data\nplugins_dir: plugins\n\nserver:\n  addr: :8080\n  live_reload: true\n  live_reload_mode: stream\n```\n\nMinimal `content/pages/index.md`:\n\n```md\n---\ntitle: Home\n---\n\n# Hello from Foundry\n```\n\n### Run it\n\n#### Docker\n\nLocal development with Docker:\n\n```bash\nsh scripts/docker-init.sh\ndocker compose up -d --build\n```\n\nThat uses:\n\n- [docker-compose.yml](/Users/JuanSanchez/WebstormProjects/cms/docker-compose.yml)\n- [content/config/site.docker.yaml](/Users/JuanSanchez/WebstormProjects/cms/content/config/site.docker.yaml)\n\nThe default Docker setup is intentionally development-oriented:\n\n- the project root is bind-mounted into the container\n- `data/` and `public/` stay on named Docker volumes\n- local Docker secrets can live in `.env`\n\nProduction-shaped Docker deployment:\n\n```bash\nexport FOUNDRY_ADMIN_SESSION_SECRET=\"$(openssl rand -hex 32)\"\nexport FOUNDRY_ADMIN_TOTP_SECRET_KEY=\"$(openssl rand -base64 32)\"\ndocker compose -f docker-compose.prod.yml up -d --build\n```\n\nThat uses:\n\n- [docker-compose.prod.yml](/Users/JuanSanchez/WebstormProjects/cms/docker-compose.prod.yml)\n- [content/config/site.docker.prod.yaml](/Users/JuanSanchez/WebstormProjects/cms/content/config/site.docker.prod.yaml)\n\nThe production compose shape is stricter:\n\n- explicit required secrets\n- read-only root filesystem\n- `tmpfs` for `/tmp`\n- `cap_drop: ALL`\n- `no-new-privileges`\n- named volumes for `content/`, `themes/`, `plugins/`, `data/`, and `public/`\n\nBefore using the production Docker overlay, set the real HTTPS origin in\n`content/config/site.docker.prod.yaml`.\n\n#### Managed Runtime Storage Layout\n\nWhen `foundry.managed.enabled` is true, Foundry expects a provider-neutral\nruntime layout that also works with a read-only container root filesystem.\nThe executable, built-in assets, and application code should be treated as\nimmutable. Mutable runtime state must live in writable mounts or volumes:\n\n- `content_dir`: customer-authored Markdown, media references, and content metadata\n- `data_dir`: admin/runtime state, managed bootstrap state, sessions, locks, indexes, and other local state\n- `themes_dir`: installed or customized themes\n- `plugins_dir`: installed plugins\n- `public_dir`: generated public output\n- `/tmp`: ephemeral scratch space, usually `tmpfs`\n\nFoundry does not prescribe the backing provider for these paths. A managed\noperator can map them to local volumes, network filesystems, object-backed\nsync jobs, or another storage system. The important invariant is that the\nconfigured paths are readable and writable by the Foundry process while the\ncontainer/application root remains read-only.\n\n`foundry doctor` and `GET /__health` both check the managed storage layout.\nThe checks report only logical names such as `storage.data` and generic\nfailure messages, not absolute filesystem paths or secret values.\n\n#### Source / local binary\n\nStart the local preview server from the project root:\n\n```bash\nfoundry serve\n```\n\nThen open `http://localhost:8080/`.\n\nIf you want Foundry to stay running after you close the terminal, use standalone mode:\n\n```bash\nfoundry serve-standalone\nfoundry status\nfoundry logs -f\nfoundry stop\nfoundry update check\nfoundry service install\nfoundry service status\nfoundry service restart\n```\n\nStandalone mode stores its runtime files under `.foundry/run/` in the project:\n\n- `standalone.json`\n- `standalone.log`\n\nTo produce static output:\n\n```bash\nfoundry build\n```\n\nGenerated files will be written to `public/`.\n\nFor preview-oriented output that includes non-published workflow states:\n\n```bash\nfoundry build --preview\n```\n\nThat also writes a preview manifest at `public/preview-links.json`.\n\n### Common commands\n\n```bash\nfoundry version\nfoundry build\nfoundry build --preview\nfoundry build --env preview --target production\nfoundry serve\nfoundry serve --debug\nfoundry serve-standalone\nfoundry serve-preview\nfoundry status\nfoundry restart\nfoundry stop\nfoundry logs -f\nfoundry service install\nfoundry service status\nfoundry service restart\nfoundry service uninstall\nfoundry release cut v1.3.3\nfoundry update check\nfoundry update apply\nfoundry plugin list --enabled\nfoundry theme list\nfoundry theme migrate field-contracts\nfoundry routes check\nfoundry admin hash-password your-password\n```\n\n### Typical local workflow\n\n1. Update `content/config/site.yaml`.\n2. Add pages and posts under `content/pages` and `content/posts`.\n3. Put media under the dedicated collection roots: `content/images`, `content/videos`, `content/audio`, and `content/documents`.\n4. Reference media from Markdown with the `media:` scheme.\n5. Run `foundry serve` during development.\n6. Run `foundry build` before publishing or checking generated output.\n\n### Standalone mode\n\nFor simple self-hosting or local development where you want Foundry to keep running in the background without Docker, use:\n\n```bash\nfoundry serve-standalone\n```\n\nThen manage it with:\n\n```bash\nfoundry status\nfoundry logs\nfoundry logs -f\nfoundry restart\nfoundry stop\nfoundry update check\nfoundry update apply\n```\n\nNotes:\n\n- standalone mode is designed for macOS and Linux\n- it writes state and logs under `.foundry/run/`\n- if you launch standalone from source with `go run`, Foundry first builds a managed binary under `.foundry/run/` and keeps that binary running instead of keeping `go run` alive after logout\n- it is a portable convenience runtime, not a replacement for Docker, `systemd`, or `launchd` in more serious production setups\n\n### Managed service mode\n\nFor a more durable self-hosted runtime that behaves more like `nginx`, install\nFoundry as a user-level OS service:\n\n```bash\nfoundry service install\nfoundry service status\nfoundry service restart\nfoundry service uninstall\n```\n\nBehavior by platform:\n\n- Linux: installs a user service under `~/.config/systemd/user/`\n- macOS: installs a LaunchAgent under `~/Library/LaunchAgents/`\n\nFoundry stores service metadata and logs under `.foundry/run/` in the project.\nIf Foundry was launched from source via `go run`, service installation first\nbuilds a managed binary under `.foundry/run/` and points the service at that\nbinary.\n\nOn Linux, user services may need lingering enabled to survive logout and reboot:\n\n```bash\nloginctl enable-linger \"$USER\"\n```\nEmbedded media uses normal Markdown image syntax:\n\n```md\n![Hero image](media:images/hero/banner.jpg)\n![Walkthrough video](media:videos/demo.mp4)\n```\n\nFile links use normal Markdown link syntax:\n\n```md\n[Download the spec](media:documents/spec-sheet.pdf)\n```\n\nAdmin uploads return stable references in the same format, for example:\n\n```text\nmedia:images/posts/launch/diagram.png\nmedia:videos/posts/launch/demo.mp4\nmedia:documents/posts/launch/spec-sheet.pdf\n```\n\nIf a page appears to hang during local preview, run `foundry serve --debug` to emit per-request timing plus runtime snapshots, including:\n\n- heap allocation and in-use heap\n- stack and total runtime memory\n- goroutine count\n- active request count\n- GC count\n- process user/system CPU time and request CPU percentage estimates\n\nIf live reload causes browser connection stalls in development, switch `server.live_reload_mode` from `stream` to `poll`. `stream` uses Server-Sent Events and refreshes immediately. `poll` trades a small delay for simpler connection behavior.\n\n## Deploy and operations\n\nFoundry supports environment-specific config overlays and named deploy targets.\n\nIf `content/config/site.preview.yaml` exists, it can be layered on top of the base config with:\n\n```bash\nfoundry build --env preview\n```\n\nNamed targets are configured under `deploy.targets` and applied with:\n\n```bash\nfoundry build --target production\nfoundry build --env staging --target edge\n```\n\nIf `deploy.default_target` is set, Foundry applies that target automatically when no explicit `--target` flag is provided.\n\n`foundry doctor` now reports timing breakdowns for:\n\n- plugin config hooks\n- content/data loading\n- route assignment\n- route hooks\n- asset sync\n- renderer\n- feed generation\n\n`foundry validate` now checks:\n\n- broken internal links\n- broken `media:` references\n- missing layout templates\n- orphaned media\n- duplicate URLs\n- duplicate type/lang slug combinations\n- taxonomy inconsistencies\n\nThe content command set also includes portability and migration helpers:\n\n```bash\nfoundry content export bundle.zip\nfoundry backup create\nfoundry backup list\nfoundry content import markdown ./legacy-markdown\nfoundry content import wordpress ./wordpress.xml\nfoundry content migrate layout page landing --dry-run\nfoundry content migrate field-rename marketing old_field new_field --dry-run\n```\n\n## Backups\n\nFoundry now has a dedicated backup flow for the content tree:\n\n```bash\nfoundry backup create\nfoundry backup create ./archives/manual-snapshot.zip\nfoundry backup list\nfoundry backup git-snapshot \"before launch\"\nfoundry backup git-log 10\n```\n\nBy default, managed backups are written under:\n\n```text\n.foundry/backups\n```\n\nBackups are zip archives of `content/` plus a small `backup-manifest.json`\nentry. Before writing the archive, Foundry checks free disk space on the target\nfilesystem and refuses to start the backup if there is not enough headroom.\n\nFoundry also supports local Git-backed snapshots as a second backup format:\n\n- the snapshot repo lives under `.foundry/backups/git`\n- each snapshot copies the current `content/` tree into that repo\n- Foundry commits only when there are actual content changes\n- this is a local history mechanism today, not a remote Git push integration yet\n\nYou can also enable debounced on-change backups in `content/config/site.yaml`:\n\n```yaml\nbackup:\n  enabled: true\n  dir: \".foundry/backups\"\n  on_change: true\n  debounce_seconds: 45\n  retention_count: 20\n  min_free_mb: 256\n  headroom_percent: 125\n```\n\nWhen `backup.on_change` is enabled, `foundry serve` and `foundry serve-preview`\nwill create a backup after the content tree goes quiet for the configured\ndebounce window. Foundry also prunes older backups beyond `retention_count`.\n\nThe admin Themes screen now also exposes manual zip backup creation, download,\nand restore actions for the same archive set.\n\n## Release updates\n\nFoundry includes a release-aware updater for managed standalone installs:\n\n```bash\nfoundry update check\nfoundry update apply\n```\n\nBehavior depends on install mode:\n\n- `standalone`: self-update supported\n- `docker`: update availability only, roll out a new image manually\n- `source`: update availability only, pull and rebuild manually\n- `binary`: update availability only unless you run it under `serve-standalone`\n\nSelf-update uses GitHub Releases metadata, compares the running version against\nthe latest release tag, downloads the matching release asset, verifies a\npublished `.sha256` asset when available, replaces the binary, and restarts the\nstandalone runtime.\n\nThis repository also includes a GitHub Actions release workflow at\n`.github/workflows/release.yml`. Pushing a `v*.*.*` tag now generates and uploads:\n\n- `foundry-linux-amd64.tar.gz`\n- `foundry-linux-arm64.tar.gz`\n- `foundry-darwin-amd64.tar.gz`\n- `foundry-darwin-arm64.tar.gz`\n- `foundry-windows-amd64.tar.gz`\n- matching `.sha256` files for each archive\n\nThe admin Themes screen also shows current version, latest release version,\ninstall mode, and whether self-update is supported.\n\n## Cutting a release\n\nTo cut a release tag locally:\n\n```bash\nfoundry release cut v1.3.3\n```\n\nTo cut and push the tag in one step:\n\n```bash\nfoundry release cut v1.3.3 --push\n```\n\nYou can also use the repo-local wrapper:\n\n```bash\nscripts/release.sh v1.3.3 --push\n```\n\nRelease cutting rules:\n\n- run it from the repository root\n- the worktree must be clean\n- versions must be in `vX.Y.Z` format\n\nWhen the tag is pushed, `.github/workflows/release.yml` builds and uploads the\n`foundry-*.tar.gz` archives and matching `.sha256` files to GitHub Releases.\n\n## Content model\n\nFoundry currently supports two primary document types:\n\n- `page`\n- `post`\n\nContent is loaded from:\n\n- `content/pages`\n- `content/posts`\n- `content/images`\n- `content/videos`\n- `content/audio`\n- `content/documents`\n\nLanguage variants are represented by a leading language directory. For example:\n\n```text\ncontent/pages/about.md\ncontent/pages/fr/about.md\ncontent/posts/launch.md\ncontent/posts/fr/launch.md\n```\n\nMarkdown files use frontmatter for metadata such as:\n\n- `title`\n- `slug`\n- `layout`\n- `draft`\n- `summary`\n- `date`\n- `updated_at`\n- `tags`\n- `categories`\n- custom `taxonomies`\n- `fields`\n- arbitrary `params`\n\n### Multimedia\n\nFoundry supports images, video, audo, and downloadable files through the `media:` reference scheme.\n\n- `media:images/...` resolves to `/images/...`\n- `media:uploads/...` resolves to `/uploads/...`\n- `media:assets/...` resolves to `/assets/...`\n\nThe renderer infers the output element from the target file extension:\n\n- image files render as `<img>`\n- video files render as `<video controls>`\n- audio files render as `<audio controls>`\n- other files remain standard links\n\n## Configuration\n\nThe main config file is typically:\n\n```text\ncontent/config/site.yaml\n```\n\nThe admin `Settings` area edits this same file through structured forms and an\n`Advanced YAML` tab. Foundry keeps YAML as the storage format on disk, but the\nadmin works with a structured config object so common settings can be edited as\nforms and then written back safely to `site.yaml`.\n\nImportant config groups:\n\n- `admin`: admin service settings\n- `server`: preview server settings\n- `content`: content directory conventions and default layouts\n- `taxonomies`: taxonomy definitions and archive layouts\n- `plugins`: enabled plugins\n- `security`: security-sensitive rendering settings\n- `feed`: RSS and sitemap output paths\n\n### Advanced custom fields\n\nFoundry handles advanced custom fields through theme-owned contracts, not through `content/config/site.yaml`.\n\nCanonical guide:\n\n- GitHub Pages: [Advanced Custom Fields](https://sphireinc.github.io/foundry/custom-fields/)\n\n- Themes declare supported fields in `theme.yaml` under `field_contracts`\n- Page-specific field values stay in page frontmatter under `fields:`\n- Shared/global field values live in `content/custom-fields.yaml`\n- The admin editor resolves the current page's available fields from the active theme\n- The admin `Custom Fields` section edits shared/global field groups declared by the active theme\n- `fields:` is for persisted schema-backed content only; plugins must not write derived render\n  metadata into document fields\n- Plugin-derived values such as TOC data should be exposed at rende
