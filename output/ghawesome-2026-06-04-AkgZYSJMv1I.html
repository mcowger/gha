ge` - Prompt to use in API\n- `api_model` - str, default: `gpt-4-vision-preview` - Model to use in API\n- `api_tokens` - int, default: `1000` - Max output tokens in API\n\n**IPYNB Notebook files**  (file_ipynb)\n\n- `parser_config` - dict, default: `None`\n- `concatenate` - bool, default: `False`\n\n**Markdown files**  (file_md)\n\n- `remove_hyperlinks` - bool, default: `True`\n- `remove_images` - bool, default: `True`\n\n**PDF documents**  (file_pdf)\n\n- `return_full_document` - bool, default: `False`\n\n**Video/Audio**  (file_video_audio)\n\nThis loader can operate in two modes: local model and API.\nIf the local mode is enabled, then the local `Whisper` model will be used. The local mode requires a Python/PyPi version of the application and is not available in the compiled or Snap versions.\nIf the API mode (default) is selected, then the currently selected provider in `Audio Input` plugin will be used. If the `OpenAI Whisper` is chosen then the OpenAI API and the API Whisper model will be used. \n\n**Note:** Usage of Whisper via API consumes additional tokens in OpenAI API (for `Whisper` model)!\n\nLocal mode requires `torch` and `openai-whisper` to be installed and uses the `Whisper` model locally to transcribing video and audio.\n\n- `model_version` - str, default: `base` - Whisper model to use, available models: https://github.com/openai/whisper\n\n**XML files**  (file_xml)\n\n- `tree_level_split` - int, default: `0`\n\nAllowed additional keyword arguments for built-in data loaders (Web and external content):\n\n**Bitbucket**  (web_bitbucket)\n\n- `username` - str, default: `None`\n- `api_key` - str, default: `None`\n- `extensions_to_skip` - list, default: `[]`\n\n**ChatGPT Retrieval**  (web_chatgpt_retrieval)\n\n- `endpoint_url` - str, default: `None`\n- `bearer_token` - str, default: `None`\n- `retries` - int, default: `None`\n- `batch_size` - int, default: `100`\n\n**Google Calendar** (web_google_calendar)\n\n- `credentials_path` - str, default: `credentials.json`\n- `token_path` - str, default: `token.json`\n\n**Google Docs** (web_google_docs)\n\n- `credentials_path` - str, default: `credentials.json`\n- `token_path` - str, default: `token.json`\n\n**Google Drive** (web_google_drive)\n\n- `credentials_path` - str, default: `credentials.json`\n- `token_path` - str, default: `token.json`\n- `pydrive_creds_path` - str, default: `creds.txt`\n- `client_config` - dict, default: `{}`\n\n**Google Gmail** (web_google_gmail)\n\n- `credentials_path` - str, default: `credentials.json`\n- `token_path` - str, default: `token.json`\n- `use_iterative_parser` - bool, default: `False`\n- `max_results` - int, default: `10`\n- `results_per_page` - int, default: `None`\n\n**Google Keep** (web_google_keep)\n\n- `credentials_path` - str, default: `keep_credentials.json`\n\n**Google Sheets** (web_google_sheets)\n\n- `credentials_path` - str, default: `credentials.json`\n- `token_path` - str, default: `token.json`\n\n**GitHub Issues**  (web_github_issues)\n\n- `token` - str, default: `None`\n- `verbose` - bool, default: `False`\n\n**GitHub Repository**  (web_github_repository)\n\n- `token` - str, default: `None`\n- `verbose` - bool, default: `False`\n- `concurrent_requests` - int, default: `5`\n- `timeout` - int, default: `5`\n- `retries` - int, default: `0`\n- `filter_dirs_include` - list, default: `None`\n- `filter_dirs_exclude` - list, default: `None`\n- `filter_file_ext_include` - list, default: `None`\n- `filter_file_ext_exclude` - list, default: `None`\n\n**Microsoft OneDrive**  (web_microsoft_onedrive)\n\n- `client_id` - str, default: `None`\n- `client_secret` - str, default: `None`\n- `tenant_id` - str, default: `consumers`\n\n**Sitemap (XML)**  (web_sitemap)\n\n- `html_to_text` - bool, default: `False`\n- `limit` - int, default: `10`\n\n**SQL Database**  (web_database)\n\n- `uri` - str, default: `None`\n\nYou can provide a single URI in the form of: `{scheme}://{user}:{password}@{host}:{port}/{dbname}`, or you can provide each field manually:\n\n- `scheme` - str, default: `None`\n- `host` - str, default: `None`\n- `port` - str, default: `None`\n- `user` - str, default: `None`\n- `password` - str, default: `None`\n- `dbname` - str, default: `None`\n\n**Twitter/X posts**  (web_twitter)\n\n- `bearer_token` - str, default: `None`\n- `num_tweets` - int, default: `100`\n\n## Vector stores\n\n**Available vector stores** (provided by `LlamaIndex`):\n\n```\n- ChromaVectorStore\n- ElasticsearchStore\n- PinecodeVectorStore\n- QdrantVectorStore\n- RedisVectorStore\n- SimpleVectorStore\n```\n\nYou can configure selected vector store by providing config options like `api_key`, etc. in `Settings -> LlamaIndex` window. \n\nArguments provided here (on list: `Vector Store (**kwargs)` in `Advanced settings` will be passed to selected vector store provider. You can check keyword arguments needed by selected provider on LlamaIndex API reference page: \n\nhttps://docs.llamaindex.ai/en/stable/api_reference/storage/vector_store.html\n\nWhich keyword arguments are passed to providers?\n\nFor `ChromaVectorStore` and `SimpleVectorStore` all arguments are set by PyGPT and passed internally (you do not need to configure anything).\n\nFor other providers you can provide these arguments:\n\n**ElasticsearchStore**\n\nKeyword arguments for ElasticsearchStore(`**kwargs`):\n\n- `index_name` (default: current index ID, already set, not required)\n- any other keyword arguments provided on list\n\n**PinecodeVectorStore**\n\nKeyword arguments for Pinecone(`**kwargs`):\n\n- `api_key`\n- index_name (default: current index ID, already set, not required)\n\n**QdrantVectorStore**\n\nKeyword arguments for QdrantVectorStore(`**kwargs`):\n\n- `url` - str, default: `http://localhost:6333`\n- `api_key` - str, default: `None` (for Qdrant Cloud)\n- `collection_name` (default: current index ID, already set, not required)\n- any other keyword arguments provided on list\n\n**RedisVectorStore**\n\nKeyword arguments for RedisVectorStore(`**kwargs`):\n\n- `index_name` (default: current index ID, already set, not required)\n- any other keyword arguments provided on list\n\nYou can extend list of available providers by creating custom provider and registering it on app launch.\n\nBy default, you are using chat-based mode when using `Chat with Files`.\nIf you want to only query index (without chat) you can enable `Query index only (without chat)` option.\n\n### Adding custom vector stores and data loaders\n\nYou can create a custom vector store provider or data loader for your data and develop a custom launcher for the application. \n\nSee the section `Extending PyGPT / Adding a custom Vector Store provider` for more details.\n\n# Updates\n\n### Updating PyGPT\n\n**PyGPT** comes with an integrated update notification system. When a new version with additional features is released, you'll receive an alert within the app. \n\nTo get the new version, simply download it and start using it in place of the old one. All your custom settings like configuration, presets, indexes, and past conversations will be kept and ready to use right away in the new version.\n\n# Debugging and Logging\n\nIn `Settings -> Developer` dialog, you can enable the `Show debug menu` option to turn on the debugging menu. The menu allows you to inspect the status of application elements. In the debugging menu, there is a `Logger` option that opens a log window. In the window, the program's operation is displayed in real-time.\n\n**Logging levels**:\n\nBy default, all errors and exceptions are logged to the file:\n\n```ini\n{HOME_DIR}/.config/pygpt-net/app.log\n```\n\nTo increase the logging level (`ERROR` level is default), run the application with `--debug` argument:\n\n``` ini\npython3 run.py --debug=1\n```\n\nor\n\n```ini\npython3 run.py --debug=2\n```\n\nThe value `1` enables the `INFO`logging level.\n\nThe value `2` enables the `DEBUG` logging level (most information).\n\n**Compatibility (legacy) mode**\n\nIf you have a problems with `WebEngine / Chromium` renderer you can force the legacy mode by launching the app with command line arguments:\n\n``` ini\npython3 run.py --legacy=1\n```\n\nand to force disable OpenGL hardware acceleration:\n\n``` ini\npython3 run.py --disable-gpu=1\n```\n\nYou can also manualy enable legacy mode by editing config file - open the `%WORKDIR%/config.json` config file in editor and set the following options:\n\n``` json\n\"render.engine\": \"legacy\",\n\"render.open_gl\": false,\n```\n\n# Extending PyGPT\n\n## Quick start\n\nYou can create your own extensions for **PyGPT** at any time.\n\nPyGPT can be extended with:\n\n- custom models\n\n- custom plugins\n\n- custom LLM wrappers\n\n- custom vector store providers\n\n- custom data loaders\n\n- custom audio input providers\n\n- custom audio output providers\n\n- custom web search engine providers\n\n- custom agents (LlamaIndex or OpenAI Agents)\n\n**Examples (tutorial files)** \n\nSee the `examples` directory in this repository with examples of custom launcher, plugin, vector store, LLM (LlamaIndex) provider and data loader:\n\n- `examples/custom_launcher.py`\n\n- `examples/example_audio_input.py`\n\n- `examples/example_audio_output.py`\n\n- `examples/example_data_loader.py`\n\n- `examples/example_llm.py`\n\n- `examples/example_plugin.py`\n\n- `examples/example_vector_store.py`\n\n- `examples/example_web_search.py`\n\nThese example files can be used as a starting point for creating your own extensions for **PyGPT**.\n\nExtending PyGPT with custom plugins, LLMs wrappers and vector stores:\n\n- You can pass custom plugin instances, LLMs wrappers and vector store providers to the launcher.\n\n- This is useful if you want to extend PyGPT with your own plugins, vectors storage and LLMs.\n\nTo register custom plugins:\n\n- Pass a list with the plugin instances as `plugins` keyword argument.\n\nTo register custom LLMs wrappers:\n\n- Pass a list with the LLMs wrappers instances as `llms` keyword argument.\n\nTo register custom vector store providers:\n\n- Pass a list with the vector store provider instances as `vector_stores` keyword argument.\n\nTo register custom data loaders:\n\n- Pass a list with the data loader instances as `loaders` keyword argument.\n\nTo register custom audio input providers:\n\n- Pass a list with the audio input provider instances as `audio_input` keyword argument.\n\nTo register custom audio output providers:\n\n- Pass a list with the audio output provider instances as `audio_output` keyword argument.\n\nTo register custom web providers:\n\n- Pass a list with the web provider instances as `web` keyword argument.\n\n## Adding a custom model\n\nTo add a new model using the OpenAI API or LlamaIndex wrapper, use the editor in `Config -> Models` or manually edit the `models.json` file by inserting the model's configuration details. If you are adding a model via LlamaIndex, ensure to include the model's name, its supported modes (either `chat`, `completion`, or both), the LLM provider (such as `OpenAI` or `HuggingFace`), and, if you are using an external API-based model, an optional `API KEY` along with any other necessary environment settings.\n\nExample of models configuration - `%WORKDIR%/models.json`:\n\n```\n\"gpt-3.5-turbo\": {\n    \"id\": \"gpt-3.5-turbo\",\n    \"name\": \"gpt-3.5-turbo\",\n    \"mode\": [\n        \"chat\",\n        \"assistant\",\n        \"langchain\",\n        \"llama_index\"\n    ],\n    \"provider\": \"openai\"\n    \"llama_index\": {\n        \"args\": [\n            {\n                \"name\": \"model\",\n                \"value\": \"gpt-3.5-turbo\",\n                \"type\": \"str\"\n            }\n        ],\n        \"env\": [\n            {\n                \"name\": \"OPENAI_API_KEY\",\n                \"value\": \"{api_key}\"\n            }\n        ]\n    },\n    \"ctx\": 4096,\n    \"tokens\": 4096,\n    \"default\": false\n},\n```\n\nThere is built-in support for those LLM providers:\n\n- Anthropic\n- Azure OpenAI\n- Deepseek API\n- Google\n- HuggingFace\n- Local models (OpenAI API compatible)\n- Ollama\n- OpenAI\n- OpenRouter\n- Perplexity\n- xAI\n\n**Tip**: `{api_key}` in `models.json` is a placeholder for the main OpenAI API KEY from the settings. It will be replaced by the configured key value.\n\n## Adding a custom plugin\n\n### Creating Your Own Plugin\n\nYou can create your own plugin for **PyGPT**. The plugin can be written in Python and then registered with the application just before launching it. All plugins included with the app are stored in the `plugin` directory - you can use them as coding examples for your own plugins.\n\n**Examples (tutorial files)** \n\nSee the example plugin in this `examples` directory:\n\n- `examples/example_plugin.py`\n\nThese example file can be used as a starting point for creating your own plugin for **PyGPT**.\n\nTo register a custom plugin:\n\n- Create a custom launcher for the app.\n\n- Pass a list with the custom plugin instances as `plugins` keyword argument.\n\n**Example of a custom launcher:**\n\n\n```python\n# custom_launcher.py\n\nfrom pygpt_net.app import run\nfrom plugins import CustomPlugin, OtherCustomPlugin\nfrom llms import CustomLLM\nfrom vector_stores import CustomVectorStore\n\nplugins = [\n    CustomPlugin(),\n    OtherCustomPlugin(),\n]\nllms = [\n    CustomLLM(),\n]\nvector_stores = [\n    CustomVectorStore(),\n]\n\nrun(\n    plugins=plugins,\n    llms=llms,\n    vector_stores=vector_stores,\n)\n```\n\n### Handling events\n\nIn the plugin, you can receive and modify dispatched events.\nTo do this, create a method named `handle(self, event, *args, **kwargs)` and handle the received events like here:\n\n```python\n# custom_plugin.py\n\nfrom pygpt_net.core.events import Event\n\n\ndef handle(self, event: Event, *args, **kwargs):\n    \"\"\"\n    Handle dispatched events\n\n    :param event: event object\n    \"\"\"\n    name = event.name\n    data = event.data\n    ctx = event.ctx\n\n    if name == Event.INPUT_BEFORE:\n        self.some_method(data['value'])\n    elif name == Event.CTX_BEGIN:\n        self.some_other_method(ctx)\n    else:\n    \t# ...\n```\n\n### List of Events\n\nEvent names are defined in `Event` class in `pygpt_net.core.events`.\n\nSyntax: `event name` - triggered on, `event data` *(data type)*:\n\n- `AI_NAME` - when preparing an AI name, `data['value']` *(string, name of the AI assistant)*\n\n- `AGENT_PROMPT` - on agent prompt in eval mode, `data['value']` *(string, prompt)*\n\n- `AUDIO_INPUT_RECORD_START` - start audio input recording\n\n- `AUDIO_INPUT_RECORD_STOP` -  stop audio input recording\n\n- `AUDIO_INPUT_RECORD_TOGGLE` - toggle audio input recording\n\n- `AUDIO_INPUT_TRANSCRIBE` - on audio file transcribe, `data['path']` *(string, path to audio file)*\n\n- `AUDIO_INPUT_STOP` - force stop audio input\n\n- `AUDIO_INPUT_TOGGLE` - when speech input is enabled or disabled, `data['value']` *(bool, True/False)*\n\n- `AUDIO_OUTPUT_STOP` - force stop audio output\n\n- `AUDIO_OUTPUT_TOGGLE` - when speech output is enabled or disabled, `data['value']` *(bool, True/False)*\n\n- `AUDIO_READ_TEXT` - on text read using speech synthesis, `data['text']` *(str, text to read)*\n\n- `CMD_EXECUTE` - when a command is executed, `data['commands']` *(list, commands and arguments)*\n\n- `CMD_INLINE` - when an inline command is executed, `data['commands']` *(list, commands and arguments)*\n\n- `CMD_SYNTAX` - when appending syntax for commands, `data['prompt'], data['syntax']` *(string, list, prompt and list with commands usage syntax)*\n\n- `CMD_SYNTAX_INLINE` - when appending syntax for commands (inline mode), `data['prompt'], data['syntax']` *(string, list, prompt and list with commands usage syntax)*\n\n- `CTX_AFTER` - after the context item is sent, `ctx`\n\n- `CTX_BEFORE` - before the context item is sent, `ctx`\n\n- `CTX_BEGIN` - when context item create, `ctx`\n\n- `CTX_END` - when context item handling is finished, `ctx`\n\n- `CTX_SELECT` - when context is selected on list, `data['value']` *(int, ctx meta ID)*\n\n- `DISABLE` - when the plugin is disabled, `data['value']` *(string, plugin ID)*\n\n- `ENABLE` - when the plugin is enabled, `data['value']` *(string, plugin ID)*\n\n- `FORCE_STOP` - on force stop plugins\n\n- `INPUT_BEFORE` - upon receiving input from the textarea, `data['value']` *(string, text to be sent)*\n\n- `MODE_BEFORE` - before the mode is selected `data['value'], data['prompt']` *(string, string, mode ID)*\n\n- `MODE_SELECT` - on mode select `data['value']` *(string, mode ID)*\n\n- `MODEL_BEFORE` - before the model is selected `data['value']` *(string, model ID)*\n\n- `MODEL_SELECT` - on model select `data['value']` *(string, model ID)*\n\n- `PLUGIN_SETTINGS_CHANGED` - on plugin settings update (saving settings)\n\n- `PLUGIN_OPTION_GET` - on request for plugin option value `data['name'], data['value']` *(string, any, name of requested option, value)*\n\n- `POST_PROMPT` - after preparing a system prompt, `data['value']` *(string, system prompt)*\n\n- `POST_PROMPT_ASYNC` - after preparing a system prompt, just before request in async thread, `data['value']` *(string, system prompt)*\n\n- `POST_PROMPT_END` - after preparing a system prompt, just before request in async thread, at the very end `data['value']` *(string, system prompt)*\n\n- `PRE_PROMPT` - before preparing a system prompt, `data['value']` *(string, system prompt)*\n\n- `SYSTEM_PROMPT` - when preparing a system prompt, `data['value']` *(string, system prompt)*\n\n- `TOOL_OUTPUT_RENDER` - when rendering extra content from tools from plugins, `data['content']` *(string, content)*\n\n- `UI_ATTACHMENTS` - when the attachment upload elements are rendered, `data['value']` *(bool, show True/False)*\n\n- `UI_VISION` - when the vision elements are rendered, `data['value']` *(bool, show True/False)*\n\n- `USER_NAME` - when preparing a user's name, `data['value']` *(string, name of the user)*\n\n- `USER_SEND` - just before the input text is sent, `data['value']` *(string, input text)*\n\n\nYou can stop the propagation of a received event at any time by setting `stop` to `True`:\n\n```\nevent.stop = True\n```\n\nEvents flow can be debugged by enabling the option `Config -> Settings -> Developer -> Log and debug events`.\n\n## Adding a custom LLM provider\n\nHandling LLMs with LlamaIndex is implemented through separated wrappers. This allows for the addition of support for any provider and model available via LlamaIndex. All built-in wrappers for the models and its providers are placed in the `pygpt_net.provider.llms`.\n\nThese wrappers are loaded into the application during startup using `launcher.add_llm()` method:\n\n```python\n# app.py\n\nfrom pygpt_net.provider.api.openai import OpenAILLM\nfrom pygpt_net.provider.llms.azure_openai import AzureOpenAILLM\nfrom pygpt_net.provider.llms.anthropic import AnthropicLLM\nfrom pygpt_net.provider.llms.hugging_face import HuggingFaceLLM\nfrom pygpt_net.provider.llms.ollama import OllamaLLM\nfrom pygpt_net.provider.llms.google import GoogleLLM\n\n\ndef run(**kwargs):\n    \"\"\"Runs the app.\"\"\"\n    # Initialize the app\n    launcher = Launcher()\n    launcher.init()\n\n    # Register plugins\n    ...\n\n    # Register langchain and llama-index LLMs wrappers\n    launcher.add_llm(OpenAILLM())\n    launcher.add_llm(AzureOpenAILLM())\n    launcher.add_llm(AnthropicLLM())\n    launcher.add_llm(HuggingFaceLLM())\n    launcher.add_llm(OllamaLLM())\n    launcher.add_llm(GoogleLLM())\n\n    # Launch the app\n    launcher.run()\n```\n\nTo add support for providers not included by default, you can create your own wrapper that returns a custom model to the application and then pass this custom wrapper to the launcher.\n\nExtending **PyGPT** with custom plugins and LLM wrappers is straightforward:\n\n- Pass instances of custom plugins and LLM wrappers directly to the launcher.\n\nTo register custom LLM wrappers:\n\n- Provide a list of LLM wrapper instances as `llms` keyword argument.\n\n**Example:**\n\n\n```python\n# launcher.py\n\nfrom pygpt_net.app import run\nfrom plugins import CustomPlugin, OtherCustomPlugin\nfrom llms import CustomLLM\n\nplugins = [\n    CustomPlugin(),\n    OtherCustomPlugin(),\n]\nllms = [\n    CustomLLM(),  # <--- custom LLM provider (wrapper)\n]\nvector_stores = []\n\nrun(\n    plugins=plugins, \n    llms=llms, \n    vector_stores=vector_stores,\n)\n```\n\n**Examples (tutorial files)** \n\nSee the `examples` directory in this repository with examples of custom launcher, plugin, vector store, LLM provider and data loader:\n\n- `examples/custom_launcher.py`\n\n- `examples/example_audio_input.py`\n\n- `examples/example_audio_output.py`\n\n- `examples/example_data_loader.py`\n\n- `examples/example_llm.py`  <-- use it as an example\n\n- `examples/example_plugin.py`\n\n- `examples/example_vector_store.py`\n\n- `examples/example_web_search.py`\n\nThese example files can be used as a starting point for creating your own extensions for **PyGPT**.\n\nTo integrate your own model or provider into **PyGPT**, you can also reference the classes located in the `pygpt_net.provider.llms`. These samples can act as an more complex example for your custom class. Ensure that your custom wrapper class includes two essential methods: `chat` and `completion`. These methods should return the respective objects required for the model to operate in `chat` and `completion` modes.\n\nEvery single LLM provider (wrapper) inherits from `BaseLLM` class and can provide 2 components: provider for LlamaIndex, and provider for Embeddings.\n\n\n## Adding a custom vector store provider\n\nYou can create a custom vector store provider or data loader for your data and develop a custom launcher for the application. To register your custom vector store provider or data loader, simply register it by passing the vector store provider instance to `vector_stores` keyword argument and loader instance in the `loaders` keyword argument:\n\n\n```python\n# app.py\n\n# vector stores\nfrom pygpt_net.provider.vector_stores.chroma import ChromaProvider\nfrom pygpt_net.provider.vector_stores.elasticsearch import ElasticsearchProvider\nfrom pygpt_net.provider.vector_stores.pinecode import PinecodeProvider\nfrom pygpt_net.provider.vector_stores.qdrant import QdrantProvider\nfrom pygpt_net.provider.vector_stores.redis import RedisProvider\nfrom pygpt_net.provider.vector_stores.simple import SimpleProvider\n\ndef run(**kwargs):\n    # ...\n    # register base vector store providers (llama-index)\n    launcher.add_vector_store(ChromaProvider())\n    launcher.add_vector_store(ElasticsearchProvider())\n    launcher.add_vector_store(PinecodeProvider())\n    launcher.add_vector_store(QdrantProvider())\n    launcher.add_vector_store(RedisProvider())\n    launcher.add_vector_store(SimpleProvider())\n\n    # register custom vector store providers (llama-index)\n    vector_stores = kwargs.get('vector_stores', None)\n    if isinstance(vector_stores, list):\n        for store in vector_stores:\n            launcher.add_vector_store(store)\n\n    # ...\n```\n\nTo register your custom vector store provider just register it by passing provider instance in `vector_stores` keyword argument:\n\n```python\n\n# custom_launcher.py\n\nfrom pygpt_net.app import run\nfrom plugins import CustomPlugin, OtherCustomPlugin\nfrom llms import CustomLLM\nfrom vector_stores import CustomVectorStore\n\nplugins = [\n    CustomPlugin(),\n    OtherCustomPlugin(),\n]\nllms = [\n    CustomLLM(),\n]\nvector_stores = [\n    CustomVectorStore(),  # <--- custom vector store provider\n]\n\nrun(\n    plugins=plugins,\n    llms=llms,\n    vector_stores=vector_stores,\n)\n```\n\nThe vector store provider must be an instance of `pygpt_net.provider.vector_stores.base.BaseStore`. \nYou can review the code of the built-in providers in `pygpt_net.provider.vector_stores` and use them as examples when creating a custom provider.\n\n### Adding a custom data loader\n\n\n```python\n\n# custom_launcher.py\n\nfrom pygpt_net.app import run\nfrom plugins import CustomPlugin, OtherCustomPlugin\nfrom llms import CustomLLM\nfrom vector_stores import CustomVectorStore\nfrom loaders import CustomLoader\n\nplugins = [\n    CustomPlugin(),\n    OtherCustomPlugin(),\n]\nllms = [\n    CustomLLM(),\n]\nvector_stores = [\n    CustomVectorStore(),\n]\nloaders = [\n    CustomLoader(),  # <---- custom data loader\n]\n\nrun(\n    plugins=plugins,\n    llms=llms,\n    vector_stores=vector_stores,  # <--- list with custom vector store providers\n    loaders=loaders  # <--- list with custom data loaders\n)\n```\n\nThe data loader must be an instance of `pygpt_net.provider.loaders.base.BaseLoader`. \nYou can review the code of the built-in loaders in `pygpt_net.provider.loaders` and use them as examples when creating a custom loader.\n\n\n# DISCLAIMER\n\nThis application is not officially associated with OpenAI. The author shall not be held liable for any damages \nresulting from the use of this application. It is provided \"as is,\" without any form of warranty. \nUsers are reminded to be mindful of token usage - always verify the number of tokens utilized by the model on \nthe API website and engage with the application responsibly. Activating plugins, such as Web Search,\nmay consume additional tokens that are not displayed in the main window. \n\n**Always monitor your actual token usage on the OpenAI, Google, Anthropic, xAI, etc. websites.**\n\n---\n\n# CHANGELOG\n\n## Recent changes:\n\n**2.7.12 (2026-02-06)**\n\n- xAI SDK upgraded to v1.6.1.\n- Added video generation support in xAI provider.\n- Added new models: grok-imagine-image and grok-imagine-video.\n- UI improvements and smoother navigation between tabs and columns.  \n- Optimized adding attachments. Added options to attach an attachment only once (if the API stores messages on its side), and an option to force attaching an attachment only once.  \n- Updated libraries.\n\n**2.7.11 (2026-02-05)**\n\n- Improved handling focus between columns.\n- Fixed models debugger update.\n\n**2.7.10 (2026-02-03)**\n\n- Fixed an issue where an avatar could be overwritten when creating a new preset.  \n- Fixed an issue where a new context was not created when opening a new tab in the second column.  \n- Added prompt history navigation to the input field (Ctrl + Up/Down arrow keys).  \n- Added initial image centering when loading the Image Viewer.  \n- Added a Mark/Unmark feature to the Notepad widget.  \n- Added 18 new languages: Arabic (ar), Bulgarian (bg), Czech (cs), Danish (da), Finnish (fi), Hebrew (he), Hindi (hi), Hungarian (hu), Japanese (ja), Korean (ko), Dutch (nl), Norwegian (no), Portuguese (pt), Romanian (ro), Russian (ru), Slovak (sk), Swedish (sv), Turkish (tr).\n\n**2.7.9 (2026-01-08)**\n\n- Improved realtime audio mode.\n- Added xAI provider and Grok support in realtime audio mode.\n\n**2.7.8 (2026-01-06)**\n\n- Added the xAI Collections remote tool and integrated collections management into the Remote Vector Stores tool.\n- Unified the Remote Vector Stores tool into a single tool for all providers.\n- Added xAI Grok audio input and output provider (realtime audio support for Grok coming soon!).\n- Enhanced the Image Viewer tool with a toolbox featuring Prev/Next and more options.\n\n**2.7.7 (2026-01-05)**\n\n- Added support for Responses API in xAI.\n- Added xAI remote tools: Remote MCP, Code Execution.\n- Added Anthropic remote tools: Remote MCP, Web Fetch, Code Execution.\n\n**2.7.6 (2026-01-03)**\n\n- Fixed compatibility with xAI SDK and resolved empty responses from Grok models.\n- Fixed missing libraries in the Snap package.\n- Added zoom and grab functionality in the Image Viewer.\n- Added a zoom menu to textarea and web widgets.\n- Added the ability to close tabs with a middle mouse button click.\n\n# Credits and links\n\n**Official website:** <https://pygpt.net>\n\n**Documentation:** <https://pygpt.readthedocs.io>\n\n**Support and donate:** <https://pygpt.net/#donate>\n\n**GitHub:** <https://github.com/szczyglis-dev/py-gpt>\n\n**Discord:** <https://pygpt.net/discord>\n\n**Snap Store:** <https://snapcraft.io/pygpt>\n\n**Microsoft Store:** <https://apps.microsoft.com/detail/XP99R4MX3X65VQ>\n\n**PyPI:** <https://pypi.org/project/pygpt-net>\n\n**Author:** Marcin Szczygliński (Poland, EU)\n\n**Contact:** <info@pygpt.net>\n\n**License:** MIT License\n\n# Special thanks\n\nGitHub's community:\n\n- [@BillionShields](https://github.com/BillionShields)\n\n- [@gfsysa](https://github.com/gfsysa)\n\n- [@glinkot](https://github.com/glinkot)\n\n- [@kaneda2004](https://github.com/kaneda2004)\n\n- [@KingOfTheCastle](https://github.com/KingOfTheCastle)\n\n- [@linnflux](https://github.com/linnflux)\n\n- [@lukasz-pekala](https://github.com/lukasz-pekala)\n\n- [@moritz-t-w](https://github.com/moritz-t-w)\n\n- [@oleksii-honchar](https://github.com/oleksii-honchar)\n\n- [@yf007](https://github.com/yf007)\n\n## Third-party libraries\n\nFull list of external libraries used in this project is located in the [requirements.txt](https://github.com/szczyglis-dev/py-gpt/blob/master/requirements.txt) file in the main folder of the repository.\n\nAll used SVG icons are from `Material Design Icons` provided by Google:\n\nhttps://github.com/google/material-design-icons\n\nhttps://fonts.google.com/icons\n\nMonaspace fonts provided by GitHub: https://github.com/githubnext/monaspace\n\nCode of the LlamaIndex offline loaders integrated into app is taken from LlamaHub: https://llamahub.ai\n\nAwesome ChatGPT Prompts (used in templates): https://github.com/f/awesome-chatgpt-prompts/\n\nCode syntax highlight powered by: https://highlightjs.org\n\nMarkdown parsing powered by: https://github.com/markdown-it/markdown-it\n\nLaTeX support by: https://katex.org\n\nPlaywright: https://playwright.dev/\n","summary":"PyGPT is a comprehensive desktop AI assistant that provides a unified interface for interacting with a wide range of language models, including OpenAI’s GPT series, Anthropic’s Claude, Google Gemini, and locally hosted models via Ollama. It features robust capabilities such as image generation, speech-to-text, autonomous agent execution, and direct file system interaction, all extensible through a flexible plugin architecture. This tool is ideal for power users, developers, and researchers who require an all-in-one, privacy-conscious environment to manage complex workflows, automate system tasks, and integrate various AI services on Linux, Windows, or macOS.","description":"Desktop AI Assistant powered by GPT-5, GPT-4, o1, o3, Gemini, Claude, Ollama, DeepSeek, Perplexity, Grok, Bielik, chat, vision, voice, RAG, image and video generation, agents, tools, MCP, plugins, speech synthesis and recognition, web search, memory, presets, assistants,and more. Linux, Windows, Mac","stars":1811,"language":"Python"},{"owner":"raidendotai","repo":"cofounder","url":"https://github.com/raidendotai/cofounder","readme":"\n![cofounder-og-black](https://github.com/user-attachments/assets/b4e51f02-59e4-4540-ac14-e1f40e20a658)\n\n# Cofounder | Early alpha release\n\n* project - [cofounder.openinterface.ai](https://cofounder.openinterface.ai)\n* 👋 [@n_raidenai](https://x.com/n_raidenai)\n\n**cofounder**\n- full stack generative web apps ; backend + db + stateful web apps\n- gen ui rooted in app architecture, with ai-guided mockup designer & modular design systems\n\n---\n\n# Early Alpha : Unstable ⚠️\n\nThe following points are very emphasized :\n\n- This is an **EARLY, UNSTABLE, PREVIEW RELEASE** of the project. ⚠️ Until v1 is released, it is expected to break often. \n- **It consumes a lot of tokens**. If you are on a tokens budget, wait until v1 is released.\n- Again, this is an early, unstable release. A first test run. An early preview of the project's ideas. Far from completion. Open-source iterative development. Work in progress. Unstable early alpha release. [etc]\n\n### **If any of these might be issues for you, even in the slightest way, wait until v1 is released ! Do not try the current release !**\n\nTo help you guide your decision on whether or not to try the current release , here is a guide\n\n| Situation                                                                                             | Recommendation         |\n|------------------------------------------------------------------------------------------------------|------------------------|\n| I'm not sure if this tool release is mature yet, maybe it will not work as intended and I may spend millions of tokens for nothing | Do not use it yet      |\n| I am very excited about this tool, I hope it is perfectly production-ready, because if it's not, I will make commentary about `I spent X amount on OpenAI API calls` | Do not use it yet      |\n| I am not interested in code. I want to type words into a box and have my project completed; I do not want messy broken unfinished code | Do not use it yet      |\n| I love exploring experimental tools but I am on the fence. It's going to break halfway and leave me sad | Do not use it yet      |\n| Who should even try it at this point?                                                                | Nobody. Do not use it yet |\n| But I really want to use it for some esoteric reason having read all the above.                       | Do not use it yet either |\n\n\n---\n\n\nhttps://github.com/user-attachments/assets/cfd09250-d21e-49fc-a29b-fa0c661abfc0\n\nhttps://github.com/user-attachments/assets/c055f9c4-6bc0-4b11-ba8f-cc9f149387fa\n\n---\n\n## Important\n\n**Early alpha release ; earlier than expected by few weeks**\n\nStill not merged with key target features of the project, notably :\n- project iteration modules for all dimensions of generated projects\n- admin interface for event streams and (deeper) project iterations\n- integrate the full genUI plugin :\n  * generative design systems\n  * deploy finetuned models & serve from api.cofounder\n- local, browser-based dev env for the entire project scope\n- add { react-native , flutter , other web frameworks }\n- validations & swarm code review and autofix\n- code optimization\n- [...]\n\nbe patient :)\n\n---\n\n# Usage\n\n## Install & Init\n\n* Open your terminal and run\n\n```sh\nnpx @openinterface/cofounder\n```\n\nFollow the instructions. The installer \n- will ask you for your keys\n- setup dirs & start installs\n- will start the local `cofounder/api` builder and server\n- will open the web dashboard where you can create new projects (at `http://localhost:4200` ) 🎉\n\n```\nnote :\nyou will be asked for a cofounder.openinterface.ai key\nit is recommended to use one as it enables the designer/layoutv1 and swarm/external-apis features\nand can be used without limits during the current early alpha period\n\nthe full index will be available for local download on v1 release\n```\n\n- currently using `node v22` for the whole project. \n\n\n\n```sh\n# alternatively, you can make a new project without going through the dashboard\n# by runing :\nnpx @openinterface/cofounder -p \"YourAppProjectName\" -d \"describe your app here\" -a \"(optional) design instructions\"\n```\n\n\n## Run Generated Apps\n\n- Your backend & vite+react web app will incrementally generate inside `./apps/{YourApp}`\nOpen your terminal in `./apps/{YourApp}` and run\n\n```sh\nnpm i && npm run dev\n```\n\nIt will start both the backend and vite+react, concurrently, after installing their dependencies\nGo to `http://localhost:5173/` to open the web app 🎉\n\n\n- From within the generated apps , you can use ⌘+K / Ctrl+K to iterate on UI components\n\n[more details later]\n\n## Notes\n\n### Dashboard & Local API\n\nIf you resume later and would like to iterate on your generated apps,\nthe local `./cofounder/api` server needs to be running to receive queries\n\nYou can (re)start the `local cofounder API` running the following command from `./cofounder/api`\n\n```sh\nnpm run start\n```\n\nThe dashboard will open in `http://localhost:4200`\n\n\n- note: You can also generate new apps from the same env, without the the dashboard, by running, from `./cofounder/api`, one of these commands\n    \n    ```sh\n    npm run start -- -p \"ProjectName\" -f \"some app description\" -a \"minimalist and spacious , light theme\"\n    npm run start -- -p \"ProjectName\" -f \"./example_description.txt\" -a \"minimalist and spacious , light theme\"\n    ```\n\n### Concurrency\n\n**[the architecture will be further detailed and documented later]**\n\nEvery \"node\" in the `cofounder` architecture has a defined configuration under `./cofounder/api/system/structure/nodes/{category}/{name}.yaml` to handle things like concurrency, retries and limits per time interval\n\nFor example, if you want multiple LLM generations to run in parallel (when possible - sequences and parallels are defined in DAGS under `./cofounder/api/system/structure/sequences/{definition}.yaml` ),\ngo to\n\n```yaml\n#./cofounder/api/system/structure/nodes/op/llm.yaml\nnodes:\n op:LLM::GEN:\n  desc: \"...\"\n  in: [model, messages, preparser, parser, query, stream]\n  out: [generated, usage]\n  queue:\n   concurrency: 1 # <------------------------------- here \n op:LLM::VECTORIZE:\n  desc: \"{texts} -> {vectors}\"\n  in: [texts]\n  out: [vectors, usage]\n mapreduce: true\n op:LLM::VECTORIZE:CHUNK:\n  desc: \"{texts} -> {vectors}\"\n  in: [texts]\n  out: [vectors, usage]\n  queue:\n   concurrency: 50\n```\n\nand change the `op:LLM::GEN` parameter `concurrency` to a higher value\n\nThe default LLM concurrency is set to `2` so you can see what's happening in your console streams step by step - but you can increment it depending on your api keys limits\n\n---\n\n# Changelog\n\n---\n\n# Roadmap\n\n---\n\n# Benchmarks\n\n---\n\n# Community & Links\n\n- [![Cofounder](https://img.shields.io/badge/Cofounder-gray?style=for-the-badge&logo=discord&link=https://discord.gg/2kVMzeASj9)](https://discord.gg/2kVMzeASj9) | Community discord server by @flamecoders\n\n---\n\n# Docs, Design Systems, ...\n\n**[WIP]**\n\n---\n\n# Architecture\n\n[more details later]\n\narchi/v1 is as follows :\n\n![architecture](https://github.com/user-attachments/assets/b2d8b70e-7a6d-45c9-a706-0cf955d13451)\n\n\n---\n\n# Credits\n\n- Demo design systems built using Figma renders / UI kits from:\n  * blocks.pm by Hexa Plugin (see `cofounder/api/system/presets`)\n  * google material\n  * figma core\n  * shadcn\n- Dashboard node-based ui powered by [react flow](https://reactflow.dev/)\n","summary":"Cofounder is an experimental platform designed to automate the creation of full-stack, stateful web applications through generative AI. It leverages an AI-guided mockup designer and modular design systems to architect complete front-end and back-end environments. This tool is intended for adventurous developers and early adopters interested in exploring the frontier of automated software engineering, though it currently remains in an unstable, highly experimental alpha state.","description":"ai-generated apps , full stack + generative UI","stars":6654,"language":"TypeScript"},{"owner":"dgtlmoon","repo":"changedetection.io","url":"https://github.com/dgtlmoon/changedetection.io","readme":"# Detect Website Changes Automatically — Monitor Web Page Changes in Real Time\n\nMonitor websites for updates — get notified via Discord, Email, Slack, Telegram, Webhook and many more.\n\n**Detect web page content changes and get instant alerts.**  \n\nIdeal for monitoring price changes, content edits, conditional changes and more.\n\n\n[<img src=\"https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/screenshot.png\" style=\"max-width:100%;\" alt=\"Web site page change monitoring\"  title=\"Web site page change monitoring\"  />](https://changedetection.io?src=github)\n\n[![Release Version][release-shield]][release-link] [![Docker Pulls][docker-pulls]][docker-link] [![License][license-shield]](LICENSE.md)\n\n![changedetection.io](https://github.com/dgtlmoon/changedetection.io/actions/workflows/test-only.yml/badge.svg?branch=master)\n\n[**Get started with website page change monitoring straight away. Don't have time? Try our $8.99/month subscription, use our proxies and support!**](https://changedetection.io) , _half the price of other website change monitoring services!_\n\n\n- Chrome browser included.\n- Nothing to install, access via browser login after signup.\n- Super fast, no registration needed setup.\n- Get started watching and receiving website change notifications straight away.\n- See our [tutorials and how-to page for more inspiration](https://changedetection.io/tutorials) \n\n## AI-powered website change detection — smart alerts and plain-language summaries\n\nStop drowning in noise. Connect any LLM (OpenAI, Gemini, Anthropic, Ollama and more) and go from _\"something changed\"_ to _\"only the thing you care about changed\"_.\n\n**AI change detection rules** — write a plain-English intent once: _\"notify me only when the price drops below $50\"_, _\"alert me when the item comes back in stock\"_, _\"ignore navigation and footer changes\"_. The AI evaluates every detected diff against your intent and silently suppresses everything irrelevant. Fewer false positives, zero noise.\n\n**AI change summaries** — instead of staring at a raw diff, your notification reads _\"Price dropped from $89.99 to $67.00\"_ or _\"3 new products added to the listing\"_. Works globally or per-watch, with full control over the prompt.\n\nWorks with any model you already pay for — GPT-4o-mini and Gemini Flash handle this well at fractions of a cent per check. Or run it entirely locally with **Ollama**, **vLLM**, **LM Studio**, or any **OpenAI-compatible self-hosted endpoint** — pick the *OpenAI-compatible (vLLM, LM Studio, llama.cpp)* option in the provider dropdown and point it at your server's `/v1` URL. Powered by [LiteLLM](https://github.com/BerriAI/litellm), giving you seamless access to [100+ supported providers and models](https://docs.litellm.ai/docs/providers).\n\n[<img src=\"./docs/LLM-change-summary.jpeg\" style=\"max-width:100%;\" alt=\"AI-powered website change detection — plain language change summaries and smart alert rules\"  title=\"AI website change detection with LLM change summaries and intelligent alert filtering\" />](https://changedetection.io?src=github)\n\n_Note: Available in our subscription/hosted service from June 2026_\n\n### Target specific parts of the webpage using the Visual Selector tool.\n\nAvailable when connected to a <a href=\"https://github.com/dgtlmoon/changedetection.io/wiki/Playwright-content-fetcher\">playwright content fetcher</a> (included as part of our subscription service)\n\n[<img src=\"https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/visualselector-anim.gif\" style=\"max-width:100%;\" alt=\"Select parts and elements of a web page to monitor for changes\"  title=\"Select parts and elements of a web page to monitor for changes\" />](https://changedetection.io?src=github)\n\n### Easily see what changed, examine by word, line, or individual character.\n\n[<img src=\"https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/screenshot-diff.png\" style=\"max-width:100%;\" alt=\"Self-hosted web page change monitoring context difference \"  title=\"Self-hosted web page change monitoring context difference \" />](https://changedetection.io?src=github)\n\n\n### Perform interactive browser steps\n\nFill in text boxes, click buttons and more, setup your changedetection scenario. \n\nUsing the **Browser Steps** configuration, add basic steps before performing change detection, such as logging into websites, adding a product to a cart, accept cookie logins, entering dates and refining searches.\n\n[<img src=\"docs/browsersteps-anim.gif\" style=\"max-width:100%;\" alt=\"Website change detection with interactive browser steps, detect changes behind login and password, search queries and more\"  title=\"Website change detection with interactive browser steps, detect changes behind login and password, search queries and more\" />](https://changedetection.io?src=github)\n\nAfter **Browser Steps** have been run, then visit the **Visual Selector** tab to refine the content you're interested in.\nRequires Playwright to be enabled.\n\n### Awesome restock and price change notifications\n\nEnable the _\"Re-stock & Price detection for single product pages\"_ option to activate the best way to monitor product pricing, this will extract any meta-data in the HTML page and give you many options to follow the pricing of the product.\n\nEasily organise and monitor prices for products from the dashboard, get alerts and notifications when the price of a product changes or comes back in stock again!\n\n[<img src=\"docs/restock-overview.png\" style=\"max-width:100%;\" alt=\"Easily keep an eye on product price changes directly from the UI\"  title=\"Easily keep an eye on product price changes directly from the UI\" />](https://changedetection.io?src=github)\n\nSet price change notification parameters, upper and lower price, price change percentage and more.\nAlways know when a product for sale drops in price.\n\n[<img src=\"docs/restock-settings.png\" style=\"max-width:100%;\" alt=\"Set upper lower and percentage price change notification values\"  title=\"Set upper lower and percentage price change notification values\" />](https://changedetection.io?src=github)\n\n\n\n### Example use cases\n\n- Products and services have a change in pricing\n- _Out of stock notification_ and _Back In stock notification_\n- Monitor and track PDF file changes, know when a PDF file has text changes.\n- Governmental department updates (changes are often only on their websites)\n- New software releases, security advisories when you're not on their mailing list.\n- Festivals with changes\n- Discogs restock alerts and monitoring\n- Realestate listing changes\n- Know when your favourite whiskey is on sale, or other special deals are announced before anyone else\n- COVID related news from government websites\n- University/organisation news from their website\n- Detect and monitor changes in JSON API responses \n- JSON API monitoring and alerting\n- Changes in legal and other documents\n- Trigger API calls via notifications when text appears on a website\n- Glue together APIs using the JSON filter and JSON notifications\n- Create RSS feeds based on changes in web content\n- Monitor HTML source code for unexpected changes, strengthen your PCI compliance\n- You have a very sensitive list of URLs to watch and you do _not_ want to use the paid alternatives. (Remember, _you_ are the product)\n- Get notified when certain keywords appear in Twitter search results\n- Proactively search for jobs, get notified when companies update their careers page, search job portals for keywords.\n- Get alerts when new job positions are open on Bamboo HR and other job platforms\n- Website defacement monitoring\n- Pokémon Card Restock Tracker / Pokémon TCG Tracker\n- RegTech - stay ahead of regulatory changes, regulatory compliance\n\n_Need an actual Chrome runner with Javascript support? We support fetching via WebDriver and Playwright!</a>_\n\n#### Key Features\n\n- Lots of trigger filters, such as \"Trigger on text\", \"Remove text by selector\", \"Ignore text\", \"Extract text\", also using regular-expressions!\n- Target elements with xPath 1 and xPath 2, CSS Selectors, Easily monitor complex JSON with JSONPath or jq\n- Switch between fast non-JS and Chrome JS based \"fetchers\"\n- Track changes in PDF files (Monitor text changed in the PDF, Also monitor PDF filesize and checksums)\n- Easily specify how often a site should be checked\n- Execute JS before extracting text (Good for logging in, see examples in the UI!)\n- Override Request Headers, Specify `POST` or `GET` and other methods\n- Use the \"Visual Selector\" to help target specific elements\n- Configurable [proxy per watch](https://github.com/dgtlmoon/changedetection.io/wiki/Proxy-configuration)\n- Send a screenshot with the notification when a change is detected in the web page\n\nWe [recommend and use Bright Data](https://brightdata.grsm.io/n0r16zf7eivq) global proxy services, Bright Data will match any first deposit up to $150 using our signup link.\n\nPlease :star: star :star: this project and help it grow! https://github.com/dgtlmoon/changedetection.io/\n\n### Conditional web page changes\n\nEasily [configure conditional actions](https://changedetection.io/tutorial/conditional-actions-web-page-changes), for example, only trigger when a price is above or below a preset amount, or [when a web page includes (or does not include) a keyword](https://changedetection.io/tutorial/how-monitor-keywords-any-website)\n\n<img src=\"./docs/web-page-change-conditions.png\" style=\"max-width:80%;\" alt=\"Conditional web page changes\"  title=\"Conditional web page changes\"  />\n\n### Schedule web page watches in any timezone, limit by day of week and time.\n\nEasily set a re-check schedule, for example you could limit the web page change detection to only operate during business hours.\nOr perhaps based on a foreign timezone (for example, you want to check for the latest news-headlines in a foreign country at 0900 AM),\n\n<img src=\"./docs/scheduler.png\" style=\"max-width:80%;\" alt=\"How to monitor web page changes according to a schedule\"  title=\"How to monitor web page changes according to a schedule\"  />\n\nIncludes quick short-cut buttons to setup a schedule for **business hours only**, or **weekends**.\n\n### We have a Chrome extension!\n\nEasily add the current web page to your changedetection.io tool, simply install the extension and click \"Sync\" to connect it to your existing changedetection.io install.\n\n[<img src=\"./docs/chrome-extension-screenshot.png\" style=\"max-width:80%;\" alt=\"Chrome Extension to easily add the current web-page to detect a change.\"  title=\"Chrome Extension to easily add the current web-page to detect a change.\"  />](https://chromewebstore.google.com/detail/changedetectionio-website/kefcfmgmlhmankjmnbijimhofdjekbop)\n\n[Goto the Chrome Webstore to download the extension.](https://chromewebstore.google.com/detail/changedetectionio-website/kefcfmgmlhmankjmnbijimhofdjekbop) ( Or check out the [GitHub repo](https://github.com/dgtlmoon/changedetection.io-browser-extension) ) \n\n## Installation\n\n### Docker\n\nWith Docker composer, just clone this repository and..\n\n```bash\n$ docker compose up -d\n```\n\nDocker standalone\n```bash\n$ docker run -d --restart always -p \"127.0.0.1:5000:5000\" -v datastore-volume:/datastore --name changedetection.io dgtlmoon/changedetection.io\n```\n\n`:latest` tag is our latest stable release, `:dev` tag is our bleeding edge `master` branch.\n\nAlternative docker repository over at ghcr - [ghcr.io/dgtlmoon/changedetection.io](https://ghcr.io/dgtlmoon/changedetection.io)\n\n### Windows\n\nSee the install instructions at the wiki https://github.com/dgtlmoon/changedetection.io/wiki/Microsoft-Windows\n\n### Python Pip\n\nCheck out our pypi page https://pypi.org/project/changedetection.io/\n\n```bash\n$ pip3 install changedetection.io\n$ changedetection.io -d /path/to/empty/data/dir -p 5000\n```\n\nThen visit http://127.0.0.1:5000 , You should now be able to access the UI.\n\n_Now with per-site configurable support for using a fast built in HTTP fetcher or use a Chrome based fetcher for monitoring of JavaScript websites!_\n\n## Updating changedetection.io\n\n### Docker\n```\ndocker pull dgtlmoon/changedetection.io\ndocker kill $(docker ps -a -f name=changedetection.io -q)\ndocker rm $(docker ps -a -f name=changedetection.io -q)\ndocker run -d --restart always -p \"127.0.0.1:5000:5000\" -v datastore-volume:/datastore --name changedetection.io dgtlmoon/changedetection.io\n```\n\n### docker compose\n\n```bash\ndocker compose pull && docker compose up -d\n```\n\nSee the wiki for more information https://github.com/dgtlmoon/changedetection.io/wiki\n\n## Different browser viewport sizes (mobile, desktop etc)\n\nIf you are using the recommended `sockpuppetbrowser` (which is in the docker-compose.yml as a setting to be uncommented) you can easily set different viewport sizes for your web page change detection, [see more information here about setting up different viewport sizes](https://github.com/dgtlmoon/sockpuppetbrowser?tab=readme-ov-file#setting-viewport-size).\n\n## Filters\n\nXPath(1.0), JSONPath, jq, and CSS support comes baked in! You can be as specific as you need, use XPath exported from various XPath element query creation tools. \n(We support LXML `re:test`, `re:match` and `re:replace`.)\n\n## Notifications\n\nChangeDetection.io supports a massive amount of notifications (including email, office365, custom APIs, etc) when a web-page has a change detected thanks to the <a href=\"https://github.com/caronc/apprise\">apprise</a> library.\nSimply set one or more notification URL's in the _[edit]_ tab of that watch.\n\nJust some examples\n\n    discord://webhook_id/webhook_token\n    flock://app_token/g:channel_id\n    gitter://token/room\n    gchat://workspace/key/token\n    msteams://TokenA/TokenB/TokenC/\n    o365://TenantID:AccountEmail/ClientID/ClientSecret/TargetEmail\n    rocket://user:password@hostname/#Channel\n    mailto://user:pass@example.com?to=receivingAddress@example.com\n    json://someserver.com/custom-api\n    syslog://\n \n<a href=\"https://github.com/caronc/apprise#popular-notification-services\">And everything else in this list!</a>\n\n<img src=\"https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/screenshot-notifications.png\" style=\"max-width:100%;\" alt=\"Self-hosted web page change monitoring notifications\"  title=\"Self-hosted web page change monitoring notifications\"  />\n\nNow you can also customise your notification content and use <a target=\"_new\" href=\"https://jinja.palletsprojects.com/en/3.0.x/templates/\">Jinja2 templating</a> for their title and body!\n\n## JSON API Monitoring\n\nDetect changes and monitor data in JSON API's by using either JSONPath or jq to filter, parse, and restructure JSON as needed.\n\n![image](https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/json-filter-field-example.png)\n\nThis will re-parse the JSON and apply formatting to the text, making it super easy to monitor and detect changes in JSON API results\n\n![image](https://raw.githubusercontent.com/dgtlmoon/changedetection.io/master/docs/json-diff-example.png)\n\n### JSONPath or jq?\n\nFor more complex parsing, filtering, and modifying of JSON data, jq is recommended due to the built-in operators and functions. Refer to the [documentation](https://stedolan.github.io/jq/manual/) for more specific information on jq.\n\nOne big advantage of `jq` is that you can use logic in your JSON filter, such as filters to only show items that have a value greater than/less than etc.\n\nSee the wiki https://github.com/dgtlmoon/changedetection.io/wiki/JSON-Selector-Filter-help for more information and examples\n\n### Parse JSON embedded in HTML!\n\nWhen you enable a `json:` or `jq:` filter, you can even automatically extract and parse embedded JSON inside a HTML page! Amazingly handy for sites that build content based on JSON, such as many e-commerce websites. \n\n```\n<html>\n...\n<script type=\"application/ld+json\">\n\n{\n   \"@context\":\"http://schema.org/\",\n   \"@type\":\"Product\",\n   \"offers\":{\n      \"@type\":\"Offer\",\n      \"availability\":\"http://schema.org/InStock\",\n      \"price\":\"3949.99\",\n      \"priceCurrency\":\"USD\",\n      \"url\":\"https://www.newegg.com/p/3D5-000D-001T1\"\n   },\n   \"description\":\"Cobratype King Cobra Hero Desktop Gaming PC\",\n   \"name\":\"Cobratype King Cobra Hero Desktop Gaming PC\",\n   \"sku\":\"3D5-000D-001T1\",\n   \"itemCondition\":\"NewCondition\"\n}\n<\/script>\n```  \n\n`json:$..price` or `jq:..price` would give `3949.99`, or you can extract the whole structure (use a JSONpath test website to validate with)\n\nThe application also supports notifying you that it can follow this information automatically\n\n\n## Proxy Configuration\n\nSee the wiki https://github.com/dgtlmoon/changedetection.io/wiki/Proxy-configuration , we also support using [Bright Data proxy services where possible](https://github.com/dgtlmoon/changedetection.io/wiki/Proxy-configuration#brightdata-proxy-support) and [Oxylabs](https://oxylabs.go2cloud.org/SH2d) proxy services.\n\n## Raspberry Pi support?\n\nRaspberry Pi and linux/arm/v6 linux/arm/v7 arm64 devices are supported! See the wiki for [details](https://github.com/dgtlmoon/changedetection.io/wiki/Fetching-pages-with-WebDriver)\n\n## Import support\n\nEasily [import your list of websites to watch for changes in Excel .xslx file format](https://changedetection.io/tutorial/how-import-your-website-change-detection-lists-excel), or paste in lists of website URLs as plaintext. \n\nExcel import is recommended - that way you can better organise tags/groups of websites and other features.\n\n\n## API Support\n\nFull REST API for programmatic management of watches, tags, notifications and more. \n\n- **[Interactive API Documentation](https://changedetection.io/docs/api_v1/index.html)** - Complete API reference with live testing\n- **[OpenAPI Specification](docs/api-spec.yaml)** - Generate SDKs for any programming language\n\n## Support us\n\nDo you use changedetection.io to make money? does it save you time or money? Does it make your life easier? less stressful? Remember, we write this software when we should be doing actual paid work, we have to buy food and pay rent just like you.\n\n\nConsider taking out an officially supported [website change detection subscription](https://changedetection.io?src=github) , even if you don't use it, you still get the warm fuzzy feeling of helping out the project. (And who knows, you might just use it!)\n\n## Commercial Support\n\nI offer commercial support, this software is depended on by network security, aerospace , data-science and data-journalist professionals just to name a few, please reach out at dgtlmoon@gmail.com for any enquiries, I am more than glad to work with your organisation to further the possibilities of what can be done with changedetection.io\n\n\n[release-shield]: https://img.shields.io:/github/v/release/dgtlmoon/changedetection.io?style=for-the-badge\n[docker-pulls]: https://img.shields.io/docker/pulls/dgtlmoon/changedetection.io?style=for-the-badge\n[test-shield]: https://github.com/dgtlmoon/changedetection.io/actions/workflows/test-only.yml/badge.svg?branch=master\n\n[license-shield]: https://img.shields.io/github/license/dgtlmoon/changedetection.io.svg?style=for-the-badge\n[release-link]: https://github.com/dgtlmoon/changedetection.io/releases\n[docker-link]: https://hub.docker.com/r/dgtlmoon/changedetection.io\n\n\n## Disclaimer\n\n**This software is provided \"as-is\", without warranty of any kind, express or implied, including but not limited to the warranties of merchantability, fitness for a particular purpose, and non-infringement. In no event shall the authors or copyright holders be liable for any claim, damages, or other liability, whether in an action of contract, tort, or otherwise, arising from, out of, or in connection with the software or the use or other dealings in the software.**\n\n### Website content monitoring\n\nYou are solely responsible for ensuring that your use of this software complies with the terms of service, `robots.txt` directives, access policies, and all applicable laws of any website or service you choose to monitor. The authors and contributors of this software accept no liability whatsoever for how you choose to use it or for any consequences arising from that use.\n\n### AI / LLM features\n\nIf you choose to enable AI / LLM features, content detected on monitored websites — including page diffs and extracted text — will be transmitted to a third-party AI provider of your choosing, outside of this installation. You are solely responsible for:\n\n- Ensuring such transmission is permitted by the terms of service of every website you monitor.\n- Compliance with all applicable data-protection and privacy laws (including but not limited to GDPR) with respect to any personal data that may appear in monitored content.\n- All API costs and charges levied by your chosen AI provider. This software has no visibility into or control over those charges.\n- Any consequences arising from acting on AI-generated output.\n\n**AI and LLM models are known to hallucinate** — producing plausible-sounding but factually incorrect, incomplete, or entirely fabricated output with apparent confidence. By design, LLMs may also omit or silently truncate relevant information during summarisation. **AI output must never be relied upon as complete or accurate.**\n\nBy using this software, and in particular any AI / LLM features, you personally indemnify and hold harmless the author(s), contributor(s), and any associated parties from and against any and all claims, damages, losses, costs, and expenses (including reasonable legal fees) arising out of or in connection with your use of this software.\n\n## Third-party licenses\n\nchangedetectionio.html_tools.elementpath_tostring: Copyright (c), 2018-2021, SISSA (Scuola Internazionale Superiore di Studi Avanzati), Licensed under [MIT license](https://github.com/sissaschool/elementpath/blob/master/LICENSE)\n\n## Contributors\n\nRecognition of fantastic contributors to the project\n\n<sub>Developer note: see [translation guide](changedetectionio/translations/README.md) for i18n template patterns and workflow.</sub>\n\n- Constantin Hong https://github.com/Constantin1489\n","summary":"Changedetection.io is a powerful, self-hosted monitoring tool that tracks website content for updates and sends instant notifications via services like Discord, Slack, and email. The platform features AI-driven analytics that allow users to generate plain-language summaries of changes and set intelligent, intent-based alerts to filter out irrelevant noise. By offering advanced capabilities like visual element selection and integration with various LLMs, it provides a highly customizable solution for tracking price drops, stock availability, or specific content edits. This tool is ideal for researchers, bargain hunters, and developers who need a reliable, automated way to monitor web pages without manual oversight.","description":"Best and simplest tool for website change detection, web page monitoring, and website change alerts. Perfect for tracking content changes, price drops, restock alerts, and website defacement monitoring—all for free or enjoy our SaaS plan!","stars":31864,"language":"Python"},{"owner":"StarRocks","repo":"starrocks","url":"https://github.com/StarRocks/starrocks","readme":"\n <img referrerpolicy=\"no-referrer-when-downgrade\" src=\"https://static.scarf.sh/a.png?x-pxid=e8355b6b-a9fc-4d4e-8ed8-b3157aa1827d\" />\n <p align=\"center\">\n <a href=\"https://starrocks.io/index\">\n    <img  width=\"900\" src=\"https://cdn.starrocks.io/static/github/starrocks.png?t=12234\">\n   </a>\n</p>\n<p align=\"center\">\n  <a href=\"https://starrocks.io/download/community\">Download</a> | <a href=\"https://docs.starrocks.io/\">Docs</a> | <a href=\"https://starrocks.io/blog/benchmark-test\">Benchmarks</a> | <a href=\"https://github.com/StarRocks/demo\">Demo</a>\n</p>\n<p align=\"center\">\n\n <img src=\"https://img.shields.io/badge/Made%20with-JAVA%20%26%20C%2B%2B-red\" alt=\"JAVA&C++\">\n    </a>\n    <img src=\"https://img.shields.io/github/commit-activity/m/StarRocks/starrocks\" alt=\"Commit Activities\">\n    </a>\n   <a href=\"https://github.com/StarRocks/starrocks/issues\">\n    <img src=\"https://img.shields.io/github/issues-raw/StarRocks/starrocks\" alt=\"Open Issues\">\n  </a>\n  </a>\n   <a href=\"https://starrocks.io/index\">\n    <img src=\"https://img.shields.io/badge/Visit%20StarRocks-Website-green\" alt=\"Website\">\n  </a>\n  </a>\n   <a href=\"https://try.starrocks.com/join-starrocks-on-slack\">\n    <img src=\"https://img.shields.io/badge/Join-Slack-ff69b4\" alt=\"Slack\">\n  </a>\n  </a>\n   <a href=\"https://twitter.com/StarRocksLabs\">\n    <img src=\"https://img.shields.io/twitter/follow/StarRocksLabs?style=social\" alt=\"Twitter\">\n  </a>\n  <a href=\"https://gurubase.io/g/starrocks\">\n    <img src=\"https://img.shields.io/badge/Gurubase-Ask%20StarRocks%20Guru-006BFF\" alt=\"Gurubase\">\n  </a>\n </p>\n\n<div align=\"center\"> \n\n</div>\nStarRocks is the world's fastest open query engine for sub-second, ad-hoc analytics both on and off the data lakehouse. With average query performance 3x faster than other popular alternatives, StarRocks is a query engine that eliminates the need for denormalization and adapts to your use cases, without having to move your data or rewrite SQL. A Linux Foundation project. <br></br>\n\nLearn more 👉🏻 [What Is StarRocks: Features and Use Cases](https://www.youtube.com/watch?v=RfXO5GOnbW4&ab_channel=CelerData), \nJoin [StarRocks Summit 2025](https://summit.starrocks.io/2025)!\n\n<br>\n <p align=\"center\">\n    <img src=\"https://cdn.starrocks.io/static/github/community.gif\">\n   </a>\n</p>\n</br>\n\n## Features\n\n* **🚀 Native vectorized SQL engine:** StarRocks adopts vectorization technology to make full use of the parallel computing power of CPU, achieving sub-second query returns in multi-dimensional analyses, which is 5 to 10 times faster than previous systems.\n* **📊 Standard SQL:** StarRocks supports ANSI SQL syntax (fully supported TPC-H and TPC-DS). It is also compatible with the MySQL protocol. Various clients and BI software can be used to access StarRocks.\n* **💡 Smart query optimization:** StarRocks can optimize complex queries through CBO (Cost Based Optimizer). With a better execution plan, the data analysis efficiency will be greatly improved.\n* **⚡ Real-time update:** The updated model of StarRocks can perform upsert/delete operations according to the primary key, and achieve efficient query while concurrent updates.\n* **🪟 Intelligent materialized view:** The materialized view of StarRocks can be automatically updated during the data import and automatically selected when the query is executed.\n* **✨ Querying data in data lakes directly**: StarRocks allows direct access to data from Apache Hive™, Apache Iceberg™, Delta Lake™ and Apache Hudi™ without importing.\n* **🎛️ Resource management**: This feature allows StarRocks to limit resource consumption for queries and implement isolation and efficient use of resources among tenants in the same cluster.\n* **💠 Easy to maintain**: Simple architecture makes StarRocks easy to deploy, maintain and scale out. StarRocks tunes its query plan agilely, balances the resources when the cluster is scaled in or out, and recovers the data replica under node failure automatically.\n\n\n\n<br>\n  \n## Architecture Overview\n\n <p align=\"center\">\n    <img src=\"images/arch.png\">\n   </a>\n</p>\n\n\nStarRocks’s streamlined architecture is mainly composed of two modules: Frontend (FE) and Backend (BE).  The entire system eliminates single points of failure through seamless and horizontal scaling of FE and BE, as well as replication of metadata and data.\n\nStarting from version 3.0, StarRocks supports a new shared-data architecture, which can provide better scalability and lower costs.\n\n <p align=\"center\">\n    <img src=\"docs/en/_assets/shared-data.png\" width=\"55%\" height=\"55%\">\n   </a>\n</p>\n\n\n<br>\n\n## Resources\n\n### 📚 Read the docs\n\n| Section | Description |\n|-|-|\n| [Quick Starts](https://docs.starrocks.io/docs/quick_start/)| How-tos and Tutorials. |\n| [Deploy](https://docs.starrocks.io/docs/deployment/deployment_overview/) | Learn how to run and configure StarRocks.|\n| [Docs](https://docs.starrocks.io/)| Full documentation. |\n| [Blogs](https://www.starrocks.io/blog) | StarRocks deep dive and user stories.  |\n\n### ❓ Get support  \n[<img align=\"right\" width=\"150\" src=\"https://firstcontributions.github.io/assets/Readme/join-slack-team.png\">](https://try.starrocks.com/join-starrocks-on-slack)\n-  [Slack community: ](https://try.starrocks.com/join-starrocks-on-slack) join technical discussions, ask questions, and meet other users!\n-  [YouTube channel:](https://www.youtube.com/channel/UC38wR-ogamk4naaWNQ45y7Q/featured) subscribe to the latest video tutorials and webcasts.\n-  [GitHub issues:](https://github.com/StarRocks/starrocks/issues) report an issue with StarRocks.\n\n\n<br>  \n  \n## Contributing to StarRocks\n\nWe welcome all kinds of contributions from the community, individuals and partners. We owe our success to your active involvement.\n\n1. See [Contributing.md](https://github.com/StarRocks/starrocks/blob/main/CONTRIBUTING.md) to get started.\n2. Set up StarRocks development environment:\n* [IDE Setup](https://docs.starrocks.io/docs/developers/development-environment/ide-setup/) \n* [Compile StarRocks with Docker](https://docs.starrocks.io/docs/developers/build-starrocks/Build_in_docker/) \n* [Deploy StarRocks manually](https://docs.starrocks.io/docs/deployment/deploy_manually/) \n3. Understand our [GitHub workflow](https://github.com/StarRocks/community/blob/main/Contributors/guide/workflow.md) for opening a pull request; use this [PR Template](https://github.com/StarRocks/starrocks/blob/main/.github/PULL_REQUEST_TEMPLATE.md) when submitting a pull request.\n4. Pick a [good first issue](https://github.com/StarRocks/starrocks/labels/good%20first%20issue) and start contributing. \n\n**📝 License:** StarRocks is licensed under [Apache License 2.0](https://www.apache.org/licenses/LICENSE-2.0).\n\n**👥 Community Membership:** Learn more about different [contributor roles](community/membership.md) in StarRocks community.\n\n**💬 Developer Group：** Please join our [Google Groups](https://groups.google.com/g/starrocks-dev) to discuss StarRocks features, project directions, issues, pull requests, or share suggestions.\n  \n<br>\n  \n## Used By\n\nThis project is used by the following companies. Learn more about their use cases:\n\n- [Airbnb](https://www.youtube.com/watch?v=AzDxEZuMBwM&ab_channel=StarRocks_labs)\n- [Airtable](https://medium.com/airtable-eng/live-shard-data-archive-export-and-ingestion-to-starrocks-for-validation-6af555e8b3fe)\n- [Alibaba](https://www.youtube.com/watch?v=7N34q65mthk)\n- [Celonis](https://www.youtube.com/watch?v=Jm-D0xvOtek)\n- [Cisco](https://www.starrocks.io/blog/how-cisco-webex-unified-real-time-analytics-with-starrocks)\n- [Coinbase](https://www.youtube.com/watch?v=3Z9jSCaHnYg&list=PL0eWwaesODdhBhKSnvpfIEAB9sgk8rKmy)\n- [CTW](https://www.phoenixdata.ai/case-studies/case-study-ctw.html)\n- [Demandbase](https://starrocks.medium.com/demandbase-ditches-denormalization-by-switching-off-clickhouse-44195d795a83)\n- [Didi](https://www.starrocks.io/blog/reduced-80-cost-didis-journey-from-multiple-olap-engines-to-starrocks)\n- [Eightfold.ai](https://www.youtube.com/watch?v=qNk_-QTZk3E)\n- [Fanatics](https://www.youtube.com/watch?v=hbXovqR6tOc)\n- [Fresha](https://medium.com/fresha-data-engineering/how-we-accidentally-became-one-of-uks-first-starrocks-production-pioneers-7db249f10010)\n- [Grab](https://engineering.grab.com/building-a-spark-observability)\n- [Haezoom](https://www.starrocks.io/blog/haezoom-and-cloudshift-overcome-apache-druids-limits-with-starrocks)\n- [HerdWatch](https://medium.com/p/a7916a7e87bf)\n- [Intuit](https://www.youtube.com/watch?v=tUC3FS3ki10)\n- [iQiyi](https://medium.com/starrocks-engineering/real-time-analytics-at-scale-why-we-use-starrocks-0aa3c859cbeb)\n- [Naver](https://starrocks.medium.com/how-join-changed-how-we-approach-data-infra-at-naver-3a5bb1dac49f)\n- [Pinterest](https://medium.com/pinterest-engineering/delivering-faster-analytics-at-pinterest-a639cdfad374)\n- [PlaySimple Games](https://medium.com/@sukkhjot/querying-billions-of-user-events-in-seconds-our-journey-with-starrocks-ecc29ac6c756)\n- [Shopee](https://celerdata.com/blog/how-shopee-3xed-their-query-performance-with-starrocks)\n- [Smartnews](https://medium.com/smartnews-inc/evaluating-a-unified-query-engine-to-consolidate-trino-and-clickhouse-672848c7d55d)\n- [Splitmetrics](https://celerdata.com/blog/how-splitmetrics-replaced-postgresql-with-starrocks-for-customer-facing-analytics)\n- [Tencent(Games)](https://www.starrocks.io/blog/tencent-unifies-their-gaming-analytics-with-starrocks)\n- [Tencent(LLM)](https://www.youtube.com/watch?v=WVHXFks9EQk)\n- [Trip.com](https://starrocks.medium.com/trip-com-starrocks-efficiently-supports-high-concurrent-queries-dramatically-reduces-labor-and-1e1921dd6bf8)\n- [TRM Labs](https://www.trmlabs.com/post/from-bigquery-to-lakehouse-how-we-built-a-petabyte-scale-data-analytics-platform-part-1)\n- [Verisoul](https://celerdata.com/blog/verisoul-enables-real-time-analytics-by-transitioning-off-bigquery)\n- [Vivo](https://medium.com/starrocks-engineering/vivos-journey-to-a-high-performance-lakehouse-with-starrocks-56a502a0fde8) \n- [Xiaohongshu/RedNote](https://www.youtube.com/watch?v=2cvIZY4EDak&list=PL0eWwaesODdiJ0aXLzSTyNfkjjIFYpOTf)\n- [Yuno](https://celerdata.com/blog/from-hours-to-seconds-how-yuno-accelerated-customer-facing-analytics-by-switching-off-snowflake-and-athena)\n- [Zepto](https://blog.zeptonow.com/data-that-delivers-real-time-insights-for-brand-success-in-quick-commerce-b8b9e994d20b)\n\n","summary":"StarRocks is a high-performance, open-source query engine designed to provide sub-second, ad-hoc analytics for both data warehouses and data lakehouses. It features a native vectorized SQL engine, smart cost-based query optimization, and the ability to query data directly from lake formats like Iceberg, Hive, and Hudi without the need for data migration. Data engineers and architects seeking to accelerate complex analytical workloads while maintaining standard ANSI SQL compatibility will find this project highly effective for building real-time, scalable data infrastructures.","description":"The world's fastest open query engine for sub-second analytics both on and off the data lakehouse. With the flexibility to support nearly any scenario, StarRocks provides best-in-class performance for multi-dimensional analytics, real-time analytics, and ad-hoc queries. A Linux Foundation project.","stars":11747,"language":"Java"},{"owner":"dagster-io","repo":"dagster","url":"https://github.com/dagster-io/dagster","readme":"<div align=\"center\">\n  <!-- Note: Do not try adding the dark mode version here with the `picture` element, it will break formatting in PyPI -->\n  <a target=\"_blank\" href=\"https://dagster.io\" style=\"background:none\">\n    <img alt=\"dagster logo\" src=\"https://raw.githubusercontent.com/dagster-io/dagster/master/.github/dagster-readme-header.svg\" width=\"auto\" height=\"100%\">\n  </a>\n  <a target=\"_blank\" href=\"https://github.com/dagster-io/dagster\" style=\"background:none\">\n    <img src=\"https://img.shields.io/github/stars/dagster-io/dagster?labelColor=4F43DD&color=163B36&logo=github\">\n  </a>\n  <a target=\"_blank\" href=\"https://github.com/dagster-io/dagster/blob/master/LICENSE\" style=\"background:none\">\n    <img src=\"https://img.shields.io/badge/License-Apache_2.0-blue.svg?label=license&labelColor=4F43DD&color=163B36\">\n  </a>\n  <a target=\"_blank\" href=\"https://pypi.org/project/dagster/\" style=\"background:none\">\n    <img src=\"https://img.shields.io/pypi/v/dagster?labelColor=4F43DD&color=163B36\">\n  </a>\n  <a target=\"_blank\" href=\"https://pypi.org/project/dagster/\" style=\"background:none\">\n    <img src=\"https://img.shields.io/pypi/pyversions/dagster?labelColor=4F43DD&color=163B36\">\n  </a>\n  <a target=\"_blank\" href=\"https://twitter.com/dagster\" style=\"background:none\">\n    <img src=\"https://img.shields.io/badge/twitter-dagster-blue.svg?labelColor=4F43DD&color=163B36&logo=twitter\" />\n  </a>\n  <a target=\"_blank\" href=\"https://dagster.io/slack\" style=\"background:none\">\n    <img src=\"https://img.shields.io/badge/slack-dagster-blue.svg?labelColor=4F43DD&color=163B36&logo=slack\" />\n  </a>\n  <a target=\"_blank\" href=\"https://linkedin.com/showcase/dagster\" style=\"background:none\">\n    <img src=\"https://img.shields.io/badge/linkedin-dagster-blue.svg?labelColor=4F43DD&color=163B36&logo=linkedin\" />\n  </a>\n</div>\n\n**Dagster is a cloud-native data pipeline orchestrator for the whole development lifecycle, with integrated lineage and observability, a declarative programming model, and best-in-class testability.**\n\nIt is designed for **developing and maintaining data assets**, such as tables, data sets, machine learning models, and reports.\n\nWith Dagster, you declare—as Python functions—the data assets that you want to build. Dagster then helps you run your functions at the right time and keep your assets up-to-date.\n\nHere is an example of a graph of three assets defined in Python:\n\n```python\nimport dagster as dg\nimport pandas as pd\n\nfrom sklearn.linear_model import LinearRegression\n\n@dg.asset\ndef country_populations() -> pd.DataFrame:\n    df = pd.read_html(\"https://tinyurl.com/mry64ebh\")[0]\n    df.columns = [\"country\", \"pop2022\", \"pop2023\", \"change\", \"continent\", \"region\"]\n    df[\"change\"] = df[\"change\"].str.rstrip(\"%\").astype(\"float\")\n    return df\n\n@dg.asset\ndef continent_change_model(country_populations: pd.DataFrame) -> LinearRegression:\n    data = country_populations.dropna(subset=[\"change\"])\n    return LinearRegression().fit(pd.get_dummies(data[[\"continent\"]]), data[\"change\"])\n\n@dg.asset\ndef continent_stats(country_populations: pd.DataFrame, continent_change_model: LinearRegression) -> pd.DataFrame:\n    result = country_populations.groupby(\"continent\").sum()\n    result[\"pop_change_factor\"] = continent_change_model.coef_\n    return result\n```\n\nThe graph loaded into Dagster's web UI:\n\n<p align=\"center\">\n  <img width=\"100%\" alt=\"An example asset graph as rendered in the Dagster UI\" src=\"https://raw.githubusercontent.com/dagster-io/dagster/master/.github/example-lineage.png\">\n</p>\n\nDagster is built to be used at every stage of the data development lifecycle - local development, unit tests, integration tests, staging environments, all the way up to production.\n\n## Quick Start:\n\nIf you're new to Dagster, we recommend checking out the [docs](https://docs.dagster.io) or following the hands-on [tutorial](https://docs.dagster.io/etl-pipeline-tutorial/).\n\nDagster is available on PyPI and officially supports Python 3.9 through Python 3.14.\n\n```bash\nuv add dagster dagster-webserver dagster-dg-cli\n```\n\n## Documentation\n\nYou can find the full Dagster documentation [here](https://docs.dagster.io), including the [Quickstart guide](https://docs.dagster.io/getting-started/quickstart).\n\n<hr/>\n\n## Key Features:\n\n  <p align=\"center\">\n    <img width=\"100%\" alt=\"image\" src=\"https://raw.githubusercontent.com/dagster-io/dagster/master/.github/key-features-cards.svg\">\n  </p>\n\n### Dagster as a productivity platform\n\nIdentify the key assets you need to create using a declarative approach, or you can focus on running basic tasks. Embrace CI/CD best practices from the get-go: build reusable components, spot data quality issues, and flag bugs early.\n\n### Dagster as a robust orchestration engine\n\nPut your pipelines into production with a robust multi-tenant, multi-tool engine that scales technically and organizationally.\n\n### Dagster as a unified control plane\n\nMaintain control over your data as the complexity scales. Centralize your metadata in one tool with built-in observability, diagnostics, cataloging, and lineage. Spot any issues and identify performance improvement opportunities.\n\n<hr />\n\n## Master the Modern Data Stack with integrations\n\nDagster provides a growing library of integrations for tod
