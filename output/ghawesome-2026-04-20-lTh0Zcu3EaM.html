bs, and heartbeats** now run through a provider adapter layer with persisted conversations and transcript-driven live views.\n- **Per-run overrides** can choose provider, model, and reasoning effort, while personas and jobs can still inherit defaults.\n- **Current defaults** are structured local adapters: `claude_local` for Claude Code and `codex_local` for Codex CLI.\n- **The web terminal is staying** as a first-class interactive surface for direct CLI sessions and future terminal-native features such as Cabinet-managed tmux-like workspaces.\n\n---\n\n## Architecture\n\n```\ncabinet/\n  src/\n    app/api/         -> Next.js API routes\n    components/      -> React components (sidebar, editor, agents, jobs, terminal)\n    stores/          -> Zustand state management\n    lib/             -> Storage, markdown, git, agents, jobs\n  server/\n    cabinet-daemon.ts -> WebSocket + job scheduler + agent executor\n  data/\n    .agents/.library/ -> 20 pre-built agent templates\n    getting-started/  -> Default KB page\n```\n\n**Tech stack:** Next.js 16, TypeScript, Tailwind CSS, shadcn/ui, Tiptap, Zustand, xterm.js, node-cron\n\n---\n\n## Requirements\n\n- **Node.js** 20+\n- At least one supported CLI provider:\n  - **Claude Code CLI** (`npm install -g @anthropic-ai/claude-code`)\n  - **Codex CLI** (`npm install -g @openai/codex` or `brew install --cask codex`)\n- macOS or Linux (Windows via WSL)\n\n## Configuration\n\n```bash\ncp .env.example .env.local\n```\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `KB_PASSWORD` | _(empty)_ | Password to protect the UI. Leave empty for no auth. |\n| `DOMAIN` | `localhost` | Domain for the app. |\n\n## Commands\n\n```bash\nnpm run dev          # Next.js dev server (port 3000)\nnpm run dev:daemon   # Unified daemon: structured runs, terminal sessions, WebSockets, scheduler (port 3001)\nnpm run dev:all      # Both servers\nnpm run build        # Production build\nnpm run start        # Production mode (both servers)\n```\n\n---\n\n## Ready to build your AI team?\n\nCabinet is free, open source, and self-hosted. Your data never leaves your machine.\n\n```bash\nnpx create-cabinet my-startup\n```\n\n[Get Started](https://runcabinet.com) | <a href=\"https://github.com/hilash/cabinet/stargazers\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/github/stars/hilash/cabinet?label=GitHub%20Stars&logo=github&color=f5b301\" alt=\"GitHub Stars\" valign=\"middle\"></a>\n\n---\n\n## Changelog\n\nSee [CHANGELOG.md](CHANGELOG.md) for breaking changes, or follow the full release history on the [documentation site](https://runcabinet.com).\n\n## Community\n\nQuestions, ideas, feedback, screenshots, wild experiments — bring them to the [Discord](https://discord.gg/hJa5TRTbTH). That’s where the Cabinet community hangs out and where a lot of the product direction gets shaped in real time.\n\n---\n\n## Contributing\n\nCabinet is moving fast right now. We’d love thoughtful contributors who want to help shape it early.\n\nIf you’re thinking about opening a PR, please start by joining the [Discord](https://discord.gg/hJa5TRTbTH) and talking with Hila before coding. Hila is Cabinet’s builder, and that early sync helps us keep the roadmap coherent while the product is still evolving rapidly.\n\nOnce the direction is aligned, open your PR on [GitHub](https://github.com/hilash/cabinet). The goal is not gatekeeping — it’s making sure your energy goes into work that has a clear path to landing and shipping.\n\n---\n\nMIT License\n\n---\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=hilash%2Fcabinet&type=date&legend=top-left\" target=\"_blank\" rel=\"noopener noreferrer\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=hilash/cabinet&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=hilash/cabinet&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=hilash/cabinet&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"Cabinet is a self‑hosted, AI‑first operating system that turns every markdown file on one’s disk into a living knowledge base, complete with AI agents that remember context across sessions and scheduled jobs that evolve the knowledge over time. It offers a simple, database‑free workflow that lets users create AI workspaces, link them to any LLM provider, and version the whole system through Git so every change is audit‑able. Designers, developers, and small teams who need a portable, privacy‑first knowledge hub that can grow into a full AI‑powered productivity suite will find Cabinet a natural fit.","description":"AI-first knowledge base and startup OS","stars":1608,"language":"TypeScript"},{"owner":"ironsh","repo":"iron-proxy","url":"https://github.com/ironsh/iron-proxy","readme":"# iron-proxy\n\n[![Docs](https://img.shields.io/badge/docs-iron--proxy-blue)](https://docs.iron.sh)\n[![Latest Release](https://img.shields.io/github/v/release/ironsh/iron-proxy)](https://github.com/ironsh/iron-proxy/releases/latest)\n[![Docker Pulls](https://img.shields.io/docker/pulls/ironsh/iron-proxy)](https://hub.docker.com/r/ironsh/iron-proxy)\n\n## The problem\n\nCI jobs, AI coding agents, and sandboxed containers can make arbitrary outbound\nrequests. A compromised dependency, a prompt injection, or a malicious build\nstep can exfiltrate secrets, phone home, or open a reverse shell. Most\nteams have zero visibility into what's leaving their workloads, let alone any\nway to stop it.\n\n## What iron-proxy does\n\niron-proxy is a MITM egress proxy with a built-in DNS server that sits between\nyour untrusted workload and the internet. It enforces default-deny at the\nnetwork boundary, so the workload can only reach domains you explicitly allow.\nReal secrets never enter the sandbox. Workloads use proxy tokens, and\niron-proxy swaps in real credentials at egress, meaning a compromised workload\ncan exfiltrate a token that's worthless outside the proxy.\n\nSingle binary. Single YAML config.\n\n- **Default-deny egress.** Every outbound request is blocked unless the\n  destination matches your allowlist. List your domains and CIDRs, everything\n  else gets a 403.\n- **Boundary-level secret injection.** Workloads send proxy tokens; iron-proxy\n  replaces them with real secrets before the request leaves. If the sandbox is\n  compromised, the attacker gets tokens that are useless outside the proxy.\n- **Per-request audit trail.** Every request logged as structured JSON with\n  the full transform pipeline result: which secrets were swapped, which rules\n  matched, what got blocked and why.\n- **Streaming-aware.** WebSocket upgrades and Server-Sent Events are proxied\n  natively. No special configuration for agent workloads that hold long-lived\n  connections.\n- **CONNECT and SOCKS5 support.** Optional tunnel listener for tools that\n  natively support proxy configuration via `HTTPS_PROXY` or SOCKS5 settings.\n\nBuilt for CI pipelines, GitHub Actions, AI agents (Claude Code, Cursor,\nCodex), and any environment where you run code you don't fully trust.\n\n<div align=\"center\">\n    <strong>Blocked exfiltration + secret rewriting in action:</strong>\n    <br/><br/>\n    <a href=\"https://screen.studio/share/Gq2zqtrp\" target=\"_blank\">\n        <img src=\"./images/intro.gif\" width=\"75%\" />\n    </a>\n</div>\n \n## Installation\n \nDocker images are available on [Docker Hub](https://hub.docker.com/r/ironsh/iron-proxy)\nand pre-built binaries for Linux/macOS (amd64/arm64) are on\n[GitHub Releases](https://github.com/ironsh/iron-proxy/releases).\n \nOr build from source:\n \n```bash\ngo build -o iron-proxy ./cmd/iron-proxy\n```\n\n## Quick start\n\n```bash\ncd examples/docker-compose\ndocker compose up\n```\n\nThis starts iron-proxy and a demo client that fires five requests through the\nproxy. Check the logs to see allowed, blocked, and secret-rewritten requests:\n\n```bash\ndocker compose logs proxy\n```\n\nEvery request produces a structured JSON audit entry:\n\n```json\n{\n  \"host\": \"httpbin.org\",\n  \"method\": \"GET\",\n  \"path\": \"/headers\",\n  \"action\": \"allow\",\n  \"status_code\": 200,\n  \"duration_ms\": 142,\n  \"request_transforms\": [\n    { \"name\": \"allowlist\", \"action\": \"continue\" },\n    {\n      \"name\": \"secrets\",\n      \"action\": \"continue\",\n      \"annotations\": { \"swapped\": [{ \"secret\": \"OPENAI_API_KEY\", \"locations\": [\"header:Authorization\"] }] }\n    }\n  ]\n}\n```\n\nRejected requests include a `rejected_by` field and log at WARN level. See\n[Audit log format](#audit-log-format) for the full schema.\n\n## Production usage\n\n### 1. Generate a CA\n\niron-proxy terminates TLS by generating leaf certificates on the fly, signed by\na CA you provide. Client containers must trust this CA.\n\n```bash\nmkdir -p certs\nopenssl genrsa -out certs/ca.key 4096\nopenssl req -x509 -new -nodes \\\n    -key certs/ca.key \\\n    -sha256 -days 3650 \\\n    -subj \"/CN=iron-proxy CA\" \\\n    -addext \"basicConstraints=critical,CA:TRUE\" \\\n    -addext \"keyUsage=critical,keyCertSign\" \\\n    -out certs/ca.crt\n```\n\n### 2. Create a Docker network\n\niron-proxy needs a fixed IP so containers can point their DNS at it:\n\n```bash\ndocker network create --subnet=172.20.0.0/24 iron-proxy\n```\n\n### 3. Start iron-proxy\n\nCreate an env file with your secrets (keep this out of version control):\n\n```bash\necho \"OPENAI_API_KEY=sk-real-key\" > .env\n```\n\n```bash\ndocker run -d --name iron-proxy \\\n  --network iron-proxy --ip 172.20.0.2 \\\n  -v $(pwd)/proxy.yaml:/etc/iron-proxy/proxy.yaml:ro \\\n  -v $(pwd)/certs/ca.crt:/etc/iron-proxy/ca.crt:ro \\\n  -v $(pwd)/certs/ca.key:/etc/iron-proxy/ca.key:ro \\\n  --env-file .env \\\n  ironsh/iron-proxy:latest -config /etc/iron-proxy/proxy.yaml\n```\n\n### 4. Route containers through the proxy\n\nThe simplest approach is DNS-based routing: point the container's DNS at\niron-proxy and all hostname lookups resolve to the proxy IP, routing traffic\nthrough it automatically:\n\n```bash\ndocker run --rm \\\n  --network iron-proxy \\\n  --dns 172.20.0.2 \\\n  -v $(pwd)/certs/ca.crt:/certs/ca.crt:ro \\\n  curlimages/curl --cacert /certs/ca.crt https://httpbin.org/get\n```\n\nFor stronger enforcement, layer nftables rules to block non-proxy egress, or use\nTPROXY for kernel-level interception. See [Routing traffic to the\nproxy](#routing-traffic-to-the-proxy) for details on each approach.\n\n## Why iron-proxy?\n\n|                          | iron-proxy                     | Squid                       | mitmproxy                 | Envoy                              |\n| ------------------------ | ------------------------------ | --------------------------- | ------------------------- | ---------------------------------- |\n| Default-deny egress      | Built-in                       | Requires complex ACL config | Requires custom scripting | Requires RBAC/filter configuration |\n| Secret injection         | Built-in                       | No                          | No                        | No                                 |\n| Structured audit logging | Built-in, per-transform traces | Basic access logs           | Plugin-based              | Configurable access logs           |\n| Setup complexity         | Single binary + YAML           | Extensive config language   | Python scripting          | Complex YAML or control plane      |\n\niron-proxy is purpose-built for one job: controlling and auditing egress from\nuntrusted workloads. Squid can do default-deny but requires significant ACL\nconfiguration and has no concept of secret injection. mitmproxy is a great\ndebugging tool but isn't designed for production enforcement. Envoy is a\ngeneral-purpose proxy that can be configured to do parts of this, but it's\nfar more complexity than the problem requires.\n\n## How it works\n\niron-proxy runs a DNS server and an HTTP/HTTPS proxy. Point your container's DNS\nat iron-proxy and all hostname lookups resolve to the proxy IP, routing traffic\nthrough it automatically. The proxy terminates TLS (generating leaf certs on the\nfly from a CA you provide), runs the request through an ordered transform\npipeline, forwards it upstream, and runs the response back through the pipeline.\n\n```\nContainer → DNS lookup → iron-proxy IP → TLS termination → transforms → upstream\n```\n\nTransforms run in order. Built-in transforms:\n\n| Transform   | What it does                                                                                                            |\n| ----------- | ----------------------------------------------------------------------------------------------------------------------- |\n| `allowlist` | Permits requests to matching domains/CIDRs; rejects everything else (403).                                              |\n| `secrets`   | Scans headers, query params, and optionally body for proxy tokens and swaps in real secrets from environment variables. |\n\n## Configuration\n\niron-proxy takes a single flag: `-config path/to/config.yaml`. Here's the\nfull shape (see [`iron-proxy.example.yaml`](iron-proxy.example.yaml) for a\ncopy-pasteable starting point):\n\n```yaml\ndns:\n  listen: \":53\"\n  proxy_ip: \"10.16.0.1\" # IP where iron-proxy is running (required)\n  passthrough: # Domains forwarded to OS resolver\n    - \"*.internal.corp\"\n    - \"metadata.google.internal\"\n  records: # Static DNS records (highest precedence)\n    - name: \"internal.example.com\"\n      type: A\n      value: \"10.0.0.5\"\n\nproxy:\n  http_listen: \":80\"\n  https_listen: \":443\"\n  tunnel_listen: \":8080\" # Optional CONNECT/SOCKS5 listener\n  max_request_body_bytes: 1048576 # 1 MiB (default)\n  max_response_body_bytes: 0 # uncapped (default)\n\ntls:\n  ca_cert: \"/etc/iron-proxy/ca.crt\" # Required\n  ca_key: \"/etc/iron-proxy/ca.key\" # Required\n  cert_cache_size: 1000 # LRU cache for generated leaf certs\n  leaf_cert_expiry_hours: 72\n\ntransforms:\n  - name: allowlist\n    config:\n      domains:\n        - \"api.openai.com\"\n        - \"*.anthropic.com\"\n      cidrs:\n        - \"10.0.0.0/8\"\n\n  - name: secrets\n    config:\n      secrets:\n        - source:\n            type: env\n            var: OPENAI_API_KEY # Env var holding the real secret\n          proxy_value: \"proxy-token-123\" # Token the sandbox sends\n          match_headers: [\"Authorization\"]\n          match_body: false\n          require: true # Reject requests without the proxy token\n          rules:\n            - host: \"api.openai.com\"\n\nlog:\n  level: \"info\" # debug, info, warn, error\n```\n\n### DNS\n\nEverything resolves to `proxy_ip` by default, which is what routes traffic\nthrough the proxy. Exceptions:\n\n- **`passthrough`:** glob patterns forwarded to the OS resolver (e.g.,\n  `*.internal.corp`). Traffic to these hosts bypasses the proxy entirely.\n- **`records`:** static A or CNAME records. Highest precedence.\n\n### Allowlist\n\nDefault-deny. Requests must match at least one domain glob or CIDR to proceed.\nUnmatched requests get a `403 Forbidden`.\n\nDomain patterns use glob matching: `*.example.com` matches any subdomain and\n`example.com` itself.\n\n**Warn mode:** Set `warn: true` to observe what the allowlist would block without\nactually enforcing it. Requests that would be rejected are allowed through but\nannotated with `\"action\": \"warn\"` in the transform trace. This is useful for\nrolling out new allowlist rules or auditing existing traffic before switching\nto enforcement.\n\n### Annotate\n\nCaptures HTTP request headers into audit log annotations based on\nhost/method/path rules. This is useful for enriching audit logs with\nrequest-specific context like request IDs without modifying the proxy core.\n\nEach annotation group specifies rules to match and headers to capture. When a\nrequest matches any rule in a group, the specified header values are written as\n`header:<Name>` entries in the transform trace annotations. Requests that don't\nmatch are passed through unchanged. This transform never rejects requests.\n\n> **Warning:** Header values are emitted in plain text in the audit log. Only\n> log headers that are safe to expose, such as request IDs or headers containing\n> proxy secret tokens. Do not log headers that contain raw secrets.\n\n```yaml\ntransforms:\n  - name: annotate\n    config:\n      annotations:\n        - rules:\n            - host: \"api.openai.com\"\n              methods: [\"POST\"]\n              paths: [\"/v1/*\"]\n          headers: [\"x-request-id\"]\n        - rules:\n            - host: \"*.anthropic.com\"\n          headers: [\"x-request-id\"]\n```\n\n### Secrets\n\nThe sandbox never holds real credentials. Instead:\n\n1. Configure iron-proxy with the real secret source: environment variables,\n   AWS Secrets Manager, or AWS Systems Manager Parameter Store.\n2. Give the sandbox a proxy token (e.g., `proxy-openai-abc123`).\n3. Configure the `secrets` transform to map proxy tokens to those sources.\n\niron-proxy scans outbound requests and replaces proxy tokens with the real\nvalues before forwarding upstream. You control where it looks:\n\n- **`match_headers`:** list of header names to scan. Empty list = all headers.\n- **`match_body`:** scan the request body (buffered up to `max_request_body_bytes`).\n- **`require`:** when `true`, requests to a matching host that do **not** contain\n  the proxy token are rejected with 403. This prevents a compromised workload\n  from bypassing the secret-swap mechanism with alternative credentials. Default: `false`.\n- **`hosts`:** restrict swapping to specific domains or CIDRs.\n\nQuery parameters are always scanned.\n\nSecret sources:\n\n- **`env`:** reads `var` from the proxy process environment.\n- **`aws_sm`:** reads `secret_id` from AWS Secrets Manager. Optional `region`,\n  `json_key`, and `ttl` are supported.\n- **`aws_ssm`:** reads `name` from AWS Systems Manager Parameter Store. Optional\n  `region`, `with_decryption`, `json_key`, and `ttl` are supported.\n  `with_decryption` defaults to `true`, which is the expected setting for\n  `SecureString` parameters.\n\n### Body limits\n\nTransforms that inspect or forward request/response bodies (secrets body\nmatching, gRPC transforms) operate on buffered bodies. Two global settings\ncontrol the maximum buffer sizes:\n\n- **`max_request_body_bytes`** (default: `1048576` / 1 MiB): caps how much of\n  the request body is buffered for transforms. Data beyond this limit is\n  truncated from the transform's perspective but still forwarded to upstream.\n- **`max_response_body_bytes`** (default: `0` / uncapped): caps how much of\n  the response body is buffered. Set to `0` to buffer the full response, which\n  is the right default for most workloads (e.g., npm packages, model weights).\n\nBodies are buffered incrementally as transforms read them, and automatically\nrewound between pipeline stages. If a transform doesn't read the body, no\nbuffering occurs and the body streams through untouched.\n\n### Tunnel listener (CONNECT/SOCKS5)\n\nThe tunnel listener accepts HTTP CONNECT and SOCKS5 connections on a\ndedicated port. This is useful for tools that natively support proxy\nconfiguration via `HTTPS_PROXY`/`ALL_PROXY` environment variables or\nSOCKS5 settings, rather than relying on DNS-based routing.\n\nTo enable it, set `tunnel_listen` under `proxy`:\n\n```yaml\nproxy:\n  tunnel_listen: \":8080\"\n```\n\nWhen omitted, the tunnel listener is disabled.\n\nBoth protocols go through the same transform pipeline as regular HTTP/HTTPS\nrequests. The proxy evaluates a synthetic CONNECT request against your\nallowlist and secrets transforms, so tunnel connections are subject to the\nsame default-deny policy.\n\nAfter the CONNECT or SOCKS5 handshake, the proxy peeks at the first byte to\ndetect the inner protocol:\n\n- **TLS (0x16):** performs MITM the same way as the HTTPS listener,\n  generating a leaf cert on the fly so transforms can inspect and rewrite\n  the request.\n- **Plain HTTP:** serves the request directly through the transform\n  pipeline.\n\n**HTTP CONNECT example:**\n\n```bash\ncurl -x http://172.20.0.2:8080 \\\n  --cacert /certs/ca.crt \\\n  https://httpbin.org/get\n```\n\n**SOCKS5 example:**\n\n```bash\ncurl --socks5-hostname 172.20.0.2:8080 \\\n  --cacert /certs/ca.crt \\\n  https://httpbin.org/get\n```\n\nYou can also set the standard environment variables so all tools route\nthrough the tunnel automatically:\n\n```bash\nexport HTTPS_PROXY=http://172.20.0.2:8080\nexport ALL_PROXY=socks5h://172.20.0.2:8080\n```\n\nThe SOCKS5 implementation supports no-auth only and accepts IPv4, IPv6,\nand domain name address types.\n\n### TLS\n\niron-proxy generates leaf certificates on the fly, signed by the CA you provide.\nThe client container must trust this CA (add it to the system trust store or pass\nit via `--cacert`). Certs are cached in an LRU cache keyed by SNI hostname.\n\n## Routing traffic to the proxy\n\nThere are three approaches, with increasing enforcement.\n\n### DNS-based (simple)\n\nPoint the container's DNS at iron-proxy. All lookups resolve to the proxy IP,\nso HTTP/HTTPS traffic flows through it naturally. This is what the\n[Docker Compose example](#docker-compose-example) uses:\n\n```yaml\nservices:\n  client:\n    dns:\n      - 172.20.0.2 # iron-proxy IP\n```\n\nEasy to set up but easy to bypass: the workload can hardcode IPs or use its\nown DNS resolver to skip the proxy entirely.\n\n### DNS + nftables egress firewall (enforced)\n\nLayer an nftables firewall on top of DNS routing. DNS still steers traffic to\nthe proxy, but nftables ensures the workload _can't_ talk to anything else,\neven with hardcoded IPs.\n\nThe [`examples/nftables`](examples/nftables/) directory has a working setup.\nThe client container loads firewall rules on startup before running any\napplication traffic:\n\n**nftables.conf** allows traffic to the proxy, drops everything else:\n\n```\ntable ip iron {\n  chain output {\n    type filter hook output priority 0; policy drop;\n\n    # allow loopback\n    oif lo accept\n\n    # allow traffic to the proxy itself (DNS + HTTP/HTTPS)\n    ip daddr 172.20.0.2 tcp dport { 80, 443 } accept\n    ip daddr 172.20.0.2 udp dport 53 accept\n\n    # allow established/related (return traffic)\n    ct state established,related accept\n\n    # log and drop everything else\n    log prefix \"iron-proxy-drop: \" drop\n  }\n}\n```\n\n**docker-compose.yml:** the client image is built with nftables\npre-installed. The entrypoint loads the rules, then runs the demo.\n`CAP_NET_ADMIN` is required to load the rules:\n\n```yaml\nservices:\n  proxy:\n    # ... same as DNS example ...\n    networks:\n      demo:\n        ipv4_address: 172.20.0.2\n\n  client:\n    build:\n      context: .\n      dockerfile: Dockerfile.client # alpine + curl + nftables\n    dns:\n      - 172.20.0.2\n    cap_add:\n      - NET_ADMIN\n    volumes:\n      - ./nftables.conf:/etc/nftables.conf:ro\n      - certs:/certs:ro\n    networks:\n      demo:\n        ipv4_address: 172.20.0.4\n```\n\nIn a production setup you'd load the rules in an entrypoint wrapper and then\n`exec` your actual process as a non-root user without `CAP_NET_ADMIN`.\n\n### TPROXY (transparent proxy)\n\nFor environments where you can't control the workload's DNS at all, nftables\nTPROXY can redirect traffic at the kernel level without any cooperation from\nthe workload. This intercepts packets in the PREROUTING chain and hands them\ndirectly to iron-proxy:\n\n```\ntable ip iron {\n  chain prerouting {\n    type filter hook prerouting priority mangle; policy accept;\n\n    # redirect HTTP/HTTPS to iron-proxy via TPROXY\n    tcp dport 80 tproxy to 172.20.0.2:80 meta mark set 1 accept\n    tcp dport 443 tproxy to 172.20.0.2:443 meta mark set 1 accept\n  }\n\n  chain output {\n    type route hook output priority mangle; policy accept;\n\n    # mark locally-originated packets for policy routing\n    tcp dport { 80, 443 } meta mark set 1\n  }\n}\n```\n\nThis requires `ip rule` and `ip route` setup to route marked packets to a\nlocal socket, plus iron-proxy must bind with `IP_TRANSPARENT`. This is more\ncomplex to set up but provides the strongest guarantee that traffic can't\nbypass the proxy. TPROXY operates below DNS, so it catches hardcoded IPs,\ncustom resolvers, and anything else the workload might try.\n\n## Docker Compose example\n\nThe [`examples/docker-compose`](examples/docker-compose/) directory contains a\nworking setup. The key pieces:\n\n**docker-compose.yml:** proxy and client on a shared bridge network. Real\nsecrets are set as env vars on the proxy container only:\n\n```yaml\nservices:\n  proxy:\n    build:\n      context: ../..\n      dockerfile: examples/docker-compose/Dockerfile\n    environment:\n      - OPENAI_API_KEY=sk-real-openai-key-do-not-share\n      - INTERNAL_TOKEN=real-internal-secret-value\n    volumes:\n      - certs:/certs\n    networks:\n      demo:\n        ipv4_address: 172.20.0.2\n\n  client:\n    image: alpine:latest\n    dns:\n      - 172.20.0.2 # Point DNS at the proxy\n    volumes:\n      - certs:/certs:ro\n    networks:\n      demo:\n        ipv4_address: 172.20.0.4\n```\n\n**proxy.yaml** allowlists `httpbin.org` and `icanhazip.com`, swaps two\nsecrets:\n\n```yaml\ntransforms:\n  - name: allowlist\n    config:\n      domains:\n        - \"httpbin.org\"\n        - \"icanhazip.com\"\n      cidrs:\n        - \"172.20.0.0/24\"\n\n  - name: secrets\n    config:\n      secrets:\n        - source:\n            type: env\n            var: OPENAI_API_KEY\n          proxy_value: \"proxy-openai-abc123\"\n          match_headers: [\"Authorization\"]\n          rules:\n            - host: \"httpbin.org\"\n\n        - source:\n            type: env\n            var: INTERNAL_TOKEN\n          proxy_value: \"proxy-internal-tok\"\n          match_headers: [] # scan all headers\n          rules:\n            - host: \"httpbin.org\"\n```\n\nThe client script sends five requests to demonstrate each behavior:\n\n```bash\n# 1. Allowed request\ncurl https://httpbin.org/get\n\n# 2. Blocked request (not in allowlist)\ncurl https://example.com/\n\n# 3. Secret swap: proxy token replaced with real key in Authorization header\ncurl -H \"Authorization: Bearer proxy-openai-abc123\" https://httpbin.org/headers\n\n# 4. Secret swap: proxy token in custom header\ncurl -H \"X-Internal: proxy-internal-tok\" https://httpbin.org/headers\n\n# 5. Secret swap: proxy token in query parameter\ncurl \"https://httpbin.org/get?token=proxy-openai-abc123&q=hello\"\n```\n\n## Audit log format\n\nEvery proxied request produces a structured JSON log entry:\n\n```json\n{\n  \"host\": \"httpbin.org\",\n  \"method\": \"GET\",\n  \"path\": \"/headers\",\n  \"action\": \"allow\",\n  \"status_code\": 200,\n  \"duration_ms\": 142,\n  \"request_transforms\": [\n    {\n      \"name\": \"allowlist\",\n      \"action\": \"continue\"\n    },\n    {\n      \"name\": \"secrets\",\n      \"action\": \"continue\",\n      \"annotations\": {\n        \"swapped\": [{ \"secret\": \"OPENAI_API_KEY\", \"locations\": [\"header:Authorization\"] }]\n      }\n    }\n  ],\n  \"response_transforms\": []\n}\n```\n\nRejected requests include a `rejected_by` field and log at WARN level.\n\n## OpenTelemetry export\n\nAudit events can be exported as OpenTelemetry structured log records for\noffline analysis in backends like Axiom, ClickHouse, or Logfire. Set\n`OTEL_EXPORTER_OTLP_ENDPOINT` to enable:\n\n```bash\ndocker run -d --name iron-proxy \\\n  -e OTEL_EXPORTER_OTLP_ENDPOINT=https://logfire-us.pydantic.dev \\\n  -e OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf \\\n  -e OTEL_EXPORTER_OTLP_HEADERS=\"Authorization=Bearer <token>\" \\\n  -e OTEL_SERVICE_NAME=iron-proxy \\\n  -e OTEL_RESOURCE_ATTRIBUTES=\"deployment.environment=staging\" \\\n  # ... other flags ...\n  ironsh/iron-proxy:latest -config /etc/iron-proxy/proxy.yaml\n```\n\nAll configuration uses standard OTEL environment variables:\n\n| Variable                       | Description                                             | Default          |\n| ------------------------------ | ------------------------------------------------------- | ---------------- |\n| `OTEL_EXPORTER_OTLP_ENDPOINT` | OTLP collector URL. OTEL export is disabled when unset. | (disabled)       |\n| `OTEL_EXPORTER_OTLP_PROTOCOL` | `http/protobuf` or `grpc`.                              | `http/protobuf`  |\n| `OTEL_EXPORTER_OTLP_HEADERS`  | Comma-separated `key=value` pairs for auth headers.     | (none)           |\n| `OTEL_SERVICE_NAME`            | Service name attached to all log records.                | `iron-proxy`     |\n| `OTEL_RESOURCE_ATTRIBUTES`    | Comma-separated `key=value` resource attributes.        | (none)           |\n\nWhen enabled, every audit event is emitted as an OTEL log record alongside the\nexisting JSON stderr logs. The log record carries the same schema as the JSON\naudit entry: `host`, `method`, `path`, `action`, `status_code`, `duration_ms`,\nand the full `request_transforms`/`response_transforms` arrays with annotations.\n\n## iron.sh\n\nNeed Vault/KMS secret backends, a Kubernetes operator, or centralized policy\nmanagement? [iron.sh](https://iron.sh) builds on iron-proxy with enterprise\nfeatures for teams running this at scale.\n\n## Verify release signatures\n\nRelease artifacts include a signed checksum manifest:\n\n- `checksums.txt`\n- `checksums.txt.asc` (ASCII-armored detached signature)\n\nUse the included public key at [`public-key.asc`](public-key.asc) to verify:\n\n```bash\n# 1) Download release artifacts for a tag\nTAG=vX.Y.Z\ngh release download \"$TAG\" --pattern \"checksums.txt\" --pattern \"checksums.txt.asc\"\n\n# 2) Import the project signing key\ngpg --import public-key.asc\n\n# 3) Verify the signature over checksums.txt\ngpg --verify checksums.txt.asc checksums.txt\n```\n\nIf verification succeeds, GPG will report a good signature from `Matthew Slipper <matt@iron.sh>`.\n\nYou can optionally inspect the imported key fingerprint and confirm it matches your trusted source before verification.\n\nTo verify a specific binary against the signed checksum list (example: `iron-proxy-linux-amd64`):\n\n```bash\nshasum -a 256 iron-proxy-linux-amd64 | grep -F \"$(grep -F 'iron-proxy-linux-amd64' checksums.txt | awk '{print $1}')\"\n```\n","summary":"Iron‑proxy is a MITM egress proxy that sits between untrusted workloads and the internet, enforcing a default‑deny policy and injecting real secrets only at the boundary while keeping the sandbox free of them. With a built‑in DNS server and support for HTTP, HTTPS, WebSocket, Server‑Sent Events, CONNECT and SOCKS5, it can be configured through a single binary and YAML file and generates detailed, structured JSON audit logs for every request. This lightweight, container‑ready solution is especially useful for CI pipelines, AI coding agents, and any environment that runs code you do not fully trust, giving teams visibility and control over outbound traffic and protecting secrets from exfiltration.","description":"An egress firewall for untrusted workloads.","stars":309,"language":"Go"},{"owner":"k2-fsa","repo":"OmniVoice","url":"https://github.com/k2-fsa/OmniVoice","readme":"# OmniVoice 🌍\n\n<p align=\"center\">\n  <img width=\"200\" height=\"200\" alt=\"OmniVoice\" src=\"https://zhu-han.github.io/omnivoice/pics/omnivoice.jpg\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://huggingface.co/k2-fsa/OmniVoice\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-Model-FFD21E\" alt=\"Hugging Face Model\"></a>\n  &nbsp;\n  <a href=\"https://huggingface.co/spaces/k2-fsa/OmniVoice\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-Space-blue\" alt=\"Hugging Face Space\"></a>\n  &nbsp;\n  <a href=\"https://arxiv.org/abs/2604.00688\"><img src=\"https://img.shields.io/badge/arXiv-Paper-B31B1B.svg\"></a>\n  &nbsp;\n  <a href=\"https://zhu-han.github.io/omnivoice\"><img src=\"https://img.shields.io/badge/GitHub.io-Demo_Page-blue?logo=GitHub&style=flat-square\"></a>\n  &nbsp;\n  <a href=\"https://colab.research.google.com/github/k2-fsa/OmniVoice/blob/master/docs/OmniVoice.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\"></a>\n</p>\n\nOmniVoice is a state-of-the-art massively multilingual zero-shot text-to-speech (TTS) model supporting over 600 languages. Built on a novel diffusion language model-style architecture, it generates high-quality speech with superior inference speed, supporting voice cloning and voice design.\n\n**Contents**: [Key Features](#key-features) | [Installation](#installation) | [Quick Start](#quick-start) | [Python API](#python-api) | [Command-Line Tools](#command-line-tools) | [Training & Evaluation](#training--evaluation) | [Discussion](#discussion--communication) | [Citation](#citation)\n\n## Key Features\n\n- **600+ Languages Supported**: The broadest language coverage among zero-shot TTS models ([full list](docs/languages.md)).\n- **Voice Cloning**: State-of-the-art voice cloning quality.\n- **Voice Design**: Control voices via assigned speaker attributes (gender, age, pitch, dialect/accent, whisper, etc.).\n- **Fine-grained Control**: Non-verbal symbols (e.g., `[laughter]`) and pronunciation correction via pinyin or phonemes.\n- **Fast Inference**: RTF as low as 0.025 (40x faster than real-time).\n- **Diffusion Language Model-style Architecture**: A clean, streamlined, and scalable design that delivers both quality and speed.\n\n---\n\n## Installation\n\nChoose **one** of the following methods: **pip** or **uv**.\n\n### pip\n\n> We recommend using a fresh virtual environment (e.g., `conda`, `venv`, etc.) to avoid conflicts.\n\n**Step 1**: Install PyTorch\n\n<details>\n<summary>NVIDIA GPU</summary>\n\n```bash\n# Install pytorch with your CUDA version, e.g.\npip install torch==2.8.0+cu128 torchaudio==2.8.0+cu128 --extra-index-url https://download.pytorch.org/whl/cu128\n```\n> See [PyTorch official site](https://pytorch.org/get-started/locally/) for other versions installation.\n\n</details>\n\n<details>\n<summary>Apple Silicon</summary>\n\n```bash\npip install torch==2.8.0 torchaudio==2.8.0\n```\n\n</details>\n\n**Step 2**: Install OmniVoice (choose one)\n\n```bash\n# From PyPI (stable release)\npip install omnivoice\n\n# From the latest source on GitHub (no need to clone)\npip install git+https://github.com/k2-fsa/OmniVoice.git\n\n# For development (clone first, editable install)\ngit clone https://github.com/k2-fsa/OmniVoice.git\ncd OmniVoice\npip install -e .\n```\n\n### uv\n\nClone the repository and sync dependencies:\n\n```bash\ngit clone https://github.com/k2-fsa/OmniVoice.git\ncd OmniVoice\nuv sync\n```\n\n> **Tip**: Can use mirror with `uv sync --default-index \"https://mirrors.aliyun.com/pypi/simple\"`\n\n---\n\n## Quick Start\n\nTry OmniVoice without coding:\n\n- Launch the local web UI: `omnivoice-demo --ip 0.0.0.0 --port 8001`\n\n- Or try it directly on [HuggingFace Space](https://huggingface.co/spaces/k2-fsa/OmniVoice)\n\n- Or run it in Google Colab: [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/github/k2-fsa/OmniVoice/blob/master/docs/OmniVoice.ipynb)\n\n> If you have trouble connecting to HuggingFace when downloading the pre-trained models, set `export HF_ENDPOINT=\"https://hf-mirror.com\"` before running.\n\nFor full usage, see the [Python API](#python-api) and [Command-Line Tools](#command-line-tools) sections below.\n\n---\n\n## Python API\n\nOmniVoice supports three generation modes. All features in this section are also available via [command-line tools](#command-line-tools).\n\n### Voice Cloning\n\nClone a voice from a short reference audio. Provide `ref_audio` and `ref_text`:\n\n```python\nfrom omnivoice import OmniVoice\nimport soundfile as sf\nimport torch\n\nmodel = OmniVoice.from_pretrained(\n    \"k2-fsa/OmniVoice\",\n    device_map=\"cuda:0\",\n    dtype=torch.float16\n)\n# Apple Silicon users: use device_map=\"mps\" instead\n\naudio = model.generate(\n    text=\"Hello, this is a test of zero-shot voice cloning.\",\n    ref_audio=\"ref.wav\",\n    ref_text=\"Transcription of the reference audio.\",\n) # audio is a list of `np.ndarray` with shape (T,) at 24 kHz.\n\n# If you don't want to input `ref_text` manually, you can directly omit the `ref_text`.\n# The model will use Whisper ASR to auto-transcribe it.\n\nsf.write(\"out.wav\", audio[0], 24000)\n```\n\n> **Tips**\n>\n> - Use a 3–10 seconds reference audio clip. Longer audio slows down inference and may degrade cloning quality.\n> - For standard pronunciation, use a reference audio in the **same language** as the target speech. In cross-lingual voice cloning (i.e., the reference audio and target speech are in different languages), the generated speech will carry an accent from the reference audio's language.\n> - For better results with Arabic numerals, normalize them to words first (e.g., \"123\" → \"one hundred twenty-three\") with text normalization tools (e.g., [WeTextProcessing](https://github.com/wenet-e2e/WeTextProcessing)).\n>\n> For more tips, see [docs/tips.md](docs/tips.md).\n\n### Voice Design\n\nDescribe the desired voice with speaker attributes — no reference audio needed.\nSupported attributes: **gender** (male/female), **age** (child to elderly),\n**pitch** (very low to very high), **style** (whisper), **English accent**\n(American, British, etc.), and **Chinese dialect** (四川话, 陕西话, etc.).\nAttributes are comma-separated and freely combinable across categories.\n\n```python\naudio = model.generate(\n    text=\"Hello, this is a test of zero-shot voice design.\",\n    instruct=\"female, low pitch, british accent\",\n)\n```\n\n> **Note**: Voice design was trained on Chinese and English data only. It can generalize to other languages, but results can be unstable for some low-resource languages.\n\nSee [docs/voice-design.md](docs/voice-design.md) for the full attribute\nreference, Chinese equivalents, and usage tips.\n\n### Auto Voice\n\nLet the model choose a voice automatically:\n\n```python\naudio = model.generate(text=\"This is a sentence without any voice prompt.\")\n```\n\n### Generation Parameters\n\nAll above three modes share the same `model.generate()` API. You can further control the generation behavior via keyword arguments:\n\n```python\naudio = model.generate(\n    text=\"...\",\n    num_step=32,  # diffusion steps (or 16 for faster inference)\n    speed=1.0,     # speed factor (>1.0 faster, <1.0 slower)\n    duration=10.0, # fixed output duration in seconds (overrides speed)\n    # ... more options\n)\n```\nSee more detailed control in [docs/generation-parameters.md](docs/generation-parameters.md).\n\n### Non-Verbal & Pronunciation Control\n\nOmniVoice supports inline **non-verbal symbols** and **pronunciation correction** within the input text.\n\n**Non-verbal symbols**: Insert tags like `[laughter]` directly in the text to add expressive non-verbal sounds.\n\n```python\naudio = model.generate(text=\"[laughter] You really got me. I didn't see that coming at all.\")\n```\n\nSupported tags: `[laughter]`, `[sigh]`, `[confirmation-en]`, `[question-en]`, `[question-ah]`, `[question-oh]`, `[question-ei]`, `[question-yi]`, `[surprise-ah]`, `[surprise-oh]`, `[surprise-wa]`, `[surprise-yo]`, `[dissatisfaction-hnn]`.\n\n**Pronunciation control (Chinese)**: Use pinyin with tone numbers to correct specific character pronunciations.\n\n```python\naudio = model.generate(text=\"这批货物打ZHE2出售后他严重SHE2本了，再也经不起ZHE1腾了。\")\n```\n\n**Pronunciation control (English)**: Use [CMU pronunciation dictionary](https://svn.code.sf.net/p/cmusphinx/code/trunk/cmudict/cmudict.0.7a)  (uppercase, in brackets) to override default English pronunciations.\n\n```python\naudio = model.generate(text=\"He plays the [B EY1 S] guitar while catching a [B AE1 S] fish.\")\n```\n\n---\n\n## Command-Line Tools\n\nThree CLI entry points are provided. The CLI tools support all features available in the Python API (voice cloning, voice design, auto voice, generation parameters, etc.) — all controlled via command-line arguments.\n\n| Command | Description | Source |\n|---|---|---|\n| `omnivoice-demo` | Interactive Gradio web demo | [omnivoice/cli/demo.py](omnivoice/cli/demo.py) |\n| `omnivoice-infer` | Single-item inference | [omnivoice/cli/infer.py](omnivoice/cli/infer.py) |\n| `omnivoice-infer-batch` | Batch inference across multiple GPUs | [omnivoice/cli/infer_batch.py](omnivoice/cli/infer_batch.py) |\n\n### Demo\n\n```bash\nomnivoice-demo --ip 0.0.0.0 --port 8001\n```\n\nProvides a web UI for voice cloning and voice design. See `omnivoice-demo --help` for all options.\n\n### Single Inference\n\n```bash\n# Voice Cloning\n# ref_text can be omitted (Whisper will auto-transcribe ref_audio to get it).\nomnivoice-infer \\\n    --model k2-fsa/OmniVoice \\\n    --text \"This is a test for text to speech.\" \\\n    --ref_audio ref.wav \\\n    --ref_text \"Transcription of the reference audio.\" \\\n    --output hello.wav\n\n# Voice Design\nomnivoice-infer --model k2-fsa/OmniVoice \\\n    --text \"This is a test for text to speech.\" \\\n    --instruct \"male, British accent\" \\\n    --output hello.wav\n\n# Auto Voice\nomnivoice-infer \\\n    --model k2-fsa/OmniVoice \\\n    --text \"This is a test for text to speech.\"\\\n    --output hello.wav\n```\n\n### Batch Inference\n\n`omnivoice-infer-batch` can distribute batch inference across multiple GPUs, designed for large-scale TTS tasks.\n\n```bash\nomnivoice-infer-batch \\\n    --model k2-fsa/OmniVoice \\\n    --test_list test.jsonl \\\n    --res_dir results/\n```\n\nThe test list is a JSONL file where each line is a JSON object:\n```json\n{\"id\": \"sample_001\", \"text\": \"Hello world\", \"ref_audio\": \"/path/to/ref.wav\", \"ref_text\": \"Reference transcript\", \"instruct\": \"female, british accent\", \"language_id\": \"en\", \"duration\": 10.0, \"speed\": 1.0}\n```\nOnly `id` and `text` are mandatory fields. `ref_audio` and `ref_text` are used in voice cloning mode. `instruct` is used in voice design mode. If no reference audio or instruct are provided, the model will generate text in a random voice.\n\n`language_id`, `duration`, and `speed` are optional. `duration` (in seconds) fixes the output length; `speed` controls the speaking rate. If `duration` and `speed` are both provided, `speed` will be ignored.\n\n---\n\n## Training & Evaluation\n\nSee [examples/](examples/) for the complete pipeline — from data preparation to training, evaluation, and finetuning.\n\n---\n\n## Discussion & Communication\n\nYou can directly discuss on [GitHub Issues](https://github.com/k2-fsa/OmniVoice/issues).\n\nYou can also scan the QR code to join our wechat group or follow our wechat official account.\n\n| Wechat Group | Wechat Official Account |\n| ------------ | ----------------------- |\n|![wechat](https://k2-fsa.org/zh-CN/assets/pic/wechat_group.jpg) |![wechat](https://k2-fsa.org/zh-CN/assets/pic/wechat_account.jpg) |\n\n---\n\n## Community Projects\n\n- **[omnivoice-server](https://github.com/maemreyo/omnivoice-server)** —\n  OpenAI-compatible HTTP server for serving OmniVoice via `/v1/audio/speech`.\n  Supports voice profiles for persistent cloning, sentence-level streaming,\n  and optional Bearer auth.\n\n- **[omnivoice-rs](https://github.com/FerrisMind/omnivoice-rs)** —\n  GPU-first Rust workspace for OmniVoice inference, parity validation, CLI\n  execution, and an OpenAI-compatible HTTP server built with Candle.\n\n---\n\n## Citation\n\n```bibtex\n@article{zhu2026omnivoice,\n      title={OmniVoice: Towards Omnilingual Zero-Shot Text-to-Speech with Diffusion Language Models},\n      author={Zhu, Han and Ye, Lingxuan and Kang, Wei and Yao, Zengwei and Guo, Liyong and Kuang, Fangjun and Han, Zhifeng and Zhuang, Weiji and Lin, Long and Povey, Daniel},\n      journal={arXiv preprint arXiv:2604.00688},\n      year={2026}\n}\n```\n","summary":"OmniVoice is a zero‑shot text‑to‑speech system that can synthesize natural speech in more than 600 languages, making it the most widely supported multilingual TTS model to date. Built with a diffusion‑language‑model architecture, it delivers high‑quality audio at speeds as low as 0.025× realtime and offers advanced voice‑cloning fidelity, fine‑grained control of speaker style (gender, age, accent, whisper, etc.), and support for non‑verbal tokens and pronunciation correction. The package provides a lightweight Python API and command‑line tools, along with a web UI and Hugging Face Space, allowing researchers, developers, and content creators to readily prototype or deploy multilingual voices for virtual assistants, audiobooks, or any application that needs instant, expressive speech synthesis.","description":"High-Quality Voice Cloning TTS for 600+ Languages","stars":3829,"language":"Python"},{"owner":"nesquena","repo":"hermes-webui","url":"https://github.com/nesquena/hermes-webui","readme":"# Hermes Web UI\n\n[Hermes Agent](https://hermes-agent.nousresearch.com/) is a sophisticated autonomous agent that lives on your server, accessed via a terminal or messaging apps, that remembers what it learns and gets more capable the longer it runs.\n\nHermes WebUI is a lightweight, dark-themed web app interface in your browser for [Hermes Agent](https://hermes-agent.nousresearch.com/).\nFull parity with the CLI experience - everything you can do from a terminal,\nyou can do from this UI. No build step, no framework, no bundler. Just Python\nand vanilla JS.\n\nLayout: three-panel. Left sidebar for sessions and navigation, center for chat,\nright for workspace file browsing. Model, profile, and workspace controls live in\nthe **composer footer** — always visible while composing. A circular context ring\nshows token usage at a glance. All settings and session tools are in the\n**Hermes Control Center** (launcher at the sidebar bottom).\n\n<img width=\"2448\" height=\"1748\" alt=\"Hermes Web UI — three-panel layout\" src=\"https://github.com/user-attachments/assets/6bf8af4c-209d-441e-8b92-6515d7a0c369\" />\n\n<table>\n  <tr>\n    <td width=\"50%\" align=\"center\">\n      <img width=\"2940\" height=\"1848\" alt=\"Light mode with full profile support\" src=\"https://github.com/user-attachments/assets/4ef3a59c-7a66-4705-b4e7-cb9148fe4c47\" />\n      <br /><sub>Light mode with full profile support</sub>\n    </td>\n    <td width=\"50%\" align=\"center\">\n      <img alt=\"Customize your settings, configure a password\" src=\"https://github.com/user-attachments/assets/941f3156-21e3-41fd-bcc8-f975d5000cb8\" />\n      <br /><sub>Customize your settings, configure a password</sub>\n    </td>\n  </tr>\n</table>\n\n<table>\n  <tr>\n    <td width=\"50%\" align=\"center\">\n      <img alt=\"Workspace file browser with inline preview\" src=\"docs/images/ui-workspace.png\" />\n      <br /><sub>Workspace file browser with inline preview</sub>\n    </td>\n    <td width=\"50%\" align=\"center\">\n      <img alt=\"Session projects, tags, and tool call cards\" src=\"docs/images/ui-sessions.png\" />\n      <br /><sub>Session projects, tags, and tool call cards</sub>\n    </td>\n  </tr>\n</table>\n\nThis gives you nearly **1:1 parity with Hermes CLI from a convenient web UI** which you can access securely through an SSH tunnel from your Hermes setup. Single command to start this up, and a single command to SSH tunnel for access on your computer. Every single part of the web UI uses your existing Hermes agent and existing models, without requiring any additional setup.\n\n---\n\n## Why Hermes\n\nMost AI tools reset every session. They don't know who you are, what you worked on, or what\nconventions your project follows. You re-explain yourself every time.\n\nHermes retains context across sessions, runs scheduled jobs while you're offline, and gets\nsmarter about your environment the longer it runs. It uses your existing Hermes agent setup,\nyour existing models, and requires no additional configuration to start.\n\nWhat makes it different from other agentic tools:\n\n- **Persistent memory** — user profile, agent notes, and a skills system that saves reusable\n  procedures; Hermes learns your environment and does not have to relearn it\n- **Self-hosted scheduling** — cron jobs that fire while you're offline and deliver results to\n  Telegram, Discord, Slack, Signal, email, and more\n- **10+ messaging platforms** — the same agent available in the terminal is reachable from your phone\n- **Self-improving skills** — Hermes writes and saves its own skills automatically from experience;\n  no marketplace to browse, no plugins to install\n- **Provider-agnostic** — OpenAI, Anthropic, Google, DeepSeek, OpenRouter, and more\n- **Orchestrates other agents** — can spawn Claude Code or Codex for heavy coding tasks and bring\n  the results back into its own memory\n- **Self-hosted** — your conversations, your memory, your hardware\n\n**vs. the field** *(landscape is actively shifting — see [HERMES.md](HERMES.md) for the full breakdown)*:\n\n| | OpenClaw | Claude Code | Codex CLI | OpenCode | Hermes |\n|---|---|---|---|---|---|\n| Persistent memory (auto) | Yes | Partial† | Partial | Partial | Yes |\n| Scheduled jobs (self-hosted) | Yes | No‡ | No | No | Yes |\n| Messaging app access | Yes (15+ platforms) | Partial (Telegram/Discord preview) | No | No | Yes (10+) |\n| Web UI (self-hosted) | Dashboard only | No | No | Yes | Yes |\n| Self-improving skills | Partial | No | No | No | Yes |\n| Python / ML ecosystem | No (Node.js) | No | No | No | Yes |\n| Provider-agnostic | Yes | No (Claude only) | Yes | Yes | Yes |\n| Open source | Yes (MIT) | No | Yes | Yes | Yes |\n\n† Claude Code has CLAUDE.md / MEMORY.md project context and rolling auto-memory, but not full automatic cross-session recall  \n‡ Claude Code has cloud-managed scheduling (Anthropic infrastructure) and session-scoped `/loop`; no self-hosted cron\n\n**The closest competitor is OpenClaw** — both are always-on, self-hosted, open-source agents\nwith memory, cron, and messaging. The key differences: Hermes writes and saves its own skills\nautomatically as a core behavior (OpenClaw's skill system centers on a community marketplace);\nHermes is more stable across updates (OpenClaw has documented release regressions and ClawHub\nhas had security incidents involving malicious skills); and Hermes runs natively in the Python\necosystem. See [HERMES.md](HERMES.md) for the full side-by-side.\n\n---\n\n## Quick start\n\nRun the repo bootstrap:\n\n```bash\ngit clone https://github.com/nesquena/hermes-webui.git hermes-webui\ncd hermes-webui\npython3 bootstrap.py\n```\n\nOr keep using the shell launcher:\n\n```bash\n./start.sh\n```\n\nThe bootstrap will:\n\n1. Detect Hermes Agent and, if missing, attempt the official installer (`curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash`).\n2. Find or create a Python environment with the WebUI dependencies.\n3. Start the web server and wait for `/health`.\n4. Open the browser unless you pass `--no-browser`.\n5. Drop you into a first-run onboarding wizard inside the WebUI.\n\n> Native Windows is not supported for this bootstrap yet. Use Linux, macOS, or WSL2.\n\nIf provider setup is still incomplete after install, the onboarding wizard will point you to finish it with `hermes model` instead of trying to replicate the full CLI setup in-browser.\n\n---\n\n## Docker\n\n**Pre-built images** (amd64 + arm64) are published to GHCR on every release:\n\nMake sure the `HERMES_WEBUI_STATE_DIR` (by default `~/.hermes/webui-mvp`, as detailed in the `.env.example` file) folder exist with the UID/GID of the owner of the `.hermes` folder. \nThe container will also mount your configured \"workspace\" (also from the example .env.example) as `/workspace`. adapt the location as needed.\n\n\n```bash\ndocker pull ghcr.io/nesquena/hermes-webui:latest\ndocker run -d \\\n-e WANTED_UID=`id -u` -e WANTED_GID=`id -g` \\\n-v ~/.hermes:/home/hermeswebui/.hermes -e HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-mvp \\\n-v ~/workspace:/workspace \\\n-p 8787:8787 ghcr.io/nesquena/hermes-webui:latest\n```\n\nOr run with Docker Compose (recommended):\n\n```bash\n# Check the docker-compose.yml and make sure to adapt as needed, at minimum WANTED_UID/WANTED_GID\ndocker compose up -d\n```\n\nOr build locally:\n\n```bash\ndocker build -t hermes-webui .\ndocker run -d \\\n-e WANTED_UID=`id -u` -e WANTED_GID=`id -g` \\\n-v ~/.hermes:/home/hermeswebui/.hermes -e HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-mvp \\\n-v ~/workspace:/workspace \\\n-p 8787:8787 hermes-webui\n```\n\nOpen http://localhost:8787 in your browser.\n\nTo enable password protection:\n\n```bash\ndocker run -d \\\n-e WANTED_UID=`id -u` -e WANTED_GID=`id -g` \\\n-v ~/.hermes:/home/hermeswebui/.hermes -e HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui-mvp \\\n-v ~/workspace:/workspace \\\n-p 8787:8787 -e HERMES_WEBUI_PASSWORD=your-secret ghcr.io/nesquena/hermes-webui:latest\n```\n\n> **Note:** By default, Docker Compose binds to `127.0.0.1` (localhost only).\n> To expose on a network, change the port to `\"8787:8787\"` in `docker-compose.yml`\n> and set `HERMES_WEBUI_PASSWORD` to enable authentication.\n\n### Two-container setup (Agent + WebUI)\n\nIf you run the Hermes Agent in its own Docker container and want the WebUI\nin a separate container:\n\n```bash\ndocker compose -f docker-compose.two-container.yml up -d\n```\n\nThis starts both containers with shared volumes:\n\n- **`hermes-home`** — shared `~/.hermes` for config, sessions, skills, memory\n- **`hermes-agent-src`** — the agent's source code, mounted into the WebUI\n  container so it can install the agent's Python dependencies at startup\n\nThe WebUI's init script automatically installs hermes-agent and all its\ndependencies (openai, anthropic, etc.) into its own Python environment on\nfirst boot. Subsequent restarts reuse the installed packages.\n\n> **How it works:** The WebUI imports hermes-agent's Python modules directly\n> (not via HTTP). The shared volume makes the agent source available, and\n> the init script runs `uv pip install` to set up the dependencies. Both\n> containers share the same `~/.hermes` directory for config and state.\n\nSee `docker-compose.two-container.yml` for the full configuration.\n\n---\n\n## What start.sh discovers automatically\n\n| Thing | How it finds it |\n|---|---|\n| Hermes agent dir | `HERMES_WEBUI_AGENT_DIR` env, then `~/.hermes/hermes-agent`, then sibling `../hermes-agent` |\n| Python executable | Agent venv first, then `.venv` in this repo, then system `python3` |\n| State directory | `HERMES_WEBUI_STATE_DIR` env, then `~/.hermes/webui-mvp` |\n| Default workspace | `HERMES_WEBUI_DEFAULT_WORKSPACE` env, then `~/workspace`, then state dir |\n| Port | `HERMES_WEBUI_PORT` env or first argument, default `8787` |\n\nIf discovery finds everything, nothing else is required.\n\n---\n\n## Overrides (only needed if auto-detection misses)\n\n```bash\nexport HERMES_WEBUI_AGENT_DIR=/path/to/hermes-agent\nexport HERMES_WEBUI_PYTHON=/path/to/python\nexport HERMES_WEBUI_PORT=9000\n./start.sh\n```\n\nOr inline:\n\n```bash\nHERMES_WEBUI_AGENT_DIR=/custom/path ./start.sh 9000\n```\n\nFull list of environment variables:\n\n| Variable | Default | Description |\n|---|---|---|\n| `HERMES_WEBUI_AGENT_DIR` | auto-discovered | Path to the hermes-agent checkout |\n| `HERMES_WEBUI_PYTHON` | auto-discovered | Python executable |\n| `HERMES_WEBUI_HOST` | `127.0.0.1` | Bind address |\n| `HERMES_WEBUI_PORT` | `8787` | Port |\n| `HERMES_WEBUI_STATE_DIR` | `~/.hermes/webui-mvp` | Where sessions and state are stored |\n| `HERMES_WEBUI_DEFAULT_WORKSPACE` | `~/workspace` | Default workspace |\n| `HERMES_WEBUI_DEFAULT_MODEL` | `openai/gpt-5.4-mini` | Default model |\n| `HERMES_WEBUI_PASSWORD` | *(unset)* | Set to enable password authentication |\n| `HERMES_HOME` | `~/.hermes` | Base directory for Hermes state (affects all paths) |\n| `HERMES_CONFIG_PATH` | `~/.hermes/config.yaml` | Path to Hermes config file |\n\n---\n\n## Accessing from a remote machine\n\nThe server binds to `127.0.0.1` by default (loopback only). If you are running\nHermes on a VPS or remote server, use an SSH tunnel from your local machine:\n\n```bash\nssh -N -L <local-port>:127.0.0.1:<remote-port> <user>@<server-host>\n```\n\nExample:\n\n```bash\nssh -N -L 8787:127.0.0.1:8787 user@your.server.com\n```\n\nThen open `http://localhost:8787` in your local browser.\n\n`start.sh` will print this command for you automatically when it detects you\nare running over SSH.\n\n---\n\n## Accessing on your phone with Tailscale\n\n[Tailscale](https://tailscale.com) is a zero-config mesh VPN built on\nWireGuard. Install it on your server and your phone, and they join the same\nprivate network -- no port forwarding, no SSH tunnels, no public exposure.\n\nThe Hermes Web UI is fully responsive with a mobile-optimized layout\n(hamburger sidebar, sidebar top tabs in the drawer, touch-friendly controls),\nso it works well as a daily-driver agent interface from your phone.\n\n**Setup:**\n\n1. Install [Tailscale](https://tailscale.com/download) on your server and\n   your iPhone/Android.\n2. Start the WebUI listening on all interfaces with password auth enabled:\n\n```bash\nHERMES_WEBUI_HOST=0.0.0.0 HERMES_WEBUI_PASSWORD=your-secret ./start.sh\n```\n\n3. Open `http://<server-tailscale-ip>:8787` in your phone's browser\n   (find your server's Tailscale IP in the Tailscale app or with\n   `tailscale ip -4` on the server).\n\nThat's it. Traffic is encrypted end-to-end by WireGuard, and password auth\nprotects the UI at the application level. You can add it to your home screen\nfor an app-like experience.\n\n> **Tip:** If using Docker, set `HERMES_WEBUI_HOST=0.0.0.0` in your\n> `docker-compose.yml` environment (already the default) and set\n> `HERMES_WEBUI_PASSWORD`.\n\n---\n\n## Manual launch (without start.sh)\n\nIf you prefer to launch the server directly:\n\n```bash\ncd /path/to/hermes-agent          # or wherever sys.path can find Hermes modules\nHERMES_WEBUI_PORT=8787 venv/bin/python /path/to/hermes-webui/server.py\n```\n\nNote: use the agent venv Python (or any Python environment that has the Hermes agent dependencies installed). System Python will be missing `openai`, `httpx`, and other required packages.\n\nHealth check:\n\n```bash\ncurl http://127.0.0.1:8787/health\n```\n\n---\n\n## Running tests\n\nTests discover the repo and the Hermes agent dynamically -- no hardcoded paths.\n\n```bash\ncd hermes-webui\npytest tests/ -v --timeout=60\n```\n\nOr using the agent venv explicitly:\n\n```bash\n/path/to/hermes-agent/venv/bin/python -m pytest tests/ -v\n```\n\nTests run against an isolated server on port 8788 with a separate state directory.\nProduction data and real cron jobs are never touched. Current count: **961 tests**\nacross 53 test files.\n\n---\n\n## Features\n\n### Chat and agent\n- Streaming responses via SSE (tokens appear as they are generated)\n- Multi-provider model support -- any Hermes API provider (OpenAI, Anthropic, Google, DeepSeek, Nous Portal, OpenRouter, MiniMax, Z.AI); dynamic model dropdown populated from configured keys\n- Send a message while one is processing -- it queues automatically\n- Edit any past user message inline and regenerate from that point\n- Retry the last assistant response with one click\n- Cancel a running task directly from the composer footer (Stop button next to Send)\n- Tool call cards inline -- each shows the tool name, args, and result snippet; expand/collapse all toggle for multi-tool turns\n- Subagent delegation cards -- child agent activity shown with distinct icon and indented border\n- Mermaid diagram rendering inline (flowcharts, sequence diagrams, gantt charts)\n- Thinking/reasoning display -- collapsible gold-themed cards for Claude extended thinking and o3 reasoning blocks\n- Approval card for dangerous shell commands (allow once / session / always / deny)\n- SSE auto-reconnect on network blips (SSH tunnel resilience)\n- File attachments persist across page reloads\n- Message timestamps (HH:MM next to each message, full date on hover)\n- Code block copy button with \"Copied!\" feedback\n- Syntax highlighting via Prism.js (Python, JS, bash, JSON, SQL, and more)\n- Safe HTML rendering in AI responses (bold, italic, code converted to markdown)\n- rAF-throttled token streaming for smoother rendering during long responses\n- Context usage indicator in composer footer -- token count, cost, and fill bar (model-aware)\n\n### Sessions\n- Create, rename, duplicate, delete, search by title and message content\n- Session actions via `⋯` dropdown per session — pin, move to project, archive, duplicate, delete\n- Pin/star sessions to the top of the sidebar (gold indicator)\n- Archive sessions (hide without deleting, toggle to show)\n- Session projects -- named groups with colors for organizing sessions\n- Session tags -- add #tag to titles for colored chips and click-to-filter\n- Grouped by Today / Yesterday / Earlier in the sidebar (collapsible date groups)\n- Download as Markdown transcript, full JSON export, or import from JSON\n- Sessions persist across page reloads and SSH tunnel reconnects\n- Browser tab title reflects the active session name\n- CLI session bridge -- CLI sessions from hermes-agent's SQLite store appear in the sidebar with a gold \"cli\" badge; click to import with full history and reply normally\n- Token/cost display -- input tokens, output tokens, estimated cost shown per conversation (toggle in Settings or `/usage` command)\n\n### Workspace file browser\n- Directory tree with expand/collapse (single-click toggles, double-click navigates)\n- Breadcrumb navigation with clickable path segments\n- Preview text, code, Markdown (rendered), and images inline\n- Edit, create, delete, and rename files; create folders\n- Binary file download (auto-detected from server)\n- File preview auto-closes on directory navigation (with unsaved-edit guard)\n- Git detection -- branch name and dirty file count badge in workspace header\n- Right panel is drag-resizable\n- Syntax highlighted code preview (Prism.js)\n\n### Voice input\n- Microphone button in the composer (Web Speech API)\n- Tap to record, tap again or send to stop\n- Live interim transcription appears in the textarea\n- Auto-stops after ~2s of silence\n- Appends to existing textarea content (doesn't replace)\n- Hidden when browser doesn't support Web Speech API (Chrome, Edge, Safari)\n\n### Profiles\n- Profile chip in the **composer footer** -- dropdown showing all profiles with gateway status and model info\n- Gateway status dots (green = running), model info, skill count per profile\n- Profiles management panel -- create, switch, and delete profiles from the sidebar\n- Clone config from active profile on create\n- Optional custom endpoint fields on create -- Base URL and API key written into the profile's `config.yaml` at creation time, so Ollama, LMStudio, and other local endpoints can be configured without editing files manually\n- Seamless switching -- no server restart; reloads config, skills, memory, cron, models\n- Per-session profile tracking (records which profile was active at creation)\n\n### Authentication and security\n- Optional password auth -- off by default, zero friction for localhost\n- Enable via `HERMES_WEBUI_PASSWORD` env var or Settings panel\n- Signed HMAC HTTP-only cookie with 24h TTL\n- Minimal dark-themed login page at `/login`\n- Security headers on all responses (X-Content-Type-Options, X-Frame-Options, Referrer-Policy)\n- 20MB POST body size limit\n- CDN resources pinned with SRI integrity hashes\n\n### Themes\n- 7 built-in themes: Dark (default), Light, Slate, Solarized Dark, Monokai, Nord, OLED\n- Switch via Settings panel dropdown (instant live preview) or `/theme` command\n- Persists across reloads (server-side in settings.json + localStorage for flicker-free loading)\n- Custom themes: define a `:root[data-theme=\"name\"]` CSS block and it works — see [THEMES.md](THEMES.md)\n\n### Settings and configuration\n- **Hermes Control Center** (sidebar launcher button) -- Conversation tab (export/import/clear), Preferences tab (model, send key, theme, language, all toggles), System tab (version, password)\n- Send key: Enter (default) or Ctrl/Cmd+Enter\n- Show/hide CLI sessions toggle (enabled by default)\n- Token usage display toggle (off by default, also via `/usage` command)\n- Control Center always opens on the Conversation tab; resets on close\n- Unsaved changes guard -- discard/save prompt when closing with unpersisted changes\n- Cron completion alerts -- toast notifications and unread badge on Tasks tab\n- Background agent error alerts -- banner when a non-active session encounters an error\n\n### Slash commands\n- Type `/` in the composer for autocomplete dropdown\n- Built-in: `/help`, `/clear`, `/compress [focus topic]`, `/compact` (alias), `/model <name>`, `/workspace <name>`, `/new`, `/usage`, `/theme`\n- Arrow keys navigate, Tab/Enter select, Escape closes\n- Unrecognized commands pass through to the agent\n\n### Panels\n- **Chat** -- session list, search, pin, archive, projects, new conversation\n- **Tasks** -- view, create, edit, run, pause/resume, delete cron jobs; run history; completion alerts\n- **Skills** -- list all skills by category, search, preview, create/edit/delete; linked files viewer\n- **Memory** -- view and edit MEMORY.md and USER.md inline\n- **Profiles** -- create, switch, delete agent profiles; clone config\n- **Todos** -- live task list from the current session\n- **Spaces** -- add, rename, remove workspaces; quick-switch from topbar\n\n### Mobile responsive\n- Hamburger sidebar -- slide-in overlay on mobile (<640px)\n- Sidebar top tabs stay available on mobile; no fixed bottom nav stealing chat height\n- Files slide-over panel from right edge\n- Touch targets minimum 44px on all interactive elements\n- Full-height chat/composer on phones without bottom-nav spacing\n- Desktop layout completely unchanged\n\n---\n\n## Architecture\n\n```\nserver.py               HTTP routing shell + auth middleware (~154 lines)\napi/\n  auth.py               Optional password authentication, signed cookies (~201 lines)\n  config.py             Discovery, globals, model detection, reloadable config (~1110 lines)\n  helpers.py            HTTP helpers, security headers (~175 lines)\n  models.py             Session model + CRUD + CLI bridge (~377 lines)\n  onboarding.py         First-run onboarding wizard, OAuth provider support (~507 lines)\n  profiles.py           Profile state management, hermes_cli wrapper (~411 lines)\n  routes.py             All GET + POST route handlers (~2250 lines)\n  state_sync.py         /insights sync — message_count to state.db (~113 lines)\n  streaming.py          SSE engine, run_agent, cancel support (~660 lines)\n  updates.py            Self-update check and release notes (~257 lines)\n  upload.py             Multipart parser, file upload handler (~82 lines)\n  workspace.py          File ops, workspace helpers, git detection (~288 lines)\nstatic/\n  index.html            HTML template (~600 lines)\n  style.css             All CSS incl. mobile responsive, themes (~1050 lines)\n  ui.js                 DOM helpers, renderMd, tool cards, context indicator (~1740 lines)\n  workspace.js          File preview, file ops, git badge (~286 lines)\n  sessions.js           Session CRUD, collapsible groups, search, reload recovery (~800 lines)\n  messages.js           send(), SSE handlers, live streaming, session recovery (~655 lines)\n  panels.js             Cron, skills, memory, profiles, settings (~1438 lines)\n  commands.js           Slash command autocomplete (~267 lines)\n  boot.js               Mobile nav, voice input, boot IIFE (~524 lines)\ntests/\n  conftest.py           Isolated test server (port 8788)\n  61 test files          961 test functions\nDockerfile              python:3.12-slim container image\ndocker-compose.yml      Compose with named volume and optional auth\n.github/workflows/      CI: multi-arch Docker build + GitHub Release on tag\n```\n\nState lives outside the repo at `~/.hermes/webui-mvp/` by default\n(sessions, workspaces, settings, projects, last_workspace). Override with `HERMES_WEBUI_STATE_DIR`.\n\n---\n\n## Docs\n\n- `HERMES.md` -- why Hermes, mental model, and detailed comparison to Claude Code / Codex / OpenCode / Cursor\n- `ROADMAP.md` -- feature roadmap and sprint history\n- `ARCHITECTURE.md` -- system design, all API endpoints, implementation notes\n- `TESTING.md` -- manual browser test plan and automated coverage reference\n- `CHANGELOG.md` -- release notes per sprint\n- `SPRINTS.md` -- forward sprint plan with CLI + Claude parity targets\n- `THEMES.md` -- theme system documentation, custom theme guide\n\n## Contributors\n\nHermes WebUI is built with help from the open-source community. Every PR — whether merged directly or incorporated via rebase — shapes the project, and we're grateful to everyone who has taken the time to contribute.\n\n### Major contributions\n\n**[@aronprins](https://github.com/aronprins)** — v0.50.0 UI overhaul (PR #242)\nThe biggest single contribution to the project: a complete UI redesign that moved model/profile/workspace controls into the composer footer, replaced the gear-icon settings panel with the Hermes Control Center (tabbed modal), removed the activity bar in favor of inline composer status, redesigned the session list with a `⋯` action dropdown, and added the workspace panel state machine. 26 commits, thoroughly designed and iterated through multiple review rounds.\n\n**[@iRonin](https://github.com/iRonin)** — Security hardening sprint (PRs #196–#204)\nSix consecutive security and reliability PRs: session memory leak fix (expired token pruning), Content-Security-Policy + Permissions-Policy headers, 30-second slow-client connection timeout, optional HTTPS/TLS support via environment variables, upstream branch tracking fix for self-update, and CLI session support in the file browser API. This is the kind of focused, high-quality security work that makes a self-hosted tool trustworthy.\n\n**[@DavidSchuchert](https://github.com/DavidSchuchert)** — German translation (PR #190)\nComplete German locale (`de`) covering all UI strings, settings labels, commands, and system messages — and in doing so, stress-tested the i18n system and exposed several elements that weren't yet translatable, which got fixed as part of the same PR.\n\n**[@Jordan-SkyLF](https://github.com/Jordan-SkyLF)** — Live streaming, session recovery, workspace fallback (PRs #366, #367)\nThree interlocking improvements: workspace fallback resolution so the server recovers gracefully when the configured workspace is deleted or unavailable; live reasoning cards that upgrade the generic thinking spinner to a real-time reasoning display as the model thinks; and durable session state recovery via `localStorage` so in-flight tool cards, partial assistant output, and the live SSE stream all survive a full page reload or session switch.\n\n### Feature contributions\n\n**[@gabogabucho](https://github.com/gabogabucho)** — Spanish locale + onboarding wizard (PRs #275, #285)\nFull Spanish (`es`) locale covering all 175 UI strings, plus the one-shot bootstrap onboarding wizard that guides new users through provider setup on first launch — the feature most responsible for new users actually getting started.\n\n**[@bergeouss](https://github.com/bergeouss)** — Real-time gateway session sync (PR #274)\nBridged the gateway session database (Telegram, Discord, Slack, etc.) into the WebUI sidebar with live SSE polling. Gateway sessions now appear alongside WebUI sessions in real time, without any changes to hermes-agent.\n\n**[@ccqqlo](https://github.com/ccqqlo)** — Terminal approval UX + custom model discovery + mobile close button (PRs #224, #225, #238, #333)\nA run of focused quality-of-life improvements: terminal tool approval prompts that stay visible long enough to actually be read, restored custom model API key discovery, and the redundant mobile close button fix that had been confusing users on narrow screens.\n\n**[@kevin-ho](https://github.com/kevin-ho)** — OLED theme (PR #168)\nAdded the 7th built-in theme: pure black backgrounds with warm accents tuned to reduce burn-in risk. Small diff, big impact for anyone on an OLED display.\n\n**[@Bobby9228](https://github.com/Bobby9228)** — Mobile Profiles button + Android Chrome fixes (PRs #253, #263, #265)\nAdded the Profiles entry to the mobile navigation flow, making profile switching reachable on phones, plus a set of Android Chrome-specific fixes for the profile dropdown.\n\n**[@franksong2702](https://github.com/franksong2702)** — Session title guard + breadcrumb nav (PRs #301, #302)\nTwo clean bug fixes / features: the session title guard that stops `title_from()` from overwriting user-renamed sessions after every turn, and clickable breadcrumb navigation in the workspace file preview panel.\n\n**[@betamod](https://github.com/betamod)** — Security hardening (PR #171)\nA comprehensive security audit PR covering CSRF protection, SSRF guards, XSS escaping improvements, and the env race condition between concurrent agent sessions — foundational security work that shipped in v0.39.0.\n\n**[@TaraTheStar](https://github.com/TaraTheStar)** — Bot name + thinking blocks + login refactor (PRs #132, #176, #181)\nMade the assistant display name configurable throughout the UI, added thinking/reasoning block display in chat, and refactored the login page to use template variables instead of inline string replacement.\n\n**[@thadreber-web](https://github.com/thadreber-web)** — CLI session bridge (PR #56)\nThe original CLI session bridge: reads CLI sessions from the agent's SQLite state store and surfaces them in the WebUI sidebar. This was the first bridge between the CLI and WebUI session worlds.\n\n**[@deboste](https://github.com/deboste)** — Reverse proxy auth + mobile responsive layout + model routing (PRs #3, #4, #5)\nThree of the very first community PRs: fixed EventSource/fetch to use the URL origin for reverse proxy setups, corrected model provider routing from config, and added mobile responsive layout with dvh viewport fix. Early foundation work.\n\n### Bug fix and security contributions\n\n**[@Hinotoi-agent](https://github.com/Hinotoi-agent)** — Profile .env secret isolation (PR #351)\nFixed API key leakage between profiles on switch — switching from a profile with `OPENAI_API_KEY` to one without it left the key in the process environment for the duration of the session, effectively leaking credentials. A subtle and important security fix.\n\n**[@lawrencel1ng](https://github.com/lawrencel1ng)** — Bandit security fixes B310/B324/B110 + QuietHTTPServer (PR #354)\nSystematic bandit security scan fixes: URL scheme validation before `urlopen`, MD5 `usedforsecurity=False`, and 40+ bare `except: pass` blocks replaced with proper logging — plus `QuietHTTPServer` to stop client-disconnect log spam from SSE streams.\n\n**[@lx3133584](https://github.com/lx3133584)** — CSRF fix for reverse proxy on non-standard ports (PR #360)\nFixed CSRF rejection for deployments behind Nginx Proxy Manager or similar on non-standard ports — a real-world blocker for anyone hosting on a port other than 80/443.\n\n**[@DelightRun](https://github.com/DelightRun)** — session_search fix for WebUI sessions (PR #356)\nThe `session_search` tool silently returned \"Session database not available\" in every WebUI session. Tracked down the missing `SessionDB` injection in the streaming path and fixed it.\n\n**[@shaoxianbilly](https://github.com/shaoxianbilly)** — Unicode filename downloads (PR #378)\nFixed `UnicodeEncodeError` crashes when downloading workspace files with Chinese, Japanese, or other non-ASCII names. Implemented proper `Content-Disposition` header with RFC 5987 `filename*=UTF-8''...` encoding.\n\n**[@huangzt](https://github.com/huangzt)** — Cancel interrupts agent (PR #244)\nMade the Cancel button actually interrupt the running agent and clean up UI state, rather than just hiding the button while the agent kept running.\n\n**[@tgaalman](https://github.com/tgaalman)** — Thinking card fix (PR #169)\nFixed top-level reasoning fields being missed in the thinking card display — an edge case in how Claude's extended thinking blocks surface in the API response.\n\n**[@smurmann](https://github.com/smurmann)** — Custom provider routing fix (PR #189)\nFixed model routing for slash-prefixed custom provider models, which were being misrouted in the model selector. A precise fix for a real edge case in multi-provider setups.\n\n**[@jeffscottward](https://github.com/jeffscottward)** — Claude Haiku model ID fix (PR #145)\nCaught and corrected the Claude Haiku model ID (`3-5` → `4-5`) immediately after the Anthropic release — the kind of quick community catch that keeps the model dropdown accurate.\n\n**[@kcclaw001](https://github.com/kcclaw001)** — Credential redaction in API responses (PR #243)\nAdded credential redaction to all API response paths so API keys, tokens, and other secrets in session data or error messages are masked before reaching the browser.\n\n**[@mbac](https://github.com/mbac)** — Phantom \"Custom\" provider group fix (PR #191)\nRemoved the phantom \"Custom\" optgroup that appeared in the model dropdown even when no custom provider was configured — a small but consistently confusing UI noise issue.\n\n**[@andrewy-wizard](https://github.com/andrewy-wizard)** — Chinese localization (PR #177)\nAdded Simplified Chinese (`zh`) locale to the WebUI. One of the first non-English locales and the most-used non-English locale in the codebase.\n\n**[@mmartial](https://github.com/mmartial)** — Docker UID/GID matching (PR #237)\nAdded Docker support for running as an arbitrary UID/GID matching the host user, eliminating permission issues with bind-mounted volumes — essential for Docker deployments where the host user isn't UID 1000.\n\n**[@vCillusion](https://github.com/vCillusion)** — pip package resolution fix (PR #76)\nFixed agent dependency resolution to prefer packages from the venv's site-packages over the agent directory itself, preventing shadowing bugs when developing locally.\n\n**[@carlytwozero](https://github.com/carlytwozero)** — API key pass-through for non-Anthropic providers (PR #78)\nFixed `api_key` not being passed to `AIAgent` for non-Anthropic `/anthropic` providers — a quiet regression that silently broke any non-default provider.\n\n**[@mangodxd](https://github.com/mangodxd)** — Type hints cleanup (PR #115)\nAdded missing type hints across 10 files and corrected 9 inaccurate existing ones — the kind of maintenance work that makes the codebase easier to reason about.\n\n**[@Argonaut790](https://github.com/Argonaut790)** — HTML entity decode + Traditional Chinese locale (PR #239)\nFixed double-escaping of HTML entities in `renderMd()` — LLM output containing `&lt;code&gt;` was being escaped a second time, rendering as literal text instead of the intended markdown. The same PR also completed the Simplified Chinese translation (40+ missing keys) and added a full Traditional Chinese (`zh-Hant`) locale.\n\n**[@indigokarasu](https://github.com/indigokarasu)** — Visual redesign proposal: icon rail + design token system + 7 themes (PR #213)\nA CSS-only redesign of the full UI — proper design tokens (`--bg-primary`, `--text-info`, spacing scale), an icon rail sidebar replacing the emoji tab strip, consistent form cards, breadcrumb nav, and 7 built-in themes as custom prop
