<script id="project-data" type="application/json">[{"owner":"tw93","repo":"waza","url":"https://github.com/tw93/waza","readme":"<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/2h/waza.svg\" width=\"120\" />\n  <h1>Waza</h1>\n  <p><b>Engineering habits you already know, turned into skills Claude can run.</b></p>\n  <a href=\"https://github.com/tw93/Waza/stargazers\"><img src=\"https://img.shields.io/github/stars/tw93/Waza?style=flat-square\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/tw93/Waza/releases\"><img src=\"https://img.shields.io/github/v/tag/tw93/Waza?label=version&style=flat-square\" alt=\"Version\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-blue.svg?style=flat-square\" alt=\"License\"></a>\n  <a href=\"https://twitter.com/AiTw93\"><img src=\"https://img.shields.io/badge/follow-Tw93-red?style=flat-square&logo=Twitter\" alt=\"Twitter\"></a>\n</div>\n\n<br/>\n\n## Why\n\nWaza (技, わざ) is a Japanese martial arts term for technique: a move practiced until it becomes instinct.\n\nA good engineer does not just write code. They think through requirements, review their own work, debug systematically, design interfaces that feel intentional, and read primary sources. They write clearly, and learn new domains by producing output, not consuming content.\n\nAI makes you faster. It doesn't make you think more clearly, ship more carefully, or understand more deeply. Waza packages these habits into skills Claude can run.\n\n<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/qa/waza_repaired_v4.svg\" width=\"1000\" />\n</div>\n\n## Skills\n\nEach engineering habit gets an installed skill. In Claude Code, type the slash command. In Codex, invoke the installed skill by name and follow the same playbook.\n\n| Skill | When | What it does |\n| :--- | :--- | :--- |\n| [`/think`](skills/think/SKILL.md) | Before building anything new | Challenges the problem, pressure-tests the design, validates architecture before any code is written. |\n| [`/design`](skills/design/SKILL.md) | Building frontend interfaces | Produces distinctive UI with a committed aesthetic direction, not generic defaults. |\n| [`/check`](skills/check/SKILL.md) | After a task, before merging | Reviews the diff, auto-fixes safe issues, flags destructive commands, verifies with evidence. |\n| [`/hunt`](skills/hunt/SKILL.md) | Any bug or unexpected behavior | Systematic debugging. Root cause confirmed before any fix is applied. |\n| [`/write`](skills/write/SKILL.md) | Writing or editing prose | Rewrites prose to sound natural in Chinese and English. Cuts stiff, formulaic phrasing. |\n| [`/learn`](skills/learn/SKILL.md) | Diving into an unfamiliar domain | Six-phase research workflow: collect, digest, outline, fill in, refine, then self-review and publish. |\n| [`/read`](skills/read/SKILL.md) | Any URL or PDF | Fetches content as clean Markdown with platform-specific routing. Special handling for GitHub, PDFs, WeChat, and Feishu. |\n| [`/health`](skills/health/SKILL.md) | Auditing Claude Code setup | Checks CLAUDE.md, rules, skills, hooks, MCP, and behavior. Flags issues by severity. |\n\nEach skill is a folder, not just a markdown file. Skills include reference docs, helper scripts, and gotchas sections built from real project failures.\n\n## Extras\n\n### Statusline\n\nA minimal Claude Code statusline that shows only what matters: context window usage, 5-hour quota, and 7-day quota, each with the time remaining until reset.\n\n<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/y9/RUgevg.png\" width=\"1000\" />\n</div>\n\nColor coding: green below 70%, yellow at 70-85%, red above 85% for context; blue, magenta, red for quota thresholds. No progress bars, no noise.\n\n```bash\ncurl -sL https://raw.githubusercontent.com/tw93/Waza/main/scripts/setup-statusline.sh | bash\n```\n\n### English Coaching\n\nMost AI models were trained on far more English than any other language, so every prompt in your native tongue goes through an invisible translation layer. Switch to English and the reasoning sharpens, answers get more precise, and every session doubles as language practice.\n\n<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/24/vfkGOi.png\" width=\"1000\" />\n</div>\n\nClaude corrects your mistakes in place, tagging each one with its pattern name so you learn the rule, not just the fix.\n\n```bash\n# Claude Code\nmkdir -p ~/.claude/rules && curl -fsSL https://raw.githubusercontent.com/tw93/Waza/main/rules/english.md -o ~/.claude/rules/english.md\n\n# Codex\nmkdir -p ~/.codex && curl -fsSL https://raw.githubusercontent.com/tw93/Waza/main/rules/english.md >> ~/.codex/AGENTS.md\n```\n\n## Install\n\n**Claude Code**\n\n```bash\nnpx skills add tw93/Waza -a claude-code -g -y\n```\n\n**Codex**\n\n```bash\nnpx skills add tw93/Waza -a codex -g -y\n```\n\n**Compatibility**\n\n`/health` is Claude Code only. The other skills are written to use the host environment's native question, search, fetch, and agent mechanisms. `/check` runs parallel specialist reviewers when the host supports them; otherwise it performs the same passes inline.\n\n## Uninstall\n\n```bash\n# Remove all skills\nnpx skills remove tw93/Waza -g\n\n# Remove statusline\nrm -f ~/.claude/statusline.sh\n# Then remove the statusLine key from ~/.claude/settings.json\n\n# Remove English Coaching (Claude Code)\nrm -f ~/.claude/rules/english.md\n\n# Remove English Coaching (Codex): remove the English Coaching block from ~/.codex/AGENTS.md\n```\n\n## Background\n\nTools like Superpowers and gstack are impressive, but they are heavy. Too many skills, too much configuration, too steep a learning curve for engineers who just want to get things done.\n\nThere's also a subtler problem. Every rule the author writes becomes a ceiling. The model can only do what the instructions say and can't go further. Waza goes the other direction. Each skill sets a clear goal and the constraints that matter, then steps back. As models improve, that restraint pays compound interest.\n\nEight skills for the habits that actually matter. Each does one thing, has a clear trigger, and stays out of the way. Not complete by design, just the right amount done well.\n\nBuilt from patterns across real projects, refined through actual use. Every gotcha traces to a real failure: a wrong code path that took four rounds to find, a release posted before artifacts were uploaded, a server restarted eight times without reading the error. 30 days, 300+ sessions, 7 projects, 500 hours.\n\nThe `/health` skill is based on the six-layer framework described in [this post](https://tw93.fun/en/2026-03-12/claude.html).\n\n## Support\n\n- If Waza helped you, [share it](https://twitter.com/intent/tweet?url=https://github.com/tw93/Waza&text=Waza%20-%20Claude%20Code%20skills%20for%20the%20complete%20engineer.) with friends or give it a star.\n- Got ideas or bugs? Open an issue or PR, feel free to contribute your best AI model.\n- I have two cats, TangYuan and Coke. If you think Waza delights your life, you can feed them <a href=\"https://miaoyan.app/cats.html?name=Waza\" target=\"_blank\">canned food 🥩</a>.\n\n<div align=\"center\">\n  <a href=\"https://miaoyan.app/cats.html?name=Waza\"><img src=\"https://cdn.jsdelivr.net/gh/tw93/MiaoYan@main/assets/sponsors.svg\" width=\"1000\" loading=\"lazy\" /></a>\n</div>\n\n## License\n\nMIT License. Feel free to use Waza and contribute.\n","summary":"Waza transforms common engineering habits into autonomous Claude AI “skills” that guide developers through every stage of building software—from problem‑deflection and design checks to systematic debugging, prose rewriting, and research workflows. Each skill is a fully‑featured module—including reference docs, helper scripts, and real‑world gotchas—that can be invoked with a slash command or by name, allowing Claude to perform tasks such as architecture validation, UI design, code review, or domain learning. The project also supplies a lean statusline to monitor context and quota usage and a language‑translation layer that sharpens reasoning when users enter prompts in their native language. Engineers who use Claude Code or Codex will find Waza useful for tightening their workflow, improving code quality, and learning new domains more efficiently.","description":"🥷 Engineering habits you already know, turned into skills Claude can run.","stars":3573,"language":"Shell"},{"owner":"kevinrgu","repo":"autoagent","url":"https://github.com/kevinrgu/autoagent","readme":"<p align=\"center\">\n  <a href=\"https://www.thirdlayer.inc\">\n    <img src=\"https://www.thirdlayer.inc/thirdlayer-logo.svg\" alt=\"thirdlayer\" width=\"200\">\n  </a>\n</p>\n\n<blockquote>\n<p>We're launching a product around self-configuring agents soon. <a href=\"https://form.typeform.com/to/ZQbnbO09\">Sign up here.</a><br>We're hiring engineers. If this work interests you, reach out to <a href=\"mailto:hello@thirdlayer.inc\">hello@thirdlayer.inc</a> with your Github link.</p>\n</blockquote>\n\n# AutoAgent\n\n> Like autoresearch but for agent engineering. Give an AI agent a task, let it build and iterate on an agent harness autonomously overnight. It modifies the system prompt, tools, agent configuration, and orchestration, runs the benchmark, checks the score, keeps or discards the change, and repeats.\n\n![teaser](progress.png)\n\nThe core idea is the same: you're not touching the harness Python files like you normally would as an engineer. Instead, you program `program.md`, the Markdown file that provides context to the meta-agent and defines the agent-engineering loop.\n\n## How it works\n\nThe repo has a few files and directories that matter:\n\n- **`agent.py`** -- the entire harness under test in a single file. It contains\n  config, tool definitions, agent registry, routing/orchestration, and the\n  Harbor adapter boundary. The adapter section is explicitly marked as fixed;\n  the rest is the primary edit surface for the meta-agent.\n- **`program.md`** -- instructions for the meta-agent + the directive (what\n  kind of agent to build). **This file is edited by the human**.\n- **`tasks/`** -- evaluation tasks in\n  [harbor](https://github.com/laude-institute/harbor) format. In a clean\n  baseline branch, benchmark payloads may be omitted and added in\n  benchmark-specific branches.\n- **`.agent/`** -- optional workspace artifacts for reusable instructions,\n  notes, prompts, or skills.\n\nThe metric is total **score** produced by the benchmark's task test suites. The\nmeta-agent hill-climbs on this score.\n\n## Quick start\n\n**Requirements:** Docker, Python 3.10+, [uv](https://docs.astral.sh/uv/), and\nwhatever model-provider credentials your current `agent.py` harness requires.\n\n```bash\n# 1. Install uv (if you don't have it)\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n\n# 2. Install dependencies\nuv sync\n\n# 3. Set up the environment variables required by your current agent/runtime\n# Example:\ncat > .env << 'EOF'\nOPENAI_API_KEY=...\nEOF\n\n# 4. Build base image\ndocker build -f Dockerfile.base -t autoagent-base .\n\n# 5. Add tasks to tasks/ (see Task format section below)\n\n# 6. Run a single benchmark task\nrm -rf jobs; mkdir -p jobs && uv run harbor run -p tasks/ --task-name \"<task-name>\" -l 1 -n 1 --agent-import-path agent:AutoAgent -o jobs --job-name latest > run.log 2>&1\n\n# 7. Run all tasks in parallel (-n = concurrency, default 4)\nrm -rf jobs; mkdir -p jobs && uv run harbor run -p tasks/ -n 100 --agent-import-path agent:AutoAgent -o jobs --job-name latest > run.log 2>&1\n```\n\n## Running the meta-agent\n\nPoint your coding agent at the repo and prompt:\n\n```\nRead program.md and let's kick off a new experiment!\n```\n\nThe meta-agent will read the directive, inspect the current harness, run the\nbenchmark, diagnose failures, modify `agent.py`, and iterate.\n\n## Project structure\n\n```text\nagent.py                       -- single-file harness under test\n  editable harness section     -- prompt, registries, tools, routing\n  fixed adapter section        -- Harbor integration + trajectory serialization\nprogram.md                     -- meta-agent instructions + directive\nDockerfile.base                -- base image\n.agent/                        -- optional agent workspace artifacts\ntasks/                         -- benchmark tasks, typically added in benchmark-specific branches\njobs/                          -- Harbor job outputs\nresults.tsv                    -- experiment log (created by meta-agent, gitignored)\nrun.log                        -- latest run output\n```\n\n## Task format\n\nThe repo ships without tasks. Add your own to `tasks/` following [Harbor's task format](https://harborframework.com/docs/tasks):\n\n```text\ntasks/my-task/\n  task.toml           -- config (timeouts, metadata)\n  instruction.md      -- prompt sent to the agent\n  tests/\n    test.sh           -- entry point, writes /logs/reward.txt\n    test.py           -- verification (deterministic or LLM-as-judge)\n  environment/\n    Dockerfile        -- task container (FROM autoagent-base)\n  files/              -- reference files mounted into container\n```\n\nTests write a score (0.0-1.0) to the verifier logs. The meta-agent hill-climbs\non this. See the [Harbor docs](https://harborframework.com/docs) for full details on writing and porting tasks.\n\n## Design choices\n\n- **Program the meta-agent, not the harness directly.** The human steers the\n  loop through `program.md`, while the meta-agent edits `agent.py`.\n- **Single-file, registry-driven harness.** The implementation lives in one\n  file for simplicity, but agent and tool registration stay structured so the\n  harness can still evolve cleanly.\n- **Docker isolation.** The agent runs in a container. It can't damage the host.\n- **Score-driven.** Every experiment produces a numeric score. Keep if better,\n  discard if not. Same loop as autoresearch.\n- **Harbor-compatible tasks.** Tasks use the same format as harbor benchmarks,\n  so the same harness can be evaluated on different datasets.\n\n## Cleanup\n\nDocker images and containers accumulate across runs. Clean up regularly:\n\n```bash\n# Harbor's cached task images + task cache\nuv run harbor cache clean -f\n\n# Full Docker nuke (all unused images, build cache, etc.)\ndocker system prune -a -f\n\n# Lighter: just dead containers\ndocker container prune -f\n```\n\nIf Docker becomes unresponsive (for example after many concurrent runs), restart\nDocker Desktop:\n\n```bash\nkillall Docker && open -a Docker\n```\n\n## Improving performance with skills\n\nYou can equip the agent with [Agent Skills for Context Engineering](https://github.com/muratcankoylan/Agent-Skills-for-Context-Engineering) and [context7](https://github.com/upstash/context7) skills to improve performance.\n\n## License\n\nMIT\n\n","summary":"AutoAgent is a meta‑agent system that automatically iterates on an agent harness, modifying code, prompts, tools and orchestration to improve performance on a given benchmark overnight. By editing a single Markdown instruction file and running tasks through Harbor, the system treats the harness as a mutable artifact, hill‑climbing on task scores without manual intervention. The project bundles a Docker‑based workflow, a single‑file harness, and benchmark tasks, making it easy to evaluate and refine large‑language‑model agents. It is especially useful to AI researchers, LLM engineers, and product teams that need to experiment with and optimize autonomous agent pipelines efficiently.","description":"autonomous harness engineering","stars":4221,"language":"Python"},{"owner":"andrehuang","repo":"research-companion","url":"https://github.com/andrehuang/research-companion","readme":"# Research Companion\n\n**Strategic research thinking agents for [Claude Code](https://docs.anthropic.com/en/docs/claude-code)** — idea evaluation, project triage, and structured brainstorming to help you do research that matters.\n\nThis repository now also includes native [Codex](https://openai.com/codex/) support.\n\nMost AI writing tools help you *write* papers. This plugin helps you decide *which* papers to write.\n\nInspired by Nicholas Carlini's essay [\"How to Win a Best Paper Award\"](https://nicholas.carlini.com/writing/2026/how-to-win-a-best-paper-award.html) — which argues that great research starts with taste, strategic problem selection, honest self-evaluation, and knowing when to kill your darlings.\n\n> **📢 Update (April 2026): Research Companion is now also a component of [`researcher-pack`](https://github.com/andrehuang/researcher-pack)** — a more advanced, all-in-one Claude Code plugin for researchers that bundles strategic brainstorming, paper reading, literature tracking, academic writing, and project management into a single integrated workflow. This standalone repo is still actively maintained, and any updates to Research Companion will be synced between both repos — so you can use it here on its own, or get the full toolkit over at [`researcher-pack`](https://github.com/andrehuang/researcher-pack). Feedback, issues, and PRs are very welcome in either place! 🙏\n\n## The Problem\n\nResearchers don't lack the ability to write papers. They lack a trusted colleague who will:\n\n- Tell them an idea isn't worth 6 months of their life — *before* they invest those months\n- Ask \"who else is working on this and what's your unfair advantage?\"\n- Challenge them to state the key insight in one sentence (and refuse to move on until they can)\n- Help them find the unexpected cross-field connection that makes a contribution truly novel\n- Evaluate whether a struggling project should be continued, pivoted, or killed\n\nThis plugin provides that colleague.\n\n## What's Inside\n\n### Agents\n\n| Agent | What it does |\n|-------|-------------|\n| **Idea Critic** | Stress-tests research ideas along 7 dimensions: novelty, impact, timing, feasibility, competitive landscape, the nugget, and narrative potential. Returns a Pursue / Refine / Kill verdict. |\n| **Research Strategist** | Project-level strategic thinking — triage (continue/pivot/kill), comparative advantage mapping, impact forecasting, opportunity cost analysis, and scooping risk assessment. |\n| **Brainstormer** | Enhanced creative brainstormer with explicit focus on cross-field connections, \"strategic ignorance\" (challenging flawed assumptions the field follows uncritically), and the skeptical-reader test. |\n\n### Skill\n\n| Skill | What it does |\n|-------|-------------|\n| `/research-companion` | A structured multi-phase ideation session that orchestrates all three agents through: **Seed** → **Diverge** → **Evaluate** → **Deepen** → **Frame** → **Decide**. Includes Carlini's \"conclusion-first test.\" |\n\n### Principles\n\n8 research strategy principles organized into three categories (Problem Selection, Execution Strategy, Strategic Positioning) that guide the agents' evaluations.\n\n### Codex Support\n\nThis repository also includes a native Codex plugin manifest and interface metadata:\n\n- `.codex-plugin/plugin.json`\n- `agents/openai.yaml`\n- `.agents/plugins/marketplace.json`\n\nThe same core prompts, agents, and principles are shared across Claude Code and Codex, with the orchestration instructions written to degrade gracefully if delegated subagents are unavailable.\n\nCodex supports plugin marketplaces and installation through the Plugin Directory. This repo now includes a repo-scoped marketplace file so the plugin can be installed after cloning, without manually creating marketplace JSON. Detailed Codex setup lives in [docs/codex-installation.md](./docs/codex-installation.md).\n\n## Installation\n\n### Claude Code\n\n```bash\nclaude plugin marketplace add https://github.com/andrehuang/research-companion\nclaude plugin install research-companion@andrehuang-research-companion\n```\n\n### Codex\n\nSee [docs/codex-installation.md](./docs/codex-installation.md) for the full Codex installation guide, including:\n\n- repo marketplace installation\n- personal local marketplace installation\n- official Codex plugin docs links\n\n## Usage\n\n### Evaluate a research idea\n\nJust describe your idea and ask for evaluation:\n\n```\nI'm thinking about studying how LLM-generated code introduces subtle security\nvulnerabilities that pass standard code review. Can you evaluate this idea?\n```\n\nThe **Idea Critic** will evaluate across 7 dimensions and give you a verdict with the single most important question to resolve next.\n\n### Decide whether to continue a project\n\n```\nI've been working on adversarial attacks against multimodal models for 3 months.\nI have some results but they're incremental. Two other groups just posted preprints\nin the same area. Should I continue?\n```\n\nThe **Research Strategist** will assess your competitive position, impact potential, and opportunity cost, then recommend Continue / Pivot / Kill.\n\n### Run a full brainstorming session\n\nIn Claude Code:\n\n```\n/research-companion I'm interested in the intersection of program synthesis\nand scientific discovery\n```\n\nIn Codex:\n\n```\n$research-companion I'm interested in the intersection of program synthesis\nand scientific discovery\n```\n\nThis launches a 6-phase guided session:\n\n1. **Seed** — Understand your problem space, interests, and what bugs you about the field\n2. **Diverge** — Generate ideas, alternative framings, and cross-field connections\n3. **Evaluate** — Stress-test the top 2-3 ideas with the Idea Critic\n4. **Deepen** — Check novelty, positioning, and competitive landscape\n5. **Frame** — Write the abstract and conclusion as if the paper is done (the conclusion-first test: if you can't write a compelling conclusion now, the idea isn't ready)\n6. **Decide** — Final assessment with next steps (starting with the single riskiest assumption to test first)\n\n### Find cross-field connections\n\n```\nI work on differential privacy. What ideas from other fields\n(cryptography, economics, ecology, etc.) could lead to novel approaches?\n```\n\nThe **Brainstormer** is designed to bridge distant fields — the kind of connection that led to applying differential cryptanalysis to model stealing, or semi-supervised learning to poisoning attacks.\n\n### Stress-test with a skeptical reviewer\n\n```\nHere's my draft abstract. Play devil's advocate — what would a skeptical\nArea Chair say?\n```\n\nThe **Idea Critic** will identify the strongest counter-arguments, the weakest assumptions, and what a hostile but fair reviewer would target.\n\n## The 7 Evaluation Dimensions\n\nWhen the Idea Critic evaluates your research idea, it assesses:\n\n| # | Dimension | Key Question |\n|---|-----------|-------------|\n| 1 | **Novelty** | If you don't do this, how long until someone else does? |\n| 2 | **Impact** | Can you write a compelling conclusion *right now*, without doing the work? |\n| 3 | **Timing** | Is the field ready for this? Too early? Already crowded? |\n| 4 | **Feasibility** | What's the single riskiest assumption? Can you test it in a week? |\n| 5 | **Competitive Landscape** | Who else is working on this? What's your unfair advantage? |\n| 6 | **The Nugget** | Can you state the key insight in one sentence? |\n| 7 | **Narrative Potential** | Can you tell a story that makes a skeptical reader care? |\n\n## The 8 Research Strategy Principles\n\nThese principles, derived from patterns in high-impact research, guide all agents in this plugin:\n\n**Problem Selection**\n- **RS1: The Novelty Test** — \"If you don't do this, how many months until someone else does?\"\n- **RS2: The Conclusion-First Test** — \"Can you write a compelling conclusion right now?\"\n- **RS3: The Nugget Test** — \"Can you state the key insight in one sentence?\"\n\n**Execution Strategy**\n- **RS4: Fail Fast** — \"Start with the sub-problem most likely to kill the project\"\n- **RS5: Kill Early** — \"A working project with low impact is worse than a killed project\"\n- **RS6: Unreasonable Effort** — \"Strengthen 'sometimes' to 'usually' through additional work\"\n\n**Strategic Positioning**\n- **RS7: Comparative Advantage** — \"Research space is high-dimensional; find your unique corner\"\n- **RS8: Timing Awareness** — \"Impact = skill x domain importance at this moment\"\n\n## Persistent Evaluations (NEW in v1.1)\n\nEvaluation results are now **saved to disk** so they persist across sessions:\n\n- After each session, verdicts are written to `research-evaluations/YYYY-MM-DD-<topic>.md`\n- On subsequent sessions, the system **checks for prior evaluations** of similar topics before starting fresh\n- PARK'd ideas include \"revisit conditions\" — what would need to change to reconsider\n- The Research Strategist now outputs a **watch list** (search terms, key researchers, venues to monitor) for competitive tracking\n- The Idea Critic checks for prior evaluations to avoid re-evaluating killed ideas unless conditions have changed\n\nThis means your research thinking accumulates over time rather than starting from scratch each session.\n\n## Pairs Well With\n\n- [**researcher-pack**](https://github.com/andrehuang/researcher-pack) ⭐ — **The recommended way to use Research Companion.** An integrated Claude Code plugin for researchers that incorporates Research Companion as its strategic-thinking component, alongside paper reading, literature tracking, academic writing, and session management. If you use more than one of the tools below, install `researcher-pack` instead of stitching them together by hand.\n- [**Academic Writing Agents**](https://github.com/andrehuang/academic-writing-agents) — 12 agents for reviewing, auditing, drafting, and polishing academic papers. Research Companion handles the \"what to write\" question; Academic Writing Agents handles the \"how to write it\" question.\n- [**Claude-Claw**](https://github.com/andrehuang/claude-claw) — OpenClaw-inspired enhancements for session continuity, task management, and memory architecture. Provides `/handoff` for saving session state and `/manager` for tracking research tasks.\n\n## Philosophy\n\nMost researchers optimize for publication count. The best researchers optimize for impact — and papers follow naturally. This plugin is built around that distinction.\n\nIt won't help you produce more papers. It will help you produce *better* ones by being honest about which ideas are worth your finite time and by stress-testing your thinking before you commit months of effort.\n\nThe agents are deliberately opinionated and direct. They'd rather save you 3 months than spare your feelings. If an idea should be killed, they'll say so — and explain why.\n\n## License\n\nMIT\n","summary":"Research Companion is an AI‑enhanced research‑thinking plugin for Claude Code (and now Codex) that guides scholars through idea evaluation, project triage, and strategic brainstorming, helping them decide which papers to pursue. It ships with three dedicated agents—Idea Critic, Research Strategist, and Brainstormer—each targeting dimensions such as novelty, impact, feasibility, and cross‑field connections, and includes a structured `/research-companion` workflow that steers users from seed ideas to decisive verdicts. The plugin is built on eight research‑strategy principles and can be installed straight from the marketplace, making it an ideal companion for academics seeking a practical, AI‑driven colleague to refine concepts, assess competitive advantage, and avoid wasted effort. Researchers, early‑career scholars, and teams looking to streamline strategic decision‑making in their projects will benefit most from this tool.","description":"Strategic research thinking agents for Claude Code — idea evaluation, project triage, and structured brainstorming. Helps you decide which papers to write, not just how to write them.","stars":601,"language":null},{"owner":"JuliusBrussee","repo":"caveman","url":"https://github.com/JuliusBrussee/caveman","readme":"<p align=\"center\">\n  <img src=\"https://em-content.zobj.net/source/apple/391/rock_1faa8.png\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">caveman</h1>\n\n<p align=\"center\">\n  <strong>why use many token when few do trick</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/JuliusBrussee/caveman/stargazers\"><img src=\"https://img.shields.io/github/stars/JuliusBrussee/caveman?style=flat&color=yellow\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/JuliusBrussee/caveman/commits/main\"><img src=\"https://img.shields.io/github/last-commit/JuliusBrussee/caveman?style=flat\" alt=\"Last Commit\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/JuliusBrussee/caveman?style=flat\" alt=\"License\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#before--after\">Before/After</a> •\n  <a href=\"#install\">Install</a> •\n  <a href=\"#intensity-levels\">Levels</a> •\n  <a href=\"#caveman-skills\">Skills</a> •\n  <a href=\"#benchmarks\">Benchmarks</a> •\n  <a href=\"#evals\">Evals</a>\n</p>\n\n<p align=\"center\">\n  <strong>🪨 Caveman Ecosystem</strong> &nbsp;·&nbsp;\n  <strong>caveman</strong> <em>talk less</em> <sub>(you are here)</sub> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/cavemem\">cavemem</a> <em>remember more</em> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/cavekit\">cavekit</a> <em>build better</em>\n</p>\n\n---\n\nA [Claude Code](https://docs.anthropic.com/en/docs/claude-code) skill/plugin and Codex plugin that makes agent talk like caveman — cutting **~75% of output tokens** while keeping full technical accuracy. Now with [文言文 mode](#文言文-wenyan-mode), [terse commits](#caveman-commit), [one-line code reviews](#caveman-review), and a [compression tool](#caveman-compress) that cuts **~46% of input tokens** every session.\n\nBased on the viral observation that caveman-speak dramatically reduces LLM token usage without losing technical substance. So we made it a one-line install.\n\n## Before / After\n\n<table>\n<tr>\n<td width=\"50%\">\n\n### 🗣️ Normal Claude (69 tokens)\n\n> \"The reason your React component is re-rendering is likely because you're creating a new object reference on each render cycle. When you pass an inline object as a prop, React's shallow comparison sees it as a different object every time, which triggers a re-render. I'd recommend using useMemo to memoize the object.\"\n\n</td>\n<td width=\"50%\">\n\n### 🪨 Caveman Claude (19 tokens)\n\n> \"New object ref each render. Inline object prop = new ref = re-render. Wrap in `useMemo`.\"\n\n</td>\n</tr>\n<tr>\n<td>\n\n### 🗣️ Normal Claude\n\n> \"Sure! I'd be happy to help you with that. The issue you're experiencing is most likely caused by your authentication middleware not properly validating the token expiry. Let me take a look and suggest a fix.\"\n\n</td>\n<td>\n\n### 🪨 Caveman Claude\n\n> \"Bug in auth middleware. Token expiry check use `<` not `<=`. Fix:\"\n\n</td>\n</tr>\n</table>\n\n**Same fix. 75% less word. Brain still big.**\n\n**Pick your level of grunt:**\n\n<table>\n<tr>\n<td width=\"25%\">\n\n#### 🪶 Lite\n\n> \"Your component re-renders because you create a new object reference each render. Inline object props fail shallow comparison every time. Wrap it in `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 🪨 Full\n\n> \"New object ref each render. Inline object prop = new ref = re-render. Wrap in `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 🔥 Ultra\n\n> \"Inline obj prop → new ref → re-render. `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 📜 文言文\n\n> \"物出新參照，致重繪。useMemo Wrap之。\"\n\n</td>\n</tr>\n</table>\n\n**Same answer. You pick how many word.**\n\n```\n┌─────────────────────────────────────┐\n│  TOKENS SAVED          ████████ 75% │\n│  TECHNICAL ACCURACY    ████████ 100%│\n│  SPEED INCREASE        ████████ ~3x │\n│  VIBES                 ████████ OOG │\n└─────────────────────────────────────┘\n```\n\n- **Faster response** — less token to generate = speed go brrr\n- **Easier to read** — no wall of text, just the answer\n- **Same accuracy** — all technical info kept, only fluff removed ([science say so](https://arxiv.org/abs/2604.00025))\n- **Save money** — ~71% less output token = less cost\n- **Fun** — every code review become comedy\n\n## Install\n\nPick your agent. One command. Done.\n\n| Agent | Install |\n|-------|---------|\n| **Claude Code** | `claude plugin marketplace add JuliusBrussee/caveman && claude plugin install caveman@caveman` |\n| **Codex** | Clone repo → `/plugins` → Search \"Caveman\" → Install |\n| **Gemini CLI** | `gemini extensions install https://github.com/JuliusBrussee/caveman` |\n| **Cursor** | `npx skills add JuliusBrussee/caveman -a cursor` |\n| **Windsurf** | `npx skills add JuliusBrussee/caveman -a windsurf` |\n| **Copilot** | `npx skills add JuliusBrussee/caveman -a github-copilot` |\n| **Cline** | `npx skills add JuliusBrussee/caveman -a cline` |\n| **Any other** | `npx skills add JuliusBrussee/caveman` |\n\nInstall once. Use in every session for that install target after that. One rock. That it.\n\n### What You Get\n\nAuto-activation is built in for Claude Code, Gemini CLI, and the repo-local Codex setup below. `npx skills add` installs the skill for other agents, but does **not** install repo rule/instruction files, so Caveman does not auto-start there unless you add the always-on snippet below.\n\n| Feature | Claude Code | Codex | Gemini CLI | Cursor | Windsurf | Cline | Copilot |\n|---------|:-----------:|:-----:|:----------:|:------:|:--------:|:-----:|:-------:|\n| Caveman mode | Y | Y | Y | Y | Y | Y | Y |\n| Auto-activate every session | Y | Y¹ | Y | —² | —² | —² | —² |\n| `/caveman` command | Y | Y¹ | Y | — | — | — | — |\n| Mode switching (lite/full/ultra) | Y | Y¹ | Y | Y³ | Y³ | — | — |\n| Statusline badge | Y⁴ | — | — | — | — | — | — |\n| caveman-commit | Y | — | Y | Y | Y | Y | Y |\n| caveman-review | Y | — | Y | Y | Y | Y | Y |\n| caveman-compress | Y | Y | Y | Y | Y | Y | Y |\n| caveman-help | Y | — | Y | Y | Y | Y | Y |\n\n> [!NOTE]\n> Auto-activation works differently per agent: Claude Code uses SessionStart hooks, this repo's Codex dogfood setup uses `.codex/hooks.json`, Gemini uses context files. Cursor/Windsurf/Cline/Copilot can be made always-on, but `npx skills add` installs only the skill, not the repo rule/instruction files.\n>\n> ¹ Codex uses `$caveman` syntax, not `/caveman`. This repo ships `.codex/hooks.json`, so caveman auto-starts when you run Codex inside this repo. The installed plugin itself gives you `$caveman`; copy the same hook into another repo if you want always-on behavior there too. caveman-commit and caveman-review are not in the Codex plugin bundle — use the SKILL.md files directly.\n> ² Add the \"Want it always on?\" snippet below to those agents' system prompt or rule file if you want session-start activation.\n> ³ Cursor and Windsurf receive the full SKILL.md with all intensity levels. Mode switching works on-demand via the skill; no slash command.\n> ⁴ Available in Claude Code, but plugin install only nudges setup. Standalone `install.sh` / `install.ps1` configures it automatically when no custom `statusLine` exists.\n\n<details>\n<summary><strong>Claude Code — full details</strong></summary>\n\nThe plugin install gives you skills + auto-loading hooks. If no custom `statusLine` is configured, Caveman nudges Claude to offer badge setup on first session.\n\n```bash\nclaude plugin marketplace add JuliusBrussee/caveman\nclaude plugin install caveman@caveman\n```\n\n**Standalone hooks (without plugin):** If you prefer not to use the plugin system:\n```bash\n# macOS / Linux / WSL\nbash <(curl -s https://raw.githubusercontent.com/JuliusBrussee/caveman/main/hooks/install.sh)\n\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/JuliusBrussee/caveman/main/hooks/install.ps1 | iex\n```\n\nOr from a local clone: `bash hooks/install.sh` / `powershell -File hooks\\install.ps1`\n\nUninstall: `bash hooks/uninstall.sh` or `powershell -File hooks\\uninstall.ps1`\n\n**Statusline badge:** Shows `[CAVEMAN]`, `[CAVEMAN:ULTRA]`, etc. in your Claude Code status bar.\n\n- **Plugin install:** If you do not already have a custom `statusLine`, Claude should offer to configure it on first session\n- **Standalone install:** Configured automatically by `install.sh` / `install.ps1` unless you already have a custom statusline\n- **Custom statusline:** Installer leaves your existing statusline alone. See [`hooks/README.md`](hooks/README.md) for the merge snippet\n\n</details>\n\n<details>\n<summary><strong>Codex — full details</strong></summary>\n\n**macOS / Linux:**\n1. Clone repo → Open Codex in the repo directory → `/plugins` → Search \"Caveman\" → Install\n2. Repo-local auto-start is already wired by `.codex/hooks.json` + `.codex/config.toml`\n\n**Windows:**\n1. Enable symlinks first: `git config --global core.symlinks true` (requires Developer Mode or admin)\n2. Clone repo → Open VS Code → Codex Settings → Plugins → find \"Caveman\" under local marketplace → Install → Reload Window\n3. Codex hooks are currently disabled on Windows, so use `$caveman` to start manually\n\nThis repo also ships `.codex/hooks.json` and enables hooks in `.codex/config.toml`, so caveman auto-activates while you run Codex inside this repo on macOS/Linux. The installed plugin gives you `$caveman`; if you want always-on behavior in other repos too, copy the same `SessionStart` hook there and enable:\n\n```toml\n[features]\ncodex_hooks = true\n```\n\n</details>\n\n<details>\n<summary><strong>Gemini CLI — full details</strong></summary>\n\n```bash\ngemini extensions install https://github.com/JuliusBrussee/caveman\n```\n\nUpdate: `gemini extensions update caveman` · Uninstall: `gemini extensions uninstall caveman`\n\nAuto-activates via `GEMINI.md` context file. Also ships custom Gemini commands:\n- `/caveman` — switch intensity level (lite/full/ultra/wenyan)\n- `/caveman-commit` — generate terse commit message\n- `/caveman-review` — one-line code review\n\n</details>\n\n<details>\n<summary><strong>Cursor / Windsurf / Cline / Copilot — full details</strong></summary>\n\n`npx skills add` installs the skill file only — it does **not** install the agent's rule/instruction file, so caveman does not auto-start. For always-on, add the \"Want it always on?\" snippet below to your agent's rules or system prompt.\n\n| Agent | Command | Not installed | Mode switching | Always-on location |\n|-------|---------|--------------|:--------------:|--------------------|\n| Cursor | `npx skills add JuliusBrussee/caveman -a cursor` | `.cursor/rules/caveman.mdc` | Y | Cursor rules |\n| Windsurf | `npx skills add JuliusBrussee/caveman -a windsurf` | `.windsurf/rules/caveman.md` | Y | Windsurf rules |\n| Cline | `npx skills add JuliusBrussee/caveman -a cline` | `.clinerules/caveman.md` | — | Cline rules or system prompt |\n| Copilot | `npx skills add JuliusBrussee/caveman -a github-copilot` | `.github/copilot-instructions.md` + `AGENTS.md` | — | Copilot custom instructions |\n\nUninstall: `npx skills remove caveman`\n\nCopilot works with Chat, Edits, and Coding Agent.\n\n</details>\n\n<details>\n<summary><strong>Any other agent (opencode, Roo, Amp, Goose, Kiro, and 40+ more)</strong></summary>\n\n[npx skills](https://github.com/vercel-labs/skills) supports 40+ agents:\n\n```bash\nnpx skills add JuliusBrussee/caveman           # auto-detect agent\nnpx skills add JuliusBrussee/caveman -a amp\nnpx skills add JuliusBrussee/caveman -a augment\nnpx skills add JuliusBrussee/caveman -a goose\nnpx skills add JuliusBrussee/caveman -a kiro-cli\nnpx skills add JuliusBrussee/caveman -a roo\n# ... and many more\n```\n\nUninstall: `npx skills remove caveman`\n\n> **Windows note:** `npx skills` uses symlinks by default. If symlinks fail, add `--copy`: `npx skills add JuliusBrussee/caveman --copy`\n\n**Important:** These agents don't have a hook system, so caveman won't auto-start. Say `/caveman` or \"talk like caveman\" to activate each session.\n\n**Want it always on?** Paste this into your agent's system prompt or rules file — caveman will be active from the first message, every session:\n\n```\nTerse like caveman. Technical substance exact. Only fluff die.\nDrop: articles, filler (just/really/basically), pleasantries, hedging.\nFragments OK. Short synonyms. Code unchanged.\nPattern: [thing] [action] [reason]. [next step].\nACTIVE EVERY RESPONSE. No revert after many turns. No filler drift.\nCode/commits/PRs: normal. Off: \"stop caveman\" / \"normal mode\".\n```\n\nWhere to put it:\n| Agent | File |\n|-------|------|\n| opencode | `.config/opencode/AGENTS.md` |\n| Roo | `.roo/rules/caveman.md` |\n| Amp | your workspace system prompt |\n| Others | your agent's system prompt or rules file |\n\n</details>\n\n## Usage\n\nTrigger with:\n- `/caveman` or Codex `$caveman`\n- \"talk like caveman\"\n- \"caveman mode\"\n- \"less tokens please\"\n\nStop with: \"stop caveman\" or \"normal mode\"\n\n### Intensity Levels\n\n| Level | Trigger | What it do |\n|-------|---------|------------|\n| **Lite** | `/caveman lite` | Drop filler, keep grammar. Professional but no fluff |\n| **Full** | `/caveman full` | Default caveman. Drop articles, fragments, full grunt |\n| **Ultra** | `/caveman ultra` | Maximum compression. Telegraphic. Abbreviate everything |\n\n### 文言文 (Wenyan) Mode\n\nClassical Chinese literary compression — same technical accuracy, but in the most token-efficient written language humans ever invented.\n\n| Level | Trigger | What it do |\n|-------|---------|------------|\n| **Wenyan-Lite** | `/caveman wenyan-lite` | Semi-classical. Grammar intact, filler gone |\n| **Wenyan-Full** | `/caveman wenyan` | Full 文言文. Maximum classical terseness |\n| **Wenyan-Ultra** | `/caveman wenyan-ultra` | Extreme. Ancient scholar on a budget |\n\nLevel stick until you change it or session end.\n\n## Caveman Skills\n\n### caveman-commit\n\n`/caveman-commit` — terse commit messages. Conventional Commits. ≤50 char subject. Why over what.\n\n### caveman-review\n\n`/caveman-review` — one-line PR comments: `L42: 🔴 bug: user null. Add guard.` No throat-clearing.\n\n### caveman-help\n\n`/caveman-help` — quick-reference card. All modes, skills, commands, one command away.\n\n### caveman-compress\n\n`/caveman:compress <filepath>` — caveman make Claude *speak* with fewer tokens. **Compress** make Claude *read* fewer tokens.\n\nYour `CLAUDE.md` loads on **every session start**. Caveman Compress rewrites memory files into caveman-speak so Claude reads less — without you losing the human-readable original.\n\n```\n/caveman:compress CLAUDE.md\n```\n\n```\nCLAUDE.md          ← compressed (Claude reads this every session — fewer tokens)\nCLAUDE.original.md ← human-readable backup (you read and edit this)\n```\n\n| File | Original | Compressed | Saved |\n|------|----------:|----------:|------:|\n| `claude-md-preferences.md` | 706 | 285 | **59.6%** |\n| `project-notes.md` | 1145 | 535 | **53.3%** |\n| `claude-md-project.md` | 1122 | 636 | **43.3%** |\n| `todo-list.md` | 627 | 388 | **38.1%** |\n| `mixed-with-code.md` | 888 | 560 | **36.9%** |\n| **Average** | **898** | **481** | **46%** |\n\nCode blocks, URLs, file paths, commands, headings, dates, version numbers — anything technical passes through untouched. Only prose gets compressed. See the full [caveman-compress README](caveman-compress/README.md) for details. [Security note](./caveman-compress/SECURITY.md): Snyk flags this as High Risk due to subprocess/file patterns — it's a false positive.\n\n## Benchmarks\n\nReal token counts from the Claude API ([reproduce it yourself](benchmarks/)):\n\n<!-- BENCHMARK-TABLE-START -->\n| Task | Normal (tokens) | Caveman (tokens) | Saved |\n|------|---------------:|----------------:|------:|\n| Explain React re-render bug | 1180 | 159 | 87% |\n| Fix auth middleware token expiry | 704 | 121 | 83% |\n| Set up PostgreSQL connection pool | 2347 | 380 | 84% |\n| Explain git rebase vs merge | 702 | 292 | 58% |\n| Refactor callback to async/await | 387 | 301 | 22% |\n| Architecture: microservices vs monolith | 446 | 310 | 30% |\n| Review PR for security issues | 678 | 398 | 41% |\n| Docker multi-stage build | 1042 | 290 | 72% |\n| Debug PostgreSQL race condition | 1200 | 232 | 81% |\n| Implement React error boundary | 3454 | 456 | 87% |\n| **Average** | **1214** | **294** | **65%** |\n\n*Range: 22%–87% savings across prompts.*\n<!-- BENCHMARK-TABLE-END -->\n\n> [!IMPORTANT]\n> Caveman only affects output tokens — thinking/reasoning tokens are untouched. Caveman no make brain smaller. Caveman make *mouth* smaller. Biggest win is **readability and speed**, cost savings are a bonus.\n\nA March 2026 paper [\"Brevity Constraints Reverse Performance Hierarchies in Language Models\"](https://arxiv.org/abs/2604.00025) found that constraining large models to brief responses **improved accuracy by 26 percentage points** on certain benchmarks and completely reversed performance hierarchies. Verbose not always better. Sometimes less word = more correct.\n\n## Evals\n\nCaveman not just claim 75%. Caveman **prove** it.\n\nThe `evals/` directory has a three-arm eval harness that measures real token compression against a proper control — not just \"verbose vs skill\" but \"terse vs skill\". Because comparing caveman to verbose Claude conflate the skill with generic terseness. That cheating. Caveman not cheat.\n\n```bash\n# Run the eval (needs claude CLI)\nuv run python evals/llm_run.py\n\n# Read results (no API key, runs offline)\nuv run --with tiktoken python evals/measure.py\n```\n\n## Star This Repo\n\nIf caveman save you mass token, mass money — leave mass star. ⭐\n\n[![Star History Chart](https://api.star-history.com/svg?repos=JuliusBrussee/caveman&type=Date)](https://star-history.com/#JuliusBrussee/caveman&Date)\n\n## 🪨 The Caveman Ecosystem\n\nThree tools. One philosophy: **agent do more with less**.\n\n| Repo | What | One-liner |\n|------|------|-----------|\n| [**caveman**](https://github.com/JuliusBrussee/caveman) *(you are here)* | Output compression skill | *why use many token when few do trick* — ~75% fewer output tokens across Claude Code, Cursor, Gemini, Codex |\n| [**cavemem**](https://github.com/JuliusBrussee/cavemem) | Cross-agent persistent memory | *why agent forget when agent can remember* — compressed SQLite + MCP, local by default |\n| [**cavekit**](https://github.com/JuliusBrussee/cavekit) | Spec-driven autonomous build loop | *why agent guess when agent can know* — natural language → kits → parallel build → verified |\n\nThey compose: **cavekit** orchestrates the build, **caveman** compresses what the agent *says*, **cavemem** compresses what the agent *remembers*. Install one, some, or all — each stands alone.\n\n## Also by Julius Brussee\n\n- **[Revu](https://github.com/JuliusBrussee/revu-swift)** — local-first macOS study app with FSRS spaced repetition, decks, exams, and study guides. [revu.cards](https://revu.cards)\n\n## License\n\nMIT — free like mass mammoth on open plain.\n","summary":"caveman is a Claude Code and Codex plugin that rewrites agent responses in a “caveman” style, cutting token usage by roughly 75 % while preserving full technical accuracy. The tool offers multiple verbosity levels—from ultra‑short to full and 文言文 mode—plus utilities for terse commits, one‑line code reviews, and input compression that saves about 46 % of tokens per session. It’s aimed at developers and researchers who use LLM assistants and value faster, more legible answers without sacrificing detail. By reducing output size, caveman speeds up response time and lowers cost, making it ideal for high‑volume coding workflows and constrained environments.","description":"🪨 why use many token when few token do trick — Claude Code skill that cuts 65% of tokens by talking like caveman","stars":39229,"language":"Python"},{"owner":"liyown","repo":"marknative","url":"https://github.com/liyown/marknative","readme":"<p align=\"center\">\n  <img src=\"./logo.png\" alt=\"marknative\" width=\"480\" />\n</p>\n\n**A native Markdown rendering engine that produces paginated PNG/SVG documents — no browser, no Chromium, no DOM.**\n\nSupports CommonMark, GFM (tables, task lists, strikethrough), syntax-highlighted code blocks (Shiki), and LaTeX math formulas (MathJax) — all rendered server-side.\n\n📖 **[Documentation](https://liyown.github.io/marknative/)** — Guide · Showcase · API Reference\n\nMost Markdown rendering pipelines go through a browser:\n\n```\nMarkdown → HTML → DOM/CSS → browser layout → screenshot\n```\n\n`marknative` takes a different path. It parses Markdown directly into a typed document model, runs its own block and inline layout engine, paginates the result into fixed-size pages, and paints each page using a native 2D canvas API.\n\nThe result is deterministic, server-renderable, and completely headless.\n\n---\n\n## Gallery\n\nMath formulas (MathJax block + inline) mixed with syntax-highlighted code:\n\n<p align=\"center\">\n  <img src=\"https://liyown.github.io/marknative/examples/features/math.png\" alt=\"Math rendering example\" width=\"60%\" />\n</p>\n\nFull syntax fixture, rendered across 10 pages with syntax-highlighted fenced code blocks:\n\n<table>\n  <tr>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-01.png\" alt=\"Full syntax fixture page 1\" /></td>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-02.png\" alt=\"Full syntax fixture page 2\" /></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-03.png\" alt=\"Full syntax fixture page 3\" /></td>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-04.png\" alt=\"Full syntax fixture page 4\" /></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-05.png\" alt=\"Full syntax fixture page 5\" /></td>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-06.png\" alt=\"Full syntax fixture page 6\" /></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-07.png\" alt=\"Full syntax fixture page 7\" /></td>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-08.png\" alt=\"Full syntax fixture page 8\" /></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-09.png\" alt=\"Full syntax fixture page 9\" /></td>\n    <td width=\"50%\"><img src=\"https://liyown.github.io/marknative/examples/full-syntax/full-syntax-10.png\" alt=\"Full syntax fixture page 10\" /></td>\n  </tr>\n</table>\n\n---\n\n## Why\n\n| Requirement | Browser-based | marknative |\n| --- | :---: | :---: |\n| Runs on the server without a browser | ✗ | ✓ |\n| Deterministic page breaks across runs | ✗ | ✓ |\n| Direct PNG / SVG output | ✗ | ✓ |\n| LaTeX math formulas (server-side MathJax) | ✗ | ✓ |\n| Syntax-highlighted code blocks (Shiki) | ✗ | ✓ |\n| Batch rendering at scale | slow | fast |\n| Embeddable as a library | heavy | lightweight |\n\n---\n\n## Installation\n\n```bash\nbun add marknative\n# or\nnpm install marknative\n```\n\n> **Peer dependency**: `marknative` uses [`skia-canvas`](https://github.com/samizdatco/skia-canvas) as its paint backend. It ships prebuilt native binaries for macOS, Linux, and Windows — no additional setup is needed in most environments.\n\n---\n\n## Quick Start\n\n```ts\nimport { renderMarkdown } from 'marknative'\n\nconst pages = await renderMarkdown(`\n# Hello, marknative\n\nA native Markdown rendering engine that produces **paginated PNG pages**\nwithout a browser.\n\n- CommonMark + GFM support\n- Deterministic layout and pagination\n- PNG and SVG output\n`)\n\nconsole.log(`Rendered ${pages.length} page(s)`)\n\nfor (const [i, page] of pages.entries()) {\n  // page.format === 'png'\n  // page.data   === Buffer\n  await Bun.write(`page-${i + 1}.png`, page.data)\n}\n```\n\n---\n\n## API\n\n### `renderMarkdown(markdown, options?)`\n\nParses, lays out, paginates, and paints a Markdown document. Returns one output entry per page.\n\n```ts\nfunction renderMarkdown(\n  markdown: string,\n  options?: {\n    format?: 'png' | 'svg'                      // default: 'png'\n    singlePage?: boolean                         // render into one image instead of paginating\n    theme?: BuiltInThemeName | ThemeOverrides    // default: defaultTheme\n    scale?: number                               // PNG pixel density multiplier — default: 2 (retina)\n    painter?: Painter                            // override the paint backend\n    codeHighlighting?: {\n      theme?: string                             // Shiki theme — auto-detected from page background\n    }\n  },\n): Promise<RenderPage[]>\n```\n\n**Return type:**\n\n```ts\ntype RenderPage =\n  | { format: 'png'; data: Buffer;  page: PaintPage }\n  | { format: 'svg'; data: string;  page: PaintPage }\n```\n\nEach entry carries both the raw output (`data`) and the fully resolved page layout (`page`) so you can inspect fragment positions without re-rendering.\n\n---\n\n### `parseMarkdown(markdown)`\n\nParses Markdown source into `marknative`'s internal document model without running layout or paint. Useful for inspecting document structure or building custom renderers.\n\n```ts\nfunction parseMarkdown(markdown: string): MarkdownDocument\n```\n\n---\n\n### `defaultTheme`\n\nThe built-in default theme. Page size is 1080 × 1440 px (portrait card ratio). Font sizes, line heights, margins, and block spacing are all defined here.\n\n```ts\nimport { defaultTheme } from 'marknative'\n\nconsole.log(defaultTheme.page)\n// { width: 1080, height: 1440, margin: { top: 80, right: 72, bottom: 80, left: 72 } }\n```\n\n---\n\n### Theme System\n\nmarknative ships with 10 built-in themes and a full theme customization API.\n\n**Built-in themes** — pass a name string as the `theme` option:\n\n```ts\n// 'default' | 'github' | 'solarized' | 'sepia' | 'rose'\n// 'dark' | 'nord' | 'dracula' | 'ocean' | 'forest'\nconst pages = await renderMarkdown(markdown, { theme: 'dark' })\nconst pages = await renderMarkdown(markdown, { theme: 'nord' })\n```\n\n**Partial overrides** — merged onto `defaultTheme`:\n\n```ts\nconst pages = await renderMarkdown(markdown, {\n  theme: {\n    colors: { background: '#1e1e2e', text: '#cdd6f4' },\n    page: { width: 800 },\n  },\n})\n```\n\n**Full control with `mergeTheme`**:\n\n```ts\nimport { mergeTheme, getBuiltInTheme } from 'marknative'\n\nconst myTheme = mergeTheme(getBuiltInTheme('nord'), {\n  colors: { link: '#ff6b6b' },\n})\n\nconst pages = await renderMarkdown(markdown, { theme: myTheme })\n```\n\n**Gradient backgrounds**:\n\n```ts\nimport { mergeTheme, defaultTheme } from 'marknative'\n\nconst theme = mergeTheme(defaultTheme, {\n  colors: {\n    background: '#0f0c29',\n    backgroundGradient: {\n      type: 'linear',\n      angle: 135,\n      stops: [\n        { offset: 0,   color: '#24243e' },\n        { offset: 0.5, color: '#302b63' },\n        { offset: 1,   color: '#0f0c29' },\n      ],\n    },\n    text: '#e8e0ff',\n  },\n})\n```\n\nSee the [Themes guide](https://liyown.github.io/marknative/guide/themes) and [Themes showcase](https://liyown.github.io/marknative/showcase/themes) for the full reference.\n\n---\n\n## Performance\n\nBenchmarks run on Apple M-series (warm, singletons already initialised). Run `bun bench/perf.ts` to reproduce.\n\n### Throughput by document type — PNG 2× (default)\n\n| Document type | mean | p50 | p90 |\n| --- | ---: | ---: | ---: |\n| Plain text (prose + lists + blockquotes) | 116 ms | 115 ms | 120 ms |\n| Code-heavy (3 languages, shiki) | 101 ms | 101 ms | 104 ms |\n| Math-heavy (4 block + 3 inline formulas) | 100 ms | 99 ms | 103 ms |\n| Mixed (math + code) | 98 ms | 97 ms | 100 ms |\n\n### Output format — mixed doc\n\n| Format | mean | p50 | p90 | note |\n| --- | ---: | ---: | ---: | --- |\n| SVG | 5.6 ms | 5.6 ms | 6.5 ms | layout + serialize only |\n| PNG 2× | 99 ms | 98 ms | 102 ms | full rasterize + encode |\n\nSVG is ~17× faster than PNG. `canvas.toBuffer('png')` (pure CPU PNG compression) accounts for **94% of PNG render time**; all parsing, layout, and drawing are <8 ms/page.\n\n### Scale factor — mixed doc, PNG only\n\n| Scale | Resolution | mean |\n| --- | --- | ---: |\n| 1 | 1080 × ~650 (0.7 MP) | 29 ms |\n| 1.5 | 1620 × ~975 (1.6 MP) | 58 ms |\n| **2** (default) | **2160 × ~1300 (2.8 MP)** | **99 ms** |\n| 3 | 3240 × ~1950 (6.3 MP) | 214 ms |\n\nPNG encode time scales linearly with pixel count. Use `scale: 1` for previews, `scale: 2` for retina output.\n\n### Concurrency — plain doc, PNG 2×\n\n| Mode | mean per batch |\n| --- | ---: |\n| 1× sequential | 118 ms |\n| 2× parallel | 127 ms |\n| 4× parallel | 192 ms |\n| 8× parallel | 363 ms |\n\nParallel renders share CPU resources; throughput scales near-linearly up to core count.\n\n---\n\n## Rendering Pipeline\n\n```\nMarkdown source\n  │\n  ▼\nCommonMark + GFM AST          (micromark, mdast-util-from-markdown)\n  │\n  ▼\nMarkdownDocument               internal typed document model\n  │\n  ▼\nBlockLayoutFragment[]          block + inline layout engine\n  │\n  ▼\nPage[]                         paginator — slices fragments into fixed-height pages\n  │\n  ▼\nPNG Buffer / SVG string        skia-canvas paint backend\n```\n\nEach stage is independently testable. The layout engine has no dependency on the paint backend, and the paint backend accepts a plain data structure — it does not re-run layout.\n\n---\n\n## Supported Syntax\n\n### CommonMark\n\n| Element | Support |\n| --- | :---: |\n| Headings (H1–H6) | ✓ |\n| Paragraphs | ✓ |\n| **Bold**, *italic*, ***bold italic*** | ✓ |\n| `Inline code` | ✓ |\n| [Links](https://commonmark.org) | ✓ |\n| Fenced code blocks | ✓ |\n| Blockquotes (nested) | ✓ |\n| Ordered lists | ✓ |\n| Unordered lists (nested) | ✓ |\n| Images (block + inline) | ✓ |\n| Thematic breaks | ✓ |\n| Hard line breaks | ✓ |\n\n### GFM Extensions\n\n| Element | Support |\n| --- | :---: |\n| Tables (with alignment) | ✓ |\n| Task lists | ✓ |\n| ~~Strikethrough~~ | ✓ |\n\n### Math (LaTeX via MathJax)\n\n| Element | Support |\n| --- | :---: |\n| Block formulas `$$...$$` | ✓ |\n| Inline formulas `$...$` | ✓ |\n| Math in blockquotes / lists / tables | ✓ |\n| AMSmath, boldsymbol, mathtools | ✓ |\n\n---\n\n## Recipes\n\n### Save all pages as PNG files\n\n```ts\nimport { renderMarkdown } from 'marknative'\nimport { writeFile } from 'node:fs/promises'\n\nconst markdown = await Bun.file('article.md').text()\nconst pages = await renderMarkdown(markdown)\n\nawait Promise.all(\n  pages.map((page, i) =>\n    writeFile(`out/page-${String(i + 1).padStart(2, '0')}.png`, page.data)\n  )\n)\n```\n\n### Serve rendered pages over HTTP with Bun\n\n```ts\nimport { renderMarkdown } from 'marknative'\n\nBun.serve({\n  routes: {\n    '/render': {\n      async POST(req) {\n        const { markdown } = await req.json()\n        const pages = await renderMarkdown(markdown, { format: 'png' })\n        const first = pages[0]\n\n        if (!first || first.format !== 'png') {\n          return new Response('no output', { status: 500 })\n        }\n\n        return new Response(first.data, {\n          headers: { 'Content-Type': 'image/png' },\n        })\n      },\n    },\n  },\n})\n```\n\n### Export as SVG\n\n```ts\nconst pages = await renderMarkdown(markdown, { format: 'svg' })\n\nfor (const page of pages) {\n  if (page.format === 'svg') {\n    console.log(page.data) // inline SVG string\n  }\n}\n```\n\n### Math formulas\n\nBlock and inline LaTeX — rendered server-side via MathJax, no browser required. Formula colors follow the active theme automatically.\n\n```ts\nconst pages = await renderMarkdown(`\n## Fourier Transform\n\n$$\n\\\\hat{f}(\\\\xi) = \\\\int_{-\\\\infty}^{\\\\infty} f(x)\\\\,e^{-2\\\\pi ix\\\\xi}\\\\,dx\n$$\n\nThe gradient $\\\\nabla f$ points in the direction of steepest ascent.\nEntropy: $H(X) = -\\\\sum p \\\\log p$.\n\n\\`\\`\\`python\nimport numpy as np\ndef dft(x):\n    N, n = len(x), np.arange(len(x))\n    return np.exp(-2j * np.pi * n.reshape(N,1) * n / N) @ x\n\\`\\`\\`\n\nComplexity: $O(N^2)$ naïve, $O(N\\\\log N)$ with FFT.\n`)\n```\n\nMathJax is initialised lazily on first use (~180 ms cold start). All subsequent renders reuse the singleton and cached SVGs — warm overhead is < 2 ms.\n\nSee the [Math guide](https://liyown.github.io/marknative/guide/math) for the full reference.\n\n### Syntax highlighting for code blocks\n\n```ts\n// Auto-detected from page background (light → github-light, dark → github-dark)\nconst pages = await renderMarkdown(markdown)\nconst pages = await renderMarkdown(markdown, { theme: 'dark' })   // uses github-dark automatically\n\n// Override the Shiki theme explicitly\nconst pages = await renderMarkdown(markdown, {\n  codeHighlighting: { theme: 'nord' },\n})\n```\n\nThe Shiki theme is auto-selected based on the WCAG relative luminance of the page background — dark page themes automatically get a dark code theme. Code blocks without a language tag fall back to plain monochrome text.\n\n### Control PNG resolution with `scale`\n\n```ts\nconst pages = await renderMarkdown(markdown, { scale: 1 })   // ~29 ms/page — fast preview\nconst pages = await renderMarkdown(markdown, { scale: 2 })   // ~99 ms/page — retina (default)\nconst pages = await renderMarkdown(markdown, { scale: 3 })   // ~214 ms/page — print quality\n```\n\n---\n\n## Tech Stack\n\n| Layer | Library |\n| --- | --- |\n| Markdown parsing | [`micromark`](https://github.com/micromark/micromark) + [`mdast-util-from-markdown`](https://github.com/syntax-tree/mdast-util-from-markdown) |\n| GFM extensions | [`micromark-extension-gfm`](https://github.com/micromark/micromark-extension-gfm) + [`mdast-util-gfm`](https://github.com/syntax-tree/mdast-util-gfm) |\n| Math rendering | [`mathjax-full`](https://github.com/mathjax/MathJax-src) (server-side SVG, liteAdaptor) |\n| Syntax highlighting | [`shiki`](https://shiki.style/) |\n| Text shaping | [`@chenglou/pretext`](https://github.com/chenglou/pretext) |\n| 2D rendering | [`skia-canvas`](https://github.com/samizdatco/skia-canvas) |\n| Language | TypeScript |\n\n---\n\n## Roadmap\n\n- [ ] Improve paragraph line-breaking quality for English prose\n- [ ] Refine CJK and mixed Chinese-English line-breaking rules\n- [x] Syntax highlighting for code blocks (Shiki, all themes, auto-detected from theme)\n- [x] LaTeX math rendering (MathJax, block + inline, all block types)\n- [x] Expose public theme and page configuration API\n- [x] PNG resolution control (`scale` option)\n- [ ] Support custom fonts\n- [ ] Complete GFM coverage (footnotes, autolinks)\n\n---\n\n## License\n\nMIT & Linux Do\n","summary":"`marknative` is a headless Markdown rendering engine that converts markdown directly into paginated PNG or SVG documents, bypassing browsers and DOM rendering. It parses CommonMark and GitHub‑Flavored Markdown, applies its own layout engine, and supports syntax‑highlighted code blocks via Shiki and LaTeX math formulas using MathJax, all server‑side through a Skia canvas backend. The engine delivers deterministic page breaks and fast batch rendering, making it ideal for back‑end services, documentation generators, or any workflow that needs reproducible, image‑based snapshots of Markdown content without the overhead of Chromium.","description":"A Markdown rendering engine that generates paginated PNG and SVG output — no browser, no Chromium, no DOM.","stars":583,"language":"TypeScript"},{"owner":"filiksyos","repo":"gitreverse","url":"https://github.com/filiksyos/gitreverse","readme":"# GitReverse\n\nhttps://github.com/user-attachments/assets/f0cdb7b2-c6f0-4483-8a01-153170479f2e\n\nTurn a **public GitHub repository** into a **single synthetic user prompt** that someone might paste into Cursor, Claude Code, Codex, etc. to vibe code the project from scratch.\n\nThe app pulls **repo metadata**, a **root file tree** (depth 1), and the **README**, then uses an LLM via [OpenRouter](https://openrouter.ai/) to produce one short, conversational prompt grounded in that context.\n\nPaste a GitHub URL or `owner/repo` on the home page. You can also open **`/owner/repo`** (e.g. `/vercel/next.js`) for a shareable link that runs the same flow.\n\n## Stack\n\nNext.js (App Router), React, TypeScript, Tailwind CSS, GitHub API, OpenRouter.\n\n## Configuration\n\nCopy `.env.example` to `.env.local`. You need **`OPENROUTER_API_KEY`**. Optional: `OPENROUTER_MODEL` (defaults to `google/gemini-2.5-pro`), `GITHUB_TOKEN` for better GitHub rate limits, and Supabase env vars from the example file if you want server-side caching.\n\n### Custom reverse (optional, beta)\n\nFor **deep / focus** prompts, run the **custom_reverse** service (separate TypeScript project; see its `README`; `pnpm dev`, default port **3001**) locally or deploy it to your own backend. In `.env.local` set:\n\n`CUSTOM_REVERSE_SERVICE_URL=http://localhost:3001`\n\n**Invite-only access:** Set `CUSTOM_REVERSE_INVITE_CODES` to a comma-separated list of opaque strings (e.g. `alpha-2026,beta-friend-02`). On Vercel, add the same variable in Project Settings → Environment Variables, then redeploy. Without codes in **production**, Custom reverse returns an error (the feature stays off until configured). In **local development**, you can omit `CUSTOM_REVERSE_INVITE_CODES` to skip the invite gate while testing.\n\nThen enable **Custom reverse** on the home page (you will be prompted for an invite code), and describe what to reverse-engineer.\n\n## Development\n\n```bash\npnpm install\npnpm dev\n```\n\nOpen [http://localhost:3000](http://localhost:3000).\n\n```bash\npnpm build\npnpm start\npnpm lint\n```\n\nShout out to [GitIngest](http://github.com/coderamp-labs/gitingest) for inspiration.\n","summary":"GitReverse turns any public GitHub repository into a single, polished prompt that can be fed to LLM tools such as Cursor, Claude Code, or Codex, enabling the model to “voice‑dial” the project from scratch. It gathers the repo’s metadata, root‑level file tree and README, then uses an LLM via OpenRouter to generate a short, conversational prompt grounded in that context. Users can simply paste a GitHub URL or navigate to /owner/repo for a shareable link that reproduces the same flow, and optional custom reverse prompts let teams zero in on specific parts of large projects. Developers, educators, and researchers who rely on large‑language‑model code generation will find this tool helpful for quickly generating project‑aware prompts.","description":"Reverse engineer any repo into it's original prompt","stars":704,"language":"TypeScript"},{"owner":"ankitvgupta","repo":"mail-app","url":"https://github.com/ankitvgupta/mail-app","readme":"<div align=\"center\">\n\n### Exo: Claude Code for your Inbox\n\n[![GitHub stars](https://img.shields.io/github/stars/ankitvgupta/exo?style=flat&logo=github)](https://github.com/ankitvgupta/exo/stargazers)\n[![GitHub release](https://img.shields.io/github/v/release/ankitvgupta/exo?style=flat&logo=github)](https://github.com/ankitvgupta/exo/releases)\n[![License](https://img.shields.io/github/license/ankitvgupta/exo?style=flat)](LICENSE)\n[![Download DMG](https://img.shields.io/github/v/release/ankitvgupta/exo?label=Download%20.dmg&logo=apple&style=flat-square)](https://github.com/ankitvgupta/exo/releases/latest)\n\n<br />\n\nExo is Claude Code for your Inbox. It's an open source, AI-native desktop email client. <br />\nBuilt with Electron, React, TypeScript, and Tailwind CSS.\n\n<br />\n\n[**Download for macOS**](https://github.com/ankitvgupta/exo/releases/latest) &nbsp;&bull;&nbsp; [Documentation](https://exo.email) &nbsp;&bull;&nbsp; [Changelog](https://github.com/ankitvgupta/exo/releases)\n\n<br />\n\n<img width=\"1200\" alt=\"Exo\" src=\"docs/images/readme-hero.png\" />\n\n</div>\n\n\n# Exo\n\n[![Download DMG](https://img.shields.io/github/v/release/ankitvgupta/exo?label=Download%20.dmg&logo=apple&style=flat-square)](https://github.com/ankitvgupta/exo/releases/latest)\n\nAn open source, AI-native desktop email client. Built with Electron, React, TypeScript, and Tailwind CSS.\n\nExo treats AI as a first-class citizen — not a bolted-on feature. Every email gets analyzed, prioritized, and optionally drafted before you even open it. The goal is zero cognitive load: open your inbox and everything is already handled or ready to send.\n\n## Getting Started \n\nYou can click the \"Download .dmg\" button above to download a Mac app that is ready for configuration. All you need to provide is Gmail API information (it has instructions) and an Anthropic API Key. If you're a developer, see the instructions at the bottom, or ask Claude Code to figure it out. \n\n## Features\n\n### AI-Powered Email\n\n- **Automatic triage** — Claude analyzes every incoming email and assigns a priority (high / medium / low / skip), so your inbox is pre-sorted by what actually matters\n- **Smart draft generation** — AI-generated reply drafts that consider thread context, sender background, and your writing style. Drafts are generated in the background so they're ready when you open a thread\n- **Draft refinement** — iteratively improve any draft with natural language feedback (\"make this shorter\", \"more formal\", \"add the pricing details\")\n- **Writing style learning** — the system extracts style samples from your sent mail and uses few-shot examples so drafts sound like you, not a chatbot\n- **Sender lookup** — automatic web search via Claude to surface sender context (role, company, LinkedIn) in a sidebar panel\n- **Draft-edit learning** — when you edit an AI draft before sending, Exo extracts your preferences and applies them to future drafts\n- **Archive-ready detection** — identifies threads that are conversationally complete and can be safely archived\n- **Reminder detection** — recognizes Boomerang/reminder service emails and traces back to the original sender\n\n\nhttps://github.com/user-attachments/assets/1e5d1e33-c46d-4519-aae5-e00aed8dda6b\n\n\n### Agent System\n\n- **Cmd+J agent palette** — ask Claude to do anything with the current email: draft a reply, look something up, forward with context. Agent traces are displayed in a sidebar tab\n- **Agent tools** — the agent can read emails, read/update drafts, search Gmail, and forward messages\n- **Per-email agent tasks** — each email can have its own running agent task, visible in the sidebar\n- **Follow-up conversations** — continue talking to the agent about a specific email across multiple turns\n- **Agent-to-agent communication** — Exo's built-in Claude agent can delegate to external agents you bring. Register a third-party agent (like [OpenClaw](https://openclaw.com)) or one internal to your company, and the Exo agent will automatically call out to it when it needs domain-specific information. For example, if you register your company's internal knowledge agent, the Exo agent can ask it \"what's the status of the Acme deal?\" while drafting a reply, without you having to switch tools\n\n\n\nhttps://github.com/user-attachments/assets/442f5320-2bec-4348-937d-48ad2100552e\n\n\n\n### Memory System\n\n- **Priority memory** — learns from your classification overrides. Reclassify a sender as high priority and Exo remembers for all future emails from them\n- **Persistent AI memories** — the AI accumulates memories about your preferences, contacts, and workflows that persist across app updates. Memories are scoped (per-sender, per-topic) with configurable caps\n- **Steerable behavior** — add memories that direct the agent's behavior. For example: \"for emails from Acme Corp, check the #acme-deals Slack channel for context\", or \"when drafting to investors, use a formal tone and always include our latest metrics from the dashboard\"\n- **Memories tab** — view, search, and manage all stored memories in Settings. Memories display their source (auto-learned from edits, priority overrides, or manually added)\n\n### Extensions & Agent Providers\n\n- **Bundled extensions** — ship with the app, statically imported at build time\n- **Private extensions** — discovered at build time via `import.meta.glob`, auto-registered. Use this to add proprietary extensions for your team without forking\n- **Runtime-installable extensions** — install/uninstall extensions without rebuilding the app\n- **Custom agent providers** — extensions can register their own AI agent providers. Build an agent that talks to your company's internal APIs, knowledge bases, or tooling, package it as an extension, and it appears in the Cmd+J palette alongside the built-in Claude agent. The Exo agent can also sub-delegate to your agent provider, so your internal agents participate in the conversation automatically when relevant\n- **Extension authentication** — extensions can require auth, with banner UI and onboarding integration\n- **Sidebar panels** — extensions can add custom sidebar tabs scoped to specific emails (e.g., show CRM data, support ticket status, or deal context alongside the email)\n- **MCP server support** — configure custom MCP servers that agents can use as tool providers\n\n### Inbox Organization\n\n- **Split inbox** — Priority, Other, and custom split tabs that categorize emails automatically\n- **Split import** — import your existing inbox splits\n- **Snoozed tab** — snooze emails to reappear later with natural language time input (\"tomorrow morning\", \"next Monday\")\n- **Sent mail view** — dedicated view for sent emails\n- **Archive-ready view** — one-click batch archive for threads the AI has determined are complete\n- **Chronological sorting** with newest-first or oldest-first\n\n### Email Composition\n\n- **Rich text editor** — ProseMirror-based compose with formatting toolbar\n- **`@`mention autocomplete** — type `@` or `+` in the compose body to mention someone and auto-add them as CC\n- **CC/BCC fields** — collapsible, with full autocomplete from contact history\n- **Email signatures** — create and manage multiple signatures, auto-appended to outgoing mail\n- **Inline reply** — reply directly below any message in a thread, not just the latest one\n- **Reply-all default** — reply-all is the default action, matching how most professional email works\n- **Forward with threading** — forwards stay in the original thread via In-Reply-To header merging\n- **Drag-and-drop recipients** — reorder recipient chips between To/CC/BCC\n- **Instant Intro** — compose introductions between contacts with a single command\n- **Scheduled send** — \"send later\" with time picker\n- **Undo send** — configurable delay window to cancel outgoing messages (Cmd+Z)\n- **Inline images** — paste, drag-and-drop, or attach images directly in the email body\n- **Attachments** — download, preview, and forward attachments. Compose with file attachments\n\n### Keyboard-Driven\n\n- **Fast shortcuts** — j/k navigation, e to archive, # to trash, s to star, u to mark unread, g-prefix navigation (g+i inbox, g+d drafts, g+t trash, g+s starred)\n- **Gmail bindings** — optional Gmail-standard keybindings, toggleable in settings\n- **Arrow key navigation** — up/down to navigate, enter to open\n- **Cmd+K command palette** — fuzzy search across all app actions\n- **Tab cycling** — backtick/tilde to cycle through inbox split tabs\n- **Batch selection** — Cmd+click, Shift+click, Shift+J/K for multi-select with bulk archive/trash/star\n\n### Multi-Account\n\n- **Multiple Gmail accounts** — OAuth authentication with per-account tokens\n- **Instant account switching** — switch accounts without re-fetching from the API\n- **Per-account sync state** — each account syncs independently with its own history ID\n- **Cross-account isolation** — splits, snooze timers, and agent tasks are scoped per-account\n\n### Sync & Performance\n\n- **Background sync** — incremental sync via Gmail History API every 30 seconds\n- **Offline support** — queue sends and actions when offline, execute when back online\n- **Optimistic UI** — archive, trash, star, and mark-unread update instantly, roll back on failure\n- **Undo for everything** — undo archive, trash, star, unstar, snooze, and mark-unread\n- **LRU HTML cache** — sanitized email HTML is cached for instant thread navigation\n- **Sync buffering** — background sync updates are batched to prevent UI jank during navigation\n- **Image prefetching** — images in opened emails are prefetched for instant rendering\n\n### Search\n\n- **Hybrid search** — local FTS5 full-text search combined with Gmail API remote search for exhaustive results\n- **Threaded results** — search results display as threads, not individual messages\n- **Infinite scroll** — paginated search results with automatic loading\n\n### Calendar\n\n- **Calendar sidebar** — day view with events extracted from your Google Calendar\n- **Multi-account calendars** — syncs calendars from all connected accounts\n- **Per-calendar visibility** — toggle individual calendars on/off\n\n### Executive Assistant Integration\n\n- **Scheduling detection** — CalendaringAgent identifies emails that involve scheduling\n- **Auto-CC** — automatically CC your EA on scheduling-related emails\n- **Deferral language** — drafts include text deferring scheduling to your assistant\n- **Configurable** in Settings → Executive Assistant tab\n\n### Desktop Integration\n\n- **Auto-update** — checks for updates daily with download progress, supports pre-release channels\n- **Default mail app** — register as the system default mail handler (mailto: protocol)\n- **macOS native** — hidden titlebar with traffic light buttons, code-signed and notarized\n- **Dark mode** — class-based theme toggle with smart inversion for email content\n- **Inbox density** — comfortable, default, and compact density settings\n- **PostHog analytics** — opt-in analytics with session replay for debugging (no PII)\n- **Bug reporting** — built-in bug report system\n\n## Setup\n\n### 1. Install Dependencies\n\n```bash\nnpm install\n```\n\n### 2. Set API Key\n\n```bash\nexport ANTHROPIC_API_KEY=your_key_here\n```\n\n### 3. Run\n\n```bash\nnpm run dev\n```\n\n### Demo Mode (no API keys needed)\n\n```bash\nnpm run dev:demo\n```\n\n## Commands\n\n```bash\nnpm run dev          # Start dev server\nnpm run dev:demo     # Demo mode with fake data\nnpm run build        # Production build\nnpm test             # Run all tests\nnpx tsc --noEmit     # Type check\n```\n\n## Configuration\n\nAll config lives under `~/Library/Application Support/exo/` on macOS.\n\nSee [CLAUDE.md](CLAUDE.md) for architecture details and data flows.\n","summary":"Exo is an AI‑native desktop email client that treats Claude as a first‑class citizen, automatically analyzing every message for priority, generating contextual drafts, and learning your writing style to produce responses that feel like you. The client offers a built‑in agent palette for ad‑hoc tasks such as drafting, searching, or forwarding emails, with a side‑panel that tracks agent interactions, sender context, and archive‑ready threads. Built with Electron, React, TypeScript, and Tailwind, it is lightweight yet powerful, designed for anyone who wants a zero‑cognitive‑load inbox experience or developers looking to extend its agent system with custom tools.","description":"Claude Code for your Inbox","stars":412,"language":"TypeScript"},{"owner":"midudev","repo":"autoskills","url":"https://github.com/midudev/autoskills","readme":"<div align=\"center\">\n\n<a href=\"https://autoskills.sh\">\n<img src=\"https://autoskills.sh/og.jpg\" alt=\"autoskills\" />\n</a>\n\n# autoskills\n\n**One command. Your entire A
