ty vulnerabilities come from plugins](https://patchstack.com/whitepaper/state-of-wordpress-security-in-2024/). EmDash is what WordPress would look like if you started from scratch with today's tools.\n\n**Sandboxed plugins.** WordPress plugins have full access to the database, filesystem, and user data. A single vulnerable plugin can compromise the entire site. EmDash plugins run in isolated [Worker sandboxes](https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/) via Dynamic Worker Loaders, each with a declared capability manifest. A plugin that requests `read:content` and `email:send` can do exactly that and nothing else.\n\n```typescript\nexport default () =>\n\tdefinePlugin({\n\t\tid: \"notify-on-publish\",\n\t\tcapabilities: [\"read:content\", \"email:send\"],\n\t\thooks: {\n\t\t\t\"content:afterSave\": async (event, ctx) => {\n\t\t\t\tif (event.content.status !== \"published\") return;\n\t\t\t\tawait ctx.email.send({\n\t\t\t\t\tto: \"editors@example.com\",\n\t\t\t\t\tsubject: `New post: ${event.content.title}`,\n\t\t\t\t});\n\t\t\t},\n\t\t},\n\t});\n```\n\n**Structured content, not serialized HTML.** WordPress stores rich text as HTML with metadata embedded in comments -- tying your content to its DOM representation. EmDash uses [Portable Text](https://www.portabletext.org/), a structured JSON format that decouples content from presentation. Your content can render as a web page, a mobile app, an email, or an API response without parsing HTML.\n\n**Built for agents.** EmDash ships with agent skills for building plugins and themes, a CLI that lets agents manage content and schema programmatically, and a built-in [MCP server](https://modelcontextprotocol.io/) so AI tools like Claude and ChatGPT can interact with your site directly.\n\n**Runs anywhere.** EmDash uses portable abstractions at every layer -- Kysely for SQL, S3 API for storage -- that work with SQLite, D1, Turso, PostgreSQL, R2, AWS S3, or local files. It runs best on Cloudflare, but it's not locked to it.\n\n## How It Works\n\nEmDash is an Astro integration. Add it to your config and you get a complete CMS: admin panel, REST API, authentication, media library, and plugin system.\n\n```typescript\n// astro.config.mjs\nimport emdash from \"emdash/astro\";\nimport { d1 } from \"emdash/db\";\n\nexport default defineConfig({\n\tintegrations: [emdash({ database: d1() })],\n});\n```\n\nContent types are defined in the database, not in code. Non-developers create and modify collections through the admin UI. Each collection gets a real SQL table with typed columns. Developers generate TypeScript types from the live schema:\n\n```bash\nnpx emdash types\n```\n\nQuery content using Astro's Live Collections -- no rebuilds, no separate API:\n\n```astro\n---\nimport { getEmDashCollection } from \"emdash\";\nconst { entries: posts } = await getEmDashCollection(\"posts\");\n---\n\n{posts.map((post) => <article>{post.data.title}</article>)}\n```\n\n## Features\n\n**Content** -- Blog posts, pages, custom content types. Rich text editing via TipTap with Portable Text storage. Revisions, drafts, scheduled publishing, full-text search (FTS5), inline visual editing.\n\n**Admin** -- Full admin panel with visual schema builder, media library (drag-drop uploads via signed URLs), navigation menus, taxonomies, widgets, and a WordPress import wizard.\n\n**Auth** -- Passkey-first (WebAuthn) with OAuth and magic link fallbacks. Role-based access control: Administrator, Editor, Author, Contributor.\n\n**Plugins** -- `definePlugin()` API with lifecycle hooks, KV storage, settings, admin pages, dashboard widgets, custom block types, and API routes. Sandboxed execution on Cloudflare via Dynamic Worker Loaders.\n\n**Agents** -- Skill files for AI-assisted plugin and theme development. CLI for programmatic site management. Built-in MCP server for direct AI tool integration.\n\n**WordPress migration** -- Import posts, pages, media, and taxonomies from WXR exports, the WordPress REST API, or WordPress.com. Agent skills help port plugins and themes.\n\n## Portable Platforms\n\n| Layer    | Cloudflare                  | Also works with                                     |\n| -------- | --------------------------- | --------------------------------------------------- |\n| Database | D1                          | SQLite, Turso/libSQL, PostgreSQL                    |\n| Storage  | R2                          | AWS S3, any S3-compatible service, local filesystem |\n| Sessions | KV                          | Redis, file-based                                   |\n| Plugins  | Worker isolates (sandboxed) | In-process (safe mode)                              |\n\n## Status\n\nEmDash is in **beta preview**. We welcome contributions, feedback, plugins, themes, and ideas.\n\n```bash\nnpm create emdash@latest\n```\n\nSee the [documentation](https://github.com/emdash-cms/emdash/tree/main/docs) for guides, API reference, and plugin development.\n\n## Development\n\nThis is a pnpm monorepo. To contribute:\n\n```bash\ngit clone https://github.com/emdash-cms/emdash.git && cd emdash\npnpm install\npnpm build\n```\n\nRun the demo (Node.js + SQLite, no Cloudflare account needed):\n\n```bash\npnpm --filter emdash-demo seed\npnpm --filter emdash-demo dev\n```\n\nOpen the admin at [http://localhost:4321/\\_emdash/admin](http://localhost:4321/_emdash/admin).\n\n```bash\npnpm test          # run all tests\npnpm typecheck     # type check\npnpm lint:quick    # fast lint (< 1s)\npnpm format        # format with oxfmt\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the full contributor guide.\n\n## Repository Structure\n\n```\npackages/\n  core/           Astro integration, APIs, admin UI, CLI\n  auth/           Authentication library\n  blocks/         Portable Text block definitions\n  cloudflare/     Cloudflare adapter (D1, R2, Worker Loader)\n  plugins/        First-party plugins (forms, embeds, SEO, audit-log, etc.)\n  create-emdash/  npm create emdash scaffolding\n  gutenberg-to-portable-text/  WordPress block converter\n\ntemplates/        Starter templates (blog, marketing, portfolio, starter, blank)\ndemos/            Development and example sites\ndocs/             Documentation site (Starlight)\n```\n","summary":"EmDash is a full‑stack TypeScript CMS that reimagines WordPress for the serverless era, built atop Astro and Cloudflare’s platform. It offers a plugin ecosystem where each plugin runs in a sandboxed Worker isolate with a fine‑grained capability manifest, eliminating the security risks that plague traditional WordPress plugins. Content is stored in structured Portable Text rather than serialized HTML, enabling flexible rendering across web, mobile, or API contexts. Developers and site owners who want a TypeScript‑first, serverless CMS with secure extensibility and modern performance will find EmDash an attractive alternative to PHP‑based solutions.","description":"EmDash is a full-stack TypeScript CMS based on Astro; the spiritual successor to WordPress","stars":9804,"language":"TypeScript"},{"owner":"elastic","repo":"supply-chain-monitor","url":"https://github.com/elastic/supply-chain-monitor","readme":"# Supply Chain Monitor\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n\nAutomated monitoring of the top **PyPI** and **npm** packages for supply chain compromise. Polls both registries for new releases, diffs each release against its predecessor, and uses an LLM (via [Cursor Agent CLI](https://cursor.com/docs/cli/overview)) to classify diffs as **benign** or **malicious**. Malicious findings trigger a Slack alert.\n\nBoth ecosystems are monitored by default. Use `--no-pypi` or `--no-npm` to disable one.\n\n## How It Works\n\nEach ecosystem runs its own polling thread but shares the analysis and alerting pipeline.\n\n```\n         ┌─── PyPI ──────────────────────┐   ┌─── npm ───────────────────────┐\n         │                               │   │                               │\n         │ changelog_since_serial()      │   │ CouchDB _changes feed         │\n         │       │                       │   │       │                       │\n         │       ▼                       │   │       ▼                       │\n         │  ┌────────────┐               │   │  ┌────────────┐               │\n         │  │ All PyPI   │─┐             │   │  │ All npm    │─┐             │\n         │  │ events     │ │             │   │  │ changes    │ │             │\n         │  └────────────┘ ▼             │   │  └────────────┘ ▼             │\n         │ hugovk ──► Watchlist          │   │ download-counts ─► Watchlist  │\n         │       │                       │   │       │                       │\n         │ \"new release\" events only     │   │ new versions since last epoch │\n         └───────────────┬───────────────┘   └───────────────┬───────────────┘\n                         │                                   │\n                         ▼                                   ▼\n               ┌───────────────────┐               ┌───────────────────┐\n               │ Download old + new│               │ Download old + new│\n               │ (sdist + wheel)   │               │ (tarball)         │\n               └───────────────────┘               └───────────────────┘\n                         │                                   │\n                         └─────────────────┬─────────────────┘\n                                           ▼\n                                   ┌───────────────┐\n                                   │ Unified diff  │\n                                   │ report (.md)  │\n                                   └───────┬───────┘\n                                           ▼\n                                   ┌───────────────┐  ◄── LLM analysis\n                                   │ Cursor Agent  │      (read-only)\n                                   │ CLI (ask mode)│\n                                   └───────┬───────┘\n                                           │\n                                       verdict?\n                                           │\n                                 malicious │\n                                           ▼\n                                   ┌───────────────┐\n                                   │ Slack alert   │\n                                   └───────────────┘\n```\n\n### Detection Targets\n\nThe LLM analysis is prompted to look for:\n\n- Obfuscated code (base64, exec, eval, XOR, encoded strings)\n- Network calls to unexpected hosts\n- File system writes to startup/persistence locations\n- Process spawning and shell commands\n- Steganography or data hiding in media files\n- Credential and token exfiltration\n- Typosquatting indicators\n\n## Prerequisites\n\n- **Python 3.9+** — install runtime dependencies with `pip install -r requirements.txt` (stdlib covers most of the tool; `requests` is used for Slack uploads)\n- **Cursor Agent CLI** — the standalone `agent` binary, not the IDE\n\n### Installing Cursor Agent CLI\n\n**Windows (PowerShell):**\n```powershell\nirm 'https://cursor.com/install?win32=true' | iex\n```\n\n**macOS / Linux:**\n```bash\ncurl https://cursor.com/install -fsS | bash\n```\n\nVerify with:\n```bash\nagent --version\n```\n\nYou must be authenticated with Cursor (`agent login` or set `CURSOR_API_KEY`).\n\n### Slack Configuration\n\nPlace your Slack bot token in `etc/slack.json`:\n\n```json\n{\n    \"url\": \"https://hooks.slack.com/services/...\",\n    \"bot_token\": \"xoxb-...\",\n    \"channel\": \"C01XXXXXXXX\"\n}\n```\n\nThe bot needs `chat:write` scope on the target channel. The `channel` field is the Slack channel ID where alerts are posted.\n\n## Quick Start\n\n```bash\n# One-shot: analyze releases from the last ~10 minutes\npython monitor.py --once\n\n# Continuous: monitor top 1000 packages (both ecosystems), poll every 5 min\npython monitor.py --top 1000 --interval 300\n\n# Production: monitor top 15000, alert to Slack\npython monitor.py --top 15000 --interval 300 --slack\n\n# npm only, top 5000\npython monitor.py --no-pypi --npm-top 5000\n\n# PyPI only\npython monitor.py --no-npm\n```\n\n## File Overview\n\n| File | Purpose |\n|------|---------|\n| `monitor.py` | **Main orchestrator** — poll PyPI + npm, diff, analyze, alert (parallel threads) |\n| `pypi_monitor.py` | Standalone PyPI changelog poller (used for exploration) |\n| `package_diff.py` | Download and diff two versions of any PyPI or npm package |\n| `analyze_diff.py` | Send a diff to Cursor Agent CLI, parse verdict |\n| `top_pypi_packages.py` | Fetch and list top N PyPI packages by download count |\n| `slack.py` | Slack API client (SendMessage, PostFile) |\n| `etc/slack.json` | Slack bot credentials |\n| `last_serial.yaml` | Persisted polling state (PyPI serial + npm sequence/epoch) |\n| `logs/` | Daily log files (`monitor_YYYYMMDD.log`) |\n\n## Usage Details\n\n### monitor.py — Main Orchestrator\n\n```\npython monitor.py [OPTIONS]\n\nOptions:\n  --top N          Number of top packages to watch per ecosystem (default: 15000)\n  --interval SECS  Poll interval in seconds (default: 300)\n  --once           Single pass over recent events, then exit\n  --slack          Enable Slack alerts for malicious findings\n  --model MODEL    Override LLM model (default: composer-2-fast)\n  --debug          Enable DEBUG logging (includes agent raw output)\n\nPyPI options:\n  --no-pypi        Disable PyPI monitoring\n  --serial N       PyPI changelog serial to start from\n\nnpm options:\n  --no-npm         Disable npm monitoring\n  --npm-top N      Top N npm packages to watch (default: same as --top)\n  --npm-seq N      npm replication sequence to start from\n```\n\nPyPI and npm each run in their own polling thread. Polling state (PyPI serial, npm sequence + epoch) is persisted to `last_serial.yaml` so the monitor resumes where it left off after a restart.\n\n**PyPI pipeline:**\n1. Loads the top N packages from the [hugovk/top-pypi-packages](https://hugovk.github.io/top-pypi-packages/) dataset as a watchlist\n2. Connects to PyPI's XML-RPC API and gets the current serial number\n3. Every `--interval` seconds, calls `changelog_since_serial()` — a single API call that returns all events since the last check\n4. Filters for `\"new release\"` events matching the watchlist\n5. For each new release: downloads old + new versions (sdist and wheel when both exist), diffs, analyzes via LLM, and alerts Slack if malicious\n\n**npm pipeline:**\n1. Loads the top N packages from the [download-counts](https://www.npmjs.com/package/download-counts) dataset (falls back to npm search API)\n2. Reads the current CouchDB replication sequence from `replicate.npmjs.com`\n3. Every `--interval` seconds, fetches the `_changes` feed for all registry changes since the last sequence\n4. Filters changed packages against the watchlist and checks for versions published after the last poll epoch\n5. For each new release: downloads old + new tarballs from the npm registry, diffs, analyzes via LLM, and alerts Slack if malicious\n\nAll output is logged to both the console and `logs/monitor_YYYYMMDD.log`.\n\n### package_diff.py — Package Differ\n\n```bash\n# Compare two versions from PyPI\npython package_diff.py requests 2.31.0 2.32.0\n\n# Compare two versions from npm\npython package_diff.py --npm express 4.18.2 4.19.0\n\n# Save to file\npython package_diff.py telnyx 2.0.0 2.1.0 -o telnyx_diff.md\n\n# Compare local archives\npython package_diff.py --local old.tar.gz new.tar.gz -n mypackage\n```\n\nDownloads are done directly via registry APIs (PyPI JSON API / npm registry), not pip or npm. This means:\n- **No pip/npm dependency** for downloads\n- **Platform-agnostic** — can download and diff Linux-only packages from Windows\n- PyPI: prefers wheel (pure-Python when available), falls back to sdist\n- npm: downloads tarballs directly from the registry\n\n### analyze_diff.py — LLM Verdict\n\n```bash\n# Analyze a diff file\npython analyze_diff.py telnyx_diff.md\n\n# JSON output\npython analyze_diff.py telnyx_diff.md --json\n\n# Use a specific model\npython analyze_diff.py telnyx_diff.md --model claude-4-opus\n```\n\nRuns Cursor Agent CLI in `--mode ask` (read-only) with `--trust`. The agent reads the diff file and returns a structured verdict.\n\nExit codes: `0` = benign, `1` = malicious, `2` = unknown/error.\n\n### pypi_monitor.py — Standalone Poller\n\n```bash\n# See what's being released right now (last ~10 min)\npython pypi_monitor.py --once --top 15000\n\n# Continuous monitoring (console output only, no analysis)\npython pypi_monitor.py --top 1000 --interval 120\n```\n\nUseful for exploring PyPI release velocity or debugging the changelog API without running the full analysis pipeline.\n\n### top_pypi_packages.py — Package Rankings\n\n```bash\n# Print top 1000 packages\npython top_pypi_packages.py\n```\n\n```python\n# Use as a library\nfrom top_pypi_packages import fetch_top_packages\npackages = fetch_top_packages(top_n=500)\n# [{\"project\": \"boto3\", \"download_count\": 1577565199}, ...]\n```\n\n## Data Sources\n\n| Source | What | Rate Limits |\n|--------|------|-------------|\n| [hugovk/top-pypi-packages](https://hugovk.github.io/top-pypi-packages/) | Top 15,000 PyPI packages by 30-day downloads (monthly JSON) | None (static file) |\n| [PyPI XML-RPC](https://warehouse.pypa.io/api-reference/xml-rpc.html) `changelog_since_serial()` | Real-time PyPI event firehose | Deprecated but functional; 1 call per poll is fine |\n| [PyPI JSON API](https://warehouse.pypa.io/api-reference/json.html) | Package metadata, version history, download URLs | Generous; used sparingly (1 call per release) |\n| [download-counts](https://www.npmjs.com/package/download-counts) (nice-registry) | Monthly download counts for every npm package (`counts.json`) | None (npm tarball) |\n| [npm CouchDB replication](https://replicate.npmjs.com) `_changes` feed | Real-time npm registry change stream | Public; paginated reads |\n| [npm registry API](https://registry.npmjs.org) | Package packuments, tarball downloads | Generous; used sparingly |\n\nThe monitor makes **1 API call per poll interval per ecosystem** (PyPI changelog / npm `_changes`), plus **2-3 calls per new release** (version history + downloads). This is very lightweight.\n\n## Example Alerts\n\nWhen the monitor detects a malicious release, it posts to Slack:\n\n**PyPI:**\n```\n🚨 Supply Chain Alert: telnyx 4.87.2\n\nRank: #5,481 of top PyPI packages\nVerdict: MALICIOUS\nPyPI: https://pypi.org/project/telnyx/4.87.2/\n\nAnalysis summary (truncated):\nThe changes to src/telnyx/_client.py implement obfuscated\ndownload-decrypt-execute behavior and module-import side effects.\nA _d() function decodes base64 strings, a massive _p blob contains\nan exfiltration script that downloads a .wav file from\nhttp://83.142.209.203:8080/ringtone.wav and extracts a hidden\npayload via steganography...\n```\n\n**npm:**\n```\n🚨 Supply Chain Alert: axios 0.30.4\n\nRank: #42 of top npm packages\nVerdict: MALICIOUS\nnpm: https://www.npmjs.com/package/axios/v/0.30.4\n\nAnalysis summary (truncated):\n1. **Non-standard dependency** — The `dependencies` block includes `plain-crypto-js`. Published axios only depends on `follow-redirects`, `form-data`, and `proxy-from-env`. A fourth package whose name looks like a **`crypto-js`–style typosquat** is a classic sign of a tampered or fake package, not a normal axios release.\n```\n\n## Limitations\n\n- Releases are analyzed sequentially within each ecosystem thread. During high release volume, there will be a processing backlog.\n- **Cursor Agent CLI required** — analysis depends on an active Cursor subscription and the `agent` CLI being authenticated.\n- **Sandbox mode** (filesystem isolation) is only available on macOS/Linux. On Windows, the agent runs in read-only `ask` mode but without OS-level sandboxing.\n- **Watchlists are static** — loaded once at startup from the hugovk (PyPI) and download-counts (npm) datasets. Restart to refresh.\n- **npm _changes gap protection** — if the saved npm sequence falls more than 10,000 changes behind the registry head, the monitor resets to head to avoid a long catch-up. Releases during the gap are missed.\n\n## Logging\n\nLogs are written to both stdout and `logs/monitor_YYYYMMDD.log`. A new file is created each day. Both ecosystems log to the same file, with npm lines prefixed `[npm]`. Example:\n\n```\n2026-03-27 12:01:15 [INFO] Fetching top 15,000 packages from hugovk dataset...\n2026-03-27 12:01:16 [INFO] Watchlist loaded: 15,000 packages (dataset updated 2026-03-01 07:34:08)\n2026-03-27 12:01:16 [INFO] Fetching top 15,000 npm packages from download-counts dataset...\n2026-03-27 12:01:18 [INFO] npm watchlist loaded: 15,000 packages (download-counts 1.0.52)\n2026-03-27 12:01:19 [INFO] [pypi] Starting serial: 35,542,068 (from last_serial.yaml) — polling every 300s\n2026-03-27 12:01:19 [INFO] [npm] Starting seq: 42,817,503 (from last_serial.yaml) — polling every 300s\n2026-03-27 12:06:18 [INFO] [pypi] 2 new watchlist releases detected (serial 35,542,068 -> 35,542,190)\n2026-03-27 12:06:18 [INFO] [pypi] Processing fast-array-utils 1.4 (rank #8,231)...\n2026-03-27 12:06:18 [INFO] [pypi] Diffing fast-array-utils 1.3 -> 1.4\n2026-03-27 12:06:50 [INFO] [pypi] Analyzing diff for fast-array-utils...\n2026-03-27 12:07:35 [INFO] [pypi] Verdict for fast-array-utils 1.4: BENIGN\n2026-03-27 12:06:20 [INFO] [npm] 1 new watchlist releases detected (seq -> 42,817,612)\n2026-03-27 12:06:20 [INFO] [npm] Processing axios 0.30.4 (rank #42)...\n2026-03-27 12:06:21 [INFO] [npm] Diffing axios 0.30.3 -> 0.30.4\n2026-03-27 12:07:01 [INFO] [npm] Analyzing diff for axios...\n2026-03-27 12:07:45 [INFO] [npm] Verdict for axios 0.30.4: MALICIOUS\n```\n\n## Contributing, community, and license\n\nThis project is licensed under the [MIT License](LICENSE). Third-party data sources and notices are summarized in [NOTICE.txt](NOTICE.txt).\n\nContributions are welcome — see [CONTRIBUTING.md](CONTRIBUTING.md). This repository follows the [Contributor Covenant](CODE_OF_CONDUCT.md). Report security issues through [SECURITY.md](SECURITY.md), not public issues.\n\nQuestions and discussion: [Elastic community Slack](https://ela.st/slack).\n","summary":"Supply Chain Monitor automatically watches both PyPI and npm for new package releases, downloading the previous and latest artifacts, diffing them into a unified Markdown report, and sending the result to a Cursor Agent LLM that classifies the change as benign or malicious. When the model flags malicious activity—such as obfuscated code, unexpected network calls, or credential exfiltration—a Slack alert is triggered. Its threaded polling, modular watchlist, and optional ecosystem disables make it especially useful for security teams, DevOps, and open‑source maintainers who need continuous, automated vigilance over third‑party dependencies.","description":null,"stars":490,"language":"Python"},{"owner":"LarsenCundric","repo":"port-whisperer","url":"https://github.com/LarsenCundric/port-whisperer","readme":"# port-whisperer\n\n**A beautiful CLI tool to see what's running on your ports.**\n\nStop guessing which process is hogging port 3000. `port-whisperer` gives you a color-coded table of every dev server, database, and background process listening on your machine -- with framework detection, Docker container identification, and interactive process management.\n\n## What it looks like\n\n```\n$ ports\n\n ┌─────────────────────────────────────┐\n │  Port Whisperer                     │\n │  listening to your ports...         │\n └─────────────────────────────────────┘\n\n┌───────┬─────────┬───────┬──────────────────────┬────────────┬────────┬───────────┐\n│ PORT  │ PROCESS │ PID   │ PROJECT              │ FRAMEWORK  │ UPTIME │ STATUS    │\n├───────┼─────────┼───────┼──────────────────────┼────────────┼────────┼───────────┤\n│ :3000 │ node    │ 42872 │ frontend             │ Next.js    │ 1d 9h  │ ● healthy │\n├───────┼─────────┼───────┼──────────────────────┼────────────┼────────┼───────────┤\n│ :3001 │ node    │ 95380 │ preview-app          │ Next.js    │ 2h 40m │ ● healthy │\n├───────┼─────────┼───────┼──────────────────────┼────────────┼────────┼───────────┤\n│ :4566 │ docker  │ 58351 │ backend-localstack-1 │ LocalStack │ 10d 3h │ ● healthy │\n├───────┼─────────┼───────┼──────────────────────┼────────────┼────────┼───────────┤\n│ :5432 │ docker  │ 58351 │ backend-postgres-1   │ PostgreSQL │ 10d 3h │ ● healthy │\n├───────┼─────────┼───────┼──────────────────────┼────────────┼────────┼───────────┤\n│ :6379 │ docker  │ 58351 │ backend-redis-1      │ Redis      │ 10d 3h │ ● healthy │\n└───────┴─────────┴───────┴──────────────────────┴────────────┴────────┴───────────┘\n\n  5 ports active  ·  Run ports <number> for details  ·  --all to show everything\n```\n\nColors: green = healthy, yellow = orphaned, red = zombie.\n\n## Install\n\n```bash\nnpm install -g port-whisperer\n```\n\nOr run it directly without installing:\n\n```bash\nnpx port-whisperer\n```\n\n### Or let Claude Code install it for you\n\nIf you use [Claude Code](https://claude.ai/code), you can ask it to `npm install -g port-whisperer` and start using `ports` right away -- no setup steps needed.\n\n## Usage\n\n### Show dev server ports\n\n```bash\nports\n```\n\nShows dev servers, Docker containers, and databases. System apps (Spotify, Raycast, etc.) are filtered out by default.\n\n### Show all listening ports\n\n```bash\nports --all\n```\n\nIncludes system services, desktop apps, and everything else listening on your machine.\n\n### Inspect a specific port\n\n```bash\nports 3000\n# or\nwhoisonport 3000\n```\n\nDetailed view: full process tree, repository path, current git branch, memory usage, and an interactive prompt to kill the process.\n\n### Kill a process\n\n```bash\nports kill 3000                # kill by port\nports kill 3000 5173 8080      # kill multiple\nports kill 3000-3010           # kill a port range\nports kill 42872               # kill by PID\nports kill -f 3000             # force kill (SIGKILL)\n```\n\nResolves port to process automatically. Falls back to PID if no listener matches. Use `-f` when a process won't die gracefully.\n\nPort ranges expand into individual kills -- empty ports are silently skipped and shown as a summary:\n\n```\n$ ports kill 3000-3005\n\n  Killing :3000 — node (PID 42872)\n  ✓ Sent SIGTERM to :3000 — node (PID 42872)\n  Killing :3001 — node (PID 95380)\n  ✓ Sent SIGTERM to :3001 — node (PID 95380)\n\n  Range summary: 2 killed, 4 empty\n```\n\n### View process logs\n\n```bash\nports logs 3000               # show last 50 lines and exit\nports logs 3000 -f            # follow (stream new lines)\nports logs 3000 --lines 10    # show last 10 lines\nports logs 3000 --lines 10 -f # show last 10 then follow\nports logs 3000 --err         # stderr only\n```\n\nDiscovers log files automatically using `lsof` file descriptor detection. If stdout/stderr is redirected to a file, it finds and tails it. Falls back to system log (`log show` on macOS, `journalctl` on Linux) when no log files are found.\n\n```\n$ ports logs 3000 --lines 5\n\n  Port Whisperer — logs for :3000 (node, PID 42872)\n\n  ▸ Tailing stdout: /tmp/next-dev.output\n\n  ▲ Next.js 16.2.3 (Turbopack)\n  - Local: http://localhost:3000\n  ✓ Ready in 195ms\n   GET / 200 in 990ms\n   GET /api/auth/session 200 in 6ms\n```\n\n### Show all dev processes\n\n```bash\nports ps\n```\n\nA beautiful `ps aux` for developers. Shows all running dev processes (not just port-bound ones) with CPU%, memory, framework detection, and a smart description column. Docker processes are collapsed into a single summary row.\n\n```\n$ ports ps\n\n┌───────┬─────────┬──────┬──────────┬──────────┬───────────┬─────────┬────────────────────────────────┐\n│ PID   │ PROCESS │ CPU% │ MEM      │ PROJECT  │ FRAMEWORK │ UPTIME  │ WHAT                           │\n├───────┼─────────┼──────┼──────────┼──────────┼───────────┼─────────┼────────────────────────────────┤\n│ 592   │ Docker  │ 1.3  │ 735.5 MB │ —        │ Docker    │ 13d 12h │ 14 processes                   │\n├───────┼─────────┼──────┼──────────┼──────────┼───────────┼─────────┼────────────────────────────────┤\n│ 36664 │ python3 │ 0.2  │ 17.6 MB  │ —        │ Python    │ 6d 10h  │ browser_use.skill_cli.daemon   │\n├───────┼─────────┼──────┼──────────┼──────────┼───────────┼─────────┼────────────────────────────────┤\n│ 26408 │ node    │ 0.1  │ 9.2 MB   │ —        │ Node.js   │ 10d 13h │ jest jest_runner_cloud.js      │\n├───────┼─────────┼──────┼──────────┼──────────┼───────────┼─────────┼────────────────────────────────┤\n│ 25752 │ node    │ 0.0  │ 17.3 MB  │ —        │ Node.js   │ 10d 13h │ server.js                      │\n├───────┼─────────┼──────┼──────────┼──────────┼───────────┼─────────┼────────────────────────────────┤\n│ 66921 │ Python  │ 0.0  │ 4.1 MB   │ —        │ Python    │ 2h 25m  │ src.server                     │\n└───────┴─────────┴──────┴──────────┴──────────┴───────────┴─────────┴────────────────────────────────┘\n\n  5 processes  ·  --all to show everything\n```\n\n```bash\nports ps --all    # show all processes, not just dev\n```\n\n### Clean up orphaned processes\n\n```bash\nports clean\n```\n\nFinds and kills orphaned or zombie dev server processes. Only targets dev runtimes (node, python, etc.) -- won't touch your desktop apps.\n\n### Watch for port changes\n\n```bash\nports watch\n```\n\nReal-time monitoring that notifies you whenever a port starts or stops listening.\n\n## How it works\n\nThree shell calls, runs in ~0.2s:\n\n1. **`lsof -iTCP -sTCP:LISTEN`** -- finds all processes listening on TCP ports\n2. **`ps`** (single batched call) -- retrieves process details for all PIDs at once: command line, uptime, memory, parent PID, status\n3. **`lsof -d cwd`** (single batched call) -- resolves the working directory of each process to detect the project and framework\n\nFor Docker ports, a single `docker ps` call maps host ports to container names and images.\n\nFramework detection reads `package.json` dependencies and inspects process command lines. Recognizes Next.js, Vite, Express, Angular, Remix, Astro, Django, Rails, FastAPI, and many others. Docker images are identified as PostgreSQL, Redis, MongoDB, LocalStack, nginx, etc.\n\n## Platform support\n\n| Platform | Status |\n|----------|--------|\n| macOS    | Supported |\n| Linux    | Supported |\n| Windows  | Supported |\n\n## License\n\n[MIT](LICENSE)\n","summary":"`port-whisperer` is a command‑line utility that displays a color‑coded table of all processes listening on your machine’s ports, automatically identifying frameworks, Docker containers, and project roots. It offers interactive handling of processes—killing by port, PID or range, viewing detailed logs, and running commands inside containers—while filtering out non‑development services by default. The tool is especially useful for developers working with multiple local servers or micro‑services who need quick insight into port usage, process health, and the ability to terminate or monitor processes directly from the terminal.","description":"A beautiful CLI tool to see what's running on your ports","stars":788,"language":"JavaScript"},{"owner":"bddicken","repo":"tuitter","url":"https://github.com/bddicken/tuitter","readme":"# tuitter\n\n`tuitter` is a terminal UI client for X (Twitter) built with TypeScript and OpenTUI.  \nIt lets you authenticate with your own X account and browse or interact with content directly from the terminal.\n\n![tuitter](tuitter.png)\n\n## Download, install, and run\n\n### Prerequisites\n\n- [Bun](https://bun.sh/) installed\n- An X developer app with OAuth 2.0 credentials (see the section below)\n\n### 1) Clone and install dependencies\n\n```bash\ngit clone https://github.com/<your-org-or-username>/tuitter.git\ncd tuitter\nbun install\n```\n\n### 2) Create your local env file\n\n```bash\ncp .env.example .env\n```\n\nThen set at least:\n\n- `X_CLIENT_ID` (required)\n\nOptional:\n\n- `X_CLIENT_SECRET`\n- `X_REDIRECT_URI` (defaults to `http://127.0.0.1:8787/callback`)\n- `X_OAUTH_SCOPES`\n- `X_TOKEN_STORE_PATH`\n- `X_IMAGE_MODE` (`auto`, `kitty`, or `off`)\n\n### Optional screen-time limit\n\nCreate a `tuitter.conf` file in the directory where you launch `tuitter`:\n\n```ini\nMAX_SECONDS=3600\n```\n\n- `MAX_SECONDS` sets your maximum allowed usage per day.\n- Daily usage is tracked in a local `.tuitter` state file in that same directory.\n- When the limit is exceeded, tuitter shows a large red warning banner in the UI.\n\nQuick use:\n\n1. Add `MAX_SECONDS=<seconds>` to `tuitter.conf` (example: `MAX_SECONDS=1800` for 30 minutes/day).\n2. Start `tuitter` from that same directory.\n3. When you hit the limit, tuitter blocks usage until the next day.\n\n### 3) Link and start the app\n\n```bash\nbun link\ntuitter\n```\n\nOn first launch, the app opens your browser for OAuth authorization and then stores your token locally (default: `~/.tuitter/oauth-token.json`).\n\n## Create your own `.env` variables from console.x.com\n\nUse these steps so anyone can run this project with their own X developer app:\n\n1. Go to [console.x.com](https://console.x.com/) and sign in.\n2. Create a new Project/App (or open an existing app).\n3. In the app settings, enable OAuth 2.0.\n4. Set the callback/redirect URL to:\n   - `http://127.0.0.1:8787/callback`\n5. Copy the **Client ID** into:\n   - `X_CLIENT_ID=...`\n6. If your app is configured as a confidential client, also copy the **Client Secret** into:\n   - `X_CLIENT_SECRET=...`\n7. (Optional) Configure scopes. The app defaults to:\n   - `tweet.read users.read tweet.write like.write like.read bookmark.write bookmark.read offline.access`\n8. Save your `.env` and run `tuitter` again.\n\nIf OAuth fails, verify that the callback URL in `console.x.com` exactly matches `X_REDIRECT_URI` in your `.env`.\n","summary":"Tuitter is a terminal‑based UI client for X (Twitter) that lets users authenticate and interact with tweets directly from the command line. Built with TypeScript and OpenTUI, it supports OAuth 2.0 login, configurable image display modes, custom scopes, and a per‑day usage limiter for mindful screen‑time. The lightweight, keyboard‑driven interface is ideal for developers, power‑terminal users, and anyone who prefers a minimalistic, offline‑friendly way to browse and tweet. To use it, one needs Bun and credentials from an X developer app, after which the tool stores tokens locally and offers an immediate, browser‑authenticated experience.","description":"tuitter","stars":379,"language":"TypeScript"},{"owner":"HKUDS","repo":"OpenHarness","url":"https://github.com/HKUDS/OpenHarness","readme":"<h1 align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"OpenHarness\" width=\"64\" style=\"vertical-align: middle;\">\n  &nbsp;&nbsp;\n  <img src=\"assets/ohmo.png\" alt=\"ohmo\" width=\"64\" style=\"vertical-align: middle;\">\n  <br>\n  <code>oh</code> — OpenHarness &amp; <code>ohmo</code>\n</h1>\n\n<p align=\"center\">\n  <a href=\"README.md\"><strong>English</strong></a> ·\n  <a href=\"README.zh-CN.md\"><strong>简体中文</strong></a>\n</p>\n\n**OpenHarness** delivers core lightweight agent infrastructure: tool-use, skills, memory, and multi-agent coordination.\n\n**ohmo** is a personal AI agent built on OpenHarness — not another chatbot, but an assistant that actually works for you over long sessions. Chat with ohmo in Feishu / Slack / Telegram / Discord, and it forks branches, writes code, runs tests, and opens PRs on its own. ohmo runs on your existing Claude Code or Codex subscription — no extra API key needed.\n\n**Join the community**: contribute **Harness** for open agent development.\n\n<p align=\"center\">\n  <a href=\"#-quick-start\"><img src=\"https://img.shields.io/badge/Quick_Start-5_min-blue?style=for-the-badge\" alt=\"Quick Start\"></a>\n  <a href=\"#-harness-architecture\"><img src=\"https://img.shields.io/badge/Harness-Architecture-ff69b4?style=for-the-badge\" alt=\"Architecture\"></a>\n  <a href=\"#-features\"><img src=\"https://img.shields.io/badge/Tools-43+-green?style=for-the-badge\" alt=\"Tools\"></a>\n  <a href=\"#-test-results\"><img src=\"https://img.shields.io/badge/Tests-114_Passing-brightgreen?style=for-the-badge\" alt=\"Tests\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-yellow?style=for-the-badge\" alt=\"License\"></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/python-≥3.10-blue?logo=python&logoColor=white\" alt=\"Python\">\n  <img src=\"https://img.shields.io/badge/React+Ink-TUI-61DAFB?logo=react&logoColor=white\" alt=\"React\">\n  <img src=\"https://img.shields.io/badge/pytest-114_pass-brightgreen\" alt=\"Pytest\">\n  <img src=\"https://img.shields.io/badge/E2E-6_suites-orange\" alt=\"E2E\">\n  <img src=\"https://img.shields.io/badge/output-text_|_json_|_stream--json-blueviolet\" alt=\"Output\">\n  <a href=\"https://github.com/HKUDS/OpenHarness/actions/workflows/ci.yml\"><img src=\"https://github.com/HKUDS/OpenHarness/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://github.com/HKUDS/.github/blob/main/profile/README.md\"><img src=\"https://img.shields.io/badge/Feishu-Group-E9DBFC?style=flat&logo=feishu&logoColor=white\" alt=\"Feishu\"></a>\n  <a href=\"https://github.com/HKUDS/.github/blob/main/profile/README.md\"><img src=\"https://img.shields.io/badge/WeChat-Group-C5EAB4?style=flat&logo=wechat&logoColor=white\" alt=\"WeChat\"></a>\n</p>\n\nOne Command (**oh**) to Launch **OpenHarness** and Unlock All Agent Harnesses. \n\nSupports CLI agent integration including OpenClaw, nanobot, Cursor, and more.\n\n<p align=\"center\">\n  <img src=\"assets/cli-typing.gif\" alt=\"OpenHarness Terminal Demo\" width=\"800\">\n</p>\n\n---\n## ✨ OpenHarness's Key Harness Features\n\n<table align=\"center\" width=\"100%\">\n<tr>\n<td width=\"20%\" align=\"center\" style=\"vertical-align: top; padding: 15px;\">\n\n<h3>🔄 Agent Loop</h3>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/badge/Engine-06B6D4?style=for-the-badge&logo=lightning&logoColor=white\" alt=\"Engine\" />\n</div>\n\n<img src=\"assets/scene-agentloop.png\" width=\"140\">\n\n<p align=\"center\"><strong>• Streaming Tool-Call Cycle</strong></p>\n<p align=\"center\"><strong>• API Retry with Exponential Backoff</strong></p>\n<p align=\"center\"><strong>• Parallel Tool Execution</strong></p>\n<p align=\"center\"><strong>• Token Counting & Cost Tracking</strong></p>\n\n</td>\n<td width=\"20%\" align=\"center\" style=\"vertical-align: top; padding: 15px;\">\n\n<h3>🔧 Harness Toolkit</h3>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/badge/43+_Tools-10B981?style=for-the-badge&logo=toolbox&logoColor=white\" alt=\"Toolkit\" />\n</div>\n\n<img src=\"assets/scene-toolkit.png\" width=\"140\">\n\n<p align=\"center\"><strong>• 43 Tools (File, Shell, Search, Web, MCP)</strong></p>\n<p align=\"center\"><strong>• On-Demand Skill Loading (.md)</strong></p>\n<p align=\"center\"><strong>• Plugin Ecosystem (Skills + Hooks + Agents)</strong></p>\n<p align=\"center\"><strong>• Compatible with anthropics/skills & plugins</strong></p>\n\n</td>\n<td width=\"20%\" align=\"center\" style=\"vertical-align: top; padding: 15px;\">\n\n<h3>🧠 Context & Memory</h3>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/badge/Persistent-8B5CF6?style=for-the-badge&logo=brain&logoColor=white\" alt=\"Context\" />\n</div>\n\n<img src=\"assets/scene-context.png\" width=\"140\">\n\n<p align=\"center\"><strong>• CLAUDE.md Discovery & Injection</strong></p>\n<p align=\"center\"><strong>• Context Compression (Auto-Compact)</strong></p>\n<p align=\"center\"><strong>• MEMORY.md Persistent Memory</strong></p>\n<p align=\"center\"><strong>• Session Resume & History</strong></p>\n\n</td>\n<td width=\"20%\" align=\"center\" style=\"vertical-align: top; padding: 15px;\">\n\n<h3>🛡️ Governance</h3>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/badge/Permissions-F59E0B?style=for-the-badge&logo=shield&logoColor=white\" alt=\"Governance\" />\n</div>\n\n<img src=\"assets/scene-governance.png\" width=\"140\">\n\n<p align=\"center\"><strong>• Multi-Level Permission Modes</strong></p>\n<p align=\"center\"><strong>• Path-Level & Command Rules</strong></p>\n<p align=\"center\"><strong>• PreToolUse / PostToolUse Hooks</strong></p>\n<p align=\"center\"><strong>• Interactive Approval Dialogs</strong></p>\n\n</td>\n<td width=\"20%\" align=\"center\" style=\"vertical-align: top; padding: 15px;\">\n\n<h3>🤝 Swarm Coordination</h3>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/badge/Multi--Agent-EC4899?style=for-the-badge&logo=network&logoColor=white\" alt=\"Swarm\" />\n</div>\n\n<img src=\"assets/scene-swarm.png\" width=\"140\">\n\n<p align=\"center\"><strong>• Subagent Spawning & Delegation</strong></p>\n<p align=\"center\"><strong>• Team Registry & Task Management</strong></p>\n<p align=\"center\"><strong>• Background Task Lifecycle</strong></p>\n<p align=\"center\"><strong>• <a href=\"https://github.com/HKUDS/ClawTeam\">ClawTeam</a> Integration (Roadmap)</strong></p>\n\n</td>\n</tr>\n</table>\n\n---\n\n## 🤔 What is an Agent Harness?\n\nAn **Agent Harness** is the complete infrastructure that wraps around an LLM to make it a functional agent. The model provides intelligence; the harness provides **hands, eyes, memory, and safety boundaries**.\n\n<p align=\"center\">\n  <img src=\"assets/harness-equation.png\" alt=\"Harness = Tools + Knowledge + Observation + Action + Permissions\" width=\"700\">\n</p>\n\nOpenHarness is an open-source Python implementation designed for **researchers, builders, and the community**:\n\n- **Understand** how production AI agents work under the hood\n- **Experiment** with cutting-edge tools, skills, and agent coordination patterns\n- **Extend** the harness with custom plugins, providers, and domain knowledge\n- **Build** specialized agents on top of proven architecture\n\n---\n\n## 📰 What's New\n\n- **2026-04-18** ⚙️ **v0.1.7** — Packaging & TUI polish:\n  - Install script now links `oh`, `ohmo`, and `openharness` into `~/.local/bin` instead of prepending the virtualenv `bin` directory to `PATH`, which avoids clobbering Conda-managed shells.\n  - React TUI now supports `Shift+Enter` to insert a newline while keeping plain `Enter` as submit.\n  - Busy-state animation in the React TUI is quieter and less error-prone on Windows terminals, with conservative spinner frames and reduced flashing.\n- **2026-04-10** 🧠 **v0.1.6** — Auto-Compaction & Markdown TUI:\n  - Auto-Compaction preserves task state and channel logs across context compression — agents can run multi-day sessions without manual compact/clear\n  - Subprocess teammates run in headless worker mode; agent team creation stabilized\n  - Assistant messages now render full Markdown in the React TUI\n  - `ohmo` gains channel slash commands and multimodal attachment support\n- **2026-04-08** 🔌 **v0.1.5** — MCP HTTP transport & Swarm polling:\n  - MCP protocol adds HTTP transport, auto-reconnect on disconnect, and tool-only server compatibility\n  - JSON Schema types inferred for MCP tool inputs — no manual type mapping needed\n  - `ohmo` channels support file attachments and multimodal gateway messages\n  - Subprocess agents are now pollable in real runs; permission modals serialized to prevent input swallowing\n- **2026-04-08** 🌙 **v0.1.4** — Multi-provider auth & Moonshot/Kimi:\n  - Native Moonshot/Kimi provider with `reasoning_content` support for thinking models\n  - Auth overhaul: fixed provider-switching key mismatch, `OPENAI_BASE_URL` env override, profile-scoped credential priority\n  - MCP gracefully handles disconnected servers in `call_tool` / `read_resource`\n  - Security: built-in sensitive-path protection in PermissionChecker, hardened `web_fetch` URL validation\n  - Stability: EIO crash recovery in Ink TUI, `--debug` logging, Windows cmd flash fix\n- **2026-04-06** 🚀 **v0.1.2** — Unified setup flows and `ohmo` personal-agent app:\n  - `oh setup` now guides provider selection as workflows instead of exposing raw auth/provider internals\n  - Compatible API setup is now profile-scoped, so Anthropic/OpenAI-compatible endpoints can keep separate keys\n  - `ohmo` ships as a packaged app with `~/.ohmo` workspace, gateway, bootstrap prompts, and channel config flow\n- **2026-04-01** 🎨 **v0.1.0** — Initial **OpenHarness** open-source release featuring complete Harness architecture: \n\n<p align=\"center\">\n  <strong>Start here:</strong>\n  <a href=\"#-quick-start\">Quick Start</a> ·\n  <a href=\"#-provider-compatibility\">Provider Compatibility</a> ·\n  <a href=\"docs/SHOWCASE.md\">Showcase</a> ·\n  <a href=\"CONTRIBUTING.md\">Contributing</a> ·\n  <a href=\"CHANGELOG.md\">Changelog</a>\n</p>\n\n---\n\n## 🚀 Quick Start\n\n### 1. Install\n\n#### Linux / macOS / WSL\n\n```bash\n# One-click install\ncurl -fsSL https://raw.githubusercontent.com/HKUDS/OpenHarness/main/scripts/install.sh | bash\n\n# Or via pip\npip install openharness-ai\n```\n\n#### Windows (Native)\n\n```powershell\n# One-click install (PowerShell)\niex (Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/HKUDS/OpenHarness/main/scripts/install.ps1')\n\n# Or via pip\npip install openharness-ai\n```\n\n**Note**: Windows support is now native. In PowerShell, use `openh` instead of `oh` because `oh` can resolve to the built-in `Out-Host` alias.\n\n### 2. Configure\n\n```bash\noh setup    # interactive wizard — pick a provider, authenticate, done\n# On Windows PowerShell, use: openh setup\n```\n\nSupports **Claude / OpenAI / Copilot / Codex / Moonshot(Kimi) / GLM / MiniMax** and any compatible endpoint.\n\n### 3. Run\n\n```bash\noh\n# On Windows PowerShell, use: openh\n```\n\n<p align=\"center\">\n  <img src=\"assets/landing.png\" alt=\"OpenHarness Landing Screen\" width=\"700\">\n</p>\n\n### 4. Set up ohmo (Personal Agent)\n\nWant an AI agent that works for you from Feishu / Slack / Telegram / Discord?\n\n```bash\nohmo init             # initialize ~/.ohmo workspace\nohmo config           # configure channels and provider\nohmo gateway start    # start the gateway — ohmo is now live in your chat app\n```\n\nohmo runs on your existing **Claude Code subscription** or **Codex subscription** — no extra API key needed.\n\n### Non-Interactive Mode (Pipes & Scripts)\n\n```bash\n# Single prompt → stdout\noh -p \"Explain this codebase\"\n\n# JSON output for programmatic use\noh -p \"List all functions in main.py\" --output-format json\n\n# Stream JSON events in real-time\noh -p \"Fix the bug\" --output-format stream-json\n```\n\n## 🔌 Provider Compatibility\n\nOpenHarness treats providers as **workflows** backed by named profiles. In day-to-day use, prefer:\n\n```bash\noh setup\noh provider list\noh provider use <profile>\n```\n\n### Built-in Workflows\n\n| Workflow | What it is | Typical backends |\n|----------|------------|------------------|\n| **Anthropic-Compatible API** | Anthropic-style request format | Claude official, Kimi, GLM, MiniMax, internal Anthropic-compatible gateways |\n| **Claude Subscription** | Claude CLI subscription bridge | Local `~/.claude/.credentials.json` |\n| **OpenAI-Compatible API** | OpenAI-style request format | OpenAI official, OpenRouter, DashScope, DeepSeek, SiliconFlow, Groq, Ollama, GitHub Models |\n| **Codex Subscription** | Codex CLI subscription bridge | Local `~/.codex/auth.json` |\n| **GitHub Copilot** | Copilot OAuth workflow | GitHub Copilot device-flow login |\n\n### Compatible API Families\n\n#### Anthropic-Compatible API\n\nTypical examples:\n\n| Backend | Base URL | Example models |\n|---------|----------|----------------|\n| **Claude official** | `https://api.anthropic.com` | `claude-sonnet-4-6`, `claude-opus-4-6` |\n| **Moonshot / Kimi** | `https://api.moonshot.cn/anthropic` | `kimi-k2.5` |\n| **Zhipu / GLM** | custom Anthropic-compatible endpoint | `glm-4.5` |\n| **MiniMax** | custom Anthropic-compatible endpoint | `minimax-m1` |\n\n#### OpenAI-Compatible API\n\nAny provider implementing the OpenAI `/v1/chat/completions` style API works:\n\n| Backend | Base URL | Example models |\n|---------|----------|----------------|\n| **OpenAI** | `https://api.openai.com/v1` | `gpt-5.4`, `gpt-4.1` |\n| **OpenRouter** | `https://openrouter.ai/api/v1` | provider-specific |\n| **Alibaba DashScope** | `https://dashscope.aliyuncs.com/compatible-mode/v1` | `qwen3.5-flash`, `qwen3-max`, `deepseek-r1` |\n| **DeepSeek** | `https://api.deepseek.com` | `deepseek-chat`, `deepseek-reasoner` |\n| **GitHub Models** | `https://models.inference.ai.azure.com` | `gpt-4o`, `Meta-Llama-3.1-405B-Instruct` |\n| **SiliconFlow** | `https://api.siliconflow.cn/v1` | `deepseek-ai/DeepSeek-V3` |\n| **Google Gemini** | `https://generativelanguage.googleapis.com/v1beta/openai` | `gemini-2.5-flash`, `gemini-2.5-pro` |\n| **Groq** | `https://api.groq.com/openai/v1` | `llama-3.3-70b-versatile` |\n| **Ollama (local)** | `http://localhost:11434/v1` | any local model |\n\n### Advanced Profile Management\n\n```bash\n# List saved workflows\noh provider list\n\n# Switch the active workflow\noh provider use codex\n\n# Add your own compatible endpoint\noh provider add my-endpoint \\\n  --label \"My Endpoint\" \\\n  --provider openai \\\n  --api-format openai \\\n  --auth-source openai_api_key \\\n  --model my-model \\\n  --base-url https://example.com/v1\n```\n\nFor custom compatible endpoints, OpenHarness can bind credentials per profile instead of forcing every Anthropic-compatible or OpenAI-compatible backend to share the same API key.\n\n### Ollama (Local Models)\n\nRun local models through Ollama's OpenAI-compatible endpoint:\n\n```bash\n# Add an Ollama provider profile\noh provider add ollama \\\n  --label \"Ollama\" \\\n  --provider Ollama \\\n  --api-format openai \\\n  --auth-source openai_api_key \\\n  --model glm-4.7-flash:q8_0 \\\n  --base-url http://localhost:11434/v1\n```\n```\nSaved provider profile: ollama\n```\n\n```bash\n# Activate and verify\noh provider use ollama\n```\n```\nActivated provider profile: ollama\n```\n\n```bash\noh provider list\n```\n```\n  claude-api: Anthropic-Compatible API [ready]\n  ...\n  moonshot: Moonshot (Kimi) [missing auth]\n    auth=moonshot_api_key model=kimi-k2.5 base_url=https://api.moonshot.cn/v1\n* ollama: Ollama [ready]\n    auth=openai_api_key model=glm-4.7-flash:q8_0 base_url=http://localhost:11434/v1\n```\n\n### GitHub Copilot Format (`--api-format copilot`)\n\nUse your existing GitHub Copilot subscription as the LLM backend. Authentication uses GitHub's OAuth device flow — no API keys needed.\n\n```bash\n# One-time login (opens browser for GitHub authorization)\noh auth copilot-login\n\n# Then launch with Copilot as the provider\nuv run oh --api-format copilot\n\n# Or via environment variable\nexport OPENHARNESS_API_FORMAT=copilot\nuv run oh\n\n# Check auth status\noh auth status\n\n# Remove stored credentials\noh auth copilot-logout\n```\n\n| Feature | Details |\n|---------|---------|\n| **Auth method** | GitHub OAuth device flow (no API key needed) |\n| **Token management** | Automatic refresh of short-lived session tokens |\n| **Enterprise** | Supports GitHub Enterprise via `--github-domain` flag |\n| **Models** | Uses Copilot's default model selection |\n| **API** | OpenAI-compatible chat completions under the hood |\n\n---\n\n## 🏗️ Harness Architecture\n\nOpenHarness implements the core Agent Harness pattern with 10 subsystems:\n\n```\nopenharness/\n  engine/          # 🧠 Agent Loop — query → stream → tool-call → loop\n  tools/           # 🔧 43 Tools — file I/O, shell, search, web, MCP\n  skills/          # 📚 Knowledge — on-demand skill loading (.md files)\n  plugins/         # 🔌 Extensions — commands, hooks, agents, MCP servers\n  permissions/     # 🛡️ Safety — multi-level modes, path rules, command deny\n  hooks/           # ⚡ Lifecycle — PreToolUse/PostToolUse event hooks\n  commands/        # 💬 54 Commands — /help, /commit, /plan, /resume, ...\n  mcp/             # 🌐 MCP — Model Context Protocol client\n  memory/          # 🧠 Memory — persistent cross-session knowledge\n  tasks/           # 📋 Tasks — background task management\n  coordinator/     # 🤝 Multi-Agent — subagent spawning, team coordination\n  prompts/         # 📝 Context — system prompt assembly, CLAUDE.md, skills\n  config/          # ⚙️ Settings — multi-layer config, migrations\n  ui/              # 🖥️ React TUI — backend protocol + frontend\n```\n\n### The Agent Loop\n\nThe heart of the harness. One loop, endlessly composable:\n\n```python\nwhile True:\n    response = await api.stream(messages, tools)\n    \n    if response.stop_reason != \"tool_use\":\n        break  # Model is done\n    \n    for tool_call in response.tool_uses:\n        # Permission check → Hook → Execute → Hook → Result\n        result = await harness.execute_tool(tool_call)\n    \n    messages.append(tool_results)\n    # Loop continues — model sees results, decides next action\n```\n\nThe model decides **what** to do. The harness handles **how** — safely, efficiently, with full observability.\n\n### Harness Flow\n\n```mermaid\nflowchart LR\n    U[User Prompt] --> C[CLI or React TUI]\n    C --> R[RuntimeBundle]\n    R --> Q[QueryEngine]\n    Q --> A[Anthropic-compatible API Client]\n    A -->|tool_use| T[Tool Registry]\n    T --> P[Permissions + Hooks]\n    P --> X[Files Shell Web MCP Tasks]\n    X --> Q\n```\n\n---\n\n## ✨ Features\n\n### 🔧 Tools (43+)\n\n| Category | Tools | Description |\n|----------|-------|-------------|\n| **File I/O** | Bash, Read, Write, Edit, Glob, Grep | Core file operations with permission checks |\n| **Search** | WebFetch, WebSearch, ToolSearch, LSP | Web and code search capabilities |\n| **Notebook** | NotebookEdit | Jupyter notebook cell editing |\n| **Agent** | Agent, SendMessage, TeamCreate/Delete | Subagent spawning and coordination |\n| **Task** | TaskCreate/Get/List/Update/Stop/Output | Background task management |\n| **MCP** | MCPTool, ListMcpResources, ReadMcpResource | Model Context Protocol integration |\n| **Mode** | EnterPlanMode, ExitPlanMode, Worktree | Workflow mode switching |\n| **Schedule** | CronCreate/List/Delete, RemoteTrigger | Scheduled and remote execution |\n| **Meta** | Skill, Config, Brief, Sleep, AskUser | Knowledge loading, configuration, interaction |\n\nEvery tool has:\n- **Pydantic input validation** — structured, type-safe inputs\n- **Self-describing JSON Schema** — models understand tools automatically\n- **Permission integration** — checked before every execution\n- **Hook support** — PreToolUse/PostToolUse lifecycle events\n\n### 📚 Skills System\n\nSkills are **on-demand knowledge** — loaded only when the model needs them:\n\n```\nAvailable Skills:\n- commit: Create clean, well-structured git commits\n- review: Review code for bugs, security issues, and quality\n- debug: Diagnose and fix bugs systematically\n- plan: Design an implementation plan before coding\n- test: Write and run tests for code\n- simplify: Refactor code to be simpler and more maintainable\n- pdf: PDF processing with pypdf (from anthropics/skills)\n- xlsx: Excel operations (from anthropics/skills)\n- ... 40+ more\n```\n\n**Compatible with [anthropics/skills](https://github.com/anthropics/skills)** — just copy `.md` files to `~/.openharness/skills/`.\n\n### 🔌 Plugin System\n\n**Compatible with [claude-code plugins](https://github.com/anthropics/claude-code/tree/main/plugins)**. Tested with 12 official plugins:\n\n| Plugin | Type | What it does |\n|--------|------|-------------|\n| `commit-commands` | Commands | Git commit, push, PR workflows |\n| `security-guidance` | Hooks | Security warnings on file edits |\n| `hookify` | Commands + Agents | Create custom behavior hooks |\n| `feature-dev` | Commands | Feature development workflow |\n| `code-review` | Agents | Multi-agent PR review |\n| `pr-review-toolkit` | Agents | Specialized PR review agents |\n\n```bash\n# Manage plugins\noh plugin list\noh plugin install <source>\noh plugin enable <name>\n```\n\n### 🤝 Ecosystem Workflows\n\nOpenHarness is useful as a lightweight harness layer around Claude-style tooling conventions:\n\n- **OpenClaw-oriented workflows** can reuse Markdown-first knowledge and command-driven collaboration patterns.\n- **Claude-style plugins and skills** stay portable because OpenHarness keeps those formats familiar.\n- **ClawTeam-style multi-agent work** maps well onto the built-in team, task, and background execution primitives.\n\nFor concrete usage ideas instead of generic claims, see [`docs/SHOWCASE.md`](docs/SHOWCASE.md).\n\n### 🛡️ Permissions\n\nMulti-level safety with fine-grained control:\n\n| Mode | Behavior | Use Case |\n|------|----------|----------|\n| **Default** | Ask before write/execute | Daily development |\n| **Auto** | Allow everything | Sandboxed environments |\n| **Plan Mode** | Block all writes | Large refactors, review first |\n\n**Path-level rules** in `settings.json`:\n```json\n{\n  \"permission\": {\n    \"mode\": \"default\",\n    \"path_rules\": [{\"pattern\": \"/etc/*\", \"allow\": false}],\n    \"denied_commands\": [\"rm -rf /\", \"DROP TABLE *\"]\n  }\n}\n```\n\n### 🖥️ Terminal UI\n\nReact/Ink TUI with full interactive experience:\n\n- **Command picker**: Type `/` → arrow keys to select → Enter\n- **Permission dialog**: Interactive y/n with tool details\n- **Mode switcher**: `/permissions` → select from list\n- **Session resume**: `/resume` → pick from history\n- **Animated spinner**: Real-time feedback during tool execution\n- **Keyboard shortcuts**: Shown at the bottom, context-aware\n\n### 📡 CLI\n\n```\noh [OPTIONS] COMMAND [ARGS]\n\nSession:     -c/--continue, -r/--resume, -n/--name\nModel:       -m/--model, --effort, --max-turns\nOutput:      -p/--print, --output-format text|json|stream-json\nPermissions: --permission-mode, --dangerously-skip-permissions\nContext:     -s/--system-prompt, --append-system-prompt, --settings\nAdvanced:    -d/--debug, --mcp-config, --bare\n\nSubcommands: oh setup | oh provider | oh auth | oh mcp | oh plugin\n```\n\n### 🧑‍💼 ohmo Personal Agent\n\n`ohmo` is a personal-agent app built on top of OpenHarness. It is packaged alongside `oh`, with its own workspace and gateway:\n\n```bash\n# Initialize personal workspace\nohmo init\n\n# Configure gateway channels and pick a provider profile\nohmo config\n\n# Run the personal agent\nohmo\n\n# Run the gateway in foreground\nohmo gateway run\n\n# Check or restart the gateway\nohmo gateway status\nohmo gateway restart\n```\n\nKey concepts:\n\n- `~/.ohmo/`\n  - personal workspace root\n- `soul.md`\n  - long-term agent personality and behavior\n- `identity.md`\n  - who `ohmo` is\n- `user.md`\n  - user profile and preferences\n- `BOOTSTRAP.md`\n  - first-run landing ritual\n- `memory/`\n  - personal memory\n- `gateway.json`\n  - selected provider profile and channel configuration\n\n`ohmo config` uses the same workflow language as `oh setup`, so you can point the personal-agent gateway at:\n\n- `Anthropic-Compatible API`\n- `Claude Subscription`\n- `OpenAI-Compatible API`\n- `Codex Subscription`\n- `GitHub Copilot`\n\n`ohmo init` creates the home workspace once. After that, use `ohmo config` to update provider and channel settings; if the gateway is already running, the config flow can restart it for you.\n\nCurrently `ohmo init` / `ohmo config` can guide channel setup for:\n\n- Telegram\n- Slack\n- Discord\n- Feishu\n\n---\n\n## 📊 Test Results\n\n| Suite | Tests | Status |\n|-------|-------|--------|\n| Unit + Integration | 114 | ✅ All passing |\n| CLI Flags E2E | 6 | ✅ Real model calls |\n| Harness Features E2E | 9 | ✅ Retry, skills, parallel, permissions |\n| React TUI E2E | 3 | ✅ Welcome, conversation, status |\n| TUI Interactions E2E | 4 | ✅ Commands, permissions, shortcuts |\n| Real Skills + Plugins | 12 | ✅ anthropics/skills + claude-code/plugins |\n\n```bash\n# Run all tests\nuv run pytest -q                           # 114 unit/integration\npython scripts/test_harness_features.py     # Harness E2E\npython scripts/test_real_skills_plugins.py  # Real plugins E2E\n```\n\n---\n\n## 🔧 Extending OpenHarness\n\n### Add a Custom Tool\n\n```python\nfrom pydantic import BaseModel, Field\nfrom openharness.tools.base import BaseTool, ToolExecutionContext, ToolResult\n\nclass MyToolInput(BaseModel):\n    query: str = Field(description=\"Search query\")\n\nclass MyTool(BaseTool):\n    name = \"my_tool\"\n    description = \"Does something useful\"\n    input_model = MyToolInput\n\n    async def execute(self, arguments: MyToolInput, context: ToolExecutionContext) -> ToolResult:\n        return ToolResult(output=f\"Result for: {arguments.query}\")\n```\n\n### Add a Custom Skill\n\nCreate `~/.openharness/skills/my-skill.md`:\n\n```markdown\n---\nname: my-skill\ndescription: Expert guidance for my specific domain\n---\n\n# My Skill\n\n## When to use\nUse when the user asks about [your domain].\n\n## Workflow\n1. Step one\n2. Step two\n...\n```\n\n### Add a Plugin\n\nCreate `.openharness/plugins/my-plugin/.claude-plugin/plugin.json`:\n\n```json\n{\n  \"name\": \"my-plugin\",\n  \"version\": \"1.0.0\",\n  \"description\": \"My custom plugin\"\n}\n```\n\nAdd commands in `commands/*.md`, hooks in `hooks/hooks.json`, agents in `agents/*.md`.\n\n---\n\n## 🌍 Showcase\n\nOpenHarness is most useful when treated as a small, inspectable harness you can adapt to a real workflow:\n\n- **Repo coding assistant** for reading code, patching files, and running checks locally.\n- **Headless scripting tool** for `json` and `stream-json` output in automation flows.\n- **Plugin and skill testbed** for experimenting with Claude-style extensions.\n- **Multi-agent prototype harness** for task delegation and background execution.\n- **Provider comparison sandbox** across Anthropic-compatible backends.\n\nSee [`docs/SHOWCASE.md`](docs/SHOWCASE.md) for short, reproducible examples.\n\n---\n\n## 🤝 Contributing\n\nOpenHarness is a **community-driven research project**. We welcome contributions in:\n\n| Area | Examples |\n|------|---------|\n| **Tools** | New tool implementations for specific domains |\n| **Skills** | Domain knowledge `.md` files (finance, science, DevOps...) |\n| **Plugins** | Workflow plugins with commands, hooks, agents |\n| **Providers** | Support for more LLM backends (OpenAI, Ollama, etc.) |\n| **Multi-Agent** | Coordination protocols, team patterns |\n| **Testing** | E2E scenarios, edge cases, benchmarks |\n| **Documentation** | Architecture guides, tutorials, translations |\n\n```bash\n# Development setup\ngit clone https://github.com/HKUDS/OpenHarness.git\ncd OpenHarness\nuv sync --extra dev\nuv run pytest -q  # Verify everything works\n```\n\nUseful contributor entry points:\n\n- [`CONTRIBUTING.md`](CONTRIBUTING.md) for setup, checks, and PR expectations\n- [`CHANGELOG.md`](CHANGELOG.md) for user-visible changes\n- [`docs/SHOWCASE.md`](docs/SHOWCASE.md) for real-world usage patterns worth documenting\n\n---\n\n## 📄 License\n\nMIT — see [LICENSE](LICENSE).\n\n---\n\n<p align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"OpenHarness\" width=\"48\">\n  <br>\n  <strong>Oh my Harness!</strong>\n  <br>\n  <em>The model is the agent. The code is the harness.</em>\n</p>\n\n<div align=\"center\">\n  <a href=\"https://star-history.com/#HKUDS/OpenHarness&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=HKUDS/OpenHarness&type=Date&theme=dark\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=HKUDS/OpenHarness&type=Date\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=HKUDS/OpenHarness&type=Date\" style=\"border-radius: 15px; box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);\" />\n    </picture>\n  </a>\n</div>\n\n<p align=\"center\">\n  <em> Thanks for visiting ✨ OpenHarness!</em><br><br>\n  <img src=\"https://visitor-badge.laobi.icu/badge?page_id=HKUDS.OpenHarness&style=for-the-badge&color=00d4ff\" alt=\"Views\">\n</p>\n","summary":"OpenHarness is an open‑source framework that delivers lightweight agent infrastructure—tool handling, memory, skill orchestration, and multi‑agent coordination—primarily for developers and researchers building AI assistants or automated agents. It offers a robust tool‑call engine, parallel execution, retry logic, token accounting, and a suite of over 40 pre‑built tools for file, shell, web and more. The bundled personal AI assistant “ohmo” showcases how OpenHarness can be deployed on Feishu, Slack, Telegram, or Discord to fork branches, write code, run tests, and open PRs automatically using an existing Claude or Codex subscription. The project targets anyone looking for a plug‑in, extensible architecture to build, test, and scale sophisticated language‑model‑powered agents.","description":"\"OpenHarness: Open Agent Harness with a Built-in Personal Agent--Ohmo!\"","stars":10479,"language":"Python"},{"owner":"Paidax01","repo":"math-curve-loaders","url":"https://github.com/Paidax01/math-curve-loaders","readme":"# Math Curve Loaders\n\n[Live Preview](https://paidax01.github.io/math-curve-loaders/)\n\nA small gallery of mathematical curve based loading animations built with plain HTML, CSS, and JavaScript.\n\nIt includes:\n\n- the original particle trail loader\n- a collection of curve variants such as rose curves, Lissajous curves, hypotrochoids, cardioids, Cassini ovals, and Fourier-style paths\n- click-to-open modal previews\n- per-curve formula notes and code snippets\n- copy support for formula and code\n\n## Files\n\n- `index.html`: gallery entry\n- `style.css`: layout, modal, and visual styles\n- `main.js`: animation engine, curve definitions, modal interactions\n- `original.html`: standalone original loader demo\n- `original.css`\n- `original.js`\n\n## Run\n\nOpen `index.html` directly in a browser.\n\n## Why\n\nThis project explores how mathematical parameterizations can become expressive UI loading states while staying lightweight and dependency-free.\n","summary":"Math Curve Loaders is a lightweight gallery of loading animations built purely with HTML, CSS and JavaScript that use mathematical parameterizations—such as rose, Lissajous, hypotrochoid, cardioid, Cassini, and Fourier‑style curves—to produce visually striking spinners. Each animation is viewable in a modal preview, complete with formula notes and copyable code snippets that illustrate the underlying curve calculations. The project also retains the original particle‑trail loader, offering a nostalgic but modern alternative. Developers and UI designers seeking elegant, dependency‑free loading states will appreciate the easily embeddable, highly customizable examples.","description":"A lightweight gallery of mathematical curve based loading animations with modal previews, formulas, and copyable code snippets.","stars":592,"language":"JavaScript"},{"owner":"Pika-Labs","repo":"Pika-Skills","url":"https://github.com/Pika-Labs/Pika-Skills","readme":"# Pika Skills Open\n\nA collection of open-source skills for AI coding agents (Claude Code, OpenClaw, etc.) powered by the [Pika Developer API](https://www.pika.me/dev/).\n\n## What are Skills?\n\nSkills are self-contained modules that extend the capabilities of AI coding agents. Each skill is a directory containing:\n\n- **`SKILL.md`** — The skill definition file. It tells the AI agent *when* to activate the skill, *how* to use it, and includes step-by-step instructions. The agent reads this file and follows the workflow described in it.\n- **`scripts/`** — Executable scripts (Python, Bash, etc.) that the agent invokes as part of the skill workflow.\n- **`requirements.txt`** — Python dependencies needed by the skill scripts.\n\nWhen you install a skill into your agent workspace, the agent automatically detects the `SKILL.md` and knows how to use the skill — no manual configuration needed.\n\n## Available Skills\n\n| Skill | Pricing | Description |\n|-------|---------|-------------|\n| [pikastream-video-meeting](pikastream-video-meeting/) | $0.275 / min | Join a Google Meet as a real-time AI avatar. |\n\n## Getting Started\n\n### 1. Get a Pika Developer Key\n\nGo to [https://www.pika.me/dev/](https://www.pika.me/dev/) and create a Developer Key (starts with `dk_`).\n\n### 2. Set the Environment Variable\n\n```bash\nexport PIKA_DEV_KEY=\"dk_your-key-here\"\n```\n\nOr add it to your shell profile (`~/.bashrc`, `~/.zshrc`, etc.) for persistence.\n\n### 3. Install a Skill\n\nPoint your agent to the skill folder and ask it to install. For example:\n\n> install /path/to/your/Pika-Skills/pikastream-video-meeting/\n\n### 4. Use It\n\nOnce installed, simply interact with your AI agent naturally. For example, drop a Google Meet link and the agent will automatically activate the `pikastream-video-meeting` skill.\n\nThe skill will check your balance before joining. If you need credits, it will generate a payment link for you automatically.\n\n## Skill: pikastream-video-meeting\n\nAn AI-powered video meeting bot that joins Google Meet calls as a real-time avatar.\n\n### Features\n\n- **Real-time avatar** — Joins meetings with a generated or custom avatar image via PikaStreaming.\n- **Voice cloning** — Clone your voice from a short audio recording.\n- **Avatar generation** — Generate an AI avatar via OpenAI image models, or provide your own image.\n- **Automatic billing** — Checks balance before joining, creates a payment link if needed, and waits for payment to complete.\n- **Context-aware conversation** — The bot synthesizes workspace context (identity, recent activity, known people) into a system prompt for natural, informed conversation during meetings.\n- **Post-meeting notes** — Automatically retrieves and shares meeting notes after the bot leaves.\n\n### Commands\n\nThe skill script supports four subcommands:\n\n```bash\n# Join a Google Meet\npython scripts/pikastreaming_videomeeting.py join \\\n  --meet-url <google-meet-url> --bot-name <name> \\\n  --image <avatar-image> [--voice-id <id>] [--system-prompt-file <path>]\n\n# Leave a meeting\npython scripts/pikastreaming_videomeeting.py leave --session-id <id>\n\n# Generate an avatar image\npython scripts/pikastreaming_videomeeting.py generate-avatar --output <path> [--prompt <text>]\n\n# Clone a voice from audio\npython scripts/pikastreaming_videomeeting.py clone-voice \\\n  --audio <file> --name <name> [--noise-reduction]\n```\n\n### Environment Variables\n\n| Variable | Required | Description |\n|----------|----------|-------------|\n| `PIKA_DEV_KEY` | Yes | Pika Developer Key (`dk_...`). Get one at [pika.me/dev](https://www.pika.me/dev/) |\n\n### Requirements\n\n- Python 3.10+\n- `PIKA_DEV_KEY` environment variable\n- `ffmpeg` (optional, for audio format conversion during voice cloning)\n\n## Contributing\n\nTo add a new skill:\n\n1. Create a new directory with your skill name.\n2. Add a `SKILL.md` following the frontmatter format (see existing skills for reference).\n3. Add scripts and a `requirements.txt` as needed.\n4. Update this README with your skill's description.\n\n## License\n\nApache 2.0 — see [LICENSE](LICENSE).\n","summary":"Pika Skills Open is a modular library of self‑contained skills that can be dropped into AI coding agents such as Claude Code or OpenClaw. Each skill includes a SKILL.md with activation rules, optional scripts, and a requirements file so installation requires no manual configuration. An example skill, pikastream‑video‑meeting, lets an agent join Google Meet as a real‑time avatar, offering voice cloning, AI‑generated avatars, automatic billing, context‑aware conversation, and post‑meeting notes. Developers and AI‑agent users looking to extend their assistants or add new ready‑to‑use features can quickly create or install skills following the straightforward template.","description":null,"stars":1040,"language":"Python"},{"owner":"hilash","repo":"cabinet","url":"https://github.com/hilash/cabinet","readme":"<p align=\"center\">\n  <img src=\"assets/cabinet-wordmark.svg\" alt=\"cabinet /ˈkab.ɪ.nət/\" width=\"920\">\n</p>\n\n<p align=\"center\">\n  <img src=\"https://runcabinet.com/demo.gif\" alt=\"Cabinet demo\" width=\"900\">\n</p>\n\n<h1 align=\"center\">🗄️ Cabinet</h1>\n\n<p align=\"center\">\n  <strong>Your knowledge base. Your AI team.</strong><br />\n  <sub>🗂️ Files on disk &nbsp;•&nbsp; 📁 AI workspaces &nbsp;•&nbsp; 🧠 Agents with memory</sub>\n</p>\n\n<p align=\"center\">\n  The AI-first startup OS where everything lives as markdown files on disk. No database. No vendor lock-in. Self-hosted. Your data never leaves your machine.\n</p>\n\n<p align=\"center\">\n  Built by Hila Shmuel, former Engineering Manager at Apple — now building Cabinet in public, with the open-source community.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://x.com/HilaShmuel\" target=\"_blank\" rel=\"noopener noreferrer\">@HilaShmuel</a>&nbsp; • &nbsp;\n  <a href=\"https://runcabinet.com\" target=\"_blank\" rel=\"noopener noreferrer\">runcabinet.com</a>&nbsp; • &nbsp;\n  <a href=\"mailto:hi@runcabinet.com\" target=\"_blank\" rel=\"noopener noreferrer\">hi@runcabinet.com</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/hilash/cabinet/stargazers\" target=\"_blank\" rel=\"noopener noreferrer\">\n    <img src=\"https://img.shields.io/github/stars/hilash/cabinet?style=for-the-badge&logo=github&logoColor=white&label=Star%20the%20vision%20%F0%9F%98%8D%F0%9F%8C%9F&labelColor=4b4b4b&color=f5b301\" alt=\"Star Cabinet on GitHub\" valign=\"middle\">\n  </a>&nbsp;\n  <a href=\"https://discord.gg/hJa5TRTbTH\" target=\"_blank\" rel=\"noopener noreferrer\">\n    <img src=\"https://img.shields.io/badge/Discord-Join%20the%20community-5865F2?style=for-the-badge&logo=discord&logoColor=white&labelColor=4b4b4b\" alt=\"Join the Discord\" valign=\"middle\">\n  </a>&nbsp;\n  <a href=\"https://runcabinet.com/waitlist\" target=\"_blank\" rel=\"noopener noreferrer\">\n    <img src=\"https://img.shields.io/badge/%F0%9F%97%84%EF%B8%8F%20Cabinet-Cloud%20Waitlist-55c938?style=for-the-badge&labelColor=4b4b4b\" alt=\"Cabinet Cloud Waitlist\" valign=\"middle\">\n  </a>&nbsp;\n  <a href=\"https://coderabbit.ai\" target=\"_blank\" rel=\"noopener noreferrer\">\n    <img src=\"https://img.shields.io/coderabbit/prs/github/hilash/cabinet?utm_source=oss&utm_medium=github&utm_campaign=hilash%2Fcabinet&labelColor=171717&color=FF570A&link=https%3A%2F%2Fcoderabbit.ai&label=CodeRabbit+Reviews\" alt=\"CodeRabbit Pull Request Reviews\" valign=\"middle\">\n  </a>\n</p>\n\n---\n\n## From zero to AI team in 2 minutes\n\n```bash\nnpx create-cabinet@latest\ncd cabinet\nnpm run dev:all\n```\n\nOpen [http://localhost:3000](http://localhost:3000). The onboarding wizard builds your custom AI team in 5 questions.\n\n---\n\n## The problem\n\nEvery time you start a new Claude session, it forgets everything. Your project context, your decisions, your research — gone. Scattered docs in Notion. AI sessions with no memory. Manual copy-paste between tools.\n\n## The solution\n\nOne knowledge base. AI agents that remember everything. Scheduled jobs that compound. Your team grows while you sleep.\n\n> If it feels like enterprise workflow software, it's wrong. If it feels like watching a team work, it's right.\n\n---\n\n## Philosophy\n\nCabinet is built around a few principles that we think matter deeply for the future of AI + data tools:\n\n- **Yours** — Your data stays yours: local, visible, and portable. It’s not trapped inside a particular AI provider’s system with no clean way to get it out. You stay in control of your information.\n- **Git everything** — Memory should have history. You should be able to inspect changes, revert mistakes, audit how knowledge evolves, and treat your AI system like the important infrastructure it is.\n- **BYOAI** — Bring your own AI. Cabinet should work with Claude, Codex, OpenCode, local models, and whatever comes next, without forcing your knowledge into a single provider’s ecosystem.\n- **KISS** — Keep it simple, stupid. AI tools should be understandable, inspectable, and hackable. We prefer plain files, clear behavior, and systems that developers can actually reason about.\n- **Security** — We care deeply about security. If AI is going to work with your documents, research, plans, and internal context, the system should minimize surprise, reduce unnecessary exposure, and make trust a design requirement rather than an afterthought.\n- **Self-hosted** — If AI is going to hold your context, plans, research, and operating memory, it should run in an environment you control.\n\n## Everything you need. Nothing you don't.\n\n| Feature | What it does |\n|---|---|\n| **WYSIWYG + Markdown** | Rich text editing with Tiptap. Tables, code blocks, slash commands. |\n| **AI Agents** | Each has goals, skills, scheduled jobs. Watch them work like a real team. |\n| **Scheduled Jobs** | Cron-based agent automation. Reddit scout every 6 hours. Weekly reports on Monday. |\n| **Embedded HTML Apps** | Drop an `index.html` in any folder — it renders as an iframe. Full-screen mode. |\n| **Web Terminal** | Interactive local AI CLI terminal in the browser. Kept for direct sessions, debugging, and future terminal-native features such as tmux-style Cabinet workflows. |\n| **File-Based Everything** | No database. Markdown on disk. Your data is always yours, always portable. |\n| **Git-Backed History** | Every save auto-commits. Full diff viewer. Restore any page to any point in time. |\n| **Missions & Tasks** | Break goals into missions. Track progress with Kanban boards. |\n| **Internal Chat** | Built-in team channels. Agents and humans communicate. |\n| **Full-Text Search** | Cmd+K instant search across all pages. Fuzzy matching. |\n| **PDF & CSV Viewers** | First-class support for PDFs and spreadsheets. |\n| **Dark/Light Mode** | Theme toggle. Dark mode by default. |\n\n---\n\n## Ship HTML apps inside your knowledge base\n\nThis is the biggest difference between Cabinet and tools like Obsidian or Notion. Drop an `index.html` in any directory — it renders as an embedded app. Full-screen mode with sidebar auto-collapse. AI-generated apps written directly into your KB. Version controlled via git. No build step.\n\n---\n\n## Not another note-taking app\n\n| Feature | Cabinet | Obsidian | Notion |\n|---|---|---|---|\n| AI agent orchestration | Yes | No | No |\n| Scheduled cron jobs | Yes | No | No |\n| Embedded HTML apps | Yes | No | No |\n| Web terminal | Yes | No | No |\n| Self-hosted, files on disk | Yes | Yes | No |\n| No database / no lock-in | Yes | Yes | No |\n| Git-backed version history | Yes | Via plugin | No |\n| WYSIWYG + Markdown | Yes | Yes | Yes |\n\n---\n\n## Hire your AI team in 5 questions\n\nCabinet ships with 20 pre-built agent templates. Each has a role, recurring jobs, and a workspace in the knowledge base.\n\n| Department | Agents |\n|---|---|\n| **Leadership** | CEO, COO, CFO, CTO |\n| **Product** | Product Manager, UX Designer |\n| **Marketing** | Content Marketer, SEO Specialist, Social Media, Growth Marketer, Copywriter |\n| **Engineering** | Editor, QA Agent, DevOps Engineer |\n| **Sales & Support** | Sales Agent, Customer Success |\n| **Analytics** | Data Analyst |\n| **Operations** | People Ops, Legal Advisor, Researcher |\n\n---\n\n## How it works\n\n1. **Install & Run** — One command. Next.js + daemon start.\n2. **Answer 5 Questions** — Cabinet builds your custom AI team.\n3. **Watch Your Team Work** — Agents create missions, write content, scout Reddit, file reports.\n4. **Knowledge Compounds** — Every agent run, every edit adds to the KB. Context builds over time.\n\n---\n\n## AI Runtime Today\n\nCabinet no longer treats the browser terminal as the only way to run AI work.\n\n- **Tasks, jo
