SON Alexander](icons/JSON-Alexander.png)\n\nBelieve it or not, George formats JSON.\n\n![Preview Chrome](src/preview-chrome.png)\n\n![Preview Firefox](src/preview-firefox.png)\n\n## Features\n\n- Syntax highlighting for keys, strings, numbers, booleans, and null\n- Collapsible/expandable tree view with level controls\n- Hover any property to see its full JSON path — click to pin, then copy\n- Expand/collapse all children of an object with inline button\n- Three view modes: Tree, Formatted, and Raw\n- Copy JSON to clipboard\n- JSON payload available in the console as `window.data`\n- Light, dark, and auto (system) themes\n- Indent guide lines with hover highlighting\n- Optional custom cursor (via settings)\n\n## Installation\n\n### Chrome\n\n1. Open Chrome and navigate to `chrome://extensions`\n2. Enable **Developer mode** (toggle in the top right)\n3. Click **Load unpacked**\n4. Select the **`dist`** folder inside this project\n\n### Firefox\n\n1. Open Firefox and navigate to `about:debugging#/runtime/this-firefox`\n2. Click **Load Temporary Add-on...**\n3. Select the `manifest.json` file inside **`dist`**\n\n#### Disable Firefox's Native JSON Viewer\n\nFirefox has a built-in JSON viewer that can prevent this add-on from taking over JSON pages. Disable it first:\n\n1. Open a new tab and go to `about:config`\n2. Accept the warning prompt if shown\n3. Search for `devtools.jsonview.enabled`\n4. Set it to `false`\n5. Reload any JSON page\n\n## Development\n\n```bash\nnpm run dev    # watch mode — rebuilds on file changes\nnpm run build  # production build\nnpm run zip    # build and create json-alexander.zip\n```\n\nAfter making changes, reload the extension in your browser.\n\n## Usage\n\nNavigate to any URL that returns JSON (e.g. `https://jsonplaceholder.typicode.com/users`). The extension automatically detects JSON responses and replaces the page with an interactive viewer.\n\n- **Level buttons** (1, 2, 3... All) — collapse/expand the tree to a specific depth\n- **View picker** (Tree / Formatted / Raw) — switch between interactive tree, pretty-printed JSON, and raw JSON\n- **Theme toggle** — cycle between auto, dark, and light\n- **Copy JSON** — copy the full JSON to clipboard\n- **Click any line** — pins the JSON path in the toolbar, click Copy to copy it\n- **Console** — the parsed JSON is available as `window.data`\n- **Settings** (⚙) — toggle custom cursor\n","summary":"JSON Alexander is a browser extension that automatically formats JSON responses into an interactive viewer, replacing the raw page with a color‑coded, collapsible tree or pretty‑printed output. It offers syntax highlighting, depth‑controlled collapsing, hoverable JSON paths that can be pinned and copied, inline expand/collapse buttons, three view modes (tree, formatted, raw), copy‑to‑clipboard, automatic theme switching, and even exposes the parsed data as `window.data` for console use. With its lightweight deployment on Chrome and Firefox and a simple developer workflow, it benefits front‑end developers, API testers, and anyone debugging JSON structures by providing a clear, navigable representation of complex payloads.","description":"A really good JSON viewer browser Extension","stars":795,"language":"TypeScript"},{"owner":"santifer","repo":"career-ops","url":"https://github.com/santifer/career-ops","readme":"# Career-Ops\n\n[English](README.md) | [Español](README.es.md) | [Português (Brasil)](README.pt-BR.md) | [한국어](README.ko-KR.md) | [日本語](README.ja.md) | [Русский](README.ru.md) | [简体中文](README.cn.md) | [繁體中文](README.zh-TW.md)\n\n<p align=\"center\">\n  <a href=\"https://x.com/santifer\"><img src=\"docs/hero-banner.jpg\" alt=\"Career-Ops — Multi-Agent Job Search System\" width=\"800\"></a>\n</p>\n\n<p align=\"center\">\n  <em>I spent months applying to jobs the hard way. So I engineered the system I wish I had.</em><br>\n  Companies use AI to filter candidates. <strong>I just gave candidates AI to <em>choose</em> companies.</strong><br>\n  <em>Now it's open source.</em>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Claude_Code-000?style=flat&logo=anthropic&logoColor=white\" alt=\"Claude Code\">\n  <img src=\"https://img.shields.io/badge/OpenCode-111827?style=flat&logo=terminal&logoColor=white\" alt=\"OpenCode\">\n  <img src=\"https://img.shields.io/badge/Gemini_CLI-4285F4?style=flat&logo=google&logoColor=white\" alt=\"Gemini CLI\">\n  <img src=\"https://img.shields.io/badge/Codex_(soon)-6B7280?style=flat&logo=openai&logoColor=white\" alt=\"Codex\">\n  <img src=\"https://img.shields.io/badge/Node.js-339933?style=flat&logo=node.js&logoColor=white\" alt=\"Node.js\">\n  <img src=\"https://img.shields.io/badge/Go-00ADD8?style=flat&logo=go&logoColor=white\" alt=\"Go\">\n  <img src=\"https://img.shields.io/badge/Playwright-2EAD33?style=flat&logo=playwright&logoColor=white\" alt=\"Playwright\">\n  <img src=\"https://img.shields.io/badge/License-MIT-blue.svg\" alt=\"MIT\">\n  <a href=\"https://discord.gg/8pRpHETxa4\"><img src=\"https://img.shields.io/badge/Discord-5865F2?style=flat&logo=discord&logoColor=white\" alt=\"Discord\"></a>\n  <br>\n  <img src=\"https://img.shields.io/badge/EN-blue?style=flat\" alt=\"EN\">\n  <img src=\"https://img.shields.io/badge/ES-red?style=flat\" alt=\"ES\">\n  <img src=\"https://img.shields.io/badge/DE-grey?style=flat\" alt=\"DE\">\n  <img src=\"https://img.shields.io/badge/FR-blue?style=flat\" alt=\"FR\">\n  <img src=\"https://img.shields.io/badge/PT--BR-green?style=flat\" alt=\"PT-BR\">\n  <img src=\"https://img.shields.io/badge/KO-white?style=flat\" alt=\"KO\">\n  <img src=\"https://img.shields.io/badge/JA-red?style=flat\" alt=\"JA\">\n  <img src=\"https://img.shields.io/badge/ZH--CN-red?style=flat\" alt=\"ZH-CN\">\n  <img src=\"https://img.shields.io/badge/ZH--TW-blue?style=flat\" alt=\"ZH-TW\">\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"docs/demo.gif\" alt=\"Career-Ops Demo\" width=\"800\">\n</p>\n\n<p align=\"center\"><strong>740+ job listings evaluated · 100+ personalized CVs · 1 dream role landed</strong></p>\n\n<p align=\"center\"><a href=\"https://discord.gg/8pRpHETxa4\"><img src=\"https://img.shields.io/badge/Join_the_community-Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Discord\"></a></p>\n\n## What Is This\n\nCareer-Ops turns any AI coding CLI into a full job search command center. Instead of manually tracking applications in a spreadsheet, you get an AI-powered pipeline that:\n\n- **Evaluates offers** with a structured A-F scoring system (10 weighted dimensions)\n- **Generates tailored PDFs** -- ATS-optimized CVs customized per job description\n- **Scans portals** automatically (Greenhouse, Ashby, Lever, company pages)\n- **Processes in batch** -- evaluate 10+ offers in parallel with sub-agents\n- **Tracks everything** in a single source of truth with integrity checks\n\n> **Important: This is NOT a spray-and-pray tool.** Career-ops is a filter -- it helps you find the few offers worth your time out of hundreds. The system strongly recommends against applying to anything scoring below 4.0/5. Your time is valuable, and so is the recruiter's. Always review before submitting.\n\nCareer-ops is agentic: Claude Code navigates career pages with Playwright, evaluates fit by reasoning about your CV vs the job description (not keyword matching), and adapts your resume per listing.\n\n> **Heads up: the first evaluations won't be great.** The system doesn't know you yet. Feed it context -- your CV, your career story, your proof points, your preferences, what you're good at, what you want to avoid. The more you nurture it, the better it gets. Think of it as onboarding a new recruiter: the first week they need to learn about you, then they become invaluable.\n\nBuilt by someone who used it to evaluate 740+ job offers, generate 100+ tailored CVs, and land a Head of Applied AI role. [Read the full case study](https://santifer.io/career-ops-system).\n\n## Features\n\n| Feature | Description |\n|---------|-------------|\n| **Auto-Pipeline** | Paste a URL, get a full evaluation + PDF + tracker entry |\n| **6-Block Evaluation** | Role summary, CV match, level strategy, comp research, personalization, interview prep (STAR+R) |\n| **Interview Story Bank** | Accumulates STAR+Reflection stories across evaluations -- 5-10 master stories that answer any behavioral question |\n| **Negotiation Scripts** | Salary negotiation frameworks, geographic discount pushback, competing offer leverage |\n| **ATS PDF Generation** | Keyword-injected CVs with Space Grotesk + DM Sans design |\n| **Portal Scanner** | 45+ companies pre-configured (Anthropic, OpenAI, ElevenLabs, Retool, n8n...) + custom queries across Ashby, Greenhouse, Lever, Wellfound |\n| **Batch Processing** | Parallel evaluation with `claude -p` workers |\n| **Dashboard TUI** | Terminal UI to browse, filter, and sort your pipeline |\n| **Human-in-the-Loop** | AI evaluates and recommends, you decide and act. The system never submits an application -- you always have the final call |\n| **Pipeline Integrity** | Automated merge, dedup, status normalization, health checks |\n\n## Quick Start\n\n```bash\n# 1. Clone and install\ngit clone https://github.com/santifer/career-ops.git\ncd career-ops && npm install\nnpx playwright install chromium   # Required for PDF generation\n\n# 2. Check setup\nnpm run doctor                     # Validates all prerequisites\n\n# 3. Configure\ncp config/profile.example.yml config/profile.yml  # Edit with your details\ncp templates/portals.example.yml portals.yml       # Customize companies\n\n# 4. Add your CV\n# Create cv.md in the project root with your CV in markdown\n\n# 5. Personalize with Claude\nclaude   # Open Claude Code in this directory\n\n# Then ask Claude to adapt the system to you:\n# \"Change the archetypes to backend engineering roles\"\n# \"Translate the modes to English\"\n# \"Add these 5 companies to portals.yml\"\n# \"Update my profile with this CV I'm pasting\"\n\n# 6. Start using\n# Paste a job URL or run /career-ops\n```\n\n> **The system is designed to be customized by Claude itself.** Modes, archetypes, scoring weights, negotiation scripts -- just ask Claude to change them. It reads the same files it uses, so it knows exactly what to edit.\n\nSee [docs/SETUP.md](docs/SETUP.md) for the full setup guide.\n\n## Gemini CLI Integration\n\nCareer-ops supports [Gemini CLI](https://github.com/google-gemini/gemini-cli) natively — the same way it supports Claude Code and OpenCode. All 15 slash commands are available, using the same `modes/*.md` evaluation logic.\n\n### Option A — Native Gemini CLI (Recommended)\n\n```bash\n# 1. Install Gemini CLI\nnpm install -g @google/gemini-cli\n# or: npx @google/gemini-cli --version\n\n# 2. Authenticate (free — uses your Google account)\ngemini auth\n\n# 3. Run in the career-ops directory\ncd career-ops\ngemini\n\n# 4. Use slash commands just like Claude Code\n/career-ops \"Senior AI Engineer at Anthropic...\"\n/career-ops-evaluate --file ./jds/openai.txt\n/career-ops-scan\n/career-ops-pdf\n/career-ops-tracker\n```\n\nThe `GEMINI.md` file is auto-loaded as context. All 15 commands are defined in `.gemini/commands/*.toml`.\n\n### Option B — Standalone API Script (No CLI install needed)\n\n```bash\n# 1. Get a free API key at https://aistudio.google.com/apikey\ncp .env.example .env\n# Edit .env → set GEMINI_API_KEY=your_key_here\n\n# 2. Install dependencies\nnpm install\n\n# 3. Evaluate a job description\nnode gemini-eval.mjs \"We are looking for a Senior AI Engineer...\"\nnode gemini-eval.mjs --file ./jds/my-job.txt\nnpm run gemini:eval -- \"JD text here\"\n```\n\n> **Free tier:** Both options work without billing. Native CLI uses Google OAuth; the API script uses `gemini-2.0-flash` (15 RPM, 1M tokens/day free).\n\n## Usage\n\nCareer-ops is a single slash command with multiple modes:\n\n```\n/career-ops                → Show all available commands\n/career-ops {paste a JD}   → Full auto-pipeline (evaluate + PDF + tracker)\n/career-ops scan           → Scan portals for new offers\n/career-ops pdf            → Generate ATS-optimized CV\n/career-ops batch          → Batch evaluate multiple offers\n/career-ops tracker        → View application status\n/career-ops apply          → Fill application forms with AI\n/career-ops pipeline       → Process pending URLs\n/career-ops contacto       → LinkedIn outreach message\n/career-ops deep           → Deep company research\n/career-ops training       → Evaluate a course/cert\n/career-ops project        → Evaluate a portfolio project\n```\n\nOr just paste a job URL or description directly -- career-ops auto-detects it and runs the full pipeline.\n\n## How It Works\n\n```\nYou paste a job URL or description\n        │\n        ▼\n┌──────────────────┐\n│  Archetype       │  Classifies: LLMOps / Agentic / PM / SA / FDE / Transformation\n│  Detection       │\n└────────┬─────────┘\n         │\n┌────────▼─────────┐\n│  A-F Evaluation  │  Match, gaps, comp research, STAR stories\n│  (reads cv.md)   │\n└────────┬─────────┘\n         │\n    ┌────┼────┐\n    ▼    ▼    ▼\n Report  PDF  Tracker\n  .md   .pdf   .tsv\n```\n\n## Pre-configured Portals\n\nThe scanner comes with **45+ companies** ready to scan and **19 search queries** across major job boards. Copy `templates/portals.example.yml` to `portals.yml` and add your own:\n\n**AI Labs:** Anthropic, OpenAI, Mistral, Cohere, LangChain, Pinecone\n**Voice AI:** ElevenLabs, PolyAI, Parloa, Hume AI, Deepgram, Vapi, Bland AI\n**AI Platforms:** Retool, Airtable, Vercel, Temporal, Glean, Arize AI\n**Contact Center:** Ada, LivePerson, Sierra, Decagon, Talkdesk, Genesys\n**Enterprise:** Salesforce, Twilio, Gong, Dialpad\n**LLMOps:** Langfuse, Weights & Biases, Lindy, Cognigy, Speechmatics\n**Automation:** n8n, Zapier, Make.com\n**European:** Factorial, Attio, Tinybird, Clarity AI, Travelperk\n\n**Job boards searched:** Ashby, Greenhouse, Lever, Wellfound, Workable, RemoteFront\n\n## Dashboard TUI\n\nThe built-in terminal dashboard lets you browse your pipeline visually:\n\n```bash\ncd dashboard\ngo build -o career-dashboard .\n./career-dashboard --path ..\n```\n\nFeatures: 6 filter tabs, 4 sort modes, grouped/flat view, lazy-loaded previews, inline status changes.\n\n## Project Structure\n\n```\ncareer-ops/\n├── CLAUDE.md                    # Agent instructions\n├── cv.md                        # Your CV (create this)\n├── article-digest.md            # Your proof points (optional)\n├── config/\n│   └── profile.example.yml      # Template for your profile\n├── modes/                       # 14 skill modes\n│   ├── _shared.md               # Shared context (customize this)\n│   ├── oferta.md                # Single evaluation\n│   ├── pdf.md                   # PDF generation\n│   ├── scan.md                  # Portal scanner\n│   ├── batch.md                 # Batch processing\n│   └── ...\n├── templates/\n│   ├── cv-template.html         # ATS-optimized CV template\n│   ├── portals.example.yml      # Scanner config template\n│   └── states.yml               # Canonical statuses\n├── batch/\n│   ├── batch-prompt.md          # Self-contained worker prompt\n│   └── batch-runner.sh          # Orchestrator script\n├── dashboard/                   # Go TUI pipeline viewer\n├── data/                        # Your tracking data (gitignored)\n├── reports/                     # Evaluation reports (gitignored)\n├── output/                      # Generated PDFs (gitignored)\n├── fonts/                       # Space Grotesk + DM Sans\n├── docs/                        # Setup, customization, architecture\n└── examples/                    # Sample CV, report, proof points\n```\n\n## Tech Stack\n\n![Claude Code](https://img.shields.io/badge/Claude_Code-000?style=flat&logo=anthropic&logoColor=white)\n![Node.js](https://img.shields.io/badge/Node.js-339933?style=flat&logo=node.js&logoColor=white)\n![Playwright](https://img.shields.io/badge/Playwright-2EAD33?style=flat&logo=playwright&logoColor=white)\n![Go](https://img.shields.io/badge/Go-00ADD8?style=flat&logo=go&logoColor=white)\n![Bubble Tea](https://img.shields.io/badge/Bubble_Tea-FF75B5?style=flat&logo=go&logoColor=white)\n\n- **Agent**: Claude Code with custom skills and modes\n- **PDF**: Playwright/Puppeteer + HTML template\n- **Scanner**: Playwright + Greenhouse API + WebSearch\n- **Dashboard**: Go + Bubble Tea + Lipgloss (Catppuccin Mocha theme)\n- **Data**: Markdown tables + YAML config + TSV batch files\n\n## Also Open Source\n\n- **[cv-santiago](https://github.com/santifer/cv-santiago)** -- The portfolio website (santifer.io) with AI chatbot, LLMOps dashboard, and case studies. If you need a portfolio to showcase alongside your job search, fork it and make it yours.\n\n## About the Author\n\nI'm Santiago -- Head of Applied AI, former founder (built and sold a business that still runs with my name on it). I built career-ops to manage my own job search. It worked: I used it to land my current role.\n\nMy portfolio and other open source projects → [santifer.io](https://santifer.io)\n\n☕ [Buy me a coffee](https://buymeacoffee.com/santifer) if career-ops helped your job search.\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=santifer%2Fcareer-ops&type=timeline&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&legend=top-left\" />\n </picture>\n</a>\n\n## Disclaimer\n\n**career-ops is a local, open-source tool — NOT a hosted service.** By using this software, you acknowledge:\n\n1. **You control your data.** Your CV, contact info, and personal data stay on your machine and are sent directly to the AI provider you choose (Anthropic, OpenAI, etc.). We do not collect, store, or have access to any of your data.\n2. **You control the AI.** The default prompts instruct the AI not to auto-submit applications, but AI models can behave unpredictably. If you modify the prompts or use different models, you do so at your own risk. **Always review AI-generated content for accuracy before submitting.**\n3. **You comply with third-party ToS.** You must use this tool in accordance with the Terms of Service of the career portals you interact with (Greenhouse, Lever, Workday, LinkedIn, etc.). Do not use this tool to spam employers or overwhelm ATS systems.\n4. **No guarantees.** Evaluations are recommendations, not truth. AI models may hallucinate skills or experience. The authors are not liable for employment outcomes, rejected applications, account restrictions, or any other consequences.\n\nSee [LEGAL_DISCLAIMER.md](LEGAL_DISCLAIMER.md) for full details. This software is provided under the [MIT License](LICENSE) \"as is\", without warranty of any kind.\n\n## Contributors\n\n<a href=\"https://github.com/santifer/career-ops/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=santifer/career-ops\" />\n</a>\n\nGot hired using career-ops? [Share your story!](https://github.com/santifer/career-ops/issues/new?template=i-got-hired.yml)\n\n## License\n\nMIT\n\n## Let's Connect\n\n[![Website](https://img.shields.io/badge/santifer.io-000?style=for-the-badge&logo=safari&logoColor=white)](https://santifer.io)\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white)](https://linkedin.com/in/santifer)\n[![X](https://img.shields.io/badge/X-000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/santifer)\n[![Discord](https://img.shields.io/badge/Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white)](https://discord.gg/8pRpHETxa4)\n[![Email](https://img.shields.io/badge/Email-EA4335?style=for-the-badge&logo=gmail&logoColor=white)](mailto:hi@santifer.io)\n[![Buy Me a Coffee](https://img.shields.io/badge/Buy_Me_a_Coffee-FFDD00?style=for-the-badge&logo=buy-me-a-coffee&logoColor=black)](https://buymeacoffee.com/santifer)\n","summary":"Career‑Ops is an AI‑driven job‑search command center that turns a simple CLI into a full hiring pipeline. It automatically scrapes popular recruiting portals, evaluates each offer with a weighted A‑F scoring rubric, and generates ATS‑optimized PDFs tailored to individual job descriptions. Capabilities include parallel batch processing of dozens of listings, integrity‑checked tracking of all applications, and agentic interactions that adapt both the resume and the candidate’s profile. The tool is ideal for ambitious job seekers who want a data‑driven, time‑saving filter to surface only the most promising opportunities.","description":"AI-powered job search system built on Claude Code. 14 skill modes, Go dashboard, PDF generation, batch processing.","stars":36579,"language":"JavaScript"},{"owner":"maaslalani","repo":"sheets","url":"https://github.com/maaslalani/sheets","readme":"# Sheets\n\nSpreadsheets in your terminal.\n\n<br />\n<p align=\"center\">\n<img width=\"800\" src=\"./examples/demo.gif?raw=true\" alt=\"Sheets\" />\n</p>\n<br />\n\n## Command Line Interface\n\nLaunch the TUI\n\n```bash\n> sheets budget.csv\n```\n\nRead from stdin:\n\n```bash\n> sheets <<< ID,Name,Age\n1,Alice,24\n2,Bob,32\n3,Charlie,26\n```\n\nRead a specific cell:\n\n```bash\n> sheets budget.csv B9\n2760\n```\n\nOr, range:\n\n```bash\n> sheets budget.csv B1:B3\n1200\n950\n810\n```\n\nModify a cell:\n\n```bash\n> sheets budget.csv B7=10 B8=20\n```\n\n## Navigation\n\n* <kbd>h</kbd>, <kbd>j</kbd>, <kbd>k</kbd>, <kbd>l</kbd>: Move the active cell\n* <kbd>gg</kbd>, <kbd>G</kbd>, <kbd>5G</kbd>, <kbd>gB9</kbd>: Jump to the top, bottom, a row number, or a specific cell\n* <kbd>0</kbd>, <kbd>^</kbd>, <kbd>$</kbd>: Jump to the first column, first non-empty column, or last non-empty column in the row\n* <kbd>H</kbd>, <kbd>M</kbd>, <kbd>L</kbd>: Jump to the top, middle, or bottom visible row\n* <kbd>ctrl+u</kbd>, <kbd>ctrl+d</kbd>: Move half a page up or down\n* <kbd>zt</kbd>, <kbd>zz</kbd>, <kbd>zb</kbd>,: Align the current row to the top, middle, or bottom of the window\n* <kbd>/</kbd>, <kbd>?</kbd>: Search forward or backward\n* <kbd>n</kbd>, <kbd>N</kbd>: Repeat the last search\n* <kbd>ma</kbd>, <kbd>'a</kbd>: Set a mark and jump back to it later\n* <kbd>ctrl+o</kbd>, <kbd>ctrl+i</kbd>: Move backward or forward through the jump list\n* <kbd>q</kbd>, <kbd>ctrl+c</kbd>: Quit\n\n### Editing & Selection\n\n* <kbd>i</kbd>, <kbd>I</kbd>, <kbd>c</kbd>: Edit the current cell, edit from the start, or clear the cell and edit\n* <kbd>ESC</kbd>: Leave insert, visual, or command mode\n* <kbd>enter</kbd>, <kbd>tab</kbd>, <kbd>shift+tab</kbd>: In insert mode, commit and move down, right, or left\n* <kbd>ctrl+n</kbd>, <kbd>ctrl+p</kbd>: In insert mode, commit and move down or up\n* <kbd>o</kbd>, <kbd>O</kbd>: Insert a row below or above and start editing\n* <kbd>v</kbd>, <kbd>V</kbd>: Start a visual selection or row selection\n* <kbd>y</kbd>, <kbd>yy</kbd>: Copy the current cell, or yank the current row(s)\n* <kbd>x</kbd>, <kbd>p</kbd>: Cut the current cell or selection, and paste the current register\n* <kbd>dd</kbd>: Delete the current row\n* <kbd>u</kbd>, <kbd>ctrl+r</kbd>, <kbd>U</kbd>: Undo and redo\n* <kbd>.</kbd>: Repeat the last change\n\n### Visual Mode\n\n* <kbd>=</kbd>: In visual mode, insert a formula after the selected range `=|(B1:B8)`.\n\n### Command Mode\n\nPress <kbd>:</kbd> to open the command prompt, then use commands such as:\n\n- <kbd>:w</kbd> to save\n- <kbd>:w</kbd> <code>path.csv</code> to save to a new file\n- <kbd>:e</kbd> <code>path.csv</code> to open another CSV\n- <kbd>:q</kbd> or <kbd>:wq</kbd> to quit\n- <kbd>:goto B9</kbd> or <kbd>:B9</kbd> to jump to a cell\n\n## Installation\n\nInstall with Homebrew on macOS or Linux:\n\n```sh\nbrew install sheets\n```\n\nOr install with Go:\n\n```sh\ngo install github.com/maaslalani/sheets@main\n```\n\nOr download a binary from the [releases](https://github.com/maaslalani/sheets/releases).\n\n## License\n\n[MIT](https://github.com/maaslalani/sheets/blob/master/LICENSE)\n\n## Feedback\n\nI'd love to hear your feedback on improving `sheets`.\n\nFeel free to reach out via:\n* [Email](mailto:maas@lalani.dev)\n* [Twitter](https://twitter.com/maaslalani)\n* [GitHub issues](https://github.com/maaslalani/sheets/issues/new)\n\n---\n\n<sub><sub>z</sub></sub><sub>z</sub>z\n","summary":"Sheets is a terminal‑based spreadsheet tool that lets users view and edit CSV files directly from the command line, offering Vim‑style navigation, range selection, cell editing, formula insertion, and robust copy/paste and undo/redo capabilities. The built‑in command prompt enables quick file switching, saving, and jumping to specific cells, while visual mode supports bulk operations and row selections. Its lightweight TUI is ideal for developers, system administrators, and data analysts who need to manage tabular data without leaving the shell. Sheets can be installed on macOS or Linux via Homebrew, Go, or precompiled binaries from its releases.","description":"Terminal based spreadsheet tool","stars":2023,"language":"Go"},{"owner":"Arthur-Ficial","repo":"apfel","url":"https://github.com/Arthur-Ficial/apfel","readme":"# apfel\n\n### The free AI already on your Mac.\n\n[![Version 1.0.5](https://img.shields.io/badge/version-1.0.5-blue)](https://github.com/Arthur-Ficial/apfel)\n[![Swift 6.3+](https://img.shields.io/badge/Swift-6.3%2B-F05138?logo=swift&logoColor=white)](https://swift.org)\n[![macOS 26 Tahoe+](https://img.shields.io/badge/macOS-26%20Tahoe%2B-000000?logo=apple&logoColor=white)](https://developer.apple.com/macos/)\n[![No Xcode Required](https://img.shields.io/badge/Xcode-not%20required-orange)](https://developer.apple.com/xcode/resources/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![100% On-Device](https://img.shields.io/badge/inference-100%25%20on--device-green)](https://developer.apple.com/documentation/foundationmodels)\n[![Website](https://img.shields.io/badge/web-apfel.franzai.com-16A34A)](https://apfel.franzai.com)\n[![#agentswelcome](https://img.shields.io/badge/%23agentswelcome-PRs%20welcome-0066cc?style=for-the-badge&labelColor=0d1117&logo=probot&logoColor=white)](#contributing)\n\nEvery Mac with Apple Silicon ships a built-in language model as part of Apple Intelligence. `apfel` gives you access to it - from the terminal, as a local OpenAI-compatible server, or as an interactive chat. No API keys, no cloud, no downloads. It's already on your machine.\n\n## What It Is\n\nEvery Apple Silicon Mac with Apple Intelligence includes Apple's on-device foundation model. `apfel` exposes it through [https://developer.apple.com/documentation/foundationmodels](https://developer.apple.com/documentation/foundationmodels) so you can use it directly from the shell and from OpenAI-compatible clients.\n\n| Mode | Command | What you get |\n|------|---------|--------------|\n| UNIX tool | `apfel \"prompt\"` / `echo \"text\" \\| apfel` | Pipe-friendly answers, file attachments, JSON output, exit codes |\n| OpenAI-compatible server | `apfel --serve` | Drop-in local `http://localhost:11434/v1` backend for OpenAI SDKs |\n| Command-line chat | `apfel --chat` | Multi-turn chat with context-window management |\n\nTool calling works across CLI, chat, and server. Inference stays 100% on-device. The context window is 4096 tokens.\n\n![apfel CLI](screenshots/cli.png)\n\n## Requirements & Install\n\n- **macOS 26 Tahoe or newer**, Apple Silicon (M1+), and Apple Intelligence enabled: [https://support.apple.com/en-us/121115](https://support.apple.com/en-us/121115)\n- Building from source requires Command Line Tools with the macOS 26.4 SDK (Swift 6.3). No Xcode required.\n\n**Homebrew** (recommended):\n\n```bash\nbrew install apfel\nbrew upgrade apfel\n```\n\nLatest release immediately via tap: `brew install Arthur-Ficial/tap/apfel` (homebrew-core autobump can lag up to 24h).\n\n**Build from source:**\n\n```bash\ngit clone https://github.com/Arthur-Ficial/apfel.git\ncd apfel\nmake install\n```\n\nUpdate with `brew upgrade apfel` or `apfel --update`. Troubleshooting and Apple Intelligence setup notes: [docs/install.md](docs/install.md).\n\n## Quick Start\n\n### UNIX tool\n\nShell note: if your prompt contains `!`, prefer single quotes in `zsh`/`bash` so history expansion does not break copy-paste. Example: `apfel 'Hello, Mac!'`\n\n```bash\n# Single prompt\napfel \"What is the capital of Austria?\"\n\n# Permissive mode -- reduces guardrail false positives for creative/long prompts\napfel --permissive \"Write a dramatic opening for a thriller novel\"\n\n# Stream output\napfel --stream \"Write a haiku about code\"\n\n# Pipe input\necho \"Summarize: $(cat README.md)\" | apfel\n\n# Attach file content to prompt\napfel -f README.md \"Summarize this project\"\n\n# Attach multiple files\napfel -f old.swift -f new.swift \"What changed between these two files?\"\n\n# Combine files with piped input\ngit diff HEAD~1 | apfel -f CONVENTIONS.md \"Review this diff against our conventions\"\n\n# JSON output for scripting\napfel -o json \"Translate to German: hello\" | jq .content\n\n# System prompt\napfel -s \"You are a pirate\" \"What is recursion?\"\n\n# System prompt from file\napfel --system-file persona.txt \"Explain TCP/IP\"\n\n# Quiet mode for shell scripts\nresult=$(apfel -q \"Capital of France? One word.\")\n```\n\n### OpenAI-compatible server\n\n```bash\napfel --serve                              # foreground\nbrew services start apfel                  # background (like Ollama)\n```\n\nThen in another terminal:\n\n```bash\ncurl http://localhost:11434/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"apple-foundationmodel\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'\n```\n\nWorks with the official Python client:\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(base_url=\"http://localhost:11434/v1\", api_key=\"unused\")\nresp = client.chat.completions.create(\n    model=\"apple-foundationmodel\",\n    messages=[{\"role\": \"user\", \"content\": \"What is 1+1?\"}],\n)\nprint(resp.choices[0].message.content)\n```\n\nRun in background (auto-restarts, starts at login - [docs/background-service.md](docs/background-service.md)):\n\n```bash\nbrew services start apfel\nbrew services stop apfel\nAPFEL_TOKEN=$(uuidgen) APFEL_MCP=/path/to/tools.py brew services start apfel\n```\n\n### Interactive chat\n\n```bash\napfel --chat\napfel --chat -s \"You are a helpful coding assistant\"\napfel --chat --mcp ./mcp/calculator/server.py      # chat with MCP tools\napfel --chat --debug                                # debug output to stderr\n```\n\nCtrl-C exits cleanly. Context window is managed automatically with configurable strategies ([docs/context-strategies.md](docs/context-strategies.md)).\n\n## Demos\n\nSee [`demo/`](./demo/) for real-world shell scripts powered by apfel.\n\n**[cmd](./demo/cmd)** - natural language to shell command:\n\n```bash\ndemo/cmd \"find all .log files modified today\"\n# $ find . -name \"*.log\" -type f -mtime -1\n\ndemo/cmd -x \"show disk usage sorted by size\"   # -x = execute after confirm\ndemo/cmd -c \"list open ports\"                   # -c = copy to clipboard\n```\n\n**Shell function version** - add to your `.zshrc` and use `cmd` from anywhere:\n\n```bash\n# cmd - natural language to shell command (apfel). Add to .zshrc:\ncmd(){ local x c r a; while [[ $1 == -* ]]; do case $1 in -x)x=1;shift;; -c)c=1;shift;; *)break;; esac; done; r=$(apfel -q -s 'Output only a shell command.' \"$*\" | sed '/^```/d;/^#/d;s/\\x1b\\[[0-9;]*[a-zA-Z]//g;s/^[[:space:]]*//;/^$/d' | head -1); [[ $r ]] || { echo \"no command generated\"; return 1; }; printf '\\e[32m$\\e[0m %s\\n' \"$r\"; [[ $c ]] && printf %s \"$r\" | pbcopy && echo \"(copied)\"; [[ $x ]] && { printf 'Run? [y/N] '; read -r a; [[ $a == y ]] && eval \"$r\"; }; return 0; }\n```\n\n```bash\ncmd find all swift files larger than 1MB     # shows: $ find . -name \"*.swift\" -size +1M\ncmd -c show disk usage sorted by size        # shows command + copies to clipboard\ncmd -x what process is using port 3000       # shows command + asks to run it\ncmd list all git branches merged into main\ncmd count lines of code by language\n```\n\n**[oneliner](./demo/oneliner)** - complex pipe chains from plain English:\n\n```bash\ndemo/oneliner \"sum the third column of a CSV\"\n# $ awk -F',' '{sum += $3} END {print sum}' file.csv\n\ndemo/oneliner \"count unique IPs in access.log\"\n# $ awk '{print $1}' access.log | sort | uniq -c | sort -rn\n```\n\n**[mac-narrator](./demo/mac-narrator)** - your Mac's inner monologue:\n\n```bash\ndemo/mac-narrator              # one-shot: what's happening right now?\ndemo/mac-narrator --watch      # continuous narration every 60s\n```\n\nAlso in `demo/`:\n\n- **[wtd](./demo/wtd)** - \"what's this directory?\" instant project orientation\n- **[explain](./demo/explain)** - explain a command, error, or code snippet\n- **[naming](./demo/naming)** - naming suggestions for functions, variables, files\n- **[port](./demo/port)** - what's using this port?\n- **[gitsum](./demo/gitsum)** - summarize recent git activity\n\nLonger walkthroughs: [docs/demos.md](docs/demos.md).\n\n## MCP Tool Support\n\nAttach [Model Context Protocol](https://modelcontextprotocol.io/) tool servers with `--mcp`. apfel discovers tools, executes them automatically, and returns the final answer. No glue code needed.\n\n```bash\napfel --mcp ./mcp/calculator/server.py \"What is 15 times 27?\"\n```\n\n```\nmcp: ./mcp/calculator/server.py - add, subtract, multiply, divide, sqrt, power    ← stderr\ntool: multiply({\"a\": 15, \"b\": 27}) = 405                                          ← stderr\n15 times 27 is 405.                                                                ← stdout\n```\n\nTool info goes to stderr; only the answer goes to stdout. Use `-q` to suppress tool info.\n\n```bash\napfel --mcp ./server_a.py --mcp ./server_b.py \"Use both tools\"  # multiple servers\napfel --serve --mcp ./mcp/calculator/server.py                   # server mode\napfel --chat --mcp ./mcp/calculator/server.py                    # chat mode\n```\n\nShips with a calculator MCP server at [`mcp/calculator/`](./mcp/calculator/). See [docs/mcp-calculator.md](docs/mcp-calculator.md) for details.\n\n**Remote MCP servers** (Streamable HTTP transport, MCP spec 2025-03-26):\n\n```bash\n# Remote MCP server over HTTPS\napfel --mcp https://mcp.example.com/v1 \"what tools do you have?\"\n\n# With bearer token auth - prefer the env var (flag is visible in ps aux)\nAPFEL_MCP_TOKEN=mytoken apfel --mcp https://mcp.example.com/v1 \"...\"\napfel --mcp https://mcp.example.com/v1 --mcp-token mytoken \"...\"\n\n# Mixed local + remote\napfel --mcp /path/to/local.py --mcp https://remote.example.com/v1 \"...\"\n```\n\n> **Security:** Use `APFEL_MCP_TOKEN` env var rather than `--mcp-token` - CLI flags are visible in `ps aux`. apfel refuses to send a bearer token over plaintext `http://` (use `https://`).\n\n**Ready-made MCPs.** [apfel-mcp.franzai.com](https://apfel-mcp.franzai.com/) ships three token-budget-optimized MCP servers designed for apfel's 4096-token window: `url-fetch` (Readability article extraction with SSRF guards), `ddg-search` (DuckDuckGo web search, no API key), and the flagship compound `search-and-fetch` tool. Install with `brew install Arthur-Ficial/tap/apfel-mcp`. The repo is open for contributions of new apfel-optimized MCPs - rules at [apfel-mcp.franzai.com/#contribute](https://apfel-mcp.franzai.com/#contribute).\n\n## OpenAI API Compatibility\n\n**Base URL:** `http://localhost:11434/v1`\n\n| Feature | Status | Notes |\n|---------|--------|-------|\n| `POST /v1/chat/completions` | Supported | Streaming + non-streaming |\n| `GET /v1/models` | Supported | Returns `apple-foundationmodel` |\n| `GET /health` | Supported | Model availability, context window, languages |\n| `GET /v1/logs`, `/v1/logs/stats` | Debug only | Requires `--debug` |\n| Tool calling | Supported | Native `ToolDefinition` + JSON detection. See [docs/tool-calling-guide.md](docs/tool-calling-guide.md) |\n| `response_format: json_object` | Supported | System-prompt injection; markdown fences stripped from output |\n| `temperature`, `max_tokens`, `seed` | Supported | Mapped to `GenerationOptions` |\n| `stream: true` | Supported | SSE; final usage chunk only when `stream_options: {\"include_usage\": true}` (per OpenAI spec) |\n| `finish_reason` | Supported | `stop`, `tool_calls`, `length` |\n| Context strategies | Supported | `x_context_strategy`, `x_context_max_turns`, `x_context_output_reserve` extension fields |\n| CORS | Supported | Enable with `--cors` |\n| `POST /v1/completions` | 501 | Legacy text completions not supported |\n| `POST /v1/embeddings` | 501 | Embeddings not available on-device |\n| `logprobs=true`, `n>1`, `stop`, `presence_penalty`, `frequency_penalty` | 400 | Rejected explicitly. `n=1` and `logprobs=false` are accepted as no-ops |\n| Multi-modal (images) | 400 | Rejected with clear error |\n| `Authorization` header | Supported | Required when `--token` is set. See [docs/server-security.md](docs/server-security.md) |\n\nFull API spec: [openai/openai-openapi](https://github.com/openai/openai-openapi).\n\n## Limitations\n\n| Constraint | Detail |\n|------------|--------|\n| Context window | **4096 tokens** (input + output combined) |\n| Platform | macOS 26+, Apple Silicon only |\n| Model | One model (`apple-foundationmodel`), not configurable |\n| Guardrails | Apple's safety system may block benign prompts. `--permissive` reduces false positives ([docs/PERMISSIVE.md](docs/PERMISSIVE.md)) |\n| Speed | On-device, not cloud-scale - a few seconds per response |\n| No embeddings / vision | Not available on-device |\n\n## Reference Docs\n\nGuides to use apfel from [Python](docs/guides/python.md), [Node.js](docs/guides/nodejs.md), [Ruby](docs/guides/ruby.md), [PHP](docs/guides/php.md), [Bash/curl](docs/guides/bash-curl.md), [Zsh](docs/guides/zsh.md), [AppleScript](docs/guides/applescript.md), [Swift](docs/guides/swift-scripting.md), [Perl](docs/guides/perl.md), [AWK](docs/guides/awk.md) - see [docs/guides/index.md](docs/guides/index.md). Empirically tested; runnable proof at [apfel-guides-lab](https://github.com/Arthur-Ficial/apfel-guides-lab).\n\n- [docs/install.md](docs/install.md) - install, troubleshooting, and Apple Intelligence setup\n- [docs/cli-reference.md](docs/cli-reference.md) - every flag, exit code, and environment variable\n- [docs/background-service.md](docs/background-service.md) - `brew services` and launchd usage\n- [docs/openai-api-compatibility.md](docs/openai-api-compatibility.md) - `/v1/*` support matrix in depth\n- [docs/server-security.md](docs/server-security.md) - origin checks, CORS, tokens, and `--footgun`\n- [docs/context-strategies.md](docs/context-strategies.md) - chat trimming strategies\n- [docs/mcp-calculator.md](docs/mcp-calculator.md) - local and remote MCP usage\n- [docs/tool-calling-guide.md](docs/tool-calling-guide.md) - detailed tool-calling behavior\n- [docs/integrations.md](docs/integrations.md) - third-party tool integrations (opencode, etc.)\n- [docs/local-setup-with-vs-code.md](docs/local-setup-with-vs-code.md) - local review with apfel + a second edit/apply model in VS Code\n- [docs/demos.md](docs/demos.md) - longer walkthroughs of the shell demos\n- [docs/EXAMPLES.md](docs/EXAMPLES.md) - 50+ real prompts with unedited output\n\n## Architecture\n\n```text\nCLI (single/stream/chat) ──┐\n                           ├─→ FoundationModels.SystemLanguageModel\nHTTP Server (/v1/*) ───────┘   (100% on-device, zero network)\n                                ContextManager → Transcript API\n                                SchemaConverter → native ToolDefinitions\n                                TokenCounter → real token counts (SDK 26.4)\n```\n\nSwift 6.3 strict concurrency. Three targets: `ApfelCore` (pure logic, unit-testable), `apfel` (CLI + server), and `apfel-tests` (pure Swift runner, no XCTest).\n\n## Build & Test\n\n```bash\nmake install                             # build release + install to /usr/local/bin\nmake build                               # build release only\nmake version                             # print current version\nmake release-minor                       # bump minor: 0.6.x -> 0.7.0\nswift build                              # quick debug build (no version bump)\nswift run apfel-tests                    # unit tests\npython3 -m pytest Tests/integration/ -v  # integration tests\napfel --benchmark -o json                # performance report\n```\n\n`.version` is the single source of truth. Only `make release` (via CI) bumps versions. Local builds do not change the version.\n\n## The apfel tree\n\nEverything that grows out of apfel. Each project ships as its own repo, its own landing page, and its own Homebrew formula or cask.\n\n### Trunk\n\n- **apfel** - on-device Apple FoundationModels CLI and OpenAI-compatible server. The root of the tree; every other project uses it for inference.\n  - Site: [https://apfel.franzai.com](https://apfel.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfel](https://github.com/Arthur-Ficial/apfel)\n  - Install: `brew install apfel`\n\n### Apps\n\n- **apfel-chat** - multi-conversation macOS chat client. Streaming markdown, speech I/O, image analysis via Apple Vision. Runs 100% on-device.\n  - Site: [https://apfel-chat.franzai.com](https://apfel-chat.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfel-chat](https://github.com/Arthur-Ficial/apfel-chat)\n  - Install: `brew install Arthur-Ficial/tap/apfel-chat`\n\n- **apfel-clip** - AI clipboard actions from the macOS menu bar. Summarize, translate, rewrite, and reshape whatever you just copied, without leaving the keyboard.\n  - Site: [https://apfel-clip.franzai.com](https://apfel-clip.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfel-clip](https://github.com/Arthur-Ficial/apfel-clip)\n  - Install: `brew install Arthur-Ficial/tap/apfel-clip`\n\n- **apfel-quick** - instant AI overlay for macOS. Press a key, ask anything, get an on-device answer - then dismiss.\n  - Site: [https://apfel-quick.franzai.com](https://apfel-quick.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfel-quick](https://github.com/Arthur-Ficial/apfel-quick)\n  - Install: `brew install Arthur-Ficial/tap/apfel-quick`\n\n- **apfelpad** - a formula notepad for thinking. On-device AI as a first-class function you can call inline from cells, the way a spreadsheet treats `SUM`.\n  - Site: [https://apfelpad.franzai.com](https://apfelpad.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfelpad](https://github.com/Arthur-Ficial/apfelpad)\n  - Install: `brew install Arthur-Ficial/tap/apfelpad`\n\n### Extensions\n\n- **apfel-mcp** - three token-budget-optimized MCP servers for apfel's 4096-token context window: `url-fetch` (Readability article extraction with SSRF guards), `ddg-search` (DuckDuckGo web search, no API key), and the flagship compound `search-and-fetch` tool. Open for contributions of more apfel-optimized MCPs.\n  - Site: [https://apfel-mcp.franzai.com](https://apfel-mcp.franzai.com)\n  - Repo: [https://github.com/Arthur-Ficial/apfel-mcp](https://github.com/Arthur-Ficial/apfel-mcp)\n  - Install: `brew install Arthur-Ficial/tap/apfel-mcp`\n\n- **apfel-gui** - native SwiftUI debug inspector for apfel with request timeline, MCP protocol viewer, chat, and TTS/STT. Built for developers who want to watch exactly what apfel sends to the model.\n  - Repo: [https://github.com/Arthur-Ficial/apfel-gui](https://github.com/Arthur-Ficial/apfel-gui)\n  - Install: `brew install Arthur-Ficial/tap/apfel-gui`\n\n## Community Projects\n\nBuilt something on top of apfel? Open an issue and it can be added here.\n\n| Project | What it does | Links |\n|---------|-------------|-------|\n| **apfelclaw** by [@julianYaman](https://github.com/julianYaman) | Local AI agent that reads files, calendar, mail, and Mac status via read-only tools | [github](https://github.com/julianyaman/apfelclaw) - [site](https://apfelclaw.yamanlabs.com/) |\n| **fruit-chat** by [@bhaskarvilles](https://github.com/bhaskarvilles) | Browser-based chat UI that talks to `apfel --serve` over the OpenAI-compatible API | [github](https://github.com/bhaskarvilles/fruit-chat) |\n| **local-claude** by [@lucaspwo](https://github.com/lucaspwo) | Claude Code wrapper that swaps in apfel as a local backend via a small Anthropic-OpenAI proxy | [github](https://github.com/lucaspwo/local-claude) |\n| **apfeller** by [@hasit](https://github.com/hasit) | App manager for local shell apps built around apfel | [github](https://github.com/hasit/apfeller) - [site](https://hasit.github.io/apfeller/) - [catalog](https://hasit.github.io/apfeller/catalog/) |\n\n## Contributing\n\nBug reports, feature ideas, pull requests, and new community projects all welcome. Open an issue or a PR on the relevant repo.\n\n**#agentswelcome** - AI agent contributions are welcome across the entire apfel tree - apfel itself and every `Arthur-Ficial/apfel-*` repo. Claude Code, Codex, Cursor, Aider, any autonomous coding agent: if you can read the repo's `CLAUDE.md`, run the tests, and open a pull request, you can contribute. Credit your tool in the commit trailer (e.g. `Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>`), include a passing test suite, and submit. Humans and agents are reviewed on the same bar: clean code, passing tests, honesty about limits.\n\nThe most agent-friendly entry point is [apfel-mcp](https://github.com/Arthur-Ficial/apfel-mcp) - its contribution rules and idea list at [apfel-mcp.franzai.com/#contribute](https://apfel-mcp.franzai.com/#contribute) are written to be unambiguous enough for an agent to follow without human translation.\n\n## License\n\n[MIT](LICENSE)\n","summary":"apfel unlocks the Apple Intelligence language model that ships on every Apple Silicon Mac, letting users interact with it directly from the Terminal, through a local OpenAI‑compatible server, or via an interactive chat—all without an API key or cloud download. It offers pipe‑friendly command‑line calls, file attachment support, streaming responses, JSON output, and a 4096‑token context window, while also providing a drop‑in local endpoint at `http://localhost:11434/v1` for any OpenAI SDK. The tool keeps all inference on‑device, ensuring privacy and zero‑network latency. Developers, data‑centric teams, and privacy‑focused macOS users who need reliable, offline AI for coding, debugging, document summarisation, or conversational assistance will find apfel particularly useful.","description":"The free AI already on your Mac. CLI tool, OpenAI-compatible server, and interactive chat — all on-device via Apple Intelligence. No API keys, no cloud, no downloads.","stars":4769,"language":"Swift"},{"owner":"Railly","repo":"agentfiles","url":"https://github.com/Railly/agentfiles","readme":"# Agentfiles\n\nAI skills manager for Obsidian. Browse, create, and manage skills across Claude Code, Cursor, Codex, Windsurf, and 10+ coding agents.\n\n![Browse skills, commands, and agents across 13+ coding assistants](assets/browse.jpeg)\n\n![Dashboard with burn rate, context tax, and health metrics](assets/dashboard.jpeg)\n\n## Install\n\n### From Obsidian (coming soon)\n\nSearch **Agentfiles** in Settings > Community plugins.\n\n### Manual\n\n1. Download `main.js`, `manifest.json`, and `styles.css` from the [latest release](https://github.com/Railly/agentfiles/releases/latest)\n2. Create `<vault>/.obsidian/plugins/agentfiles/`\n3. Copy the three files into that folder\n4. Enable in Settings > Community plugins\n\n### Optional: skillkit analytics\n\n```bash\nnpm i -g @crafter/skillkit\nskillkit scan\n```\n\n## What it does\n\n- **Browse** skills, commands, and agents from 13+ tools in one place\n- **Search** by name or file content with deep search toggle\n- **Create** new skills with a stepped wizard (pick tool, type, name)\n- **Edit** skills inline with markdown preview and Cmd+S save\n- **Marketplace** — install skills from [skills.sh](https://skills.sh)\n- **Conversations** — browse Claude Code session history, search, tag, and export to vault\n- **Dashboard** — usage analytics, burn rate, context tax, health metrics (requires [skillkit](https://www.npmjs.com/package/@crafter/skillkit))\n\n## Supported tools\n\n| Tool | Skills | Commands | Agents |\n|------|--------|----------|--------|\n| Claude Code | `~/.claude/skills/` | `~/.claude/commands/` | `~/.claude/agents/` |\n| Cursor | `~/.cursor/skills/` | | `~/.cursor/agents/` |\n| Codex | `~/.codex/skills/` | `~/.codex/prompts/` | `~/.codex/agents/` |\n| Windsurf | `~/.codeium/windsurf/memories/` | | |\n| Copilot | `~/.copilot/skills/` | | |\n| Amp | `~/.config/amp/skills/` | | |\n| OpenCode | `~/.config/opencode/skills/` | | |\n| Global | `~/.agents/skills/` | | |\n\nDesktop only (macOS, Windows, Linux) — reads files outside your vault.\n\n## License\n\nMIT\n","summary":"Agentfiles is an Obsidian plugin that centralises management of AI “skills” across more than a dozen coding assistants such as Claude Code, Cursor, Codex, and Windsurf. It lets users browse, create, edit, and import skills, search by name or content, and view usage analytics through a dashboard that tracks burn‑rate, context tax, and health metrics. The plugin also links session histories and provides a wizard for building new skills inside the editor. Developers and power‑users who rely on multiple AI tools for coding or content creation will find it useful for organising and fine‑tuning their AI workflows.","description":"Browse, create, and edit AI agent files across Claude Code, Cursor, Codex, and 13+ tools — from Obsidian.","stars":525,"language":"TypeScript"},{"owner":"0xGF","repo":"boneyard","url":"https://github.com/0xGF/boneyard","readme":"<p align=\"center\">\n  <img src=\"boneyard-logo.gif\" alt=\"Boneyard\" width=\"1000\" />\n</p>\n\n# boneyard\n\nPixel-perfect skeleton loading screens, extracted from your real UI. No manual measurement, no hand-tuned placeholders.\n\nWorks with **React**, **Preact**, **Vue**, **Svelte 5**, **Angular**, and **React Native**.\n\n## Quick start\n\n```bash\nnpm install boneyard-js\n```\n\n### React\n\n```tsx\nimport { Skeleton } from 'boneyard-js/react'\n\nfunction BlogPage() {\n  const { data, isLoading } = useFetch('/api/post')\n  return (\n    <Skeleton name=\"blog-card\" loading={isLoading}>\n      {data && <BlogCard data={data} />}\n    </Skeleton>\n  )\n}\n```\n\n### Vue\n\n```vue\n<script setup>\nimport Skeleton from 'boneyard-js/vue'\nimport './bones/registry'\nconst loading = ref(true)\n<\/script>\n\n<template>\n  <Skeleton name=\"card\" :loading=\"loading\">\n    <Card />\n  </Skeleton>\n</template>\n```\n\n### Svelte 5\n\n```svelte\n<script>\n  import Skeleton from 'boneyard-js/svelte'\n  import '$lib/bones/registry'\n  let loading = true\n<\/script>\n\n<Skeleton name=\"card\" {loading}>\n  <Card />\n</Skeleton>\n```\n\n### Preact\n\n```tsx\nimport { Skeleton } from 'boneyard-js/preact'\n\nfunction BlogPage() {\n  const { data, isLoading } = useFetch('/api/post')\n  return (\n    <Skeleton name=\"blog-card\" loading={isLoading}>\n      {data && <BlogCard data={data} />}\n    </Skeleton>\n  )\n}\n```\n\n### Angular\n\n```typescript\nimport { SkeletonComponent } from 'boneyard-js/angular'\n\n@Component({\n  imports: [SkeletonComponent],\n  template: `\n    <boneyard-skeleton name=\"card\" [loading]=\"isLoading\">\n      <app-card />\n    </boneyard-skeleton>\n  `\n})\n```\n\n### React Native\n\n```tsx\nimport { Skeleton } from 'boneyard-js/native'\n\n<Skeleton name=\"profile-card\" loading={isLoading}>\n  <ProfileCard />\n</Skeleton>\n```\n\n```bash\nnpx boneyard-js build --native --out ./bones\n# Open your app on device — bones capture automatically\n```\n\n> **Dynamic Type:** Generate bones at default font scale. Boneyard automatically scales bone positions at runtime to match the user's text size setting.\n\n## Generate bones\n\n```bash\n# CLI — works with any framework\nnpx boneyard-js build\n\n# Watch mode — re-captures on HMR changes\nnpx boneyard-js build --watch\n\n# React Native — scans from device\nnpx boneyard-js build --native\n```\n\nThen import the registry once in your app entry:\n\n```ts\nimport './bones/registry'\n```\n\n### Vite plugin\n\nFor Vite-based projects (React, Preact, Vue, Svelte), use the plugin instead of the CLI — no second terminal needed:\n\n```ts\n// vite.config.ts\nimport { boneyardPlugin } from 'boneyard-js/vite'\n\nexport default defineConfig({\n  plugins: [boneyardPlugin()]\n})\n```\n\nBones are captured automatically when the dev server starts and re-captured on every HMR update.\n\n## How it works\n\n**Web:** The CLI (or Vite plugin) opens a headless browser, visits your app, finds every `<Skeleton name=\"...\">`, and snapshots their layout at multiple breakpoints.\n\n**React Native:** The `<Skeleton>` component auto-scans in dev mode when the CLI is running. It walks the fiber tree, measures views via `UIManager`, and sends bone data to the CLI. Zero overhead in production.\n\nAll frameworks output the same `.bones.json` format — cross-platform compatible.\n\n## CLI flags\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `[url]` | auto-detected | URL to visit |\n| `--breakpoints` | 375,768,1280 | Viewport widths, comma-separated |\n| `--wait` | 800 | ms to wait after page load |\n| `--out` | ./src/bones | Output directory |\n| `--force` | — | Skip incremental cache |\n| `--watch` | — | Re-capture on HMR changes |\n| `--native` | — | React Native device scanning |\n| `--no-scan` | — | Skip filesystem route scanning |\n| `--cdp` | — | Connect to existing Chrome via debug port |\n| `--env-file` | — | Load env vars from file |\n\n## Props\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `loading` | boolean | — | Show skeleton or real content |\n| `name` | string | — | Unique name (generates `name.bones.json`) |\n| `color` | string | `rgba(0,0,0,0.08)` | Bone fill color |\n| `darkColor` | string | `rgba(255,255,255,0.06)` | Bone color in dark mode |\n| `animate` | `'pulse'` \\| `'shimmer'` \\| `'solid'` | `'pulse'` | Animation style |\n| `stagger` | `number` \\| `boolean` | `false` | Stagger delay between bones in ms (`true` = 80ms) |\n| `transition` | `number` \\| `boolean` | `false` | Fade out duration when loading ends (`true` = 300ms) |\n| `boneClass` | string | — | CSS class applied to each bone element |\n| `fixture` | ReactNode / Snippet / Slot | — | Mock content for CLI capture (dev only) |\n| `initialBones` | ResponsiveBones | — | Pass bones directly (overrides registry) |\n| `fallback` | ReactNode / Snippet / Slot | — | Shown when loading but no bones available |\n\n## Config file\n\n```json\n{\n  \"breakpoints\": [375, 768, 1280],\n  \"out\": \"./src/bones\",\n  \"wait\": 800,\n  \"color\": \"#e5e5e5\",\n  \"animate\": \"pulse\"\n}\n```\n\nSave as `boneyard.config.json`. Per-component props override config values.\n\n## Package exports\n\n| Import | Use |\n|--------|-----|\n| `boneyard-js` | `snapshotBones`, `renderBones`, `computeLayout` |\n| `boneyard-js/react` | React `<Skeleton>` |\n| `boneyard-js/preact` | Preact `<Skeleton>` (no compat needed) |\n| `boneyard-js/vue` | Vue `<Skeleton>` |\n| `boneyard-js/svelte` | Svelte `<Skeleton>` |\n| `boneyard-js/angular` | Angular `<boneyard-skeleton>` |\n| `boneyard-js/native` | React Native `<Skeleton>` |\n| `boneyard-js/vite` | Vite plugin `boneyardPlugin()` |\n\n## Links\n\n- [Docs](https://boneyard.vercel.app/overview)\n- [npm](https://www.npmjs.com/package/boneyard-js)\n- [Twitter](https://x.com/0xGoodfuture/status/2039818750568878245)\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=0xGF/boneyard&type=Date)](https://star-history.com/#0xGF/boneyard&Date)\n\n## License\n\nMIT\n","summary":"Boneyard generates pixel‑perfect skeleton screens directly from your existing UI by capturing the layout of `<Skeleton>` components and outputting reusable bone data. It supports React, Preact, Vue, Svelte 5, Angular, and React Native, with CLI, Vite plugin, and watch mode for automatic re‑capturing during development, and includes dynamic type scaling for accessibility. Developers can simply wrap content in a `<Skeleton>` component, enable the loader flag, and let Boneyard render the placeholder while data loads, with zero runtime overhead in production. This tool is ideal for front‑end teams building fast, visually consistent loading experiences across multiple frameworks.","description":"Auto generated skeleton loading framework","stars":5036,"language":"TypeScript"},{"owner":"badlogic","repo":"jot","url":"https://github.com/badlogic/jot","readme":"# jot\n\nhttps://github.com/user-attachments/assets/542c333c-c26e-4f04-a5bb-2cf4131e60f3\n\nMinimal self-hosted collaborative markdown editor with inline comment threads. Built for humans and agents.\n\n## Quick Start\n\n```bash\nnpm install -g @mariozechner/jot\njot serve\n```\n\nOpen `http://localhost:3210`. Set the owner password on first visit.\n\n## Features\n\n- Collaborative real-time editing (multiple tabs, multiple users)\n- Remote cursors with names\n- Inline comment threads anchored to text selections\n- Threaded replies, resolve/reopen\n- Share notes with configurable access (view, comment, edit)\n- CLI for humans and agents (owner API keys or share links)\n- Agent setup modal with copy-paste instructions\n- Dark and light theme\n- Mobile support\n- `.md` files on disk (derived from collaborative state)\n\n## Server\n\n```bash\nnpm install -g @mariozechner/jot\njot serve                    # port 3210, data in ./data\njot serve --port=8080        # custom port\njot serve --data=/var/jot    # custom data dir\n```\n\n## Docker\n\n```bash\ncd docker\nbash control.sh start\n```\n\n## Sharing\n\nClick the share icon in the editor to configure access:\n\n- **Not shared** (default)\n- **View only**: read-only preview\n- **View & comment**: preview with comment threads\n- **Edit & comment**: full collaborative editor with comments\n\nEach note has a stable share URL (`/s/<id>`). Anyone with the link gets the configured level of access, both in the browser and via the CLI. Toggle access without changing the link.\n\n## CLI\n\nThe CLI works in two modes depending on how you register.\n\n### Owner mode\n\nThe instance owner creates API keys from the settings gear on the landing page. An API key grants full access to all notes.\n\n```bash\njot register myserver https://jot.example.com <api-key>\njot myserver list\njot myserver search \"query\"\njot myserver read <note-id>\njot myserver create \"My note\"\njot myserver edit <note-id> '[{\"oldText\":\"foo\",\"newText\":\"bar\"}]'\njot myserver comment <note-id> \"quoted text\" \"comment body\"\njot myserver reply <note-id> <thread-id> <message-id> \"reply\"\njot myserver resolve <note-id> <thread-id>\njot myserver reopen <note-id> <thread-id>\njot myserver edit-comment <note-id> <message-id> \"new body\"\njot myserver delete-comment <note-id> <message-id>\njot myserver delete-thread <note-id> <thread-id>\njot myserver update <note-id> title \"New title\"\njot myserver delete <note-id>\n```\n\n### Shared mode\n\nAnyone with a share link can use it to register. No API key needed. The link itself is the credential, and access depends on what the owner configured (view, comment, or edit). This works for both humans and their agents. Humans can use the link in the browser for better UX.\n\n```bash\njot register shared https://jot.example.com/s/abc123\njot shared read\njot shared edit '[{\"oldText\":\"foo\",\"newText\":\"bar\"}]'\njot shared comment \"quoted text\" \"comment body\" --name=\"My Agent\"\njot shared reply <thread-id> <message-id> \"reply\" --name=\"My Agent\"\n```\n\n### Agent integration\n\nClick the robot icon in the editor or on a shared note to get copy-paste CLI instructions. The instructions are pre-filled with the instance URL and note ID. Hand them to your agent and it can read, edit, and comment on the note.\n\n## Data\n\n```\ndata/\n  auth.json\n  notes/\n    <id>.md\n    <id>.json\n```\n\nThe `.md` files are derived from the collaborative editing state stored in the `.json` sidecar. The JSON is the source of truth. The markdown files are written for convenience (grep, backup, external tooling).\n\n## HTTP API\n\nAll owner endpoints require `Authorization: Bearer <api-key>`.\n\n| Method | Endpoint                              | Description                         |\n| ------ | ------------------------------------- | ----------------------------------- |\n| GET    | `/api/notes?q=<query>`                | List/search notes                   |\n| POST   | `/api/notes`                          | Create note                         |\n| GET    | `/api/notes/:id`                      | Read note                           |\n| PUT    | `/api/notes/:id`                      | Update title, markdown, shareAccess |\n| DELETE | `/api/notes/:id`                      | Delete note                         |\n| POST   | `/api/notes/:id/edit`                 | Apply text edits                    |\n| POST   | `/api/notes/:id/threads`              | Create comment thread               |\n| POST   | `/api/notes/:id/threads/:tid/replies` | Reply to thread                     |\n| PATCH  | `/api/notes/:id/threads/:tid`         | Resolve/reopen thread               |\n| DELETE | `/api/notes/:id/threads/:tid`         | Delete thread                       |\n| PATCH  | `/api/notes/:id/messages/:mid`        | Edit comment                        |\n| DELETE | `/api/notes/:id/messages/:mid`        | Delete comment                      |\n| GET    | `/api/keys`                           | List API keys                       |\n| POST   | `/api/keys`                           | Create API key                      |\n| DELETE | `/api/keys/:id`                       | Delete API key                      |\n\nShare endpoints (no auth, access controlled by `shareAccess`):\n\n| Method | Endpoint                               | Description                    |\n| ------ | -------------------------------------- | ------------------------------ |\n| GET    | `/api/share/:sid`                      | Read shared note               |\n| GET    | `/api/share/:sid/note`                 | Read shared note (lightweight) |\n| POST   | `/api/share/:sid/edit`                 | Edit (requires edit access)    |\n| POST   | `/api/share/:sid/threads`              | Create comment                 |\n| POST   | `/api/share/:sid/threads/:tid/replies` | Reply                          |\n| POST   | `/api/share/:sid/render`               | Render markdown to HTML        |\n\n## License\n\nMIT\n","summary":"jot is a self‑hosted collaborative Markdown editor that lets multiple users edit the same document in real time while leaving threaded inline comments anchored to text selections. It offers remote cursors, configurable access levels (view, comment, edit), a CLI for both humans and agents, and automatically persists notes as Markdown files on disk for offline use. The editor supports dark/light themes, mobile browsers, and Docker deployment, making it easy to run locally or in a containerized environment. Developers, teams, and AI agents looking for a lightweight, privacy‑focused alternative to cloud‑based note‑taking tools will benefit from jot’s simple setup and rich collaboration features.","description":"Minimal self-hosted markdown editor with inline comment threads","stars":283,"language":"JavaScript"},{"owner":"m0at","repo":"rvllm","url":"https://github.com/m0at/rvllm","readme":"# rvLLM\n\nLLM inference engine. Rust+CUDA on GPU, JAX+XLA on TPU.\n\nThree Gemma 4 models on TPU v6e-4: **E4B** (16,794 tok/s peak, 78.3 tok/s B=1, PPL 5.87), **26B-A4B MoE** (14,899 tok/s peak), **31B** (9,600 tok/s peak, 128K context). GPU: 31B on H100 at **8,786 tok/s** (FP8, CUDA graph, PPL 14.75). Zero custom kernels on TPU -- ~500 lines of JAX. Native Rust binary on GPU -- zero Python in the serving path.\n\n**[Full benchmarks](https://docs.solidsf.com/docs/bench.html)**\n\n## At a glance\n\n| | E4B (4B) | 26B-A4B (MoE) | 31B TPU | 31B GPU | vLLM H100 |\n|---|---|---|---|---|---|\n| **B=1 tok/s** | **78.3** | 52.9 | 44.2 | 53 | 66.9 |\n| **Peak tok/s** | **16,794** | 14,899 | 9,600 | 8,786 | 3,848 |\n| **PPL** | **5.87** | 90.21 | 24.76 | 14.75 | - |\n| **Cached TTFT** | **25.9 ms** | 35.3 ms | 73.3 ms | 63 ms | - |\n| **Peak tok/s/$** | **3,230** | 2,865 | 1,846 | 4,576 | 2,004 |\n\nTPU: v6e-4, $5.20/hr, int8, max-ctx 2048. GPU: H100 SXM, $1.92/hr, FP8. All measured.\n\n## TPU: Gemma 4 on v6e-4\n\nPure JAX + XLA. No custom kernels. XLA compiles the entire forward pass to TPU machine code from a ~500 line JAX script. Three models, one codebase.\n\n### Models supported\n\n| Property | E4B (4B) | 26B-A4B (MoE) | 31B |\n|---|---|---|---|\n| Total / active params | ~4B / 4B | 26B / ~4B | 31B / 31B |\n| Layers | 42 | 30 | 60 |\n| Hidden size | 2,560 | 2,816 | 5,376 |\n| Q / KV heads (sliding) | 8 / 2 | 16 / 8 | 32 / 16 |\n| Q / KV heads (global) | 8 / 2 | 16 / 2 (V=K) | 32 / 4 (V=K) |\n| Head dim (sliding / global) | 256 / 512 | 256 / 512 | 256 / 512 |\n| Sliding window | 512 | 1,024 | 1,024 |\n| MoE | none | 128 experts, top-8 | none |\n| KV-shared layers | 18 (of 42) | 0 | 0 |\n| Per-layer input injection | 256-d gated (5.6 GB embed) | none | none |\n\n### Batch scaling (max-ctx 2048)\n\n| Batch | E4B tok/s | 26B-A4B tok/s | 31B tok/s | vLLM H100 |\n|---|---|---|---|---|\n| 1 | 78 | 53 | 44 | 66.9 |\n| 8 | 542 | 390 | 318 | 515 |\n| 64 | 3,661 | 2,662 | 2,112 | 2,794 |\n| 128 | 6,298 | 4,915 | 3,853 | 3,848 |\n| 256 | 10,214 | 8,192 | 6,246 | 3,709 |\n| 512 | 13,773 | 12,390 | 8,550 | 3,788 |\n| **768** | **15,514** | **14,899** | **9,600** | 3,671 |\n| **1024** | **16,794** | - | - | - |\n\n### 31B context scaling (B=1)\n\n| Context | ms/step | tok/s | Architecture | KV type |\n|---|---|---|---|---|\n| 512 | 12.79 | 78.2 | Single-scan, 60-layer scan + cond | bf16 |\n| 2,048 | 22.6 | 44.2 | Single-scan | bf16 |\n| 32K | ~66 | ~15 | Single-scan | bf16 |\n| 64K | ~91 | ~11 | Split-cache, 10 groups x 6 | int8 |\n| 128K | 40.56 | 24.7 | Split-cache + blockwise global | int8 |\n\nDual-path architecture auto-switches at the 32K boundary.\n\n### TPU deployment\n\n```bash\n# Create TPU v6e-4 ($5.20/hr)\ngcloud compute tpus tpu-vm create rvllm-gemma4 \\\n  --zone=us-east5-b --accelerator-type=v6e-4 --version=v2-alpha-tpuv6e \\\n  --boot-disk-size=200\n\n# Install (30 seconds)\npip3 install 'jax[tpu]' huggingface_hub tokenizers \\\n  -f https://storage.googleapis.com/jax-releases/libtpu_releases.html\n\n# Download model\nhuggingface-cli download google/gemma-4-E4B-it --local-dir ~/models/gemma-4-E4B-it\n\n# Run E4B (78.3 tok/s B=1)\npython3 tpu/harness/gemma4_tpu_infer.py \\\n  --model-dir ~/models/gemma-4-E4B-it --max-tokens 200 --max-ctx 2048\n\n# Run 31B batched (9,600 tok/s B=768)\nLIBTPU_INIT_ARGS=\"--xla_tpu_enable_async_collective_fusion=true \\\n  --xla_tpu_enable_async_collective_fusion_fuse_all_gather=true \\\n  --xla_tpu_enable_async_collective_fusion_multiple_steps=true \\\n  --xla_tpu_overlap_compute_collective_tc=true \\\n  --xla_tpu_scoped_vmem_limit_kib=131072\" \\\npython3 tpu/harness/gemma4_tpu_infer.py \\\n  --model-dir ~/models/gemma-4-31B-it --fused --max-tokens 200 --max-ctx 2048 --batch 768\n\n# 128K context (24.7 tok/s)\npython3 tpu/harness/gemma4_tpu_infer.py \\\n  --model-dir ~/models/gemma-4-31B-it --fused --max-tokens 200 --max-ctx 131072\n\n# API server (OpenAI-compatible)\npython3 tpu/harness/api_server.py --model-dir ~/models/gemma-4-31B-it --port 8080\n\n# Perplexity\npython3 tpu/harness/gemma4_tpu_infer.py \\\n  --model-dir ~/models/gemma-4-31B-it --perplexity --max-ctx 2048\n```\n\nNo Docker. No conda. No torch. No vLLM. One pip install, one Python file, one command.\n\n\n## EAGLE-3 Speculative Decoding (TPU, experimental)\n\n450M-param draft head proposes K=5 tokens per cycle; the full 31B verifies K+1=6 in one forward pass. Lossless for greedy decode.\n\n| Metric | Value |\n|---|---|\n| Baseline (B=1, 512 ctx) | 78.2 tok/s, 12.79 ms/step |\n| EAGLE-3 fused cycle | 31.0 ms/cycle |\n| Projected @ tau=3.5 | ~145 tok/s (1.8x) |\n| Hardware ceiling | ~300 tok/s (3.8x) |\n\nRequires 50K+ training examples for production tau. Current: 2K examples, loss 7.1, pipeline validated end-to-end. See [`tpu/harness/EAGLE3_SPEC.md`](tpu/harness/EAGLE3_SPEC.md).\n\n\n## GPU: 31B Gemma 4 on H100\n\nRust + CUDA on H100 SXM 80GB. FP8 weights with per-channel scales + CUTLASS channelscale epilogue, F16 KV cache, F16 paged attention (FA3 SM90). All 60 layers captured in a single CUDA graph (~935 nodes). **8,786 tok/s** peak (B=512), **PPL 14.75**, **TTFT 63 ms**.\n\n### GPU batch scaling\n\n| Batch | tok/s | ms/step | Scaling |\n|---|---|---|---|\n| 1 | 53 | 18.7 | 1.0x |\n| 8 | 434 | 18.4 | 8.2x |\n| 32 | 1,743 | 18.4 | 32.9x |\n| 64 | 3,265 | 19.6 | 61.6x |\n| 128 | 5,802 | 22.1 | 109.5x |\n| 256 | 7,808 | 32.8 | 147.3x |\n| **512** | **8,786** | 58.3 | **165.8x** |\n\n### rvLLM vs vLLM on H100 (measured)\n\n| Batch | rvLLM tok/s | vLLM tok/s | Delta |\n|---|---|---|---|\n| 1 | 53 | 69 | -23% |\n| 32 | 1,743 | 1,748 | ~0% |\n| 64 | **3,265** | 3,130 | +4% |\n| **128** | **5,802** | 4,689 | **+24%** |\n| 256 | **7,808** | 7,077 | +10% |\n| 512 | **8,786** | 8,243 | +7% |\n\nrvLLM overtakes vLLM at B=64 and leads by 24% at B=128.\n\n### GPU perplexity\n\n| Weight path | KV cache | PPL | tok/s (B=1) |\n|---|---|---|---|\n| **FP8-Dynamic + CUTLASS channelscale epilogue** | F16 | **14.75** | 53 |\n| BF16 split QKV per-tensor FP8 | F16 | 17.96 | 37.9 |\n| F16 weights (no FP8) | F16 | 19.79 | 37.9 |\n| HuggingFace BF16 reference | -- | 19.62 | -- |\n\n### Gemma 4 forward pass (14 launches per layer)\n\n```\nFor each layer in 0..60:\n  1.  fused_rmsnorm_fp8_quant           input layernorm + FP8 quantize\n  2.  cutlass_fp8_gemm_channelscale     fused Q||K||V + channelscale epilogue\n  3.  fused_qkv_rmsnorm                 Q/K norm (learned) + V norm (parameter-free)\n  4.  fused_rope_partial_f16kv          partial RoPE + F16 KV cache write\n  5.  paged_decode (FA3 SM90)           attention (head_dim=256 sliding, 512 global)\n  6.  quantize_fp8_per_token            attn output to FP8\n  7.  fp8_gemm                          O projection\n  8.  fused_norm_add_residual           channelscale + rmsnorm + residual add\n  9.  fused_rmsnorm_fp8_quant           pre-FFN layernorm + FP8 quantize\n  10. cutlass_fp8_gemm_channelscale     fused gate||up + channelscale epilogue\n  11. fused_gelu_mul_fp8_quant          GELU(tanh)(gate) * up to FP8\n  12. fp8_gemm                          down projection\n  13. fused_norm_add_residual           channelscale + rmsnorm + residual + layer_scalar\n\nSampling tail:\n  fused_rmsnorm                       final layernorm\n  f16_gemm_f32                        lm_head\n  logit_softcap                       30 * tanh(logits / 30)\n  argmax_kernel                       token selection\n```\n\n### Kernel fusion summary\n\nFour rounds of fusion + custom CUTLASS epilogue reduced graph nodes from 1776 to ~935 (47% reduction):\n\n| Fusion | Kernels eliminated | Nodes saved |\n|---|---|---|\n| f32_to_bf16 + rmsnorm + vector_add -> fused_norm_add_residual | 3 -> 1 (x2/layer) | 240 |\n| scale_cols_f32 fused into norm+add kernel (O-proj, down) | 1 -> 0 (x2/layer) | 120 |\n| residual_scale_f16 fused into post-ff norm+add | 1 -> 0 (x1/layer) | 60 |\n| vnorm_f16 fused into qk_rmsnorm -> fused_qkv_rmsnorm | 2 -> 1 (x1/layer) | 60 |\n| CUTLASS channelscale epilogue (QKV, gate_up) | 3 -> 1 (x2/layer) | 240+ |\n\nThe CUTLASS channelscale kernel uses a custom SM90 EVT epilogue that applies per-token activation scale (ColBroadcast) and per-channel weight scale (RowBroadcast) directly in the GEMM epilogue while the accumulator is still F32, then casts to F16.\n\n**Help wanted:** The current CUTLASS kernel uses a 128x128x128 tile which is suboptimal for low-batch decode (M <= 16). A smaller tile variant (e.g. 64x64x128) would improve B=1-8 throughput. PRs welcome for additional tile shapes with autotune selection.\n\n### GPU build and run\n\n```bash\n# One-time on H100 box (~15 min)\nbash kernels/build.sh               # fused PTX\nbash kernels/build_cutlass_so.sh    # libcutlass_kernels.so\nbash kernels/build_fa3.sh           # libfa3_kernels.so\n\n# Build\ncargo build --release --features cuda --manifest-path v3/Cargo.toml -p rvllm-bench\n\n# Run\nRVLLM_MODEL_DIR=/workspace/models/gemma-4-31B-it \\\nRVLLM_KERNELS_DIR=/workspace/rvllm/kernels/sm_90 \\\nRVLLM_CUTLASS_SO=/workspace/rvllm/kernels/sm_90/libcutlass_kernels.so \\\nRVLLM_FA3_SO=/workspace/rvllm/kernels/sm_90/libfa3_kernels.so \\\nRVLLM_POLICY=/workspace/rvllm/kernels/sm_90/policy.json \\\nRVLLM_BATCH=128 RVLLM_ITERS=30 RVLLM_WARMUP=5 \\\n  ./v3/target/release/rvllm-bench\n```\n\n### Kernels\n\nEvery kernel has a known purpose, a pinned variant, and a workspace contract. No dispatch fallback chains.\n\n| Kernel | Purpose |\n|---|---|\n| `cutlass_fp8_gemm_channelscale` | SM90 FP8 GEMM with EVT channelscale epilogue (QKV, gate_up) |\n| `fused_rmsnorm_fp8_quant` | layernorm + FP8 quantize in one launch |\n| `fused_qkv_rmsnorm` | per-head RMSNorm on Q, K (learned) and V (parameter-free) |\n| `fused_rope_partial_f16kv` | partial RoPE + F16 KV cache write |\n| `fused_gelu_mul_fp8_quant` | GELU(tanh)(gate) * up to FP8 |\n| `fused_norm_add_residual` | channelscale + RMSNorm + residual add (+ optional layer_scalar) |\n| `logit_softcap` | 30 * tanh(logits / 30) |\n| `quantize_fp8_per_token` | activation to FP8 with per-token scale |\n| `argmax` | f32 logits to i32 token |\n\nNo fallbacks. Missing kernel .so = engine refuses to start.\n\n## v3 crate map\n\n```\nv3/crates/\n  rvllm-core         typed errors, IDs, dtype, shape, config, env\n  rvllm-mem          HbmArena, Region, Stream, Event, PinnedBuf, CudaContextHandle\n  rvllm-kernels      manifest (sha-pinned), PTX loader, kernel catalog\n  rvllm-fused        8 fused-kernel launchers + pure-Rust f32 references\n  rvllm-attention    FA3 SM90 paged decode/prefill dlopen\n  rvllm-cutlass      FP8 variant catalog + schedule pairing trait + cuBLASLt wrapper\n  rvllm-metadata     frozen-layout metadata per bucket (one upload path)\n  rvllm-loader       safetensors mmap -> HBM + CPU-path FP8 quant + clamp gate\n  rvllm-sampling     argmax tail, pinned DtoH\n  rvllm-graph        captured-graph pool keyed on MetaLayoutHash\n  rvllm-runtime      Engine, scheduler, layer_exec, bring_up\n  rvllm-bench        RVLLM_* env-driven bench binary\n  rvllm-invariants   DAG-dep test, no-megakernel gate\n```\n\n## Correctness discipline\n\n1. **No fallbacks.** Missing autotune entry = engine panic. Missing .so = refuse start. No silent degradation.\n2. **Graph-capture invariant.** Metadata buffer layout frozen per (bucket, max_blocks_per_seq). Captured graphs bind exact offsets.\n3. **CUTLASS schedule/epilogue pairing.** Mainloop and epilogue schedules must match. Enforced via `static_assert`.\n4. **No `unwrap()` in libraries.** `Result<T, RvllmError>` end-to-end with structured context.\n5. **Real block-change detection.** Scheduler emits block table updates; missing signals = stale KV reads caught at the type level.\n\n## License\n\nApache-2.0.\n\n## Further reading\n\n- [`docs/bench.html`](https://docs.solidsf.com/docs/bench.html) - interactive benchmark results with charts\n- [`v3/GEMMA4_SPEC.md`](v3/GEMMA4_SPEC.md) - 31B Gemma 4 architecture details and weight shapes\n- [`v3/SPEC.md`](v3/SPEC.md), [`v3/IMPL_PLAN.md`](v3/IMPL_PLAN.md) - v3 rewrite plan, 16 agent specs\n- [`tpu/harness/EAGLE3_SPEC.md`](tpu/harness/EAGLE3_SPEC.md) - EAGLE-3 speculative decoding spec\n- [`docs/arch.md`](docs/arch.md) - full crate architecture\n","summary":"rvLLM is a high‑performance inference engine for large language models, written in Rust for CUDA‑powered GPUs and in lightweight JAX for TPU v6e‑4. It runs Gemma‑4 models ranging from 4 B to 31 B parameters with zero‑Python serving code and no custom kernels, delivering tens of thousands of tokens per second (e.g., 16 794 tok/s on 4 B and 9 600 tok/s on 31 B with batch‑size 768) while supporting 128 K‑token contexts and a multi‑expert architecture. Key capabilities include batch‑scalable throughput, split‑cache large‑context handling, and an OpenAI‑compatible API server. The library suits research labs and production engineers who need cost‑effective, ultra‑fast LLM inference on cloud TPUs or NVIDIA H100 GPUs.","description":"rvLLM: High-performance LLM inference in Rust. Drop-in vLLM replacement.","stars":586,"language":"Cuda"},{"owner":"emdash-cms","repo":"emdash","url":"https://github.com/emdash-cms/emdash","readme":"# EmDash\n\nA full-stack TypeScript CMS built on [Astro](https://astro.build/) and [Cloudflare](https://www.cloudflare.com/). EmDash takes the ideas that made WordPress dominant -- extensibility, admin UX, a plugin ecosystem -- and rebuilds them on serverless, type-safe foundations. Plugins run in sandboxed Worker isolates, solving the fundamental security problem with WordPress's plugin architecture.\n\n## Get Started\n\n> [!IMPORTANT]\n> EmDash depends on Dynamic Workers to run secure sandboxed plugins. Dynamic Workers are currently only available on paid accounts. [Upgrade your account](https://www.cloudflare.com/plans/developer-platform/) (starting at $5/mo) or comment out the `worker_loaders` block of your `wrangler.jsonc` configuration file to disable plugins.\n\n```bash\nnpm create emdash@latest\n```\n\nOr deploy directly to your Cloudflare account:\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/emdash-cms/templates/tree/main/blog-cloudflare)\n\nEmDash runs on Cloudflare (D1 + R2 + Workers) or any Node.js server with SQLite. No PHP, no separate hosting tier -- just deploy your Astro site.\n\n## Templates\n\nEmDash ships with three starter templates:\n\n<table>\n<tr>\n<td width=\"33%\" valign=\"top\">\n\n### Blog\n\n<a href=\"assets/templates/blog/latest/\"><img src=\"assets/templates/blog/latest/homepage-light-desktop.jpg\" alt=\"Blog template\" width=\"100%\"></a>\n\nA classic blog with sidebar widgets, search, and RSS.\n\n- Categories & tags\n- Full-text search\n- Comment-ready\n- RSS feed\n- Dark / light mode\n\n</td>\n<td width=\"33%\" valign=\"top\">\n\n### Marketing\n\n<a href=\"assets/templates/marketing/latest/\"><img src=\"assets/templates/marketing/latest/homepage-light-desktop.jpg\" alt=\"Marketing template\" width=\"100%\"></a>\n\nA conversion-focused landing page with pricing and contact form.\n\n- Hero with CTAs\n- Feature grid\n- Pricing cards\n- FAQ and contact form\n- Dark / light mode\n\n</td>\n<td width=\"33%\" valign=\"top\">\n\n### Portfolio\n\n<a href=\"assets/templates/portfolio/latest/\"><img src=\"assets/templates/portfolio/latest/work-light-desktop.jpg\" alt=\"Portfolio template\" width=\"100%\"></a>\n\nA visual portfolio for showcasing creative work.\n\n- Project grid\n- Tag filtering\n- Case study pages\n- RSS feed\n- Dark / light mode\n<br /><br />\n</td>\n</tr>\n</table>\n\n## Why EmDash?\n\n**WordPress was built for a different era.** Running WordPress today means managing PHP alongside JavaScript, layering caches to get acceptable performance, and knowing that [96% of WordPress securi
