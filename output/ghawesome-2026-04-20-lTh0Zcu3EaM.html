erties. The PR didn't merge as-is but directly shaped the design language and theme architecture that shipped in v0.50.0.\n\n**[@zenc-cp](https://github.com/zenc-cp)** — Anti-hallucination guard for ReAct loop (PR #133)\nAdded a streaming token buffer and post-run message scrub to `streaming.py` to detect and strip fake tool execution JSON that weaker models write inline instead of calling tools properly. A three-layer approach: ephemeral anti-hallucination prompt, live token filtering, and session history cleanup. The pattern influenced later streaming.py improvements.\n\n---\n\nWant to contribute? See [ARCHITECTURE.md](ARCHITECTURE.md) for the codebase layout and [TESTING.md](TESTING.md) for how to run the test suite. The best contributions are focused, well-tested, and solve a real problem — exactly what every person on this list did.\n\n## Repo\n\n```\ngit@github.com:nesquena/hermes-webui.git\n```\n","summary":"Hermes Web UI is a lightweight, dark‑themed browser interface that mirrors the full functionality of the Hermes Agent CLI. It delivers a three‑panel layout with session navigation, chat, and a workspace file browser, along with an always‑visible composer footer for model and profile controls and a token‑usage ring, all powered by plain Python and vanilla JavaScript with no build step or bundler required. The UI can be launched with a single command and accessed securely via an SSH tunnel, giving users fast, 1:1 parity with the terminal experience while on a remote server. It is especially useful for developers, system administrators, and teams that run Hermes Agent locally and want an intuitive, no‑frills web front‑end for persistent, context‑aware AI interactions.","description":"Hermes WebUI: The best way to use Hermes Agent from the web or from your phone!","stars":2844,"language":"Python"},{"owner":"cpaczek","repo":"any-buddy","url":"https://github.com/cpaczek/any-buddy","readme":"# Buddy feature was removed from claude code in .97 was a blast building this and thank you to all the contributors and if they every bring it back we will hack it again\n\n<p align=\"center\">\n  <img src=\"assets/header.svg\" alt=\"any-buddy\" width=\"700\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/any-buddy\"><img src=\"https://img.shields.io/npm/v/any-buddy?color=cb3837&label=npm\" alt=\"npm\"></a>\n  <a href=\"https://github.com/cpaczek/any-buddy/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/cpaczek/any-buddy/ci.yml?label=CI\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-WTFPL-brightgreen\" alt=\"License: WTFPL\"></a>\n  <img src=\"https://img.shields.io/node/v/any-buddy\" alt=\"Node version\">\n</p>\n\n<p align=\"center\">\n  Pick any Claude Code companion pet you want. Choose your species, rarity, eyes, hat, and name.\n</p>\n\n---\n\n## Quick Start\n\n```bash\nnpx any-buddy@latest\n```\n\nThat's it. If Bun is installed, you get the full interactive builder with live preview. Otherwise you'll see sequential prompts with a note to install Bun.\n\n<p align=\"center\">\n  <img src=\"assets/builder.png\" alt=\"Interactive Builder\" width=\"700\">\n</p>\n\nThe builder lets you browse species, eyes, rarity, hats, and stats with a live ASCII art preview that updates as you scroll. Navigate with arrow keys, Tab/Enter to advance, Esc to cancel.\n\n## Install\n\n```bash\n# npm (global)\nnpm install -g any-buddy\n\n# or clone\ngit clone https://github.com/cpaczek/any-buddy.git\ncd any-buddy && pnpm install && pnpm link --global\n```\n\n### Requirements\n\n- **Node.js >= 20**\n- **Bun** -- for the interactive builder TUI and correct hash computation (typically already installed with Claude Code). Without Bun, the tool falls back to basic sequential prompts.\n- **Claude Code** -- installed via any standard method\n\n### Platform Support\n\n| Platform | Status | Notes |\n|----------|--------|-------|\n| Linux | Tested | Auto-detects `~/.local/share/claude/versions/` |\n| macOS | Tested | Auto-detects + ad-hoc re-signs after patching |\n| Windows | Tested | Works with npm-based installs (`cli.js`) |\n\n> Set `CLAUDE_BINARY=/path/to/binary` if auto-detection fails.\n\n## Usage\n\n```bash\nany-buddy                    # Start screen — build, browse presets, or switch buddies\n```\n\nThe start screen lets you pick between:\n- **Build your own** — full interactive builder with live ASCII preview\n- **Browse presets** — 23 curated themed builds with animated preview\n- **Saved buddies** — switch between your saved pets (shown when you have saves)\n\nAfter picking your pet, the entire flow stays in the TUI — salt search with progress bar, naming, personality, patching, and hook setup.\n\n```bash\nany-buddy current            # Show your current pet\nany-buddy preview            # Browse without applying\nany-buddy apply              # Re-apply after Claude Code update\nany-buddy restore            # Restore original pet\nany-buddy buddies            # Browse and switch between your buddies\nany-buddy rehatch            # Delete companion, re-hatch via /buddy\n```\n\n### Non-Interactive Mode\n\nSkip prompts with flags (bypasses the start screen):\n\n```bash\nany-buddy -s dragon -r legendary -e '✦' -t wizard --shiny --name Draco -y\nany-buddy --preset \"Arcane Dragon\" -y\n```\n\n<details>\n<summary><strong>All CLI Flags</strong></summary>\n\n| Flag | Short | Description |\n|------|-------|-------------|\n| `--species <name>` | `-s` | Species (duck, goose, blob, cat, dragon, octopus, owl, penguin, turtle, snail, ghost, axolotl, capybara, cactus, robot, rabbit, mushroom, chonk) |\n| `--rarity <level>` | `-r` | Rarity (common, uncommon, rare, epic, legendary) |\n| `--eye <char>` | `-e` | Eye style (` ·  ✦  ×  ◉  @  ° `) |\n| `--hat <name>` | `-t` | Hat (crown, tophat, propeller, halo, wizard, beanie, tinyduck) |\n| `--preset <name>` | | Use a curated preset (e.g., \"Arcane Dragon\") |\n| `--name <name>` | `-n` | Rename companion |\n| `--personality <desc>` | `-p` | Set personality (controls speech bubble) |\n| `--shiny` | | Require shiny (~100x longer search) |\n| `--peak <stat>` | | Best stat (DEBUGGING, PATIENCE, CHAOS, WISDOM, SNARK) |\n| `--dump <stat>` | | Worst stat |\n| `--yes` | `-y` | Skip confirmations |\n| `--no-hook` | | Don't offer auto-patch hook |\n| `--silent` | | Suppress output (for hooks) |\n\n</details>\n\n## All 18 Species\n\n<p align=\"center\">\n  <img src=\"assets/species.svg\" alt=\"All 18 species\" width=\"700\">\n</p>\n\n## Customization Options\n\n<p align=\"center\">\n  <img src=\"assets/options.svg\" alt=\"Customization options\" width=\"700\">\n</p>\n\n## Restoring\n\n```bash\nany-buddy restore\n```\n\nPatches the salt back to original and removes the auto-patch hook. Your saved buddies are preserved — use `any-buddy buddies` to reactivate one later.\n\n## How It Works\n\nSee [HOW_IT_WORKS.md](HOW_IT_WORKS.md) for the full technical deep-dive on hashing, binary patching, the salt search algorithm, and the auto-patch hook.\n\n## Known Limitations\n\n- **macOS**: Binary is ad-hoc re-signed after patching. If Claude Code won't launch, run `any-buddy restore`\n- **Bun recommended**: Required for the interactive builder and correct wyhash computation. Without Bun, falls back to sequential prompts with FNV-1a (Node-based installs)\n- **Salt dependent**: If Anthropic changes the salt string, the tool will detect this and warn you\n- **Stats**: You pick peak/dump stats, but exact values are seed-determined\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup, project structure, and how to submit changes.\n\n## Credits\n\n- [@jtuskan](https://github.com/jtuskan) -- Windows support for npm-based installs ([#5](https://github.com/cpaczek/any-buddy/pull/5))\n- [@aaronepinto](https://github.com/aaronepinto) -- macOS ad-hoc code signing ([#3](https://github.com/cpaczek/any-buddy/pull/3))\n- [@joshpocock](https://github.com/joshpocock) -- FNV-1a hash support for Node runtime ([#8](https://github.com/cpaczek/any-buddy/pull/8))\n- [@Co-Messi](https://github.com/Co-Messi) -- Multi-worker parallelism + early-exit optimization ([#11](https://github.com/cpaczek/any-buddy/pull/11)), curated preset builds ([#15](https://github.com/cpaczek/any-buddy/pull/15))\n- [@Ahmad8864](https://github.com/Ahmad8864) -- 8-core cap idea ([#10](https://github.com/cpaczek/any-buddy/pull/10)), buddy profiles ([#17](https://github.com/cpaczek/any-buddy/pull/17))\n\n## License\n\n[WTFPL](LICENSE) -- Do What The Fuck You Want To Public License.\n","summary":"any-buddy is a Node.js command‑line tool that lets Claude Code users create and customize a companion “pet” for their environment. It offers an interactive builder with live ASCII art preview, a library of themed presets, and the ability to apply, restore, or switch buddies directly from the terminal. Users can also set all options via flags for a quick, non‑interactive workflow. The tool is especially useful for developers who use Claude Code on Linux, macOS, or Windows and want a playful, personalized way to brand their workspace.","description":"Hack Claude Code to get any buddy you want","stars":625,"language":"TypeScript"},{"owner":"inclusionAI","repo":"cuLA","url":"https://github.com/inclusionAI/cuLA","readme":"<div align=\"center\">\n\n<img src=\"docs/cuLA-logo.png\" alt=\"cuLA Logo\" width=\"600\">\n\n# cuLA — CUDA Linear Attention\n\n**High-performance CUDA kernels for linear attention variants, written in [CuTe DSL](https://github.com/NVIDIA/cutlass/tree/main/python/CuTeDSL) and CUTLASS C++.**\n\n</div>\n\n## Introduction\n\nLinear attention mechanisms reformulate standard attention to use linear-time state updates instead of quadratic pairwise interactions, making them well suited for long-context LLM workloads. Recent variants such as [GLA](https://arxiv.org/abs/2312.06635), [KDA](http://arxiv.org/abs/2510.26692), [GDN](https://arxiv.org/abs/2412.06464), and [Lightning Attention](https://arxiv.org/abs/2405.17381) further improve expressiveness with gating, delta-style updates, and chunkwise decomposition.\n\n**cuLA** provides hand-tuned CUDA implementations of these linear attention variants, targeting NVIDIA Blackwell (SM10X) and Hopper (SM90) GPUs. It is designed as a submodule of [flash-linear-attention (FLA)](https://github.com/fla-org/flash-linear-attention), sharing the same interface — adopting cuLA requires only a one-line import change. For ease of maintenance, cuLA is currently developed as a standalone library; the end goal is for users to seamlessly access these kernels through FLA. Since FLA already has a kernel dispatch mechanism in place, integration will be ready soon.\n\n> **⚠️ Early Stage:** cuLA is in its early development phase. Many kernels still have significant room for optimization, and the API may evolve. We warmly welcome contributions from the community — whether it's performance tuning, new algorithm support, bug fixes, or architectural improvements. Every contribution helps push the boundaries of linear attention on modern GPUs!\n\n## Installation\n\ncuLA supports both **Hopper (SM90)** and **Blackwell (SM10X)** GPUs.\n\n> **Requirements (Hopper & Blackwell):** Python 3.12+, CUDA Toolkit 12.9+ (SM10X support), NVCC 12.9+, PyTorch 2.9.1+\n\n> **Note:** The PyTorch CUDA version must match your system CUDA Toolkit version. Check with `nvcc --version` and `python -c \"import torch; print(torch.version.cuda)\"`.\n\n**Clone cuLA & dependencies:**\n\n```bash\ngit clone https://github.com/inclusionAI/cuLA.git\ngit submodule update --init --recursive\n```\n\n**Install PyTorch:**\n\n```bash\npip install torch==2.9.1 --index-url https://download.pytorch.org/whl/cu129\n```\n\n**Install cuLA & dependencies:**\n\n```bash\n# Install flash-linear-attention for benchmark repro\npip install -e third_party/flash-linear-attention\n\n# Install cuLA\npip install -e . --no-build-isolation\n```\n\n## Quick Start\n\n### KDA (Kimi Delta Attention) — Blackwell (SM10X)\n\nJust change the import:\n\n```python\nimport torch\nfrom cula.kda import chunk_kda  # <-- one-line change from fla.ops.kda\n\nB, T, H, K, V = 2, 2048, 32, 128, 128\ndevice = 'cuda'\n\nq = torch.randn(B, T, H, K, device=device, dtype=torch.bfloat16, requires_grad=True)\nk = torch.randn(B, T, H, K, device=device, dtype=torch.bfloat16, requires_grad=True)\nv = torch.randn(B, T, H, V, device=device, dtype=torch.bfloat16, requires_grad=True)\ng = torch.randn(B, T, H, K, device=device, dtype=torch.bfloat16) * 0.1   # gate (log space)\nbeta = torch.randn(B, T, H, device=device, dtype=torch.bfloat16).sigmoid()\nA_log = torch.randn(H, device=device, dtype=torch.float32) * 0.01\ndt_bias = torch.zeros(H * K, device=device, dtype=torch.float32)\ninit_state = torch.zeros(B, H, K, V, device=device, dtype=torch.float32)\n\n# Forward\no, final_state = chunk_kda(\n    q=q, k=k, v=v, g=g, beta=beta,\n    A_log=A_log,\n    dt_bias=dt_bias,\n    initial_state=init_state,\n    output_final_state=True,\n    use_qk_l2norm_in_kernel=True,\n    use_gate_in_kernel=True,\n    safe_gate=True,\n    lower_bound=-5.0,\n)\n\n# Backward\ndo = torch.randn_like(o)\no.backward(do)\n\nprint(f'Output shape: {o.shape}')             # [2, 2048, 32, 128]\nprint(f'Final state shape: {final_state.shape}')  # [2, 32, 128, 128]\n```\n\n**Notes:**\n- `safe_gate=True` is required to leverage TensorCore acceleration.\n- `beta` supports both `float32` and `bfloat16`; `initial_state` must be `float32`.\n- `cu_seqlens` (for variable-length sequences) must be `int32`.\n\n## Usage\n\nSee [USAGE.md](USAGE.md) for detailed usage examples and notes.\n\n## Benchmarks\n\nBenchmarks run on a single **NVIDIA GB300/GB200/H200** GPU with **CUDA Toolkit 12.9**, **PyTorch 2.9.1**, **Triton 3.5.1**.\n\nFLA baseline: [flash-linear-attention v0.4.2](https://github.com/fla-org/flash-linear-attention/releases/tag/v0.4.2).\n\n**Blackwell (SM10X)**\n\nSee [BENCHMARK_GB300.md](BENCHMARK_GB300.md) for detailed results.\n\nSee [BENCHMARK_GB200.md](BENCHMARK_GB200.md) for detailed results.\n \n**Hopper (SM90)**\n\nSee [BENCHMARK_H200.md](BENCHMARK_H200.md) for detailed results.\n\n**Highlights:**\n- **KDA Modular Forward (Blackwell):** **avg 1.45x** speedup on fixed-length, **avg 1.32x** on variable-length (18 configs, uniform/skewed/random).\n- **Lightning Attention Prefill (Blackwell):** up to **1.86x** speedup (B=2).\n- **Lightning Attention Varlen (Blackwell):** **avg 1.54x** speedup across 126 configs (uniform/skewed/random).\n- **KDA Fused Forward (Hopper):** **avg 1.52x** speedup across fixed-length and variable-length sequences.\n\nTo regenerate benchmarks:\n\n```bash\n# Blackwell (SM10X)\npython benchmarks/generate_benchmark_md.py\n\n# Hopper (SM90)\npython benchmarks/generate_benchmark_hopper_md.py\n```\n\n## Tests\n\n```bash\n# Tests for modular KDA forward against FLA Triton implementation\npython -m pytest tests/test_kda_compare_fla.py -v\n# Tests for modular KDA forward against naive KDA reference\npython -m pytest tests/test_kda.py -v\n# Tests for KDA fused forward\npython -m pytest tests/test_kda_fused_fwd.py -v\n# Tests for Lightning Attention fused forward\npython tests/test_lightning_attn.py\n# Tests for Lightning Attention decode\npython -m pytest tests/test_la_decode.py -v\n```\n\n<details>\n<summary>Sample test output</summary>\n\n```\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B1-T63-H1-D128-...]    PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B2-T500-H3-D128-...]   PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B2-T1000-H3-D128-...]  PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B3-T1024-H4-D128-...]  PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B4-T1024-H4-D128-...]  PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk[B4-T2048-H8-D128-...]  PASSED\ntests/test_kda_e2e_compare_fla.py::test_safe_gate_chunk_varlen[...]             PASSED\n...\n======================= 17 passed in 40.95s =======================\n```\n\n</details>\n\nCUDA kernel tuning is significantly more labor-intensive than Triton — contributions from the open-source community are warmly welcomed!\n\n## Repository Layout\n\nSee [REPO_LAYOUT.md](REPO_LAYOUT.md) for the full directory structure and a summary of each component.\n\n## Roadmap\n\n* [ ] Integrate into [flash-linear-attention](https://github.com/fla-org/flash-linear-attention) via FLA's kernel dispatch mechanism\n* [ ] Polynomial approximation to mitigate the exponential bottleneck, as in [Flash-Attentiton-4](https://arxiv.org/abs/2603.05451).\n* [ ] Larger chunk size and 2-CTA on SM10X for improved throughput.\n* [ ] Continuous optimization via agentic methods such as [AVO](https://arxiv.org/abs/2603.24517).\n* [ ] Support for more algorithms.\n* [ ] Small B/H/S optimizations.\n* [x] Support for BF16 beta input.\n\n**Train**\n\n* [x] Modular KDA Forward (SM10X, compatible with [Kimi CP](https://github.com/fla-org/flash-linear-attention/blob/main/fla/ops/cp/README.md))\n  * [x] kda chunk intra\n  * [x] chunk gated delta h\n  * [x] recompute wu\n  * [x] chunk fwd o\n\n* [ ] Modular GDN Forward / Backward Kernels (compatible with [Kimi CP](https://github.com/fla-org/flash-linear-attention/blob/main/fla/ops/cp/README.md))\n\n* [ ] Backward pass optimizations.\n\n* [ ] Kernel-level compute-communication overlapping for CP linear attention kernels (via **nvshmem**)\n\n**Inference**\n\n* [x] Lightning prefill kernel (SM10X)\n\n* [x] Lightning decode kernel (SM90 & SM10X)\n\n* [x] Fused KDA prefill kernel (SM90)\n\n* [ ] Fused KDA prefill kernel (SM10X)\n\n* [ ] MTP support\n\n* [ ] More aggressive fusion of small neighboring kernels like cumsum for inference scenarios.\n\n## Acknowledgements\n\nThis project is inspired by [flash-linear-attention](https://github.com/fla-org/flash-linear-attention), [CUTLASS](https://github.com/NVIDIA/cutlass), [CuTe DSL](https://github.com/NVIDIA/cutlass/tree/main/python/CuTeDSL), [FlashInfer](https://github.com/flashinfer-ai/flashinfer), [Flash-Attention](https://github.com/dao-ailab/flash-attention), and [FlashMLA](https://github.com/deepseek-ai/FlashMLA). We thank [FLA-org](https://github.com/fla-org) and NVIDIA for their great work.\n\n## Citation\n\nIf you find cuLA useful, please cite it using the metadata in our [`CITATION.cff`](CITATION.cff) file:\n\n```bibtex\n@software{cula2026,\n  title   = {cuLA: CUDA Linear Attention},\n  author  = {Chaofan Yu, Bowen Zeng, Hao Chen, Zhe Yang, Zhiqiang Zhang, Huan Li and Jun Zhou},\n  year    = {2026},\n  url     = {https://github.com/InclusionAI/cuLA}\n}\n```\n\n## Contact\n\nIf you're interested in an internship or job opportunity, feel free to reach out:  **chaofanyu@gmail.com**\n\nNo CUDA experience is required as long as you're a quick learner.\n\nFor Q&A and discussion, you can join us through:\n\n- **Slack:** [cuLA Slack Community](https://join.slack.com/t/cula-hq/shared_invite/zt-3uaacvm9y-xJwZyGueeKxZRYQlj7~hxw)\n- **WeChat:** The WeChat group has exceeded 200 members and can no longer be joined via QR code. To join, please send your WeChat ID to any of the following emails and we'll invite you: **chaofanyu@gmail.com** / **kevinzz08@foxmail.com** / **yzpag@gmail.com** / **haoc80996@gmail.com**. You can also ask someone already in the group to invite you directly.","summary":"cuLA is a collection of hand‑tuned CUDA kernels for several cutting‑edge linear‑attention mechanisms—GLA, KDA, GDN, Lightning Attention, and more—implemented with CuTe DSL and CUTLASS for NVIDIA Hopper (SM90) and Blackwell (SM10X) GPUs.  The library offers a drop‑in replacement for the flash‑linear‑attention package, allowing users to switch to cuLA with a single import change while gaining high‑throughput, low‑latency kernels for very long sequence models.  It targets researchers and engineers building large‑context language models who need hardware‑optimized attention and want to experiment with emerging linear‑attention variants.  cuLA is still in early development, so it invites contributions and is best suited for those willing to iterate on performance and feature support for next‑generation GPU architectures.","description":"CUDA kernels for linear attention variants, written in CuTe DSL and CUTLASS C++.","stars":455,"language":"Python"},{"owner":"shitagaki-lab","repo":"see-through","url":"https://github.com/shitagaki-lab/see-through","readme":"\nSee-through: Single-image Layer Decomposition for Anime Characters\n---\n\n<a href='https://arxiv.org/abs/2602.03749'><img src='https://img.shields.io/badge/arXiv-2602.03749-b31b1b.svg'></a>\n<a href='https://huggingface.co/spaces/24yearsold/see-through-demo'><img src='https://img.shields.io/badge/%F0%9F%A4%97%20Space-PSD%20Inference%20Demo-blue'></a>\n<a href='https://modelscope.cn/studios/ljsabc/See-Through'><img src='https://img.shields.io/badge/ModelScope-Demo%2F在线演示-624aff.svg'></a>\n\n\n_**[Jian Lin](https://github.com/dmMaze)<sup>1</sup>, [Chengze Li](https://moeka.me)<sup>1*</sup>, [Haoyun Qin](https://haoyunqin.com/)<sup>2,3,4</sup>, Kwun Wang Chan<sup>1</sup>, [Yanghua Jin](https://github.com/Aixile)<sup>3</sup>, [Hanyuan Liu](https://github.com/hyliu)<sup>1</sup>, Stephen Chun Wang Choy<sup>1</sup>, Xueting Liu<sup>1</sup>**_\n\n<sup>1</sup>Saint Francis University &emsp; <sup>2</sup>University of Pennsylvania &emsp; <sup>3</sup>Spellbrush &emsp; <sup>4</sup>Shitagaki Lab\n\n<sup>*</sup>Corresponding author\n\nConditionally accepted to appear in *ACM SIGGRAPH 2026 Conference Proceedings*.\n\n</div>\n\n---\n\n> **Notice:** This is an open-source research project. We have not set up any paid service for this tool. If you encounter a website charging for this functionality, it is not from us. Use at your own risk.\n>\n> **声明：** 本项目为开源研究项目，我们未开设任何付费服务。如遇到以此功能收费的网站，均与我们无关，请注意甄别。\n\n## TL;DR\n\nWe introduce a framework that automates the transformation of static anime illustrations into manipulatable **2.5D models**. Our approach decomposes a single image into fully inpainted, semantically distinct layers with inferred drawing orders — up to **23 layers** including hair, face, eyes, clothing, accessories, and more.\n\n![Our Representative Image](common/assets/representative.jpg)\n\n\n<div align=\"center\">\n  \n\nhttps://github.com/user-attachments/assets/023d271f-d8d7-4f6b-9083-96e714fb93e0\n\n\n  <br>\n  <em>This is our trailer video. Click to play.</em>\n</div>\n\n## Environment Setup\n\n```bash\n# 1. Create environment\nconda create -n see_through python=3.12 -y\nconda activate see_through\n\n# 2. Install PyTorch (CUDA 12.8)\n# aarch64 users: the pinned versions below may not be available; use torch>=2.9.0 instead\npip install torch==2.8.0+cu128 torchvision==0.23.0+cu128 torchaudio==2.8.0+cu128 \\\n  --index-url https://download.pytorch.org/whl/cu128\n\n# 3. Install dependencies (includes common utilities and annotators)\npip install -r requirements.txt\n\n# 4. Create assets symlink (you can also copy assets to the root if you prefer)\nln -sf common/assets assets\n```\n\n**Optional annotator tiers** (install as needed):\n\n| Tier | Command | What it adds |\n|------|---------|-------------|\n| Body parsing | `pip install --no-build-isolation -r requirements-inference-annotators.txt` | detectron2 for body attribute tagging |\n| SAM2 | `pip install --no-build-isolation -r requirements-inference-sam2.txt` | SAM2 for language-guided segmentation |\n| Instance seg | `pip install -r requirements-inference-mmdet.txt` | mmcv/mmdet for anime instance segmentation |\n\n> **Note:** Always run scripts from the repository root as the working directory.\n\n## Scripts & Models\n\n### Models\n\n| Model | HuggingFace Repo | Description |\n|-------|-----------------|-------------|\n| LayerDiff 3D | <a href='https://huggingface.co/layerdifforg/seethroughv0.0.2_layerdiff3d'><img src='https://img.shields.io/badge/%F0%9F%A4%97-layerdiff3d-blue'></a> | Diffusion-based transparent layer generation (SDXL) |\n| Marigold Depth | <a href='https://huggingface.co/24yearsold/seethroughv0.0.1_marigold'><img src='https://img.shields.io/badge/%F0%9F%A4%97-marigold__depth-blue'></a> | Pseudo-depth estimation fine-tuned for anime |\n| SAM Body Parsing | <a href='https://huggingface.co/24yearsold/l2d_sam_iter2'><img src='https://img.shields.io/badge/%F0%9F%A4%97-sam__body__parsing-blue'></a> | Semantic body part segmentation|\n\n### Inference Scripts\n\n| Script | Purpose |\n|--------|---------|\n| `inference/scripts/inference_psd.py` | **Main pipeline** — end-to-end layer decomposition → PSD output |\n| `inference/scripts/syn_data.py` | Synthetic training data generation utilities |\n\n> For the other inference/data parsing scripts refer to the [codebase](./inference/scripts/) and check the docstrings for details.\n\n### Demo\n\n| Notebook | Description |\n|----------|-------------|\n| `inference/demo/bodypartseg_sam.ipynb` | Interactive body part segmentation demo with visualization (19-parts) |\n\n> For the definition of complete body tags, refer to [scrap_model.py](./common/live2d/scrap_model.py).\n\n### Online Demo\n\nWe have prepared [a Huggingface Space](https://huggingface.co/spaces/24yearsold/see-through-demo) with ZeroGPU, so that if you register with HuggingFace, you should be able to run 1-2 PSD extractions per day (approximately 2-3 mins each, at 1280 resolution).\n\nFor users in Mainland China, we also provide a [ModelScope demo](https://modelscope.cn/studios/ljsabc/See-Through). It's completely free now, and supports slightly higher resolution than the HuggingFace demo. We will continue to maintain both demos to ensure accessibility for users worldwide.\n\n中国大陆用户可以使用[魔搭社区 ModelScope 在线演示](https://modelscope.cn/studios/ljsabc/See-Through)，目前完全免费，并且可以使用更高一点的分辨率。\n\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/3f98f47b-e98b-4628-9859-8772cda69f93\" />\n\n(Copyright [Tohoku Zunko Project](https://zunko.jp/)).\n\n\n## Usage\n\n### Layer Decomposition (main pipeline)\n\n`inference_psd.py` runs the full See-through pipeline: it applies the **LayerDiff 3D** model\nfor transparent layer generation and the fine-tuned **Marigold** model for pseudo-depth\ninference, then stratifies the character into up to **23 semantic layers** and exports a\nlayered PSD file. Note that the separation for head and body are in two continuous stages, which\nmay lead to a longer time than the original model mentioned in the paper. \n\n```bash\n# Decompose a single image into a layered PSD\npython inference/scripts/inference_psd.py \\\n  --srcp assets/test_image.png \\\n  --save_to_psd\n\n# Process a directory of images\npython inference/scripts/inference_psd.py \\\n  --srcp path/to/image_folder/ \\\n  --save_to_psd\n```\n\nOutput is saved to `workspace/layerdiff_output/` by default. Each result includes:\n- A layered `.psd` file with semantically separated layers\n- Intermediate depth maps and segmentation masks\n\n> **Note:** This uses our most recent model with 23-layer body part separation (V3).\n\n\nOnce you have finished the layer splitting, you can further process the PSD with the scripts in `inference/scripts/heuristic_partseg.py` for depth-based or left-right stratification.\n\n\n```bash\n# Split based on depth\npython inference/scripts/heuristic_partseg.py seg_wdepth --srcp workspace/test_samples_output/PV_0047_A0020.psd --target_tags handwear\n\n\n#Left-right split\npython inference/scripts/heuristic_partseg.py seg_wlr --srcp workspace/test_samples_output/PV_0047_A0020_wdepth.psd --target_tags handwear-1\n```\n\n### Low-VRAM Users\n\nThe default pipeline runs at bf16 precision and requires approximately 12-16 GB of VRAM at 1280 resolution.\n\n**12 GB GPUs**: Enable group offload to reduce peak VRAM to ~10 GB at 1280 resolution:\n\n```bash\npython inference/scripts/inference_psd.py \\\n  --srcp assets/test_image.png \\\n  --save_to_psd \\\n  --group_offload\n```\n\n**8 GB GPUs**: Use the NF4 quantized pipeline, which uses 4-bit quantized model weights. This achieves ~8 GB peak VRAM at 1280 resolution, and can be further reduced by lowering the resolution with group offload:\n\n```bash\n# Install bitsandbytes (one-time)\npip install -r requirements-inference-bnb.txt\n\n# Run with NF4 quantization (default: group_offload on, depth resolution 720)\npython inference/scripts/inference_psd_quantized.py \\\n  --srcp assets/test_image.png \\\n  --save_to_psd\n\n# For even lower VRAM, reduce layerdiff resolution to 1024\npython inference/scripts/inference_psd_quantized.py \\\n  --srcp assets/test_image.png \\\n  --save_to_psd \\\n  --resolution 1024\n```\n\nThe quantized models are hosted on HuggingFace and downloaded automatically on first run. Quality is close to the full-precision model (PSNR ~30 dB, SSIM ~0.96 vs bf16 baseline).\n\n> **Note:** Group offload trades speed for VRAM savings (roughly 1.5x slower). NF4 quantization has minimal speed overhead but reduces model weight memory.\n\n**8 GB GPUs**: Block swap pipeline achieves ~8 GB peak VRAM at 1280 resolution with bf16 precision:\n\n```bash\npython inference/scripts/inference_psd_blockswap.py \\\n  --srcp assets/test_image.png \\\n  --save_to_psd \\\n```\n\n### Preparing the dataset for training (e.g., Live2D Parsing)\n\nWe have provided a separate repo for you to prepare the dataset for training the Live2D parsing model. Please refer to [CubismPartExtr](https://github.com/shitagaki-lab/CubismPartExtr) to know how to download the sample model files and prepare your workspace folder. \n\nAfter that, refer to the `README_datapipeline.md` for the instructions on how to run the data parsing scripts to prepare the dataset for inspection and training. \n\n### User Interface\n\nOnce you have prepared your data, you may go ahead with the user interfaces. Refer to [UI Readme](ui/README.md) for the instructions on how to launch the UI.\n\n> We currently require the `workspace/datasets/` folder located at the repository root to launch the UI, as it contains the sample data for demonstration. We will work on making this more flexible in the future.\n\n> We recommend installing the `mmdet` tier dependencies to ensure the UI can launch successfully. \n\n\n### Training\n\nTraining scripts for all models (LayerDiff, Marigold depth, VAE, body part segmentation)\nare available in [`training/`](training/README.md), along with configs and data pipeline\nutilities. Our training was conducted on 8x NVIDIA H200 GPUs.\n\n\n## Community Support\n\nWe welcome community contributions and third-party integrations! \n\nIf you build tools, extensions, or workflows on top of this project, please let us know by opening an issue or pull request — we would be happy to feature your work here.\n\n- [ComfyUI-See-through](https://github.com/jtydhr88/ComfyUI-See-through) by [@jtydhr88](https://github.com/jtydhr88) — Integration for ComfyUI, with node-based workflow and in-browser PSD export. Thank you for the amazing work!\n- [PachiPakuGen](https://github.com/kazuya-bros/PachiPakuGen) by [@kazuya-bros](https://github.com/kazuya-bros) — Desktop tool that takes See-Through's decomposed PSD output and generates animation materials (eye blinks, lip-sync mouth shapes) for [SpriTalk](https://kazuyabros.booth.pm/items/8102679), a talking-character animation tool. Visit their [Booth](https://kazuyabros.booth.pm/items/8102679) for the tool and demo videos!\n- [StretchyStudio](https://github.com/MangoLion/stretchystudio) — Free, in-browser 2D puppet animation tool that auto-rigs See-through's decomposed PSD layers, closing the gap between decomposition and a fully animatable character. Drop our PSD output directly into it and it just works. Check out their [Reddit thread](https://www.reddit.com/r/StableDiffusion/comments/1sjj7ta/free_opensource_tool_to_instantly_rig_and_animate/) and [live editor](https://editor.stretchy.studio).\n\nWe also seek i18n help for this project. Your help will be highly appreciated.\n\n\n## Discussion: Is this Image-to-Live2D?\n\nWe don't think so — at least, not yet.\n\nWhile we produce 2.5D layer decompositions from a single image,\nthe full Image-to-Live2D pipeline requires significantly more:\n\n1. **Finer artistic decomposition.** Live2D models demand layers designed with specific\n   deformation behaviors in mind. Our automatic decomposition prioritizes semantic\n   correctness, but a Live2D artist would make different artistic choices about how\n   to split layers for natural-looking motion.\n\n2. **Rigging.** After decomposition, a Live2D model needs a deformation mesh, physics\n   parameters, and motion curves — this rigging process is arguably the most critical\n   (and labor-intensive) step, and it is not covered in this project.\n\n3. **Artistic intent.** Professional Live2D works are crafted holistically: the layer\n   structure, inpainting style, and rigging are designed together. Automating one step\n   in isolation cannot replicate this.\n\nThat said, we believe our decomposition can serve as a useful **starting point** for\nLive2D artists by eliminating some of the most tedious part of the workflow, such as manual segmentation\nand occluded region inpainting.\n\n## Changelog\n\n**2026-04-14**\n- Released training scripts, configs, and data pipeline for all models (LayerDiff, Marigold depth, VAE, body part segmentation). This is the V3 model with 23 body-part tag training.\n\n**2026-04-02**\n- Multiple memory optimizations; added suggestions for low-VRAM users (group offload, NF4 quantization).\n\n## Acknowledgements\n\nThis work is funded and substantially supported by a grant from the Research Grants Council of the Hong Kong Special Administrative Region, China (Project. No. UGC/FDS11/E02/23).\n\nWe would like to pay our thanks to the following people for their help and support:\n\n+ [Dingkun Yan](https://scholar.google.com/citations?user=dM0hOpIAAAAJ&hl=en) and [Xinrui Wang](https://systemerrorwang.github.io/) for their inspiration and support on the project.\n+ [USTC Student ACG Club \"LEO\"](https://space.bilibili.com/7021308) for kindly providing the sample Live2D model files for us to demonstrate on the paper.\n\n\n\nThis is an open-source research project.\nWe thank the authors of the following projects that made this work possible:\n\n- [LayerDiffuse](https://github.com/lllyasviel/LayerDiffuse_DiffusersCLI) — Transparent image layer diffusion (Lvmin Zhang is always a legend)\n- [Marigold](https://github.com/prs-eth/Marigold) — Diffusion-based monocular depth estimation\n- [Segment Anything (SAM)](https://github.com/facebookresearch/segment-anything) — Foundation model for segmentation\n- [Grounding DINO](https://github.com/IDEA-Research/GroundingDINO) — Open-set object detection\n- [LaMa](https://github.com/advimman/lama) — Large mask inpainting\n- [AnimeInstanceSegmentation](https://github.com/dreMaz/AnimeInstanceSegmentation) — Anime-specific instance segmentation\n\n## Citation\n\nIf you find this work useful, please cite:\n\n```bibtex\n@article{lin2026seethrough,\n  title={See-through: Single-image Layer Decomposition for Anime Characters},\n  author={Lin, Jian and Li, Chengze and Qin, Haoyun and Chan, Kwun Wang and Jin, Yanghua and Liu, Hanyuan and Choy, Stephen Chun Wang and Liu, Xueting},\n  journal={arXiv preprint arXiv:2602.03749},\n  year={2026}\n}\n```\n","summary":"**See‑Through** converts a single anime illustration into a fully manipulable 2.5‑D model by automatically decomposing the image into up to 23 separate, inpainted layers—such as hair, face, eyes, clothing, and accessories—while inferring a realistic drawing order. The framework integrates diffusion‑based transparent layer generation, anime‑specific depth estimation, and optional segmentation/annotator tools, enabling highly detailed layer‑level editing and re‑animation. Artists, animators, game designers, and AI researchers working on visual content creation or layered graphic manipulation will find the toolkit particularly valuable for rapid prototyping and style transfer.","description":"\"Single-image Layer Decomposition for Anime Characters\" (SIGGRAPH 2026, Conditionally Accepted)","stars":2141,"language":"Python"},{"owner":"dominikmartn","repo":"nothing-design-skill","url":"https://github.com/dominikmartn/nothing-design-skill","readme":"# Nothing Design Skill\n\nA design system skill for [Claude Code](https://claude.ai/code) inspired by Nothing's visual language. Monochrome, typographic, industrial.\n\nI kept describing the same design rules to Claude over and over — Swiss typography, OLED blacks, segmented progress bars, dot-matrix motifs. So I packaged it into a reusable skill.\n\n![Preview](preview.gif)\n\n## What you get\n\nTell Claude `/nothing-design` or say \"Nothing style\" and it generates UI following these principles:\n\n- Three-layer visual hierarchy (display, body, metadata — that's it)\n- Space Grotesk + Space Mono + Doto font stack\n- Full dark and light mode token system\n- Segmented progress bars, mechanical toggles, instrument-style widgets\n- Output as HTML/CSS, SwiftUI, or React/Tailwind\n\n## Install\n\nCopy the `nothing-design` folder into your Claude Code skills directory:\n\n```sh\ngit clone https://github.com/dominikmartn/nothing-design-skill.git\ncp -r nothing-design-skill/nothing-design ~/.claude/skills/\n```\n\nThat's it. Next time you start Claude Code, the skill is available.\n\n## What's inside\n\n| File | |\n|------|---|\n| `SKILL.md` | Design philosophy, craft rules, workflow |\n| `references/tokens.md` | Colors, fonts, spacing, motion tokens |\n| `references/components.md` | Buttons, cards, lists, tables, overlays |\n| `references/platform-mapping.md` | CSS, SwiftUI, React output mappings |\n\n## License\n\nMIT\n","summary":"The Nothing Design Skill is a reusable Claude Code extension that lets you generate UI interfaces following Nothing’s minimalist, monochrome visual style. By issuing `/nothing-design` or “Nothing style” commands, the skill produces components in a strict three‑layer hierarchy, uses a dedicated Space Grotesk / Space Mono token set, includes dark/light mode support, and outputs ready‑to‑use HTML/CSS, SwiftUI, or React/Tailwind code. Designers and developers focused on clean, industrial look‑and‑feel UI designs can quickly prototype and build consistent interfaces without repeatedly redefining the same style rules.","description":"A Claude Code skill for generating UI in the Nothing design language. Monochrome, typographic, industrial.","stars":1987,"language":null},{"owner":"mrdoob","repo":"three.wasm","url":"https://github.com/mrdoob/three.wasm","readme":"# three.wasm\n\n> \"The future of Three.js is WebAssembly\" — [@threejs](https://x.com/threejs/status/2039157691600536027)\n\nAfter years of pushing JavaScript to its limits, we've decided to rewrite three.js entirely in WebAssembly. The result? **three.wasm** — a 10KB binary that renders 3D graphics at 480+ fps.\n\nNo more garbage collection pauses. No more JIT warm-up. No more `\"use strict\"`. Just raw, uncompromising performance.\n\n## Getting Started\n\n```html\n<script>\nconst { instance } = await WebAssembly.instantiateStreaming(\n    fetch( 'three.wasm' ), { env: { abort: () => {} } }\n);\n\ninstance.exports.init();\ninstance.exports.update( time, aspect );\n<\/script>\n```\n\n## Features\n\n- 10KB total. Down from 175KB. You're welcome.\n- No dependencies. Not even JavaScript.\n- 480+ fps on a spinning cube. Imagine what it could do with two.\n- Matrix math computed at native speed.\n- WebGL2 rendering pipeline.\n\n## FAQ\n\n**Q: Is this real?**\n\nThe `.wasm` file is a real WebAssembly binary. Run `file three.wasm` and see for yourself.\n\n**Q: Can it do everything three.js does?**\n\nIt can spin a cube. What more do you need?\n\n**Q: What about TypeScript support?**\n\nWebAssembly is typed at the instruction level. Every type is either `i32`, `i64`, `f32`, or `f64`. No `any`. No `unknown`. No `as const satisfies readonly`. Just math.\n\n**Q: Should I migrate my production app?**\n\nAbsolutely. What could go wrong?\n\n## Live Demo\n\nOpen `index.html` with a local server:\n\n```bash\nnpx serve .\n```\n\n## License\n\nMIT\n","summary":"three.wasm is a lightweight rewrite of Three.js completely compiled to WebAssembly, delivering a 10 KB binary that can render 3D scenes at over 480 fps without the usual JavaScript overhead. It eliminates garbage‑collection pauses, JIT warm‑up, and even the “use strict” layer, providing native‑speed matrix math and a WebGL 2 rendering pipeline with no external dependencies. This high‑performance, ultra‑compact solution is ideal for developers who need real‑time rendering in games, VR/AR, and data visualization, especially in environments where minimizing bundle size and runtime latency is critical.","description":"8x Faster JavaScript 3D Library.","stars":532,"language":"TypeScript"},{"owner":"Ganso","repo":"refugiOS","url":"https://github.com/Ganso/refugiOS","readme":"<h1 align=\"center\">\n  refugiOS - Tu Refugio Digital y Biblioteca de Supervivencia\n</h1>\n\n<p align=\"center\">\n  <strong>Español 🇪🇸</strong> | <a href=\"README.en.md\">English 🇬🇧🇺🇸</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"logo/refugiOS.png\" alt=\"logo de refugiOS\"><br />\n  <img src=\"https://img.shields.io/badge/Estado-Desarrollo-green.svg\" alt=\"Estado del Proyecto\">\n  <img src=\"https://img.shields.io/badge/Versión-0.10-blue.svg\" alt=\"Versión\">\n  <img src=\"https://img.shields.io/badge/Paradigma-Offline_First-orange.svg\" alt=\"Sin Conexión\">\n  <img src=\"https://img.shields.io/badge/IA-Llamafile_(Local)-purple.svg\" alt=\"IA Offline\">\n  <img src=\"https://img.shields.io/badge/Raspberry_Pi-Certificado-red.svg\" alt=\"Raspberry Pi\">\n</p>\n\n> [!WARNING]\n> **Estado del Proyecto:** refugiOS se encuentra actualmente en su **primera versión Beta**. Es un proyecto en desarrollo activo y aún queda mucho camino por delante: internacionalización de la documentación, corrección de errores y la implementación de las funciones detalladas en el roadmap.\n\n> [!IMPORTANT]\n> **🚀 Guías de Instalación Rápida:**\n> *   💻 **[Instalación en PC Estándar (Xubuntu)](doc/Instalacion-Xubuntu-ES.md)**\n> *   🍓 **[Instalación en Raspberry Pi](doc/Instalacion-Raspberry-ES.md)**\n> \n> 🌐 **Looking for the English version?** [Read the English Guide here](README.en.md) / **¿Buscas la guía en inglés?** [Consulta el manual en inglés aquí](README.en.md).\n\n---\n\n## 📖 ¿Qué es refugiOS?\n\n**refugiOS** es un sistema operativo portátil diseñado para situaciones de emergencia, falta de conectividad a Internet o necesidad extrema de privacidad. \n\nA diferencia de otras soluciones complejas, **refugiOS convierte cualquier ordenador normal (incluso uno antiguo) en una estación de información completa** que arranca directamente desde un pendrive USB. \n\nTambién funciona en **Raspberry Pi**, convirtiéndola en una estación de información compacta, silenciosa y de bajo consumo.\n\nEs una herramienta pensada para tener a mano todos los conocimientos, mapas y documentos vitales de forma segura, privada y totalmente funcional sin depender de la nube.\n\n## ✨ Características Principales\n\n*   **⚡ Arranca en cualquier PC (Plug-and-play):** No necesitas instalar nada en el ordenador que encuentres. Conectas el USB, enciendes el equipo y ya tienes tu refugio digital funcionando a máxima velocidad.\n*   **🍓 Soporte nativo para Raspberry Pi:** Instalación certificada en Raspberry Pi 3B+. El instalador detecta automáticamente la arquitectura ARM y adapta todas las decisiones (paquetes APT, renderizado gráfico, etc.).\n*   **📚 Conocimiento Universal Offline:** Incluye copias completas de la Wikipedia, WikiMed (medicina), enciclopedias de supervivencia y guías de oficios gracias a la tecnología de *Kiwix*.\n*   **🤖 Inteligencia Artificial Privada:** Incorpora un asistente que funciona de forma 100% local, sin Internet. Puede ayudarte a resolver problemas técnicos, médicos o de traducción usando solo la potencia de tu ordenador.\n*   **🗺️ Mapas y Navegación GPS:** Mapas detallados de todo el mundo mediante *Organic Maps*. Puedes buscar rutas y puntos de interés (fuentes, hospitales, refugios) sin emitir ninguna señal de red.\n*   **🔒 Bóveda de Archivos Segura:** Sistema de cifrado profesional para guardar tus documentos más importantes (pasaportes, títulos, fotos) protegidos por una contraseña maestra.\n*   **🌐 Adaptado a tu Idioma:** El sistema se configura automáticamente en tu idioma (español o  inglés), descargando solo los diccionarios y ayudas que necesitas.\n*   Puedes ver en el apartado de **[Aplicaciones y Roadmap](doc/Modulos-y-Roadmap-ES.md)** el estado actual del proyecto, con los módulos que están ya implementados y los que se añadirán en un futuro.\n\n## 📸 Capturas de Pantalla\n\n| Elemento | Captura de Pantalla |\n| :--- | :--- |\n| **Interfaz Principal** | ![Menú principal](screenshots/Menu+Bobeda.png)<br>*Menú principal con una bóveda abierta* |\n| **Conocimiento** | ![Enciclopedia médica](screenshots/Medicina.png)<br>*Enciclopedia médica (WikiMed)* |\n| **Navegación** | ![Cartografía](screenshots/Mapas.png)<br>*Cartografía y navegación offline* |\n| **Asistente** | ![IA local](screenshots/IA%20local.png)<br>*Inteligencia Artificial local* |\n\n### 📺 Vídeo de Demostración\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=VrP8VIxQZGg\">\n    <img src=\"https://img.youtube.com/vi/VrP8VIxQZGg/maxresdefault.jpg\" alt=\"refugiOS en acción\" width=\"800\">\n  </a>\n  <br>\n  <em>refugiOS corriendo en un Microsoft Surface de 2018, arrancado desde un pendrive de 16Gb y completamente offline</em>\n</p>\n\n## 🚀 Instalación Rápida\n\n### 💻 En XUbuntu (PC / Laptop)\n\nSi ya tienes un USB con XUbuntu recién instalada, solo tienes que conectar el equipo a Internet una vez y ejecutar este comando en la terminal:\n\n```bash\nsudo apt install curl -y\ncurl -fsSL https://raw.githubusercontent.com/Ganso/refugiOS/main/install.sh | bash\n```\n\n> [!IMPORTANT] \n> **¿Aún no tienes el USB de XUbuntu preparado?** \n> Si estás empezando de cero, sigue primero nuestra **[Guía de Instalación en XUbuntu](doc/Instalacion-Xubuntu-ES.md)** para preparar tu pendrive desde Windows o Linux.\n\n### 🍓 En Raspberry Pi\n\nInstala primero Raspberry Pi OS con la herramienta oficial **[Raspberry Pi Imager](https://www.raspberrypi.com/documentation/computers/getting-started.html#raspberry-pi-imager)** y luego ejecuta el mismo instalador:\n\n```bash\nsudo apt install curl -y\ncurl -fsSL https://raw.githubusercontent.com/Ganso/refugiOS/main/install.sh | bash\n```\n\nEl instalador detectará automáticamente que estás en una Raspberry Pi y adaptará todo. Consulta la **[Guía de Instalación en Raspberry Pi](doc/Instalacion-Raspberry-ES.md)** para los detalles y recomendaciones de hardware.\n\n> [!NOTE] \n> El instalador te guiará paso a paso y te preguntará qué contenidos quieres incluir según el tamaño de tu almacenamiento.\n\n> [!TIP]\n> **¿Ya tienes tu primer pendrive listo?** Una vez que lo hayas probado y configurado a tu gusto, te recomendamos **[clonarlo a otra unidad](doc/Clonado-de-Pendrive-ES.md)** para tener una copia de seguridad o para dar copias a tus seres queridos.\n\n> [!NOTE]\n> **¿Quieres probarlo rápidamente sin tocar un pendrive?** Si tienes experiencia con máquinas virtuales, puedes montar refugiOS en una imagen de disco virtual y arrancarlo con QEMU o VirtualBox. Consulta nuestra **[Guía de Virtualización](doc/Guia-Virtualizacion-y-Pendrive-ES.md)** para los pasos detallados.\n\n\n## 📱 Plataformas Certificadas\n\n| Plataforma | Estado | Notas |\n| :--- | :--- | :--- |\n| **XUbuntu 24.04 LTS** | ✅ Certificado | Plataforma de referencia |\n| **Xubuntu 25.10** | ✅ Certificado | Necesario retestear cada nueva release |\n| **Raspberry Pi 3B+** | ✅ Certificado | Raspberry Pi OS 64-bit, Wayland |\n| **Raspberry Pi 4 / 5** | 🧪 Sin testar (teoricamente funcional) | Se buscan testers |\n| **Raspberry Pi Zero 2W** | 🧪 Sin testar | Se buscan testers |\n| **Otras distros basadas en Debian** | 🧪 Sin testar | Se buscan testers |\n\n## 📚 Documentación Detallada\n\nPara saber más sobre cómo funciona refugiOS y cómo sacarle el máximo partido, consulta las guías en el directorio `/doc/`:\n\n*   **[Instalación en XUbuntu](doc/Instalacion-Xubuntu-ES.md):** Cómo preparar tu USB con XUbuntu desde Windows o Linux.\n*   **[Instalación en Raspberry Pi](doc/Instalacion-Raspberry-ES.md):** Guía específica para Raspberry Pi con Raspberry Pi OS.\n*   **[Visión y Experiencia del Usuario](doc/Vision-y-Experiencia-ES.md):** El propósito del proyecto y qué esperar al usarlo.\n*   **[Comparativa de Soluciones](doc/Soluciones-Existentes-ES.md):** Por qué refugiOS es diferente a otras alternativas.\n*   **[Aplicaciones y Roadmap](doc/Modulos-y-Roadmap-ES.md):** Información sobre Kiwix, Mapas e Inteligencia Artificial.\n*   **[Arquitectura del Sistema](doc/Arquitectura-ES.md):** Detalles técnicos sobre la base Linux y su rendimiento.\n*   **[Bóvedas de Seguridad](doc/Bovedas-Criptograficas-ES.md):** Cómo funciona el cifrado de tus archivos personales.\n*   **[Clonado de Unidades](doc/Clonado-de-Pendrive-ES.md):** Cómo hacer copias exactas de tu USB en Windows o Linux.\n\n\n---\n\n## 🗃️ Agradecimientos y Fuentes\n\nGracias a [Felipe Monge \"PlayOnRetro\"](https://x.com/PlayOnRetro) por el diseño del logo.\n\nrefugiOS es posible gracias al increíble trabajo de proyectos de código abierto como:\n*   [Xubuntu](https://xubuntu.org/) y la comunidad de Ubuntu para la base del sistema operativo.\n*   [Raspberry Pi Foundation](https://www.raspberrypi.com/) por el hardware y el ecosistema de software ARM.\n*   [Kiwix](https://www.kiwix.org/) y la [Fundación Wikimedia](https://wikimediafoundation.org/) por el acceso offline al conocimiento universal.\n*   [Mozilla Ocho](https://github.com/Mozilla-Ocho/llamafile) por el motor de inferencia **Llamafile**.\n*   [HuggingFace](https://huggingface.co/) y [bartowski](https://huggingface.co/bartowski) por las excelentes cuantizaciones de los modelos de IA.\n*   Modelos de lenguaje **Phi-4-mini** (Microsoft) y **Qwen3** (Alibaba-Qwen).\n*   [Organic Maps](https://organicmaps.app/) y los colaboradores de [OpenStreetMap](https://www.openstreetmap.org/) por la cartografía offline.\n*   [Aria2](https://aria2.github.io/) para las descargas de alta eficiencia.\n*   [Flatpak](https://flatpak.org/) y [Flathub](https://flathub.org/) por la distribución de aplicaciones modernas.\n*   [Cryptsetup / LUKS](https://gitlab.com/cryptsetup/cryptsetup) para la seguridad y cifrado de datos personales.\n\n---\n*(refugiOS es una iniciativa de código abierto para la resiliencia digital. Actualmente en fase Beta, buscamos colaboradores para internacionalizar la documentación, migrarla a formato wiki y pulir la experiencia de usuario según nuestro [Roadmap](doc/Modulos-y-Roadmap-ES.md)).*\n","summary":"refugiOS is a portable, offline‑first operating system that turns any computer—including legacy PCs and Raspberry Pi 3B+—into a secure information hub for emergency and privacy‑critical situations. It loads instantly from a USB drive, bundles full offline copies of Wikipedia, WikiMed, survival encyclopedias via Kiwix, and an AI assistant that runs locally, plus GPS navigation with Organic Maps, encrypted vaults, and automatic language detection. This compact, plug‑and‑play solution is ideal for first responders, humanitarian workers, or anyone needing instant, self‑contained access to vital knowledge where connectivity is limited or data privacy is paramount.","description":"refugiOS es un sistema operativo portátil diseñado para situaciones de emergencia, falta de conectividad a Internet o necesidad extrema de privacidad","stars":383,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
</body>
