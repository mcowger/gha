r local builds:\n\n```bash\nNITRO_PRESET=netlify npx vite build\n```\n\nDeploy with the [Netlify CLI](https://docs.netlify.com/cli/get-started/) or connect your Git repo. Set the build command to `vite build`.\n\n</details>\n\n<details>\n<summary>AWS (Amplify)</summary>\n\nNitro auto-detects AWS Amplify in CI. For local builds:\n\n```bash\nNITRO_PRESET=aws_amplify npx vite build\n```\n\nConnect your Git repo in the AWS Amplify console. Set the build command to `vite build`.\n\n</details>\n\n<details>\n<summary>Deno Deploy</summary>\n\n```bash\nNITRO_PRESET=deno_deploy npx vite build\ncd .output\ndeployctl deploy --project=my-project server/index.ts\n```\n\n</details>\n\n<details>\n<summary>Node.js server</summary>\n\n```bash\nNITRO_PRESET=node npx vite build\nnode .output/server/index.mjs\n```\n\nThis produces a standalone Node.js server. Suitable for Docker, VMs, or any environment that can run Node.\n\n</details>\n\nSee the [Nitro deployment docs](https://v3.nitro.build/deploy) for the full list of supported platforms and provider-specific configuration.\n\n## Live examples\n\nThese are deployed to Cloudflare Workers and updated on every push to `main`:\n\n| Example                | Description                                                                                                      | URL                                                                                              |\n| ---------------------- | ---------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------------------ |\n| App Router Playground  | [Vercel's Next.js App Router Playground](https://github.com/vercel/next-app-router-playground) running on vinext | [app-router-playground.vinext.workers.dev](https://app-router-playground.vinext.workers.dev)     |\n| Hacker News            | HN clone (App Router, RSC)                                                                                       | [hackernews.vinext.workers.dev](https://hackernews.vinext.workers.dev)                           |\n| Nextra Docs            | Nextra docs site (MDX, App Router)                                                                               | [nextra-docs-template.vinext.workers.dev](https://nextra-docs-template.vinext.workers.dev)       |\n| App Router (minimal)   | Minimal App Router on Workers                                                                                    | [app-router-cloudflare.vinext.workers.dev](https://app-router-cloudflare.vinext.workers.dev)     |\n| Pages Router (minimal) | Minimal Pages Router on Workers                                                                                  | [pages-router-cloudflare.vinext.workers.dev](https://pages-router-cloudflare.vinext.workers.dev) |\n| RealWorld API          | REST API routes example                                                                                          | [realworld-api-rest.vinext.workers.dev](https://realworld-api-rest.vinext.workers.dev)           |\n| Benchmarks Dashboard   | Build performance tracking over time (D1-backed)                                                                 | [benchmarks.vinext.workers.dev](https://benchmarks.vinext.workers.dev)                           |\n| App Router + Nitro     | App Router deployed via Nitro (multi-platform)                                                                   | [examples/app-router-nitro](examples/app-router-nitro)                                           |\n\n## API coverage\n\n~94% of the Next.js 16 API surface has full or partial support. The remaining gaps are intentional stubs for deprecated features and Partial Prerendering (which Next.js 16 reworked into `\"use cache\"` — that directive is fully supported).\n\n> ✅ = full implementation | 🟡 = partial (runtime behavior correct, some build-time optimizations missing) | ⬜ = intentional stub/no-op\n\n### Module shims\n\nEvery `next/*` import is shimmed to a Vite-compatible implementation.\n\n| Module              |     | Notes                                                                                                                                  |\n| ------------------- | --- | -------------------------------------------------------------------------------------------------------------------------------------- |\n| `next/link`         | ✅  | All props including `prefetch` (IntersectionObserver), `onNavigate`, scroll restoration, `basePath`, `locale`                          |\n| `next/image`        | 🟡  | Remote images via [@unpic/react](https://unpic.pics) (28 CDNs). Local images via `<img>` + srcSet. No build-time optimization/resizing |\n| `next/head`         | ✅  | SSR collection + client-side DOM manipulation                                                                                          |\n| `next/router`       | ✅  | `useRouter`, `Router` singleton, events, client-side navigation, SSR context, i18n                                                     |\n| `next/navigation`   | ✅  | `usePathname`, `useSearchParams`, `useParams`, `useRouter`, `redirect`, `notFound`, `forbidden`, `unauthorized`                        |\n| `next/server`       | ✅  | `NextRequest`, `NextResponse`, `NextURL`, cookies, `userAgent`, `after`, `connection`, `URLPattern`                                    |\n| `next/headers`      | ✅  | Async `headers()`, `cookies()`, `draftMode()`                                                                                          |\n| `next/dynamic`      | ✅  | `ssr: true`, `ssr: false`, `loading` component                                                                                         |\n| `next/script`       | ✅  | All 4 strategies (`beforeInteractive`, `afterInteractive`, `lazyOnload`, `worker`)                                                     |\n| `next/font/google`  | 🟡  | Runtime CDN loading. No self-hosting, font subsetting, or fallback metrics                                                             |\n| `next/font/local`   | 🟡  | Runtime `@font-face` injection. Not extracted at build time                                                                            |\n| `next/og`           | ✅  | OG image generation via `@vercel/og` (Satori + resvg)                                                                                  |\n| `next/cache`        | ✅  | `revalidateTag`, `revalidatePath`, `unstable_cache`, pluggable `CacheHandler`, `\"use cache\"` with `cacheLife()` and `cacheTag()`       |\n| `next/form`         | ✅  | GET form interception + POST server action delegation                                                                                  |\n| `next/legacy/image` | ✅  | Translates legacy props to modern Image                                                                                                |\n| `next/error`        | ✅  | Default error page component                                                                                                           |\n| `next/config`       | ✅  | `getConfig` / `setConfig`                                                                                                              |\n| `next/document`     | ✅  | `Html`, `Head`, `Main`, `NextScript`                                                                                                   |\n| `next/constants`    | ✅  | All phase constants                                                                                                                    |\n| `next/amp`          | ⬜  | No-op (AMP is deprecated)                                                                                                              |\n| `next/web-vitals`   | ⬜  | No-op (use the `web-vitals` library directly)                                                                                          |\n\n### Routing\n\n| Feature                          |     | Notes                                                                                                              |\n| -------------------------------- | --- | ------------------------------------------------------------------------------------------------------------------ |\n| File-system routing (`pages/`)   | ✅  | Automatic scanning with hot-reload on file changes                                                                 |\n| File-system routing (`app/`)     | ✅  | Pages, routes, layouts, templates, loading, error, not-found, forbidden, unauthorized                              |\n| Dynamic routes `[param]`         | ✅  | Both routers                                                                                                       |\n| Catch-all `[...slug]`            | ✅  | Both routers                                                                                                       |\n| Optional catch-all `[[...slug]]` | ✅  | Both routers                                                                                                       |\n| Route groups `(group)`           | ✅  | URL-transparent, layouts still apply                                                                               |\n| Parallel routes `@slot`          | ✅  | Discovery, layout props, `default.tsx`, inherited slots                                                            |\n| Intercepting routes              | ✅  | `(.)`, `(..)`, `(..)(..)`, `(...)` conventions                                                                     |\n| Route handlers (`route.ts`)      | ✅  | Named HTTP methods, auto OPTIONS/HEAD, cookie attachment                                                           |\n| Middleware                       | ✅  | `middleware.ts` and `proxy.ts` (Next.js 16). Matcher patterns (string, array, regex, `:param`, `:path*`, `:path+`) |\n| i18n routing                     | 🟡  | Pages Router locale prefix, Accept-Language detection, NEXT_LOCALE cookie. No domain-based routing                 |\n| `basePath`                       | ✅  | Applied everywhere — URLs, Link, Router, navigation hooks                                                          |\n| `trailingSlash`                  | ✅  | 308 redirects to canonical form                                                                                    |\n\n### Server features\n\n| Feature                                    |     | Notes                                                                                       |\n| ------------------------------------------ | --- | ------------------------------------------------------------------------------------------- |\n| SSR (Pages Router)                         | ✅  | Streaming, `_app`/`_document`, `__NEXT_DATA__`, hydration                                   |\n| SSR (App Router)                           | ✅  | RSC pipeline, nested layouts, streaming, nav context for client components                  |\n| `getStaticProps`                           | ✅  | Props, redirect, notFound, revalidate                                                       |\n| `getStaticPaths`                           | ✅  | `fallback: false`, `true`, `\"blocking\"`                                                     |\n| `getServerSideProps`                       | ✅  | Full context including locale                                                               |\n| ISR                                        | ✅  | Stale-while-revalidate, pluggable `CacheHandler`, background regeneration                   |\n| Server Actions (`\"use server\"`)            | ✅  | Action execution, FormData, re-render after mutation, `redirect()` in actions               |\n| React Server Components                    | ✅  | Via `@vitejs/plugin-rsc`. `\"use client\"` boundaries work correctly                          |\n| Streaming SSR                              | ✅  | Both routers                                                                                |\n| Metadata API                               | ✅  | `metadata`, `generateMetadata`, `viewport`, `generateViewport`, title templates             |\n| `generateStaticParams`                     | ✅  | With `dynamicParams` enforcement                                                            |\n| Metadata file routes                       | ✅  | sitemap.xml, robots.txt, manifest, favicon, OG images (static + dynamic)                    |\n| Static export (`output: 'export'`)         | ✅  | Generates static HTML/JSON for all routes                                                   |\n| Standalone output (`output: 'standalone'`) | ✅  | Generates `dist/standalone` with `server.js`, build artifacts, and runtime deps             |\n| `connection()`                             | ✅  | Forces dynamic rendering                                                                    |\n| `\"use cache\"` directive                    | ✅  | File-level and function-level. `cacheLife()` profiles, `cacheTag()`, stale-while-revalidate |\n| `instrumentation.ts`                       | ✅  | `register()` and `onRequestError()` callbacks                                               |\n| Route segment config                       | 🟡  | `revalidate`, `dynamic`, `dynamicParams`. `runtime` and `preferredRegion` are ignored       |\n\n### Configuration\n\n| Feature                                          |     | Notes                                                                                                                                                                                                                  |\n| ------------------------------------------------ | --- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| `next.config.js` / `.ts` / `.mjs`                | ✅  | Function configs, phase argument                                                                                                                                                                                       |\n| `rewrites` / `redirects` / `headers`             | ✅  | All phases, param interpolation                                                                                                                                                                                        |\n| Environment variables (`.env*`, `NEXT_PUBLIC_*`) | ✅  | Auto-loads Next.js-style dotenv files; only public vars are inlined                                                                                                                                                    |\n| `images` config                                  | 🟡  | Parsed but not used for optimization                                                                                                                                                                                   |\n| `experimental.optimizePackageImports`            | ✅  | Rewrites barrel imports to direct sub-module imports in RSC/SSR environments. A default set (lucide-react, date-fns, radix-ui, antd, MUI, and others) are always optimized. Add package names here to extend the list. |\n| `vinext({ nextConfig })`                         | ✅  | Inline Next-style config from `vite.config.*`. Supports object-form and function-form config. When provided, this overrides root `next.config.*`.                                                                      |\n\n### Environment variable loading (`.env*`)\n\nvinext automatically loads dotenv files for `dev`, `build`, `start`, and `deploy`.\n\nLoad order matches Next.js (highest priority first):\n\n1. Existing `process.env` values (shell/CI)\n2. `.env.<mode>.local`\n3. `.env.local` (skipped when mode is `test`)\n4. `.env.<mode>`\n5. `.env`\n\nModes:\n\n- `vinext dev` uses `development`\n- `vinext build`, `vinext start`, and `vinext deploy` use `production`\n\nVariable expansion (`$VAR` / `${VAR}`) is supported.\n\nClient exposure remains explicit:\n\n- `NEXT_PUBLIC_*` variables are inlined for browser usage\n- `next.config.js` `env` entries are also inlined\n- Other env vars stay server-only unless you explicitly expose them through Vite (for example `VITE_*` + `import.meta.env`)\n\nOverride behavior:\n\n- To override any `.env*` value, set it in your shell/CI environment before running vinext. Existing `process.env` always wins.\n\n### Caching\n\nThe cache is pluggable. The default `MemoryCacheHandler` works out of the box. Swap in your own backend for production:\n\n```ts\nimport { setCacheHandler } from \"next/cache\";\nsetCacheHandler(new MyCacheHandler()); // Redis, DynamoDB, etc.\n```\n\nThe `CacheHandler` interface matches Next.js 16's shape, so community adapters should be compatible.\n\n## What's NOT supported (and won't be)\n\nThese are intentional exclusions. For things that are missing today but on the roadmap, see [Known limitations](#known-limitations) below.\n\n- **Vercel-specific features** — `@vercel/og` edge runtime, Vercel Analytics integration, Vercel KV/Blob/Postgres bindings. Use platform equivalents.\n- **AMP** — Deprecated since Next.js 13. `useAmp()` returns `false`.\n- **`next export` (legacy)** — Use `output: 'export'` in config instead.\n- **Turbopack/webpack configuration** — This runs on Vite. Use Vite plugins instead of webpack loaders/plugins.\n- **`next/jest`** — Use Vitest.\n- **`create-next-app` scaffolding** — Not a goal.\n- **Bug-for-bug parity with undocumented behavior** — If it's not in the Next.js docs, we probably don't replicate it.\n\n## Known limitations\n\nThese are gaps we'd like to close — distinct from the [intentional exclusions](#whats-not-supported-and-wont-be) above.\n\n- **Image optimization doesn't happen at build time.** Remote images work via `@unpic/react` (auto-detects 28 CDN providers). Local images are routed through a `/_next/image` endpoint that can resize and transcode on Cloudflare Workers (via the Images binding) in production, but no build-time optimization or static resizing occurs.\n- **Google Fonts are loaded from the CDN, not self-hosted.** No `size-adjust` fallback font metrics. Local fonts work but `@font-face` CSS is injected at runtime, not extracted at build time.\n- **Route segment config** — `runtime` and `preferredRegion` are ignored (everything runs in the same environment).\n- **Node.js production server (`vinext start`)** works for testing but is less complete than Workers deployment. Cloudflare Workers is the primary target.\n- **Native Node modules (sharp, resvg, satori, lightningcss, @napi-rs/canvas)** crash Vite's RSC dev environment. Dynamic OG image/icon routes using these work in production builds but not in dev mode. These are auto-stubbed during `vinext deploy`.\n- **`next.config.ts` `baseUrl` bare imports require Vite 8.** A `next.config.ts` that imports a bare specifier resolved through `tsconfig.json`'s `compilerOptions.baseUrl` (e.g. `import { bar } from \"bar\"` resolving to a local `bar.ts`) relies on Vite 8's native `resolve.tsconfigPaths` (Rolldown/oxc-resolver). On Vite 7 there is no native equivalent, so these imports are not resolved. `compilerOptions.paths` aliases (e.g. `@/foo`) work on both Vite 7 and 8. Note that if a bare import matches both a `baseUrl`-local file and an installed package of the same name, the installed package wins (vinext keeps packages externalized so CJS config plugins like `@next/mdx` keep working).\n\n## Benchmarks\n\n> **Caveat:** Benchmarks are hard to get right and these are early results. Take them as directional, not definitive.\n\nThese benchmarks measure **compilation and bundling speed**, not production serving performance. Next.js and vinext have fundamentally different default approaches: Next.js statically pre-renders pages at build time (making builds slower but production serving faster for static content), while vinext server-renders all pages on each request. To make the comparison apples-to-apples, the benchmark app uses `export const dynamic = \"force-dynamic\"` to disable Next.js static pre-rendering — both frameworks are doing the same work: compiling, bundling, and preparing server-rendered routes.\n\nThe benchmark app is a shared 33-route App Router application (server components, client components, dynamic routes, nested layouts, API routes) built identically by both tools. We compare Next.js (Turbopack) against vinext (Vite 8). Both Turbopack and Rolldown parallelize across cores, so results on machines with more cores may differ significantly.\n\nWe measure three things:\n\n- **Production build time** — 5 runs, timed with `hyperfine`.\n- **Client bundle size** — gzipped output of each build.\n- **Dev server cold start** — 10 runs, randomized execution order. Vite's dependency optimizer cache is cleared before each run.\n\nBenchmarks run on GitHub CI runners (2-core Ubuntu) on every merge to `main`. See the launch numbers in the [announcement blog post](https://blog.cloudflare.com/vinext/) and the latest results at **[benchmarks.vinext.workers.dev](https://benchmarks.vinext.workers.dev)**.\n\n<details>\n<summary>Why the bundle size difference?</summary>\n\nAnalysis of the build output shows two main factors:\n\n1. **Tree-shaking**: Vite/Rollup produces a smaller React+ReactDOM bundle than Next.js/Turbopack. Rollup's more aggressive dead-code elimination accounts for roughly half the overall difference.\n2. **Framework overhead**: Next.js ships more client-side infrastructure (router, Turbopack runtime loader, prefetching, error handling) than vinext's lighter client runtime.\n\nBoth frameworks ship the same app code and the same RSC client runtime (`react-server-dom-webpack`). The difference is in how much of React's internals survive tree-shaking and how much framework plumbing each tool adds.\n\n</details>\n\nReproduce with `node benchmarks/run.mjs --runs=5 --dev-runs=10`. Exact framework versions are recorded in each result.\n\n## Architecture\n\nvinext is a Vite plugin that:\n\n1. **Resolves all `next/*` imports** to local shim modules that reimplement the Next.js API using standard Web APIs and React primitives.\n2. **Scans your `pages/` and `app/` directories** to build a file-system router matching Next.js conventions.\n3. **Generates virtual entry modules** for the RSC, SSR, and browser environments that handle request routing, component rendering, and client hydration.\n4. **Integrates with `@vitejs/plugin-rsc`** for React Server Components — handling `\"use client\"` / `\"use server\"` directives, RSC stream serialization, and multi-environment builds.\n\nThe result is a standard Vite application that happens to be API-compatible with Next.js.\n\n### Pages Router flow\n\n```\nRequest → Vite dev server middleware → Route match → getServerSideProps/getStaticProps\n  → renderToReadableStream(App + Page) → HTML with __NEXT_DATA__ → Client hydration\n```\n\n### App Router flow\n\n```\nRequest → RSC entry (Vite rsc environment) → Route match → Build layout/page tree\n  → renderToReadableStream (RSC payload) → SSR entry (Vite ssr environment)\n  → renderToReadableStream (HTML) → Client hydration from RSC stream\n```\n\n## Project structure\n\n```\npackages/vinext/\n  src/\n    index.ts              # Main plugin — resolve aliases, config, virtual modules\n    cli.ts                # vinext CLI (dev/build/start/deploy/init/check/lint)\n    check.ts              # Compatibility scanner\n    deploy.ts             # Cloudflare Workers deployment\n    init.ts               # vinext init — one-command migration for Next.js apps\n    client/\n      entry.ts            # Client-side hydration entry\n    routing/\n      pages-router.ts     # Pages Router file-system scanner\n      app-router.ts       # App Router file-system scanner\n    entries/\n      app-rsc-entry.ts    # App Router RSC entry generator\n      app-ssr-entry.ts    # App Router SSR entry generator\n      app-browser-entry.ts # App Router browser entry generator\n      pages-server-entry.ts # Pages Router SSR entry generator\n      pages-client-entry.ts # Pages Router client entry generator\n    server/\n      dev-server.ts       # Pages Router SSR request handler\n      prod-server.ts      # Production server with compression\n      api-handler.ts      # Pages Router API routes\n      isr-cache.ts        # ISR cache layer\n      middleware.ts        # middleware.ts / proxy.ts runner\n      metadata-routes.ts  # File-based metadata route scanner\n      instrumentation.ts  # instrumentation.ts support\n    cloudflare/\n      kv-cache-handler.ts # Cloudflare KV-backed CacheHandler for ISR\n    shims/                # One file per next/* module (33 shims + 6 internal)\n    build/\n      static-export.ts    # output: 'export' support\n    utils/\n      project.ts          # Shared project utilities (ESM, CJS, package manager detection)\n    config/\n      next-config.ts      # next.config.js loader\n      config-matchers.ts  # Config matching utilities\n\ntests/\n  *.test.ts               # Vitest unit + integration tests\n  nextjs-compat/          # Tests ported from Next.js test suite\n  fixtures/               # Test apps (pages-basic, app-basic, ecosystem libs)\n  e2e/                    # Playwright E2E tests (5 projects)\n\nexamples/                 # Deployed demo apps (see Live Examples above)\n```\n\n## Tests\n\n```bash\npnpm test             # Vitest unit + integration tests\npnpm run test:e2e     # Playwright E2E tests (5 projects)\npnpm run check        # Format, lint, and type checks\npnpm run lint         # Lint only (type-aware oxlint)\npnpm run fmt          # Formatting (oxfmt)\npnpm run fmt:check    # Check formatting without writing\n```\n\nE2E tests cover Pages Router (dev + production), App Router (dev), and both routers on Cloudflare Workers via `wrangler dev`.\n\nThe [Vercel App Router Playground](https://github.com/vercel/next-app-router-playground) runs on vinext as an integration test — see it live at [app-router-playground.vinext.workers.dev](https://app-router-playground.vinext.workers.dev).\n\n## Local setup (from source)\n\nIf you're working from the repo instead of installing from npm:\n\n```bash\ngit clone https://github.com/cloudflare/vinext.git\ncd vinext\npnpm install\npnpm run build\n```\n\nThis builds the vinext package to `packages/vinext/dist/`. For active development, use `pnpm --filter vinext run dev` to rebuild on changes.\n\nTo use it against an external Next.js app, link the built package:\n\n```bash\n# From your Next.js project directory:\npnpm link /path/to/vinext/packages/vinext\n```\n\nOr add it to your `package.json` as a file dependency:\n\n```json\n{\n  \"dependencies\": {\n    \"vinext\": \"file:/path/to/vinext/packages/vinext\"\n  }\n}\n```\n\nvinext has peer dependencies on `react ^19.2.6`, `react-dom ^19.2.6`, `react-server-dom-webpack ^19.2.6`, and `vite ^7.0.0 || ^8.0.0`. Then replace `next` with `vinext` in your scripts and run as normal.\n\n## Contributing\n\nThis project is experimental and under active development. Issues and PRs are welcome.\n\n### CI\n\nWhen you open a PR, CI (check, Vitest, Playwright E2E) runs automatically. First-time contributors need one manual approval from a maintainer, then subsequent PRs run without intervention.\n\nDeploy previews (building and deploying examples to Cloudflare Workers) only run for branches pushed to the main repo. If you're a Cloudflare employee, push your branch to the main repo instead of forking, and previews deploy automatically. For fork PRs, a maintainer can comment `/deploy-preview` to trigger the deploy and post preview URLs.\n\n### Reporting bugs\n\nIf something doesn't work with your Next.js app, please file an issue — we want to hear about it.\n\nBefore you do, try pointing an AI agent at the problem. Open your project with Claude Code, Cursor, OpenCode, or whatever you use, and ask it to figure out why your app isn't working with vinext. In our experience, agents are very good at tracing through the vinext source, identifying the gap or bug, and often producing a fix or at least a clear diagnosis. An issue that includes \"here's what the agent found\" is significantly more actionable than \"it doesn't work.\"\n\nEven a partial diagnosis helps — stack traces, which `next/*` import is involved, whether it's a dev or production build issue, App Router vs Pages Router. The more context, the faster we can fix it.\n\n## License\n\nMIT\n","summary":"Vinext is an experimental project from Cloudflare that reimplements the Next.js API surface using the Vite build tool. By serving as a drop-in replacement for the Next.js runtime, it enables developers to utilize Vite’s fast development server and HMR capabilities while maintaining compatibility with existing `app/` and `pages/` directory structures. This tool is primarily designed for developers looking to optimize their build pipelines or deploy Next.js applications directly to the Cloudflare Workers edge environment.","description":"Vite plugin that reimplements the Next.js API surface — deploy anywhere","stars":8120,"language":"TypeScript"},{"owner":"jherr","repo":"webmcp-demo","url":"https://github.com/jherr/webmcp-demo","readme":"Welcome to your new TanStack Start app! \n\n# Getting Started\n\nTo run this application:\n\n```bash\npnpm install\npnpm dev\n```\n\n# Building For Production\n\nTo build this application for production:\n\n```bash\npnpm build\n```\n\n## Testing\n\nThis project uses [Vitest](https://vitest.dev/) for testing. You can run the tests with:\n\n```bash\npnpm test\n```\n\n## Styling\n\nThis project uses [Tailwind CSS](https://tailwindcss.com/) for styling.\n\n### Removing Tailwind CSS\n\nIf you prefer not to use Tailwind CSS:\n\n1. Remove the demo pages in `src/routes/demo/`\n2. Replace the Tailwind import in `src/styles.css` with your own styles\n3. Remove `tailwindcss()` from the plugins array in `vite.config.ts`\n4. Uninstall the packages: `pnpm add @tailwindcss/vite tailwindcss --dev`\n\n\n\n## Routing\n\nThis project uses [TanStack Router](https://tanstack.com/router) with file-based routing. Routes are managed as files in `src/routes`.\n\n### Adding A Route\n\nTo add a new route to your application just add a new file in the `./src/routes` directory.\n\nTanStack will automatically generate the content of the route file for you.\n\nNow that you have two routes you can use a `Link` component to navigate between them.\n\n### Adding Links\n\nTo use SPA (Single Page Application) navigation you will need to import the `Link` component from `@tanstack/react-router`.\n\n```tsx\nimport { Link } from \"@tanstack/react-router\";\n```\n\nThen anywhere in your JSX you can use it like so:\n\n```tsx\n<Link to=\"/about\">About</Link>\n```\n\nThis will create a link that will navigate to the `/about` route.\n\nMore information on the `Link` component can be found in the [Link documentation](https://tanstack.com/router/v1/docs/framework/react/api/router/linkComponent).\n\n### Using A Layout\n\nIn the File Based Routing setup the layout is located in `src/routes/__root.tsx`. Anything you add to the root route will appear in all the routes. The route content will appear in the JSX where you render `{children}` in the `shellComponent`.\n\nHere is an example layout that includes a header:\n\n```tsx\nimport { HeadContent, Scripts, createRootRoute } from '@tanstack/react-router'\n\nexport const Route = createRootRoute({\n  head: () => ({\n    meta: [\n      { charSet: 'utf-8' },\n      { name: 'viewport', content: 'width=device-width, initial-scale=1' },\n      { title: 'My App' },\n    ],\n  }),\n  shellComponent: ({ children }) => (\n    <html lang=\"en\">\n      <head>\n        <HeadContent />\n      </head>\n      <body>\n        <header>\n          <nav>\n            <Link to=\"/\">Home</Link>\n            <Link to=\"/about\">About</Link>\n          </nav>\n        </header>\n        {children}\n        <Scripts />\n      </body>\n    </html>\n  ),\n})\n```\n\nMore information on layouts can be found in the [Layouts documentation](https://tanstack.com/router/latest/docs/framework/react/guide/routing-concepts#layouts).\n\n## Server Functions\n\nTanStack Start provides server functions that allow you to write server-side code that seamlessly integrates with your client components.\n\n```tsx\nimport { createServerFn } from '@tanstack/react-start'\n\nconst getServerTime = createServerFn({\n  method: 'GET',\n}).handler(async () => {\n  return new Date().toISOString()\n})\n\n// Use in a component\nfunction MyComponent() {\n  const [time, setTime] = useState('')\n  \n  useEffect(() => {\n    getServerTime().then(setTime)\n  }, [])\n  \n  return <div>Server time: {time}</div>\n}\n```\n\n## API Routes\n\nYou can create API routes by using the `server` property in your route definitions:\n\n```tsx\nimport { createFileRoute } from '@tanstack/react-router'\nimport { json } from '@tanstack/react-start'\n\nexport const Route = createFileRoute('/api/hello')({\n  server: {\n    handlers: {\n      GET: () => json({ message: 'Hello, World!' }),\n    },\n  },\n})\n```\n\n## Data Fetching\n\nThere are multiple ways to fetch data in your application. You can use TanStack Query to fetch data from a server. But you can also use the `loader` functionality built into TanStack Router to load the data for a route before it's rendered.\n\nFor example:\n\n```tsx\nimport { createFileRoute } from '@tanstack/react-router'\n\nexport const Route = createFileRoute('/people')({\n  loader: async () => {\n    const response = await fetch('https://swapi.dev/api/people')\n    return response.json()\n  },\n  component: PeopleComponent,\n})\n\nfunction PeopleComponent() {\n  const data = Route.useLoaderData()\n  return (\n    <ul>\n      {data.results.map((person) => (\n        <li key={person.name}>{person.name}</li>\n      ))}\n    </ul>\n  )\n}\n```\n\nLoaders simplify your data fetching logic dramatically. Check out more information in the [Loader documentation](https://tanstack.com/router/latest/docs/framework/react/guide/data-loading#loader-parameters).\n\n# Demo files\n\nFiles prefixed with `demo` can be safely deleted. They are there to provide a starting point for you to play around with the features you've installed.\n\n# Learn More\n\nYou can learn more about all of the offerings from TanStack in the [TanStack documentation](https://tanstack.com).\n\nFor TanStack Start specific documentation, visit [TanStack Start](https://tanstack.com/start).\n","summary":"The `webmcp-demo` project serves as a starter template for building modern web applications using the TanStack Start framework. It provides a robust foundation featuring file-based routing with TanStack Router, integrated server functions, and pre-configured support for Tailwind CSS and Vitest for testing. This boilerplate is ideal for developers looking to quickly bootstrap a type-safe, full-stack React application with seamless client-server data synchronization.","description":"WebMCP demo code","stars":17,"language":"TypeScript"},{"owner":"adrianhajdin","repo":"jsm_bookified","url":"https://github.com/adrianhajdin/jsm_bookified","readme":"<div align=\"center\">\n  <br />\n    <a href=\"https://youtu.be/NiwawEe92Co\" target=\"_blank\">\n      <img src=\"public/readme/readme-hero-new.webp\" alt=\"Project Banner\">\n    </a>\n  <br />\n\n  <div>\n<img src=\"https://img.shields.io/badge/-Next.js_16-000000?style=for-the-badge&logo=Next.js&logoColor=white\" />\n<img src=\"https://img.shields.io/badge/-ElevenLabs-FFFFFF?style=for-the-badge&logo=ElevenLabs&logoColor=black\" />\n<img src=\"https://img.shields.io/badge/-Vapi-62F6B5?style=for-the-badge&logo=Vapi&logoColor=black\" />\n<img src=\"https://img.shields.io/badge/-Clerk-6C47FF?style=for-the-badge&logo=Clerk&logoColor=white\" /><br/>\n<img src=\"https://img.shields.io/badge/-MongoDB-47A248?style=for-the-badge&logo=MongoDB&logoColor=white\" />\n<img src=\"https://img.shields.io/badge/-Typescript-3178C6?style=for-the-badge&logo=Typescript&logoColor=white\" />\n<img src=\"https://img.shields.io/badge/-Tailwind-06B6D4?style=for-the-badge&logo=Tailwind-CSS&logoColor=white\" />\n<img src=\"https://img.shields.io/badge/-Shadcn/UI-000000?style=for-the-badge&logo=shadcnui&logoColor=white\" />\n\n  </div>\n\n  <h3 align=\"center\">AI Book Companion | Vapi, ElevenLabs</h3>\n\n   <div align=\"center\">\n     Build this project step by step with our detailed tutorial on <a href=\"https://www.youtube.com/watch?v=XUkNR-JfHwo\" target=\"_blank\"><b>JavaScript Mastery</b></a> YouTube. Join the JSM family!\n    </div>\n</div>\n\n## 📋 <a name=\"table\">Table of Contents</a>\n\n1. ✨ [Introduction](#introduction)\n2. ⚙️ [Tech Stack](#tech-stack)\n3. 🔋 [Features](#features)\n4. 🤸 [Quick Start](#quick-start)\n5. 🔗 [Assets](#links)\n6. 🚀 [More](#more)\n\n## 🚨 Tutorial\n\nThis repository contains the code corresponding to an in-depth tutorial available on our YouTube channel, <a href=\"https://www.youtube.com/@javascriptmastery/videos\" target=\"_blank\"><b>JavaScript Mastery</b></a>.\n\nIf you prefer visual learning, this is the perfect resource for you. Follow our tutorial to learn how to build projects like these step-by-step in a beginner-friendly manner!\n\n<a href=\"https://youtu.be/NiwawEe92Co\" target=\"_blank\"><img src=\"https://github.com/sujatagunale/EasyRead/assets/151519281/1736fca5-a031-4854-8c09-bc110e3bc16d\" /></a>\n\n## <a name=\"introduction\">✨ Introduction</a>\n\nBookified is an AI-powered platform that lets you have real-time voice conversations with your books. Built with Next.js 16, Vapi, and MongoDB, it transforms PDFs into interactive entities using natural voice synthesis. Choose from custom ElevenLabs personas to chat with your library, request summaries, and view live transcripts—all wrapped in a sleek Shadcn UI with Clerk authentication. \n\nIf you're getting started and need assistance or face any bugs, join our active Discord community with over **50k+** members. It's a place where people help each other out.\n\n<a href=\"https://discord.com/invite/n6EdbFJ\" target=\"_blank\"><img src=\"https://github.com/sujatagunale/EasyRead/assets/151519281/618f4872-1e10-42da-8213-1d69e486d02e\" /></a>\n\n## <a name=\"tech-stack\">⚙️ Tech Stack</a>\n\n- **[Clerk](https://jsm.dev/books-clerk)** is a comprehensive user management and authentication platform. It provides secure, pre-built components for email and social logins, enabling seamless session management and protected routes with minimal configuration.\n\n- **[CodeRabbit](https://jsm.dev/books-coderabbit)** is an AI-powered code review platform that provides contextual, line-by-line feedback on pull requests. It automates the review process by identifying bugs, suggesting optimizations, and ensuring coding standards are met, significantly reducing the manual effort for developers and improving code quality.\n\n- **[ElevenLabs](https://elevenlabs.io/docs)** is an advanced AI audio platform providing lifelike text-to-speech. It powers the voice previews in Bookified, allowing users to hear and select from a variety of natural-sounding AI personas before starting a conversation.\n\n- **[MongoDB](https://www.mongodb.com/docs/)** is a flexible, document-based NoSQL database designed for scalability and developer ease. Combined with Mongoose, it serves as the core storage for user libraries, book metadata, and conversation transcripts.\n\n- **[Next.js](https://nextjs.org/docs)** is a powerful React framework for building full-stack web applications. It handles the core application logic, server-side rendering, and API routes, enabling a fast and responsive interface for the Bookified platform.\n\n- **[Shadcn UI](https://ui.shadcn.com/)** is a collection of re-usable, accessible components built with Tailwind CSS and Radix UI. It allows for the creation of a clean, modular, and professional-grade user interface that is easy to customize and theme.\n\n- **[TypeScript](https://www.typescriptlang.org/)** is a superset of JavaScript that adds static typing, providing better tooling, code quality, and error detection. It ensures the application remains maintainable and robust as the codebase scales.\n\n- **[Vapi](https://jsm.dev/books-vapi)** is a specialized Voice AI platform that enables real-time, low-latency conversational audio. It serves as the primary engine for Bookified, allowing users to have seamless, back-and-forth verbal interactions with their uploaded content.\n\n## <a name=\"features\">🔋 Features</a>\n\n👉 **PDF Upload & Ingestion**: Seamlessly upload PDF books with automated text extraction, intelligent chunking, and high-dimensional embeddings for precise context retrieval.\n\n👉 **Voice-First Conversations**: Engage in natural, real-time voice dialogues with your uploaded books, allowing you to ask questions or explore complex concepts verbally via Vapi.\n\n👉 **AI Voice Personas**: Choose from a variety of distinct AI personalities and hear instant high-fidelity previews powered by ElevenLabs to find the perfect reading companion.\n\n👉 **Smart Summaries & Insights**: Quickly extract the essence of any chapter or request deep-dive summaries, making long-form content more accessible and digestible.\n\n👉 **Session Transcripts**: Keep a complete record of every vocal interaction with auto-generated text transcripts, ensuring you never lose a key insight from your discussions.\n\n👉 **Library Management**: Effortlessly organize and search through your personal uploads or the global collection with a high-performance search interface.\n\n👉 **Auth & Subscription**: Secure user access via email and social login, paired with a robust billing system to manage premium features and platform subscriptions.\n\nAnd many more, including code architecture and reusability.\n\n## <a name=\"quick-start\">🤸 Quick Start</a>\n\nFollow these steps to set up the project locally on your machine.\n\n**Prerequisites**\n\nMake sure you have the following installed on your machine:\n\n- [Git](https://git-scm.com/)\n- [Node.js](https://nodejs.org/en)\n- [npm](https://www.npmjs.com/) (Node Package Manager)\n\n**Cloning the Repository**\n\n```bash\ngit clone https://github.com/adrianhajdin/jsm_bookified.git\ncd jsm_bookified\n```\n\n**Installation**\n\nInstall the project dependencies using npm:\n\n```bash\nnpm install\n```\n\n**Set Up Environment Variables**\n\nCreate a new file named `.env` in the root of your project and add the following content:\n\n```env\nNODE_ENV='development'\nNEXT_PUBLIC_BASE_URL=\n\n# CLERK\nNEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=\nCLERK_SECRET_KEY=\nNEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in\nNEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up\nNEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/\nNEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/\n\n# VERCEL BLOB\nBLOB_READ_WRITE_TOKEN=\n\n# MONGODB\nMONGODB_URI=\n\n# VAPI\nNEXT_PUBLIC_VAPI_API_KEY=\nVAPI_SERVER_SECRET=\n\n# Google Gemini API for embeddings\nGOOGLE_GEMINI_API_KEY=\n\n# ELEVENLABS\nELEVENLABS_API_KEY=\n```\n\nReplace the placeholder values with your real credentials. You can get these by signing up at: [**Clerk**](https://clerk.com), [**Vercel**](https://vercel.com), [**MongoDB**](https://www.mongodb.com), [**Vapi**](https://vapi.ai), [**Google AI Studio**](https://aistudio.google.com), [**ElevenLabs**](https://elevenlabs.io).\n\n**Running the Project**\n\n```bash\nnpm run dev\n```\n\nOpen [http://localhost:3000](http://localhost:3000) in your browser to view the project.\n\n## <a name=\"links\">🔗 Assets</a>\n\nAssets and snippets used in the project can be found in the **[video kit](https://jsmastery.com/video-kit/8127ec28-61db-4295-a85b-c649df6ee408)**.\n\n<a href=\"https://jsmastery.com/video-kit/8127ec28-61db-4295-a85b-c649df6ee408\" target=\"_blank\">\n  <img src=\"public/readme/readme-videokit.webp\" alt=\"Video Kit Banner\">\n</a>\n\n## <a name=\"more\">🚀 More</a>\n\n**Advance your skills with Next.js Pro Course**\n\nEnjoyed creating this project? Dive deeper into our PRO courses for a richer learning adventure. They're packed with\ndetailed explanations, cool features, and exercises to boost your skills. Give it a go!\n\n<a href=\"https://jsm.dev/books-jsm\" target=\"_blank\">\n  <img src=\"public/readme/readme-jsmpro.webp\" alt=\"Project Banner\">\n</a>\n","summary":"Bookified is an AI-powered platform that enables users to engage in real-time, interactive voice conversations with their digital books by transforming PDF content into conversational entities. The project leverages advanced technologies including Next.js 16, Vapi for voice interaction, ElevenLabs for lifelike text-to-speech synthesis, and Clerk for secure user authentication. It offers features like custom persona selection, instant content summaries, and live transcription tracking within a modern Shadcn UI. This repository serves as a comprehensive resource for developers looking to build sophisticated AI-driven web applications through a structured, step-by-step tutorial.","description":"Voice-first AI book companion platform built with Next.js 16; featuring real-time Vapi voice, ElevenLabs persona synthesis, Clerk authentication, and an interface built with shadcn/ui and Tailwind.","stars":50,"language":"TypeScript"},{"owner":"vercel-labs","repo":"opensrc","url":"https://github.com/vercel-labs/opensrc","readme":"# opensrc\n\nGive coding agents access to any package's source code.\n\n## Quick Start\n\n```bash\nnpm install -g opensrc\n```\n\n```bash\n# Search a package's source\nrg \"parse\" $(opensrc path zod)\n\n# Read a specific file\ncat $(opensrc path zod)/src/types.ts\n\n# Works with any registry\nfind $(opensrc path pypi:requests) -name \"*.py\"\n```\n\n`opensrc path` fetches on first use, then returns the cached path instantly. See the [CLI readme](packages/opensrc/README.md) for full usage.\n\n## Packages\n\n| Package | Description |\n|---------|-------------|\n| [`opensrc`](packages/opensrc) | CLI — fetch and cache source code from npm, PyPI, crates.io, and GitHub |\n| [`@opensrc/docs`](apps/docs) | Documentation site |\n\n## Development\n\nThis is a [Turborepo](https://turbo.build) monorepo using [pnpm](https://pnpm.io) workspaces.\n\n```bash\npnpm install\nturbo build\nturbo dev\n```\n\n### CLI (Rust)\n\n```bash\ncargo build --manifest-path packages/opensrc/cli/Cargo.toml\ncargo test --manifest-path packages/opensrc/cli/Cargo.toml\ncargo fmt --manifest-path packages/opensrc/cli/Cargo.toml\ncargo clippy --manifest-path packages/opensrc/cli/Cargo.toml -- -D warnings\n```\n\n### Docs (Next.js)\n\n```bash\ncd apps/docs\npnpm dev\n```\n\n## License\n\nApache-2.0\n","summary":"Opensrc is a command-line utility designed to provide coding agents and developers with seamless local access to the source code of any package from registries like npm, PyPI, and crates.io. It streamlines the retrieval process by automatically fetching and caching repository contents, allowing users to perform native file operations or searches directly within the source tree. This tool is particularly beneficial for developers who need to inspect external dependencies, debug library internals, or provide AI agents with full contextual access to third-party codebases.","description":"Fetch source code for npm packages to give AI coding agents deeper context","stars":2455,"language":"Rust"},{"owner":"kitlangton","repo":"tailcode","url":"https://github.com/kitlangton/tailcode","readme":"# TailCode\n\nTailCode is a terminal wizard that connects Tailscale + OpenCode and publishes OpenCode to your tailnet with a shareable URL and QR code.\n\n## Quick Install\n\nPrerequisites: `tailscale` and `opencode` installed and available on your PATH.\n\n### Homebrew (recommended)\n\n```bash\nbrew tap kitlangton/tap\nbrew install tailcode\ntailcode\n```\n\n### Bunx (no global install)\n\n```bash\nbunx @kitlangton/tailcode\n```\n\n### Direct binary\n\nDownload the latest binary from [GitHub Releases](https://github.com/kitlangton/tailcode/releases/latest), mark it executable, then run it:\n\n```bash\nchmod +x ./tailcode\n./tailcode\n```\n\n## How It Works\n\n- TailCode checks that `tailscale` and `opencode` are installed\n- If Tailscale is not connected, it prompts you to sign in (including QR-based flows from Tailscale)\n- It starts OpenCode locally only (`127.0.0.1`, default port `4096`)\n- It runs `tailscale serve` so the app is reachable from devices on your tailnet\n- It keeps the process alive until you quit, then cleans up the local server process\n\n## Install Prerequisites\n\n1. Install Tailscale\n\n- macOS: `brew install --cask tailscale-app`\n- Windows: `winget install --id tailscale.tailscale --exact`\n- Linux: `curl -fsSL https://tailscale.com/install.sh | sh`\n\nThen sign in and make sure Tailscale is running on this machine.\n\n2. Install OpenCode\n\n- macOS: `brew install anomalyco/tap/opencode`\n- Linux: `curl -fsSL https://opencode.ai/install | bash`\n- Alternative: `bun install -g opencode-ai`\n\nVerify both commands work:\n\n```bash\ntailscale version\nopencode --version\n```\n\n## Run TailCode\n\n### Option 1: Binary Releases (Recommended)\n\nDownload pre-built binaries from [GitHub Releases](https://github.com/kitlangton/tailcode/releases):\n\n```bash\n# macOS (Apple Silicon)\ncurl -L -o tailcode https://github.com/kitlangton/tailcode/releases/latest/download/tailcode-darwin-arm64\nchmod +x tailcode\n./tailcode\n\n# macOS (Intel)\ncurl -L -o tailcode https://github.com/kitlangton/tailcode/releases/latest/download/tailcode-darwin-x64\nchmod +x tailcode\n./tailcode\n\n# Linux (x64)\ncurl -L -o tailcode https://github.com/kitlangton/tailcode/releases/latest/download/tailcode-linux-x64\nchmod +x tailcode\n./tailcode\n\n# Linux (ARM64)\ncurl -L -o tailcode https://github.com/kitlangton/tailcode/releases/latest/download/tailcode-linux-arm64\nchmod +x tailcode\n./tailcode\n```\n\n### Option 2: Via Bun (requires Bun runtime)\n\nRequires Bun (the `tailcode` executable is a Bun CLI):\n\n```bash\ncurl -fsSL https://bun.sh/install | bash\n```\n\nRun without installing globally:\n\n```bash\nbunx @kitlangton/tailcode\n```\n\nOr install globally:\n\n```bash\nbun add -g @kitlangton/tailcode\ntailcode\n```\n\n### Option 3: Run from Source\n\n```bash\nbun install\nbun run start\n```\n\nFor development (hot reload):\n\n```bash\nbun run dev\n```\n\n## Optional Configuration\n\n- `TAILCODE_PORT` (default: `4096`)\n- `TAILCODE_PASSWORD` (optional; passed to `OPENCODE_SERVER_PASSWORD`)\n\nExample:\n\n```bash\nTAILCODE_PORT=4096 TAILCODE_PASSWORD=secret bun run start\n```\n\n## Usage Notes\n\n- The published URL is only reachable from devices on your Tailscale tailnet\n- OpenCode is bound to localhost to avoid exposing it on your LAN\n- `tailcode` always opens the setup wizard (use `tailcode --attach` for explicit attach)\n- TailCode shows a local attach command after setup: `opencode attach http://127.0.0.1:4096`\n\n## Binary Releases\n\nWe provide standalone binaries for:\n\n- **macOS**: `arm64` (Apple Silicon), `x64` (Intel)\n- **Linux**: `x64`, `arm64`\n- **Windows**: `x64` (coming soon)\n\nBinaries are compiled with Bun and include the Bun runtime. No separate Bun installation needed.\n\n### Verification\n\nAll releases include SHA256 checksums in `SHA256SUMS`. Verify after download:\n\n```bash\n# macOS/Linux\nsha256sum -c SHA256SUMS\n```\n\n## Development\n\n### Building Locally\n\n```bash\n# Bundle for local testing\nbun run build:bundle\n\n# Compile for current platform\nbun run build:compile\n\n# Full release build (all platforms + checksums)\nbun run build:release\n```\n\n### Scripts\n\n- `bun run typecheck` - Type check with TypeScript\n- `bun run lint` - Lint with oxlint\n- `bun run fmt` - Format with oxfmt\n- `bun run check` - Run all checks (typecheck + lint + fmt)\n\n## License\n\nMIT\n","summary":"TailCode is a terminal wizard designed to securely expose OpenCode instances to your Tailscale tailnet. By automating the integration between OpenCode and Tailscale Serve, the tool allows you to access your local development environment from any device on your private network via a shareable URL and QR code. This project is ideal for developers who need to bridge the gap between secure local development and remote access without exposing their services to the broader public internet.","description":null,"stars":305,"language":"TypeScript"},{"owner":"endojs","repo":"endo","url":"https://github.com/endojs/endo","readme":"---\ntitle: readme\ngroup: Documents\ncategory: Guides\n---\n\n# Endo\n\n[![contributing][contributing-svg]][contributing-url]\n[![license][license-image]][license-url]\n[![CI status](https://github.com/endojs/endo/actions/workflows/ci.yml/badge.svg)](https://github.com/endojs/endo/actions/workflows/ci.yml)\n[![Mutable.ai Auto Wiki](https://img.shields.io/badge/Auto_Wiki-Mutable.ai-blue)](https://wiki.mutable.ai/endojs/endo)\n\nEndo is a framework for powerful JavaScript plugin systems and supply chain\nattack resistance.\nEndo includes tools for _confinement_, _communication_, and _concurrency_.\nWith Endo’s [SES][] implementation of [HardenedJS][], we can opt-in to a more\ntamper-resistant mode of JavaScript.\nWith Endo’s [Eventual Send][E], we have a safe, transport-agnostic abstraction\nfor pipelining messages to remote procedures, and concrete transports like\n[Endo CapTP][CapTP] and, soon, [OCapN](https://ocapn.org).\n\n[Agoric][] and [MetaMask][] rely on Hardened JavaScript and the [SES shim][SES]\nas part of systems that sandbox third-party plugins or smart contracts and\nmitigate supply chain attacks for production web applications, web extensions,\nand build systems.\n\n[![Agoric Logo](https://github.com/endojs/endo/raw/master/packages/ses/docs/agoric-x100.png)][Agoric]\n[![MetaMask Logo](https://github.com/endojs/endo/raw/master/packages/ses/docs/metamask-x100.png)][MetaMask]\n\n[Agoric]: https://agoric.com/\n[MetaMask]: https://metamask.io/\n\nEndo protects program integrity both in-process and in distributed systems.\nHardened JavaScript protects local integrity, defending an application against\n[supply chain attacks][]: hacks that enter through upgrades to third-party\ndependencies.\nEndo does this by encouraging the [Principle of Least Authority][] and\nproviding foundations for the [Object-capability Model][].\n\nThe _Principle of Least Authority_ states that a software component should only\nhave access to data and resources that enable it to do its legitimate work.\nThe _Object-capability Model_ gives programmers a place to reason, by\nconstruction, about how permission flows through a program using\nwell-understood mechanisms like [Encapsulation][].\n\nFor distributed systems, Endo stretches object oriented programming over\nnetworks using asynchronous message passing to remote objects with\n_Capability Transport Protocols_ like [OCapN][] and a portable abstraction\nfor safely sending messages to remote objects called _Eventual Send_.\n\n**Security:** Security-conscious JavaScript applications can use these\ncomponents to improve the integrity and auditability of their own applications,\nimprove the economics of vetting third-party dependencies, and mitigate runtime\nprototype pollution attacks.\n\n**Workers and Networks:** Performance-conscious JavaScript applications can use\nthese components to improve the ergonomics of message-passing between\ncomponents in separate workers.\nEndo's _Eventual Send_ and _Capability Transport Protocols_ stretch\nasynchronous method invocation acrosses processes and networks.\n\n**Plugins:** JavaScript platforms on the web and blockchains can rely on Endo to safely\nenable third-party plugins or smart contracts.\nEndo provides tooling for bundling and safely executing arbitrary programs in\nthe presence of hardened platform objects.\n\nSince most JavaScript libraries receive powerful capabilities from global\nobjects like `fetch` or modules like `net`, [LavaMoat][] generates reviewable\npolicies that determine what capabilities will be distributed to third party\ndependencies according to evident need, and enforces those policies at runtime\nwith Endo.\n\nFor distributed systems, Endo stretches object oriented programming over\nnetworks using asynchronous message passing to remote objects with the\n[Handled Promise][] API and a [Capability Transfer Protocol][CapTP].\n\nBetween remote objects and Hardened JavaScript compartments, Endo makes\ndistributed programs easy to program, and easy to reason about integrity.\nCapTP frees the programmer from needing to create bespoke communication\nprotocols over message ports or byte streams.\n\nEndo combines these components to demonstrate their use for a confined plugin\nsystem in the [Endo Pet-name Dæmon](packages/daemon) and its\n[CLI](packages/cli).\n\nPlease join the conversation on our [Mailing List][SES Strategy Group] and\n[Matrix][Endo Matrix].\nReach out if you would like an ivitation to our **meetings**:\n\n- We record a weekly [Endo Sync video call][Endo Sync] .\n- We recorded a weekly [SES video call][SES Strategy Recordings] with the\n  Hardened JavaScript engineering community.\n- We now meet weekly with [ECMA TC-39 ECMAScript Technical Committee TG-3\n  Security Working Group][TG3].\n\n## Core Concepts\n\n[HardenedJS][] introduces three components to the base JavaScript:\n\n- Lockdown\n- Harden\n- Compartment\n\nThe _Shared Intrinsics_ are a subset of the JavaScript intrinsics like the\n`Array` and `Object` prototypes that, after _locking down_, are safe to share\nbetween programs running in _compartments_.\nAfter _lockdown_, programs can use _harden_ to make other objects safe\nto share between compartments.\n\nWith these three components, we can begin to rely on certain guarantees:\n\n- Hardened objects can represent _capabilities_.\n  That is, holding a reference to an object means you can use that object.\n- JavaScript itself guarantees that _capabilities_ cannot be forged.\n  That is, a useful reference cannot be obtained by guessing its address.\n- JavaScript also enforces certain structures like closures and `WeakMap`\n  can guard capabilities. \n- The only way to obtain a _capability_ is to have received it as an argument,\n  return, global, or module of the surrounding compartmnet.\n- Once hardened, an object and its methods cannot be altered.\n\nThis gives us the foundation of the _Object-capability_ security paradigm,\nor simply \"OCaps\".\nFrom this point forward, any interesting policy can be created with code.\n\nWe can then use Endo to stretch references to Object-capabliities between\nprocesses and over networks.\nInstead of relying on the memory-safety of JavaScript, we then rely on\ncryptography to preserve confidentiality and unforgeability of references.  A\nsuitably large, signed, cryptographically random number, reachable over a\nnetwork over an encrypted connection, may safely designate a capability.\n\nThen, Endo puts ocaps directly into the hands of users with an example [Petname\nsystem][] called the _Pet Dæmon_, so user's can send, receive, and use\n_Object-capabilities_ with human-meaningful names.\n\n## Ruminations on the Name\n\n* In Greek, \"endo-\" means \"internal\" or \"within\".\n  This is fitting because Endo runs Node _within_ a safe sandbox.\n  This is fitting in turn because Endo is built on the legacy of Google Caja.\n  In Spanish, \"caja\" means \"box\" and is related to the Latin word \"capsum\" and\n  English \"capsule\", as in \"encapsulate\".\n* Endo is an anagram of Node and Deno.\n  That is to say, we are not Done yet.\n* The `endo` command, like the `sudo` command, is a \"do\" command.\n  However, instead of escalating privilege, it attenuates privilege.\n* Endo lets applications endow packages with limited powerful objects and\n  modules.  As they say, you can't spell \"endow\" without \"endo\"!\n* So, \"E.N.Do\" forms the acronym \"Encapsulated Node Do\".\n\nSo, just as \"soo-doo\" (super user do) and \"soo-doh\" (like \"pseudo\") are valid\npronunciations of `sudo`, \"en-doh\" and \"en-doo\" are both valid pronunciations of\n`endo`.\n\n<a name=\"§pola\"></a>\n### Principle of Least Authority\n\nThe Principle of Least Authority [(Wikipedia)][Principle of Least Authority]\nstates that a software component should only have access to data and resources\nthat enable it to do its legitimate work.\n\n**PoLA explained in 3 minutes:**\n_Opening Statement on SOSP 50th Anniversary Panel_, Mark Miller:\n\n[![Video presentation explaining PoLA in 3 minutes](https://img.youtube.com/vi/br9DwtjqmVI/0.jpg)](https://www.youtube.com/watch?v=br9DwtjqmVI)\n\n**PoLA explained in 15 minutes:**\n_Navigating the Attack Surface to achieve a multiplicative reduction in risk_,\nMark Miller:\n\n[![Video presentation explaining PoLA in 15 minutes](https://img.youtube.com/vi/wW9-KuezPp8/0.jpg)](https://www.youtube.com/watch?v=wW9-KuezPp8&t=664s)\n\n### Bug Disclosure\n\nPlease help us practice coordinated security bug disclosure, by using the\ninstructions in our [security guide](./packages/ses/SECURITY.md) to report\nsecurity-sensitive bugs privately.\n\nFor non-security bugs, please use the [regular Issues\npage](https://github.com/Agoric/SES-shim/issues).\n\n### License\n\nEndo and its components are [Apache 2.0 licensed][license-url].\n\n[CapTP]: packages/captp/README.md#endocaptp\n[E]: https://github.com/endojs/endo/tree/master/packages/eventual-send#eventual-send\n[Encapsulation]: https://en.wikipedia.org/wiki/Encapsulation_(computer_programming)\n[Endo Matrix]: https://matrix.to/#/#endojs:matrix.org\n[Endo Sync]: https://www.youtube.com/watch?v=tM5NyB7xxYM&list=PLzDw4TTug5O0eUj81Vnkp-mFuI4O0rBnc\n[Handled Promise]: packages/eventual-send/README.md\n[HardenedJS]: https://hardenedjs.org\n[LavaMoat]: https://github.com/LavaMoat/LavaMoat\n[OCapN]: https://ocapn.org\n[Object-capability Model]: https://en.wikipedia.org/wiki/Object-capability_model\n[Petname system]: https://en.wikipedia.org/wiki/Petname\n[Principle of Least Authority]: https://en.wikipedia.org/wiki/Principle_of_least_privilege\n[SES Proposal]: https://github.com/tc39/proposal-ses\n[SES Strategy Group]: https://groups.google.com/g/ses-strategy\n[SES Strategy Recordings]: https://www.youtube.com/playlist?list=PLzDw4TTug5O1jzKodRDp3qec8zl88oxGd\n[SES]: packages/ses/README.md\n[TG3]: https://github.com/tc39/tg3\n[contributing-svg]: https://img.shields.io/badge/PRs-welcome-brightgreen.svg\n[contributing-url]: ./CONTRIBUTING.md\n[license-image]: https://img.shields.io/badge/License-Apache%202.0-blue.svg\n[license-url]: ./LICENSE\n[supply chain attacks]: https://en.wikipedia.org/wiki/Supply_chain_attack\n","summary":"Endo is a JavaScript framework designed to secure software systems through confinement, robust communication, and hardened execution environments. By leveraging HardenedJS and the Object-capability Model, it enables developers to enforce the principle of least authority, effectively mitigating supply chain attacks and unauthorized access by third-party dependencies. Its capabilities, including eventual messaging and cross-process transport protocols, provide a scalable foundation for building secure plugins, smart contracts, and distributed applications. The project is ideal for security-conscious developers and platform architects aiming to isolate code execution while maintaining fine-grained control over resource access.","description":"Endo is a distributed secure JavaScript sandbox, based on SES","stars":1025,"language":"JavaScript"},{"owner":"batrachianai","repo":"toad","url":"https://github.com/batrachianai/toad","readme":"# Toad\r\n\r\nA unified interface for AI in your terminal ([release announcement](https://willmcgugan.github.io/toad-released/)).\r\n\r\n<table>\r\n\r\n  <tbody>\r\n\r\n  <tr>\r\n    <td><img alt=\"Screenshot 2026-01-30 at 19 23 54\" src=\"https://github.com/user-attachments/assets/aca51988-359a-466d-bdd1-050dc3d678ac\" /></td> \r\n    <td><img alt=\"Screenshot 2026-01-30 at 19 21 00\" src=\"https://github.com/user-attachments/assets/b9b0a6bb-e084-4976-86c2-cccdb42041ae\" /></td>    \r\n  </tr>\r\n\r\n  <tr>\r\n    <td><img alt=\"Screenshot 2026-01-30 at 19 29 47\" src=\"https://github.com/user-attachments/assets/3fe4060f-d468-4635-b80f-03c24625c6c0\" /></td>\r\n    <td><img alt=\"Screenshot 2026-01-30 at 19 30 08\" src=\"https://github.com/user-attachments/assets/03659d64-02fc-4936-a90d-e202bc4b70a1\" /></td>\r\n  </tr>\r\n    \r\n  </tbody>\r\n  \r\n</table>\r\n\r\n## Quickstart\r\n\r\nInstall:\r\n\r\n```\r\ncurl -fsSL batrachian.ai/install | sh\r\n```\r\n\r\nRun:\r\n\r\n```\r\ntoad\r\n```\r\n\r\nSee [Getting Started](#getting-started) if you have any problems.\r\n\r\n## What is Toad?\r\n\r\nToad is an interface to coding agents, such as Claude, Gemini, Codex, OpenHand, and many more. \r\n\r\nToad blends a traditional shell based workflow and powerful agentic AI, with an intuitive Terminal User Interface.\r\n\r\n<table>\r\n  <tbody>\r\n    <tr>\r\n      <td>\r\n        <h3>AI \"App store\"</h3>\r\n        <p>\r\n        Find, install, and run dozens of agents directly from the Toad UI.\r\n        <p>\r\n        There is a large and growing list of AI agents that work with Toad.\r\n        Discover agents from big tech and smaller Open Source projects.\r\n        <p>\r\n        Developers can add support for their own agents, via the <a href=\"https://agentclientprotocol.com/overview/introduction\">Agent Client Protocol</a>.\r\n      </td>\r\n      <td>\r\n        <img alt=\"Screenshot 2026-01-27 at 12 48 30\" src=\"https://github.com/user-attachments/assets/f7bd3776-6405-47e5-9d1f-11a12a4ce3b2\" />\r\n      </td>\r\n    </tr>\r\n    <tr>\r\n      <td>\r\n      <h3>Toad Shell</h3>\r\n      <p>\r\n      While most terminal agent interfaces can run commands (with the <kbd>!</kbd> syntax), they aren't running a shell.\r\n      If you change directory or set environment variables, they won't persist from one command to the next.\r\n      <p>\r\n      Output that contains more than simple text will typically be garbled, and anything interactive will fail or even break the TUI entirely.\r\n      <p>\r\n      Toad integrates a fully working shell with full-color output, interactive commands, and tab completion.\r\n      Allowing you to interleave prompts for the agent with terminal workflows.\r\n      <p>\r\n      At time of writing Toad is the only terminal UI which does this.\r\n      </td>\r\n      <td><img src=\"https://github.com/user-attachments/assets/ac9247bb-3daa-4bb7-b3fd-e0bbd22475fa\"/></td>        \r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Prompt Editor</h3>\r\n        <p>\r\n        Toad has a nice Markdown prompt editor, with syntax highlighting for code fences.\r\n        Full mouse support, cut and paste, many keybindings and shortcuts.\r\n      </td>\r\n      <td>\r\n        <img src=\"https://github.com/user-attachments/assets/3d619b94-ec53-4e7a-b905-5aef6f4fa8a6\"/>\r\n      </td>\r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>File Picker</h3>\r\n        <p>\r\n        Add a file to your prompt with <kbd>@</kbd>, and toad will show a fuzzy file picker.\r\n        <p>\r\n        Type a few characters from the filename or folder and Toad will refine the search as you type.\r\n        Hit <kbd>enter</kbd> to add the file to the prompt.\r\n        <p>\r\n        The fuzzy picker is great when you know the file you want to mention.\r\n        If you want to explore your files, you can press <kbd>tab</kbd> to switch to an interactive tree control.                \r\n      </td>\r\n      <td>\r\n        <img src=\"https://github.com/user-attachments/assets/ab25c389-1d2f-4006-a1d8-159edbd3ed00\"/>        \r\n      </td>\r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Beautiful Diffs</h3>\r\n        <p>\r\n        Side-by-side or unified diffs, with syntax highlighting for most languages.      \r\n      </td>\r\n      <td>\r\n        <img alt=\"Screenshot 2026-01-27 at 12 44 22\" src=\"https://github.com/user-attachments/assets/b3d6c29c-d6ec-4253-a9dc-2df0ff21e293\" />\r\n      </td>      \r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Elegant Markdown</h3>\r\n        <p>\r\n        Markdown is the language of LLMs (AI).\r\n        Toad's streaming Markdown support can display syntax highlighted code fences, elegant tables, quotes, lists, and more.\r\n      </td>\r\n      <td>\r\n        <img src=\"https://github.com/user-attachments/assets/b650b407-f4ab-4cb9-8920-55c15073598e\"/>\r\n      </td>\r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Simple Settings</h3>\r\n        <p>\r\n        An intuitive settings system (no need to manually edit JSON files).\r\n        <p>\r\n        Tune Toad to your liking.\r\n        Almost everything in Toad may be tweaked.\r\n        If you want to create an ultra-minimal UI with nothing more than a prompt—you can!                \r\n      </td>\r\n      <td>\r\n        <img src=\"https://github.com/user-attachments/assets/2ff0de12-c2e1-455b-954a-21e66c070dd8\"/>      \r\n      </td>    \r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Concurrent sessions</h3>\r\n        <p>\r\n        Launch and run multiple agents from potentially different providers.\r\n        <p>\r\n        Hit <kbd>ctrl+s</kbd> to show the current state of all your agents in one screen.\r\n        </p>        \r\n      </td> \r\n      <td>\r\n        <img  alt=\"Screenshot 2026-02-16 at 17 33 40-fs8\" src=\"https://github.com/user-attachments/assets/cd3128eb-b348-4f40-b5c0-4816d07dcbe9\" />\r\n      </td>    \r\n    </tr>\r\n    <tr>\r\n      <td>\r\n        <h3>Session Resume</h3>\r\n        <p>\r\n        Resume previous sessions with your agent.    \r\n        <p>\r\n        Hit <kbd>ctrl+r</kbd> to pick a previous session to resume.\r\n      </td>\r\n      <td>\r\n        <img alt=\"Screenshot 2026-02-01 at 16 57 46\" src=\"https://github.com/user-attachments/assets/7c1ad59e-027c-4542-a216-9a32ef573936\" />\r\n      </td>    \r\n    </tr>    \r\n  </tbody>\r\n</table>\r\n\r\n## Video\r\n\r\nWatch a preview of the Toad User Interface:\r\n\r\nhttps://github.com/user-attachments/assets/ced36f4b-db02-4d29-8a0a-14ec64b22881\r\n\r\n\r\n## Compatibility\r\n\r\nToad runs on Linux and macOS. Native Windows support is currently lacking (but on the roadmap), but Toad will run quite well with WSL.\r\n\r\nToad is a terminal application.\r\nAny terminal will work, although if you are using the default terminal on macOS you will get a much reduced experience.\r\nI recommend [Ghostty](https://ghostty.org/) which is fully featured and has amazing performance.\r\n\r\n### Clipboard\r\n\r\nOn Linux, you may need to install `xclip` to enable clipboard support.\r\n\r\n```\r\nsudo apt install xclip\r\n```\r\n\r\n## Getting Started\r\n\r\nThe easiest way to install Toad is by pasting the following in to your terminal:\r\n\r\n```bash\r\ncurl -fsSL batrachian.ai/install | sh\r\n```\r\n\r\nYou should now have `toad` installed.\r\n\r\nIf that doesn't work for any reason, then you can install with the following steps:\r\n\r\nFirst [install UV](https://docs.astral.sh/uv/getting-started/installation/):\r\n\r\n```bash\r\ncurl -LsSf https://astral.sh/uv/install.sh | sh\r\n```\r\n\r\nThen use UV to install toad:\r\n\r\n```bash\r\nuv tool install -U batrachian-toad --python 3.14\r\n```\r\n\r\nToad is also available on [conda-forge](https://conda-forge.org), and can be installed using [pixi](https://pixi.prefix.dev/latest/#installation):\r\n\r\n```bash\r\npixi global install batrachian-toad\r\n```\r\n\r\n## Using Toad\r\n\r\nLaunch Toad with the following:\r\n\r\n```bash\r\ntoad\r\n```\r\n\r\nYou should see something like this:\r\n\r\n<img alt=\"front-fs8\" src=\"https://github.com/user-attachments/assets/8831f7de-5349-4b3f-9de9-d4565b513108\" />\r\n\r\nFrom this screen you will be able to find, install, and launch a coding agent.\r\nIf you already have an agent installed, you can skip the install step.\r\nTo launch an agent, select it and press <kbd>space</kbd>.\r\n\r\nThe footer will always display the most significant keys for the current context.\r\nTo see all the keys, press <kbd>F1</kbd> to display the help panel.\r\n\r\n### Toad CLI\r\n\r\nWhen running Toad, the current working directory is assumed to be your project directory.\r\nTo use another project directory, add the path to the command.\r\nFor example:\r\n\r\n```bash\r\ntoad ~/projects/my-awesome-app\r\n```\r\n\r\nIf you want to skip the initial agent screen, add the `-a` switch with the name of your chosen agent.\r\nFor example:\r\n\r\n```bash\r\ntoad -a open-hands\r\n```\r\n\r\nTo see all subcommands and switches, add the `--help` switch:\r\n\r\n```bash\r\ntoad --help\r\n```\r\n\r\n### Web server\r\n\r\nYou can run Toad as a web application.\r\n\r\nRun the following, and click the link in the terminal:\r\n\r\n```bash\r\ntoad serve\r\n```\r\n\r\n![textual-serve](https://github.com/user-attachments/assets/1d861d48-d30b-44cd-972d-5986a01360bf)\r\n\r\n## Toad development\r\n\r\nToad was built by [Will McGugan](https://github.com/willmcgugan) and is currently under active development.\r\n\r\nTo discuss Toad, see the Discussions tab, or join the #toad channel on the [Textualize discord server](https://discord.gg/Enf6Z3qhVr).\r\n\r\n\r\n\r\n### Roadmap\r\n\r\nSome planned features:\r\n\r\n- [ ] UI for MCP servers\r\n- [ ] Expose model selection (waiting on ACP update)\r\n- [x] Sessions (resume)\r\n- [x] Multiple agents\r\n- [ ] Windows native support\r\n- [ ] Builtin editor\r\n- [ ] Sidebar (widgets)\r\n  - [ ] Git pending changes\r\n\r\n### Reporting bugs\r\n\r\nThis project is trialling a non-traditional approach to issues.\r\nBefore an issue is created, there must be a post in Discussions, approved by a Toad dev (Currently @willmcgugan).\r\n\r\nBy allowing the discussions to happen in the Discussion tabs, issues can be reserved for actionable tasks with a clear description and goal.\r\n\r\n\r\n## Licensing\r\n\r\nToad is licensed under the [AGPL](./LICENSE) license. Commercial licenses are available. See [COMMERCIAL_LICENSE.md](./COMMERCIAL_LICENSE.md).\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n","summary":"Toad is a unified terminal user interface designed to integrate AI coding agents directly into your command-line workflow. It distinguishes itself by embedding a fully functional shell that supports persistent state, interactive commands, and full-color output, alongside features like a Markdown-based prompt editor and a fuzzy file picker. By supporting the Agent Client Protocol, it serves as a central hub for discovering and running diverse agents from various providers. This tool is ideal for developers who want to seamlessly interleave agentic AI capabilities with traditional terminal operations within a single, cohesive environment.","description":"A unified interface for AI in your terminal.","stars":3180,"language":"Python"},{"owner":"vercel-labs","repo":"just-bash","url":"https://github.com/vercel-labs/just-bash","readme":"# just-bash monorepo\n\nThis repository hosts the [`just-bash`](./packages/just-bash) package and its examples.\n\n## Packages\n\n| Package | Path | Description |\n| --- | --- | --- |\n| [`just-bash`](./packages/just-bash) | `packages/just-bash` | A simulated bash environment with virtual filesystem |\n\nSee the package's own [README](./packages/just-bash/README.md) for usage documentation.\n\n## Layout\n\n```\npackages/         publishable npm packages\nexamples/         example consumers (bash-agent, cjs-consumer, website)\n.github/          CI workflows\n```\n\n## Working in the repo\n\n```bash\npnpm install              # install all workspace deps\npnpm build                # build all packages\npnpm test:run             # run unit + comparison tests\npnpm test:dist            # smoke-test the bundled output\npnpm lint                 # biome + per-package banned-pattern checks\npnpm typecheck            # tsc across all packages\n```\n\nPer-package commands run via `pnpm --filter <name> <script>` — e.g.\n`pnpm --filter just-bash test:wasm`.\n","summary":"The `just-bash` project provides a simulated bash environment equipped with a virtual filesystem, enabling developers to execute shell commands within a controlled, sandboxed runtime. By utilizing a virtualized environment, it allows for portable and predictable script execution independent of the host operating system's native shell. This tool is particularly beneficial for developers building automation agents, testing command-line interfaces, or creating web-based environments that require secure bash functionality.","description":"Bash for Agents","stars":3632,"language":"TypeScript"},{"owner":"pi0","repo":"pi-vscode","url":"https://github.com/pi0/pi-vscode","readme":"# pi-vscode\n\n[![VS Code Marketplace](https://img.shields.io/visual-studio-marketplace/v/pi0.pi-vscode?label=VS%20Code%20Marketplace&color=blue)](https://marketplace.visualstudio.com/items?itemName=pi0.pi-vscode) [![Open VSX](https://img.shields.io/open-vsx/v/pi0/pi-vscode?label=Open%20VSX&color=purple)](https://open-vsx.org/extension/pi0/pi-vscode)\n\nMinimal VS Code extension for [pi coding agent](https://pi.dev/).\n\n## Features\n\n- **Terminal-based** — Opens pi as an integrated terminal with full TUI/PTY support (opens beside the editor)\n- **VS Code bridge** — Bundles a pi extension and local bridge so pi can query live editor state\n- **Editor awareness** — pi can inspect the active editor, current/latest selection, open editors, workspace folders, and VS Code diagnostics (LSP / lint / type errors)\n- **Live VS Code footer status** — pi's terminal UI shows the active VS Code file, cursor/selection, language, dirty marker, and diagnostic counts in its bottom status area\n- **Status bar button** — PI button in the status bar for quick access\n- **Open with file context** — Send current file path and line range (or cursor position) to pi, available from the editor title bar\n- **Send selection** — Send selected text directly to the pi terminal\n- **`@pi` chat participant** — Use `@pi` in VS Code Chat for streamed RPC-backed replies while keeping the terminal workflow for normal Pi sessions\n- **Package manager** — Browse, search, install, and uninstall pi packages from the sidebar with live output streaming and cancel support; automatically detects package capabilities (extensions, skills, prompts, themes)\n- **Auto-detection** — Finds the pi binary automatically from common paths (`~/.bun/bin`, `~/.local/bin`, `~/.npm-global/bin`)\n\n<img width=\"945\" height=\"725\" alt=\"image\" src=\"https://github.com/user-attachments/assets/91dbaca4-6d27-490a-8395-94a9c4d07625\" />\n\n## Requirements\n\n- `pi` CLI installed (`npm i -g @mariozechner/pi-coding-agent` or `bun i -g @mariozechner/pi-coding-agent`)\n- An API key configured for at least one provider\n\n## Install\n\nAvailable on the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=pi0.pi-vscode) and [Open VSX](https://open-vsx.org/extension/pi0/pi-vscode):\n\n```bash\n# VS Code / Cursor\next install pi0.pi-vscode\n\n# Open VSX (VSCodium, etc.)\novsx get pi0.pi-vscode\n```\n\n## Commands\n\n| Command                       | Keybinding       | Description                                                                              |\n| ----------------------------- | ---------------- | ---------------------------------------------------------------------------------------- |\n| `Pi: Open`                    | `Ctrl+Alt+3`     | Open or focus the pi terminal                                                            |\n| `Pi: Open with File`          | Editor title bar | Open pi with current file context                                                        |\n| `Pi
