<script id="project-data" type="application/json">[{"owner":"steipete","repo":"CodexBar","url":"https://github.com/steipete/CodexBar","readme":"# CodexBar 🎚️ — May your tokens never run out.\n\n> Every AI coding limit, in your menu bar.\n\n[![Latest release](https://img.shields.io/github/v/release/steipete/CodexBar?style=flat-square&color=0a0a0c)](https://github.com/steipete/CodexBar/releases/latest)\n[![macOS 14+](https://img.shields.io/badge/macOS-14%2B-0a0a0c?style=flat-square)](https://github.com/steipete/CodexBar/releases/latest)\n[![Homebrew](https://img.shields.io/badge/brew-steipete%2Ftap%2Fcodexbar-orange?style=flat-square)](https://github.com/steipete/homebrew-tap)\n[![AUR](https://img.shields.io/aur/version/codexbar-cli?style=flat-square&color=1793d1)](https://aur.archlinux.org/packages/codexbar-cli)\n[![License: MIT](https://img.shields.io/badge/license-MIT-6e5aff?style=flat-square)](LICENSE)\n[![Site](https://img.shields.io/badge/site-codexbar.app-16d3b4?style=flat-square)](https://codexbar.app)\n\n<a href=\"https://codexbar.app\"><img src=\"docs/social.png\" alt=\"CodexBar — every AI coding limit in your menu bar. 40+ providers.\" width=\"100%\" /></a>\n\nTiny macOS 14+ menu bar app that keeps **AI coding-provider limits visible** and shows when each window resets. Codex, OpenAI, Claude, Cursor, Gemini, Copilot, Grok, GroqCloud, ElevenLabs, Deepgram, z.ai, MiniMax, Kiro, Vertex AI, Augment, OpenRouter, LLM Proxy, Codebuff, Command Code, AWS Bedrock, and many newer coding providers. One status item per provider, or Merge Icons mode with a provider switcher. No Dock icon, minimal UI, dynamic bar icons.\n\n<img src=\"codexbar.png\" alt=\"CodexBar menu popover with provider tiles, usage bars, and reset countdowns\" width=\"520\" />\n\n## Why\n\n- **Plan around resets.** Per-provider session, weekly, and monthly windows with countdowns to the next reset — stop guessing whether to start that long task.\n- **Credits, spend, and cost scans.** Credit balances, Admin API spend dashboards, provider billing summaries, and local cost scans where the source exposes enough detail.\n- **Live status.** Provider status polling surfaces incident badges in the menu and an indicator overlay on the bar icon.\n- **Privacy-first.** Reuses existing provider sessions — OAuth, device flow, API keys, browser cookies, local files — so no passwords are stored.\n\n## Install\n\n### Requirements\n- macOS 14+ (Sonoma)\n\n### GitHub Releases\nDownload: <https://github.com/steipete/CodexBar/releases>\n\n### Homebrew\n```bash\nbrew install --cask codexbar\n```\n\n### CLI Tarballs (macOS/Linux)\nHomebrew formula (Linux today):\n```bash\nbrew install steipete/tap/codexbar\n```\nArch Linux AUR package:\n```bash\nyay -S codexbar-cli\n```\nOr download release tarballs from GitHub Releases:\n- macOS: `CodexBarCLI-v<tag>-macos-arm64.tar.gz`, `CodexBarCLI-v<tag>-macos-x86_64.tar.gz`\n- Linux: `CodexBarCLI-v<tag>-linux-aarch64.tar.gz`, `CodexBarCLI-v<tag>-linux-x86_64.tar.gz`\n\n### First run\n- Open Settings → Providers and enable what you use.\n- Install/sign in to the provider sources you rely on: CLIs, browser sessions, OAuth/device flow, API keys, local app files, or provider apps depending on the provider.\n- Optional: Settings → Providers → Codex → OpenAI cookies (Automatic or Manual) to add dashboard extras.\n\n### Set API keys from the CLI\nProvider toggles and API keys live in `~/.codexbar/config.json`. You can script the same provider list that Settings → Providers uses:\n\n```bash\ncodexbar config providers\ncodexbar config enable --provider grok\ncodexbar config disable --provider cursor\n```\n\nFor API-key providers, store a key without opening Settings:\n\n```bash\nprintf '%s' \"$ELEVENLABS_API_KEY\" | codexbar config set-api-key --provider elevenlabs --stdin\n```\n\n`set-api-key` trims the piped value, stores it with restrictive config-file permissions, and enables the provider by default. Use `--no-enable` to only save the key, or `--api-key <key>` for one-off local scripts where shell history is not a concern.\nSee [CLI configuration](docs/cli-configuration.md) for the full flow.\n\n## Providers\n\n- [Codex](docs/codex.md) — OAuth API or local Codex CLI, plus optional OpenAI web dashboard extras.\n- [OpenAI](docs/openai.md) — Admin API key usage/cost graphs with legacy credit-balance fallback.\n- [Claude](docs/claude.md) — OAuth API, browser cookies, or CLI PTY fallback; session and weekly usage where available.\n- [Cursor](docs/cursor.md) — Browser session cookies for plan + usage + billing resets.\n- [OpenCode](docs/opencode.md) — Browser cookies for workspace subscription usage.\n- [OpenCode Go](docs/opencode.md) — Browser cookies for Go usage windows.\n- [Alibaba Coding Plan](docs/alibaba-coding-plan.md) — Web cookies or API key for coding-plan quotas.\n- [Alibaba Token Plan](docs/alibaba-token-plan.md) — Bailian browser/manual cookies for token-plan credits.\n- [Gemini](docs/gemini.md) — OAuth-backed quota API using Gemini CLI credentials (no browser cookies).\n- [Antigravity](docs/antigravity.md) — Local language server probe (experimental); no external auth.\n- [Droid](docs/factory.md) — Browser cookies + WorkOS token flows for Factory usage + billing.\n- [Copilot](docs/copilot.md) — GitHub device flow + Copilot internal usage API.\n- [z.ai](docs/zai.md) — API token for quota + MCP windows.\n- [Manus](docs/manus.md) — Browser `session_id` auth for credit balance, monthly credits, and daily refresh tracking.\n- [MiniMax](docs/minimax.md) — API token, cookie header, or browser cookies for coding-plan usage.\n- [Kimi](docs/kimi.md) — Auth token (JWT from `kimi-auth` cookie) for weekly quota + 5‑hour rate limit.\n- [Kimi K2 (unofficial)](docs/kimi-k2.md) — Legacy API key flow for credit-based usage totals.\n- [Kilo](docs/kilo.md) — API token with CLI-auth fallback for Kilo Pass usage.\n- [Kiro](docs/kiro.md) — CLI-based usage; monthly credits + bonus credits.\n- [Vertex AI](docs/vertexai.md) — Google Cloud gcloud OAuth with token cost tracking from local Claude logs.\n- [Augment](docs/augment.md) — Augment CLI or browser cookies for credits tracking and usage monitoring.\n- [Amp](docs/amp.md) — Browser cookie-based authentication with Amp Free usage tracking.\n- [Ollama](docs/ollama.md) — API key access plus browser cookies for Ollama Cloud usage windows.\n- [JetBrains AI](docs/jetbrains.md) — Local XML-based quota from JetBrains IDE configuration; monthly credits tracking.\n- [Warp](docs/warp.md) — API token for GraphQL request limits and monthly credits.\n- [ElevenLabs](docs/elevenlabs.md) — API key for character credits and voice slot usage.\n- [OpenRouter](docs/openrouter.md) — API token for credit-based usage tracking across multiple AI providers.\n- [Windsurf](docs/windsurf.md) — Browser localStorage session import or local SQLite cache for plan usage.\n- Perplexity — Account usage credits from Perplexity usage data.\n- [Xiaomi MiMo](docs/mimo.md) — Browser cookies for balance and token-plan usage.\n- [Doubao](docs/doubao.md) — API key for Volcengine Ark request-limit probes.\n- [Abacus AI](docs/abacus.md) — Browser cookie auth for ChatLLM/RouteLLM compute credit tracking.\n- Mistral — Browser cookies for monthly spend tracking.\n- [DeepSeek](docs/deepseek.md) — API key for credit balance tracking (paid vs. granted breakdown).\n- [Moonshot / Kimi API](docs/moonshot.md) — API key for Moonshot/Kimi API account balance tracking.\n- [Venice](docs/venice.md) — API key for DIEM or USD balance tracking.\n- [Codebuff](docs/codebuff.md) — API token (or `~/.config/manicode/credentials.json`) for credit balance + weekly rate limit.\n- [Crof](docs/crof.md) — API key for dollar credit balance and request quota tracking.\n- [Command Code](docs/command-code.md) — Browser cookies for monthly USD credits from Command Code billing.\n- [StepFun](docs/stepfun.md) — Username + password login for Step Plan rate limits (5‑hour + weekly windows) and subscription plan name.\n- [AWS Bedrock](docs/bedrock.md) — AWS access keys or a named AWS profile (SSO/assume-role via the AWS CLI) for Cost Explorer usage and monthly budget tracking.\n- [Grok](docs/grok.md) — Grok CLI billing RPC plus grok.com browser-session fallback.\n- [GroqCloud](docs/groqcloud.md) — API key for Enterprise Prometheus request/token/cache-hit metrics.\n- [LLM Proxy](docs/llm-proxy.md) — API key + base URL for aggregate proxy quota stats and provider breakdowns.\n- [Deepgram](docs/deepgram.md) — API key usage summaries across speech, agent, token, and TTS metrics.\n- Open to new providers: [provider authoring guide](docs/provider.md).\n\n## Icon & Screenshot\nThe menu bar icon is a tiny usage meter. Bar meaning is provider-specific, and errors/stale data can dim the icon or\nshow an incident indicator.\n\n## Features\n- Multi-provider menu bar with per-provider toggles (Settings → Providers).\n- Provider-specific usage meters with reset countdowns.\n- Optional Codex web dashboard enrichments (code review remaining, usage breakdown, credits history).\n- Inline spend and usage charts for API-backed providers such as OpenAI, Claude Admin API, OpenRouter, z.ai, MiniMax, Mistral, and AWS Bedrock.\n- Configurable cost-usage scans for Codex + Claude, plus reused chart UI for supported provider histories.\n- Provider status polling with incident badges in the menu and icon overlay.\n- Merge Icons mode to combine providers into one status item + switcher.\n- Display controls for provider icons, labels, bars, reset-time style, and highest-usage auto-selection.\n- Refresh cadence presets (manual, 1m, 2m, 5m, 15m).\n- Bundled CLI (`codexbar`) for scripts and CI (including `codexbar cost --provider codex`, `claude`, or `both` for local cost usage); macOS and Linux CLI builds available.\n- WidgetKit widgets for supported providers.\n- Optional session quota notifications and weekly-reset confetti.\n- Privacy-first: on-device parsing by default; browser cookies are opt-in and reused (no passwords stored).\n\n## Privacy note\nWondering if CodexBar scans your disk? It doesn’t crawl your filesystem; it reads a small set of known locations (browser cookies/local storage, provider config files, local JSONL logs) when the related features are enabled. Provider tokens and token-account settings live in `~/.codexbar/config.json` with restrictive file permissions. See the discussion and audit notes in [issue #12](https://github.com/steipete/CodexBar/issues/12).\n\n## macOS permissions (why they’re needed)\n- **Full Disk Access (optional)**: only required to read Safari cookies/local storage for web-based providers. If you don’t grant it, use another supported browser, manual cookies/API keys, OAuth, or CLI/local sources where that provider supports them.\n- **Keychain access (prompted by macOS)**:\n  - Chromium cookie import needs the browser “Safe Storage” key to decrypt cookies.\n  - Claude OAuth bootstrap may read the Claude CLI Keychain item when CodexBar has no usable cached credentials.\n  - CodexBar may use Keychain for browser cookie decryption, cached cookie headers, and OAuth/device-flow credentials where those sources require it.\n  - **How do I prevent those keychain alerts?**\n    - Open **Keychain Access.app** → login keychain → search the prompted item (for Claude OAuth, usually “Claude Code-credentials”).\n    - Open the item → **Access Control** → add `CodexBar.app` under “Always allow access by these applications”.\n    - Prefer adding just CodexBar (avoid “Allow all applications” unless you want it wide open).\n    - Relaunch CodexBar after saving.\n    - Reference screenshot: ![Keychain access control](docs/keychain-allow.png)\n  - **How to do the same for the browser?**\n    - Find the browser’s “Safe Storage” key (e.g., “Chrome Safe Storage”, “Brave Safe Storage”, “Microsoft Edge Safe Storage”).\n    - Open the item → **Access Control** → add `CodexBar.app` under “Always allow access by these applications”.\n    - This removes the prompt when CodexBar decrypts cookies for that browser.\n  - **Last resort — stop all Keychain reads entirely**: if \"Always Allow\" doesn't stick (e.g., macOS resets the ACL after a Chromium update or a `partition_id` reset), open **CodexBar → Settings → Advanced → Keychain access** and enable **Disable Keychain access**. CodexBar will no longer touch the Keychain. Browser-cookie-based providers will be skipped, but Claude/Codex OAuth via the CLI still works (it reads `~/.codex` / `~/.claude` config files, not the Keychain).\n- **Files & Folders prompts (folder/volume access)**: CodexBar launches provider CLIs and local probes for some providers. If those helpers read a project directory or external drive, macOS may ask CodexBar for that folder/volume (e.g., Desktop or an external volume). This is driven by the helper’s working directory, not background disk scanning.\n- **What we do not request in the background**: no Screen Recording or Accessibility permissions; user-triggered helper actions may ask macOS for Automation permission to open Terminal. No passwords are stored (browser cookies are reused when you opt in).\n\n## Docs\n- Providers overview: [docs/providers.md](docs/providers.md)\n- Provider authoring: [docs/provider.md](docs/provider.md)\n- Issue labeling guide: [docs/ISSUE_LABELING.md](docs/ISSUE_LABELING.md)\n- UI & icon notes: [docs/ui.md](docs/ui.md)\n- CLI reference: [docs/cli.md](docs/cli.md)\n- Configuration: [docs/configuration.md](docs/configuration.md)\n- CLI configuration: [docs/cli-configuration.md](docs/cli-configuration.md)\n- Widgets: [docs/widgets.md](docs/widgets.md)\n- Architecture: [docs/architecture.md](docs/architecture.md)\n- Refresh loop: [docs/refresh-loop.md](docs/refresh-loop.md)\n- Status polling: [docs/status.md](docs/status.md)\n- Sparkle updates: [docs/sparkle.md](docs/sparkle.md)\n- Packaging: [docs/packaging.md](docs/packaging.md)\n- Development: [docs/DEVELOPMENT.md](docs/DEVELOPMENT.md)\n- Release checklist: [docs/RELEASING.md](docs/RELEASING.md)\n- Changelog: [CHANGELOG.md](CHANGELOG.md)\n\n## Getting started (dev)\n- Clone the repo and open it in Xcode or run the scripts directly.\n- Launch once, then toggle providers in Settings → Providers.\n- Install/sign in to provider sources you rely on (CLIs, browser cookies, OAuth/device flow, API keys, or local app/config files).\n- Optional: set OpenAI cookies (Automatic or Manual) for Codex dashboard extras.\n\n## Build from source\nRequires macOS 14+ and Swift 6.2+.\n\n```bash\n./Scripts/package_app.sh        # builds CodexBar.app in-place\nCODEXBAR_SIGNING=adhoc ./Scripts/package_app.sh  # ad-hoc signing (no Apple Developer account)\nopen CodexBar.app\n```\n\nDev loop:\n```bash\n./Scripts/compile_and_run.sh\n./Scripts/compile_and_run.sh --test  # also run swift test before packaging/relaunching\nmake check                           # SwiftFormat + SwiftLint\nmake docs-list                       # list docs with frontmatter summaries\n```\n\nCLI install:\n```bash\n# after installing CodexBar.app in /Applications\n./bin/install-codexbar-cli.sh\n```\n\n## Related\n- ✂️ [Trimmy](https://github.com/steipete/Trimmy) — “Paste once, run once.” Flatten multi-line shell snippets so they paste and run.\n- 🧳 [MCPorter](https://mcporter.dev) — TypeScript toolkit + CLI for Model Context Protocol servers.\n- 🧿 [oracle](https://askoracle.dev) — Ask the oracle when you're stuck. Invoke GPT-5 Pro with a custom context and files.\n\n## Looking for a Windows version?\n- [Win-CodexBar](https://github.com/Finesssee/Win-CodexBar)\n\n## Linux desktop integration?\n- [codexbar-waybar](https://github.com/Marouan-chak/codexbar-waybar) — Waybar custom module + GTK4 popover for Hyprland / Sway / other Wayland compositors, built on top of the bundled Linux CLI.\n- [Codexbar GNOME](https://extensions.gnome.org/extension/9841/codexbar/) — GNOME Shell extension that brings CodexBar usage into the desktop panel.\n- [noctalia-codex-usage](https://github.com/rayoplateado/noctalia-codex-usage) — Noctalia/Quickshell plugin that shows Codex 5-hour and weekly usage limits, built on top of the bundled Linux CLI.\n\n\n## Credits\nInspired by [ccusage](https://github.com/ryoppippi/ccusage) (MIT), specifically the cost usage tracking.\n\n## License\nMIT • Peter Steinberger ([steipete](https://twitter.com/steipete))\n","summary":"CodexBar is a lightweight macOS menu bar utility designed to track usage limits and reset countdowns for over 40 popular AI coding services, including OpenAI, Claude, GitHub Copilot, and Cursor. The application provides real-time visibility into your credit balances, spend dashboards, and service status, helping users plan their workflows around provider-specific usage caps. By leveraging existing authentication methods like browser cookies and API keys, it ensures a privacy-first approach without requiring stored passwords. This tool is ideal for developers and AI power users who rely on multiple generative coding tools and need to monitor their remaining capacity at a glance.","description":"Show usage stats for OpenAI Codex and Claude Code, without having to login.","stars":14113,"language":"Swift"},{"owner":"google","repo":"langextract","url":"https://github.com/google/langextract","readme":"<p align=\"center\">\n  <a href=\"https://github.com/google/langextract\">\n    <img src=\"https://raw.githubusercontent.com/google/langextract/main/docs/_static/logo.svg\" alt=\"LangExtract Logo\" width=\"128\" />\n  </a>\n</p>\n\n# LangExtract\n\n[![PyPI version](https://img.shields.io/pypi/v/langextract.svg)](https://pypi.org/project/langextract/)\n[![GitHub stars](https://img.shields.io/github/stars/google/langextract.svg?style=social&label=Star)](https://github.com/google/langextract)\n![Tests](https://github.com/google/langextract/actions/workflows/ci.yaml/badge.svg)\n[![DOI](https://zenodo.org/badge/DOI/10.5281/zenodo.17015089.svg)](https://doi.org/10.5281/zenodo.17015089)\n\n## Table of Contents\n\n- [Introduction](#introduction)\n- [Why LangExtract?](#why-langextract)\n- [Quick Start](#quick-start)\n- [Installation](#installation)\n- [API Key Setup for Cloud Models](#api-key-setup-for-cloud-models)\n- [Adding Custom Model Providers](#adding-custom-model-providers)\n- [Using OpenAI Models](#using-openai-models)\n- [Using Local LLMs with Ollama](#using-local-llms-with-ollama)\n- [More Examples](#more-examples)\n  - [*Romeo and Juliet* Full Text Extraction](#romeo-and-juliet-full-text-extraction)\n  - [Medication Extraction](#medication-extraction)\n  - [Radiology Report Structuring: RadExtract](#radiology-report-structuring-radextract)\n- [Community Providers](#community-providers)\n- [Contributing](#contributing)\n- [Testing](#testing)\n- [Disclaimer](#disclaimer)\n\n## Introduction\n\nLangExtract is a Python library that uses LLMs to extract structured information from unstructured text documents based on user-defined instructions. It processes materials such as clinical notes or reports, identifying and organizing key details while ensuring the extracted data corresponds to the source text.\n\n## Why LangExtract?\n\n1.  **Precise Source Grounding:** Maps every extraction to its exact location in the source text, enabling visual highlighting for easy traceability and verification.\n2.  **Reliable Structured Outputs:** Enforces a consistent output schema based on your few-shot examples, leveraging controlled generation in supported models like Gemini to guarantee robust, structured results.\n3.  **Optimized for Long Documents:** Overcomes the \"needle-in-a-haystack\" challenge of large document extraction by using an optimized strategy of text chunking, parallel processing, and multiple passes for higher recall.\n4.  **Interactive Visualization:** Instantly generates a self-contained, interactive HTML file to visualize and review thousands of extracted entities in their original context.\n5.  **Flexible LLM Support:** Supports your preferred models, from cloud-based LLMs like the Google Gemini family to local open-source models via the built-in Ollama interface.\n6.  **Adaptable to Any Domain:** Define extraction tasks for any domain using just a few examples. LangExtract adapts to your needs without requiring any model fine-tuning.\n7.  **Leverages LLM World Knowledge:** Utilize precise prompt wording and few-shot examples to influence how the extraction task may utilize LLM knowledge. The accuracy of any inferred information and its adherence to the task specification are contingent upon the selected LLM, the complexity of the task, the clarity of the prompt instructions, and the nature of the prompt examples.\n\n## Quick Start\n\n> **Note:** Using cloud-hosted models like Gemini requires an API key. See the [API Key Setup](#api-key-setup-for-cloud-models) section for instructions on how to get and configure your key.\n\nExtract structured information with just a few lines of code.\n\n### 1. Define Your Extraction Task\n\nFirst, create a prompt that clearly describes what you want to extract. Then, provide a high-quality example to guide the model.\n\n```python\nimport langextract as lx\nimport textwrap\n\n# 1. Define the prompt and extraction rules\nprompt = textwrap.dedent(\"\"\"\\\n    Extract characters, emotions, and relationships in order of appearance.\n    Use exact text for extractions. Do not paraphrase or overlap entities.\n    Provide meaningful attributes for each entity to add context.\"\"\")\n\n# 2. Provide a high-quality example to guide the model\nexamples = [\n    lx.data.ExampleData(\n        text=\"ROMEO. But soft! What light through yonder window breaks? It is the east, and Juliet is the sun.\",\n        extractions=[\n            lx.data.Extraction(\n                extraction_class=\"character\",\n                extraction_text=\"ROMEO\",\n                attributes={\"emotional_state\": \"wonder\"}\n            ),\n            lx.data.Extraction(\n                extraction_class=\"emotion\",\n                extraction_text=\"But soft!\",\n                attributes={\"feeling\": \"gentle awe\"}\n            ),\n            lx.data.Extraction(\n                extraction_class=\"relationship\",\n                extraction_text=\"Juliet is the sun\",\n                attributes={\"type\": \"metaphor\"}\n            ),\n        ]\n    )\n]\n```\n\n> **Note:** Examples drive model behavior. Each `extraction_text` should ideally be verbatim from the example's `text` (no paraphrasing), listed in order of appearance. LangExtract raises `Prompt alignment` warnings by default if examples don't follow this pattern—resolve these for best results.\n>\n> **Grounding:** LLMs may occasionally extract content from few-shot examples rather than the input text. LangExtract automatically detects this: extractions that cannot be located in the source text will have `char_interval = None`. Filter these out with `[e for e in result.extractions if e.char_interval]` to keep only grounded results.\n\n### 2. Run the Extraction\n\nProvide your input text and the prompt materials to the `lx.extract` function.\n\n```python\n# The input text to be processed\ninput_text = \"Lady Juliet gazed longingly at the stars, her heart aching for Romeo\"\n\n# Run the extraction\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=prompt,\n    examples=examples,\n    model_id=\"gemini-3.5-flash\",\n)\n```\n\n> **Model Selection**: `gemini-3.5-flash` is the recommended default, offering strong extraction quality for LangExtract's schema-constrained workflows. For high-volume or cost-sensitive workloads, consider the current stable Flash-Lite model, `gemini-3.1-flash-lite`; for highly complex tasks requiring deeper reasoning, evaluate a current Gemini Pro model from the official model documentation. For large-scale or production use, a paid Gemini tier is suggested to increase throughput and avoid rate limits. See the [rate-limit documentation](https://ai.google.dev/gemini-api/docs/rate-limits#usage-tiers) for details.\n>\n> **Model Lifecycle**: Note that Gemini models have a lifecycle with defined retirement dates. Users should consult the [official model version documentation](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/model-versions) to stay informed about the latest stable and legacy versions.\n\n### 3. Visualize the Results\n\nThe extractions can be saved to a `.jsonl` file, a popular format for working with language model data. LangExtract can then generate an interactive HTML visualization from this file to review the entities in context.\n\n```python\n# Save the results to a JSONL file\nlx.io.save_annotated_documents([result], output_name=\"extraction_results.jsonl\", output_dir=\".\")\n\n# Generate the visualization from the file\nhtml_content = lx.visualize(\"extraction_results.jsonl\")\nwith open(\"visualization.html\", \"w\") as f:\n    if hasattr(html_content, 'data'):\n        f.write(html_content.data)  # For Jupyter/Colab\n    else:\n        f.write(html_content)\n```\n\nThis creates an animated and interactive HTML file:\n\n![Romeo and Juliet Basic Visualization ](https://raw.githubusercontent.com/google/langextract/main/docs/_static/romeo_juliet_basic.gif)\n\n> **Note on LLM Knowledge Utilization:** This example demonstrates extractions that stay close to the text evidence - extracting \"longing\" for Lady Juliet's emotional state and identifying \"yearning\" from \"gazed longingly at the stars.\" The task could be modified to generate attributes that draw more heavily from the LLM's world knowledge (e.g., adding `\"identity\": \"Capulet family daughter\"` or `\"literary_context\": \"tragic heroine\"`). The balance between text-evidence and knowledge-inference is controlled by your prompt instructions and example attributes.\n\n### Scaling to Longer Documents\n\nFor larger texts, you can process entire documents directly from URLs with parallel processing and enhanced sensitivity:\n\n```python\n# Process Romeo & Juliet directly from Project Gutenberg\nresult = lx.extract(\n    text_or_documents=\"https://www.gutenberg.org/files/1513/1513-0.txt\",\n    prompt_description=prompt,\n    examples=examples,\n    model_id=\"gemini-3.5-flash\",\n    extraction_passes=3,    # Improves recall through multiple passes\n    max_workers=20,         # Parallel processing for speed\n    max_char_buffer=1000    # Smaller contexts for better accuracy\n)\n```\n\nThis approach can extract hundreds of entities from full novels while maintaining high accuracy. The interactive visualization seamlessly handles large result sets, making it easy to explore hundreds of entities from the output JSONL file. **[See the full *Romeo and Juliet* extraction example →](https://github.com/google/langextract/blob/main/docs/examples/longer_text_example.md)** for detailed results and performance insights.\n\n### Vertex AI Batch Processing\n\nSave costs on large-scale tasks by enabling Vertex AI Batch API: `language_model_params={\"vertexai\": True, \"batch\": {\"enabled\": True}}`.\n\nSee an example of the Vertex AI Batch API usage in [this example](docs/examples/batch_api_example.md).\n\n## Installation\n\n### From PyPI\n\n```bash\npip install langextract\n```\n\n*Recommended for most users. For isolated environments, consider using a virtual environment:*\n\n```bash\npython -m venv langextract_env\nsource langextract_env/bin/activate  # On Windows: langextract_env\\Scripts\\activate\npip install langextract\n```\n\n### From Source\n\nLangExtract uses modern Python packaging with `pyproject.toml` for dependency management:\n\n*Installing with `-e` puts the package in development mode, allowing you to modify the code without reinstalling.*\n\n\n```bash\ngit clone https://github.com/google/langextract.git\ncd langextract\n\n# For basic installation:\npip install -e .\n\n# For development (includes linting tools):\npip install -e \".[dev]\"\n\n# For testing (includes pytest):\npip install -e \".[test]\"\n```\n\n### Docker\n\n```bash\ndocker build -t langextract .\ndocker run --rm -e LANGEXTRACT_API_KEY=\"your-api-key\" langextract python your_script.py\n```\n\n## API Key Setup for Cloud Models\n\nWhen using LangExtract with cloud-hosted models (like Gemini or OpenAI), you'll need to\nset up an API key. On-device models don't require an API key. For developers\nusing local LLMs, LangExtract offers built-in support for Ollama and can be\nextended to other third-party APIs by updating the inference endpoints.\n\n### API Key Sources\n\nGet API keys from:\n\n*   [AI Studio](https://aistudio.google.com/app/apikey) for Gemini models\n*   [Vertex AI](https://cloud.google.com/vertex-ai/generative-ai/docs/sdks/overview) for enterprise use\n*   [OpenAI Platform](https://platform.openai.com/api-keys) for OpenAI models\n\n### Setting up API key in your environment\n\n**Option 1: Environment Variable**\n\n```bash\nexport LANGEXTRACT_API_KEY=\"your-api-key-here\"\n```\n\n**Option 2: .env File (Recommended)**\n\nAdd your API key to a `.env` file:\n\n```bash\n# Add API key to .env file\ncat >> .env << 'EOF'\nLANGEXTRACT_API_KEY=your-api-key-here\nEOF\n\n# Keep your API key secure\necho '.env' >> .gitignore\n```\n\nIn your Python code:\n```python\nimport langextract as lx\n\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=\"Extract information...\",\n    examples=[...],\n    model_id=\"gemini-3.5-flash\"\n)\n```\n\n**Option 3: Direct API Key (Not Recommended for Production)**\n\nYou can also provide the API key directly in your code, though this is not recommended for production use:\n\n```python\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=\"Extract information...\",\n    examples=[...],\n    model_id=\"gemini-3.5-flash\",\n    api_key=\"your-api-key-here\"  # Only use this for testing/development\n)\n```\n\n**Option 4: Vertex AI (Service Accounts)**\n\nUse [Vertex AI](https://cloud.google.com/vertex-ai/docs/start/introduction-unified-platform) for authentication with service accounts:\n\n```python\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=\"Extract information...\",\n    examples=[...],\n    model_id=\"gemini-3.5-flash\",\n    language_model_params={\n        \"vertexai\": True,\n        \"project\": \"your-project-id\",\n        \"location\": \"global\"  # or regional endpoint\n    }\n)\n```\n\n## Adding Custom Model Providers\n\nLangExtract supports custom LLM providers via a lightweight plugin system. You can add support for new models without changing core code.\n\n- Add new model support independently of the core library\n- Distribute your provider as a separate Python package\n- Keep custom dependencies isolated\n- Override or extend built-in providers via priority-based resolution\n\nSee the detailed guide in [Provider System Documentation](langextract/providers/README.md) to learn how to:\n\n- Register a provider with `@router.register(...)` from `langextract.providers`\n- Publish an entry point for discovery\n- Optionally provide a schema with `get_schema_class()` for structured output\n- Integrate with the factory via `create_model(...)`\n\n## Using OpenAI Models\n\nLangExtract supports OpenAI models (requires optional dependency: `pip install langextract[openai]`):\n\n```python\nimport langextract as lx\n\n# OPENAI_API_KEY in the environment is picked up automatically; pass\n# api_key=... explicitly only if you need to override it.\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=prompt,\n    examples=examples,\n    model_id=\"gpt-4o\",  # Automatically selects OpenAI provider\n)\n```\n\nThe OpenAI provider uses JSON mode and auto-determines fence and schema behavior — leave `fence_output` and `use_schema_constraints` unset.\n\nFor large, non-latency-sensitive OpenAI workloads, enable the OpenAI Batch API\nwith `language_model_params`. Batch mode is opt-in and falls back to realtime\ncalls when the prompt count is below the configured threshold.\n\n```python\nresult = lx.extract(\n    text_or_documents=documents,\n    prompt_description=prompt,\n    examples=examples,\n    model_id=\"gpt-4o-mini\",\n    language_model_params={\n        \"batch\": {\n            \"enabled\": True,\n            \"threshold\": 50,\n            \"poll_interval\": 10,\n        }\n    },\n)\n```\n\nFor OpenAI-compatible endpoints or non-GPT model IDs (which skip auto-routing), use `ModelConfig` with an explicit provider:\n\n```python\nfrom langextract.factory import ModelConfig\n\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=prompt,\n    examples=examples,\n    config=ModelConfig(\n        model_id=\"my-openai-compatible-model\",\n        provider=\"openai\",\n        provider_kwargs={\"api_key\": \"sk-...\", \"base_url\": \"https://...\"},\n    ),\n)\n```\n\n## Using Local LLMs with Ollama\nLangExtract supports local inference using Ollama, allowing you to run models without API keys:\n\n```python\nimport langextract as lx\n\nresult = lx.extract(\n    text_or_documents=input_text,\n    prompt_description=prompt,\n    examples=examples,\n    model_id=\"gemma2:2b\",  # Automatically selects Ollama provider\n    model_url=\"http://localhost:11434\",\n)\n```\n\nThe Ollama provider exposes `FormatModeSchema` for JSON mode. Leave `fence_output` and `use_schema_constraints` unset so the factory auto-configures from the provider's schema.\n\n**Quick setup:** Install Ollama from [ollama.com](https://ollama.com/), run `ollama pull gemma2:2b`, then `ollama serve`.\n\nFor detailed installation, Docker setup, and examples, see [`examples/ollama/`](examples/ollama/).\n\n## More Examples\n\nAdditional examples of LangExtract in action:\n\n### *Romeo and Juliet* Full Text Extraction\n\nLangExtract can process complete documents directly from URLs. This example demonstrates extraction from the full text of *Romeo and Juliet* from Project Gutenberg (147,843 characters), showing parallel processing, sequential extraction passes, and performance optimization for long document processing.\n\n**[View *Romeo and Juliet* Full Text Example →](https://github.com/google/langextract/blob/main/docs/examples/longer_text_example.md)**\n\n### Medication Extraction\n\n> **Disclaimer:** This demonstration is for illustrative purposes of LangExtract's baseline capability only. It does not represent a finished or approved product, is not intended to diagnose or suggest treatment of any disease or condition, and should not be used for medical advice.\n\nLangExtract excels at extracting structured medical information from clinical text. These examples demonstrate both basic entity recognition (medication names, dosages, routes) and relationship extraction (connecting medications to their attributes), showing LangExtract's effectiveness for healthcare applications.\n\n**[View Medication Examples →](https://github.com/google/langextract/blob/main/docs/examples/medication_examples.md)**\n\n### Radiology Report Structuring: RadExtract\n\nExplore RadExtract, a live interactive demo on HuggingFace Spaces that shows how LangExtract can automatically structure radiology reports. Try it directly in your browser with no setup required.\n\n**[View RadExtract Demo →](https://huggingface.co/spaces/google/radextract)**\n\n## Community Providers\n\nExtend LangExtract with custom model providers! Check out our [Community Provider Plugins](COMMUNITY_PROVIDERS.md) registry to discover providers created by the community or add your own.\n\nFor detailed instructions on creating a provider plugin, see the [Custom Provider Plugin Example](examples/custom_provider_plugin/).\n\n## Contributing\n\nContributions are welcome! See [CONTRIBUTING.md](https://github.com/google/langextract/blob/main/CONTRIBUTING.md) to get started\nwith development, testing, and pull requests. You must sign a\n[Contributor License Agreement](https://cla.developers.google.com/about)\nbefore submitting patches.\n\n\n\n## Testing\n\nTo run tests locally from the source:\n\n```bash\n# Clone the repository\ngit clone https://github.com/google/langextract.git\ncd langextract\n\n# Install with test dependencies\npip install -e \".[test]\"\n\n# Run all tests\npytest tests\n```\n\nOr reproduce the full CI matrix locally with tox:\n\n```bash\ntox  # runs pylint + pytest on Python 3.10 and 3.11\n```\n\n### Ollama Integration Testing\n\nIf you have Ollama installed locally, you can run integration tests:\n\n```bash\n# Test Ollama integration (requires Ollama running with gemma2:2b model)\ntox -e ollama-integration\n```\n\nThis test will automatically detect if Ollama is available and run real inference tests.\n\n## Development\n\n### Code Formatting\n\nThis project uses automated formatting tools to maintain consistent code style:\n\n```bash\n# Auto-format all code\n./autoformat.sh\n\n# Or run formatters separately\nisort langextract tests --profile google --line-length 80\npyink langextract tests --config pyproject.toml\n```\n\n### Pre-commit Hooks\n\nFor automatic formatting checks:\n```bash\npre-commit install  # One-time setup\npre-commit run --all-files  # Manual run\n```\n\n### Linting\n\nRun linting before submitting PRs:\n\n```bash\npylint --rcfile=.pylintrc langextract tests\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for full development guidelines.\n\n## Disclaimer\n\nThis is not an officially supported Google product. If you use\nLangExtract in production or publications, please cite accordingly and\nacknowledge usage. Use is subject to the [Apache 2.0 License](https://github.com/google/langextract/blob/main/LICENSE).\nFor health-related applications, use of LangExtract is also subject to the\n[Health AI Developer Foundations Terms of Use](https://developers.google.com/health-ai-developer-foundations/terms).\n\n---\n\n**Happy Extracting!**\n","summary":"LangExtract is a Python library designed to transform unstructured text documents into structured data by leveraging the power of large language models. It features robust source grounding, which maps extracted information to its exact location in the original text, and is optimized to process large documents using efficient chunking and parallelization techniques. Developers and data scientists working in domains like healthcare or legal document analysis will benefit from its ability to generate consistent schemas and interactive visualizations without the need for model fine-tuning.","description":"A Python library for extracting structured information from unstructured text using LLMs with precise source grounding and interactive visualization.","stars":36796,"language":"Python"},{"owner":"bgub","repo":"helm","url":"https://github.com/bgub/helm","readme":"<h1 align=\"center\" style=\"text-align: center; width: fit-content; margin-left: auto; margin-right: auto;\">helm</h1>\n\n<p align=\"center\">\n  <a href=\"https://github.com/bgub/helm/actions\">CI</a>\n  ·\n  <a href=\"https://github.com/bgub/helm/releases\">Releases</a>\n  ·\n  <a href=\"https://github.com/bgub/helm/issues\">Issues</a>\n</p>\n\n<span align=\"center\">\n\n[![npm](https://img.shields.io/npm/v/@bgub/helm?logo=npm&label=npm)](https://www.npmjs.com/package/@bgub/helm)\n[![CI](https://github.com/bgub/helm/actions/workflows/ci.yml/badge.svg)](https://github.com/bgub/helm/actions)\n[![Codecov](https://codecov.io/github/bgub/helm/branch/main/graph/badge.svg)](https://codecov.io/github/bgub/helm)\n\n</span>\n\nA typed TypeScript framework for AI agents. Call typed functions instead of parsing CLI stdout.\n\n## Install\n\n```bash\nnpm install @bgub/helm\n```\n\n## Quick start\n\n```ts\nimport { createHelm, fs } from \"@bgub/helm\";\n\nconst agent = createHelm({\n  permissions: {\n    \"fs.read\": \"allow\",\n    \"fs.write\": \"ask\",\n    \"fs.remove\": \"deny\",\n  },\n  // operation is a qualified name like \"fs.write\"; args are the call arguments\n  onPermissionRequest: async (operation, args) => {\n    console.log(`${operation} requested with args:`, args);\n    return true; // or false to deny\n  },\n}).use(fs());\n\n// Typed inputs and outputs — no string parsing\nconst { content } = await agent.fs.read(\"./package.json\");\nconst { entries } = await agent.fs.list(\"./src\", { glob: \"*.ts\" });\n```\n\n## Why helm?\n\nAgents today shell out and parse strings. That means no type safety, no structured errors, and no way to control what operations are allowed.\n\nhelm gives agents typed functions with structured inputs and outputs:\n\n```ts\n// Instead of this:\nconst output = bash(\"git status --porcelain\");\nconst files = parseGitStatus(output); // hope the format doesn't change\n\n// Agents do this:\nconst { staged, unstaged } = await agent.git.status();\n```\n\n## Features\n\n- **Typed everything.** Inputs, outputs, errors. The types _are_ the docs.\n- **Builder pattern.** `.use()` chains accumulate skills; TypeScript infers the full type at each step.\n- **Permissions are first-class.** Every operation has a permission level (`allow`, `ask`, `deny`). Policies are set per-skill or per-operation.\n- **Search the registry.** A single `search(query)` lets agents discover operations without loading the full skill set into context.\n- **Extensible.** Define custom skills that get types, search, and permissions for free.\n\n## Defining custom skills\n\n```ts\nimport { defineSkill } from \"@bgub/helm\";\n\nconst weather = defineSkill({\n  name: \"weather\",\n  description: \"Weather forecast operations\",\n  operations: {\n    forecast: {\n      description: \"Get the forecast for a city\",\n      signature: \"(city: string) => Promise<{ temp: number; sky: string }>\",\n      defaultPermission: \"allow\",\n      tags: [\"weather\", \"read\"],\n      handler: async (city: string): Promise<{ temp: number; sky: string }> => {\n        // call your weather API here\n        return { temp: 72, sky: \"sunny\" };\n      },\n    },\n  },\n});\n\nconst agent = createHelm().use(weather);\nconst { temp, sky } = await agent.weather.forecast(\"Seattle\");\n```\n\n## Permissions\n\nResolution order (first match wins):\n\n1. Exact match in policy — `\"git.status\": \"allow\"`\n2. Wildcard match — `\"git.*\": \"ask\"`\n3. Operation's own default — set by the skill author\n4. Global default — `defaultPermission` option (defaults to `\"ask\"`)\n\n```ts\nconst agent = createHelm({\n  permissions: {\n    \"fs.read\": \"allow\",\n    \"fs.*\": \"ask\",\n    \"dangerous.*\": \"deny\",\n  },\n  defaultPermission: \"ask\",\n  // Called when an operation's resolved permission is \"ask\".\n  // operation: qualified name like \"fs.write\"\n  // args: the arguments passed to the operation, e.g. [\"./out.txt\", \"hello\"]\n  onPermissionRequest: async (operation, args) => {\n    console.log(`${operation} requested with args:`, args);\n    return true; // return false to deny\n  },\n});\n```\n\n## Search\n\nAgents can discover operations without knowing what's available upfront:\n\n```ts\nconst results = agent.search(\"file read\");\n// [{\n//   qualifiedName: \"fs.read\",\n//   description: \"Read a file and return its content as a string\",\n//   signature: \"(path: string) => Promise<{ content: string }>\",\n//   ...\n// }]\n\n// The agent now knows exactly what to call:\nconst { content } = await agent.fs.read(\"./package.json\");\n```\n\n## Packages\n\n| Package | Description |\n|---------|-------------|\n| [`helm`](./packages/helm) | Core library |\n| [`@helm/docs`](./apps/docs) | Documentation site |\n\n## Development\n\n```bash\npnpm install\npnpm build       # build all packages\npnpm test        # run all tests\npnpm lint        # biome check\n```\n\n## License\n\nMIT © [bgub](https://github.com/bgub)\n","summary":"Helm is a typed TypeScript framework designed to equip AI agents with structured, type-safe functions instead of relying on fragile string parsing of CLI output. It features a builder pattern for chaining skills, first-class permission management for secure operation control, and a searchable registry that allows agents to discover capabilities dynamically. This project is ideal for developers building reliable AI agents who need strict type safety, structured error handling, and granular control over the tools their models can access.","description":"TypeScript AI \"code mode\" toolkit with permissions and search","stars":64,"language":"TypeScript"},{"owner":"solidjs","repo":"solid","url":"https://github.com/solidjs/solid","readme":"<p>\n  <img src=\"https://assets.solidjs.com/banner?project=Library&type=core\" alt=\"SolidJS\" />\n</p>\n\n[![Build Status](https://img.shields.io/github/actions/workflow/status/solidjs/solid/main-ci.yml?branch=main&logo=github&style=for-the-badge)](https://github.com/solidjs/solid/actions/workflows/main-ci.yml)\n[![Coverage Status](https://img.shields.io/coveralls/github/solidjs/solid.svg?style=for-the-badge)](https://coveralls.io/github/solidjs/solid?branch=main)\n\n[![NPM Version](https://img.shields.io/npm/v/solid-js.svg?style=for-the-badge)](https://www.npmjs.com/package/solid-js)\n[![](https://img.shields.io/npm/dm/solid-js.svg?style=for-the-badge)](https://www.npmjs.com/package/solid-js)\n[![Discord](https://img.shields.io/discord/722131463138705510?style=for-the-badge)](https://discord.com/invite/solidjs)\n[![Subreddit subscribers](https://img.shields.io/reddit/subreddit-subscribers/solidjs?style=for-the-badge)](https://www.reddit.com/r/solidjs/)\n\n**[Website](https://www.solidjs.com/) • [API Docs](https://docs.solidjs.com/) • [Features Tutorial](https://www.solidjs.com/tutorial/introduction_basics) • [Playground](https://playground.solidjs.com/?version=1.3.13#NobwRAdghgtgpmAXGGUCWEwBowBcCeADgsrgM4Ae2YZA9gK4BOAxiWGjIbY7gAQi9GcCABM4jXgF9eAM0a0YvADo1aAGzQiAtACsyAegDucAEYqA3EogcuPfr2ZCouOAGU0Ac2hqps+YpU6DW09CysrGXoIZlw0WgheAGEGCBdGAAoASn4rXgd4sj5gZhTcLF4yOFxkqNwAXV4AXgcnF3cvKDV0gAZMywT8iELeDEc4eFSm3iymgD4KqprU9JLamYBqXgBGPvCBoVwmBPTcvN4AHhN6XFx43gJiRpUrm-iVXnjEjWYAa0aQUZCCa4SSzU5nfirZaZSTgi76F63CBgga7CCwiBWISicTpGaNebnJZpXj6WblES0Zj0YEAOg8VQAompxsJcAAhfAASREJzAUEIhBUmTRYEkdSAA) • [Discord](https://discord.com/invite/solidjs)**\n\nSolid is a declarative JavaScript library for creating user interfaces. Instead of using a Virtual DOM, it compiles its templates to real DOM nodes and updates them with fine-grained reactions. Declare your state and use it throughout your app, and when a piece of state changes, only the code that depends on it will rerun.\n\n## At a Glance\n```tsx\nimport { createSignal } from \"solid-js\";\nimport { render } from \"solid-js/web\";\n\nfunction Counter() {\n  const [count, setCount] = createSignal(0);\n  const doubleCount = () => count() * 2;\n  \n  console.log(\"The body of the function runs once...\");\n\n  return (\n    <>\n      <button onClick={() => setCount(c => c + 1)}>\n        {doubleCount()}\n      </button>\n    </>\n  );\n}\n\nrender(Counter, document.getElementById(\"app\")!);\n```\n\nTry this code in our [playground](https://playground.solidjs.com/anonymous/0c88df54-91b0-4c88-bd20-e962bde49725)!\n\n<details>\n<summary>Explain this!</summary>\n\n```tsx\nimport { createSignal } from \"solid-js\";\nimport { render } from \"solid-js/web\";\n\n// A component is just a function that returns a DOM node\nfunction Counter() {\n  // Create a piece of reactive state, giving us an accessor, count(), and a setter, setCount()\n  const [count, setCount] = createSignal(0);\n  \n  //To create derived state, just wrap an expression in a function\n  const doubleCount = () => count() * 2;\n  \n  console.log(\"The body of the function runs once...\");\n\n  // JSX allows you to write HTML within your JavaScript function and include dynamic expressions using the { } syntax\n  // The only part of this that will ever rerender is the doubleCount() text.\n  return (\n    <>\n      <button onClick={() => setCount(c => c + 1)}>\n        Increment: {doubleCount()}\n      </button>\n    </>\n  );\n}\n\n// The render function mounts a component onto your page\nrender(Counter, document.getElementById(\"app\")!);\n```\n\nSolid compiles your JSX down to efficient real DOM updates. It uses the same reactive primitives (`createSignal`) at runtime but making sure there's as little rerendering as possible. Here's what that looks like in this example:\n\n```js\nimport { template as _$template } from \"solid-js/web\";\nimport { delegateEvents as _$delegateEvents } from \"solid-js/web\";\nimport { insert as _$insert } from \"solid-js/web\";\n//The compiler pulls out any static HTML\nconst _tmpl$ = /*#__PURE__*/_$template(`<button>Increment: `);\n\nimport { createSignal, createEffect } from \"solid-js\";\nimport { render } from \"solid-js/web\";\n\nfunction Counter() {\n  const [count, setCount] = createSignal(0);\n  \n  const doubleCount = () => count() * 2;\n  \n  console.log(\"The body of the function runs once...\");\n  \n  return (() => {\n    //_el$ is a real DOM node!\n    const _el$ = _tmpl$();\n    _el$.$$click = () => setCount(c => c + 1);\n     //This inserts the count as a child of the button in a way that allows count to update without rerendering the whole button\n    _$insert(_el$, doubleCount);\n    return _el$;\n  })();\n}\nrender(Counter, document.getElementById(\"app\"));\n_$delegateEvents([\"click\"]);\n```\n\n</details>\n\n## Key Features\n\n- Fine-grained updates to the real DOM\n- Declarative data: model your state as a system with reactive primitives\n- Render-once mental model: your components are regular JavaScript functions that run once to set up your view\n- Automatic dependency tracking: accessing your reactive state subscribes to it\n- [Small](https://dev.to/this-is-learning/javascript-framework-todomvc-size-comparison-504f) and [fast](https://krausest.github.io/js-framework-benchmark/current.html)\n- Simple: learn a few powerful concepts that can be reused, combined, and built on top of\n- Provides modern framework features like JSX, fragments, Context, Portals, Suspense, streaming SSR, progressive hydration, Error Boundaries and concurrent rendering.\n- Naturally debuggable: A `<div>` is a real div, so you can use your browser's devtools to inspect the rendering\n- [Web component friendly](https://github.com/solidjs/solid/tree/main/packages/solid-element#readme) and can author custom elements\n- Isomorphic: render your components on the client and the server\n- Universal: write [custom renderers](https://github.com/solidjs/solid/releases/tag/v1.2.0) to use Solid anywhere\n- A growing community and ecosystem with active core team support\n\n<details>\n \n<summary>Quick Start</summary>\n\nYou can get started with a simple app by running the following in your terminal:\n\n```sh\n> npx degit solidjs/templates/js my-app\n> cd my-app\n> npm i # or yarn or pnpm\n> npm run dev # or yarn or pnpm\n```\n\nOr for TypeScript:\n\n```sh\n> npx degit solidjs/templates/ts my-app\n> cd my-app\n> npm i # or yarn or pnpm\n> npm run dev # or yarn or pnpm\n```\n\nThis will create a minimal, client-rendered application powered by [Vite](https://vitejs.dev/).\n\nOr you can install the dependencies in your own setup. To use Solid with JSX (_recommended_), run:\n\n```sh\n> npm i -D babel-preset-solid\n> npm i solid-js\n```\n\nThe easiest way to get set up is to add `babel-preset-solid` to your `.babelrc`, babel config for webpack, or rollup configuration:\n\n```js\n\"presets\": [\"solid\"]\n```\n\nFor TypeScript to work, remember to set your `.tsconfig` to handle Solid's JSX:\n\n```js\n\"compilerOptions\": {\n  \"jsx\": \"preserve\",\n  \"jsxImportSource\": \"solid-js\",\n}\n```\n\n</details>\n\n## Why Solid?\n\n### Performant\n\nMeticulously engineered for performance and with half a decade of research behind it, Solid's performance is almost indistinguishable from optimized vanilla JavaScript (See Solid on the [JS Framework Benchmark](https://krausest.github.io/js-framework-benchmark/current.html)). Solid is [small](https://bundlephobia.com/package/solid-js@1.3.15) and completely tree-shakable, and [fast](https://levelup.gitconnected.com/how-we-wrote-the-fastest-javascript-ui-framework-again-db097ddd99b6) when rendering on the server, too. Whether you're writing a fully client-rendered SPA or a server-rendered app, your users see it faster than ever. ([Read more about Solid's performance](https://dev.to/ryansolid/thinking-granular-how-is-solidjs-so-performant-4g37) from the library's creator.)\n\n### Powerful\n\nSolid is fully-featured with everything you can expect from a modern framework. Performant state management is built-in with Context and Stores: you don't have to reach for a third party library to manage global state (if you don't want to). With Resources, you can use data loaded from the server like any other piece of state and build a responsive UI for it thanks to Suspense and concurrent rendering. And when you're ready to move to the server, Solid has full SSR and serverless support, with streaming and progressive hydration to get to interactive as quickly as possible. (Check out our full [interactive features walkthrough](https://www.solidjs.com/tutorial/introduction_basics).)\n\n### Pragmatic\n\nDo more with less: use simple, composable primitives without hidden rules and gotchas. In Solid, components are just functions - rendering is determined purely by how your state is used - so you're free to organize your code how you like and you don't have to learn a new rendering system. Solid encourages patterns like declarative code and read-write segregation that help keep your project maintainable, but isn't opinionated enough to get in your way.\n\n### Productive\n\nSolid is built on established tools like JSX and TypeScript and integrates with the Vite ecosystem. Solid's bare-metal, minimal abstractions give you direct access to the DOM, making it easy to use your favorite native JavaScript libraries like D3. And the Solid ecosystem is growing fast, with [custom primitives](https://github.com/solidjs-community/solid-primitives), [component libraries](https://kobalte.dev), and build-time utilities that let you [write Solid code in new ways](https://github.com/LXSMNSYC/solid-labels).\n\n## More\n\nCheck out our official [documentation](https://docs.solidjs.com) or browse some [examples](https://github.com/solidjs/solid/blob/main/documentation/resources/examples.md)\n\n## Browser Support\n\nSolidJS Core is committed to supporting the last 2 years of modern browsers including Firefox, Safari, Chrome and Edge (for desktop and mobile devices). We do not support IE or similar sunset browsers. For server environments, we support Node LTS and the latest Deno and Cloudflare Worker runtimes.\n\n<img src=\"https://saucelabs.github.io/images/opensauce/powered-by-saucelabs-badge-gray.svg?sanitize=true\" alt=\"Testing Powered By SauceLabs\" width=\"300\"/>\n\n## Community\n\nCome chat with us on [Discord](https://discord.com/invite/solidjs)! Solid's creator and the rest of the core team are active there, and we're always looking for contributions.\n\n### Contributors\n\n<a href=\"https://github.com/solidjs/solid/graphs/contributors\"><img src=\"https://opencollective.com/solid/contributors.svg?width=890&amp;button=false\" style=\"max-width:100%;\"></a>\n\n### Open Collective\n\nSupport us with a donation and help us continue our activities. [[Contribute](https://opencollective.com/solid)]\n\n<a href=\"https://opencollective.com/solid/backer/0/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/0/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/1/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/1/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/2/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/2/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/3/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/3/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/4/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/4/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/5/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/5/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/6/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/6/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/7/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/7/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/8/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/8/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/9/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/9/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/backer/10/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/backer/10/avatar.svg\"></a>\n\n### Sponsors\n\nBecome a sponsor and get your logo on our README on GitHub with a link to your site. [[Become a sponsor](https://opencollective.com/solid#sponsor)]\n\n<a href=\"https://opencollective.com/solid/sponsor/0/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/0/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/1/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/1/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/2/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/2/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/3/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/3/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/4/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/4/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/5/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/5/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/6/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/6/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/7/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/7/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/8/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/8/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/9/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/9/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/10/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/10/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/11/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/11/avatar.svg\"></a>\n<a href=\"https://opencollective.com/solid/sponsor/12/website\" target=\"_blank\"><img src=\"https://opencollective.com/solid/sponsor/12/avatar.svg\"></a>\n","summary":"Solid is a declarative JavaScript library designed for building high-performance user interfaces without the overhead of a Virtual DOM. By compiling templates into real DOM nodes and utilizing fine-grained reactivity, it ensures that only the specific code segments dependent on updated state are re-executed. This approach makes Solid an ideal choice for developers who prioritize application speed and efficiency while maintaining a modern, intuitive developer experience.","description":"A declarative, efficient, and flexible JavaScript library for building user interfaces.","stars":35569,"language":"TypeScript"},{"owner":"cloudflare","repo":"vinext","url":"https://github.com/cloudflare/vinext","readme":"# vinext\n\nThe Next.js API surface, reimplemented on Vite.\n\n> **Read the announcement:** [How we rebuilt Next.js with AI in one week](https://blog.cloudflare.com/vinext/)\n\n> 🚧 **Experimental — under heavy development.** This project is an experiment in AI-driven software development. The vast majority of the code, tests, and documentation are written by AI, with humans steering throughout: setting architecture and priorities, making design decisions, reviewing changes, triaging complex problems, and shipping fixes. There may be bugs, rough edges, or things that don't work. Use at your own risk.\n\n## Quick start\n\nvinext includes an [Agent Skill](https://agentskills.io/home) that handles migration for you. It works with Claude Code, OpenCode, Cursor, Codex, and dozens of other AI coding tools. Install it, open your Next.js project, and tell the AI to migrate:\n\n```sh\nnpx skills add cloudflare/vinext\n```\n\nThen open your Next.js project in any supported tool and say:\n\n```\nmigrate this project to vinext\n```\n\nThe skill handles compatibility checking, dependency installation, config generation, and dev server startup. It knows what vinext supports and will flag anything that needs manual attention.\n\n### Or do it manually\n\n```bash\nnpm install -D vinext vite @vitejs/plugin-react\n```\n\nIf you're using the App Router, also install:\n\n```bash\nnpm install -D @vitejs/plugin-rsc react-server-dom-webpack\n```\n\nReplace `next` with `vinext` in your scripts:\n\n```json\n{\n  \"scripts\": {\n    \"dev\": \"vinext dev\",\n    \"build\": \"vinext build\",\n    \"start\": \"vinext start\"\n  }\n}\n```\n\n```bash\nvinext dev          # Development server with HMR\nvinext build        # Production build\nvinext deploy       # Build and deploy to Cloudflare Workers\n```\n\nvinext auto-detects your `app/` or `pages/` directory, loads `next.config.js`, and configures Vite automatically. No `vite.config.ts` required for basic usage.\n\nYour existing `pages/`, `app/`, `next.config.js`, and `public/` directories work as-is. Run `vinext check` first to scan for known compatibility issues, or use `vinext init` to [automate the full migration](#migrating-an-existing-nextjs-project).\n\n### CLI reference\n\n| Command         | Description                                                             |\n| --------------- | ----------------------------------------------------------------------- |\n| `vinext dev`    | Start dev server with HMR                                               |\n| `vinext build`  | Production build (multi-environment for App Router: RSC + SSR + client) |\n| `vinext start`  | Start local production server for testing                               |\n| `vinext deploy` | Build and deploy to Cloudflare Workers                                  |\n| `vinext init`   | Migrate a Next.js project to run under vinext                           |\n| `vinext check`  | Scan your Next.js app for compatibility issues before migrating         |\n| `vinext lint`   | Delegate to eslint or oxlint                                            |\n\nOptions: `-p / --port <port>`, `-H / --hostname <host>`, `--turbopack` (accepted, no-op).\n\n`vinext deploy` options: `--preview`, `--env <name>`, `--name <name>`, `--skip-build`, `--dry-run`, `--experimental-tpr`.\n\n`vinext init` options: `--port <port>` (default: 3001), `--skip-check`, `--force`.\n\nIf your `next.config.*` sets `output: \"standalone\"`, `vinext build` emits a self-hosting bundle at `dist/standalone/`. Start it with:\n\n```bash\nnode dist/standalone/server.js\n```\n\nEnvironment variables: `PORT` (default `3000`), `HOST` (default `0.0.0.0`).\n\n> **Note:** Next.js standalone uses `HOSTNAME` for the bind address, but vinext uses `HOST` to avoid collision with the system-set `HOSTNAME` variable on Linux. Update your deployment config accordingly.\n\n### Starting a new vinext project\n\nRun `npm create next-app@latest` to create a new Next.js project, and then follow these instructions to migrate it to vinext.\n\nIn the future, we will have a proper `npm create vinext` new project workflow.\n\n### Migrating an existing Next.js project\n\n`vinext init` automates the migration in one command:\n\n```bash\nnpx vinext init\n```\n\nThis will:\n\n1. Run `vinext check` to scan for compatibility issues\n2. Install `vite`, `@vitejs/plugin-react`, and App Router-only deps (`@vitejs/plugin-rsc`, `react-server-dom-webpack`) as devDependencies\n3. Rename CJS config files (e.g. `postcss.config.js` -> `.cjs`) to avoid ESM conflicts\n4. Add `\"type\": \"module\"` to `package.json`\n5. Add `dev:vinext`, `build:vinext`, and `start:vinext` scripts to `package.json`\n6. Generate a minimal `vite.config.ts`\n\nThe migration is non-destructive -- your existing Next.js setup continues to work alongside vinext. It does not modify `next.config`, `tsconfig.json`, or any source files, and it does not remove Next.js dependencies.\n\nvinext targets Vite 8, which defaults to Rolldown, Oxc, Lightning CSS, and a newer browser baseline. If you bring custom Vite config or plugins from an older setup, prefer `oxc`, `optimizeDeps.rolldownOptions`, and `build.rolldownOptions` over older `esbuild` and `build.rollupOptions` knobs, and override `build.target` if you still need older browsers. If a dependency breaks because of stricter CommonJS default import handling, fix the import or use `legacy.inconsistentCjsInterop: true` as a temporary escape hatch. See the [Vite 8 migration guide](https://vite.dev/guide/migration).\n\n```bash\nnpm run dev:vinext    # Start the vinext dev server (port 3001)\nnpm run build:vinext  # Build production output with vinext\nnpm run start:vinext  # Start vinext production server\nnpm run dev           # Still runs Next.js as before\n```\n\nUse `--force` to overwrite an existing `vite.config.ts`, or `--skip-check` to skip the compatibility report.\n\n## Why\n\nVite has become the default build tool for modern web frameworks — fast HMR, a clean plugin API, native ESM, and a growing ecosystem. With [`@vitejs/plugin-rsc`](https://github.com/vitejs/vite-plugin-react/tree/main/packages/plugin-rsc) adding React Server Components support, it's now possible to build a full RSC framework on Vite.\n\nvinext is an experiment: can we reimplement the Next.js API surface on Vite, so that existing Next.js applications can run on a completely different toolchain? The answer, so far, is mostly yes.\n\nvinext works everywhere. It natively supports Cloudflare Workers (with `vinext deploy`, bindings, KV caching), and can be deployed to Vercel, Netlify, AWS, Deno Deploy, and more via the [Nitro](https://v3.nitro.build/) Vite plugin. Native support for additional platforms is [planned](https://github.com/cloudflare/vinext/issues/80).\n\n**Alternatives worth knowing about:**\n\n- **[OpenNext](https://opennext.js.org/)** — adapts `next build` output for AWS, Cloudflare, and other platforms. OpenNext has been around much longer than vinext, is more mature, and covers more of the Next.js API surface because it builds on top of Next.js's own output rather than reimplementing it. If you want the safer, more proven option, start there.\n- **[Next.js self-hosting](https://nextjs.org/docs/app/building-your-application/deploying#self-hosting)** — Next.js can be deployed to any Node.js server, Docker container, or as a static export.\n\n### Design principles\n\n- **Deploy anywhere.** Natively supports Cloudflare Workers, with other platforms available via Nitro. Native adapters for more platforms are [planned](https://github.com/cloudflare/vinext/issues/80).\n- **Pragmatic compatibility, not bug-for-bug parity.** Targets 95%+ of real-world Next.js apps. Edge cases that depend on undocumented Vercel behavior are intentionally not supported.\n- **Latest Next.js only.** Targets Next.js 16.x. No support for deprecated APIs from older versions.\n- **Incremental adoption.** Drop in the plugin, fix what breaks, deploy.\n\n## FAQ\n\n**What is this?**\nvinext is a Vite plugin that reimplements the public Next.js API — routing, server rendering, `next/*` module imports, the CLI — so you can run Next.js applications on Vite instead of the Next.js compiler toolchain. It can be deployed anywhere: Cloudflare Workers is the first natively supported target, with other platforms available via Nitro. Native adapters for more platforms are [planned](https://github.com/cloudflare/vinext/issues/80).\n\n**Is this a fork of Next.js?**\nNo. vinext is an alternative implementation of the Next.js API surface built on Vite. It does import some Next.js types and utilities, but the core is written from scratch. The goal is not to create a competing framework or add features beyond what Next.js offers — it's an experiment in how far AI-driven development and Vite's toolchain can go in replicating an existing, well-defined API surface.\n\n**How is this different from OpenNext?**\n[OpenNext](https://opennext.js.org/) adapts the _output_ of a standard `next build` to run on various platforms. Because it builds on Next.js's own output, it inherits broad API coverage and has been well-tested for much longer. vinext takes a different approach: it reimplements the Next.js APIs on Vite from scratch, which means faster builds and smaller bundles, but less coverage of the long tail of Next.js features. If you need a mature, well-tested way to run Next.js outside Vercel, OpenNext is the safer choice. If you're interested in experimenting with a lighter toolchain and don't need every Next.js API, vinext might be worth a look.\n\n**Can I use this in production?**\nYou can, with caution. This is experimental software with known bugs. It works well enough for demos and exploration, but it hasn't been battle-tested with real production traffic.\n\n**Can I just self-host Next.js?**\nYes. Next.js supports [self-hosting](https://nextjs.org/docs/app/building-your-application/deploying#self-hosting) on Node.js servers, Docker containers, and static exports. If you're happy with the Next.js toolchain and just want to run it somewhere other than Vercel, self-hosting is the simplest path.\n\n**How are you verifying this works?**\nThe test suite has over 1,700 Vitest tests and 380 Playwright E2E tests. This includes tests ported directly from the [Next.js test suite](https://github.com/vercel/next.js/tree/canary/test) and [OpenNext's Cloudflare conformance suite](https://github.com/opennextjs/opennextjs-cloudflare), covering routing, SSR, RSC, server actions, caching, metadata, middleware, streaming, and more. Vercel's [App Router Playground](https://github.com/vercel/next-app-router-playground) also runs on vinext as an integration test. See the [Tests](#tests) section and `tests/nextjs-compat/TRACKING.md` for details.\n\n**Who is reviewing this code?**\nA mix of humans and AI agents. Humans review PRs before they merge, focused on behavior, structure, and long-term direction. We lean heavily on agent-driven code review to catch issues at PR time and across the codebase. The test suite is the primary quality gate. Outside contributions and deeper human code review are very welcome.\n\n**Why Vite?**\nVite is an excellent build tool with a rich plugin ecosystem, first-class ESM support, and fast HMR. The [`@vitejs/plugin-rsc`](https://github.com/vitejs/vite-plugin-react/tree/main/packages/plugin-rsc) plugin adds React Server Components support with multi-environment builds. This project is an experiment to see how much of the Next.js developer experience can be replicated on top of Vite's infrastructure.\n\n**Does this support the Pages Router, App Router, or both?**\nBoth. File-system routing, SSR, client hydration, and deployment to Cloudflare Workers work for both routers.\n\n**What version of Next.js does this target?**\nNext.js 16.x. No support for deprecated APIs from older versions.\n\n**Can I deploy to AWS/Netlify/other platforms?**\nYes. Add the [Nitro](https://v3.nitro.build/) Vite plugin alongside vinext, and you can deploy to Vercel, Netlify, AWS Amplify, Deno Deploy, Azure, and [many more](https://v3.nitro.build/deploy). See [Other platforms (via Nitro)](#other-platforms-via-nitro) for setup. For Cloudflare Workers, the native integration (`vinext deploy`) gives you the smoothest experience. Native adapters for more platforms are [planned](https://github.com/cloudflare/vinext/issues/80).\n\n**What happens when Next.js releases a new feature?**\nWe track the public Next.js API surface and add support for new stable features. Experimental or unstable Next.js features are lower priority. The plan is to add commit-level tracking of the Next.js repo so we can stay current as new versions are released.\n\n## Deployment\n\n### Cloudflare Workers\n\nvinext has native integration with Cloudflare Workers through `@cloudflare/vite-plugin`, including bindings access via `cloudflare:workers`, KV caching, image optimization, and the `vinext deploy` one-command workflow.\n\n#### Prerequisites\n\nBefore running `vinext deploy` for the first time you need to authenticate with Cloudflare and tell wrangler which account to deploy to.\n\n**Authentication — pick one:**\n\n- **`wrangler login`** (recommended for local development) — opens a browser window to authenticate. Run it once and wrangler caches the token.\n- **`CLOUDFLARE_API_TOKEN` env var** (CI / non-interactive) — create a token at [dash.cloudflare.com/profile/api-tokens](https://dash.cloudflare.com/profile/api-tokens) using the **Edit Cloudflare Workers** template. That template grants all the permissions `vinext deploy` needs.\n\n**Account ID:**\n\nwrangler needs to know which Cloudflare account to deploy to. Add your account ID to `wrangler.jsonc`:\n\n```jsonc\n{\n  \"account_id\": \"<your-account-id>\",\n  ...\n}\n```\n\nFind your account ID in the Cloudflare dashboard URL (`dash.cloudflare.com/<account-id>`) or by running `wrangler whoami` after logging in.\n\nAlternatively, set the `CLOUDFLARE_ACCOUNT_ID` environment variable instead of hardcoding it in the config file.\n\n`vinext deploy` auto-generates the necessary configuration files (`vite.config.ts`, `wrangler.jsonc`, `worker/index.ts`) if they don't exist, builds the application, and deploys to Workers.\n\n```bash\nvinext deploy\nvinext deploy --env staging\n```\n\nUse `--env <name>` to target `wrangler.jsonc` `env.<name>`. `--preview` is shorthand for `--env preview`.\n\nThe deploy command also auto-detects and fixes common migration issues:\n\n- Adds `\"type\": \"module\"` to package.json if missing\n- Resolves tsconfig.json path aliases automatically (via `vite-tsconfig-paths`)\n- Detects MDX usage and configures `@mdx-js/rollup`\n- Renames CJS config files (postcss.config.js, etc.) to `.cjs` when needed\n- Detects native Node.js modules (sharp, resvg, satori, lightningcss, @napi-rs/canvas) and auto-stubs them for Workers. If you encounter others that need stubbing, PRs are welcome.\n\nBoth App Router and Pages Router work on Workers with full client-side hydration.\n\n#### Cloudflare Bindings (D1, R2, KV, AI, etc.)\n\nUse `import { env } from \"cloudflare:workers\"` to access bindings in any server component, route handler, or server action. No custom worker entry or special configuration required.\n\n```tsx\nimport { env } from \"cloudflare:workers\";\n\nexport default async function Page() {\n  const result = await env.DB.prepare(\"SELECT * FROM posts\").all();\n  return <div>{JSON.stringify(result)}</div>;\n}\n```\n\nThis works because `@cloudflare/vite-plugin` runs the RSC environment in workerd, where `cloudflare:workers` is a native module. In production builds, the import is externalized so workerd resolves it at runtime. All binding types are supported: D1, R2, KV, Durable Objects, AI, Queues, Vectorize, Browser Rendering, etc.\n\nDefine your bindings in `wrangler.jsonc` as usual:\n\n```jsonc\n{\n  \"name\": \"my-app\",\n  \"compatibility_date\": \"2026-02-12\",\n  \"compatibility_flags\": [\"nodejs_compat\"],\n  \"d1_databases\": [{ \"binding\": \"DB\", \"database_name\": \"my-db\", \"database_id\": \"...\" }],\n  \"kv_namespaces\": [{ \"binding\": \"CACHE\", \"id\": \"...\" }],\n}\n```\n\nFor TypeScript types, generate them with `wrangler types` and the `env` import will be fully typed.\n\n> **Note:** You do not need `getPlatformProxy()`, a custom worker entry with `fetch(request, env)`, or any other workaround. `cloudflare:workers` is the recommended way to access bindings in vinext.\n\n#### Traffic-aware Pre-Rendering (experimental)\n\nTPR queries Cloudflare zone analytics at deploy time to find which pages actually get traffic, pre-renders only those, and uploads them to KV cache. The result is SSG-level latency for popular pages without pre-rendering your entire site.\n\n```bash\nvinext deploy --experimental-tpr                    # Pre-render pages covering 90% of traffic\nvinext deploy --experimental-tpr --tpr-coverage 95  # More aggressive coverage\nvinext deploy --experimental-tpr --tpr-limit 500    # Cap at 500 pages\nvinext deploy --experimental-tpr --tpr-window 48    # Use 48h of analytics\n```\n\nRequires a custom domain (zone analytics are unavailable on `*.workers.dev`) and `CLOUDFLARE_API_TOKEN` with Zone.Analytics read permission.\n\nFor production caching (ISR), use the built-in Cloudflare KV cache handler:\n\n```ts\nimport { KVCacheHandler } from \"vinext/cloudflare\";\nimport { setCacheHandler } from \"next/cache\";\n\nsetCacheHandler(new KVCacheHandler(env.MY_KV_NAMESPACE));\n```\n\n#### Custom Vite configuration\n\nIf you need to customize the Vite config, create a `vite.config.ts`. vinext will merge its config with yours. This is required for Cloudflare Workers deployment with the App Router (RSC needs explicit plugin configuration):\n\n```ts\nimport { defineConfig } from \"vite\";\nimport vinext from \"vinext\";\nimport rsc from \"@vitejs/plugin-rsc\";\nimport { cloudflare } from \"@cloudflare/vite-plugin\";\n\nexport default defineConfig({\n  plugins: [\n    vinext(),\n    rsc({\n      entries: {\n        rsc: \"virtual:vinext-rsc-entry\",\n        ssr: \"virtual:vinext-app-ssr-entry\",\n        client: \"virtual:vinext-app-browser-entry\",\n      },\n    }),\n    cloudflare({\n      viteEnvironment: { name: \"rsc\", childEnvironments: [\"ssr\"] },\n    }),\n  ],\n});\n```\n\nSee the [examples](#live-examples) for complete working configurations.\n\n### Other platforms (via Nitro)\n\nFor deploying to platforms other than Cloudflare, vinext works with [Nitro](https://v3.nitro.build/) as a Vite plugin. Add `nitro` alongside `vinext` in your Vite config and deploy to any [Nitro-supported platform](https://v3.nitro.build/deploy).\n\n```ts\nimport { defineConfig } from \"vite\";\nimport vinext from \"vinext\";\nimport { nitro } from \"nitro/vite\";\n\nexport default defineConfig({\n  plugins: [vinext(), nitro()],\n});\n```\n\n```bash\nnpm install nitro\n```\n\nNitro auto-detects the deployment platform in most CI/CD environments (Vercel, Netlify, AWS Amplify, Azure, and others), so you typically don't need to set a preset. For local builds, set the `NITRO_PRESET` environment variable:\n\n```bash\nNITRO_PRESET=vercel npx vite build\nNITRO_PRESET=netlify npx vite build\nNITRO_PRESET=deno_deploy npx vite build\n```\n\n> **Deploying to Cloudflare?** You can use Nitro, but the native integration (`vinext deploy` / `@cloudflare/vite-plugin`) is recommended. It provides the best developer experience with `cloudflare:workers` bindings, KV caching, image optimization, and one-command deploys.\n\n<details>\n<summary>Vercel</summary>\n\nNitro auto-detects Vercel in CI. For local builds:\n\n```bash\nNITRO_PRESET=vercel npx vite build\n```\n\nDeploy with the [Vercel CLI](https://vercel.com/docs/cli) or connect your Git repo in the Vercel dashboard. Set the build command to `vite build` and the output directory to `.output`.\n\n</details>\n\n<details>\n<summary>Netlify</summary>\n\nNitro auto-detects Netlify in CI. Fo
