: Send Selection`          | —                | Send selected text to pi terminal                                                        |\n| `Pi: Upgrade Pi and Packages` | —                | Find the pi binary, infer its package manager, upgrade pi globally, then run `pi update` |\n\n## Sidebar\n\nThe **Pi** activity bar icon opens a sidebar with:\n\n- **Packages view** — Search the npm registry for `pi-package` packages, see capability labels (extensions, skills, prompts, themes), install/uninstall with live streamed output, cancel in-progress operations, and use **Upgrade Pi and Packages** to upgrade the pi CLI plus installed pi packages from the sidebar\n\n## Bridge tools exposed to pi\n\nEach pi terminal launched by the extension loads a bundled pi extension that can call back into live VS Code APIs. The same extension also updates pi's footer status every few seconds with the active VS Code file, cursor/selection, language id, unsaved-change marker, and diagnostic summary.\n\n### Inspection tools\n\n| Tool                           | What it returns                                                                                                                                                        |\n| ------------------------------ | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| `vscode_get_editor_state`      | Aggregate snapshot of workspace folders, active editor metadata, current selection, latest cached selection, and open editors                                          |\n| `vscode_get_selection`         | Current editor selection including selected text, file path, and coordinates; falls back to the latest cached selection when pi terminal focus hides the active editor |\n| `vscode_get_latest_selection`  | Most recent cached selection seen by the extension, even if focus already moved                                                                                        |\n| `vscode_get_diagnostics`       | VS Code diagnostics for a specific file or the whole workspace                                                                                                         |\n| `vscode_get_open_editors`      | Visible/open file editors with language, dirty state, and active flag                                                                                                  |\n| `vscode_get_workspace_folders` | Workspace folders for the current VS Code window                                                                                                                       |\n| `vscode_get_document_symbols`  | Outline symbols for a file from the active language server                                                                                                             |\n| `vscode_get_definitions`       | Symbol definition locations at a given file position                                                                                                                   |\n| `vscode_get_type_definitions`  | Symbol type-definition locations at a given file position                                                                                                              |\n| `vscode_get_implementations`   | Concrete implementation locations for an interface or abstract member                                                                                                  |\n| `vscode_get_declarations`      | Symbol declaration locations at a given file position                                                                                                                  |\n| `vscode_get_hover`             | Hover docs, inferred types, signatures, and markdown/code snippets from the language server                                                                            |\n| `vscode_get_workspace_symbols` | Global workspace symbol search through VS Code language providers                                                                                                      |\n| `vscode_get_references`        | Symbol references at a given file position                                                                                                                             |\n| `vscode_get_code_actions`      | Available code actions / quick fixes for a selection or explicit range, plus intersecting diagnostics                                                                  |\n| `vscode_get_notifications`     | Buffered bridge events such as selection, editor, diagnostics, save, and dirty-state changes                                                                           |\n\n### Action tools\n\n| Tool                          | What it does                                                                                     |\n| ----------------------------- | ------------------------------------------------------------------------------------------------ |\n| `vscode_open_file`            | Opens a file in VS Code and can reveal/select a range                                            |\n| `vscode_check_document_dirty` | Checks whether a file is open and whether it has unsaved changes                                 |\n| `vscode_save_document`        | Saves a document through VS Code                                                                 |\n| `vscode_execute_code_action`  | Executes a previously returned code action by `actionId`                                         |\n| `vscode_apply_workspace_edit` | Applies explicit range-based text replacements through VS Code so open buffers stay synchronized |\n| `vscode_format_document`      | Runs the active document formatter for a file and applies the resulting edits through VS Code    |\n| `vscode_format_range`         | Runs the active range formatter for a selection/range and applies the resulting edits            |\n| `vscode_clear_notifications`  | Clears the buffered bridge notification queue                                                    |\n| `vscode_show_notification`    | Shows an info, warning, or error notification inside VS Code                                     |\n\n### Notes\n\n- Paths accepted by file-based bridge tools can be absolute or workspace-relative.\n- `vscode_get_code_actions` accepts either `selection` or explicit `start` / `end` positions.\n- `vscode_execute_code_action` only works with an `actionId` returned by the most recent `vscode_get_code_actions` calls while that cached entry still exists.\n- `vscode_apply_workspace_edit` applies one or more `{ filePath, range, newText }` replacements via VS Code rather than editing files behind the editor's back.\n- `vscode_format_range` accepts either `selection` or explicit `start` / `end` positions.\n- `vscode_format_document` / `vscode_format_range` use VS Code formatting providers and apply formatter-generated `TextEdit[]` results with `workspace.applyEdit`, which is safer for open or dirty buffers than shelling out.\n- `vscode_get_selection` falls back to the latest cached VS Code selection when focus is in the pi terminal and VS Code reports no active text editor.\n- `vscode_get_notifications` supports `since` and `limit` parameters for incremental polling.\n- Oversized bridge tool results are capped; when a response exceeds the limit, the tool returns a valid JSON wrapper with `truncated: true`, original size metadata, and a `resultJsonPrefix` preview.\n\nThese bridge tools let pi inspect selections, diagnostics, symbols, definitions, declarations, implementations, hover/type info, workspace-wide symbol search, references, quick-fix availability, dirty state, and recent IDE events, while also safely opening files, saving buffers, applying workspace edits, formatting open buffers through VS Code providers, running VS Code code actions, and surfacing notifications back to the user.\n\n## Configuration\n\n| Setting          | Default | Description                                             |\n| ---------------- | ------- | ------------------------------------------------------- |\n| `pi-vscode.path` | `\"\"`    | Absolute path to the pi binary (auto-detected if empty) |\n\nOn Windows, an extensionless `pi-vscode.path` is auto-probed for `.cmd`/`.exe`/`.ps1` variants so extensionless npm shims work out of the box.\n","summary":"The pi-vscode extension integrates the pi coding agent directly into Visual Studio Code, providing a seamless terminal-based workflow for AI-assisted development. It offers deep editor awareness by allowing the agent to inspect active files, selections, workspace diagnostics, and LSP data, while also including a sidebar for managing packages and a dedicated `@pi` chat participant. This tool is ideal for developers who want to leverage the power of the pi coding agent within their IDE without leaving their familiar text editing environment.","description":"Minimal VS Code extension for PI Coding Agent.","stars":121,"language":"TypeScript"},{"owner":"rivet-dev","repo":"sandbox-agent","url":"https://github.com/rivet-dev/sandbox-agent","readme":"<p align=\"center\">\n  <img src=\".github/media/banner.png\" alt=\"Sandbox Agent SDK\" />\n</p>\n\n<h3 align=\"center\">Run Coding Agents in Sandboxes. Control Them Over HTTP.</h3>\n\n<p align=\"center\">\n  A server that runs inside your sandbox. Your app connects remotely to control Claude Code, Codex, OpenCode, Cursor, Amp, or Pi — streaming events, handling permissions, managing sessions.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://sandboxagent.dev/docs\">Documentation</a> — <a href=\"https://sandboxagent.dev/docs/api-reference\">API Reference</a> — <a href=\"https://rivet.dev/discord\">Discord</a>\n</p>\n\n<p align=\"center\">\n  <em><strong>Experimental:</strong> <a href=\"./gigacode/\">Gigacode</a> — use OpenCode's TUI with any coding agent.</em>\n</p>\n\n## Why Sandbox Agent?\n\nRunning coding agents remotely is hard. Existing SDKs assume local execution, SSH breaks TTY handling and streaming, and every agent has a different API. Building from scratch means reimplementing everything for each coding agent.\n\nSandbox Agent solves three problems:\n\n1. **Coding agents need sandboxes** — You can't let AI execute arbitrary code on your production servers. Coding agents need isolated environments, but existing SDKs assume local execution. Sandbox Agent is a server that runs inside the sandbox and exposes HTTP/SSE.\n\n2. **Every coding agent is different** — Claude Code, Codex, OpenCode, Cursor, Amp, and Pi each have proprietary APIs, event formats, and behaviors. Swapping agents means rewriting your integration. Sandbox Agent provides one HTTP API — write your code once, swap agents with a config change.\n\n3. **Sessions are ephemeral** — Agent transcripts live in the sandbox. When the process ends, you lose everything. Sandbox Agent streams events in a universal schema to your storage. Persist to Postgres, ClickHouse, or [Rivet](https://rivet.dev). Replay later, audit everything.\n\n## Features\n\n- **Universal Agent API**: Single interface to control Claude Code, Codex, OpenCode, Cursor, Amp, and Pi with full feature coverage\n- **Universal Session Schema**: Standardized schema that normalizes all agent event formats for storage and replay\n- **Runs Inside Any Sandbox**: Lightweight static Rust binary. One curl command to install inside E2B, Daytona, Modal, Cloudflare Containers, Agent Computer, or Docker\n- **Server or SDK Mode**: Run as an HTTP server or embed with the TypeScript SDK\n- **OpenAPI Spec**: [Well documented](https://sandboxagent.dev/docs/api-reference) and easy to integrate from any language\n- **OpenCode SDK & UI Support** *(Experimental)*: [Connect OpenCode CLI, SDK, or web UI](https://sandboxagent.dev/docs/opencode-compatibility) to control agents through familiar OpenCode tooling\n\n## Architecture\n\n![Agent Architecture Diagram](./.github/media/agent-diagram.gif)\n\nThe Sandbox Agent acts as a universal adapter between your client application and various coding agents. Each agent has its own adapter that handles the translation between the universal API and the agent-specific interface.\n\n- **Embedded Mode**: Runs agents locally as subprocesses\n- **Server Mode**: Runs as HTTP server from any sandbox provider\n\n[Architecture documentation](https://sandboxagent.dev/docs)\n\n## Components\n\n| Component | Description |\n|-----------|-------------|\n| **Server** | Rust daemon (`sandbox-agent server`) exposing the HTTP + SSE API |\n| **SDK** | TypeScript client with embedded and server modes |\n| **Inspector** | Built-in UI at inspecting sessions and events |\n| **CLI** | `sandbox-agent` (same binary, plus npm wrapper) mirrors the HTTP endpoints |\n\n## Get Started\n\nChoose the installation method that works best for your use case.\n\n### Skill\n\nInstall skill with:\n\n```bash\nnpx skills add rivet-dev/skills -s sandbox-agent\n```\n\n```bash\nbunx skills add rivet-dev/skills -s sandbox-agent\n```\n\n### TypeScript SDK\n\nImport the SDK directly into your Node or browser application. Full type safety and streaming support.\n\n**Install**\n\n```bash\nnpm install sandbox-agent@0.4.x\n```\n\n```bash\nbun add sandbox-agent@0.4.x\n# Optional: allow Bun to run postinstall scripts for native binaries (required for SandboxAgent.start()).\nbun pm trust @sandbox-agent/cli-linux-x64 @sandbox-agent/cli-linux-arm64 @sandbox-agent/cli-darwin-arm64 @sandbox-agent/cli-darwin-x64 @sandbox-agent/cli-win32-x64\n```\n\n**Setup**\n\nLocal (embedded mode):\n\n```ts\nimport { SandboxAgent } from \"sandbox-agent\";\n\nconst client = await SandboxAgent.start();\n```\n\nRemote (server mode):\n\n```ts\nimport { SandboxAgent } from \"sandbox-agent\";\n\nconst client = await SandboxAgent.connect({\n  baseUrl: \"http://127.0.0.1:2468\",\n  token: process.env.SANDBOX_TOKEN,\n});\n```\n\n**API Overview**\n\n```ts\nconst agents = await client.listAgents();\n\nawait client.createSession(\"demo\", {\n  agent: \"codex\",\n  agentMode: \"default\",\n});\n\nawait client.postMessage(\"demo\", { message: \"Hello from the SDK.\" });\n\nfor await (const event of client.streamEvents(\"demo\", { offset: 0 })) {\n  console.log(event.type, event.data);\n}\n```\n\n[SDK documentation](https://sandboxagent.dev/docs/sdks/typescript) — [Managing Sessions](https://sandboxagent.dev/docs/manage-sessions)\n\n### HTTP Server\n\nRun as an HTTP server and connect from any language. Deploy to E2B, Daytona, Vercel, or your own infrastructure.\n\n```bash\n# Install it\ncurl -fsSL https://releases.rivet.dev/sandbox-agent/0.4.x/install.sh | sh\n# Run it\nsandbox-agent server --token \"$SANDBOX_TOKEN\" --host 127.0.0.1 --port 2468\n```\n\nOptional: preinstall agent binaries (no server required; they will be installed lazily on first use if you skip this):\n\n```bash\nsandbox-agent install-agent --all\n```\n\nTo disable auth locally:\n\n```bash\nsandbox-agent server --no-token --host 127.0.0.1 --port 2468\n```\n\n[Quickstart](https://sandboxagent.dev/docs/quickstart) — [Deployment guides](https://sandboxagent.dev/docs/deploy)\n\n### CLI\n\nInstall the CLI wrapper (optional but convenient):\n\n```bash\nnpm install -g @sandbox-agent/cli@0.4.x\n```\n\n```bash\n# Allow Bun to run postinstall scripts for native binaries.\nbun add -g @sandbox-agent/cli@0.4.x\nbun pm -g trust @sandbox-agent/cli-linux-x64 @sandbox-agent/cli-linux-arm64 @sandbox-agent/cli-darwin-arm64 @sandbox-agent/cli-darwin-x64 @sandbox-agent/cli-win32-x64\n```\n\nCreate a session and send a message:\n\n```bash\nsandbox-agent api sessions create my-session --agent codex --endpoint http://127.0.0.1:2468 --token \"$SANDBOX_TOKEN\"\nsandbox-agent api sessions send-message my-session --message \"Hello\" --endpoint http://127.0.0.1:2468 --token \"$SANDBOX_TOKEN\"\nsandbox-agent api sessions send-message-stream my-session --message \"Hello\" --endpoint http://127.0.0.1:2468 --token \"$SANDBOX_TOKEN\"\n```\n\nYou can also use npx like:\n\n```bash\nnpx @sandbox-agent/cli@0.4.x --help\n```\n\n```bash\nbunx @sandbox-agent/cli@0.4.x --help\n```\n\n[CLI documentation](https://sandboxagent.dev/docs/cli)\n\n### Inspector\n\nDebug sessions and events with the built-in Inspector UI (e.g., `http://localhost:2468/ui/`).\n\n![Sandbox Agent Inspector](./.github/media/inspector.png)\n\n[Inspector documentation](https://sandboxagent.dev/docs/inspector)\n\n### OpenAPI Specification\n\n[Explore API](https://sandboxagent.dev/docs/api-reference) — [View Specification](https://github.com/rivet-dev/sandbox-agent/blob/main/docs/openapi.json)\n\n### Tip: Extract credentials\n\nOften you need to use your personal API tokens to test agents on sandboxes:\n\n```bash\nsandbox-agent credentials extract-env --export\n```\n\nThis prints environment variables for your OpenAI/Anthropic/etc API keys to test with Sandbox Agent SDK.\n\n## FAQ\n\n<details>\n<summary><strong>Does this replace the Vercel AI SDK?</strong></summary>\n\nNo, they're complementary. AI SDK is for building chat interfaces and calling LLMs. This SDK is for controlling autonomous coding agents that write code and run commands. Use AI SDK for your UI, use this when you need an agent to actually code.\n</details>\n\n<details>\n<summary><strong>Which coding agents are supported?</strong></summary>\n\nClaude Code, Codex, OpenCode, Cursor, Amp, and Pi. The SDK normalizes their APIs so you can swap between them without changing your code.\n</details>\n\n<details>\n<summary><strong>How is session data persisted?</strong></summary>\n\nThis SDK does not handle persisting session data. Events stream in a universal JSON schema that you can persist anywhere. See [Managing Sessions](https://sandboxagent.dev/docs/manage-sessions) for patterns using Postgres or [Rivet Actors](https://rivet.dev).\n</details>\n\n<details>\n<summary><strong>Can I run this locally or does it require a sandbox provider?</strong></summary>\n\nBoth. Run locally for development, deploy to E2B, Daytona, or Vercel Sandboxes for production.\n</details>\n\n<details>\n<summary><strong>Does it support [platform]?</strong></summary>\n\nThe server is a single Rust binary that runs anywhere with a curl install. If your platform can run Linux binaries (Docker, VMs, etc.), it works. See the deployment guides for E2B, Daytona, and Vercel Sandboxes.\n</details>\n\n<details>\n<summary><strong>Can I use this with my personal API keys?</strong></summary>\n\nYes. Use `sandbox-agent credentials extract-env` to extract API keys from your local agent configs (Claude Code, Codex, OpenCode, Amp, Pi) and pass them to the sandbox environment.\n</details>\n\n<details>\n<summary><strong>Why Rust and not [language]?</strong></summary>\n\nRust gives us a single static binary, fast startup, and predictable memory usage. That makes it easy to run inside sandboxes or in CI without shipping a large runtime, such as Node.js.\n</details>\n\n<details>\n<summary><strong>Why can't I just run coding agents locally?</strong></summary>\n\nYou can for development. But in production, you need isolation. Coding agents execute arbitrary code — that can't happen on your servers. Sandboxes provide the isolation; this SDK provides the HTTP API to control coding agents remotely.\n</details>\n\n<details>\n<summary><strong>How is this different from the agent's official SDK?</strong></summary>\n\nOfficial SDKs assume local execution. They spawn processes and expect interactive terminals. This SDK runs a server inside a sandbox that you connect to over HTTP — designed for remote control from the start.\n</details>\n\n<details>\n<summary><strong>Why not just SSH into the sandbox?</strong></summary>\n\nCoding agents expect interactive terminals with proper TTY handling. SSH with piped commands breaks tool confirmations, streaming output, and human-in-the-loop flows. The SDK handles all of this over a clean HTTP API.\n</details>\n\n## Out of Scope\n\n- **Storage of sessions on disk**: Sessions are already stored by the respective coding agents on disk. It's assumed that the consumer is streaming data from this machine to an external storage, such as Postgres, ClickHouse, or Rivet.\n- **Direct LLM wrappers**: Use the [Vercel AI SDK](https://ai-sdk.dev/docs/introduction) if you want to implement your own agent from scratch.\n- **Git Repo Management**: Just use git commands or the features provided by your sandbox provider of choice.\n- **Sandbox Provider API**: Sandbox providers have many nuanced differences in their API, it does not make sense for us to try to provide a custom layer. Instead, we opt to provide guides that let you integrate this repository with sandbox providers.\n\n## Roadmap\n\n- [ ] Python SDK\n- [ ] Automatic MCP & skill & hook configuration\n- [ ] Todo lists\n","summary":"Sandbox Agent is a lightweight Rust-based server that provides a unified HTTP interface for controlling various AI coding agents like Claude Code, Cursor, and OpenCode within isolated environments. By abstracting away the unique API requirements of each agent, it allows developers to swap models seamlessly while standardizing event streaming and session persistence. This project is ideal for engineers building AI-driven development tools who need a secure, reliable way to execute code in sandboxes while maintaining auditability and cross-platform compatibility.","description":"Run Coding Agents in Sandboxes. Control Them Over HTTP. Supports Claude Code, Codex, OpenCode, and Amp.","stars":1421,"language":"TypeScript"},{"owner":"datawhalechina","repo":"hello-agents","url":"https://github.com/datawhalechina/hello-agents","readme":"<div align=\"right\">\n  <a href=\"./README_EN.md\">English</a> | 中文\n</div>\n\n<div align='center'>\n  <img src=\"./docs/images/hello-agents.png\" alt=\"alt text\" width=\"100%\">\n  <h1>Hello-Agents</h1>\n  <h3>🤖 《从零开始构建智能体》</h3>\n  <div align=\"center\">\n  <a href=\"https://trendshift.io/repositories/15520\" target=\"_blank\">\n    <img src=\"https://trendshift.io/api/badge/repositories/15520\" alt=\"datawhalechina%2Fhello-agents | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/>\n  </a>\n  </div>\n  <p><em>从基础理论到实际应用，全面掌握智能体系统的设计与实现</em></p>\n  <img src=\"https://img.shields.io/github/stars/datawhalechina/Hello-Agents?style=flat&logo=github\" alt=\"GitHub stars\"/>\n  <img src=\"https://img.shields.io/github/forks/datawhalechina/Hello-Agents?style=flat&logo=github\" alt=\"GitHub forks\"/>\n  <img src=\"https://img.shields.io/badge/language-Chinese-brightgreen?style=flat\" alt=\"Language\"/>\n  <a href=\"https://github.com/datawhalechina/Hello-Agents\"><img src=\"https://img.shields.io/badge/GitHub-Project-blue?style=flat&logo=github\" alt=\"GitHub Project\"></a>\n  <a href=\"https://datawhalechina.github.io/hello-agents/\"><img src=\"https://img.shields.io/badge/在线阅读-Online%20Reading-green?style=flat&logo=gitbook\" alt=\"Online Reading\"></a>\n</div>\n\n---\n\n## 🎯 项目介绍\n\n&emsp;&emsp;如果说 2024 年是\"百模大战\"的元年，那么 2025 年无疑开启了\"Agent 元年\"。技术的焦点正从训练更大的基础模型，转向构建更聪明的智能体应用。然而，当前系统性、重实践的教程却极度匮乏。为此，我们发起了 Hello-Agents 项目，希望能为社区提供一本从零开始、理论与实战并重的智能体系统构建指南。\n\n&emsp;&emsp;Hello-Agents 是 Datawhale 社区的<strong>系统性智能体学习教程</strong>。如今 Agent 构建主要分为两派，一派是 Dify，Coze，n8n 这类软件工程类 Agent，其本质是流程驱动的软件开发，LLM 作为数据处理的后端；另一派则是 AI 原生的 Agent，即真正以 AI 驱动的 Agent。本教程旨在带领大家深入理解并构建后者——真正的 AI Native Agent。教程将带领你穿透框架表象，从智能体的核心原理出发，深入其核心架构，理解其经典范式，并最终亲手构建起属于自己的多智能体应用。我们相信，最好的学习方式就是动手实践。希望这本教程能成为你探索智能体世界的起点，能够从一名大语言模型的\"使用者\"，蜕变为一名智能体系统的\"构建者\"。\n\n## 📚 快速开始\n\n### 在线阅读\n**[🌐 国外访问](https://datawhalechina.github.io/hello-agents/)** | **[🚀 国内加速](https://hello-agents.datawhale.cc)** - 无需下载，随时随地学习\n\n### 本地阅读\n如果您希望在本地阅读或贡献内容，请参考下方的学习指南。\n\n### ✨ 你将收获什么？\n\n- 📖 <strong>Datawhale 开源免费</strong> 完全免费学习本项目所有内容，与社区共同成长\n- 🔍 <strong>理解核心原理</strong> 深入理解智能体的概念、历史与经典范式\n- 🏗️ <strong>亲手实现</strong> 掌握热门低代码平台和智能体代码框架的使用\n- 🛠️ <strong>自研框架 [HelloAgents](https://github.com/jjyaoao/helloagents)</strong> 基于 Openai 原生 API 从零构建一个自己的智能体框架\n- ⚙️ <strong>掌握高级技能</strong> 一步步实现上下文工程、Memory、协议、评估等系统性技术\n- 🤝 <strong>模型训练</strong> 掌握 Agentic RL，从 SFT 到 GRPO 的全流程实战训练 LLM\n- 🚀 <strong>驱动真实案例</strong> 实战开发智能旅行助手、赛博小镇等综合项目\n- 📖 <strong>求职面试</strong> 学习智能体求职相关面试问题\n\n## 📖 内容导航\n\n| 章节                                                                                        | 关键内容                                      | 状态 |\n| ------------------------------------------------------------------------------------------- | --------------------------------------------- | ---- |\n| [前言](./docs/前言.md)                                                                      | 项目的缘起、背景及读者建议                    | ✅    |\n| <strong>第一部分：智能体与语言模型基础</strong>                                             |                                               |      |\n| [第一章 初识智能体](./docs/chapter1/第一章%20初识智能体.md)                                 | 智能体定义、类型、范式与应用                  | ✅    |\n| [第二章 智能体发展史](./docs/chapter2/第二章%20智能体发展史.md)                             | 从符号主义到 LLM 驱动的智能体演进             | ✅    |\n| [第三章 大语言模型基础](./docs/chapter3/第三章%20大语言模型基础.md)                         | Transformer、提示、主流 LLM 及其局限          | ✅    |\n| <strong>第二部分：构建你的大语言模型智能体</strong>                                         |                                               |      |\n| [第四章 智能体经典范式构建](./docs/chapter4/第四章%20智能体经典范式构建.md)                 | 手把手实现 ReAct、Plan-and-Solve、Reflection  | ✅    |\n| [第五章 基于低代码平台的智能体搭建](./docs/chapter5/第五章%20基于低代码平台的智能体搭建.md) | 了解 Coze、Dify、n8n 等低代码智能体平台使用   | ✅    |\n| [第六章 框架开发实践](./docs/chapter6/第六章%20框架开发实践.md)                             | AutoGen、AgentScope、LangGraph 等主流框架应用 | ✅    |\n| [第七章 构建你的Agent框架](./docs/chapter7/第七章%20构建你的Agent框架.md)                   | 从 0 开始构建智能体框架                       | ✅    |\n| <strong>第三部分：高级知识扩展</strong>                                                     |                                               |      |\n| [第八章 记忆与检索](./docs/chapter8/第八章%20记忆与检索.md)                                 | 记忆
