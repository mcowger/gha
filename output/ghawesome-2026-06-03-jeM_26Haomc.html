\n## Project Status\n\n![Repobeats analytics image](https://repobeats.axiom.co/api/embed/a1d6fe2c13ea2bb53a5154435a71e2431f70c2ee.svg 'Repobeats analytics image')\n\n## Acknowledgements\n\n- [Reka UI](https://github.com/unovue/reka-ui): for designing the documentation site, the new landing page is based on this, as well as implementing a massive amount of UI components. (shadcn-vue is using Reka UI as the headless, do checkout!)\n- [pixiv/ChatVRM](https://github.com/pixiv/ChatVRM)\n- [josephrocca/ChatVRM-js: A JS conversion/adaptation of parts of the ChatVRM (TypeScript) code for standalone use in OpenCharacters and elsewhere](https://github.com/josephrocca/ChatVRM-js)\n- Design of UI and style was inspired by [Cookard](https://store.steampowered.com/app/2919650/Cookard/), [UNBEATABLE](https://store.steampowered.com/app/2240620/UNBEATABLE/), and [Sensei! I like you so much!](https://store.steampowered.com/app/2957700/_/), and artworks of [Ayame by Mercedes Bazan](https://dribbble.com/shots/22157656-Ayame) with [Wish by Mercedes Bazan](https://dribbble.com/shots/24501019-Wish)\n- [mallorbc/whisper_mic](https://github.com/mallorbc/whisper_mic)\n- [`xsai`](https://github.com/moeru-ai/xsai): Implemented a decent amount of packages to interact with LLMs and models, like [Vercel AI SDK](https://sdk.vercel.ai/) but way small.\n\n## Supporters\n\n<p align=\"center\">\n  <strong>Thank you for supporting Project AIRI through OpenCollective, Patreon, and Ko-fi.</strong>\n</p>\n\n<p align=\"center\">\n  <img src=\"./docs/content/public/assets/sponsors/sponsors.svg\" alt=\"Project AIRI supporters\" />\n</p>\n\n## Special Thanks\n\nSpecial thanks to all contributors for their contributions to Project AIRI ❤️\n\n<a href=\"https://github.com/moeru-ai/airi/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=moeru-ai/airi\" />\n</a>\n\n## Star History\n\n<a href=\"https://star-history.com/#moeru-ai/airi&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date\" />\n  </picture>\n</a>\n","summary":"Project AIRI is a specialized platform designed to bring AI-powered virtual characters and \"waifus\" to life, serving as a soul container for interactive digital personalities. It provides an integrated environment for users to create and deploy sophisticated, persona-driven AI agents that can interact with the real world. This project is ideal for developers and enthusiasts interested in character AI, VTubing, or building expressive, autonomous virtual companions.","description":"💖🧸 Self hosted, you-owned Grok Companion, a container of souls of waifu, cyber livings to bring them into our worlds, wishing to achieve Neuro-sama's altitude. Capable of realtime voice chat, Minecraft, Factorio playing. Web / macOS / Windows supported.","stars":40643,"language":"TypeScript"},{"owner":"anthropics","repo":"claude-code","url":"https://github.com/anthropics/claude-code","readme":"# Claude Code\n\n![](https://img.shields.io/badge/Node.js-18%2B-brightgreen?style=flat-square) [![npm]](https://www.npmjs.com/package/@anthropic-ai/claude-code)\n\n[npm]: https://img.shields.io/npm/v/@anthropic-ai/claude-code.svg?style=flat-square\n\nClaude Code is an agentic coding tool that lives in your terminal, understands your codebase, and helps you code faster by executing routine tasks, explaining complex code, and handling git workflows -- all through natural language commands. Use it in your terminal, IDE, or tag @claude on Github.\n\n**Learn more in the [official documentation](https://code.claude.com/docs/en/overview)**.\n\n<img src=\"./demo.gif\" />\n\n## Get started\n> [!NOTE]\n> Installation via npm is deprecated. Use one of the recommended methods below.\n\nFor more installation options, uninstall steps, and troubleshooting, see the [setup documentation](https://code.claude.com/docs/en/setup).\n\n1. Install Claude Code:\n\n    **MacOS/Linux (Recommended):**\n    ```bash\n    curl -fsSL https://claude.ai/install.sh | bash\n    ```\n\n    **Homebrew (MacOS/Linux):**\n    ```bash\n    brew install --cask claude-code\n    ```\n\n    **Windows (Recommended):**\n    ```powershell\n    irm https://claude.ai/install.ps1 | iex\n    ```\n\n    **WinGet (Windows):**\n    ```powershell\n    winget install Anthropic.ClaudeCode\n    ```\n\n    **NPM (Deprecated):**\n    ```bash\n    npm install -g @anthropic-ai/claude-code\n    ```\n\n2. Navigate to your project directory and run `claude`.\n\n## Plugins\n\nThis repository includes several Claude Code plugins that extend functionality with custom commands and agents. See the [plugins directory](./plugins/README.md) for detailed documentation on available plugins.\n\n## Reporting Bugs\n\nWe welcome your feedback. Use the `/bug` command to report issues directly within Claude Code, or file a [GitHub issue](https://github.com/anthropics/claude-code/issues).\n\n## Connect on Discord\n\nJoin the [Claude Developers Discord](https://anthropic.com/discord) to connect with other developers using Claude Code. Get help, share feedback, and discuss your projects with the community.\n\n## Data collection, usage, and retention\n\nWhen you use Claude Code, we collect feedback, which includes usage data (such as code acceptance or rejections), associated conversation data, and user feedback submitted via the `/bug` command.\n\n### How we use your data\n\nSee our [data usage policies](https://code.claude.com/docs/en/data-usage).\n\n### Privacy safeguards\n\nWe have implemented several safeguards to protect your data, including limited retention periods for sensitive information, restricted access to user session data, and clear policies against using feedback for model training.\n\nFor full details, please review our [Commercial Terms of Service](https://www.anthropic.com/legal/commercial-terms) and [Privacy Policy](https://www.anthropic.com/legal/privacy).\n","summary":"Claude Code is an agentic command-line interface that allows developers to interact with their codebases using natural language directly from the terminal. It streamlines the development process by automating routine tasks, managing git workflows, and providing explanations for complex segments of code. This tool is ideal for software engineers looking to increase their productivity by offloading repetitive coding chores to an intelligent assistant that understands their project context.","description":"Claude Code is an agentic coding tool that lives in your terminal, understands your codebase, and helps you code faster by executing routine tasks, explaining complex code, and handling git workflows - all through natural language commands.","stars":129616,"language":"Python"},{"owner":"Wei-Shaw","repo":"claude-relay-service","url":"https://github.com/Wei-Shaw/claude-relay-service","readme":"# Claude Relay Service\n\n> [!CAUTION]\n> **安全更新通知**：v1.1.248 及以下版本存在严重的管理员认证绕过漏洞，攻击者可未授权访问管理面板。\n>\n> **请立即更新到 v1.1.249+ 版本**，或迁移到新一代项目 **[CRS 2.0 (sub2api)](https://github.com/Wei-Shaw/sub2api)**\n\n<div align=\"center\">\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![Node.js](https://img.shields.io/badge/Node.js-18+-green.svg)](https://nodejs.org/)\n[![Redis](https://img.shields.io/badge/Redis-6+-red.svg)](https://redis.io/)\n[![Docker](https://img.shields.io/badge/Docker-Ready-blue.svg)](https://www.docker.com/)\n[![Docker Build](https://github.com/Wei-Shaw/claude-relay-service/actions/workflows/auto-release-pipeline.yml/badge.svg)](https://github.com/Wei-Shaw/claude-relay-service/actions/workflows/auto-release-pipeline.yml)\n[![Docker Pulls](https://img.shields.io/docker/pulls/weishaw/claude-relay-service)](https://hub.docker.com/r/weishaw/claude-relay-service)\n\n**🔐 自行搭建Claude API中转服务，支持多账户管理**\n\n[English](README_EN.md) • [快速开始](https://pincc.ai/) • [演示站点](https://demo.pincc.ai/admin-next/login) • [公告频道](https://t.me/claude_relay_service)\n\n</div>\n\n---\n\n## 💎 Claude/Codex 拼车服务推荐\n\n<div align=\"center\">\n\n| 平台 | 服务 | 介绍 |\n|:---|:---|:---|\n| **[pincc.ai](https://pincc.ai/)** | <small>✅ Claude Code<br>✅ Codex CLI</small> | 提供稳定的 Codex CLI 拼车服务<br><br> **全新上线 2API 渠道**：接入CC的效果媲美官方 Anthropic Console 账号，暂不支持 PDF 识别功能 <br>💰 单价：0.8元=1美金额度 |\n\n\n</div>\n\n---\n\n## ⚠️ 重要提醒\n\n**使用本项目前请仔细阅读：**\n\n🚨 **服务条款风险**: 使用本项目可能违反Anthropic的服务条款。请在使用前仔细阅读Anthropic的用户协议，使用本项目的一切风险由用户自行承担。\n\n📖 **免责声明**: 本项目仅供技术学习和研究使用，作者不对因使用本项目导致的账户封禁、服务中断或其他损失承担任何责任。\n\n\n## 🤔 这个项目适合你吗？\n\n- 🌍 **地区限制**: 所在地区无法直接访问Claude Code服务？\n- 🔒 **隐私担忧**: 担心第三方镜像服务会记录或泄露你的对话内容？\n- 👥 **成本分摊**: 想和朋友一起分摊Claude Code Max订阅费用？\n- ⚡ **稳定性**: 第三方镜像站经常故障不稳定，影响效率 ？\n\n如果有以上困惑，那这个项目可能适合你。\n\n### 适合的场景\n\n✅ **找朋友拼车**: 三五好友一起分摊Claude Code Max订阅  \n✅ **隐私敏感**: 不想让第三方镜像看到你的对话内容  \n✅ **技术折腾**: 有基本的技术基础，愿意自己搭建和维护  \n✅ **稳定需求**: 需要长期稳定的Claude访问，不想受制于镜像站  \n✅ **地区受限**: 无法直接访问Claude官方服务\n\n---\n\n## 💭 为什么要自己搭？\n\n### 现有镜像站可能的问题\n\n- 🕵️ **隐私风险**: 你的对话内容都被人家看得一清二楚，商业机密什么的就别想了\n- 🐌 **性能不稳**: 用的人多了就慢，高峰期经常卡死\n- 💰 **价格不透明**: 不知道实际成本\n\n### 自建的好处\n\n- 🔐 **数据安全**: 所有接口请求都只经过你自己的服务器，直连Anthropic API\n- ⚡ **性能可控**: 就你们几个人用，Max 200刀套餐基本上可以爽用Opus\n- 💰 **成本透明**: 用了多少token一目了然，按官方价格换算了具体费用\n- 📊 **监控完整**: 使用情况、成本分析、性能监控全都有\n\n---\n\n## 🚀 核心功能\n\n### 基础功能\n\n- ✅ **多账户管理**: 可以添加多个Claude账户自动轮换\n- ✅ **自定义API Key**: 给每个人分配独立的Key\n- ✅ **使用统计**: 详细记录每个人用了多少token\n\n### 高级功能\n\n- 🔄 **智能切换**: 账户出问题自动换下一个\n- 🚀 **性能优化**: 连接池、缓存，减少延迟\n- 📊 **监控面板**: Web界面查看所有数据\n- 🛡️ **安全控制**: 访问限制、速率控制、客户端限制\n- 🌐 **代理支持**: 支持HTTP/SOCKS5代理\n\n---\n\n## 📋 部署要求\n\n### 硬件要求（最低配置）\n\n- **CPU**: 1核心就够了\n- **内存**: 512MB（建议1GB）\n- **硬盘**: 30GB可用空间\n- **网络**: 能访问到Anthropic API（建议使用US地区的机器）\n- **建议**: 2核4G的基本够了，网络尽量选回国线路快一点的（为了提高速度，建议不要开代理或者设置服务器的IP直连）\n- **经验**: 阿里云、腾讯云的海外主机经测试会被Cloudflare拦截，无法直接访问claude api\n\n### 软件要求\n\n- **Node.js** 18或更高版本\n- **Redis** 6或更高版本\n- **操作系统**: 建议Linux\n\n### 费用估算\n\n- **服务器**: 轻量云服务器，一个月30-60块\n- **Claude订阅**: 看你怎么分摊了\n- **其他**: 域名（可选）\n\n---\n\n## 🚀 脚本部署（推荐）\n\n推荐使用管理脚本进行一键部署，简单快捷，自动处理所有依赖和配置。\n\n### 快速安装\n\n```bash\ncurl -fsSL https://pincc.ai/manage.sh -o manage.sh && chmod +x manage.sh && ./manage.sh install\n```\n\n### 脚本功能\n\n- ✅ **一键安装**: 自动检测系统环境，安装 Node.js 18+、Redis 等依赖\n- ✅ **交互式配置**: 友好的配置向导，设置端口、Redis 连接等\n- ✅ **自动启动**: 安装完成后自动启动服务并显示访问地址\n- ✅ **便捷管理**: 通过 `crs` 命令随时管理服务状态\n\n### 管理命令\n\n```bash\ncrs install   # 安装服务\ncrs start     # 启动服务\ncrs stop      # 停止服务\ncrs restart   # 重启服务\ncrs status    # 查看状态\ncrs update    # 更新服务\ncrs uninstall # 卸载服务\n```\n\n### 安装示例\n\n```bash\n$ crs install\n\n# 会依次询问：\n安装目录 (默认: ~/claude-relay-service):\n服务端口 (默认: 3000): 8080\nRedis 地址 (默认: localhost):\nRedis 端口 (默认: 6379):\nRedis 密码 (默认: 无密码):\n\n# 安装完成后自动启动并显示：\n服务已成功安装并启动！\n\n访问地址：\n  本地 Web: http://localhost:8080/web\n  公网 Web: http://YOUR_IP:8080/web\n\n管理员账号信息已保存到: data/init.json\n```\n\n### 系统要求\n\n- 支持系统: Ubuntu/Debian、CentOS/RedHat、Arch Linux、macOS\n- 自动安装 Node.js 18+ 和 Redis\n- Redis 使用系统默认位置，数据独立于应用\n\n---\n\n## 📦 手动部署\n\n### 第一步：环境准备\n\n**Ubuntu/Debian用户：**\n\n```bash\n# 安装Node.js\ncurl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -\nsudo apt-get install -y nodejs\n\n# 安装Redis\nsudo apt update\nsudo apt install redis-server\nsudo systemctl start redis-server\n```\n\n**CentOS/RHEL用户：**\n\n```bash\n# 安装Node.js\ncurl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -\nsudo yum install -y nodejs\n\n# 安装Redis\nsudo yum install redis\nsudo systemctl start redis\n```\n\n### 第二步：下载和配置\n\n```bash\n# 下载项目\ngit clone https://github.com/Wei-Shaw//claude-relay-service.git\ncd claude-relay-service\n\n# 安装依赖\nnpm install\n\n# 复制配置文件（重要！）\ncp config/config.example.js config/config.js\ncp .env.example .env\n```\n\n### 第三步：配置文件设置\n\n**编辑 `.env` 文件：**\n\n```bash\n# 这两个密钥随便生成，但要记住\nJWT_SECRET=你的超级秘密密钥\nENCRYPTION_KEY=32位的加密密钥随便写\n\n# Redis配置\nREDIS_HOST=localhost\nREDIS_PORT=6379\nREDIS_PASSWORD=\n\n```\n\n**编辑 `config/config.js` 文件：**\n\n```javascript\nmodule.exports = {\n  server: {\n    port: 3000, // 服务端口，可以改\n    host: '0.0.0.0' // 不用改\n  },\n  redis: {\n    host: '127.0.0.1', // Redis地址\n    port: 6379 // Redis端口\n  }\n  // 其他配置保持默认就行\n}\n```\n\n### 第四步：安装前端依赖并构建\n\n```bash\n# 安装前端依赖\nnpm run install:web\n\n# 构建前端（生成 dist 目录）\nnpm run build:web\n```\n\n### 第五步：启动服务\n\n```bash\n# 初始化\nnpm run setup # 会随机生成后台账号密码信息，存储在 data/init.json\n# 或者通过环境变量预设管理员凭据：\n# export ADMIN_USERNAME=cr_admin_custom\n# export ADMIN_PASSWORD=your-secure-password\n\n# 启动服务\nnpm run service:start:daemon   # 后台运行\n\n# 查看状态\nnpm run service:status\n```\n\n---\n\n## 🐳 Docker 部署\n\n### Docker compose\n\n#### 第一步：下载构建docker-compose.yml文件的脚本并执行\n```bash\ncurl -fsSL https://pincc.ai/crs-compose.sh -o crs-compose.sh && chmod +x crs-compose.sh && ./crs-compose.sh\n```\n\n#### 第二步：启动\n```bash\ndocker-compose up -d\n```\n\n### Docker Compose 配置\n\ndocker-compose.yml 已包含：\n\n- ✅ 自动初始化管理员账号\n- ✅ 数据持久化（logs和data目录自动挂载）\n- ✅ Redis数据库\n- ✅ 健康检查\n- ✅ 自动重启\n\n### 环境变量说明\n\n#### 必填项\n\n- `JWT_SECRET`: JWT密钥，至少32个字符\n- `ENCRYPTION_KEY`: 加密密钥，必须是32个字符\n\n#### 可选项\n\n- `ADMIN_USERNAME`: 管理员用户名（不设置则自动生成）\n- `ADMIN_PASSWORD`: 管理员密码（不设置则自动生成）\n- `LOG_LEVEL`: 日志级别（默认：info）\n- 更多配置项请参考 `.env.example` 文件\n\n### 管理员凭据获取方式\n\n1. **查看容器日志**\n\n   ```bash\n   docker logs claude-relay-service\n   ```\n\n2. **查看挂载的文件**\n\n   ```bash\n   cat ./data/init.json\n   ```\n\n3. **使用环境变量预设**\n   ```bash\n   # 在 .env 文件中设置\n   ADMIN_USERNAME=cr_admin_custom\n   ADMIN_PASSWORD=your-secure-password\n   ```\n\n---\n\n## 🎮 开始使用\n\n### 1. 打开管理界面\n\n浏览器访问：`http://你的服务器IP:3000/web`\n\n管理员账号：\n\n- 自动生成：查看 data/init.json\n- 环境变量预设：通过 ADMIN_USERNAME 和 ADMIN_PASSWORD 设置\n- Docker 部署：查看容器日志 `docker logs claude-relay-service`\n\n### 2. 添加Claude账户\n\n这一步比较关键，需要OAuth授权：\n\n1. 点击「Claude账户」标签\n2. 如果你担心多个账号共用1个IP怕被封禁，可以选择设置静态代理IP（可选）\n3. 点击「添加账户」\n4. 点击「生成授权链接」，会打开一个新页面\n5. 在新页面完成Claude登录和授权\n6. 复制返回的Authorization Code\n7. 粘贴到页面完成添加\n\n**注意**: 如果你在国内，这一步可能需要科学上网。\n\n### 2.1 临时暂停（503/5xx）与账号级 TTL 覆盖\n\n系统会在上游异常时临时暂停账号路由，默认由全局配置控制（见 `.env.example`）：\n\n- `UPSTREAM_ERROR_503_TTL_SECONDS`\n- `UPSTREAM_ERROR_5XX_TTL_SECONDS`\n- `UPSTREAM_ERROR_OVERLOAD_TTL_SECONDS`\n- `UPSTREAM_ERROR_AUTH_TTL_SECONDS`\n- `UPSTREAM_ERROR_TIMEOUT_TTL_SECONDS`\n\n在管理后台编辑 **Claude 官方 OAuth 账号** 时，可做账号级覆盖：\n\n- `禁用该账号临时冷却`：该账号不再因 503/5xx 进入临时暂停\n- `503 冷却秒数`：留空=跟随全局，`0`=关闭该账号 503 冷却\n- `5xx 冷却秒数`：留空=跟随全局，`0`=关闭该账号 5xx 冷却\n\n优先级从高到低：\n\n1. 账号级“禁用临时冷却”\n2. 账号级 503/5xx 冷却秒数\n3. 代码调用时传入的自定义 TTL（若有）\n4. 全局环境变量默认值\n\n账户列表会显示“不可路由原因”，包含错误类型、HTTP 状态码、内部冷却总时长、剩余时间和预计恢复时间；点击 `重置状态` 可清除异常状态并恢复参与路由。\n\n### 3. 创建API Key\n\n给每个使用者分配一个Key：\n\n1. 点击「API Keys」标签\n2. 点击「创建新Key」\n3. 给Key起个名字，比如「张三的Key」\n4. 设置使用限制（可选）：\n   - **速率限制**: 限制每个时间窗口的请求次数和Token使用量\n   - **并发限制**: 限制同时处理的请求数\n   - **模型限制**: 限制可访问的模型列表\n   - **客户端限制**: 限制只允许特定客户端使用（如ClaudeCode、Gemini-CLI等）\n5. 保存，记下生成的Key\n\n### 4. 开始使用 Claude Code 和 Gemini CLI\n\n现在你可以用自己的服务替换官方API了：\n\n**Claude Code 设置环境变量：**\n\n\n**使用标准 Claude 账号池**\n\n默认使用标准 Claude 账号池：\n\n```bash\nexport ANTHROPIC_BASE_URL=\"http://127.0.0.1:3000/api/\" # 根据实际填写你服务器的ip地址或者域名\nexport ANTHROPIC_AUTH_TOKEN=\"后台创建的API密钥\"\n```\n\n**使用 Antigravity 账户池**\n\n适用于通过 Antigravity 渠道使用 Claude 模型（如 `claude-opus-4-5` 等）。\n\n```bash\n# 1. 设置 Base URL 为 Antigravity 专用路径\nexport ANTHROPIC_BASE_URL=\"http://127.0.0.1:3000/antigravity/api/\"\n\n# 2. 设置 API Key（在后台创建，权限需包含 'all' 或 'gemini'）\nexport ANTHROPIC_AUTH_TOKEN=\"后台创建的API密钥\"\n\n# 3. 指定模型名称（直接使用短名，无需前缀！）\nexport ANTHROPIC_MODEL=\"claude-opus-4-5\"\n\n# 4. 启动\nclaude\n```\n\n**VSCode Claude 插件配置：**\n\n如果使用 VSCode 的 Claude 插件，需要在 `~/.claude/config.json` 文件中配置：\n\n```json\n{\n    \"primaryApiKey\": \"crs\"\n}\n```\n\n如果该文件不存在，请手动创建。Windows 用户路径为 `C:\\Users\\你的用户名\\.claude\\config.json`。\n\n> 💡 **IntelliJ IDEA 用户推荐**：[Claude Code Plus](https://github.com/touwaeriol/claude-code-plus) - 将 Claude Code 直接集成到 IDE，支持代码理解、文件读写、命令执行。插件市场搜索 `Claude Code Plus` 即可安装。\n\n**Gemini CLI 设置环境变量：**\n\n**方式一（推荐）：通过 Gemini Assist API 方式访问**\n\n```bash\nCODE_ASSIST_ENDPOINT=\"http://127.0.0.1:3000/gemini\"  # 根据实际填写你服务器的ip地址或者域名\nGOOGLE_CLOUD_ACCESS_TOKEN=\"后台创建的API密钥\"\nGOOGLE_GENAI_USE_GCA=\"true\"\nGEMINI_MODEL=\"gemini-2.5-pro\" # 如果你有gemini3权限可以填： gemini-3-pro-preview\n```\n\n> **认证**：只能选 ```Login with Google``` 进行认证，如果跳 Google请删除 ```~/.gemini/settings.json``` 后再尝试启动```gemini```。  \n> **注意**：gemini-cli 控制台会提示 `Failed to fetch user info: 401 Unauthorized`，但使用不受任何影响。  \n\n**方式二：通过 Gemini API 方式访问**\n\n\n```bash\nGOOGLE_GEMINI_BASE_URL=\"http://127.0.0.1:3000/gemini\"  # 根据实际填写你服务器的ip地址或者域名\nGEMINI_API_KEY=\"后台创建的API密钥\"\nGEMINI_MODEL=\"gemini-2.5-pro\" # 如果你有gemini3权限可以填： gemini-3-pro-preview\n```\n\n> **认证**：只能选 ```Use Gemini API Key``` 进行认证，如果提示 ```Enter Gemini API Key``` 请直接留空按回车。如果一打开就跳 Google请删除 ```~/.gemini/settings.json``` 后再尝试启动```gemini```。\n\n> 💡 **进阶用法**：想在 Claude Code 中直接使用 Gemini 3 模型？请参考 [Claude Code 调用 Gemini 3 模型指南](docs/claude-code-gemini3-guide/README.md)\n\n**使用 Claude Code：**\n\n```bash\nclaude\n```\n\n**使用 Gemini CLI：**\n\n```bash\ngemini  # 或其他 Gemini CLI 命令\n```\n\n**Codex 配置：**\n\n在 `~/.codex/config.toml` 文件**开头**添加以下配置：\n\n```toml\nmodel_provider = \"crs\"\nmodel = \"gpt-5.1-codex-max\"\nmodel_reasoning_effort = \"high\"\ndisable_response_storage = true\npreferred_auth_method = \"apikey\"\n\n[model_providers.crs]\nname = \"crs\"\nbase_url = \"http://127.0.0.1:3000/openai\"  # 根据实际填写你服务器的ip地址或者域名\nwire_api = \"responses\"\nrequires_openai_auth = true\n```\n\n在 `~/.codex/auth.json` 文件中配置API密钥为 null：\n\n```json\n{\n    \"OPENAI_API_KEY\": \"后台创建的API密钥\"  \n}\n```\n\n> ⚠️ 在通过 Nginx 反向代理 CRS 服务并使用 Codex CLI 时，需要在 http 块中添加 underscores_in_headers on;。因为 Nginx 默认会移除带下划线的请求头（如 session_id），一旦该头被丢弃，多账号环境下的粘性会话功能将失效。\n\n**Droid CLI 配置：**\n\nDroid CLI 读取 `~/.factory/config.json`。可以在该文件中添加自定义模型以指向本服务的新端点：\n\n```json\n{\n  \"custom_models\": [\n    {\n      \"model_display_name\": \"Opus 4.5 [crs]\",\n      \"model\": \"claude-opus-4-5-20251101\",\n      \"base_url\": \"http://127.0.0.1:3000/droid/claude\",\n      \"api_key\": \"后台创建的API密钥\",\n      \"provider\": \"anthropic\",\n      \"max_tokens\": 64000\n    },\n    {\n      \"model_display_name\": \"GPT5-Codex [crs]\",\n      \"model\": \"gpt-5-codex\",\n      \"base_url\": \"http://127.0.0.1:3000/droid/openai\",\n      \"api_key\": \"后台创建的API密钥\",\n      \"provider\": \"openai\",\n      \"max_tokens\": 16384\n    },\n    {\n      \"model_display_name\": \"Gemini-3-Pro [crs]\",\n      \"model\": \"gemini-3-pro-preview\",\n      \"base_url\": \"http://127.0.0.1:3000/droid/comm/v1/\",\n      \"api_key\": \"后台创建的API密钥\",\n      \"provider\": \"generic-chat-completion-api\",\n      \"max_tokens\": 65535\n    },\n    {\n      \"model_display_name\": \"GLM-4.6 [crs]\",\n      \"model\": \"glm-4.6\",\n      \"base_url\": \"http://127.0.0.1:3000/droid/comm/v1/\",\n      \"api_key\": \"后台创建的API密钥\",\n      \"provider\": \"generic-chat-completion-api\",\n      \"max_tokens\": 202800\n    }\n  ]\n}\n```\n\n> 💡 将示例中的 `http://127.0.0.1:3000` 替换为你的服务域名或公网地址，并写入后台生成的 API 密钥（cr_ 开头）。\n\n### 5. 第三方工具API接入\n\n本服务支持多种API端点格式，方便接入不同的第三方工具（如Cherry Studio等）。\n\n#### Cherry Studio 接入示例\n\nCherry Studio支持多种AI服务的接入，下面是不同账号类型的详细配置：\n\n**1. Claude账号接入：**\n\n```\n# API地址\nhttp://你的服务器:3000/claude\n\n# 模型ID示例\nclaude-sonnet-4-5-20250929 # Claude Sonnet 4.5\nclaude-opus-4-20250514     # Claude Opus 4\n```\n\n配置步骤：\n- 供应商类型选择\"Anthropic\"\n- API地址填入：`http://你的服务器:3000/claude`\n- API Key填入：后台创建的API密钥（cr_开头）\n\n**2. Gemini账号接入：**\n\n```\n# API地址\nhttp://你的服务器:3000/gemini\n\n# 模型ID示例\ngemini-2.5-pro             # Gemini 2.5 Pro\n```\n\n配置步骤：\n- 供应商类型选择\"Gemini\"\n- API地址填入：`http://你的服务器:3000/gemini`\n- API Key填入：后台创建的API密钥（cr_开头）\n\n**3. Codex接入：**\n\n```\n# API地址\nhttp://你的服务器:3000/openai\n\n# 模型ID（固定）\ngpt-5                      # Codex使用固定模型ID\n```\n\n配置步骤：\n- 供应商类型选择\"Openai-Response\"\n- API地址填入：`http://你的服务器:3000/openai`\n- API Key填入：后台创建的API密钥（cr_开头）\n- **重要**：Codex只支持Openai-Response标准\n\n\n**Cherry Studio 地址格式重要说明：**\n\n- ✅ **推荐格式**：`http://你的服务器:3000/claude`（不加结尾 `/`，让 Cherry Studio 自动加上 v1）\n- ✅ **等效格式**：`http://你的服务器:3000/claude/v1/`（手动指定 v1 并加结尾 `/`）\n- 💡 **说明**：这两种格式在 Cherry Studio 中是完全等效的\n- ❌ **错误格式**：`http://你的服务器:3000/claude/`（单独的 `/` 结尾会被 Cherry Studio 忽略 v1 版本）\n\n#### 其他第三方工具接入\n\n**接入要点：**\n\n- 所有账号类型都使用相同的API密钥（在后台统一创建）\n- 根据不同的路由前缀自动识别账号类型\n- `/claude/` - 使用Claude账号池\n- `/antigravity/api/` - 使用Antigravity账号池（推荐用于Claude Code）\n- `/droid/claude/` - 使用Droid类型Claude账号池（只建议api调用或Droid Cli中使用）\n- `/gemini/` - 使用Gemini账号池\n- `/openai/` - 使用Codex账号（只支持Openai-Response格式）\n- `/droid/openai/` - 使用Droid类型OpenAI兼容账号池（只建议api调用或Droid Cli中使用）\n- 支持所有标准API端点（messages、models等）\n\n**重要说明：**\n\n- 确保在后台已添加对应类型的账号（Claude/Gemini/Codex）\n- API密钥可以通用，系统会根据路由自动选择账号类型\n- 建议为不同用户创建不同的API密钥便于使用统计\n\n---\n\n## 🔧 日常维护\n\n### 服务管理\n\n```bash\n# 查看服务状态\nnpm run service:status\n\n# 查看日志\nnpm run service:logs\n\n# 重启服务\nnpm run service:restart:daemon\n\n# 停止服务\nnpm run service:stop\n```\n\n### 监控使用情况\n\n- **Web界面**: `http://你的域名:3000/web` - 查看使用统计\n- **健康检查**: `http://你的域名:3000/health` - 确认服务正常\n- **日志文件**: `logs/` 目录下的各种日志文件\n\n### 升级指南\n\n当有新版本发布时，按照以下步骤升级服务：\n\n```bash\n# 1. 进入项目目录\ncd claude-relay-service\n\n# 2. 拉取最新代码\ngit pull origin main\n\n# 如果遇到 package-lock.json 冲突，使用远程版本\ngit checkout --theirs package-lock.json\ngit add package-lock.json\n\n# 3. 安装新的依赖（如果有）\nnpm install\n\n# 4. 安装并构建前端\nnpm run install:web\nnpm run build:web\n\n# 5. 重启服务\nnpm run service:restart:daemon\n\n# 6. 检查服务状态\nnpm run service:status\n```\n\n**注意事项：**\n\n- 升级前建议备份重要配置文件（.env, config/config.js）\n- 查看更新日志了解是否有破坏性变更\n- 如果有数据库结构变更，会自动迁移\n\n---\n\n## 🔒 客户端限制功能\n\n### 功能说明\n\n客户端限制功能允许你控制每个API Key可以被哪些客户端使用，通过User-Agent识别客户端，提高API的安全性。\n\n### 使用方法\n\n1. **在创建或编辑API Key时启用客户端限制**：\n   - 勾选\"启用客户端限制\"\n   - 选择允许的客户端（支持多选）\n\n2. **预定义客户端**：\n   - **ClaudeCode**: 官方Claude CLI（匹配 `claude-cli/x.x.x (external, cli)` 格式）\n   - **Gemini-CLI**: Gemini命令行工具（匹配 `GeminiCLI/vx.x.x (platform; arch)` 格式）\n\n3. **调试和诊断**：\n   - 系统会在日志中记录所有请求的User-Agent\n   - 客户端验证失败时会返回403错误并记录详细信息\n   - 通过日志可以查看实际的User-Agent格式，方便配置自定义客户端\n\n\n### 日志示例\n\n认证成功时的日志：\n\n```\n🔓 Authenticated request from key: 测试Key (key-id) in 5ms\n   User-Agent: \"claude-cli/1.0.58 (external, cli)\"\n```\n\n客户端限制检查日志：\n\n```\n🔍 Checking client restriction for key: key-id (测试Key)\n   User-Agent: \"Mozilla/5.0 (Windows NT 10.0; Win64; x64)\"\n   Allowed clients: claude_code, gemini_cli\n🚫 Client restriction failed for key: key-id (测试Key) from 127.0.0.1, User-Agent: Mozilla/5.0...\n```\n\n### 常见问题处理\n\n**Redis连不上？**\n\n```bash\n# 检查Redis是否启动\nredis-cli ping\n\n# 应该返回 PONG\n```\n\n**OAuth授权失败？**\n\n- 检查代理设置是否正确\n- 确保能正常访问 claude.ai\n- 清除浏览器缓存重试\n\n**API请求失败？**\n\n- 检查API Key是否正确\n- 查看日志文件找错误信息\n- 确认Claude账户状态正常\n\n---\n\n## 🛠️ 进阶\n\n### 反向代理部署指南\n\n在生产环境中，建议通过反向代理进行连接，以便使用自动 HTTPS、安全头部和性能优化。下面提供两种常用方案： **Caddy** 和 **Nginx Proxy Manager (NPM)**。\n\n---\n\n## Caddy 方案\n\nCaddy 是一款自动管理 HTTPS 证书的 Web 服务器，配置简单、性能优秀，很适合不需要 Docker 环境的部署方案。\n\n**1. 安装 Caddy**\n\n```bash\n# Ubuntu/Debian\nsudo apt install -y debian-keyring debian-archive-keyring apt-transport-https\ncurl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg\ncurl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list\nsudo apt update\nsudo apt install caddy\n\n# CentOS/RHEL/Fedora\nsudo yum install yum-plugin-copr\nsudo yum copr enable @caddy/caddy\nsudo yum install caddy\n```\n\n**2. Caddy 配置**\n\n编辑 `/etc/caddy/Caddyfile` ：\n\n```caddy\nyour-domain.com {\n    # 反向代理到本地服务\n    reverse_proxy 127.0.0.1:3000 {\n        # 支持流式响应或 SSE\n        flush_interval -1\n\n        # 传递真实 IP\n        header_up X-Real-IP {remote_host}\n        header_up X-Forwarded-For {remote_host}\n        header_up X-Forwarded-Proto {scheme}\n\n        # 长读/写超时配置\n        transport http {\n            read_timeout 300s\n            write_timeout 300s\n            dial_timeout 30s\n        }\n    }\n\n    # 安全头部\n    header {\n        Strict-Transport-Security \"max-age=31536000; includeSubDomains\"\n        X-Frame-Options \"DENY\"\n        X-Content-Type-Options \"nosniff\"\n        -Server\n    }\n}\n```\n\n**3. 启动 Caddy**\n\n```bash\nsudo caddy validate --config /etc/caddy/Caddyfile\nsudo systemctl start caddy\nsudo systemctl enable caddy\nsudo systemctl status caddy\n```\n\n**4. 服务配置**\n\nCaddy 会自动管理 HTTPS，因此可以将服务限制在本地进行监听：\n\n```javascript\n// config/config.js\nmodule.exports = {\n  server: {\n    port: 3000,\n    host: '127.0.0.1' // 只监听本地\n  }\n}\n```\n\n**Caddy 特点**\n\n* 🔒 自动 HTTPS，零配置证书管理\n* 🛡️ 安全默认配置，启用现代 TLS 套件\n* ⚡ HTTP/2 和流式传输支持\n* 🔧 配置文件简洁，易于维护\n\n---\n\n## Nginx Proxy Manager (NPM) 方案\n\nNginx Proxy Manager 通过图形化界面管理反向代理和 HTTPS 证书，並以 Docker 容器部署。\n\n**1. 在 NPM 创建新的 Proxy Host**\n\nDetails 配置如下：\n\n| 项目                    | 设置                      |\n| --------------------- | ----------------------- |\n| Domain Names          | relay.example.com       |\n| Scheme                | http                    |\n| Forward Hostname / IP | 192.168.0.1 (docker 机器 IP) |\n| Forward Port          | 3000                    |\n| Block Common Exploits | ☑️                      |\n| Websockets Support    | ❌ **关闭**                |\n| Cache Assets          | ❌ **关闭**                |\n| Access List           | Publicly Accessible     |\n\n> 注意：\n> - 请确保 Claude Relay Service **监听 host 为 `0.0.0.0` 、容器 IP 或本机 IP**，以便 NPM 实现内网连接。\n> - **Websockets Support 和 Cache Assets 必须关闭**，否则会导致 SSE / 流式响应失败。\n\n**2. Custom locations**\n\n無需添加任何内容，保持为空。\n\n**3. SSL 设置**\n\n* **SSL Certificate**: Request a new SSL Certificate (Let's Encrypt) 或已有证书\n* ☑️ **Force SSL**\n* ☑️ **HTTP/2 Support**\n* ☑️ **HSTS Enabled**\n* ☑️ **HSTS Subdomains**\n\n**4. Advanced 配置**\n\nCustom Nginx Configuration 中添加以下内容：\n\n```nginx\n# 传递真实用户 IP\nproxy_set_header X-Real-IP $remote_addr;\nproxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\nproxy_set_header X-Forwarded-Proto $scheme;\n\n# 支持 WebSocket / SSE 等流式通信\nproxy_http_version 1.1;\nproxy_set_header Upgrade $http_upgrade;\nproxy_set_header Connection \"upgrade\";\nproxy_buffering off;\n\n# 长连接 / 超时设置（适合 AI 聊天流式传输）\nproxy_read_timeout 300s;\nproxy_send_timeout 300s;\nproxy_connect_timeout 30s;\n\n# ---- 安全性设置 ----\n# 严格 HTTPS 策略 (HSTS)\nadd_header Strict-Transport-Security \"max-age=31536000; includeSubDomains\" always;\n\n# 阻挡点击劫持与内容嗅探\nadd_header X-Frame-Options \"DENY\" always;\nadd_header X-Content-Type-Options \"nosniff\" always;\n\n# Referrer / Permissions 限制策略\nadd_header Referrer-Policy \"no-referrer-when-downgrade\" always;\nadd_header Permissions-Policy \"camera=(), microphone=(), geolocation=()\" always;\n\n# 隐藏服务器信息（等效于 Caddy 的 `-Server`）\nproxy_hide_header Server;\n\n# ---- 性能微调 ----\n# 关闭代理端缓存，确保即时响应（SSE / Streaming）\nproxy_cache_bypass $http_upgrade;\nproxy_no_cache $http_upgrade;\nproxy_request_buffering off;\n```\n\n**4. 启动和验证**\n\n* 保存后等待 NPM 自动申请 Let's Encrypt 证书（如果有）。\n* Dashboard 中查看 Proxy Host 状态，确保显示为 \"Online\"。\n* 访问 `https://relay.example.com`，如果显示绿色锁图标即表示 HTTPS 正常。\n\n**NPM 特点**\n\n* 🔒 自动申请和续期证书\n* 🔧 图形化界面，方便管理多服务\n* ⚡ 原生支持 HTTP/2 / HTTPS\n* 🚀 适合 Docker 容器部署\n\n---\n\n上述两种方案均可用于生产部署。\n\n---\n\n## 💡 使用建议\n\n### 账户管理\n\n- **定期检查**: 每周看看账户状态，及时处理异常\n- **合理分配**: 可以给不同的人分配不同的apikey，可以根据不同的apikey来分析用量\n\n### 安全建议\n\n- **使用HTTPS**: 强烈建议使用Caddy反向代理（自动HTTPS），确保数据传输安全\n- **定期备份**: 重要配置和数据要备份\n- **监控日志**: 定期查看异常日志\n- **更新密钥**: 定期更换JWT和加密密钥\n- **防火墙设置**: 只开放必要的端口（80, 443），隐藏直接服务端口\n\n---\n\n## 🆘 遇到问题怎么办？\n\n### 自助排查\n\n1. **查看日志**: `logs/` 目录下的日志文件\n2. **检查配置**: 确认配置文件设置正确\n3. **测试连通性**: 用 curl 测试API是否正常\n4. **重启服务**: 有时候重启一下就好了\n\n### 寻求帮助\n\n- **GitHub Issues**: 提交详细的错误信息\n- **查看文档**: 仔细阅读错误信息和文档\n- **社区讨论**: 看看其他人是否遇到类似问题\n\n---\n\n## 📄 许可证\n\n本项目采用 [MIT许可证](LICENSE)。\n\n---\n\n<div align=\"center\">\n\n**⭐ 觉得有用的话给个Star呗，这是对作者最大的鼓励！**\n\n**🤝 有问题欢迎提Issue，有改进建议欢迎PR**\n\n</div>\n","summary":"Claude Relay Service 是一个开源的中转服务，旨在帮助用户自建 Claude API 接口，从而实现多账户管理与成本分摊。该项目具备智能账户轮换、详细的 token 使用统计、访问速率控制以及性能优化等高级功能，确保用户能够通过私有服务器安全且稳定地访问 Anthropic 服务。它非常适合那些注重数据隐私、有跨地区访问需求，或希望与团队成员共享订阅额度的技术用户使用。","description":"CRS-自建Claude Code镜像，一站式开源中转服务，让 Claude、OpenAI、Gemini、Droid 订阅统一接入，支持拼车共享，更高效分摊成本，原生工具无缝使用。","stars":11963,"language":"JavaScript"},{"owner":"asgeirtj","repo":"system_prompts_leaks","url":"https://github.com/asgeirtj/system_prompts_leaks","readme":"> **As seen in The Washington Post:** [See the hidden rules behind AI. Then use them to rewrite this article.](https://wapo.st/49t4gSb) (May 11, 2026)\n# System Prompts Leaks\n\n<img alt=\"ChatGPT leaking its system prompt after being asked to repeat all of the above\" src=\"https://github.com/user-attachments/assets/0037a6c5-2ae4-4d34-8be0-0d679773172b\" />\n\n\n[![GitHub Views per Week](https://raw.githubusercontent.com/asgeirtj/system_prompts_leaks/traffic/traffic-system_prompts_leaks/views_per_week.svg)](https://github.com/asgeirtj/system_prompts_leaks)\n[![GitHub Clones per Week](https://raw.githubusercontent.com/asgeirtj/system_prompts_leaks/traffic/traffic-system_prompts_leaks/clones_per_week.svg)](https://github.com/asgeirtj/system_prompts_leaks)\n ![Last Commit](https://img.shields.io/github/last-commit/asgeirtj/system_prompts_leaks)\n\n<a href=\"https://trendshift.io/repositories/14577\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/14577\" alt=\"asgeirtj%2Fsystem_prompts_leaks | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n\n\n## Recently Updated\n\n| What | Date | Link |\n|------|------|------|\n| **Claude Code (Opus 4.8)** | May 28, 2026 | [System prompt](Anthropic/claude-code-opus-4.8.md) |\n| **Claude Opus 4.8** | May 28, 2026 | [System prompt](Anthropic/claude-opus-4.8.md) |\n| **Claude Code & Cowork** | May 28, 2026 | [Claude Code]( <script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
