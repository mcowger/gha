usly discovers and inventories equipment, detects changes, flags shadow‑IT and unauthorized hardware, and automates compliance workflows—all without the complexity of a full SIEM. Designed to bridge the gap between simple scans and heavyweight security tools, it delivers real‑time, actionable insights in a lightweight Docker or Home Assistant installation. Network administrators, security engineers, compliance officers, and DevOps teams can use it to maintain an up‑to‑date inventory, detect anomalies, and meet regulatory requirements across hybrid environments.","description":"Centralized network visibility and continuous asset discovery.  Monitor devices, detect change, and stay aware across distributed networks.","stars":6223,"language":"Python"},{"owner":"loyalpartner","repo":"selfsync","url":"https://github.com/loyalpartner/selfsync","readme":"# selfsync\n\n[中文文档](README.zh-CN.md)\n\nSelf-hosted Chrome Sync server. Keep your bookmarks, passwords, preferences, and other browser data in sync across devices — without sending anything to Google.\n\n> [!CAUTION]\n> **Do NOT expose this server to the public internet.** selfsync performs no authentication — anyone who knows your email address can read and overwrite your synced data, including saved passwords. Only run it on trusted private networks (LAN, NAS, home lab) or behind a zero-trust tunnel (Tailscale, Cloudflare Zero Trust, WireGuard, etc.).\n\n## How It Works\n\nChrome natively supports syncing to a custom server via the `--sync-url` flag. selfsync implements the Chrome Sync protocol and stores everything locally in a single SQLite file. Multi-user support works out of the box — Chrome sends the signed-in account email with every sync request.\n\n## Quick Start\n\n### Option 1: Build from Source\n\n```bash\n# Build\ncargo build --release\n\n# Start the server\n./target/release/selfsync-server\n\n# Launch Chrome pointing to your server\ngoogle-chrome-stable --sync-url=http://127.0.0.1:8080\n```\n\n### Option 2: Docker Compose (Recommended)\n\n```bash\ndocker compose up -d\n```\n\nOne command. Data is automatically persisted to a Docker volume.\n\n### Option 3: Docker\n\n```bash\n# Build the image\ndocker build -t selfsync .\n\n# Run (data stored in ./data)\ndocker run -d -p 8080:8080 -v ./data:/data selfsync\n```\n\n### Start Syncing\n\n1. Open Chrome with `--sync-url=http://127.0.0.1:8080`\n2. Sign in with your Google account\n3. Enable sync\n\nDone. All your sync data now stays on your machine.\n\n### Migrating Existing Data\n\nAlready syncing to Google and want to bring your data over? Nothing special to do:\n\n1. Launch the browser with `--sync-url=http://127.0.0.1:8080`\n2. Click your avatar → turn sync on (or off and back on if it's already enabled)\n\nChrome uploads its local cache of bookmarks, passwords, and settings to your selfsync server. No export/import needed.\n\n## Configuration\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `SELFSYNC_ADDR` | `127.0.0.1:8080` | Server listen address |\n| `SELFSYNC_DB` | `selfsync.db` | SQLite database path |\n| `RUST_LOG` | `selfsync_server=info` | Log level |\n\nWhen running via Docker, the database defaults to `/data/selfsync.db` and listens on `0.0.0.0:8080`.\n\n## Multi-User\n\nMulti-user works automatically. Chrome includes the signed-in Google account email in every sync request (via the protobuf `share` field). The server uses this to create separate data stores per user — no additional configuration needed.\n\n## Things to Watch Out For\n\n- **Do NOT include `/command/` in `--sync-url`**. Chrome appends it automatically. Just use `http://127.0.0.1:8080`.\n- **After resetting the server database**, use a fresh Chrome profile (`--user-data-dir=/tmp/test`) to avoid stale sync state.\n\n## Building\n\nRequires Rust 1.85+:\n\n```bash\ncargo build --release                        # Build everything\ncargo build --release -p selfsync-server     # Server only\ncargo test                                   # Run tests\n```\n\n## Prior Art\n\n- Chromium `loopback_server.cc` — Reference sync server implementation\n\n## License\n\nCopyright (C) 2026 Lee &lt;loyalpartner@163.com&gt;\n\nLicensed under [GPL-3.0-or-later](LICENSE).\n","summary":"selfsync is a self‑hosted Chrome sync server that stores bookmarks, passwords, preferences, and other browser data locally in a single SQLite database, allowing users to keep Chrome data synchronized across devices without any traffic to Google. It is easy to deploy via Docker or a simple Rust build, automatically supports multi‑user sync by detecting the signed‑in account email, and offers a quick migration path for users switching from the Google sync service. The server exposes a minimal configuration via environment variables and logs, but should be run only on trusted networks or through a zero‑trust tunnel for security. Privacy‑conscious Chrome users, hobby developers and small teams who prefer full control of their sync data would find selfsync particularly useful.","description":"Self-hosted Chrome Sync server. 自托管 Chrome 同步服务器 — 书签、密码、偏好等浏览器数据留在本地，不经过 Google","stars":183,"language":"Rust"},{"owner":"cigoria","repo":"simpleShare","url":"https://github.com/cigoria/simpleShare","readme":"# SimpleShare\n\nSimpleShare is a modern web application that allows users to upload and share files easily. This project provides a simple and intuitive interface for file sharing with a clean, Vue.js 3 frontend and robust Node.js/TypeScript backend.\n\n## Features\n\n- **User-friendly interface** built with Vue.js 3 and Composition API\n- **File upload functionality** with progress tracking and drag-and-drop support\n- **User authentication and registration** system with secure session management\n- **Dashboard for managing uploaded files** with intuitive UI\n- **Responsive design** with Tailwind CSS and custom animations\n- **Admin panel** for comprehensive user management\n- **File sharing via unique codes** for secure access\n- **Group file uploads** with batch operations\n- **Real-time notifications** and user feedback\n- **Quota management system** for storage control\n- **Mobile-responsive design** optimized for all devices\n- **Database migration system** for easy schema updates\n- **Modern confirmation modal system** replacing browser alerts\n- **Update screen** for maintenance mode during server updates\n- **TypeScript support** throughout the codebase for better maintainability\n\n## Technology Stack\n\n- **Frontend**: Vue.js 3 (Composition API), Vue Router, Tailwind CSS, Vite\n- **Backend**: Node.js, Express.js, TypeScript\n- **Database**: MariaDB with automated migration system\n- **Authentication**: bcrypt for password hashing, secure session tokens\n- **File Handling**: Multer for multipart uploads, Archiver for zip operations\n- **Development Tools**: Concurrently, Nodemon, Prettier, TypeScript compiler\n- **Styling**: Tailwind CSS v4 with custom animations and responsive design\n\n## Project Structure\n\n```\nsimpleShare/\n├── backend/                 # Backend API server (TypeScript)\n│   ├── src/\n│   │   ├── adminActions.ts  # Admin operations and user management\n│   │   ├── auth.ts          # Authentication and session logic\n│   │   ├── routes.ts        # API route definitions\n│   │   ├── server.ts        # Express server setup\n│   │   ├── uploadActions.ts # File upload and management\n│   │   ├── userActions.ts   # User operations\n│   │   ├── db.ts            # Database connection\n│   │   ├── migration-runner.ts # Database migration system\n│   │   └── controllers/     # API controllers\n│   ├── migrations/          # Database migration files\n│   └── tsconfig.json        # TypeScript configuration\n├── client/                  # Frontend Vue.js application\n│   ├── public/              # Static assets\n│   ├── src/\n│   │   ├── components/      # Reusable Vue components\n│   │   │   ├── UpdateScreen.vue    # Maintenance/update screen\n│   │   │   ├── Notification.vue    # Notification system\n│   │   │   └── ConfirmModal.vue    # Confirmation modal\n│   │   ├── composables/     # Vue composables (useConfirm, useUpdateStatus, etc.)\n│   │   ├── views/           # Page views and routing\n│   │   ├── App.vue          # Root component with global modals\n│   │   └── main.js          # Application entry point\n│   ├── index.html           # HTML template\n│   ├── tailwind.config.js   # Tailwind configuration\n│   └── vite.config.js       # Vite build configuration\n├── uploads/                 # File storage directory\n├── dist/                    # Compiled TypeScript output\n├── .env.example             # Environment variables template\n├── .gitignore              # Git ignore rules\n├── MIGRATIONS.md           # Database migration documentation\n├── Alert-box.md            # Confirmation modal system documentation\n├── LICENSE                 # MIT License\n├── README.md               # This file\n└── package.json            # Dependencies and npm scripts\n```\n\n## Installation\n\n### Method 1. - Manual Install (Recommended)\n#### Prerequisites\n\n- Node.js (v16 or higher)\n- npm or yarn\n- MariaDB database server\n\n#### Setup Steps\n\n1. **Clone the repository:**\n\n   ```bash\n   git clone https://github.com/cigoria/simpleShare.git\n   cd simpleShare\n   ```\n\n2. **Install the dependencies:**\n\n   ```bash\n   npm install\n   ```\n\n3. **Configure environment variables:**\n\n   ```bash\n   cp .env.example .env\n   ```\n\n   Edit `.env` with your database configuration:\n   ```\n    DB_HOST=localhost\n    DB_PORT=3306\n    DB_USER=simpleShare\n    DB_PASSWORD=simpleShare\n    DB_NAME=simpleShare\n    PORT=3000\n    UPLOAD_PATH=./uploads/\n   ```\n\n4. **Database Setup:**\n\n   Create an empty database named `simpleShare` in MariaDB. The migration system will automatically create all necessary tables when you start the server.\n\n5. **Build the application:**\n\n   ```bash\n   npm run build\n   ```\n\n6. **Start the production server:**\n\n   ```bash\n   npm start\n   ```\n\n   The application will be available at `http://localhost:3000`\n\n### Method 2. - Docker (Beta)\n\nImages availible for use:\n- ghcr.io/cigoria/simpleshare:latest\n- registry.gitlab.com/cigoria/simpleshare:latest\n\n1. **docker-compose.yaml**\n```yaml\n---\nservices:\n  mariadb:\n    image: mariadb:latest\n    container_name: simpleShare-Database\n    restart: unless-stopped\n    environment:\n      MYSQL_ROOT_PASSWORD: simpleShare\n      MYSQL_DATABASE: simpleShare\n      MYSQL_USER: simpleShare\n      MYSQL_PASSWORD: simpleShare\n    volumes:\n      - ./DB/mysql:/var/lib/mysql\n      - ./DB/Schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro\n    ports:\n      - 3306:3306\n\n  simpleShare:\n    image: ghcr.io/cigoria/simpleshare:latest\n    container_name: simpleShare\n    restart: unless-stopped\n    volumes:\n      - ./Main/.env:/app/.env:ro\n    ports:\n      - 3000:3000\n```\n\n2. **Folder structure**\n\n```bash\nmkdir DB Main\nwget https://raw.githubusercontent.com/cigoria/simpleShare/refs/heads/release/Schema.sql -o ./DB/Schema.sql\nwget https://raw.githubusercontent.com/cigoria/simpleShare/refs/heads/release/.env.example -o ./Main/.env\n```\n\n3. **Start container**\n\n```bash\ndocker compose up -d\n```\n\n4. **Open browser at:** [http://localhost:3000](http://localhost:3000)\n\n## Development\n\n### Development Mode with Hot Reload\n\nFor development with hot reload on both frontend and backend:\n\n```bash\nnpm run dev\n```\n\nThis command uses `concurrently` to run both frontend and backend development servers simultaneously.\n\n### Individual Development Servers\n\nIf you prefer to run servers separately:\n\n1. **Start the backend server with auto-reload:**\n   ```bash\n   npm run dev:backend\n   ```\n\n2. **In another terminal, start the frontend dev server:**\n   ```bash\n   npm run dev:frontend\n   ```\n\n### Development URLs\n\n- **Frontend**: `http://localhost:5173` (Vite dev server)\n- **Backend API**: `http://localhost:3000` (Express server)\n\n### Available Scripts\n\n- `npm run dev` - Run both frontend and backend in development mode\n- `npm run dev:backend` - Run only backend with TypeScript compilation and auto-reload\n- `npm run dev:frontend` - Run only frontend with Vite hot reload\n- `npm run build` - Build both frontend and backend for production\n- `npm run build:backend` - Compile TypeScript backend to `dist/`\n- `npm run build:frontend` - Build Vue.js frontend for production\n- `npm start` - Start production server from compiled files\n- `npm run clean` - Remove compiled `dist/` directory\n- `npm run update:start` - Show maintenance screen during updates\n- `npm run update:stop` - Hide maintenance screen after updates\n\n### Code Quality\n\nThe codebase follows these quality standards:\n- **TypeScript**: Full type safety in backend, progressive adoption in frontend\n- **Code Style**: Prettier configuration for consistent formatting\n- **Vue.js Best Practices**: Composition API, proper component structure\n- **Documentation**: Inline comments for complex logic, comprehensive README\n- **Error Handling**: Modern confirmation modals instead of browser alerts\n\n## API Endpoints\n\n### Authentication\n- `POST /login` - User login with email/password\n- `POST /register` - User registration with validation\n- `GET /logout` - User logout and session cleanup\n- `GET /verifySession` - Verify active session token\n\n### File Operations\n- `POST /upload` - Upload single file with metadata\n- `POST /upload-group` - Upload multiple files as a group\n- `GET /files/:code` - Download file by unique code\n- `GET /checkFile` - Check if file exists by code\n- `GET /delete/:code` - Delete file by code (owner/admin only)\n- `GET /getAllFiles` - Get all files for current user\n- `GET /quota` - Get user quota and usage information\n\n### Admin Operations\n- `GET /admin/users` - List all users (admin only)\n- `POST /admin/user/:id/ban` - Ban/unban user (admin only)\n- `POST /admin/user/:id/quota` - Update user quota (admin only)\n- Additional endpoints for user management and system administration\n\n### Update Status Management\n- `GET /api/update-status` - Get current update status\n- `POST /api/update-status` - Set update status (maintenance mode)\n\n## Key Systems\n\n### Database Migration System\n\nThe project uses an automated migration system for database schema management:\n\n- **Migration files**: Located in `/backend/migrations/` with numeric prefixes\n- **Automatic execution**: Migrations run automatically on server startup\n- **Version tracking**: Applied migrations are tracked in the `migrations` table\n- **Safe rollback**: Failed migrations are automatically rolled back\n\nFor detailed information, see [MIGRATIONS.md](MIGRATIONS.md).\n\n### Confirmation Modal System\n\nModern confirmation dialogs replace browser alerts throughout the application:\n\n- **Reusable components**: `ConfirmModal.vue` with `useConfirm` composable\n- **Multiple types**: Info, warning, error, success dialogs\n- **Customizable**: Custom buttons, icons, and messages\n- **Accessible**: Keyboard navigation and proper focus management\n- **Animated**: Smooth transitions and backdrop effects\n\nFor usage examples and documentation, see [Alert-box.md](Alert-box.md).\n\n### Update Screen System\n\nThe application includes a maintenance screen that appears during server updates:\n\n- **Automatic display**: Shows when server is in update mode\n- **Real-time polling**: Frontend checks update status every 5 seconds\n- **Clean UI**: Modern loading animation with informative messages\n- **Easy control**: Simple npm scripts to toggle maintenance mode\n\n**Usage:**\n```bash\n# Show maintenance screen\nnpm run update:start\n\n# Hide maintenance screen\nnpm run update:stop\n```\n\n**Components:**\n- `UpdateScreen.vue` - Maintenance screen component\n- `useUpdateStatus.js` - Composable for status polling\n- `updateStatus.ts` - Backend controller for status management\n\n### Authentication & Security\n\n- **Secure password hashing** using bcrypt\n- **Session-based authentication** with secure tokens\n- **Role-based access control** for admin features\n- **File access control** via unique codes and ownership verification\n\n## Contributing\n\nWe welcome contributions from the community! Here's how to get started:\n\n### Development Workflow\n\n1. **Fork the repository** on GitHub\n2. **Create a feature branch** from the main branch:\n   ```bash\n   git checkout -b feature/your-feature-name\n   ```\n3. **Make your changes** following our code standards\n4. **Test your changes** thoroughly:\n   - Run `npm run dev` to test in development mode\n   - Test both frontend and backend functionality\n   - Ensure database migrations work if you've modified the schema\n5. **Format your code** using Prettier:\n   ```bash\n   npm run format\n   ```\n6. **Commit your changes** with clear, descriptive messages\n7. **Push to your fork** and create a pull request\n\n### Code Standards\n\n- **TypeScript**: Use proper types in backend, consider types in frontend\n- **Vue.js**: Use Composition API, follow component best practices\n- **CSS**: Use Tailwind CSS classes, avoid inline styles\n- **Comments**: Write clear comments in English for complex logic\n- **Confirmation dialogs**: Use the `useConfirm` composable instead of browser alerts\n- **Database changes**: Create migration files for any schema modifications\n\n### Areas for Contribution\n\n- **Frontend**: UI improvements, new components, accessibility enhancements\n- **Backend**: API optimizations, new features, security improvements\n- **Documentation**: Better documentation, examples, guides\n- **Testing**: Unit tests, integration tests, end-to-end tests\n- **Performance**: Optimization, caching, database improvements\n\n### Pull Request Guidelines\n\n- Provide a clear description of changes\n- Reference any related issues\n- Include screenshots for UI changes\n- Ensure all tests pass\n- Keep PRs focused on a single feature or fix\n\n## Getting Help\n\n### Documentation\n\n- **[MIGRATIONS.md](MIGRATIONS.md)** - Database migration system documentation\n- **[Alert-box.md](Alert-box.md)** - Confirmation modal system guide\n- **API Endpoints** - Listed above with descriptions\n- **Project Structure** - Detailed directory overview\n\n### Troubleshooting\n\n**Common Issues:**\n\n1. **Database Connection Errors**\n   - Ensure MariaDB is running\n   - Check `.env` configuration matches database credentials\n   - Verify the database `simpleShare` exists\n\n2. **Migration Failures**\n   - Check database permissions\n   - Ensure migration files have correct naming format\n   - Review migration SQL for syntax errors\n\n3. **Build Errors**\n   - Run `npm install` to update dependencies\n   - Clear `dist/` directory with `npm run clean`\n   - Check Node.js version compatibility (v16+)\n\n4. **File Upload Issues**\n   - Ensure `uploads/` directory exists and is writable\n   - Check file size limits in configuration\n   - Verify disk space availability\n\n### Support\n\nFor questions, bug reports, or feature requests:\n- Create an issue on GitHub\n- Check existing issues for solutions\n- Review documentation before asking questions\n\n## License\n\nThis project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details.\n\n## Acknowledgments\n\n- **Contributors**: Thanks to all developers who have contributed to this project\n- **Technologies**: Built with modern web technologies for optimal performance\n- **Community**: Special thanks to our users for feedback and suggestions\n\n## Project Creators\n\n- **[zeti1223](https://github.com/zeti1223)** - Frontend development and UI/UX design\n- **[FonixPython](https://github.com/FonixPython)** - Backend development\n\n","summary":"SimpleShare is a modern web application that lets users upload and share files through a clean Vue 3 front‑end and a Node.js/TypeScript back‑end. It offers drag‑and‑drop uploads, progress tracking, secure user authentication, a dashboard for managing files, an admin panel, group uploads, quota control, and real‑time notification support—all styled with Tailwind CSS. The app is ideal for developers or small teams looking to quickly deploy a secure, responsive file‑sharing service without building infrastructure from scratch.","description":"A simple nodejs based file sharing website, with users and upload limits!","stars":7,"language":"Vue"},{"owner":"fosrl","repo":"newt","url":"https://github.com/fosrl/newt","readme":"# Newt\n[![PkgGoDev](https://pkg.go.dev/badge/github.com/fosrl/newt)](https://pkg.go.dev/github.com/fosrl/newt)\n[![GitHub License](https://img.shields.io/github/license/fosrl/newt)](https://github.com/fosrl/newt/blob/main/LICENSE)\n[![Go Report Card](https://goreportcard.com/badge/github.com/fosrl/newt)](https://goreportcard.com/report/github.com/fosrl/newt)\n\nNewt is a fully user space [WireGuard](https://www.wireguard.com/) tunnel client and TCP/UDP proxy, designed to securely expose private resources controlled by Pangolin. By using Newt, you don't need to manage complex WireGuard tunnels and NATing.\n\n### Installation and Documentation\n\nNewt is used with Pangolin and Gerbil as part of the larger system. See documentation below:\n\n-   [Full Documentation](https://docs.pangolin.net/manage/sites/understanding-sites)\n\n## Key Functions\n\n### Registers with Pangolin\n\nUsing the Newt ID and a secret, the client will make HTTP requests to Pangolin to receive a session token. Using that token, it will connect to a websocket and maintain that connection. Control messages will be sent over the websocket.\n\n### Receives WireGuard Control Messages\n\nWhen Newt receives WireGuard control messages, it will use the information encoded (endpoint, public key) to bring up a WireGuard tunnel using [netstack](https://github.com/WireGuard/wireguard-go/blob/master/tun/netstack/examples/http_server.go) fully in user space. It will ping over the tunnel to ensure the peer on the Gerbil side is brought up.\n\n### Receives Proxy Control Messages\n\nWhen Newt receives WireGuard control messages, it will use the information encoded to create a local low level TCP and UDP proxies attached to the virtual tunnel in order to relay traffic to programmed targets.\n\n## Build\n\n### Binary\n\nMake sure to have Go 1.25 installed.\n\n```bash\nmake\n```\n\n### Nix Flake\n\n```bash\nnix build\n```\n\nBinary will be at `./result/bin/newt`\n\nDevelopment shell available with `nix develop`\n\n## Licensing\n\nNewt is dual licensed under the AGPLv3 and the Fossorial Commercial license. For inquiries about commercial licensing, please contact us.\n\n## Contributions\n\nPlease see [CONTRIBUTIONS](./CONTRIBUTING.md) in the repository for guidelines and best practices.\n","summary":"Newt is a user‑space WireGuard tunnel client that serves as a secure TCP/UDP proxy for resources managed by Pangolin. By registering with Pangolin using a client ID and secret, it obtains a session token, establishes a websocket, and listens for control messages that configure a user‑space WireGuard tunnel via the netstack library. It also creates local low‑level proxies to route traffic to specified targets through the tunnel. Developers and operations engineers needing a simple, NAT‑free way to expose private services within the Pangolin ecosystem will benefit from this lightweight, all‑in‑Go solution.","description":"Pangolin tunneled site & network connector","stars":769,"language":"Go"},{"owner":"calagopus","repo":"panel","url":"https://github.com/calagopus/panel","readme":"![Calagopus Logo](https://calagopus.com/fulllogo.svg)\n\n# Calagopus Panel\n\n[![Rust](https://img.shields.io/badge/rust-stable-orange.svg?logo=rust)](https://www.rust-lang.org/)\n[![License](https://img.shields.io/github/license/calagopus/panel?color=blue)](https://github.com/calagopus/panel/blob/main/LICENSE)\n[![GitHub issues](https://img.shields.io/github/issues/calagopus/panel)](https://github.com/calagopus/panel/issues)\n[![GitHub stars](https://img.shields.io/github/stars/calagopus/panel)](https://github.com/calagopus/panel/stargazers)\n[![Discord](https://img.shields.io/discord/1429911351777824892?label=discord&logo=discord&color=5865F2)](https://discord.gg/uSM8tvTxBV)\n\nA \"rewrite\" of [Pterodactyl Panel](https://github.com/pterodactyl/panel) in the Rust Programming Language. This rewrite aims to be a better alternative to the original Panel, implementing new Features, better Performance and a new UI.\n\n## Installation\n\nFor installation instructions, please refer to the [Docs](https://calagopus.com/docs/panel/installation).\n\n## Todo\n\n[Frontend](https://notes.rjns.dev/workspace/cb7ccae8-0508-4f90-9161-d1e69b0ca8f0/oXJcC5ei3IQhEf1RFCh6K) \n/ [Backend](https://notes.rjns.dev/workspace/cb7ccae8-0508-4f90-9161-d1e69b0ca8f0/xfvzMIFHkFSMnOfO_WUEO)\n\n## Directory Structure\n\n* [**`frontend/`**](./frontend/) — The frontend of the panel, built with React, Mantine, and Tailwind.\n  * [**`extensions/*`**](./frontend/extensions/) — Extensions for the frontend, such as themes and plugins.\n* [**`backend/`**](./backend/) — The backend of the panel, built with Rust and Axum.\n* [**`backend-extensions/*`**](./backend-extensions/) — Extensions for the backend, such as auth providers and database drivers.\n* [**`database/`**](./database/) — Database migrations using Drizzle.\n* [**`database-migrator/`**](./database-migrator/) — A tool to run database migrations, built with Rust and SQLx.\n* [**`shared/`**](./shared/) — Shared code between various backend parts, mainly relevant for extensions.\n* [**`wings-api/`**](./wings-api/) — An auto-generated API client for the Wings API, built with Rust.\n  * [**`generator-src/`**](./wings-api/generator-src/) — The source code for the API generator, written in TypeScript.\n* [**`rule-validator/`**](./rule-validator/) — A semi-port of Laravel's validation rules in Rust for use with eggs.\n* [**`schema-extension/`**](./schema-extension/)\n  * [**`core/`**](./schema-extension/core/) — Core library for the schema extension system.\n  * [**`derive/`**](./schema-extension/derive/) — A proc macro to derive schema extensions.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=calagopus/panel&type=date&legend=top-left)](https://www.star-history.com/#calagopus/panel&type=date&legend=top-left)\n","summary":"Calagopus Panel is a Rust‑based rewrite of the popular Pterodactyl control panel, built to deliver improved performance, new features and a modern interface. The stack consists of a React/Mantine/Tailwind front end paired with an Axum‑powered Rust backend, and a modular system that supports both client‑side extensions (themes, plugins) and server‑side extensions (auth providers, database drivers). It also ships tooling such as Drizzle‑based migrations, an auto‑generated Wings API client, a Rust rule validator and a schema‑extension framework to simplify custom field handling. The project is aimed at hosting administrators, platform developers and open‑source contributors who need a faster, more extensible alternative to the original Pterodactyl panel.","description":"Pterodactyl alternative written in Rust + React with User Experience in Mind.","stars":196,"language":"Rust"},{"owner":"karanhudia","repo":"borg-ui","url":"https://github.com/karanhudia/borg-ui","readme":"<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/assets/logo-dark.png\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/assets/logo-light.png\" />\n    <img alt=\"Borg UI Logo v2\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/assets/logo-light.png\" width=\"360\" />\n  </picture>\n</div>\n\n---\n\n<div align=\"center\">\n  <h5>\n    <a href=\"https://borgui.com\">Website</a>\n    <span> | </span>\n    <a href=\"https://docs.borgui.com\">Documentation</a>\n    <span> | </span>\n    <a href=\"https://hub.docker.com/r/ainullcode/borg-ui\">Docker Hub</a>\n  </h5>\n</div>\n\n<div align=\"center\">\n\n[![Docker Hub](https://img.shields.io/docker/pulls/ainullcode/borg-ui)](https://hub.docker.com/r/ainullcode/borg-ui)\n[![License: AGPL-3.0](https://img.shields.io/badge/License-AGPL%203.0-blue.svg)](LICENSE)\n[![GitHub Actions](https://github.com/karanhudia/borg-ui/workflows/Build%20and%20Publish%20Docker%20Images/badge.svg)](https://github.com/karanhudia/borg-ui/actions)\n[![Tests](https://github.com/karanhudia/borg-ui/workflows/Tests/badge.svg)](https://github.com/karanhudia/borg-ui/actions/workflows/tests.yml)\n[![codecov](https://codecov.io/gh/karanhudia/borg-ui/branch/main/graph/badge.svg)](https://codecov.io/gh/karanhudia/borg-ui)\n[![Discord](https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white)](https://discord.gg/5KfVa5QkdQ)\n\n</div>\n\n<p align=\"center\">\n  <strong>A modern web interface for <a href=\"https://borgbackup.readthedocs.io/\">Borg Backup</a></strong><br>\n  Run backups, browse archives, restore files, manage repositories, and automate schedules from one interface.\n</p>\n\n## Highlights\n\n- Dashboard for repository health, activity, schedules, and storage\n- Repository management for local, SSH, and SFTP destinations\n- Live backup progress, archive browsing, and restore workflows\n- Automated schedules, maintenance actions, and pre/post backup hooks\n- Notifications through 100+ Apprise services\n- Remote machine management with SSH key deployment and storage visibility\n- Support for BorgBackup 1.x and BorgBackup 2 beta workflows\n- Multi-architecture containers for `amd64`, `arm64`, and `armv7`\n\n> [!NOTE]\n> Borg UI is developed with modern AI tooling as part of the workflow. Architecture, security, and release decisions are reviewed before merge.\n\n## Release Readiness\n\n- Current generated line coverage reports: backend `58.82%`, frontend `81.66%`, combined `64.36%`\n- Release confidence is built on multiple test lanes: backend unit coverage, backend API integration, frontend unit coverage, frontend build validation, and core, extended, and SSH smoke suites against a built app\n- Docker Hub publishes the user-facing app image `ainullcode/borg-ui`; the separate `borg-ui-runtime-base` image is an internal CI artifact and should remain private\n\n## Interface\n\n### Operations Overview\n\nTrack repository health, recent activity, storage, and day-to-day backup execution from the main product surfaces.\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/dashboard-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/dashboard-light.png\" />\n  <img alt=\"Borg UI dashboard\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/dashboard-light.png\" width=\"100%\" />\n</picture>\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/repositories-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/repositories-light.png\" />\n  <img alt=\"Repository management\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/repositories-light.png\" width=\"100%\" />\n</picture>\n\n### Backup and Restore Workflows\n\nMonitor live backup progress, inspect archives, and work through restore flows without dropping to the CLI.\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/backup-progress-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/backup-progress-light.png\" />\n  <img alt=\"Live backup progress\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/backup-progress-light.png\" width=\"100%\" />\n</picture>\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/archive-browser-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/archive-browser-light.png\" />\n  <img alt=\"Archive browser\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/archive-browser-light.png\" width=\"100%\" />\n</picture>\n\n### Automation and Integrations\n\nAutomate schedules, manage remote machines, and configure notifications for ongoing backup operations.\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/schedule-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/schedule-light.png\" />\n  <img alt=\"Backup schedule management\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/schedule-light.png\" width=\"100%\" />\n</picture>\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/remote-machines-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/remote-machines-light.png\" />\n  <img alt=\"Remote machines management\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/remote-machines-light.png\" width=\"100%\" />\n</picture>\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/notifications-dark.png\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/notifications-light.png\" />\n  <img alt=\"Notification services\" src=\"https://raw.githubusercontent.com/karanhudia/borg-ui/main/screenshots/readme/notifications-light.png\" width=\"100%\" />\n</picture>\n\n## Getting Started\n\n```bash\ndocker run -d \\\n  --name borg-web-ui \\\n  -p 8081:8081 \\\n  -v borg_data:/data \\\n  -v borg_cache:/home/borg/.cache/borg \\\n  -v /home/yourusername:/local:rw \\\n  ainullcode/borg-ui:latest\n```\n\nAccess the app at `http://localhost:8081` with `admin` / `admin123`.\n\nFor setup details, see the [installation guide](https://docs.borgui.com/installation).\n\n## Documentation\n\n- [Full documentation](https://docs.borgui.com)\n- [Development guide](https://docs.borgui.com/development)\n- [Testing guide](https://docs.borgui.com/testing)\n\n## Enterprise\n\nFor teams that need commercial support, larger rollouts, or an enterprise conversation, Borg UI can also support evaluation and deployment beyond the core open source setup.\n\n- [Learn more](https://borgui.com/buy)\n- Contact: [sales@borgui.com](mailto:sales@borgui.com)\n- You can also explore the live product and documentation at [borgui.com](https://borgui.com)\n\n## Support\n\n- [Discord community](https://discord.gg/5KfVa5QkdQ)\n- [GitHub issues](https://github.com/karanhudia/borg-ui/issues)\n\n## Star History\n\n<div align=\"center\">\n\n<a href=\"https://star-history.com/#karanhudia/borg-ui&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=karanhudia/borg-ui&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=karanhudia/borg-ui&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=karanhudia/borg-ui&type=Date\" />\n  </picture>\n</a>\n\n</div>\n\n## Contributing\n\nSee the [contributing guide](.github/CONTRIBUTING.md) and the [development guide](https://docs.borgui.com/development).\n\n## License\n\nThis project is licensed under the GNU Affero General Public License v3.0. See [LICENSE](LICENSE).\n\n<div align=\"center\">\n\nMade with ❤️ by [Karan Hudia](https://github.com/karanhudia)\n\n</div>\n","summary":"Borg‑UI is a modern web interface that lets users run and manage Borg Backup operations from a single dashboard, including creating, editing, and scheduling backups, browsing archives, and restoring files. It supports local, SSH, and SFTP repositories, provides live progress monitoring, automated maintenance hooks, and notifications through over 100 Apprise endpoints. The platform is available as a multi‑architecture Docker image and offers remote machine management features, making it ideal for sysadmins, DevOps teams, and anyone who relies on Borg for reliable data protection.","description":"Replace complex Borg Backup terminal commands with a beautiful web UI. Create, schedule, and   restore backups with just a few clicks.","stars":1396,"language":"Python"},{"owner":"RyjoxTechnologies","repo":"Octopoda-OS","url":"https://github.com/RyjoxTechnologies/Octopoda-OS","readme":"<h1 align=\"center\">🐙 Octopoda</h1>\n\n<p align=\"center\">\n  <strong>The open-source memory operating system for AI agents.</strong><br />\n  Persistent memory · Loop detection · Audit trails · 3D visualization\n</p>\n\n<p align=\"center\">\n  <a href=\"https://pypi.org/project/octopoda/\"><img src=\"https://img.shields.io/pypi/v/octopoda?style=flat-square\" alt=\"PyPI\" /></a>\n  <a href=\"https://pypi.org/project/octopoda/\"><img src=\"https://img.shields.io/pypi/dm/octopoda?style=flat-square&color=blue\" alt=\"Downloads\" /></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-blue?style=flat-square\" alt=\"License\" /></a>\n  <a href=\"https://www.python.org/downloads/\"><img src=\"https://img.shields.io/badge/python-3.9+-blue?style=flat-square\" alt=\"Python 3.9+\" /></a>\n  <img src=\"https://img.shields.io/badge/tests-208%20passing-brightgreen?style=flat-square\" alt=\"Tests\" />\n  <a href=\"https://github.com/RyjoxTechnologies/Octopoda-OS/stargazers\"><img src=\"https://img.shields.io/github/stars/RyjoxTechnologies/Octopoda-OS?style=flat-square&color=gold\" alt=\"Stars\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://octopodas.com\"><b>Website</b></a> ·\n  <a href=\"https://octopodas.com/docs\"><b>Docs</b></a> ·\n  <a href=\"https://octopodas.com/dashboard\"><b>Dashboard</b></a> ·\n  <a href=\"#quick-start\"><b>Quick start</b></a> ·\n  <a href=\"#mcp-server\"><b>MCP</b></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/images/neural-brain.png\" alt=\"Octopoda Neural Brain — 3D visualization of live agent activity\" width=\"900\" />\n</p>\n\n<p align=\"center\"><sub><i>Live 3D view of 5 agents, 294 events, and 98 loops caught — <code>$1.19</code> in wasted tokens detected.</i></sub></p>\n\n---\n\n## Why Octopoda\n\n- **Agents forget.** Every session starts from zero. Octopoda gives them memory that survives restarts, crashes, and deployments — automatically.\n- **Agents loop.** A stuck agent can burn hundreds of dollars in tokens before anyone notices. Octopoda's 5-signal loop detector catches it in seconds.\n- **Agents are black boxes.** Why did it do that? Octopoda logs every decision, every write, every recovery — and visualizes it in a 3D view so you can actually see what's happening.\n\n---\n\n## Quick Start\n\n```bash\npip install octopoda\n```\n\n```python\nfrom octopoda import AgentRuntime\n\nagent = AgentRuntime(\"my_agent\")\n```\n\nThat's it. Your agent now has persistent memory, loop detection, crash recovery, and an audit trail. Everything runs automatically in the background. Memory survives restarts, crashes, and deployments.\n\nStore and retrieve memories when you need to:\n\n```python\nagent.remember(\"key\", \"value\")\nagent.recall(\"key\")\n```\n\nWant the dashboard? Run the server:\n\n```bash\npip install octopoda[server]\noctopoda\n```\n\nOpen **http://localhost:7842** — same dashboard as the cloud version, running against your local data. No account needed.\n\nWant cloud sync across machines? Sign up free at [octopodas.com](https://octopodas.com), set your API key, and your agents sync to the cloud automatically:\n\n```bash\nexport OCTOPODA_API_KEY=sk-octopoda-...\n```\n\nSame code, same dashboard — now backed by PostgreSQL with multi-device sync and team access.\n\n---\n\n## Local vs Cloud\n\n| | Local | Cloud |\n|---|---|---|\n| **Setup** | `pip install octopoda` | Sign up at octopodas.com |\n| **Storage** | SQLite on your machine | PostgreSQL + pgvector |\n| **Dashboard** | http://localhost:7842 | octopodas.com/dashboard |\n| **Account needed** | No | Yes (free) |\n| **Data stays on your machine** | Yes | Stored on cloud |\n| **Multi-device sync** | No | Yes |\n| **Semantic search** | Needs `octopoda[ai]` extra | Built-in |\n| **Upgrade path** | Set `OCTOPODA_API_KEY` | Already there |\n\nStart local, upgrade to cloud when you need sync or team access. Both use the same API, same dashboard design, same code.\n\n---\n\n## What You Get Out of the Box\n\nWhen you create an `AgentRuntime`, all of this is handled for you automatically:\n\n- **Persistent memory** — everything your agent stores survives restarts and crashes\n- **Loop detection** — catches agents stuck in repetitive patterns before they burn tokens\n- **Audit trail** — every decision, every write, every action is logged\n- **Crash recovery** — automatic heartbeat monitoring with snapshot/restore\n- **Health scoring** — continuous monitoring of memory quality and agent performance\n- **Heartbeats** — background thread tracks agent liveness\n\nYou don't need to configure any of this. It just works.\n\n---\n\n## Dashboards\n\nTrack latency, error rates, memory usage, and health scores per agent.\n\n![Agent Performance](docs/images/dashboard-performance.png)\n\nBrowse every memory, inspect version history, and see exactly how an agent's knowledge changed over time.\n\n![Memory Explorer](docs/images/memory-explorer.png)\n\n---\n\n## Audit Trail\n\nEvery decision, crash, recovery, and anomaly your agents make is logged with full context — including a memory snapshot captured at the moment of decision. Replay any time window and see exactly what each agent knew, decided, and why.\n\n![Audit Trail](docs/images/audit-trail.png)\n\n```python\nagent.log_decision(\n    decision=\"Keep single VPS instead of Kubernetes\",\n    reasoning=\"Current traffic (14k req/day) doesn't justify K8s complexity. VPS handles 100x this load.\",\n    context={\"current_rps\": 14000, \"threshold_rps\": 1000000},\n)\n```\n\nEvery `log_decision` call automatically captures a snapshot of the agent's memory at that instant. The audit timeline shows decisions alongside crashes and recoveries, filterable per agent. Built-in loop detection warns you if a decision repeats a recent one.\n\n---\n\n## Shared Memory\n\nMultiple agents working on the same problem can share knowledge through named memory spaces. Writes are atomic, reads are immediate, and every change is logged with its author — so you always know which agent contributed what.\n\n![Shared Memory](docs/images/shared-memory.png)\n\n```python\n# Research agent writes a finding into a shared space\nresearch_agent.share(\"market_size\", \"$2.1B AI memory market by 2027\", space=\"team-knowledge\")\n\n# Any other agent in the same space reads it\nresult = coding_assistant.read_shared(\"market_size\", space=\"team-knowledge\")\nprint(result.value)  # \"$2.1B AI memory market by 2027\"\n```\n\nEach space tracks authorship and timestamps for every write. Use `agent.shared_conflicts(space=\"team-knowledge\")` to surface disagreements when multiple agents write to the same key.\n\n---\n\n## When You Need More Control\n\nEverything below is optional. Use it when you need it.\n\n### Semantic Search\n\nFind memories by meaning, not just exact keys.\n\n```python\nagent.remember(\"bio\", \"Alice is a vegetarian living in London\")\nresults = agent.recall_similar(\"what does the user eat?\")\n# Returns the right memory with a similarity score\n```\n\n### Agent Messaging\n\nAgents can talk to each other through shared inboxes.\n\n```python\nagent_a.send_message(\"agent_b\", \"Found a bug in auth\", message_type=\"alert\")\nmessages = agent_b.read_messages(unread_only=True)\n```\n\n### Goal Tracking\n\nSet goals and track progress. Integrates with drift detection.\n\n```python\nagent.set_goal(\"Migrate to PostgreSQL\", milestones=[\"Backup\", \"Schema\", \"Migrate\", \"Validate\"])\nagent.update_progress(milestone_index=0, note=\"Backup done\")\n```\n\n### Memory Management\n\n```python\nagent.forget(\"outdated_config\")                    # Delete specific memories\nagent.forget_stale(max_age_seconds=30*86400)       # Clean up memories older than 30 days\nagent.consolidate(dry_run=False)                   # Merge duplicate memories (omit dry_run to preview)\nagent.memory_health()                              # Get a health report\n```\n\n### Snapshots\n\n```python\nagent.snapshot(\"before_migration\")\n# ... something goes wrong ...\nagent.restore(\"before_migration\")\n```\n\n### Export / Import\n\n```python\nbundle = agent.export_memories()\nnew_agent.import_memories(bundle)\n```\n\n---\n\n## Framework Integrations\n\nWorks with the frameworks you already use. Just swap in Octopoda and your agents get persistent memory.\n\n<details>\n<summary><b>LangChain — drop-in conversation memory</b></summary>\n\n```python\nfrom octopoda import LangChainMemory\nmemory = LangChainMemory(\"my-chain\")\nmemory.save_context({\"input\": \"I prefer dark mode\"}, {\"output\": \"Got it!\"})\nvariables = memory.load_memory_variables({})\n```\n</details>\n\n<details>\n<summary><b>CrewAI — persistent crew findings and task results</b></summary>\n\n```python\nfrom octopoda import CrewAIMemory\ncrew = CrewAIMemory(\"research-crew\")\ncrew.store_finding(\"researcher\", \"market_size\", {\"value\": \"$4.2B\"})\nfinding = crew.get_finding(\"market_size\")\n```\n</details>\n\n<details>\n<summary><b>AutoGen — multi-agent conversation memory</b></summary>\n\n```python\nfrom octopoda import AutoGenMemory\nmemory = AutoGenMemory(\"dev-team\")\nmemory.store_message(\"user_proxy\", \"assistant\", \"Research quantum computing\")\nhistory = memory.get_conversation_history()\n```\n</details>\n\n<details>\n<summary><b>OpenAI Agents SDK — thread and run persistence</b></summary>\n\n```python\nfrom octopoda import OpenAIAgentsMemory\nmemory = OpenAIAgentsMemory()\nmemory.store_thread_state(\"thread_001\", {\"messages\": [...]})\nrestored = memory.restore_thread(\"thread_001\")\n```\n</details>\n\nAll integrations work locally (no API key) or with cloud sync (set `OCTOPODA_API_KEY`).\n\n---\n\n## MCP Server\n\nGive Claude, Cursor, or any MCP-compatible AI persistent memory with zero code.\n\n```bash\npip install octopoda[mcp]\n```\n\nAdd to Claude Code:\n\n```bash\nclaude mcp add octopoda -s user -e OCTOPODA_API_KEY=sk-octopoda-YOUR_KEY -- python -m synrix_runtime.api.mcp_server\n```\n\nOr add to Claude Desktop config (`claude_desktop_config.json`):\n\n```json\n{\n  \"mcpServers\": {\n    \"octopoda\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"synrix_runtime.api.mcp_server\"],\n      \"env\": {\n        \"OCTOPODA_API_KEY\": \"sk-octopoda-YOUR_KEY\"\n      }\n    }\n  }\n}\n```\n\n28 tools for memory, search, loop detection, goals, messaging, and more.\n\n---\n\n## Cloud\n\nSign up free at [octopodas.com](https://octopodas.com) for the dashboard, managed hosting, and cloud API.\n\n```bash\nexport OCTOPODA_API_KEY=sk-octopoda-...\n```\n\nOr run `octopoda-login` to sign up from your terminal.\n\n```python\nfrom octopoda import Octopoda\n\nclient = Octopoda()\nagent = client.agent(\"my_agent\")\nagent.write(\"preference\", \"dark mode\")\nresults = agent.search(\"user preferences\")\n```\n\n| | Free | Pro ($19/mo) | Business ($49/mo) | Scale ($99/mo) |\n|---|---|---|---|---|\n| Agents | 5 | 25 | 75 | Unlimited |\n| Memories | 5,000 | 250,000 | 1,000,000 | 5,000,000 |\n| AI extractions | 100 | 10,000 | 50,000 | Unlimited |\n| Rate limit | 60 rpm | 300 rpm | 1,000 rpm | 5,000 rpm |\n| Dashboard | Yes | Yes | Yes | Yes |\n\n---\n\n## How It Compares\n\n| | Octopoda | Mem0 | Zep | LangChain Memory |\n|---|---|---|---|---|\n| **Open source** | MIT | Apache 2.0 | Partial (CE) | MIT |\n| **Local-first** | Yes (SQLite) | Cloud-first | Cloud-first | In-process |\n| **Loop detection** | 5-signal engine | No | No | No |\n| **Agent messaging** | Built-in | No | No | No |\n| **Audit trail** | Full history | No | No | No |\n| **Crash recovery** | Snapshots + restore | N/A | No | No |\n| **Shared memory** | Built-in | No | No | No |\n| **MCP server** | 28 tools | No | No | No |\n| **Semantic search** | Local embeddings | Cloud embeddings | Cloud embeddings | Needs vector DB |\n| **Integrations** | LangChain, CrewAI, AutoGen, OpenAI | LangChain | LangChain | Own only |\n\n---\n\n## Installation\n\n```bash\npip install octopoda              # Core — everything you need to get started\npip install octopoda[ai]          # + Local embeddings for semantic search\npip install octopoda[nlp]         # + spaCy for knowledge graph extraction\npip install octopoda[mcp]         # + MCP server for Claude/Cursor\npip install octopoda[all]         # Everything\n```\n\n## Configuration\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `OCTOPODA_API_KEY` | | Cloud API key (free at octopodas.com) |\n| `OCTOPODA_LLM_PROVIDER` | `none` | LLM for fact extraction: `openai`, `anthropic`, `ollama` |\n| `OCTOPODA_OPENAI_API_KEY` | | Your OpenAI key for local fact extraction |\n| `OCTOPODA_EMBEDDING_MODEL` | `BAAI/bge-small-en-v1.5` | Local embedding model (33MB, CPU) |\n| `SYNRIX_DATA_DIR` | `~/.synrix/data` | Local data directory |\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for setup instructions and guidelines.\n\n## Security\n\nSee [SECURITY.md](SECURITY.md) for reporting vulnerabilities.\n\n## License\n\nMIT — use it however you want. See [LICENSE](LICENSE).\n\n---\n\nBuilt by [RYJOX Technologies](https://octopodas.com) | [PyPI](https://pypi.org/project/octopoda/) | [Cloud API](https://api.octopodas.com) | [Dashboard](https://octopodas.com/dashboard)\n","summary":"Octopoda is an open‑source memory operating system for AI agents that automatically handles persistence, crash recovery, and loop detection, so agents can retain context across restarts and avoid costly endless loops. The package provides a simple `AgentRuntime` API for storing and recalling key/value pairs, an integrated audit trail that logs every decision and write, and a 3‑D visual dashboard that displays live agent activity. Users building autonomous agents, chatbots, or any LLM‑powered workflow will benefit from Octopoda’s lightweight local deployment or cloud‑synchronized variant with PostgreSQL storage, semantic search, and team access—all without needing to write custom persistence or monitoring code.","description":"The open-source memory operating system for AI agents. Persistent memory, semantic search, loop detection, agent messaging, crash recovery, and real-time observability.","stars":156,"language":"Python"},{"owner":"Nezreka","repo":"SoulSync","url":"https://github.com/Nezreka/SoulSync","readme":"<p align=\"center\">\n  <img src=\"./assets/trans.png\" alt=\"SoulSync Logo\">\n</p>\n\n# SoulSync - Intelligent Music Discovery & Automation Platform\n\n**Spotify-quality music discovery for self-hosted libraries.** Automates downloads, curates playlists, monitors artists, and organizes your collection with zero manual effort.\n\n> **IMPORTANT**: Configure file sharing in slskd to avoid Soulseek bans. Set up shared folders at `http://localhost:5030/shares`.\n\n**Community**: [Discord](https://discord.gg/wGvKqVQwmy) | [Reddit](https://old.reddit.com/r/ssync/) | **Website**: [ssync.net](https://www.ssync.net/) | **Support**: [GitHub Issues](https://github.com/Nezreka/SoulSync/issues) | **Donate**: [Ko-fi](https://ko-fi.com/boulderbadgedad)\n\n---\n\n## What It Does\n\nSoulSync bridges streaming services to your music library with automated discovery:\n\n1. **Monitors artists** → Automatically detects new releases from your watchlist\n2. **Generates playlists** → Release Radar, Discovery Weekly, Seasonal, Decade/Genre mixes, Cache-powered discovery\n3. **Downloads missing tracks** → From Soulseek, Deezer, Tidal, Qobuz, HiFi, YouTube, or any combination via Hybrid mode\n4. **Verifies downloads** → AcoustID fingerprinting for all download sources\n5. **Enriches metadata** → 10 enrichment workers (Spotify, MusicBrainz, iTunes, Deezer, Discogs, AudioDB, Last.fm, Genius, Tidal, Qobuz)\n6. **Tags consistently** → Picard-style MusicBrainz release preflight ensures all album tracks get the same release ID\n7. **Organizes files** → Custom templates for clean folder structures\n8. **Manages library** → Plex, Jellyfin, Navidrome, or SoulSync Standalone (no media server required)\n9. **Scrobbles plays** → Automatic scrobbling to Last.fm and ListenBrainz from your media server\n\n---\n\n## Key Features\n\n<p align=\"center\">\n  <img src=\"./assets/pages.gif\" alt=\"SoulSync Interface\">\n</p>\n\n### Discovery Engine\n\n**Release Radar** — New tracks from watchlist artists, personalized by listening history\n\n**Discovery Weekly** — 50 tracks from similar artists with serendipity weighting\n\n**Seasonal Playlists** — Halloween, Christmas, Valentine's, Summer, Spring, Autumn (hemisphere-aware)\n\n**Personalized Playlists** (12+ types)\n- Recently Added, Top Tracks, Forgotten Favorites\n- Decade Playlists (1960s-2020s), Genre Playlists (15+ categories)\n- Because You Listen To, Daily Mixes, Hidden Gems, Popular Picks, Discovery Shuffle, Familiar Favorites\n- Custom Playlist Builder (1-5 seed artists → similar artists → random albums → shuffled tracks)\n\n**Cache-Powered Discovery** (zero API calls)\n- Undiscovered Albums — albums by your most-played artists that aren't in your library\n- New In Your Genres — recently released albums matching your top genres\n- From Your Labels — popular albums on labels already in your library\n- Deep Cuts — low-popularity tracks from artists you listen to\n- Genre Explorer — genre landscape pills with artist counts, tap for Genre Deep Dive modal\n\n**ListenBrainz** — Import recommendation and community playlists\n\n**Beatport** — Full electronic music integration with genre browser (39+ genres)\n\n### Multi-Source Downloads\n\n**6 Download Sources**: Soulseek, Deezer, Tidal, Qobuz, HiFi, YouTube — use any single source or Hybrid mode with drag-to-reorder priority\n\n**Deezer Downloads** — ARL token authentication, FLAC lossless / MP3 320 / MP3 128 with automatic quality fallback and Blowfish decryption\n\n**Tidal Downloads** — Device-flow OAuth, quality tiers from AAC 96kbps to FLAC 24-bit/96kHz Hi-Res\n\n**Qobuz Downloads** — Email/password auth, quality up to Hi-Res Max (FLAC 24-bit/192kHz)\n\n**HiFi Downloads** — Free lossless via public API instances, no account required\n\n**Soulseek** — FLAC priority with quality profiles, peer quality scoring, source reuse for album consistency\n\n**YouTube** — Audio extraction with cookie-based bot detection bypass\n\n**Hybrid Mode** — Enable any combination of sources, drag to set priority order, automatic fallback chain\n\n**Playlist Sources**: Spotify, Tidal, YouTube, Deezer, Beatport charts, ListenBrainz, Spotify Link (no API needed)\n\n**Post-Download**\n- Lossy copy creation: MP3, Opus, AAC with configurable bitrate (Opus capped at 256kbps)\n- Hi-Res FLAC downsampling to 16-bit/44.1kHz CD quality\n- Blasphemy Mode — delete original FLAC after conversion\n- Synchronized lyrics (LRC) via LRClib\n- Picard-style album consistency — pre-flight MusicBrainz release lookup ensures all tracks get the same release ID\n\n### Listening Stats & Scrobbling\n\n**Listening Stats Page** — Full dashboard with Chart.js visualizations\n- Overview cards: total plays, listening time, unique artists/albums/tracks\n- Timeline bar chart, genre breakdown donut with legend\n- Top artists visual bubbles, top albums and tracks with play buttons and cover art\n- Library health: format breakdown bar, enrichment coverage rings, database storage chart\n- Time range filters: 7 days, 30 days, 12 months, all time\n\n**Scrobbling** — Automatic Last.fm and ListenBrainz scrobbling from Plex, Jellyfin, or Navidrome\n\n### Audio Verification\n\n**AcoustID Fingerprinting** (optional) — Verifies downloaded files match expected tracks\n- Runs for all download sources (Soulseek, Tidal, Qobuz, HiFi, Deezer, YouTube)\n- Catches wrong versions (live, remix, cover) even from streaming API sources\n- Fail-open design: verification errors never block downloads\n\n### Metadata & Enrichment\n\n**10 Background Enrichment Workers**: Spotify, MusicBrainz, iTunes, Deezer, Discogs, AudioDB, Last.fm, Genius, Tidal, Qobuz\n- Each worker independently processes artists, albums, and tracks\n- Pause/resume controls on dashboard, auto-pause during database scans\n- Error items don't auto-retry in infinite loops (fixed in v2.1)\n\n**Multi-Source Metadata**\n- Primary source selectable: Spotify, iTunes/Apple Music, Deezer, or Discogs\n- Spotify no longer auto-overrides — user chooses their preferred source in Settings\n- Spotify auth still enables playlists, followed artists, and enrichment\n- MusicBrainz enrichment with Picard-style album consistency\n\n**Post-Processing Tag Embedding**\n- Granular per-service tag toggles (18+ MusicBrainz tags, Spotify/iTunes/Deezer IDs, AudioDB mood/style, Tidal/Qobuz ISRCs, Last.fm tags, Genius URLs)\n- Album art embedding, cover.jpg download\n- Spotify rate limit protection across all API calls\n\n### Advanced Matching Engine\n\n- Version-aware matching: strictly rejects remixes when you want the original (and vice versa)\n- Unicode and accent handling (KoЯn, Bjork, A$AP Rocky)\n- Fuzzy matching with weighted confidence scoring (title, artist, duration)\n- Album variation detection (Deluxe, Remastered, Taylor's Version, etc.)\n- Streaming source match validation: same confidence scoring applied to Tidal/Qobuz/HiFi/Deezer results as Soulseek\n- Short title protection: prevents \"Love\" from matching \"Loveless\"\n\n### Automation\n\n**Automation Engine** — Visual drag-and-drop builder for custom workflows\n- **Triggers**: Schedule, Daily/Weekly Time, Track Downloaded, Batch Complete, Playlist Changed, Discovery Complete, Signal Received, and 10+ more\n- **Actions**: Process Wishlist, Scan Watchlist, Refresh Mirrored, Discover Playlist, Sync Playlist, Scan Library, Database Update, Quality Scan, Full Cleanup, and more\n- **Then Actions**: Fire Signal (chain automations), Discord, Telegram, Pushbullet notifications\n- **Playlist Pipeline**: Single automation for full playlist lifecycle — refresh → discover → sync → download missing. No signal wiring needed.\n- **Pipelines**: Pre-built one-click pipeline deployments (New Music, Nightly Operations, etc.)\n- **Signal Chains**: playlist_id forwarded from events to action handlers for proper chain execution\n\n**Watchlist** — Monitor unlimited artists with per-artist configuration\n- Release type filters: Albums, EPs, Singles\n- Content filters: Live, Remixes, Acoustic, Compilations\n- Auto-discover similar artists, periodic scanning\n\n**Wishlist** — Failed downloads automatically queued for retry with auto-processing\n\n**Mirrored Playlists** — Mirror from Spotify, Tidal, YouTube, Deezer and keep synced\n- Automatic refresh detects changes, discovery pipeline matches metadata\n- Followed Spotify playlists with 403 errors fall back to public embed scraper\n\n**Local Profiles** — Multiple configuration profiles with isolated settings, watchlists, and playlists\n\n### Library Management\n\n**Dashboard** — Service status, system stats, activity feed, enrichment worker controls\n- Unified glass UI design across all tool cards, service cards, and stat cards\n\n**Library Page** — Artist grid with staggered card animations, per-artist enrichment coverage rings\n- Artist Radio button — play random track with auto-queue radio mode\n- Play buttons on Last.fm top tracks sidebar\n\n**Enhanced Library Manager** — Toggle between Standard and Enhanced views\n- Inline metadata editing, per-service manual matching\n- Write Tags to File (MP3/FLAC/OGG/M4A), tag preview with diff\n- Server sync after tag writes (Plex, Jellyfin, Navidrome)\n- Bulk operations, sortable columns, multi-disc support\n\n**Library Maintenance** — 10+ automated repair jobs\n- Track Number, Dead Files, Duplicates, Metadata Gaps, Album Completeness, Missing Cover Art, AcoustID Scanner, Orphan Files, Fake Lossless, Library Reorganize, Lossy Converter, MBID Mismatch, Album Tag Consistency, Live/Commentary Cleaner\n- Enrichment workers auto-pause during database scans\n- One-click Fix All with findings dashboard\n\n**Database Storage Visualization** — Donut chart showing per-table storage breakdown\n\n**Import System** — Tag-first matching, auto-grouped album cards, staging folder workflow\n- Auto-Import worker: recursive scan, single file support, AcoustID fingerprinting fallback\n- Confidence-gated: 90%+ auto-imports, 70-90% queued for review\n\n**SoulSync Standalone Mode** — Use SoulSync without Plex, Jellyfin, or Navidrome\n- Downloads and imports write directly to the library database\n- Filesystem scanner for incremental and deep scan of Transfer folder\n- Pre-populated enrichment IDs from download context (Spotify, Deezer, MusicBrainz)\n- Select in Settings → Connections → Standalone\n\n**Template Organization** — `$albumartist/$album/$track - $title` and 10+ variables\n\n### Built-in Media Player\n\n- Stream tracks from your library with queue system\n- Now Playing modal with album art ambient glow and Web Audio visualizer\n- Smart Radio mode — auto-queue similar tracks by genre, mood, and style\n- Repeat modes, shuffle, keyboard shortcuts, Media Session API\n\n### Mobile Responsive\n\n- Comprehensive mobile layouts for Stats, Automations, Hydrabase, Issues, Help pages\n- Artist hero section, enhanced library track table with bottom sheet action popover\n- Enrichment rings, filter bars, and discover cards all adapt to narrow screens\n\n---\n\n## Installation\n\n### Docker (Recommended)\n\n```bash\ncurl -O https://raw.githubusercontent.com/Nezreka/SoulSync/main/docker-compose.yml\ndocker-compose up -d\n# Access at http://localhost:8008\n```\n\n### Unraid\n\nSoulSync is available as an Unraid template. Install from Community Applications or manually add the template from:\n```\nhttps://raw.githubusercontent.com/Nezreka/SoulSync/main/templates/soulsync.xml\n```\n\nPUID/PGID are exposed in the template — set them to match your Unraid permissions (default: 99/100 for nobody/users).\n\n### Python (No Docker)\n\n```bash\ngit clone https://github.com/Nezreka/SoulSync\ncd SoulSync\npip install -r requirements.txt\ngunicorn -c gunicorn.conf.py wsgi:application\n# Open http://localhost:8008\n```\n\nFor local development and tests:\n\n```bash\npip install -r requirements-dev.txt\npytest\ngunicorn -c gunicorn.dev.conf.py wsgi:application\n```\n\n---\n\n## Setup Guide\n\n### Prerequisites\n\n- **slskd** running and accessible ([Download](https://github.com/slskd/slskd/releases)) — required for Soulseek downloads\n- **Spotify API** credentials ([Dashboard](https://developer.spotify.com/dashboard)) — optional but recommended for discovery\n- **Media Server** (optional): Plex, Jellyfin, or Navidrome\n- **Deezer ARL token** (optional): For Deezer downloads — get from browser cookies after logging into deezer.com\n- **Tidal account** (optional): For Tidal downloads — authenticate via device flow in Settings\n- **Qobuz account** (optional): For Qobuz downloads — email/password login in Settings\n\n### Step 1: Set Up slskd\n\nSoulSync talks to slskd through its API. See the [slskd setup guide](https://github.com/slskd/slskd) for API key configuration.\n\n1. Add an API key in slskd's `settings.yml` under `web > authentication > api_keys`\n2. Restart slskd\n3. Paste the key into SoulSync's Settings → Downloads → Soulseek section\n\n**Configure file sharing in slskd to avoid Soulseek bans.** Set up shared folders at `http://localhost:5030/shares`.\n\n### Step 2: Set Up Spotify API (Optional)\n\nSpotify gives you the best discovery features. Without it, SoulSync falls back to iTunes/Deezer for metadata.\n\n1. Create an app at [developer.spotify.com/dashboard](https://developer.spotify.com/dashboard)\n2. Add Redirect URI: `http://127.0.0.1:8888/callback`\n3. Copy Client ID and Client Secret into SoulSync Settings\n\nMore detail in [Support/DOCKER-OAUTH-FIX.md](Support/DOCKER-OAUTH-FIX.md).\n\n### Step 3: Configure SoulSync\n\nOpen SoulSync at `http://localhost:8008` and go to Settings.\n\n**Download Source**: Choose your preferred source (Soulseek, Deezer, Tidal, Qobuz, HiFi, YouTube, or Hybrid)\n\n**Paths**:\n- **Input Folder**: Container path to slskd's download folder (e.g., `/app/downloads`)\n- **Output Folder**: Where organized music goes (e.g., `/app/Transfer`)\n- **Import Folder**: Optional folder for importing existing music (e.g., `/app/Staging`)\n\n**Media Server** (optional): Use your machine's actual IP (not `localhost` — that means inside the container)\n\n### Step 4: Docker Path Mapping\n\n| What | Container Path | Host Path |\n|------|---------------|-----------|\n| Config | `/app/config` | Your config folder |\n| Logs | `/app/logs` | Your logs folder |\n| Database | `/app/data` | Named volume (recommended) |\n| Input | `/app/downloads` | Same folder slskd downloads to |\n| Output | `/app/Transfer` | Where organized music goes |\n| Import | `/app/Staging` | Optional folder for importing music |\n\n**Important:** Use a named volume for the database (`soulsync_database:/app/data`). Direct host path mounts to `/app/data` can overwrite Python module files.\n\n---\n\n## Comparison\n\n| Feature | SoulSync | Lidarr | Headphones | Beets |\n|---------|----------|--------|------------|-------|\n| Custom Discovery Playlists (15+) | ✓ | ✗ | ✗ | ✗ |\n| Cache-Powered Discovery (zero API) | ✓ | ✗ | ✗ | ✗ |\n| Listening Stats Dashboard | ✓ | ✗ | ✗ | ✗ |\n| Last.fm/ListenBrainz Scrobbling | ✓ | ✗ | ✗ | ✗ |\n| 6 Download Sources | ✓ | ✗ | ✗ | ✗ |\n| Deezer Downloads (FLAC) | ✓ | ✗ | ✗ | ✗ |\n| Tidal Downloads (Hi-Res) | ✓ | ✗ | ✗ | ✗ |\n| Qobuz Downloads (Hi-Res Max) | ✓ | ✗ | ✗ | ✗ |\n| Soulseek Downloads | ✓ | ✗ | ✗ | ✗ |\n| Beatport Integration | ✓ | ✗ | ✗ | ✗ |\n| Audio Fingerprint Verification | ✓ | ✗ | ✗ | ✓ |\n| 9 Enrichment Workers | ✓ | ✗ | ✗ | Plugin |\n| Picard-Style Album Tagging | ✓ | ✗ | ✗ | ✗ |\n| Visual Automation Builder | ✓ | ✗ | ✗ | ✗ |\n| Enhanced Library Manager | ✓ | ✗ | ✗ | ✗ |\n| Library Maintenance Suite (10+ jobs) | ✓ | ✗ | ✗ | ✓ |\n| Multi-Profile Support | ✓ | ✗ | ✗ | ✗ |\n| Mobile Responsive | ✓ | ✓ | ✗ | ✗ |\n| Built-in Media Player + Radio | ✓ | ✗ | ✗ | ✗ |\n\n---\n\n## Architecture\n\n**Scale**: ~120,000 lines across Python backend and JavaScript frontend, 80+ API endpoints, handles 10,000+ album libraries\n\n**Integrations**: Spotify, iTunes/Apple Music, Deezer, Tidal, Qobuz, YouTube, Soulseek (slskd), HiFi, Beatport, ListenBrainz, MusicBrainz, AcoustID, AudioDB, Last.fm, Genius, LRClib, music-map.com, Plex, Jellyfin, Navidrome\n\n**Stack**: Python 3.11, Flask, SQLite (WAL mode), vanilla JavaScript SPA, Chart.js\n\n**Core Components**:\n- **Matching Engine** — version-aware fuzzy matching with streaming source bypass\n- **Download Orchestrator** — routes between 6 sources with hybrid fallback and batch processing\n- **Discovery System** — personalized playlists, cache-powered sections, seasonal content\n- **Metadata Pipeline** — 9 enrichment workers, Picard-style album consistency, dual-source fallback\n- **Album Consistency** — pre-flight MusicBrainz release lookup before album downloads\n- **Automation Engine** — event-driven workflows with signal chains and pipeline deployment\n- **SoulID System** — deterministic cross-instance artist/album/track identifiers via track-verified API lookup\n","summary":"SoulSync is an automated music discovery and library‑management platform that bridges streaming services to a self‑hosted collection. It watches a watch‑list of artists, downloads missing tracks from multiple sources (Soulseek, Deezer, Tidal, Qobuz, HiFi, YouTube) in priority order, enriches metadata with dozens of services, and organizes files into clean folder structures. The software auto‑generates a wide range of playlists—release radar, discovery weekly, seasonal mixes, genre and decade collections, plus custom builders—without any API calls by leveraging the user’s listening history. Ideal for audiophiles, home server users, and Plex/Jellyfin/Terade users who want a fully automated, high‑quality, Spotify‑style experience without manual curation.","description":"Automated Music Discovery and Collection Manager","stars":1589,"language":"Python"},{"owner":"the-booklore","repo":"booklore","url":"https://github.com/the-booklore/booklore","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/logo-with-text-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/logo-with-text-light.svg\">\n    <img src=\"assets/logo-with-text-light.svg\" alt=\"BookLore\" height=\"80\" />\n  </picture>\n</p>\n\n<p align=\"center\"><strong>Your books deserve a home. This is it.</strong></p>\n\n<p align=\"center\">\nBookLore is a self-hosted app that brings your entire book collection under one roof.<br/>\nOrganize, read, annotate, sync across devices, and share, all without relying on third-party services.\n</p>\n\n---\n\n## ✨ Features\n\n| | Feature | Description |\n|:---:|:---|:---|\n| 📚 | **Smart Shelves** | Custom and dynamic shelves that organize themselves with rule-based Magic Shelves, filters, and full-text search |\n| 🔍 | **Automatic Metadata** | Covers, descriptions, reviews, and ratings pulled from Google Books, Open Library, and Amazon, all editable |\n| 📖 | **Built-in Reader** | Open PDFs, EPUBs, and comics right in the browser with annotations, highlights, and reading progress |\n| 🔄 | **Device Sync** | Connect your Kobo, use any OPDS-compatible app, or sync progress with KOReader. Your library follows you everywhere |\n| 👥 | **Multi-User Ready** | Individual shelves, progress, and preferences per user with local or OIDC authentication |\n| 📥 | **BookDrop** | Drop files into a watched folder and BookLore detects, enriches, and queues them for import automatically |\n| 📧 | **One-Click Sharing** | Send any book to a Kindle, an email address, or a friend instantly |\n\n---\n\n## 🚀 Quick Start\n\nAll you need is [Docker](https://docs.docker.com/get-docker/) and [Docker Compose](https://docs.docker.com/compose/install/).\n\n<details>\n<summary><strong>📦 Image Repositories</strong></summary>\n\n| Registry | Image                              |\n|----------|------------------------------------|\n| GitHub Container Registry | `ghcr.io/the-booklore/booklore` |\n\n</details>\n\n### Step 1: Environment Configuration\n\nCreate a `.env` file:\n\n```ini\n# Application\nAPP_USER_ID=1000\nAPP_GROUP_ID=1000\nTZ=Etc/UTC\n\n# Database\nDATABASE_URL=jdbc:mariadb://mariadb:3306/booklore\nDB_USER=booklore\nDB_PASSWORD=ChangeMe_BookLoreApp_2025!\n\n# Storage: LOCAL (default) or NETWORK (disables file operations, see Network Storage section below)\nDISK_TYPE=LOCAL\n\n# MariaDB\nDB_USER_ID=1000\nDB_GROUP_ID=1000\nMYSQL_ROOT_PASSWORD=ChangeMe_MariaDBRoot_2025!\nMYSQL_DATABASE=booklore\n```\n\n### Step 2: Docker Compose\n\nCreate a `docker-compose.yml`:\n\n```yaml\nservices:\n  booklore:\n    image: ghcr.io/the-booklore/booklore:latest\n    container_name: booklore\n    environment:\n      - USER_ID=${APP_USER_ID}\n      - GROUP_ID=${APP_GROUP_ID}\n      - TZ=${TZ}\n      - DATABASE_URL=${DATABASE_URL}\n      - DATABASE_USERNAME=${DB_USER}\n      - DATABASE_PASSWORD=${DB_PASSWORD}\n      - DISK_TYPE=${DISK_TYPE}\n    depends_on:\n      mariadb:\n        condition: service_healthy\n    ports:\n      - \"6060:6060\"\n    volumes:\n      - ./data:/app/data\n      - ./books:/books\n      - ./bookdrop:/bookdrop\n    healthcheck:\n      test: wget -q -O - http://localhost:6060/api/v1/healthcheck\n      interval: 60s\n      retries: 5\n      start_period: 60s\n      timeout: 10s\n    restart: unless-stopped\n\n  mariadb:\n    image: lscr.io/linuxserver/mariadb:11.4.5\n    container_name: mariadb\n    environment:\n      - PUID=${DB_USER_ID}\n      - PGID=${DB_GROUP_ID}\n      - TZ=${TZ}\n      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}\n      - MYSQL_DATABASE=${MYSQL_DATABASE}\n      - MYSQL_USER=${DB_USER}\n      - MYSQL_PASSWORD=${DB_PASSWORD}\n    volumes:\n      - ./mariadb/config:/config\n    restart: unless-stopped\n    healthcheck:\n      test: [ \"CMD\", \"mariadb-admin\", \"ping\", \"-h\", \"localhost\" ]\n      interval: 5s\n      timeout: 5s\n      retries: 10\n```\n\n### Step 3: Launch\n\n```bash\ndocker compose up -d\n```\n\nOpen **http://localhost:6060**, create your admin account, and start building your library.\n\n---\n\n## ⚠️ Network Storage (NAS / NFS / SMB / CIFS)\n\n> [!CAUTION]\n> BookLore's file operations (metadata writing, file renaming, file organization) are built for **local file systems only**. Network-attached storage (NAS, NFS, SMB/CIFS mounts, cloud-backed FUSE, etc.) is **unsupported and untested**. Mount options, network latency, caching, and filesystem semantics are all outside BookLore's control and can cause silent file corruption, incomplete writes, missing files, and other unpredictable behavior. **Issues related to network storage will be closed without investigation.**\n\nIf your book files live on network storage, set `DISK_TYPE=NETWORK` in your `.env` file. This puts BookLore into **network storage mode**, which disables all file write and reorganization features. Metadata is stored in the database only and your files are never modified. This is the only supported configuration for network storage.\n\n---\n\n## 📥 BookDrop: Zero-Effort Import\n\nDrop book files into a folder. BookLore picks them up, pulls metadata, and queues everything for your review.\n\n```mermaid\ngraph LR\n    A[📁 Drop Files] --> B[🔍 Auto-Detect]\n    B --> C[📊 Extract Metadata]\n    C --> D[✅ Review & Import]\n```\n\n| Step | What Happens |\n|:---|:---|\n| 1. **Watch** | BookLore monitors the BookDrop folder around the clock |\n| 2. **Detect** | New files are picked up and parsed automatically |\n| 3. **Enrich** | Metadata is fetched from Google Books and Open Library |\n| 4. **Import** | You review, tweak if needed, and add to your library |\n\nMount the volume in `docker-compose.yml`:\n\n```yaml\nvolumes:\n  - ./bookdrop:/bookdrop\n```\n\n---\n\n## 💜 Support BookLore\n\nBookLore is free, open source, and built with care. Here's how you can give back:\n\n| Action | How |\n|:---|:---|\n| ⭐ **Star this repo** | It's the simplest way to help others find BookLore |\n| 💰 **Sponsor development** | [Open Collective](https://opencollective.com/booklore) funds hosting, testing, and new features |\n| 📢 **Tell someone** | Share BookLore with a friend, a subreddit, or your local book club |\n\n---\n\n## 🌍 Translations\n\nBookLore is used by readers around the world. Help make it accessible in your language on [Weblate](https://hosted.weblate.org/engage/booklore/).\n\n<a href=\"https://hosted.weblate.org/engage/booklore/\">\n  <img src=\"https://hosted.weblate.org/widget/booklore/multi-auto.svg?v=1\" alt=\"Translation status\" />\n</a>\n\n---\n\n## 🌟 Sponsors & Partners\n\n<table>\n<tr>\n\n<a href=\"https://jb.gg/OpenSource\">\n  <img src=\"https://resources.jetbrains.com/storage/products/company/brand/logos/jetbrains.svg\" alt=\"JetBrains\" height=\"40\" />\n</a>\n\n\n</td>\n</tr>\n</table>\n</div>\n\n---\n\n<div align=\"center\">\n\n## ⚖️ License\n\n**GNU Affero General Public License v3.0**\n\nCopyright 2024–2026 BookLore\n\n[![License: AGPL v3](https://img.shields.io/badge/License-AGPL_v3-blue.svg?style=for-the-badge)](https://www.gnu.org/licenses/agpl-3.0.html)\n\n</div>\n","summary":"BookLore is a self‑hosted digital library manager that consolidates all of a user’s books into a single, fully synchronized database. It automatically pulls cover art, descriptions, reviews and ratings from services such as Google Books, Open Library and Amazon, while offering a built‑in browser reader for PDFs, EPUBs and comics with annotation and progress tracking. The platform supports smart shelving with rule‑based sorting, a “BookDrop” file watcher, multi‑user accounts, and one‑click sharing to Kindle or email, all without reliance on third‑party clouds. Anyone who owns a personal or shared collection of e‑books—ranging from casual readers to researchers and small libraries—will benefit from its self‑contained, privacy‑first design and cross‑device sync.","description":"BookLore: A self-hosted, multi-user digital library with smart shelves, auto metadata, Kobo & KOReader sync, BookDrop imports, OPDS support, and a built-in reader for EPUB, PDF, and comics.","stars":73,"language":"Java"},{"owner":"derekshreds","repo":"snacks","url":"https://github.com/derekshreds/snacks","readme":"<p align=\"center\">\n  <img src=\"snacks.ico\" alt=\"Snacks\" width=\"80\">\n</p>\n\n<h1 align=\"center\">Snacks</h1>\n<p align=\"center\"><strong>Automated Video Library Encoder</strong></p>\n<p align=\"center\">\n  Batch transcode your entire video library with hardware acceleration.<br>\n  Runs on your NAS via Docker or locally on Windows as a desktop app.\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/version-2.3.1-8b5cf6?style=flat-square\" alt=\"Version\">\n  <img src=\"https://img.shields.io/badge/.NET-10.0-512bd4?style=flat-square\" alt=\".NET 10\">\n  <img src=\"https://img.shields.io/badge/Electron-41-47848f?style=flat-square\" alt=\"Electron\">\n  <img src=\"https://img.shields.io/badge/license-MIT-green?style=flat-square\" alt=\"License\">\n</p>\n\n---\n\n## Features\n\n- **Hardware accelerated encoding** -- NVIDIA NVENC, Intel QSV/VAAPI, AMD AMF/VAAPI\n- **H.265, H.264, and AV1** -- encode to any modern codec with hardware or software\n- **Smart filtering** -- skips files that already meet your quality targets\n- **Persistent database** -- SQLite tracks all files across restarts, no re-scanning needed\n- **Retry with fallback** -- strips subtitles, tries software decode + HW encode, then full software\n- **Real-time progress** -- live encoding progress via SignalR WebSockets\n- **Batch processing** -- process individual files, folders, or entire libraries\n- **NAS-friendly** -- designed for QNAP, Synology, and other Docker-capable NAS devices\n- **Desktop app** -- native Windows installer with local GPU support\n- **Automatic scanning** -- watch directories for automatic re-scanning on a configurable interval\n- **4K controls** -- configurable bitrate multiplier or skip 4K content entirely\n- **Per-file logging** -- every encode writes a log file to disk, viewable in the app or on the NAS\n- **Stop vs Cancel** -- stop an encode for later, or cancel it permanently\n- **Change detection** -- replaced files are automatically detected and re-queued\n- **Transfer-safe scanning** -- files modified within the last 30 minutes are skipped to avoid mid-transfer processing\n- **Settings backup** -- atomic
