ots/screenshot(3).png)\n![Screenshot](screenshots/screenshot(4).png)\n\n[laravel]: https://laravel.com\n[filament]: https://filamentphp.com\n[ollama]: https://ollama.com/\n[openclaw]: https://openclaw.ai/\n[setup]: docs/setup.md\n[docker]: https://www.docker.com/\n[license]: LICENSE.md\n","summary":"Noton is a free, self‑hosted documentation platform built with Laravel and Filament, designed to prioritize clarity, structure, and ease of deployment. It offers integrated private AI capabilities via Ollama or OpenClaw, allowing users to generate content and answers on their own servers without external API calls. The project is Docker‑ready but can also be run locally, making it accessible to developers and teams who need a customizable documentation solution. It targets technical writers, developers, and organizations that want a straightforward, privacy‑first platform for internal or non‑commercial documentation projects.","description":"A free and open documentation platform built with Laravel and Filament, enhanced by Ollama and OpenClaw for private AI features, focused on clarity, structure, and self-hosted simplicity.","stars":141,"language":"PHP"},{"owner":"TheBigRoomXXL","repo":"tinyfeed","url":"https://github.com/TheBigRoomXXL/tinyfeed","readme":"# Welcome \n\n![banner](docs/img/banner.svg)\n\n**tinyfeed** is a CLI tool that generate a static HTML page from a collection of feeds.\n\nIt's dead simple, no database, no config file, just a CLI and some HTML \n\nGive it a list of RSS, Atom or JSON feeds urls and it will generate a single HTML page for it. Then you can effortlessly set it up in `crond,` `systemd` or `openrc` and voilà, you’ve got yourself a webpage that aggregates your favorite feeds.\n\n\n## Feature\n\n- RSS, Atom and JSON feeds are all supported thanks to the awesome \n[gofeed library](https://github.com/mmcdole/gofeed)\n- Highly customizable, especially with the ability to use external stylesheets and templates.\n- Dark / Light theme based on system preference\n- The generated page is lightweight and fully accessible.\n- Supports a daemon mode to re-generate the output periodically.\n\n\n## Live demos\n\n**Default tinyfeed: [feed.lovergne.dev/demo](https://feed.lovergne.dev//demo)**  \n**With solarize theme : [feed.lovergne.dev/demo/solarized](https://feed.lovergne.dev//demo/solarized.html)**  \n**With lobste.rs skin : [feed.lovergne.dev/demo/lobster](https://feed.lovergne.dev//demo/lobster.html)**  \n**With hacker new skin : [feed.lovergne.dev/demo/hackernew](https://feed.lovergne.dev//demo/hackernews.html)**  \n**With a back-to-top button injected: [feed.lovergne.dev/demo/back-to-top](https://feed.lovergne.dev/demo/back-to-top.html)**  \n\n\n## Screenshots\n\n![screenshots of feed.lovergne.dev](docs/img/screenshots.webp)\n\nVisited links are in yellow, unvisited in blue. \n\n\n## Documentation\n\nFor guidance on installation, usage, customization and integration of tinyfeed, please checkout the [documentation website](https://feed.lovergne.dev/)\n\nTo get started:\n\n- [Installation guide](https://feed.lovergne.dev/installation/)\n- [Usage Guide](https://feed.lovergne.dev/usage/)\n\n\n## Feedback, help or bug report\n\nIf you need anything related to this project, whether it's just giving feedback, requesting a feature, or simply asking for help to understand something, open an [issue](https://github.com/TheBigRoomXXL/tinyfeed/issues) on the official [repository](https://github.com/TheBigRoomXXL/tinyfeed/).\n\nYou have created a page with tinyfeed and you want to share it? You can open a merge request or an issue to add it to the demo section.\n\n*If you want to contribute, read [CONTRIBUTING.md](CONTRIBUTING.md) first so that we can collaborate efficiently.*\n\n\n## Acknowledgement\n\nThank you [@MariaLetta](https://github.com/MariaLetta) for the awesome [free-gophers-pack ](https://github.com/MariaLetta/free-gophers-pack) which I adapted for the banner.\n\nThe project was heavily inspired by the awesomely simple [tinystatus](https://github.com/bderenzo/tinystatus) and message boards like Lobste.rs and Hacker News.\n","summary":"tinyfeed is a lightweight CLI tool that turns a list of RSS, Atom or JSON feed URLs into a single, statically‑served HTML page, without requiring a database or configuration file. It supports custom templates, external stylesheets, system‑preferring dark/light themes, and can run in daemon mode to regenerate the page on a schedule. The generated site is small, fully accessible, and easy to deploy with cron, systemd or openrc, making it ideal for developers, sysadmins, or hobbyists who need a quick, embeddable feed aggregator on a static website.","description":"Generate a webpage from a collection of feeds wtih a simple CLI tool","stars":339,"language":"Go"},{"owner":"dedicatedcode","repo":"paikka","url":"https://github.com/dedicatedcode/paikka","readme":"![](.github/banner.png)\n\n## Official Instance\n\nThere is an official instance of PAIKKA running at **https://geo.dedicatedcode.com** that you can use for free. \n\n**Important notes about this instance:**\n- There are **no usage limits or restrictions** – feel free to integrate it into your projects.\n- However, there are **no guarantees about availability or SLA** (Service Level Agreement). The service is provided on a best-effort basis.\n- The instance is shared among all users. **Please do not abuse it** – excessive or abusive usage will affect everyone else.\n\nBe nice to each other and use the service responsibly.\n\nPAIKKA is a specialized reverse geocoding service designed to provide high-performance location resolution for [Reitti](https://github.com/dedicatedcode/reitti). The name comes from the Finnish word for \"place\" and is pronounced [ˈpɑi̯kːɑ].\n\n## Overview\n\nPAIKKA provides fast, scalable reverse geocoding capabilities by processing OpenStreetMap data and serving it through a REST API and web interface. It's designed to handle planet-scale datasets efficiently while maintaining low latency for geocoding requests.\n\n## Why PAIKKA?\n\nStandard geocoding solutions often fall short for specific personal tracking needs. PAIKKA was built to solve these challenges:\n\n- **Meaningful Results:** Optimized for the specific usage patterns and location data needed for Reitti.\n- **Boundary Intelligence:** Unlike many light geocoders, PAIKKA includes administrative boundaries on nodes when available.\n- **Resource Efficient:** A computationally light solution that doesn't require massive infrastructure.\n- **Portable Data:** Designed so prepared exports can be easily copied to and served from lightweight machines.\n\n## Relationship to Reitti\n\n[Reitti](https://github.com/dedicatedcode/reitti) is a comprehensive personal location tracking and analysis application that helps you understand your movement patterns and significant places. PAIKKA acts as the dedicated \"location engine\" for Reitti, converting raw GPS\ncoordinates into human-readable context.\n\n## Limitations\n\n- Boundary data is dependent on availability within the source nodes.\n- Optimized for read-heavy serving; updates require re-importing prepared data.\n- Focused strictly on reverse geocoding (coordinates to place).\n- **Highly Opinionated POI Selection:** PAIKKA is deliberately selective about which Points of Interest it imports. It only includes POIs with the following OSM tags:\n    - `amenity` (e.g., restaurant, school, hospital, fuel, atm)\n    - `shop` (e.g., supermarket, clothes, bakery)\n    - `tourism` (e.g., hotel, museum, attraction)\n    - `leisure` (e.g., fitness_centre, playground, park)\n    - `office` (e.g., company, government, insurance)\n    - `craft` (e.g., carpenter, electrician, painter)\n    - `healthcare` (e.g., hospital, pharmacy, clinic)\n    - `emergency` (e.g., ambulance_station, fire_hydrant)\n    - `historic` (e.g., monument, archaeological_site)\n    - `natural` (e.g., peak, cave, waterfall)\n    - `man_made` (e.g., tower, pier, windmill)\n    - `place` (e.g., city, town, village, neighborhood)\n    - `sport` (e.g., tennis, swimming, fitness)\n    - `public_transport` (e.g., stop_position, station)\n    - `railway` (stations only)\n    - `aeroway` (e.g., aerodrome, helipad)\n    - `building` (commercial, retail, industrial, office – but not residential or generic \"yes\")\n\n  Many common OSM features are explicitly excluded, such as:\n    - Natural features like trees and grass\n    - Man-made structures like electric-poles, trash cans\n    - Amenities like benches, drinking water, and picnic tables\n    - Swimming pools and fountains\n\n  If you need comprehensive POI coverage including all OSM features, **Nominatim** would be a better fit for your use case. While it would be technically possible to import the complete unfiltered dataset, this was never the intended design and has not been tested.\n\n## Features\n\n- **High performance geocoding** – Fast and efficient reverse geocoding\n- **RESTful API** – Simple HTTP endpoints for geocoding operations\n- **Web Dashboard** – Administrative interface for monitoring and statistics\n- **Boundary support** – Administrative boundary data for hierarchical location information\n- **Health monitoring** - Built-in health check endpoints\n- **Secure** - Password-protected admin interface with security features\n\n## API Endpoints\n\n### Public API\n- `GET /api/v1/health` - Health check endpoint\n- `GET /api/v1/reverse?lat={lat}&lon={lon}[&lang={lang}]` - Reverse geocoding\n- `GET /api/v1/geometry/{osmId}` - Retrieve geometry for OSM objects\n\n### Web Interface\n- `GET /` - About page with project information\n- `GET /login` - Admin login page\n- `GET /admin/stats` - Admin dashboard (requires authentication)\n\n## Data Preparation\n\n### Prerequisites\n\n- Java 25 or higher\n- osmium-tool (for filtering OSM data)\n\n### Obtaining OSM Data\n\nBefore you can import data into PAIKKA, you need to obtain an OSM PBF file. Here are the main sources:\n\n#### Geofabrik (Recommended for regional extracts)\n\n[Geofabrik](https://download.geofabrik.de/) provides regularly updated OSM extracts for various regions. Their data is already clipped to geographic boundaries, making it ideal for country or regional imports.\n\n**Popular downloads:**\n- [Europe](https://download.geofabrik.de/europe.html) – Individual countries and regions\n- [North America](https://download.geofabrik.de/north-america.html) – Countries and states\n- [Asia](https://download.geofabrik.de/asia.html) – Countries and regions\n- [Planet file](https://download.geofabrik.de/planet.html) – Complete global dataset\n\n**Example:** To download Germany:\n```bash\nwget https://download.geofabrik.de/europe/germany-latest.osm.pbf\n```\n\n#### Planet file (Full global dataset)\n\nFor planet-scale imports, download the full planet file:\n- [Planet PBF](https://planet.openstreetmap.org/pbf/) – Updated weekly\n- [Planet Mirrors](https://wiki.openstreetmap.org/wiki/Planet.osm#Planet.osm_mirrors) – Various download mirrors\n\n**Warning:** The planet file is extremely large (tens of gigabytes). Processing it requires significant time and resources. For most use cases, a regional extract from Geofabrik is sufficient.\n\n#### OSM.org (Direct exports)\n\nThe [OpenStreetMap website](https://www.openstreetmap.org/export/) allows you to export custom areas using their \"Export\" feature. This is useful if you need a specific region that isn't available as a pre-made extract.\n\n### Sizing Considerations\n\n| Dataset    | original | filtered... | time taken | reduction | during import | imported | time taken | reduction |\n|------------|----------|-------------|------------|-----------|---------------|----------|------------|-----------|\n| Planet     | 86 GB    | 36 GB       | 40 min     | ~57%      | ~250 GB       | ~65 GB   | ~11 h      | ~25%      |\n| Germany    | 4.4 GB   | 1.8 GB      | 2 min      | ~59%      | ~14.4 GB      | 3,81 GB  | ~18 min    | ~13%      |\n| Netherland | 1.4 GB   | 394 MB      | 30 s       | ~70%      | ~2,69 GB      | 705,7 MB | ~3 min     | ~50%      |\n\n<details>\n<summary>Hardware & Environment Details</summary>\n\nThe above benchmarks were performed on the following hardware:\n\n- **CPU:** AMD Ryzen 7 5825U with Radeon Graphics (8 cores, 16 threads, 4.5 GHz max)\n- **Memory:** 32 GiB system RAM\n- **Storage:** pbf on ZFS Pool on 4 HDD, import folder an nvme drive\n\n**Import Command Used:**\n```bash\ndocker run -ti -v ./:/data dedicatedcode/paikka:develop import --memory 16G --threads 10 --data-dir /data/import/ planet-filtered.pbf\n```\n\n**Memory Considerations:**\n\nThe `--memory` flag (e.g., `--memory 16G`) controls the JVM heap size only. RocksDB requires additional memory beyond the heap for its block cache and internal structures. For optimal performance with large imports, ensure your system has significantly more RAM available than\nthe heap size specified. As a guideline, a 16GB heap typically works well on systems with 24-32GB of RAM for medium-sized countries, while planet imports benefit from 32GB+ heap on systems with 64GB+ RAM.\n\n**Swap Space:**\n\nEnsure adequate swap space is available. During import, memory usage can spike due to RocksDB's internal buffering and compaction operations. Without sufficient swap, the system may invoke the OOM killer to terminate processes when memory limits are exceeded. A good rule of\nthumb is to have swap space at least equal to or larger than the JVM heap size (e.g., 16GB heap with 16GB+ swap).\n\n**Storage Considerations:**\n\nA fast NVMe drive or RAID configuration significantly improves import times. The import process involves heavy random I/O operations during the RocksDB compaction phase. Slower storage can double or triple import times compared to fast NVMe storage. \nOr put in other words, a Planet-PBF import took 85h on my system when having everything on the ZFS Pool. When putting the import folder on a NVME drive, the whole import took around 11h. \n\n</details>\n\n### Quick Start\n\nPAIKKA includes helper scripts to simplify data preparation:\n\n1. **Filter OSM data** (recommended to reduce file size):\n   ```bash\n   ./scripts/filter_osm.sh input.osm.pbf filtered.osm.pbf\n   ```\n\n2. **Import the data**:\n   ```bash\n   ./scripts/import.sh filtered.osm.pbf\n   ```\n\n### Running with Docker\n\nAlternatively, you can use Docker to prepare and import data. The container includes the required scripts and osmium-tool.\n\n#### Prerequisites\n\n- Docker installed\n- A PBF file with OSM data\n\n#### Prepare the data (filter OSM data)\n\nRun the `prepare` script to filter the OSM data. Mount a local directory containing your input PBF file and specify the output filename:\n\n```bash\ndocker run -v /path/to/your/data:/data dedicatedcode/paikka prepare input.osm.pbf filtered.osm.pbf\n```\n\n- Replace `/path/to/your/data` with the absolute path to your local directory\n- `input.osm.pbf` is your source OSM data file and should be located inside the mounted directory\n- `filtered.osm.pbf` is the output filtered file that will be created in your mounted directory\n\n#### Import the data\n\nRun the `import` script to import the filtered data into the data directory:\n\n```bash\ndocker run -ti \\\n  -v /path/to/your/data:/data \\\n  --memory 16g \\\n  dedicatedcode/paikka:latest \\\n  import filtered.osm.pbf --memory 16g --threads 10\n```\n\nParameters:\n- `--memory`: JVM heap size (e.g., `16g`, `32g`)\n- `--threads`: Number of import threads (default: `10`)\n- `--data-dir`: Directory to store imported data (default: `/data` inside container)\n\nAfter import completes, your data directory will contain the processed data files ready for the service.\n\n#### Running the service with Docker\n\nTo run the PAIKKA service itself:\n\n```bash\ndocker run -d \\\n  -v /path/to/your/data:/data \\\n  -v /path/to/stats:/stats \\\n  -p 8080:8080 \\\n  -e ADMIN_PASSWORD=your-secure-password \\\n  dedicatedcode/paikka:latest\n```\n\n- `/data` directory contains the processed POI and geometry data\n- `/stats` directory contains the statistics database\n- The service runs on port 8080\n- Admin interface requires `ADMIN_PASSWORD` to be set\n\n#### Docker Environment Variables\n\nWhen running with Docker, you can configure the service using environment variables:\n\n| Environment Variable | Purpose | Default Value |\n|---------------------|---------|---------------|\n| `DATA_DIR` | Directory where processed data is stored | `/data` |\n| `MAX_IMPORT_THREADS` | Maximum number of threads for data import | `10` |\n| `MAX_RESULTS` | Maximum number of results returned by API | `500` |\n| `DEFAULT_RESULTS` | Default number of results when not specified | `10` |\n| `BASE_URL` | Base URL for the service (used in responses) | `http://localhost:8080` |\n| `STATS_DB_PATH` | Path to the statistics database | `/stats/stats.db` |\n| `ADMIN_PASSWORD` | Password for admin interface access (required) | _(empty - admin interface disabled if not set)_ |\n| `APP_LOG_LEVEL` | Log level for the application (`DEBUG`, `INFO`, `WARN`, `ERROR`) | `INFO` |\n\n**Note:** The admin interface is disabled if `ADMIN_PASSWORD` is not set. To enable admin features, you must provide a password.\n\nExample with custom configuration:\n\n```bash\ndocker run -d \\\n  -v /path/to/your/data:/data \\\n  -v /path/to/stats:/stats \\\n  -p 8080:8080 \\\n  -e MAX_RESULTS=1000 \\\n  -e DEFAULT_RESULTS=20 \\\n  -e ADMIN_PASSWORD=your-secure-password \\\n  -e APP_LOG_LEVEL=DEBUG \\\n  dedicatedcode/paikka:latest\n```\n\n### Examples\n\n```bash\n# Filter and import a country extract\n./scripts/filter_osm.sh germany-latest.osm.pbf germany-filtered.osm.pbf\n./scripts/import.sh germany-filtered.osm.pbf  --data-dir ./data --memory 16g\n\n# Import planet data with custom settings\n./scripts/filter_osm.sh planet-latest.osm.pbf planet-filtered.osm.pbf\n./scripts/import.sh planet-filtered.osm.pbf --data-dir /opt/paikka/data --memory 32g --threads 8\n```\n\nThe scripts handle all the technical details including memory management, JVM optimization, and cleanup.\n\n## Running the Service\n\n### Development Mode\n\n```bash\nmvn spring-boot:run\n```\n\n### Production Mode\n\n```bash\njava -Xmx8g -jar target/paikka-*.jar --data-dir=/path/to/data\n```\n\n## Running with Docker Compose\n\nDocker Compose provides an easy way to run PAIKKA with persistent volumes for data and statistics.\n\n### Prerequisites\n\n- Docker installed\n- Docker Compose installed\n- An OSM PBF file (optional, for importing data)\n\n### Quick Start\n\n1. Create a `docker-compose.yml` file with the following content:\n\n```yaml\nversion: '3.8'\n\nservices:\n  paikka:\n    image: dedicatedcode/paikka:latest\n    restart: unless-stopped\n    env_file:\n      - .env\n    ports:\n      - \"8080:8080\"\n    environment:\n      - ADMIN_PASSWORD=your-password-here\n      - BASE_URL=http://localhost:8080\n    volumes:\n      - paikka-data:/data\n      - paikka-stats:/stats\n\nvolumes:\n  paikka-data:\n  paikka-stats:\n```\n\n2. Create a `.env` file in the same directory to configure your environment variables:\n\n```bash\n# Example .env file\nADMIN_PASSWORD=your-secure-password\nBASE_URL=http://localhost:8080\nMAX_RESULTS=500\nDEFAULT_RESULTS=10\nMAX_IMPORT_THREADS=10\nAPP_LOG_LEVEL=INFO\n```\n\n3. Start the service:\n   ```bash\n   docker compose up -d\n   ```\n\n4. Verify the service is running:\n   ```bash\n   curl 'http://localhost:8080/api/v1/health'\n   ```\n\n### Important: Admin Password\nThe admin interface requires a password to be set via the `ADMIN_PASSWORD` environment variable. If not set, the admin endpoints will be inaccessible. Set it in your `.env` file or docker-compose configuration.\n\n### Volume Management\n\nDocker Compose creates two persistent volumes:\n\n| Volume         | Description               | Mount Point |\n|----------------|---------------------------|-------------|\n| `paikka-data`  | POI and geometry data     | `/data`     |\n| `paikka-stats` | Query statistics database | `/stats`    |\n\nTo view or backup the data:\n```bash\n# List volumes\ndocker volume ls\n\n# Inspect volume mount point\ndocker volume inspect paikka_paikka-data\n```\n\n### Stopping the Service\n\n```bash\n# Stop the service\ndocker compose down\n\n# Stop and remove volumes (deletes all data)\ndocker compose down -v\n```\n\n### Updating\n\nTo update to a new version:\n\n```bash\ndocker compose pull\ndocker compose up -d\n```\n\n### Configuration\n\nConfigure the service using environment variables or application properties. The Docker version uses the following Spring profile properties:\n\n```properties\n# Data directory (Docker default: /data)\npaikka.data-dir=${DATA_DIR:/data}\n\n# Import configuration\npaikka.import.threads=${MAX_IMPORT_THREADS:10}\npaikka.import.chunk-size=100000\n\n# Query configuration\npaikka.query.max-results=${MAX_RESULTS:500}\npaikka.query.default-results=${DEFAULT_RESULTS:10}\npaikka.query.base-url=${BASE_URL:http://localhost:8080}\n\n# Statistics database path (Docker default: /stats/stats.db)\npaikka.stats-db-path=${STATS_DB_PATH:/stats/stats.db}\n\n# Admin password (required for admin interface)\npaikka.admin.password=${ADMIN_PASSWORD:}\n\n# Logging\nlogging.level.com.dedicatedcode.paikka=${APP_LOG_LEVEL:INFO}\nlogging.level.root=WARN\n```\n\n| Property | Description | Default Value (Docker) |\n|----------|-------------|------------------------|\n| `server.port` | HTTP server port | `8080` |\n| `server.compression.enabled` | Enable HTTP response compression | `true` |\n| `server.compression.min-response-size` | Minimum response size to trigger compression (bytes) | `1024` |\n| `server.compression.mime-types` | MIME types to compress | `text/plain,application/json` |\n| `spring.web.resources.cache.cachecontrol.max-age` | Static resource cache max age (seconds) | `31536000` |\n| `paikka.data-dir` | Directory where processed data is stored | `/data` |\n| `paikka.import.threads` | Number of threads for data import | `10` |\n| `paikka.import.chunk-size` | Number of elements to process per chunk | `100000` |\n| `paikka.query.max-results` | Maximum number of results returned by API | `500` |\n| `paikka.query.default-results` | Default number of results when not specified | `10` |\n| `paikka.query.base-url` | Base URL for the service (used in responses) | `http://localhost:8080` |\n| `paikka.stats-db-path` | Path to the statistics database | `/stats/stats.db` |\n| `paikka.admin.password` | Password for admin interface access | _(empty - admin interface disabled)_ |\n| `logging.level.com.dedicatedcode.paikka` | Application log level | `INFO` |\n| `logging.level.root` | Root log level | `WARN` |\n\n\n### Sample Requests\n\n```bash\n# Health check\ncurl 'http://localhost:8080/api/v1/health'\n\n# Reverse geocoding (Helsinki, Finland)\ncurl 'http://localhost:8080/api/v1/reverse?lat=60.1699&lon=24.9384'\n\n# Reverse geocoding with language preference\ncurl 'http://localhost:8080/api/v1/reverse?lat=60.1699&lon=24.9384&lang=fi'\n\n# Get geometry for OSM object\ncurl 'http://localhost:8080/api/v1/geometry/12345'\n```\n\n### Web Interface\n\n- Visit `http://localhost:8080/` for the about page\n- Visit `http://localhost:8080/login` to access the admin dashboard (requires `ADMIN_PASSWORD` to be set)\n\n## Integration with Reitti\n\nTBA\n\n## Getting Support\n\nThere are multiple ways of getting support:\n\n- Create a (https://github.com/dedicatedcode/paikka/issues/new/choose) in the repository\n- Tag me on [Lemmy](https://discuss.tchncs.de/u/danielgraf)\n- Join **#reitti** on (https://irc.dedicatedcode.com)\n\n## Contributing\n\nContributions are welcome! Please feel free to submit a Pull Request to (https://github.com/dedicatedcode/paikka).\n\n## Technology Stack\n\n- **Java 25** – Modern Java runtime with performance improvements\n- **Spring Boot** – Application framework with embedded web server\n- **RocksDB** – High-performance embedded database for spatial data\n- **FlatBuffers** – Efficient serialization for geocoding data\n- **S2 Geometry** – Spatial indexing and geometric operations\n- **Leaflet** – Interactive maps for the web interface\n- **Thymeleaf** – Server-side templating for HTML pages\n\n## License\n\nThis project is licensed under the GNU Affero General Public License v3 (AGPLv3) – see the [LICENSE](LICENSE) file for details.\n\n## About\n\nPAIKKA is developed as part of the Reitti ecosystem by (https://github.com/dedicatedcode). It provides the geocoding infrastructure that powers location-based features in Reitti.\n","summary":"PAIKKA is a lightweight, high‑performance reverse‑geocoding service that turns raw GPS coordinates into human‑readable place names using OpenStreetMap data. It exposes a REST API and web interface and is tuned for planet‑scale datasets, providing low‑latency, boundary‑aware results while remaining resource‑efficient and easy to host on modest hardware. The service is specifically optimized for the Reitti personal‑tracking application, but any developer building location‑based tools that require fast, read‑heavy reverse geocoding would benefit. With its selective POI import and portable data exports, PAIKKA is ideal for projects that need accurate place context without the overhead of a full‑featured solution like Nominatim.","description":"Paikka is a specialized reverse geocoding service designed to provide high-performance location resolution for Reitti. The name comes from the Finnish word for \"place\" and is pronounced [ˈpɑi̯kːɑ].","stars":12,"language":"Java"},{"owner":"SquareWaveSystems","repo":"squarebox","url":"https://github.com/SquareWaveSystems/squarebox","readme":"# 🟧📦 squarebox\n\n**A curated set of modern CLI/TUI tools and AI coding assistants in a container. Batteries included.**\n\n*For developers who live in the terminal but need to work across\nmultiple platforms and devices.*\n\n**squarebox** packages a complete terminal-based development environment\ninto a single container (Docker; Podman experimental): modern CLI tools, AI coding\nassistants, language SDKs, and an opinionated set of shell aliases. Run the\nsame box anywhere (desktop, VPS, or Codespace) and SSH in from your laptop,\ntablet, or phone (please don't).\n\nThe goal is to make modern terminal tooling easy and accessible. One-line\ninstall, interactive first-run setup, sensible defaults (thanks [omarchy](https://omarchy.org)).\n\n![squarebox first-run setup](https://raw.githubusercontent.com/SquareWaveSystems/squarebox/demo/demo/squarebox-setup.gif)\n*(Actual setup may involve more staring at the screen.)*\n\nPrerequisites\n-------------\n\n- [Docker](https://docs.docker.com/get-docker/) or [Podman](https://podman.io/getting-started/installation) (experimental — see one-line install below if you don't have either)\n- [Git](https://git-scm.com/) - on Windows, install [Git for Windows](https://gitforwindows.org/)\n\nThe installer auto-detects which runtime is available. If both are installed, it\nasks which to use. Override with `SQUAREBOX_RUNTIME=docker` or\n`SQUAREBOX_RUNTIME=podman`.\n\n> **Podman (Experimental):** Docker is the primary tested runtime; Podman may\n> have rough edges around volume mounts, SSH agent forwarding, or rebuild\n> flows — please file an issue if you hit one.\n\n<details>\n<summary><strong>Don't have Docker or Podman? One-line install</strong></summary>\n\n**macOS** (via [Homebrew](https://brew.sh)):\n\n    brew install --cask docker-desktop\n\n**Linux** (official convenience script - inspect it first at [get.docker.com](https://get.docker.com)):\n\n    curl -fsSL https://get.docker.com | sh && sudo usermod -aG docker $USER\n\nLog out and back in (or run `newgrp docker`) so your shell picks up the new group.\n\n**Windows** (via [winget](https://learn.microsoft.com/en-us/windows/package-manager/winget/), in PowerShell 7+):\n\n    winget install --id Docker.DockerDesktop -e\n\nOn macOS and Windows, start Docker Desktop once after install so the daemon is\nrunning before you continue.\n\n</details>\n\nInstall\n-------\n\nThese commands clone the repo, build the container image, and drop you into the\ncontainer (if possible). On first login, a setup script runs automatically to\nconfigure git (pulling your name and email from the host's global git config\nif available), optionally sign in to GitHub CLI, your choice of AI coding\nassistant, and language SDKs.\n\n**Stable**\n\n    curl -fsSL https://raw.githubusercontent.com/SquareWaveSystems/squarebox/main/install.sh | bash\n\n**Edge**\n\n    curl -fsSL https://raw.githubusercontent.com/SquareWaveSystems/squarebox/main/install.sh | bash -s -- --edge\n\nStable installs the latest tagged release (pre-release tags like `-rc` are skipped). Edge uses the latest commit on main.\n\nIf the install fails or you want to see the full docker build and git output, re-run with `--verbose`.\n\n**Windows (PowerShell 7+)**\n\nWindows users can install directly from PowerShell - no Git Bash required.\nThis handles clone, build, container creation, and PowerShell aliases\n(`sqrbx`, `squarebox`, etc.) natively:\n\n    irm https://raw.githubusercontent.com/SquareWaveSystems/squarebox/main/install.ps1 | iex\n\nOnce installed, you can re-run or pass flags from the local copy:\n\n    .\\install.ps1              # re-install / update\n    .\\install.ps1 -Edge        # latest main instead of latest release\n    .\\install.ps1 -Verbose     # show full build output\n\n> **Note:** `irm ... | iex` does not support flags - PowerShell interprets them\n> as arguments to `Invoke-Expression`, not the script. Use the local\n> `.\\install.ps1` form for `-Edge` or `-Verbose`.\n\nStart\n-----\n\n    squarebox        # or: sqrbx\n\nThese are shell functions wrapping `docker start -ai squarebox` (or\n`podman start -ai squarebox`), added automatically for Bash, Zsh, and\nPowerShell 7+.\n\nThe container is persistent: it suspends on exit and resumes on start, keeping\ninstalled packages, config, and shell history intact between sessions. Your\ncode and tool config live on the host under `~/squarebox` (`workspace/` for\ncode, `.config/` for tool config) via volume mounts, so they survive even if\nthe container is deleted.\n\nWhat's included\n---------------\n\n### CLI Tools\n\n| Name | Language | Description |\n|------|----------|-------------|\n| [bat](https://github.com/sharkdp/bat) | Rust | Cat clone with syntax highlighting |\n| [curl](https://github.com/curl/curl) | C | URL data transfer |\n| [delta](https://github.com/dandavison/delta) | Rust | Syntax-highlighting pager for git diffs |\n| [difftastic](https://github.com/Wilfred/difftastic) | Rust | Syntax-aware structural diff tool (`difft`) |\n| [eza](https://github.com/eza-community/eza) | Rust | Modern ls replacement |\n| [fd](https://github.com/sharkdp/fd) | Rust | Fast, user-friendly find alternative |\n| [fzf](https://github.com/junegunn/fzf) | Go | Fuzzy finder |\n| [gh](https://github.com/cli/cli) | Go | GitHub CLI |\n| [glow](https://github.com/charmbracelet/glow) | Go | Terminal markdown renderer |\n| [gum](https://github.com/charmbracelet/gum) | Go | Tool for shell scripts and dotfiles |\n| [jq](https://github.com/jqlang/jq) | C | JSON processor |\n| [just](https://github.com/casey/just) | Rust | Command runner / modern make alternative |\n| [nano](https://nano-editor.org) | C | Default text editor |\n| [ripgrep](https://github.com/BurntSushi/ripgrep) | Rust | Fast recursive grep |\n| [starship](https://github.com/starship/starship) | Rust | Cross-shell prompt |\n| [xh](https://github.com/ducaale/xh) | Rust | Friendly HTTP client |\n| [yq](https://github.com/mikefarah/yq) | Go | YAML/JSON/XML processor |\n| [zoxide](https://github.com/ajeetdsouza/zoxide) | Rust | Smarter cd command |\n\nWhat's optional\n----------------\n\nSelected during first-run setup. Choose any combination, all, or none.\nSelections are saved to the workspace volume and reused automatically on\ncontainer rebuilds.\n\n### AI Coding Assistants\n\n| Name | Language | Description |\n|------|----------|-------------|\n| [Claude Code](https://github.com/anthropics/claude-code) | TypeScript | AI coding assistant |\n| [GitHub Copilot CLI](https://github.com/githubnext/github-copilot-cli) | TypeScript | GitHub Copilot in the terminal * |\n| [Google Gemini CLI](https://github.com/google-gemini/gemini-cli) | TypeScript | Google Gemini in the terminal * |\n| [OpenAI Codex CLI](https://github.com/openai/codex) | TypeScript | OpenAI Codex in the terminal * |\n| [opencode](https://github.com/anomalyco/opencode) | Go | AI coding TUI |\n\n\\* Requires Node.js (auto-installed if needed).\n\n### Text Editors\n\nNano is always available as the default editor.\n\n| Name | Language | Description |\n|------|----------|-------------|\n| [micro](https://github.com/micro-editor/micro) | Go | Modern, intuitive terminal editor |\n| [edit](https://github.com/microsoft/edit) | Rust | Terminal text editor (Microsoft) |\n| [fresh](https://github.com/sinelaw/fresh) | Rust | Modern terminal text editor |\n| [helix](https://github.com/helix-editor/helix) | Rust | Modal editor (Kakoune-inspired) - *coming soon* |\n| [nvim](https://github.com/neovim/neovim) | C/Lua | Neovim |\n\n### TUI Tools\n\nInstalled during first-run setup. Choose any combination:\n\n| Name | Language | Description |\n|------|----------|-------------|\n| [lazygit](https://github.com/jesseduffield/lazygit) | Go | Git terminal UI |\n| [gh-dash](https://github.com/dlvhdr/gh-dash) | Go | GitHub dashboard for the terminal |\n| [yazi](https://github.com/sxyazi/yazi) | Rust | Terminal file manager |\n\n### Terminal Multiplexers\n\nInstalled during first-run setup. Choose either, both, or neither:\n\n| Name | Description |\n|------|-------------|\n| [tmux](https://github.com/tmux/tmux) | Classic terminal multiplexer |\n| [zellij](https://github.com/zellij-org/zellij) | Friendly terminal workspace |\n\n### Shell (Experimental)\n\nBy default, squarebox uses Bash. During first-run setup you can opt in to\n**Zsh** or **Fish** instead.\n\n**Zsh** installs:\n\n| Name | Description |\n|------|-------------|\n| [zsh](https://www.zsh.org) | Z shell (via apt) |\n| [Oh My Zsh](https://ohmyz.sh) | Community framework for managing zsh config |\n| [zsh-autosuggestions](https://github.com/zsh-users/zsh-autosuggestions) | Fish-like history-based suggestions |\n| [zsh-syntax-highlighting](https://github.com/zsh-users/zsh-syntax-highlighting) | Inline command syntax highlighting |\n\nThe generated `~/.zshrc` mirrors the default bashrc — same aliases, starship\nprompt, zoxide, and AI/editor/SDK sourcing — layered on top of Oh My Zsh.\n\n**Fish** installs [fish](https://fishshell.com) (via apt), which ships with\nautosuggestions and syntax highlighting built in. The generated\n`~/.config/fish/config.fish` mirrors the default bashrc in fish-native syntax;\nAI/editor/TUI/SDK selections are translated from their bash files into\n`~/.config/fish/conf.d/squarebox-selections.fish` at setup time.\n\n> **Experimental:** the marker file `~/.squarebox-use-zsh` (or\n> `~/.squarebox-use-fish`) causes `~/.bashrc` to `exec` the chosen shell on\n> every interactive login, so the next shell start picks up the new shell.\n> Set `SQUAREBOX_NO_ZSH=1` or `SQUAREBOX_NO_FISH=1` to force bash for a single\n> session, or re-run `sqrbx-setup shell` to switch back permanently. Tooling\n> is primarily tested against bash, so a few edge cases may need polish —\n> please file an issue if you hit one. Known fish limitation: nvm (Node.js)\n> is not wired into fish; install [nvm.fish](https://github.com/jorgebucaran/nvm.fish)\n> separately if you need it.\n\n### SDKs\n\n| SDK | Installed via |\n|-----|---------------|\n| Node.js | [nvm](https://github.com/nvm-sh/nvm) |\n| Python | [uv](https://github.com/astral-sh/uv) |\n| Go | [go.dev](https://go.dev) |\n| .NET | [dotnet-install](https://dot.net) |\n| Rust | [rustup](https://rustup.rs) |\n\nAliases\n-------\n\n| Alias | Command | Description |\n|-------|---------|-------------|\n| `ls` | `eza --icons` | Modern ls with icons |\n| `ll` | `eza -la --icons` | Long listing with icons |\n| `lsa` | `ls -a` (resolves to `eza --icons -a`) | List all including hidden files |\n| `lt` | `eza --tree --level=2 --long --icons --git` | Tree view with git status |\n| `lta` | `lt -a` | Tree view including hidden files |\n| `cat` | `bat --paging=never` | Syntax-highlighted cat |\n| `ff` | `fzf --preview 'bat ...'` | Fuzzy find with preview |\n| `eff` | `$EDITOR \"$(ff)\"` | Fuzzy find and edit |\n| `..` | `cd ..` | Go up one directory |\n| `...` | `cd ../..` | Go up two directories |\n| `....` | `cd ../../..` | Go up three directories |\n| `c` | first selected AI tool | Launch selected AI assistant |\n| `g` | `git` | Git shorthand |\n| `gcm` | `git commit -m` | Commit with message |\n| `gcam` | `git commit -a -m` | Stage all and commit |\n| `gcad` | `git commit -a --amend` | Stage all and amend |\n| `lg` | `lazygit` | Launch lazygit (if installed) |\n| `claude-yolo` | `claude --dangerously-skip-permissions` | Claude without prompts |\n| `opencode-yolo` | `opencode --dangerously-skip-permissions` | OpenCode without prompts |\n\n### Multiplexer Keybindings (Experimental)\n\nBoth tmux and zellij ship with Omarchy-inspired defaults and matching keybindings:\n\n| Feature | Tmux | Zellij |\n|---------|------|--------|\n| Config path | `~/.config/tmux/tmux.conf` | `~/.config/zellij/config.kdl` |\n| Prefix | `Ctrl+Space` | `Ctrl+Space` (Tmux mode) |\n| Pane navigation | `Ctrl+Alt+Arrow` | `Ctrl+Alt+Arrow` |\n| Pane resizing | `Ctrl+Alt+Shift+Arrow` | `Ctrl+Alt+Shift+Arrow` |\n| Tab/window select | `Alt+1-9` | `Alt+1-9` |\n| Tab/window cycle | `Alt+Left/Right` | `Alt+Left/Right` |\n| Split horizontal | `prefix h` | `prefix h` |\n| Split vertical | `prefix v` | `prefix v` |\n| Scrollback | 50,000 lines | 50,000 lines |\n| Copy mode | Vi keys | Vi-style scroll |\n| Theme | Blue accent, top bar | Blue accent, compact layout |\n\nUpdate\n------\n\n### Quick update (from inside the container)\n\n    sqrbx-update\n\nChecks all GitHub-released tools against latest versions and updates them\nin-place. No rebuild required. Your container state, SDKs, and config are\npreserved.\n\n    sqrbx-update              # show available updates (dry run)\n    sqrbx-update --apply      # download and install all updates\n    sqrbx-update lazygit      # update a single tool\n    sqrbx-update --list       # list all tools and current versions\n\n### Full rebuild (from the host)\n\n    sqrbx-rebuild\n\nPulls the latest changes, rebuilds the image, and replaces the container.\nYour code in ~/squarebox/workspace is safe since it lives on the host.\nSetup selections (AI tool, editors, SDKs, GitHub auth) are persisted in the\nworkspace volume and restored automatically. However, shell history, manually\ninstalled packages, and custom config files inside the container are lost.\n\n#### What survives a rebuild\n\n| Survives | Lost |\n|----------|------|\n| Code in ~/squarebox/workspace (host volume) | Shell history (~/.bash_history) |\n| Starship and lazygit config (host volume) | Manually installed apt packages |\n| AI tool / editor / SDK selections | Custom dotfiles in /home/dev/ |\n| GitHub CLI auth | Caches and temp files |\n| SSH keys (on host, forwarded via agent) | |\n\nTo preserve extra files across rebuilds, store them in `/workspace/.squarebox/`.\n\n> **Tip:** Use `sqrbx-update` from inside the container to update tools without\n> rebuilding. Only use `sqrbx-rebuild` when the base image itself needs to\n> change (new apt packages, new base tools, Dockerfile changes).\n\nDisk usage\n----------\n\nThe base image (CLI tools only, no optional components) is **~370 MB** on disk.\n\nFirst-run selections add to that:\n\n| Component | Adds |\n|-----------|------|\n| Claude Code | ~300 MB |\n| GitHub Copilot CLI | ~50 MB |\n| Google Gemini CLI | ~50 MB |\n| OpenAI Codex CLI | ~50 MB |\n| OpenCode | ~30 MB |\n| lazygit / gh-dash / yazi | ~10 / ~10 / ~10 MB |\n| micro / edit | ~12 / ~7 MB |\n| fresh / nvim | ~10 / ~45 MB |\n| Node.js | ~90 MB |\n| Python (uv) | ~35 MB |\n| Go | ~500 MB |\n| .NET | ~800 MB |\n\nA typical setup (Claude Code + Node.js + one editor) lands around **~800 MB**.\nSizes are approximate and will vary as tools are updated.\n\nSecurity\n--------\n\nBase image tools are pinned to specific versions and verified against SHA256\nchecksums when the Docker image is built, so `docker build` is reproducible.\n\nOptional tools selected during first-run setup (editors, TUIs, OpenCode, nvm,\nGo, zellij) install the latest upstream release at the time you run setup. The\ntrust model is the same as running each tool's installer yourself: HTTPS\ndownloads from the project's official GitHub release (or upstream server). You\nget new features without waiting for a squarebox release, at the cost of\nbuild-time pinning for that tier.\n\nThird-party install scripts (Claude Code, uv, .NET) delegate to the vendor\ninstaller. npm-based AI tools (Copilot CLI, Gemini CLI, Codex CLI) use npm's\nbuilt-in integrity verification.\n\nFor the full trust model (what `install.sh` does on your machine, how each\nlayer is verified, and how to inspect the script before running it) see\n[SECURITY.md](SECURITY.md).\n\nDevcontainer / Codespaces\n-------------------------\n\nOpen this repo in VS Code with the\n[Dev Containers extension](https://marketplace.visualstudio.com/items?itemName=ms-vscode-remote.remote-containers),\nor launch it in [GitHub Codespaces](https://github.com/features/codespaces).\nThe included `.devcontainer/devcontainer.json` builds the full **squarebox** image\nautomatically.\n\nThe interactive first-run setup is skipped in devcontainer mode. To configure\nAI tools or SDKs, run `~/setup.sh` from the integrated terminal.\n\nYou can also attach to a running codespace directly from your local terminal\nusing `gh codespace ssh`.\n\nUninstall\n---------\n\n    sqrbx-uninstall\n\nRemoves the container, image, and shell integration but **keeps**\n`~/squarebox` (including `workspace/`) so your code is safe by default.\nPass `--purge` to also remove `~/squarebox`:\n\n    sqrbx-uninstall --purge\n\nA second confirmation is required if `~/squarebox/workspace` is non-empty.\nPass `-y` (or `-Yes` on PowerShell) to skip all prompts for scripting.\nIdempotent: safe to re-run once uninstalled.\n\n**Windows (PowerShell 7+):**\n\n    sqrbx-uninstall                # keep ~/squarebox\n    sqrbx-uninstall -Purge         # also remove ~/squarebox\n    sqrbx-uninstall -Yes           # skip confirmations\n\n**Broken-state recovery** (e.g. shell functions are missing, or after partial\ninstall): run the script directly from the install directory:\n\n    ~/squarebox/uninstall.sh              # Linux / macOS / Git Bash\n    ~/squarebox/uninstall.ps1             # Windows PowerShell\n\nStart a new shell afterwards (or `exec bash` / `exec zsh`) so the `sqrbx` and\n`squarebox` functions are dropped from the current session.\n\nMake it your own\n-----------------\n\n**squarebox** is meant to be a starting point, not a finished product. Fork it,\nswap out tools, add your own dotfiles, change the theme - build the dev\nenvironment that fits the way you work. The Dockerfile is intentionally\nstraightforward and the tool registry (`scripts/lib/tools.yaml`) makes it easy\nto add or remove tools. Use it as a base, take what's useful, and make it yours.\n","summary":"squarebox is a Docker (or Podman) container that bundles a curated set of modern CLI/TUI tools, AI coding assistants, language SDKs, and a set of opinionated shell aliases into a single, portable development environment. A one‑line installer launches an interactive first‑run setup that pulls your Git identity, signs you into the GitHub CLI, selects an AI assistant, and configures the shell automatically, giving developers a consistent terminal experience in any desktop, VPS, or cloud workspace. The image ships with sensible defaults from the omarchy project, so you can start coding right away without juggling separate toolchains. It’s especially useful for terminal‑centric developers who work across multiple devices or teams and want a quick, reproducible dev stack.","description":"Docker container for development, stuffed with modern CLI/TUI tools. Batteries included.","stars":38,"language":"Shell"},{"owner":"leandrobattochio","repo":"trackarr","url":"https://github.com/leandrobattochio/trackarr","readme":"# TrackArr\n\n| Status | Badge |\n| --- | --- |\n| CI pipeline | [![CI](https://github.com/leandrobattochio/trackarr/actions/workflows/ci.yml/badge.svg)](https://github.com/leandrobattochio/trackarr/actions/workflows/ci.yml) |\n| Cypress E2E | [![Full Stack E2E](https://github.com/leandrobattochio/trackarr/actions/workflows/full-stack-e2e.yml/badge.svg)](https://github.com/leandrobattochio/trackarr/actions/workflows/full-stack-e2e.yml) |\n| Frontend coverage (`frontend/`) | [![Frontend coverage](https://codecov.io/github/leandrobattochio/trackarr/graph/badge.svg?flag=frontend)](https://app.codecov.io/github/leandrobattochio/trackarr?flags%5B0%5D=frontend) |\n| Backend coverage (`backend/`) | [![Backend coverage](https://codecov.io/github/leandrobattochio/trackarr/graph/badge.svg?flag=backend)](https://app.codecov.io/github/leandrobattochio/trackarr?flags%5B0%5D=backend) |\n\nTrackArr is a self-hosted dashboard for private tracker monitoring. It lets you register tracker integrations, sync stats manually or on a schedule, keep historical snapshots, and define new tracker connectors through YAML instead of hard-coded backend logic.\n\n## Docker Compose example\n\nFor self-hosting on your own server, the stack needs the TrackArr container plus a PostgreSQL database. A minimal `docker-compose.yml` can look like this:\n\n```yaml\nservices:\n  db:\n    image: postgres:17-alpine\n    container_name: trackarr-db\n    restart: unless-stopped\n    environment:\n      POSTGRES_DB: trackarr\n      POSTGRES_USER: arr\n      POSTGRES_PASSWORD: arr123\n    volumes:\n      - /mnt/user/appdata/trackarr/postgres:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U arr -d trackarr\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    networks:\n      - arr\n\n  trackarr:\n    image: ghcr.io/leandrobattochio/trackarr:v0.2.2\n    container_name: trackarr\n    depends_on:\n      db:\n        condition: service_healthy\n    restart: unless-stopped\n    ports:\n      - \"3012:3000\"\n    environment:\n      ASPNETCORE_ENVIRONMENT: Production\n      ConnectionStrings__PostgresConnection: Host=db;Port=5432;Database=trackarr;Username=arr;Password=arr123\n      Hangfire__Directory: /data\n      Plugins__Directory: /data\n      APP_TIMEZONE: America/Sao_Paulo\n      TZ: America/Sao_Paulo\n    volumes:\n      - /mnt/user/media/backup_configuracoes/trackarr:/data\n    networks:\n      - arr\n\nnetworks:\n  arr:\n    driver: bridge\n```\n\nAdjust the host volume paths, published port, timezone, and image tag to fit your environment.\n\n## What it does\n\n- Monitors tracker ratio and transfer stats from a single dashboard\n- Stores historical snapshots for time-based charts\n- Runs recurring sync jobs per integration using cron expressions\n- Supports built-in and custom tracker plugins\n- Lets you inspect, create, and edit disk-backed plugin definitions from the UI\n- Includes a settings area for HTTP defaults and runtime information\n- Ships as a single production container with the React frontend served by ASP.NET Core\n\n## Core features\n\n- Dashboard with per-tracker cards for ratio, uploaded, downloaded, seed bonus, buffer, hit and runs, and torrent counts\n- Manual sync for any configured integration\n- Automatic recurring sync with Hangfire-backed scheduling\n- Snapshot charts for uploaded/downloaded bytes and torrent activity\n- In-app YAML editor for plugin authoring with schema-aware validation, completions, snippets, and hover docs\n- Settings page for the shared `User-Agent` header and system information\n\n## Screenshots\n\n### Dashboard\n\nThe dashboard is the main operational view. It combines portfolio-level totals across all configured trackers with per-integration cards that surface ratio status, key metrics, last sync state, next automatic run, and quick actions for syncing, editing, opening snapshots, or deleting an integration.\n\nThe screenshot below also shows the ratio-warning treatment in context: integrations that fall below the configured minimum ratio are visually highlighted so risky trackers stand out immediately.\n\n![TrackArr dashboard showing overview tiles and tracker cards with ratio status](screenshots/dashboard.png)\n\n### Manage Plugins\n\nThe plugin-management screen is where plugin definitions are inspected, created, and edited. The catalog on the left shows the YAML files currently available, while the editor on the right exposes the definition that drives integration forms, HTTP steps, mappings, and dashboard metrics.\n\nSaves are blocked when the document is malformed or semantically invalid, and the editor includes TrackArr-specific validation and authoring help while you work.\n\n![TrackArr manage plugins page showing the plugin catalog and YAML editor](screenshots/manage_plugins.png)\n\n## Architecture\n\n### Frontend\n\n- React 19\n- Vite 7\n- TypeScript\n- TanStack Query\n- Tailwind CSS + Radix UI + Monaco editor + Monaco YAML services\n\nThe frontend runs on `http://localhost:8080` in development and proxies `/api` requests to the backend on `http://localhost:5000`.\n\n### Backend\n\n- ASP.NET Core Web API on `.NET 10`\n- Entity Framework Core with PostgreSQL\n- Hangfire + `Hangfire.Storage.SQLite`\n- Scalar/OpenAPI in development\n- YAML plugin engine powered by `YamlDotNet`\n\nThe production container serves the API and the built frontend together on port `3000`.\n\n## Project structure\n\n```text\n.\n|-- backend/\n|   |-- TrackerStats.sln\n|   |-- plugins/                    # Built-in YAML tracker definitions\n|   `-- src/\n|       |-- TrackerStats.Api/       # API, DI, startup, controllers\n|       |-- TrackerStats.Application/\n|       |-- TrackerStats.Domain/    # Entities, repository interfaces, plugin contracts\n|       `-- TrackerStats.Infrastructure/\n|           |-- Data/               # EF Core DbContext and migrations\n|           |-- Plugins/            # Plugin registry, YAML engine, loaders\n|           `-- Services/           # Sync jobs and scheduling\n|-- frontend/\n|   |-- src/\n|   |   |-- app/                    # App bootstrap and routing\n|   |   |-- features/               # Integrations, plugins, help, snapshots\n|   |   |-- layouts/\n|   |   `-- shared/\n|   `-- package.json\n`-- docker/\n    |-- Dockerfile\n    `-- docker-compose.yml\n```\n\n## How plugins work\n\nTrackArr uses YAML plugin definitions to describe how to connect to a tracker:\n\n- `fields`: form inputs required to configure an integration\n- `customFields`: optional tracker-specific inputs beyond the shared integration fields\n- `http`: shared base URL and headers\n- `steps`: HTTP requests and extraction rules\n- `mapping`: how extracted values map into TrackArr stats\n- `dashboard`: which stats should be shown on the UI card, including optional `byteUnitSystem` for binary vs decimal byte formatting\n\nThe frontend plugin editor validates more than generic YAML syntax. It understands the TrackArr plugin structure, shows completions for supported fields and enums, offers snippets for common blocks, and blocks saves when the document is malformed or semantically invalid.\n\nBuilt-in plugins currently included:\n\n- `asc`\n- `bj-share`\n- `fearnopeer`\n- `seedpool`\n\nPlugin definitions are loaded from YAML files on disk. The Manage Plugins page edits those files directly.\n\n## Local development\n\n### Requirements\n\n- Node.js 22+\n- Yarn\n- .NET SDK 10\n\n### Local development config\n\n`appsettings.Development.json` is intentionally untracked. If you want local development defaults, create `backend/src/TrackerStats.Api/appsettings.Development.json` on your machine.\n\nExample:\n\n```json\n{\n  \"Plugins\": {\n    \"Directory\": \"../../plugins\"\n  },\n  \"ConnectionStrings\": {\n    \"PostgresConnection\": \"Host=127.0.0.1;Port=5432;Database=trackarr;Username=trackarr;Password=trackarr\"\n  }\n}\n```\n\nNotes:\n\n- Keep this file local only. Do not commit machine-specific or secret values.\n- Use environment variables instead when you want settings that also work in CI or Docker.\n- Set `Plugins:Directory` to your local plugin YAML folder. In this repo, `../../plugins` resolves to `backend/plugins`.\n- `ConnectionStrings:PostgresConnection` is required for the main application database.\n\n### 1. Run the backend\n\n```powershell\ncd backend\ndotnet restore TrackerStats.sln\ndotnet run --project src\\TrackerStats.Api\\TrackerStats.Api.csproj\n```\n\nDevelopment defaults:\n\n- API: `http://localhost:5000`\n- OpenAPI + Scalar UI: `http://localhost:5000/scalar/v1`\n- Hangfire dashboard: `http://localhost:5000/hangfire`\n\nOn startup the backend:\n\n- applies EF Core migrations automatically to the configured PostgreSQL database\n- creates the default application settings row if it does not exist\n- schedules recurring jobs for saved integrations\n\n### 2. Run the frontend\n\n```powershell\ncd frontend\nyarn install\nyarn dev\n```\n\nFrontend dev server:\n\n- App: `http://localhost:8080`\n- API proxy: `/api` -> `http://localhost:5000`\n\n## Docker deployment\n\nThe Docker setup builds the frontend, publishes the backend, starts the API container, and runs PostgreSQL alongside it.\n\n```powershell\ncd docker\ndocker compose up --build\n```\n\nDefault runtime values:\n\n- App URL: `http://localhost:3000`\n- Persistent data volume: `trackarr_data`\n- Internal data directory: `/data`\n- Default timezone: `America/Sao_Paulo`\n\nRelevant environment variables from `docker/docker-compose.yml`:\n\n- `ConnectionStrings__PostgresConnection`\n- `APP_TIMEZONE`\n- `Hangfire__Directory`\n- `Plugins__Directory`\n- `POSTGRES_DB`\n- `POSTGRES_USER`\n- `POSTGRES_PASSWORD`\n- `POSTGRES_PORT`\n\nStorage layout:\n\n- PostgreSQL stores the main application data\n- Hangfire stores job data in a SQLite file under `Hangfire__Directory`\n- Plugin definitions are read from `Plugins__Directory`\n\n## Data storage\n\nBy default TrackArr stores:\n\n- application data in PostgreSQL\n- Hangfire job state in a separate SQLite database\n- plugin YAML files on disk\n\nIn Docker, Hangfire files live under `/data` and plugin definitions default to `/data/templates`, so both persist with the mounted volume.\n\n## API overview\n\nMain endpoints:\n\n- `GET /api/integrations`\n- `POST /api/integrations`\n- `PUT /api/integrations/{id}`\n- `DELETE /api/integrations/{id}`\n- `POST /api/integrations/{id}/sync`\n- `GET /api/integrations/{id}/snapshots`\n- `GET /api/snapshots?integrationId=...`\n- `GET /api/plugins`\n- `GET /api/plugins/{pluginId}`\n- `POST /api/plugins`\n- `PUT /api/plugins/{pluginId}`\n- `GET /api/settings`\n- `PUT /api/settings`\n- `GET /api/about`\n\nPlugin create/update requests use raw YAML in the request body.\n\n## UI pages\n\n- `/` dashboard for integrations and sync status\n- `/snapshots` chart view for historical metrics\n- `/plugins` YAML plugin management with schema-backed IntelliSense and save-blocking validation\n- `/settings` shared HTTP settings and system information\n- `/help` usage guidance\n","summary":"TrackArr is a self‑hosted dashboard that lets users monitor and manage multiple private torrent trackers from a single interface. It collects ratio, upload/download, seed bonus, torrent count, and other statistics, saves historical snapshots for trend analysis, and can run sync jobs at scheduled intervals via Hangfire, all configurable through a UI‑based YAML editor. Built as a single Docker image with an embedded React/ASP.NET Core stack, it supports pre‑built and custom tracker plugins, making it ideal for torrent tracker enthusiasts or sysadmins who need centralized metric tracking and automated data collection.","description":"TrackArr is a dashboard for managing tracker statistics.","stars":3,"language":"TypeScript"},{"owner":"seethroughlab","repo":"familiar","url":"https://github.com/seethroughlab/familiar","readme":"# Familiar\n\n[![CI](https://github.com/seethroughlab/familiar/actions/workflows/ci.yml/badge.svg)](https://github.com/seethroughlab/familiar/actions/workflows/ci.yml)\n[![Release](https://github.com/seethroughlab/familiar/actions/workflows/release.yml/badge.svg?event=push)](https://github.com/seethroughlab/familiar/actions/workflows/release.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n\n**Describe what you want to hear.** Familiar is a local music player that understands the *sound* of your music, not just its metadata. Ask for \"something that sounds like rain on a window\" and it actually works.\n\n**Your music, your server, your data.** Runs entirely on your hardware - no cloud dependency, no subscriptions, no data leaving your network.\n\n**Community-powered analysis.** Share anonymized audio fingerprints with other users. New installations benefit instantly from pre-computed analysis, skipping hours of processing.\n\n## How Familiar Compares\n\n| | Familiar | Navidrome | Jellyfin | Plex |\n|---|---|---|---|---|\n| AI chat + playlist creation | Yes | — | — | — |\n| Semantic audio search | Yes (CLAP) | — | — | — |\n| Audio feature analysis | BPM, key, energy, mood | — | Basic | Basic |\n| Community analysis cache | Yes | — | — | — |\n| Self-hosted / no cloud | Yes | Yes | Yes | Partial |\n| Music video playback | Yes | — | Yes | Yes |\n| Smart playlists | Rules-based | — | — | Yes |\n| Mobile PWA | Yes | Web only | Web + apps | Apps |\n\n## Screenshots\n\n| Library | AI Chat |\n|:--:|:--:|\n| ![Library](screenshots/01-library-tracks.png) | ![Chat](screenshots/08-chat-panel.png) |\n\n| Artists | 3D Explorer |\n|:--:|:--:|\n| ![Artists](screenshots/02-library-artists.png) | ![Explorer](screenshots/06-library-explorer.png) |\n\n| Music Map | Mood Grid |\n|:--:|:--:|\n| ![Music Map](screenshots/05-library-music-map.png) | ![Mood Grid](screenshots/04-library-mood-grid.png) |\n\n<details>\n<summary><strong>More screenshots</strong></summary>\n\n| Albums | Discover |\n|:--:|:--:|\n| ![Albums](screenshots/03-library-albums.png) | ![Discover](screenshots/07-library-discover.png) |\n\n| Full Player | Playlist Detail |\n|:--:|:--:|\n| ![Full Player](screenshots/10-full-player.png) | ![Playlist](screenshots/09-playlist-detail.png) |\n\n| Settings | Admin Setup |\n|:--:|:--:|\n| ![Settings](screenshots/12-settings.png) | ![Admin Setup](screenshots/13-admin-setup.png) |\n\n### Mobile Interface\n\n| Library (Mobile) | Full Player (Mobile) |\n|:--:|:--:|\n| ![Mobile Library](screenshots/14-mobile-library.png) | ![Mobile Full Player](screenshots/15-mobile-full-player.png) |\n\n</details>\n\n## Features\n\n### Discovery & Search\n- **Semantic audio search** - Describe the sound you want: \"upbeat with synths\", \"acoustic and melancholy\"\n- **AI chat assistant** - 27 tools for search, playback, metadata correction, and playlist creation\n- **Find similar tracks** - Click any track to find sonically similar music via CLAP embeddings\n- **Mood Grid** - 2D scatter plot by energy and valence (happy/sad × calm/energetic)\n- **Music Map** - Ego-centric similarity map. Click any artist to center the view\n- **3D Explorer** - Navigate a 3D space of artists with hover-to-preview audio\n\n<details>\n<summary><strong>Available AI Tools (27)</strong></summary>\n\n| Tool | Description |\n|------|-------------|\n| **Search & Discovery** | |\n| `search_library` | Text search across title, artist, album, genre |\n| `semantic_search` | Natural language search by mood/style via CLAP embeddings |\n| `find_similar_tracks` | Find sonically similar tracks using audio embeddings |\n| `filter_tracks` | Filter by BPM, energy, key, danceability, valence, favorites, play history |\n| `get_similar_artists_in_library` | Find similar artists (via Last.fm) that exist in your library |\n| **Library Info** | |\n| `get_library_stats` | Total tracks, artists, albums, top genres |\n| `get_library_genres` | List all genres with track counts |\n| `get_visible_tracks` | Get tracks currently shown in the UI |\n| `get_track_details` | Detailed track info including audio features |\n| `get_track_analysis` | Deep musical analysis (harmonic, melodic, rhythmic, structural) |\n| **Playback** | |\n| `queue_tracks` | Add tracks to the playback queue |\n| `control_playback` | Play, pause, next, previous, shuffle |\n| `select_diverse_tracks` | Ensure variety across artists/albums |\n| `create_playlist_from_items` | Create playlist from a list of artists/albums/tracks |\n| **Discovery** | |\n| `search_bandcamp` | Search Bandcamp for albums/tracks to purchase |\n| `recommend_bandcamp_purchases` | Suggest albums based on your listening history |\n| `get_feature_distribution` | Get statistical distribution of audio features |\n| `get_available_mood_tags` | List all mood/genre/style tags available for filtering |\n| `fetch_webpage` | Extract music references from a URL for playlist creation |\n| **Metadata Correction** | |\n| `lookup_correct_metadata` | Look up correct metadata from MusicBrainz |\n| `propose_metadata_change` | Propose a metadata fix for user review |\n| `get_album_tracks` | Get all tracks from a specific album |\n| `mark_album_as_compilation` | Set album_artist for compilation albums |\n| `propose_album_artwork` | Search and propose album artwork from Cover Art Archive |\n| `find_duplicate_artists` | Find artists with variant spellings |\n| `merge_duplicate_artists` | Propose merging duplicate artist names |\n| **Track Identification** | |\n| `identify_track` | Find a track by title and artist in library or externally |\n\n</details>\n\n### Playback & Experience\n- **Synced lyrics** - Auto-scrolling lyrics display fetched from LRCLIB.net\n- **Music video playback** - Download and match music videos from YouTube\n- **Keyboard shortcuts** - Full keyboard control (press `?` for help)\n- **Multi-profile support** - Each household member gets their own favorites and history\n\n### Library Management\n- **Fast scanning with community cache** - Pre-computed analysis from other users speeds up initial scan\n- **Audio analysis** - BPM, key detection, energy, danceability, and more via librosa\n- **CLAP embeddings** - Semantic audio search powered by LAION's CLAP model\n- **Smart playlists** - Dynamic playlists with rules for BPM, key, energy, genre, and more\n- **Metadata editing** - Right-click to edit, AI-assisted corrections, duplicate artist detection\n- **AcoustID fingerprinting** - Identify unknown tracks\n- **Cloud backup** - S3 Glacier Deep Archive backup (~$1/TB/month) with scheduled backups and restore\n\n### Mobile & Offline\n- **PWA support** - Install on mobile or desktop, works offline\n- **Download tracks** - Cache music for offline playback\n- **Lock screen controls** - Media notifications and controls\n- **Works over Tailscale** - Access your library anywhere with HTTPS\n\n### Integrations\n- **Last.fm scrobbling** - Automatic scrobbling, love/unlove tracks\n- **Bandcamp discovery** - Search and get purchase recommendations\n\n## Quick Start\n\n```bash\ngit clone https://github.com/seethroughlab/familiar.git\ncd familiar/docker\ncp .env.example .env\n# Edit .env: set MUSIC_LIBRARY_PATH and FRONTEND_URL\ndocker compose -f docker-compose.prod.yml up -d\n```\n\nAccess at http://localhost:4400. API keys are configured in your `.env` file — open **Settings** (gear icon) to manage your library and start a scan.\n\n**Running on macOS?** See the **[macOS Installation Guide](docs/MACOS.md)** — covers Docker Desktop setup, Apple Silicon, and music library paths.\n\nSee the **[Installation Guide](docs/INSTALLATION.md)** for other platforms (OpenMediaVault, Synology NAS, development setup).\n\n## Requirements\n\n- Docker Engine 24.0+ / Docker Compose v2\n- 2 GB RAM minimum (4 GB recommended for large libraries)\n- x86_64 or ARM64 (ARM64: CLAP embeddings can be disabled if needed)\n- Music library accessible via filesystem mount\n\n## Keyboard Shortcuts\n\nPress `?` anytime to see all shortcuts.\n\n| Key | Action |\n|-----|--------|\n| `Space` | Play / Pause |\n| `←` / `→` | Previous / Next track |\n| `↑` / `↓` | Volume up / down |\n| `J` / `L` | Seek backward / forward 10s |\n| `S` | Toggle shuffle |\n| `R` | Cycle repeat mode |\n| `M` | Mute / Unmute |\n| `F` | Toggle full player |\n| `Esc` | Close overlay |\n| `?` | Show shortcuts help |\n\n## Documentation\n\n- **[Installation Guide](docs/INSTALLATION.md)** - Docker, OpenMediaVault, Synology NAS, and development setup\n- **[macOS Guide](docs/MACOS.md)** - Docker Desktop setup, Apple Silicon, music library paths\n- **[Configuration](docs/CONFIGURATION.md)** - Environment variables, API keys, Tailscale HTTPS, cloud backup\n- **[Library Browser API](docs/LIBRARY_BROWSERS.md)** - Create custom 2D/3D library visualizations\n- **[REST API Reference](docs/REST-API.md)** - Backend REST API documentation\n\n## Coming Soon\n\nFeatures planned for future releases:\n\n### Listening Sessions (WebRTC) ([branch](https://github.com/seethroughlab/familiar/tree/feature/listening-sessions))\nShare what you're listening to with friends in real-time. Host a session, share a link, and guests hear synchronized audio - no account required. Requires public signaling server deployment.\n\n### Multi-Room Audio\nPlay to Sonos speakers and AirPlay devices in addition to browser audio. Control playback across multiple rooms with per-room volume controls.\n\n### Additional LLM Providers\nSupport for more AI providers beyond Claude and Ollama, including OpenAI (ChatGPT), Google Gemini, and other compatible APIs.\n\n## Beta Feedback\n\nFamiliar is in active development and we'd love your feedback!\n\n**What's most helpful:**\n- Bug reports with steps to reproduce\n- Feature requests with use cases\n- Performance issues (especially on NAS devices)\n- UI/UX suggestions\n\n**How to report:**\n- [GitHub Issues](https://github.com/seethroughlab/familiar/issues) - Bugs and feature requests\n- Include your platform, Docker version, and relevant logs (`docker logs familiar-api`)\n\n## Project Structure\n\n```\nfamiliar/\n├── backend/          # Python FastAPI backend\n│   ├── app/\n│   │   ├── api/      # API routes\n│   │   ├── db/       # Database models\n│   │   ├── services/ # Business logic + background tasks\n│   │   └── utils/    # Utilities\n│   └── tests/\n├── frontend/         # React + TypeScript PWA\n│   ├── src/\n│   │   ├── api/      # API client modules\n│   │   ├── components/\n│   │   ├── hooks/\n│   │   ├── player/   # Audio engine, stores, persistence\n│   │   ├── services/ # Offline, sync services\n│   │   └── stores/   # Zustand state\n├── docker/           # Docker configuration\n└── docs/             # Documentation\n```\n\n## Contributing\n\nContributions are welcome! Please read our contributing guidelines before submitting PRs.\n\n## License\n\nMIT License - see [LICENSE](LICENSE) for details.\n","summary":"Familiar is a self‑hosted music player that analyses the actual sound of your music with CLAP embeddings, enabling semantic search, mood‑based browsing, and an AI chat assistant that can generate playlists or correct metadata. It offers a rich set of discovery tools—including a 3‑D explorer, mood grid, and similarity maps—alongside an 27‑tool AI interface for advanced search, playback control, and data‑driven playlist creation. Because all processing happens locally and no data leaves your network, it is ideal for privacy‑concerned listeners, musicians, and hobbyist media server users who dislike cloud dependencies. The community‑powered cache of pre‑computed fingerprints lets new installations benefit immediately, reducing initial analysis time.","description":null,"stars":3,"language":"TypeScript"},{"owner":"alez007","repo":"modelship","url":"https://github.com/alez007/modelship","readme":"# Modelship\n\n[![CI](https://github.com/alez007/modelship/actions/workflows/ci.yml/badge.svg)](https://github.com/alez007/modelship/actions/workflows/ci.yml)\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache_2.0-blue.svg)](https://opensource.org/licenses/Apache-2.0)\n[![Python 3.12+](https://img.shields.io/badge/python-3.12+-blue.svg)](https://www.python.org/downloads/)\n\nSelf-hosted, multi-model AI inference server. Runs LLMs alongside specialized models (TTS, speech-to-text, embeddings, image generation) on GPU or CPU, exposing an OpenAI-compatible API. Built on [Ray Serve](https://docs.ray.io/en/latest/serve/index.html) with pluggable inference backends: [vLLM](https://github.com/vllm-project/vllm) for high-throughput GPU inference, [HuggingFace Transformers](https://github.com/huggingface/transformers) for CPU and lightweight GPU workloads, [llama.cpp](https://github.com/abetlen/llama-cpp-python) for high-efficiency GGUF models on CPU, [Diffusers](https://github.com/huggingface/diffusers) for image generation, and a plugin system for custom backends.\n\n## Why Modelship?\n\nMost self-hosted inference tools focus on running a single model. Modelship is for when you need **multiple models running simultaneously** — an LLM, a TTS engine, a speech-to-text model, an embedding model, and an image generator — all behind a single OpenAI-compatible API, with fine-grained control over GPU memory allocation across them.\n\n- **One server, many models** — run a full AI stack (chat + TTS + STT + embeddings + image gen) on a single machine instead of juggling separate services\n- **GPU memory control** — allocate exact GPU fractions per model (e.g. 70% for the LLM, 5% for TTS) so everything fits on your hardware\n- **Mix and match backends** — use vLLM for high-throughput GPU inference, Transformers or llama.cpp for CPU-only workloads, Diffusers for images, and plugins for custom backends — in the same deployment\n- **Drop-in OpenAI replacement** — any OpenAI SDK client works out of the box, making it easy to integrate with existing apps and tools like [Home Assistant](docs/home-assistant.md)\n\n## Architecture\n\n```mermaid\ngraph TD\n    Client[\"Client (OpenAI SDK / curl)\"]\n    API[\"FastAPI Gateway<br/>OpenAI-compatible API<br/>:8000\"]\n\n    Client -->|HTTP| API\n    API -->|round-robin| LLM_GPU\n    API -->|round-robin| LLM_CPU\n    API -->|round-robin| TTS\n    API -->|round-robin| STT\n    API -->|round-robin| EMB\n    API -->|round-robin| IMG\n\n    subgraph GPU0[\"GPU 0 — vLLM\"]\n        LLM_GPU[\"LLM Deployment<br/>e.g. Llama 3.1 8B<br/>70% GPU\"]\n        TTS[\"TTS Deployment<br/>e.g. Kokoro 82M<br/>5% GPU\"]\n    end\n\n    subgraph GPU1[\"GPU 1 — Mixed backends\"]\n        STT[\"STT Deployment (vLLM)<br/>e.g. Whisper Large<br/>50% GPU\"]\n        EMB[\"Embedding Deployment<br/>e.g. Nomic Embed<br/>50% GPU\"]\n    end\n\n    subgraph CPU[\"CPU — Transformers / llama.cpp\"]\n        LLM_CPU[\"LLM Deployment<br/>e.g. Qwen3-0.6B<br/>CPU-only\"]\n        STT_CPU[\"STT Deployment<br/>e.g. Whisper Small<br/>CPU-only\"]\n    end\n\n    subgraph GPU2[\"GPU 2 — Diffusers\"]\n        IMG[\"Image Generation<br/>e.g. SDXL Turbo<br/>35% GPU\"]\n    end\n```\n\nEach model runs as an isolated [Ray Serve](https://docs.ray.io/en/latest/serve/index.html) deployment with its own lifecycle, health checks, and resource budget. Five inference backends are available:\n\n| Backend | Best for | GPU required |\n|---|---|---|\n| **vLLM** | High-throughput chat, embeddings, transcription | Yes |\n| **llama.cpp** | High-efficiency quantized GGUF models (chat, embeddings) | No |\n| **Transformers** | Chat, embeddings, transcription, TTS on CPU or lightweight GPU | No |\n| **Diffusers** | Image generation | Yes |\n| **Custom (plugins)** | TTS backends (Kokoro ONNX, Bark, Orpheus), STT backends (whisper.cpp) | No |\n\nModels can be deployed across multiple GPUs, run on CPU-only, or both — multiple deployments of the same model (e.g. one on GPU via vLLM, one on CPU via Transformers) are load-balanced with round-robin routing. Each deployment can also scale horizontally with `num_replicas`.\n...\n\n## Requirements\n\n- **Docker** (or Python 3.12+ with `uv` for local development)\n- **NVIDIA GPU** (optional) — 16 GB+ VRAM recommended for a full stack (LLM + TTS + STT + embeddings) via vLLM; 8 GB is sufficient for lighter setups. Not required when using the Transformers backend on CPU\n- **[NVIDIA Container Toolkit](https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)** — required only when running GPU models in Docker\n- **HuggingFace token** for gated models\n\n## Features\n\n- **Multi-model, multi-GPU** — run chat, embedding, STT, TTS, and image generation models simultaneously across one or more GPUs with tunable per-model GPU memory allocation\n- **CPU-only support** — run models without a GPU using the Transformers backend (chat, embeddings, transcription, TTS). Useful for development, testing, or small models that don't need GPU acceleration\n- **Multiple inference backends** — vLLM for high-throughput GPU inference, HuggingFace Transformers for CPU and lightweight GPU workloads, Diffusers for image generation, and a plugin system for custom backends\n- **Per-model isolated deployments** — each model runs in its own Ray Serve deployment with independent lifecycle, health checks, failure isolation, and configurable replica count\n- **OpenAI-compatible API** — drop-in replacement for any OpenAI SDK client\n- **Streaming** — SSE streaming for chat completions and TTS audio\n- **Tool/function calling** — auto tool choice with configurable parsers\n- **Plugin system** — opt-in TTS and STT backends installed as isolated uv workspace packages\n- **Multi-GPU & hybrid routing** — assign models to specific GPUs or run them on CPU-only; deploy the same model on both GPU and CPU and requests are load-balanced via round-robin; full tensor parallelism support for large models spanning multiple GPUs\n- **Client disconnect detection** — cancels in-flight inference when the client disconnects, freeing GPU resources immediately\n- **Prometheus metrics & Grafana dashboard** — built-in observability with custom `modelship:*` metrics, vLLM engine stats, and Ray cluster metrics on a single scrape endpoint; pre-built Grafana dashboard included\n- **Ray dashboard** — monitor deployments, resources, and request logs\n\n## Supported OpenAI Endpoints\n\n| Endpoint | Usecase |\n|---|---|\n| `POST /v1/chat/completions` | Chat / text generation (streaming and non-streaming) |\n| `POST /v1/embeddings` | Text embeddings |\n| `POST /v1/audio/transcriptions` | Speech-to-text |\n| `POST /v1/audio/translations` | Audio translation |\n| `POST /v1/audio/speech` | Text-to-speech (SSE streaming or single-response) |\n| `POST /v1/images/generations` | Image generation |\n| `GET /v1/models` | List available models |\n\n## Quick Start\n\nThe fastest way to try Modelship: run a quantized 7B chat model on a laptop — no GPU required. Copy-paste this block and you'll have an OpenAI-compatible API on `http://localhost:8000` in a few minutes (first run downloads ~4.5 GB of weights into `./models-cache`).\n\n```bash\nmkdir -p models-cache && cat > models.yaml <<'EOF'\nmodels:\n  - name: qwen\n    model: lmstudio-community/Qwen2.5-7B-Instruct-GGUF\n    usecase: generate\n    loader: llama_cpp\n    num_cpus: 3\n    llama_cpp_config:\n      hf_filename: \"*Q4_K_M.gguf\"\nEOF\n\ndocker run --rm --shm-size=8g \\\n  -v ./models.yaml:/modelship/config/models.yaml \\\n  -v ./models-cache:/.cache \\\n  -p 8000:8000 \\\n  ghcr.io/alez007/modelship:latest-cpu\n```\n\nImages are multi-arch (amd64 + arm64), so this works on Apple Silicon and ARM Linux hosts too.\n\nOnce the server is up (look for `Deployed app 'modelship api' successfully`), call it:\n\n```bash\ncurl http://localhost:8000/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\": \"qwen\", \"messages\": [{\"role\": \"user\", \"content\": \"Hello!\"}]}'\n```\n\nOr point any OpenAI SDK at it — no code changes, just swap `base_url`:\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(base_url=\"http://localhost:8000/v1\", api_key=\"not-needed\")\nresp = client.chat.completions.create(\n    model=\"qwen\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}],\n)\nprint(resp.choices[0].message.content)\n```\n\n### GPU (vLLM, Diffusers)\n\nFor high-throughput GPU inference, use the standard image and add `--gpus all`. You'll also need the [NVIDIA Container Toolkit](https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html) and an `HF_TOKEN` for gated models. Example `models.yaml` entries for vLLM, Diffusers, and multi-GPU setups live in [docs/model-configuration.md](docs/model-configuration.md); ready-to-run configs are in [config/examples/](config/examples/).\n\n```bash\ndocker run --rm --shm-size=8g --gpus all \\\n  -e HF_TOKEN=your_token_here \\\n  -e RAY_HEAD_GPU_NUM=1 \\\n  -v ./models.yaml:/modelship/config/models.yaml \\\n  -v ./models-cache:/.cache \\\n  -p 8000:8000 \\\n  ghcr.io/alez007/modelship:latest\n```\n\nHitting an error? Check [docs/troubleshooting.md](docs/troubleshooting.md).\n\n## Plugin Support\n\nModelship's TTS and STT systems are built around a plugin architecture — each backend is an opt-in package with its own isolated dependencies. Plugins ship inside this repo (`plugins/`) or can be installed from PyPI.\n\nBuilt-in plugins:\n\n- [Kokoro ONNX](plugins/kokoroonnx/README.md) — lightweight TTS via ONNX Runtime (CPU or GPU)\n- [Bark](plugins/bark/README.md) — multilingual TTS by Suno (GPU recommended)\n- [Orpheus](plugins/orpheus/README.md) — expressive TTS\n- [whisper.cpp](plugins/whispercpp/README.md) — CPU-only STT via `pywhispercpp`\n\nTo enable plugins, pass them as extras at sync time:\n\n```bash\nuv sync --extra kokoroonnx\nuv sync --extra kokoroonnx --extra whispercpp  # multiple plugins\n```\n\nWhen using Docker, set the `MSHIP_PLUGINS` environment variable:\n\n```\nMSHIP_PLUGINS=kokoroonnx,whispercpp\n```\n\nFor a full guide on writing your own plugin, see [Plugin Development](docs/plugins.md).\n\n## Documentation\n\n- [Development](docs/development.md) — dev environment setup, building, and running locally\n- [Model Configuration](docs/model-configuration.md) — full `models.yaml` reference, GPU pinning, environment variables\n- [Architecture](docs/architecture.md) — system design, request lifecycle, plugin loading\n- [Plugin Development](docs/plugins.md) — writing custom TTS/STT backends\n- [Home Assistant Integration](docs/home-assistant.md) — Wyoming protocol setup for voice automation\n- [Monitoring & Logging](docs/monitoring.md) — Prometheus metrics, Grafana dashboard, structured logging, health checks\n- [Troubleshooting](docs/troubleshooting.md) — common first-run errors and fixes\n- [Roadmap](ROADMAP.md) — what's planned next and where to contribute\n\n## Monitoring\n\nModelship exposes Prometheus metrics (Ray cluster, Ray Serve, vLLM, and custom `modelship:*` metrics) through a single scrape endpoint on port 8079. Metrics are **enabled by default** — set `MSHIP_METRICS=false` to disable. A pre-built Grafana dashboard is included.\n\nLogging supports structured JSON output (`MSHIP_LOG_FORMAT=json`) and request ID correlation across Ray actor boundaries. Logs can be shipped to a remote syslog server (`--log-target syslog://host:514`) or an OpenTelemetry collector (`--otel-endpoint http://collector:4317`). Set `MSHIP_LOG_LEVEL` to `TRACE` for full request/response payloads, or `DEBUG` for detailed diagnostics without payloads.\n\nSee [Monitoring & Logging](docs/monitoring.md) for full details.\n\n## Production Readiness\n\nModelship is actively used but not yet hardened for production. Key gaps today: no rate limiting, `/health` is a no-op, thin test coverage, no Helm chart, no Prometheus alerting rules. See the full [Production Readiness Plan](docs/production-readiness.md) for the scorecard and roadmap.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines on setting up the dev environment, code style, and submitting pull requests.\n","summary":"Modelship is a self‑hosted inference server that lets you run an entire AI stack—LLMs, TTS, speech‑to‑text, embeddings, and image generation—on a single machine behind an OpenAI‑compatible API. It is built on Ray Serve and supports multiple back‑ends such as vLLM, HuggingFace Transformers, llama.cpp, and Diffusers, allowing each model to run in its own isolated deployment with precise GPU‑memory fractions. The server can multi‑task across CPUs and multiple GPUs, offers round‑robin load balancing, and can be extended with custom plugins. Developers and operations teams that need a unified, highly configurable, and drop‑in OpenAI replacement for complex AI workflows benefit from Modelship.","description":"Self-hosted, multi-model AI inference server. Run LLMs, TTS, STT, embeddings, and image generation with an OpenAI-compatible API.","stars":4,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
