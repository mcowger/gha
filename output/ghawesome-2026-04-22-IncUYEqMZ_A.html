writes with `.bak` fallback for crash resilience\n- **Distributed encoding** -- cluster multiple Snacks instances to distribute encoding across your network\n- **Automatic node discovery** -- nodes find each other automatically, no manual IP configuration needed\n- **Dark mode UI** -- clean, responsive interface that works on desktop, tablet, and mobile\n\n---\n\n## Installation\n\n### Option 1: QNAP / Synology NAS (Docker)\n\nSnacks runs as a Docker container with your video library mounted as a volume.\n\n**1. Pull the image:**\n\n```bash\ndocker pull derekshreds/snacks-docker:latest\n```\n\n**2. Create the application** in Container Station (QNAP) or Docker (Synology) using this compose config:\n\n```yaml\nservices:\n  snacks:\n    image: derekshreds/snacks-docker:latest\n    container_name: snacks\n    ## Host networking required for cluster UDP broadcast discovery to reach the LAN.\n    ## Bridge mode only forwards unicast traffic, so broadcasts never arrive.\n    network_mode: host\n    volumes:\n      ## CHANGE THIS to your actual media folder on the NAS\n      - /share/Public/Media:/app/work/uploads\n      ## Transcoding logs\n      - /share/CACHEDEV1_DATA/snacks/logs:/app/work/logs\n      ## Persist settings and database across container updates\n      - /share/CACHEDEV1_DATA/snacks/config:/app/work/config\n    environment:\n      - ASPNETCORE_ENVIRONMENT=Production\n      - SNACKS_WORK_DIR=/app/work\n      - FFMPEG_PATH=/usr/lib/jellyfin-ffmpeg/ffmpeg\n      - FFPROBE_PATH=/usr/lib/jellyfin-ffmpeg/ffprobe\n      ## VAAPI driver — auto-detection tries iHD then i965. Override here if needed:\n      #- LIBVA_DRIVER_NAME=iHD\n    devices:\n      ## Intel QSV hardware acceleration (TS-453E J6412)\n      - /dev/dri:/dev/dri\n    ## QNAP lacks standard video/render groups — privileged grants /dev/dri access\n    privileged: true\n    restart: unless-stopped\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:6767/Home/Health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 40s\n```\n\n**3. Update the volume path** to point to your actual media library:\n\n| NAS | Typical Path |\n|-----|-------------|\n| QNAP | `/share/CACHEDEV1_DATA/Multimedia` or `/share/Public/Media` |\n| Synology | `/volume1/video` or `/volume1/Media` |\n\n**4. Access Snacks** at `http://YOUR-NAS-IP:6767`\n\n---\n\n### Option 2: Windows Desktop App\n\nSnacks can run as a standalone desktop app with native GPU acceleration.\n\n**Prerequisites:**\n- Windows 10/11\n- A supported GPU (NVIDIA, Intel, or AMD) with up-to-date drivers\n- [FFmpeg](https://www.gyan.dev/ffmpeg/builds/) (`ffmpeg-release-full` build)\n\n**Building from source:**\n\n1. Clone the repository\n2. Download FFmpeg from [gyan.dev](https://www.gyan.dev/ffmpeg/builds/) (release full build)\n3. Place `ffmpeg.exe` and `ffprobe.exe` in `electron-app/ffmpeg/`\n4. Run `build-installer.bat`\n5. Install from `electron-app/dist/Snacks Setup 2.2.4.exe`\n\n**For development:**\n\n```cmd\nrun-electron-dev.bat\n```\n\nThis publishes the backend and launches Snacks in dev mode without creating an installer.\n\n---\n\n## Usage\n\n### Browse & Select\n\nClick **Browse Library** to open the file browser.\n\n- **NAS mode** -- browse within your mounted media directory\n- **Desktop mode** -- browse any drive or folder on your PC\n\nNavigate into folders, view video files, and choose what to process:\n\n- **Process This Folder** -- encode only files in the current folder\n- **Process Folder + Subfolders** -- encode everything recursively\n- **Select individual files** -- check specific files to process\n\n### Configure\n\nClick the **gear icon** to open encoding settings:\n\n| Setting | Description |\n|---------|-------------|\n| Output Format | MKV (default) or MP4 |\n| Video Codec | H.265/HEVC, H.264/AVC, or AV1 |\n| Hardware Acceleration | Auto Detect, Intel QSV, AMD VAAPI, NVIDIA NVENC, or None |\n| Target Bitrate | Default 3500 kbps -- files above this get compressed |\n| 4K Bitrate Multiplier | 2x--8x multiplier for 4K content (default 4x) |\n| Skip 4K Videos | Leave 4K content untouched |\n| English Only Audio | Remove non-English audio tracks |\n| English Only Subtitles | Keep only English subtitle tracks |\n| Remove Black Borders | Auto-detect and crop letterboxing |\n| Output Directory | Where encoded files are saved (blank = same as original) |\n| Replace Original Files | Delete original and move encoded file to its location |\n| Retry on Failure | Fall back to software encoding if hardware fails |\n\n### Automatic Scanning\n\nSnacks can watch directories and automatically re-scan them on a configurable interval.\n\n- Open the **Settings** panel and enable **Auto Scan**\n- Set the scan interval (how often Snacks checks for new or changed files)\n- Add directories to the watch list using the **Watch This Folder** button in the directory browser\n- Snacks tracks all file states in a SQLite database so previously processed files are never re-scanned\n- Failed files are tracked with failure counts and won't be endlessly retried\n- Files modified within the last 30 minutes are skipped to avoid processing mid-transfer\n- If a file is replaced with a significantly different version (>10% size change), it's automatically re-queued\n- Partial `[snacks]` files from interrupted encodes are detected, deleted, and the original is re-queued\n\nSettings are saved server-side in `settings.json` (with automatic `.bak` backup) and persist across container restarts and devices.\n\n### Distributed Encoding (Cluster)\n\nSnacks can distribute encoding work across multiple machines on your network.\n\n- Open the **Settings** panel and enable **Cluster Mode**\n- Set a **shared secret** that all nodes will use to authenticate with each other\n- Nodes on the local network discover each other automatically\n- One instance acts as the **coordinator**, assigning jobs to available **worker nodes**\n- Source files are transferred to workers before encoding and results are transferred back on completion\n- If a worker goes offline mid-encode, the job is automatically reassigned to another node\n- Job state transitions (queued, assigned, transferring, encoding, completed, failed) are tracked in the database\n- The cluster status panel shows discovered nodes with health indicators and active jobs\n\n### Monitor\n\nThe main dashboard shows:\n- **Now Processing** -- current file with live progress bar (always visible regardless of page)\n- **Queue** -- upcoming files sorted by bitrate (highest first), with filter tabs for All, Pending, Completed, and Failed\n- **Stats** -- pending, processing, completed, and failed counts\n- **Pagination** -- first/prev/next/last page navigation\n\nClick the terminal icon on any item to view detailed FFmpeg logs -- logs are persisted to disk and viewable even after a restart.\n\n### Queue Management\n\n- **Stop (Encode Later)** -- removes an item from the queue with a yellow \"Stopped\" badge. It will be re-queued on the next auto-scan.\n- **Cancel (Don't Reprocess)** -- permanently cancels an item. It will not be re-queued unless you manually select it again.\n- **Process Selected override** -- explicitly selecting a file in the browser always queues it, regardless of its database status (failed, cancelled, completed).\n- **Pause/Resume** -- pause state is saved across restarts. If the queue was paused when the container stopped, it stays paused.\n\n### Logs\n\n- Every encode writes a log file to the `logs` directory (e.g., `The Matrix (1999)_a3f2b1c4.log`)\n- Logs are viewable in the app by clicking the terminal icon on any queue item\n- On NAS deployments, logs are accessible via the mounted logs volume\n\n---\n\n## How It Works\n\n1. **Scan** -- Snacks probes each file with FFprobe to determine codec, bitrate, and resolution\n2. **Filter** -- Files already meeting your quality targets are skipped automatically\n3. **Encode** -- FFmpeg encodes with hardware acceleration when available, falling back to software\n4. **Validate** -- Output is verified by comparing duration to the original\n5. **Retry** -- On failure, retries without subtitles, then software decode + HW encode, then full software\n6. **Clean up** -- Original files are never modified; encoded files get a `[snacks]` tag\n\n### File Naming\n\n- Encoded files are saved as `Movie Name [snacks].mkv` alongside the original (or in the output directory if configured)\n- If **Replace Original Files** is enabled, the original is deleted and the encoded file is moved to the original's location without the `[snacks]` tag\n- Original files are never modified during encoding\n\n### Smart Filtering\n\nFiles are automatically skipped if they already meet requirements:\n\n- Already target codec and below target bitrate (1080p: 1.2x target, 4K: configurable multiplier)\n- Already encoded (filename contains `[snacks]`)\n\n---\n\n## Hardware Acceleration\n\n### Supported Platforms\n\n| Platform | NAS (Docker) | Desktop (Windows) |\n|----------|:---:|:---:|\n| NVIDIA NVENC | CUDA | CUDA |\n| Intel | VAAPI (CQP) | QSV (VBR) |\n| AMD | VAAPI (CQP) | AMF (VBR) |\n| Software (x265/SVT-AV1) | Always available | Always available |\n\n### NAS Notes\n\n- **QNAP TS-453E (J6412)**: Uses VAAPI with CQP rate control. VBR is not supported on Elkhart Lake.\n- **Software decode fallback**: Codecs that VAAPI can't decode (e.g., AV1 on older Intel hardware) are automatically decoded in software while still using VAAPI for hardware encoding.\n- The container uses [jellyfin-ffmpeg](https://github.com/jellyfin/jellyfin-ffmpeg) which includes full VAAPI/QSV support.\n- `privileged: true` is required on QNAP for `/dev/dri` access.\n- Hardware detection runs automatically on first encode and caches the result.\n\n### Desktop Notes\n\n- NVIDIA GPUs use NVENC with VBR for precise bitrate control.\n- Intel/AMD use QSV/AMF respectively with proper bitrate targeting.\n- Auto-detect tests each encoder at startup and picks the best available.\n\n---\n\n## Troubleshooting\n\n**No directories in browser (NAS)**\n```bash\ndocker exec snacks ls -la /app/work/uploads/\n```\nVerify your volume mount points to a directory with video files.\n\n**Hardware acceleration not detected**\n```bash\n# Check GPU access inside the container\ndocker exec snacks vainfo\ndocker exec snacks ls -la /dev/dri/\n```\n\n**Encoding produces larger files (NAS/VAAPI)**\n\nVAAPI CQP mode doesn't have precise bitrate control. The quality parameter is automatically scaled based on the target, but results vary by content. Files that end up larger than the original are automatically discarded.\n\n**Progress bar not updating**\n\nCheck that the backend is running and SignalR is connected (green dot in the navbar). Progress updates are throttled to every 2 seconds.\n\n---\n\n## Project Structure\n\n```\nSnacks/\n  Snacks/                 ASP.NET Core 10.0 backend + web UI\n    Controllers/           API endpoints\n    Services/              Transcoding, file handling, FFprobe, AutoScan, cluster services\n    Data/                  SQLite database context, migrations, repository\n    Models/                WorkItem, MediaFile, EncoderOptions, ClusterConfig, JobAssignment\n    Hubs/                  SignalR real-time communication\n    Views/                 Razor pages\n    wwwroot/               Static assets (JS, CSS, fonts)\n  release-notes/          Per-version release notes\n  electron-app/           Electron desktop wrapper\n    main.js               Electron main process\n    backend/              Published .NET backend (gitignored)\n    ffmpeg/               Bundled FFmpeg binaries (gitignored)\n  docker-compose.gpu.yml  GPU overlay for Linux NAS (VAAPI/QSV)\n  build-and-export.bat    Build & push Docker image\n  build-installer.bat     Build Windows installer\n  build-electron.bat      Build Electron app\n  run-electron-dev.bat    Run desktop app in dev mode\n  deploy-compose.yml      Docker Compose for NAS deployment\n  start-snacks.bat     Start backend (Windows)\n  start-snacks.sh      Start backend (Linux/Docker)\n```\n\n---\n\n## Building\n\n### Docker Image (for NAS)\n\n```cmd\nbuild-and-export.bat\n```\n\nBuilds the Docker image and pushes to Docker Hub as both `derekshreds/snacks-docker:latest` and `derekshreds/snacksweb:latest`.\n\n### Windows Installer\n\n```cmd\nbuild-installer.bat\n```\n\nCreates a self-contained Windows installer at `electron-app/dist/` with the .NET runtime, FFmpeg, and desktop shortcuts bundled.\n\n---\n\n<p align=\"center\">\n  <strong>Snacks</strong> v2.3.1 &copy; 2026 Derek Morris\n</p>\n","summary":"Snacks is an automated video library encoder that uses GPU acceleration (NVENC, QSV/VAAPI, AMF) to batch‑transcode entire collections to H.264, H.265, or AV1, running on Docker‑enabled NAS devices or as a native Windows app. It offers smart filtering to skip already‑optimized files, a persistent SQLite database, real‑time WebSocket progress, automatic directory rescanning, 4K settings, per‑file logging, “stop” versus “cancel” options, and a distributed cluster mode with automatic node discovery. Home media server operators, NAS users, and developers who need efficient, reliable, and low‑maintenance transcoding will find it especially useful.","description":"Highly efficient automated video library transcoder","stars":119,"language":"C#"},{"owner":"Maintainerr","repo":"Maintainerr","url":"https://github.com/Maintainerr/Maintainerr","readme":"<p align=\"center\">\n  <img src=\"apps/ui/public/logo_black.svg?raw=true\" alt=\"Maintainerr's custom image\"/>\n</p>\n\n<p align=\"center\" >\n<!-- Discord Badge -->  <a href=\"https://discord.gg/WP4ZW2QYwk\"><img alt=\"Discord\" src=\"https://img.shields.io/discord/1152219249549512724?style=flat&logo=discord&logoColor=white&label=Maintainerr\"></a>\n<!-- Latest Build -->  <picture><img alt=\"GitHub Actions Workflow Status\" src=\"https://img.shields.io/github/actions/workflow/status/maintainerr/maintainerr/.github%2Fworkflows%2Fbuild_dev.yml?branch=development&style=flat&logo=github&label=Latest%20Build\"></picture>\n<!-- Latest Release -->  <a href=\"https://github.com/maintainerr/Maintainerr/releases\"><img alt=\"GitHub Release\" src=\"https://img.shields.io/github/v/release/maintainerr/maintainerr?style=flat&logo=github&logoColor=white&label=Latest%20Release\"></a>\n<!-- Commits -->  <picture><img alt=\"GitHub commits since latest release\" src=\"https://img.shields.io/github/commits-since/maintainerr/maintainerr/latest?style=flat&logo=github&logoColor=white\"></picture>\n<!-- Github Stars -->  <picture><img alt=\"GitHub Repo stars\" src=\"https://img.shields.io/github/stars/maintainerr/maintainerr?style=flat&logo=github&logoColor=white&label=Stars\"></picture>\n<!-- Docker Pulls -->  <a href=\"https://hub.docker.com/r/maintainerr/maintainerr\"><img alt=\"Docker Pulls\" src=\"https://img.shields.io/docker/pulls/maintainerr/maintainerr?style=flat&logo=docker&logoColor=white&label=Docker%20Pulls\"></a>\n<!--Commits per month -->  <picture><img alt=\"GitHub commit activity\" src=\"https://img.shields.io/github/commit-activity/m/maintainerr/maintainerr?style=flat&logo=github&logoColor=white&label=COMMITS\"></picture>\n<!-- Issues Closed -->  <picture><img alt=\"GitHub Issues or Pull Requests\" src=\"https://img.shields.io/github/issues-closed/maintainerr/maintainerr?style=flat&logo=github&logoColor=white\"></picture>\n<!-- Issues Open -->  <picture><img alt=\"GitHub Issues or Pull Requests\" src=\"https://img.shields.io/github/issues/maintainerr/maintainerr?style=flat&logo=github&logoColor=white\"></picture>\n<!-- Open Collective Donate -->  <a href=\"https://opencollective.com/maintainerr\"><img alt=\"Static Badge\" src=\"https://img.shields.io/badge/DONATE-opencollective-red?style=flat&logo=opencollective&logoColor=white\"></a>\n<!-- Docs -->  <a href=\"https://docs.maintainerr.info\"><img alt=\"Documentation\" src=\"https://img.shields.io/badge/Material_for_MkDocs-%3A)-blue?style=flat&logo=materialformkdocs&logoColor=white\"></a>\n<!-- License -->  <picture><img alt=\"GitHub License\" src=\"https://img.shields.io/github/license/maintainerr/maintainerr?style=flat\"></picture>\n</p>\n\n<b>Maintainerr</b> makes managing your media easy.\n\n- Do you hate being the janitor of your server?\n- Do you have a lot of media that never gets watched?\n- Do your users constantly request media, and let it sit there afterward never to be touched again?\n\nIf you answered yes to any of those questions, you need <b>Maintainerr</b>.\nIt's a one-stop shop for handling those outlier shows and movies that take up precious space on your server.\n\n# Features\n\n- Configure rules specific to your needs, based on several available options from Plex, Jellyfin, Seerr, Radarr, Sonarr and Tautulli.\n- Switch between Plex and Jellyfin as your media server, with automatic rule migration.\n- Manually add media to a collection if it is not included after rule execution. (for one-off items that do not match a rule set)\n- Selectively exclude media from being added to a collection, even if it matches a rule.\n- Show a collection containing rule-matched media on the media server home screen for a specific duration before deletion. Think \"Leaving soon\".\n- Optionally, use a manual collection, in case you don't want <b>Maintainerr</b> to add & remove collections at will.\n- Manage media straight from the collection within your media server. <b>Maintainerr</b> will sync and add or exclude media to/from the internal collection.\n- Remove or unmonitor media from \\*arr\n- Clear requests from Seerr\n- Delete files from disk\n\n<br />\n\nCurrently, <b>Maintainerr</b> supports rule parameters from the following apps:\n\n- [Plex](https://www.plex.tv/)\n- [Jellyfin](https://jellyfin.org/)\n- [Seerr](https://seerr.dev/)\n- [Radarr](https://radarr.video/)\n- [Sonarr](https://sonarr.tv/)\n- [Tautulli](https://tautulli.com/)\n\n# Preview\n\n![image](apps/ui/public/screenshots/overview_screenshot.png)\n![image](apps/ui/public/screenshots/rules_screenshot.png)\n![image](apps/ui/public/screenshots/collections_screenshot.png)\n![image](apps/ui/public/screenshots/rule_example_screenshot.png)\n\n# Installation\n\nDocker images for amd64 & arm64 are available from these sources:\n\n- [ghcr.io/maintainerr/maintainerr](https://ghcr.io/maintainerr/maintainerr) <--- recommended\n- [maintainerr/maintainerr](https://hub.docker.com/r/maintainerr/maintainerr)\n\nData is saved inside the container at /opt/data. It is recommended to mount a persistent volume to this location in your Docker run command or Compose file.\nMake sure this directory is readable and writable by the user specified in the 'user' setting. If no 'user' setting is configured, the volume should be accessible by UID:GID 1000:1000.\n\nFor more information, visit the [installation guide](https://docs.maintainerr.info/installation).\n\nDocker run:\n\n```Yaml\ndocker run -d \\\n--name maintainerr \\\n-e TZ=Europe/Brussels \\\n-v ./data:/opt/data \\\n-u 1000:1000 \\\n-p 6246:6246 \\\n--restart unless-stopped \\\nghcr.io/maintainerr/maintainerr:latest\n```\n\nDocker Compose:\n\n```Yaml\nservices:\n    maintainerr:\n        image: ghcr.io/maintainerr/maintainerr:latest # or ghcr.io/maintainerr/maintainerr:development (to test unreleased changes)\n        container_name: maintainerr\n        user: 1000:1000\n        volumes:\n          - type: bind\n            source: ./data\n            target: /opt/data\n        environment:\n          - TZ=Europe/Brussels\n#      - BASE_PATH=/maintainerr # uncomment if you're serving maintainerr from a subdirectory\n#      - UI_HOSTNAME=:: # uncomment if you want to listen on IPv6 instead (default 0.0.0.0)\n#      - UI_PORT=6247 # uncomment to change the UI port (default 6246)\n#      - GITHUB_TOKEN=ghp_yourtoken # Optional: GitHub Personal Access Token for higher API rate limits (60/hr without, 5000/hr with token)\n        ports:\n          - 6246:6246\n        restart: unless-stopped\n```\n\n# Documentation\n\n[For more information, please consult the documentation](https://docs.maintainerr.info/)\n\n# API Compatibility\n\n- Since v3, `/api/media-server` is the canonical API for media-server operations.\n- Deprecated `/api/plex` routes remain as a transition layer and are translated to the current abstraction-based implementation.\n- `/api/collections` and other app-specific endpoints are internal application APIs and are not a backward-compatible Plex contract.\n- Deprecated `/api/plex` routes will be removed in a future major version.\n\n# Features\n\n[To get an indication of which features are most desired, you can vote for them](https://features.maintainerr.info/?view=most-wanted)\n\n# Credits\n\nMaintainerr is heavily inspired by Seerr (Overseerr / Jellyseerr). Some parts of Maintainerr's code are direct copies. Big thanks to the Seerr team!\n","summary":"Maintainerr is a media‑server helper that automatically curates under‑watched or orphaned shows and movies from Plex, Jellyfin, Seerr, Radarr, Sonarr and Tautulli. It lets users set customizable rules for adding items to short‑lived “Leaving Soon” collections, manually manage exclusions, and automatically migrate rules when switching media servers. The tool also synchronizes these collections back to the server, allowing users to edit or un‑monitor media directly from within the collection itself. Its intuitive rule engine and cross‑platform support make it ideal for home media enthusiasts who want to keep their libraries tidy without manual housekeeping.","description":"Looks and smells like Seerr, does the opposite. A library maintenance tool for Plex and Jellyfin.","stars":1880,"language":"TypeScript"},{"owner":"microsoft","repo":"qlib","url":"https://github.com/microsoft/qlib","readme":"[![Python Versions](https://img.shields.io/pypi/pyversions/pyqlib.svg?logo=python&logoColor=white)](https://pypi.org/project/pyqlib/#files)\n[![Platform](https://img.shields.io/badge/platform-linux%20%7C%20windows%20%7C%20macos-lightgrey)](https://pypi.org/project/pyqlib/#files)\n[![PypI Versions](https://img.shields.io/pypi/v/pyqlib)](https://pypi.org/project/pyqlib/#history)\n[![Upload Python Package](https://github.com/microsoft/qlib/workflows/Upload%20Python%20Package/badge.svg)](https://pypi.org/project/pyqlib/)\n[![Github Actions Test Status](https://github.com/microsoft/qlib/workflows/Test/badge.svg?branch=main)](https://github.com/microsoft/qlib/actions)\n[![Documentation Status](https://readthedocs.org/projects/qlib/badge/?version=latest)](https://qlib.readthedocs.io/en/latest/?badge=latest)\n[![License](https://img.shields.io/pypi/l/pyqlib)](LICENSE)\n[![Join the chat at https://gitter.im/Microsoft/qlib](https://badges.gitter.im/Microsoft/qlib.svg)](https://gitter.im/Microsoft/qlib?utm_source=badge&utm_medium=badge&utm_campaign=pr-badge&utm_content=badge)\n\n## :newspaper: **What's NEW!** &nbsp;   :sparkling_heart: \n\nRecent released features\n\n### Introducing <a href=\"https://github.com/microsoft/RD-Agent\"><img src=\"docs/_static/img/rdagent_logo.png\" alt=\"RD_Agent\" style=\"height: 2em\"></a>: LLM-Based Autonomous Evolving Agents for Industrial Data-Driven R&D\n\nWe are excited to announce the release of **RD-Agent**📢, a powerful tool that supports automated factor mining and model optimization in quant investment R&D.\n\nRD-Agent is now available on [GitHub](https://github.com/microsoft/RD-Agent), and we welcome your star🌟!\n\nTo learn more, please visit the [RD-Agent repository](https://github.com/microsoft/RD-Agent). We have prepared several public demo videos for you:\n\n| Scenario | Demo video (English) | Demo video (中文) |\n| --                      | ------    | ------    |\n| Quant Factor Mining | [YouTube](https://www.youtube.com/watch?v=X4DK2QZKaKY&t=6s) | [YouTube](https://www.youtube.com/watch?v=X4DK2QZKaKY&t=6s) |\n| Quant Factor Mining from reports | [YouTube](https://www.youtube.com/watch?v=ECLTXVcSx-c) | [YouTube](https://www.youtube.com/watch?v=ECLTXVcSx-c) |\n| Quant Model Optimization | [YouTube](https://www.youtube.com/watch?v=dm0dWL49Bc0&t=104s) | [YouTube](https://www.youtube.com/watch?v=dm0dWL49Bc0&t=104s) |\n\n- 📃**Paper**: [R&D-Agent-Quant: A Multi-Agent Framework for Data-Centric Factors and Model Joint Optimization](https://arxiv.org/abs/2505.15155)\n- 👾**Code**: https://github.com/microsoft/RD-Agent/\n```BibTeX\n@misc{li2025rdagentquant,\n    title={R\\&D-Agent-Quant: A Multi-Agent Framework for Data-Centric Factors and Model Joint Optimization},\n    author={Yuante Li and Xu Yang and Xiao Yang and Minrui Xu and Xisen Wang and Weiqing Liu and Jiang Bian},\n    year={2025},\n    eprint={2505.15155},\n    archivePrefix={arXiv},\n    primaryClass={cs.AI}\n}\n```\n![image](https://github.com/user-attachments/assets/3198bc10-47ba-4ee0-8a8e-46d5ce44f45d)\n\n***\n\n| Feature | Status |\n| --                      | ------    |\n| [R&D-Agent-Quant](https://arxiv.org/abs/2505.15155) Published | Apply R&D-Agent to Qlib for quant trading | \n| BPQP for End-to-end learning | 📈Coming soon!([Under review](https://github.com/microsoft/qlib/pull/1863)) |\n| 🔥LLM-driven Auto Quant Factory🔥 | 🚀 Released in [♾️RD-Agent](https://github.com/microsoft/RD-Agent) on Aug 8, 2024 |\n| KRNN and Sandwich models | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/1414/) on May 26, 2023 |\n| Release Qlib v0.9.0 | :octocat: [Released](https://github.com/microsoft/qlib/releases/tag/v0.9.0) on Dec 9, 2022 |\n| RL Learning Framework | :hammer: :chart_with_upwards_trend: Released on Nov 10, 2022. [#1332](https://github.com/microsoft/qlib/pull/1332), [#1322](https://github.com/microsoft/qlib/pull/1322), [#1316](https://github.com/microsoft/qlib/pull/1316),[#1299](https://github.com/microsoft/qlib/pull/1299),[#1263](https://github.com/microsoft/qlib/pull/1263), [#1244](https://github.com/microsoft/qlib/pull/1244), [#1169](https://github.com/microsoft/qlib/pull/1169), [#1125](https://github.com/microsoft/qlib/pull/1125), [#1076](https://github.com/microsoft/qlib/pull/1076)|\n| HIST and IGMTF models | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/1040) on Apr 10, 2022 |\n| Qlib [notebook tutorial](https://github.com/microsoft/qlib/tree/main/examples/tutorial) | 📖 [Released](https://github.com/microsoft/qlib/pull/1037) on Apr 7, 2022 | \n| Ibovespa index data | :rice: [Released](https://github.com/microsoft/qlib/pull/990) on Apr 6, 2022 |\n| Point-in-Time database | :hammer: [Released](https://github.com/microsoft/qlib/pull/343) on Mar 10, 2022 |\n| Arctic Provider Backend & Orderbook data example | :hammer: [Released](https://github.com/microsoft/qlib/pull/744) on Jan 17, 2022 |\n| Meta-Learning-based framework & DDG-DA  | :chart_with_upwards_trend:  :hammer: [Released](https://github.com/microsoft/qlib/pull/743) on Jan 10, 2022 | \n| Planning-based portfolio optimization | :hammer: [Released](https://github.com/microsoft/qlib/pull/754) on Dec 28, 2021 | \n| Release Qlib v0.8.0 | :octocat: [Released](https://github.com/microsoft/qlib/releases/tag/v0.8.0) on Dec 8, 2021 |\n| ADD model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/704) on Nov 22, 2021 |\n| ADARNN  model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/689) on Nov 14, 2021 |\n| TCN  model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/668) on Nov 4, 2021 |\n| Nested Decision Framework | :hammer: [Released](https://github.com/microsoft/qlib/pull/438) on Oct 1, 2021. [Example](https://github.com/microsoft/qlib/blob/main/examples/nested_decision_execution/workflow.py) and [Doc](https://qlib.readthedocs.io/en/latest/component/highfreq.html) |\n| Temporal Routing Adaptor (TRA) | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/531) on July 30, 2021 |\n| Transformer & Localformer | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/508) on July 22, 2021 |\n| Release Qlib v0.7.0 | :octocat: [Released](https://github.com/microsoft/qlib/releases/tag/v0.7.0) on July 12, 2021 |\n| TCTS Model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/491) on July 1, 2021 |\n| Online serving and automatic model rolling | :hammer:  [Released](https://github.com/microsoft/qlib/pull/290) on May 17, 2021 | \n| DoubleEnsemble Model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/286) on Mar 2, 2021 | \n| High-frequency data processing example | :hammer: [Released](https://github.com/microsoft/qlib/pull/257) on Feb 5, 2021  |\n| High-frequency trading example | :chart_with_upwards_trend: [Part of code released](https://github.com/microsoft/qlib/pull/227) on Jan 28, 2021  | \n| High-frequency data(1min) | :rice: [Released](https://github.com/microsoft/qlib/pull/221) on Jan 27, 2021 |\n| Tabnet Model | :chart_with_upwards_trend: [Released](https://github.com/microsoft/qlib/pull/205) on Jan 22, 2021 |\n\nFeatures released before 2021 are not listed here.\n\n<p align=\"center\">\n  <img src=\"docs/_static/img/logo/1.png\" />\n</p>\n\nQlib is an open-source, AI-oriented quantitative investment platform that aims to realize the potential, empower research, and create value using AI technologies in quantitative investment, from exploring ideas to implementing productions. Qlib supports diverse machine learning modeling paradigms, including supervised learning, market dynamics modeling, and reinforcement learning.\n\nAn increasing number of SOTA Quant research works/papers in diverse paradigms are being released in Qlib to collaboratively solve key challenges in quantitative investment. For example, 1) using supervised learning to mine the market's complex non-linear patterns from rich and heterogeneous financial data, 2) modeling the dynamic nature of the financial market using adaptive concept drift technology, and 3) using reinforcement learning to model continuous investment decisions and assist investors in optimizing their trading strategies.\n\nIt contains the full ML pipeline of data processing, model training, back-testing; and covers the entire chain of quantitative investment: alpha seeking, risk modeling, portfolio optimization, and order execution. \nFor more details, please refer to our paper [\"Qlib: An AI-oriented Quantitative Investment Platform\"](https://arxiv.org/abs/2009.11189).\n\n\n<table>\n  <tbody>\n    <tr>\n      <th>Frameworks, Tutorial, Data & DevOps</th>\n      <th>Main Challenges & Solutions in Quant Research</th>\n    </tr>\n    <tr>\n      <td>\n        <li><a href=\"#plans\"><strong>Plans</strong></a></li>\n        <li><a href=\"#framework-of-qlib\">Framework of Qlib</a></li>\n        <li><a href=\"#quick-start\">Quick Start</a></li>\n          <ul dir=\"auto\">\n            <li type=\"circle\"><a href=\"#installation\">Installation</a> </li>\n            <li type=\"circle\"><a href=\"#data-preparation\">Data Preparation</a></li>\n            <li type=\"circle\"><a href=\"#auto-quant-research-workflow\">Auto Quant Research Workflow</a></li>\n            <li type=\"circle\"><a href=\"#building-customized-quant-research-workflow-by-code\">Building Customized Quant Research Workflow by Code</a></li></ul>\n        <li><a href=\"#quant-dataset-zoo\"><strong>Quant Dataset Zoo</strong></a></li>\n        <li><a href=\"#learning-framework\">Learning Framework</a></li>\n        <li><a href=\"#more-about-qlib\">More About Qlib</a></li>\n        <li><a href=\"#offline-mode-and-online-mode\">Offline Mode and Online Mode</a>\n        <ul>\n          <li type=\"circle\"><a href=\"#performance-of-qlib-data-server\">Performance of Qlib Data Server</a></li></ul>\n        <li><a href=\"#related-reports\">Related Reports</a></li>\n        <li><a href=\"#contact-us\">Contact Us</a></li>\n        <li><a href=\"#contributing\">Contributing</a></li>\n      </td>\n      <td valign=\"baseline\">\n        <li><a href=\"#main-challenges--solutions-in-quant-research\">Main Challenges &amp; Solutions in Quant Research</a>\n          <ul>\n            <li type=\"circle\"><a href=\"#forecasting-finding-valuable-signalspatterns\">Forecasting: Finding Valuable Signals/Patterns</a>\n              <ul>\n                <li type=\"disc\"><a href=\"#quant-model-paper-zoo\"><strong>Quant Model (Paper) Zoo</strong></a>\n                  <ul>\n                    <li type=\"circle\"><a href=\"#run-a-single-model\">Run a Single Model</a></li>\n                    <li type=\"circle\"><a href=\"#run-multiple-models\">Run Multiple Models</a></li>\n                  </ul>\n                </li>\n              </ul>\n            </li>\n          <li type=\"circle\"><a href=\"#adapting-to-market-dynamics\">Adapting to Market Dynamics</a></li>\n          <li type=\"circle\"><a href=\"#reinforcement-learning-modeling-continuous-decisions\">Reinforcement Learning: modeling continuous decisions</a></li>\n          </ul>\n        </li>\n      </td>\n    </tr>\n  </tbody>\n</table>\n\n# Plans\nNew features under development(order by estimated release time).\nYour feedbacks about the features are very important.\n<!-- | Feature                        | Status      | -->\n<!-- | --                      | ------    | -->\n\n# Framework of Qlib\n\n<div style=\"align: center\">\n<img src=\"docs/_static/img/framework-abstract.jpg\" />\n</div>\n\nThe high-level framework of Qlib can be found above(users can find the [detailed framework](https://qlib.readthedocs.io/en/latest/introduction/introduction.html#framework) of Qlib's design when getting into nitty gritty).\nThe components are designed as loose-coupled modules, and each component could be used stand-alone.\n\nQlib provides a strong infrastructure to support Quant research. [Data](https://qlib.readthedocs.io/en/latest/component/data.html) is always an important part.\nA strong learning framework is designed to support diverse learning paradigms (e.g. [reinforcement learning](https://qlib.readthedocs.io/en/latest/component/rl.html), [supervised learning](https://qlib.readthedocs.io/en/latest/component/workflow.html#model-section)) and patterns at different levels(e.g. [market dynamic modeling](https://qlib.readthedocs.io/en/latest/component/meta.html)).\nBy modeling the market, [trading strategies](https://qlib.readthedocs.io/en/latest/component/strategy.html) will generate trade decisions that will be executed. Multiple trading strategies and executors in different levels or granularities can be [nested to be optimized and run together](https://qlib.readthedocs.io/en/latest/component/highfreq.html).\nAt last, a comprehensive [analysis](https://qlib.readthedocs.io/en/latest/component/report.html) will be provided and the model can be [served online](https://qlib.readthedocs.io/en/latest/component/online.html) in a low cost.\n\n\n# Quick Start\n\nThis quick start guide tries to demonstrate\n1. It's very easy to build a complete Quant research workflow and try your ideas with _Qlib_.\n2. Though with *public data* and *simple models*, machine learning technologies **work very well** in practical Quant investment.\n\nHere is a quick **[demo](https://terminalizer.com/view/3f24561a4470)** shows how to install ``Qlib``, and run LightGBM with ``qrun``. **But**, please make sure you have already prepared the data following the [instruction](#data-preparation).\n\n\n## Installation\n\nThis table demonstrates the supported Python version of `Qlib`:\n|               | install with pip      | install from source  |        plot        |\n| ------------- |:---------------------:|:--------------------:|:------------------:|\n| Python 3.8    | :heavy_check_mark:    | :heavy_check_mark:   | :heavy_check_mark: |\n| Python 3.9    | :heavy_check_mark:    | :heavy_check_mark:   | :heavy_check_mark: |\n| Python 3.10   | :heavy_check_mark:    | :heavy_check_mark:   | :heavy_check_mark: |\n| Python 3.11   | :heavy_check_mark:    | :heavy_check_mark:   | :heavy_check_mark: |\n| Python 3.12   | :heavy_check_mark:    | :heavy_check_mark:   | :heavy_check_mark: |\n\n**Note**: \n1. **Conda** is suggested for managing your Python environment. In some cases, using Python outside of a `conda` environment may result in missing header files, causing the installation failure of certain packages.\n2. Please pay attention that installing cython in Python 3.6 will raise some error when installing ``Qlib`` from source. If users use Python 3.6 on their machines, it is recommended to *upgrade* Python to version 3.8 or higher, or use `conda`'s Python to install ``Qlib`` from source.\n\n### Install with pip\nUsers can easily install ``Qlib`` by pip according to the following command.\n\n```bash\n  pip install pyqlib\n```\n\n**Note**: pip will install the latest stable qlib. However, the main branch of qlib is in active development. If you want to test the latest scripts or functions in the main branch. Please install qlib with the methods below.\n\n### Install from source\nAlso, users can install the latest dev version ``Qlib`` by the source code according to the following steps:\n\n* Before installing ``Qlib`` from source, users need to install some dependencies:\n\n  ```bash\n  pip install numpy\n  pip install --upgrade cython\n  ```\n\n* Clone the repository and install ``Qlib`` as follows.\n    ```bash\n    git clone https://github.com/microsoft/qlib.git && cd qlib\n    pip install .  # `pip install -e .[dev]` is recommended for development. check details in docs/developer/code_standard_and_dev_guide.rst\n    ```\n\n**Tips**: If you fail to install `Qlib` or run the examples in your environment,  comparing your steps and the [CI workflow](.github/workflows/test_qlib_from_source.yml) may help you find the problem.\n\n**Tips for Mac**: If you are using Mac with M1, you might encounter issues in building the wheel for LightGBM, which is due to missing dependencies from OpenMP. To solve the problem, install openmp first with ``brew install libomp`` and then run ``pip install .`` to build it successfully. \n\n## Data Preparation\n❗ Due to more restrict data security policy. The official dataset is disabled temporarily. You can try [this data source](https://github.com/chenditc/investment_data/releases) contributed by the community.\nHere is an example to download the latest data.\n```bash\nwget https://github.com/chenditc/investment_data/releases/latest/download/qlib_bin.tar.gz\nmkdir -p ~/.qlib/qlib_data/cn_data\ntar -zxvf qlib_bin.tar.gz -C ~/.qlib/qlib_data/cn_data --strip-components=1\nrm -f qlib_bin.tar.gz\n```\n\nThe official dataset below will resume in short future.\n\n\n----\n\nLoad and prepare data by running the following code:\n\n### Get with module\n  ```bash\n  # get 1d data\n  python -m qlib.cli.data qlib_data --target_dir ~/.qlib/qlib_data/cn_data --region cn\n\n  # get 1min data\n  python -m qlib.cli.data qlib_data --target_dir ~/.qlib/qlib_data/cn_data_1min --region cn --interval 1min\n\n  ```\n\n### Get from source\n\n  ```bash\n  # get 1d data\n  python scripts/get_data.py qlib_data --target_dir ~/.qlib/qlib_data/cn_data --region cn\n\n  # get 1min data\n  python scripts/get_data.py qlib_data --target_dir ~/.qlib/qlib_data/cn_data_1min --region cn --interval 1min\n\n  ```\n\nThis dataset is created by public data collected by [crawler scripts](scripts/data_collector/), which have been released in\nthe same repository.\nUsers could create the same dataset with it. [Description of dataset](https://github.com/microsoft/qlib/tree/main/scripts/data_collector#description-of-dataset)\n\n*Please pay **ATTENTION** that the data is collected from [Yahoo Finance](https://finance.yahoo.com/lookup), and the data might not be perfect.\nWe recommend users to prepare their own data if they have a high-quality dataset. For more information, users can refer to the [related document](https://qlib.readthedocs.io/en/latest/component/data.html#converting-csv-format-into-qlib-format)*.\n\n### Automatic update of daily frequency data (from yahoo finance)\n  > This step is *Optional* if users only want to try their models and strategies on history data.\n  > \n  > It is recommended that users update the data manually once (--trading_date 2021-05-25) and then set it to update automatically.\n  >\n  > **NOTE**: Users can't incrementally  update data based on the offline data provided by Qlib(some fields are removed to reduce the data size). Users should use [yahoo collector](https://github.com/microsoft/qlib/tree/main/scripts/data_collector/yahoo#automatic-update-of-daily-frequency-datafrom-yahoo-finance) to download Yahoo data from scratch and then incrementally update it.\n  > \n  > For more information, please refer to: [yahoo collector](https://github.com/microsoft/qlib/tree/main/scripts/data_collector/yahoo#automatic-update-of-daily-frequency-datafrom-yahoo-finance)\n\n  * Automatic update of data to the \"qlib\" directory each trading day(Linux)\n      * use *crontab*: `crontab -e`\n      * set up timed tasks:\n\n        ```\n        * * * * 1-5 python <script path> update_data_to_bin --qlib_data_1d_dir <user data dir>\n        ```\n        * **script path**: *scripts/data_collector/yahoo/collector.py*\n\n  * Manual update of data\n      ```\n      python scripts/data_collector/yahoo/collector.py update_data_to_bin --qlib_data_1d_dir <user data dir> --trading_date <start date> --end_date <end date>\n      ```\n      * *trading_date*: start of trading day\n      * *end_date*: end of trading day(not included)\n\n### Checking the health of the data\n  * We provide a script to check the health of the data, you can run the following commands to check whether the data is healthy or not.\n    ```\n    python scripts/check_data_health.py check_data --qlib_dir ~/.qlib/qlib_data/cn_data\n    ```\n  * Of course, you can also add some parameters to adjust the test results, such as this.\n    ```\n    python scripts/check_data_health.py check_data --qlib_dir ~/.qlib/qlib_data/cn_data --missing_data_num 30055 --large_step_threshold_volume 94485 --large_step_threshold_price 20\n    ```\n  * If you want more information about `check_data_health`, please refer to the [documentation](https://qlib.readthedocs.io/en/latest/component/data.html#checking-the-health-of-the-data).\n\n<!-- \n- Run the initialization code and get stock data:\n\n  ```python\n  import qlib\n  from qlib.data import D\n  from qlib.constant import REG_CN\n\n  # Initialization\n  mount_path = \"~/.qlib/qlib_data/cn_data\"  # target_dir\n  qlib.init(mount_path=mount_path, region=REG_CN)\n\n  # Get stock data by Qlib\n  # Load trading calendar with the given time range and frequency\n  print(D.calendar(start_time='2010-01-01', end_time='2017-12-31', freq='day')[:2])\n\n  # Parse a given market name into a stockpool config\n  instruments = D.instruments('csi500')\n  print(D.list_instruments(instruments=instruments, start_time='2010-01-01', end_time='2017-12-31', as_list=True)[:6])\n\n  # Load features of certain instruments in given time range\n  instruments = ['SH600000']\n  fields = ['$close', '$volume', 'Ref($close, 1)', 'Mean($close, 3)', '$high-$low']\n  print(D.features(instruments, fields, start_time='2010-01-01', end_time='2017-12-31', freq='day').head())\n  ```\n -->\n\n## Docker images\n1. Pulling a docker image from a docker hub repository\n    ```bash\n    docker pull pyqlib/qlib_image_stable:stable\n    ```\n2. Start a new Docker container\n    ```bash\n    docker run -it --name <container name> -v <Mounted local directory>:/app pyqlib/qlib_image_stable:stable\n    ```\n3. At this point you are in the docker environment and can run the qlib scripts. An example:\n    ```bash\n    >>> python scripts/get_data.py qlib_data --name qlib_data_simple --target_dir ~/.qlib/qlib_data/cn_data --interval 1d --region cn\n    >>> python qlib/cli/run.py examples/benchmarks/LightGBM/workflow_config_lightgbm_Alpha158.yaml\n    ```\n4. Exit the container\n    ```bash\n    >>> exit\n    ```\n5. Restart the container\n    ```bash\n    docker start -i -a <container name>\n    ```\n6. Stop the container\n    ```bash\n    docker stop <container name>\n    ```\n7. Delete the container\n    ```bash\n    docker rm <container name>\n    ```\n8. If you want to know more information, please refer to the [documentation](https://qlib.readthedocs.io/en/latest/developer/how_to_build_image.html).\n\n## Auto Quant Research Workflow\nQlib provides a tool named `qrun` to run the whole workflow automatically (including building dataset, training models, backtest and evaluation). You can start an auto quant research workflow and have a graphical reports analysis according to the following steps: \n\n1. Quant Research Workflow: Run  `qrun` with lightgbm workflow config ([workflow_config_lightgbm_Alpha158.yaml](examples/benchmarks/LightGBM/workflow_config_lightgbm_Alpha158.yaml) as following.\n    ```bash\n      cd examples  # Avoid running program under the directory contains `qlib`\n      qrun benchmarks/LightGBM/workflow_config_lightgbm_Alpha158.yaml\n    ```\n    If users want to use `qrun` under debug mode, please use the following command:\n    ```bash\n    python -m pdb qlib/cli/run.py examples/benchmarks/LightGBM/workflow_config_lightgbm_Alpha158.yaml\n    ```\n    The result of `qrun` is as follows, please refer to [docs](https://qlib.readthedocs.io/en/latest/component/strategy.html#result) for more explanations about the result. \n\n    ```bash\n\n    'The following are analysis results of the excess return without cost.'\n                           risk\n    mean               0.000708\n    std                0.005626\n    annualized_return  0.178316\n    information_ratio  1.996555\n    max_drawdown      -0.081806\n    'The following are analysis results of the excess return with cost.'\n                           risk\n    mean               0.000512\n    std                0.005626\n    annualized_return  0.128982\n    information_ratio  1.444287\n    max_drawdown      -0.091078\n    ```\n    Here are detailed documents for `qrun` and [workflow](https://qlib.readthedocs.io/en/latest/component/workflow.html).\n\n2. Graphical Reports Analysis: First, run `python -m pip install .[analysis]` to install the required dependencies. Then run `examples/workflow_by_code.ipynb` with `jupyter notebook` to get graphical reports. \n    - Forecasting signal (model prediction) analysis\n      - Cumulative Return of groups\n      ![Cumulative Return](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_cumulative_return.png)\n      - Return distribution\n      ![long_short](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_long_short.png)\n      - Information Coefficient (IC)\n      ![Information Coefficient](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_IC.png)\n      ![Monthly IC](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_monthly_IC.png)\n      ![IC](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_NDQ.png)\n      - Auto Correlation of forecasting signal (model prediction)\n      ![Auto Correlation](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/analysis_model_auto_correlation.png)\n\n    - Portfolio analysis\n      - Backtest return\n      ![Report](https://github.com/microsoft/qlib/blob/main/docs/_static/img/analysis/report.png)\n      <!-- \n      - Score IC\n      ![Score IC](docs/_static/img/score_ic.png)\n      - Cumulative Return\n      ![Cumulative Return](docs/_static/img/cumulative_return.png)\n      - Risk Analysis\n      ![Risk Analysis](docs/_static/img/risk_analysis.png)\n      - Rank Label\n      ![Rank Label](docs/_static/img/rank_label.png)\n      -->\n   - [Explanation](https://qlib.readthedocs.io/en/latest/component/report.html) of above results\n\n## Building Customized Quant Research Workflow by Code\nThe automatic workflow may not suit the research workflow of all Quant researchers. To support a flexible Quant research workflow, Qlib also provides a modularized interface to allow researchers to build their own workflow by code. [Here](examples/workflow_by_code.ipynb) is a demo for customized Quant research workflow by code.\n\n# Main Challenges & Solutions in Quant Research\nQuant investment is a very unique scenario with lots of key challenges to be solved.\nCurrently, Qlib provides some solutions for several of them.\n\n## Forecasting: Finding Valuable Signals/Patterns\nAccurate forecasting of the stock price trend is a very important part to construct profitable portfolios.\nHowever, huge amount of data with various formats in the financial market which make it challenging to build forecasting models.\n\nAn increasing number of SOTA Quant research works/papers, which focus on building forecasting models to mine valuable signals/patterns in complex financial data, are released in `Qlib`\n\n\n### [Quant Model (Paper) Zoo](examples/benchmarks)\n\nHere is a list of models built on `Qlib`.\n- [GBDT based on XGBoost (Tianqi Chen, et al. KDD 2016)](examples/benchmarks/XGBoost/)\n- [GBDT based on LightGBM (Guolin Ke, et al. NIPS 2017)](examples/benchmarks/LightGBM/)\n- [GBDT based on Catboost (Liudmila Prokhorenkova, et al. NIPS 2018)](examples/benchmarks/CatBoost/)\n- [MLP based on pytorch](examples/benchmarks/MLP/)\n- [LSTM based on pytorch (Sepp Hochreiter, et al. Neural computation 1997)](examples/benchmarks/LSTM/)\n- [GRU based on pytorch (Kyunghyun Cho, et al. 2014)](examples/benchmarks/GRU/)\n- [ALSTM based on pytorch (Yao Qin, et al. IJCAI 2017)](examples/benchmarks/ALSTM)\n- [GATs based on pytorch (Petar Velickovic, et al. 2017)](examples/benchmarks/GATs/)\n- [SFM based on pytorch (Liheng Zhang, et al. KDD 2017)](examples/benchmarks/SFM/)\n- [TFT based on tensorflow (Bryan Lim, et al. International Journal of Forecasting 2019)](examples/benchmarks/TFT/)\n- [TabNet based on pytorch (Sercan O. Arik, et al. AAAI 2019)](examples/benchmarks/TabNet/)\n- [DoubleEnsemble based on LightGBM (Chuheng Zhang, et al. ICDM 2020)](examples/benchmarks/DoubleEnsemble/)\n- [TCTS based on pytorch (Xueqing Wu, et al. ICML 2021)](examples/benchmarks/TCTS/)\n- [Transformer based on pytorch (Ashish Vaswani, et al. NeurIPS 2017)](examples/benchmarks/Transformer/)\n- [Localformer based on pytorch (Juyong Jiang, et al.)](examples/benchmarks/Localformer/)\n- [TRA based on pytorch (Hengxu, Dong, et al. KDD 2021)](examples/benchmarks/TRA/)\n- [TCN based on pytorch (Shaojie Bai, et al. 2018)](examples/benchmarks/TCN/)\n- [ADARNN based on pytorch (YunTao Du, et al. 2021)](examples/benchmarks/ADARNN/)\n- [ADD based on pytorch (Hongshun Tang, et al.2020)](examples/benchmarks/ADD/)\n- [IGMTF based on pytorch (Wentao Xu, et al.2021)](examples/benchmarks/IGMTF/)\n- [HIST based on pytorch (Wentao Xu, et al.2021)](examples/benchmarks/HIST/)\n- [KRNN based on pytorch](examples/benchmarks/KRNN/)\n- [Sandwich based on pytorch](examples/benchmarks/Sandwich/)\n\nYour PR of new Quant models is highly welcomed.\n\nThe performance of each model on the `Alpha158` and `Alpha360` datasets can be found [here](examples/benchmarks/README.md).\n\n### Run a single model\nAll the models listed above are runnable with ``Qlib``. Users can find the config files we provide and some details about the model through the [benchmarks](examples/benchmarks) folder. More information can be retrieved at the model files listed above.\n\n`Qlib` provides three different ways to run a single model, users can pick the one that fits their cases best:\n- Users can use the tool `qrun` mentioned above to run a model's workflow based from a config file.\n- Users can create a `workflow_by_code` python script based on the [one](examples/workflow_by_code.py) listed in the `examples` folder.\n\n- Users can use the script [`run_all_model.py`](examples/run_all_model.py) listed in the `examples` folder to run a model. Here is an example of the specific shell command to be used: `python run_all_model.py run --models=lightgbm`, where the `--models` arguments can take any number of models listed above(the available models can be found  in [benchmarks](examples/benchmarks/)). For more use cases, please refer to the file's [docstrings](examples/run_all_model.py).\n    - **NOTE**: Each baseline has different environment dependencies, please make sure that your python version aligns with the requirements(e.g. TFT only supports Python 3.6~3.7 due to the limitation of `tensorflow==1.15.0`)\n\n### Run multiple models\n`Qlib` also provides a script [`run_all_model.py`](examples/run_all_model.py) which can run multiple models for several iterations. (**Note**: the script only support *Linux* for now. Other OS will be supported in the future. Besides, it doesn't support parallel running the same model for multiple times as well, and this will be fixed in the future development too.)\n\nThe script will create a unique virtual environment for each model, and delete the environments after training. Thus, only experiment results such as `IC` and `backtest` results will be generated and stored.\n\nHere is an example of running all the models for 10 iterations:\n```python\npython run_all_model.py run 10\n```\n\nIt also provides the API to run specific models at once. For more use cases, please refer to the file's [docstrings](examples/run_all_model.py). \n\n### Break change\nIn `pandas`, `group_key` is one of the parameters of the `groupby` method. From version 1.5 to 2.0 of `pandas`, the default value of `group_key` has been changed from `no default` to `True`, which will cause qlib to report an error during operation. So we set `group_key=False`, but it doesn't guarantee that some programmes will run correctly, including:\n* qlib\\examples\\rl_order_execution\\scripts\\gen_training_orders.py\n* qlib\\examples\\benchmarks\\TRA\\src\\dataset.MTSDatasetH.py\n* qlib\\examples\\benchmarks\\TFT\\tft.py\n\n\n\n## [Adapting to Market Dynamics](examples/benchmarks_dynamic)\n\nDue to the non-stationary nature of the environment of the financial market, the data distribution may change in different periods, which makes the performance of models build on training data decays in the future test data.\nSo adapting the forecasting models/strategies to market dynamics is very important to the model/strategies' performance.\n\nHere is a list of solutions built on `Qlib`.\n- [Rolling Retraining](examples/benchmarks_dynamic/baseline/)\n- [DDG-DA on pytorch (Wendi, et al. AAAI 2022)](examples/benchmarks_dynamic/DDG-DA/)\n\n##  Reinforcement Learning: modeling continuous decisions\nQlib now supports reinforcement learning, a feature designed to model continuous investment decisions. This functionality assists investors in optimizing their trading strategies by learning from interactions with the environment to maximize some notion of cumulative reward.\n\nHere is a list of solutions built on `Qlib` categorized by scenarios.\n\n### [RL for order execution](examples/rl_order_execution)\n[Here](https://qlib.readthedocs.io/en/latest/component/rl/overall.html#order-execution) is the introduction of this scenario.  All the methods below are compared [here](examples/rl_order_execution).\n- [TWAP](examples/rl_order_execution/exp_configs/backtest_twap.yml)\n- [PPO: \"An End-to-End Optimal Trade Execution Framework based on Proximal Policy Optimization\", IJCAL 2020](examples/rl_order_execution/exp_configs/backtest_ppo.yml)\n- [OPDS: \"Universal Trading for Order Execution with Oracle Policy Distillation\", AAAI 2021](examples/rl_order_execution/exp_configs/backtest_opds.yml)\n\n# Quant Dataset Zoo\nDataset plays a very important role in Quant. Here is a list of the datasets built on `Qlib`:\n\n| Dataset                                    | US Market | China Market |\n| --                                         | --        | --           |\n| [Alpha360](./qlib/contrib/data/handler.py) |  √        |  √           |\n| [Alpha158](./qlib/contrib/data/handler.py) |  √        |  √           |\n\n[Here](https://qlib.readthedocs.io/en/latest/advanced/alpha.html) is a tutorial to build dataset with `Qlib`.\nYour PR to build new Quant dataset is highly welcomed.\n\n\n# Learning Framework\nQlib is high customizable and a lot of its components are learnable.\nThe learnable components are instances of `Forecast Model` and `Trading Agent`. They are learned based on the `Learning Framework` layer and then applied to multiple scenarios in `Workflow` layer.\nThe learning framework leverages the `Workflow` layer as well(e.g. sharing `Information Extractor`, creating environments based on `Execution Env`).\n\nBased on learning paradigms, they can be categorized into reinforcement learning and supervised learning.\n- For supervised learning, the detailed docs can be found [here](https://qlib.readthedocs.io/en/latest/component/model.html).\n- For reinforcement learning, the detailed docs can be found [here](https://qlib.readthedocs.io/en/latest/component/rl.html). Qlib's RL learning framework leverages `Execution Env` in `Workflow` layer to create environments.  It's worth noting that `NestedExecutor` is supported as well. This empowers users to optimize different level of strategies/models/agents together (e.g. optimizing an order execution strategy for a specific portfolio management strategy).\n\n\n# More About Qlib\nIf you want to have a quick glance at the most frequently used components of qlib, you can try notebooks [here](examples/tutorial/).\n\nThe detailed documents are organized in [docs](docs/).\n[Sphinx](http://www.sphinx-doc.org) and the readthedocs theme is required to build the documentation in html formats. \n```bash\ncd docs/\nconda install sphinx sphinx_rtd_theme -y\n# Otherwise, you can install them with pip\n# pip install sphinx sphinx_rtd_theme\nmake html\n```\nYou can also view the [latest document](http://qlib.readthedocs.io/) online directly.\n\nQlib is in active and continuing development. Our plan is in the roadmap, which is managed as a [github project](https://github.com/microsoft/qlib/projects/1).\n\n\n\n# Offline Mode and Online Mode\nThe data server of Qlib can either deployed as `Offline` mode or `Online` mode. The default mode is offline mode.\n\nUnder `Offline` mode, the data will be deployed locally. \n\nUnder `Online` mode, the data will be deployed as a shared data service. The data and their cache will be shared by all the clients. The data retrieval performance is expected to be improved due to a higher rate of cache hits. It will consume less disk space, too. The documents of the online mode can be found in [Qlib-Server](https://qlib-server.readthedocs.io/). The online mode can be deployed automatically with [Azure CLI based scripts](https://qlib-server.readthedocs.io/en/latest/build.html#one-click-deployment-in-azure). The source code of online data server can be found in [Qlib-Server repository](https://github.com/microsoft/qlib-server).\n\n## Performance of Qlib Data Server\nThe performance of data processing is important to data-driven methods like AI technologies. As an AI-oriented platform, Qlib provides a solution for data storage and data processing. To demonstrate the performance of Qlib data server, we\ncompare it with several other data storage solutions. \n\nWe evaluate the performance of several storage solutions by finishing the same task,\nwhich creates a dataset (14 features/factors) from the basic OHLCV daily data of a stock market (800 stocks each day from 2007 to 2020). The task involves data queries and processing.\n\n|                         | HDF5      | MySQL     | MongoDB   | InfluxDB  | Qlib -E -D  | Qlib +E -D   | Qlib +E +D  |\n| --                      | ------    | ------    | --------  | --------- | ----------- | ------------ | ----------- |\n| Total (1CPU) (seconds)  | 184.4±3.7 | 365.3±7.5 | 253.6±6.7 | 368.2±3.6 | 147.0±8.8   | 47.6±1.0     | **7.4±0.3** |\n| Total (64CPU) (seconds) |           |           |           |           | 8.8±0.6     | **4.2±0.2**  |             |\n* `+(-)E` indicates with (out) `ExpressionCache`\n* `+(-)D` indicates with (out) `DatasetCache`\n\nMost general-purpose databases take too much time to load data. After looking into the underlying implementation, we find that data go through too many layers of interfaces and unnecessary format transformations in general-purpose database solutions.\nSuch overheads greatly slow down the data loading process.\nQlib data are stored in a compact format, which is efficient to be combined into arrays for scientific computation.\n\n# Related Reports\n- [Guide To Qlib: Microsoft’s AI Investment Platform](https://analyticsindiamag.com/qlib/)\n- [微软也搞AI量化平台？还是开源的！](https://mp.weixin.qq.com/s/47bP5YwxfTp2uTHjUBzJQQ)\n- [微矿Qlib：业内首个AI量化投资开源平台](https://mp.weixin.qq.com/s/vsJv7lsgjEi-ALYUz4CvtQ)\n\n# Contact Us\n- If you have any issues, please create issue [here](https://github.com/microsoft/qlib/issues/new/choose) or send messages in [gitter](https://gitter.im/Microsoft/qlib).\n- If you want to make contributions to `Qlib`, please [create pull requests](https://github.com/microsoft/qlib/compare). \n- For other reasons, you are welcome to contact us by email([qlib@microsoft.com](mailto:qlib@microsoft.com)).\n  - We are recruiting new members(both FTEs and interns), your resumes are welcome!\n\nJoin IM discussion groups:\n|[Gitter](https://gitter.im/Microsoft/qlib)|\n|----|\n|![image](https://github.com/microsoft/qlib/blob/main/docs/_static/img/qrcode/gitter_qr.png)|\n\n# Contributing\nWe appreciate all contributions and thank all the contributors!\n<a href=\"https://github.com/microsoft/qlib/graphs/contributors\"><img src=\"https://contrib.rocks/image?repo=microsoft/qlib\" /></a>\n\nBefore we released Qlib as an open-source project on Github in Sep 2020, Qlib is an internal project in our group. Unfortunately, the internal commit history is not kept. A lot of members in our group have also contributed a lot to Qlib, which includes Ruihua Wang, Yinda Zhang, Haisu Yu, Shuyu Wang, Bochen Pang, and [Dong Zhou](https://github.com/evanzd/evanzd). Especially thanks to [Dong Zhou](https://github.com/evanzd/evanzd) due to his initial version of Qlib.\n\n## Guidance\n\nThis project welcomes contributions and suggestions.  \n**Here are some \n[code standards and development guidance](docs/developer/code_standard_and_dev_guide.rst) for submiting a pull request.**\n\nMaking contributions is not a hard thing. Solving an issue(maybe just answering a question raised in [issues list](https://github.com/microsoft/qlib/issues) or [gitter](https://gitter.im/Microsoft/qlib)), fixing/issuing a bug, improving the documents and even fixing a typo are important contributions to Qlib.\n\nFor example, if you want to contribute to Qlib's document/code, you can follow the steps in the figure below.\n<p align=\"center\">\n  <img src=\"https://github.com/demon143/qlib/blob/main/docs/_static/img/change%20doc.gif\" />\n</p>\n\nIf you don't know how to start to contribute, you can refer to the following examples.\n| Type | Examples |\n| -- | -- |\n| Solving issues | [Answer a question](https://github.com/microsoft/qlib/issues/749);  [issuing](https://github.com/microsoft/qlib/issues/765) or [fixing](https://github.com/microsoft/qlib/pull/792) a bug |\n| Docs | [Improve docs quality](https://github.com/microsoft/qlib/pull/797/files) ;  [Fix a typo](https://github.com/microsoft/qlib/pull/774) | \n| Feature |  Implement a [requested feature](https://github.com/microsoft/qlib/projects) like [this](https://github.com/microsoft/qlib/pull/754); [Refactor interfaces](https://github.com/microsoft/qlib/pull/539/files) |\n| Dataset | [Add a dataset](https://github.com/microsoft/qlib/pull/733) | \n| Models |  [Implement a new model](https://github.com/microsoft/qlib/pull/689), [some instructions to contribute models](https://github.com/microsoft/qlib/tree/main/examples/benchmarks#contributing) |\n\n[Good first issues](https://github.com/microsoft/qlib/labels/good%20first%20issue) are labelled to indicate that they are easy to start your contributions.\n\nYou can find some impefect implementation in Qlib by  `rg 'TODO|FIXME' qlib`\n \nIf you would like to become one of Qlib's maintainers to contribute more (e.g. help merge PR, triage issues), please contact us by email([qlib@microsoft.com](mailto:qlib@microsoft.com)).  We are glad to help to upgrade your permission.\n\n## License\nMost contributions require you to agree to a\nContributor License Agreement (CLA) declaring that you have the right to, and actually do, grant us\nthe right to use your contribution. For details, visit https://cla.opensource.microsoft.com.\n\nWhen you submit a pull request, a CLA bot will automatically determine whether you need to provide\na CLA and decorate the PR appropriately (e.g., status check, comment). Simply follow the instructions\nprovided by the bot. You will only need to do this once across all repos using our CLA.\n\nThis project has adopted the [Microsoft Open Source Code of Conduct](https://opensource.microsoft.com/codeofconduct/).\nFor more information see the [Code of Conduct FAQ](https://opensource.microsoft.com/codeofconduct/faq/) or\ncontact [opencode@microsoft.com](mailto:opencode@microsoft.com) with any additional questions or comments.\n","summary":"QLib is a Python library designed for end‑to‑end quantitative finance research, streamlining data ingestion, feature engineering, factor discovery, model training, back‑testing, and portfolio optimization.  It offers automated factor mining, reinforcement‑learning training pipelines, and recent LLM‑driven tools (RD‑Agent) that can propose new factors and optimize models directly from data and reports.  The framework ships with high‑performance back‑testing engines, support for advanced neural models like KRNN, and an extensible plug‑in architecture for adding custom strategies.  Quantitative researchers, data scientists, and fintech developers working on algorithmic trading and strategy deployment will find QLib useful for prototyping, research, and productionizing models.","description":"Qlib is an AI-oriented Quant investment platform that aims to use AI tech to empower Quant Research, from exploring ideas to implementing productions. Qlib supports diverse ML modeling paradigms, including supervised learning, market dynamics modeling, and RL, and is now equipped with https://github.com/microsoft/RD-Agent to automate R&D process.","stars":41109,"language":"Python"},{"owner":"TheWicklowWolf","repo":"Lidify","url":"https://github.com/TheWicklowWolf/Lidify","readme":"![Build Status](https://github.com/TheWicklowWolf/Lidify/actions/workflows/main.yml/badge.svg)\r\n![Docker Pulls](https://img.shields.io/docker/pulls/thewicklowwolf/lidify.svg)\r\n\r\n\r\n<p align=\"center\">\r\n  <img src=\"/src/static/lidify.png\" alt=\"image\">\r\n</p>\r\n\r\nMusic discovery tool that provides recommendations based on selected Lidarr artists.  \r\n\r\n#### Note:\r\nAs of November 2024 changes to the Spotify API prevent its use in this application, see https://github.com/TheWicklowWolf/Lidify/issues/24 for details.  \r\nThis application now exclusively supports Last.fm. To integrate it, log in to your Last.fm account and create an API account at [this page](https://www.last.fm/api/account/create). Then, copy the provided API key and secret into the Docker Compose configuration.  \r\n\r\n\r\n## Run using docker-compose\r\n\r\n```yaml\r\nservices:\r\n  lidify:\r\n    image: thewicklowwolf/lidify:latest\r\n    container_name: lidify\r\n    volumes:\r\n      - /path/to/config:/lidify/config\r\n      - /etc/localtime:/etc/localtime:ro\r\n    ports:\r\n      - 5000:5000\r\n    restart: unless-stopped\r\n    environment:\r\n      - last_fm_api_key=<insert>\r\n      - last_fm_api_secret=<insert>\r\n      - mode=LastFM\r\n```\r\n\r\n## Configuration via environment variables\r\n\r\nCertain values can be set via environment variables:\r\n\r\n* __PUID__: The user ID to run the app with. Defaults to `1000`. \r\n* __PGID__: The group ID to run the app with. Defaults to `1000`.\r\n* __lidarr_address__: The URL for Lidarr. Defaults to `http://192.168.1.2:8686`. Can be configured from the application as well.\r\n* __lidarr_api_key__: The API key for Lidarr. Defaults to ``. Can be configured from the application as well.\r\n* __root_folder_path__: The root folder path for music. Defaults to `/data/media/music/`. Can be configured from the application as well.\r\n* __spotify_client_id__: The Client ID for Spotify. Defaults to ``. Can be configured from the application as well, but see https://github.com/TheWicklowWolf/Lidify/issues/24 .\r\n* __spotify_client_secret__: The Client Secret for Spotify. Defaults to ``. Can be configured from the application as well, but see https://github.com/TheWicklowWolf/Lidify/issues/24 .\r\n* __fallback_to_top_result__: Whether to use the top result if no match is found. Defaults to `False`.\r\n* __lidarr_api_timeout__: Timeout duration for Lidarr API calls. Defaults to `120`.\r\n* __quality_profile_id__: Quality profile ID in Lidarr. Defaults to `1`.\r\n* __metadata_profile_id__: Metadata profile ID in Lidarr. Defaults to `1`\r\n* __search_for_missing_albums__: Whether to start searching for albums when adding artists. Defaults to `False`\r\n* __dry_run_adding_to_lidarr__: Whether to run without adding artists in Lidarr. Defaults to `False`\r\n* __app_name__: Name of the application. Defaults to `Lidify`.\r\n* __app_rev__: Application revision. Defaults to `0.01`.\r\n* __app_url__: URL of the application. Defaults to `Random URL`.\r\n* __last_fm_api_key__: The API key for LastFM. Defaults to ``.\r\n* __last_fm_api_secret__: The API secret for LastFM. Defaults to ``.\r\n* __mode__: Mode for discovery (Spotify or LastFM). Defaults to `Spotify`.\r\n* __auto_start__: Whether to run automatically at startup. Defaults to `False`.\r\n* __auto_start_delay__: Delay duration for Auto Start in Seconds (if enabled). Defaults to `60`.\r\n\r\n---\r\n\r\n<p align=\"center\">\r\n  <img src=\"/src/static/light.png\" alt=\"image\">\r\n</p>\r\n\r\n<p align=\"center\">\r\n  <img src=\"/src/static/dark.png\" alt=\"image\">\r\n</p>\r\n\r\n---\r\n\r\nhttps://hub.docker.com/r/thewicklowwolf/lidify\r\n","summary":"Lidify is a lightweight web service that recommends new music based on the artists already in your Lidarr collection, using the Last FM API to surface related releases. It runs as a Docker container that can be configured through environment variables or a `docker‑compose` file, exposing a 5000‑port interface and offering options such as automatic startup, dry‑run mode, and configurable Lidarr quality or metadata profiles. The tool gathers recommendations, optionally falling back to top matches when exact matches aren’t found, and integrates cleanly with your existing Lidarr setup. Musicians and hobbyists who maintain a Lidarr‑managed library and want an automated, data‑driven way to discover new albums will benefit from this handy add‑on.","description":"Music discovery tool that provides recommendations based on selected Lidarr artists, using Spotify or LastFM.","stars":541,"language":"Python"},{"owner":"enchant97","repo":"note-mark","url":"https://github.com/enchant97/note-mark","readme":"<img src=\"frontend/public/icon.svg\" width=200 height=200>\n\n# Note Mark\n![License: AGPL V3](https://img.shields.io/github/license/enchant97/note-mark?style=flat-square)\n![GitHub Latest Release](https://img.shields.io/github/v/release/enchant97/note-mark?include_prereleases&label=latest%20release&style=flat-square)\n\nNote Mark is a lighting fast and minimal; web-based Markdown notes app. Featuring a sleek and responsive web UI.\n\n> [!IMPORTANT]\n> Working on V1, V0.19 will implement a migrate/export utility and project will be maintenance only until release of V1.\n> Stay tuned!\n\n## Features\n- Markdown (GitHub Flavored Markdown, see spec [here](https://github.github.com/gfm/))\n- HTML sanitisation, minimizing XSS attacks\n- Mobile Friendly\n- Friendly URLs for cleaner links\n- Dark & Light Theme\n- Notebook Sharing\n- Custom flat-file based storage system\n- Multiple views for a note (rendered, plain)\n- Lighting fast editor with shortcuts\n- Upload and attach assets\n- OIDC support for Single-Sign-On\n\n## Showcase\n![Preview Image Showing App](site/static/preview.webp)\n\n## Demo Video\n[![Demo Video](https://img.youtube.com/vi/rwL99Ac5g98/0.jpg)](https://youtu.be/rwL99Ac5g98 \"Demo Video\")\n\n<https://youtu.be/rwL99Ac5g98>\n\n## Docs\nDocumentation is available here: [notemark.docs.enchantedcode.co.uk](https://notemark.docs.enchantedcode.co.uk/).\n\n> Checkout the [roadmap here](https://github.com/users/enchant97/projects/7).\n\n## Support Me\nLike this project? Consider supporting me financially so I can continue development.\n\n<a href=\"https://www.buymeacoffee.com/leospratt\" target=\"_blank\"><img src=\"https://cdn.buymeacoffee.com/buttons/v2/default-blue.png\" alt=\"Buy Me A Coffee\" height=60></a>\n\n> Please note I currently do not accept paid incentives for features.\n\n## License\nThis project is Copyright (c) 2024 Leo Spratt, licences shown below:\n\nCode\n\n    AGPL-3.0. Full license found in `LICENSE.txt`\n\nIcon / Mark\n\n    All Rights Reserved\n","summary":"Note Mark is a lightweight, web‑based Markdown note‑taking application that prioritizes speed and a clean interface. It supports GitHub‑flavored Markdown with HTML sanitisation, offers a dark/light theme, mobile‑friendly layout, and friendly URLs, while providing multiple viewing modes, asset uploads, and a flat‑file storage system. The app also includes a notebook‑sharing feature, OIDC single‑sign‑on, and a fast editor featuring keyboard shortcuts. It is ideal for developers, writers, or anyone looking for a quick, privacy‑first Markdown editor that can run entirely in the browser or on a simple server.","description":"Note Mark is a lighting fast, web-based Markdown notes app.","stars":633,"language":"TypeScript"},{"owner":"MrModest","repo":"reisenotiz","url":"https://github.com/MrModest/reisenotiz","readme":"# Reisenotiz\n\nA self-hosted, offline-first travel notes built as a PWA for keeping track of trips, flights, accommodations, and travel documents — all stored locally in your browser.\n\n> **MVP Stage** — This project is in early development. Features are limited, data is stored in browser localStorage only (no backend sync yet), and breaking changes may occur. Use at your own risk and back up any important data.\n\n## Screenshots\n\n\n<https://github.com/user-attachments/assets/1a491a52-49dc-49fb-a3d8-6cfdd83132aa>\n\n![](docs/screenshots/TripTimeline.png)\n![](docs/screenshots/FlightView.png)\n![](docs/screenshots/HotelView.png)\n\n## Features\n\n- **Trip Management** — Create and organize trips with timeline views\n- **Flight Tracking** — Log flights with airport lookup (IATA codes, timezones)\n- **Accommodations** — Track hotels and other lodging with check-in/out details\n- **Custom Records** — Save your own airports and accommodation sites for quick reuse\n- **Offline-First PWA** — Works without internet, installable on mobile and desktop\n- **Dark Mode** — Light and dark theme support\n- **Passenger Management** — Track travelers across trip items\n- **Attachment Support** — Add notes and attachments to trip items\n\n## Installation\n\n### Docker Compose (example)\n\n```yaml\nservices:\n  app:\n    image: ghcr.io/mrmodest/reisenotiz:edge-amd64 # change tag to `edge-arm64` for ARM64 builds\n    ports:\n      - \"8080:8080\"\n    # Uncomment to run with custom UID/GID\n    # user: \"1000:1000\"\n    restart: unless-stopped\n```\n\n1. Open [http://localhost:8080](http://localhost:8080) in your browser.\n\n### Build from source\n\nRequires Node.js 24+ and pnpm.\n\n```bash\npnpm install\npnpm build\npnpm preview\n```\n\n## Roadmap\n\nSee [ROADMAP.md](./ROADMAP.md) for planned features and future direction.\n\n## AI Disclamer\n\n- The project is defenetely **NOT** vibe-coded.\n- I'm a Software Engineer, and I wrote the majority of the code manually myself.\n- I do use AI, but do not trust it more than I would trust a random answer from Stack Overflow\n- I won't accept AI's code until it fits my vision of code quality. I feed it with code examples written by myself manually.\n- Even by the app UX/UI you can see that AI would generate something less shitty than I did :D\n\n## License\n\n### TLDR:\n- BSL 1.1 (Source-available; fair code)\n- Free forever for private/non-commercial use.\n- Restricted for commercial use.\n\n### Why not fully Open Source?\nI want to keep the option open to run a paid hosted version in the future without ending up competing against my own code.\n\nI also don’t like the “open core” model. Splitting the product into free vs paid features always feels messy. If I give something away, I want it to be the full version — not a crippled one.\n\nThat’s why I went with BSL.\nFor me it’s a good middle ground:\n\n* free and complete for personal use\n* still leaves room to build a business later\n\nAlso, this isn’t a library you embed into your own product. It’s a standalone app meant to be used as-is. That’s another reason why this tradeoff feels reasonable to me.\n\nSo yeah — it’s not truly open source.\nBut I think it fits well into the idea of “fair code”.\n\nMore on that: [https://fair.io/licenses/](https://fair.io/licenses/)\n","summary":"Reisenotiz is a self‑hosted, offline‑first PWA that lets travelers keep detailed logs of trips, flights, accommodations, and travel documents entirely within their browser. The app offers trip management with timeline views, flight and hotel tracking with IATA lookup, custom record creation, passenger management, attachment support, and light/dark mode, all usable without an internet connection. It is ideal for solo globe‑trotters, travel agents, or anyone who prefers a private, installable solution over cloud‑based travel journals. The project is early‑stage, data lives in localStorage, and future releases may add backend sync and new features.","description":"Offline-first travel notes for tracking trips, flights, accommodations, and travel documents","stars":34,"language":"TypeScript"},{"owner":"bartvantuijn","repo":"noton","url":"https://github.com/bartvantuijn/noton","readme":"<p align=\"center\">\n    <img src=\"public/images/logo.svg\" width=\"250\" alt=\"Noton Logo\">\n</p>\n\nA free and open documentation platform built with [Laravel][laravel] and [Filament][filament], enhanced by [Ollama][ollama] and [OpenClaw][openclaw] for private AI features, focused on clarity, structure, and self-hosted simplicity.\n\n---\n\n> Please note that **Noton** is still under active development\n\n## Installation\n\nSee [setup instructions][setup] for how to self-host Noton with [Docker][docker] or run it locally.\n\n## Local AI\n\nNoton integrates with [Ollama][ollama] and [OpenClaw][openclaw] to provide **private** AI features.\nYou can choose the active provider, and all prompts and answers stay on your own server – no external API calls are made.\n\n> Please note that AI models are resource-intensive, you may need to choose a model that fits your host\n\n---\n\n### License\n\nNoton is licensed under the _Functional Source License, Version 1.1_. It's free to use for\ninternal and non-commercial purposes, but it's not allowed to use a release for commercial purposes (competing use). See our [full license][license] for more details.\n\n### Contributing\n\nThis project is under active development. Contributions are welcome.\n\n---\n\n## Screenshots\n\n![Screenshot](screenshots/screenshot.png)\n![Screenshot](screenshots/screenshot(1).png)\n![Screenshot](screenshots/screenshot(2).png)\n![Screenshot](screensh
