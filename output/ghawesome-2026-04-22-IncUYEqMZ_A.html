edium.com/@chrisveleris/designing-a-life-management-system-that-doesnt-fight-back-2fd58773e857)\n- [From Task to Table: How I Finally Got to the Korean Burger](https://medium.com/@chrisveleris/from-task-to-table-how-i-finally-got-to-the-korean-burger-01245a14d491)\n\n## ✨ Features\n\n- **Task Management**: Create, update, and delete tasks. Mark tasks as completed and view them by different filters (Today, Upcoming, Someday). Order them by Name, Due Date, Date Created, or Priority.\n- **Subtasks**: Break down complex tasks into smaller, manageable subtasks with progress tracking and seamless navigation.\n- **Recurring Tasks**: Comprehensive recurring task system with intelligent parent-child relationships:\n    - **Multiple Recurrence Patterns**: Daily, weekly, monthly, monthly on specific weekdays, and monthly last day\n    - **Completion-Based Recurrence**: Option to repeat based on completion date rather than due date\n    - **Smart Parent-Child Linking**: Generated task instances maintain connection to their original recurring pattern\n    - **Direct Parent Editing**: Edit recurrence settings directly from any generated task instance\n    - **Flexible Scheduling**: Set custom intervals (every 2 weeks, every 3 months, etc.)\n    - **End Date Control**: Optional end dates for recurring series\n- **Project Sharing & Collaboration**: Share projects with team members and collaborate effectively\n- **Quick Notes**: Create, update, delete, or assign text notes to projects.\n- **Tags**: Create tags for tasks and notes to enhance organization.\n- **Project Tracking**: Organize tasks into projects. Each project can contain multiple tasks and/or multiple notes.\n- **Area Categorization**: Group projects into areas for better organization and focus.\n- **Due Date Tracking**: Set due dates for tasks and view them based on due date categories.\n- **Responsive Design**: Accessible from various devices, ensuring a consistent experience across desktops, tablets, and mobile phones.\n- **Multi-Language Support**: Available in 24 languages with full localization support for a truly global productivity experience.\n- **Telegram Integration**:\n    - Create tasks directly through Telegram messages\n    - Receive daily digests of your tasks\n    - Quick capture of ideas and todos on the go\n- **Open API & Access Tokens**: Versioned Swagger docs exposed at `/api/v1` plus personal API keys for integrating tududi with your own tooling or automations.\n- **OIDC/SSO Authentication**: Enterprise-ready Single Sign-On support with:\n    - Multiple OIDC providers (Google, Okta, Keycloak, Authentik, PocketID, Azure AD, and more)\n    - Just-In-Time (JIT) user provisioning\n    - Account linking for hybrid authentication\n    - Simple .env-based configuration perfect for self-hosters\n    - Automatic admin role assignment based on email domains\n- **CalDAV Synchronization**: Industry-standard CalDAV protocol support for seamless task syncing:\n    - Bidirectional sync with CalDAV servers (Nextcloud, Baikal, and more)\n    - Access tasks from popular clients (tasks.org, Apple Reminders, Thunderbird, Evolution)\n    - Full recurring task support with RRULE\n    - Conflict detection and resolution\n    - Background automatic synchronization\n    - HTTP Basic Authentication for CalDAV clients\n\n## 🗺️ Roadmap\n\nCheck out our [GitHub Project](https://github.com/users/chrisvel/projects/2) for planned features and progress.\n\n## 🛠️ Getting Started\n\nGet up and running quickly with our comprehensive documentation:\n\n### Quick Start\n\n```bash\ndocker pull chrisvel/tududi:latest\n\ndocker run \\\n  -e TUDUDI_USER_EMAIL=admin@example.com \\\n  -e TUDUDI_USER_PASSWORD=your-secure-password \\\n  -e TUDUDI_SESSION_SECRET=$(openssl rand -hex 64) \\\n  -v ~/tududi_db:/app/backend/db \\\n  -v ~/tududi_uploads:/app/backend/uploads \\\n  -p 3002:3002 \\\n  -d chrisvel/tududi:latest\n```\n\nNavigate to [http://localhost:3002](http://localhost:3002) and login with your credentials.\n\n### Reverse Proxy Setup\n\nWhen running behind a reverse proxy (Caddy, Nginx, Traefik, etc.), set `TUDUDI_TRUST_PROXY` so that Express correctly reads client IPs from `X-Forwarded-For` headers. Without this, `express-rate-limit` will log a validation error.\n\n```bash\ndocker run \\\n  -e TUDUDI_TRUST_PROXY=true \\\n  -e TUDUDI_ALLOWED_ORIGINS=https://your-domain.com \\\n  ...\n```\n\n| Value | Meaning |\n|-------|---------|\n| `true` | Trust all proxies (simplest option for single-proxy setups) |\n| `1` | Trust the first hop only |\n| `loopback` | Trust loopback addresses (127.0.0.1/::1) |\n| `172.16.0.0/12` | Trust a specific subnet |\n\n### OIDC/SSO Authentication\n\nTududi supports Single Sign-On via OpenID Connect (OIDC), allowing users to authenticate with external identity providers.\n\n**Quick Setup (Single Provider):**\n\n```bash\ndocker run \\\n  -e OIDC_ENABLED=true \\\n  -e OIDC_PROVIDER_NAME=Google \\\n  -e OIDC_PROVIDER_SLUG=google \\\n  -e OIDC_ISSUER_URL=https://accounts.google.com \\\n  -e OIDC_CLIENT_ID=your-client-id.apps.googleusercontent.com \\\n  -e OIDC_CLIENT_SECRET=your-client-secret \\\n  -e OIDC_SCOPE=\"openid profile email\" \\\n  -e OIDC_AUTO_PROVISION=true \\\n  -e TUDUDI_BASE_URL=https://your-domain.com \\\n  ...\n```\n\n**Multiple Providers:**\n\n```bash\n# Provider 1: Google\n-e OIDC_PROVIDER_1_NAME=Google \\\n-e OIDC_PROVIDER_1_SLUG=google \\\n-e OIDC_PROVIDER_1_ISSUER=https://accounts.google.com \\\n-e OIDC_PROVIDER_1_CLIENT_ID=xxx \\\n-e OIDC_PROVIDER_1_CLIENT_SECRET=xxx \\\n\n# Provider 2: Company SSO\n-e OIDC_PROVIDER_2_NAME=\"Company SSO\" \\\n-e OIDC_PROVIDER_2_SLUG=okta \\\n-e OIDC_PROVIDER_2_ISSUER=https://company.okta.com \\\n-e OIDC_PROVIDER_2_CLIENT_ID=yyy \\\n-e OIDC_PROVIDER_2_CLIENT_SECRET=yyy \\\n-e OIDC_PROVIDER_2_ADMIN_EMAIL_DOMAINS=company.com \\\n```\n\n**Supported Providers:** Google, Okta, Keycloak, Authentik, PocketID, Azure AD, and any OIDC-compliant provider\n\n**Key Features:**\n- Automatic user provisioning on first login\n- Account linking for existing users\n- Admin role assignment based on email domains\n- Hybrid authentication (email/password + SSO)\n\n**Documentation:** See [docs/10-oidc-sso.md](docs/10-oidc-sso.md) for detailed setup guides and provider-specific configuration.\n\n### CalDAV Synchronization\n\nTududi supports the industry-standard CalDAV protocol, enabling seamless task synchronization with popular CalDAV clients and servers.\n\n**Quick Setup:**\n\n```bash\ndocker run \\\n  -e CALDAV_ENABLED=true \\\n  -e ENCRYPTION_KEY=$(openssl rand -hex 32) \\\n  ...\n```\n\n**Supported Clients:**\n- **tasks.org** (Android/iOS) - Full task management with recurring tasks\n- **Apple Reminders** (iOS/macOS) - Native iOS/macOS integration\n- **Thunderbird** (Desktop) - Advanced task features\n- **Evolution** (Linux) - Full CalDAV compatibility\n\n**Sync with External Servers:**\n\nConnect Tududi to external CalDAV servers like Nextcloud, Baikal, or other CalDAV-compatible services for bidirectional synchronization.\n\n**Key Features:**\n- Bidirectional sync (local ↔ remote)\n- Full recurring task support with RRULE\n- Conflict detection and resolution\n- Background automatic synchronization\n- HTTP Basic Authentication\n- Encrypted password storage (AES-256-GCM)\n\n**Documentation:** See [docs/11-caldav-sync.md](docs/11-caldav-sync.md) for client setup guides, server configuration, and troubleshooting.\n\n### 📚 Documentation\n\nFor detailed setup instructions, configuration options, and getting started guides, visit:\n\n**[docs.tududi.com](https://docs.tududi.com)**\n\n- **[Installation Guide](https://docs.tududi.com/getting-started/installation)** - Docker, development setup, and deployment\n- **[Configuration](https://docs.tududi.com/getting-started/configuration)** - Environment variables and advanced settings\n- **[First Steps](https://docs.tududi.com/getting-started/first-steps)** - Learn the basics and get productive\n- **[Project Sharing](https://docs.tududi.com/features/project-sharing)** - Collaborate with your team\n\n## 🚧 Development\n\nWant to contribute or run Tududi from source? Check out our comprehensive development guide:\n\n**[Development Setup Guide](https://docs.tududi.com/#-development-setup)**\n\nQuick overview:\n\n```bash\n# Clone and install\ngit clone https://github.com/chrisvel/tududi.git\ncd tududi\nnpm install\n\n# Start development servers\nnpm run backend:dev   # Terminal 1 - Backend on :3001\nnpm run frontend:dev  # Terminal 2 - Frontend on :8080\n```\n\nFor database management, testing, and detailed development instructions, see [docs.tududi.com](https://docs.tududi.com)\n\n## 🔌 API\n\nTududi provides a comprehensive REST API for integration with external tools and automation workflows.\n\n**Base URL:** `http://localhost:8080/api/v1`\n\n**Key Features:**\n- Complete CRUD operations for tasks, projects, notes, and areas\n- Personal API keys for secure access\n- Swagger documentation available at `/api-docs` (requires authentication)\n- Support for recurring tasks, subtasks, and tag management\n- Real-time task metrics and productivity insights\n\n**Authentication:** Uses session cookies or Bearer token authentication. Generate personal API keys through the web interface for programmatic access.\n\n**Quick Example:**\n```bash\n# Get all tasks\ncurl -H \"Authorization: Bearer YOUR_API_KEY\" \\\n     http://localhost:3002/api/v1/tasks\n\n# Create a new task\ncurl -X POST \\\n     -H \"Authorization: Bearer YOUR_API_KEY\" \\\n     -H \"Content-Type: application/json\" \\\n     -d '{\"name\":\"Complete API documentation\",\"priority\":\"medium\"}' \\\n     http://localhost:3002/api/v1/task\n```\n\nFor full API documentation, visit `/api-docs` after authentication or check the Swagger schema definitions in [`backend/config/swagger.js`](backend/config/swagger.js).\n\n## 🤝 Contributing\n\nContributions to tududi are welcome! Whether it's bug fixes, new features, documentation improvements, or translations, we appreciate your help.\n\n**Before you start:**\n\n- Check [existing issues](https://github.com/chrisvel/tududi/issues) and [discussions](https://github.com/chrisvel/tududi/discussions) to avoid duplicate work\n- For bugs, [open an issue](https://github.com/chrisvel/tududi/issues/new/choose) with the bug report template\n- For feature requests, start a [discussion](https://github.com/chrisvel/tududi/discussions/categories/feature-requests)\n\n**Quick contribution workflow:**\n\n1. Fork the repository\n2. Create a feature branch (`git checkout -b feature/amazing-feature`)\n3. Make your changes following our [code standards](.github/CONTRIBUTING.md#code-standards)\n4. Run linting and tests: `npm run pre-push`\n5. Commit your changes with a clear message\n6. Push to your fork and open a Pull Request\n\n**Read our [Contributing Guide](.github/CONTRIBUTING.md) for:**\n\n- Development setup and workflow\n- Code standards and best practices\n- Testing requirements\n- Database migrations\n- Translation guidelines\n- Pull request checklist\n\n## 📜 License\n\nThis project is licensed under the [MIT License](LICENSE).\n\n## 📬 Contact\n\nFor questions or comments, please [open an issue](https://github.com/chrisvel/tududi/issues) or contact the developer directly.\n\nJoin the tududi community:\n\n[![Discord](https://img.shields.io/badge/Discord-Join%20Server-7289da?logo=discord&logoColor=white&style=for-the-badge)](https://discord.gg/fkbeJ9CmcH)  \n[![Reddit](https://img.shields.io/reddit/subreddit-subscribers/tududi?color=ff4500&label=Reddit&logo=reddit&logoColor=white&style=for-the-badge)](https://www.reddit.com/r/tududi/)\n\n## 🌟 Please check my other projects!\n\n- **[Reconya](https://reconya.com)** - Network reconnaissance and asset discovery tool\n- **[BreachHarbor](https://breachharbor.com)** - Cybersecurity suite for digital asset protection\n- **[Hevetra](https://hevetra.com)** - Digital tracking for child health milestones\n\n# Screenshots\n\n![Light Mode Screenshot](screenshots/all-light.png)\n\n![Dark Mode Screenshot](screenshots/all-dark.png)\n\n---\n\nREADME created by [Chris Veleris](https://github.com/chrisvel) for `tududi`.\n","summary":"tududi is a privacy‑focused productivity app that lets users build a clear, hierarchical list of tasks, projects, areas, notes, and tags. Its core capabilities include robust task management with subtasks, intelligent recurring tasks (daily, weekly, monthly, custom intervals, and completion‑based recurrence), project sharing, and rich tagging, all organized in nested areas for better focus. The app also offers Telegram integration for quick task creation, responsive multi‑device support, and full localization into 24 languages. Professionals, remote teams, and anyone managing complex projects or routine chores will benefit from tududi’s streamlined structure and automation features.","description":"A calm, open system for organizing life and work. Tasks, projects, notes, areas, and smart workflows - self-hosted or hosted.","stars":2640,"language":"TypeScript"},{"owner":"Jstudner","repo":"jcorp-nomad","url":"https://github.com/Jstudner/jcorp-nomad","readme":"# <div align=\"center\">Jcorp Nomad</div>\n\n<div align=\"center\">\n  <img src=\"NomadCover.png\" alt=\"Jcorp Nomad Offline Media Server\" width=\"800\">\n</div>\n\n<p align=\"center\"><b>A portable, offline media server powered by the ESP32-S3 in a thumbdrive form factor.</b><br>\nStream movies, music, books, and shows anywhere - no internet required.</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/release-Mk3-red.svg\" alt=\"Release: Mk3\" />\n  <img src=\"https://img.shields.io/badge/license-CC--BY--NC--SA%204.0-blue.svg\" alt=\"License: CC BY-NC-SA 4.0\" />\n  <img src=\"https://img.shields.io/badge/platform-ESP32--S3-orange\" alt=\"Platform: ESP32-S3\" />\n  <img src=\"https://img.shields.io/badge/status-stable-brightgreen\" alt=\"Status: Stable\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://nomad.jcorptech.net\"><b>Buy a Prebuilt Nomad</b></a> &nbsp;|&nbsp;\n  <a href=\"https://ko-fi.com/jcorptech\"><b>Support on Ko-fi</b></a>\n</p>\n\n---\n\n> **Mk3 Release** - The experimental branch has been merged into main. This is the new stable baseline with all Mk3 features. Testing is ongoing, but everything is running stable so far.\n\n---\n\n## What is Nomad\n\nJcorp Nomad is an open-source offline media server designed for travel, remote work, classrooms, camping, and more. It runs entirely on an ESP32-S3, creates a local Wi-Fi hotspot, and serves media through a browser interface. Multiple users can access separate media streams simultaneously, all without internet access.\n\nThis project is compact, easy to modify, and includes optional 3D-printable hardware. Both firmware and web interface are fully open-source.\n\n---\n\n## Get a Nomad\n\n### Build It Yourself (Recommended)\n\nI strongly recommend building your own Nomad. It's not a very difficult project, if you can follow instructions and plug in a USB cable, you can do it. The parts are cheap, widely available, and the whole build takes under an hour. See Hardware Requirements and Quick Start below. If nothing else please check out the DIY option before purchasing. \n\n### Buy a Prebuilt\n\nThat said, I also won't say no to money. If you'd rather skip the DIY and get a ready-to-go unit, prebuilt Nomads are available at **[nomad.jcorptech.net](https://nomad.jcorptech.net)**.\n\nEvery Nomad, whether you build it or buy it, runs the same open-source firmware and web interface. When new features and updates are released, you can always flash the latest code yourself to stay up to date. This project isn't going anywhere.\n\n### Support Development\n\nIf you just want to support the project, donations are always appreciated:  \n**[ko-fi.com/jcorptech](https://ko-fi.com/jcorptech)**\n\n---\n\n## Mk3 Highlights\n\n### Plyr Integration\n- Replaced native browser video elements with the **Plyr** library\n- Consistent playback UI across all devices\n- Fixes playback issues on Apple hardware\n\n### Theme Customization\n- New **Theme Control Panel** in the Admin Console\n- Expanded to **28 preset themes** \n- Full **custom theme editor** for manual color adjustments\n- Mobile-optimized with compact layout and touch-friendly controls\n\n### Music Overhaul & Queue\n- Seamless playback across Songs, Playlists, and Queue\n- New **Queue system** - add tracks from any music page, reorder or remove dynamically\n- Search results link directly to the queue\n\n### Books & Comics\n- **PDF Viewer** - dedicated page with **progressive loading** for large files\n- **EPUB Reader** - cleaned up and stable, prevents crashes on low-memory devices (still not recommended over PDF, but it works)\n- **Comic Reader** - supports webtoon **infinite scroll** and standard page mode, works with raw CBZ files\n\n### Search & Performance\n- Menu search uses **cached indices** for much faster results\n- Themes loaded from `/.system-theme.json` for system-wide consistency\n\n### Default Themes (28)\n\nDefault Blue, Forest Night, Cherry Blossom, Mocha Latte, Ocean Depths,\nAutumn Leaves, Lavender Fields, Sunset Horizon, Coral Reef, Mountain Mist,\nJade Garden, Desert Sand, Arctic Aurora, DeLorean, Midnight Code, 90s Retro,\nMint Breeze, Rose Gold, Crimson Night, Emerald Dream, Royal Purple,\nCopper Sunset, Sapphire Sea, Peach Cream, Slate Storm, Lime Zest,\nBurgundy Wine, Teal Oasis\n\n---\n\n## Features\n\n- **Admin Panel:** Full device controls, library indexing, Theme Customizer.\n- **File Browser:** Upload, rename, delete, download, and inline file editing. (Recommended to use a PC)\n- **Global Search:** Quickly find media across all categories from the Menu page.\n- **Music Player:** Seamless background playback with subdirectory playlists and a dynamic Queue.\n- **Movies & Shows:** Plyr-integrated playback with season/special folder support.\n- **Digital Library:** EPUB support, PDF handling, and a dedicated Comic/Webtoon reader.\n- **Resume Tracking:** Saves playback progress for Movies, Shows, and certain Books.\n- **Gallery & Files:** Dedicated pages for image viewing, video clips, and general file sharing.\n- **Captive Portal:** Automatic login/redirection for easy access.\n- **Persistent Settings:** Themes and system configurations saved across reboots.\n- **Mobile-Friendly UI:** Fully responsive design optimized for handheld offline streaming.\n\n---\n\n## Hardware Compatibility\n\nNomad is built specifically for the **Waveshare ESP32-S3 Dev Board (1.47\" LCD version)**. Due to the number of low-level tricks used to squeeze this much functionality out of the hardware, it is difficult to get Nomad running on other boards.\n\nThere are a few community forks that target other ESP32 boards, but your mileage will vary. Now that Nomad is stable on Mk3, I plan to develop a **Nomad Lite** version with wider board compatibility, focused on basic streaming without all the advanced features.\n\n---\n\n## Hardware Requirements\n\n- **Waveshare ESP32-S3 Dev Board (1.47\" LCD version)**\n  [Amazon Link](https://amzn.to/4ktB6oT)\n\n- **FAT32 microSD card (16-128GB recommended, up to 2TB)**\n  [Amazon Link](https://amzn.to/44tM1c4)\n\n- **SD-Card Extender (optional, 3DP case compatible)**\n  [Amazon Link](https://amzn.to/45IWIJz)\n\n- **USB power source**\n- **Optional:** 3D-printed enclosure (STL files included)\n\n---\n\n## Software Requirements\n\n- Arduino IDE\n- Fat32Format or equivalent\n- SquareLine Studio (optional, for UI editing)\n\n---\n\n## Quick Start\n\n1. Flash ESP32-S3 firmware from `/firmware/`.\n2. Format SD card as FAT32 and copy `/SD_Card_Template/` files.\n3. Place media in `/Movies`, `/Shows`, `/Books`, `/Music`, `/Gallery`, `/Files`.\n4. Insert SD card and power device via USB.\n5. Connect to Wi-Fi `Jcorp_Nomad` with password: `password`.\n6. Open the browser interface.\n7. Click the gear icon → Library Index → **Full Scan Now**.\n8. Monitor Admin Console for progress; scan may take minutes.\n9. Return to Menu page and enjoy your media!\n\n---\n\n## Key Improvements\n\n1. **Faster & More Reliable Indexing**\n   - Non-blocking, background indexing for large libraries.\n   - Safe on power loss; partial indexes remain intact.\n   - Auto-updates changes; frontend detects updates automatically.\n\n2. **Resume Functionality**\n   - Movies and Shows track playback progress.\n   - Options for **Play from Start** or **Resume**.\n   - Menu displays last three movies/shows; mobile shows most recent.\n\n3. **Dark Mode**\n   - Toggleable across all pages from the menu.\n\n4. **Admin Page**\n   - Full device control: shutdown, restart, flash mode, Wi-Fi, RGB LEDs, brightness, credentials, indexing, and file management.\n   - Safe shutdown option for SD card health.\n   - Real-time system console feedback.\n\n5. **Stability Improvements**\n   - Fixed frontend NDJSON sync issues.\n   - Crash recovery on large indexes.\n   - Dynamic LCD brightness adjustment.\n   - Streaming stability enhancements.\n\n6. **Improved Library Support**\n   - Supports deeper folder structures for Shows and Music.\n   - Flexible organization; media files can be nested at any level.\n\n---\n\n```\nFolder Structure\n\n/Movies\n    Interstellar.mp4\n    Interstellar.jpg\n\n/Shows\n    /The Office\n        S01E01 - Pilot.mp4\n        S01E02 - Diversity Day.mp4\n    The Office.jpg\n\n    /Gravity Falls\n        /Season 1\n            S1E1 - Tourist Trapped.mp4\n            S1E2 - The Legend of the Gobblewonker.mp4\n        /Season 2\n            S2E1 - Scary-oke.mp4\n            S2E2 - Into the Bunker.mp4\n        Alex Hirsch Interview.mp4\n    Gravity Falls.jpg\n\n/Books\n    The Martian.pdf\n    The Martian.jpg\n    /How to Train Your Dragon\n        book1.pdf\n        book2.mp3\n        book1.jpg\n        book2.jpg\n    How to Train Your Dragon.jpg\n\n/Music\n    track01.mp3\n    /Artist1\n        track01.mp3\n        /Album1\n            track02.mp3\n    /PersonName\n        /Playlist1\n            track01.mp3\n        /Playlist2\n            track02.mp3\n\n/Gallery\n    image01.jpg\n    video01.mp4\n\n/Files\n    document.pdf\n    example.txt\n\nindex.html\nappleindex.html\nmenu.html\nmovies.html\nshows.html\nbooks.html\nmusic.html\ngallery.html\nfiles.html\nLogo.png\nfavicon.ico\n```\n\n---\n\n## Supported Formats\n\n- **Video:** `.mp4, .mov, .mkv, .webm`\n- **Audio:** `.mp3, .flac, .wav`\n- **Books:** `.pdf, .epub, .mp3, .cbz`\n- **Images:** `.jpg`\n\n---\n\n## 3D Printed Case Files\n\n- [Thingiverse](https://www.thingiverse.com/thing:7223398)\n\n---\n\n## What's Next\n\n**Nomad Lite** - A stripped-down version of Nomad with wider board compatibility, focused on core streaming features. Now that Mk3 is stable, this is the next priority.\n\n**Nomad Manager** - A companion application for Nomad that integrates with Jellyfin to handle automated media downcoding and transfers. Keep your Nomad stocked and ready to go without manual file management.\n\n**Gallion** - A larger-scale sibling to Nomad, built on more capable hardware. Gallion is designed to handle everything that couldn't fit on Nomad's current platform > ZIM file support, ROM emulation, 4k video, and expanded media compatibility across the board. The current version is [here](https://github.com/Jstudner/Gallion).\n\n---\n\n## Project Inspiration\n\nInspired by my experience running a Jellyfin server, I wanted a portable, low-cost solution for offline media streaming. Challenges with SBCs (Raspberry Pi, etc.) included high power usage, heat, and instability.\n\nNomad focuses on delivering:\n\n- Offline access\n- Wide device compatibility\n- Simple frontend for media browsing and playback\n- Multiple user support\n- High customization potential\n\nThe ESP32-S3 provides enough performance to handle these requirements efficiently, in a pocket-sized form factor.\n\n---\n\n## License\n\n[CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/) - free to remix and share for non-commercial use with attribution.\n\n---\n\n## Credits\n\nDeveloped by **Jackson Studner (Jcorp Tech)**.\nInspired by open-source offline media projects. Contributions via PRs welcome.\n\n<p align=\"center\">\n  <a href=\"https://ko-fi.com/jcorptech\"><img src=\"https://ko-fi.com/img/githubbutton_sm.svg\" alt=\"Support on Ko-fi\"></a>\n</p>\n","summary":"Jcorp Nomad is a compact, ESP32‑S3‑powered offline media server that creates a local Wi‑Fi hotspot and serves movies, music, books, and shows through a web interface, all without requiring internet access. It supports simultaneous multi‑user streams, uses the Plyr library for consistent playback, offers a rich theme editor with 28 presets, and includes advanced music queuing as well as dedicated PDF, EPUB, and comic readers. The project is ideal for travelers, remote workers, educators, and anyone who wants an easy‑to‑build portable media hub for offline use.","description":"An extremely compact offline media server for Movies, Shows, Books, and Music.","stars":784,"language":"HTML"},{"owner":"davidguva","repo":"OpenVidReview","url":"https://github.com/davidguva/OpenVidReview","readme":"# OpenVidReview\n\nThis project is a a collaborative video review and annotation tool. It allows users to upload videos, add comments with timestamps, color tags, and export comments as EDL files for use in video editing software like DaVinci Resolve.\n\nThe project is a work in progress and any use is at your own risk!\n\nIf you want to help in any capacity or contact me send me an email at david [a] davidguva.se and if you for some reason wants to say thanks you can [buy me a coffee](https://buymeacoffee.com/davidguva).\n\n## Features\n\n-   Video upload\n-   Simple admin interface\n-   Time-based comments\n-   Color tags for comments\n-   Edit and delete comments\n-   Export comments as EDL files\n\n## Todos\n\n-   Implement the use of encrypted passwords (especially for the admin interface)\n-   Real-time updates with Socket.io\n-   Overall to make it as secure as possible and ready for production.\n\nI would love for people to test this and give feedback.\n\n## Technologies Used\n\n-   Node.js\n-   Express.js\n-   SQLite\n-   EJS (Embedded JavaScript templating)\n-   Socket.io\n-   HTML/CSS/JavaScript\n\n## Getting Started\n\n### Prerequisites\n\n-   Node.js and npm installed\n-   SQLite installed\n\n### Installation using NodeJS\n\n1. Clone the repository:\n\n    ```bash\n    git clone https://github.com/davidguva/OpenVidReview.git\n    cd OpenVidReview\n    ```\n\n2. Install the dependencies:\n\n    ```bash\n    npm install\n    ```\n\n3. Start the server:\n\n    ```bash\n    npm start\n    ```\n\n4. Open your browser and go to `http://localhost:3000` or visit `http://localhost:3000/admin` for the admin interface.\n\n### Installation using Docker\n\n1. Clone the repository:\n\n    ```bash\n    git clone https://github.com/davidguva/OpenVidReview.git\n    cd OpenVidReview\n    ```\n\n2. Build and start the container:\n\n    `docker compose up -d`\n","summary":"OpenVidReview is a lightweight web application that lets teams upload video files, annotate them with time‑stamped comments, and tag those comments with colors for quick reference. The interface supports creating, editing, and deleting comments and can export the annotations as EDL files that can be imported into editing suites such as DaVinci Resolve. It is built on Node.js with Express, SQLite, and EJS, and offers an admin panel for managing the uploads and annotations. Video editors, post‑production teams, and anyone needing a shared review platform will benefit from its straightforward annotation workflow and export capability.","description":"A open source video review system.","stars":116,"language":"CSS"},{"owner":"danielbrendel","repo":"hortusfox-web","url":"https://github.com/danielbrendel/hortusfox-web","readme":"<h1 align=\"center\">\n    <img src=\"public/logo.png\" width=\"256\"/><br/>\n    HortusFox\n</h1>\n\n<p align=\"center\">\n    A self-hosted collaborative plant management system<br/>\n    (C) 2023 - 2026 by Daniel Brendel\n</p>\n\n<p align=\"center\">\n    <a href=\"https://www.hortusfox.com/\">www.hortusfox.com</a>\n</p>\n\n<p align=\"center\">\n    <img src=\"https://img.shields.io/badge/web-php-orange\" alt=\"web-php\"/>\n    <img src=\"https://img.shields.io/badge/db-mariadb-pink\" alt=\"db-mariadb\"/>\n    <img src=\"https://img.shields.io/badge/license-MIT-blue\" alt=\"license-mit\"/>\n    <img src=\"https://img.shields.io/badge/maintained-yes-green\" alt=\"maintained-yes\"/>\n</p>\n\n<p align=\"center\">\n    <a href=\"https://www.hortusfox.com/support\"><img src=\"https://img.shields.io/badge/support-00CC55?style=for-the-badge&logoColor=white\" alt=\"support\"></a>\n    <a href=\"https://www.hortusfox.com/faq\"><img src=\"https://img.shields.io/badge/faq-FFDE23?style=for-the-badge&logoColor=white\" alt=\"faq\"></a>\n    <a href=\"https://discord.gg/kc6xGmjzVS\"><img src=\"https://img.shields.io/badge/discord-5735FF?style=for-the-badge&logoColor=white\" alt=\"discord\"></a>\n    <a href=\"https://bsky.app/profile/danielbrendel.com\"><img src=\"https://img.shields.io/badge/bluesky-00A3FF?style=for-the-badge&logoColor=white\" alt=\"bluesky\"></a>\n</p>\n\n<p align=\"center\">\n    <a href=\"https://github.com/sponsors/danielbrendel\" target=\"_blank\"><img height=\"35\" style=\"border:0px;height:35px;\" src=\"https://img.shields.io/static/v1?label=Sponsor&message=%E2%9D%A4&logo=GitHub&color=%23fe8e86\" alt=\"Sponsor me on GitHub\"/></a>&nbsp;\n    <a href='https://ko-fi.com/danielbrendel' target='_blank'><img height='35' style='border:0px;height:35px;' src='https://storage.ko-fi.com/cdn/kofi2.png?v=3' border='0' alt='Buy Me a Coffee at ko-fi.com' /></a>\n</p>\n\n<p align=\"center\">\n    <img src=\"app/resources/gfx/screenshot-desktop.png\"/><br/>\n</p>\n\n## Table of Contents\n\n- [Description](#description)\n- [Features](#features)\n- [Resources](#resources)\n- [Installation](#installation)\n  - [Docker](#docker)\n  - [Installer](#installer)\n  - [Manual](#manual)\n  - [AquaShell](#aquashell)\n- [Cronjobs](#cronjobs)\n- [Application testing](#application-testing)\n- [System requirements](#system-requirements)\n- [External services](#external-services)\n  - [App icons](#app-icons)\n  - [Weather forecast](#weather-forecast)\n  - [Plant identification](#plant-identification)\n  - [Plant information](#plant-information)\n- [Maintenance scripts](#maintenance-scripts)\n- [Tech stack](#tech-stack)\n- [Contributing](#contributing)\n- [Security](#security)\n\n## Description\n\nHortusFox is a self-hosted collaborative plant management system which you can use in your own environment to manage all your plants.\nYou can add your plants with various details and photos and assign them to a location of your environment. There is a dashboard\navailable that shows all important overview information. The system does also feature a warning system in order to indicate\nwhich plants need special care, user authentication, tasks, inventory management, calendar, search, collaborative chat and a history log of \nwhat actions users have taken. The system features collaborative management, so you can manage your plants with multiple users.\nThere are many more features. You can see a list of features below.\n\n## Features\n\n- 🪴 Plant management\n- 🏠 Custom locations\n- 📜 Tasks system\n- 📖 Inventory system\n- 📆 Calendar system\n- 🔍 Search feature\n- 🕰️ History feature\n- 🌦️ Weather feature\n- 💬 Group chat\n- ⚙️ Profile management\n- 🦋 Themes\n- 🔑 Admin dashboard\n- 📢 Reminders\n- 💾 Backups\n- 💻 REST API\n- 🔬 Plant identification\n\n## Resources\n\n- [Official Homepage](https://www.hortusfox.com/)\n- [Documentation](https://hortusfox.github.io/)\n\n## Installation\n\n### Docker\n\nYou can use Docker and Docker Compose to simplify the setup process and ensure consistency across different environments.\n\nPrerequisites\n\n- Docker installed on your system\n- Docker Compose installed on your system\n\nFollow these steps:\n\n1. Clone the repository:\n\n```shell\ngit clone https://github.com/danielbrendel/hortusfox-web.git\ncd hortusfox-web\n```\n\n2. Set environment variables in the `docker-compose.yml`.\n\nSet your admin user e-mail and password in order to login\n```yaml\n# Admin login credentials\n# services.app.environment\nAPP_ADMIN_EMAIL: \"admin@example.com\"\nAPP_ADMIN_PASSWORD: \"password\"\n```\n\nSet your preferred timezone. Default is UTC.\n```yaml\n# Timezone setting\n# services.app.environment\nAPP_TIMEZONE: \"UTC\"\n```\n\nIf you want composer dependencies to be updated when the app container starts, set the following setting\n```yaml\n# Update composer dependencies during start if set to true\n# services.app.environment\nAPP_UPDATEDEPS: \"true\"\n```\n\nSet database settings if required. It is recommended to set custom passwords due to security reasons. All other settings can be left unaltered.\n```yaml\n# Settings used to establish connections to the database\n# services.app.environment\nDB_HOST: db\nDB_PORT: 3306\nDB_DATABASE: hortusfox\nDB_USERNAME: user\nDB_PASSWORD: password\nDB_CHARSET: \"utf8mb4\"\n\n# Settings of the database container\n# services.db.environment\nMARIADB_ROOT_PASSWORD: my-secret-pw\nMARIADB_DATABASE: hortusfox\nMARIADB_USER: user\nMARIADB_PASSWORD: password\n```\n\nYou can optionally specify proxy authentication settings for your app\n```yaml\n# services.app.environment\nPROXY_ENABLE: \"true\"\nPROXY_HEADER_EMAIL: \"Your e-mail header identifier here\"\nPROXY_HEADER_USERNAME: \"Your username header identifier here\"\nPROXY_AUTO_SIGNUP: \"true\"\nPROXY_WHITELIST: \"\"\nPROXY_HIDE_LOGOUT: \"true\"\nPROXY_OVERWRITE_VALUES: \"true\"\n```\nNote: Setting `PROXY_OVERWRITE_VALUES` to `true` is mandatory if you want to update your proxy authentication settings upon container launch.\n\n3. Pull the image and run the application:\n\n```shell\ndocker compose pull\ndocker compose up -d\n```\n\n4. The application should now be running on http://localhost:8080.\n\n5. You can now go to the <a href=\"http://localhost:8080/admin\">admin dashboard</a> in order to adjust your workspace settings and also go to your <a href=\"http://localhost:8080/profile\">profile page</a> in order to adjust your user preferences.\n\n### Installer\n\nYou can also use the integrated installer in order to install the product. In order for that to do, be sure that you are not running the\nsystem via the internal asatru development server. Instead you might want to, for instance, run the system from the context of a webserver\nenvironment like XAMPP. If you do that, just create a file named do_install (no file extension) in the root directory of the project and\nbrowse to the installer and the system will guide you through the installation process.\n\n```\nhttp://localhost/install\n```\n\nBe sure that PHP is installed and both your webserver and mariadb server are running. If there is no vendor folder already created then\nthe system will try to run Composer in order to install all required dependencies. For that to work you need to have Composer installed\non your system. Although the system tries to create the database for you, sometimes this might fail, so you will have to create the\ndatabase before running the installation. However all table migrations will then be created by the system. The system can then be managed\nvia the admin section (e.g. environment settings, users, locations).\n\n### Manual\n\nIn order to manually install HortusFox you need to first setup a PHP environment along with a MariaDB database\nand also Composer. Afterwards you can clone or download the repository. Then go to the root directory\nof the project and let Composer install the required dependencies.\n\n```shell\ncomposer install\n```\n\nNow we need to configure the project. Create a .env file from the .env.example, open it and manage the following variables:\n\n```sh\n# URL to the official service backend. Used for e.g. version comparison\nAPP_SERVICE_URL=\"https://www.hortusfox.com\"\n\n# URL to the repository of the project\nAPP_GITHUB_URL=\"https://github.com/danielbrendel/hortusfox-web\"\n\n# This must be set to true for the product to work in order to enable database connection\nDB_ENABLE=true\n\n# Enter your hostname or IP address of your MariaDB database server\nDB_HOST=localhost\n\n# Enter the database username\nDB_USER=root\n\n# Enter the database user password\nDB_PASSWORD=\"\"\n\n# Database connection port. Normally this doesn't need to be changed\nDB_PORT=3306\n\n# The actual database of your MariaDB server to be used\nDB_DATABASE=hortusfox\n\n# Database driver. This needs to be unaltered for now\nDB_DRIVER=mysql\n\n# The name of the e-mail sender\nSMTP_FROMNAME=\"Test\"\n\n# The e-mail address of the sender\nSMTP_FROMADDRESS=\"test@domain.tld\"\n\n# Hostname or address to your SMTP mail provider\nSMTP_HOST=\"\"\n\n# Port to be used for connecting to the host\nSMTP_PORT=587\n\n# Your SMTP username\nSMTP_USERNAME=\"\"\n\n# Your SMTP password for authentication\nSMTP_PASSWORD=\"\"\n\n# Communication encryption\nSMTP_ENCRYPTION=tls\n```\n\nAfter saving the file you can now let the product create all necessary tables via the following command:\n\n```shell\nphp asatru migrate:fresh\n```\n\nNow you need to insert your initial app settings profile into the database. There are many more settings available, but you can adjust them later in the admin dashboard.\n```sql\nINSERT INTO `AppModel` (id, workspace, language, created_at) VALUES (\n    NULL, \n    'My workspace name', \n    'en', \n    CURRENT_TIMESTAMP\n);\n```\n\nNext you should let the system perform some initial operations\n```shell\n# Add default plant attributes\nphp asatru plants:attributes\n\n# Add default calendar classes\nphp asatru calendar:classes\n```\n\nYou might now want to start your web server to host the application. If you want to quickly use the inbuilt webserver\nyou can start it via:\n\n```shell\nphp asatru serve\n```\n\nNow browse to http://localhost:8000/ and you should be redirected to the authentication page.\nAt this point you need to create your first user. Go to your database control panel and switch to the users table.\nAdd the user account that should get access to the application with admin privileges. The following is an example:\n\n```sql\nINSERT INTO `UserModel` (`name`, `email`, `password`, `admin`) VALUES\n(\n    'Username',\n    'name@example.com',\n    'your_password_token_here',\n    1\n);\n```\n\nAs you might have noticed the values that you need to customize are name, email, password and admin. All others are left with their default values.\nThe password hash must be created manually. For testing purposes you might just want to quickly use something like:\n\n```shell\nphp -r \"echo password_hash('test', PASSWORD_BCRYPT);\"\n```\n\nYou may now login with your initial admin user account using your e-mail address and the password of which you have stored the hash in the table.\nAfter logging in, you should then be redirected to the dashboard. Further users can now be created via the admin area. Users can change their\npasswords in their profile preferences. They can also reset their password. Therefore an e-mail will be sent to them with restoration instructions.\nEach new created user can get a confirmation e-mail with an automatically generated password in order to log in. It is recommended that users change\ntheir passwords after their first login.\nLast but not least you need to add all your locations of your local environment to the database. You can do that either via the admin section or\nmanually by inserting entries into the locations table.\n\n```sql\nINSERT INTO `LocationsModel` (`id`, `name`, `icon`, `active`, `created_at`) VALUES\n(\n    NULL,\n    'Name of location',\n    NULL,\n    1,\n    CURRENT_TIMESTAMP\n);\n```\n\nThe mandatory field is the name of the location (e.g. garden, living room, kitchen, etc).\n\n### AquaShell\n\nIf you have [AquaShell](https://github.com/danielbrendel/dnyAquaShell) installed, you can also use the installer script to install the project\non your machine. Therefore the following requirements must be met:\n- Web server with PHP and MariaDB installed\n- Composer package manager installed\n- PHP, MariaDB and Composer must be available via the commandline\n- Create a `do_install` file in the project root directory, so that the installer is enabled\n\nIf all these requirements are met, you can launch the installer script either interactively or via script arguments.\n\n#### Interactive usage\n\nRun the installer script\n```sh\naquashell scripts/install.dnys --launch\n```\n\nThe installer will prompt you with all required input fields. The `--launch` argument will lead the script to launch `http://localhost` in your default browser when finished.\n\n#### Usage with script arguments\n\nIf you want to run the installer script without any prompts, you can just pass every required input field as script arguments\n```sh\naquashell scripts/install.dnys --workspace \"Your workspace name\" --username \"Your admin profile name\" --email \"your@loginmail.tld\" --password \"your-login-password\" --database \"hortusfox\" --dbhost \"localhost\" --dbport \"3306\" --dbuser \"root\" --dbpw \"your-access-password\" --continue --launch\n```\n\nSince there is a confirmation prompt once all input fields are provided, you can use the `--continue` argument to skip this confirmation.\n\n**Note**: If you don't have a database access password (e.g. due to a local XAMPP installation), you can pass `--dbpw \"!\"` to specify an empty password.\n\n## Cronjobs\n\nCronjobs are used to regularly execute a specific task. For each cronjob you need to set the cronjob parameter with your token set via `AppModel.cronjob_pw`. The following cronjobs are available:\n\n```sh\n# Used to inform users about overdue tasks. Should be called multiple times per day.\nGET /cronjob/tasks/overdue?cronpw={your-auth-token}\n\n# Used to inform users about tasks that are due tomorrow. Should be called multiple times per day.\nGET /cronjob/tasks/tomorrow?cronpw={your-auth-token}\n\n# Used to check for recurring tasks and reset them accordingly. Should be called at least once, or better multiple times per day.\nGET /cronjob/tasks/recurring?cronpw={your-auth-token}\n\n# Used to inform users about due calendar dates\nGET /cronjob/calendar/reminder?cronpw={your-auth-token}\n\n# Used to perform the automatic backup of your workspace data\nGET /cronjob/backup/auto?cronpw={your-auth-token}\n```\n\n## Application testing\n\n**WARNING: Application testing is currently under construction and will progress with further development.**\n\n### Introduction\n\nApplication tests are useful to verify that specific parts of the application are still working after an update.\n\nThere are two types of tests whose purpose depend on the use case.\n\n### Feature\n\nFeature tests are used to test an entire workflow. In order to achieve this, you simulate a call to a specific route of the application.\nAfterwards the returned result is checked if it matches the assumption. The assumption can depend on the calling context and request data (if any).\nOften calling a route will encompass various parts of the application during the process, such as Models, Modules, Helper functions, etc.\n\n### Unit\n\nUnit tests are useful to test against specific parts of the application. For instance, you can test various methods of a Model or a Module. \nThis is especially useful if you employ a test-driven-development approach to verify that a method works as expected in various scenarios.\n\n### Running the tests\n\nIn order to run all application tests, please issue the following command in the context of the root project directory:\n```sh\n\"vendor/bin/phpunit\" --stderr\n```\n\nIn order to run the Feature suite, please issue the following command:\n```sh\n\"vendor/bin/phpunit\" --stderr --testsuite Feature\n```\n\nIn order to run the Unit suite, please issue the following command:\n```sh\n\"vendor/bin/phpunit\" --stderr --testsuite Unit\n```\n\n### Test data\n\nTesting data should be specified as environment variables in the `php` section via the `phpunit.xml`.\n\n## System requirements\n\n- PHP ^8.3\n- MariaDB ^11.4\n- SMTP server for e-mailing\n- Docker with Docker Compose for containerization\n\n## External services\n\nThere are features that rely on external services. Some of these features are mandatory, while others can be enabled if desired.\n\n### App icons\n\nThe project uses <a href=\"https://fontawesome.com/\">FontAwesome</a> free to display icons on various occasions. Please see the free license <a href=\"https://fontawesome.com/license/free\">here</a>.\n\n### Weather forecast\n\nIn order to provide the weather forecast feature, the project uses [OpenWeatherMap](https://openweathermap.org/) to get the weather data. \nIn order to use this feature you need to create an account and get your own API key.\n\n### Plant identification\n\nThe project uses the [Pl@ntNet API](https://my.plantnet.org/) to identify plants. In order to use this feature you need to create an account and get your own API key.\n\n### Plant information\n\nThe project uses the [Global Biodiversity Information Facility](https://techdocs.gbif.org/en/) in order to query plant data on various occasions. As of now you do not need to obtain an extra API key in order for this to work.\n\n## Maintenance scripts\n\nThere are various [AquaShell](https://github.com/danielbrendel/dnyAquaShell) scripts in the `/scripts` directory that can be used for maintenance tasks. These are for local development only, and are optional. \n\nSome scripts require specific configuration files. You can manually create them via the following command:\n\n```shell\nphp asatru aquashell:config\n```\n\nThe following scripts are currently available:\n\n- **clear-cache.dnys**: A script to clear the current application cache (both database and folders).\n- **install.dnys**: A script to install the project to the local system.\n- **launch.dnys**: A script to quickly launch a web server and open the project in the default browser.\n- **themes.dnys**: A script to manage local theme installations\n- **vercheck.dnys**: A script that prints the local version of the project, the latest available version, and whether there is a new version available or not.\n- **backup-export.dnys**: A script to export workspace data to a backup archive file\n- **backup-import.dnys**: A script to import workspace data from a backup archive file\n\nThe following directories do also exist in the `/scripts` directory:\n\n- **incl**: This directory contains useful helper scripts that can be used by entry-point scripts.\n- **tmp**: This directory contains scripts, or other files, that are intended to be temporary and/or automatically generated/overwritten.\n\n## Tech stack\n\nThe following technologies are used by HortusFox.\n\n| Technology  | Notes | Link |\n| ------------- | ------------- | ------------- |\n| PHP | General-purpose scripting language geared towards the web | [https://www.php.net](https://www.php.net) |\n| Asatru PHP  | A lightweight PHP framework  | [https://www.asatru-php.com](https://www.asatru-php.com) |\n| MariaDB  | Relational database management system  | [https://github.com/MariaDB/server](https://github.com/MariaDB/server) |\n| Composer  | Dependency manager for PHP  | [https://getcomposer.org](https://getcomposer.org) |\n| phpmailer/phpmailer | E-Mail sending library for PHP | [https://github.com/PHPMailer/PHPMailer](https://github.com/PHPMailer/PHPMailer) |\n| nesbot/carbon  | API extension library for PHP DateTime  | [https://github.com/briannesbitt/Carbon](https://github.com/briannesbitt/Carbon) |\n| chillerlan/php-qrcode | QR-code library for PHP | [https://github.com/chillerlan/php-qrcode](https://github.com/chillerlan/php-qrcode) |\n| tecnickcom/tcpdf | PHP library to generate PDF documents | [https://github.com/tecnickcom/TCPDF](https://github.com/tecnickcom/TCPDF) |\n| ezyang/htmlpurifier | HTML filtering library for PHP  | [https://github.com/ezyang/htmlpurifier](https://github.com/ezyang/htmlpurifier) |\n| erusev/parsedown | Markdown parser for PHP | [https://github.com/erusev/parsedown](https://github.com/erusev/parsedown) |\n| npm | Package manager for JavaScript | [https://www.npmjs.com](https://www.npmjs.com) |\n| webpack | A bundler for JavaScript and other assets | [https://github.com/webpack/webpack](https://github.com/webpack/webpack) |\n| Vue  | A progressive JavaScript framework  | [https://vuejs.org](https://vuejs.org) |\n| Bulma  | A modern CSS framework  | [https://bulma.io](https://bulma.io) |\n| FontAwesome  | A popular icon library  | [https://fontawesome.com](https://fontawesome.com) |\n| chart.js | A charts library using the canvas tag | [https://github.com/chartjs/Chart.js](https://github.com/chartjs/Chart.js) |\n| Docker  | An ecosystem for containerization  | [https://www.docker.com](https://www.docker.com) |\n| AquaShell  | An extendable scripting environment  | [https://www.aquashell-scripting.com](https://www.aquashell-scripting.com) |\n\n## Contributing\n\nPlease view the [contribution guidelines](CONTRIBUTING.md) if you intend to contribute to this repository.\n\n## Security\n\nIf you discover any security vulnerability, please refer to the [security guidelines](SECURITY.md) on how to proceed.","summary":"HortusFox is a self‑hosted web application for collaborative plant management, allowing users to catalogue plants, assign them to custom locations, and track care tasks, inventory, and calendars. It offers an integrated dashboard with weather updates, reminders, and a historical log, plus features like plant identification, group chat, REST API access, and multi‑user administration. The system is built with PHP and MariaDB, easily deployed via Docker or manually, and is suited for hobbyists, gardening communities, or small greenhouses that need a shared, self‑hosted record‑keeping tool for plant care.","description":"Self-hosted collaborative plant management and tracking system for plant enthusiasts","stars":1430,"language":"PHP"},{"owner":"papermerge","repo":"papermerge-core","url":"https://github.com/papermerge/papermerge-core","readme":"[![Tests](https://github.com/papermerge/papermerge-core/actions/workflows/tests.yml/badge.svg)](https://github.com/papermerge/papermerge-core/actions/workflows/tests.yml)\n\n<p align=\"center\">\n<img src=\"./artwork/logo-w160px.png\" />\n</p>\n<h1 align=\"center\">Papermerge DMS</h1>\n\nPapermerge DMS or simply Papermerge is a open source document management system\ndesigned to work with scanned documents (also called digital archives). It\nextracts text from your scans using OCR, indexes\nthem, and prepares them for full text search. Papermerge provides the look and feel\nof modern desktop file browsers. It has features like dual panel document\nbrowser, drag and drop, tags, hierarchical folders and full text search so that\nyou can efficiently store and organize your documents.\n\nIt supports PDF, TIFF, JPEG and PNG document file formats.\nPapermerge is perfect tool for long term storage of your documents.\n\n<p align=\"center\">\n<img src=\"./artwork/papermerge3-3.png\" />\n</p>\n\n## Features Highlights\n\n- Web UI with desktop like experience\n- OpenAPI compliant REST API\n- Works with PDF, JPEG, PNG and TIFF documents\n- Document Versioning\n- Tags - assign colored tags to documents or folders\n- Documents and Folders - users can organize documents in folders\n- Document Types (i.e. Categories)\n- Custom Fields (metadata) per document type\n- Multi-User\n- Group ownership\n- Share documents and folders between users and/or groups of users\n- UI is available in multiple languages\n- Page Management - delete, reorder, cut, move, extract pages\n- OCR (Optical Character Recognition) of the documents\n- OCRed text overlay (you can download document with OCRed text overlay)\n- Full Text Search of the scanned documents\n\n## Documentation\n\nPapermerge DMS documentation is available\nat [https://docs.papermerge.io](https://docs.papermerge.io/)\n\n## Start with Docker\n\nIn order to start Papermerge App with the most basic setup use following command:\n\n    docker run -p 8000:80 \\\n        -e PAPERMERGE__SECURITY__SECRET_KEY=abc \\\n        -e PAPERMERGE__AUTH__PASSWORD=123 \\\n        papermerge/papermerge:3.5.3\n\nFor more info about various docker compose scenarios\ncheck [documentation page](https://docs.papermerge.io/latest/setup/docker-compose/).\n\n## Demo Page\n\nOnline demo is available at: https://demo.papermerge.com\n\n```\nUsername: demo\nPassword: demo\n```\n\nPlease note that, in order to save resources, online demo instance is deployed\nusing very basic setup: there is no OCR worker and no full text search engine\nbehind. Online instance is reseted every 24 hours (0:00 UTC timezone). Reset\nmeans that all data is restored to initial state and all documents are deleted.\n\n## Development\n\n### Backend\n\n```\n$ uv sync\n```\n\nMake sure you have the following environment variables set (e.g. with direnv):\n\n```\nexport PM_DB_URL=postgresql://coco:***@127.0.0.1:5432/pmgdb\nexport PM_MEDIA_ROOT=/home/eugen/var/pmgdata\nexport PM_API_PREFIX='/api'\n```\n\nStart BE with following command:\n\n```\n$ uv run task server\n```\n\nThis command will start BE server on localhost port 8000.\nAccess its swagger docs via `http://localhost:8000/docs`\n\n### Frontend\n\nSwitch to UI folder.\n\n```\ncd frontend/\n```\n\nMake sure following environment variables are defined (\nadjust their values accordingly):\n\n```\nVITE_REMOTE_USER=admin\nVITE_REMOTE_USER_ID=49e78737-7c6e-410f-ae27-315b04bdec69\nVITE_REMOTE_GROUPS=admin\nVITE_BASE_URL=http://localhost:8000\nVITE_KEEP_UNUSED_DATA_FOR=1\n```\n\nAnother vite variables you may consider:\n\n* VITE_REMOTE_ROLES\n\nOf course, you will need to adjust user ID, username to match your BE.\n\n`VITE_KEEP_UNUSED_DATA_FOR` will cache data returned from BE for one second\n\nStart FE:\n\n```commandline\ncd frontend\nyarn workspace ui dev\n```\n\nThis command will start FE server on `http://localhost:5173/`\n\nTo see all workspaces use:\n\n```commandline\nyarn workspaces list\n```\n\n## Run test suite\n\n```commandline\n    uv sync --group dev\n    uv pytest\n```\n\n## Misc\n\nSwitch to specific python version in your virtual environment:\n\n```commandline\n uv sync --python 3.14\n```\n\n## Command Line Commands\n\n`pm` - is CLI for various management commands.\n\n```commandline\npm --help\n```\n\n### Search\n\nClear the existing search index and rebuild it from scratch:\n\n```commandline\npm search build\n```\n\nSearch index statistics\n\n```commandline\npm search stats\n```\n","summary":"Papermerge DMS is an open‑source document management system that turns scanned files (PDF, TIFF, JPEG, PNG) into searchable archives by automatically extracting text with OCR and indexing it for full‑text search. It offers a desktop‑style web UI with dual‑panel browsing, drag‑and‑drop, hierarchical folders, tags, page manipulation, and document versioning, all exposed through a REST API and rich metadata support. Designed for long‑term digital storage, the platform supports multiple users, group ownership, shared access, and custom metadata fields. Organizations and individuals who need to organize, search, and preserve scanned documents efficiently will find Papermerge a powerful, low‑resource solution.","description":"Papermerge DMS core backend, REST API server, and frontend UI","stars":455,"language":"Python"},{"owner":"trailbaseio","repo":"trailbase","url":"https://github.com/trailbaseio/trailbase","readme":"<p align=\"center\">\n  <a href=\"https://trailbase.io\" target=\"_blank\">\n    <picture>\n      <img alt=\"TrailBase logo\" width=\"150\" src=\"assets/logo.svg\" />\n    </picture>\n  </a>\n</p>\n\n<p align=\"center\">\n  An open, <a href=\"https://trailbase.io/reference/benchmarks/\">sub-millisecond</a>,\n  single-executable Firebase alternative with type-safe REST & realtime APIs,\n  multi-DB, WebAssembly runtime, geospatial support, SSR, auth and admin\n  UI built on Rust, SQLite & Wasmtime.\n<p>\n\n<p align=\"center\">\n  Simplify with fewer moving parts: an easy to self-host, single-executable,\n  extensible backend for your mobile, web or desktop application.\n  Sub-millisecond latencies eliminate the need for dedicated caches, no more\n  stale or inconsistent data.\n<p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/trailbaseio/trailbase/stargazers/\">\n    <img src=\"https://img.shields.io/github/stars/trailbaseio/trailbase?style=social&label=Star\" />\n  </a>\n  <a href=\"https://github.com/trailbaseio/trailbase/actions?query=branch%3Amain\">\n    <img src=\"https://github.com/trailbaseio/trailbase/actions/workflows/test.yml/badge.svg?branch=main\" alt=\"Build Status\">\n  </a>\n  <a href=\"https://github.com/trailbaseio/trailbase/blob/main/LICENSE\">\n    <img src=\"https://img.shields.io/badge/license-OSL_3.0-blue\" alt=\"License - OSL 3.0\">\n  </a>\n  <a href=\"https://trailbase.io/reference/roadmap/\">\n    <img src=\"https://img.shields.io/badge/status-alpha-orange\" alt=\"Status - Alpha\">\n  </a>\n</p>\n\n# TrailBase\n\n<p align=\"center\">\n  <a\n    href=\"https://demo.trailbase.io/_/admin?loginMessage=E-mail:%20admin@localhost%20%E2%80%A2%20Password:%20secret\"\n    target=\"_blank\"\n  >\n    <picture>\n      <img alt=\"Admin UI\" width=\"600\" src=\"docs/src/assets/screenshots.webp\" />\n    </picture>\n  </a>\n</p>\n\n<p align=\"center\">\n  <strong>\n    Try the\n    <a href=\"https://demo.trailbase.io/_/admin?loginMessage=E-mail:%20admin@localhost%20%E2%80%A2%20Password:%20secret\" target=\"_blank\">demo</a> online\n  </strong>\n  <br/>Email: <em>admin@localhost</em>\n  <br/>password: <em>secret</em>\n</p>\n\nFor more context, documentation, and a live demo, check out the website:\n[trailbase.io](https://trailbase.io).\nQuestions? Thoughts? - Take a look at the\n[FAQ](https://trailbase.io/reference/faq/) or reach out.\nIf you like TrailBase or want to follow along, consider leaving a ⭐🙏.\n\n## Project Structure & Releases\n\nThis repository contains all components that make up TrailBase including the\nserver, client libraries, tests, documentation and examples.\nOnly the [benchmarks](https://github.com/trailbaseio/trailbase-benchmark) are\nkept separately due to their external dependencies.\n\nPre-built binaries are available as\n[GitHub releases](https://github.com/trailbaseio/trailbase/releases/) for\nLinux, MacOS and Windows or [Docker images](https://hub.docker.com/r/trailbase/trailbase).\n\nClient packages for various languages are available via:\n\n- [JavaScript/TypeScript](https://www.npmjs.com/package/trailbase)\n- [Dart/Flutter](https://pub.dev/packages/trailbase)\n- [Rust](https://crates.io/crates/trailbase-client)\n- [C#/.Net](https://www.nuget.org/packages/TrailBase/)\n- [Swift](https://github.com/trailbaseio/trailbase/tree/main/client/swift/trailbase)\n- [Kotlin](https://mvnrepository.com/artifact/io.trailbase/trailbase-client)\n- [Go](https://github.com/trailbaseio/trailbase/tree/main/client/go/trailbase)\n- [Python](https://pypi.org/project/trailbase/)\n\n## Getting Started\n\nTrailBase is a **single executable** and therefore very easy to\n[deploy](https://trailbase.io/getting-started/install/).\nYou can simply download the appropriate pre-built\n[GitHub release](https://github.com/trailbaseio/trailbase/releases/) bundle for\nyour system (MacOS, Linux or Windows), unpack and run the executable w/o having\nto worry about dependencies or shared-library skew.\n\nIf you want to get started even quicker, install TrailBase with the following\ncommand:\n\n```sh\n# Linux & MacOS\ncurl -sSL https://trailbase.io/install.sh | bash\n\n# Windows\niwr https://trailbase.io/install.ps1 | iex\n```\n\nAlternatively, run TrailBase using the Docker image:\n\n```sh\nalias trail='\n  mkdir -p traildepot && \\\n  docker run \\\n      -p 4000:4000 \\\n      -e ADDRESS=0.0.0.0:4000 \\\n      --mount type=bind,source=\"$PWD\"/traildepot,target=/app/traildepot \\\n      trailbase/trailbase /app/trail'\n```\n\nThen execute `trail help` to check that it is properly installed and list all\navailable command line options.\n\nTo bring up the server on `localhost:4000`, run:\n\n```sh\ntrail run\n```\n\nOn first start, a `./traildepot` folder will be bootstrapped, an admin user\ncreated and their credentials printed to the terminal.\nAfterwards open [http://localhost:4000/\\_/admin/](http://localhost:4000/_/admin/)\nin your browser and use the credentials to log into the admin dashboard.\n\nIf you want to install the auth UI, you can simply run:\n\n```sh\ntrail components add trailbase/auth_ui\n```\n\n, which will add a WASM component in `./traildepot/wasm` exposing additional UI\nendpoints, e.g.\n[http://localhost:4000/\\_/auth/login](http://localhost:4000/_/auth/login).\n\n## Building\n\nIf you have all the necessary build dependencies (Rust, node.js, geos,\nprotobuf, pnpm) installed, you can build TrailBase by running:\n\n```sh\n# Windows only: make sure to enable symlinks (w/o `mklink` permissions for your\n# user, git will fall back to copies).\ngit config core.symlinks true && git reset --hard\n\n# Download necessary git sub-modules.\ngit submodule update --init --recursive\n\n# Install Javascript dependencies first. Required for the next step.\npnpm install\n\n# Build the executable. Adding `--release` will yield a more optimized binary\n# but slow builds significantly.\ncargo build --bin trail\n```\n\nAlternatively, if you want to build a Docker image or don't want to deal with\nbuild dependencies, you can simply run:\n\n```sh\n# Download necessary git sub-modules.\ngit submodule update --init --recursive\n\n# Build the container as defined in `Dockerfile`.\ndocker build . -t trailbase\n```\n\n## Contributing\n\nContributions are very much appreciated 🙏. For anything beyond bug fixes,\nlet's briefly chat to see how a proposal fits into the overall roadmap and\navoid any surprises.\n\nWe're not sure yet what the best setup or exact license is for compatibility\nbetween OSL-3.0 and more popular licenses or use as a framework.\nSo we'd ask you to sign a simple CLA that retains your copyright, ensures that\nTrailBase will continue to forever be freely available under an OSI-approved\ncopyleft license, while allowing for some flexibility and sub-licensing as\nestablished by much larger, successful projects such as Grafana or Element.\n\n## License\n\nTrailBase is free software under the terms of the [Open Software License 3.0\n(OSL-3.0)](https://opensource.org/licenses/OSL-3.0).\nIts client libraries are dual licensed under the permissive\n[Apache-2.0](https://opensource.org/license/apache-2-0).\n\nWe chose OSL-3.0 over other, better known copyleft licenses due to its\nnarrower definition of \"derivative work\" that **only** covers modifications to\nTrailBase itself.\nThis means that your application's original code is **not** subject to the\nOSL-3.0's copyleft provisions. This is true whether you connect over the\nnetwork (e.g. web, mobile, other services, etc.), you're serving static assets,\nusing the runtime to write custom server-side logic or using TrailBase as a\nframework.\n\nThis limited scope is similar to the GPL's classpath or the LGPL's [linking\nexception](https://en.wikipedia.org/wiki/GPL_linking_exception).\nThe goal is to allow building on top and around of TrailBase without any\nprovisions rubbing off onto your original work, while making sure that fixes\nand improvements find their way back to the community.\nThese are our intentions - we felt the need to spell them out explicitly\nbecause licensing is tricky and we ain't lawyers.\nGraciously, the license's author provides some more\n[explanations](https://rosenlaw.com/OSL3.0-explained.htm).\nIf you have any concerns, please reach out.\n\nIf you require an\n[exception](https://www.gnu.org/philosophy/selling-exceptions.html), reach out\nto contact@trailbase.io.\n\n## Funding\n\nThis project receives funding through [NGI Zero Core](https://nlnet.nl/core), a\nfund established by [NLnet](https://nlnet.nl) with financial support from the\nEuropean Commission's [Next Generation Internet](https://ngi.eu) program.\nLearn more on our [NLnet project page](https://nlnet.nl/project/Trailbase/).\n\n<p align=\"left\">\n  <a href=\"https://nlnet.nl\">\n    <img src=\"https://nlnet.nl/logo/banner.png\" alt=\"NLnet foundation logo\" width=\"20%\" />\n  </a>\n\n  <a href=\"https://nlnet.nl/core\">\n    <img src=\"https://nlnet.nl/image/logos/NGI0_tag.svg\" alt=\"NGI Zero Logo\" width=\"20%\" />\n  </a>\n</p>\n","summary":"TrailBase is an open‑source, single‑executable alternative to Firebase that delivers sub‑millisecond latency and a fully type‑safe REST + realtime API stack, all written in Rust and backed by SQLite with a Wasmtime WebAssembly runtime. It bundles multi‑database support, geospatial querying, server‑side rendering, authentication, and an integrated admin UI into a self‑hostable binary that runs on Linux, macOS, or Windows without external dependencies. The project ships client libraries for JavaScript/TypeScript, Dart/Flutter, Rust, C#/.NET, Swift, Kotlin, Go, and Python, making it easy to integrate into web, mobile, or desktop applications. Developers and teams looking for a lightweight, cache‑free backend that can be deployed as a single binary will benefit most from TrailBase.","description":"An open, sub-millisecond, single-executable Firebase alternative with type-safe APIs, built-in WebAssembly runtime, realtime subscriptions, auth, and admin UI built on Rust, SQLite & Wasmtime.","stars":4810,"language":"Rust"},{"owner":"netalertx","repo":"NetAlertX","url":"https://github.com/netalertx/NetAlertX","readme":"[![Docker Size](https://img.shields.io/docker/image-size/jokobsk/netalertx?label=Size&logo=Docker&color=0aa8d2&logoColor=fff&style=for-the-badge)](https://hub.docker.com/r/jokobsk/netalertx)\n[![Docker Pulls](https://img.shields.io/docker/pulls/jokobsk/netalertx?label=Pulls&logo=docker&color=0aa8d2&logoColor=fff&style=for-the-badge)](https://hub.docker.com/r/jokobsk/netalertx)\n[![GitHub Release](https://img.shields.io/github/v/release/netalertx/NetAlertX?color=0aa8d2&logoColor=fff&logo=GitHub&style=for-the-badge)](https://github.com/netalertx/NetAlertX/releases)\n[![Discord](https://img.shields.io/discord/1274490466481602755?color=0aa8d2&logoColor=fff&logo=Discord&style=for-the-badge)](https://discord.gg/NczTUTWyRr)\n[![Home Assistant](https://img.shields.io/badge/Repo-blue?logo=home-assistant&style=for-the-badge&color=0aa8d2&logoColor=fff&label=Add)](https://my.home-assistant.io/redirect/supervisor_add_addon_repository/?repository_url=https%3A%2F%2Fgithub.com%2Falexbelgium%2Fhassio-addons)\n\n# NetAlertX - Network Visibility & Asset Intelligence Framework\n\n![main][main]\n\n<details>\n  <summary>📷 Click for more screenshots</summary>\n\n  | ![Main screen][main] | ![device_details 1][device_details]  | ![Screen network][network] |\n  |----------------------|----------------------|----------------------|\n  | ![presence][presence] | ![maintenance][maintenance] | ![settings][settings]  |\n  | ![sync_hub][sync_hub] | ![report1][report1] | ![device_nmap][device_nmap]  |\n\n  Head to [https://netalertx.com/](https://netalertx.com/) for even more gifs and screenshots 📷.\n\n</details>\n\n\nCentralized network visibility and continuous asset discovery.\n\nMonitor devices, detect change, and stay aware across distributed networks.\n\nNetAlertX provides a centralized \"Source of Truth\" (NSoT) for network infrastructure. Maintain a real-time inventory of every connected device, identify Shadow IT and unauthorized hardware to maintain regulatory compliance, and automate compliance workflows across distributed sites.\n\nNetAlertX is designed to bridge the gap between simple network scanning and complex SIEM tools, providing actionable insights without the overhead.\n\n\n## Table of Contents\n\n- [Quick Start](#quick-start)\n- [Features](#features)\n- [Documentation](#documentation)\n- [Security \\& Privacy](#security--privacy)\n- [FAQ](#faq)\n- [Troubleshooting Tips](#troubleshooting-tips)\n- [Everything else](#everything-else)\n\n## Quick Start\n\n> [!WARNING]\n> ⚠️ **Important:** The docker-compose has recently changed. Carefully read the [Migration guide](https://docs.netalertx.com/MIGRATION/?h=migrat#12-migration-from-netalertx-v25524) for detailed instructions.\n\nStart NetAlertX in seconds with Docker:\n\n```bash\ndocker run -d \\\n  --network=host \\\n  --restart unless-stopped \\\n  -v /local_data_dir:/data \\\n  -v /etc/localtime:/etc/localtime:ro \\\n  --tmpfs /tmp:uid=20211,gid=20211,mode=1700 \\\n  -e PORT=20211 \\\n  -e APP_CONF_OVERRIDE='{\"GRAPHQL_PORT\":\"20214\"}' \\\n  ghcr.io/netalertx/netalertx:latest\n```\n\nNote: Your `/local_data_dir` should contain a `config` and `db` folder.\n\nTo deploy a containerized instance directly from the source repository, execute the following BASH sequence:\n```bash\ngit clone https://github.com/netalertx/NetAlertX.git\ncd NetAlertX\ndocker compose up --force-recreate --build\n# To customize: edit docker-compose.yaml and run that last command again\n```\n\nNeed help configuring it? Check the [usage guide](https://docs.netalertx.com/README) or [full documentation](https://docs.netalertx.com/).\n\nFor Home Assistant users: [Click here to add NetAlertX](https://my.home-assistant.io/redirect/supervisor_add_addon_repository/?repository_url=https%3A%2F%2Fgithub.com%2Falexbelgium%2Fhassio-addons)\n\nFor other install methods, check the [installation docs](#documentation)\n\n---\n### || [Docker guide](https://docs.netalertx.com/DOCKER_INSTALLATION) || [Releases](https://github.com/netalertx/NetAlertX/releases) || [Docs](https://docs.netalertx.com/) || [Plugins](https://docs.netalertx.com/PLUGINS) || [Website](https://netalertx.com)\n---\n\n## Features\n\n### Discovery & Asset Intelligence\n\nContinuous monitoring for unauthorized asset discovery, connection state changes, and IP address management (IPAM) drift. Discovery & scan methods include: **arp-scan**,  **Pi-hole - DB import**,  **Pi-hole - DHCP leases import**, **Generic DHCP leases import**, **UNIFI controller import**, **SNMP-enabled router import**. Check the [Plugins](https://docs.netalertx.com/PLUGINS#readme) docs for a full list of avaliable plugins.\n\n### Notification gateways\n\nSend notifications to more than 80+ services, including Telegram via [Apprise](https://hub.docker.com/r/caronc/apprise), or use native [Pushsafer](https://www.pushsafer.com/), [Pushover](https://www.pushover.net/), or [NTFY](https://ntfy.sh/) publishers.\n\n### Integrations and Plugins\n\nFeed your data and device changes into [Home Assistant](https://docs.netalertx.com/HOME_ASSISTANT), read [API endpoints](https://docs.netalertx.com/API), or use [Webhooks](https://docs.netalertx.com/WEBHOOK_N8N) to setup custom automation flows. You can also\nbuild your own scanners with the [Plugin system](https://docs.netalertx.com/PLUGINS#readme) in as little as [15 minutes](https://www.youtube.com/watch?v=cdbxlwiWhv8).\n\n### Workflows\n\nThe [workflows module](https://docs.netalertx.com/WORKFLOWS) automates IT governance by enforcing device categorization and cleanup policies. Whether you need to assign newly discovered devices to a specific Network Node, auto-group devices from a given vendor, unarchive a device if detected online, or automatically delete devices, this module provides the flexibility to tailor the automations to your needs.\n\n\n## Documentation\n<!--- --------------------------------------------------------------------- --->\n\nExplore all the [documentation here](https://docs.netalertx.com/) or navigate to a specific installation option below.\n\nSupported browsers: Chrome, Firefox\n\n- [[Installation] Docker](https://docs.netalertx.com/DOCKER_INSTALLATION)\n- [[Installation] Home Assistant](https://github.com/alexbelgium/hassio-addons/tree/master/netalertx)\n- [[Installation] Bare metal](https://docs.netalertx.com/HW_INSTALL)\n- [[Installation] Unraid App](https://unraid.net/community/apps)\n- [[Setup] Usage and Configuration](https://docs.netalertx.com/README)\n- [[Development] API docs](https://docs.netalertx.com/API)\n- [[Development] Custom Plugins](https://docs.netalertx.com/PLUGINS_DEV)\n\n## Security & Privacy\n\nNetAlertX scans your local network and can store metadata about connected devices. By default, all data is stored **locally**. No information is sent to external services unless you explicitly configure notifications or integrations.\n\nCompliance & Hardening:\n- Run it behind a reverse proxy with authentication\n- Use firewalls to restrict access to the web UI\n- Regularly update to the latest version for security patches\n- Role-Based Access Control (RBAC) via Reverse Proxy: Integrate with your existing SSO/Identity provider for secure dashboard access.\n\nSee [Security Best Practices](https://github.com/netalertx/NetAlertX/security) for more details.\n\n\n## FAQ\n\n**Q: How do I monitor VLANs or remote subnets?**\nA: Ensure the container has proper network access (e.g., use `--network host` on Linux). Also check that your scan method is properly configured in the UI.\n\n**Q: What is the recommended deployment for high-availability?**\nA: We recommend deploying via Docker with persistent volume mounts for database integrity and running behind a reverse proxy for secure access.\n\n**Q: Will this send any data to the internet?**\nA: No. All scans and data remain local, unless you set up cloud-based notifications.\n\n**Q: Can I use this without Docker?**\nA: You can install the application directly on your own hardware by following the [bare metal installation guide](https://docs.netalertx.com/HW_INSTALL).\n\n**Q: Where is the data stored?**\nA: In the `/data/config` and `/data/db` folders. Back up these folders regularly.\n\n\n## Troubleshooting Tips\n\n- Some scanners (e.g. ARP) may not detect devices on different subnets. See the [Remote networks guide](https://docs.netalertx.com/REMOTE_NETWORKS) for workarounds.\n- Wi-Fi-only networks may require alternate scanners for accurate detection.\n- Notification throttling may be needed for large networks to prevent spam.\n- On some systems, elevated permissions (like `CAP_NET_RAW`) may be needed for low-level scanning.\n\nCheck the [GitHub Issues](https://github.com/netalertx/NetAlertX/issues) for the latest bug reports and solutions and consult [the official documentation](https://docs.netalertx.com/).\n\n## Everything else\n<!--- --------------------------------------------------------------------- --->\n\n<a href=\"https://trendshift.io/repositories/12670\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/12670\" alt=\"jokob-sk%2FNetAlertX | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n### 📧 Get notified what's new\n\nGet notified about a new release, what new functionality you can use and about breaking changes.\n\n![Follow and star][follow_star]\n\n### 🔀 Other Alternative Apps\n\n- [Fing](https://www.fing.com/) - Network scanner app for your Internet security (Commercial, Phone App, Proprietary hardware)\n- [NetBox](https://netboxlabs.com/) - The gold standard for Network Source of Truth (NSoT) and IPAM.\n- [Zabbix](https://www.zabbix.com/) or [Nagios](https://www.nagios.org/) - Strong focus on infrastructure monitoring.\n- [NetAlertX](https://netalertx.com) - The streamlined, discovery-focused choice for real-time asset intelligence and noise-free alerting.\n\n### 💙 Donations\n\nThank you to everyone who appreciates this tool and donates.\n\n<details>\n  <summary>Click for more ways to donate</summary>\n\n  <hr>\n\n  | [![GitHub](https://i.imgur.com/emsRCPh.png)](https://github.com/sponsors/jokob-sk) | [![Buy Me A Coffee](https://i.imgur.com/pIM6YXL.png)](https://www.buymeacoffee.com/jokobsk) |\n  | --- | --- |\n  - Bitcoin: `1N8tupjeCK12qRVU2XrV17WvKK7LCawyZM`\n  - Ethereum: `0x6e2749Cb42F4411bc98501406BdcD82244e3f9C7`\n\n  📧 Email me at [jokob@duck.com](mailto:jokob@duck.com?subject=NetAlertX) if you want to get in touch or if I should add other sponsorship platforms.\n\n</details>\n\n### 🏗 Contributors\n\nThis project would be nothing without the amazing work of the community, with special thanks to:\n\n> [pucherot/Pi.Alert](https://github.com/pucherot/Pi.Alert) (the original creator of PiAlert), [leiweibau](https://github.com/leiweibau/Pi.Alert): Dark mode (and much more), [Macleykun](https://github.com/Macleykun) (Help with Dockerfile clean-up), [vladaurosh](https://github.com/vladaurosh) for Alpine re-base help, [Final-Hawk](https://github.com/Final-Hawk) (Help with NTFY, styling and other fixes), [TeroRERO](https://github.com/terorero) (Spanish translations), [Data-Monkey](https://github.com/Data-Monkey), (Split-up of the python.py file and more), [cvc90](https://github.com/cvc90) (Spanish translation and various UI work) to name a few. Check out all the [amazing contributors](https://github.com/netalertx/NetAlertX/graphs/contributors).\n\n### 🌍 Translations\n\nProudly using [Weblate](https://hosted.weblate.org/projects/pialert/). Help out and suggest languages in the [online portal of Weblate](https://hosted.weblate.org/projects/pialert/core/).\n\n<a href=\"https://hosted.weblate.org/engage/pialert/\">\n  <img src=\"https://hosted.weblate.org/widget/pialert/core/multi-auto.svg\" alt=\"Translation status\" />\n</a>\n\n### License\n>  GPL 3.0 | [Read more here](LICENSE.txt) | Source of the [animated GIF (Loading Animation)](https://commons.wikimedia.org/wiki/File:Loading_Animation.gif) | Source of the [selfhosted Fonts](https://github.com/adobe-fonts/source-sans)\n\n_All product names, logos, and brands are property of their respective owners. All company, product and service names used in this website are for identification purposes only. Use of these names, logos, and brands does not imply endorsement._\n\n<!--- --------------------------------------------------------------------- --->\n[main]:                     ./docs/img/devices_split.png                  \"Main screen\"\n[device_details]:           ./docs/img/device_details.png                 \"Screen 1\"\n[events]:                   ./docs/img/events.png                         \"Screen 2\"\n[presence]:                 ./docs/img/presence.png                       \"Screen 3\"\n[maintenance]:              ./docs/img/maintenance.png                    \"Screen 4\"\n[network]:                  ./docs/img/network.png                        \"Screen 5\"\n[settings]:                 ./docs/img/settings.png                       \"Screen 6\"\n[showcase]:                 ./docs/img/showcase.gif                       \"Screen 6\"\n[sync_hub]:                 ./docs/img/sync_hub.png                       \"Screen 8\"\n[notification_center]:      ./docs/img/notification_center.png            \"Screen 8\"\n[sent_reports_text]:        ./docs/img/sent_reports_text.png              \"Screen 8\"\n[device_nmap]:              ./docs/img/device_tools.png                    \"Screen 9\"\n[report1]:                  ./docs/img/report_sample.png                  \"Report sample 1\"\n[main_dark]:                /docs/img/1_devices_dark.jpg                  \"Main screen dark\"\n[maintain_dark]:            /docs/img/5_maintain.jpg                      \"Maintain screen dark\"\n[follow_star]:              /docs/img/Follow_Releases_and_Star.gif        \"Follow and Star\"\n","summary":"NetAlertX is a network visibility and asset‑intelligence platform that serves as a centralized “Source of Truth” for every device on a distributed network. It continuo
