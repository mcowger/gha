<script id="project-data" type="application/json">[{"owner":"choyiny","repo":"saasmail","url":"https://github.com/choyiny/saasmail","readme":"<p align=\"center\">\n  <img src=\"public/saasmail-logo.png\" alt=\"saasmail\" width=\"480\" />\n</p>\n\n**The centralized inbox for SaaS teams.** One unified timeline per customer — marketing, notifications, and support emails collapsed into a single view, per person.\n\nEvery interaction with a customer matters, and context compounds. saasmail pulls the promo blast, the billing receipt, and the support thread into the same conversation, so anyone on your team can respond with the full history already in hand.\n\nSelf-hosted on Cloudflare Workers. Receive with **Cloudflare Email Workers**. Send with **Cloudflare Email Sending** or **Resend**.\n\n<img alt=\"saasmail\" src=\"docs/screenshots/saasmail.jpeg\" />\n\n## Sponsors\n\n<a href=\"https://givefeedback.dev/saas\"><img width=\"200\" height=\"44\" alt=\"givefeedback.dev\" src=\"https://github.com/user-attachments/assets/7da9ef06-cc47-4aa5-94b1-2108a302439c\" /></a>GiveFeedback.dev uses AI to turn client screen recordings into actionable tasks and prevent scope creep.\n\n## Demo Video\n\nhttps://github.com/user-attachments/assets/fe3a3811-1902-4b0b-8b94-f8c72f1afab4\n\n## Provider Matrix\n\n|               | Cloudflare | Resend |\n| ------------- | ---------- | ------ |\n| **Sending**   | ✅         | ✅     |\n| **Receiving** | ✅         | ❌     |\n\nPick one outbound provider at deploy time:\n\n- **Cloudflare Email Sending** — add a `send_email` binding (`EMAIL`) in `wrangler.jsonc` and onboard your domain at [Email Service](https://dash.cloudflare.com/?to=/:account/email-service).\n- **Resend** — set `RESEND_API_KEY` as a secret.\n\nIf `RESEND_API_KEY` is set it takes precedence; otherwise the `EMAIL` binding is used. If neither is configured, send attempts return a \"No email provider configured\" error.\n\n## How much does it cost?\n\n**$5/month** for the Cloudflare Workers Paid plan, which includes **3,000 emails per month** of Cloudflare Email Sending at no extra cost. That's it.\n\nNo VM to rent. No sprawling cloud console to learn. Just a domain, a Cloudflare account, and the Workers Paid plan.\n\n## Features\n\n### One Timeline Per Customer\n\nEvery email from a given person — marketing campaigns, transactional notifications, support replies — lands on a single timeline. People are sorted by recency with unread counts, so the customer who needs attention is always on top. Click in to see the latest message, and open the thread sidebar to replay the full history. Messages render as sanitized HTML with a Slack-style reply composer.\n\n### Multi-Inbox with Team Permissions\n\nRun multiple inbound addresses from a single deployment. Admins configure display names per inbox (`support@`, `sales@`, etc.) and assign members to specific inboxes. Members only see email, templates, and sequences scoped to the inboxes they're allowed to access.\n\n### Thread or Chat, Per Inbox\n\nDifferent inboxes call for different UX. Set each inbox to render as **Thread** or **Chat**:\n\n- **Thread** — traditional email threading with subject lines, quoted history, and formatted HTML. The right fit for `marketing@` and `newsletters@`, where context lives inside the message.\n- **Chat** — bubble-style conversation view that strips away subjects and signatures so replies feel like iMessage. The right fit for `support@`, where customers expect a back-and-forth, not a formal thread.\n\nOne deployment, one person timeline, but the interaction model matches the channel.\n\n### Email Templates\n\nCreate reusable HTML email templates with `{{variable}}` interpolation. Edit templates with a live HTML editor, preview rendered output, and send them via the API or the UI. Variables are automatically extracted and validated before sending. Templates are scoped to allowed inboxes.\n\n### Email Sequencing\n\nBuild multi-step drip campaigns. Enroll a contact into a sequence and saasmail sends templated emails on a schedule. Supports step skipping, delay overrides, custom variables, and automatic cancellation when the contact replies. Enrollment is enforced against the member's allowed inboxes.\n\n### User Management\n\nAdmin-controlled onboarding via one-time invite links. New members sign up with email + password, and can register a passkey for passwordless login on subsequent sessions. Roles: `admin` (full access + user management) and `member` (scoped by inbox assignment).\n\n### API Keys\n\nIssue scoped API keys for programmatic access to send email, manage templates, enroll contacts in sequences, and query inbox data. Keys are hashed at rest and follow the `sk_…` format.\n\n## Architecture\n\n| Layer             | Technology                              |\n| ----------------- | --------------------------------------- |\n| **Receive email** | Cloudflare Email Workers                |\n| **Send email**    | Cloudflare Email Sending or Resend      |\n| **Runtime**       | Cloudflare Workers + Hono               |\n| **API**           | Zod + `@hono/zod-openapi` (OpenAPI 3.1) |\n| **Database**      | Cloudflare D1 (SQLite)                  |\n| **File storage**  | Cloudflare R2 (attachments)             |\n| **Queue**         | Cloudflare Queues (sequence processing) |\n| **Frontend**      | React + Tailwind CSS + TipTap editor    |\n| **ORM**           | Drizzle                                 |\n| **Auth**          | BetterAuth with passkey support         |\n\n## Quick Start\n\n### Recommended: install with Claude Code\n\nsaasmail ships with two [Claude Code](https://claude.ai/claude-code) skills that do the install and upgrade for you. This is the path we actively maintain — everything in the manual setup below is what the skills automate.\n\n```bash\ngit clone https://github.com/choyiny/saasmail.git\ncd saasmail\nclaude\n```\n\nThen, inside Claude Code:\n\n- **`/saasmail-onboarding`** — interactive setup wizard. Walks you through Cloudflare login, creating D1/R2/Queue resources, filling out `wrangler.jsonc` and `.dev.vars`, running migrations, configuring Email Routing, and deploying. Expect ~30–40 minutes; most of that is DNS propagation, not typing.\n- **`/update-saasmail`** — pull the latest upstream changes. Adds the `upstream` remote if missing, rebases your local commits on top, and resolves conflicts in favor of upstream so you don't get stuck. Run this anytime you want to sync with `choyiny/saasmail`.\n\nDon't have Claude Code? The manual steps below cover the same ground.\n\n### Manual setup\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) v18+\n- [Yarn](https://yarnpkg.com/)\n- [Wrangler CLI](https://developers.cloudflare.com/workers/wrangler/) (`npm install -g wrangler`)\n- A [Cloudflare](https://dash.cloudflare.com/) account with Email Routing available for your domain\n- _Optional:_ a [Resend](https://resend.com/) account and API key (only if you prefer Resend over Cloudflare Email Sending)\n\n### 1. Clone and install\n\n```bash\ngit clone https://github.com/choyiny/saasmail.git\ncd saasmail\nyarn install\n```\n\n### 2. Authenticate with Cloudflare\n\n```bash\nwrangler login\n```\n\n### 3. Create Cloudflare resources\n\n```bash\n# D1 database\nwrangler d1 create saasmail-db\n\n# R2 bucket\nwrangler r2 bucket create saasmail-attachments\n\n# Queue for email sequencing\nwrangler queues create saasmail-sequence-emails\n```\n\n### 4. Configure wrangler\n\nCopy the example config and fill in your values:\n\n```bash\ncp wrangler.jsonc.example wrangler.jsonc\n```\n\nEdit `wrangler.jsonc`:\n\n- Set `account_id` to your Cloudflare account ID\n- Set the `database_id` in `d1_databases` to the ID from step 3\n- Set `BASE_URL` to your deployed URL\n- Set `TRUSTED_ORIGINS` to include your deployed URL\n- If using Cloudflare Email Sending, uncomment the `send_email` binding\n\n### 5. Configure secrets\n\nCopy the example and fill in your values:\n\n```bash\ncp .dev.vars.example .dev.vars\n```\n\nEdit `.dev.vars`:\n\n- `RESEND_API_KEY` — your Resend API key (omit if using Cloudflare Email Sending)\n- `BETTER_AUTH_SECRET` — generate a random string (`openssl rand -hex 32`)\n\nFor production, set these as Cloudflare secrets:\n\n```bash\nwrangler secret put BETTER_AUTH_SECRET\nwrangler secret put RESEND_API_KEY   # only if using Resend\n```\n\n### 6. Run migrations\n\n```bash\n# Local development database\nyarn db:migrate:dev\n\n# Production database\nyarn db:migrate:prod\n```\n\n### 7. Configure email routing\n\nIn the [Cloudflare dashboard](https://dash.cloudflare.com/), go to your domain's **Email Routing** settings and add a catch-all rule that routes to your saasmail worker.\n\n### 8. Deploy\n\n```bash\nyarn deploy\n```\n\nVisit your deployed URL to create your first admin account. Once signed in, go to **Inboxes** to name your inbound addresses and **Users** to invite additional team members.\n\n## Updating saasmail\n\n### Recommended: `/update-saasmail`\n\nFrom inside Claude Code, run **`/update-saasmail`**. It links the `upstream` remote to `https://github.com/choyiny/saasmail`, fetches the latest, and rebases your local commits on top. Any unresolvable conflicts are auto-resolved in favor of upstream so the sync never gets stuck.\n\n### Manual\n\n```bash\ngit remote add upstream https://github.com/choyiny/saasmail.git  # first time only\ngit fetch upstream\ngit rebase upstream/main -X ours\n```\n\nThe `-X ours` flag tells rebase to prefer upstream for conflicting hunks (during a rebase, \"ours\" is the branch being rebased onto). Your local commits are still replayed on top.\n\n## Local Development\n\n```bash\n# Start dev server (frontend + worker)\nyarn dev\n\n# Run tests\nyarn test\n\n# Type-check\nyarn tsc --noEmit\n\n# Generate a migration after schema changes\nyarn db:generate\n\n# Apply migrations locally\nyarn db:migrate:dev\n\n# Seed the local database with mock inboxes, people, and email threads\nyarn db:seed:dev\n\n# Open Drizzle Studio (local)\nyarn db:studio:dev\n```\n\nSince Cloudflare Email Routing can't deliver to `wrangler dev`, the seed script populates `seeds/demo.sql` so you can exercise the inbox UI without real inbound email.\n\nThe API is generated from Zod schemas in `worker/src/routers/` and exposes an OpenAPI 3.1 spec at `/api/doc` in the running worker.\n\n### End-to-end tests\n\nPlaywright drives the UI against a local `vite dev` running in demo mode (port 8788).\n\n```bash\n# Install Playwright browsers (first run only)\nyarn playwright install chromium\n\n# Run the full E2E suite (wipes and re-seeds the local D1 first)\nyarn test:e2e\n\n# Interactive runner\nyarn test:e2e:ui\n\n# Debug a single spec\nyarn test:e2e e2e/specs/compose.spec.ts\n```\n\nThe E2E suite **wipes and re-seeds the local D1 database** (`.wrangler/state/v3/d1/`) every time it runs. If you have hand-seeded dev data you want to keep, re-run `yarn db:seed:dev` after the E2E suite finishes.\n\nRequirements in `.dev.vars`: `DEMO_MODE=1` and `DISABLE_PASSKEY_GATE=true` — both are in `.dev.vars.example`. The suite also expects `http://localhost:8788` in `TRUSTED_ORIGINS` in `wrangler.jsonc`.\n\n## Configuration\n\n### wrangler.jsonc\n\nYour Cloudflare Workers configuration. Created from `wrangler.jsonc.example`. This file is gitignored so each deployer maintains their own config. Key sections:\n\n- `d1_databases` — D1 database binding\n- `r2_buckets` — R2 bucket for attachments\n- `queues` — Queue for sequence email processing\n- `triggers.crons` — Hourly cron to check for due sequence emails\n- `send_email` (optional) — Binding for Cloudflare Email Sending\n- `vars.BASE_URL` — Your deployed URL (used for OAuth redirects and BetterAuth)\n- `vars.TRUSTED_ORIGINS` — CORS allowed origins\n- `vars.COOKIE_PREFIX` — Prefix for better-auth session cookies\n\nTo rebrand the UI, drop a replacement `public/saasmail-logo.png` — it's used as both the favicon and the in-app logo. The `/saasmail-onboarding` skill will do this for you interactively.\n\n### .dev.vars\n\nLocal development secrets. Created from `.dev.vars.example`. This file is gitignored.\n\n- `RESEND_API_KEY` — Resend API key (if using Resend)\n- `BETTER_AUTH_SECRET` — Secret for session signing\n- `DISABLE_PASSKEY_GATE` — Local-only: set to `\"true\"` to skip the server-side passkey requirement so you can sign in with email+password during development. **Never set this in production.**\n\n## Roadmap\n\n- **Agentic email steering** — AI-driven conversation flows that intelligently gather information from contacts through multi-turn email exchanges\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). Security issues: see [SECURITY.md](SECURITY.md).\n\n## License\n\n[Apache License 2.0](LICENSE)\n","summary":"Saasmail is a self‑hosted email inbox system built on Cloudflare Workers that consolidates all customer‑facing emails—marketing, support, and notifications—into a single unified timeline per person. It supports multi‑inbox deployments with granular team permissions, offers configurable thread or chat views per inbox, and provides reusable HTML templates and drip‑campaign sequencing. Designed for SaaS teams and customer‑success or support squads, Saasmail lets anyone respond with full context while keeping costs minimal (a Cloudflare Workers Paid plan at $5/month).","description":"Self-managed email server for SaaS teams on Cloudflare Workers","stars":83,"language":"TypeScript"},{"owner":"asciimoo","repo":"hister","url":"https://github.com/asciimoo/hister","readme":"# Hister\n\n**Your own search engine**\n\nHister is a general purpose web search engine providing automatic full-text indexing for visited websites.\n\n![hister screenshot](webui/website/src/lib/assets/screenshot.png)\n\n![hister screencast](webui/website/src/lib/assets/demo.gif)\n\n## Features\n\n- **Privacy-focused**: Keep your browsing history indexed locally - don't use remote search engines if it isn't necessary\n- **Full-text indexing**: Search through the actual content of web pages you've visited\n- **Advanced search capabilities**: Utilize a powerful [query language](https://hister.org/docs/query-language/) for precise results\n- **Efficient retrieval**: Use keyword aliases to quickly find content\n- **Flexible content management**: Configure blacklist and priority rules for better control\n- **Local file indexing**: Index your local knowledge base\n- **Crawler**: Use a (headless) browser or a traditional crawler to extend your index fast\n- **Multi-user support**: Host it for your local community\n\n## Check out our [Documentation](https://hister.org/docs/) for more details\n\n## Development\n\n**Requirements**: latest Go and NPM\n\n- Clone the repository\n- Build with `./manage.sh build` (or `go generate ./...; go build`)\n\nTo work on the web app with hot reload and automatic Go rebuilds:\n\n```\nnpm run serve:app\n```\n\nThis starts a Vite dev server (with HMR) and the Go backend (with auto-rebuild via [air](https://github.com/air-verse/air)) concurrently.\n\n## Community\n\nJoin us on IRCNet: #hister or on [Discord](https://discord.gg/vAjtDtFp)\n\n## Bugs\n\nBugs or suggestions? Visit the [issue tracker](https://github.com/asciimoo/hister/issues).\n\n## License\n\n[AGPLv3](LICENSE) or any later version\n","summary":"Hister is a general‑purpose search engine that automatically indexes the full-text content of websites you visit, storing the data locally to preserve privacy. It offers advanced search features—including a powerful query language, keyword aliases, and blacklist/priority rules—alongside the ability to index local files, crawl with a headless browser, and support multiple users. Anyone who wants a private, self‑hosted knowledge base, developers building custom search tools, or a small community needing a shared search engine would find Hister useful.","description":"Your own search engine","stars":774,"language":"Go"},{"owner":"TandoorRecipes","repo":"recipes","url":"https://github.com/TandoorRecipes/recipes","readme":"<h1 align=\"center\">\n  <br>\n  <a href=\"https://tandoor.dev\"><img src=\"https://github.com/vabene1111/recipes/raw/develop/docs/logo_color.svg\" height=\"256px\" width=\"256px\"></a>\n  <br>\n  Tandoor Recipes\n  <br>\n</h1>\n\n<h4 align=\"center\">The recipe manager that allows you to manage your ever growing collection of digital recipes.</h4>\n\n<p align=\"center\">\n<a href=\"https://github.com/vabene1111/recipes/actions\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://github.com/vabene1111/recipes/workflows/Continuous%20Integration/badge.svg?branch=master\" ></a>\n<a href=\"https://github.com/vabene1111/recipes/stargazers\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/github/stars/vabene1111/recipes\" ></a>\n<a href=\"https://github.com/vabene1111/recipes/network/members\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/github/forks/vabene1111/recipes\" ></a>\n<a href=\"https://discord.gg/RhzBrfWgtp\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://badgen.net/badge/icon/discord?icon=discord&label\" ></a>\n<a href=\"https://hub.docker.com/r/vabene1111/recipes\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/docker/pulls/vabene1111/recipes\" ></a>\n<a href=\"https://github.com/vabene1111/recipes/releases/latest\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/github/v/release/vabene1111/recipes\" ></a>\n<a href=\"https://app.tandoor.dev/e/demo-auto-login/\" rel=\"noopener noreferrer\"><img src=\"https://img.shields.io/badge/demo-available-success\" ></a>\n</p>\n\n<p align=\"center\">\n<a href=\"https://tandoor.dev\" target=\"_blank\" rel=\"noopener noreferrer\">Website</a> •\n<a href=\"https://docs.tandoor.dev/install/docker/\" target=\"_blank\" rel=\"noopener noreferrer\">Installation</a> •\n<a href=\"https://docs.tandoor.dev/\" target=\"_blank\" rel=\"noopener noreferrer\">Docs</a> •\n<a href=\"https://app.tandoor.dev/e/demo-auto-login/\" target=\"_blank\" rel=\"noopener noreferrer\">Demo</a> •\n<a href=\"https://community.tandoor.dev\" target=\"_blank\" rel=\"noopener noreferrer\">Community</a> •\n<a href=\"https://discord.gg/RhzBrfWgtp\" target=\"_blank\" rel=\"noopener noreferrer\">Discord</a>\n</p>\n\n![Preview](docs/preview.png)\n\n## Core Features\n\n- 🥗 **Manage your recipes** - Manage your ever growing recipe collection\n- 📆 **Plan** - multiple meals for each day\n- 🛒 **Shopping lists** - via the meal plan or straight from recipes\n- 🪄 **use AI** to recognize images, sort recipe steps, find nutrition facts and more\n- 📚 **Cookbooks** - collect recipes into books\n- 👪 **Share and collaborate** on recipes with friends and family\n\n## Made by and for power users\n\n- 🔍 Powerful & customizable **search** with fulltext support and [TrigramSimilarity](https://docs.djangoproject.com/en/3.0/ref/contrib/postgres/search/#trigram-similarity)\n- 🏷️ Create and search for **tags**, assign them in batch to all files matching certain filters\n- ↔️ Quickly merge and rename ingredients, tags and units\n- 📥️ **Import recipes** from thousands of websites supporting [ld+json or microdata](https://schema.org/Recipe)\n- ➗ Support for **fractions** or decimals\n- 🐳 Easy setup with **Docker** and included examples for **Kubernetes**, **Unraid** and **Synology**\n- 🎨 Customize your interface with **themes**\n- 📦 **Sync** files with Dropbox and Nextcloud\n\n## All the must haves\n\n- 📱Optimized for use on **mobile** devices\n- 🌍 localized in many languages thanks to the awesome community\n- 📥️ **Import your collection** from many other [recipe managers](https://docs.tandoor.dev/features/import_export/)\n- ➕ Many more like recipe scaling, image compression, printing views and supermarkets\n\nThis application is meant for people with a collection of recipes they want to share with family and friends or simply\nstore them in a nicely organized way. A basic permission system exists but this application is not meant to be run as\na public page.\n\n## Docs\n\nDocumentation can be found [here](https://docs.tandoor.dev/).\n\n## ❤️ Support our work ❤️\nTandoor is developed by volunteers in their free time just because its fun. That said earning\nsome money with the project allows us to spend more time on it and thus make improvements we otherwise couldn't.\nBecause of that there are several ways you can support us\n\n- **GitHub Sponsors** You can sponsor contributors of this project on GitHub: [vabene1111](https://github.com/sponsors/vabene1111)\n- **Patron** You can sponsor contributors of this project on Patron: [vabene111](https://www.patreon.com/cw/vabene1111)\n- **Host at Hetzner** We have been very happy customers of Hetzner for multiple years for all of our projects. If you want to get into self-hosting or are tired of the expensive big providers, their cloud servers are a great place to get started. When you sign up via our [referral link](https://hetzner.cloud/?ref=ISdlrLmr9kGj) you will get 20€ worth of cloud credits and we get a small kickback too.\n- **Let us host for you** We are offering a [hosted version](https://app.tandoor.dev) where all profits support us and the development of tandoor (currently only available in germany).\n\n## Contributing\nContributions are welcome but please read [this](https://docs.tandoor.dev/contribute/guidelines/) **BEFORE** contributing anything!\n\n## Your Feedback\n\nShare some information on how you use Tandoor to help me improve the application [Google Survey](https://forms.gle/qNfLK2tWTeWHe9Qd7)\n\n## Get in touch\n\n<table>\n  <tr>\n    <td><a href=\"https://community.tandoor.dev\">Community</a></td>\n    <td>Get support, share best practices, discuss feature ideas, and meet other Tandoor users.</td>\n  </tr>\n\n  <tr>\n    <td><a href=\"https://discord.gg/RhzBrfWgtp\">Discord</a></td>\n    <td>We have a public Discord server that anyone can join. This is where all our developers and contributors hang out and where we make announcements</td>\n  </tr>\n</table>\n\n## License\n\nBeginning with version 0.10.0 the code in this repository is licensed under the [GNU AGPL v3](https://www.gnu.org/licenses/agpl-3.0.de.html) license with a\n[common clause](https://commonsclause.com/) selling exception. See [LICENSE.md](https://github.com/vabene1111/recipes/blob/develop/LICENSE.md) for details.\n\n> NOTE: There appears to be a whole range of legal issues with licensing anything other than the standard completely open licenses.\n> I am in the process of getting some professional legal advice to sort out these issues. \n> Please also see [Issue 238](https://github.com/vabene1111/recipes/issues/238) for some discussion and **reasoning** regarding the topic.\n\n**Reasoning**\n**This software and *all* its features are and will always be free for everyone to use and enjoy.**\n\nThe reason for the selling exception is that a significant amount of time was spend over multiple years to develop this software.\nA paid hosted version which will be identical in features and code base to the software offered in this repository will\nlikely be released in the future (including all features needed to sell a hosted version as they might also be useful for personal use).\nThis will not only benefit me personally but also everyone who self-hosts this software as any profits made through selling the hosted option\nallow me to spend more time developing and improving the software for everyone. Selling exceptions are [approved by Richard Stallman](http://www.gnu.org/philosophy/selling-exceptions.en.html) and the\ncommon clause license is very permissive (see the [FAQ](https://commonsclause.com/)).\n","summary":"Tandoor Recipes is a web‑based, server‑side manager that lets users organize, plan, and share a growing collection of digital recipes. It combines recipe storage, meal‑planning, automatable shopping lists, and AI‑powered image recognition with nutrition extraction, while offering full‑text search, advanced tagging, bulk edits, and cookbook creation. The platform supports imports from thousands of recipe sites, flexible scaling, cloud sync with Dropbox and Nextcloud, and runs easily via Docker or Kubernetes, even on mobile browsers. It is designed for power users, home cooks and families who need a customizable, collaborative, and searchable repository for their culinary library.","description":"Application for managing recipes, planning meals, building shopping lists and much much more!","stars":8228,"language":"HTML"},{"owner":"vavallee","repo":"bindery","url":"https://github.com/vavallee/bindery","readme":"<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/vavallee/bindery/main/.github/assets/logo.png\" alt=\"Bindery\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">Bindery</h1>\n\n<p align=\"center\">\n  <strong>Automated book download manager for Usenet & Torrents</strong><br>\n  Monitor authors. Search indexers. Download. Organize. Done.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/vavallee/bindery/actions/workflows/ci.yml\"><img src=\"https://github.com/vavallee/bindery/actions/workflows/ci.yml/badge.svg\" alt=\"CI\" /></a>\n  <a href=\"https://codecov.io/gh/vavallee/bindery\"><img src=\"https://img.shields.io/codecov/c/github/vavallee/bindery?logo=codecov&logoColor=white\" alt=\"codecov\" /></a>\n  <a href=\"https://github.com/vavallee/bindery/releases\"><img src=\"https://img.shields.io/github/v/release/vavallee/bindery\" alt=\"Release\" /></a>\n  <a href=\"https://github.com/vavallee/bindery/pkgs/container/bindery\"><img src=\"https://img.shields.io/badge/ghcr.io-vavallee%2Fbindery-blue\" alt=\"Docker\" /></a>\n  <a href=\"https://goreportcard.com/report/github.com/vavallee/bindery\"><img src=\"https://goreportcard.com/badge/github.com/vavallee/bindery\" alt=\"Go Report Card\" /></a>\n  <a href=\"https://github.com/vavallee/bindery/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/vavallee/bindery\" alt=\"License\" /></a>\n  <a href=\"https://discord.gg/RpuYYRM9cZ\"><img src=\"https://img.shields.io/badge/Discord-BINDERY-5865F2?logo=discord&logoColor=white\" alt=\"Discord\" /></a>\n</p>\n\n---\n\n<!-- Hero: Books library — auto-switches between dark and light to match the viewer's OS theme -->\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/books-desktop-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/books-desktop-light.png\">\n    <img src=\"docs/screenshots/books-desktop-dark.png\" alt=\"Bindery — Books library grid view\" width=\"1200\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/authors-desktop-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/authors-desktop-light.png\">\n    <img src=\"docs/screenshots/authors-desktop-dark.png\" alt=\"Bindery — Authors overview with monitoring badges\" width=\"1200\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/author-detail-desktop-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/author-detail-desktop-light.png\">\n    <img src=\"docs/screenshots/author-detail-desktop-dark.png\" alt=\"Bindery — Author detail page with book list\" width=\"1200\">\n  </picture>\n</p>\n\n<h4 align=\"center\">Mobile-friendly</h4>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/books-mobile-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/books-mobile-light.png\">\n    <img src=\"docs/screenshots/books-mobile-dark.png\" alt=\"Books — mobile\" width=\"280\">\n  </picture>\n  &nbsp;&nbsp;&nbsp;\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/authors-mobile-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/authors-mobile-light.png\">\n    <img src=\"docs/screenshots/authors-mobile-dark.png\" alt=\"Authors — mobile\" width=\"280\">\n  </picture>\n  &nbsp;&nbsp;&nbsp;\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/screenshots/author-detail-mobile-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/screenshots/author-detail-mobile-light.png\">\n    <img src=\"docs/screenshots/author-detail-mobile-dark.png\" alt=\"Author detail — mobile\" width=\"280\">\n  </picture>\n</p>\n\n---\n\n## Why Bindery?\n\n**Readarr is dead.** The official project was archived in June 2025 and its metadata backend (`api.bookinfo.club`) is permanently offline. Community forks rely on fragile Goodreads scrapers that break regularly. There was no reliable, open-source tool for automated book management on Usenet.\n\n**Bindery is the clean-room replacement.** Built from scratch in Go with a modern React UI, Bindery uses only stable, documented public APIs for book metadata. No scraping. No dead backends. No fragile dependencies.\n\n## Features\n\n### Library management\n- **Author monitoring** — Add authors and Bindery tracks all their works automatically via OpenLibrary's author works endpoint\n- **Book tracking** — Per-book monitor toggle, status workflow (wanted → downloading → downloaded → imported)\n- **Dual-format books** — Each book can hold an ebook *and* an audiobook simultaneously. The Book Detail page has separate format panels with independent status, file path, and grab buttons. The search pipeline uses Newznab category 7020 for ebooks and 3030 for audiobooks; the importer moves whole audiobook folders (multi-part `.m4b` / `.mp3`) as one unit into a separate audiobook library root; the Wanted page lists each missing format as a separate row.\n- **Series support** — Books grouped by series with position tracking and dedicated Series page\n- **Edition tracking** — Multiple editions per work, with format, ISBN, publisher, page count\n- **Library scan** — Walk `/books/` and reconcile existing files with wanted books in the database; trigger on-demand from **Settings → General → Scan Library**\n- **Author aliases** — Merge duplicate authors (\"RR Haywood\" / \"R.R. Haywood\" / \"R R Haywood\") into one canonical row from the Authors page; add-author flow detects aliases and prompts for merge instead of silently ingesting a duplicate\n\n### Search & downloads\n- **Newznab + Torznab** — Query multiple Usenet and torrent indexers in parallel, deduplicated and ranked\n- **SABnzbd, qBittorrent, Transmission** — Full support for both Usenet and torrent download clients\n- **Auto-grab** — Scheduler searches for wanted books every 12h and automatically grabs the best result. Adding a new author or flipping a book to `wanted` fires an immediate search — no waiting for the next scheduled pass. Toggle the global kill-switch at **Settings → General → Auto-grab** to pause all automatic grabbing without losing your monitored list.\n- **Interactive search** — Manual per-book search from the Wanted page with full result details; Grab button shows a spinner while in-flight and a ✓ on success\n- **Smart matching** — Four-tier query fallback (`t=book` → `surname+title` → `author+title` → title); word-boundary keyword matching; contiguous-phrase requirement for multi-word titles; dual-author-anchor for ambiguous short titles; subtitle-aware (`Title: Subtitle`)\n- **Composite ranking** — Results scored by format quality, edition tags (RETAIL / UNABRIDGED / ABRIDGED), year match to the book's release year, grab count, size, and ISBN exact-match bonus\n- **Quality profiles** — Preference order for EPUB / MOBI / AZW3 / PDF, with cutoff rules\n- **Language filter** — Preferred language setting (English by default); filters releases with foreign-language tags at word boundaries\n- **Custom formats** — Regex-based release scoring for freeleech, retail tags, etc.\n- **Delay profiles** — Wait N hours before grabbing to let higher-quality releases appear\n- **Blocklist** — Consulted on every search and auto-grab; prevents re-grabbing releases you've rejected. Add entries directly from History with one click\n- **Failure visibility** — Download errors surfaced in Queue (active) and History (permanent)\n\n### Import & organize\n- **Automatic import** — Completed downloads matched by NZO ID, placed in library with configurable naming template\n- **Import modes** — **Move** (default): source deleted after import. **Copy**: source kept so torrent clients continue seeding. **Hardlink**: zero extra disk, both paths share an inode (download dir and library must be on the same filesystem). Configurable under **Settings → General → Import Mode**.\n- **Naming tokens** — `{Author}`, `{SortAuthor}`, `{Title}`, `{Year}`, `{ext}` with sanitized path components\n- **Cross-filesystem moves** — Atomic rename when possible, copy+verify+delete for NFS/separate volumes\n- **History** — Every grab, import, and failure recorded with full detail (shown inline on History page)\n- **Calibre library integration** — Three modes, all configurable under **Settings → Calibre**:\n  - **Off** — no Calibre interaction (default).\n  - **calibredb CLI** — every successful import calls `calibredb add --with-library <path>`; the returned Calibre book id is persisted on the Bindery book row.\n  - **Plugin bridge** — POSTs the imported file path to the [Bindery Bridge plugin](https://github.com/vavallee/bindery-plugins) running an HTTP server inside a separate Calibre container; no shared binary or sidecar required. See [docs/CALIBRE-PLUGIN.md](docs/CALIBRE-PLUGIN.md) for setup.\n  - **Library import** — read an existing Calibre library's `metadata.db` directly and ingest it as Bindery's catalogue (idempotent; trigger from the Settings page or set `calibre.sync_on_startup`). Toggling the mode takes effect without a restart.\n\n### Metadata\n- **OpenLibrary** (primary) — Authors, books, editions, covers, ISBN lookup\n- **Google Books** (enricher) — Richer descriptions and ratings\n- **Hardcover.app** (enricher) — Community ratings and series data via GraphQL\n- **DNB** (enricher) — Deutsche Nationalbibliothek via the public SRU endpoint. No API key. Always on. Fills description, language, year, and publisher from MARC21 records — especially useful for German-language titles where OpenLibrary coverage is thin.\n- **Audnex** — Audiobook narrator, duration, cover, and description by Audible ASIN via the free [api.audnex.us](https://api.audnex.us) wrapper. Trigger with `POST /api/v1/book/{id}/enrich-audiobook`.\n- **Audible catalogue** — Direct author lookup against Audible's public catalogue endpoint. Supplements OpenLibrary/Hardcover during `FetchAuthorBooks` when the author's effective media type is `audiobook` or `both`. Pulled books carry the ASIN and flow through the same `allowed_languages` filter as the OpenLibrary path — prolific authors (Sanderson, King, Rowling) gain the ASINs that OL/Hardcover are missing, without letting foreign-language editions slip past the default profile.\n- **Cover image proxy** — Cover images are fetched and cached server-side under `<dataDir>/image-cache/` (30-day TTL). All `imageURL` fields in API responses are rewritten to `/api/v1/images?url=<encoded>` before leaving the server. The browser never contacts Goodreads, OpenLibrary, or Google Books directly — no IP leakage, no third-party tracking.\n- No Goodreads scraping. All sources use documented, stable public APIs.\n\n### Migration\n- **CSV import** — Upload a newline-separated list of author names (or a `name,monitored,searchOnAdd` CSV); each name is resolved against OpenLibrary.\n- **Readarr import** — Upload `readarr.db` directly. Authors are re-resolved via OpenLibrary (Goodreads IDs aren't portable since `bookinfo.club` is dead); Indexers, download clients, and blocklist entries port structurally. Run a library scan afterward to match existing files.\n- **CLI** — `bindery migrate csv <path>` and `bindery migrate readarr <path>` for first-time bulk imports without opening the UI.\n- **UI** — Settings → Import tab with file upload + per-section result summary.\n\n### Operations\n- **Webhook notifications** — Configurable HTTP callbacks for grab / import / failure events (pipe to Apprise, ntfy, Home Assistant, etc.)\n- **Metadata profiles** — Filter books by language, popularity, page count, ISBN presence\n- **Import lists** — Auto-add authors/books from external sources; exclusion list to skip unwanted entries\n- **Tag system** — Scope indexers/profiles/notifications to specific authors\n- **Backup/restore** — Snapshot the SQLite database on demand\n- **Log viewer** — Settings → Logs shows the last 200 entries from an in-process ring buffer, colour-coded by severity with WARN/ERROR filters and 5 s auto-refresh. Runtime log level switchable to DEBUG without restarting via `PUT /api/v1/system/loglevel`\n- **Authentication** — First-run setup creates an admin account (argon2id password hashing, signed session cookies). Four modes: **Enabled** (always require login), **Local only** (bypass auth for private IPs — home network convenience), **Disabled** (no auth, trusted network only), **Proxy** (trust an upstream `X-Forwarded-User` header from a configured trusted proxy — drop-in for Authelia / Authentik / oauth2-proxy forward-auth). Per-account API key for external integrations. Per-IP rate limiting on the login endpoint. CSRF double-submit tokens harden browser mutations (API-key clients exempt).\n- **OIDC single sign-on** — Native Authorization Code + PKCE client with multi-provider support. Pre-configured for Google, GitHub (via Dex), Authelia, and Keycloak; any compliant IdP works. Users identified by stable `(issuer, sub)` — safe against email/username changes. Managed under Settings → Authentication.\n- **Multi-user mode** — Per-user libraries, monitored authors, profiles, and downloads. Admin role manages indexers, download clients, and users; standard users see only their own catalogue. Users can be created locally, auto-provisioned via OIDC, or forward-auth mapped by username. Admin password reset from the Users page.\n\n### UI\n- **Multilingual UI** — English, French, German, Dutch, Spanish, Filipino (Tagalog), and Indonesian. Language auto-detected from the browser; manual override in Settings → General → Language. Persists to `localStorage` so the first paint is always in the right language.\n- **Light and dark themes** — iOS-style slider toggle in Settings → General → Appearance. First-load default respects the browser's `prefers-color-scheme`; preference persists to localStorage.\n- **Modern React SPA** — React 19 + TypeScript + Tailwind CSS 3, built with Vite.\n- **Detail pages** — Routed `/book/:id` and `/author/:id` pages replace the previous modal flow. Deep-linkable, back-button friendly, hold per-book history inline.\n- **Grid / Table view toggle** — Switch between poster-grid and dense-table views on the Books and Authors pages; choice persists per page.\n- **Mobile-friendly** — Responsive layout with hamburger nav, card views for History/Blocklist, agenda view for Calendar. Table views hide less-critical columns on narrow viewports.\n- **Pagination everywhere** — First/Prev/Next/Last + page numbers + configurable page size on all list pages; page size persists per-page in `localStorage`\n- **Search, filter, sort** — On Authors, Books, Wanted, and History pages. Authors can be filtered by `Monitored / Unmonitored`. Author detail page sorts books by publication date and filters by type, status, or released/upcoming. Books filter chips include `Type: Ebook / Audiobook`; Books view shows the author inline.\n- **Calendar view** — Upcoming book releases from monitored authors, with compact dot-indicator grid on mobile\n- **Full REST API** — Every feature accessible via HTTP for scripting and integration\n- **OPDS 1.2 catalogue at `/opds/v1.2/`** — browse and download your library from KOReader, Moon+ Reader, or any OPDS-capable reading app without Calibre. Authenticated with HTTP Basic Auth (any username, API key as password). Feeds: catalog root, recent, by author, search.\n\n### Packaging\n- **Single binary** — Frontend embedded via `go:embed`. No nginx, no sidecars, no complexity\n- **Distroless Docker image** — Minimal attack surface, published to GHCR\n- **Kubernetes-ready** — Helm chart included for ArgoCD / Flux deployments\n- **SQLite + WAL** — Pure Go driver (`modernc.org/sqlite`), no CGO, no external database to manage\n\n## Quick Start\n\n### Docker\n\n```bash\ndocker run -d \\\n  --name bindery \\\n  -p 8787:8787 \\\n  -v /path/to/config:/config \\\n  -v /path/to/books:/books \\\n  -v /path/to/downloads:/downloads \\\n  ghcr.io/vavallee/bindery:latest\n```\n\nOpen <http://localhost:8787>, follow the first-run setup to create the admin account, and you're in.\n\n### Binary (Linux / macOS / Windows)\n\nDownload the archive for your platform from the [latest release](https://github.com/vavallee/bindery/releases/latest), extract, and run:\n\n```bash\n# Linux / macOS\ntar -xzf bindery_<version>_<os>_<arch>.tar.gz\n./bindery\n```\n\n```cmd\n:: Windows\n:: Unzip bindery_<version>_windows_amd64.zip, then:\nbindery.exe\n```\n\nOn first run the database lands in the platform's standard location:\n\n| Platform | Default `BINDERY_DB_PATH` | Default `BINDERY_DATA_DIR` |\n|----------|---------------------------|----------------------------|\n| Linux / Docker / Helm | `/config/bindery.db` | `/config` |\n| Windows | `%APPDATA%\\Bindery\\bindery.db` | `%APPDATA%\\Bindery` |\n| macOS | `~/Library/Application Support/Bindery/bindery.db` | `~/Library/Application Support/Bindery` |\n\nSet `BINDERY_DB_PATH` / `BINDERY_DATA_DIR` if you want them elsewhere. The resolved paths are logged at startup (`\"starting bindery\"` log line).\n\nFor Docker Compose, Kubernetes (Helm), running as a specific UID/GID, and upgrade notes, see **[docs/DEPLOYMENT.md](docs/DEPLOYMENT.md)**.\n\n## Configuration\n\nBindery is configured through the web UI under **Settings**. Core env vars:\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `BINDERY_PORT` | `8787` | HTTP server port |\n| `BINDERY_DB_PATH` | platform-dependent (see [Binary install](#binary-linux--macos--windows)) | SQLite database path |\n| `BINDERY_DATA_DIR` | platform-dependent (see [Binary install](#binary-linux--macos--windows)) | Config directory (backups live here) |\n| `BINDERY_LOG_LEVEL` | `info` | `debug` / `info` / `warn` / `error` |\n| `BINDERY_DOWNLOAD_DIR` | `/downloads` | Where the download client places completed downloads |\n| `BINDERY_LIBRARY_DIR` | `/books` | Destination for imported ebook files |\n| `BINDERY_AUDIOBOOK_DIR` | falls back to `BINDERY_LIBRARY_DIR` | Destination for imported audiobook folders |\n\nThe full variable reference (path remapping, API key seeding, `BINDERY_PUID` / `BINDERY_PGID` sanity checks) is in **[docs/DEPLOYMENT.md](docs/DEPLOYMENT.md#environment-variables)**.\n\n## Metadata Sources\n\nBindery aggregates book metadata from multiple open sources:\n\n| Source | Auth Required | Used For |\n|--------|---------------|----------|\n| [OpenLibrary](https://openlibrary.org) | None | Primary: authors, books, editions, covers, ISBN lookup |\n| [Google Books](https://developers.google.com/books) | API key (free) | Enrichment: descriptions, ratings |\n| [Hardcover.app](https://hardcover.app) | None (public GraphQL) | Enrichment: community ratings, series |\n| [DNB](https://www.dnb.de/EN/Professionell/Metadatendienste/Datenbezug/SRU/sru_node.html) | None (public SRU) | Enrichment: descriptions, language, year for German-language titles |\n| [Audnex](https://api.audnex.us) | None | Audiobook narrator, duration, cover, description by ASIN |\n| [Audible](https://audible.com) | None | Supplemental audiobook author lookup — pulls ASINs OpenLibrary/Hardcover miss |\n\nNo Goodreads scraping. All sources use documented, stable public APIs. Cover images are fetched and cached server-side (`GET /api/v1/images`) — the browser never contacts external image hosts directly.\n\n## Supported Integrations\n\n### Download clients\n- **SABnzbd** — full support (NZB submission, queue/history polling, pause/resume/delete)\n- **qBittorrent** — WebUI API v2 with Username/Password auth (add magnet/URL, list/delete torrents)\n- **Transmission** - WebUI API with Username/Password auth (add magnet/URL, list/delete torrents)\n\n### Indexers\n- **Newznab** (Usenet) — NZBGeek, NZBFinder, NZBPlanet, DrunkenSlug, etc.\n- **Torznab** (Torrents) — Prowlarr, Jackett, or direct Torznab endpoints\n- **Configurable categories per indexer** — set custom Newznab category IDs in Settings → Indexers (e.g. `7120` for German books, `3130` for German audio on SceneNZBs). Bindery routes 7xxx IDs to ebook searches and 3xxx IDs to audiobook searches automatically.\n\n### Notifications\n- **Generic webhooks** — Any HTTP endpoint. Pipe to Apprise, ntfy, Home Assistant, Slack, Discord via proxies.\n\n## Architecture\n\nBindery is a single Go binary with the React frontend embedded via `go:embed`:\n\n```\n   Newznab / Torznab\n      indexers\n         │\n         ▼\n┌────────────────────────────┐\n│         Bindery            │──► SABnzbd / qBittorrent\n│  Go backend + React SPA    │──► /books/ library\n│  SQLite (WAL mode)         │──► Webhook notifications\n└────────────────────────────┘\n    ▲                    ▲\n    │                    │\nOpenLibrary      Google Books, Hardcover.app, DNB\n (primary)                 (enrichers)\n```\n\n- **Backend:** Go 1.25 with [chi](https://github.com/go-chi/chi) router\n- **Database:** SQLite via [modernc.org/sqlite](https://pkg.go.dev/modernc.org/sqlite) (pure Go, no CGO)\n- **Frontend:** React 19 + TypeScript + Tailwind CSS + [Vite](https://vite.dev)\n- **Container:** Multi-stage build on [distroless](https://github.com/GoogleContainerTools/distroless) (minimal attack surface)\n\n## API\n\nBindery exposes a full REST API under `/api/v1`. A few highlights:\n\n```\nGET    /api/v1/health                    - server health\nGET    /api/v1/author                    - list authors\nPOST   /api/v1/author                    - add author (triggers async book fetch)\nGET    /api/v1/book?status=wanted        - filter books by status\nPOST   /api/v1/book/{id}/search          - manual indexer search for a book\nGET    /api/v1/queue                     - active downloads with live SABnzbd overlay\nPOST   /api/v1/queue/grab                - submit a search result to download client\nGET    /api/v1/history                   - grab/import/failure events\nPOST   /api/v1/history/{id}/blocklist    - add a history event's release to the blocklist\nGET    /api/v1/blocklist                 - blocked releases\nGET    /api/v1/images?url=<encoded>      - proxied + cached cover image (30-day TTL)\nPOST   /api/v1/notification/{id}/test    - fire a test webhook\nPOST   /api/v1/backup                    - snapshot the database\n```\n\n### Authentication\n\nEvery request to `/api/v1/*` (except `/health`, `/auth/status`, `/auth/login`, `/auth/logout`, `/auth/setup`) is authenticated. A request is allowed if **any** of:\n\n- Auth mode is **Disabled**.\n- Auth mode is **Local only** and the request originates from a private-range IP (`10/8`, `172.16/12`, `192.168/16`, `127/8`, IPv6 ULA, link-local, loopback).\n- A valid `X-Api-Key` header (or `?apikey=` query param) matches the stored key.\n- A valid `bindery_session` cookie is present.\n\nOtherwise the server responds with `401`. The API key lives in **Settings → General → Security** — copy it from there for scripts and integrations. Regenerating the key invalidates any existing consumers.\n\n## Documentation\n\n| Topic | Where |\n|-------|-------|\n| **Quickstart** — first author to first grab in 10 minutes | [Wiki](https://github.com/vavallee/bindery/wiki/Quickstart) |\n| **Deployment** — Docker, Compose, k8s/Helm, binary, UID/GID, upgrades | [docs/DEPLOYMENT.md](docs/DEPLOYMENT.md) |\n| **Calibre plugin bridge** — cross-container Calibre integration via the Bindery Bridge plugin | [docs/CALIBRE-PLUGIN.md](docs/CALIBRE-PLUGIN.md) |\n| **Roadmap** — planned work, scope notes, and explicitly-out-of-scope items (Z-Library, OpenBooks, etc.) | [docs/ROADMAP.md](docs/ROADMAP.md) |\n| **Contributing & CI checks** — dev setup, full quality/security matrix, local check suite | [CONTRIBUTING.md](CONTRIBUTING.md) |\n| **Changelog** — release notes | [CHANGELOG.md](CHANGELOG.md) |\n| **Reverse-proxy & SSO setups** — Traefik / Caddy / Nginx / Authelia / Authentik recipes | [Wiki](https://github.com/vavallee/bindery/wiki/Reverse-proxy-and-SSO) |\n| **Troubleshooting** — permission-denied, path-remap, import failures | [Wiki](https://github.com/vavallee/bindery/wiki/Troubleshooting) |\n| **Indexer & download-client recipes** — NZBGeek / DrunkenSlug / Prowlarr / Jackett / SAB / qBit tips | [Wiki](https://github.com/vavallee/bindery/wiki/Indexer-and-downloader-recipes) |\n| **Migrating from Readarr** — step-by-step with known failure modes | [Wiki](https://github.com/vavallee/bindery/wiki/Migrating-from-Readarr) |\n\n## Community\n\n- **Discord** — real-time help, setup questions, release chat: [discord.gg/RpuYYRM9cZ](https://discord.gg/RpuYYRM9cZ). The `#support` channel is the best place to ask; `#changelog` is updated on every release.\n- **GitHub Issues** — bug reports and feature requests: [issues](https://github.com/vavallee/bindery/issues).\n- **GitHub Discussions** — open-ended design questions, show-and-tell, integration recipes: [discussions](https://github.com/vavallee/bindery/discussions).\n\nPlease keep security reports out of Discord and public issues — see [SECURITY.md](SECURITY.md) for the private disclosure channel.\n\n## Security\n\nBindery holds API keys, reaches LAN services, and writes to disk. We take that\nseriously.\n\n<p>\n  <a href=\"https://github.com/vavallee/bindery/security/code-scanning\"><img src=\"https://img.shields.io/github/actions/workflow/status/vavallee/bindery/security.yml?branch=main&label=security%20scans&logo=github\" alt=\"Security scans\" /></a>\n  <a href=\"https://securityscorecards.dev/viewer/?uri=github.com/vavallee/bindery\"><img src=\"https://api.securityscorecards.dev/projects/github.com/vavallee/bindery/badge\" alt=\"OpenSSF Scorecard\" /></a>\n  <a href=\"https://github.com/vavallee/bindery/security/dependabot\"><img src=\"https://img.shields.io/badge/Dependabot-enabled-brightgreen?logo=dependabot\" alt=\"Dependabot\" /></a>\n  <a href=\"SECURITY.md\"><img src=\"https://img.shields.io/badge/security-policy-blue\" alt=\"Security policy\" /></a>\n</p>\n\nEvery push and every weekly cron runs gosec, govulncheck, Semgrep, gitleaks,\nTrivy, Grype, Dockle, Syft, ZAP baseline, and OpenSSF Scorecard. Findings\nupload to GitHub's Security tab as SARIF and are public-readable. Release\nimages ship with SLSA build provenance and Syft SBOMs.\n\nHighlights of the in-app controls:\n\n- **SSRF guards** on every outbound URL (webhooks, indexers, download clients), with DNS-rebinding defense.\n- **Hardened headers** — CSP, `X-Frame-Options: DENY`, `Referrer-Policy`, auto HSTS when TLS is present.\n- **Cookie `Secure` auto-detect** via TLS or `X-Forwarded-Proto`, overridable.\n- **Distroless, non-root, read-only rootfs** container with all caps dropped and RuntimeDefault seccomp.\n- **Digest-pinned base images** tracked by Dependabot.\n\nTo report a vulnerability, follow the process in **[SECURITY.md](SECURITY.md)**.\nThe full threat model, control catalogue, and verification recipes live on\nthe [wiki Security page](https://github.com/vavallee/bindery/wiki/Security).\n\n## Contributing\n\nPRs, issues, and feedback welcome. See **[CONTRIBUTING.md](CONTRIBUTING.md)** for the dev setup, the full local check suite, and the PR flow. Tracked feature work lives in **[docs/ROADMAP.md](docs/ROADMAP.md)** — open an issue before starting anything substantial.\n\n## License\n\nMIT. See [LICENSE](LICENSE) for details.\n\n## Acknowledgments\n\n- The [*arr community](https://wiki.servarr.com/) for pioneering the monitor-search-download-import pattern\n- [OpenLibrary](https://openlibrary.org) for free, open book metadata\n- The Readarr project for the original vision, even though the implementation couldn't be sustained\n","summary":"Bindery is an open‑source, self‑hosted book‑download manager that automatically monitors authors, searches multiple Usenet and torrent indexers, and downloads new titles, then organizes them for easy access. The project offers a responsive web interface with desktop‑ and mobile‑friendly views, complete author overviews, detailed book listings, and real‑time status badges, allowing users to keep track of acquisition progress and metadata collection. It is designed for readers, collectors, and small libraries who need a reliable, fully automated replacement for discontinued services like Readarr. The Go‑based codebase ships with Docker images, CI/CD pipelines, and extensive tests, making deployment fast and dependable.","description":"Automated book download manager for Usenet. Monitor authors, search indexers, download via SABnzbd, and organize your library. The modern replacement for Readarr.","stars":139,"language":"Go"},{"owner":"zoriya","repo":"kyoo","url":"https://github.com/zoriya/kyoo","readme":"# <img width=\"32px\" src=\"./front/public/gh-icon.png\" alt=\"\"> Kyoo\n\n\nKyoo is a self-hosted media server focused on video content (Movies, Series & Anime). It is an alternative to Jellyfin or Plex.\n\nIt aims to have a low amount of maintenance needed (no folder structure required nor manual metadata edits). Media not being scanned correctly (even with weird names) is considered a bug.\n\nKyoo does not have a plugin system and aim to have every features built-in (see [#Features](#-features) for the list).\n\n![Kyoo in Action](https://raw.githubusercontent.com/zoriya/kyoo/screens/home.webp)\n\n## 🌐 Getting Started\n\n- **[Installation](./INSTALLING.md):** Basic installation guidelines, how to start Kyoo, enable OIDC or hardware transcoding.\n- **[Join the discord](https://discord.gg/E6Apw3aFaA):** Ask questions, talk about the development, feature you might want or bugs you might encounter.\n- **[API Documentation](https://kyoo.zoriya.dev/swagger):** The API to integrate Kyoo with other services, if you have any questions, please ask on GitHub or Discord!\n- **[Contributing](./CONTRIBUTING.md):** Feel free to open issues, submit pull requests, and contribute to making Kyoo even better. We need you!\n\n[![](https://discord.com/api/guilds/1216460898139635753/widget.png?style=banner2)](https://discord.gg/zpA74Qpvj5)\n\n## 🚀 Features\n\n- **Dynamic Transcoding:** Transcode your media to any quality, change on the fly with auto quality, and seek instantly without waiting for the transcoder.\n\n- **Video Preview Thumbnails:** Simply hover the video's progress bar and see a preview of the video.\n\n- **Intro/Credit detection:** Automatically detect intro/credits with audio fingerprinting (or chapter title matching).\n\n- **Enhanced Subtitle Support:** Subtitles are important, Kyoo supports PGS/VODSUB and SSA/ASS and uses the video's embedded fonts when available.\n\n- **Anime Name Parsing**: Kyoo will match weird anime names (like `[Some-Stuffs] Jojo's Bizarre Adventure Stone Ocean 24 (1920x1080 Blu-Ray Opus) [2750810F].mkv`) without issue.\n\n- **Helm Chart:** Deploy Kyoo to your Kubernetes cluster today!  There is an official Helm chart.  Multiple replicas is a WIP!\n\n- **OIDC Connection:** Connect using any OIDC compliant service (Google, Discord, Authelia, you name it).\n\n- ~**Watch List Scrubbing Support:** Your watch list is automatically synced to connected services (SIMKL and soon others [#351](https://github.com/zoriya/Kyoo/issues/351), [#352](https://github.com/zoriya/Kyoo/issues/352)). No need to manually mark episodes as watched.~ (soon, not reimplemented in v5 yet)\n\n- ~**Download and Offline Support:** Download videos to watch them without internet access, your progress will automatically be synced next time your devices goes online.~ (soon, not reimplemented in v5 yet)\n\n## 📺 Clients\n\nKyoo currently supports Web and ~Android clients~ (soon, not yet in v5), with additional platforms being thought about.\n\nDon't see your client? Kyoo is focused on adding features, but welcomes contributors! The frontend is built with React-Native and Expo. Come hang and develop with us on Discord.\n\nSupport for Apple devices (iOS, tvOS) is not currently planned due to buying hardware and yearly developer fee (~$100).\n\n## 📖 Translations\n\nIf Kyoo is not available on your language, you can use [weblate](https://hosted.weblate.org/engage/kyoo/) to add translations easily.\n\n[![Translation status](https://hosted.weblate.org/widget/kyoo/kyoo/multi-auto.svg)](https://hosted.weblate.org/engage/kyoo/)\n\n## 📜 Why another media-browser?\n\nFrom a technical standpoint, both Jellyfin and Plex lean on SQLite and confine everything within a single container, Kyoo takes a different route. We're not afraid to bring in additional containers when it makes sense, as seen with our transcoder.\n\nKyoo embraces the “setup once, forget about it” philosophy. Unlike Plex and Jellyfin, we don't burden you with manual file renaming or specific folder structures. Kyoo seamlessly works with files straight from your download directory, minimizing the maintenance headache for server admins.\n\nKyoo narrows its focus to movies, TV shows, and anime streaming. No music, e-books, or games – just pure cinematic delight.\n\n## 🔗 Live Demo\n\nCurious to see Kyoo in action? Check out our live demo featuring copyright-free movies at [kyoo.zoriya.dev](https://kyoo.zoriya.dev). Special thanks to the Blender Studio for providing open-source movies available for all.\n\n## 👀 Screens\n\n![Serie](https://raw.githubusercontent.com/zoriya/kyoo/screens/serie.webp)\n\n![Player](https://raw.githubusercontent.com/zoriya/kyoo/screens/player.webp)\n\n![Browse](https://raw.githubusercontent.com/zoriya/kyoo/screens/browse.webp)\n\n![Movie](https://raw.githubusercontent.com/zoriya/kyoo/screens/movie.webp)\n\n<p align=\"center\">\n\t<img\n\t\tsrc=\"https://raw.githubusercontent.com/zoriya/kyoo/screens/android-movie.png\"\n\t\talt=\"Android Movie\"\n\t\twidth=\"350\"\n\t/>\n</p>\nReady to elevate your streaming experience? Dive into Kyoo now! 🎬🎉\n\n<!-- vim: set wrap: -->\n","summary":"Kyoo is a self‑hosted media server for movies, TV series, and anime that emphasizes effortless setup and maintenance.  It automatically scans media, even with irregular names, and offers dynamic transcoding, on‑the‑fly quality adjustment, thumbnail previews, intro/credit detection, and extensive subtitle support.  The platform ships with built‑in OIDC authentication, a Helm chart for Kubernetes, and planned integrations with services like SIMKL, providing a feature‑rich experience without the need for manual folder organization.  Its plug‑in‑free design and low‑maintenance promise make it ideal for hobbyist media hosts, dev‑ops teams, and anyone who wants a ready‑to‑run server that works correctly right out of the box.","description":"A portable and vast media library solution.","stars":2374,"language":"TypeScript"},{"owner":"7ritn","repo":"VaulTLS","url":"https://github.com/7ritn/VaulTLS","readme":"![VaulTLS Logo](https://github.com/7ritn/VaulTLS/blob/main/assets/logoText.png)\n\nVaulTLS is a modern solution for managing mTLS (mutual TLS) certificates with ease.\nIt provides a centralized platform for generating, managing, and distributing TLS certificates for your home lab.\n\nThe main reason why I developed VaulTLS was that I didn't like messing with shell scripts and OpenSSL.\nI also did not have an overview about the expiration of individual certificates.\n\n![WebUI Overview](https://github.com/7ritn/VaulTLS/blob/main/assets/vaultls-overview.png)\n\n## Features\n\n- 🔒 Comprehensive TLS X.509 certificate management\n- 💻 SSH certificate management\n- 📱 Modern web interface for certificate management\n- 🔐 OpenID Connect authentication support\n- 📨 Email notifications for certificate expiration\n- 🚀 RESTful API for automation\n- 🛠 Docker/Podman container support\n- ⚡ Built with Rust (backend) and Vue.js (frontend) for performance and reliability\n\n## Screenshots\n![WebUI CAs](https://github.com/7ritn/VaulTLS/blob/main/assets/vaultls-ca.png)\n![WebUI Users](https://github.com/7ritn/VaulTLS/blob/main/assets/vaultls-users.png)\n\n## Installation\nInstallation is managed through a Container. The app should be behind a reverse proxy for TLS handling.\n`VAULTLS_API_SECRET` is required and should be a 256-bit base64 encoded string (`openssl rand -base64 32`).\nIf you want to access VaulTLS using non-HTTPS you need to add the following environmental variable:\n`VAULTLS_INSECURE=true`.\n\n```bash\npodman run -d \\\n  --name vaultls \\\n  -p 5173:80 \\\n  -v vaultls-data:/app/data \\\n  -e VAULTLS_API_SECRET=\"[VAULTLS_API_SECRET]\" \\\n  -e VAULTLS_URL=\"https://vaultls.example.com/\" \\\n  ghcr.io/7ritn/vaultls:latest\n```\n\n### Encrypting the Database\nBy specifying the `VAULTLS_DB_SECRET` environmental variable, the database is encrypted. Data is retained. It is not possible to go back.\n\n### Specifying log level\nThe default log level is moderate. If a different one is desired, please specify it using the `VAULTLS_LOG_LEVEL` environmental variable.\nFor bug reports, a trace log report is desirable. Be aware that the trace does contain secrets.\n\n### Setting up OIDC\nTo set up OIDC you need to create a new client in your authentication provider. For Authelia a configuration could look like this\n```yaml\n- client_id: \"[client_id]\"\n  client_name: \"vautls\"\n  client_secret: \"[client_secret_hash]\"\n  public: false\n  authorization_policy: \"one_factor\"\n  pkce_challenge_method: \"S256\"\n  redirect_uris:\n    - \"https://vaultls.example.com/api/auth/oidc/callback\"\n  scopes:\n    - \"openid\"\n    - \"profile\"\n    - \"email\"\n  userinfo_signed_response_alg: \"none\"\n```\nFor VaulTLS the required variables can be configured via environmental variables or web UI.\n\n| Environment Variable        | Value                                                |\n|-----------------------------|------------------------------------------------------|\n| `VAULTLS_OIDC_AUTH_URL`     | `https://auth.example.com`                           |\n| `VAULTLS_OIDC_CALLBACK_URL` | `https://vaultls.example.com/api/auth/oidc/callback` |\n| `VAULTLS_OIDC_ID`           | `[client_id]`                                        |\n| `VAULTLS_OIDC_SECRET`       | `[client_secret]`                                    |\n\n### Container Secrets\nCertain environment variables can be container secrets instead of regular variables.\nVaulTLS will try to read secrets from `/run/secrets/<ENV_NAME>`, if you want to specify a different path, you can do so in the environmental variable.\nThe following variables support secrets:\n- `VAULTLS_API_SECRET`\n- `VAULTLS_DB_SECRET`\n- `VAULTLS_OIDC_SECRET`\n\n## Usage\nDuring the first setup a TLS Certificate Authority is automatically created. If OIDC is configured, no password needs to be set.\nUsers can either log in via password or OIDC. If a user first logs in via OIDC, their e-mail is matched with all VaulTLS users and linked.\nIf no user is found, a new one is created.\n\nUsers can only see certificates created for them. Only admins can create new certificates.\nUser certificates can be downloaded through the web interface.\n\nThe current CA certificate to be integrated with your reverse proxy is available as a file at `/app/data/ca/ca.cert` \nand as download via the API endpoint `/api/certificates/ca/download`.\n\nFurther API documentation is available at the endpoint `/api`\n\n### TLS Certificate Passwords\nCertificates downloaded come in the PKCS#12 file format. They are a bundle consisting of the public certificate and private key. By default, PKCS#12 passwords are optional and certificates will be generated with no password. On the settings page, the PKCS#12 password requirements can be set with the following options:\n\n| PKCS12 Password Rule  | Result                                           |\n|-----------------------|--------------------------------------------------|\n| Optional              | Passwords are optional and can be blank          |\n| Required              | Passwords are required, and can be user supplied |\n| System Generated      | Random passwords will be generated               |\n\nPasswords are stored in the database and retrieved from the web interface only when the user clicks on view password.\n\n### TLS Server Certificates\nVaulTLS also has support for server certificates.\nThe user flow remains quite similar with the difference that SAN DNS entries can be specified.\nDownload is also using a possibly password-protected PKCS#12 file.\nSince most reverse proxies require the certificate and private key to be supplied separately, the PKCS#12 file may need to be split.\nThis can be done, for example, with openssl:\n```sh\nopenssl pkcs12 -in INFILE.p12 -out OUTFILE.crt -nokeys\nopenssl pkcs12 -in INFILE.p12 -out OUTFILE.key -nodes -nocerts\n```\n\n### Certificate Revocation Lists (CRL)\nTLS certificates cannot be simply deleted since their validity period is cryptographically encoded in the certificate. VaulTLS provides the CRL mechanism to revoke certificates. This file is used by the validation side (such as the server for client certificates) to check if the certificate has been revoked. CRLs are stored as files under `/app/data/crl/`. They can be downloaded in the CA tab of the frontend and can be retrieved from the API under `/api/certificates/ca/<id>/crl`. They do not require authentication to be accessed.\n\n### SSH Certificates\nVaulTLS also supports SSH certificates. To use these you must manually create a new SSH CA in the CA tab. Since SSH does not provide a bundled file format to store the private key and certificate, the file is provided as a ZIP archive.\n\n### Caddy\nTo use caddy as a reverse proxy for the VaulTLS app, a configuration like the following is required.\n```caddyfile\nreverse_proxy 127.0.0.1:5173\n```\nTo integrate the CA cert for client validation, you can either use a file or http based approach. Extend your TLS instruction for that with the client_auth section. Documentation here: [https://caddyserver.com/docs/caddyfile/directives/tls#client_auth](https://caddyserver.com/docs/caddyfile/directives/tls#client_auth).\n\nFile based:\n```caddyfile\ntls {\n  client_auth {\n    mode <usually verify_if_given OR require_and_verify>\n    trust_pool file {\n      pem_file <Path to VaulTLS Directory>/ca.cert\n    }\n  }\n}\n```\n\nHTTP based:\n```caddyfile\ntls {\n  client_auth {\n    mode <usually verify_if_given OR require_and_verify>\n    trust_pool http {\n      endpoints <Address of VaulTLS Instance such as 127.0.0.1:5173>/api/certificates/ca/download\n    }\n  }\n}\n```\n\nIf you choose `verify_if_given`, you can still block clients for apps that you want to require client authentication:\n```caddyfile\n@blocked {\n  vars {tls_client_subject} \"\"\n}\nabort @blocked\n```\n\n## FAQ\n### I can not login\nMake sure you are accessing VaulTLS using a secure connection i.e. HTTPS. If you want to access VaulTLS insecurely you \nneed to add the following environmental variable: `VAULTLS_INSECURE=true`.\n\n### I (or a user) forgot my password\nTo change any users password specify the corresponding user's email address with the `VAULTLS_ACCOUNT_EMAIL` env variable and the new\npassword with `VAULTLS_ACCOUNT_PASSWORD`. During start up VaulTLS will check for these and if set, adjust the password and exit. You can not use\nthese env variables during normal operation and they need to be removed after the password was changed.\n\n### OIDC is not working\nIf VaulTLS claims that OIDC is not configured, the most likely cause is that it couldn't discover the OIDC provider based on the `VAULTLS_OIDC_AUTH_URL` given. Make sure the VaulTLS container can access the OIDC provider. In general the base url to the auth provider should be enough. For Authentik the required URL path is `/application/o/<application slug>/`. If that doesn't work, directly specify the .well_known url.\n\n## Mail is not working\nPlease make sure that you are choosing the correct email encryption type. Usually port 587 is for STARTTLS and 465 for TLS.\n\n## Roadmap\n- Allow user details to be updated\n- Improve testing\n","summary":"VaulTLS is a modern, web‑based platform for centrally managing mutual TLS and SSH certificates, designed to replace manual OpenSSL scripting in home‑lab and small‑team environments. It generates and distributes X.509 certificates, tracks expirations, and sends email alerts, while offering a REST API, OIDC authentication, and a Docker‑friendly deployment. The intuitive Vue.js UI, Rust backend, and built‑in notification and automation features make it ideal for developers and system administrators who need a reliable, container‑ready CA system without the overhead of shell scripts.","description":"Selfhostable web app to make managing mTLS certificates a breeze","stars":438,"language":"Rust"},{"owner":"budgetbee","repo":"budgetbee","url":"https://github.com/budgetbee/budgetbee","readme":"[![Server Tests](https://github.com/budgetbee/budgetbee/actions/workflows/server-tests.yml/badge.svg)](https://github.com/budgetbee/budgetbee/actions/workflows/server-tests.yml)\n[![Build and Push Docker Image](https://github.com/budgetbee/budgetbee/actions/workflows/docker-build.yml/badge.svg)](https://github.com/budgetbee/budgetbee/actions/workflows/docker-build.yml)\n[![CodeFactor](https://www.codefactor.io/repository/github/budgetbee/budgetbee/badge)](https://www.codefactor.io/repository/github/budgetbee/budgetbee)\n\n<p align=\"center\">\n<img src=\"https://github.com/budgetbee/budgetbee/raw/main/web/assets/images/logo.svg#gh-light-mode-only\" width=\"50%\" />\n<img src=\"https://github.com/budgetbee/budgetbee/raw/main/web/assets/images/logo_dark.svg#gh-dark-mode-only\" width=\"50%\" />\n</p>\n\n<h3 align=\"center\">Self-hosted personal finance management — track expenses, set budgets, and gain full control over your money.</h3>\n\n---\n\n## What is BudgetBee?\n\nBudgetBee is an **open-source, self-hosted personal finance manager** designed to give you complete ownership of your financial data. Instead of relying on third-party cloud services, BudgetBee runs entirely on your own infrastructure via Docker, keeping your sensitive financial information private and under your control.\n\nWhether you want to track day-to-day expenses, plan monthly budgets, monitor upcoming bills, or get a high-level view of your financial health through charts and reports — BudgetBee brings all of that into one clean, intuitive interface.\n\n### Key highlights\n\n- **Transaction tracking** — Log income, expenses, and transfers across multiple accounts. Organize records with customizable categories and sub-categories so your finances are always neatly classified.\n- **Budget management** — Define spending budgets per category and monitor your progress in real time to avoid overspending.\n- **Accounts & net worth** — Manage multiple accounts (checking, savings, cash, investments, etc.) and get an at-a-glance overview of your total net worth.\n- **Upcoming expenses** — Schedule and track recurring or future expenses so you are never caught off guard by a bill.\n- **Reports & charts** — Visualize your spending patterns, income vs. expenses, and category breakdowns through rich interactive charts.\n- **Multi-user support** — Create separate accounts for family members or housemates, each with their own data and settings.\n- **Multi-currency** — Work with multiple currencies, making BudgetBee suitable for users who travel or manage finances in more than one country.\n- **Import from Excel / JSON** — Migrate your existing records easily by importing data from spreadsheets or JSON files.\n- **API access** — Interact with your data programmatically through a REST API secured with API keys.\n- **100% self-hosted** — Deploy with a single `docker-compose` command. Your data never leaves your server.\n\n### Tech stack\n\n| Layer | Technology |\n|-------|-----------|\n| Backend | Laravel (PHP) |\n| Frontend | React + Vite + Tailwind CSS |\n| Database | MySQL / MariaDB |\n| Deployment | Docker & Docker Compose |\n\n---\n\n## Disclaimer\n\n- ⚠️ The project is under **very active** development.\n- ⚠️ Expect bugs and breaking changes.\n- ⚠️ **Do not use this application as your only record of finances until a stable v1.0.0 is released.**\n\n<p align=\"center\">\n<img src=\"https://github.com/budgetbee/budgetbee/raw/main/web/assets/images/budgetbee_screenshot.webp\" width=\"100%\" />\n</p>\n\nIf you want to support this project, you can!\n\n<a href=\"https://bmc.link/alejandrork\" target=\"_blank\"><img src=\"https://www.buymeacoffee.com/assets/img/custom_images/orange_img.png\" alt=\"Buy Me A Coffee\" style=\"height: 37px !important;width: 170px !important;box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5) !important;-webkit-box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5) !important;\" ></a>\n\n## Installation\n\nBudgetBee is installed via Docker Compose. Copy the snippet below, fill in the environment variables, and run `docker-compose up -d`.\n\n```yaml\nversion: '3.8'\nservices:\n  nginx:\n    image: ghcr.io/budgetbee/budgetbee/proxy:latest\n    command: nginx -g \"daemon off;\"\n    ports:\n      - \"${APP_PORT}:80\" # Port exposed on the host, e.g. 80 -> http://localhost\n    depends_on:\n      - webserver\n      - web\n    restart: unless-stopped\n    networks:\n      - skynet\n  webserver:\n    image: ghcr.io/budgetbee/budgetbee/api:latest\n    working_dir: /var/www/html\n    command: sh entrypoint.sh\n    environment:\n      DB_HOST: db\n      DB_DATABASE: ${DB_DATABASE}   # Name of the MySQL database (e.g. budgetbee)\n      DB_USERNAME: ${DB_USERNAME}   # MySQL user the app connects with (e.g. budgetbee)\n      DB_PASSWORD: ${DB_PASSWORD}   # Password for the MySQL app user - use a strong value\n    depends_on:\n      db:\n        condition: service_healthy\n    restart: unless-stopped\n    networks:\n      - skynet\n  web:\n    image: ghcr.io/budgetbee/budgetbee/web:latest\n    restart: unless-stopped\n    networks:\n      - skynet\n  db:\n    image: mysql:8.2.0\n    command: --default-authentication-plugin=mysql_native_password\n    environment:\n      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # MySQL root password - keep this secret\n      MYSQL_DATABASE: ${DB_DATABASE}           # Must match DB_DATABASE above\n      MYSQL_USER: ${DB_USERNAME}               # Must match DB_USERNAME above\n      MYSQL_PASSWORD: ${DB_PASSWORD}           # Must match DB_PASSWORD above\n    healthcheck:\n      test: [\"CMD\", \"/usr/bin/mysql\", \"--user=${DB_USERNAME}\", \"--password=${DB_PASSWORD}\", \"--execute\", \"SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = '${DB_DATABASE}';\"]\n      timeout: 20s\n      retries: 100\n    restart: unless-stopped\n    volumes:\n      - db_data:/var/lib/mysql\n    networks:\n      - skynet\nnetworks:\n  skynet:\nvolumes:\n  db_data:\n```\n\n## Getting Started\n\nOnce all containers are up and running, open the application in your browser. If no users exist yet, you will be automatically redirected to the registration page where you can create your first admin account by entering your name, email, and password.\n\nAfter registering, you will be redirected to the login page to sign in with your new credentials.\n\n## Roadmap\n\n| Feature | Status |\n| ----------------------------------------------- | ------ |\n| Import records from Excel / JSON                | ✅ Done |\n| Multi-user support                              | ✅ Done |\n| Built-in currency support                       | ✅ Done |\n| Custom currencies                               | 🔜 Planned |\n| Create / edit categories                        | ✅ Done |\n| Budgets per category                            | ✅ Done |\n| Reports page                                    | ✅ Done |\n| Upcoming expenses page                          | ✅ Done |\n| Automation rules                                | 🔜 Planned |\n| Bank integrations                               | 🔜 Planned |\n| Export / backup                                 | 🔜 Planned |\n| Customizable dashboard                          | 🔜 Planned |\n\n## Updates\n\nTo upgrade BudgetBee to the latest version, rebuild your Docker Compose images and recreate the containers:\n\n```bash\ndocker-compose up -d --build\n```\n\n## Documentation\n\nThis section is currently under development.\n\n## Contributing\n\nContributions are welcome! Feel free to open a pull request or start a discussion in the issues section.\n\n## Bugs\n\nFor bugs please [open an issue](https://github.com/budgetbee/budgetbee/issues)\n","summary":"BudgetBee is an open‑source, self‑hosted personal finance manager that lets users log income, expenses, and transfers across multiple accounts, set per‑category budgets, and keep an up‑to‑date net‑worth snapshot while visualizing patterns through interactive charts. It supports recurring bills, multi‑currency handling, migration from Excel/JSON, multi‑user accounts, and exposes a secure REST API, all deployable with a single `docker‑compose` command. The tool is ideal for privacy‑conscious individuals, families, or roommates who want full control of their financial data without relying on third‑party cloud services.","description":"BudgetBee is a finance self hosted app","stars":519,"language":"JavaScript"},{"owner":"chrisvel","repo":"tududi","url":"https://github.com/chrisvel/tududi","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"public/wide-logo-light.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"public/wide-logo-dark.png\">\n    <img src=\"public/wide-logo-light.png\" alt=\"tududi\" width=\"400\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <h2 align=\"center\">Productivity made simple</p></h2>\n  <p align=\"center\">Organize your life and projects with a clear, hierarchical structure,<br>\n  smart recurring tasks, and seamless Telegram integration.<br>\n  Get focused, stay productive, and keep your data private.\n  </p>\n</p>\n\n![Light Mode Screenshot](screenshots/all-light.png)\n\nMore screenshots are [available here](#screenshots).\n\n---\n\n## 💖 Enjoying tududi?\n\nHelp keep it free and actively developed by [buying me a coffee](https://coff.ee/chrisveleris) ☕, [becoming a sponsor](https://github.com/sponsors/chrisvel), or [supporting on Patreon](https://www.patreon.com/ChrisVeleris). You can also support the project by purchasing a **hosted subscription** for a hassle-free, managed solution. Every contribution helps maintain this project and build new features!\n\n---\n\n## 🚀 How It Works\n\nThis app allows users to manage their tasks, projects, areas, notes, and tags in an organized way. Users can create tasks, projects, areas (to group projects), notes, and tags. Each task can be associated with a project, and both tasks and notes can be tagged for better organization. Projects can belong to areas and can also have multiple notes and tags. This structure helps users categorize and track their work efficiently, whether they’re managing individual tasks, larger projects, or keeping detailed notes.\n\n## 🧠 Philosophy\n\nFor the thinking behind tududi, read:\n\n- [Designing a Life Management System That Doesn't Fight Back](https://m
