<script id="project-data" type="application/json">[{"owner":"swagger-api","repo":"swagger-ui","url":"https://github.com/swagger-api/swagger-ui","readme":"# <img src=\"https://raw.githubusercontent.com/swagger-api/swagger.io/wordpress/images/assets/SWU-logo-clr.png\" width=\"300\">\n\n[![NPM version](https://badge.fury.io/js/swagger-ui.svg)](http://badge.fury.io/js/swagger-ui)\n[![Build Status](https://jenkins.swagger.io/view/OSS%20-%20JavaScript/job/oss-swagger-ui-master/badge/icon?subject=jenkins%20build)](https://jenkins.swagger.io/view/OSS%20-%20JavaScript/job/oss-swagger-ui-master/)\n[![npm audit](https://jenkins.swagger.io/buildStatus/icon?job=oss-swagger-ui-security-audit&subject=npm%20audit)](https://jenkins.swagger.io/job/oss-swagger-ui-security-audit/lastBuild/console)\n[![total GitHub contributors](https://img.shields.io/github/contributors-anon/swagger-api/swagger-ui.svg)](https://github.com/swagger-api/swagger-ui/graphs/contributors)\n\n[![monthly npm installs](https://img.shields.io/npm/dm/swagger-ui.svg?label=npm%20downloads)](https://www.npmjs.com/package/swagger-ui)\n![docker registry](https://img.shields.io/badge/docker-docker.swagger.io%2Fswaggerapi%2Fswagger--ui-blue)\n![monthly packagist installs](https://img.shields.io/packagist/dm/swagger-api/swagger-ui.svg?label=packagist%20installs)\n[![gzip size](https://img.shields.io/bundlephobia/minzip/swagger-ui.svg?label=gzip%20size)](https://bundlephobia.com/package/swagger-ui)\n\n## Introduction\n[Swagger UI](https://swagger.io/tools/swagger-ui/) allows anyone — be it your development team or your end consumers — to visualize and interact with the API’s resources without having any of the implementation logic in place. It’s automatically generated from your OpenAPI (formerly known as Swagger) Specification, with the visual documentation making it easy for back end implementation and client side consumption.\n\n## General\n**👉🏼 Want to score an easy open-source contribution?** Check out our [Good first issue](https://github.com/swagger-api/swagger-ui/issues?q=is%3Aissue+is%3Aopen+label%3A%22Good+first+issue%22) label.\n\n**🕰️ Looking for the older version of Swagger UI?** Refer to the [*2.x* branch](https://github.com/swagger-api/swagger-ui/tree/2.x).\n\n\nThis repository publishes three different NPM modules:\n\n* [swagger-ui](https://www.npmjs.com/package/swagger-ui) is a traditional npm module intended for use in single-page applications that are capable of resolving dependencies (via Webpack, Browserify, etc.).\n* [swagger-ui-dist](https://www.npmjs.com/package/swagger-ui-dist) is a dependency-free module that includes everything you need to serve Swagger UI in a server-side project, or a single-page application that can't resolve npm module dependencies.\n* [swagger-ui-react](https://www.npmjs.com/package/swagger-ui-react) is Swagger UI packaged as a React component for use in React applications.\n\nWe strongly suggest that you use `swagger-ui` instead of `swagger-ui-dist` if you're building a single-page application, since `swagger-ui-dist` is significantly larger.\n\nIf you are looking for plain ol' HTML/JS/CSS, [download the latest release](https://github.com/swagger-api/swagger-ui/releases/latest) and copy the contents of the `/dist` folder to your server.\n\n\n## Compatibility\nThe OpenAPI Specification has undergone 5 revisions since initial creation in 2010.  Compatibility between Swagger UI and the OpenAPI Specification is as follows:\n\n| Swagger UI Version | Release Date | OpenAPI Spec compatibility                                  | Notes                                                                 |\n|--------------------|--------------|-------------------------------------------------------------|-----------------------------------------------------------------------|\n| 5.32.0             | 2026-02-27   | 2.0, 3.0.0, 3.0.1, 3.0.2, 3.0.3, 3.0.4, 3.1.0, 3.1.1, 3.1.2, 3.2.0 | [tag v5.32.0](https://github.com/swagger-api/swagger-ui/tree/v5.32.0) |\n| 5.19.0             | 2025-02-17   | 2.0, 3.0.0, 3.0.1, 3.0.2, 3.0.3, 3.0.4, 3.1.0, 3.1.1, 3.1.2 | [tag v5.19.0](https://github.com/swagger-api/swagger-ui/tree/v5.19.0) |\n| 5.0.0              | 2023-06-12   | 2.0, 3.0.0, 3.0.1, 3.0.2, 3.0.3, 3.1.0               | [tag v5.0.0](https://github.com/swagger-api/swagger-ui/tree/v5.0.0)   |\n| 4.0.0              | 2021-11-03   | 2.0, 3.0.0, 3.0.1, 3.0.2, 3.0.3                      | [tag v4.0.0](https://github.com/swagger-api/swagger-ui/tree/v4.0.0)   |\n| 3.18.3             | 2018-08-03   | 2.0, 3.0.0, 3.0.1, 3.0.2, 3.0.3                      | [tag v3.18.3](https://github.com/swagger-api/swagger-ui/tree/v3.18.3) |\n| 3.0.21             | 2017-07-26   | 2.0                                                  | [tag v3.0.21](https://github.com/swagger-api/swagger-ui/tree/v3.0.21) |\n| 2.2.10             | 2017-01-04   | 1.1, 1.2, 2.0                                        | [tag v2.2.10](https://github.com/swagger-api/swagger-ui/tree/v2.2.10) |\n| 2.1.5              | 2016-07-20   | 1.1, 1.2, 2.0                                        | [tag v2.1.5](https://github.com/swagger-api/swagger-ui/tree/v2.1.5)   |\n| 2.0.24             | 2014-09-12   | 1.1, 1.2                                             | [tag v2.0.24](https://github.com/swagger-api/swagger-ui/tree/v2.0.24) |\n| 1.0.13             | 2013-03-08   | 1.1, 1.2                                             | [tag v1.0.13](https://github.com/swagger-api/swagger-ui/tree/v1.0.13) |\n| 1.0.1              | 2011-10-11   | 1.0, 1.1                                             | [tag v1.0.1](https://github.com/swagger-api/swagger-ui/tree/v1.0.1)   |\n\n## Anonymized analytics\n\nSwaggerUI uses [Scarf](https://scarf.sh/) to collect [anonymized installation analytics](https://github.com/scarf-sh/scarf-js?tab=readme-ov-file#as-a-user-of-a-package-using-scarf-js-what-information-does-scarf-js-send-about-me). These analytics help support the maintainers of this library and ONLY run during installation. To [opt out](https://github.com/scarf-sh/scarf-js?tab=readme-ov-file#as-a-user-of-a-package-using-scarf-js-how-can-i-opt-out-of-analytics), you can set the `scarfSettings.enabled` field to `false` in your project's `package.json`:\n\n```\n// package.json\n{\n  // ...\n  \"scarfSettings\": {\n    \"enabled\": false\n  }\n  // ...\n}\n```\n\nAlternatively, you can set the environment variable `SCARF_ANALYTICS` to `false` as part of the environment that installs your npm packages, e.g., `SCARF_ANALYTICS=false npm install`.\n\n## Documentation\n\n#### Usage\n- [Installation](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/installation.md)\n- [Configuration](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/configuration.md)\n- [CORS](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/cors.md)\n- [OAuth2](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/oauth2.md)\n- [Deep Linking](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/deep-linking.md)\n- [Limitations](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/limitations.md)\n- [Version detection](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/usage/version-detection.md)\n\n#### Customization\n- [Overview](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/customization/overview.md)\n- [Plugin API](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/customization/plugin-api.md)\n- [Custom layout](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/customization/custom-layout.md)\n\n#### Development\n- [Setting up](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/development/setting-up.md)\n- [Scripts](https://github.com/swagger-api/swagger-ui/blob/HEAD/docs/development/scripts.md)\n\n#### Contributing\n- [Contributing](https://github.com/swagger-api/.github/blob/HEAD/CONTRIBUTING.md)\n\n##### Integration Tests\n\nYou will need JDK of version 7 or higher as instructed here\nhttps://nightwatchjs.org/guide/getting-started/installation.html#install-selenium-server\n\nIntegration tests can be run locally with `npm run e2e` - be sure you aren't running a dev server when testing!\n\n### Browser support\nSwagger UI works in the latest versions of Chrome, Safari, Firefox, and Edge.\n\n### Known Issues\n\nTo help with the migration, here are the currently known issues with 3.X. This list will update regularly, and will not include features that were not implemented in previous versions.\n\n- Only part of the parameters previously supported are available.\n- The JSON Form Editor is not implemented.\n- Support for `collectionFormat` is partial.\n- l10n (translations) is not implemented.\n- Relative path support for external files is not implemented.\n\n## Security contact\n\nPlease disclose any security-related issues or vulnerabilities by emailing [security@swagger.io](mailto:security@swagger.io), instead of using the public issue tracker.\n\n## License\n\nSwaggerUI is licensed under [Apache 2.0 license](https://github.com/swagger-api/swagger-ui/blob/master/LICENSE).\nSwaggerUI comes with an explicit [NOTICE](https://github.com/swagger-api/swagger-ui/blob/master/NOTICE) file\ncontaining additional legal notices and information.\n","summary":"Swagger UI is a powerful tool that automatically generates interactive documentation for APIs based on the OpenAPI Specification, allowing users to visualize and test endpoints without needing the underlying implementation. It provides a robust, visual interface that simplifies both backend development and client-side integration. By offering various distribution methods—including standard npm modules, a standalone distributable, and a dedicated React component—it is highly adaptable for developers and teams working across different architectural environments.","description":"Swagger UI is a collection of HTML, JavaScript, and CSS assets that dynamically generate beautiful documentation from a Swagger-compliant API.","stars":28826,"language":"JavaScript"},{"owner":"Automattic","repo":"harper","url":"https://github.com/Automattic/harper","readme":"<div id=\"header\" align=\"center\">\n    <img src=\"logo.svg\" width=\"400px\" />\n    <h1>Harper</h1>\n</div>\n\n[![Harper Binaries](https://github.com/automattic/harper/actions/workflows/binaries.yml/badge.svg)](https://github.com/automattic/harper/actions/workflows/binaries.yml)\n[![Website](https://github.com/automattic/harper/actions/workflows/build_web.yml/badge.svg)](https://github.com/automattic/harper/actions/workflows/build_web.yml)\n[![Checks](https://github.com/automattic/harper/actions/workflows/just_checks.yml/badge.svg)](https://github.com/automattic/harper/actions/workflows/just_checks.yml)\n[![Crates.io](https://img.shields.io/crates/v/harper-ls)](https://crates.io/crates/harper-ls)\n![NPM Version](https://img.shields.io/npm/v/harper.js)\n![Downloads](https://img.shields.io/github/downloads/automattic/harper/total?label=Binary+Downloads)\n![Obsidian Plugin Downloads](https://img.shields.io/github/downloads/automattic/harper-obsidian-plugin/total?label=Obsidian+Plugin+Downloads)\n\nHarper is an English grammar checker designed to be _just right._\nI created it after years of dealing with the shortcomings of the competition.\n\nGrammarly was too expensive and too overbearing.\nIts suggestions lacked context, and were often just plain _wrong_.\nNot to mention: it's a privacy nightmare.\nEverything you write with Grammarly is sent to their servers.\nTheir privacy policy claims they don't sell the data, but that doesn't mean they don't use it to train large language models and god knows what else.\nNot only that, but the round-trip-time of the network request makes revising your work all the more tedious.\n\nLanguageTool is great, if you have gigabytes of RAM to spare and are willing to download the ~16GB n-gram dataset.\nBesides the memory requirements, I found LanguageTool too slow: it would take several seconds to lint even a moderate-size document.\n\nThat's why I created Harper: it is the grammar checker that fits my needs.\nNot only does it take milliseconds to lint a document, take less than 1/50th of LanguageTool's memory footprint,\nbut it is also completely private.\n\nHarper is even small enough to load via [WebAssembly.](https://writewithharper.com)\n\n## Language Support\n\nHarper currently only supports English, but the core is extensible to support other languages, so we welcome contributions that allow for other language support.\n\n## Performance Issues\n\nWe consider long lint times bugs.\nIf you encounter any significant performance issues, please create an issue on the topic.\n\nIf you find a fix to any performance issue, we would appreciate the contribution.\nJust please make sure to read [our contribution guidelines first.](https://writewithharper.com/docs/contributors/introduction)\n\n## Links\n\n- [Frequently Asked Questions](https://writewithharper.com/#faqs)\n- [Obsidian Documentation](https://writewithharper.com/docs/integrations/obsidian)\n- [`harper-ls` Documentation](https://writewithharper.com/docs/integrations/language-server)\n- Supported Editors' Documentation\n  - [Visual Studio Code](https://writewithharper.com/docs/integrations/visual-studio-code)\n  - [Neovim](https://writewithharper.com/docs/integrations/neovim)\n  - [Helix](https://writewithharper.com/docs/integrations/helix)\n  - [Emacs](https://writewithharper.com/docs/integrations/emacs)\n  - [Zed](https://writewithharper.com/docs/integrations/zed)\n- [`harper.js` Documentation](https://writewithharper.com/docs/harperjs/introduction)\n- [Official Discord Server](https://discord.com/invite/JBqcAaKrzQ)\n\n## Huge Thanks\n\nThis project would not be possible without the hard work from those who [contribute](https://writewithharper.com/docs/contributors/introduction).\n\n<a href=\"https://github.com/automattic/harper/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=automattic/harper\" />\n</a>\n\nHarper's logo was designed by [Lukas Werner](https://lukaswerner.com/).\n","summary":"Harper is a privacy-focused English grammar checker designed as a high-performance, lightweight alternative to resource-heavy industry standard tools. Built for speed and efficiency, it features millisecond linting times and a minimal memory footprint, allowing it to run effectively via WebAssembly or as a local language server. This project is ideal for developers and privacy-conscious writers who require real-time, offline-capable grammar assistance across various text editors like VS Code, Neovim, and Obsidian.","description":"Offline, privacy-first grammar checker. Fast, open-source, Rust-powered","stars":10700,"language":"Rust"},{"owner":"TanStack","repo":"db","url":"https://github.com/TanStack/db","readme":"<div align=\"center\">\n  <img src=\"./media/header_db.png\" >\n</div>\n\n<br />\n\n<div align=\"center\">\n\t<a href=\"https://npmjs.com/package/@tanstack/db\" target=\"\\_parent\">\n\t  <img alt=\"\" src=\"https://img.shields.io/npm/dm/@tanstack/db.svg\" alt=\"npm downloads\" />\n\t</a>\n\t<a href=\"https://github.com/TanStack/db\" target=\"\\_parent\">\n\t  <img alt=\"\" src=\"https://img.shields.io/github/stars/TanStack/db.svg?style=social&label=Star\" alt=\"GitHub stars\" />\n\t</a>\n\t<a href=\"https://bundlejs.com/?q=%40tanstack%2Fdb&config=%7B%22esbuild%22%3A%7B%22external%22%3A%5B%22react%22%2C%22react-dom%22%5D%7D%7D&badge=\" target=\"\\_parent\">\n\t  <img alt=\"\" src=\"https://deno.bundlejs.com/?q=@tanstack/db&config={%22esbuild%22:{%22external%22:[%22react%22,%22react-dom%22]}}&badge=detailed\" alt=\"Bundle size\" />\n\t</a>\n</div>\n\n<div align=\"center\">\n\t<a href=\"#status\">\n    <img src=\"https://img.shields.io/badge/status-beta-yellow\" alt=\"Status - BETA\">\n  </a>\n\t<a href=\"https://bestofjs.org/projects/tanstack-db\">\n\t\t<img alt=\"Best of JS\" src=\"https://img.shields.io/endpoint?url=https://bestofjs-serverless.now.sh/api/project-badge?fullName=TanStack%2Fdb%26since=daily\" alt=\"Best of JS\"/>\n\t</a>\n\t<a href=\"https://twitter.com/tan_stack\">\n\t\t<img src=\"https://img.shields.io/twitter/follow/tan_stack.svg?style=social\" alt=\"Follow @TanStack\"/>\n\t</a>\n</div>\n\n<div align=\"center\">\n\t\t\n###  [Become a Sponsor!](https://github.com/sponsors/tannerlinsley/)\n</div>\n\n# TanStack DB\n\n> Tanstack DB is currently in BETA. See [the release post](https://tanstack.com/blog/tanstack-db-0.1-the-embedded-client-database-for-tanstack-query) for more details.\n\nThe reactive client store for your API.\n\nTanStack DB solves the problems of building fast, modern apps, helping you:\n\n- Avoid endpoint sprawl and network waterfalls by loading data into normalized collections\n- Optimise client performance with sub-millisecond live queries and real-time reactivity\n- Take the network off the interaction path with instant optimistic writes\n\nData loading is optimized. Interactions feel instantaneous. Your backend stays simple and your app stays blazing fast. No matter how much data you load.\n\n<a href=\"https://tanstack.com/db\" style=\"font-weight:bold\" >Read the docs →</a>\n<br />\n\n## Get Involved\n\n- We welcome issues and pull requests!\n- Participate in [GitHub discussions](https://github.com/TanStack/db/discussions)\n- Chat with the community on [Discord](https://discord.com/invite/WrRKjPJ)\n- See [CONTRIBUTING.md](./CONTRIBUTING.md) for setup instructions\n\n## Partners\n\n<table align=\"center\">\n<tr>\n<td>\n<a href=\"https://www.coderabbit.ai/?via=tanstack&dub_id=aCcEEdAOqqutX6OS\" >\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://tanstack.com/assets/coderabbit-dark-D643Zkrv.svg\" height=\"40\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://tanstack.com/assets/coderabbit-light-CIzGLYU_.svg\" height=\"40\" />\n  <img src=\"https://tanstack.com/assets/coderabbit-light-CIzGLYU_.svg\" height=\"40\" alt=\"CodeRabbit\" />\n</picture>\n</a>\n</td>\n<td>\n<a href=\"https://www.cloudflare.com?utm_source=tanstack\">\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://tanstack.com/assets/cloudflare-white-Co-Tyjbl.svg\" height=\"60\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://tanstack.com/assets/cloudflare-black-6Ojsn8yh.svg\" height=\"60\" />\n  <img src=\"https://tanstack.com/assets/cloudflare-black-6Ojsn8yh.svg\" height=\"60\" alt=\"Cloudflare\" />\n</picture>\n</a>\n</td>\n</tr>\n<tr>\n<td>\n<a href=\"https://electric-sql.com\">\n<picture>\n\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://tanstack.com/assets/electric-dark-Bfu2Vl2j.svg\" height=\"60\">\n\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://tanstack.com/assets/electric-light-C-5MDda4.svg\" height=\"60\">\n\t<img src=\"https://raw.githubusercontent.com/electric-sql/meta/main/identity/ElectricSQL-logo.with-background.sm.png\" height=\"60\" alt=\"ElectricSQL logo\"/>\n</picture>\n</a>\n</td>\n<td>\n<a href=\"https://www.prisma.io?utm_source=tanstack&via=tanstack\">\n<picture>\n\t<source media=\"(prefers-color-scheme: dark)\" srcset=\"https://tanstack.com/assets/prisma-dark-DwgDxLwn.svg\" height=\"60\">\n\t<source media=\"(prefers-color-scheme: light)\" srcset=\"https://tanstack.com/assets/prisma-light-Cloa3Onm.svg\" height=\"60\">\n\t<img src=\"https://tanstack.com/assets/prisma-dark-DwgDxLwn.svg\" height=\"60\" alt=\"Prisma\"/>\n</picture>\n</a>\n</td>\n</tr>\n</table>\n\n<div align=\"center\">\n<img src=\"./media/partner_logo.svg\" alt=\"DB & you?\" height=\"65\">\n<p>\nWe're looking for TanStack DB Partners to join our mission! Partner with us to push the boundaries of TanStack DB and build amazing things together.\n</p>\n<a href=\"mailto:partners@tanstack.com?subject=TanStack DB Partnership\"><b>LET'S CHAT</b></a>\n</div>\n\n## Explore the TanStack Ecosystem\n\n- <a href=\"https://github.com/tanstack/config\"><b>TanStack Config</b></a> – Tooling for JS/TS packages\n- <a href=\"https://github.com/tanstack/devtools\"><b>TanStack DevTools</b></a> – Unified devtools panel\n- <a href=\"https://github.com/tanstack/form\"><b>TanStack Form</b></a> – Type‑safe form state\n- <a href=\"https://github.com/tanstack/pacer\"><b>TanStack Pacer</b></a> – Debouncing, throttling, batching <br/>\n- <a href=\"https://github.com/tanstack/query\"><b>TanStack Query</b></a> – Async state & caching\n- <a href=\"https://github.com/tanstack/ranger\"><b>TanStack Ranger</b></a> – Range & slider primitives\n- <a href=\"https://github.com/tanstack/router\"><b>TanStack Router</b></a> – Type‑safe routing, caching & URL state\n- <a href=\"https://github.com/tanstack/router\"><b>TanStack Start</b></a> – Full‑stack SSR & streaming\n- <a href=\"https://github.com/tanstack/store\"><b>TanStack Store</b></a> – Reactive data store\n- <a href=\"https://github.com/tanstack/table\"><b>TanStack Table</b></a> – Headless datagrids\n- <a href=\"https://github.com/tanstack/virtual\"><b>TanStack Virtual</b></a> – Virtualized rendering\n\n… and more at <a href=\"https://tanstack.com\"><b>TanStack.com »</b></a>\nv>\n\n<!-- Use the force, Luke -->\n","summary":"TanStack DB is a reactive, embedded client database designed to act as a high-performance store for your application's API data. It enhances user experience by normalizing data collections to eliminate network waterfalls and enabling instant, optimistic updates that decouple UI interactions from network latency. This library is an ideal solution for developers building modern, data-heavy web applications who need sub-millisecond live queries and efficient state management.","description":"The reactive client store for your API.","stars":3778,"language":"TypeScript"},{"owner":"argoproj","repo":"argo-rollouts","url":"https://github.com/argoproj/argo-rollouts","readme":"\n# Argo Rollouts - Progressive Delivery for Kubernetes\n\n[![codecov](https://codecov.io/gh/argoproj/argo-rollouts/branch/master/graph/badge.svg)](https://codecov.io/gh/argoproj/argo-rollouts)\n[![slack](https://img.shields.io/badge/slack-argoproj-brightgreen.svg?logo=slack)](https://argoproj.github.io/community/join-slack)\n[![CII Best Practices](https://bestpractices.coreinfrastructure.org/projects/3834/badge)](https://bestpractices.coreinfrastructure.org/projects/3834)\n[![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/argoproj/argo-rollouts/badge)](https://api.securityscorecards.dev/projects/github.com/argoproj/argo-rollouts)\n[![Artifact HUB](https://img.shields.io/endpoint?url=https://artifacthub.io/badge/repository/argo-rollouts)](https://artifacthub.io/packages/helm/argo/argo-rollouts)\n\n## What is Argo Rollouts?\n\nArgo Rollouts is a Kubernetes controller and set of CRDs which provide advanced deployment capabilities such as blue-green, canary, canary analysis, experimentation, and progressive delivery features to Kubernetes.\n\nArgo Rollouts (optionally) integrates with ingress controllers and service meshes, leveraging their traffic shaping abilities to gradually shift traffic to the new version during an update. Additionally, Rollouts can query and interpret metrics from various providers to verify key KPIs and drive automated promotion or rollback during an update.\n\n[![Argo Rollouts Demo](https://img.youtube.com/vi/hIL0E2gLkf8/0.jpg)](https://youtu.be/hIL0E2gLkf8)\n\n## Quick Start\n\n```bash\nkubectl create namespace argo-rollouts\nkubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml\n```\n\nFollow the full [getting started guide](docs/getting-started.md) to walk through creating and then updating a rollout object.\n\n## Why Argo Rollouts?\n\nKubernetes Deployments provides the `RollingUpdate` strategy which provide a basic set of safety guarantees (readiness probes) during an update. However the rolling update strategy faces many limitations:\n\n* Few controls over the speed of the rollout\n* Inability to control traffic flow to the new version\n* Readiness probes are unsuitable for deeper, stress, or one-time checks\n* No ability to query external metrics to verify an update\n* Can halt the progression, but unable to automatically abort and rollback the update\n\nFor these reasons, in large scale high-volume production environments, a rolling update is often considered too risky of an update procedure since it provides no control over the blast radius, may rollout too aggressively, and provides no automated rollback upon failures.\n\n## Features\n\n* Blue-Green update strategy\n* Canary update strategy\n* Fine-grained, weighted traffic shifting\n* Automated rollbacks and promotions\n* Manual judgement\n* Customizable metric queries and analysis of business KPIs\n* Ingress controller integration: NGINX, ALB, Apache APISIX\n* Service Mesh integration: Istio, Linkerd, SMI\n* Metric provider integration: Prometheus, Wavefront, Kayenta, Web, Kubernetes Jobs, Datadog, New Relic, InfluxDB\n\n## Supported Traffic Shaping Integrations\n| Traffic Shaping Integration       | SetWeight                    | SetWeightExperiments        | SetMirror                  | SetHeader                  | Implemented As Plugin       |\n|-----------------------------------|------------------------------|-----------------------------|----------------------------|----------------------------|-----------------------------|\n| ALB Ingress Controller            | :white_check_mark: (stable)  | :white_check_mark: (stable) | :x:                        | :white_check_mark: (alpha) |                             |\n| Ambassador                        | :white_check_mark: (stable)  | :x:                         | :x:                        | :x:                        |                             |\n| Apache APISIX Ingress Controller  | :white_check_mark: (alpha)   | :x:                         | :x:                        | :white_check_mark: (alpha) |                             |\n| Istio                             | :white_check_mark: (stable)  | :white_check_mark: (stable) | :white_check_mark: (alpha) | :white_check_mark: (alpha) |                             |\n| Nginx Ingress Controller          | :white_check_mark: (stable)  | :x:                         | :x:                        | :x:                        |                             |\n| SMI                               | :white_check_mark: (stable)  | :white_check_mark: (stable) | :x:                        | :x:                        |                             |\n| Traefik                           | :white_check_mark: (stable)  | :x:                         | :x:                        | :x:                        |                             |\n| Contour                           | :white_check_mark: (beta)    | :x:                         | :x:                        | :x:                        | :heavy_check_mark:          |\n| Gateway API                       | :white_check_mark: (alpha)   | :x:                         | :x:                        | :x:                        | :heavy_check_mark:          |\n\n:white_check_mark: = Supported\n\n:x: = Not Supported\n\n:heavy_check_mark: = Yes\n\n## Documentation\n\nTo learn more about Argo Rollouts go to the [complete documentation](https://argo-rollouts.readthedocs.io/en/stable/).\n\n## Community\n\nYou can reach the Argo Rollouts community and developers via the following channels:\n\n* Q & A: [Github Discussions](https://github.com/argoproj/argo-rollouts/discussions)\n* Chat: [The #argo-rollouts Slack channel](https://argoproj.github.io/community/join-slack)\n* Contributors Office Hours: [Every Thursday](https://calendar.google.com/calendar/u/0/embed?src=argoproj@gmail.com) | [Agenda](https://docs.google.com/document/d/1xkoFkVviB70YBzSEa4bDnu-rUZ1sIFtwKKG1Uw8XsY8)\n* User Community meeting: [First Wednesday of each month](https://calendar.google.com/calendar/u/0/embed?src=argoproj@gmail.com) | [Agenda](https://docs.google.com/document/d/1ttgw98MO45Dq7ZUHpIiOIEfbyeitKHNfMjbY5dLLMKQ)\n\n## Who uses Argo Rollouts?\n\n[Official Argo Rollouts User List](https://github.com/argoproj/argo-rollouts/blob/master/USERS.md)\n\n## Community Blogs and Presentations\n\n* [Awesome-Argo: A Curated List of Awesome Projects and Resources Related to Argo](https://github.com/terrytangyuan/awesome-argo)\n* [Automation of Everything - How To Combine Argo Events, Workflows & Pipelines, CD, and Rollouts](https://youtu.be/XNXJtxkUKeY)\n* [Argo Rollouts - Canary Deployments Made Easy In Kubernetes](https://youtu.be/84Ky0aPbHvY)\n* [How Intuit Does Canary and Blue Green Deployments](https://www.youtube.com/watch?v=yeVkTTO9nOA)\n* [Leveling Up Your CD: Unlocking Progressive Delivery on Kubernetes](https://www.youtube.com/watch?v=Nv0PPwbIEkY)\n* [Minimize failed deployments with Argo Rollouts and Smoke tests](https://codefresh.io/continuous-deployment/minimize-failed-deployments-argo-rollouts-smoke-tests/)\n* [Recover automatically from failed deployments with Argo Rollouts and Prometheus metrics](https://codefresh.io/continuous-deployment/recover-automatically-from-failed-deployments/)\n* [Kubernetes Blue-Green deployments with Argo Rollouts](https://www.youtube.com/watch?v=krDxDz4V4Tg)\n* [Kubernetes canary deployments with Argo Rollouts](https://www.youtube.com/watch?v=fviYWA2mcF8)\n* [GitOps with Argo CD and an Argo Rollouts canary release](https://www.youtube.com/watch?v=35Qimb_AZ8U)\n* [Multi-Stage Delivery with Keptn and Argo Rollouts](https://www.youtube.com/watch?v=w-E8FzTbN3g&t=1s)\n* [Gradual Code Releases Using an In-House Kubernetes Canary Controller on top of Argo Rollouts](https://doordash.engineering/2021/04/14/gradual-code-releases-using-an-in-house-kubernetes-canary-controller/)\n* [How Scalable is Argo-Rollouts: A Cloud Operator’s Perspective](https://www.youtube.com/watch?v=rCEhxJ2NSTI)\n* [Minimize Impact in Kubernetes Using Argo Rollouts](https://medium.com/@arielsimhon/minimize-impact-in-kubernetes-using-argo-rollouts-992fb9519969)\n* [Progressive Application Delivery with GitOps on Red Hat OpenShift](https://www.youtube.com/watch?v=DfeL7cdTx4c)\n* [Progressive delivery for Kubernetes Config Maps using Argo Rollouts](https://codefresh.io/blog/progressive-delivery-for-kubernetes-config-maps-using-argo-rollouts/)\n* [Multi-Service Progressive Delivery with Argo Rollouts](https://codefresh.io/blog/multi-service-progressive-delivery-with-argo-rollouts/)\n* [Progressive Delivery for Stateful Services Using Argo Rollouts](https://codefresh.io/blog/progressive-delivery-for-stateful-services-using-argo-rollouts/)\n","summary":"Argo Rollouts is a Kubernetes controller and custom resource definition set that provides advanced deployment strategies such as blue-green and canary updates. It enables fine-grained traffic shifting and automated rollbacks by integrating with popular ingress controllers, service meshes, and metrics providers to verify key performance indicators in real-time. This project is ideal for DevOps and platform engineers operating in high-volume production environments who require more control over deployment risk, blast radius, and automated release validation than standard Kubernetes deployments offer.","description":"Progressive Delivery for Kubernetes","stars":3488,"language":"Go"},{"owner":"php","repo":"frankenphp","url":"https://github.com/php/frankenphp","readme":"# FrankenPHP: Modern App Server for PHP\n\n<h1 align=\"center\"><a href=\"https://frankenphp.dev\"><img src=\"frankenphp.png\" alt=\"FrankenPHP\" width=\"600\"></a></h1>\n\nFrankenPHP is a modern application server for PHP built on top of the [Caddy](https://caddyserver.com/) web server.\n\nFrankenPHP gives superpowers to your PHP apps thanks to its stunning features: [_Early Hints_](https://frankenphp.dev/docs/early-hints/), [worker mode](https://frankenphp.dev/docs/worker/), [real-time capabilities](https://frankenphp.dev/docs/mercure/), [hot reloading](https://frankenphp.dev/docs/hot-reload/), automatic HTTPS, HTTP/2, and HTTP/3 support...\n\nFrankenPHP works with any PHP app and makes your Laravel and Symfony projects faster than ever thanks to their official integrations with the worker mode.\n\nFrankenPHP can also be used as a standalone Go library to embed PHP in any app using `net/http`.\n\n[**Learn more** on _frankenphp.dev_](https://frankenphp.dev) and in this slide deck:\n\n<a href=\"https://dunglas.dev/2022/10/frankenphp-the-modern-php-app-server-written-in-go/\"><img src=\"https://dunglas.dev/wp-content/uploads/2022/10/frankenphp.png\" alt=\"Slides\" width=\"600\"></a>\n\n## Getting Started\n\n### Install Script\n\nOn Linux and macOS, copy this line into your terminal to automatically\ninstall an appropriate version for your platform:\n\n```console\ncurl https://frankenphp.dev/install.sh | sh\n```\n\nOn Windows, run this in PowerShell:\n\n```powershell\nirm https://frankenphp.dev/install.ps1 | iex\n```\n\n### Standalone Binary\n\nWe provide FrankenPHP binaries for Linux, macOS and Windows\ncontaining [PHP 8.5](https://www.php.net/releases/8.5/).\n\nLinux binaries are statically linked, so they can be used on any Linux distribution without installing any dependency. macOS binaries are also self-contained.\nThey contain most popular PHP extensions.\nWindows archives contain the official PHP binary for Windows.\n\n[Download FrankenPHP](https://github.com/php/frankenphp/releases)\n\n### rpm Packages\n\nOur maintainers offer rpm packages for all systems using `dnf`. To install, run:\n\n```console\nsudo dnf install https://rpm.henderkes.com/static-php-1-0.noarch.rpm\nsudo dnf module enable php-zts:static-8.5 # 8.2-8.5 available\nsudo dnf install frankenphp\n```\n\n**Installing extensions:** `sudo dnf install php-zts-<extension>`\n\nFor extensions not available by default, use [PIE](https://github.com/php/pie):\n\n```console\nsudo dnf install pie-zts\nsudo pie-zts install asgrim/example-pie-extension\n```\n\n### deb Packages\n\nOur maintainers offer deb packages for all systems using `apt`. To install, run:\n\n```console\nVERSION=85 # 82-85 available\nsudo curl https://pkg.henderkes.com/api/packages/${VERSION}/debian/repository.key -o /etc/apt/keyrings/static-php${VERSION}.asc\necho \"deb [signed-by=/etc/apt/keyrings/static-php${VERSION}.asc] https://pkg.henderkes.com/api/packages/${VERSION}/debian php-zts main\" | sudo tee -a /etc/apt/sources.list.d/static-php${VERSION}.list\nsudo apt update\nsudo apt install frankenphp\n```\n\n**Installing extensions:** `sudo apt install php-zts-<extension>`\n\nFor extensions not available by default, use [PIE](https://github.com/php/pie):\n\n```console\nsudo apt install pie-zts\nsudo pie-zts install asgrim/example-pie-extension\n```\n\n### apk Packages\n\nOur maintainers offer apk packages for all systems using `apk`. To install, run:\n\n```console\nVERSION=85 # 82-85 available\necho \"https://pkg.henderkes.com/api/packages/${VERSION}/alpine/main/php-zts\" | sudo tee -a /etc/apk/repositories\nKEYFILE=$(curl -sJOw '%{filename_effective}' https://pkg.henderkes.com/api/packages/${VERSION}/alpine/key)\nsudo mv ${KEYFILE} /etc/apk/keys/ &&\nsudo apk update &&\nsudo apk add frankenphp\n```\n\n**Installing extensions:** `sudo apk add php-zts-<extension>`\n\nFor extensions not available by default, use [PIE](https://github.com/php/pie):\n\n```console\nsudo apk add pie-zts\nsudo pie-zts install asgrim/example-pie-extension\n```\n\n### Homebrew\n\nFrankenPHP is also available as a [Homebrew](https://brew.sh) package for macOS and Linux.\n\n```console\nbrew install dunglas/frankenphp/frankenphp\n```\n\n**Installing extensions:** Use [PIE](https://github.com/php/pie).\n\n### Usage\n\nTo serve the content of the current directory, run:\n\n```console\nfrankenphp php-server\n```\n\nYou can also run command-line scripts with:\n\n```console\nfrankenphp php-cli /path/to/your/script.php\n```\n\nFor the deb and rpm packages, you can also start the systemd service:\n\n```console\nsudo systemctl start frankenphp\n```\n\n### Docker\n\nAlternatively, [Docker images](https://frankenphp.dev/docs/docker/) are available:\n\n```console\ndocker run -v .:/app/public \\\n    -p 80:80 -p 443:443 -p 443:443/udp \\\n    dunglas/frankenphp\n```\n\nGo to `https://localhost`, and enjoy!\n\n> [!TIP]\n>\n> Do not attempt to use `https://127.0.0.1`. Use `https://localhost` and accept the self-signed certificate.\n> Use the [`SERVER_NAME` environment variable](docs/config.md#environment-variables) to change the domain to use.\n\n## Docs\n\n- [Classic mode](https://frankenphp.dev/docs/classic/)\n- [Worker mode](https://frankenphp.dev/docs/worker/)\n- [Migrating from Nginx/PHP-FPM](https://frankenphp.dev/docs/migrate/)\n- [Early Hints support (103 HTTP status code)](https://frankenphp.dev/docs/early-hints/)\n- [Real-time](https://frankenphp.dev/docs/mercure/)\n- [Logging](https://frankenphp.dev/docs/logging/)\n- [Hot reloading](https://frankenphp.dev/docs/hot-reload/)\n- [Efficiently Serving Large Static Files](https://frankenphp.dev/docs/x-sendfile/)\n- [Configuration](https://frankenphp.dev/docs/config/)\n- [Writing PHP Extensions in Go](https://frankenphp.dev/docs/extensions/)\n- [Docker images](https://frankenphp.dev/docs/docker/)\n- [Deploy in production](https://frankenphp.dev/docs/production/)\n- [Performance optimization](https://frankenphp.dev/docs/performance/)\n- [Create **standalone**, self-executable PHP apps](https://frankenphp.dev/docs/embed/)\n- [Create static binaries](https://frankenphp.dev/docs/static/)\n- [Compile from sources](https://frankenphp.dev/docs/compile/)\n- [Observability](https://frankenphp.dev/docs/observability/)\n- [WordPress integration](https://frankenphp.dev/docs/wordpress/)\n- [Symfony integration](https://frankenphp.dev/docs/symfony/)\n- [Laravel integration](https://frankenphp.dev/docs/laravel/)\n- [Known issues](https://frankenphp.dev/docs/known-issues/)\n- [Demo app (Symfony) and benchmarks](https://github.com/dunglas/frankenphp-demo)\n- [Go library documentation](https://pkg.go.dev/github.com/dunglas/frankenphp)\n- [Contributing and debugging](https://frankenphp.dev/docs/contributing/)\n- [Internals (architecture overview)](docs/internals.md)\n\n## Examples and Skeletons\n\n- [Symfony](https://frankenphp.dev/docs/symfony/)\n- [API Platform](https://api-platform.com/docs/symfony)\n- [Laravel](https://frankenphp.dev/docs/laravel/)\n- [Sulu](https://sulu.io/blog/running-sulu-with-frankenphp)\n- [WordPress](https://github.com/StephenMiracle/frankenwp)\n- [Drupal](https://github.com/dunglas/frankenphp-drupal)\n- [Joomla](https://github.com/alexandreelise/frankenphp-joomla)\n- [TYPO3](https://github.com/ochorocho/franken-typo3)\n- [Magento2](https://github.com/ekino/frankenphp-magento2)\n- [WoltLab Suite](https://github.com/SoftCreatRMedia/frankenphp-woltlab-suite)\n","summary":"FrankenPHP is a modern, high-performance application server built on the Caddy web server that is designed to optimize PHP execution. It offers advanced features such as worker mode, Early Hints, hot reloading, and native support for HTTP/3, while providing seamless integrations for frameworks like Laravel and Symfony. Developers and system administrators looking to significantly improve application speed or embed PHP directly into Go applications will benefit from its versatile, standalone binary architecture.","description":"🧟 The modern PHP app server","stars":11124,"language":"Go"},{"owner":"toeverything","repo":"AFFiNE","url":"https://github.com/toeverything/AFFiNE","readme":"<div align=\"center\">\n\n<h1 style=\"border-bottom: none\">\n    <b><a href=\"https://affine.pro\">AFFiNE.Pro</a></b><br />\n    Write, Draw and Plan All at Once\n    <br>\n</h1>\n<a href=\"https://affine.pro/download\">\n    <img alt=\"affine logo\" src=\"https://cdn.affine.pro/Github_hero_image2.png\" style=\"width: 100%\">\n</a>\n<br/>\n<p align=\"center\">\n  A privacy-focused, local-first, open-source, and ready-to-use alternative for Notion & Miro. <br />\n  One hyper-fused platform for wildly creative minds.\n</p>\n\n<br/>\n\n<br/>\n<a href=\"https://www.producthunt.com/posts/affine-3?utm_source=badge-featured&utm_medium=badge&utm_souce=badge-affine&#0045;3\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=440671&theme=light\" alt=\"AFFiNE - One&#0032;app&#0032;for&#0032;all&#0032;&#0045;&#0032;Where&#0032;Notion&#0032;meets&#0032;Miro | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n<br/>\n<br/>\n\n<div align=\"center\">\n    <a href=\"https://affine.pro\">Home Page</a> |\n    <a href=\"https://affine.pro/redirect/discord\">Discord</a> |\n    <a href=\"https://app.affine.pro\">Live Demo</a> |\n    <a href=\"https://affine.pro/blog/\">Blog</a> |\n    <a href=\"https://docs.affine.pro/\">Documentation</a>\n</div>\n<br/>\n\n[![Releases](https://img.shields.io/github/downloads/toeverything/AFFiNE/total)](https://github.com/toeverything/AFFiNE/releases/latest)\n[![All Contributors][all-contributors-badge]](#contributors)\n[![TypeScript-version-icon]](https://www.typescriptlang.org/)\n\n</div>\n\n<br />\n<div align=\"center\">\n<em>Docs, canvas and tables are hyper-merged with AFFiNE - just like the word affine (əˈfʌɪn | a-fine).</em>\n</div>\n<br />\n\n<div align=\"center\">\n<img src=\"https://github.com/toeverything/AFFiNE/assets/79301703/49a426bb-8d2b-4216-891a-fa5993642253\" style=\"width: 100%\"/>\n</div>\n\n## Getting started & staying tuned with us.\n\nStar us, and you will receive all release notifications from GitHub without any delay!\n\n<img src=\"https://user-images.githubusercontent.com/79301703/230891830-0110681e-8c7e-483b-b6d9-9e42b291b9ef.gif\" style=\"width: 100%\"/>\n\n## What is AFFiNE\n\n[AFFiNE](https://affine.pro) is an open-source, all-in-one workspace and an operating system for all the building blocks that assemble your knowledge base and much more -- wiki, knowledge management, presentation and digital assets. It's a better alternative to Notion and Miro.\n\n## Features\n\n**A true canvas for blocks in any form. Docs and whiteboard are now fully merged.**\n\n- Many editor apps claim to be a canvas for productivity, but AFFiNE is one of the very few which allows you to put any building block on an edgeless canvas -- rich text, sticky notes, any embedded web pages, multi-view databases, linked pages, shapes and even slides. We have it all.\n\n**Multimodal AI partner ready to kick in any work**\n\n- Write up professional work report? Turn an outline into expressive and presentable slides? Summary an article into a well-structured mindmap? Sorting your job plan and backlog for tasks? Or... draw and code prototype apps and web pages directly all with one prompt? With you, [AFFiNE AI](https://affine.pro/ai) pushes your creativity to the edge of your imagination, just like [Canvas AI](https://affine.pro/blog/best-canvas-ai) to generate mind map for brainstorming.\n\n**Local-first & Real-time collaborative**\n\n- We love the idea of local-first that you always own your data on your disk, in spite of the cloud. Furthermore, AFFiNE supports real-time sync and collaborations on web and cross-platform clients.\n\n**Self-host & Shape your own AFFiNE**\n\n- You have the freedom to manage, self-host, fork and build your own AFFiNE. Plugin community and third-party blocks are coming soon. More tractions on [Blocksuite](https://blocksuite.io). Check there to learn how to [self-host AFFiNE](https://docs.affine.pro/self-host-affine).\n\n## Acknowledgement\n\n“We shape our tools and thereafter our tools shape us”. A lot of pioneers have inspired us along the way, e.g.:\n\n- Quip & Notion with their great concept of “everything is a block”\n- Trello with their Kanban\n- Airtable & Miro with their no-code programmable datasheets\n- Miro & Whimiscal with their edgeless visual whiteboard\n- Remote & Capacities with their object-based tag system\n\nThere is a large overlap of their atomic “building blocks” between these apps. They are not open source, nor do they have a plugin system like Vscode for contributors to customize. We want to have something that contains all the features we love and also goes one step even further.\n\nThanks for checking us out, we appreciate your interest and sincerely hope that AFFiNE resonates with you! 🎵 Checking https://affine.pro/ for more details ions.\n\n## Contributing\n\n| Bug Reports                                                                                                                                         | Feature Requests                                                                                                                                               | Questions/Discussions                                                         | AFFiNE Community                                                  |\n| --------------------------------------------------------------------------------------------------------------------------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------------------- | ----------------------------------------------------------------- |\n| [Create a bug report](https://github.com/toeverything/AFFiNE/issues/new?assignees=&labels=bug%2Cproduct-review&template=BUG-REPORT.yml&title=TITLE) | [Submit a feature request](https://github.com/toeverything/AFFiNE/issues/new?assignees=&labels=feat%2Cproduct-review&template=FEATURE-REQUEST.yml&title=TITLE) | [Check GitHub Discussion](https://github.com/toeverything/AFFiNE/discussions) | [Visit the AFFiNE's Discord](https://affine.pro/redirect/discord) |\n| Something isn't working as expected                                                                                                                 | An idea for a new feature, or improvements                                                                                                                     | Discuss and ask questions                                                     | A place to ask, learn and engage with others                      |\n\nCalling all developers, testers, tech writers and more! Contributions of all types are more than welcome, you can read more in [docs/types-of-contributions.md](docs/types-of-contributions.md). If you are interested in contributing code, read our [docs/CONTRIBUTING.md](docs/CONTRIBUTING.md) and feel free to check out our GitHub issues to get stuck in to show us what you’re made of.\n\n**Before you start contributing, please make sure you have read and accepted our [Contributor License Agreement]. To indicate your agreement, simply edit this file and submit a pull request.**\n\nFor **bug reports**, **feature requests** and other **suggestions** you can also [create a new issue](https://github.com/toeverything/AFFiNE/issues/new/choose) and choose the most appropriate template for your feedback.\n\nFor **translation** and **language support** you can visit our [Discord](https://affine.pro/redirect/discord).\n\nIf you have questions, you are welcome to contact us. One of the best places to get more info and learn more is in the [Discord](https://affine.pro/redirect/discord) where you can engage with other like-minded individuals.\n\n## Templates\n\nAFFiNE now provides pre-built [templates](https://affine.pro/templates) from our team. Following are the Top 10 most popular templates among AFFiNE users,if you want to contribute, you can contribute your own template so other people can use it too.\n\n- [vision board template](https://affine.pro/templates/category-vision-board-template)\n- [one pager template](https://affine.pro/templates/category-one-pager-template-free)\n- [sample lesson plan math template](https://affine.pro/templates/sample-lesson-plan-math-template)\n- [grr lesson plan template free](https://affine.pro/templates/grr-lesson-plan-template-free)\n- [free editable lesson plan template for pre k](https://affine.pro/templates/free-editable-lesson-plan-template-for-pre-k)\n- [high note collection planners](https://affine.pro/templates/high-note-collection-planners)\n- [digital planner](https://affine.pro/templates/category-digital-planner)\n- [ADHD Planner](https://affine.pro/templates/adhd-planner)\n- [Reading Log](https://affine.pro/templates/reading-log)\n- [Cornell Notes Template](https://affine.pro/templates/category-cornell-notes-template)\n\n## Blog\n\nWelcome to the AFFiNE blog section! Here, you’ll find the latest insights, tips, and guides on how to maximize your experience with AFFiNE and AFFiNE AI, the leading Canvas AI tool for flexible note-taking and creative organization.\n\n- [vision board template](https://affine.pro/blog/8-free-printable-vision-board-templates-examples-2023)\n- [ai homework helper](https://affine.pro/blog/ai-homework-helper)\n- [vision board maker](https://affine.pro/blog/vision-board-maker)\n- [itinerary template](https://affine.pro/blog/free-customized-travel-itinerary-planner-templates)\n- [one pager template](https://affine.pro/blog/top-12-one-pager-examples-how-to-create-your-own)\n- [cornell notes template](https://affine.pro/blog/the-cornell-notes-template-and-system-learning-tips)\n- [swot chart template](https://affine.pro/blog/top-10-free-editable-swot-analysis-template-examples)\n- [apps like luna task](https://affine.pro/blog/apps-like-luna-task)\n- [note taking ai from rough notes to mind map](https://affine.pro/blog/dynamic-AI-notes)\n- [canvas ai](https://affine.pro/blog/best-canvas-ai)\n- [one pager](https://affine.pro/blog/top-12-one-pager-examples-how-to-create-your-own)\n- [SOP Template](https://affine.pro/blog/how-to-write-sop-step-by-step-guide-5-best-free-tools-templates)\n- [Chore Chart](https://affine.pro/blog/10-best-free-chore-chart-templates-kids-adults)\n\n## Ecosystem\n\n| Name                                             |                            |                                                                                                                                         |\n| ------------------------------------------------ | -------------------------- | --------------------------------------------------------------------------------------------------------------------------------------- |\n| [@affine/component](packages/frontend/component) | AFFiNE Component Resources | ![](https://img.shields.io/codecov/c/github/toeverything/affine?style=flat-square)                                                      |\n| [@toeverything/theme](packages/common/theme)     | AFFiNE theme               | [![](https://img.shields.io/npm/dm/@toeverything/theme?style=flat-square&color=eee)](https://www.npmjs.com/package/@toeverything/theme) |\n\n## Upstreams\n\nWe would also like to give thanks to open-source projects that make AFFiNE possible:\n\n- [Blocksuite](https://github.com/toeverything/BlockSuite) - 💠 BlockSuite is the open-source collaborative editor project behind AFFiNE.\n- [y-octo](https://github.com/y-crdt/y-octo) - 🐙 y-octo is a native, high-performance, thread-safe YJS CRDT implementation, serving as the core engine enabling the AFFiNE Client/Server to achieve \"local-first\" functionality.\n- [OctoBase](https://github.com/toeverything/OctoBase) - 🐙 OctoBase is the open-source database behind AFFiNE, local-first, yet collaborative. A light-weight, scalable, data engine written in Rust.\n\n- [yjs](https://github.com/yjs/yjs) - Fundamental support of CRDTs for our implementation on state management and data sync on web.\n- [electron](https://github.com/electron/electron) - Build cross-platform desktop apps with JavaScript, HTML, and CSS.\n- [React](https://github.com/facebook/react) - The library for web and native user interfaces.\n- [napi-rs](https://github.com/napi-rs/napi-rs) - A framework for building compiled Node.js add-ons in Rust via Node-API.\n- [Jotai](https://github.com/pmndrs/jotai) - Primitive and flexible state management for React.\n- [async-call-rpc](https://github.com/Jack-Works/async-call-rpc) - A lightweight JSON RPC client & server.\n- [Vite](https://github.com/vitejs/vite) - Next generation frontend tooling.\n- Other upstream [dependencies](https://github.com/toeverything/AFFiNE/network/dependencies).\n\nThanks a lot to the community for providing such powerful and simple libraries, so that we can focus more on the implementation of the product logic, and we hope that in the future our projects will also provide a more easy-to-use knowledge base for everyone.\n\n## Contributors\n\nWe would like to express our gratitude to all the individuals who have already contributed to AFFiNE! If you have any AFFiNE-related project, documentation, tool or template, please feel free to contribute it by submitting a pull request to our curated list on GitHub: [awesome-affine](https://github.com/toeverything/awesome-affine).\n\n<a href=\"https://github.com/toeverything/affine/graphs/contributors\">\n  <img alt=\"contributors\" src=\"https://opencollective.com/affine/contributors.svg?width=890&button=false\" />\n</a>\n\n## Self-Host\n\nBegin with Docker to deploy your own feature-rich, unrestricted version of AFFiNE. Our team is diligently updating to the latest version. For more information on how to self-host AFFiNE, please refer to our [documentation](https://docs.affine.pro/self-host-affine).\n\n[![Run on Sealos](https://sealos.io/Deploy-on-Sealos.svg)](https://sealos.io/products/app-store/affine)\n\n[![Run on ClawCloud](https://raw.githubusercontent.com/ClawCloud/Run-Template/refs/heads/main/Run-on-ClawCloud.svg)](https://template.run.claw.cloud/?openapp=system-fastdeploy%3FtemplateName%3Daffine)\n\n## Feature Request\n\nFor feature requests, please see [discussions](https://github.com/toeverything/AFFiNE/discussions/categories/ideas).\n\n## Building\n\n### Codespaces\n\nFrom the GitHub repo main page, click the green \"Code\" button and select \"Create codespace on master\". This will open a new Codespace with the (supposedly auto-forked\nAFFiNE repo cloned, built, and ready to go).\n\n### Local\n\nSee [BUILDING.md] for instructions on how to build AFFiNE from source code.\n\n## Contributing\n\nWe welcome contributions from everyone.\nSee [docs/contributing/tutorial.md](./docs/contributing/tutorial.md) for details.\n\n## License\n\n### Editions\n\n- AFFiNE Community Edition (CE) is the current available version, it's free for self-host under the MIT license.\n\n- AFFiNE Enterprise Edition (EE) is yet to be published, it will have more advanced features and enterprise-oriented offerings, including but not exclusive to rebranding and SSO, advanced admin and audit, etc., you may refer to https://affine.pro/pricing for more information\n\nSee [LICENSE] for details.\n\n[all-contributors-badge]: https://img.shields.io/github/contributors/toeverything/AFFiNE\n[license]: ./LICENSE\n[building.md]: ./docs/BUILDING.md\n[update page]: https://affine.pro/blog?tag=Release%20Note\n[jobs available]: ./docs/jobs.md\n[latest packages]: https://github.com/toeverything/AFFiNE/pkgs/container/affine-self-hosted\n[contributor license agreement]: https://github.com/toeverything/affine/edit/canary/.github/CLA.md\n[stars-icon]: https://img.shields.io/github/stars/toeverything/AFFiNE.svg?style=flat&logo=github&colorB=red&label=stars\n[codecov]: https://codecov.io/gh/toeverything/affine/branch/canary/graphs/badge.svg?branch=canary\n[node-version-icon]: https://img.shields.io/badge/node-%3E=18.16.1-success\n[typescript-version-icon]: https://img.shields.io/github/package-json/dependency-version/toeverything/affine/dev/typescript\n[react-version-icon]: https://img.shields.io/github/package-json/dependency-version/toeverything/AFFiNE/react?filename=packages%2Ffrontend%2Fcore%2Fpackage.json&color=rgb(97%2C228%2C251)\n[blocksuite-icon]: https://img.shields.io/github/package-json/dependency-version/toeverything/AFFiNE/@blocksuite/store?color=6880ff&filename=packages%2Ffrontend%2Fcore%2Fpackage.json&label=blocksuite\n","summary":"AFFiNE is an open-source, all-in-one workspace that functions as a privacy-focused, local-first alternative to tools like Notion and Miro. It integrates documentation, whiteboards, and database management into a single, cohesive interface, allowing users to transition seamlessly between structured writing and creative visual planning. The platform also features multimodal AI capabilities and self-hosting options, making it ideal for creative professionals, developers, and teams who prioritize data ownership and flexible knowledge management.","description":"There can be more than Notion and Miro. AFFiNE(pronounced [ə‘fain]) is a next-gen knowledge base that brings planning, sorting and creating all together. Privacy first, open-source, customizable and ready to use. ","stars":69031,"language":"TypeScript"},{"owner":"microsoft","repo":"Web-Dev-For-Beginners","url":"https://github.com/microsoft/Web-Dev-For-Beginners","readme":"[![GitHub license](https://img.shields.io/github/license/microsoft/Web-Dev-For-Beginners.svg)](https://github.com/microsoft/Web-Dev-For-Beginners/blob/master/LICENSE)\n[![GitHub contributors](https://img.shields.io/github/contributors/microsoft/Web-Dev-For-Beginners.svg)](https://GitHub.com/microsoft/Web-Dev-For-Beginners/graphs/contributors/)\n[![GitHub issues](https://img.shields.io/github/issues/microsoft/Web-Dev-For-Beginners.svg)](https://GitHub.com/microsoft/Web-Dev-For-Beginners/issues/)\n[![GitHub pull-requests](https://img.shields.io/github/issues-pr/microsoft/Web-Dev-For-Beginners.svg)](https://GitHub.com/microsoft/Web-Dev-For-Beginners/pulls/)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg?style=flat-square)](http://makeapullrequest.com) \n\n[![GitHub watchers](https://img.shields.io/github/watchers/microsoft/ ions/sv/README.md) | [Tagalog (Filipino)](./translations/tl/README.md) | [Tamil](./translations/ta/README.md) | [Telugu](./translations/te/README.md) | [Thai](./translations/th/README.md) | [Turkish](./translations/tr/README.md) | [Ukrainian](./translations/uk/README.md) | [Urdu](./translations/ur/README.md) | [Vietnamese](./translations/vi/README.md)\n\n> **Prefer to Clone Locally?**\n>\n> This repository includes 50+ language translations which significantly increases the download size. To clone without translations, use sparse checkout:\n>\n> **Bash / macOS / Linux:**\n> ```bash\n> git clone --filter=blob:none --sparse https://github.com/microsoft/Web-Dev-For-Beginners.git\n> cd Web-Dev-For-Beginners\n> git sparse-checkout set --no-cone '/*' '!translations' '!translated_images'\n> ```\n>\n> **CMD (Windows):**\n> ```cmd\n> git clone --filter=blob:none --sparse https://github.com/microsoft/Web-Dev-For-Beginners.git\n> cd Web-Dev-For-Beginners\n> git sparse-checkout set --no-cone \"/*\" \"!translations\" \"!translated_images\"\n> ```\n>\n> This gives you everything you need to complete the course with a much faster download.\n<!-- CO-OP TRANSLATOR LANGUAGES TABLE END -->\n\n**If you wish to have additional translations, the supported languages are listed here. [here](https://github.com/Azure/co-op-translator/blob/main/getting_started/supported-languages.md)**\n\n[![Open in Visual Studio Code](https://img.shields.io/static/v1?logo=visualstudiocode&label=&message=Open%20in%20Visual%20Studio%20Code&labelColor=2c2c32&color=007acc&logoColor=007acc)](https://open.vscode.dev/microsoft/Web-Dev-For-Beginners)\n\n#### 🧑‍🎓 _Are you a student?_\n\nVisit [**Student Hub page**](https://docs.microsoft.com/learn/student-hub/?WT.mc_id=academic-77807-sagibbon) where you will find beginner resources, Student packs and even ways to get a free certificate voucher. This is the page you want to bookmark and check from time to time as we switch out content monthly.\n\n### 📣 Announcement - New GitHub Copilot Agent mode challenges to complete!\n\nNew Challenge added, look for \"GitHub Copilot Agent Challenge 🚀\" in most chapters. That's a new challenge for you to complete using GitHub Copilot and Agent mode. If you haven't used Agent mode before it's capable of not just generating text but can also create and edit files, run commands and more.\n\n### 📣 Announcement - _New Project to build using Generative AI_ \n\nNew AI Assistant project just added, check it out [project](./9-chat-project/README.md)\n\n### 📣 Announcement - _New Curriculum_ on Generative AI for JavaScript was just released\n\nDon't miss our new Generative AI curriculum!\n\nVisit [https://aka.ms/genai-js-course](https://aka.ms/genai-js-course) to get started!\n\n![Background](./images/background.png)\n\n- Lessons covering everything from basics to RAG.\n- Interact with historical characters using GenAI and our companion app.\n- Fun and engaging narrative, you'll be time traveling!\n\n![character](./images/character.png)\n\n\nEach lesson includes an assignment to complete, a knowledge check and a challenge to guide you on learning topics like:\n- Prompting and prompt engineering\n- Text and image app generation\n- Search apps\n\nVisit [https://aka.ms/genai-js-course](https://aka.ms/genai-js-course) to get started!\n\n\n\n## 🌱 Getting Started\n\n> **Teachers**, we have [included some suggestions](for-teachers.md) on how to use this curriculum. We'd love your feedback [in our discussion forum](https://github.com/microsoft/Web-Dev-For-Beginners/discussions/categories/teacher-corner)!\n\n**[Learners](https://aka.ms/student-page/?WT.mc_id=academic-77807-sagibbon)**, for each lesson, start with a pre-lecture quiz and follow through with reading the lecture material, completing the various activities and check your understanding with the post-lecture quiz.\n\nTo enhance your learning experience, connect with your peers to work on the projects together! Discussions are encouraged in our [discussion forum](https://github.com/microsoft/Web-Dev-For-Beginners/discussions) where our team of moderators will be available to answer your questions.\n\nTo further your education, we highly recommend exploring [Microsoft Learn](https://learn.microsoft.com/users/wirelesslife/collections/p1ddcy5jwy0jkm?WT.mc_id=academic-77807-sagibbon) for additional study materials.\n\n### 📋 Setting up your environment\n\nThis curriculum has a development environment ready to go! As you get started you can choose to run the curriculum in a [Codespace](https://github.com/features/codespaces/) (_a browser-based, no installs needed environment_), or locally on your computer using a text editor such as [Visual Studio Code](https://code.visualstudio.com/?WT.mc_id=academic-77807-sagibbon).\n\n#### Create your repository\nFor you to easily save your work, it is recommended that you create your own copy of this repository. You can do this by clicking the **Use this template** button at the top of the page. This will create a new repository in your GitHub account with a copy of the curriculum.\n\nFollow these steps:\n1. **Fork the Repository**: Click on the \"Fork\" button at the top-right corner of this page.\n2. **Clone the Repository**:   `git clone https://github.com/microsoft/Web-Dev-For-Beginners.git`\n\n#### Running the curriculum in a Codespace\n\nIn your copy of this repository that you created, click the **Code** button and select **Open with Codespaces**. This will create a new Codespace for you to work in.\n\n![Codespace](./images/createcodespace.png)\n\n#### Running the curriculum locally on your computer\n\nTo run this curriculum locally on your computer, you will need a text editor, a browser and a command line tool. Our first lesson, [Introduction to Programming Languages and Tools of the Trade](./1-getting-started-lessons/1-intro-to-programming-languages), will walk you through various options for each of these tools for you to select what works best for you.\n\nOur recommendation is to use [Visual Studio Code](https://code.visualstudio.com/?WT.mc_id=academic-77807-sagibbon) as your editor, which also has a built-in [Terminal](https://code.visualstudio.com/docs/terminal/basics/?WT.mc_id=academic-77807-sagibbon). You can download Visual Studio Code [here](https://code.visualstudio.com/?WT.mc_id=academic-77807-sagibbon).\n\n\n1. Clone your repository to your computer. You can do this by clicking the **Code** button and copying the URL:\n\n    [CodeSpace](./images/createcodespace.png)\n\n    Then, open [Terminal](https://code.visualstudio.com/docs/terminal/basics/?WT.mc_id=academic-77807-sagibbon) within [Visual Studio Code](https://code.visualstudio.com/?WT.mc_id=academic-77807-sagibbon) and run the following command, replacing `<your-repository-url>` with the URL you just copied:\n\n    ```bash \n    git clone <your-repository-url>\n    ```\n\n2. Open the folder in Visual Studio Code. You can do this by clicking **File** > **Open Folder** and selecting the folder you just cloned.\n\n\n>  Recommended Visual Studio Code extensions:\n>\n> * [Live Server](https://marketplace.visualstudio.com/items?itemName=ritwickdey.LiveServer&WT.mc_id=academic-77807-sagibbon) - to preview HTML pages within Visual Studio Code\n> * [Copilot](https://marketplace.visualstudio.com/items?itemName=GitHub.copilot&WT.mc_id=academic-77807-sagibbon) - to help you write code faster\n\n## 📂 Each lesson includes:\n\n- optional sketchnote\n- optional supplemental video\n- pre-lesson warmup quiz\n- written lesson\n- for project-based lessons, step-by-step guides on how to build the project\n- knowledge checks\n- a challenge\n- supplemental reading\n- assignment\n- [post-lesson quiz](https://ff-quizzes.netlify.app/web/)\n\n> **A note about quizzes**: All quizzes are contained in the Quiz-app folder, 48 total quizzes of three questions each. They are available [here](https://ff-quizzes.netlify.app/web/) the quiz app can be run locally or deployed to Azure; follow the instruction in the `quiz-app` folder.\n\n## 🗃️ Lessons\n\n|     |                       Project Name                       |                            Concepts Taught                             | Learning Objectives                                                                                                                 |                                                         Linked Lesson                                                          |         Author          |\n| :-: | :------------------------------------------------------: | :--------------------------------------------------------------------: | ----------------------------------------------------------------------------------------------------------------------------------- | :----------------------------------------------------------------------------------------------------------------------------: | :---------------------: |\n| 01  |                     Getting Started                      |           Introduction to Programming and Tools of the Trade           | Learn the basic underpinnings behind most programming languages and about software that helps professional developers do their jobs | [Intro to Programming Languages and Tools of the Trade](./1-getting-started-lessons/1-intro-to-programming-languages/README.md) |         Jasmine         |\n| 02  |                     Getting Started                      |             Basics of GitHub, includes working with a team             | How to use GitHub in your project, how to collaborate with others on a code base                                                    |                            [Intro to GitHub](./1-getting-started-lessons/2-github-basics/README.md)                             |          Floor          |\n| 03  |                     Getting Started                      |                             Accessibility                              | Learn the basics of web accessibility sers](./5-browser-extension/1-about-browsers/README.md)                                |           Jen           |\n| 13  | [Green Browser Extension](./5-browser-extension/solution/README.md) | Building a form, calling an API and storing variables in local storage | Build the JavaScript elements of your browser extension to call an API using variables stored in local storage                      |                [APIs, Forms, and Local Storage](./5-browser-extension/2-forms-browsers-local-storage/README.md)                 |           Jen           |\n| 14  | [Green Browser Extension](./5-browser-extension/solution/README.md) |          Background processes in the browser, web performance          | Use the browser's background processes to manage the extension's icon; learn about web performance and some optimizations to make   |             [Background Tasks and Performance](./5-browser-extension/3-background-tasks-and-performance/README.md)              |           Jen           |\n| 15  |           [Space Game](./6-space-game/solution/README.md)           |             More Advanced Game Development with JavaScript             | Learn about Inheritance using both Classes and Composition and the Pub/Sub pattern, in preparation for building a game              |                      [Introduction to Advanced Game Development](./6-space-game/1-introduction/README.md)                       |          Chris          |\n| 16  |           [Space Game](./6-space-game/solution/README.md)           |                           Drawing to canvas                            | Learn about the Canvas API, used to draw elements to a screen                                                                       |                                [Drawing to Canvas](./6-space-game/2-drawing-to-canvas/README.md)                                |          Chris          |\n| 17  |           [Space Game](./6-space-game/solution/README.md)           |                   Moving elements around the screen                    | Discover how elements can gain motion using the cartesian coordinates and the Canvas API                                            |                           [Moving Elements Around](./6-space-game/3-moving-elements-around/README.md)                           |          Chris          |\n| 18  |           [Space Game](./6-space-game/solution/README.md)           |                          Collision detection                           | Make elements collide and react to each other using keypresses and provide a cooldown function to ensure performance of the game    |                              [Collision Detection](./6-space-game/4-collision-detection/README.md)                              |          Chris          |\n| 19  |           [Space Game](./6-space-game/solution/README.md)           |                             Keeping score                              | Perform math calculations based on the game's status and performance                                                                |                                    [Keeping Score](./6-space-game/5-keeping-score/README.md)                                    |          Chris          |\n| 20  |           [Space Game](./6-space-game/solution/README.md)           |                     Ending and restarting the game                     | Learn about ending and restarting the game, including cleaning up assets and resetting variable values                              |                                [The Ending Condition](./6-space-game/6-end-condition/README.md)                                 |          Chris          |\n| 21  |         [Banking App](./7-bank-project/solution/README.md)          |                 HTML Templates and Routes in a Web App                 | Learn how to create the scaffold of a multipage website's architecture using routing and HTML templates                             |                            [HTML Templates and Routes](./7-bank-project/1-template-route/README.md)                             |          Yohan          |\n| 22  |         [Banking App](./7-bank-project/solution/README.md)          |                  Build a Login and Registration Form                   | Learn about building forms and handling validation routines                                                                          |                                           [Forms](./7-bank-project/2-forms/README.md)                                           |          Yohan          |\n| 23  |         [Banking App](./7-bank-project/solution/README.md)          |                   Methods of Fetching and Using Data                   | How data flows in and out of your app, how to fetch it, store it, and dispose of it                                                 |                                            [Data](./7-bank-project/3-data/README.md)                                            |          Yohan          |\n| 24  |         [Banking App](./7-bank-project/solution/README.md)          |                      Concepts of State Management                      | Learn how your app retains state and how to manage it programmatically                                                              |                                [State Management](./7-bank-project/4-state-management/README.md)                                |          Yohan          |\n| 25 | [Browser/VScode Code](./8-code-editor/) | Working with VScode | Learn how to Using a code editor| [Use VScode Code Editor](./8-code-editor/1-using-a-code-editor/README.md) | Chris |\n| 26 | [AI Assistants](./9-chat-project/README.md) | Working with AI | Learn how to build your own AI assistant | [AI Assistant project](./9-chat-project/README.md) | Chris |\n\n## 🏫 Pedagogy\n\nOur curriculum is designed with two key pedagogical principles in mind:\n* project-based learning\n* frequent quizzes\n\nThe program teaches the fundamentals of JavaScript, HTML, and CSS, as well as the latest tools and techniques used by today's web developers. Students will have the opportunity to develop hands-on experience by building a typing game, virtual terrarium, eco-friendly browser extension, space-invader-style game, and a banking app for businesses. By the end of the series, students will have gained a solid understanding of web development.\n\n> 🎓 You can take the first few lessons in this curriculum as a [Learn Path](https://docs.microsoft.com/learn/paths/web-development-101/?WT.mc_id=academic-77807-sagibbon) on Microsoft Learn!\n\nBy ensuring that the content aligns with projects, the process is made more engaging for students and retention of concepts will be augmented. We also wrote several starter lessons in JavaScript basics to introduce concepts, paired with a video from the \"[Beginners Series to: JavaScript](https://channel9.msdn.com/Series/Beginners-Series-to-JavaScript/?WT.mc_id=academic-77807-sagibbon)\" collection of video tutorials, some of whose authors contributed to this curriculum.\n\nIn addition, a low-stakes quiz before a class sets the intention of the student towards learning a topic, while a second quiz after class ensures further retention. This curriculum was designed to be flexible and fun and can be taken in whole or in part. The projects start small and become increasingly complex by the end of the 12-week cycle.\n\nWhile we have purposefully avoided introducing JavaScript frameworks to concentrate on the basic skills needed as a web developer before adopting a framework, a good next step to completing this curriculum would be learning about Node.js via another collection of videos: \"[Beginner Series to: Node.js](https://channel9.msdn.com/Series/Beginners-Series-to-Nodejs/?WT.mc_id=academic-77807-sagibbon)\".\n\n> Visit our [Code of Conduct](CODE_OF_CONDUCT.md) and [Contributing](CONTRIBUTING.md) guidelines. We welcome your constructive feedback!\n\n\n## 🧭 Offline access\n\nYou can run this documentation offline by using [Docsify](https://docsify.js.org/#/). Fork this repo, [install Docsify](https://docsify.js.org/#/quickstart) on your local machine, and then in the root folder of this repo, type `docsify serve`. The website will be served on port 3000 on your localhost: `localhost:3000`.\n\n## 📘 PDF\n\nA PDF of all of the lessons can be found [here](https://microsoft.github.io/Web-Dev-For-Beginners/pdf/readme.pdf).\n\n\n## 🎒 Other Courses\n\nOur team produces other courses! Check out:\n\n<!-- CO-OP TRANSLATOR OTHER COURSES START -->\n### LangChain\n[![LangChain4j for Beginners](https://img.shields.io/badge/LangChain4j%20for%20Beginners-22C55E?style=for-the-badge&&labelColor=E5E7EB&color=0553D6)](https://aka.ms/langchain4j-for-beginners)\n[![LangChain.js for Beginners](https://img.shields.io/badge/LangChain.js%20for%20Beginners-22C55E?style=for-the-badge&labelColor=E5E7EB&color=0553D6)](https://aka.ms/langchainjs-for-beginners?WT.mc_id=m365-94501-dwahlin)\n[![LangChain for Beginners](https://img.shields.io/badge/LangChain%20for%20Beginners-22C55E?style=for-the-badge&labelColor=E5E7EB&color=0553D6)](https://github.com/microsoft/langchain-for-beginners?WT.mc_id=m365-94501-dwahlin)\n---\n\n### Azure / Edge / MCP / Agents\n[![AZD for Beginners](https://img.shields.io/badge/AZD%20for%20Beginners-0078D4?style=for-the-badge&labelColor=E5E7EB&color=0078D4)](https://github.com/microsoft/AZD-for-beginners?WT.mc_id=academic-105485-koreyst)\n[![Edge AI for Beginners](https://img.shields.io/badge/Edge%20AI%20for%20Beginners-00B8E4?style=for-the-badge&labelColor=E5E7EB&color=00B8E4)](https://github.com/microsoft/edgeai-for-beginners?WT.mc_id=academic-105485-koreyst)\n[![MCP for Beginners](https://img.shields.io/badge/MCP%20for%20Beginners-009688?style=for-the-badge&labelColor=E5E7EB&color=009688)](https://github.com/microsoft/mcp-for-beginners?WT.mc_id=academic-105485-koreyst)\n[![AI Agents for Beginners](https://img.shields.io/badge/AI%20Agents%20for%20Beginners-00C49A?style=for-the-badg ithub&color=000000&logoColor=fff)](https://aka.ms/foundry/forum)\n\n## License\n\nThis repository is licensed under the MIT license. See the [LICENSE](LICENSE) file for more information.\n","summary":"Web Development for Beginners is a comprehensive 12-week curriculum designed by Microsoft Cloud Advocates to teach the fundamentals of HTML, CSS, and JavaScript. The course utilizes a project-based pedagogy, featuring 24 hands-on lessons that guide students through building practical applications like browser extensions and games. It is an ideal resource for aspiring developers and coding newcomers who prefer an interactive, structured approach to learning web development.","description":"24 Lessons, 12 Weeks, Get Started as a Web Developer","stars":95851,"language":"JavaScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
