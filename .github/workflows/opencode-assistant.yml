name: OpenCode Assistant
run-name: "OpenCode assistant: #${{ github.event.issue.number || github.event.pull_request.number }} @${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-assistant-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  assist:
    if: >-
      github.event.comment.user.type != 'Bot' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR') &&
      (contains(github.event.comment.body, '@opencode') ||
       contains(github.event.comment.body, '/opencode') ||
       contains(github.event.comment.body, '/oc'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}:${{ github.repository }}|${{ github.workflow }}|${{ github.job }}
      OPENCODE_CONFIG_CONTENT: >-
        {"provider":{"openai":{"options":{"baseURL":"{env:LLM_BASE_URL}","apiKey":"{env:OPENAI_API_KEY}"},"models":{"${{ secrets.LLM_MODEL }}":{}}}}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run OpenCode assistant
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # github-v1.2.19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/${{ secrets.LLM_MODEL }}
          mentions: "@opencode,/opencode,/oc"
          share: false
          use_github_token: true
